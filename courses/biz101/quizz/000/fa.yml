question: ریل‌های پرداخت ساخته شده بر روی سیستم‌های ارز سنتی چیست؟
answer: اساساً توسط بازرگانان از طریق هزینه‌های پردازشگرهای پرداخت پرداخت می‌شود.
wrong_answers:
  - اساساً رایگان زیرا مشتری قیمتی را که توسط فروشنده نمایش داده می‌شود، پرداخت می‌کند
  - پرداخت شده توسط مشتری علاوه بر قیمت درخواستی فروشنده
  - پرداخت شده توسط شرکت‌های کارت که داده‌های مشتریان را مجدداً می‌فروشند
explanation: |
  هیچ چیز رایگان نیست. زیرساخت‌های پرداخت ساخته شده در سیستم‌های ارز سنتی توسط فروشندگان مختلفی مانند شرکت‌های کارت و بانک‌های پذیرنده اداره می‌شوند که برای هر تراکنش یک هزینه ثابت و/یا درصدی هزینه دریافت می‌کنند.
reviewed: false