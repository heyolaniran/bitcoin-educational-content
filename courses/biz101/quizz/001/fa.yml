question: چرا کمیابی به عنوان یک ویژگی مهم برای یک ارز خوب در نظر گرفته می‌شود؟
answer: زیرا Supply محدود ارزش خود را از کاهش به دلیل تولید بیش از حد محافظت می‌کند.
wrong_answers:
  - زیرا اطمینان می‌دهد که همه می‌توانند به‌راحتی ارز خود را ایجاد کنند.
  - زیرا تشخیص ارز را دشوارتر می‌کند.
  - زیرا استفاده از ارز در تجارت‌های دوربرد را دلسرد می‌کند.
explanation: |
  ارزی با کمبود کنترل‌شده قدرت خرید خود را در طول زمان حفظ می‌کند. بدون کمبود، انتشار بیش از حد می‌تواند به تورم منجر شود و ارزش ارز را کاهش دهد.
reviewed: false