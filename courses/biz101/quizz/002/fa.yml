question: چگونه گذار از سکه به پول کاغذی شبکه ارزی را بهبود بخشید؟
answer: این امر پول را قابل حمل‌تر و مقیاس‌پذیرتر کرد و تجارت‌های دوربرد و سیستم‌های مالی پیچیده را تسهیل نمود.
wrong_answers:
  - این نیاز به هرگونه دارایی پایه یا اعتماد را از بین برد.
  - این به سرعت تورم را متوقف کرد و اقتصاد را تثبیت کرد.
  - این به دولت‌ها اجازه داد تا به طور کامل از مدیریت پول Supply اجتناب کنند.
explanation: |
  اسکناس سبک‌تر و ساخت آن آسان‌تر بود و حمل آن نسبت به سکه‌های ساخته شده از فلزات گران‌بها راحت‌تر بود. این قابلیت حمل و استانداردسازی، معاملات را ساده‌تر کرد و به اقتصادها اجازه داد تا فراتر از مناطق محلی رشد کنند.
reviewed: false