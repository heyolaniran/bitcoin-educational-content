question: یکی از معایب سیستم‌های پولی متمرکز مدرن چیست؟
answer: آن‌ها اغلب در مدیریت پول Supply شفافیت و قابلیت حسابرسی ندارند.
wrong_answers:
  - آن‌ها یک ارزش پایدار و تغییرناپذیر برای هر واحد پولی فراهم می‌کنند.
  - آن‌ها تمام واسطه‌ها را حذف می‌کنند و تسویه‌حساب‌ها را به میلی‌ثانیه‌ها تسریع می‌بخشند.
  - آن‌ها اطمینان حاصل می‌کنند که انتشار پول به‌طور کامل غیرمتمرکز و ضد تورم است.
explanation: |
  سیستم‌های متمرکز می‌توانند به دلخواه پول صادر کنند، اغلب بدون نظارت شفاف. این می‌تواند به دلیل تورم، تسویه‌حساب‌های پیچیده بین‌بانکی و مدیریت نادرست احتمالی، اعتماد را تضعیف کند.
reviewed: false