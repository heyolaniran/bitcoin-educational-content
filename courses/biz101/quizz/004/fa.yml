question: چه چیزی پیچیدگی فرآیند پرداخت مبتنی بر کارت امروزی را در نقطه فروش خرده‌فروشی مشخص می‌کند؟
answer: این شامل واسطه‌های متعدد، چندین مرحله، و ممکن است روزها طول بکشد تا وجوه به طور کامل تسویه شود.
wrong_answers:
  - این تنها به یک گام فوری نیاز دارد و وجوه بلافاصله تسویه می‌شوند.
  - این به‌طور انحصاری به پول نقد فیزیکی و بدون واسطه‌ها متکی است.
  - این اطمینان حاصل می‌کند که به محض کشیدن کارت، فروشنده به صورت فوری و غیرقابل برگشت به وجوه دسترسی دارد.
explanation: |
  پرداخت‌های کارتی اغلب شامل زنجیره‌ای از واسطه‌ها (پذیرندگان، صادرکنندگان، شبکه‌های کارت) هستند، نیاز به مراحل تأیید و تسویه دارند و ممکن است از ۴۸ ساعت تا چند روز طول بکشد تا فروشنده وجوه خالص را دریافت کند.
reviewed: false