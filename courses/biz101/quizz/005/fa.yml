question: یکی از ویژگی‌های تعیین‌کننده شبکه ارزی Bitcoin چیست؟
answer: این مانند پول نقد است و برای تراکنش‌ها نیازی به مرجع مرکزی یا واسطه ندارد.
wrong_answers:
  - فقط زمانی می‌تواند عمل کند که توسط یک آژانس دولتی مجاز شده باشد.
  - این به درخواست هر کاربر واحدهای جدید ارز صادر می‌کند.
  - این نیاز به بانک‌ها دارد تا هر تراکنش را تأیید و تسویه کنند.
explanation: |
  Bitcoin به عنوان یک شبکه غیرمتمرکز عمل می‌کند و به هر کسی اجازه می‌دهد بدون نیاز به مجوز شرکت کند. تراکنش‌ها توسط نودها و ماینرها تأیید می‌شوند، نه توسط یک مرجع مرکزی.
reviewed: false