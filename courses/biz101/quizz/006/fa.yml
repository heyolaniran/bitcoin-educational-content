question: چرا محدودیت ۲۱ میلیونی در صدور Bitcoin مهم است؟
answer: این یک دارایی کاهش‌دهنده ایجاد می‌کند که ارزش آن را در برابر تورم دلخواه محافظت می‌کند.
wrong_answers:
  - این اطمینان می‌دهد که دولت‌ها می‌توانند به هر تعداد بیت‌کوین که نیاز دارند چاپ کنند.
  - این از ارسال تراکنش‌ها پس از رسیدن به سقف جلوگیری می‌کند.
  - این تمام نوسانات قیمت Bitcoin را از بین می‌برد.
explanation: |
  با داشتن حداکثر Supply به میزان ۲۱ میلیون، کمبود Bitcoin به صورت Hard کدگذاری شده است، که آن را به طور اساسی از ارزهای تورمی که در آن Supply می‌تواند به دلخواه افزایش یابد، متمایز می‌کند.
reviewed: false