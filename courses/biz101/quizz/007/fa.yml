question: کدام یک از موارد زیر به بهترین شکل توضیح می‌دهد که تراکنش‌های Bitcoin چگونه به قطعیت می‌رسند؟
answer: پس از ثبت در Blockchain، تراکنش‌ها تغییرناپذیر هستند و نمی‌توان آن‌ها را تغییر داد.
wrong_answers:
  - تراکنش‌ها می‌توانند توسط بانک‌ها در صورت بروز اختلاف معکوس شوند.
  - کاربران باید برای نهایی کردن یک معامله از چندین نهاد دولتی تأییدیه بگیرند.
  - هر شرکت‌کننده‌ای می‌تواند در صورت داشتن کد ویژه، تراکنش‌های گذشته را به دلخواه ویرایش کند.
explanation: |
  Bitcoin s Blockchain یک Ledger ضد دستکاری است. هنگامی که یک تراکنش تأیید و در یک بلوک گنجانده می‌شود، به بخشی از رکورد دائمی تبدیل می‌شود و نهایی بودن را تضمین می‌کند.
reviewed: false