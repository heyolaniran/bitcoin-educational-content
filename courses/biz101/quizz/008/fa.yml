question: کدام بیانیه به بهترین شکل نقش Bitcoin را به عنوان یک شبکه و دارایی برای کسب‌وکارها توصیف می‌کند؟
answer: می‌تواند هم به عنوان ذخیره ارزش و هم به عنوان یک واسطه Exchange در یک سیستم جهانی و غیرمتمرکز عمل کند.
wrong_answers:
  - این فقط می‌تواند به عنوان یک سیستم کارت هدیه محلی عمل کند.
  - این صرفاً یک ابزار معاملاتی سفته‌بازی است و هیچ کاربرد واقعی ندارد.
  - باید به سیاست‌های پولی یک کشور واحد وابسته باشد تا عمل کند.
explanation: |
  طراحی جهانی و اینترنت‌محور Bitcoin به آن امکان می‌دهد نه تنها به عنوان یک ذخیره ارزش عمل کند، بلکه به عنوان یک واسطه Exchange نیز عمل کند و به کسب‌وکارها امکان تسویه سریع، بدون نیاز به مجوز و نهایی تراکنش‌ها در سراسر جهان را فراهم می‌کند.
reviewed: false