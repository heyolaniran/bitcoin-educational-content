question: هدف اصلی Lightning Network که بر روی Bitcoin ساخته شده چیست؟
answer: برای فعال‌سازی پرداخت‌های سریع‌تر و تقریباً فوری با حداقل تعامل On-Chain.
wrong_answers:
  - برای جایگزینی کامل Blockchain با Bitcoin و ذخیره تمام تراکنش‌ها به صورت محلی.
  - برای ارائه یک شبکه دارای مجوز که توسط یک نهاد واحد کنترل می‌شود.
  - برای کند کردن تراکنش‌ها به منظور اطمینان از اینکه کاملاً قابل ردیابی توسط دولت‌ها باقی می‌مانند.
explanation: |
  Lightning Network یک پروتکل "دومین-Layer" است که به شرکت‌کنندگان اجازه می‌دهد کانال‌های پرداخت ایجاد کنند، off-chain را معامله کنند و تنها تراز نهایی خالص را بر روی Bitcoin Blockchain تسویه کنند. این طراحی به سرعت‌های بالاتر و هزینه‌های کمتر دست می‌یابد.
reviewed: false