question: Lightning Network چگونه به کاهش هزینه‌های تراکنش‌های Bitcoin کمک می‌کند؟
answer: با انجام اکثر تراکنش‌ها در off-chain و انتشار تنها تراکنش‌های تسویه کانال بر روی Blockchain اصلی.
wrong_answers:
  - با حذف تمام تأییدهای رمزنگاری از پرداخت‌ها.
  - با متمرکز کردن کنترل در یک مرکز پرداخت بزرگ.
  - با الزام بازرگانان به پرداخت کلیه هزینه‌های شبکه به صورت پیش‌پرداخت.
explanation: |
  از آنجا که تراکنش‌های Lightning در off-chain اتفاق می‌افتند، تنها وضعیت‌های نهایی کانال در Bitcoin Blockchain تسویه می‌شوند. این امر تراکم را کاهش داده و در نتیجه با اجتناب از انجام بسیاری از تراکنش‌های On-Chain، هزینه‌ها را پایین می‌آورد.
reviewed: false