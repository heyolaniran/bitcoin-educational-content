question: مزیت لایتنینگ برای بازرگانان در مورد نهایی بودن پرداخت چیست؟
answer: پرداخت‌ها در شبکه لایتنینگ تقریباً به‌صورت فوری نهایی می‌شوند و خطر برگشت یا تقلب را کاهش می‌دهند.
wrong_answers:
  - قبل از اینکه وجوه قابل خرج کردن باشند، نیاز به ۲۴ ساعت انتظار است.
  - این امکان را به مشتریان می‌دهد تا در هر زمانی پرداخت خود را بازپس گیرند.
  - این معاملات را تا ۹۰ روز به طور کامل قابل برگشت می‌کند.
explanation: |
  با لایتنینگ، زمانی که یک پرداخت از طریق شبکه مسیریابی و تسویه می‌شود، نهایی است. این امر سناریوهای بازپرداختی که در سیستم‌های پرداخت سنتی دیده می‌شود را حذف می‌کند.
reviewed: false