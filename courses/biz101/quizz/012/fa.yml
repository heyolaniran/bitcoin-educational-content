question: چرا می‌توان Lightning Network را با "ایمیل برای پرداخت‌ها" مقایسه کرد؟
answer: زیرا این امکان را فراهم می‌کند که ارزش Exchange به صورت یکپارچه، جهانی و بدون نیاز به مجوز به سادگی ارسال یک پیام منتقل شود.
wrong_answers:
  - زیرا پرداخت‌ها را از طریق ارائه‌دهندگان ایمیل سنتی ارسال می‌کند.
  - زیرا فقط زمانی کار می‌کند که به پیام‌های ایمیل معمولی پیوست شود.
  - زیرا موجودی کاربران را در بدنه یک ایمیل ذخیره می‌کند.
explanation: |
  همان‌طور که ایمیل با حذف واسطه‌ها و امکان ارسال پیام به سراسر جهان، ارتباطات را متحول کرد، Lightning Network تراکنش‌ها را ساده و سریع می‌کند و انتقال ارزش را به اندازه ایمیل بدون اصطکاک و در دسترس می‌سازد.
reviewed: false