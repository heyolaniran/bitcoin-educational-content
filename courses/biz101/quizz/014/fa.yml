question: چرا حفظ سرمایه برای یک شرکت سالم در آینده‌ای نامشخص ضروری است؟
answer: حفظ ذخایر سرمایه به شرکت اجازه می‌دهد تا خود را تطبیق دهد، در رشد سرمایه‌گذاری کند و از رکودهای اقتصادی عبور کند.
wrong_answers:
  - حفظ سرمایه تضمین می‌کند که هیچ رقیبی نمی‌تواند وارد بازار شود.
  - حفظ سرمایه، مصونیت دائمی از تمامی تغییرات مقرراتی را تضمین می‌کند.
  - حفظ سرمایه تنها در صورتی مهم است که شرکت قصد نداشته باشد هرگز رشد کند.
explanation: |
  شرایط آینده غیرقابل پیش‌بینی هستند. با نگه‌داشتن مقداری سرمایه در ذخیره، یک کسب‌وکار می‌تواند از فرصت‌های جدید بهره‌برداری کند، با چالش‌های غیرمنتظره مقابله کند و در ابتکارات بلندمدت سرمایه‌گذاری کند بدون اینکه به‌طور کامل به منابع مالی خارجی متکی باشد.
