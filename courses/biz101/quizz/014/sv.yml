question: Varför är det viktigt att bevara kapitalet för att ett företag ska må bra i en osäker framtid?
answer: Genom att upprätthålla kapitalreserver kan företaget anpassa sig, investera i tillväxt och klara av ekonomiska nedgångar.
wrong_answers:
  - Genom att bevara kapitalet garanteras att ingen konkurrent någonsin kan komma in på marknaden.
  - Genom att bevara kapitalet säkerställs en permanent immunitet mot alla förändringar i regelverket.
  - Att bevara kapital är bara viktigt om företaget planerar att aldrig växa.
explanation: |
  Framtida förhållanden är oförutsägbara. Genom att hålla en viss kapitalreserv kan ett företag ta vara på nya möjligheter, hantera oväntade utmaningar och investera i långsiktiga initiativ utan att enbart förlita sig på extern finansiering.
