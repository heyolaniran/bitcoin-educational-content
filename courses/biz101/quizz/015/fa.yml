question: داستان ماهیگیر چه چیزی را درباره ماهیت سرمایه نشان می‌دهد؟
answer: سرمایه نشان‌دهنده منابع ذخیره‌شده‌ای است که امکان ساخت ابزارهایی برای بهبود بهره‌وری آینده را فراهم می‌کند.
wrong_answers:
  - سرمایه فقط یک انبار از کالاهای مصرفی است که منتظر مصرف فوری هستند.
  - سرمایه باید فوراً از طریق وام‌های دولتی ایجاد شود.
  - سرمایه فقط برای شرکت‌های بزرگ اهمیت دارد، نه کارآفرینان کوچک.
explanation: |
  ماهیگیری که چند روز ماهی را ذخیره می‌کند تا نیزه‌ای بسازد، مصرف فوری را به نفع سود آینده به تعویق می‌اندازد. این مثال نشان می‌دهد که چگونه پس‌انداز (انباشت سرمایه) به کارایی بالاتر و تولید بیشتر در آینده منجر می‌شود.
reviewed: false