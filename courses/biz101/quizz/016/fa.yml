question: سرمایه ایجاد شده به صورت مصنوعی از پول مبتنی بر بدهی چگونه با سرمایه به سبک اتریشی تفاوت دارد؟
answer: سرمایه به سبک اتریشی از پس‌انداز واقعی و فداکاری ناشی می‌شود، در حالی که سرمایه مبتنی بر بدهی به‌طور فوری از اعتبار ایجاد می‌شود و می‌تواند سیگنال‌های اقتصادی را تحریف کند.
wrong_answers:
  - سرمایه به سبک اتریشی با چاپ پول بیشتر در مواقع نیاز تولید می‌شود.
  - سرمایه مبتنی بر بدهی هرگز نیاز به بازپرداخت ندارد و معادل پس‌انداز واقعی است.
  - هیچ تفاوتی وجود ندارد؛ هر دو شکل سرمایه از نظر ماهیت و اثر یکسان هستند.
explanation: |
  پایتخت اتریش از مصرف واقعی صرف‌نظر شده و سرمایه‌گذاری دقیق به وجود می‌آید. سرمایه مبتنی بر بدهی که به راحتی از طریق وام‌ها ایجاد می‌شود، می‌تواند کارآفرینان را گمراه کند و به سرمایه‌گذاری‌های ناکارآمد منجر شود، زیرا منعکس‌کننده پس‌انداز واقعی یا ترجیحات مصرف‌کننده نیست.
reviewed: false