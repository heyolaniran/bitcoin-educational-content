question: چرا ممکن است یک شرکت بخشی از خزانه خود را در Bitcoin نگه دارد؟
answer: به عنوان یک دارایی که ممکن است ارزش آن افزایش یابد و بتواند ارزش را ذخیره کند و نقدینگی ارائه دهد بدون اینکه به واسطه‌های مالی سنتی متکی باشد.
wrong_answers:
  - برای حذف فوری تمام ریسک‌ها و تضمین بازدهی پایدار.
  - برای رعایت مقررات اجباری دولتی که نیاز به دارایی‌های Bitcoin دارند.
  - برای اطمینان از اینکه هرگز نمی‌تواند دارایی‌های خود را به ارزهای سنتی تبدیل کند.
explanation: |
  کمیابی Bitcoin، نقدینگی جهانی و استقلال از سیستم‌های بانکی سنتی می‌تواند آن را به عنوان یک دارایی خزانه‌داری جذاب کند. اگرچه شامل ریسک و نوسان است، اما کسب‌وکارها ممکن است آن را به عنوان یک ذخیره ارزش بلندمدت و پوششی در برابر تورم ببینند.
reviewed: false