question: چرا نوسان به عنوان یک جنبه طبیعی از Bitcoin به عنوان یک دارایی نوظهور در نظر گرفته می‌شود؟
answer: زیرا Bitcoin هنوز نسبتاً جوان است، جلب توجه سفته‌بازان و واکنش به اخبار بازار، باعث نوسانات قیمتی می‌شود قبل از اینکه در دوره‌های طولانی‌تر تثبیت شود.
wrong_answers:
  - زیرا به صورت مرکزی کنترل می‌شود و قیمت‌ها توسط یک مرجع تعیین می‌شوند.
  - زیرا Bitcoin هیچ کاربری ندارد که آن را به‌صورت بلندمدت نگه دارد.
  - زیرا بازرگانان باید قیمت‌ها را هر ساعت به‌طور غیرقابل پیش‌بینی تعیین کنند.
explanation: |
  به عنوان یک دارایی در حال توسعه، قیمت Bitcoin تحت تأثیر حدس و گمان، احساسات و نرخ‌های پذیرش متغیر قرار می‌گیرد. با گذشت زمان، با مشارکت بیشتر دارندگان پایدار و بلندمدت، نوسانات ممکن است کاهش یابد، اما همچنان یک ویژگی رشد در مراحل اولیه باقی می‌ماند.
reviewed: false