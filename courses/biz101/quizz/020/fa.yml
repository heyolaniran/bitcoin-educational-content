question: تورم پنهان در زمینه یک سیستم پولی مبتنی بر بدهی چیست؟
answer: این افزایش پول Supply (حدود 7% در سال) است که سهم شما از ارزش کلی را کاهش می‌دهد اگر سرمایه‌گذاری نکنید یا دارایی‌ها را به‌طور مناسب رشد ندهید.
wrong_answers:
  - این یک اصطلاح اقتصادی رسمی برای نرخ‌های بهره ثابت است.
  - این به ارقام تورمی اشاره دارد که توسط بانک‌های مرکزی منتشر نشده‌اند.
  - این بدان معناست که قیمت‌ها هرگز افزایش نمی‌یابند، حتی زمانی که پول Supply گسترش می‌یابد.
explanation: |
  تورم پنهان زمانی رخ می‌دهد که پول Supply گسترش می‌یابد و قدرت خرید پس‌اندازها را کاهش می‌دهد. اگر یک کسب‌وکار به‌طور فعالانه سرمایه‌گذاری نکند یا از ثروت خود محافظت نکند، خطر از دست دادن ارزش به این شکل آرام از رقیق‌سازی پولی را دارد.
