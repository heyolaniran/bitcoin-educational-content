question: چرا ممکن است یک شرکت به جای دارایی‌های "ایمن" سنتی مانند املاک و مستغلات، به نگهداری Bitcoin فکر کند؟
answer: Bitcoin می‌تواند به‌طور بالقوه از تورم واقعی پیشی بگیرد و به عدم نقدینگی و هزینه‌های نگهداری املاک و مستغلات وابسته نیست.
wrong_answers:
  - املاک همیشه ارزان‌تر از Bitcoin است و هرگز به نگهداری نیاز ندارد.
  - Bitcoin تضمین‌های دولتی ارائه می‌دهد که املاک و مستغلات ارائه نمی‌دهند.
  - املاک و مستغلات تحت هر شرایط بازاری سریع‌تر از Bitcoin ارزش پیدا می‌کند.
explanation: |
  املاک و مستغلات اغلب شامل محدودیت‌های نقدینگی و هزینه‌های جاری است و ممکن است با تورم پنهان در یک سیستم پولی مبتنی بر بدهی همگام نشود. کمبود و دسترسی جهانی Bitcoin یک پیشنهاد ذخیره ارزش متمایز ارائه می‌دهد که ممکن است در بلندمدت از دارایی‌های سنتی پیشی بگیرد.
reviewed: false