question: Varför kan ett företag överväga att inneha Bitcoin framför traditionella "säkra" tillgångar som fastigheter?
answer: Bitcoin kan potentiellt överträffa den reala inflationen och är inte kopplad till fastigheters illikviditet och underhållskostnader.
wrong_answers:
  - Fastigheter är alltid billigare än Bitcoin och behöver aldrig underhållas.
  - Bitcoin erbjuder statligt stödda garantier som fastigheter inte gör.
  - Fastigheter ökar i värde snabbare än Bitcoin under alla marknadsförhållanden.
explanation: |
  Fastigheter innebär ofta likviditetsbegränsningar och löpande kostnader och kanske inte håller jämna steg med den dolda inflationen i ett skuldbaserat monetärt system. Bitcoin:s sällsynthet och globala räckvidd erbjuder en tydlig värdebevarare som kan överträffa traditionella tillgångar på lång sikt.
reviewed: false