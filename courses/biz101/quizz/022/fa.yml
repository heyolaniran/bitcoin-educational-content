question: به طور کلی چه توصیه می‌شود زمانی که بخشی از خزانه شرکت به Bitcoin اختصاص داده می‌شود؟
answer: فقط نقدینگی مازاد را که برای چندین سال به آن نیاز نخواهید داشت سرمایه‌گذاری کنید و یک افق زمانی حداقل چهار ساله را حفظ کنید.
wrong_answers:
  - از تمام وجه نقد عملیاتی بلافاصله استفاده کنید بدون در نظر گرفتن نیازهای نقدینگی.
  - هدف این است که خرید و فروش را در عرض چند هفته انجام دهید تا سود کوتاه‌مدت را به حداکثر برسانید.
  - فقط زمانی سرمایه‌گذاری کنید که به یک وام کوتاه‌مدت فوری برای پوشش هزینه‌ها نیاز دارید.
explanation: |
  از آنجا که قیمت Bitcoin می‌تواند در کوتاه‌مدت نوسان داشته باشد، عاقلانه است که از وجوهی استفاده کنید که فوراً به آن‌ها نیاز ندارید و حداقل برای چهار سال نگه دارید. این رویکرد نوسانات را هموار می‌کند و شانس تحقق افزایش ارزش بلندمدت را افزایش می‌دهد.
