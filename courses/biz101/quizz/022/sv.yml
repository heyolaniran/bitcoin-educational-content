question: Vad rekommenderas generellt vid allokering av en del av ett bolags kassa till Bitcoin?
answer: Placera endast överskottslikviditet som du inte behöver på flera år och ha en tidshorisont på minst fyra år.
wrong_answers:
  - Använda alla operativa medel omedelbart utan att beakta likviditetsbehov.
  - Sikta på att köpa och sälja inom några veckor för att maximera kortsiktiga vinster.
  - Investera bara när du behöver ett brådskande kortfristigt lån för att täcka utgifter.
explanation: |
  Eftersom Bitcoin:s pris kan vara volatilt på kort sikt är det klokt att använda fonder som du inte behöver direkt och behålla dem i minst fyra år. Detta tillvägagångssätt jämnar ut volatiliteten och ökar chanserna att realisera en långsiktig värdeökning.
reviewed: false