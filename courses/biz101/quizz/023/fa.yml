question: کدام یک از موارد زیر یکی از سه روش اصلی ذکر شده برای به دست آوردن Bitcoin نیست؟
answer: دریافت Bitcoin به عنوان کمک هزینه دولتی برای توسعه کسب و کار.
wrong_answers:
  - دریافت Bitcoin در Exchange برای کالاها یا خدمات.
  - Mining Bitcoin از طریق سخت‌افزار تخصصی و مصرف انرژی.
  - خرید Bitcoin از یک پلتفرم یا کارگزار.
explanation: |
  این فصل به سه روش اصلی برای به دست آوردن Bitcoin اشاره می‌کند؛ پذیرش آن به عنوان پرداخت، استخراج آن، یا خرید آن. دریافت Bitcoin به عنوان کمک‌هزینه دولتی به عنوان یک روش استاندارد شناخته‌شده برای کسب آن محسوب نمی‌شود.
reviewed: false