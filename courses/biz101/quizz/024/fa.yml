question: هنگام خرید Bitcoin، یکی از روش‌های پیشنهادی برای مدیریت نوسانات قیمت آن چیست؟
answer: به تدریج Bitcoin را در فواصل منظم جمع‌آوری کنید و دیدگاه بلندمدت را حفظ کنید.
wrong_answers:
  - تلاش برای پیش‌بینی اوج‌های کوتاه‌مدت بازار و فروش فوری.
  - با کل خزانه شرکت به طور کامل وارد شوید.
  - Bitcoin را فقط در روزهایی بخرید که قیمت آن به شدت افزایش یافته است.
explanation: |
  خریدهای منظم در طول زمان (میانگین‌گیری هزینه دلار) به کاهش نوسانات کمک می‌کند. یک افق زمانی بلندمدت‌تر (مثلاً ۴ سال) تأثیر نوسانات قیمت کوتاه‌مدت را کاهش می‌دهد.
reviewed: false