question: Varför rekommenderas det för företag att börja med ett litet första inköp av Bitcoin?
answer: Det ger dem möjlighet att få praktisk erfarenhet och förståelse innan de satsar större summor.
wrong_answers:
  - Det förhindrar juridiskt att företaget drabbas av skatteskulder.
  - Det garanterar omedelbart företaget maximal avkastning.
  - Det gör företaget immunt mot alla kryptovalutabedrägerier.
explanation: |
  En liten initial investering hjälper företag att lära sig de praktiska aspekterna av att köpa, lagra och hantera Bitcoin utan att ta på sig betydande risker.
reviewed: false