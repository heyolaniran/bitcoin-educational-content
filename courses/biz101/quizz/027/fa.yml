question: یکی از روش‌های پیشنهادی در مورد حضانت هنگام به‌دست‌آوردن Bitcoin چیست؟
answer: پس از خریدهای اولیه، راه‌حل‌های نگهداری شخصی را در نظر بگیرید تا کسب‌وکار واقعاً دارایی‌های خود را کنترل کند.
wrong_answers:
  - هرگز Bitcoin را تحت هیچ شرایطی از Exchange خارج نکنید.
  - همیشه به یک متولی واحد اعتماد کنید بدون بررسی اقدامات امنیتی.
  - ذخیره تمام Bitcoin در یک وب‌سایت عمومی با یک رمز عبور ساده
explanation: |
  پس از خرید Bitcoin، انتقال آن به Wallet با نگهداری شخصی تضمین می‌کند که کسب‌وکار کنترل مستقیم بر وجوه خود دارد. در حالی که نگهداری توسط شخص ثالث می‌تواند راحت باشد، نگهداری شخصی با اصل حاکمیت مالی Bitcoin همسو است.
reviewed: false