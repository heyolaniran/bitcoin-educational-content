question: چرا ممکن است یک کسب‌وکار تصمیم بگیرد پرداخت‌های Bitcoin را از مشتریان بپذیرد؟
answer: برای بهره‌برداری از یک پایگاه کاربری در حال رشد، احتمالاً کاهش هزینه‌های تراکنش و نگهداری یک دارایی ارزشمند در خزانه خود.
wrong_answers:
  - برای اطمینان از اینکه همه مشتریان بیش از قیمت فهرست شده پرداخت خواهند کرد.
  - برای اطمینان از اینکه هیچ‌گونه مالیات یا الزامات قانونی هرگز اعمال نشود.
  - برای کندتر و پیچیده‌تر کردن فرآیند پرداخت.
explanation: |
  پذیرش Bitcoin می‌تواند یک جمعیت جدید از خریداران را جذب کند، هزینه‌های پردازش پرداخت را کاهش دهد و یک ذخیره ارزش ایجاد کند. همچنین می‌تواند دسترسی جهانی را افزایش دهد، زیرا Bitcoin بدون مرز است و به صورت شبانه‌روزی عمل می‌کند.
reviewed: false