question: कोई व्यवसाय ग्राहकों से Bitcoin भुगतान स्वीकार करना क्यों चुन सकता है?
answer: बढ़ते हुए उपयोगकर्ता आधार का लाभ उठाने, संभावित रूप से कम लेनदेन शुल्क, तथा अपने खजाने में एक मूल्यवान परिसंपत्ति रखने के लिए।
wrong_answers:
  - यह गारंटी देना कि सभी ग्राहक सूचीबद्ध मूल्य से अधिक भुगतान करेंगे।
  - यह सुनिश्चित करना कि कभी भी कोई कर या विनियामक आवश्यकताएं लागू न हों।
  - चेकआउट प्रक्रिया को धीमा और अधिक जटिल बनाना।
explanation: |
  Bitcoin को स्वीकार करने से खरीदारों का एक नया जनसांख्यिकीय समूह आकर्षित हो सकता है, भुगतान प्रसंस्करण शुल्क कम हो सकता है, और मूल्य का भंडार बन सकता है। यह वैश्विक पहुंच को भी बढ़ा सकता है, क्योंकि Bitcoin सीमाहीन है और चौबीसों घंटे काम करता है।
