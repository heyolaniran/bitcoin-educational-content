question: مزیت پرداخت‌های Lightning Network برای بازرگانان در نقطه فروش چیست؟
answer: پرداخت‌های لایتنینگ تقریباً به‌صورت فوری تسویه می‌شوند و نیازی به واسطه‌های متعدد ندارند، که این امر باعث کاهش هزینه‌ها و تأخیر در تسویه می‌شود.
wrong_answers:
  - پرداخت‌های لایتنینگ به هفته‌ها زمان برای تأیید نیاز دارند و مستلزم مدارک سنگین هستند.
  - پرداخت‌های لایتنینگ تنها در صورتی انجام می‌شوند که توسط مرجع بانک مرکزی تأیید شوند.
  - پرداخت‌های لایتنینگ می‌توانند پس از فروش به‌دلخواه توسط خریدار معکوس شوند.
explanation: |
  Lightning Network تراکنش‌ها را سریع‌تر و ارزان‌تر می‌کند با اجازه تسویه off-chain. بازرگانان می‌توانند تقریباً بلافاصله وجوه را دریافت کنند، با هزینه‌های کم و بدون اتکا به واسطه‌های پرداخت سنتی.
reviewed: false