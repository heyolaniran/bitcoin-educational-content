question: Lightning Network چگونه از زمان آغاز به کار خود تکامل یافته است تا تجربه کاربری را بهبود بخشد؟
answer: ویژگی‌هایی مانند اتصال، فاکتورهای ثابت Bolt12 و مدیریت بهتر نقدینگی را معرفی کرده است که معاملات را روان‌تر و قابل‌اعتمادتر می‌کند.
wrong_answers:
  - این تمام ویژگی‌های امنیتی را حذف کرده است تا تراکنش‌ها را سرعت بخشد.
  - اکنون برای هر پرداخت نیاز به تأیید دولت دارد.
  - این کار بر روی ویژگی‌های جدید متوقف شده و فقط به طراحی اصلی متکی است.
explanation: |
  با گذشت زمان، Lightning Network شاهد بهبودهای فنی بوده است که اصطکاک را برای کاربران کاهش می‌دهد. ویژگی‌های جدید و ابزارهای مدیریت نود بهتر به تجربه‌ای روان‌تر و کاربرپسندتر کمک کرده‌اند.
reviewed: false