question: چه روندی در میان شرکت‌کنندگانی که نودها را بر روی Lightning Network اجرا می‌کنند، مشاهده شده است؟
answer: اپراتورهای حرفه‌ای نود به طور فزاینده‌ای نقدینگی فراهم می‌کنند، در حالی که کاربران فردی بر روی نودهای "لبه" تمرکز می‌کنند و ترکیب شبکه را تغییر می‌دهند.
wrong_answers:
  - هواپیمایان فردی به طور کامل جایگزین تمامی اپراتورهای حرفه‌ای شده‌اند.
  - اکنون بانک‌های بزرگ به صورت مرکزی تمام نودهای لایتنینگ را اداره می‌کنند.
  - شبکه گره‌های شخصی را تعطیل کرده است تا فقط به شرکت‌های بزرگ اجازه دهد.
explanation: |
  حرکتی به سمت نقدینگی و ثبات بیشتر توسط نهادهای حرفه‌ای وجود دارد، در حالی که کاربران روزمره به راه‌حل‌های ساده یا میزبانی شده تکیه می‌کنند، که شبکه را قوی‌تر و در دسترس‌تر می‌سازد.
reviewed: false