question: بهبود کارایی و سرعت Lightning Network چگونه با روش‌های پرداخت سنتی مقایسه می‌شود؟
answer: این به طور قابل توجهی سریع‌تر است، اغلب تراکنش‌ها را در کمتر از یک ثانیه تسویه می‌کند، با کارمزدهای کمتر و بدون وابستگی به واسطه‌های متعدد.
wrong_answers:
  - این با زمان‌های سنتی بانکداری مطابقت دارد و اغلب ۲-۵ روز طول می‌کشد تا تسویه شود.
  - این کندتر از پرداخت‌های سنتی با کارت است و هزینه‌های بیشتری دارد.
  - این نیاز به چندین نهاد تأییدکننده دارد، درست مانند انتقالات بانکی فعلی.
explanation: |
  با فعال‌سازی تراکنش‌های off-chain و نهایی‌سازی پرداخت‌ها به‌صورت تقریباً فوری، لایتنینگ نسبت به روش‌های سنتی که به چندین واسطه متکی هستند، مزیت سرعت و کارایی ارائه می‌دهد.
reviewed: false