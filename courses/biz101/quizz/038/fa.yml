question: چرا نگهداری دقیق سوابق هنگام برخورد با Bitcoin در حسابداری یک شرکت ضروری است؟
answer: زیرا هر تراکنش Bitcoin ممکن است یک رویداد مشمول مالیات ایجاد کند و سوابق دقیق برای محاسبه سود، زیان و بدهی‌های مالیاتی مورد نیاز است.
wrong_answers:
  - زیرا Blockchain به‌طور خودکار مالیات‌ها را به نمایندگی از شرکت ثبت می‌کند.
  - زیرا هیچ استاندارد حسابداری به معاملات Bitcoin اعمال نمی‌شود.
  - زیرا پیگیری تراکنش‌های Bitcoin پس از ثبت غیرممکن است.
explanation: |
  هر خرید، فروش یا پرداختی که در Bitcoin انجام می‌شود می‌تواند پیامدهای مالیاتی داشته باشد. نگهداری سوابق دقیق از مبنای هزینه، قیمت فروش و زمان‌بندی، گزارش‌دهی مالیاتی صحیح و مطابق با قوانین را تضمین می‌کند.
reviewed: false