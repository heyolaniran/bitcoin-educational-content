question: تفاوت اصلی بین برخورد با Bitcoin به عنوان یک دارایی دیجیتال در مقابل برخورد با آن به عنوان یک ارز در حسابداری چیست؟
answer: به عنوان یک دارایی دیجیتال، باید مبنای هزینه و سود/زیان هر تراکنش پیگیری شود، در حالی که اگر مانند یک ارز با آن رفتار شود، ارزیابی مجدد ساده‌تر و کمتر خواهد بود.
wrong_answers:
  - هنگامی که به عنوان یک دارایی دیجیتال در نظر گرفته می‌شود، به طور کامل از تمام مالیات‌ها معاف است.
  - وقتی مانند یک ارز با آن رفتار می‌شود، نیازی به ثبت سوابق تراکنش‌ها نیست.
  - درمان آن مانند یک ارز نیاز به تغییر فوری به نرم‌افزار حسابداری جدید دارد.
explanation: |
  درمان دارایی‌های دیجیتال معمولاً شامل محاسبه سود یا زیان سرمایه در هر معامله است که پیچیدگی را افزایش می‌دهد. اگر Bitcoin مانند یک ارز حساب می‌شد، ساده‌تر بود؛ فقط ارزش فیات را به صورت دوره‌ای به‌روزرسانی کنید، همان‌طور که برای ارزهای دیگر انجام می‌شود.
reviewed: false