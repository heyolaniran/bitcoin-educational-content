question: Bitcoin को डिजिटल परिसंपत्ति के रूप में मानने और लेखांकन में इसे मुद्रा के रूप में मानने के बीच एक मुख्य अंतर क्या है?
answer: एक डिजिटल परिसंपत्ति के रूप में, प्रत्येक लेनदेन के लागत आधार और लाभ/हानि को ट्रैक किया जाना चाहिए, जबकि यदि इसे मुद्रा की तरह माना जाता, तो पुनर्मूल्यांकन सरल और कम बार होता।
wrong_answers:
  - जब इसे डिजिटल परिसंपत्ति के रूप में माना जाता है, तो यह सभी करों से पूरी तरह मुक्त होती है।
  - जब इसे मुद्रा की तरह व्यवहार किया जाता है, तो लेन-देन के रिकॉर्ड की आवश्यकता नहीं होती।
  - इसे मुद्रा की तरह व्यवहार करने के लिए तत्काल एक नए लेखांकन सॉफ्टवेयर पर स्विच करने की आवश्यकता है।
explanation: |
  डिजिटल एसेट ट्रीटमेंट में आमतौर पर प्रत्येक लेनदेन पर पूंजीगत लाभ या हानि की गणना करना शामिल होता है, जिससे जटिलता बढ़ जाती है। अगर Bitcoin को मुद्रा की तरह हिसाब में लिया जाता, तो यह आसान होता; बस समय-समय पर फ़िएट मूल्य को अपडेट करें, जैसा कि अन्य मुद्राओं के लिए किया जाता है।
reviewed: false