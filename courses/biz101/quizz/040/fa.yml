question: چرا ممکن است یک کسب‌وکار تصمیم بگیرد Bitcoin را به عنوان یک سرمایه‌گذاری بلندمدت در ترازنامه خود نگه دارد؟
answer: زیرا ممکن است به عنوان ذخیره ارزش عمل کند، به مرور زمان ارزش آن افزایش یابد و در برابر تورم محافظت کند.
wrong_answers:
  - زیرا حذف فوری تمام مالیات‌های مرتبط با ارز را تضمین می‌کند.
  - زیرا این امر توسط استانداردهای حسابداری بین‌المللی الزامی است.
  - زیرا Bitcoin ذاتاً سود تضمین‌شده بدون ریسک ارائه می‌دهد.
explanation: |
  برخی شرکت‌ها Bitcoin را به عنوان یک دارایی استراتژیک بلندمدت می‌بینند که می‌تواند ارزش خود را حفظ یا افزایش دهد، از کاهش ارزش ارزهای سنتی محافظت کند و خزانه‌داری آن‌ها را متنوع سازد.
reviewed: false