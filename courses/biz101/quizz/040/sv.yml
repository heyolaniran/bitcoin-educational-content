question: Varför kan ett företag välja att ha Bitcoin som en långsiktig investering i sin balansräkning?
answer: Eftersom de kan fungera som en värdebevarare, vilket innebär att de kan öka i värde över tiden och utgöra ett skydd mot inflation.
wrong_answers:
  - Eftersom den garanterar omedelbar eliminering av alla valutarelaterade skatter.
  - Eftersom det krävs enligt internationella redovisningsstandarder.
  - Eftersom Bitcoin i sig ger garanterade vinster utan risk.
explanation: |
  Vissa företag ser Bitcoin som en strategisk långsiktig tillgång som kan bevara eller öka i värde, vilket skyddar mot nedvärdering av traditionella valutor och diversifierar deras kassa.
