question: چرا توصیه می‌شود که یک خروجی CSV از تمام تراکنش‌های Bitcoin داشته باشید؟
answer: این یک سابقه واضح و ساختار یافته از هر تراکنش ارائه می‌دهد که ادغام آن‌ها را در گزارش‌های مالی و اظهارنامه‌های مالیاتی برای حسابداران آسان‌تر می‌کند.
wrong_answers:
  - زیرا رسیدهای کاغذی تنها اسناد حسابداری قانونی قابل قبول هستند.
  - زیرا صادر کردن داده‌ها به‌طور خودکار اظهارنامه مالیاتی شما را بدون بررسی تکمیل می‌کند.
  - زیرا فایل‌های CSV نیاز به پیگیری مبنای هزینه را از بین می‌برند.
explanation: |
  داشتن یک رکورد دیجیتال در یک فرمت مشترک امکان یکپارچه‌سازی بی‌وقفه با سیستم‌های حسابداری را فراهم می‌کند، به حفظ مسیرهای حسابرسی کمک می‌کند و از گزارش‌دهی دقیق مالیاتی و انطباقی پشتیبانی می‌کند.
reviewed: false