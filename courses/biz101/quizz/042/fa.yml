question: در اکثر حوزه‌های قضایی، چه چیزی یک رویداد مشمول مالیات را در هنگام برخورد با Bitcoin ایجاد می‌کند؟
answer: فروش، معامله یا استفاده از Bitcoin به عنوان پرداخت اغلب یک رویداد مشمول مالیات را ایجاد می‌کند.
wrong_answers:
  - به سادگی Bitcoin را به طور نامحدود بدون هیچ تراکنشی نگه دارید.
  - پشتیبان‌گیری از Bitcoin Wallet یا کلیدها.
  - مشاهده قیمت Bitcoin به صورت آنلاین.
explanation: |
  به طور معمول، یک رویداد مشمول مالیات زمانی رخ می‌دهد که یک کسب‌وکار Bitcoin خود را بفروشد یا استفاده کند، نه صرفاً با نگه‌داشتن آن. هر فروش یا Exchange از Bitcoin برای کالاها، خدمات یا ارز فیات می‌تواند generate سود یا زیان مشمول مالیات باشد.
reviewed: false