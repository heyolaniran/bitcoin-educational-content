question: अधिकांश न्यायक्षेत्रों में, Bitcoin से निपटने के दौरान कर योग्य घटना क्या होती है?
answer: Bitcoin को बेचना, व्यापार करना या भुगतान के रूप में उपयोग करना अक्सर कर योग्य घटना को जन्म देता है।
wrong_answers:
  - बिना किसी लेनदेन के Bitcoin को अनिश्चित काल तक धारण करना।
  - अपने Bitcoin Wallet या कुंजियों का बैकअप लेना।
  - Bitcoin की कीमत ऑनलाइन देखना।
explanation: |
  आम तौर पर, कर योग्य घटना तब होती है जब कोई व्यवसाय अपने Bitcoin का निपटान करता है या उसका उपयोग करता है, न कि केवल उसे धारण करके। माल, सेवाओं या फिएट मुद्रा के लिए Bitcoin की प्रत्येक बिक्री या Exchange generate कर योग्य लाभ या हानि हो सकती है।
reviewed: false