question: Bitcoin به شما چه اجازه‌ای می‌دهد که بدون واسطه انجام دهید؟
answer: ارزش Exchange در اینترنت
wrong_answers:
  - برنامه‌های متمرکز ایجاد کنید
  - دریافت وام بانکی
  - ذخیره داده‌های شخصی
explanation: |
  Bitcoin بدون واسطه از طریق پروتکل همتا به همتا، Exchange را در اینترنت ارزشمند می‌سازد.
reviewed: false