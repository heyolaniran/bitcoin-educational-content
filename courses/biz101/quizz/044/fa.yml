question: یکی از مزایای عمده برای بازرگانان استفاده از Lightning Network چیست؟
answer: کاهش هزینه‌های تراکنش
wrong_answers:
  - پرداخت‌های تضمین‌شده توسط بانک‌ها
  - افزایش خودکار فروش
  - حذف مالیات‌های تجاری
explanation: |
  هزینه‌های تراکنش در Lightning Network بسیار پایین است و آن را به یک راه‌حل مقرون‌به‌صرفه برای بازرگانان تبدیل می‌کند.
reviewed: false