question: مکتب اتریشی چگونه مفهوم "ترجیح زمانی" را تعریف می‌کند؟
answer: ترجیح مصرف در حال حاضر به جای بعداً
wrong_answers:
  - تمایل به کاهش هزینه‌های کوتاه‌مدت
  - بهینه‌سازی سرمایه‌گذاری‌های فوری
  - توانایی متعادل‌سازی Supply و تقاضا
explanation: |
  ترجیح زمانی به انتخاب مصرف فوری بر مزایای به تعویق افتاده اشاره دارد که بر تصمیمات مربوط به پس‌انداز و سرمایه‌گذاری تأثیر می‌گذارد.
