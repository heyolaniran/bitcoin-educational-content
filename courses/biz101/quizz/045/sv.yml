question: Hur definierar den österrikiska skolan begreppet "tidspreferens"?
answer: Företrädet för att konsumera nu snarare än senare
wrong_answers:
  - Önskan att minska de kortsiktiga kostnaderna
  - Optimering av omedelbara investeringar
  - Förmågan att balansera Supply och efterfrågan
explanation: |
  Tidspreferens innebär att man väljer omedelbar konsumtion framför uppskjuten nytta, vilket påverkar beslut om sparande och investeringar.  
reviewed: false