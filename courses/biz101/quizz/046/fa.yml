question: کارکرد اصلی ارز چیست؟
answer: عمل به عنوان یک واسطه که Exchange ارزش را ساده می‌کند
wrong_answers:
  - ذخیره ارزش ذاتی به صورت فیزیکی
  - برای جایگزینی کامل مبادله با کالا-برای-کالا مستقیم Exchange
  - برای متمرکز کردن تمام معاملات اقتصادی از طریق یک مرجع واحد
explanation: |
  ارز با خدمت به عنوان یک واسطه مشترک که شبکه پیچیده نرخ‌های Exchange مورد نیاز در یک سیستم مبادله کالا را کاهش می‌دهد، تجارت را ساده‌تر کرده و معاملات را آسان‌تر می‌کند.
reviewed: false