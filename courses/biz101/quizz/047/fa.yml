question: چرا کمیابی یک ویژگی اساسی برای یک ارز خوب است؟
answer: این ارزش را حفظ می‌کند
wrong_answers:
  - این تضمین می‌کند که تنها دارایی‌های فیزیکی می‌توانند به عنوان ارز استفاده شوند.
  - این اطمینان را می‌دهد که ارز به طور گسترده برای هر فرد در دسترس است.
  - این تضمین می‌کند که ارز همیشه باید توسط یک کالای مانند طلا پشتیبانی شود.
explanation: |
  کمیابی از ایجاد بیش از حد ارز جلوگیری می‌کند و بدین ترتیب ارزش و قدرت خرید آن را در طول زمان حفظ می‌کند.
reviewed: false