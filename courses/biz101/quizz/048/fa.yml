question: عملکرد اصلی سیستم‌های پرداخت سنتی چیست؟
answer: برای امکان‌پذیر ساختن انتقال وجوه بین دو طرف
wrong_answers:
  - ایجاد یک ارز جهانی واحد که توسط یک مرجع مرکزی تنظیم شود
  - برای تسهیل تجارت بین‌المللی
  - برای محدود کردن انتقال وجوه به مبادلات نقدی حضوری فقط
explanation: |
  سیستم‌های پرداخت سنتی مکانیزم‌ها و زیرساخت‌هایی را برای انتقال وجوه بین پرداخت‌کنندگان و دریافت‌کنندگان در زمینه‌های محلی و بین‌المللی فراهم می‌کنند.
reviewed: false