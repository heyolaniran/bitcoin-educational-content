question: مزیت کلیدی که پول کاغذی نسبت به سکه‌ها در سیستم‌های پرداخت سنتی دارد چیست؟
answer: افزایش قابلیت حمل و کارایی
wrong_answers:
  - ارزش ذاتی افزایش‌یافته از طریق فلزات گران‌بها
  - تأیید خودکار هر تراکنش
  - حذف کامل خطرات جعل
explanation: |
  اسکناس، به دلیل سبک بودن و حمل آسان‌تر نسبت به سکه‌ها، تجارت طولانی‌مدت را کارآمدتر کرده و چالش‌های لجستیکی را کاهش داد.
reviewed: false