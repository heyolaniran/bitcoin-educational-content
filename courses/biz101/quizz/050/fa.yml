question: تراکنش کارت اعتباری معمولاً چگونه با یک تراکنش نقدی ساده تفاوت دارد؟
answer: این شامل واسطه‌های متعدد است
wrong_answers:
  - این اتفاق به صورت فوری و بدون دخالت واسطه رخ می‌دهد.
  - این فقط به Exchange فیزیکی ارز نیاز دارد.
  - این الزام می‌کند که هر دو طرف کالاهای یکسان تولید کنند
explanation: |
  برخلاف پول نقد که بلافاصله مبادله می‌شود، تراکنش‌های کارت اعتباری از طریق مجموعه‌ای از مراحل شامل بانک‌ها، شبکه‌های کارت و فرآیندهای تسویه عبور می‌کنند که منجر به تأخیر و هزینه‌های اضافی می‌شود.
