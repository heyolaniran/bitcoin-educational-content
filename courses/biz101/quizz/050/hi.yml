question: क्रेडिट कार्ड लेनदेन सामान्यतः साधारण नकद लेनदेन से किस प्रकार भिन्न होता है?
answer: इसमें कई मध्यस्थ शामिल होते हैं
wrong_answers:
  - यह बिना किसी मध्यस्थ की भागीदारी के तुरन्त होता है
  - इसके लिए केवल मुद्रा के भौतिक Exchange की आवश्यकता होती है
  - यह अनिवार्य करता है कि दोनों पक्ष समान वस्तुओं का उत्पादन करें
explanation: |
  नकदी के विपरीत, जिसका तुरंत आदान-प्रदान हो जाता है, क्रेडिट कार्ड लेनदेन बैंकों, कार्ड नेटवर्क और समाशोधन प्रक्रियाओं से जुड़े कई चरणों से गुजरता है, जिसके परिणामस्वरूप देरी होती है और अतिरिक्त लागत आती है।
reviewed: false