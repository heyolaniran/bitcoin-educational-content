question: چه نوع کسب‌وکاری به احتمال زیاد یک فایل csv ساده را برای حسابداری کافی می‌داند؟
answer: کسب‌وکارهای کوچک
wrong_answers:
  - شرکت‌های چندملیتی بزرگ
  - مؤسسات مالی بزرگ
  - پلتفرم‌های معاملات فرکانس بالا
explanation: |
  بیشتر کسب‌وکارهای کوچک از سادگی و جزئیات کافی ارائه‌شده توسط یک خروجی csv بهره‌مند می‌شوند.
reviewed: false