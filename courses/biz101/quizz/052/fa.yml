question: کدام جزئیات به‌طور صریح در یک فایل csv تراکنش Bitcoin معمولی همان‌طور که در دوره توضیح داده شده است، مستند نشده است؟
answer: نوع اسکریپت استفاده شده
wrong_answers:
  - تاریخ تراکنش
  - ارزش معادل فیات
  - Bitcoin آدرس‌های درگیر را بررسی می‌کند
explanation: |
  فایل csv تراکنش معمولی Bitcoin معمولاً تاریخ، مقدار، معادل فیات و آدرس‌های Bitcoin را ذکر می‌کند، اما نوع اسکریپت استفاده شده را ذکر نمی‌کند.
reviewed: false