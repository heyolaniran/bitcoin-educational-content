question: جزئیات کلیدی پرداخت که باید برای هر تراکنش Bitcoin مستند شوند چیست؟
answer: تاریخ، مقدار، ارزش معادل فیات، و آدرس‌های مرتبط
wrong_answers:
  - transaction ID، هزینه شبکه، و Address تاجر
  - تاریخ، نرخ Exchange، نوع Wallet، و موقعیت جغرافیایی
  - شماره بلوک Bitcoin، Timestamp، و اسکریپت استفاده شده
explanation: |
  مستندسازی این جزئیات وضوح را تضمین می‌کند و به حسابداران در تفکیک جریان‌های ورودی و خروجی کمک می‌کند.
reviewed: false