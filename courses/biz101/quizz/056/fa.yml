question: یک Wallet غیر حضانتی چگونه از نظر عملکرد برای کاربران Starter متفاوت است؟
answer: این به صاحب کسب‌وکار کنترل کامل کلیدهای خصوصی را می‌دهد
wrong_answers:
  - می‌تواند به‌طور خودکار بیت‌کوین‌ها را به ارز فیات تبدیل کند
  - این نیاز به هیچ‌گونه رویه‌های پشتیبان‌گیری یا اقدامات امنیتی ندارد
  - این تمام تراکنش‌ها را از طریق یک سرویس شخص ثالث مدیریت می‌کند.
explanation: |
  کیف پول‌های غیر حضانتی کنترل کلیدهای خصوصی و تراکنش‌ها را به‌طور کامل در دست کاربر قرار می‌دهند.
reviewed: false