question: یکی از مزایای استفاده از Wallet حضانتی برای پروفایل Starter چیست؟
answer: کاهش مسئولیت‌های فنی
wrong_answers:
  - کنترل بیشتر بر کلیدهای خصوصی
  - حریم خصوصی بهبود یافته با خودمختاری کامل در تراکنش‌ها
  - حذف هزینه‌های تراکنش
explanation: |
  کیف‌پول‌های حضانتی کلیدهای خصوصی را مدیریت می‌کنند و بار فنی را برای کاربران کاهش می‌دهند.
reviewed: false