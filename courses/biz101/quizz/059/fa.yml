question: کدام دو نوع Wallet در پروفایل Starter در نظر گرفته شده‌اند؟
answer: کیف‌پول‌های لایتنینگ حضانتی و غیرحضانتی
wrong_answers:
  - کیف پول‌های ذخیره‌سازی Hot و Cold Bitcoin
  - کیف پول‌های Multisig و کاغذی Bitcoin
  - کیف‌پول‌های لایتنینگ سخت‌افزاری و مغزی
explanation: |
  پروفایل Starter از کیف‌پول‌های لایتنینگ حضانتی یا غیرحضانتی استفاده می‌کند.
reviewed: false