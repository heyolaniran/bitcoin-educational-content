question: پروفایل Essential از چه چیزی برای کمک به کارکنان در پردازش پرداخت‌ها در نقطه فروش (PoS) استفاده می‌کند؟
answer: ایجاد یک منو با قیمت آیتم‌ها در برنامه PoS
wrong_answers:
  - یک کتابچه راهنمای Ledger برای ثبت فروش
  - یک سیستم Invoice کاغذی برای هر تراکنش
  - یک سیستم ثبت حسابداری خودکار برای تراکنش‌ها از PoS
explanation: |
  برنامه PoS در پروفایل Essential به کارکنان امکان می‌دهد تا اقلام را از یک منوی از پیش تعیین‌شده انتخاب کنند و فرآیند صدور صورت‌حساب را ساده‌تر می‌کند.
reviewed: false