question: کدام سناریو به بهترین وجه استفاده از پروفایل Essential برای پرداخت‌های Bitcoin را نشان می‌دهد؟
answer: رستورانی که چند پرداخت Bitcoin در ماه می‌پذیرد
wrong_answers:
  - یک شرکت چندملیتی که روزانه هزاران تراکنش را پردازش می‌کند
  - یک فریلنسر مستقل که پرداخت فاکتورهای خود را به بیت‌کوین می‌پذیرد
  - یک میز معاملاتی Bitcoin با فرکانس بالا
explanation: |
  پروفایل ضروری کسب‌وکارهای کوچک تا متوسط با تعداد کمی از تراکنش‌های Bitcoin، مانند یک رستوران، را هدف قرار می‌دهد.
reviewed: false