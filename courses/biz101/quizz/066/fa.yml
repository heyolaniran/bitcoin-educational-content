question: کدام راه‌حل جایگزین برای کسب‌وکارهایی که محیط خرده‌فروشی آنلاین همه‌کاره را ترجیح می‌دهند، ذکر شده است؟
answer: بی-باپ
wrong_answers:
  - ققنوس
  - گره باز
  - سوئیس Bitcoin پرداخت
explanation: |
  Be-BOP به عنوان گزینه‌ای برای کسانی که خواهان یک فروشگاه آنلاین یکپارچه هستند که پرداخت‌های Bitcoin را تسهیل می‌کند، ارائه می‌شود.
reviewed: false