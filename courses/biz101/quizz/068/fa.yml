question: چگونه می‌توان BTC Pay Server را در یک محیط حرفه‌ای مستقر کرد؟
answer: در محل یا از طریق میزبانی ابری
wrong_answers:
  - به‌طور انحصاری بر روی دستگاه‌های سخت‌افزاری اختصاصی
  - از طریق یک سرویس کاملاً برون‌سپاری شده توسط شخص ثالث
  - به عنوان یک برنامه موبایل
explanation: |
  انعطاف‌پذیری استقرار BTC Pay Server در محل یا در ابر به کسب‌وکارها این امکان را می‌دهد تا تنظیماتی را انتخاب کنند که بهترین تطابق را با نیازهای عملیاتی آن‌ها داشته باشد.
reviewed: false