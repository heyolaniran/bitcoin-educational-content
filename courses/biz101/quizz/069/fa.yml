question: کدام نرم‌افزار متن‌باز به سیستم پرداخت حرفه‌ای Bitcoin تطبیق داده شده است؟
answer: سرور BTC Pay
wrong_answers:
  - سوئیس Bitcoin Pay
  - گره باز
  - بیت‌کوینایز PoS
explanation: |
  سرور BTC Pay در این دوره به عنوان راه‌حل اصلی متن‌باز برای تنظیمات حرفه‌ای به دلیل گزینه‌های گسترده یکپارچه‌سازی و کنترل آن برجسته شده است.
reviewed: false