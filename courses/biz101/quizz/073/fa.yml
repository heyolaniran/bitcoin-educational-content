question: چه چیزی امکان همگام‌سازی داده‌ها به صورت لحظه‌ای بین سیستم‌های Enterprise Bitcoin و نرم‌افزار ERP را فراهم می‌کند؟
answer: رابط‌های برنامه‌نویسی کاربردی (APIs)
wrong_answers:
  - فایل‌های CSV
  - بارگذاری دسته‌ای
  - گزارش‌های ایمیل
explanation: |
  APIها امکان یکپارچه‌سازی پیوسته و بلادرنگ را فراهم می‌کنند.
reviewed: false