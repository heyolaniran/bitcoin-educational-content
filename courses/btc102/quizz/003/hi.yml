question: क्रिप्टोकरेंसी स्पेस में पंप और डंप क्या है?
answer: चरम पर बेचने के लिए अभियान के माध्यम से किसी परिसंपत्ति में हेरफेर करना
wrong_answers:
  - किसी परिसंपत्ति को बेचे बिना उसकी कीमत को सहारा देने के लिए बड़े पैमाने पर उसे खरीदना
  - विरोधी ट्रेडों के माध्यम से दीर्घावधि में बाजार को स्थिर करना
  - परिसंपत्ति में दीर्घकालिक निवेश प्राप्त करने के लिए आवर्ती खरीदारी करना
explanation: |
  इस धोखाधड़ी तकनीक में महत्वपूर्ण क्षण पर बेचने के लिए कीमत को कृत्रिम रूप से बढ़ा दिया जाता है, जिससे मूल्य में भारी गिरावट आ जाती है।
