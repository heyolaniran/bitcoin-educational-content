question: Pump and Dump bao gồm những gì trong lĩnh vực tiền điện tử?
answer: Thao túng tài sản thông qua chiến dịch bán ở mức cao nhất
wrong_answers:
  - Mua một lượng lớn tài sản để hỗ trợ giá của nó mà không bao giờ bán
  - Ổn định thị trường trong dài hạn thông qua các giao dịch đối lập
  - Thực hiện các giao dịch mua định kỳ để có được sự tiếp xúc lâu dài với tài sản
explanation: |
  Kỹ thuật gian lận này liên quan đến việc tăng giá một cách giả tạo để bán vào thời điểm quan trọng và khiến giá trị sụp đổ.
