question: डेटा बैकअप के संदर्भ में 3-2-1 नियम का क्या अर्थ है?
answer: 2 अलग-अलग मीडिया पर 3 प्रतियां, जिनमें से 1 ऑफ-साइट संग्रहीत है
wrong_answers:
  - 2 ऑनलाइन मीडिया और 1 भौतिक डिवाइस पर 3 प्रतियां
  - 3 मीडिया, 2 प्रतियों सहित, जिनमें से एक ऑफ-साइट है
  - 3 प्रतियां, जिनमें से 2 एन्क्रिप्टेड हैं और 1 ऑफ-साइट संग्रहीत है
explanation: |
  यह नियम 2 विभिन्न प्रकार के मीडिया पर डेटा की 3 प्रतियां रखने की अनुशंसा करता है, जिसमें से 1 प्रति को अधिक लचीलेपन के लिए ऑफ-साइट संग्रहीत किया जाता है।
reviewed: false