question: Varför rekommenderas det att vara diskret om dina Bitcoin-innehav?
answer: För att undvika att dra till sig brottslingars och myndigheters uppmärksamhet
wrong_answers:
  - För att dra nytta av bättre Exchange-priser i vissa länder
  - För att undvika att dra till sig uppmärksamhet från entreprenörer som söker finansiering
  - Förbättra upplåningskapaciteten
explanation: |
  Diskretion skyddar mot risken att bli måltavla för bedragare, svartsjuka personer eller tjuvar.
