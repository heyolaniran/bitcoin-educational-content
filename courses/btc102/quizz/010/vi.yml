question: Tại sao bạn nên giữ bí mật về khoản nắm giữ Bitcoin của mình?
answer: Để tránh thu hút sự chú ý của tội phạm và chính phủ
wrong_answers:
  - Để được hưởng mức giá Exchange tốt hơn ở một số quốc gia nhất định
  - Để tránh thu hút sự chú ý của các doanh nhân đang tìm kiếm nguồn tài trợ
  - Để nâng cao năng lực vay vốn
explanation: |
  Sự thận trọng sẽ bảo vệ bạn khỏi nguy cơ bị kẻ lừa đảo, kẻ đố kỵ hoặc kẻ trộm nhắm tới.
