question: Varför ska man bara investera det man har råd att förlora?
answer: För att bevara din ekonomiska trygghet i händelse av förlust
wrong_answers:
  - För att snabbt maximera vinsten i en nedåtgående marknad
  - Att massivt diversifiera dina investeringar
  - Att låna för att kunna investera mer
explanation: |
  Om du investerar över dina tillgångar (dvs. över din sparkapacitet) utsätter du dig för alltför höga finansiella risker.
