question: Vilka kan effekterna bli av en orkestrerad devalvering av nationella valutor?
answer: Social instabilitet och framväxten av politisk extremism
wrong_answers:
  - Ekonomisk tillväxt och nationellt välstånd
  - Förbättring av den internationella handeln
  - Stärka demokratin och individens naturliga rättigheter
explanation: |
  En devalvering kan utlösa en ekonomisk kris genom inflation, vilket kan ge bränsle åt socialt missnöje och ökad politisk extremism.
reviewed: false