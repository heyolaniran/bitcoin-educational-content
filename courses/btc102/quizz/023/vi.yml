question: Lợi thế chính của Bitcoin khi đối mặt với khủng hoảng tiền tệ là gì?
answer: Bảo toàn tiền tiết kiệm chống lại lạm phát
wrong_answers:
  - Tăng lãi suất
  - Đảm bảo lợi nhuận cố định
  - Cung cấp bảo hiểm ngân hàng
explanation: |
  Bitcoin cung cấp khả năng bảo vệ chống lại sự mất giá tiền tệ nhờ chính sách phát hành có thể dự đoán được.
