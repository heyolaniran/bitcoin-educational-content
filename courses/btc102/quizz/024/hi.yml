question: बराक ओबामा ने Bitcoin का वर्णन कैसे किया?
answer: आपकी जेब में एक स्विस बैंक
wrong_answers:
  - डिजिटल सोना
  - एक अत्यधिक सट्टा परिसंपत्ति
  - एक विकेन्द्रीकृत मुद्रा
explanation: |
  बराक ओबामा ने एक बार Bitcoin को "आपकी जेब में एक स्विस बैंक" कहा था। वास्तव में, Bitcoin सभी को समान अवसर प्रदान करता है, चाहे उनकी स्थिति कुछ भी हो, और Confidential Transactions के लिए भी यही अवसर है।
