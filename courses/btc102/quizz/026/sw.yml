question: Watumiaji wanapaswa kujihifadhi nini ili kumiliki bitcoins zao kikweli?
answer: Funguo za kibinafsi
wrong_answers:
  - Inapokea anwani
  - Nenosiri za Exchange za jukwaa
  - Vitalu vya Blockchain
explanation: |
  Bila kushikilia funguo zako za kibinafsi, humiliki bitcoins zako.
