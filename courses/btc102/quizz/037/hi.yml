question: अपने बिटकॉइन की सुरक्षा सुनिश्चित करने के लिए किन चीजों से बचना चाहिए?
answer: अपने बिटकॉइन को Exchange प्लेटफॉर्म पर रखना
wrong_answers:
  - ओपन-सोर्स Hardware Wallet का उपयोग करना
  - दैनिक लेनदेन के लिए Hot Wallet का उपयोग करना
  - भंडारण विधियों में विविधता लाना
explanation: |
  "आपकी चाबियाँ नहीं, आपके बिटकॉइन नहीं" सिद्धांत आपकी निजी चाबियाँ रखने के महत्व को उजागर करता है। Exchange प्लेटफ़ॉर्म पर, आपके बिटकॉइन अनावश्यक जोखिमों के संपर्क में आते हैं।
reviewed: false