question: हाइब्रिड होल्डर द्वारा कौन सी अधिग्रहण रणनीति अपनाई जा सकती है?
answer: डॉलर-लागत औसत
wrong_answers:
  - एल्गोरिदमिक ट्रेडिंग
  - पंचायत
  - हैकिंग
explanation: |
  डॉलर-कॉस्ट एवरेजिंग समय के साथ औसत खरीद मूल्य को सुचारू करने के लिए नियमित Bitcoin खरीद की अनुमति देता है। होडलर इसे कभी-कभार एकमुश्त खरीद के साथ जोड़ सकता है।
reviewed: false