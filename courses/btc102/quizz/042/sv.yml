question: Vilken psykologisk egenskap är viktig för en hodler?
answer: Emotionell motståndskraft
wrong_answers:
  - Emotionell impulsivitet
  - Emotionell aggressivitet
  - Känslomässig spekulation
explanation: |
  Emotionell motståndskraft gör att man kan stå ut med marknadsfluktuationer utan att drabbas av panik.
reviewed: false