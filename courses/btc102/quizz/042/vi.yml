question: Phẩm chất tâm lý nào là cần thiết đối với người nắm giữ tài sản?
answer: Khả năng phục hồi cảm xúc
wrong_answers:
  - Sự bốc đồng về mặt cảm xúc
  - Sự hung hăng về mặt cảm xúc
  - Suy đoán cảm xúc
explanation: |
  Khả năng phục hồi cảm xúc cho phép một người chịu đựng được những biến động của thị trường mà không hoảng sợ.
reviewed: false