question: होडलर शब्द की उत्पत्ति क्या है?
answer: होल्ड की गलत वर्तनी
wrong_answers:
  - होल्ड के लिए एक संक्षिप्त नाम
  - Hot का संक्षिप्त रूप Wallet
  - HODL श्रृंखला का संकुचन
explanation: |
  शब्द "होडलर" Bitcoin टॉक में एक टाइपिंग त्रुटि से आया है, जहां दीर्घकालिक होल्डिंग को व्यक्त करने के लिए "होल्ड" को "HODL" के रूप में गलत लिखा गया था।
