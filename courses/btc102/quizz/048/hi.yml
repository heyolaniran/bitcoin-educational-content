question: स्टेकर द्वारा मुख्यतः कौन सी निवेश रणनीति अपनाई जाती है?
answer: डॉलर-लागत औसत
wrong_answers:
  - दिन व्यापार
  - पंचायत
  - एकमुश्त
explanation: |
  डीसीए में किसी व्यक्ति के पोर्टफोलियो पर बाजार की अस्थिरता के प्रभाव को कम करने के लिए नियमित रूप से एक निश्चित राशि का निवेश करना शामिल है।
reviewed: false