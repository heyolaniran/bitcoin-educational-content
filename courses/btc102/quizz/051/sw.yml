question: Ni njia gani hukuruhusu kumaliza bitcoins zilizotumiwa wakati wa kuhifadhi akiba yako?
answer: Tumia na Ubadilishe
wrong_answers:
  - HODLing na Badilisha
  - Kutumia na HODLing
  - Biashara na Matumizi
explanation: |
  Mbinu ya Tumia na Badilisha inahusisha kutumia bitcoins na kisha kununua tena kiasi sawa ili kudumisha umiliki wako.
reviewed: false