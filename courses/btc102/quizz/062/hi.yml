question: अपने बिटकॉइन तक पहुंच प्रदान करते समय क्या अनुशंसित नहीं है?
answer: एक व्यक्ति को Mnemonic वाक्यांश देना
wrong_answers:
  - सूचना को कई लोगों के बीच विभाजित करना
  - सीलबंद अपारदर्शी लिफाफों का उपयोग करना
  - स्पष्टीकरण पत्र लिखना
explanation: |
  अतिरिक्त सुरक्षा के बिना किसी एक व्यक्ति को Mnemonic वाक्यांश सौंपने से आपके जीवनकाल में चोरी का जोखिम बहुत अधिक बढ़ जाता है।
