question: Šta je UTXO na Bitcoin-u?
answer: Deo bitcoina koji još nije potrošen.
wrong_answers:
  - Bitcoin adresa za primanje sredstava
  - Poseban tip Bitcoin novčanika.
  - Algoritam za Bitcoin šifrovanje.
explanation: |
  UTXO je neutrošeni izlaz transakcije, tako da je u suštini „deo bitcoina“.
