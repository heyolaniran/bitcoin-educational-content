question: यदि किसी लेनदेन में इनपुट के रूप में 5,000 Sats के 2 UTXO और आउटपुट के रूप में 3,000 Sats के 3 UTXO हैं, तो लेनदेन शुल्क क्या है?
answer: 1,000 गीगावाट-1
wrong_answers:
  - 1,500 गीगावाट-2
  - 2,500 गीगावाट-3
  - 3,000 गीगावाट-4
explanation: |
  किसी लेनदेन की फीस कुल इनपुट और कुल आउटपुट के बीच के अंतर को दर्शाती है। यह वह राशि है जो सभी इनपुट का उपभोग करने और सभी आउटपुट बनाने के बाद बचती है। इसलिए गणना इस प्रकार है; फीस = (5000x2) - (3000x3) = 10000 - 9000 = 1000।
