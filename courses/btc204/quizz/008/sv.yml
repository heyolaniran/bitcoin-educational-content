question: Om en transaktion har 2 UTXO:er på 5 000 Sats som inputs och 3 UTXO:er på 3 000 Sats som outputs, vad är då transaktionsavgifterna?
answer: 1 000 Sats
wrong_answers:
  - 1.500 Sats
  - 2.500 Sats
  - 3.000 Sats
explanation: |
  Avgifterna för en transaktion utgör skillnaden mellan de totala inmatningarna och de totala utmatningarna. Det är vad som återstår efter att alla inputs har förbrukats och alla outputs har skapats. Beräkningen är därför; avgifter = (5000x2) - (3000x3) = 10000 - 9000 = 1000.
reviewed: false