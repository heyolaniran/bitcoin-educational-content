question: वे 2 Elements क्या हैं जो Coinbase Transaction में Block reward बनाते हैं?
answer: ब्लॉक सब्सिडी और लेनदेन शुल्क।
wrong_answers:
  - ब्लॉक सब्सिडी और स्पीड बोनस।
  - उत्सर्जन अधिकार और सुरक्षा प्रीमियम।
  - जीडब्ल्यू-3 लाभांश और नेटवर्क कर।
explanation: |
  जब Miner को कोई वैध ब्लॉक मिल जाता है, तो वे एक ओर ब्लॉक सब्सिडी और दूसरी ओर उनके ब्लॉक में शामिल लेनदेन की फीस से मिलकर बने पुरस्कार के हकदार होते हैं।
