question: Bitcoin श्वेत पत्र में Satoshi नाकामोटो द्वारा उल्लिखित श्रृंखला विश्लेषण अनुमान क्या हैं? (केवल एक उत्तर संभव है)
answer: CIOH और Address का पुनः उपयोग.
wrong_answers:
  - हस्ताक्षर और समय सहसंबंध द्वारा क्लस्टरिंग।
  - गोल संख्या भुगतान और बड़े उत्पादन.
  - वॉल्यूम विश्लेषण और स्क्रिप्ट समानताएं.
explanation: |
  Bitcoin श्वेत पत्र के भाग 10 में, Satoshi नाकामोटो ने उपयोगकर्ताओं को CIOH (कॉमन इनपुट Ownership ह्यूरिस्टिक) और एक ही जोड़ी कुंजियों के पुनः उपयोग के बारे में चेतावनी दी है।
reviewed: false