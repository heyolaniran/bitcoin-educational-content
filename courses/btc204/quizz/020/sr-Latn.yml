question: Kada tražimo obrazac, koji deo transakcije ćemo proučavati?
answer: Njenu strukturu
wrong_answers:
  - Njene metapodatke
  - Njene skripte
  - Njen potpis
explanation: |
  Obrazac transakcije je jednostavno model ili ukupna struktura tipične transakcije koja se može pronaći na Blockchain-u, čije je verovatno tumačenje poznato.
