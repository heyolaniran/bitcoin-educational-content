question: Ako se u jednostavnoj transakciji plaćanja ista adresa koristi u ulazu i na jednom od 2 izlaza, koji izlaz verovatno predstavlja kusur?
answer: Onaj sa istom adresom kao ulaz.
wrong_answers:
  - Onaj sa najnovijom adresom.
  - Onaj sa drugačijom adresom od ulaza.
  - Onaj sa nepoznatom adresom.
explanation: |
  Ako se adresa ponovo koristi unutar iste transakcije, razumno je pretpostaviti da korisnik i dalje poseduje povezani UTXO. Stoga, izlaz sa istom adresom kao ulaz verovatno predstavlja kusur.
