question: एक साधारण भुगतान लेनदेन में, जहां 500,000 Sats का इनपुट है, जिसे 47,500 Sats के एक आउटपुट तथा 451,000 Sats के दूसरे आउटपुट में विभाजित किया गया है, तो कौन सा UTXO परिवर्तन होने की संभावना है?
answer: 451,000 गीगावाट-2 में से एक।
wrong_answers:
  - 500,000 गीगावाट-3 में से एक।
  - 47,500 गीगावाट-4 में से एक।
  - इनमें से कोई भी नहीं।
explanation: |
  जब किसी सरल भुगतान मॉडल पर किसी लेनदेन में दो आउटपुट के बीच पर्याप्त बड़ा अंतर होता है, तो यह अनुमान लगाया जा सकता है कि बड़ा आउटपुट ही परिवर्तन की संभावना है।
reviewed: false