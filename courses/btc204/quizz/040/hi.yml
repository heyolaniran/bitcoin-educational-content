question: P2P एक्सचेंजों के माध्यम से खरीदे गए बिटकॉइन अक्सर विनियमित प्लेटफार्मों पर खरीदे गए बिटकॉइन की तुलना में अधिक महंगे क्यों होते हैं?
answer: अतिरिक्त जोखिम, लेनदेन शुल्क, और गोपनीयता के लिए प्रीमियम।
wrong_answers:
  - बाजार में अस्थिरता, दोहरे खर्च का जोखिम और कानूनी अनुपालन।
  - पंजीकरण शुल्क, सीमित विकल्प, और लंबा सत्यापन समय।
  - पंजीकरण शुल्क, सख्त नियम और कम सुरक्षा।
explanation: |
  P2P प्लैटफ़ॉर्म पर बेचे जाने वाले बिटकॉइन आम तौर पर विनियमित प्लैटफ़ॉर्म से ज़्यादा महंगे होते हैं। यह मार्कअप कई कारकों के कारण होता है: विक्रेता ज़्यादा जोखिम उठाता है, उन्हें अतिरिक्त लागत भी उठानी पड़ती है, और Exchange खरीदार को ज़्यादा गोपनीयता प्रदान करता है।
