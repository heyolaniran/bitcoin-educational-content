question: बीआईपी47 का मुख्य लक्ष्य क्या है?
answer: पतों का पुनः उपयोग किए बिना BTC प्राप्त करने के लिए एक अद्वितीय पहचानकर्ता होना।
wrong_answers:
  - तीव्र लेनदेन के लिए ब्लॉक का आकार बढ़ाएँ।
  - Bitcoin नेटवर्क पर शुल्क रहित लेनदेन की अनुमति दें।
  - Bitcoin पर लेनदेन को पूरी तरह गुमनाम बनाएं।
explanation: |
  BIP47 का लक्ष्य एक अद्वितीय पहचानकर्ता प्रदान करना है जो कई बार और कई लोगों से बिटकॉइन प्राप्त करने की अनुमति देता है, लेकिन पते का पुन: उपयोग किए बिना, क्योंकि यह उपयोगकर्ता की गोपनीयता के लिए बहुत बुरा अभ्यास है।
