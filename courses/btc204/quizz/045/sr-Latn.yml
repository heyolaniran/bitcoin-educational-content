question: Koji je glavni cilj BIP47?
answer: Postojanje jedinstvenog identifikatora za primanje BTC-a bez ponovnog korišćenja adresa.
wrong_answers:
  - Povećanje veličine blokova za brže transakcije.
  - Transakcije bez naknada na Bitcoin mreži.
  - Potpuno anonimnimne transakcije na Bitcoin-u.
explanation: |
  Cilj BIP47 je da obezbedi jedinstveni identifikator koji omogućava primanje bitkoina više puta i od više osoba, ali bez ponovnog korišćenja adresa, jer je ovo veoma loša praksa za privatnost korisnika.
