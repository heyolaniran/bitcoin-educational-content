question: कौन सी क्रिप्टोग्राफिक कुंजी Exchange एल्गोरिथ्म BIP47 के संचालन के केंद्र में है?
answer: ईसीडीएच
wrong_answers:
  - आरएसए
  - एलगामल
  - Diffie-Hellman
explanation: |
  इस्तेमाल किया जाने वाला एल्गोरिथ्म ECDH (एलिप्टिक कर्व डिफी-हेलमैन) है। यह क्लासिक डिफी-हेलमैन एल्गोरिथ्म का एक प्रकार है जो एलिप्टिक कर्व्स का उपयोग करता है।
reviewed: false