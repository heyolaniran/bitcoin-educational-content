question: BIP47 में अधिसूचना लेनदेन की क्या भूमिका है?
answer: प्राप्तकर्ता को भुगतान कोड प्रेषित करना तथा यह संकेत देना कि भुगतान आ रहा है।
wrong_answers:
  - भुगतान कोड के माध्यम से भविष्य के लेनदेन के लिए Bitcoin प्राप्त करने वाले Address को मान्य करें।
  - BIP47 के साथ प्राप्तकर्ता द्वारा बिटकॉइन की प्राप्ति की पुष्टि करें।
  - प्रेषक की अस्थायी निजी कुंजी प्राप्तकर्ता को भेजें ताकि वे बिटकॉइन खर्च कर सकें।
explanation: |
  अधिसूचना लेनदेन प्रेषक से प्राप्तकर्ता तक भुगतान कोड के प्रसारण की अनुमति देता है, ताकि बाद में प्राप्तकर्ता इसे जान सके और Wallet रिकवरी के मामले में इसे बाद में केवल अपने seed से ही पा सके। जैसा कि इसके नाम से पता चलता है, यह एक अधिसूचना भूमिका भी निभाता है।
