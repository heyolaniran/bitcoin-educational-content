question: Bitcoin लेनदेन में OP_RETURN क्या है?
answer: एक ऑपकोड जो आउटपुट को अमान्य के रूप में चिह्नित करता है और डेटा भंडारण की अनुमति देता है।
wrong_answers:
  - एक ऑपकोड जो Bitcoin लेनदेन में हस्ताक्षर की वैधता को सत्यापित करता है।
  - एक ऑपकोड जिसमें IPFS पर संग्रहीत फ़ाइल का हाइपरलिंक होता है।
  - एक आदेश जो Bitcoin Blockchain से लेनदेन को हटाता है।
explanation: |
  OP_RETURN एक ऑपकोड है जो एक अमान्य स्क्रिप्ट को संकेत देता है, जिससे इसमें मौजूद आउटपुट को साबित रूप से खर्च न करने योग्य माना जाता है। इस प्रकार, नेटवर्क नोड्स अपने UTXO सेट से इस आउटपुट को हटा सकते हैं। OP_RETURN का उपयोग अक्सर Blockchain में मनमाना डेटा रिकॉर्ड करने के लिए किया जाता है।
