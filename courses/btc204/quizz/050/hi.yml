question: BIP47 की तुलना में साइलेंट पेमेंट्स का मुख्य लाभ क्या है?
answer: उन्हें अधिसूचना लेनदेन की आवश्यकता नहीं होती।
wrong_answers:
  - वे पूर्ण लेनदेन गोपनीयता प्रदान करते हैं।
  - वे प्राप्तकर्ता से धन वापसी की अनुमति देते हैं।
  - वे सभी वॉलेट्स के साथ संगतता सुनिश्चित करते हैं।
explanation: |
  साइलेंट पेमेंट्स बिना किसी अधिसूचना लेनदेन के संचालित होते हैं, जिससे लेनदेन शुल्क की बचत होती है और Blockchain पर अधिक भार नहीं पड़ता है।
