question: Koja je glavna prednost tihih plaćanja (eng. Silent Payments) u poređenju sa BIP47?
answer: Oni ne zahtevaju transakciju obaveštenja.
wrong_answers:
  - Oni nude potpunu privatnost transakcija.
  - Oni omogućavaju povraćaj novca od primaoca.
  - Oni osiguravaju kompatibilnost sa svim novčanicima.
explanation: |
  Tiha plaćanja funkcionišu bez transakcije obaveštenja, što štedi na troškovima transakcije i izbegava preopterećenje Blockchain-a.
reviewed: false
