question: बीआईपी47 की तुलना में साइलेंट पेमेंट्स का नुकसान क्या है?
answer: रिसीवर को लगभग संपूर्ण Blockchain को स्कैन करना होगा।
wrong_answers:
  - वे प्रेषक के लिए generate उच्च लेनदेन शुल्क लगाते हैं।
  - वे संभावित लेनदेन की संख्या को सीमित करते हैं।
  - वे कम गुमनाम हैं।
explanation: |
  अधिसूचना लेनदेन को छोड़ने के लिए Exchange में, प्राप्तकर्ता को उन सभी Bitcoin लेनदेन को स्कैन करना होगा जो मानक का अनुपालन करते हैं ताकि उन्हें संबोधित भुगतानों को खोजने का प्रयास किया जा सके।
reviewed: false