question: साइलेंट पेमेंट्स द्वारा विशेष रूप से किस प्रकार की स्क्रिप्ट का उपयोग किया जाता है?
answer: जीडब्ल्यू-0
wrong_answers:
  - जीडब्ल्यू-1
  - पी2एसपी
  - पी2डब्लूएसएच
explanation: |
  इस प्रोटोकॉल के कार्यान्वयन को सुविधाजनक बनाने और अपने उपयोगकर्ताओं की गुमनामी को बेहतर बनाने के लिए, साइलेंट पेमेंट्स विशेष रूप से P2TR (Taproot को भुगतान) स्क्रिप्ट पर निर्भर करता है।
reviewed: false