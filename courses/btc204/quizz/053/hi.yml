question: मौन भुगतान में लेबल का उद्देश्य क्या है?
answer: स्कैनिंग कार्यभार को अनुचित रूप से बढ़ाए बिना एकाधिक विभिन्न स्थैतिक पतों का उपयोग करना।
wrong_answers:
  - लेनदेन के वास्तविक प्राप्तकर्ता को छिपाने के लिए साइलेंट भुगतान लेनदेन को एन्क्रिप्ट करना।
  - एकाधिक विभिन्न स्थैतिक पतों का उपयोग करना जिन्हें किसी बाह्य पर्यवेक्षक द्वारा लिंक नहीं किया जा सकता।
  - भुगतान संदर्भ के रूप में मौन भुगतानों की पहचान करने के लिए Blockchain पर एक दृश्य लेबल लगाना।
explanation: |
  लेबल का उपयोग मुख्य स्थिर Address से कई स्थिर पतों को generate करने के लिए किया जाता है, जो Wallet संगठन को सुविधाजनक बनाता है। हालाँकि, एक बाहरी पर्यवेक्षक आसानी से इन लेबल वाले स्थिर पतों के बीच एक लिंक स्थापित कर सकता है, क्योंकि स्कैन सार्वजनिक कुंजी सभी के लिए समान है।
