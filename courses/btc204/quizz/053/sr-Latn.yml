question: Koja je svrha oznaka u Tihim Plaćanjima?
answer: Da biste koristili više različitih statičkih adresa bez nerazumnog povećanja opterećenja skeniranja.
wrong_answers:
  - Da šifrujete Silent Payments transakcije kako biste sakrili pravog primaoca transakcije.
  - Da biste koristili više različitih statičkih adresa koje ne mogu biti povezane od strane spoljnog posmatrača.
  - Da biste postavili vidljivu oznaku na Blockchain-u za identifikaciju tihih plaćanja na način sličan pozivu na broj.
explanation: |
  Oznake se koriste za generisanje više statičkih adresa iz glavne statičke adrese, što olakšava organizaciju novčanika. Međutim, spoljni posmatrač bi lako mogao uspostaviti vezu između ovih označenih statičkih adresa, jer je javni ključ skeniranja isti za sve.
