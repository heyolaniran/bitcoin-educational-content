question: साइलेंट पेमेंट्स में प्राप्तकर्ता और भुगतानकर्ता के बीच साझा रहस्य स्थापित करने के लिए उपयोग किए जाने वाले क्रिप्टोग्राफिक एल्गोरिदम का नाम क्या है?
answer: ईसीडीएच
wrong_answers:
  - आरएसए
  - DH का
  - एसएचए256
explanation: |
  ईसीडीएच (एलिप्टिक-कर्व डिफी-हेलमैन) एल्गोरिथ्म का उपयोग साइलेंट पेमेंट्स में रिसीवर की स्कैन जोड़ी की कुंजियों और प्रेषक की जोड़ी की कुंजियों के योग के बीच साझा रहस्य स्थापित करने के लिए किया जाता है जो अद्वितीय भुगतान Address की व्युत्पत्ति की अनुमति देगा।
reviewed: false