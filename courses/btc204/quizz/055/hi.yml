question: Address प्राप्त करने वाला Bitcoin क्या है?
answer: बिटकॉइन प्राप्त करने के लिए उपयोग किए जाने वाले वर्णों की एक स्ट्रिंग।
wrong_answers:
  - बिटकॉइन भेजने के लिए प्रयुक्त एक कोड.
  - Mining बिटकॉइन के लिए एक एल्गोरिथ्म।
  - एक जीडब्ल्यू-3.
explanation: |
  रिसीविंग Address का उपयोग Wallet में बिटकॉइन प्राप्त करने के लिए किया जाता है।
