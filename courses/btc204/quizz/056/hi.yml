question: UTXO को लॉक करने के लिए पते का उपयोग कैसे किया जाता है?
answer: वे ScriptPubKey में एकीकृत हैं
wrong_answers:
  - वे स्क्रिप्टसिग में एकीकृत हैं
  - वे कॉइनबेस में एकीकृत हैं।
  - वे कहीं भी एकीकृत नहीं हैं।
explanation: |
  जब कोई भुगतान किया जाता है, तो लेनदेन इनपुट के रूप में उपयोग किए गए UTXO से आउटपुट के रूप में एक नया UTXO बनाता है। इस आउटपुट पर, एक स्क्रिप्ट रखी जाती है जो परिभाषित करती है कि इस UTXO को बाद में कैसे खर्च किया जा सकता है। इस स्क्रिप्ट को ScriptPubKey के रूप में जाना जाता है। प्राप्त करने वाला Address इस स्क्रिप्ट में एकीकृत होता है।
