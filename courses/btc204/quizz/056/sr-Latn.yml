question: Kako se adrese koriste za zaključavanje UTXO-a?
answer: One su integrisane u ScriptPubKey
wrong_answers:
  - One su integrisane u ScriptSig
  - One su integrisane u coinbase.
  - One nigde nisu integrisane.
explanation: |
  Kada se izvrši plaćanje, transakcija kreira novi UTXO kao izlaz iz UTXO-a koji su potrošeni kao ulazi. Na ovom izlazu se postavlja skripta koja definiše kako se ovaj UTXO može kasnije potrošiti. Ova skripta je poznata kao ScriptPubKey. Prijemna adresa je integrisan u ovu skriptu.
reviewed: false
