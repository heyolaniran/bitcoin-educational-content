question: Address के पुनः उपयोग से जुड़ा मुख्य खतरा क्या है?
answer: यह विभिन्न लेनदेन और संबंधित UTXOs के एक सामान्य Ownership के बीच नियतात्मक लिंक स्थापित करने की अनुमति देता है।
wrong_answers:
  - यह लेनदेन सत्यापन के दौरान उपयोगकर्ता के IP Address को अन्य नेटवर्क प्रतिभागियों के समक्ष उजागर कर देता है।
  - इससे डिजिटल हस्ताक्षर तंत्र की प्रभावशीलता कम हो जाती है, जिससे लेनदेन की सुरक्षा कमजोर हो जाती है।
  - इससे Address के पुनः उपयोग के कारण होने वाली भीड़भाड़ के कारण लेनदेन शुल्क में वृद्धि होती है।
explanation: |
  यदि एक ही Address का उपयोग कई लेनदेन के लिए किया जाता है, तो यह अनुमान लगाना संभव हो जाता है कि उस Address से जुड़े सभी बिटकॉइन एक ही व्यक्ति के हैं।
