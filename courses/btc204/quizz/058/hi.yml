question: किसी लेनदेन में बाह्य और आंतरिक Address पुन उपयो के बीच क्या अंतर है?
answer: बाह्य पुनःउपयोग एकाधिक लेनदेन में देखा जाता है, जबकि आंतरिक पुनःउपयोग एक ही लेनदेन में देखा जाता है।
