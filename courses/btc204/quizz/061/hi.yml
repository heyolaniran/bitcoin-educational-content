question: Bitcoin Wallet सॉफ्टवेयर में सिक्का नियंत्रण विकल्प का उद्देश्य क्या है?
answer: लेनदेन के लिए इनपुट के रूप में कौन से UTXO का उपयोग करना है, इसका चयन करना।
wrong_answers:
  - Wallet की सुरक्षा बढ़ाने के लिए UTXOs को एन्क्रिप्ट करना।
  - संदिग्ध स्रोतों से UTXOs का पता लगाना और उन्हें ब्लॉक करना।
  - प्रत्येक UTXO को Wallet में लेबल करना।
explanation: |
  सिक्का नियंत्रण एक ऐसी सुविधा है जो अच्छे Bitcoin Wallet सॉफ़्टवेयर में पाई जाती है, जो आपको लेनदेन करते समय इनपुट के रूप में उपयोग करने के लिए विशिष्ट UTXO को मैन्युअल रूप से चुनने की क्षमता देती है।
reviewed: false