question: Koja je svrha opcije kontrole novčića u Bitcoin novčanik softveru?
answer: Da izaberete koje UTXO-e da koristite kao ulaze za transakcije.
wrong_answers:
  - Da bi se šifrovali UTXO-i radi poboljšanja sigurnosti novčanika.
  - Da otkrije i blokira UTXO-ove iz sumnjivih izvora.
  - Da označite svaki UTXO u novčaniku.
explanation: |
  Kontrola novčića je funkcija koja se nalazi u dobrom Bitcoin novčanik softveru, koja vam daje mogućnost da ručno odaberete specifične UTXO-e koje ćete koristiti kao ulaze prilikom obavljanja transakcije.
