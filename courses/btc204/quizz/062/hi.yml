question: इन विकल्पों में से कौन सा स्वचालित भाग चयन की विधि नहीं है?
answer: मौन भुगतान
wrong_answers:
  - शाखा-और-सीमा
  - फीफो
  - नैप्सैक सॉल्वर
explanation: |
  अन्य तीन विकल्पों के विपरीत, साइलेंट पेमेंट्स भागों का चयन करने की विधि नहीं है, बल्कि स्थिर पतों का उपयोग करने के लिए एक प्रोटोकॉल है।
reviewed: false