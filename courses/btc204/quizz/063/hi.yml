question: सिक्कों के चयन से जुड़े 2 गोपनीयता जोखिम क्या हैं?
answer: सीआईओएच और प्राप्तकर्ता द्वारा इनपुट/पहचान के बीच लिंक।
wrong_answers:
  - आईपी ​​जीडब्ल्यू-0 ट्रैकिंग और गतिविधि सहसंबंध।
  - टेम्पोरल ट्रैकिंग और Address पुनः उपयोग।
  - Address पुनः उपयोग और बाहरी पर्यवेक्षक द्वारा इनपुट / पहचान के बीच लिंक।
explanation: |
  सिक्कों का चयन करते समय दो जोखिमों पर विचार किया जाना चाहिए: भुगतान प्राप्तकर्ता द्वारा आपकी पहचान के एक हिस्से को इनपुट के रूप में उपयोग किए जाने वाले UTXOs से जोड़ने की संभावना और बाहरी पर्यवेक्षक की इनपुट के रूप में उपयोग किए जाने वाले सभी UTXOs (CIOH) के बीच लिंक स्थापित करने की क्षमता।
