question: Bitcoin Wallet से संबद्ध लेबल कैसे संग्रहीत किए जाते हैं?
answer: स्थानीय रूप से Wallet सॉफ्टवेयर पर.
wrong_answers:
  - डेवलपर द्वारा नियंत्रित एक केंद्रीकृत डेटाबेस में।
  - Bitcoin से Blockchain तक, OP_RETURN तक।
  - केवल सॉफ्टवेयर के निष्पादन के दौरान RAM में।
explanation: |
  लेबल को Wallet सॉफ़्टवेयर द्वारा स्थानीय रूप से संग्रहीत किया जाता है और कभी भी Bitcoin नेटवर्क पर प्रसारित नहीं किया जाता है। इस प्रकार लेबलिंग एक व्यक्तिगत प्रबंधन उपकरण है।
reviewed: false