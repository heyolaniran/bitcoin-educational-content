question: Kako su oznake povezane sa Bitcoin novčanikom uskladištene?
answer: Lokalno na novčanik softveru.
wrong_answers:
  - U centralizovanoj bazi podataka kojom upravlja programer.
  - Na Bitcoin blokčejnu kroz OP_RETURN.
  - Samo u RAM-u tokom izvršavanja softvera.
explanation: |
  Oznake se čuvaju lokalno putem novčanik softvera i nikada se ne prenose preko Bitcoin mreže. Obeležavanje je stoga alat za lično upravljanje.
reviewed: false
