question: UTXOs के संदर्भ में Dust क्या है?
answer: ऐसे UTXO जिनका मूल्य इतना कम है कि उन्हें खर्च करने के लिए आवश्यक शुल्क का भुगतान नहीं किया जा सकता।
wrong_answers:
  - UTXOs लेनदेन त्रुटियों द्वारा उत्पन्न होते हैं तथा जिनकी पुष्टि Blockchain पर नहीं की जा सकती।
  - ऐसे UTXO जो संदिग्ध के रूप में चिह्नित हैं या नेटवर्क पर अवैध गतिविधियों से जुड़े हैं।
  - UTXOs को ऐसे पतों पर संग्रहीत किया जाता है जिनका लंबे समय तक उपयोग नहीं किया जाता और उन्हें खोया हुआ मान लिया जाता है।
explanation: |
  Dust उन UTXO को संदर्भित करता है जिनका Sats में मूल्य इतना कम है कि उन्हें खर्च करने के लिए आवश्यक लेनदेन शुल्क को कवर करने के लिए पर्याप्त नहीं है।
