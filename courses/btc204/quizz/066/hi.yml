question: समेकन में क्या शामिल है?
answer: कई इनपुट को मिलाकर एक बड़ा इनपुट बनाना।
wrong_answers:
  - एक बड़े इनपुट को कई छोटे-छोटे भागों में विभाजित करना।
  - एकाधिक वॉलेट से इनपुट को एक वॉलेट में स्थानांतरित करना।
  - अप्रयुक्त इनपुट को नए पते पर पुनः असाइन करना।
explanation: |
  समेकन का सिद्धांत उस अवधि का लाभ उठाना है जब Bitcoin पर शुल्क कम होता है, ताकि छोटे UTXO को एक बड़े में विलय किया जा सके।
