question: समेकन के सभी इनपुट को लिंक करने के लिए किस हेयुरिस्टिक का उपयोग किया जा सकता है?
answer: सीआईओएच.
wrong_answers:
  - Address पुन: उपयोग.
  - सबसे बड़ा उत्पादन.
  - गोल भुगतान.
explanation: |
  एक बाहरी पर्यवेक्षक CIOH को यह अनुमान लगाने के लिए लागू कर सकता है कि समेकन के सभी इनपुट एक ही इकाई के हैं।
reviewed: false