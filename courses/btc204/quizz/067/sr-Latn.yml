question: Koja heuristika se može koristiti za povezivanje svih ulaza konsolidacije?
answer: CIOH.
wrong_answers:
  - Ponovna upotreba adrese.
  - Najveći izlaz.
  - Zaokružena uplata.
explanation: |
  Spoljni posmatrač može primeniti CIOH da pretpostavi da svi ulazi konsolidacije pripadaju jednom istom entitetu.
reviewed: false
