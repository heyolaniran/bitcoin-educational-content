question: UTXOs को समेकित करते समय हम COIH के प्रभावों को कैसे न्यूनतम कर सकते हैं?
answer: एक ही स्रोत से केवल UTXOs को समेकित करके।
wrong_answers:
  - UTXO को तीसरे पक्ष के पते पर भेजकर।
  - पहचानने योग्य पैटर्न से बचने के लिए UTXOs का यादृच्छिक चयन करके।
  - कम गतिविधि की अवधि के दौरान UTXOs को समेकित करके।
explanation: |
  यदि आपको अपने बिटकॉइन को समेकित करने की आवश्यकता महसूस होती है, तो पहले उसी स्रोत से UTXO को समेकित करने को प्राथमिकता दें।
reviewed: false