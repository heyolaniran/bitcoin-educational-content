question: Bitcoin लेनदेन के भार को कौन प्रभावित करता है?
answer: इनपुट और आउटपुट की संख्या.
wrong_answers:
  - Blockchain का आकार.
  - इनपुट और आउटपुट की मात्रा.
  - प्रयुक्त UTXO की आयु.
explanation: |
  Bitcoin ट्रांजेक्शन में जितने अधिक इनपुट और आउटपुट होंगे, वह vB में उतना ही भारी होगा।
