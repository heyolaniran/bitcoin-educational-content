question: Šta utiče na težinu Bitcoin transakcije?
answer: Broj ulaza i izlaza.
wrong_answers:
  - Veličina blokčejna.
  - Količina ulaza i izlaza.
  - Starost korišćenih UTXO-a.
explanation: |
  Što više ulaza i izlaza ima Bitcoin transakcija, to će biti teža u vB (virtual bajtovima).
