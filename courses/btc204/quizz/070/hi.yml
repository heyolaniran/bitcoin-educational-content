question: तृतीय-पक्ष नोड का उपयोग करने से क्या जोखिम जुड़े हैं?
answer: गतिविधियों पर सेंसरशिप और निगरानी।
wrong_answers:
  - बिटकॉइन की हानि.
  - लेनदेन शुल्क में वृद्धि.
  - बिटकॉइन की चोरी और ट्रैकिंग।
explanation: |
  यदि आप किसी ऐसे नोड का उपयोग करते हैं जो आपका नहीं है, तो आपके लेनदेन प्रसारण को अवरुद्ध किए जाने और ऑपरेटर द्वारा निगरानी किए जाने का जोखिम रहता है।
reviewed: false