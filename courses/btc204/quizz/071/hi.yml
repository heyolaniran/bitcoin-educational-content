question: जब आप अपने स्वयं के Bitcoin नोड का उपयोग नहीं कर रहे हों तो कनेक्शन छिपाने के लिए क्या मध्यवर्ती उपाय किया जा सकता है?
answer: टोर का उपयोग.
wrong_answers:
  - फ़ायरवॉल का उपयोग.
  - एन्क्रिप्टेड Wallet का उपयोग.
  - डबल Wallet का उपयोग.
explanation: |
  देखे जाने के जोखिम को सीमित करने के लिए, एक मध्यवर्ती समाधान Wallet सॉफ़्टवेयर का उपयोग करना है जो आपको Tor के माध्यम से अपने कनेक्शन छिपाने की अनुमति देता है।
reviewed: false