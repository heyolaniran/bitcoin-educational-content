question: 2024 में Bitcoin पर बढ़ी हुई गोपनीयता के लिए कौन सा स्क्रिप्ट मॉडल सबसे अधिक अनुशंसित है?
answer: जीडब्ल्यू-1
wrong_answers:
  - पी2पीके
  - पी2पीकेएच
  - जीडब्ल्यू-2
explanation: |
  सबसे बड़ी भीड़ में घुलने-मिलने के लिए, सबसे व्यापक रूप से अपनाए गए स्क्रिप्ट मॉडल का उपयोग करने की अनुशंसा की जाती है। P2TR स्क्रिप्ट वर्तमान में Bitcoin लेनदेन में सबसे अधिक उपयोग की जाती हैं।
reviewed: false