question: निम्नलिखित उत्तरों में से कौन सा उत्तर श्रृंखला विश्लेषण अनुमान को धोखा देने की अनुमति नहीं देता है?
answer: हमेशा एक ही रिसीविंग Address का उपयोग करें।
wrong_answers:
  - ऐसा परिवर्तन करना जिसका मूल्य भुगतान के करीब हो।
  - अनियमित, गैर-गोल राशियों का आउटपुट बनाना।
  - पूरे दिन में लेन-देन का वितरण करना।
explanation: |
  किसी को विशेष रूप से Address प्राप्त करने वाले को कई बार उपयोग नहीं करना चाहिए। अन्य सभी उत्तर श्रृंखला विश्लेषण अनुमान से बचने की अनुमति देते हैं।
reviewed: false