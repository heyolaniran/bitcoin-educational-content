question: निम्नलिखित उत्तरों में से कौन सा उत्तर आपके स्वयं के नोड का उपयोग करने के लाभ को नहीं दर्शाता है?
answer: लेनदेन शुल्क में कमी करना।
wrong_answers:
  - आम सहमति में भाग लेना।
  - तीसरे पक्ष से स्वतंत्र होना।
  - लेन-देन सेंसरशिप का विरोध करने में सक्षम होना।
explanation: |
  यहां बताया गया है कि Bitcoin के पूर्ण संप्रभु उपयोग के लिए आपका अपना नोड होना क्यों महत्वपूर्ण है: सेंसरशिप प्रतिरोध; आपके लेन-देन को कोई भी रोक नहीं सकता है; तीसरे पक्ष की भाषा से स्वतंत्रता; अब आप Blockchain डेटा को सत्यापित करने के लिए किसी बाहरी सेवा पर निर्भर नहीं हैं; सक्रिय भागीदारी; आपके पास अपने स्वयं के सत्यापन नियम निर्धारित करने और आम सहमति में सीधे भाग लेने की क्षमता है; नेटवर्क में योगदान; नोड चलाकर, आप Bitcoin नेटवर्क को मजबूत और वितरित करने में मदद करते हैं; तकनीकी शिक्षा; Full node का प्रबंधन Bitcoin के बारे में अपने तकनीकी ज्ञान को गहरा करने का एक शानदार तरीका है।