question: CoinJoin लेनदेन का मुख्य लक्ष्य क्या है?
answer: एक सिक्के का इतिहास तोड़ना.
wrong_answers:
  - लेनदेन शुल्क कम करना।
  - बिटकॉइन को अप्राप्य बनाने के लिए।
  - पुष्टिकरण की गति बढ़ाने के लिए.
explanation: |
  CoinJoin लेनदेन का लक्ष्य किसी सिक्के के इतिहास को तोड़ना है। यह तकनीक स्थायी गुमनामी प्रदान नहीं करती है और न ही यह बिटकॉइन की ट्रैकिंग को निश्चित रूप से रोकती है, जो कि कोई सोच सकता है उसके विपरीत है। CoinJoin का उद्देश्य केवल उस बिंदु पर इतिहास को तोड़ना है जहां CoinJoin लेनदेन किया जाता है।
