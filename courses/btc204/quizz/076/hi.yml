question: CoinJoin लेनदेन क्या है?
answer: एक सहयोगात्मक लेनदेन जहां कई उपयोगकर्ता अपने UTXOs को मर्ज करते हैं।
wrong_answers:
  - केवल दो उपयोगकर्ताओं के बीच सहयोगात्मक लेनदेन।
  - एक लेनदेन जिसमें एक ही उपयोगकर्ता एकाधिक पतों पर धनराशि भेजता है।
  - एक लेनदेन जिसमें एक केंद्रीय अभिनेता अपने ग्राहकों के बिटकॉइन को मिलाता है।
explanation: |
  CoinJoin लेनदेन एक सहयोगात्मक लेनदेन है जिसमें कई उपयोगकर्ता अपने सिक्कों को मिलाते हैं।
