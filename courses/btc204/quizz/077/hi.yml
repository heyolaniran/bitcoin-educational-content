question: CoinJoin और कस्टोडियल मिक्सर के बीच मुख्य अंतर क्या है?
answer: CoinJoin आपको अपने फंड पर पूर्ण नियंत्रण बनाए रखने की अनुमति देता है।
wrong_answers:
  - CoinJoin के तहत निधियों की अभिरक्षा को अस्थायी रूप से त्यागने की आवश्यकता होती है।
  - मिक्सर कॉइनजॉइन्स की तुलना में अधिक सुरक्षित हैं।
  - मिक्सर बेहतर गुणवत्ता वाला मिश्रण प्रदान करते हैं।
explanation: |
  कॉइनजॉइन की तुलना में मिक्सर का मुख्य नुकसान यह है कि उन्हें मिक्सिंग प्रक्रिया के दौरान उपयोगकर्ता को अपने फंड की कस्टडी छोड़ने की आवश्यकता होती है, जिससे उन्हें चोरी के जोखिम का सामना करना पड़ता है।
