question: किसी सिक्के के पिछले लेनदेन के विश्लेषण के विरुद्ध CoinJoin द्वारा दी जाने वाली सुरक्षा को किस शब्द से वर्णित किया जाता है?
answer: पूर्वव्यापी anonset.
wrong_answers:
  - संभावित anonset.
  - ट्रेसिबिलिटी प्रतिरोध.
  - लौकिक गोपनीयता.
explanation: |
  वर्तमान से लेकर अतीत तक के विश्लेषण के विरुद्ध सुरक्षा को पूर्वव्यापी एनॉन्सेट कहा जाता है।
reviewed: false