question: किसी सिक्के के भविष्य के लेनदेन के विश्लेषण के विरुद्ध CoinJoin द्वारा दी जाने वाली सुरक्षा को किस शब्द से वर्णित किया जाता है?
answer: संभावित anonset.
wrong_answers:
  - पूर्वव्यापी anonset.
  - ट्रेसिबिलिटी प्रतिरोध.
  - लौकिक गोपनीयता.
explanation: |
  अतीत से लेकर वर्तमान तक के विश्लेषण के विरुद्ध सुरक्षा को ही भावी एनॉन्सेट कहा जाता है।
