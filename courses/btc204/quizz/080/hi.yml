question: CoinJoin समन्वयक की भूमिका क्या है?
answer: प्रतिभागियों को जोड़ें और लेनदेन का निर्माण करें।
wrong_answers:
  - लेनदेन की गोपनीयता के लिए प्रतिभागी डेटा एन्क्रिप्ट करें।
  - सुरक्षा ऑडिट के लिए पिछले कॉइनजॉइन्स का रिकॉर्ड रखें।
  - प्रतिभागियों से बिटकॉइन प्राप्त करें और उन्हें मिश्रित करें।
explanation: |
  समन्वयकों की भूमिका विभिन्न उपयोगकर्ताओं को जोड़ना और सहयोगात्मक लेनदेन का निर्माण करना और फिर उसे प्रसारित करना है।
reviewed: false