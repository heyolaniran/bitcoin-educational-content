question: CoinJoin में समन्वयक को इनपुट और आउटपुट को लिंक करने से रोकने के लिए किस क्रिप्टोग्राफ़िक विधि का उपयोग किया जाता है?
answer: चाउम अंधा हस्ताक्षर.
wrong_answers:
  - श्नोर हस्ताक्षर.
  - P2SH पते.
  - P2TR पते.
explanation: |
  तथाकथित चौमियन कॉइनजॉइन्स में, टोर और डेविड चौम के ब्लाइंड सिग्नेचर का उपयोग यह सुनिश्चित करने के लिए किया जाता है कि समन्वयक यह नहीं जान सके कि कौन सा आउटपुट किस उपयोगकर्ता का है।
reviewed: false