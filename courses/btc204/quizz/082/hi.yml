question: चाउमियन CoinJoin प्रक्रिया के किस चरण में गुमनामी सुनिश्चित करने के लिए टोर पर पहचान बदलना शामिल है?
answer: आउटपुट का पंजीकरण.
wrong_answers:
  - इनपुट का पंजीकरण.
  - लेन-देन पर हस्ताक्षर.
  - लेन-देन का प्रसारण.
explanation: |
  समन्वयक को किसी विशिष्ट आउटपुट को इनपुट से लिंक करने से रोकने के लिए, उपयोगकर्ता समन्वयक को अपना स्पष्ट-पाठ प्राप्त पता भेजने से पहले अपनी टोर पहचान बदल देते हैं।
reviewed: false