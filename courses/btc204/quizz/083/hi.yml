question: समन्वयक सभी प्रतिभागियों से हस्ताक्षर एकत्रित करने के बाद CoinJoin लेनदेन को संशोधित क्यों नहीं कर सकता?
answer: इसमें संशोधन करने से लेनदेन अमान्य हो जाएगा।
wrong_answers:
  - उनके पास प्रतिभागियों के प्राप्ति पते तक पहुंच नहीं है।
  - हस्ताक्षर एन्क्रिप्टेड हैं।
  - यह लेनदेन पहले ही Bitcoin नेटवर्क पर प्रसारित हो चुका है।
explanation: |
  एक बार जब प्रतिभागियों ने समग्र लेनदेन पर हस्ताक्षर कर दिए हैं, यह सुनिश्चित करने के बाद कि सब कुछ सही है, समन्वयक अब इस लेनदेन को अमान्य किए बिना आउटपुट सहित संशोधित नहीं कर सकता है, क्योंकि हस्ताक्षर पूरे लेनदेन को कवर करता है।
reviewed: false