question: जीरोलिंक प्रोटोकॉल में पोस्ट-मिक्स Wallet की क्या भूमिका है?
answer: मिश्रण के बाद UTXOs को संग्रहीत करने के लिए।
wrong_answers:
  - मिश्रण से पहले UTXOs को संग्रहीत करने के लिए।
  - परिवर्तनित UTXOs को संग्रहीत करने के लिए.
  - समेकन UTXOs को संग्रहीत करने के लिए.
explanation: |
  पोस्ट-मिक्स Wallet उन सिक्कों के लिए आरक्षित है जिन्हें मिश्रित किया गया है।
reviewed: false