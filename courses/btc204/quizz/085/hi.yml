question: जॉइनमार्केट द्वारा प्रयुक्त विशिष्ट उपयोगकर्ता मिलान मॉडल क्या है?
answer: P2P बाजार निर्माताओं और लेने वालों के बीच है।
wrong_answers:
  - सर्वर जो प्रतिभागियों को यादृच्छिक रूप से निर्दिष्ट करता है।
  - डच नीलामी पर आधारित विनिमय।
  - मध्यस्थता सेवा जो मैन्युअल रूप से प्रतिभागियों का चयन करती है।
explanation: |
  जॉइनमार्केट एक P2P Exchange बाजार पर काम करता है, जहां कुछ उपयोगकर्ता, निर्माता, मिश्रण के लिए अपने बिटकॉइन की पेशकश करते हैं, जबकि अन्य, लेने वाले, इन फंडों का उपयोग शुल्क के लिए Exchange में कॉइनजॉइन करने के लिए करते हैं।
reviewed: false