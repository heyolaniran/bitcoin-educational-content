question: वासाबी 1.0 की तुलना में वाबिसाबी परिवर्तन का प्रबंधन कैसे करता है?
answer: यह इसे कई छोटी राशियों में विभाजित कर देता है तथा बराबर मूल्यवर्गों में वितरित कर देता है।
wrong_answers:
  - यह उन्हें Dust बनने से रोकने के लिए समेकित करता है।
  - यह इनपुट को समान करके CoinJoin लेनदेन से पहले उन्हें बाहर कर देता है।
  - यह स्वचालित रूप से इसे आरक्षित Wallet में स्थानांतरित कर देता है।
explanation: |
  वासाबी 1.0 के विपरीत, जहां परिवर्तन सीधे उपयोगकर्ताओं के इनपुट से जुड़ा हुआ था, वाबिसाबी का लक्ष्य परिवर्तन को कई छोटी मात्रा में विभाजित करना है, जो सभी प्रतिभागियों को समान मूल्यवर्ग में वितरित किया जाता है।
reviewed: false