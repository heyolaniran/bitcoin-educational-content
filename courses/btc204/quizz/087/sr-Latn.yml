question: Kako Wabisabi upravlja kusurima u poređenju sa Wasabi 1.0?
answer: Podeli ga na nekoliko malih iznosa raspoređenih u jednakim apoenima.
wrong_answers:
  - Konsoliduje ih kako bi sprečio da postanu Dust.
  - Isključuje ih pre CoinJoin transakcije izjednačavanjem ulaza.
  - Automatski ga prenosi u rezervni novčanik.
explanation: |
  Za razliku od Wasabi 1.0, gde je kusur bio direktno povezan sa unosima korisnika, Wabisabi ima za cilj da podeli kusur na nekoliko malih iznosa, raspoređenih u jednake denominacije svim učesnicima.
