question: प्रतिभागियों की संख्या बढ़ाने के लिए वाबिसाबी किस रणनीति का उपयोग करता है?
answer: कुछ बहुत बड़े लेन-देन के साथ.
wrong_answers:
  - बहुत से बहुत छोटे-छोटे लेन-देन के साथ।
  - एक छोटे से लेनदेन से.
  - बिना किसी लेन-देन के.
explanation: |
  प्रतिभागियों की संख्या बढ़ाने के लिए, वाबिसाबी बहुत बड़े CoinJoin लेनदेन का उपयोग करता है जो दर्जनों प्रतिभागियों को एक साथ समूहित करता है।
reviewed: false