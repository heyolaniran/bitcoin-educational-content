question: JoinMarket में निर्माताओं को कैसे मुआवजा दिया जाता है?
answer: आवेदकों द्वारा भुगतान की गई फीस के माध्यम से।
wrong_answers:
  - Mining शुल्क के माध्यम से.
  - दाताओं द्वारा स्वैच्छिक दान के माध्यम से।
  - Bitcoin समुदाय से अनुदान के माध्यम से।
explanation: |
  निर्माता अपने बिटकॉइन को लेने वालों के लिए उपलब्ध रखते हैं और अपनी सेवा के बदले में शुल्क प्राप्त करते हैं। बदले में, लेने वाले अपने स्वयं के CoinJoin लेनदेन को पूरा करने के लिए निर्माताओं के बिटकॉइन का उपयोग करने के लिए भुगतान करते हैं।
reviewed: false