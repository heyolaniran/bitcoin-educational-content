question: अन्य CoinJoin कार्यान्वयनों की तुलना में Whirlpool में रीमिक्स की क्या विशिष्टता है?
answer: वे पूर्णतः स्वतंत्र हैं।
wrong_answers:
  - उन्हें केवल Mining शुल्क का भुगतान करना होगा।
  - वे प्रति उपयोगकर्ता एक तक सीमित हैं।
  - उन्हें केवल सेवा शुल्क का भुगतान करना होगा।
explanation: |
  Whirlpool रीमिक्स 100% निःशुल्क हैं: कोई अतिरिक्त सेवा शुल्क या Mining शुल्क की आवश्यकता नहीं है।
reviewed: false