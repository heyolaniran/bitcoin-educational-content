question: CoinJoin चक्रों के बाद कई UTXOs को मर्ज न करने की सलाह क्यों दी जाती है?
answer: सीआईओएच के कारण इससे गोपनीयता से समझौता हो सकता है।
wrong_answers:
  - इससे लेन-देन की गति कम हो जाती है।
  - इससे समन्वयक को संदिग्ध गतिविधि का पता चलता है।
  - इससे राउंड पेमेंट हेयुरिस्टिक के कारण गोपनीयता से समझौता हो सकता है।
explanation: |
  कॉमन-इनपुट-जीडब्लू-1-ह्यूरिस्टिक (सीआईओएच) से बचने के लिए, एक ही लेनदेन में मिश्रित यूटीएक्सओ को अमिश्रित यूटीएक्सओ के साथ संयोजित करने से बचना महत्वपूर्ण है, लेकिन यूटीएक्सओ को आपस में मिश्रित करना भी जरूरी है।
reviewed: false