question: उन UTXO के लिए उपयोग किए जाने वाले खाते का नाम क्या है जो Whirlpool CoinJoin पूल में प्रवेश नहीं कर सकते हैं?
answer: Doxxic खाता बदलें.
wrong_answers:
  - पोस्टमिक्स खाता.
  - प्रीमिक्स खाता.
  - जमा खाता.
explanation: |
  जो परिवर्तन पूल में शामिल नहीं हो सका, उसे "डॉक्सिक परिवर्तन खाते" में अलग कर दिया गया है, ताकि Wallet में अन्य UTXO से सख्त अलगाव सुनिश्चित किया जा सके।
reviewed: false