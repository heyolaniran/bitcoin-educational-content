question: Whirlpool में लेनदेन Tx0 की मुख्य भूमिका क्या है?
answer: UTXOs को समान करने के लिए.
wrong_answers:
  - पहला मिश्रण करने के लिए.
  - पूल से UTXOs को हटाने के लिए.
  - मिश्रित UTXOs को खर्च करना।
explanation: |
  Tx0 का उद्देश्य CoinJoin के लिए UTXO को तैयार करना और उन्हें समान बनाना है, मिश्रण की एकरूपता सुनिश्चित करने के लिए उन्हें चयनित पूल की मात्रा के अनुरूप इकाइयों में विभाजित करना है।
reviewed: false