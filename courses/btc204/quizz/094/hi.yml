question: निम्नलिखित उत्तरों में से कौन सा उत्तर किसी व्यक्ति के डॉक्सिक परिवर्तन के प्रबंधन के लिए अनुशंसित अभ्यास नहीं है?
answer: डॉक्सिक UTXOs को एक साथ विलय करना।
wrong_answers:
  - एक छोटे पूल में डॉक्सिक UTXOs का मिश्रण।
  - अपने डॉक्सिक UTXOs दान करना।
  - अपने डॉक्सिक UTXOs को गैर-व्यय योग्य के रूप में चिह्नित करना।
explanation: |
  डॉक्सिक UTXO को एक साथ मर्ज न करने की सलाह दी जाती है क्योंकि यह Whirlpool में उपयोगकर्ता की विभिन्न प्रविष्टियों के बीच कनेक्शन बनाने की अनुमति देता है।
reviewed: false