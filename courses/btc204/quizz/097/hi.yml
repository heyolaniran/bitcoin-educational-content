question: एक बड़ा एनोनसेट UTXO की गोपनीयता के बारे में क्या संकेत देता है?
answer: बेहतर गोपनीयता.
wrong_answers:
  - गोपनीयता में कमी.
  - बेहतर पता लगाने की क्षमता.
  - तीव्र CoinJoin लेनदेन गति.
explanation: |
  एक बड़ा एनोनसेट गुमनामी के उच्च स्तर को इंगित करता है, क्योंकि सजातीय सेट के भीतर एक विशिष्ट UTXO को अलग करना मुश्किल हो जाता है।
reviewed: false