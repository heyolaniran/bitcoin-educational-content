question: अग्रेषित गुमनामी का माप क्या है?
answer: अतीत से वर्तमान तक के विश्लेषण के विरुद्ध गोपनीयता का प्रतिरोध।
wrong_answers:
  - वर्तमान से अतीत के विश्लेषण के विरुद्ध गोपनीयता का प्रतिरोध।
  - भविष्य से वर्तमान तक के विश्लेषण के विरुद्ध गोपनीयता का प्रतिरोध।
  - भविष्य से अतीत तक के विश्लेषण के विरुद्ध गोपनीयता का प्रतिरोध।
explanation: |
  फॉरवर्ड एनोनिमिटी अतीत से वर्तमान विश्लेषण (इनपुट से आउटपुट) के विरुद्ध किसी सिक्के की गोपनीयता के प्रतिरोध को मापती है।
reviewed: false