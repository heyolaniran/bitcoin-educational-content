question: पूर्वव्यापी एनोन्सेट माप क्या है?
answer: वर्तमान से अतीत के विश्लेषण के विरुद्ध गोपनीयता का प्रतिरोध।
wrong_answers:
  - अतीत से भविष्य तक के विश्लेषण के विरुद्ध गोपनीयता का प्रतिरोध।
  - वर्तमान से भविष्य तक के विश्लेषण के विरुद्ध गोपनीयता का प्रतिरोध।
  - अतीत से वर्तमान तक के विश्लेषण के विरुद्ध गोपनीयता का प्रतिरोध।
explanation: |
  पूर्वव्यापी एनोनसेट वर्तमान से अतीत विश्लेषण (आउटपुट से इनपुट) के विरुद्ध सिक्के की गोपनीयता के प्रतिरोध को मापता है।
reviewed: false