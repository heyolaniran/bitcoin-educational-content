question: Bitcoin पर श्रृंखला विश्लेषण के संदर्भ में एन्ट्रॉपी क्या इंगित करती है?
answer: लेनदेन की सटीक संरचना के बारे में विश्लेषकों के ज्ञान का अभाव।
wrong_answers:
  - वह गति जिस पर किसी लेनदेन के बारे में जानकारी पूरे नेटवर्क में फैलती है।
  - लेनदेन में प्रयुक्त डिजिटल हस्ताक्षरों की क्रिप्टोग्राफिक सुरक्षा का स्तर।
  - समान UTXOs के समूह का आकार जिसमें एक सिक्का छिपा हुआ है।
explanation: |
  एन्ट्रॉपी का उपयोग लेनदेन के सटीक विन्यास के बारे में विश्लेषकों के ज्ञान की कमी को मापने के लिए किया जाता है। दूसरे शब्दों में, एन्ट्रॉपी जितनी अधिक होगी, विश्लेषकों के लिए इनपुट और आउटपुट के बीच बिटकॉइन के प्रवाह की पहचान करना उतना ही कठिन हो जाएगा।
reviewed: false