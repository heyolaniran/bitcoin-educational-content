question: Bitcoin पर श्रृंखला विश्लेषण के संदर्भ में एन्ट्रॉपी की गणना कैसे की जाती है?
answer: व्याख्याओं की संख्या का द्विआधारी लघुगणक लेकर।
wrong_answers:
  - इनपुट की संख्या को आउटपुट की संख्या से गुणा करके।
  - इनपुट और आउटपुट की संख्या जोड़कर।
  - इनपुट और आउटपुट की संख्या का बाइनरी लघुगणक लेकर।
explanation: |
  एन्ट्रॉपी को संभावित संयोजनों की संख्या के बाइनरी लघुगणक के रूप में परिभाषित किया जाता है।
reviewed: false