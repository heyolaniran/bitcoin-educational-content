question: Bitcoin लेनदेन के संदर्भ में बोल्ट्ज़मैन स्कोर क्या दर्शाता है?
answer: सशर्त संभावना कि एक इनपुट किसी दिए गए आउटपुट से जुड़ा हुआ है।
wrong_answers:
  - स्थानांतरित बिटकॉइन की कुल राशि.
  - किसी लेनदेन में इनपुट की संख्या.
  - प्रत्येक इनपुट या आउटपुट से संबंधित एन्ट्रॉपी।
explanation: |
  बोल्ट्ज़मैन स्कोर सशर्त संभावना को दर्शाता है कि एक विशिष्ट इनपुट किसी दिए गए आउटपुट से जुड़ा हुआ है। इस प्रकार यह सशर्त संभावना का एक मात्रात्मक माप है कि किसी लेनदेन में इनपुट और आउटपुट के बीच संबंध होता है, जो व्याख्याओं के एक सेट में संभावित घटनाओं की कुल संख्या की तुलना में इस घटना की अनुकूल घटनाओं की संख्या के अनुपात पर स्थापित होता है।
