question: गोपनीयता के संदर्भ में Bitcoin लेनदेन की दक्षता की गणना कैसे की जाती है?
answer: लेन-देन की वास्तविक एन्ट्रापी की तुलना अधिकतम संभव एन्ट्रापी से करके।
wrong_answers:
  - इनपुट की संख्या को आउटपुट की संख्या से गुणा करके।
  - लेनदेन की वास्तविक एन्ट्रॉपी को इनपुट और आउटपुट की संख्या से गुणा करके।
  - इनपुट की संख्या की आउटपुट की संख्या से तुलना करके।
explanation: |
  लेनदेन की दक्षता की गणना विश्लेषित लेनदेन की वास्तविक एन्ट्रॉपी से अधिकतम एन्ट्रॉपी को घटाकर की जाती है।
reviewed: false