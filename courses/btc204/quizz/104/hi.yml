question: किसी लेनदेन की अधिकतम एन्ट्रॉपी क्या है?
answer: उच्चतम एन्ट्रॉपी जिसे कोई लेनदेन संरचना प्राप्त कर सकती है।
wrong_answers:
  - न्यूनतम एन्ट्रॉपी जिसे कोई लेनदेन संरचना प्राप्त कर सकती है।
  - किसी लेनदेन की वास्तविक एन्ट्रॉपी.
  - किसी लेन-देन की दक्षता.
explanation: |
  अधिकतम एन्ट्रॉपी से तात्पर्य उस उच्चतम एन्ट्रॉपी से है जिसे एक विशिष्ट लेनदेन संरचना सैद्धांतिक रूप से प्राप्त कर सकती है।
reviewed: false