question: PayJoin लेनदेन को स्टेग्नोग्राफ़िक लेनदेन कैसे माना जा सकता है?
answer: यह बाहरी पर्यवेक्षकों से वास्तविक भुगतान राशि को छुपाता है।
wrong_answers:
  - यह बाह्य पर्यवेक्षकों के लिए वास्तविक भुगतान राशि को एन्क्रिप्ट करता है।
  - यह प्राप्तकर्ता से वास्तविक भुगतान राशि छुपाता है।
  - यह प्राप्तकर्ता के लिए वास्तविक भुगतान राशि को एन्क्रिप्ट करता है।
explanation: |
  PayJoin लेनदेन स्टेग्नोग्राफ़ी के क्षेत्र में आता है क्योंकि यह किसी लेनदेन की वास्तविक राशि को एक नकली लेनदेन के भीतर छिपा देता है जो बाहरी पर्यवेक्षकों के लिए एक प्रलोभन के रूप में कार्य करता है।
