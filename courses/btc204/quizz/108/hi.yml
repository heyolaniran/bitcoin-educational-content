question: PayJoin लेनदेन द्वारा विश्लेषण के लिए धोखे के रूप में कार्य करने के लिए श्रृंखला के किस अनुमानी विश्लेषण का उपयोग किया जाता है?
answer: सीआईओएच
wrong_answers:
  - Address का पुनः उपयोग
  - Wallet फिंगरप्रिंटिंग
  - संस्करण पुनः उपयोग
explanation: |
  जब कोई विश्लेषक PayJoin लेनदेन की जांच करता है, तो उन्हें यह विश्वास हो जाता है कि CIOH के कारण सभी इनपुट एक ही व्यक्ति से आते हैं। हालाँकि, यह धारणा गलत है, क्योंकि भुगतान प्राप्तकर्ता भी वास्तविक भुगतानकर्ता के साथ इनपुट में योगदान देता है। इसलिए, चेन विश्लेषण एक ऐसी व्याख्या की ओर मुड़ जाता है जो गलत साबित होती है।
reviewed: false