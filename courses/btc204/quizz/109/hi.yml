question: भुगतान के लिए PayJoin का उपयोग करना अक्सर जटिल क्यों होता है?
answer: इसके निर्माण में प्राप्तकर्ता के सक्रिय सहयोग की आवश्यकता होती है।
wrong_answers:
  - इसमें प्रत्येक लेनदेन के लिए निश्चित राशि की आवश्यकता होती है
  - यह दोनों पक्षों को एक ही प्रकार के सॉफ्टवेयर का उपयोग करने के लिए मजबूर करता है
  - इसके लिए भुगतानकर्ता के पास भुगतान के मूल्य से कम से कम 2 UTXO अधिक होना आवश्यक है
explanation: |
  PayJoin का उपयोग करने में कठिनाई व्यापारी की भागीदारी पर इसकी निर्भरता में निहित है। एक ग्राहक के रूप में, यदि व्यापारी इसका समर्थन नहीं करता है तो PayJoin का उपयोग करना असंभव है।
reviewed: false