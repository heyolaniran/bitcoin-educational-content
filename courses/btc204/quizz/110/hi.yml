question: स्टोनवॉल लेनदेन क्या है?
answer: एक ऐसा लेनदेन जो मिनी-CoinJoin की नकल करता है, बिना मिनी-CoinJoin बने
wrong_answers:
  - मिनी-CoinJoin के रूप में भुगतान लेनदेन
  - तीन प्रतिभागियों को शामिल करने वाला एक सहयोगात्मक लेनदेन
  - एक लेनदेन जिसमें प्राप्तकर्ता इनपुट में शामिल होता है
explanation: |
  स्टोनवॉल Bitcoin लेनदेन का एक विशिष्ट रूप है जिसका उद्देश्य दो लोगों के बीच मिनी-CoinJoin की नकल करके खर्च के दौरान उपयोगकर्ता की गोपनीयता को बढ़ाना है, जबकि वे वास्तव में एक नहीं हैं।
