question: स्टोनवॉल x2 लेनदेन क्या है?
answer: मिनी-CoinJoin के रूप में भुगतान लेनदेन
wrong_answers:
  - एक ऐसा लेनदेन जो मिनी-CoinJoin न होते हुए भी उसकी नकल करता है
  - एक सरल भुगतान लेनदेन
  - एक लेनदेन जिसमें प्राप्तकर्ता इनपुट में शामिल होता है
explanation: |
  स्टोनवॉल x2 Bitcoin लेनदेन का एक विशिष्ट रूप है जिसका उद्देश्य खर्च के दौरान उपयोगकर्ता की गोपनीयता को बढ़ाना है, लेकिन इस बार खर्च में शामिल न होने वाले किसी तीसरे पक्ष के साथ सहयोग करके। यह विधि दो प्रतिभागियों के बीच मिनी-CoinJoin की तरह काम करती है, जबकि उसी समय किसी तीसरे व्यक्ति को भुगतान भी किया जाता है।