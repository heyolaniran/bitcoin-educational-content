question: स्टोनवॉल x2 लेनदेन में सहयोगी की भूमिका क्या है?
answer: संदेह बढ़ाने के लिए बिटकॉइन उपलब्ध कराएं
wrong_answers:
  - लेन-देन समन्वयक के रूप में कार्य करें
  - भुगतान राशि प्राप्त करें
  - भुगतान राशि भेजें
explanation: |
  स्टोनवॉल x2 लेनदेन में सहयोगी लेनदेन विश्लेषण में संदेह जोड़ने के लिए बिटकॉइन प्रदान करता है, जबकि अंत में अपने धन को पूरी तरह से पुनर्प्राप्त करता है (उनके लिए एक तटस्थ कार्रवाई, Mining शुल्क घटा)।
