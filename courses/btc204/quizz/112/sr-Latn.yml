question: Koja je uloga saradnika u Stonewall x2 transakciji?
answer: Da obezbedi bitkoine da doda sumnju
wrong_answers:
  - Ponaša se kao koordinator transakcije.
  - Da primi iznos uplate
  - Da pošalje iznos uplate
explanation: |
  Saradnik u Stonewall x2 transakciji obezbeđuje bitkoine kako bi dodao sumnju u analizu transakcije, dok u potpunosti povrati svoja sredstva na kraju (neutralna akcija za njih, minus rudarska naknade).
