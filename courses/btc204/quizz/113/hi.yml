question: कौन सा तत्व बाहरी पर्यवेक्षक को स्टोनवॉल और स्टोनवॉल x2 लेनदेन के बीच अंतर करने से रोकता है?
answer: लेन-देन का पैटर्न एक जैसा है
wrong_answers:
  - लेन-देन एन्क्रिप्टेड हैं
  - लेन-देन में शामिल रकम हमेशा एक समान होती है
  - लेन-देन के डिजिटल हस्ताक्षर उसी एल्गोरिथ्म द्वारा उत्पन्न किए जाते हैं
explanation: |
  बाहरी दृष्टिकोण से, लेन-देन का पैटर्न बिल्कुल एक जैसा है। अतिरिक्त संदर्भ जानकारी के बिना, स्टोनवॉल लेन-देन को स्टोनवॉल x2 लेन-देन से अलग करना असंभव है, क्योंकि वे एक ही पैटर्न अपनाते हैं।
reviewed: false