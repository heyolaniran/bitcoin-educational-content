question: विश्लेषक स्टोनवॉल प्रकार के लेनदेन पर CoinJoin क्यों लागू नहीं करेगा?
answer: क्योंकि समान मात्रा के 2 आउटपुट हैं
wrong_answers:
  - क्योंकि केवल 2 इनपुट हैं
  - क्योंकि वे इस पैटर्न से परिचित नहीं हैं
  - क्योंकि इनपुट की तुलना में आउटपुट अधिक हैं
explanation: |
  स्टोनवॉल ट्रांजैक्शन का बाहर से विश्लेषण करने पर CoinJoin लागू नहीं होता, क्योंकि एक ही राशि के दो आउटपुट की मौजूदगी CoinJoin पैटर्न का सुझाव देती है। बाहरी दृष्टिकोण से, CoinJoin इस विशिष्ट मामले में लागू नहीं है।
reviewed: false