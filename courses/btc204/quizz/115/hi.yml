question: Bitcoin के संदर्भ में रिकोषेट क्या है?
answer: एक तकनीक जिसमें स्वयं से कई लेन-देन करना शामिल है
wrong_answers:
  - एकाधिक प्रतिभागियों को शामिल करने वाला एक सहयोगात्मक लेनदेन
  - संभावित गुमनामी को बढ़ाने के लिए बिटकॉइन को मिश्रित करने की एक विधि
  - CoinJoin का एक प्रकार जो कुछ Exchange प्लेटफ़ॉर्मों के लिए विशिष्ट है
explanation: |
  रिकोषेट एक ऐसी तकनीक है जिसमें स्वयं से कई काल्पनिक लेन-देन करना (स्वीपिंग) शामिल होता है।
reviewed: false