question: रिकोषेट तकनीक का मुख्य लक्ष्य क्या है?
answer: सिक्के के अतीत के निशानों को धुंधला करना
wrong_answers:
  - लेन-देन की संभावित शुरुआत बढ़ाने के लिए
  - किसी लेन-देन की एन्ट्रॉपी बढ़ाने के लिए
  - भविष्य में कम लेनदेन शुल्क का भुगतान करना
explanation: |
  रिकोषेट का लक्ष्य Bitcoin सिक्के के Ownership में परिवर्तन का अनुकरण करना है, ताकि इसके पिछले चिह्नों को धुंधला करके इसकी परिवर्तनशीलता को बहाल किया जा सके।
