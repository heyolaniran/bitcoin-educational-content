question: Koji je glavni cilj tehnike rikošeta?
answer: Da se zamagle tragovi prošlosti novčića
wrong_answers:
  - Da bi se povećala potencijalna anonimnost transakcija
  - Da bi se povećala entropija transakcije
  - Da biste u budućnosti plaćali manje naknade za transakcije
explanation: |
  Cilj rikošeta je simulirati promenu vlasništva Bitcoin novčića kako bi se povratila njegova fungibilnost (zamenjljivost) zamagljivanjem njegovih prošlih oznaka.
reviewed: false
