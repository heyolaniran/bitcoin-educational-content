question: निम्नलिखित उत्तरों में से कौन सा उत्तर CoinJoin परीक्षण से गुजर चुके बिटकॉइन को विनियमित प्लेटफॉर्म पर भेजने पर जोखिम का प्रतिनिधित्व नहीं करता है?
answer: प्लेटफ़ॉर्म लेनदेन शुल्क बढ़ा सकता है
wrong_answers:
  - प्लेटफ़ॉर्म फंड को फ्रीज कर सकता है
  - प्लेटफ़ॉर्म उपयोगकर्ता के खाते को ब्लॉक कर सकता है
  - प्लेटफ़ॉर्म संदिग्ध व्यवहार की सूचना अधिकारियों को दे सकता है
explanation: |
  यदि आप अपना सिक्का किसी विनियमित Exchange प्लेटफ़ॉर्म पर भेजते हैं, लेकिन हाल ही में उस पर CoinJoin का परीक्षण किया गया है, तो प्लेटफ़ॉर्म का चेन विश्लेषण उपकरण इस तथ्य का पता लगा लेगा। हो सकता है कि प्लेटफ़ॉर्म आपके UTXO को स्वीकार करने से मना कर दे, जिस पर CoinJoin का परीक्षण किया गया है, या आपसे स्पष्टीकरण भी मांग सकता है, जिससे आपका खाता निलंबित होने या आपके फंड फ़्रीज़ होने का जोखिम हो सकता है। कुछ मामलों में, प्लेटफ़ॉर्म आपके व्यवहार की रिपोर्ट राज्य अधिकारियों को भी दे सकता है।
reviewed: false