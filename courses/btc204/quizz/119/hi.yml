question: उन्नत रिकोषेट और क्लासिक रिकोषेट के बीच मुख्य अंतर क्या है?
answer: समय के साथ लेन-देन का वितरण
wrong_answers:
  - उपयोग किए गए लेन-देन की संख्या
  - प्रयुक्त Address का प्रकार
  - लेनदेन में आउटपुट की संख्या
explanation: |
  उन्नत रिकोषेट यह सुनिश्चित करता है कि प्रत्येक लेनदेन एक अलग समय पर प्रसारित हो और एक अलग ब्लॉक में दर्ज हो, जबकि क्लासिक रिकोषेट सभी लेनदेन को एक छोटी समय सीमा के भीतर प्रसारित करता है।
reviewed: false