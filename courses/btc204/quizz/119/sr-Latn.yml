question: Koja je glavna razlika između poboljšanog rikošeta i klasičnog rikošeta?
answer: Distribucija transakcija tokom vremena
wrong_answers:
  - Broj korišćenih transakcija
  - Tip adrese koji se koristi
  - Broj izlaza u transakcijama
explanation: |
  Poboljšani rikošet osigurava da se svaka transakcija emituje u različito vreme i zabeleži u različitom bloku, dok klasični rikošet emituje sve transakcije u kratkom vremenskom periodu.
