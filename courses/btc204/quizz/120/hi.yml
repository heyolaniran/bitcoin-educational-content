question: डंडेलियन प्रोटोकॉल में स्टेम चरण कैसे काम करता है?
answer: लेन-देन नोड्स के एक यादृच्छिक पथ के माध्यम से भेजा जाता है।
wrong_answers:
  - लेनदेन को तुरंत स्रोत नोड के सभी साथियों तक प्रसारित कर दिया जाता है।
  - प्रसारण से पहले लेनदेन को अस्थायी रूप से एक केंद्रीय नोड में संग्रहीत किया जाता है।
  - प्रसारण के प्रत्येक चरण में लेनदेन को क्रमिक रूप से एन्क्रिप्ट किया जाता है।
explanation: |
  डंडेलियन पहले स्टेम चरण का उपयोग करता है, जहाँ लेनदेन को नोड्स के यादृच्छिक पथ के माध्यम से भेजा जाता है। फिर लेनदेन को फ़्लफ़ चरण में पूरे नेटवर्क पर प्रसारित किया जाता है।
