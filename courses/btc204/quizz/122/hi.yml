question: P2P ट्रांसपोर्ट V2 नोड्स के बीच संचार की गोपनीयता और सुरक्षा को कैसे बेहतर बनाता है?
answer: अवसरवादी एन्क्रिप्शन को एकीकृत करके
wrong_answers:
  - प्रमाणीकरण को एकीकृत करके
  - अतिरिक्त रिले का उपयोग करके
  - Tor का उपयोग करके
explanation: |
  P2P ट्रांसपोर्ट V2 में नोड्स के बीच संचार की गोपनीयता और सुरक्षा बढ़ाने के लिए अवसरवादी एन्क्रिप्शन का Layer शामिल है।
reviewed: false