question: Bitcoin नोड के लिए Tor का उपयोग करने का मुख्य नुकसान क्या है?
answer: संचार गति में कमी
wrong_answers:
  - लेनदेन शुल्क में वृद्धि
  - लेन-देन सेंसरशिप का जोखिम
  - नोड पर एक्लिप्स हमले का खतरा
explanation: |
  टोर पर संचार धीमा है। यह विलंबता नोड के प्रारंभिक लॉन्च के दौरान विशेष रूप से परेशानी भरा है, क्योंकि IBD (प्रारंभिक ब्लॉक डाउनलोड) के लिए बहुत अधिक संचार की आवश्यकता होती है।
reviewed: false