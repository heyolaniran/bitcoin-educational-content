question: कौन सा विकल्प Bitcoin कोर कॉन्फ़िगरेशन फ़ाइल में P2P ट्रांसपोर्ट V2 को सक्षम या अक्षम करने की अनुमति देता है?
answer: v2ट्रांसपोर्ट=
wrong_answers:
  - p2penable=
  - नेटवर्कv2=
  - enablev2=
explanation: |
  P2P V2 ट्रांसपोर्ट को कोर नोड की कॉन्फ़िगरेशन फ़ाइल में v2transport= विकल्प के साथ संशोधित किया जा सकता है।
