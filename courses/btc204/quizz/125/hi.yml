question: कॉइनस्वैप का मुख्य लक्ष्य क्या है?
answer: गुप्त रूप से बिटकॉइन के Ownership को स्थानांतरित करना
wrong_answers:
  - लेन-देन की गति बढ़ाएँ
  - बिटकॉइन मिलाएं
  - गुप्त रूप से Exchange को Bitcoin के स्थान पर Altcoin बना दिया गया
explanation: |
  कॉइनस्वैप दो उपयोगकर्ताओं के बीच Bitcoin Ownership के हस्तांतरण को सक्षम करने के लिए स्मार्ट अनुबंधों का उपयोग करता है, बिना विश्वास की आवश्यकता के और यह हस्तांतरण Blockchain पर स्पष्ट रूप से दिखाई दिए बिना।
