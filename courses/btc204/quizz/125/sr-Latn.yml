question: Koji je glavni cilj coinswap-a?
answer: Da tajno prenese vlasništvo nad bitkoinima
wrong_answers:
  - Povećanje brzine transakcija
  - Mešanje bitkoina
  - Tajna razmnena altcoina n za Bitcoin
explanation: |
  Coinswap koristi pametne ugovore za omogućavanje prenosa Bitcoin vlaništva između dva korisnika, bez potrebe za poverenjem i bez da ovaj prenos bude eksplicitno vidljiv na Blockchain-u.
