question: विश्वास की आवश्यकता के बिना Exchange की सुरक्षा सुनिश्चित करने के लिए कॉइनस्वैप्स में किस क्रिप्टोग्राफिक विधि का उपयोग किया जा सकता है?
answer: एडाप्टर हस्ताक्षर
wrong_answers:
  - सममित एन्क्रिप्शन
  - ईसीडीएच
  - असममित एन्क्रिप्शन
explanation: |
  कॉइनस्वैप करने के लिए, कोई HTLC या PTLC का उपयोग कर सकता है। ये दोनों प्रोटोकॉल टाइम-लॉक सिस्टम का उपयोग करके समान तरीके से काम करते हैं जो सुनिश्चित करता है कि Exchange या तो सफलतापूर्वक पूरा हो या पूरी तरह से रद्द हो, जो दोनों पक्षों से फंड की अखंडता की रक्षा करता है। HTLC और PTLC के बीच मुख्य अंतर यह है कि HTLC लेनदेन को सुरक्षित करने के लिए हैश और प्रीइमेज का उपयोग करते हैं, जबकि PTLC एडेप्टर सिग्नेचर का उपयोग करते हैं।
reviewed: false