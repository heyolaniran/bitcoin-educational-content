question: गोपनीयता के संदर्भ में कॉइनस्वैप्स और एटोमिक स्वैप्स का प्रमुख दोष क्या है?
answer: वे विनिमय किये गये सिक्कों का इतिहास नहीं तोड़ते
wrong_answers:
  - वे लेनदेन शुल्क के मामले में बहुत महंगे हैं
  - उन्हें पार्टियों के बीच व्यक्तिगत जानकारी के Exchange की आवश्यकता होती है
  - वे Exchange प्लेटफार्मों द्वारा विश्लेषण के अधीन हो सकते हैं
explanation: |
  इन तरीकों का मुख्य नुकसान यह है कि सिक्के के इतिहास को तोड़ने के लिए अतिरिक्त तकनीक के उपयोग के बिना वे बहुत जोखिम भरे हैं।
reviewed: false