question: गुप्त गुण Exchange में Smart contract की क्या उपयोगिता है?
answer: एक साथ और व्यवस्थित रूप से जानकारी प्रकट करना जिससे दोनों पक्ष एक दूसरे के धन को पुनः प्राप्त कर सकें।
wrong_answers:
  - संपत्ति की जानकारी को एन्क्रिप्ट करके गोपनीयता सुनिश्चित करें ताकि केवल वैध प्राप्तकर्ता ही इसे डिक्रिप्ट कर सके।
  - मानवीय अंतःक्रिया को न्यूनतम करने तथा त्रुटियों को कम करने के लिए स्थानांतरण प्रक्रिया को स्वचालित बनाएं।
  - धोखाधड़ी के प्रयासों के मामले में दोनों पक्षों के बिटकॉइन को अपने पास रखकर विवाद समाधान की सुविधा प्रदान करना।
explanation: |
  एक दूसरे पर भरोसा न करने वाले पक्षों के बीच आदान-प्रदान को सक्षम करने के लिए, Smart contract सिस्टम का उपयोग किया जाता है। Smart contract एक ऐसा प्रोग्राम है जो पूर्वनिर्धारित शर्तों के पूरा होने पर स्वचालित रूप से निष्पादित होता है, जो हमारे मामले में यह सुनिश्चित करता है कि संपत्ति Exchange आपसी विश्वास की आवश्यकता के बिना स्वचालित रूप से निष्पादित हो। Smart contract प्रतिभागियों के बीच सूचनाओं के दो संवेदनशील टुकड़ों के एक साथ प्रकटीकरण की अनुमति देता है। या तो यह सामान्य रूप से निष्पादित होता है, और प्रत्येक पक्ष दूसरे के धन को पुनः प्राप्त करता है, या यह विफल हो जाता है, और हर कोई अपने मूल धन को रखता है।
