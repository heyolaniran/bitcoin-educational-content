question: Koja je korisnost pametnih ugovora u tajnoj razmeni vlasništva?
answer: Da se istovremeno i sistematski otkrije informacija koja omogućava obe strane da povrate sredstva one druge.
wrong_answers:
  - Osiguravaju poverljivost šifrovanjem informacija o sredstvu tako da ih samo legitimni primalac može dešifrovati.
  - Automatizuje proces prenosa kako bi se minimizirale ljudske interakcije i smanjili greške.
  - Olakšavaju rešavanje sporova držanjem bitkoina obe strane u slučaju pokušaja varanja.
explanation: |
  Da bi se omogućile razmene između strana koje ne veruju jedna drugoj, koriste se sistemi pametnih ugovora. Pametni ugovor je program koji se automatski izvršava kada su ispunjeni unapred definisani uslovi, što, u našem slučaju, osigurava da se svojstvo razmene sprovede automatski bez potrebe za međusobnim poverenjem. Pametni ugovor omogućava simultano otkrivanje dve osetljive informacije između učesnika. Ili se izvršava normalno, i svaka strana preuzima sredstva druge strane, ili ne uspeva, i svi zadržavaju svoja originalna sredstva.
