question: कॉइनस्वैप्स में उपयोग किए जाने वाले स्मार्ट कॉन्ट्रैक्ट के दो मुख्य प्रकार क्या हैं?
answer: HTLC और PTLC
wrong_answers:
  - बहु-हस्ताक्षर और एकल-हस्ताक्षर
  - स्मार्ट कॉन्ट्रैक्ट्स और DApps
  - जीडब्ल्यू-2 और जीडब्ल्यू-1
explanation: |
  कॉइनस्वैप को निष्पादित करने के लिए, कोई HTLCs (Hash टाइम-लॉक्ड कॉन्ट्रैक्ट्स) या PTLCs (पॉइंट टाइम-लॉक्ड कॉन्ट्रैक्ट्स) का उपयोग कर सकता है।
reviewed: false