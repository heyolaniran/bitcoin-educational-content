question: ویژگی ضروری مهرهای یکبار مصرف استفاده شده در RGB چیست؟
answer: آنها فقط یک بار می‌توانند بسته شوند
wrong_answers:
  - آنها فقط می‌توانند دو بار بسته شوند
  - آن‌ها محرمانگی تراکنش‌ها را تضمین می‌کنند
  - آنها نیاز به اجماع در مورد Blockchain را از بین می‌برند.
explanation: |
  مهرهای یکبار مصرف امکان ایجاد تعهدات رمزنگاری منحصر به فرد را فراهم می‌کنند و از تکرار یا دوبار خرج کردن جلوگیری می‌کنند.
