question: در سه‌گانه CAP، مبادله بین اعتبارسنجی سمت مشتری و دسترسی‌پذیری چیست؟
answer: هر شرکت‌کننده باید داده‌های مربوطه را به صورت محلی نگه دارد.
wrong_answers:
  - داده‌ها عمومی هستند و به‌طور خودکار در سراسر جهان تکرار می‌شوند.
  - ثبات فدای دسترسی شد
  - انتقالات حالت همیشه بر روی Lightning منتشر می‌شوند.
explanation: |
  در Client-side Validation، دسترسی جهانی تضمین نمی‌شود، زیرا شرکت‌کنندگان باید داده‌های خود را مدیریت کنند.
reviewed: false