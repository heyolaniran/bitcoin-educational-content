question: پیامد از دست دادن Stash در پروتکل RGB چیست؟
answer: تاریخچه و داده‌های مرتبط با Contract غیرقابل بازیابی می‌شوند.
wrong_answers:
  - داده‌ها می‌توانند از Blockchain بازسازی شوند اگر seed را داشته باشید.
  - یک نسخه از داده‌ها بر روی سرورهای RGB در سوئیس موجود است.
  - داده‌ها به‌طور خودکار برای همه شرکت‌کنندگان تکرار می‌شود.
explanation: |
  در Client-side Validation، هر کاربر مسئول Stash خود است که در جای دیگری تکرار نمی‌شود و از دست دادن آن قطعی است.
reviewed: false