question: RGB چگونه مقیاس‌پذیری را در مقایسه با Blockchain سنتی بهبود می‌بخشد؟
answer: با محدود کردن ذخیره‌سازی و اعتبارسنجی به انتقالات حالت مرتبط فقط
wrong_answers:
  - با افزایش مجازی اندازه بلوک‌های Bitcoin
  - با اتصال هر Contract به‌طور مستقیم به تمام UTXOها
  - با متمرکز کردن داده‌های Contract بر روی چند سرور مرکزی
explanation: |
  ‏RGB با حفظ تنها داده‌های مرتبط با هر شرکت‌کننده، نیازهای ذخیره‌سازی و اعتبارسنجی را کاهش می‌دهد.
reviewed: false