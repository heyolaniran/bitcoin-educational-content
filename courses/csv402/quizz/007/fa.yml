question: RGB چگونه دید خود را به حداقل می‌رساند؟
answer: Taproot (Tapret)
wrong_answers:
  - OP_RETURN (Opret)
  - تغییر سیگ
  - تغییر کلیدی
explanation: |
  Taproot (Tapret) این امکان را فراهم می‌کند که تعهدات به صورت محرمانه و کارآمد در یک تراکنش وارد شوند، در حالی که سازگاری با استانداردهای فعلی را تضمین می‌کند.
reviewed: false