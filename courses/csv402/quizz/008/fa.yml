question: هدف اصلی تعهدات تعیین‌کننده Bitcoin چیست؟
answer: اطمینان حاصل کنید که یک Commitment در یک تراکنش وارد شده است.
wrong_answers:
  - ساده‌سازی ساختار تراکنش‌های Bitcoin
  - کاهش هزینه‌های تراکنش RGB
  - بهینه‌سازی تولید چندامضایی RGB
explanation: |
  تعهدات قطعی Bitcoin تضمین می‌کنند که یک Commitment به‌صورت منفرد در یک تراکنش وارد شود تا از تعهدات رقابتی پنهان جلوگیری شود.
reviewed: false