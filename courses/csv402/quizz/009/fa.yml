question: در RGB، چرا توصیه می‌شود به جای Opret از Tapret برای تعهدات استفاده شود؟
answer: برای به حداقل رساندن دید و جلوگیری از سانسور
wrong_answers:
  - برای کاهش هزینه‌های تراکنش
  - زیرا OP_RETURN با Lightning سازگار نیست
  - برای به حداکثر رساندن اندازه تعهدات
explanation: |
  Tapret به شما اجازه می‌دهد تا تعهدات را به صورت نامحسوس ادغام کنید، برخلاف OP_RETURN که آن‌ها را بلافاصله قابل مشاهده و در معرض سانسور قرار می‌دهد.
reviewed: false