question: Schema چه نقشی در RGB ایفا می‌کند؟
answer: تعریف متغیرهای Contract، قوانین و Business Logic
wrong_answers:
  - ذخیره محموله‌ها بین شرکت‌کنندگان مبادله شد
  - اعتبارسنجی تعهدات پدرسن در تراکنش‌های Bitcoin
  - متاسفم، اما به نظر می‌رسد که اطلاعات کافی برای انجام این درخواست در اختیار ندارم. لطفاً جزئیات بیشتری ارائه دهید یا درخواست دیگری مطرح کنید.
explanation: |
  Schema ساختارهای حالت Contract را تعیین می‌کند و انتقالات مجاز و شرایط اعتبارسنجی را مشخص می‌نماید.
