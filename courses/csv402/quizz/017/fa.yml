question: چه ساختاری تضمین‌کننده‌ی سازگاری زمانی انتقال‌ها در RGB است؟
answer: یک DAG (Directed Acyclic Graph)
wrong_answers:
  - یک زنجیره خطی ساده
  - یک شبکه نظیر به نظیر پویا
  - درخت دودویی برای UTXOها
explanation: |
  یک DAG انتقالات حالت را به صورت ساختاریافته ممکن می‌سازد، در حالی که تکامل‌های موازی بدون ناسازگاری را نیز مجاز می‌کند.
reviewed: false