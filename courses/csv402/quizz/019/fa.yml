question: هدف اصلی قراردادهای هوشمند در محیط RGB چیست؟
answer: اجرای معاملات خودکار Bitcoin بدون یک رجیستری متمرکز
wrong_answers:
  - تسهیل ایجاد رجیستری‌های متمرکز Bitcoin
  - یک Interface عمومی برای تمام تراکنش‌های Bitcoin ارائه دهید
  - ساده‌سازی اجرای توکن‌های ERC-20 بر روی Bitcoin
explanation: |
  قراردادهای هوشمند RGB امکان خودکارسازی توافق‌نامه‌ها را فراهم می‌کنند و در عین حال از استفاده از ثبت‌های متمرکز اجتناب می‌کنند و به Bitcoin برای لنگرهای رمزنگاری متکی هستند.
reviewed: false