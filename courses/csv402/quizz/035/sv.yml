question: Hur installerar jag RGB-verktyget via Cargo?
answer: cargo install RGB-contracts --all-features
wrong_answers:
  - cargo install RGB --features alla
  - cargo install RGB-Bitcoin --all
  - cargo build RGB-lightning --release
explanation: |
  Installationen utförs med kommandot "cargo install RGB-contracts --all-features", där lådan får namnet "RGB-contracts", som installerar RGB-verktyget.
reviewed: false