question: نقش Stash چیست؟
answer: تمام داده‌های سمت کلاینت را به‌صورت محلی نگه‌دارید.
wrong_answers:
  - به‌طور خودکار تراکنش‌ها را بر روی Blockchain منتشر کنید.
  - گردآوری و ذخیره‌سازی تمامی فاکتورهای تولید شده
  - مدیریت کلیدهای خصوصی Bitcoin
explanation: |
  Stash مجموعه‌ای از داده‌های سمت کاربر است که یک کاربر به صورت محلی برای یک یا چند قرارداد RGB ذخیره می‌کند تا Client-side Validation را انجام دهد.
