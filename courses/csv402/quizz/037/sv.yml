question: Hur importerar jag "NonInflatableAsset.RGB" Schema till den lokala Stash?
answer: RGB import schema/NonInflatableAssets.RGB
wrong_answers:
  - RGB import Schema/NonInflatableAssets.RGB
  - RGB klon schemata/Non-InflatableAssets.RGB
  - RGB klon Schema/Non-inflatableAssets.RGB
explanation: |
