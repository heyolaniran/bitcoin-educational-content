question: در فایل YAML که برای صدور یک دارایی استفاده می‌شود، کدام فیلد تعداد کل توکن‌های صادر شده را تعریف می‌کند؟
answer: عرضه‌شده
wrong_answers:
  - مالک‌دارایی
  - مشخصات
  - مقدار
explanation: |
  فیلد "issuedSupply" در فایل YAML مقدار کل توکن‌های صادر شده برای Contract را تعریف می‌کند.
