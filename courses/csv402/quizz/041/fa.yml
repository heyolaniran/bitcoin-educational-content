question: چه Elements برای ایجاد یک کانال Lightning که دارایی‌های RGB را حمل می‌کند، مورد نیاز است؟
answer: تأمین مالی با بیت‌کوین و تأمین مالی با دارایی‌های RGB
wrong_answers:
  - Bitcoin-فقط تأمین مالی برای شروع
  - RGB-فقط تأمین مالی برای شروع
  - نیازی به تأمین مالی نیست
explanation: |
  کانال نیاز به تأمین مالی Bitcoin بر روی 2/2 Multisig دارد، همچنین تأمین مالی دارایی RGB برای تخصیص دارایی‌ها در همان کانال لازم است.
reviewed: false