question: در صورت پرداخت در کانال RGB، چه اتفاقی برای خروجی‌های RGB در تراکنش‌های Commitment می‌افتد؟
answer: آن‌ها به‌روزرسانی شده‌اند تا بازتوزیع دارایی‌ها در میان شرکت‌کنندگان را منعکس کنند.
wrong_answers:
  - آن‌ها بدون تغییر باقی می‌مانند تا تاریخ اولیه حفظ شود تا زمانی که کانال بسته شود.
  - آنها حذف شده و با multi-sig جدید جایگزین می‌شوند.
  - آنها به UTXOهای کلاسیک Bitcoin تبدیل می‌شوند
explanation: |
  هنگامی که یک پرداخت انجام می‌شود، RGB State Transition خروجی‌های RGB را تنظیم می‌کند تا دارایی‌ها را بر اساس تراز جدید کانال توزیع مجدد کند.
reviewed: false