question: چگونه ایمنی یک انتقال RGB در یک کانال Lightning تضمین می‌شود اگر یک وضعیت منسوخ پخش شود؟
answer: از طریق مکانیک‌های تنبیهی کانال لایتنینگ
wrong_answers:
  - با لغو خودکار تمام تراکنش‌های قبلی
  - از طریق مکانیک‌های تنبیهی پروتکل RGB
  - از طریق مداخله صادرکننده دارایی RGB از طریق امضای آن مرتبط با Genesis
explanation: |
  مکانیزم تنبیهی کلاسیک Lightning Network تضمین می‌کند که انتشار یک وضعیت قدیمی می‌تواند با بازیابی تمام وجوه درگیر، از جمله دارایی‌های RGB، مجازات شود.
reviewed: false