question: کدام استاندارد RGB به شما اجازه می‌دهد دارایی‌های منحصر به فرد یا "NFT" ایجاد کنید؟
answer: RGB21
wrong_answers:
  - RGB20
  - RGB25
  - RGB30
explanation: |
  استاندارد RGB21 برای مدیریت دارایی‌های منحصر به فرد طراحی شده است و امکان اتصال فراداده‌های خصوصی به NFTها را فراهم می‌کند.
reviewed: false