question: چگونه RGB راه را برای DEX Layer-2 هموار می‌کند؟
answer: با فعال‌سازی دارایی‌های off-chain از طریق کانال‌های Lightning و مبادلات اتمی Exchange
wrong_answers:
  - با فعال‌سازی استفاده از یک Exchange متمرکز برای تمامی تراکنش‌های RGB
  - با فعال‌سازی Exchange دارایی‌ها از طریق قراردادهای هوشمند On-Chain
  - با فعال‌سازی دارایی Exchange بین Blockchain از طریق مبادلات اتمی
explanation: |
  قابلیت انجام مبادلات اتمی و تبادلات از طریق کانال‌های لایتنینگ امکان ایجاد DEXهای غیرمتمرکز را فراهم می‌کند، بدون معایب مبادلات On-Chain.
reviewed: false