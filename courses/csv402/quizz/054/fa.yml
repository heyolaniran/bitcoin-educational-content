question: RGBlib در اکوسیستم RGB چیست؟
answer: کتابخانه‌ای برای ایجاد برنامه‌هایی که دارایی‌های RGB را مدیریت می‌کنند
wrong_answers:
  - یک Wallet اندروید اختصاص داده شده به مدیریت دارایی RGB
  - یک مشتری جایگزین برای پروتکل RGB
  - یک وب‌سایت برای نمایش RGB NFTها
explanation: |
  RGBlib یک Interface ساده‌شده برای توسعه‌دهندگان ارائه می‌دهد که به آن‌ها امکان می‌دهد انتشار، انتقال و اعتبارسنجی دارایی‌های RGB را بدون نیاز به تسلط بر تمام جزئیات فنی مدیریت کنند.
reviewed: false