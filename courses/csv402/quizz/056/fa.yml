question: اجزای اصلی مورد نیاز برای اجرای یک نود لایتنینگ سازگار با RGB چیست؟
answer: یک bitcoind، یک ایندکسر و یک سرور پروکسی RGB
wrong_answers:
  - یک نود لایتنینگ، یک ایندکسر و یک سرور IPFS
  - یک RGB موبایل Wallet، یک سرور پروکسی RGB و یک bitcoind
  - مشتری وب، ایندکسر و سرور پروکسی RGB
explanation: |
  برای اجرای یک نود لایتنینگ با قابلیت RGB، شما به یک نود bitcoind نیاز دارید تا با Bitcoin Blockchain تعامل داشته باشد، یک ایندکسر برای استخراج تراکنش‌های On-Chain، و یک سرور پروکسی RGB برای تسهیل Exchange محموله‌ها بین همتایان.
reviewed: false