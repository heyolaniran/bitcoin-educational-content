question: RLN पर "curl -X POST /issueassetnia" क्या कर सकता है?
answer: एक नई प्रतिरूप्य, गैर-मुद्रास्फीतिकारी RGB परिसंपत्ति बनाएं
wrong_answers:
  - एक नई गैर-परिवर्तनीय RGB परिसंपत्ति बनाएं
  - एक नई प्रतिस्थायी मुद्रास्फीतिकारी RGB परिसंपत्ति बनाएं
  - एक नई अर्ध-परिवर्तनीय RGB परिसंपत्ति बनाएं
explanation: |
  "/issueassetnia" कमांड का उपयोग एक नया RGB NIA ("नॉन इन्फ्लेटेबल एसेट") token जारी करने के लिए किया जाता है।
reviewed: false