question: عملکرد سرور پروکسی RGB در محیط نود RGB Lightning چیست؟
answer: تسهیل محموله‌های Exchange از RGB
wrong_answers:
  - کلیدهای عمومی برای نودها جهت باز کردن کانال‌ها را فراهم کنید.
  - تاریخچه انتقالات حالت RGB را نگه دارید
  - از نمادهای تکراری برای توکن‌های RGB اجتناب کنید
explanation: |
  سرور پروکسی RGB ارتباط محموله‌های RGB بین شرکت‌کنندگان Lightning را با عمل به عنوان یک واسطه ساده می‌کند و تجربه کاربری روان‌تری را نزدیک به آنچه در حال حاضر با Bitcoin و Lightning تجربه می‌شود، فراهم می‌آورد.
