question: عملکرد اصلی یک تابع Hash چیست؟
answer: اطلاعات با طول دلخواه را به یک اثر انگشت با اندازه ثابت تبدیل می‌کند
wrong_answers:
  - پیام‌ها را رمزگذاری می‌کند تا غیرقابل خواندن شوند
  - این فقط برای تأیید یکپارچگی نرم‌افزار Bitcoin استفاده می‌شود.
  - کلیدهای خصوصی برای کیف‌پول‌های Bitcoin تولید می‌کند
explanation: |
  یک تابع Hash داده‌هایی با هر اندازه را به یک Hash با اندازه ثابت تبدیل می‌کند که برای بسیاری از کاربردها در Bitcoin حیاتی است.
reviewed: false