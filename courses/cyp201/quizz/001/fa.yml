question: کدام ویژگی تضمین می‌کند که بازیابی ورودی یک Hash از نظر محاسباتی غیرممکن است؟
answer: مقاومت در برابر پیش‌تصویر
wrong_answers:
  - مقاومت در برابر برخورد
  - اثر بهمن
  - مقاومت در برابر تصویر دوم
explanation: |
  مقاومت پیش‌تصویر تضمین می‌کند که یافتن پیام اصلی از Hash آن عملاً غیرممکن است.
reviewed: false