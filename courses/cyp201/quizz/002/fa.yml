question: کدام ویژگی توابع Hash با تغییر کامل در Hash هنگامی که یک پیام کمی تغییر می‌کند، نشان داده می‌شود؟
answer: اثر بهمن
wrong_answers:
  - مقاومت در برابر برخورد
  - مقاومت در برابر تصویر دوم
  - طول
explanation: |
  تغییر کوچکی در ورودی منجر به تغییر اساسی در Hash می‌شود، این همان چیزی است که به اثر بهمن معروف است.
reviewed: false