question: چرا برگشت‌ناپذیری در SHA256 تضمین شده است؟
answer: عملیات استفاده شده اطلاعات را حذف می‌کنند و یک‌طرفه هستند.
wrong_answers:
  - پیام‌ها قبل از هش کردن رمزگذاری می‌شوند
  - بیت‌ها به‌طور تصادفی دوباره مرتب می‌شوند
  - هر Hash در یک پایگاه داده ذخیره می‌شود
explanation: |
  عملیاتی مانند ShR و XOR بازگشت به حالت اولیه را غیرممکن می‌سازند و برگشت‌ناپذیری را تضمین می‌کنند.
reviewed: false