question: در هر دور فشرده‌سازی در SHA256 چه اتفاقی می‌افتد؟
answer: متغیرهای حالت از کلمات پیام و ثابت‌ها به‌روزرسانی می‌شوند
wrong_answers:
  - Hash نهایی به‌طور پیوسته پس از هر دور تولید می‌شود.
  - بیت‌های پیام دوباره مرتب شده‌اند
  - مقادیر اولیه متغیرها بدون تغییر باقی می‌مانند
explanation: |
  هر دور متغیرهای حالت را با استفاده از کلمات، ثابت‌ها و عملیات منطقی تغییر می‌دهد تا اطلاعات را گسترش دهد.
reviewed: false