question: SHA256 में प्रत्येक संपीड़न दौर के दौरान क्या होता है?
answer: राज्य चर को संदेश शब्दों और स्थिरांकों से अद्यतन किया जाता है
wrong_answers:
  - अंतिम Hash प्रत्येक दौर के बाद क्रमिक रूप से उत्पन्न होता है
  - संदेश के अंश पुनः व्यवस्थित किये गये हैं
  - चरों के प्रारंभिक मान अपरिवर्तित रहते हैं
explanation: |
  प्रत्येक चरण में सूचना को फैलाने के लिए शब्दों, स्थिरांकों और तार्किक संक्रियाओं का उपयोग करके राज्य चरों को संशोधित किया जाता है।
reviewed: false