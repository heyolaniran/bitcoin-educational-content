question: تفاوت اصلی بین عملیات ShR و RotR چیست؟
answer: ShR بیت‌ها را با اضافه کردن صفرها جابجا می‌کند، RotR بیت‌های جابجا شده را دوباره وارد می‌کند
wrong_answers:
  - ShR بیت‌های جابجا شده را حذف می‌کند، RotR مقدار آن‌ها را ضرب می‌کند
  - ShR به چپ منتقل می‌شود، RotR به راست منتقل می‌شود
  - ShR یک عملیات منطقی است، RotR حسابی است
explanation: |
  ShR بیت‌ها را با افزودن صفر به راست منتقل می‌کند، در حالی که RotR یک چرخش دایره‌ای از بیت‌ها انجام می‌دهد.
reviewed: false