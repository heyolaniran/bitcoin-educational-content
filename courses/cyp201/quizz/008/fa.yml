question: چرا SHA256 پیش‌پردازشی را به پیام ورودی اعمال می‌کند؟
answer: برای اطمینان از طولی که مضربی از ۵۱۲ بیت باشد
wrong_answers:
  - برای تأیید صحت پیام
  - برای رمزگذاری داده‌ها قبل از هش کردن
  - برای افزایش اندازه هش‌های تولید شده
explanation: |
  پیش‌پردازش با افزودن بیت‌های پدینگ و یک نمایش باینری از طول آن، طول پیام را تنظیم می‌کند.
reviewed: false