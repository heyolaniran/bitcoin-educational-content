question: ساختار مورد استفاده توسط SHA256 برای پردازش پیام‌های با طول دلخواه چیست؟
answer: ساختار مرکل-دامگارد
wrong_answers:
  - ساخت اقلیدسی
  - ساختار ریوت-شامیر-آدلمن
  - ساختار نات-موریس-پرت
explanation: |
  ساختار مرکل-دامگارد امکان تبدیل یک تابع فشرده‌سازی به یک تابع Hash برای پیام‌های با طول متغیر را فراهم می‌کند.
reviewed: false