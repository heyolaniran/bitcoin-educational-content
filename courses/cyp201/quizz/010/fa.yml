question: کدام الگوریتم مشتق‌گیری برای محاسبه یک کد احراز هویت بر اساس یک کلید مخفی استفاده می‌شود؟
answer: HMAC-SHA512
wrong_answers:
  - SHA512
  - SHA256
  - RIPEMD160
explanation: |
  HMAC-SHA512 یک الگوریتم است که یک تابع Hash و یک کلید مخفی را برای محاسبه یک کد احراز هویت ترکیب می‌کند.
reviewed: false