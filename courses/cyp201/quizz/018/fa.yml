question: چرا منحنی بیضوی secp256r1 در Bitcoin استفاده نشد؟
answer: به‌طور بالقوه برای جلوگیری از یک درب پشتی
wrong_answers:
  - زیرا خیلی کند است
  - زیرا استاندارد نشده است
  - زیرا به سخت‌افزار تخصصی نیاز دارد
explanation: |
  Satoshi ناکاموتو احتمالاً منحنی secp256k1 را ترجیح داده است، زیرا پارامترهای secp256r1 ممکن است حاوی یک آسیب‌پذیری پنهان باشند.
reviewed: false