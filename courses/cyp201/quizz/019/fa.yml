question: چه عملیاتی ریاضی پایه امنیت رمزنگاری منحنی بیضوی است؟
answer: مسئله لگاریتم گسسته
wrong_answers:
  - تجزیه عدد به عوامل اول
  - محاسبه باقی‌مانده‌های درجه دوم
  - مسئله مکعب گسسته
explanation: |
  امنیت رمزنگاری منحنی بیضوی بر اساس دشواری حل مسئله لگاریتم گسسته بر روی این منحنی‌ها استوار است.
reviewed: false