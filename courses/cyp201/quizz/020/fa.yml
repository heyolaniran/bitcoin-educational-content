question: تفاوت بین کلید عمومی فشرده و غیر فشرده چیست؟
answer: کلید عمومی فشرده فقط از مختصات x و زوجیت y استفاده می‌کند.
wrong_answers:
  - کلید عمومی فشرده امن‌تر است
  - کلید عمومی فشرده تنها از مختصات y و زوجیت x استفاده می‌کند.
  - کلید عمومی فشرده به یک کلید خصوصی بزرگ‌تر نیاز دارد
explanation: |
  یک کلید عمومی فشرده تنها مختصات x و یک بیت برای زوجیت y را حفظ می‌کند و بدین ترتیب اندازه آن به ۳۳ بایت کاهش می‌یابد.
reviewed: false