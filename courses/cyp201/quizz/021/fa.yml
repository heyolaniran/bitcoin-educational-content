question: ویژگی اصلی ضرب اسکالر در منحنی‌های بیضوی چیست؟
answer: تابع یک‌طرفه
wrong_answers:
  - به‌راحتی قابل برگشت
  - بر اساس تجزیه به عوامل اعداد اول
  - محاسبه آن بسیار طولانی است
explanation: |
  ضرب اسکالر در منحنی‌های بیضوی یک تابع یک‌طرفه است که بازیابی کلید خصوصی از کلید عمومی را غیرممکن می‌سازد.
reviewed: false