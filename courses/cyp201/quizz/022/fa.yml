question: کلید عمومی چگونه از یک کلید خصوصی محاسبه می‌شود؟
answer: با استفاده از ضرب اسکالر بر روی منحنی بیضوی
wrong_answers:
  - با اعمال یک Hash بر روی کلید خصوصی
  - از طریق رمزنگاری نامتقارن
  - با افزودن مکرر مقادیر عددی
explanation: |
  کلید عمومی با ضرب اسکالر کلید خصوصی در نقطه مولد G روی منحنی بیضوی به دست می‌آید.
reviewed: false