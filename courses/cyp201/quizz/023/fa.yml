question: نقطه مشترکی که توسط همه شرکت‌کنندگان برای محاسبه کلید عمومی در Bitcoin استفاده می‌شود چیست؟
answer: نقطه مولد G
wrong_answers:
  - SHA256 Hash
  - یک عبارت Mnemonic
  - کلید عمومی فشرده شده
explanation: |
  نقطه ژنراتور G از منحنی بیضوی secp256k1 برای محاسبه کلیدهای عمومی از کلیدهای خصوصی استفاده می‌شود.
reviewed: false