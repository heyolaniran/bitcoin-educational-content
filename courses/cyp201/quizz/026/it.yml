question: Qual è il primo passo nel calcolo di una firma ECDSA?
answer: L'hash del messaggio
wrong_answers:
  - La chiave pubblica
  - Un nonce fisso
  - Una curva ellittica personalizzata
explanation: |
  La generazione di una firma ECDSA inizia con il calcolo dell'hash del messaggio da firmare, spesso eseguito utilizzando SHA256.
reviewed: false
