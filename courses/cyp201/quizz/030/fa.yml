question: هدف SIGHASH_SINGLE چیست؟
answer: برای پوشش یک ورودی و خروجی مربوطه آن
wrong_answers:
  - برای پوشش دادن تمام ورودی‌ها و خروجی‌ها
  - برای پوشش دادن فقط ورودی‌ها
  - برای پوشش دادن به همه خروجی‌ها به جز یکی
explanation: |
  SIGHASH_SINGLE یک ورودی و یک خروجی مربوط به شاخص ورودی امضا شده را پوشش می‌دهد و بقیه را قابل تغییر باقی می‌گذارد.
