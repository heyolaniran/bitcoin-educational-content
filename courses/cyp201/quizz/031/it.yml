question: Qual è il modificatore che può essere combinato con i flag sighash di base?
answer: SIGHASH_ANYONECANPAY
wrong_answers:
  - SIGHASH_NOOUTPUT
  - SIGHASH_ALLPARTICIPANTS
  - SIGHASH_NONSTANDARD
explanation: |
  SIGHASH_ANYONECANPAY modifica i flag sighash per coprire un singolo input, lasciando modificabili gli altri.
