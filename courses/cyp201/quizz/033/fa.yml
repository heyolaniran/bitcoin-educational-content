question: پرچم sighash SIGHASH_NONE چه چیزی را مجاز می‌داند؟
answer: تغییر خروجی‌ها پس از امضا
wrong_answers:
  - تغییر ورودی‌ها پس از امضا
  - پوشش دادن تمام ورودی‌ها و خروجی‌ها
  - محدود کردن تغییرات به تنها یک خروجی
explanation: |
  SIGHASH_NONE فقط ورودی‌ها را پوشش می‌دهد و خروجی‌ها را پس از امضا قابل تغییر باقی می‌گذارد.
