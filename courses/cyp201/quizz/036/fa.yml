question: یک HD Wallet چه کاری را به شما اجازه می‌دهد که یک JBOK Wallet نمی‌دهد؟
answer: generate تمام کلیدهای خصوصی از یک seed
wrong_answers:
  - افزایش امنیت امضاهای دیجیتال
  - استفاده مجدد از Address برای چندین تراکنش
  - کاملاً از استفاده از کلیدهای عمومی اجتناب کنید
explanation: |
  کیف پول‌های HD تمام کلیدهای خصوصی را از یک seed منحصر به فرد استخراج می‌کنند که پشتیبان‌گیری را ساده کرده و به‌طور غیرمستقیم حریم خصوصی را بهبود می‌بخشد.
reviewed: false