question: JBOK Wallet की तुलना में HD Wallet आपको क्या करने की अनुमति देता है?
answer: generate सभी निजी कुंजियाँ एक ही seed से
wrong_answers:
  - डिजिटल हस्ताक्षरों की सुरक्षा बढ़ाएँ
  - एकाधिक लेनदेन के लिए उसी Address का पुनः उपयोग करें
  - सार्वजनिक कुंजियों के उपयोग से पूरी तरह बचें
explanation: |
  एचडी वॉलेट सभी निजी कुंजियों को एक अद्वितीय seed से प्राप्त करते हैं, जो बैकअप को सरल बनाता है और अप्रत्यक्ष रूप से गोपनीयता में सुधार करता है।
reviewed: false