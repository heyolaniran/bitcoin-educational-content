question: محدودیت اصلی کیف‌پول‌های JBOK چیست؟
answer: آن‌ها به یک پشتیبان مستقل برای هر کلید خصوصی نیاز دارند.
wrong_answers:
  - آن‌ها اجازه تولید آدرس‌های جدید را نمی‌دهند
  - آنها با امضاهای دیجیتال ناسازگار هستند
  - آن‌ها از کلیدهای عمومی بدون فشرده‌سازی استفاده می‌کنند
explanation: |
  کیف‌پول‌های JBOK کاربر را مجبور می‌کنند تا هر کلید خصوصی را به‌صورت جداگانه پشتیبان‌گیری کند که مدیریت آن‌ها را پیچیده می‌کند.
reviewed: false