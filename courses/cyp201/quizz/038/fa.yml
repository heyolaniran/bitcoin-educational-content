question: چرا استفاده مجدد از Bitcoin Address توصیه نمی‌شود؟
answer: این امر ردیابی تراکنش‌ها توسط اشخاص ثالث را تسهیل می‌کند.
wrong_answers:
  - این به دلیل Nonce کلید خصوصی را فاش می‌کند.
  - این معاملات را گران‌تر می‌کند
  - امضاهای دیجیتال را باطل می‌کند
explanation: |
  استفاده مجدد از یک Address به ناظران اجازه می‌دهد تا به راحتی تراکنش‌های مختلف را به همان کاربر مرتبط کنند و حریم خصوصی آن‌ها را به خطر بیندازند.
reviewed: false