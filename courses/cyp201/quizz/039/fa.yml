question: نقش اصلی یک Bitcoin Wallet چیست؟
answer: مدیریت و ایمن‌سازی کلیدهای خصوصی
wrong_answers:
  - بیت‌کوین‌های کاربر را ذخیره کنید
  - اطمینان از محرمانگی تراکنش‌ها به‌صورت خودکار
  - generate بیت‌کوین برای هر کاربر
explanation: |
  یک Bitcoin Wallet به طور مستقیم بیت‌کوین‌ها را ذخیره نمی‌کند، بلکه کلیدهای خصوصی لازم برای باز کردن UTXOهایی که نمایانگر بیت‌کوین‌ها هستند را مدیریت می‌کند.
reviewed: false