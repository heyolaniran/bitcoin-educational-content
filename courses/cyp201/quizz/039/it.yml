question: Qual è il ruolo principale di un wallet Bitcoin?
answer: Gestire e proteggere le chiavi private
wrong_answers:
  - Conservare i bitcoin dell'utente
  - Garantire automaticamente la riservatezza delle transazioni
  - Generare bitcoin per ogni utente
explanation: |
  Un wallet Bitcoin non conserva direttamente i fondi, ma gestisce le chiavi private necessarie per sbloccare gli UTXO che rappresentano i bitcoin.
