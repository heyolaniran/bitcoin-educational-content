question: چرا تولید دستی generate انتروپی برای یک HD Wallet خطرناک است؟
answer: می‌تواند ضعف‌های انسانی یا تعصبات قابل پیش‌بینی را معرفی کند
wrong_answers:
  - این منجر به کلیدهای عمومی نامعتبر می‌شود
  - این مانع از استخراج کلیدهای خصوصی می‌شود
  - اندازه عبارات Mnemonic تولید شده را محدود می‌کند.
explanation: |
  تولید دستی آنتروپی می‌تواند سوگیری‌ها یا خطاهایی را وارد کند و کلیدها را در برابر حملات آسیب‌پذیرتر کند.
