question: خطر اصلی استفاده از یک PRNG ضعیف طراحی شده برای generate انتروپی چیست؟
answer: کلیدهای خصوصی ممکن است توسط یک مهاجم حدس زده شوند
wrong_answers:
  - عبارت Mnemonic ممکن است حاوی کلمات نادرست باشد
  - امضاهای دیجیتال نامعتبر خواهند شد
  - آدرس‌های Bitcoin با شبکه ناسازگار خواهند بود.
explanation: |
  یک PRNG با طراحی ضعیف می‌تواند دنباله‌های قابل پیش‌بینی تولید کند و کلیدها را در برابر حملات آسیب‌پذیرتر کند.
reviewed: false