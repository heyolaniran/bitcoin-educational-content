question: تفاوت اصلی بین PRNG و TRNG چیست؟
answer: PRNG تعیین‌پذیر است، در حالی که TRNG اعداد تصادفی واقعی تولید می‌کند.
wrong_answers:
  - PRNG سریع‌تر از TRNG برای اعداد بزرگ است.
  - PRNG فقط برای رمزگذاری استفاده می‌شود، نه TRNG.
  - PRNG از کلیدهای خصوصی استفاده می‌کند، TRNG از کلیدهای عمومی استفاده می‌کند.
explanation: |
  PRNGها تعیین‌پذیر هستند، به این معنی که می‌توانند دنباله‌ها را از یک حالت اولیه بازتولید کنند، برخلاف TRNGها.
reviewed: false