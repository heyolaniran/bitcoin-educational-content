question: انتروپی در زمینه رمزنگاری چیست؟
answer: معیاری از غیرقابل پیش‌بینی بودن مرتبط با یک فرآیند تصادفی
wrong_answers:
  - روشی برای رمزگذاری داده‌های حساس
  - یک الگوریتم برای محاسبه کلیدهای عمومی
  - یک تکنیک فشرده‌سازی داده‌ها
explanation: |
  در رمزنگاری، آنتروپی میزان عدم قطعیت یا آشفتگی در یک منبع تصادفی را اندازه‌گیری می‌کند که برای تولید کلیدهای امن ضروری است.
reviewed: false