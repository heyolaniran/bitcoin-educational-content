question: چرا عبارت ۲۴ کلمه‌ای Mnemonic اغلب برای Bitcoin Wallet غیرضروری تلقی می‌شود؟
answer: کلیدهای مشتق‌شده تنها 128 بیت امنیت ارائه می‌دهند.
wrong_answers:
  - نرم‌افزار از عبارات ۲۴ کلمه‌ای پشتیبانی نمی‌کند
  - این اجازه را برای استخراج کلیدهای عمومی نمی‌دهد.
  - عبارات کوتاه‌تر استاندارد نشده‌اند
explanation: |
  اگرچه یک عبارت ۲۴ کلمه‌ای ۲۵۶ بیت امنیت ارائه می‌دهد، کلیدهای خصوصی مشتق شده Bitcoin تنها ۱۲۸ بیت امنیت را تضمین می‌کنند، که این امر باعث می‌شود مازاد غیرضروری باشد.
reviewed: false