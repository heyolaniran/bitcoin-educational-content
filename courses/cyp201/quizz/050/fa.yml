question: چه کاری برای ایمن‌سازی یک passphrase مناسب است؟
answer: آن را بر روی یک رسانه فیزیکی جداگانه از عبارت Mnemonic ذخیره کنید.
wrong_answers:
  - آن را فقط با قلب خود حفظ کنید بدون اینکه آن را یادداشت کنید.
  - آن را بر روی همان رسانه فیزیکی به عنوان عبارت Mnemonic ذخیره کنید.
  - آن را بر روی یک رسانه دیجیتال مانند Google Drive ضبط کنید.
explanation: |
  passphrase باید به‌صورت فیزیکی و جدا از عبارت Mnemonic نگهداری شود تا از سرقت همزمان هر دو جلوگیری شود.
reviewed: false