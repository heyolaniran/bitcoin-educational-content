question: هدف از استفاده از یک Wallet فریبنده با یک passphrase چیست؟
answer: برای شبیه‌سازی یک Wallet با مقدار کم در صورت اجبار فیزیکی
wrong_answers:
  - افزودن پشتیبان‌گیری خودکار از تراکنش‌ها
  - generate یک عبارت اضافی Mnemonic
  - محافظت از UTXOها در برابر دوبار خرج کردن
explanation: |
  یک Wallet فریبنده برای منحرف کردن توجه مهاجم با ارائه دسترسی به یک Wallet که حاوی مقدار کمی بیت‌کوین است، استفاده می‌شود.
reviewed: false