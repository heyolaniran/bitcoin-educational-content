question: اگر passphrase مرتبط با HD Wallet خود را گم کنید، چه اتفاقی می‌افتد؟
answer: شما به بیت‌کوین‌های مرتبط با آن Wallet دسترسی خود را از دست می‌دهید.
wrong_answers:
  - شما هنوز می‌توانید تنها با عبارت Mnemonic به Wallet دسترسی پیدا کنید.
  - می‌توانید با تماس با پشتیبانی Bitcoin، passphrase را بازنشانی کنید.
  - شما فقط تراکنش‌های تأیید نشده را از دست می‌دهید
explanation: |
  passphrase یک جزء اساسی در استخراج کلید است. بدون آن، بازسازی کلیدها و در نتیجه دسترسی به بیت‌کوین‌ها غیرممکن است.
reviewed: false