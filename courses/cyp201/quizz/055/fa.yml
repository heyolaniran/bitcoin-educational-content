question: خروجی تابع HMAC-SHA512 که بر روی seed اعمال می‌شود به چند بخش تقسیم می‌شود؟
answer: دو بخش ۲۵۶ بیتی
wrong_answers:
  - یک بخش واحد از ۵۱۲ بیت
  - سه بخش از ۱۷۰ بیت
  - چهار بخش ۱۲۸ بیتی
explanation: |
  خروجی HMAC-SHA512 به دو بخش تقسیم می‌شود: کلید خصوصی اصلی (۲۵۶ بیت) و chain code اصلی (۲۵۶ بیت).
reviewed: false