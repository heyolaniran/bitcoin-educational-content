question: seed पर लागू HMAC-SHA512 फ़ंक्शन का आउटपुट कितने भागों में विभाजित है?
answer: 256 बिट के दो भाग
wrong_answers:
  - 512 बिट्स का एक एकल भाग
  - 170 बिट के तीन भाग
  - 128 बिट के चार भाग
explanation: |
  HMAC-SHA512 का आउटपुट दो भागों में विभाजित है: मास्टर प्राइवेट कुंजी (256 बिट्स) और मास्टर chain code (256 बिट्स)।
reviewed: false