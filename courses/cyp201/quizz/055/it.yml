question: In quante parti viene diviso l'output della funzione HMAC-SHA512 applicata al seed?
answer: Due parti di 256 bit
wrong_answers:
  - Una singola parte di 512 bit
  - Tre parti di 170 bit
  - Quattro parti di 128 bit
explanation: |
  L'output di HMAC-SHA512 è diviso in due parti: la chiave master privata (256 bit) e master chain code (256 bit).
reviewed: false
