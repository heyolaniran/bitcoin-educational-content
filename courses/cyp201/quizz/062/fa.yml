question: یک کلید عمومی توسعه‌یافته اجازه می‌دهد تا چه چیزی مشتق شود؟
answer: فقط کلیدهای عمومی کودک عادی
wrong_answers:
  - فقط کلیدهای خصوصی عادی کودک
  - هم کلیدهای عمومی کودک سخت شده و هم عادی
  - هم کلیدهای خصوصی کودک سخت شده و هم کلیدهای خصوصی کودک معمولی
explanation: |
  یک کلید عمومی توسعه‌یافته تنها اجازه می‌دهد کلیدهای عمومی فرزند عادی استخراج شوند، نه کلیدهای خصوصی یا کلیدهای سخت‌شده.
reviewed: false