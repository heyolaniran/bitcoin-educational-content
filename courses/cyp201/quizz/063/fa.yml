question: چه اطلاعاتی در یک کلید توسعه‌یافته گنجانده نمی‌شود؟
answer: تاریخچه تراکنش کلید
wrong_answers:
  - شماره شاخص کلید
  - کلید (خصوصی یا عمومی)
  - chain code
explanation: |
  یک کلید توسعه‌یافته فقط شامل اطلاعات لازم برای استخراج کلیدهای فرزند است و اطلاعات مربوط به تراکنش‌ها را شامل نمی‌شود.
reviewed: false