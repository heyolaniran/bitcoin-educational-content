question: عملکرد اصلی یک کلید توسعه‌یافته در یک HD Wallet چیست؟
answer: برای اجازه دادن به استخراج کلیدهای فرزند
wrong_answers:
  - ذخیره تراکنش‌های Wallet
  - مستقیماً generate UTXOها را
  - کلیدهای عمومی را رمزگذاری کنید
explanation: |
  یک کلید توسعه‌یافته یک کلید (چه خصوصی و چه عمومی) را با یک chain code مرتبط ترکیب می‌کند، یعنی دو Elements لازم برای استخراج کلیدهای فرزند.
reviewed: false