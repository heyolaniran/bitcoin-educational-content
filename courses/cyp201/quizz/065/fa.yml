question: تفاوت بین یک کلید فرزند معمولی و یک کلید فرزند سخت شده چیست؟
answer: یک کلید فرزند سخت‌شده برای اشتقاق خود به کلید خصوصی والد نیاز دارد.
wrong_answers:
  - یک کلید عادی کودک نمی‌تواند از کلیدهای عمومی مشتق شود.
  - یک کلید کودک سخت شده از یک شاخص فرد استفاده می‌کند.
  - یک کلید فرزند عادی از یک کلید فرزند سخت‌شده امن‌تر است.
explanation: |
  یک کلید فرزند عادی می‌تواند از کلید عمومی والد مشتق شود، برخلاف یک کلید فرزند سخت‌شده که نیاز به کلید خصوصی والد دارد.
reviewed: false