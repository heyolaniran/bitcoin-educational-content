question: هدف از شاخص در استخراج کلیدهای فرزند چیست؟
answer: تفاوت جفت کلیدهای هم‌سطح را مشخص کنید
wrong_answers:
  - شناسایی ماهیت کلید (عمومی یا خصوصی)
  - سطح امنیتی کلید را مشخص کنید
  - یک Layer امنیت اضافی اضافه کنید
explanation: |
  شاخص امکان تمایز کلیدهای فرزند مشتق شده از همان جفت والدین را فراهم می‌کند.
reviewed: false