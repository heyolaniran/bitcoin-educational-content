question: محدودیت استخراج کلید عمومی فرزند از کلید عمومی والد چیست؟
answer: کلید کودک باید عادی باشد
wrong_answers:
  - کلید کودک باید سخت شود
  - chain code باید با کلید والد یکسان باشد.
  - فرآیند باید شامل کلید خصوصی والدین باشد
explanation: |
  یک کلید عمومی فرزند تنها در صورتی می‌تواند از یک کلید عمومی والد مشتق شود که نرمال باشد، نه سخت‌شده.
