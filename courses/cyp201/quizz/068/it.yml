question: Qual è il vincolo per derivare una chiave pubblica figlia da una chiave pubblica genitore?
answer: La chiave figlia deve essere normale
wrong_answers:
  - La chiave figlia deve essere hardened
  - La chain code deve essere identica a quella della chiave genitore
  - Il processo deve includere la chiave privata genitore
explanation: |
  Una chiave pubblica figlia può essere derivata da una chiave pubblica genitore solo se è normale, non hardened.
recensito: false
