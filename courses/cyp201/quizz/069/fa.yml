question: نقش اصلی chain code در استخراج کلیدهای فرزند چیست؟
answer: یک منبع اضافی از آنتروپی معرفی کنید
wrong_answers:
  - عمق سلسله مراتبی را شناسایی کنید
  - شاخص‌های کلیدهای فرزند را ذخیره کنید
  - اطمینان از سازگاری با پروتکل Bitcoin
explanation: |
  chain code برای معرفی یک منبع اضافی و منحصر به فرد از آنتروپی برای هر کلید مشتق شده استفاده می‌شود.
reviewed: false