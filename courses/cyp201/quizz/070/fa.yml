question: عمق 0 در سلسله‌مراتب کیف‌پول‌های HD نمایانگر چیست؟
answer: کلید اصلی و chain code اصلی
wrong_answers:
  - زنجیره خارجی آدرس‌ها
  - حساب پیش‌فرض
  - نوع ارز
explanation: |
  عمق 0 به کلید اصلی و chain code اصلی مربوط می‌شود، که نقاط شروع برای تمام مشتقات در یک HD Wallet هستند.
reviewed: false