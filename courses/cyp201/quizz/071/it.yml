question: A quale profondità (depth) nel percorso di derivazione si specifica il tipo di valuta?
answer: Profondità 2
wrong_answers:
  - Profondità 1
  - Profondità 3
  - Profondità 4
explanation: |
  La Profondità (Depth) 2 è utilizzata per identificare la valuta in wallet multi-valuta, come Bitcoin (indice 0') o Litecoin (indice 2').
reviewed: false
