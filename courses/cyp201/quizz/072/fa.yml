question: یک آپاستروف (') یا حرف h در مسیر مشتق‌گیری به چه معناست؟
answer: یک مشتق سخت‌شده
wrong_answers:
  - یک اشتقاق عادی
  - اشتقاق خارجی
  - یک اشتقاق غیر استاندارد
explanation: |
  یک آپاستروف نشان می‌دهد که اشتقاق سخت شده است و نیاز به یک کلید خصوصی والد برای generate کلید فرزند دارد.
