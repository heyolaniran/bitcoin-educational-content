question: Cosa significa un apostrofo (o apice) (') o la h in un percorso di derivazione?
answer: Una derivazione hardened
wrong_answers:
  - Una derivazione normale
  - Una derivazione esterna
  - Una derivazione non standard
explanation: |
  Un apostrofo (o apice) indica che la derivazione è hardened, richiedendo una chiave privata genitore per generare la chiave figlia.
reviewed: false
