question: Cosa indica l'indice /84'/ al livello 1 di un derivation path
answer: Lo standard P2WPKH (SegWit v0)
wrong_answers:
  - Lo standard P2TR (SegWit v1)
  - Una moneta sulla testnet Bitcoin
  - Una moneta sulla mainnet Bitcoin
explanation: |
  L'indice /84'/ è definito nel BIP84 per indicare l'uso dello standard SegWit v0 con indirizzi P2WPKH al livello 1 (quello del target di derivazione).
recensito: false
