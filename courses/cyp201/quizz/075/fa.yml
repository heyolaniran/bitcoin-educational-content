question: مسیر مشتق‌گیری که برای یک حساب SegWit v0 در یک توصیف‌گر استاندارد استفاده می‌شود چیست؟
answer: ۸۴س/۰س/۰س
wrong_answers:
  - ۴۴س/۰س/۰س
  - ۸۶س/۰س/۰س
  - ۸۴/۰/۰
explanation: |
  مسیر 84h/0h/0h در BIP84 برای یک حساب که آدرس‌های SegWit v0 را با P2WPKH استخراج می‌کند، تعریف شده است.
reviewed: false