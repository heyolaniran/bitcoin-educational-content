question: Quale derivation path viene utilizzato per un account SegWit v0 in un descriptor standard?
answer: 84h/0h/0h
wrong_answers:
  - 44h/0h/0h
  - 86h/0h/0h
  - 84/0/0
explanation: |
  Il percorso 84h/0h/0h è definito nel BIP84 per un account che deriva indirizzi SegWit v0 con P2WPKH.
recensito: false
