question: نماد /<0;1>/* در یک توصیف‌گر به چه چیزی اشاره دارد؟
answer: به زنجیره خارجی و داخلی با اشتقاق متوالی
wrong_answers:
  - به یک چندامضایی مرتب‌شده Address
  - به یک چکسام برای مسیرهای مشتق‌گیری
  - به یک مسیر مشتق‌گیری سخت‌شده
explanation: |
  نماد /<0;1>/* نشان می‌دهد که توصیف‌گر می‌تواند آدرس‌های generate را برای زنجیره خارجی (0) و داخلی (1) با مشتق‌سازی ترتیبی به لطف کاراکتر جایگزین (*) داشته باشد.
reviewed: false