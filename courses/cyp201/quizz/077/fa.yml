question: چرا توصیف‌گرها برای کیف‌پول‌های چندامضایی به‌ویژه مفید هستند؟
answer: آن‌ها xpub هر عامل را شامل می‌شوند و ساختار چندامضایی را توصیف می‌کنند.
wrong_answers:
  - آنها نیاز به عبارت Mnemonic را از بین می‌برند.
  - آن‌ها تولید کلیدهای سخت‌شده را ساده می‌کنند
  - آنها امضاهای چندگانه را با تمام اسکریپت‌ها سازگار می‌کنند.
explanation: |
  توصیف‌کننده‌ها شامل کلیدهای عمومی توسعه‌یافته همه شرکت‌کنندگان هستند که بازیابی و مدیریت پیکربندی‌های چندامضایی را تسهیل می‌کنند.
reviewed: false