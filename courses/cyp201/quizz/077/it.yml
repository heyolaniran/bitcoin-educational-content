question: Perché i descriptor sono particolarmente utili per i wallet multisig?
answer: Includono l'xpub di ogni partecipante e descrivono la struttura del multisig
wrong_answers:
  - Eliminano la necessità di una frase mnemonica
  - Semplificano la generazione di chiavi hardened
  - Rendono i multisig compatibili con tutti gli script
explanation: |
  I descriptor includono le chiavi pubbliche estese di tutti i partecipanti, il che facilita il ripristino e la gestione delle configurazioni multisig.
recensito: false
