question: عملکرد اصلی توصیف‌گرهای اسکریپت خروجی چیست؟
answer: برای توصیف کامل یک اسکریپت خروجی و ارائه اطلاعات لازم برای بازیابی یک Wallet
wrong_answers:
  - به‌طور خودکار آدرس‌های چندامضایی generate
  - عبارت Mnemonic را در پشتیبان‌های Wallet جایگزین کنید
  - محاسبات امضاهای دیجیتال را ساده کنید
explanation: |
  توصیف‌کننده‌ها تمام اطلاعات لازم برای پیگیری یک اسکریپت خاص را شامل می‌شوند، از جمله مسیر مشتق‌سازی و کلیدهای استفاده‌شده، اما عبارت بازیابی را شامل نمی‌شوند.