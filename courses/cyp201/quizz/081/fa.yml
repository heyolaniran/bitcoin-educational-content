question: نوآوری اصلی اسکریپت‌های P2WPKH در مقایسه با P2PKH چیست؟
answer: امضاها به قسمت شاهد منتقل می‌شوند.
wrong_answers:
  - آدرس‌ها در base58check کدگذاری می‌شوند.
  - اسکریپتPubKey شامل Hash کلید خصوصی است.
  - P2WPKH با SegWit ناسازگار است.
explanation: |
  P2WPKH، که همراه با SegWit معرفی شد، امضاها را به بخشی جداگانه به نام Witness منتقل می‌کند تا از تغییرپذیری تراکنش جلوگیری کند.