question: تفاوت اصلی بین P2PK و P2PKH چیست؟
answer: P2PK به طور مستقیم از کلید عمومی خام استفاده می‌کند، در حالی که P2PKH از Hash کلید عمومی استفاده می‌کند.
wrong_answers:
  - P2PK با SegWit سازگار است، در حالی که P2PKH سازگار نیست.
  - P2PK از امضای Schnorr استفاده می‌کند، در حالی که P2PKH از امضای ECDSA استفاده می‌کند.
  - P2PK برای multisigs در نظر گرفته شده است، در حالی که P2PKH برای اسکریپت‌های ساده است.
explanation: |
  P2PK وجوه را با یک کلید عمومی خام قفل می‌کند، در حالی که P2PKH از Hash کلید عمومی استفاده می‌کند.
reviewed: false