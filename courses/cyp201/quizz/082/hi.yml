question: P2PK और P2PKH के बीच मुख्य अंतर क्या है?
answer: P2PK सीधे कच्ची सार्वजनिक कुंजी का उपयोग करता है, जबकि P2PKH सार्वजनिक कुंजी के Hash का उपयोग करता है।
wrong_answers:
  - P2PK SegWit संगत है, जबकि P2PKH नहीं है।
  - P2PK एक श्नोर हस्ताक्षर का उपयोग करता है, जबकि P2PKH एक ECDSA हस्ताक्षर का उपयोग करता है।
  - P2PK मल्टीसिग्नेचर के लिए है, जबकि P2PKH सरल स्क्रिप्ट के लिए है।
explanation: |
  P2PK निधियों को कच्ची सार्वजनिक कुंजी से लॉक करता है, जबकि P2PKH सार्वजनिक कुंजी के Hash का उपयोग करता है।
