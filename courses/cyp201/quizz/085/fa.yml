question: برای محاسبه کلید عمومی Taproot Q چه عملیاتی لازم است؟
answer: کلید عمومی P را با تغییر tG اضافه کنید
wrong_answers:
  - کلید خصوصی p را در تغییر ضرب کنید
  - Hash کلید عمومی P با SHA256
  - رشته‌سازی تغییر t و کلید عمومی P
explanation: |
  کلید عمومی Taproot، Q، با افزودن حاصل‌ضرب اسکالر تغییر t توسط مولد G به کلید عمومی P به‌دست می‌آید.
reviewed: false