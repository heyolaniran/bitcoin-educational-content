question: ویژگی منحصر به فرد آدرس‌های SegWit v1 (P2TR) در مقایسه با آدرس‌های SegWit v0 چیست؟
answer: آن‌ها به‌طور مستقیم از کلید عمومی خام در Address استفاده می‌کنند.
wrong_answers:
  - آن‌ها به صورت base58check کدگذاری شده‌اند.
  - آنها برای معتبر بودن به دو امضا نیاز دارند.
  - آن‌ها از کلید عمومی Hash در Address استفاده می‌کنند.
explanation: |
  SegWit v1 (P2TR) آدرس‌ها از Hash کلید عمومی استفاده نمی‌کنند، بلکه مستقیماً از کلید عمومی Taproot استفاده می‌کنند.
reviewed: false