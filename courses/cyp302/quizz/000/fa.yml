question: چه کسی یک جعبه آهنی را برای نگهداری به مهماندار رابرت موریس سپرد؟
answer: توماس جی. بیل
wrong_answers:
  - جی.بی. وارد
  - سایمون سینگ
  - اندرو آلن
explanation: |
  این توماس جی. بیل بود که یک جعبه آهنی حاوی اسناد رمزگذاری شده و یک یادداشت به رابرت موریس تحویل داد و به او دستورالعمل‌هایی در صورت عدم بازگشت خود داد.
reviewed: false