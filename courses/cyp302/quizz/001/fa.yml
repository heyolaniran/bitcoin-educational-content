question: چه چیزی در جعبه آهنی که به رابرت موریس تحویل داده شد، وجود داشت؟
answer: سه متن رمزگذاری شده و یک یادداشت
wrong_answers:
  - نقشه و سرنخ‌ها
  - یک کلید رمزگذاری منحصر به فرد
  - یک لیست از نام‌ها
explanation: |
  جعبه شامل سه متن رمزگذاری شده و یادداشتی بود که کشف یک گنج را توضیح می‌داد و دستورالعمل‌هایی برای بازیابی محتوای آن ارائه می‌کرد.
reviewed: false