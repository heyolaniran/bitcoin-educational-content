question: ویژگی سه متن رمزگذاری شده موجود در جعبه چیست؟
answer: آنها شامل اعداد جدا شده با ویرگول هستند
wrong_answers:
  - آنها همگی با حروف معمولی نوشته شده‌اند.
  - آن‌ها از نمادهای ناشناخته استفاده می‌کنند
  - آنها به چندین زبان نوشته شده‌اند.
explanation: |
  سه متن رمزگذاری‌شده شامل مجموعه‌ای از اعداد است که با کاما از هم جدا شده‌اند و برای رمزگشایی به یک کلید نیاز دارند.
