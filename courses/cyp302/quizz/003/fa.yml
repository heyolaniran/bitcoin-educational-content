question: دومین پیام بیل پس از رمزگشایی، محل دفن گنج را فاش می‌کند.
answer: فهرست گنج‌های دفن‌شده (طلا، نقره، و جواهرات)
wrong_answers:
  - محل دقیق دفن گنج
  - تاریخ بازگشت بیل
  - امضای بیل و امضای همکارانش
explanation: |
  پس از رمزگشایی، پیام دوم محتوای گنج را توصیف می‌کند که شامل طلا، نقره و جواهرات است.
reviewed: false