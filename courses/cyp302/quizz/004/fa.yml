question: دلیل اصلی اینکه سایر رمزهای بیل همچنان رمزگشایی نشده‌اند چیست؟
answer: کلید این رمزها هنوز ناشناخته است
wrong_answers:
  - متون رمزگذاری شده خیلی قدیمی هستند
  - جعبه قبل از اینکه رمزگشایی شود گم شد
  - محققان فاقد اسناد تاریخی قابل اعتماد هستند
explanation: |
  سایر رمزهای بیل هرگز رمزگشایی نشده‌اند زیرا کلید لازم برای خواندن آن‌ها همچنان ناشناخته است، علیرغم تلاش‌های فراوان.
reviewed: false