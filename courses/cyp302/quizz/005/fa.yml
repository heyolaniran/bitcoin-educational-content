question: هدف اصلی رمزنگاری کلاسیک که همچنان در رمزنگاری مدرن وجود دارد چیست؟
answer: محرمانگی پیام‌ها
wrong_answers:
  - ساده‌سازی پیام‌ها
  - تکرار پیام‌ها
  - خودکارسازی ارسال پیام
explanation: |
  رمزنگاری کلاسیک عمدتاً بر محرمانگی متمرکز بود و این هدف همچنان در رمزنگاری مدرن ضروری است، اگرچه موضوعات دیگری مانند یکپارچگی و اصالت نیز اضافه شده‌اند.
reviewed: false