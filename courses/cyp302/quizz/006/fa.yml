question: کدام مفهوم به طور انحصاری به طرح‌های رمزنگاری متقارن یا نامتقارن مربوط نمی‌شود؟
answer: عملکردهای Hash
wrong_answers:
  - جفت کلیدهای عمومی و خصوصی
  - رمزنگاری نامتقارن
  - رمزنگاری متقارن
explanation: |
  توابع Hash یک جزء کلیدی از رمزنگاری مدرن هستند، اما برخلاف کلیدهای عمومی و خصوصی، به طور خاص با طرح‌های متقارن یا نامتقارن مرتبط نیستند.
reviewed: false