question: چه چیزی یک طرح رمزنگاری مدرن را از یک طرح رمزگذاری ساده متمایز می‌کند؟
answer: تضمین یکپارچگی و اصالت پیام
wrong_answers:
  - استفاده از یک کلید مخفی واحد
  - غیرمتمرکزسازی کلید
  - ناشناس‌سازی پیام‌ها
explanation: |
  رمزنگاری مدرن شامل طرح‌هایی است که فراتر از محرمانگی، یکپارچگی و اصالت را نیز تضمین می‌کنند، همچنین عدم انکار، برخلاف طرح‌های رمزنگاری ساده.
reviewed: false