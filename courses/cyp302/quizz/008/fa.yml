question: شاخه‌ای از رمزنگاری که از یک جفت کلید عمومی و خصوصی استفاده می‌کند، چه نامیده می‌شود؟
answer: رمزنگاری نامتقارن
wrong_answers:
  - رمزنگاری متقارن
  - رمزنگاری تک‌الگوریتمی
  - رمزنگاری یکپارچه
explanation: |
  رمزنگاری نامتقارن بر اساس استفاده از یک جفت کلید، عمومی و خصوصی، است که امکان رمزگذاری بدون اشتراک‌گذاری یک کلید مخفی را فراهم می‌کند.
reviewed: false