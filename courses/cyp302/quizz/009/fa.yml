question: کدام مرحله در اثبات امنیت یک طرح رمزنگاری مدرن گنجانده نشده است؟
answer: راه‌اندازی کاربر Interface
wrong_answers:
  - بیان تعاریف امنیتی
  - فرضیات پیچیدگی ریاضیاتی
  - اثبات ریاضی امنیت
explanation: |
  اثبات امنیت در رمزنگاری مدرن بر اهداف و فرضیات ریاضی تمرکز دارد و جنبه‌هایی مانند کاربر Interface را که به امنیت رمزنگاری مرتبط نیست، نادیده می‌گیرد.
reviewed: false