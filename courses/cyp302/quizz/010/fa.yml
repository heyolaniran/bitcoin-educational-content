question: چرا رمزنگاری در یک محیط ارتباطی باز حیاتی است؟
answer: این داده‌ها را ایمن می‌کند، حتی اگر کانال ارتباطی رهگیری شود.
wrong_answers:
  - این ارتباطات را برای همه شبکه‌ها نامرئی می‌کند.
  - این از حملات به شبکه‌های محلی جلوگیری می‌کند.
  - این جایگزین کابل‌های فیزیکی با ارتباطات امن می‌شود.
explanation: |
  در یک محیط ارتباطی باز، جایی که کانال‌ها می‌توانند نظارت شوند، رمزنگاری با محافظت از داده‌های مبادله شده، حتی در حضور حملات احتمالی، امنیت را تضمین می‌کند.
reviewed: false