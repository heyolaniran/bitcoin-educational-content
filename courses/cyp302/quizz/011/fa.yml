question: چه چیزی رهگیری ارتباطات محلی توسط مهاجمان با تجهیزات ضعیف را تسهیل می‌کند؟
answer: استفاده از امواج رادیویی برای اتصالات بی‌سیم
wrong_answers:
  - مسیریابی تمام داده‌ها از طریق ماهواره‌ها
  - استفاده از کابل‌های کواکسیال تنها برای انتقال داده‌ها
  - ارسال داده‌ها فقط از طریق فیبرهای نوری
explanation: |
  اتصالات بی‌سیم که داده‌ها را از طریق امواج رادیویی منتقل می‌کنند، رهگیری را برای مهاجمان آسان‌تر می‌سازند، زیرا نیازی به دسترسی فیزیکی به شبکه ندارند.
reviewed: false