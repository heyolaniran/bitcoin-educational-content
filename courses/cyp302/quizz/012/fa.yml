question: توهم امنیت کانال‌های ارتباطی در دنیای مدرن چیست؟
answer: باور به اینکه محافظت فیزیکی از کانال مانع از رهگیری می‌شود
wrong_answers:
  - فکر کردن به اینکه شبکه‌های بی‌سیم بی‌اثر هستند
  - باور به اینکه رمزنگاری برای ارتباطات محلی ضروری نیست
  - با توجه به اینکه تنها آژانس‌های ملی می‌توانند داده‌ها را رهگیری کنند
explanation: |
  این یک توهم است که فکر کنیم تنها با ایمن‌سازی فیزیکی کانال می‌توان محرمانگی را تضمین کرد، زیرا نقاط بسیاری برای استراق سمع باقی می‌مانند که به‌ویژه برای ارتباطات بی‌سیم قابل دسترسی هستند.
reviewed: false