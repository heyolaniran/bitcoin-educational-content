question: چه چیزی مبنای فیزیکی اکثر ارتباطات در دنیای توسعه‌یافته را تشکیل می‌دهد؟
answer: شبکه‌های کابل فیبر نوری
wrong_answers:
  - ماهواره‌ها برای هر اتصال
  - فقط کابل‌های کواکسیال
  - فقط سیم‌های مسی
explanation: |
  اکثریت ارتباطات مدرن به شبکه‌های کابل فیبر نوری متکی هستند که تبادل داده با سرعت بالا را تضمین می‌کنند، اگرچه برخی از استفاده‌ها از ماهواره‌ها و کابل‌های کواکسیال همچنان باقی است.
reviewed: false