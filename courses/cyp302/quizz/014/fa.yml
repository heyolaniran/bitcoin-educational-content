question: کاربران چه نگرشی باید نسبت به حریم خصوصی ارتباطات خود در محیط مدرن اتخاذ کنند؟
answer: فرض کنید که همیشه کسی در حال گوش دادن است.
wrong_answers:
  - تنها به وای‌فای متکی باشید
  - باور کنید که داده‌های موبایل کاملاً امن هستند
  - فقط از اتصالات سیمی استفاده کنید
explanation: |
  در دنیایی که بسیاری از کانال‌های ارتباطی در معرض استراق سمع هستند، عاقلانه است که فرض کنیم ممکن است یک شخص ثالث در حال گوش دادن باشد، که این امر رمزنگاری را ضروری می‌سازد.
reviewed: false