question: आधुनिक परिवेश में उपयोगकर्ताओं को अपने संचार की गोपनीयता के संबंध में क्या रवैया अपनाना चाहिए?
answer: मान लें कि कोई हमेशा सुन रहा है
wrong_answers:
  - केवल वाई-फाई पर निर्भर रहें
  - यकीन मानिए मोबाइल डेटा पूरी तरह सुरक्षित है
  - केवल वायर्ड कनेक्शन का उपयोग करें
explanation: |
  ऐसी दुनिया में जहां कई संचार चैनल अवरोधन के प्रति संवेदनशील हैं, यह मान लेना बुद्धिमानी होगी कि कोई तीसरा पक्ष सुन रहा होगा, जिससे क्रिप्टोग्राफी आवश्यक हो जाती है।
reviewed: false