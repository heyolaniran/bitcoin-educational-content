question: تعریف یک متغیر تصادفی در زمینه رمزنگاری چیست؟
answer: متغیری که می‌تواند چندین مقدار ممکن را با احتمال مثبت بپذیرد
wrong_answers:
  - متغیری که در هر لحظه مقدارش تغییر می‌کند
  - متغیری که مقادیر آن ثابت و از پیش تعریف شده است
  - یک متغیر همیشه در زمینه یک آزمایش فیزیکی خاص تعریف می‌شود.
explanation: |
  یک متغیر تصادفی می‌تواند دو یا چند مقدار بگیرد، هر کدام با یک احتمال مثبت، و اغلب به صورت انتزاعی در زمینه رمزنگاری تعریف می‌شود.
reviewed: false