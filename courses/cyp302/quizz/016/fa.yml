question: ویژگی یک متغیر یکنواخت چیست؟
answer: همه مقادیر ممکن احتمال وقوع برابر دارند
wrong_answers:
  - مقادیر از توزیع نامتقارن پیروی می‌کنند
  - احتمال هر مقدار به آزمایش بستگی دارد.
  - فقط دو مقدار می‌توانند با احتمالات برابر رخ دهند
explanation: |
  یک متغیر یکنواخت یک متغیر تصادفی است که در آن همه مقادیر ممکن دارای احتمال برابر برای وقوع هستند.
reviewed: false