question: تفاوت بین متغیر تصادفی گسسته و پیوسته چیست؟
answer: یک متغیر گسسته تعداد محدودی از نتایج ممکن دارد، در حالی که یک متغیر پیوسته می‌تواند تعداد بی‌نهایتی از مقادیر را در یک بازه بپذیرد.
wrong_answers:
  - یک متغیر گسسته به طور مداوم مقدار خود را تغییر می‌دهد، در حالی که یک متغیر پیوسته پایدار باقی می‌ماند.
  - یک متغیر گسسته به آزمایش‌های فیزیکی انجام‌شده خاص است، یک متغیر پیوسته در بازه خود انتزاعی است.
  - متغیرهای گسسته در رمزنگاری مدرن وجود ندارند، تنها متغیرهای پیوسته استفاده می‌شوند.
explanation: |
  متغیرهای گسسته دارای مجموعه‌ای محدود از نتایج هستند، در حالی که متغیرهای پیوسته می‌توانند هر مقداری را در یک بازه بگیرند، مانند اعداد حقیقی بین 0 و 1.
reviewed: false