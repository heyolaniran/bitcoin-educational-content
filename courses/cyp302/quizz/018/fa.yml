question: در چه حالتی می‌توانیم بگوییم که دو رویداد مستقل هستند؟
answer: احتمال یکی بر احتمال دیگری تأثیری ندارد
wrong_answers:
  - دو رویداد همیشه به طور همزمان رخ می‌دهند
  - آنها متقابلاً انحصاری هستند
  - احتمال ترکیبی آن‌ها برابر با بالاترین احتمال از بین این دو است.
explanation: |
  دو رویداد مستقل هستند اگر احتمال یکی، احتمال دیگری را تغییر ندهد، مانند اینکه قرعه‌کشی لاتاری تأثیری بر آب و هوای روز بعد نداشته باشد.
reviewed: false