question: نقش قضیه بیز در احتمال چیست؟
answer: این امکان را فراهم می‌کند تا با معکوس کردن رویدادها، احتمال شرطی محاسبه شود.
wrong_answers:
  - احتمال وقوع یک رویداد واحد را فراهم می‌کند.
  - این احتمال کل تمام رویدادهای ممکن را تعریف می‌کند.
  - این فقط برای متغیرهای پیوسته اعمال می‌شود.
explanation: |
  قضیه بیز امکان محاسبه احتمال رویداد A با توجه به B را با معکوس کردن احتمالات فراهم می‌کند و در نظریه احتمال اساسی است.
reviewed: false