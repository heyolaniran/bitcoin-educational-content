question: عملیات مدول در ریاضیات چه چیزی را نشان می‌دهد؟
answer: باقی‌مانده یک تقسیم
wrong_answers:
  - خارج قسمت یک تقسیم
  - دو برابر عدد شروع
  - عددی که بدون باقی‌مانده تقسیم می‌کند
explanation: |
  عملیات مدول شامل تعیین باقیمانده یک تقسیم است، به عنوان مثال، ۲۵ مد ۴ برابر ۱ است زیرا باقیمانده تقسیم ۱ است.
reviewed: false