question: शिफ्ट एन्क्रिप्शन में, 17 कुंजी के साथ DOG शब्द का परिणाम क्या होगा?
answer: यूएफएक्स
wrong_answers:
  - ज़ेडकेएच
  - टीपीजी
  - यूवीडब्ल्यू
explanation: |
  वर्णमाला में 17 का परिवर्तन होने पर, D, U बन जाता है, O, F बन जाता है, तथा G, X बन जाता है। इसलिए, एन्क्रिप्टेड शब्द UFX है।
reviewed: false