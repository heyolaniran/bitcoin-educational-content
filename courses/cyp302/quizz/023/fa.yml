question: نقش عملیات مدول در رمزنگاری شیفت چیست؟
answer: این اطمینان حاصل می‌کند که حروف پس از عبور از 26 به ابتدای الفبا بازمی‌گردند.
wrong_answers:
  - این مقادیر حروف را در کلید ضرب می‌کند
  - این حروف الفبا را معکوس می‌کند
  - حروف بعد از حرف Z را حذف می‌کند.
explanation: |
  عملیات مدولوی ۲۶ به حروف اجازه می‌دهد تا پس از Z دوباره شروع شوند تا اطمینان حاصل شود که هر حرف رمزگذاری شده در ۲۶ حرف الفبا باقی می‌ماند.
reviewed: false