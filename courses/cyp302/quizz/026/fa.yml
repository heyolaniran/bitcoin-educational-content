question: معادل XOR با عملگر مدول چیست؟
answer: XOR معادل یک عملیات مدولوی ۲ بر روی بیت‌ها است
wrong_answers:
  - XOR معادل یک تفریق کلاسیک به پیمانه ۳ است
  - XOR معادل عملیات مدولوی ۷ بر روی بیت‌ها است.
  - XOR معکوس جمع است
explanation: |
  عملیات XOR را می‌توان به‌عنوان جمع بیت‌ها با مدول ۲ در نظر گرفت که نتایج را یکسان می‌سازد.
reviewed: false