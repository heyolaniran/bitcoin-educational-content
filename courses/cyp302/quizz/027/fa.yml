question: خاصیت جابجایی عملگر XOR چیست؟
answer: ترتیب عملوندها بر نتیجه عملیات تأثیری ندارد
wrong_answers:
  - XOR فقط با اعداد زوج کار می‌کند
  - XOR به عملوندهایی با طول یکسان نیاز دارد
  - موقع بیت‌ها در عملوندها بر نتیجه عملیات تأثیری ندارد.
explanation: |
  XOR جابجایی‌پذیر است، به این معنی که a XOR b برابر با b XOR a است.
