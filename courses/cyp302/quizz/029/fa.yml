question: عملیات XOR بین دو بیت به چه معناست؟
answer: اگر بیت‌ها متفاوت باشند، 1 برمی‌گرداند، در غیر این صورت 0 برمی‌گرداند.
wrong_answers:
  - فقط در صورتی که هر دو بیت 1 باشند، 1 را برمی‌گرداند.
  - بیت‌ها را جمع می‌کند و حاصل جمع را برمی‌گرداند.
  - همیشه بدون توجه به نتیجه 0 را برمی‌گرداند.
explanation: |
  عملیات XOR (یا یا انحصاری) اگر دو بیت متفاوت باشند (0 و 1 یا 1 و 0) مقدار 1 تولید می‌کند و اگر یکسان باشند مقدار 0 تولید می‌کند.
reviewed: false