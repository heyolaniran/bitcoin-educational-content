question: दो बिट्स के बीच लागू होने पर XOR ऑपरेशन का क्या अर्थ है?
answer: यदि बिट्स भिन्न हैं तो यह 1 लौटाता है, अन्यथा यह 0 लौटाता है
wrong_answers:
  - यह केवल तभी 1 लौटाता है जब दोनों बिट्स 1 हों
  - यह बिट्स जोड़ता है और योग लौटाता है
  - परिणाम चाहे जो भी हो यह हमेशा 0 लौटाता है
explanation: |
  XOR ऑपरेशन (या एक्सक्लूसिव या) यदि दो बिट्स भिन्न हों (0 और 1 या 1 और 0) तो 1 उत्पन्न करता है, तथा यदि वे समान हों तो 0 उत्पन्न करता है।
