question: تفاوت اصلی بین یک رشته تصادفی و یک رشته شبه‌تصادفی چیست؟
answer: یک رشته تصادفی از یک فرآیند کاملاً تصادفی می‌آید، در حالی که یک رشته شبه‌تصادفی توسط یک الگوریتم از یک seed تولید می‌شود.
wrong_answers:
  - یک رشته شبه‌تصادفی فقط از بیت‌های 1 استفاده می‌کند.
  - یک رشته تصادفی همیشه طولانی‌تر از یک رشته شبه‌تصادفی است زیرا یک عمل طبیعی بر روی آن وجود دارد.
  - یک رشته شبه‌تصادفی توسط یک مدل کاملاً دودویی تعریف می‌شود، در حالی که یک رشته تصادفی توسط یک مدل کاملاً شانزده‌شانزدهی تعریف می‌شود.
explanation: |
  یک رشته تصادفی از یک فرآیند تصادفی مستقیم می‌آید، در حالی که یک رشته شبه‌تصادفی با استفاده از یک الگوریتم گسترش و یک seed اولیه تولید می‌شود.
reviewed: false