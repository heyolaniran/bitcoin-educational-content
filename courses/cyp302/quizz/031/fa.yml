question: رشته تصادفی در این فصل چگونه تعریف می‌شود؟
answer: به عنوان یک رشته که به طور یکنواخت از تمام رشته‌های با طول یکسان انتخاب شده است
wrong_answers:
  - به عنوان یک رشته‌ای که فقط با بیت‌های 0 و 1 ساخته شده است
  - به عنوان یک رشته‌ای که از یک انتخاب دستی به دست آمده است
  - به عنوان یک رشته با طول متغیر که از یک فرآیند رمزنگاری حاصل شده است
explanation: |
  یک رشته تصادفی به عنوان انتخاب یکنواخت از میان تمام رشته‌های ممکن با همان طول تعریف می‌شود.
reviewed: false