question: چرا گفته می‌شود که یک رشته شبه‌تصادفی از یک رشته کاملاً تصادفی غیرقابل تشخیص است؟
answer: زیرا تعیین منشاء آن بدون اطلاعات اضافی تقریباً غیرممکن است.
wrong_answers:
  - زیرا شامل بخش‌های قطعی است که با یک رشته واقعاً تصادفی یکسان هستند
  - زیرا در ساخت آن از اعداد اعشاری استفاده می‌شود
  - زیرا که به‌طور کامل از رویدادهای طبیعی تولید می‌شود
explanation: |
  یک رشته شبه‌تصادفی به گونه‌ای طراحی شده است که به شدت شبیه به یک رشته تصادفی واقعی باشد، به طوری که تمایز آن بدون دسترسی به seed یا الگوریتم استفاده شده غیرممکن است.
reviewed: false