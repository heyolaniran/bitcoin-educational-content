question: عملکرد اصلی seed در زمینه زنجیره‌های شبه‌تصادفی چیست؟
answer: برای خدمت به عنوان نقطه شروع برای تولید یک زنجیره طولانی‌تر
wrong_answers:
  - برای تعریف طول ثابت یک زنجیره شبه‌تصادفی
  - برای تأیید صحت یک زنجیره شبه‌تصادفی
  - برای افزودن یک توزیع یکنواخت به مقادیر یک زنجیره
explanation: |
  seed یک رشته کوتاه‌تر است که به عنوان نقطه شروع توسط یک الگوریتم توسعه به generate، یک زنجیره طولانی‌تر شبه‌تصادفی استفاده می‌شود.
reviewed: false