question: رشته شبه‌تصادفی چیست؟
answer: رشته‌ای که به نظر می‌رسد از یک متغیر یکنواخت می‌آید اما توسط یک الگوریتم توسعه تولید شده است
wrong_answers:
  - رشته‌ای که با احتمال یکسان برای هر کاراکتر تولید شده است
  - یک رشته با طول ثابت از یک رویداد تصادفی طبیعی
  - رشته‌ای تصادفی که فقط از مقادیر باینری 0 و 1 انتخاب شده است
explanation: |
  یک رشته شبه‌تصادفی توسط یک الگوریتم گسترش از یک seed کوچکتر تولید می‌شود، به گونه‌ای که انتخاب یکنواخت در میان تمام رشته‌های با طول یکسان را تقلید می‌کند.
reviewed: false