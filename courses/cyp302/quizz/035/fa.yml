question: هدف اصلی نظریه اعداد چیست؟
answer: برای مطالعه خواص اعداد صحیح و توابعی که با آن‌ها عمل می‌کنند
wrong_answers:
  - تجزیه و تحلیل تبدیلات هندسی
  - مطالعه ساختار اشکال هندسی تصادفی در یک گروه متناهی
  - توسعه الگوریتم‌های رمزنگاری متقارن
explanation: |
  نظریه اعداد بر ویژگی‌های اعداد صحیح و توابع اعمال شده بر اعداد صحیح تمرکز دارد، که اغلب برای کاربردها در رمزنگاری، به ویژه در زمینه رمزنگاری کلید عمومی استفاده می‌شود.
reviewed: false