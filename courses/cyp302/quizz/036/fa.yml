question: دو عدد نسبت به هم اول یا متباین بودن به چه معناست؟
answer: بزرگترین مقسوم‌علیه مشترک آن‌ها برابر با 1 است
wrong_answers:
  - مجموع آن‌ها یک عدد زوج است
  - هر دو زوج هستند
  - آنها هیچ مقسوم‌علیه مشترکی به جز ۱ و خودشان ندارند
explanation: |
  دو عدد نسبت به هم اول هستند اگر بزرگترین مقسوم‌علیه مشترک آن‌ها ۱ باشد، به این معنی که آن‌ها هیچ عامل اول مشترکی ندارند، که این یک ویژگی مهم در رمزنگاری است.
reviewed: false