question: दो संख्याओं के सहअभाज्य होने का क्या अर्थ है?
answer: उनका महत्तम सार्वभाजक 1 के बराबर है
wrong_answers:
  - उनका योग एक सम संख्या है
  - वे दोनों सम हैं
  - उनके पास 1 और स्वयं के अलावा कोई अन्य सामान्य भाजक नहीं है
explanation: |
  दो संख्याएं सहअभाज्य होती हैं यदि उनका महत्तम सार्व भाजक 1 हो, अर्थात उनमें कोई अभाज्य गुणनखंड साझा नहीं होता, जो कि क्रिप्टोग्राफी में एक महत्वपूर्ण गुण है।
