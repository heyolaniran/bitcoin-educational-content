question: ساختار جبری در جبر مجرد چیست؟
answer: مجموعه‌ای از Elements با یک یا چند عمل که به اصول خاصی پایبند هستند
wrong_answers:
  - مجموعه‌ای از اعداد اول که در ردیف‌هایی سازماندهی شده‌اند و به اصول خاصی پایبند هستند
  - مجموعه‌ای از الگوریتم‌ها برای حل معادلات خطی
  - گروهی از تبدیلات هندسی تصادفی که بر اساس اصول خاصی تنظیم شده‌اند
explanation: |
  یک ساختار جبری مجموعه‌ای از Elements تعریف‌شده با یک یا چند عملگر، مانند جمع یا ضرب، است که به اصول خاصی پایبند است و برای ساختاربندی مفاهیم در نظریه اعداد ضروری است.
reviewed: false