question: کدام شاخه ریاضی ابزارهای مدرن برای نظریه اعداد را فراهم می‌کند؟
answer: جبر مجرد
wrong_answers:
  - هندسه
  - آمار
  - تحلیل مختلط
explanation: |
  جبر مجرد، به عنوان یک زیرشاخه از ریاضیات، ساختارهای ریاضی را فراهم می‌کند که امکان تحلیل و درک ویژگی‌های اعداد مورد استفاده در نظریه اعداد را فراهم می‌سازد.
reviewed: false