question: یک مجموعه S با یک عمل دوتایی باید چه شرط اساسی را برآورده کند تا یک گروه باشد؟
answer: شرط بسته شدن
wrong_answers:
  - شرط جابجایی
  - شرط تقارن
  - شرط توزیع‌پذیری
explanation: |
  مجموعه S با یک عمل دوتایی باید چندین شرط را برآورده کند تا یک گروه تشکیل دهد، و اولین شرط، شرط بستار است: عمل بین دو Elements از S باید عنصری از S را تولید کند.
reviewed: false