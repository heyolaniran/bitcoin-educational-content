question: द्विआधारी संक्रिया वाले समुच्चय S को समूह होने के लिए कौन सी मूल शर्त पूरी करनी होगी?
answer: बंद करने की स्थिति
wrong_answers:
  - विनिमयशीलता की स्थिति
  - सममिति की स्थिति
  - वितरण की स्थिति
explanation: |
  द्विआधारी संक्रिया वाले समुच्चय S को समूह बनाने के लिए कई शर्तों को पूरा करना होगा, और पहली शर्त है समापन शर्त: S के दो Elements के बीच संक्रिया से S का एक तत्व अवश्य प्राप्त होना चाहिए।
