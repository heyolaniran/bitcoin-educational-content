question: در یک گروه، عنصری که وقتی به عنصر دیگری اعمال می‌شود، آن را تغییر نمی‌دهد، چه نامیده می‌شود؟
answer: عنصر همانی
wrong_answers:
  - عنصر معکوس
  - عنصر جابجایی
  - عنصر انجمنی
explanation: |
  عنصر همانی یک گروه، عنصر یکتایی است که وقتی بر عنصر دیگری اعمال می‌شود، آن را بدون تغییر باقی می‌گذارد. به عنوان مثال، در گروه اعداد صحیح تحت عمل جمع، عنصر همانی 0 است.
reviewed: false