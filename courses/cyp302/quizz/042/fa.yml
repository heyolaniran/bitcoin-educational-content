question: گروهی که شرط جابجایی را ارضا می‌کند چه نامیده می‌شود؟
answer: یک گروه آبلیان
wrong_answers:
  - یک گروه بسته
  - یک گروه انجمنی
  - یک گروه معکوس
explanation: |
  یک گروه آبلی، یا جابجایی، گروهی است که در آن ترتیب Elements در عمل دوتایی بر نتیجه تأثیری ندارد. این بدان معناست که برای هر a و b، a ∘ b = b ∘ a.
