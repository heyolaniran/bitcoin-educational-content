question: چه نوع گروهی عمدتاً از رمزنگاری استفاده می‌کند؟
answer: گروه‌های تعریف‌شده بر روی اعداد صحیح یا Elements توصیف‌شده توسط اعداد صحیح
wrong_answers:
  - گروه‌های اعداد مختلط یا Elements توصیف شده توسط اعداد مختلط
  - گروه‌های تبدیلات هندسی یا Elements توصیف‌شده توسط تبدیلات هندسی
  - گروه‌های اعداد گویا یا Elements توصیف شده توسط اعداد گویا
explanation: |
  رمزنگاری از گروه‌هایی بر اساس اعداد صحیح، یا Elements که توسط اعداد صحیح مانند نقاط روی یک منحنی بیضوی توصیف می‌شوند، برای عملیات رمزگذاری و امضا استفاده می‌کند.
reviewed: false