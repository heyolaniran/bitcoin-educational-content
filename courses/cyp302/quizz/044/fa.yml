question: چرا مجموعه اعداد صحیح با عمل جمع یک گروه است، اما با عمل ضرب نیست؟
answer: مجموعه شرط وارونگی تحت ضرب را برآورده نمی‌کند
wrong_answers:
  - مجموعه تحت ضرب بسته نیست
  - ضرب در اعداد صحیح خاصیت جابجایی ندارد.
  - عنصری خنثی برای ضرب وجود ندارد
explanation: |
  مجموعه اعداد صحیح شرایط وارونگی تحت ضرب را برآورده نمی‌کند زیرا برای هر عدد صحیح معکوسی وجود ندارد که در ضرب نتیجه ۱ بدهد. تنها Elements 1 و -1 این شرط را برآورده می‌کنند.
reviewed: false