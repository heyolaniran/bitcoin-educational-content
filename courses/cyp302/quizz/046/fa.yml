question: کدام تابع برای محاسبه تعداد اعداد صحیح کمتر از N که نسبت به N اول هستند استفاده می‌شود؟
answer: تابع فی اویلر
wrong_answers:
  - تابع گاما اویلر
  - تابع سیگمای اویلر
  - تابع بتا دیریکله
explanation: |
  تابع فی اویلر تعداد اعداد صحیح کمتر از N را که نسبت به N اول هستند تعیین می‌کند، که یک مفهوم مرکزی در قضایای رمزنگاری مبتنی بر اعداد اول است.
reviewed: false