question: طبق قضیه اویلر، نتیجه توان a^ϕ(N) mod N برای دو عدد صحیح a و N که نسبت به هم اول هستند، برابر است با 1.
answer: ۱ مد N
wrong_answers:
  - ۰ مد N
  - N مد a
  - a mod N
explanation: |
  قضیه اویلر بیان می‌کند که برای دو عدد صحیح a و N که نسبت به هم اول هستند، توان a^ϕ(N) mod N همیشه برابر با 1 mod N است، خاصیتی که در رمزنگاری استفاده می‌شود.
reviewed: false