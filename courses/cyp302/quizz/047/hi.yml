question: यूलर के प्रमेय के अनुसार, दो पूर्णांकों a और N के लिए जो सहअभाज्य हैं, घातांक a^ϕ(N) mod N का परिणाम क्या है?
answer: 1 मॉड एन
wrong_answers:
  - 0 मॉड एन
  - एन मॉड ए
  - एक मॉड एन
explanation: |
  यूलर का प्रमेय कहता है कि दो पूर्णांकों a और N के लिए जो सहअभाज्य हैं, घातांक a^ϕ(N) mod N हमेशा 1 mod N के बराबर होता है, जो कि क्रिप्टोग्राफी में प्रयुक्त एक गुण है।
reviewed: false