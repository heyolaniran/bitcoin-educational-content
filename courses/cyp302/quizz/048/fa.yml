question: در یک گروه چرخه‌ای، اصطلاح برای عنصری که می‌تواند generate همه Elements دیگر را از طریق توان رسانی انجام دهد چیست؟
answer: ژنراتور
wrong_answers:
  - یک ضریب
  - یک عدد اول نسبت به دیگری
  - معکوس
explanation: |
  ژنراتور عنصری در یک گروه چرخه‌ای است که از طریق توان‌رسانی می‌تواند تمام Elements دیگر گروه را تولید کند.
reviewed: false