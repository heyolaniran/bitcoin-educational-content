question: एक चक्रीय समूह में, उस तत्व के लिए क्या शब्द है जो घातांक के माध्यम से अन्य सभी Elements को generate कर सकता है?
answer: एक जनरेटर
wrong_answers:
  - एक गुणक
  - एक सहअभाज्य
  - उलटा
explanation: |
  जनरेटर चक्रीय समूह का एक तत्व है, जो घातांकीकरण के माध्यम से समूह के अन्य सभी Elements का उत्पादन कर सकता है।
reviewed: false