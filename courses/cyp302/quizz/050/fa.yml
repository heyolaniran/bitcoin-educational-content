question: چرا فیلدهای توسعه‌یافته با پایه ۲ در رمزنگاری مفید هستند؟
answer: آن‌ها امکان دستکاری امن رشته‌های باینری را فراهم می‌کنند.
wrong_answers:
  - آن‌ها با کاهش تعداد عملیات‌ها، محاسبات را ساده‌تر می‌کنند.
  - آنها با افزودن افزونگی از خطاهای محاسباتی جلوگیری می‌کنند.
  - آنها دامنه احتمالات را با کاهش تعداد Elements محدود می‌کنند.
explanation: |
  فیلدهای توسعه‌یافته با پایه ۲ مناسب هستند زیرا Elements آن‌ها می‌تواند به‌عنوان رشته‌های باینری مشاهده شود، که انجام عملیات بر روی داده‌های دیجیتال در سطح باینری در سیستم‌ها را آسان‌تر می‌کند.
reviewed: false