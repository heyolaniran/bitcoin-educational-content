question: اصطلاح "champ premier" یا "corps premier" به چه معناست؟
answer: زمینه‌ای با یک عدد اول از Elements
wrong_answers:
  - زمینه‌ای که فقط شامل اعداد اول است
  - زمینه‌ای که صرفاً با جمع اعداد اول تعریف شده است
  - زمینه‌ای که از بردارهای تصادفی استفاده می‌کند
explanation: |
  یک میدان اول شامل تعدادی Elements برابر با یک عدد اول است که آن را به یک میدان اساسی برای عملیات رمزنگاری تبدیل می‌کند.
reviewed: false