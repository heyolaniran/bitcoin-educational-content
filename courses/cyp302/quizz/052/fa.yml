question: در یک میدان متناهی، نقش یک چندجمله‌ای تجزیه‌ناپذیر چیست؟
answer: عملیات ضرب در میدان را تعریف کنید.
wrong_answers:
  - معکوس جمعی هر عنصر را تعریف کنید
  - اطمینان از بسته شدن میدان
  - تعیین هویت ضربی
explanation: |
  چندجمله‌ای‌های تجزیه‌ناپذیر برای ساختاردهی به ضرب در میدان‌های متناهی استفاده می‌شوند و اطمینان حاصل می‌کنند که هر عنصر درون میدان باقی می‌ماند.
reviewed: false