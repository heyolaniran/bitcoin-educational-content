question: یک میدان با تعداد متناهی از Elements چه نامیده می‌شود؟
answer: یک میدان گالوا
wrong_answers:
  - یک میدان ضربی
  - یک میدان متقارن
  - یک میدان برداری
explanation: |
  یک میدان متناهی همچنین به عنوان میدان گالوا شناخته می‌شود، که به نام ریاضیدان اوریست گالوا نام‌گذاری شده است و در رمزنگاری مدرن ضروری است.
reviewed: false