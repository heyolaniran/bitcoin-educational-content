question: نوع اصلی ساختار جبری مورد استفاده در میدان‌های متناهی برای رمزنگاری چیست؟
answer: چندجمله‌ای‌های تجزیه‌ناپذیر
wrong_answers:
  - ماتریس‌های مربعی
  - بردارهای تصادفی
  - ریشه‌های مکعبی
explanation: |
  در رمزنگاری، میدان‌های متناهی با مرتبه 2^m اغلب از چندجمله‌ای‌های تجزیه‌ناپذیر استفاده می‌کنند تا اطمینان حاصل شود که میدان به‌خوبی تعریف شده و تمامی عملیات ممکن است.
reviewed: false