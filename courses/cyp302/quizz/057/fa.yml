question: گروه آبلیان چیست؟
answer: گروهی که در آن عملگر جابجایی‌پذیر است
wrong_answers:
  - گروهی که یک مولد منحصر به فرد دارد
  - گروهی محدود به اعداد صحیح
  - گروهی بدون عنصر خنثی
explanation: |
  یک گروه آبلی در ریاضیات گروهی است که در آن ترتیب Elements در عملیات بر نتیجه تأثیری ندارد، به این معنی که از خاصیت جابجایی پیروی می‌کند.
