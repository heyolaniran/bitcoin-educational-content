question: چرا شیمیدان‌ها از نظریه گروه‌ها استفاده می‌کنند؟
answer: برای طبقه‌بندی اشکال مولکول‌ها
wrong_answers:
  - برای تجزیه و تحلیل پیوندهای شیمیایی
  - برای محاسبه جرم مولکولی
  - پیش‌بینی واکنش‌های شیمیایی
explanation: |
  نظریه گروه به شیمیدانان اجازه می‌دهد تا اشکال مولکولی را بر اساس تقارن‌هایشان طبقه‌بندی کنند، که این امر به درک ویژگی‌های ساختاری آن‌ها کمک می‌کند.
reviewed: false