question: کدام پاسخ یکی از دو شاخه اصلی رمزنگاری را نشان می‌دهد؟
answer: رمزنگاری متقارن
wrong_answers:
  - رمزنگاری
  - رمزنگاری همومورفیک
  - رمزگشایی
explanation: |
  رمزنگاری متقارن شاخه‌ای اصلی از رمزنگاری است که شامل طرح‌های رمزگذاری می‌شود که در آن از یک کلید واحد برای رمزگذاری و رمزگشایی پیام‌ها استفاده می‌شود.
