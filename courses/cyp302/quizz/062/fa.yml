question: چه نوع رمزگذاری متقارن عمدتاً برای ارتباطات پیوسته، مانند جریان‌های صوتی یا تصویری استفاده می‌شود؟
answer: رمزگذاری جریانی
wrong_answers:
  - رمزنگاری بلوکی
  - کد تأیید
  - هش کردن پیام
explanation: |
  رمزگذاری جریانی به‌ویژه برای ارتباطات پیوسته مناسب است زیرا داده‌ها را به‌طور مداوم رمزگذاری می‌کند، برخلاف رمزگذاری بلوکی که آن‌ها را به بلوک‌ها تقسیم می‌کند.
reviewed: false