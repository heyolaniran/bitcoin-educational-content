question: چرا مثال‌های رمزنگاری اغلب از کاراکترهای Alice و Bob استفاده می‌کنند؟
answer: برای توضیح اصول رمزنگاری به شیوه‌ای ساده‌شده
wrong_answers:
  - زیرا Alice و Bob اصطلاحات فنی در رمزنگاری هستند
  - زیرا آن‌ها رایج‌ترین نام‌ها در جهان هستند
  - زیرا آنها سیستم‌های کامپیوتری را نمایندگی می‌کنند
explanation: |
  Alice و Bob معمولاً در رمزنگاری به عنوان شخصیت‌های خیالی برای نشان دادن تبادل پیام‌ها و اصول رمزنگاری در یک زمینه ساده و شماتیک استفاده می‌شوند.
reviewed: false