question: کد احراز هویت پیام (MAC) در یک طرح رمزنگاری چه چیزی را تضمین می‌کند؟
answer: تمامیت و اصالت پیام
wrong_answers:
  - محرمانگی پیام
  - فشرده‌سازی پیام
  - تبدیل پیام به باینری
explanation: |
  کد احراز هویت پیام (MAC) برای اطمینان از این که پیام تغییر نکرده و واقعاً از فرستنده‌ی مورد نظر آمده است، استفاده می‌شود.
reviewed: false