question: سه جزء اساسی یک طرح رمزنگاری متقارن چیست؟
answer: یک الگوریتم تولید کلید، یک الگوریتم رمزگذاری، و یک الگوریتم رمزگشایی
wrong_answers:
  - یک الگوریتم هش، یک کلید عمومی، و یک الگوریتم تأیید
  - یک کلید عمومی، یک کلید خصوصی، و یک الگوریتم رمزگشایی
  - یک الگوریتم رمزنگاری، یک کلید عمومی، و یک کلید خصوصی
explanation: |
  یک طرح رمزنگاری متقارن شامل سه Elements است: یک الگوریتم تولید کلید، یک الگوریتم رمزگذاری، و یک الگوریتم رمزگشایی. همه آن‌ها از یک کلید یکسان استفاده می‌کنند.
reviewed: false