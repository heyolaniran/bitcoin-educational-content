question: सममित एन्क्रिप्शन योजना के तीन आवश्यक घटक क्या हैं?
answer: एक कुंजी निर्माण एल्गोरिथ्म, एक एन्क्रिप्शन एल्गोरिथ्म, और एक डिक्रिप्शन एल्गोरिथ्म
wrong_answers:
  - एक हैशिंग एल्गोरिथ्म, एक सार्वजनिक कुंजी, और एक सत्यापन एल्गोरिथ्म
  - एक सार्वजनिक कुंजी, एक निजी कुंजी, और एक डिक्रिप्शन एल्गोरिथ्म
  - एक एन्क्रिप्शन एल्गोरिथ्म, एक सार्वजनिक कुंजी और एक निजी कुंजी
explanation: |
  सममित एन्क्रिप्शन योजना में तीन Elements शामिल हैं: एक कुंजी निर्माण एल्गोरिथ्म, एक एन्क्रिप्शन एल्गोरिथ्म, और एक डिक्रिप्शन एल्गोरिथ्म। वे सभी एक ही कुंजी का उपयोग करते हैं।
