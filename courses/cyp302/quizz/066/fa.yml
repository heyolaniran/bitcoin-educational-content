question: عملکرد الگوریتم تولید کلید در یک طرح رمزنگاری متقارن چیست؟
answer: کلید خصوصی تولید می‌کند
wrong_answers:
  - کلید عمومی تولید می‌کند
  - پیام را هش می‌کند
  - این پیام را رمزگذاری می‌کند
explanation: |
  در یک طرح رمزنگاری متقارن، الگوریتم تولید کلید یک کلید خصوصی تولید می‌کند که سپس برای رمزگذاری و رمزگشایی پیام‌ها استفاده خواهد شد.
reviewed: false