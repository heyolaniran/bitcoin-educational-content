question: اگر یک مهاجم پیامی رمزگذاری شده را در یک طرح رمزگذاری متقارن خوب رهگیری کند، چه اتفاقی می‌افتد؟
answer: آنها نباید چیز مهمی درباره پیام اصلی یاد بگیرند.
wrong_answers:
  - آنها همیشه می‌توانند پیام را بدون کلید رمزگشایی کنند
  - آنها باید بتوانند آن را با یک کلید عمومی رمزگشایی کنند.
  - آنها باید بتوانند محتوای پیام را حدس بزنند.
explanation: |
  در یک طرح رمزنگاری متقارن خوب طراحی‌شده، یک مهاجم که پیامی رمزگذاری‌شده را رهگیری می‌کند، نباید بتواند بدون کلید رمزگشایی اطلاعات مرتبطی درباره محتوای پیام استنتاج کند.
reviewed: false