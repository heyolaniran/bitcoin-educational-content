question: نقش کلید در فرآیندهای رمزنگاری و رمزگشایی متقارن چیست؟
answer: برای رمزگذاری و رمزگشایی پیام استفاده می‌شود.
wrong_answers:
  - فقط برای رمزگشایی پیام استفاده می‌شود.
  - از آن برای ایجاد یک کد تأیید یکپارچگی پیام استفاده می‌شود.
  - این به صورت عمومی با generate کلیدهای دیگر به اشتراک گذاشته شده است.
explanation: |
  در طرح‌های رمزنگاری متقارن، از همان کلید خصوصی هم برای رمزگذاری پیام هنگام ارسال و هم برای رمزگشایی آن هنگام دریافت استفاده می‌شود.
reviewed: false