question: تفاوت استفاده از الگوریتم Salsa20 با کلید ۱۲۸ بیتی و کلید ۲۵۶ بیتی چیست؟
answer: طول کلید بر تعداد دورها در الگوریتم تأثیر می‌گذارد.
wrong_answers:
  - طول کلید نوع رمزگذاری را تغییر می‌دهد.
  - از یک کلید ۱۲۸ بیتی برای رمزنگاری جریانی و یک کلید ۲۵۶ بیتی برای رمزنگاری بلوکی استفاده می‌شود.
  - طول کلید در Salsa20 تأثیری ندارد.
explanation: |
  در طرح رمزنگاری متقارن Salsa20، طول کلید (۱۲۸ یا ۲۵۶ بیت) بر تعداد دورهای الگوریتم تأثیر می‌گذارد، بدون اینکه هسته اصلی الگوریتم را تغییر دهد.
reviewed: false