question: رمزگذاری شیفت چه نوع رمزگذاری است؟
answer: یک رمز جایگزینی مونوالفبایی
wrong_answers:
  - یک رمز جایگشت کلمه‌ای
  - یک رمز جایگزینی چندالفبایی
  - یک رمز نامتقارن
explanation: |
  رمزگذاری شیفت نمونه‌ای از یک رمز جایگزینی تک‌الفبایی است که در آن هر حرف در پیام با تعداد ثابتی از موقعیت‌ها در الفبا جابجا می‌شود.
reviewed: false