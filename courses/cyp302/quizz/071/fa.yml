question: رمزگشایی در رمز سزار چگونه کار می‌کند؟
answer: با کم کردن کلید از هر حرف رمزگذاری شده و اعمال مدول ۲۶
wrong_answers:
  - با کم کردن کلید از هر حرف رمزگذاری شده و اعمال مدول 20
  - با ضرب کلید در هر حرف رمزگذاری شده
  - با تقسیم کلید از هر حرف رمزگذاری شده و اعمال مدول ۲۷
explanation: |
  در رمزنگاری شیفت، رمزگشایی با کم کردن کلید از هر حرف رمز شده انجام می‌شود، سپس با اعمال مدول ۲۶ به متن اصلی بازمی‌گردد. مدول ۲۶ امکان بازگشت به ابتدای الفبا پس از حرف Z را فراهم می‌کند.