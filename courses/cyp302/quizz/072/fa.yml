question: چرا رمزگذاری شیفت به عنوان رمزگذاری متقارن در نظر گرفته می‌شود؟
answer: زیرا از همان کلید برای هر دو عملیات رمزگذاری و رمزگشایی استفاده می‌شود
wrong_answers:
  - زیرا از دو کلید، عمومی و خصوصی استفاده می‌کند
  - زیرا بدون استفاده از کلید رمزگشایی می‌کند
  - زیرا کلید با هر رمزگذاری متفاوت است
explanation: |
  رمزگذاری شیفت به عنوان رمزگذاری متقارن در نظر گرفته می‌شود زیرا از همان کلید برای رمزگذاری و رمزگشایی یک پیام استفاده می‌کند و بدین ترتیب محرمانگی بین طرف‌هایی که این کلید را به اشتراک می‌گذارند، تضمین می‌شود.
reviewed: false