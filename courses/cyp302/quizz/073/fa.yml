question: چگونه می‌توان یک کلید را در رمزنگاری شیفت تعریف کرد؟
answer: یک عدد از 0 تا 25
wrong_answers:
  - یک کلمه تصادفی
  - هر عدد تصادفی بدون محدودیت
  - یک عدد از ۱ تا ۲۶
explanation: |
  در رمزگذاری شیفت، کلید عددی بین 0 تا 25 است که با تعداد موقعیت‌های شیفت اعمال شده به هر حرف پیام در یک الفبای 26 حرفی مطابقت دارد.
reviewed: false