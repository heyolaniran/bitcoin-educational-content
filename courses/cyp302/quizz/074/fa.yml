question: اگر از کلید ۷ برای رمزگذاری کلمه CAT استفاده شود، چه اتفاقی می‌افتد؟
answer: کلمه تبدیل به JHA می‌شود
wrong_answers:
  - کلمه به JBA تبدیل می‌شود
  - کلمه به JHB تبدیل می‌شود
  - کلمه به ZHA تبدیل می‌شود
explanation: |
  با کلید ۷، هر حرف از کلمه CAT به اندازه ۷ موقعیت در الفبا جابجا می‌شود که کلمه رمزگذاری شده JHA را تولید می‌کند.
reviewed: false