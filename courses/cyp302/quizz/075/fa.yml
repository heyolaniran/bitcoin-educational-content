question: اصل کرکهف چگونه امنیت سیستم‌های باز مانند لینوکس را تسهیل می‌کند؟
answer: این امکان را برای تأیید عمومی آسیب‌پذیری‌های احتمالی فراهم می‌کند
wrong_answers:
  - این الگوریتم‌های رمزنگاری را نامرئی می‌کند
  - این تعداد کاربران بالقوه را محدود می‌کند
  - این اطمینان حاصل می‌کند که از کلیدهای منحصر به فرد استفاده می‌شود
explanation: |
  اصل کرکهف امکان تأیید عمومی نقص‌های امنیتی را فراهم می‌کند، همانند سیستم‌های متن‌باز، که از طریق شفافیت، سیستم‌ها را قابل‌اعتمادتر می‌سازد. امنیت تنها توسط کلید تضمین می‌شود، نه توسط فرآیند رمزنگاری خود.
reviewed: false