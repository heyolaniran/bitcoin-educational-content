question: چه اندازه کلیدی در برابر حملات جستجوی فراگیر برای رمزنگاری مدرن امن تلقی می‌شود؟
answer: ۱۲۸ بیت
wrong_answers:
  - ۱۶ بیت
  - ۶۴ بیت
  - ۱۰۰ بیت
explanation: |
  با کلیدی حداقل 128 بیتی، رمزنگاری مدرن در حال حاضر در برابر حملات جستجوی فراگیر امن در نظر گرفته می‌شود، زیرا تعداد تلاش‌ها غیرواقعی خواهد بود.
reviewed: false