question: نقش اصل کرکهف در رمزنگاری چیست؟
answer: برای اطمینان از اینکه امنیت به کلید مخفی وابسته است، نه به محرمانه بودن طرح
wrong_answers:
  - برای اطمینان از اینکه امنیت به محرمانه بودن طرح وابسته است، نه به کلید مخفی
  - برای نیاز به یک کلید رمزنگاری بسیار طولانی
  - برای اطمینان از اینکه هر پیام دارای یک کلید منحصر به فرد است
explanation: |
  بر اساس اصل کرکهف، امنیت یک سیستم رمزنگاری باید تنها به کلید محرمانه وابسته باشد و نه به محرمانه بودن خود الگوریتم.
reviewed: false