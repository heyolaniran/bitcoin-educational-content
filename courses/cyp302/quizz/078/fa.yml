question: حمله جستجوی فراگیر به چه معناست؟
answer: تلاش همه کلیدهای ممکن تا زمانی که کلید درست پیدا شود
wrong_answers:
  - تغییر متن به گونه‌ای که غیرقابل‌فهم شود
  - استفاده از کلید عمومی برای رمزگشایی پیام
  - زدن کامپیوتر بسیار Hard برای مجبور کردن آن به افشای کلید مخفی
explanation: |
  یک حمله جستجوی فراگیر شامل آزمایش سیستماتیک تمام کلیدهای ممکن برای رمزگشایی یک پیام رمزگذاری شده است.
