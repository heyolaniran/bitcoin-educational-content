question: چرا رمزگذاری شیفت در برابر حملات جستجوی فراگیر آسیب‌پذیر است؟
answer: زیرا تنها ۲۶ کلید ممکن دارد
wrong_answers:
  - زیرا از یک کلید عمومی استفاده می‌کند
  - زیرا بر اساس رمزنگاری متقارن است
  - زیرا از اعداد تصادفی استفاده می‌کند
explanation: |
  رمزگذاری شیفت به راحتی در برابر حملات جستجوی فراگیر آسیب‌پذیر است زیرا تنها ۲۶ کلید ممکن، از ۰ تا ۲۵، دارد که به دلیل استفاده از مدولوی ۲۶ است که خود به اندازه الفبا بستگی دارد. شما نمی‌توانید از کلیدهای معتبر بزرگ‌تر استفاده کنید، زیرا در هر صورت معادل یک کلید بین ۰ تا ۲۵ خواهند بود. بنابراین، کافی است هر یک از آن‌ها را آزمایش کنید تا پیام را پیدا کنید.
reviewed: false