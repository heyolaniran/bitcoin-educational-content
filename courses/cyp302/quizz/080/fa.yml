question: رمز جریانی در رمزنگاری چیست؟
answer: یک رمزگذاری متقارن که جریانی از کلیدها به طول همان پیام تولید می‌کند
wrong_answers:
  - یک رمزنگاری نامتقارن مبتنی بر اعداد اول
  - یک رمزگذاری که از چندین کلید رمزگشایی مختلف استفاده می‌کند
  - یک رمزگذاری که پیام را به بلوک‌های داده تقسیم می‌کند
explanation: |
  یک رمز دنباله‌ای یک رمزنگاری متقارن است که در آن یک دنباله از کلیدها به همان طول پیام با پیام ترکیب می‌شود تا متن رمزگذاری‌شده تولید شود.
reviewed: false