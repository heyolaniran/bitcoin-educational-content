question: کدام عملیات معمولاً برای ترکیب جریان کلید و پیام در یک رمز دنباله‌ای استفاده می‌شود؟
answer: XOR
wrong_answers:
  - ضرب
  - شیفت مدولار
  - جایگزینی هر حرف
explanation: |
  در یک رمزنگاری جریانی، عملیات XOR به طور کلی برای ترکیب جریان کلید با پیام استفاده می‌شود زیرا ساده و قابل برگشت است.
reviewed: false