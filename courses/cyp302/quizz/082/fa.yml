question: چرا پد یک‌بار مصرف به عنوان یک روش رمزنگاری امن در نظر گرفته می‌شود؟
answer: زیرا هر بیت از کلید تصادفی است و هیچ قسمتی دوباره استفاده نمی‌شود
wrong_answers:
  - زیرا از یک کلید عمومی و خصوصی تصادفی استفاده می‌کند
  - زیرا به اعداد اول متکی است
  - زیرا فقط پیام‌های کوچک را رمزگذاری می‌کند
explanation: |
  پد یک‌بار مصرف امن است زیرا هر بیت از کلید تصادفی است و هرگز دوباره استفاده نمی‌شود، که اطمینان می‌دهد هیچ ردپای قابل بهره‌برداری برای یک مهاجم باقی نمی‌گذارد.
reviewed: false