question: چرا رمزهای جریانی شبه‌تصادفی در عمل بیشتر از پدهای یک‌بار مصرف استفاده می‌شوند؟
answer: آنها اجازه می‌دهند که از یک کلید کوتاه‌تر استفاده شود در حالی که یک جریان کلید طولانی‌تر تولید می‌شود.
wrong_answers:
  - آن‌ها به یک کلید مخفی نیاز ندارند
  - آن‌ها از ترکیبی از رمزنگاری متقارن و نامتقارن استفاده می‌کنند.
  - آنها به به‌روزرسانی‌های کلیدی نیاز ندارند.
explanation: |
  رمزنگاری‌های جریانی شبه‌تصادفی عملی‌تر هستند زیرا اجازه می‌دهند یک کلید کوتاه به یک جریان کلید بلندتر گسترش یابد و نیاز به ذخیره‌سازی کلیدی به اندازه خود پیام را از بین می‌برند.
reviewed: false