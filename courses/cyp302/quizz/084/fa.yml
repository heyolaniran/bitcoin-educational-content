question: محدودیت عملی اصلی پد یک‌بار مصرف چیست؟
answer: کلید باید به اندازه پیام باشد و هرگز دوباره استفاده نشود
wrong_answers:
  - کلید باید هر روز تغییر کند
  - کلید باید سه برابر طولانی‌تر از پیام باشد.
  - کلید باید لزوماً بر روی یک Minitel فرانسوی ذخیره شود.
explanation: |
  کلید در یک پد یک‌بار مصرف باید به اندازه پیام باشد و هرگز نباید دوباره استفاده شود، که این امر استفاده از آن را در زمینه‌های عملی به طور قابل توجهی پیچیده می‌کند. این به این دلیل است که اگر کسی بتواند داده‌ها را به اندازه پیام به صورت امن منتقل کند، منطقی‌تر خواهد بود که پیام را به طور مستقیم منتقل کند تا کلید را.
reviewed: false