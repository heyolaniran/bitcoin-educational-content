question: یک رمز بلوکی در رمزنگاری چیست؟
answer: یک الگوریتم که یک رشته با طول ثابت را به رشته‌ای دیگر با همان طول تبدیل می‌کند
wrong_answers:
  - یک رمزنگاری نامتقارن بر اساس کلیدهای عمومی و خصوصی محرمانه
  - سیستمی که داده‌های با طول متغیر را به صورت جریانی رمزگذاری می‌کند
  - یک رمزگذاری که به کلید مخفی نیاز ندارد
explanation: |
  یک رمز بلوکی الگوریتمی است که یک تبدیل را بر روی یک رشته بیت با طول ثابت با یک کلید اعمال می‌کند تا رشته دیگری با همان طول تولید کند.
reviewed: false