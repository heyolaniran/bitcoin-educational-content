question: عیب اصلی روش ECB با یک رمز بلوکی چیست؟
answer: این قطعی است و می‌تواند الگوهایی در داده‌ها را آشکار کند
wrong_answers:
  - این نیاز به کلیدهایی با طول متغیر دارد
  - این با پیام‌های بیش از ۱۲۸ بیت کار نمی‌کند.
  - این با پیام‌های بیش از ۲۵۶ بیت کار نمی‌کند.
explanation: |
  روش ECB (دفترچه کد الکترونیکی) قطعی است: بلوک‌های داده‌ی یکسان به یک شکل رمزگذاری می‌شوند که این امر امکان شناسایی الگوها در متن رمزگذاری‌شده را فراهم می‌کند.
reviewed: false