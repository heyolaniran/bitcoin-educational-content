question: ब्लॉक सिफर के साथ ईसीबी विधि का मुख्य दोष क्या है?
answer: यह नियतात्मक है और डेटा में पैटर्न प्रकट कर सकता है
wrong_answers:
  - इसके लिए परिवर्तनीय लंबाई की कुंजियों की आवश्यकता होती है
  - यह 128 बिट से अधिक के संदेशों के साथ काम नहीं करता
  - यह 256 बिट से अधिक के संदेशों के साथ काम नहीं करता
explanation: |
  ईसीबी विधि (इलेक्ट्रॉनिक कोड बुक) नियतात्मक है: डेटा के समान ब्लॉकों को एक ही तरीके से एन्क्रिप्ट किया जाता है, जिससे एन्क्रिप्ट किए गए पाठ में पैटर्न का पता लगाया जा सकता है।
reviewed: false