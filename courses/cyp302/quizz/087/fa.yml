question: کدام روش رمز بلوکی از یک بردار اولیه استفاده می‌کند و رمزنگاری احتمالی ایجاد می‌کند؟
answer: زنجیره‌سازی بلوک رمز (CBC)
wrong_answers:
  - ECB (کتاب کد الکترونیکی)
  - AES-128
  - SHA-256
explanation: |
  روش CBC از یک بردار اولیه استفاده می‌کند و یک عملیات XOR بین هر بلوک از متن ساده و بلوک رمزگذاری شده قبلی اعمال می‌کند، که باعث می‌شود رمزگذاری احتمالی و ایمن‌تر از ECB باشد.
reviewed: false