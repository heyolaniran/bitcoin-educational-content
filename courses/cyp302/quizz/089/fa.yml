question: اهمیت استفاده از یک Nonce تصادفی در روش‌های CBC و OFB چیست؟
answer: این اطمینان حاصل می‌کند که هر جلسه رمزگذاری منحصر به فرد است، حتی برای داده‌های یکسان.
wrong_answers:
  - طول کلید را در طول فرآیند رمزنگاری کاهش می‌دهد.
  - این باعث می‌شود رمزگذاری سریع‌تر شود.
  - این کار کد الگوریتم را برای انسان‌ها زیباتر می‌کند.
explanation: |
  با استفاده از یک Nonce تصادفی برای هر جلسه، روش‌های CBC و OFB اطمینان حاصل می‌کنند که هر رمزگذاری منحصربه‌فرد است، که از حملاتی که از داده‌های یکسان سوءاستفاده می‌کنند جلوگیری می‌کند.
reviewed: false