question: چرا ساخت یک رمزگذاری حالت بلوک از یک رمز دنباله‌ای دشوار است؟
answer: زیرا رمزنگارهای جریانی داده‌ها را به‌طور پیوسته پردازش می‌کنند
wrong_answers:
  - زیرا رمزنگارهای جریانی از کلیدهای خصوصی استفاده نمی‌کنند
  - زیرا حالت‌های بلوک به کلیدهای طولانی‌تری نیاز دارند
  - زیرا رمزنگارهای جریانی همیشه کندتر هستند
explanation: |
  رمزنگاری‌های جریانی برای رمزگذاری داده‌ها به صورت پیوسته (بیت به بیت یا بایت به بایت) طراحی شده‌اند، که استفاده از آن‌ها در حالت بلوکی که نیاز به پردازش در بلوک‌های با اندازه ثابت دارد را پیچیده می‌کند.
reviewed: false