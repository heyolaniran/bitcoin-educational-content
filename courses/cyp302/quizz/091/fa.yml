question: تفاوت اصلی بین یک رمز جریان ابتدایی و یک رمز جریان بلوکی چیست؟
answer: یک رمز دنباله‌ای ابتدایی از یک رمز بلوکی ساخته نمی‌شود.
wrong_answers:
  - یک رمز جریان ابتدایی نیاز به پدینگ پیام‌ها دارد.
  - یک رمز دنباله‌ای رمز بلوکی از بلوک‌هایی با اندازه متغیر استفاده می‌کند.
  - یک رمز بلوکی جریان رمز نمی‌تواند برای داده‌های بزرگ استفاده شود.
explanation: |
  یک رمز دنباله‌ای ابتدایی، مانند Salsa20، به‌طور مستقل از یک رمز بلوکی طراحی شده است، در حالی که یک رمز دنباله‌ای بلوکی از یک رمز بلوکی به عنوان پایه خود استفاده می‌کند و به‌گونه‌ای تغییر یافته است که یک جریان رمزگذاری تولید کند.
reviewed: false