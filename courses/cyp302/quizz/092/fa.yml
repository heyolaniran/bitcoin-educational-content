question: چگونه می‌توان یک رمز بلوکی را به یک رمز جریانی تبدیل کرد؟
answer: با استفاده از حالت‌هایی مانند OFB که generate یک جریان کلید از رمز بلوکی تولید می‌کند
wrong_answers:
  - با تقسیم متن ساده به بایت‌ها و رمزگذاری آن‌ها یکی یکی
  - با اعمال پدینگ به پیام‌ها قبل از رمزگذاری
  - با افزایش طول کلید برای هر بلوک رمزگذاری شده
explanation: |
  حالت‌هایی مانند OFB به یک رمز بلوکی اجازه می‌دهند تا به عنوان یک رمز جریانی عمل کند، با تولید یک جریان کلید که سپس برای هر بخش از متن اصلی استفاده می‌شود.
reviewed: false