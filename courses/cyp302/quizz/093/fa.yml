question: اندازه بلوک معمول برای رمزگذاری بلوک چیست؟
answer: ۶۴، ۱۲۸، ۱۹۲، یا ۲۵۶ بیت
wrong_answers:
  - ۸، ۱۶، ۳۲، یا ۶۴ بیت
  - ۴، ۸، ۱۶، یا ۳۲ بیت
  - ۲۵۶، ۵۱۲، ۱۰۲۴، یا ۲۰۴۸ بیت
explanation: |
  رمزنگاری‌های بلوکی داده‌ها را در بلوک‌هایی با اندازه ثابت، معمولاً ۶۴، ۱۲۸، ۱۹۲ یا ۲۵۶ بیت، پردازش می‌کنند تا امنیت و یکپارچگی بهینه رمزنگاری را تضمین کنند.
reviewed: false