question: منبع اصلی سردرگمی بین اصطلاحات رمز بلوکی و رمز جریانی چیست؟
answer: رمزنگاری بلوکی گاهی اوقات صرفاً به عنوان الگوریتم‌هایی که از حالت‌های بلوکی مانند ECB یا CBC استفاده می‌کنند، درک می‌شود.
wrong_answers:
  - جریان‌رمزها همیشه کمتر از رمزهای بلوکی امن هستند.
  - رمزهای بلوکی بر روی یک بیت در هر بار عمل می‌کنند.
  - رمزهای جریانی همیشه به پدینگ نیاز دارند.
explanation: |
  سردرگمی از این واقعیت ناشی می‌شود که برخی رمزنگارهای بلوکی را فقط به عنوان الگوریتم‌هایی با استفاده از حالت‌های بلوک خاص در نظر می‌گیرند، در حالی که در واقعیت، آن‌ها می‌توانند شامل طرح‌های رمزگذاری مانند حالت OFB باشند.
reviewed: false