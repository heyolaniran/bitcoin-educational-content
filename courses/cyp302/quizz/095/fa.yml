question: چگونه یک MAC به Alice اجازه می‌دهد تا تأیید کند که یک پیام واقعاً از Bob است؟
answer: با بررسی اینکه برچسب تولید شده با برچسب ارسال شده توسط Bob مطابقت دارد
wrong_answers:
  - با رمزگشایی پیام برای بررسی اینکه آیا قابل خواندن است
  - با مقایسه اندازه پیام و اندازه برچسب
  - با تأیید IP فرستنده Address
explanation: |
  Alice از کلید مخفی مشترک برای generate یک برچسب از پیام دریافت‌شده استفاده می‌کند. اگر این برچسب با برچسب ارسال‌شده توسط Bob مطابقت داشته باشد، او می‌داند که پیام معتبر و دست‌نخورده است.
reviewed: false