question: سه مرحله اساسی در یک طرح MAC چیست؟
answer: تولید کلید، تولید برچسب، تأیید
wrong_answers:
  - رمزگذاری، رمزگشایی، انتقال
  - تولید کلید عمومی، رمزگذاری کلید خصوصی، اعتبارسنجی
  - هش کردن پیام، رمزگذاری تگ، توزیع تگ
explanation: |
  یک طرح MAC شامل سه مرحله اصلی است: تولید یک کلید مخفی، تولید یک برچسب برای پیام، و تأیید اینکه پیام دریافت‌شده و برچسب آن مطابقت دارند.
reviewed: false