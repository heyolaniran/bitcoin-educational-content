question: MAC योजना में तीन बुनियादी चरण क्या हैं?
answer: कुंजी निर्माण, टैग निर्माण, सत्यापन
wrong_answers:
  - एन्क्रिप्शन, डिक्रिप्शन, ट्रांसमिशन
  - सार्वजनिक कुंजी निर्माण, निजी कुंजी एन्क्रिप्शन, सत्यापन
  - संदेश हैशिंग, टैग एन्क्रिप्शन, टैग वितरण
explanation: |
  MAC योजना में तीन मुख्य चरण होते हैं: गुप्त कुंजी उत्पन्न करना, संदेश के लिए टैग तैयार करना, तथा यह सत्यापित करना कि प्राप्त संदेश और उसका टैग मेल खाते हैं।
reviewed: false