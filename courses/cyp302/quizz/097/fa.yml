question: چرا محرمانگی به تنهایی برای اطمینان از ارتباط امن کافی نیست؟
answer: زیرا یک مهاجم همچنان می‌تواند پیام را رهگیری و تغییر دهد بدون اینکه محتوای آن را درک کند.
wrong_answers:
  - زیرا حفظ محرمانگی بسیار دشوار است.
  - زیرا کلیدهای خصوصی به راحتی قابل حدس زدن هستند.
  - زیرا پیام‌ها بدون امضای دیجیتال قابل تأیید نیستند.
explanation: |
  محرمانگی محتوای پیام‌ها را محافظت می‌کند، اما بدون یک MAC، یک مهاجم همچنان می‌تواند پیام را رهگیری و تغییر دهد بدون اینکه آن را درک کند، و به این ترتیب یکپارچگی ارتباط را به خطر بیندازد.
reviewed: false