question: چگونه یک MAC به جلوگیری از دستکاری پیام توسط یک مهاجم کمک می‌کند؟
answer: با اجازه دادن به تأیید اینکه پیام دریافت شده تغییر نکرده است
wrong_answers:
  - با جلوگیری از حملات نوع brute-force
  - با پنهان کردن محتوای پیام
  - با مسدود کردن خودکار پیام‌های مشکوک
explanation: |
  یک MAC به گیرنده این امکان را می‌دهد تا از عدم تغییر پیام اطمینان حاصل کند، از طریق یک برچسب که با یک کلید مخفی مشترک تولید شده است، که احتمال دستکاری را محدود می‌کند.
reviewed: false