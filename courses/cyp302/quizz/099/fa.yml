question: عملکرد اصلی کد احراز هویت پیام (MAC) چیست؟
answer: اطمینان از اصالت و یکپارچگی پیام
wrong_answers:
  - رمزگذاری پیام‌ها برای اطمینان از محرمانگی
  - جلوگیری از رهگیری پیام
  - کلیدهای خصوصی generate برای هر ارتباط
explanation: |
  یک MAC یک طرح رمزنگاری است که امکان تأیید این که یک پیام واقعاً از فرستنده قانونی آمده و تغییر نیافته است را فراهم می‌کند، بنابراین اصالت و یکپارچگی را تضمین می‌کند.
reviewed: false