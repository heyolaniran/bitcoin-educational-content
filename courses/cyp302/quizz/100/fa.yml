question: نقش Nonce در یک طرح رمزنگاری احراز هویت شده چیست؟
answer: اطمینان حاصل کنید که هر پیام دارای یک برچسب منحصر به فرد باشد تا از تکرار جلوگیری شود.
wrong_answers:
  - شناسایی فرستنده پیام
  - ایجاد یک کلید رمزگشایی موقت
  - یک Layer اضافی رمزگذاری اضافه کنید
explanation: |
  در یک طرح رمزنگاری تأیید شده، از Nonce استفاده می‌شود تا اطمینان حاصل شود که هر پیام دارای یک برچسب منحصر به فرد است و بدین ترتیب با جلوگیری از تکرارها، امنیت را افزایش می‌دهد.
reviewed: false