question: HMAC چیست؟
answer: یک کد احراز هویت پیام بر اساس یک تابع Hash
wrong_answers:
  - یک الگوریتم رمزنگاری نامتقارن بر اساس تابع Hash
  - یک الگوریتم رمزنگاری نامتقارن بر اساس دیفی-هلمن
  - یک کد احراز هویت پیام مبتنی بر دیفی-هلمن
explanation: |
  یک HMAC یک کد احراز هویت پیام است که از یک تابع Hash، مانند SHA-256، برای ایجاد یک برچسب استفاده می‌کند که صحت و اعتبار پیام را تأیید می‌کند.
reviewed: false