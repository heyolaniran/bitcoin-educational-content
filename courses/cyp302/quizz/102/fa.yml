question: ترتیب صحیح عملیات در رمزنگاری تأیید شده چیست؟
answer: ابتدا رمزگذاری کنید، سپس یک برچسب روی متن رمزگذاری شده ایجاد کنید.
wrong_answers:
  - ابتدا یک برچسب ایجاد کنید، سپس پیام و برچسب را رمزگذاری کنید
  - متن ساده را با یک برچسب ترکیب کرده و سپس رمزگذاری کنید.
  - یک برچسب ایجاد کنید، سپس از یک کلید عمومی برای رمزگذاری آن استفاده کنید.
explanation: |
  برای اطمینان از امنیت، رمزنگاری تأیید شده باید ابتدا پیام را رمزگذاری کند، سپس generate یک برچسب بر روی متن رمزگذاری شده اضافه کند. سایر ترتیب‌ها ممکن است آسیب‌پذیر باشند.
reviewed: false