question: چرا رمزنگاری احراز هویت شده در برابر حملات انتخاب متن رمز مقاوم است؟
answer: زیرا هرگونه تغییر در متن رمز توسط یک مهاجم باعث می‌شود که برچسب نامعتبر شود
wrong_answers:
  - زیرا از یک الگوریتم رمزنگاری واحد استفاده می‌کند
  - زیرا هرگونه تغییر در متن رمز توسط یک مهاجم کلید را نامعتبر می‌کند
  - زیرا فقط پیام را بدون برچسب رمزگذاری می‌کند
explanation: |
  یک طرح رمزنگاری تأیید شده برای شناسایی تغییرات در متن رمز طراحی شده است، که در صورت تلاش برای دستکاری، برچسب را نامعتبر می‌کند و مقاومت در برابر حملات انتخاب متن رمز را تضمین می‌کند.
reviewed: false