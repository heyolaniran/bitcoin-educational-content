question: هدف اصلی یک طرح رمزنگاری احراز هویت شده چیست؟
answer: اطمینان از محرمانگی و اصالت ارتباطات
wrong_answers:
  - کلیدهای generate به صورت ایمن
  - جایگزینی MACها در تبادلات رمزنگاری
  - به‌طور خودکار پیام‌های رهگیری‌شده را رمزگشایی کنید
explanation: |
  یک طرح رمزنگاری تأییدشده، رمزنگاری و یک کد تأیید هویت (MAC) را ترکیب می‌کند تا هم محرمانگی پیام‌ها و هم اصالت آن‌ها را تضمین کند.
reviewed: false