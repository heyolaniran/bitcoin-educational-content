question: چگونه طرفین می‌توانند ترتیب صحیح پیام‌ها را در یک جلسه امن تضمین کنند؟
answer: با استفاده از شماره‌های ترتیبی در هر پیام
wrong_answers:
  - با تعویض کلیدها برای هر پیام
  - با افزودن تأخیر بین پیام‌ها
  - با رمزگذاری پیام‌ها با یک الگوریتم متفاوت
explanation: |
  شماره‌های توالی تضمین می‌کنند که پیام‌ها به ترتیب صحیح دریافت شوند و از جابجایی آن‌ها جلوگیری می‌کنند.
reviewed: false