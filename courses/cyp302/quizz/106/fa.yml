question: چه مکانیزمی از حملات بازتابی در ارتباطات امن جلوگیری می‌کند؟
answer: افزودن یک شناسه منحصر به فرد برای هر شرکت‌کننده
wrong_answers:
  - افزایش طول کلید
  - استفاده از کلیدهای متعدد برای هر پیام
  - افزودن یک کلید اضافی در هر پیام
explanation: |
  افزودن یک شناسه‌ی یکتا برای هر شرکت‌کننده در پیام رمزگذاری‌شده از حملات بازتابی جلوگیری می‌کند، زیرا امکان تشخیص منبع پیام‌ها را فراهم می‌سازد.
reviewed: false