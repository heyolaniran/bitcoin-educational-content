question: حمله بازتاب در یک جلسه ارتباطی چیست؟
answer: مهاجم پیامی را که بین Alice و Bob رهگیری کرده بود، به Alice بازمی‌فرستد.
wrong_answers:
  - مهاجم ترتیب پیام‌ها را در ارتباطات معکوس می‌کند
  - مهاجم یک پیام اصلاح‌شده بدون برچسب ارسال می‌کند
  - مهاجم از یک پیام قدیمی برای ایجاد پیام جدید استفاده می‌کند
explanation: |
  در یک حمله بازتابی، مهاجم پیامی را از Alice به Bob رهگیری کرده و همان پیام را به Alice بازمی‌فرستد، که باعث ایجاد سردرگمی در جلسه می‌شود.
reviewed: false