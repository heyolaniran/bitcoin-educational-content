question: چرا یک طرح رمزنگاری تأیید شده به تنهایی در یک جلسه ارتباطی ناکافی است؟
answer: این تضمین نمی‌کند که پیام در زمان جلسه توسط فرستنده ارسال شده باشد.
wrong_answers:
  - از کلیدهایی استفاده می‌کند که خیلی کوتاه هستند.
  - این پیام‌هایی که در زمان جلسه ارسال می‌شوند را رمزگذاری نمی‌کند.
  - این امکان را برای احراز هویت فرستنده در زمان جلسه فراهم نمی‌کند.
explanation: |
  یک طرح رمزنگاری تأیید شده بدون افزودن شاخص‌هایی مانند شناسه‌ها و شماره‌های ترتیبی، در برابر حملاتی مانند بازپخش، ترتیب‌دهی مجدد و بازتاب محافظت نمی‌کند.
reviewed: false