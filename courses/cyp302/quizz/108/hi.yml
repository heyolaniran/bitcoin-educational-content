question: संचार सत्र में केवल प्रमाणीकृत एन्क्रिप्शन योजना ही अपर्याप्त क्यों है?
answer: यह गारंटी नहीं देता कि संदेश सत्र के समय प्रेषक द्वारा भेजा गया था।
wrong_answers:
  - इसमें बहुत छोटी कुंजियों का प्रयोग किया गया है।
  - यह सत्र के समय भेजे गए संदेशों को एन्क्रिप्ट नहीं करता है।
  - यह सत्र के समय प्रेषक के प्रमाणीकरण की अनुमति नहीं देता है।
explanation: |
  एक प्रमाणीकृत एन्क्रिप्शन योजना पहचानकर्ताओं और अनुक्रम संख्या जैसे संकेतकों को जोड़े बिना रिप्ले, रीऑर्डरिंग और रिफ्लेक्शन जैसे हमलों से सुरक्षा नहीं देती है।
reviewed: false