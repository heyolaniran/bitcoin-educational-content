question: چه نوع حمله‌ای را می‌توان با استفاده از یک شماره توالی در یک جلسه ارتباطی امن جلوگیری کرد؟
answer: حملات بازپخش و بازآرایی
wrong_answers:
  - حملات استراق سمع منفعل
  - حملات انکار سرویس
  - حملات جعل کلید
explanation: |
  شماره توالی در هر پیام از حملات بازپخش و بازآرایی جلوگیری می‌کند، زیرا امکان تأیید ترتیب و یکتایی پیام‌ها را فراهم می‌سازد.
reviewed: false