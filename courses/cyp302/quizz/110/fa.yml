question: چه چیزی باعث می‌شود که RC4 امروز آسیب‌پذیر باشد، با وجود محبوبیت گذشته‌اش؟
answer: ضعف‌های به‌خوبی مستند شده در تولید جریان کلید
wrong_answers:
  - یک کلید خیلی کوتاه برای تضمین امنیت
  - ناتوانی آن در کار با متون طولانی
  - الزام استفاده از کلید عمومی علاوه بر کلید خصوصی
explanation: |
  RC4 دارای ضعف‌های قابل توجهی در تولید جریان کلید است که رمزنگاری را در معرض حملات قرار می‌دهد، از این رو به تدریج در پروتکل‌های امنیتی مدرن کنار گذاشته می‌شود.
reviewed: false