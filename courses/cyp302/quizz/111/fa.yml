question: رمزگذاری جریان ناهمگام چیست؟
answer: یک رمزگذاری که جریان کلید آن به کلید و Elements متن رمزگذاری شده قبلی بستگی دارد
wrong_answers:
  - یک رمزگذاری که با هر بار استفاده یک جریان کلید تصادفی تولید می‌کند
  - یک رمزگذاری که در آن کلید باید برای هر پیام تغییر کند
  - یک رمزگذاری که جریان کلید آن فقط به کلید اولیه بستگی دارد
explanation: |
  رمزگذاری جریان ناهمگام نوعی رمزگذاری است که در آن جریان کلید تحت تأثیر کلید و Elements متن رمزگذاری شده قرار می‌گیرد.
reviewed: false