question: چرا RC4 به عنوان یک رمز دنباله‌ای همگام طبقه‌بندی می‌شود؟
answer: جریان کلید مستقل از متن ساده و متن رمز است
wrong_answers:
  - جریان کلید به مقادیر متن رمز قبلی بستگی دارد
  - متن ساده باید در جریان کلید ادغام شود
  - این از یک جریان کلید که صرفاً بر اساس متن ساده است استفاده می‌کند.
explanation: |
  RC4 یک رمز دنباله‌ای هم‌زمان است زیرا جریان کلید آن تنها به کلید اولیه وابسته است و نه به متن اصلی یا متن رمز شده، که این امر استقلال این جریان از پیام‌ها را تضمین می‌کند.
reviewed: false