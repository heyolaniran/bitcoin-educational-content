question: نقش آرایه K در رمزنگاری RC4 چیست؟
answer: آرایه S را به generate جریان کلید مقداردهی اولیه و تبدیل می‌کند.
wrong_answers:
  - متن ساده را به‌طور مستقیم رمزگذاری می‌کند
  - متن رمزگذاری‌شده را ذخیره می‌کند
  - این فقط به عنوان ذخیره‌سازی موقت برای داده‌ها تا پایان فرآیند عمل می‌کند.
explanation: |
  آرایه K برای تبدیل آرایه S در فرآیند زمان‌بندی کلید استفاده می‌شود، که امکان تولید یک جریان کلید شبه‌تصادفی برای رمزگذاری متن اصلی را فراهم می‌کند.
reviewed: false