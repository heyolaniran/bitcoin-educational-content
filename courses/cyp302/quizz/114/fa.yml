question: چه چیزی یک جریان کلید RC4 با طول استاندارد را از نسخه ساده‌شده ارائه‌شده در مثال متمایز می‌کند؟
answer: طول آرایه S در RC4 استاندارد ۲۵۶ بایت است
wrong_answers:
  - آرایه S به 128 بایت محدود شده است
  - کلید استفاده شده باید بیش از ۸ بایت باشد
  - هیچ طول ثابتی برای S در استاندارد RC4 وجود ندارد
explanation: |
  در RC4 استاندارد، آرایه S شامل 256 بایت است که به طور قابل توجهی پیچیدگی محاسبات را افزایش می‌دهد و امنیت را در مقایسه با نسخه ساده شده با تنها 8 بایت بهبود می‌بخشد.
reviewed: false