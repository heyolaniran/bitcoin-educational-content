question: اصطلاح انتشار در زمینه رمزگذاری AES به چه معناست؟
answer: تغییر در متن ساده منجر به تغییر قابل توجهی در متن رمز می‌شود.
wrong_answers:
  - متن رمزگذاری شده همیشه به همان طول است.
  - بایت‌های کلید به طور یکنواخت توزیع شده‌اند
  - اطلاعات حساس در هر بلوک از متن رمزگذاری شده به هم ریخته می‌شود.
explanation: |
  انتشار به این معناست که یک تغییر کوچک در متن ساده منجر به تغییر قابل توجهی در متن رمز می‌شود و این امر برای مهاجم دشوار می‌سازد که متن ساده را استنتاج کند.
reviewed: false