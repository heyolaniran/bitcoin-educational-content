question: هدف از عملیات جابجایی سطرها در AES چیست؟
answer: برای افزایش انتشار با بازآرایی بایت‌ها در جدول حالت
wrong_answers:
  - اطمینان حاصل کنید که هر بلوک به همان طول باشد
  - یک کلید مخفی به هر سطر جدول حالت اعمال کنید
  - معرفی سردرگمی اضافی با جایگزینی بایت‌ها
explanation: |
  عملیات شیفت ردیف‌ها در AES بایت‌ها را در جدول حالت جابجا می‌کند تا اطلاعات را پراکنده کند و در نتیجه انتشار را افزایش دهد.
reviewed: false