question: एईएस में शिफ्ट रो ऑपरेशन का उद्देश्य क्या है?
answer: राज्य तालिका में बाइट्स को पुनः व्यवस्थित करके प्रसार को बढ़ाना
wrong_answers:
  - सुनिश्चित करें कि प्रत्येक ब्लॉक समान लंबाई का हो
  - राज्य तालिका की प्रत्येक पंक्ति पर एक गुप्त कुंजी लागू करें
  - बाइट्स को प्रतिस्थापित करके अतिरिक्त भ्रम पैदा करें
explanation: |
  एईएस में शिफ्ट रो ऑपरेशन सूचना को फैलाने के लिए स्टेट टेबल में बाइट्स को पुनर्व्यवस्थित करता है, जिससे प्रसार बढ़ता है।
reviewed: false