question: در کدام مرحله از رمزنگاری AES از میدان‌های گالوا استفاده می‌شود؟
answer: در جایگزینی بایت و عملیات MixColumns
wrong_answers:
  - در تولید کلید خصوصی
  - هنگام تقسیم متن به بلوک‌های ۱۲۸ بیتی
  - در هر مرحله از عملیات XOR
explanation: |
  فیلدهای گالوا در جایگزینی بایت برای محاسبه معکوس ضربی و در عملیات MixColumns برای انجام ضرب‌ها به‌صورت مدولوی یک چندجمله‌ای تجزیه‌ناپذیر استفاده می‌شوند.
reviewed: false