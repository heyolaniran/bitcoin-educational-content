question: عملکرد عملیات جایگزینی بایت (S-Box) در رمزنگاری AES چیست؟
answer: این باعث سردرگمی می‌شود با جایگزینی هر بایت با بایت دیگر
wrong_answers:
  - این یکپارچگی را با بررسی بایت‌های پیام تضمین می‌کند
  - ستون‌ها را جابجا می‌کند تا انتشار را افزایش دهد
  - متن ساده را به بلوک‌های ۱۲۸ بیتی تقسیم می‌کند
explanation: |
  عملیات جایگزینی بایت (S-Box) در AES با جایگزینی هر بایت با یک مقدار متفاوت بر اساس یک جدول، ابهام ایجاد می‌کند و تحلیل متن رمزگذاری‌شده را دشوارتر می‌سازد.
reviewed: false