question: एईएस एन्क्रिप्शन में बाइट प्रतिस्थापन ऑपरेशन (एस-बॉक्स) क्या भूमिका निभाता है?
answer: यह प्रत्येक बाइट को दूसरे से प्रतिस्थापित करके भ्रम पैदा करता है
wrong_answers:
  - यह संदेश बाइट्स की जाँच करके अखंडता सुनिश्चित करता है
  - यह प्रसार बढ़ाने के लिए स्तंभों को फेरबदल करता है
  - यह सादे पाठ को 128-बिट ब्लॉकों में विभाजित करता है
explanation: |
  एईएस में बाइट प्रतिस्थापन ऑपरेशन (एस-बॉक्स) प्रत्येक बाइट को तालिका के अनुसार एक अलग मान से प्रतिस्थापित करके भ्रम पैदा करता है, जिससे एन्क्रिप्टेड पाठ का विश्लेषण करना अधिक कठिन हो जाता है।
reviewed: false