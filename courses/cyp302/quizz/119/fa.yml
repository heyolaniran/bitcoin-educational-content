question: چرا استفاده از رمزنگاری AES در حالت ECB برای امنیت توصیه نمی‌شود؟
answer: این منجر به رمزنگاری قطعی می‌شود
wrong_answers:
  - این نیاز به کلیدی با بیش از ۱۲۸ بیت دارد
  - برای اکثر برنامه‌های مدرن بسیار کند است.
  - این اجازه نمی‌دهد که متن به بلوک‌های ۱۲۸ بیتی تقسیم شود.
explanation: |
  حالت ECB توصیه نمی‌شود زیرا رمزگذاری قطعی تولید می‌کند، به این معنی که بلوک‌های یکسان از متن ساده، بلوک‌های یکسانی از متن رمز شده تولید می‌کنند که می‌تواند برای حدس زدن اطلاعاتی درباره متن ساده مورد سوءاستفاده قرار گیرد.