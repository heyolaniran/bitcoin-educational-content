question: सुरक्षित उपयोग के लिए ECB मोड में AES एन्क्रिप्शन की अनुशंसा क्यों नहीं की जाती है?
answer: इसका परिणाम नियतात्मक एन्क्रिप्शन होता है
wrong_answers:
  - इसके लिए 128 बिट से अधिक की कुंजी की आवश्यकता होती है
  - यह अधिकांश आधुनिक अनुप्रयोगों के लिए बहुत धीमा है
  - यह पाठ को 128-बिट ब्लॉकों में विभाजित करने की अनुमति नहीं देता है
explanation: |
  ईसीबी मोड की अनुशंसा नहीं की जाती है, क्योंकि यह नियतात्मक एन्क्रिप्शन उत्पन्न करता है, जिसका अर्थ है कि सादे पाठ के समान ब्लॉक सिफरटेक्स्ट के समान ब्लॉक उत्पन्न करेंगे, जिसका उपयोग सादे पाठ के बारे में जानकारी का अनुमान लगाने के लिए किया जा सकता है।