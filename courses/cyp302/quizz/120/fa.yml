question: تأثیر مسائل توزیع و مدیریت کلید قبل از دهه ۱۹۷۰ چه بود؟
answer: آن‌ها امنیت و کارایی ارتباطات در مقیاس بزرگ را محدود کردند.
wrong_answers:
  - آن‌ها از انتقال پیام‌های رمزگذاری‌شده در شبکه‌های عمومی جلوگیری کردند.
  - آن‌ها برای هر پیام کلیدهای عمومی نیاز داشتند.
  - آن‌ها استفاده از رمزنگاری همومورفیک را الزامی کردند.
explanation: |
  قبل از دهه ۱۹۷۰، مشکلات مربوط به توزیع و مدیریت کلید، ایمن‌سازی ارتباطات در مقیاس بزرگ را دشوار می‌کرد و به این ترتیب توسعه برنامه‌های مدرن مانند خرید آنلاین را مختل می‌کرد.
reviewed: false