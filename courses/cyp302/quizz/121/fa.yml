question: مسئله اصلی مدیریت چیست؟
answer: پیچیدگی ایمن‌سازی و ذخیره‌سازی یک جفت کلید برای هر مشتری
wrong_answers:
  - غیرممکن بودن تجدید کلیدهای گم‌شده توسط مشتریان
  - نیاز به رمزگشایی هر کلید قبل از استفاده توسط مشتری
  - ضرورت انتقال کلیدها برای هر ارتباط
explanation: |
  مسئله اصلی مدیریت در دشواری ذخیره‌سازی و امنیت یک جفت کلید برای هر کاربر نهفته است، به‌ویژه زمانی که تعداد مشتریان به میلیون‌ها می‌رسد.
reviewed: false