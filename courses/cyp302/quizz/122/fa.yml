question: مشکل توزیع کلید چیست؟
answer: چالش انتقال امن کلیدها بدون Exchange فیزیکی
wrong_answers:
  - ضرورت generate چندین جفت کلید برای هر مشتری
  - مشکل تأمین امنیت ذخیره‌سازی فیزیکی کلیدها
  - تعهد به تغییر کلیدها با هر ارتباط
explanation: |
  مشکل توزیع کلید به چالش انتقال کلیدها به صورت امن اشاره دارد، نیازی که در ارتباطات دیجیتال که در آن یک Exchange فیزیکی غیرعملی است، بسیار حیاتی شده است.
reviewed: false