question: چه مشکلی پیش می‌آید اگر فروشگاه لوازم ورزشی جیم از یک جفت کلید برای همه مشتریان استفاده کند؟
answer: هر مشتری می‌توانست به ارتباطات دیگران دسترسی پیدا کند.
wrong_answers:
  - کلید بیش از حد بزرگ می‌شود
  - ارتباطات کند خواهد شد
  - مشتریان باید با هر خرید کلیدها را تغییر دهند
explanation: |
  با استفاده از یک کلید مشترک برای همه، فروشگاه لوازم ورزشی جیم محرمانگی و یکپارچگی را به خطر می‌اندازد، زیرا هر مشتری می‌تواند به داده‌های سایر مشتریان دسترسی پیدا کند.
reviewed: false