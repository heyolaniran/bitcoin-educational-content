question: چرا تبادل کلیدها به صورت حضوری برای ارتباطات امن آنلاین غیرعملی است؟
answer: این منجر به هزینه‌های بالای سازمانی می‌شود در حالی که ناکارآمد است.
wrong_answers:
  - این ارتباط رمزگذاری‌شده را غیرقابل استفاده می‌کند
  - این نیازمند استفاده از کلیدهای متعدد برای هر مشتری است
  - این از استفاده مجدد کلیدها برای تراکنش‌های تکراری جلوگیری می‌کند
explanation: |
  مبادله کلیدها به صورت حضوری پرهزینه و ناکارآمد است، به ویژه در مقیاس بزرگ، زیرا معاملات را کند می‌کند و هزینه‌های لجستیکی قابل توجهی برای هر مشتری جدید تحمیل می‌کند.
reviewed: false