question: چه مشکل عمده‌ای را رمزنگاران دیفی، هلمن و مرکل در دهه ۱۹۷۰ به دنبال حل آن بودند؟
answer: مشکلات توزیع و مدیریت کلید
wrong_answers:
  - توسعه رمزنگاری پساکوانتومی
  - تأمین ارتباطات نظامی
  - بهبود تکنیک‌های رمزنگاری متقارن
explanation: |
  دیفی، هلمن و مرکل با انگیزه مشکلات عملی توزیع و مدیریت کلید برای تأمین ارتباطات، که چالش‌های مهمی در دنیای در حال گذار به ارتباطات دیجیتال هستند، به این حوزه وارد شدند.
reviewed: false