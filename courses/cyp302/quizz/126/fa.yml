question: پروتکل کلید Diffie-Hellman Exchange چه چیزی را امکان‌پذیر می‌سازد؟
answer: این امکان را به دو طرف می‌دهد تا با به اشتراک‌گذاری اطلاعات عمومی، یک کلید مخفی مشترک ایجاد کنند.
wrong_answers:
  - این امکان را فراهم می‌کند که برای هر جلسه یک کلید مخفی حضوری Exchange داشته باشید.
  - این امکان را می‌دهد که از یک کلید عمومی برای رمزگذاری و از یک کلید خصوصی برای رمزگشایی استفاده شود.
  - این امکان را برای Exchange ارز الکترونیکی فراهم می‌کند.
explanation: |
  پروتکل دیفی-هلمن به دو طرف امکان می‌دهد تا اطلاعات را به صورت عمومی به اشتراک بگذارند، در حالی که اطمینان حاصل می‌کند که تنها آن‌ها می‌توانند یک کلید مشترک generate را برای ایمن‌سازی تبادلات آینده خود ایجاد کنند.
reviewed: false