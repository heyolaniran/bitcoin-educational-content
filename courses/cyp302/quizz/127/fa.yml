question: چه مفهوم ریاضی زیربنای کلید دیفی-هلمن Exchange است؟
answer: یک تابع یک‌طرفه با یک درب پشتی
wrong_answers:
  - یک تابع نمایی معکوس
  - الگوریتم رمزنگاری Hash
  - تقسیم مدولار ساده‌شده
explanation: |
  دیفی-هلمن به یک تابع یک‌طرفه متکی است که محاسبه آن در یک جهت آسان است اما بدون داشتن یک قطعه اطلاعات مخفی، که به آن درب پشتی گفته می‌شود، عملاً غیرممکن است که معکوس شود.
reviewed: false