question: چه مسئله محاسباتی دشواری با سیستم‌های نامتقارن مانند RSA مرتبط است؟
answer: تجزیه عدد به عوامل اول
wrong_answers:
  - ضرب نمایی اعداد صحیح
  - ایجاد اعداد تصادفی طولانی
  - کلید امن Exchange
explanation: |
  RSA بر اساس دشواری تجزیه اعداد اول استوار است، که یک وظیفه محاسباتی دشوار است و این امر باعث می‌شود که سیستم رمزنگاری در برابر حملات ایمن باشد.
reviewed: false