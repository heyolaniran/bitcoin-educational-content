question: RSA जैसी असममित प्रणालियों से कौन सी कठिन गणना संबंधी समस्या जुड़ी हुई है?
answer: अभाज्य संख्या गुणनखंडन
wrong_answers:
  - पूर्णांकों का घातांकीय गुणन
  - लम्बी यादृच्छिक संख्याओं का निर्माण
  - सुरक्षित कुंजी Exchange
explanation: |
  आरएसए अभाज्य संख्या गुणनखंडन की कठिनाई पर आधारित है, जो कि कम्प्यूटेशनल रूप से कठिन कार्य है, जो क्रिप्टोसिस्टम को आक्रमणों के विरुद्ध सुरक्षित बनाता है।
reviewed: false