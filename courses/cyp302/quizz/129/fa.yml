question: کشف دیگری توسط محققان در GCHQ که پیش از کشف دیفی و هلمن صورت گرفت اما مخفی باقی ماند، چه بود؟
answer: مفاهیم رمزنگاری نامتقارن و کلید Exchange
wrong_answers:
  - یک پروتکل رمزنگاری متقارن پیشرفته بدون نیاز به کلید
  - یک روش جدید برای هش رمزنگاری نامتقارن
  - روشی برای ایجاد پول الکترونیکی
explanation: |
  رمزنگاران بریتانیایی که برای GCHQ کار می‌کردند، به‌طور مستقل ایده‌هایی مشابه با ایده‌های دیفی و هلمن توسعه دادند، اما این پیشرفت‌ها تا زمانی که در سال 1997 فاش شدند، محرمانه باقی ماندند.
reviewed: false