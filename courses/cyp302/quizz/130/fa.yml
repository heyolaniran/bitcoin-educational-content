question: نقش مراجع صدور گواهی در فرآیند توزیع کلید عمومی چیست؟
answer: آن‌ها گواهینامه‌هایی صادر می‌کنند که اصالت کلیدهای عمومی را تضمین می‌کنند.
wrong_answers:
  - آنها کلیدهای خصوصی generate برای کاربران
  - آن‌ها کلیدهای عمومی همه کاربران را ذخیره می‌کنند.
  - آن‌ها رمزگذاری پیام‌ها بین کاربران را تضمین می‌کنند
explanation: |
  مراجع صدور گواهی، گواهی‌هایی صادر می‌کنند که یک کلید عمومی را به صاحب آن مرتبط می‌کند و به کاربران اجازه می‌دهد تا اصالت کلیدهای عمومی که استفاده می‌کنند را تأیید کنند.
reviewed: false