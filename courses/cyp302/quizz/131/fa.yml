question: چرا رمزنگاری نامتقارن کمتر از رمزنگاری متقارن در تبادل داده‌های بزرگ استفاده می‌شود؟
answer: این برای سطح معادل امنیت کمتر کارآمد است.
wrong_answers:
  - این امر اصالت پیام‌ها را تضمین نمی‌کند
  - این نیاز به چندین کلید عمومی برای هر Exchange دارد.
  - با پروتکل‌های ارتباطی مدرن سازگار نیست.
explanation: |
  رمزنگاری نامتقارن، در حالی که برای احراز هویت و رمزگذاری اولیه قدرتمند است، به منابع بیشتری نیاز دارد و استفاده از آن برای انتقال داده‌های حجیم ناکارآمد است.
reviewed: false