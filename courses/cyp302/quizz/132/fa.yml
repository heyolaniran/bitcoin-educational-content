question: در یک تراکنش Bitcoin، کدام فناوری به طور کلی برای اثبات Ownership وجوه با باز کردن اسکریپت استفاده می‌شود؟
answer: امضاهای دیجیتال
wrong_answers:
  - گواهینامه‌های دیجیتال
  - رمزگذاری متقارن
  - کدهای احراز هویت پیام (MAC)
explanation: |
  امضاهای دیجیتال در Bitcoin مالکیت وجوه را با امضای تراکنش‌ها با یک کلید خصوصی اثبات می‌کنند تا اسکریپتی که یک UTXO را ایمن می‌کند، باز شود.
reviewed: false