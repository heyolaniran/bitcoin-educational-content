question: امضای دیجیتال در زمینه رمزنگاری نامتقارن چیست؟
answer: مکانیسمی برای تأیید اصالت یک پیام با استفاده از کلید خصوصی
wrong_answers:
  - فرآیندی برای رمزگذاری قوی‌تر پیام
  - یک کلید عمومی اضافی برای اعتبارسنجی یک پیام رمزگذاری‌شده
  - یک نسخه دیجیتالی از امضای دست‌نویس
explanation: |
  امضای دیجیتال یک تکنیک رمزنگاری است که ثابت می‌کند یک پیام واقعاً توسط صاحب کلید خصوصی مربوطه ایجاد شده است و بدین ترتیب اصالت آن را تضمین می‌کند.
reviewed: false