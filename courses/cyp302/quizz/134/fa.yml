question: هدف اصلی رمزنگاری نامتقارن در زمینه ارتباط بین Alice و Bob چیست؟
answer: برای اجازه دادن به Bob برای ارسال یک پیام مخفی به Alice با استفاده از کلید عمومی او
wrong_answers:
  - برای اجازه دادن به Bob برای رمزگذاری و رمزگشایی پیام‌ها بدون کلید عمومی
  - برای جلوگیری از رمزگشایی پیام‌های Bob توسط Alice
  - برای اجازه دادن به Alice برای رمزگذاری پیام به منظور تأیید یکپارچگی آن
explanation: |
  در رمزنگاری نامتقارن، کلید عمومی Alice به Bob این امکان را می‌دهد که پیامی رمزگذاری‌شده ارسال کند که تنها او قادر به رمزگشایی آن باشد و بدین ترتیب محرمانگی پیام تضمین می‌شود.
reviewed: false