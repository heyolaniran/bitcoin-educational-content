question: آسیب‌پذیری اصلی رمزهای عبور ضعیف زمانی که هش می‌شوند چیست؟
answer: آن‌ها در برابر حملات دیکشنری آسیب‌پذیر هستند
wrong_answers:
  - آنها نمی‌توانند با هش کردن تأیید شوند
  - آنها همیشه برخوردهای generate دارند
  - آن‌ها برای امنیت بیشتر به هشینگ طولانی‌تر نیاز دارند.
explanation: |
  رمزهای عبور ضعیف می‌توانند به راحتی از Hash آن‌ها با استفاده از حملات دیکشنری بازیابی شوند، که انتخاب آن‌ها را برای اطمینان از امنیت مهم می‌سازد.
