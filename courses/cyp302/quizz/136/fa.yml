question: یک سرویس آنلاین چگونه می‌تواند بدون ذخیره مستقیم یک رمز عبور، آن را تأیید کند؟
answer: با مقایسه Hash رمز عبور وارد شده با رمز عبور موجود در پایگاه داده
wrong_answers:
  - با رمزگشایی رمز عبور ذخیره‌شده برای تأیید آن
  - با استفاده از یک کلید عمومی برای تأیید هویت
  - با مقایسه مستقیم رمز عبور با رمز عبور سایر کاربران
explanation: |
  این سرویس یک Hash از رمز عبور وارد شده تولید می‌کند و آن را با رمز عبور ذخیره شده مقایسه می‌کند، بدون اینکه رمز عبور را مستقیماً ذخیره کند، و بدین ترتیب امنیت بیشتری را تضمین می‌کند.
reviewed: false