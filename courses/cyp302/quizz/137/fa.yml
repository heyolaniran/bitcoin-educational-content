question: چرا رمزهای عبور اغلب به صورت هش در سرورهای امن ذخیره می‌شوند؟
answer: برای جلوگیری از بازیابی آسان گذرواژه‌ها در صورت نشت اطلاعات
wrong_answers:
  - برای افزایش اندازه ذخیره‌سازی داده‌های کاربر
  - برای رمزگذاری گذرواژه‌ها به صورت همزمان و متقارن
  - برای اجازه دادن به کاربران برای ورود بدون رمز عبور
explanation: |
  با ذخیره هش‌های رمز عبور، حتی در صورت نقض داده‌ها، رمزهای عبور واقعی نمی‌توانند به‌طور مستقیم خوانده شوند و بدین ترتیب امنیت افزایش می‌یابد.
reviewed: false