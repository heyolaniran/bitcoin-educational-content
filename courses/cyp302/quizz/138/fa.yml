question: یک تابع Hash باید چه ویژگی‌ای داشته باشد تا امنیت در حین تأیید نرم‌افزار تضمین شود؟
answer: مقاومت در برابر برخورد
wrong_answers:
  - قابلیت برگشت‌پذیری
  - عملکرد با کلیدهای نامتقارن
  - تولیدپذیری بلادرنگ
explanation: |
  مقاومت در برابر برخورد تضمین می‌کند که یافتن دو ورودی متفاوت که Hash یکسانی تولید می‌کنند، عملاً غیرممکن است، که این امر برای تأیید عدم دستکاری نرم‌افزار مهم است.
reviewed: false