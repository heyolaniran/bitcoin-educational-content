question: ویژگی اصلی یک تابع رمزنگاری Hash چیست؟
answer: این یک خروجی با طول ثابت برای هر ورودی تولید می‌کند، بدون توجه به اندازه آن.
wrong_answers:
  - این داده‌ها را با استفاده از یک کلید متقارن رمزگذاری می‌کند.
  - این یک خروجی متغیر تولید می‌کند که به طول ورودی بستگی دارد.
  - این پیام‌ها را با استفاده از یک کلید عمومی رمزگشایی می‌کند.
explanation: |
  یک تابع Hash یک Hash با طول ثابت تولید می‌کند، بدون توجه به اندازه ورودی.
reviewed: false