question: ماهیت مسئله تجزیه که امنیت سیستم‌های رمزنگاری نامتقارن مانند RSA را تحت‌الشعاع قرار می‌دهد چیست؟
answer: فاکتورگیری یک عدد به دو فاکتور اول بسیار بزرگ
wrong_answers:
  - تجزیه یک عدد به عوامل متوالی ۲
  - کاهش یک عدد به کوچکترین مقسوم‌علیه‌های آن
  - ضرب دو عدد اول بزرگ برای به دست آوردن یک حاصل‌ضرب
explanation: |
  امنیت RSA بر اساس دشواری فاکتورگیری یک عدد بزرگ (حاصل‌ضرب دو عدد اول بزرگ) به دو عامل اول آن استوار است، کاری که بدون کلید خصوصی تقریباً غیرممکن است.
reviewed: false