question: چرا تجزیه یک حاصل‌ضرب از دو عدد اول بسیار بزرگ به عنوان یک مسئله دشوار در نظر گرفته می‌شود؟
answer: زیرا حتی برای ابررایانه‌ها نیز به مقدار زیادی زمان محاسباتی نیاز دارد.
wrong_answers:
  - زیرا برای هر عامل به یک کلید عمومی نیاز دارد.
  - زیرا شامل عملیات پایه‌ای در محاسبه است.
  - زیرا به ضرب بستگی دارد و نه تقسیم.
explanation: |
  فاکتورگیری از یک عدد بسیار بزرگ، که حاصل‌ضرب دو عدد اول بزرگ است، نیازمند قدرت محاسباتی است که فراتر از ظرفیت کامپیوترهای فعلی می‌باشد و این کار را عملاً غیرقابل انجام می‌سازد.
reviewed: false