question: दो बहुत बड़ी अभाज्य संख्याओं के गुणनफल का गुणनखंडन एक कठिन समस्या क्यों मानी जाती है?
answer: क्योंकि इसमें सुपर कम्प्यूटरों के लिए भी अत्यधिक गणना समय की आवश्यकता होती है।
wrong_answers:
  - क्योंकि इसमें प्रत्येक कारक के लिए एक सार्वजनिक कुंजी की आवश्यकता होती है।
  - क्योंकि इसमें गणना में केवल बुनियादी परिचालन ही शामिल है।
  - क्योंकि यह गुणन पर निर्भर करता है न कि भाग पर।
explanation: |
  एक बड़ी संख्या, दो बड़ी अभाज्य संख्याओं के गुणनफल, का गुणनखंडन करने के लिए ऐसी कंप्यूटिंग शक्ति की आवश्यकता होती है जो वर्तमान कंप्यूटरों की क्षमता से अधिक हो, जिससे यह कार्य व्यावहारिक रूप से असंभव हो जाता है।
reviewed: false