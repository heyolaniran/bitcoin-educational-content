question: نام مسئله‌ای که محاسبه نتیجه در یک جهت آسان اما تقریباً غیرممکن برای معکوس کردن است، چیست؟
answer: یک تابع یک‌طرفه
wrong_answers:
  - یک تابع خطی
  - یک تابع نمایی
  - یک تابع برگشت‌پذیر
explanation: |
  توابع یک‌طرفه امکان محاسبه سریع در یک جهت را فراهم می‌کنند، اما حل معکوس آن‌ها را عملاً غیرممکن می‌سازند، به همین دلیل در رمزنگاری مفید هستند.
reviewed: false