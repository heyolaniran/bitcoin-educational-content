question: اندازه معمول اعداد اول مورد استفاده در فاکتورگیری برای سیستم‌های رمزنگاری مدرن مانند RSA چقدر است؟
answer: ۱۰۲۴ بیت برای هر عامل
wrong_answers:
  - ۱۰۲۴ بیت در مجموع
  - ۲۵۶ بیت برای هر عامل
  - در مجموع ۲۵۶ بیت
explanation: |
  در سیستم‌های رمزنگاری مدرن مانند RSA، اعداد اول انتخاب شده معمولاً هر کدام ۱۰۲۴ بیت هستند که فاکتورگیری را بسیار دشوار کرده و امنیت را افزایش می‌دهند.
reviewed: false