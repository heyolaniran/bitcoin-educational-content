question: شرط وجود معکوس برای یک عدد صحیح a به پیمانه N چیست؟
answer: a و N باید نسبت به هم اول باشند.
wrong_answers:
  - N باید زوج باشد
  - a باید فرد باشد
  - a باید یک عدد اول باشد
explanation: |
  یک عدد صحیح a دارای معکوس به پیمانه N است اگر و تنها اگر آنها نسبت به هم اول باشند، به این معنی که بزرگترین مقسوم علیه مشترک آنها ۱ است.
