question: اگر عدد صحیح N حاصل‌ضرب دو عدد اول p و q باشد، ترتیب N چگونه محاسبه می‌شود؟
answer: (p - 1) * (q - 1)
wrong_answers:
  - (p * q) - 1
  - p + q
  - (p - 1) + (q - 1)
explanation: |
  برای N که برابر با حاصل‌ضرب دو عدد اول p و q است، مرتبه N به صورت (p - 1) * (q - 1) محاسبه می‌شود.
reviewed: false