question: यदि एक पूर्णांक N दो अभाज्य संख्याओं p और q का गुणनफल है, तो N का क्रम कैसे गणना किया जाएगा?
answer: (पी - 1) * (क्यू - 1)
wrong_answers:
  - (पी * क्यू) - 1
  - पी + क्यू
  - (पी - 1) + (क्यू - 1)
explanation: |
  दो अभाज्य संख्याओं p और q के गुणनफल के बराबर N के लिए, N का क्रम (p - 1) * (q - 1) के रूप में परिकलित किया जाता है।
reviewed: false