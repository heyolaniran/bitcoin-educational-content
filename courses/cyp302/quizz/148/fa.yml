question: کدام تابع برای محاسبه تعداد اعداد صحیح اول نسبت به یک عدد صحیح N استفاده می‌شود؟
answer: تابع فی اویلر
wrong_answers:
  - تابع لگاریتمی
  - تابع گاما اویلر
  - تابع گاوس
explanation: |
  تابع فی اویلر (یا تابع توشینت) برای محاسبه تعداد اعداد اول نسبت به یک عدد صحیح N استفاده می‌شود، به‌ویژه برای اعداد صحیح غیر اول.
reviewed: false