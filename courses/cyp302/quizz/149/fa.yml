question: تعریف یک عدد صحیح که نسبت به عدد صحیح دیگری نسبت اول باشد چیست؟
answer: یک عدد صحیح که بزرگترین مقسوم‌علیه مشترک آن با آن عدد صحیح دیگر ۱ باشد
wrong_answers:
  - یک عدد صحیح که بدون باقی‌مانده بر عدد صحیح دیگر بخش‌پذیر است
  - یک عدد صحیح که اول است
  - یک عدد صحیح که بزرگتر از دیگری است
explanation: |
  یک عدد صحیح با عدد دیگر نسبت به هم اول است اگر بزرگترین مقسوم علیه مشترک آنها ۱ باشد، به این معنی که آنها هیچ عامل مشترک دیگری ندارند.
reviewed: false