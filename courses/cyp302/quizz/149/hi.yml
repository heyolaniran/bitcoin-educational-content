question: किसी पूर्णांक का किसी अन्य पूर्णांक के संबंध में सहअभाज्य होने की परिभाषा क्या है?
answer: एक पूर्णांक जिसका उस अन्य पूर्णांक के साथ महत्तम सार्व भाजक 1 है
wrong_answers:
  - एक पूर्णांक जो शेष के बिना दूसरे पूर्णांक से विभाज्य है
  - एक पूर्णांक जो अभाज्य है
  - एक पूर्णांक जो दूसरे से बड़ा है
explanation: |
  एक पूर्णांक दूसरे के साथ सहअभाज्य होता है यदि उनका महत्तम सार्व भाजक 1 हो, अर्थात वे कोई अन्य सार्व गुणनखंड साझा नहीं करते।
reviewed: false