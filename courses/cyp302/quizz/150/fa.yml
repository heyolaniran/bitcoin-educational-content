question: در زمینه سیستم رمزنگاری RSA، حاصل‌ضرب دو عدد اول p و q به چه چیزی مربوط می‌شود؟
answer: این عدد صحیح N را تشکیل می‌دهد که به عنوان مدول برای عملیات استفاده می‌شود.
wrong_answers:
  - این کلید عمومی را تشکیل می‌دهد
  - این به عنوان کلید رمزگشایی عمل می‌کند
  - تنها برای generate توان e استفاده می‌شود.
explanation: |
  در RSA، عدد صحیح N حاصل‌ضرب دو عدد اول بزرگ p و q است و به عنوان مدول برای عملیات رمزگذاری و رمزگشایی استفاده می‌شود.
reviewed: false