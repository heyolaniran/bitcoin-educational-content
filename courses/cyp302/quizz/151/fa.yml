question: چگونه توان e در سیستم رمزنگاری RSA انتخاب می‌شود؟
answer: باید یک عدد صحیح بزرگتر از ۲ باشد که نسبت به φ(N) اول باشد.
wrong_answers:
  - باید یک عدد اول کمتر از N باشد
  - به صورت تصادفی و بدون محدودیت انتخاب می‌شود.
  - باید برابر با φ(N) باشد
explanation: |
  در RSA، توان e به گونه‌ای انتخاب می‌شود که بزرگتر از 2 و نسبت به φ(N) اول باشد، که امنیت عملیات را تضمین می‌کند.
reviewed: false