question: RSA क्रिप्टोसिस्टम में घातांक e का चयन कैसे किया जाता है?
answer: यह 2 से बड़ा पूर्णांक होना चाहिए, φ(N) के साथ सहअभाज्य होना चाहिए
wrong_answers:
  - यह N से छोटी एक अभाज्य संख्या होनी चाहिए
  - इसे बिना किसी प्रतिबंध के यादृच्छिक रूप से चुना जाता है
  - यह φ(N) के बराबर होना चाहिए
explanation: |
  RSA में, घातांक e को इस प्रकार चुना जाता है कि वह 2 से अधिक हो और φ(N) के साथ सहअभाज्य हो, जो परिचालनों की सुरक्षा सुनिश्चित करता है।
