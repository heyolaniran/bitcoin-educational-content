question: کلید خصوصی d در سیستم رمزنگاری RSA چه وظیفه‌ای دارد؟
answer: برای رمزگشایی پیام‌ها با استفاده از مدول N استفاده می‌شود.
wrong_answers:
  - فقط برای رمزگذاری پیام‌ها استفاده می‌شود.
  - برای باز کردن بیت‌کوین‌ها استفاده می‌شود
  - برای محاسبه φ(N) استفاده می‌شود.
explanation: |
  کلید خصوصی d برای رمزگشایی پیام‌های رمزگذاری‌شده استفاده می‌شود، با تکمیل محاسبه با مدول N.
reviewed: false