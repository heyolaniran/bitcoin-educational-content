question: اگر همان پیام چندین بار در سیستم رمزنگاری RSA ساده شده رمزگذاری شود، چه مسئله امنیتی به وجود می‌آید؟
answer: پیام همیشه همان رمزگذاری را تولید خواهد کرد
wrong_answers:
  - پیام در برابر حملات جستجوی فراگیر آسیب‌پذیر خواهد بود
  - پیام معکوس خواهد شد
  - پیام غیرقابل رمزگشایی خواهد شد
explanation: |
  در یک RSA ساده‌شده، رمزگذاری یک پیام به‌طور مکرر همیشه نتیجه‌ی یکسانی تولید می‌کند که این امر رمزگذاری را در برابر حملات آسیب‌پذیر می‌سازد.
reviewed: false