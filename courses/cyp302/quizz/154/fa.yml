question: در سیستم رمزنگاری RSA، چرا پیدا کردن مقدار d دشوار است؟
answer: زیرا نیاز به دانستن φ(N) دارد که به عوامل اول N وابسته است
wrong_answers:
  - زیرا d یک عدد تصادفی است
  - زیرا d بزرگتر از N است
  - زیرا d به طور مستقل از φ(N) محاسبه می‌شود
explanation: |
  یافتن d دشوار است زیرا به دانش φ(N) وابسته است، که به نوبه خود به مقادیر p و q، عوامل اول N بستگی دارد.
reviewed: false