question: کدام یک از موارد زیر برای یک معامله موفق در سیستم مبادله کالا ضروری است؟
answer: یک تصادف دوگانه از خواسته‌ها
wrong_answers:
  - یک واحد حساب مشترک
  - یک مرجع بانکداری مرکزی
  - نیاز به حداقل موجودی
explanation: |
  در یک سیستم مبادله کالا، معاملات به‌طور مستقیم بین دو طرف که کالاها یا خدمات را بدون استفاده از پول مبادله می‌کنند، انجام می‌شود. یک معامله موفق نیازمند تطابق دوگانه خواسته‌ها است، به این معنی که هر دو طرف باید چیزی داشته باشند که طرف دیگر مایل به مبادله آن باشد.
reviewed: true