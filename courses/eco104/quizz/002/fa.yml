question: ارتباط تاریخی بین پول و کالاهایی مانند طلا چیست؟
answer: طلا کمیاب است و به طور گسترده به عنوان ذخیره ارزش پذیرفته شده است.
wrong_answers:
  - طلا پول را جذاب‌تر می‌کند
  - طلا به راحتی قابل تقسیم است
  - طلا منحصر به فرد است
explanation: |
  با توجه به کمبود جهانی طلا در طبیعت و سرمایه‌گذاری قابل توجهی که برای استخراج، تصفیه و ذخیره‌سازی آن لازم است، طلا همواره با قیمتی بالاتر از سایر اشکال پول معامله شده است.
reviewed: true