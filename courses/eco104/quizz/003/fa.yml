question: یکی از مزایای سکه‌های فلزی نسبت به پول کالایی چیست؟
answer: این بادوام‌تر بود
wrong_answers:
  - ارزش ذاتی بالاتری داشت
  - به راحتی قابل حمل بود
  - در معرض جعل نبود
explanation: |
   پول فلزی، به‌ویژه طلا و نقره، نسبت به پول کالایی دوام بیشتری داشت. فلزات گران‌بها کمتر در معرض زوال در طول زمان هستند، که آن‌ها را برای ذخیره‌سازی ارزش در بلندمدت ایده‌آل می‌سازد. این دوام همچنین به مفید بودن آن‌ها به‌عنوان یک واسطه Exchange، یک واحد حساب، و یک ذخیره ارزش کمک کرد.
reviewed: true