question: یکی از دلایل اینکه ارز فیات به کنترل متمرکز منجر می‌شود چیست؟
answer: این به دولت‌ها اجازه می‌دهد تا پول Supply و نرخ‌های بهره را کنترل کنند.
wrong_answers:
  - این توسط کالاهای فیزیکی مانند طلا و نقره پشتیبانی می‌شود.
  - در برابر تورم مقاوم است.
  - این امر سیستم‌های مالی غیرمتمرکز را تشویق می‌کند.
explanation: |
  ارز فیات به دولت‌ها قدرت کنترل پول Supply و نرخ بهره را می‌دهد و به آن‌ها اجازه می‌دهد تا بر فعالیت‌های اقتصادی تأثیر بگذارند و منجر به کنترل متمرکز شود.
reviewed: true