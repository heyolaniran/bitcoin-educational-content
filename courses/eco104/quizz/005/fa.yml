question: تورم چگونه قدرت خرید حقوق‌بگیران را در طول زمان تحت تأثیر قرار می‌دهد؟
answer: تورم قدرت خرید را کاهش می‌دهد زیرا دستمزدها اغلب از نرخ واقعی تورم عقب می‌مانند.
wrong_answers:
  - تورم قدرت خرید را افزایش می‌دهد زیرا دستمزدها سریع‌تر از قیمت‌ها افزایش می‌یابند.
  - تورم هیچ تأثیری بر قدرت خرید ندارد.
  - تورم تنها بر قدرت خرید کسانی که در بازارهای مالی سرمایه‌گذاری می‌کنند تأثیر می‌گذارد.
explanation: |
  تورم منجر به افزایش مداوم قیمت‌های مصرف‌کننده می‌شود و قدرت خرید حقوق‌بگیران را کاهش می‌دهد، زیرا دستمزدهای آن‌ها معمولاً از نرخ واقعی تورم عقب می‌ماند. این امر دستیابی به اهداف پس‌انداز بلندمدت و حفظ سطح زندگی را برای حقوق‌بگیران دشوار می‌سازد.
reviewed: true