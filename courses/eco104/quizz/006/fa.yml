question: چرا خرید خانه امروز بسیار سخت‌تر از دهه ۱۹۸۰ است؟
answer: نرخ‌های بهره سرکوب‌شده بدهی را جذاب‌تر و تورم را
wrong_answers:
  - تورم و نرخ‌های اجاره
  - افزایش هزینه‌های زندگی و رشد جمعیت
  - کمبود املاک و نرخ‌های بهره پایین‌تر، بدهی را جذاب‌تر می‌کند
explanation: |
  در حالی که تورم قدرت خرید ارز ما را کاهش می‌دهد و پس‌انداز را دشوارتر می‌کند، نرخ‌های بهره پایین‌تر مصرف بدهی را جذاب‌تر می‌کند. وقتی هزینه سرمایه این‌قدر ارزان است، مردم بیش از توان خود قرض می‌گیرند، سرمایه بیشتری را به دارایی‌ها هدایت می‌کنند و قیمت‌ها را بالا می‌برند.
reviewed: true