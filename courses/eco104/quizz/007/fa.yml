question: تأثیر چاپ پول بیشتر بر قدرت خرید یک ارز چیست؟
answer: کاهش قدرت خرید ارز
wrong_answers:
  - افزایش قدرت خرید ارز
  - بدون تأثیر
  - پول بیشتر = قدرت خرید بیشتر
explanation: |
  وقتی بانک‌های مرکزی تصمیم به چاپ پول می‌گیرند، نمی‌توانند به سادگی ارزش بیشتری ایجاد کنند. 
  برای اینکه این پول تازه چاپ شده ارزش داشته باشد، ارزش آن باید از دارندگان قبلی ارز بیاید.
  پول Supply را به عنوان یک پیتزا در نظر بگیرید و تصور کنید که به چهار برش تقسیم شده است. 
  دو برابر کردن پول Supply معادل دو برابر کردن مقدار پیتزا نخواهد بود. 
  در عوض، معادل این است که آن چهار برش را به نصف برش دهیم تا هشت برش ایجاد کنیم. 
  ما هیچ پیتزای اضافی به دست نیاورده‌ایم. فقط برش‌های بیشتری داریم که هر کدام کوچکتر هستند. 
  بنابراین، وقتی پول بیشتری چاپ می‌کنیم، ارزش پولی که قبلاً وجود دارد را کاهش می‌دهیم.
reviewed: true