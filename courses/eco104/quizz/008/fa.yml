question: Bitcoin جدید چگونه ایجاد و وارد گردش می‌شوند؟
answer: از طریق Mining به عنوان پاداش برای افزودن تراکنش‌های جدید به Blockchain
wrong_answers:
  - از طریق صدور یک مرجع متمرکز
  - با خرید آنها از صرافی‌های Bitcoin
  - با دریافت آنها به عنوان کارمزد تراکنش
explanation: |
  Bitcoin جدید از طریق فرآیندی به نام Mining وارد گردش می‌شود. 
  ماینرها با یکدیگر رقابت می‌کنند تا تراکنش‌های جدید را به Blockchain اضافه کنند. 
  در Exchange برای کار خود، ماینرها با Bitcoin تازه ایجاد شده پاداش می‌گیرند. 
  این فرآیند همچنین تراکنش‌ها را در شبکه Bitcoin تأیید و ایمن می‌کند.
reviewed: true