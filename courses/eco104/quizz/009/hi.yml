question: द टाइम्स 03/जनवरी/2009 चांसलर प्रथम जीडब्ल्यू-0 ब्लॉक में बैंकों के लिए दूसरे बेलआउट के कगार पर, इस उद्धरण का क्या महत्व है?
answer: यह हमारी वित्तीय प्रणाली की घाटे को सामाजिक बनाने की क्षमता को उजागर करता है
wrong_answers:
  - यह टाइम्स अख़बार के प्रति Satoshi की सराहना को दर्शाता है
  - यह इस बात का एक बेहतरीन उदाहरण है कि किस तरह बेलआउट से हमारे समाज को लाभ हुआ है
  - यह हमें Bitcoin की Blockchain में संदेशों को संग्रहीत करने की क्षमता दिखाता है
explanation: |
  यह टाइम्स अख़बार के एक लेख का संदर्भ है [लेख](https://www.thetimes.co.uk/article/chancellor-alistair-darling-on-brink-of-second-bailout-for-banks-n9l382mn62h) जो Satoshi की चिंताओं को दर्शाता है कि बैंक जोखिम भरा व्यवहार कर रहे हैं, जिसका उन पर कोई खास असर नहीं होगा और यह घाटा मुद्रा धारकों के बीच साझा किया जाएगा।
reviewed: true