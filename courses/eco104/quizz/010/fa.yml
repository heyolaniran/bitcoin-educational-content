question: هدف از نودها در شبکه Bitcoin چیست؟
answer: برای نگهداری و ایمن‌سازی Blockchain
wrong_answers:
  - برای پردازش تراکنش‌ها
  - پیشنهاد و اجرای تغییرات در پایگاه کد Bitcoin
  - برای رقابت با سایر ماینرها
explanation: |
  گره‌ها برای یکپارچگی و امنیت شبکه Bitcoin ضروری هستند.  
  آن‌ها به عنوان نگهبانان سیستم عمل می‌کنند و اطمینان حاصل می‌کنند که تراکنش‌ها  
  به‌طور دقیق و مطابق با قوانین پردازش می‌شوند.
reviewed: true