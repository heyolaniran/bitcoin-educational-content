question: چه چیزی Bitcoin را از ارزهای سنتی که توسط بانک‌های مرکزی یا دولت‌ها کنترل می‌شوند متمایز می‌کند؟
answer: همه آنها
wrong_answers:
  - Bitcoin نیاز به همکاری بین ماینرها، نودها و توسعه‌دهندگان دارد
  - Bitcoin به هر کسی اجازه می‌دهد تا در شبکه شرکت کرده و نقش‌های کلیدی را ایفا کند.
  - Bitcoin به یک سیستم اجماع غیرمتمرکز متکی است.
explanation: |
  آنچه Bitcoin را از ارزهای فیات سنتی متمایز می‌کند، تلاش مشترک بین سه نقش اساسی و جامعه است. نودها با عمل به عنوان دروازه‌بان، یکپارچگی و امنیت شبکه را تضمین می‌کنند. ماینرها مسئول پردازش تراکنش‌ها و نگهداری Blockchain هستند. توسعه‌دهندگان اعضای بسیار ماهر جامعه Bitcoin هستند که با هم کار می‌کنند تا نرم‌افزاری که شبکه را قدرت می‌بخشد، نگهداری و بهبود بخشند. جامعه، از طریق استفاده از Bitcoin، چیزی است که به آن ارزش می‌بخشد. هر یک از این نقش‌ها برای عملکرد و موفقیت Bitcoin به عنوان یک ارز دیجیتال ضروری است. با واگذاری این وظایف حیاتی به بازیگران کلیدی، Bitcoin می‌تواند به عنوان یک واسطه غیرمتمرکز، امن، شفاف و پاسخگو برای همه کاربران عمل کند و آن را به طور قابل توجهی از ارزهای متمرکز که امروزه استفاده می‌کنیم، متفاوت می‌سازد.
reviewed: true