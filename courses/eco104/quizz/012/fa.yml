question: شبکه Bitcoin چه مزیتی نسبت به سیستم‌های مالی سنتی ارائه می‌دهد؟
answer: غیرمتمرکزسازی و امنیت
wrong_answers:
  - نرخ‌های تورم افزایش یافته
  - وابستگی به واسطه‌ها
  - کنترل متمرکز بر تراکنش‌ها
explanation: |
  شبکه غیرمتمرکز Bitcoin راهی امن و کارآمد برای انجام تراکنش‌ها بدون نیاز به واسطه‌ها یا اشخاص ثالث فراهم می‌کند. این امر خطر سانسور و تغییرات غیرمجاز در تراکنش‌ها را کاهش می‌دهد و همچنین حریم خصوصی را افزایش می‌دهد.
reviewed: true