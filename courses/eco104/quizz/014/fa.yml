question: نقش کلیدهای خصوصی در تراکنش‌های Bitcoin چیست؟
answer: آنها برای امضا و تأیید تراکنش‌ها استفاده می‌شوند.
wrong_answers:
  - آن‌ها برای تأیید اصالت تراکنش‌ها استفاده می‌شوند.
  - آنها برای رمزگذاری داده‌های تراکنش استفاده می‌شوند.
  - آن‌ها به‌منظور شفافیت به‌صورت عمومی به اشتراک گذاشته می‌شوند.
explanation: |
  کلیدهای خصوصی جزء ضروری تراکنش‌های Bitcoin هستند.  
  آن‌ها برای امضا و تأیید تراکنش‌ها استفاده می‌شوند، اثبات Ownership را فراهم می‌کنند و اطمینان می‌دهند که تنها مالک می‌تواند Bitcoin خود را خرج کند.
reviewed: true