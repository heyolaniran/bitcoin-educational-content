question: انواع اصلی استیبل‌کوین‌ها که در متن ذکر شده‌اند کدامند؟
answer: استیبل‌کوین‌های پشتیبانی‌شده توسط فیات، پشتیبانی‌شده توسط کالا، و الگوریتمی.
wrong_answers:
  - استیبل‌کوین‌های دیجیتال و فیزیکی
  - استیبل‌کوین‌های متمرکز و غیرمتمرکز
  - استیبل‌کوین‌های پشتیبانی‌شده توسط بانک‌ها و استیبل‌کوین‌های پشتیبانی‌شده توسط افراد
explanation: |
  در فصل‌های قبلی سه نوع اصلی از استیبل‌کوین‌ها را مشاهده کرده‌ایم؛ استیبل‌کوین‌های پشتیبانی‌شده با فیات، که توسط ارزهای سنتی مانند دلار آمریکا پشتیبانی می‌شوند؛ استیبل‌کوین‌های پشتیبانی‌شده با کالا، که توسط کالاهایی مانند طلا یا نفت پشتیبانی می‌شوند؛ و استیبل‌کوین‌های الگوریتمی، که برای حفظ ارزش خود به مجموعه‌ای از قوانین یا الگوریتم‌ها متکی هستند. با این حال، اشاره می‌شود که استیبل‌کوین‌های الگوریتمی موفق هنوز به بازار نرسیده‌اند.
reviewed: true