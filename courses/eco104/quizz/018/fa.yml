question: محدودیت قابل توجهی که افراد در طول بحران ورشکستگی دولت یونان در سال ۲۰۱۵ با آن مواجه بودند چه بود؟
answer: اصلاحات بانکی طاقت‌فرسا که توسط دولت تحمیل شده است.
wrong_answers:
  - دسترسی محدود به خدمات بانکداری دیجیتال
  - نوسانات ارزهای دیجیتال مانند Bitcoin
  - کمبود ارز فیزیکی (نقدی)
explanation: |
  در طول بحران ورشکستگی دولت یونان در سال ۲۰۱۵، بانک‌ها بسته شدند، 
  برداشت‌های ATM محدود شد و بخش قابل توجهی از سپرده‌های بانکی افراد 
  توسط دولت برای تأمین بی‌مسئولیتی مالی برداشت شد.
  این رویداد خطرات مرتبط با نگهداری پول در سیستم بانکی سنتی را برجسته کرد.
reviewed: true