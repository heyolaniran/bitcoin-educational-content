question: استیبل‌کوین‌ها، مانند USDt، چگونه به ثبات نسبی در ارزش دست می‌یابند؟
answer: آن‌ها به یک دارایی یا ارز پایدار متصل هستند.
wrong_answers:
  - آنها توسط یک مرجع مرکزی یا دولت پشتیبانی می‌شوند.
  - آن‌ها برای تراکنش‌های امن به فناوری Blockchain متکی هستند.
  - آن‌ها در معرض نوسانات مشابه با سایر ارزهای دیجیتال هستند.
explanation: |
  استیبل‌کوین‌ها با متصل شدن به یک دارایی یا ارز پایدارتر، مانند دلار آمریکا یا طلا، ثبات نسبی در ارزش خود را حفظ می‌کنند. این اتصال به کاهش نوساناتی که اغلب با سایر دارایی‌های دیجیتال مانند Bitcoin همراه است، کمک می‌کند.
reviewed: true