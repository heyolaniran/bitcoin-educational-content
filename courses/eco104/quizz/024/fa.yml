question: Halving در زمینه Bitcoin چیست؟
answer: ویژگی در کد Bitcoin که پاداش Mining را هر چهار سال نصف می‌کند
wrong_answers:
  - فرآیند افزایش پذیرش جهانی Bitcoin
  - مکانیسمی که از فروپاشی ارزش Bitcoin جلوگیری می‌کند
  - اصطلاحی که برای توصیف رویدادی استفاده می‌شود که قیمت Bitcoin به شدت افزایش می‌یابد
explanation: |
  ویژگی Halving در کد Bitcoin وجود دارد که پاداش Mining را تقریباً هر چهار سال به نصف کاهش می‌دهد. این رویداد بر درآمد ماینرها تأثیر می‌گذارد و فشار صعودی بر قیمت Bitcoin وارد می‌کند.
reviewed: true