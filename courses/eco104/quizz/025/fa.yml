question: چرا استدلالی که می‌گوید Bitcoin بی‌ارزش است چون پشتوانه‌ای ندارد، اشتباه است؟
answer: ارزش ذهنی است و بر اساس باورها و تجربیات مردم است.
wrong_answers:
  - Bitcoin توسط طلا پشتیبانی می‌شود که به آن ارزش ذاتی می‌بخشد.
  - ارزش Bitcoin توسط کمیابی و ویژگی‌های امنیتی آن تعیین می‌شود.
  - ارزش Bitcoin بر اساس پذیرش آن توسط دولت‌ها و بانک‌ها تعیین می‌شود.
explanation: |
  ارزش ذهنی است و در چشم بیننده قرار دارد. Bitcoin ارزشمند است زیرا مردم به آن باور دارند، درست همان‌طور که هنر می‌تواند ارزشمند باشد، حتی اگر از بوم و رنگ ساخته شده باشد. این استدلال که ارز باید توسط چیزی با ارزش پشتیبانی شود نادرست است، زیرا ارزش ارزهای فیات مانند دلار آمریکا نیز بر اساس اعتماد و باور است.
reviewed: true