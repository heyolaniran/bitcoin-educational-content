question: سه‌گانه Blockchain در حوزه ارزهای دیجیتال چیست؟
answer: موازنه بین مقیاس‌پذیری، امنیت و تمرکززدایی در ارزهای دیجیتال
wrong_answers:
  - ویژگی Bitcoin که تمرکز بر تمرکززدایی و امنیت را بر مقیاس‌پذیری اولویت می‌دهد
  - مشکل در تعیین مسیر و ارزش‌های ارزهای دیجیتال
  - محدودیت فناوری Bitcoin در مقایسه با سایر ارزهای دیجیتال
explanation: |
  مفهوم سه‌گانه Blockchain این ایده است که ارزهای دیجیتال باید دو مورد از سه ویژگی مهم را در اولویت قرار دهند؛ مقیاس‌پذیری، امنیت و تمرکززدایی. Bitcoin تمرکززدایی و امنیت را در اولویت قرار می‌دهد، که بر مقیاس‌پذیری آن تأثیر می‌گذارد، اما همچنان از طریق روش‌های جایگزین به آن دست می‌یابد.
reviewed: true