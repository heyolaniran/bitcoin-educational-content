question: چه درصدی از حجم کل تراکنش‌های Bitcoin برای فعالیت‌های غیرقانونی استفاده شده است؟
answer: کمتر از ۱٪
wrong_answers:
  - ۲-۴٪
  - بیش از ۵٪
  - ناشناخته است
explanation: |
  بر اساس گزارشی از Chainalysis در سال 2020، فعالیت‌های غیرقانونی تنها حدود 0.34% از تمام تراکنش‌های Bitcoin را تشکیل می‌دهند.
reviewed: true