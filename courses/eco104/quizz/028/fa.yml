question: آیا کسی می‌تواند کد Bitcoin را کپی کند؟
answer: بله، اما شما نمی‌توانید مقدار شبکه Bitcoin را کپی کنید.
wrong_answers:
  - بله و شما باید مقدار شبکه Bitcoin را نیز کپی کنید.
  - نه و شما می‌توانید مقدار شبکه Bitcoin را کپی کنید.
  - نه، زیرا کد Bitcoin متن‌باز نیست.
explanation: |
  در حالی که کد Bitcoin متن‌باز است و می‌تواند کپی شود، ارزش Bitcoin از کد آن به دست نمی‌آید. ارزش آن از شبکه کاربران و اعتمادی که در طول زمان ایجاد کرده است، به دست می‌آید.
reviewed: true