question: یکی از انگیزه‌های پشت مصرف انرژی Bitcoin از طریق Mining چیست؟
answer: برای ارائه یک مکانیزم دفاعی قدرتمند در برابر تمرکزگرایی
wrong_answers:
  - برای گران‌تر کردن استفاده از Bitcoin
  - برای کاهش ارزش آن با افزایش هزینه‌های انرژی
  - برای منصرف کردن کاربران جدید از پیوستن به شبکه
explanation: |
  یکی از دلایلی که Bitcoin از طریق Mining انرژی مصرف می‌کند، ارائه یک مکانیزم دفاعی قدرتمند در برابر تمرکز و دستکاری ناعادلانه است. شبکه توزیع‌شده ماینرها کمک می‌کند تا از تصاحب شبکه توسط نهادهای متمرکز یا دستکاری قوانین به نفع خودشان جلوگیری شود.
reviewed: true