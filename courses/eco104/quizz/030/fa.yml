question: یکی از دلایل اهمیت انجام تحقیقات کامل قبل از اعتماد به یک استیبل‌کوین این است که اطمینان حاصل شود که پشتوانه مالی و مکانیزم‌های پایداری آن معتبر و شفاف هستند.
answer: برخی از استیبل‌کوین‌ها فاقد شفافیت و دقت هستند
wrong_answers:
  - استیبل‌کوین‌ها هیچ ریسکی ندارند.
  - استیبل‌کوین‌ها همیشه به‌طور کامل توسط ذخایر پشتیبانی می‌شوند
  - برخی از استیبل‌کوین‌ها توسط دولت تنظیم می‌شوند
explanation: |
  همه استیبل‌کوین‌ها سطح یکسانی از شفافیت را ارائه نمی‌دهند.  
  بنابراین، مهم است که قبل از سپردن ثروت قابل توجه به هر استیبل‌کوین خاص، تحقیقات کاملی انجام دهید.
reviewed: true