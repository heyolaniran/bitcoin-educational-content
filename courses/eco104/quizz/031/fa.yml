question: دلیل اصلی نوسانات قیمت کوتاه‌مدت در استیبل‌کوین‌ها چیست؟
answer: سطوح پایین نقدینگی در صرافی‌ها
wrong_answers:
  - کمبود ذخایر برای پاسخگویی به تقاضای برداشت
  - هک‌هایی که استیبل‌کوین را به خطر می‌اندازند
  - از دست دادن پیوند استیبل‌کوین‌ها
explanation: |
  نوسانات کوتاه‌مدت قیمت در استیبل‌کوین‌ها اغلب نتیجه مشکلات نقدینگی است، جایی که صرافی‌های کوچکتر ممکن است توانایی برآورده کردن تقاضای مشتریان را نداشته باشند و باعث نوسانات موقت قیمت شوند.
reviewed: true