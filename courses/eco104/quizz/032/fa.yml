question: در چه سناریویی ممکن است یک استیبل‌کوین بالاتر از قیمت ثابت خود معامله شود؟
answer: وقتی تقاضا برای استیبل‌کوین‌ها از ظرفیت Exchange فراتر می‌رود
wrong_answers:
  - وقتی صادرکننده استیبل‌کوین وجوه را مسدود می‌کند
  - وقتی که استیبل‌کوین به طور کامل توسط ذخایر نقدی پشتیبانی می‌شود
  - وقتی فشار فروش قوی از سوی کاربران وجود دارد
explanation: |
  استیبل‌کوین‌ها می‌توانند بالاتر از قیمت ثابت‌شده خود معامله شوند زمانی که تقاضا برای استیبل‌کوین‌ها از ظرفیت Exchange برای برآورده کردن تقاضای مشتریان بیشتر باشد، که معمولاً در صرافی‌های کوچکتر اتفاق می‌افتد.
reviewed: true