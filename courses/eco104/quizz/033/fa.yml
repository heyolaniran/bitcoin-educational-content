question: یکی از مزایای استیبل‌کوین‌های متمرکز، علی‌رغم توانایی آن‌ها در مسدود کردن وجوه، این است که می‌توانند به کاهش نوسانات بازار کمک کنند.
answer: آن‌ها می‌توانند به سرعت برای محافظت از کاربران در برخی سناریوها واکنش نشان دهند.
wrong_answers:
  - آنها تمرکززدایی کامل و امنیت را ارائه می‌دهند
  - آنها مشمول هیچ‌گونه مقررات یا مداخله‌ای نیستند
  - آن‌ها به‌طور مستقل از اجرای قانون عمل می‌کنند.
explanation: |
  استیبل‌کوین‌های متمرکز توانایی مداخله دارند 
  زمانی که به نفع کاربران و ثبات کلی 
  سیستم باشد، همان‌طور که در مثال‌هایی نشان داده شده که در آن وجوه مسدود شده 
  برای حفاظت از مصرف‌کنندگان و جلوگیری از سود بردن هکرها استفاده شده است.
reviewed: true