question: تفاوت اصلی بین اقتصاد کینزی و اقتصاد اتریشی چیست؟
answer: اقتصاد کینزی به چاپ پول و هزینه‌کرد برای ترویج رشد اعتقاد دارد، در حالی که اقتصاد اتریشی بر دیدگاهی محتاطانه‌تر از رشد و عقلانیت انسانی تأکید می‌کند.
wrong_answers:
  - اقتصاد کینزی بر دیدگاه محتاطانه‌تری از رشد و عقلانیت انسانی تأکید دارد، در حالی که اقتصاد اتریشی به چاپ پول و هزینه‌کردن برای ترویج رشد اعتقاد دارد.
  - اقتصاد کینزی بر تولید و مدیریت پول توسط بانک‌های مرکزی تمرکز دارد، در حالی که اقتصاد اتریشی به تمرکززدایی قدرت پولی اعتقاد دارد.
  - اقتصاد کینزی به تمرکز قدرت پولی اعتقاد دارد، در حالی که اقتصاد اتریشی بر تولید و مدیریت پول توسط بانک‌های مرکزی تمرکز می‌کند.
explanation: |
  این فصل توضیح می‌دهد که اقتصاد کینزی از این ایده حمایت می‌کند که تولید و مدیریت پول مسئولیت بانک‌های مرکزی است و چاپ و هزینه‌کرد پول رشد را ترویج می‌دهد. از سوی دیگر، اقتصاد اتریشی با بیش از ۲۰۰ سال تحقیق و توسعه، تأملات فلسفی و نوشته‌های نویسندگان برجسته، بر دیدگاهی محتاطانه‌تر از رشد و عقلانیت انسانی در اقتصاد ما تأکید دارد.
reviewed: true