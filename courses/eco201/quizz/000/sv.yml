question: Vilken är den största skillnaden mellan keynesiansk och österrikisk ekonomi?
answer: Keynesiansk ekonomi tror på penningtryckning och utgifter för att främja tillväxt, medan österrikisk ekonomi betonar en mer nykter syn på tillväxt och mänsklig rationalitet.
wrong_answers:
  - Keynesiansk ekonomi betonar en mer nykter syn på tillväxt och mänsklig rationalitet, medan österrikisk ekonomi tror på penningtryckning och utgifter för att främja tillväxt.
  - Keynesiansk ekonomi fokuserar på centralbankers produktion och förvaltning av pengar, medan österrikisk ekonomi tror på decentralisering av den monetära makten.
  - Keynesiansk ekonomi tror på en centralisering av den monetära makten, medan österrikisk ekonomi fokuserar på centralbankers produktion och förvaltning av pengar.
