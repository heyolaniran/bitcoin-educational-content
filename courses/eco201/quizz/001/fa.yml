question: تمرکز اصلی اقتصاد اتریشی چیست؟
answer: اقتصاد اتریشی بر دیدگاه متعادل‌تری از رشد و عقلانیت انسانی تأکید دارد.
wrong_answers:
  - اقتصاد اتریشی بر چاپ پول و هزینه‌کرد برای ترویج رشد تمرکز دارد.
  - اقتصاد اتریشی بر تمرکز قدرت پولی تأکید دارد.
  - اقتصاد اتریشی بر تولید و مدیریت پول توسط مرکزی تمرکز دارد
explanation: |
  این فصل توضیح می‌دهد که اقتصاد اتریشی بر دیدگاهی واقع‌بینانه‌تر از رشد و عقلانیت انسانی در اقتصاد ما تأکید دارد که به‌طور قابل‌توجهی با دکترین کینزی تفاوت دارد.
reviewed: true