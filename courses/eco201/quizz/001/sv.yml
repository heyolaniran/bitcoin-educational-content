question: Vad är huvudfokus för österrikisk ekonomi?
answer: Österrikisk ekonomi betonar en mer nykter syn på tillväxt och mänsklig rationalitet.
wrong_answers:
  - Österrikisk ekonomi fokuserar på penningtryckning och utgifter för att främja tillväxt.
  - Österrikisk ekonomi betonar centraliseringen av den monetära makten.
  - Österrikisk nationalekonomi fokuserar på centralbankens produktion och förvaltning av pengar
explanation: |
  Kapitlet förklarar att österrikisk ekonomi betonar en
  mer nykter syn på tillväxt och mänsklig rationalitet i vår ekonomi
  ekonomi, vilket skiljer sig mycket från den keynesianska doktrinen.
reviewed: true