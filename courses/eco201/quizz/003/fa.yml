question: چه عواملی باعث بحران‌های اقتصادی می‌شوند طبق دوره؟
answer: بحران‌های اقتصادی می‌توانند ناشی از بی‌کفایتی انسانی، دستکاری بازار، یا سرخوشی جمعی مردم باشند.
wrong_answers:
  - بحران‌های اقتصادی صرفاً به دلیل دستکاری بازار هستند.
  - بحران‌های اقتصادی صرفاً به دلیل بی‌کفایتی انسانی است.
  - بحران‌های اقتصادی صرفاً به دلیل شور و هیجان جمعی مردم است.
explanation: |
  فصل اشاره می‌کند که دوره به بررسی این موضوع خواهد پرداخت که چگونه بحران‌های اقتصادی می‌توانند ناشی از بی‌کفایتی انسانی، دستکاری بازار، یا سرخوشی جمعی مردم باشند.
reviewed: true