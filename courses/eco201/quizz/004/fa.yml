question: رویکرد اصلی اقتصاد اتریشی به درک اقتصاد چیست؟
answer: اقتصاد اتریشی اقتصاد را از دیدگاه منطق انسانی و جامعه‌شناسی درک می‌کند.
wrong_answers:
  - اقتصاد اتریشی اقتصاد را از طریق معادلات ریاضی درک می‌کند.
  - اقتصاد اتریشی اقتصاد را از دیدگاه چاپ و خرج کردن پول درک می‌کند.
  - اقتصاد اتریشی اقتصاد را از دیدگاه بانک‌های مرکزی درک می‌کند.
explanation: |
  این فصل توضیح می‌دهد که اقتصاد اتریشی اقتصاد را از دیدگاه منطق انسانی و جامعه‌شناسی درک می‌کند، به جای اینکه این رشته را از طریق معادلات ریاضی بررسی کند.
reviewed: true