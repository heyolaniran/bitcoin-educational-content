question: अर्थशास्त्र को समझने के लिए ऑस्ट्रियाई अर्थशास्त्र का मुख्य दृष्टिकोण क्या है?
answer: ऑस्ट्रियाई अर्थशास्त्र अर्थशास्त्र को मानवीय तर्क और समाजशास्त्र के परिप्रेक्ष्य से समझता है।
wrong_answers:
  - ऑस्ट्रियाई अर्थशास्त्र गणितीय समीकरणों के माध्यम से अर्थशास्त्र को समझता है।
  - ऑस्ट्रियाई अर्थशास्त्र, मौद्रिक मुद्रण और व्यय के परिप्रेक्ष्य से अर्थशास्त्र को समझता है।
  - ऑस्ट्रियाई अर्थशास्त्र केंद्रीय बैंकों के नजरिए से अर्थशास्त्र को समझता है।
explanation: |
  अध्याय में बताया गया है कि ऑस्ट्रियाई अर्थशास्त्र अर्थशास्त्र को गणितीय समीकरणों के माध्यम से समझने के बजाय मानवीय तर्क और समाजशास्त्र के दृष्टिकोण से समझता है।
reviewed: true