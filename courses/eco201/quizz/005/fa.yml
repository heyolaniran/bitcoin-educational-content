question: مسئولیت اصلی بانک‌های مرکزی بر اساس دکترین کینزی چیست؟
answer: تولید و مدیریت پول
wrong_answers:
  - غیرمتمرکزسازی قدرت پولی
  - ترویج دیدگاهی متعادل از رشد و عقلانیت انسانی
  - هیچ‌کدام از موارد بالا
explanation: |
  این فصل اشاره می‌کند که بر اساس دکترین کینزی، تولید و مدیریت پول بر عهده بانک‌های مرکزی است.
reviewed: true