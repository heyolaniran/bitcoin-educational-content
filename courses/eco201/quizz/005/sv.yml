question: Vilket är centralbankernas huvudsakliga ansvarsområde enligt den keynesianska doktrinen?
answer: Produktion och hantering av pengar
wrong_answers:
  - Decentralisering av den monetära makten
  - Främjande av en nykter syn på tillväxt och mänsklig rationalitet
  - Inget av ovanstående
explanation: |
  I kapitlet nämns att enligt den keynesianska doktrinen,
  produktion och hantering av pengar är centralbankernas
  centralbankernas ansvar.
reviewed: true