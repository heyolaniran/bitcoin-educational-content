question: هدف اصلی دوره چیست؟
answer: این دوره به بررسی مفاهیم بنیادی اقتصاد اتریشی می‌پردازد.
wrong_answers:
  - این دوره به ترویج دکترین کینزی می‌پردازد.
  - این دوره به توضیح عملکرد بانک‌های مرکزی می‌پردازد.
  - این دوره به تمرکز قدرت پولی می‌پردازد.
explanation: |
  فصل اشاره می‌کند که دوره به بررسی مفاهیم بنیادی اقتصاد اتریشی می‌پردازد.
reviewed: true