question: اثر کانتیلون چیست؟
answer: اثر کانتیلون به اصل اقتصادی اشاره دارد که وقتی پول جدید ایجاد می‌شود، ابتدا به نفع کسانی است که به منبع پول نزدیک‌تر هستند و به ضرر کسانی که دورتر هستند.
wrong_answers:
  - اثر کانتیلون به اصل اقتصادی اشاره دارد که وقتی پول جدید ایجاد می‌شود، به طور مساوی به نفع همه در اقتصاد است.
  - اثر کانتیلون به اصل اقتصادی اشاره دارد که وقتی پول جدید ایجاد می‌شود، ابتدا به نفع کسانی است که دورتر از منبع پول هستند و به ضرر کسانی که نزدیک‌تر هستند.
  - اثر کانتیلون به اصل اقتصادی اشاره دارد که وقتی پول جدید ایجاد می‌شود، تأثیری بر توزیع ثروت در اقتصاد ندارد.
explanation: |
  اثر کانتیلون، که به نام اقتصاددان قرن هجدهم ریچارد کانتیلون نام‌گذاری شده است، توصیف می‌کند که چگونه توزیع پول جدید در یک اقتصاد می‌تواند به نابرابری‌های ثروت منجر شود. کسانی که به منبع پول جدید نزدیک‌تر هستند (مانند بانکداران و صاحبان دارایی) ابتدا و به طور قابل توجهی بهره‌مند می‌شوند، در حالی که کسانی که دورتر هستند (مانند کارگران عادی و پس‌اندازکنندگان) کمتر بهره‌مند می‌شوند یا حتی به دلیل تورم اثرات منفی را تجربه می‌کنند.
reviewed: true