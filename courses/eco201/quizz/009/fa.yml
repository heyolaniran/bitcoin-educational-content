question: نقش بانک مرکزی به عنوان وام‌دهنده نهایی چیست؟
answer: بانک مرکزی در زمان بحران‌ها به بانک‌های دچار مشکل وام می‌دهد تا از اثر دومینو که می‌تواند کل سیستم مالی را فلج کند، جلوگیری کند.
wrong_answers:
  - بانک مرکزی در زمان بحران‌ها به بانک‌های مضطرب وام می‌دهد تا سود خود را افزایش دهد.
  - بانک مرکزی در زمان بحران‌ها به بانک‌های دچار مشکل وام می‌دهد تا عملیات آن‌ها را به دست گیرد.
  - بانک مرکزی در زمان بحران‌ها به بانک‌های دچار مشکل وام می‌دهد تا بدهی ملی را افزایش دهد.
explanation: |
  مفهوم بانک مرکزی به عنوان وام‌دهنده نهایی در قرن ۱۹ در انگلستان به‌وجود آمد، در پاسخ به بحران‌های مکرر بانکی که ثبات مالی را تهدید می‌کردند. با وام‌دهی به بانک‌های در حال بحران، بانک مرکزی می‌تواند از اثر دومینوی شکست بانک‌ها که ممکن است به رکود یا افسردگی اقتصادی منجر شود، جلوگیری کند.
reviewed: true