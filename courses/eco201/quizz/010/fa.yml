question: ذخیره‌گیری جزئی چیست؟
answer: بانکداری ذخیره کسری یک روش بانکی است که در آن بانک‌ها ملزم نیستند به اندازه سپرده‌هایی که دریافت می‌کنند ذخایر نگه دارند، که به آن‌ها اجازه می‌دهد هنگام اعطای وام قدرت خرید جدید ایجاد کنند.
wrong_answers:
  - بانکداری ذخیره کسری یک روش بانکی است که در آن بانک‌ها ملزم به نگهداری ذخایری بیشتر از سپرده‌هایی هستند که دریافت می‌کنند.
  - بانکداری ذخیره کسری یک روش بانکی است که در آن بانک‌ها مجاز به اعطای وام نیستند.
  - بانکداری ذخیره کسری یک روش بانکی است که در آن بانک‌ها ملزم به نگهداری دقیقاً همان مقدار ذخایر هستند که به صورت سپرده دریافت می‌کنند.
explanation: |
  بانکداری ذخیره کسری سیستمی است که در آن بانک‌ها تنها بخشی از وجوه سپرده‌گذاران خود را به عنوان ذخیره نگه می‌دارند و بقیه را وام می‌دهند. این سیستم به بانک‌ها اجازه می‌دهد تا پول جدیدی به شکل وام ایجاد کنند که باعث افزایش کل پول Supply در اقتصاد می‌شود.
