question: پیامدهای سیاست‌های نرخ بهره صفر (ZIRP) چیست؟
answer: ZIRP حاشیه‌های سود بانک‌ها را کاهش می‌دهد، وام‌دهی به کارآفرینان و ریسک‌پذیران را دلسرد می‌کند و دولت‌ها را تشویق به انجام هزینه‌های گسترده می‌کند که منجر به افزایش بدهی عمومی می‌شود.
wrong_answers:
  - ZIRP سود بانک‌ها را افزایش می‌دهد، وام‌دهی به کارآفرینان و ریسک‌پذیران را تشویق می‌کند و هزینه‌های دولتی را کاهش می‌دهد.
  - ZIRP تأثیر قابل‌توجهی بر بانک‌ها، شیوه‌های وام‌دهی یا هزینه‌های دولتی ندارد.
  - ZIRP بدهی عمومی را کاهش می‌دهد، وام‌دهی به کارآفرینان و ریسک‌پذیران را تشویق می‌کند و هزینه‌های دولتی را کاهش می‌دهد.
explanation: |
  سیاست‌های نرخ بهره صفر (ZIRP) می‌توانند پیامدهای ناخواسته متعددی داشته باشند. بانک‌ها فرصت‌های محدودی برای بازسازی سرمایه خود دارند زیرا حاشیه سود آنها کاهش یافته است. آنها همچنین انگیزه کمی برای وام دادن دارند، به ویژه به کارآفرینان و دیگر ریسک‌پذیران. در عوض، منابع خود را به اوراق‌بهادارسازی سرمایه موجود یا ارائه وام در برابر وثیقه اختصاص می‌دهند. علاوه بر این، ZIRP دولت‌ها را تشویق می‌کند تا به هزینه‌های گسترده بپردازند که منجر به افزایش قابل توجهی در سطح بدهی عمومی می‌شود.
reviewed: true