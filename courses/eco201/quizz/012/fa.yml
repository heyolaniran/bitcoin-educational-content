question: هدف اصلی دوره Bitcoin که در فصل ذکر شده چیست؟
answer: هدف اصلی دوره آموزش اصول اقتصادی صحیح به علاقه‌مندان جدید Bitcoin است.
wrong_answers:
  - هدف اصلی دوره آموزش به علاقه‌مندان جدید Bitcoin نحوه استخراج Bitcoin است.
  - هدف اصلی دوره آموزش به علاقه‌مندان جدید Bitcoin است که چگونه در Bitcoin سرمایه‌گذاری کنند.
  - هدف اصلی دوره آموزش به علاقه‌مندان جدید Bitcoin است که چگونه ارزهای دیجیتال خود را ایجاد کنند.
explanation: |
  دوره آموزشی به منظور آموزش علاقه‌مندان جدید Bitcoin درباره اصول بنیادی اقتصاد، به‌ویژه اصول مکتب اقتصاد اتریشی طراحی شده است. این دانش برای درک ارزش و پتانسیل Bitcoin به عنوان جایگزینی برای سیستم‌های پولی سنتی بسیار مهم است.
reviewed: true