question: مشکل اصلی سیستم ذخیره کسری چیست؟
answer: مشکل اصلی سیستم ذخیره کسری این است که برداشت‌های قابل توجه از یک بانک خاص می‌تواند به طور بالقوه منجر به ورشکستگی آن شود.
wrong_answers:
  - مشکل اصلی سیستم ذخیره کسری این است که مانع از وام‌دهی بانک‌ها می‌شود.
  - مشکل اصلی سیستم ذخیره کسری این است که از بانک‌ها می‌خواهد ذخایر بیشتری نسبت به سپرده‌هایی که دریافت می‌کنند، نگه دارند.
  - مشکل اصلی سیستم ذخیره کسری این است که مانع از ایجاد پول جدید توسط بانک‌ها می‌شود.
explanation: |
  در یک سیستم ذخیره کسری، بانک‌ها تنها بخشی از وجوه سپرده‌گذاران خود را به عنوان ذخیره نگه می‌دارند و بقیه را وام می‌دهند. اگر بسیاری از مشتریان به طور همزمان برای برداشت وجوه خود هجوم بیاورند، بانک ممکن است ذخایر کافی برای پاسخگویی به این تقاضاها نداشته باشد که می‌تواند منجر به ورشکستگی شود.
reviewed: true