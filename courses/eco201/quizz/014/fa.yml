question: تفاوت اساسی بین نظریه ارزش نهایی کارل منگر و نظریه‌های لئون والراس و ویلیام استنلی جونز چیست؟
answer: نظریه منگر عمدتاً ذهنی است، در حالی که والراس و جونس ارزش را پدیده‌ای عینی و قابل اندازه‌گیری می‌دانند.
wrong_answers:
  - نظریه منگر عمدتاً عینی است، در حالی که والراس و جونس ارزش را پدیده‌ای ذهنی و غیرقابل اندازه‌گیری می‌دانند.
  - نظریه منگر بر اساس نظریه ارزش کار است، در حالی که والراس و جونس ارزش را بر اساس میزان زمین استفاده شده در تولید می‌دانند.
  - نظریه منگر بر اساس نظریه ارزش زمین فیزیوکرات‌ها استوار است، در حالی که والراس و جونس ارزش را مبتنی بر کار استفاده شده در تولید می‌دانند.
explanation: |
  بر اساس فصل، نظریه ارزش نهایی منگر ذهنی است، به این معنا که بر اساس درک فرد از سودمندی‌ای که می‌تواند از یک کالا یا خدمات به دست آورد، استوار است. از سوی دیگر، والراس و جونس ارزش را پدیده‌ای عینی و قابل اندازه‌گیری می‌دانند.
reviewed: true