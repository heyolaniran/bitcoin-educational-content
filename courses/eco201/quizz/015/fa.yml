question: طبق نظر کارل منگر، چرا Exchange داوطلبانه بین دو فرد صورت می‌گیرد؟
answer: هر طرف معتقد است که این امر سودمندی ذهنی آن‌ها را افزایش خواهد داد.
wrong_answers:
  - هر حزب معتقد است که این امر سودمندی ذهنی آنها را کاهش خواهد داد.
  - هر طرف معتقد است که سودمندی ذهنی خود را حفظ خواهد کرد.
  - هر طرف معتقد است که این بر سودمندی ذهنی آن‌ها تأثیری نخواهد داشت.
explanation: |
  منگر نتیجه می‌گیرد که Exchange داوطلبانه بین دو فرد صورت می‌گیرد زیرا هر طرف معتقد است که این کار سودمندی ذهنی آن‌ها را افزایش خواهد داد. این بدان معناست که هر طرف معتقد است که پس از Exchange وضعیت بهتری خواهد داشت.
reviewed: true