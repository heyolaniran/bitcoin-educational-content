question: مفهوم کاهش مطلوبیت نهایی چیست؟
answer: هر واحد اضافی از یک کالا کمتر از واحد قبلی مطلوب است.
wrong_answers:
  - هر واحد اضافی از یک کالا بیشتر از واحد قبلی مطلوب است.
  - هر واحد اضافی از یک کالا به اندازه واحد قبلی مطلوب است.
  - تمایل به هر واحد اضافی از یک کالا به طور غیرقابل پیش‌بینی نوسان می‌کند.
explanation: |
  مفهوم کاهش مطلوبیت نهایی بیان می‌کند که هر واحد اضافی از یک کالا کمتر از واحد قبلی مطلوب است. این به این دلیل است که با افزایش تعداد واحدهای یک کالا که یک فرد به دست می‌آورد، مطلوبیت هر واحد اضافی از آن کالا کاهش می‌یابد.
reviewed: true