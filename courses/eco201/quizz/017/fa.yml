question: به گفته اقتصاددانان اتریشی، نیروی محرکه پشت فرآیند همکاری اجتماعی چیست؟
answer: مزیت تولیدی ناشی از تقسیم کار.
wrong_answers:
  - تمایل به تعامل اجتماعی و جامعه.
  - نیاز به حفاظت و امنیت.
  - دنبال کردن ثروت و قدرت.
explanation: |
  اقتصاددانان اتریشی، به ویژه لودویگ فون میزس، نتیجه‌گیری می‌کنند که مزیت تولیدی ناشی از تقسیم کار نیروی محرکه پشت فرآیند همکاری اجتماعی است. این به این دلیل است که افراد همیشه زمانی که در کار خود تخصص پیدا می‌کنند و در مبادلات شرکت می‌کنند، وضعیت بهتری دارند.
reviewed: true