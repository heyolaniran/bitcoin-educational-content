question: مفهوم مزیت مطلق در زمینه تقسیم کار چیست؟
answer: یک فرد توانایی برتری در انجام برخی وظایف نسبت به همسالان خود دارد.
wrong_answers:
  - یک فرد توانایی برتری در انجام تمام وظایف نسبت به همسالان خود دارد.
  - یک فرد توانایی برابر برای انجام وظایف خاصی مانند همسالان خود دارد.
  - یک فرد توانایی کمتری در انجام برخی وظایف نسبت به همتایان خود دارد.
explanation: |
  در زمینه تقسیم کار، مزیت مطلق به وضعیتی اشاره دارد که در آن یک فرد توانایی برتری در انجام وظایف خاصی نسبت به همتایان خود دارد. این فرد سپس علاقه‌مند به تخصص در تولید آن کالا و سپس مبادله مازاد به‌دست‌آمده برای کالاهایی است که تمایل دارد.
reviewed: true