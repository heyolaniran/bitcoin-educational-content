question: Vad innebär begreppet absolut fördel i samband med arbetsdelning?
answer: En person har en överlägsen förmåga att utföra vissa uppgifter jämfört med andra personer.
wrong_answers:
  - En individ har en överlägsen förmåga att utföra alla uppgifter än sina jämlikar.
  - En individ har lika stor förmåga att utföra vissa uppgifter som sina jämnåriga.
  - En individ har en sämre förmåga att utföra vissa uppgifter än sin
explanation: |
  I samband med arbetsfördelning avser absolut fördel
  en situation där en individ har en överlägsen förmåga att
  förmåga att utföra vissa uppgifter än sina kollegor. Denna
  har då ett intresse av att specialisera sig på produktion av
  produktionen av den varan och sedan byta ut det överskott
  som erhålls mot de varor de önskar.
reviewed: true