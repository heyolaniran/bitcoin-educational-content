question: مفهوم مزیت نسبی در زمینه تقسیم کار چیست؟
answer: یک فرد توانایی برتری در انجام برخی وظایف نسبت به دیگران دارد.
wrong_answers:
  - یک فرد توانایی برابر برای انجام تمام وظایف مانند دیگران دارد.
  - یک فرد توانایی کمتری در انجام برخی وظایف نسبت به وظایف دیگر دارد.
  - یک فرد توانایی برتری در انجام تمام وظایف نسبت به دیگران دارد.
explanation: |
  در زمینه تقسیم کار، مزیت نسبی به وضعیتی اشاره دارد که در آن یک فرد توانایی برتری در انجام وظایف خاصی نسبت به دیگران دارد. حتی اگر فرد در تولید هیچ کالایی مزیت مطلق نداشته باشد، باز هم انواعی از تولید وجود خواهد داشت که فرد در آن‌ها بهتر از دیگران است و به همین دلیل، همچنان علاقه‌مند به تخصصی شدن است.
reviewed: true