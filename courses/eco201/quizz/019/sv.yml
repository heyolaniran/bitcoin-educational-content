question: Vad innebär begreppet komparativa fördelar i samband med arbetsdelning?
answer: En individ har en överlägsen förmåga att utföra vissa uppgifter än andra.
wrong_answers:
  - En individ har lika stor förmåga att utföra alla uppgifter som andra.
  - En individ har en sämre förmåga att utföra vissa uppgifter än andra.
  - En individ har en överlägsen förmåga att utföra alla uppgifter än andra.
explanation: |
  I samband med arbetsdelning avser komparativ fördel
  fördel den situation där en individ har en överlägsen förmåga att
  överlägsen förmåga att utföra vissa uppgifter jämfört med andra.
  Även om individen inte har en absolut fördel i produktionen av
  i produktionen av någon vara, kommer det fortfarande att finnas typer av
  produktionstyper där individen är bättre än i andra
  andra, och av den anledningen har de fortfarande ett intresse av att
  specialisera sig.
reviewed: true