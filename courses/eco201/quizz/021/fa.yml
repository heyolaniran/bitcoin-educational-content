question: طبق نظر کارل منگر، ماهیت ارزش چیست؟
answer: ارزش یک پدیده روان‌شناختی ذهنی درون فرد است.
wrong_answers:
  - ارزش یک ویژگی ذاتی کالاها است.
  - ارزش یک پدیده عینی و قابل اندازه‌گیری است.
  - ارزش با مقدار کار استفاده شده در تولید تعیین می‌شود.
explanation: |
  بر اساس نظر منگر، ارزش یک پدیده روان‌شناختی ذهنی درون فرد است. این بدان معناست که ارزش یک ویژگی ذاتی کالاها نیست، بلکه از نظر فرد درباره سودمندی که می‌تواند از آن کالاها به دست آورد، ناشی می‌شود.
reviewed: true