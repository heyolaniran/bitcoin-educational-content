question: معضل زندانی در زمینه تقسیم کار چیست؟
answer: این وضعیتی است که در آن همکاری متقابل منجر به دستاوردهای کمتر از حد مطلوب برای افراد می‌شود، اما حداکثر دستاوردها را برای گروه به همراه دارد.
wrong_answers:
  - این وضعیتی است که در آن افراد از همکاری امتناع می‌ورزند و این امر به حداکثر سود برای گروه منجر می‌شود.
  - این وضعیتی است که در آن افراد با یکدیگر همکاری می‌کنند و به حداکثر سود برای خود می‌رسند، اما سود بهینه برای گروه حاصل نمی‌شود.
  - این وضعیتی است که در آن افراد از همکاری امتناع می‌ورزند و این امر منجر به کسب سود کمتر از حد مطلوب برای خود و گروه می‌شود.
explanation: |
  معمای زندانی یک مفهوم در نظریه بازی‌ها است که در آن افراد انگیزه‌ای برای انتخاب استراتژی‌هایی دارند که سود فردی خود را به حداکثر می‌رسانند، بدون توجه به استراتژی‌های انتخاب شده توسط دیگران، حتی زمانی که یک تعادل مطلوب‌تر از طریق هماهنگی/همکاری ممکن است.
reviewed: true