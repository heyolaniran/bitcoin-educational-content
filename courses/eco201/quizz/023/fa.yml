question: چرا مشکل هماهنگی در تقسیم کار در جوامع بزرگتر دوباره پدیدار می‌شود؟
answer: زیرا انسان‌ها به دلیل ظرفیت‌های شناختی خود محدود هستند و اندازه‌گیری ارزش مشارکت‌ها در Exchange که به‌طور اجتماعی پذیرفته شده است، یک مسئله غیرساده است.
wrong_answers:
  - زیرا انسان‌ها علاقه‌ای به کار با گروه‌های بزرگ ندارند و جوامع کوچکتر را ترجیح می‌دهند.
  - زیرا جوامع بزرگتر منابع بیشتری دارند که منجر به کاهش نیاز به تقسیم کار می‌شود.
  - زیرا جوامع بزرگ‌تر درگیری‌های بیشتری دارند که هماهنگی را دشوار می‌کند.
explanation: |
  در جوامع بزرگ‌تر، برای یک فرد غیرممکن است که روابط اجتماعی پایدار با بیش از 150 نفر را حفظ و به خاطر بسپارد، که این امر باعث می‌شود سیستم شهرت برای غلبه بر معضل زندانی در مقیاس بزرگ ناکافی باشد. همچنین، ارزیابی ارزش مشارکت‌ها در Exchange یک مشکل پیچیده در جوامع بزرگ‌تر است.
reviewed: true