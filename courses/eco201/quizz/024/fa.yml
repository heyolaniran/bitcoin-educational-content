question: راه‌حل مشکل Exchange مستقیم در تقسیم کار چیست؟
answer: غیرمستقیم Exchange تسهیل شده توسط پول.
wrong_answers:
  - Exchange مستقیم تسهیل شده توسط مبادله کالا.
  - غیرمستقیم Exchange تسهیل شده توسط مبادله.
  - مستقیم Exchange تسهیل شده توسط پول.
explanation: |
  پول امکان Exchange غیرمستقیم را فراهم می‌کند، جایی که یک فرد می‌تواند از دیگری خرید کند و فروشنده می‌تواند آن واحد پولی را در جای دیگری، در زمان دیگری و با شخص دیگری استفاده کند.
reviewed: true