question: سه بُعد مشکل تطابق دوگانه خواسته‌ها چیست؟
answer: فضایی، زمانی، و بین‌فردی.
wrong_answers:
  - فضایی، زمانی، و درون‌فردی.
  - فضایی، بین‌زمانی، و بین‌فردی.
  - فضایی، زمانی، و بین‌فردی.
explanation: |
  مشکل تطابق دوگانه خواسته‌ها به دشواری در مبادله کالا به کالا اشاره دارد که در آن هر دو طرف باید همزمان و در یک مکان چیزی را که دیگری می‌خواهد، داشته باشند. این مشکل سه بُعد دارد؛ مکانی (همان مکان)، زمانی (همان زمان)، و بین‌فردی (تمایل متقابل به کالاهای یکدیگر).
reviewed: true