question: داشتن قابلیت فروش بالا برای یک کالا به چه معناست؟
answer: باید تا حد امکان توسط افراد زیادی خواسته شود، بیشتر اوقات.
wrong_answers:
  - باید بیشتر اوقات توسط چند نفر خواسته شود.
  - باید در برخی مواقع توسط هر چه بیشتر افراد مورد تمایل قرار گیرد.
  - باید گاهی اوقات توسط چند نفر خواسته شود.
explanation: |
  کالایی با قابلیت فروش بالا کالایی است که به طور گسترده مورد تقاضا است و می‌تواند به راحتی با کالاها یا خدمات دیگر مبادله شود. این ویژگی آن را برای استفاده به عنوان پول مناسب می‌سازد.
reviewed: true