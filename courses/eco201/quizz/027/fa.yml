question: نقش پول در هماهنگی بین‌زمانی اقدام انسانی چیست؟
answer: این امکان را فراهم می‌کند که ارزش در حال حاضر ذخیره شود و به خود آینده منتقل گردد.
wrong_answers:
  - این امکان را فراهم می‌کند که ارزش در آینده ذخیره شود و به خود فعلی منتقل گردد.
  - این امکان را فراهم می‌کند که ارزش در حال حاضر ذخیره شود و به افراد دیگر منتقل گردد.
  - این امکان را فراهم می‌کند که ارزش در آینده ذخیره شود و به افراد دیگر منتقل گردد.
explanation: |
  با ذخیره کردن پول، یعنی پس‌انداز، افراد در برابر عدم قطعیت‌های آینده محافظت می‌کنند و بدین ترتیب قادر می‌شوند اقدامات خود را به سمت افق‌های زمانی طولانی‌تر هدایت کنند. با این حال، آنها تنها در صورتی می‌توانند به این هدف دست یابند که پول مورد استفاده به عنوان یک ذخیره ارزش عمل کند.
reviewed: true