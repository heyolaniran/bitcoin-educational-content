question: رابطه بین ترجیح زمانی و نرخ بهره در یک اقتصاد با بازارهای سرمایه غیر دستکاری شده چیست؟
answer: افزایش نرخ بهره ناشی از افزایش نسبی تقاضا برای سرمایه در مقایسه با Supply است که نشان‌دهنده ترجیحات زمانی بالاتر است. برعکس، کاهش نرخ بهره به دلیل افزایش پس‌انداز رخ می‌دهد که به معنای افزایش Supply سرمایه است و نشان‌دهنده کاهش ترجیحات زمانی است.
wrong_answers:
  - افزایش نرخ بهره نشان‌دهنده کاهش ترجیحات زمانی است، در حالی که کاهش نرخ بهره نشان‌دهنده افزایش ترجیحات زمانی است.
  - ترجیح زمانی و نرخ بهره به صورت معکوس مرتبط هستند.
  - ترجیح زمانی و نرخ بهره هیچ رابطه مستقیمی ندارند.
explanation: |
  در اقتصادی با بازارهای سرمایه دست‌نخورده، نرخ‌های بهره مرجع در نقطه تلاقی سرمایه Supply و تقاضا تعیین می‌شوند. بنابراین، این نرخ‌ها نمایانگر وضعیت ترجیحات زمانی برای کل اقتصاد هستند. افزایش نرخ بهره ناشی از افزایش نسبی تقاضا برای سرمایه در مقایسه با Supply است که نشان‌دهنده ترجیحات زمانی بالاتر است. برعکس، کاهش نرخ بهره به دلیل افزایش در پس‌اندازها رخ می‌دهد که به معنای افزایش در Supply سرمایه است و نشان‌دهنده کاهش در ترجیحات زمانی است.
reviewed: true