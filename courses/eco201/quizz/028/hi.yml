question: बिना हेरफेर वाले पूंजी बाजार वाली अर्थव्यवस्था में समय वरीयता और ब्याज दरों के बीच क्या संबंध है?
answer: ब्याज दरों में वृद्धि Supply की तुलना में पूंजी की मांग में सापेक्ष वृद्धि के परिणामस्वरूप होती है, जो उच्च समय वरीयताओं को दर्शाती है। इसके विपरीत, ब्याज दरों में कमी बचत में वृद्धि के कारण होती है, जो पूंजी के Supply में वृद्धि है, जो समय वरीयताओं में कमी को दर्शाती है।
wrong_answers:
  - ब्याज दरों में वृद्धि समय वरीयताओं में कमी को दर्शाती है, जबकि ब्याज दरों में कमी समय वरीयताओं में वृद्धि को दर्शाती है।
  - समय वरीयता और ब्याज दरें विपरीत रूप से संबंधित हैं।
  - समय वरीयता और ब्याज दरों का कोई सीधा संबंध नहीं है।
explanation: |
  बिना हेरफेर वाले पूंजी बाजारों वाली अर्थव्यवस्था में, संदर्भ ब्याज दरें पूंजी Supply और मांग के चौराहे पर निर्धारित की जाती हैं। इसलिए, ये दरें पूरी अर्थव्यवस्था के लिए समय वरीयताओं की स्थिति का प्रतिनिधित्व करती हैं। ब्याज दर में वृद्धि Supply की तुलना में पूंजी की मांग में सापेक्ष वृद्धि के परिणामस्वरूप होती है, जो उच्च समय वरीयताओं का संकेत देती है। इसके विपरीत, ब्याज दरों में कमी बचत में वृद्धि के कारण होती है, जो पूंजी के Supply में वृद्धि है, जो समय वरीयताओं में कमी का संकेत देती है।
