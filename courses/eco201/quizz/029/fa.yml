question: مفهوم ترجیح زمانی چیست؟
answer: ترجیح زمانی ارزیابی ذهنی ارزش کالاهای آینده در مقایسه با کالاهای حال است. با ثابت بودن سایر شرایط، کالاهای حال به طور ذاتی بر کالاهای آینده ترجیح داده می‌شوند.
wrong_answers:
  - ترجیح زمانی ارزیابی عینی ارزش کالاهای آینده در مقایسه با کالاهای فعلی است.
  - ترجیح زمانی، ترجیح ذاتی برای کالاهای آینده نسبت به کالاهای حال است.
  - ترجیح زمانی ارزیابی ذهنی ارزش کالاهای حاضر در مقایسه با کالاهای آینده است.
explanation: |
  ترجیح زمانی ارزیابی ذهنی ارزش کالاهای آینده در مقایسه با کالاهای حال است. از آنجا که ما فانی هستیم و آینده همیشه نامشخص است، به طور طبیعی ترجیح می‌دهیم اکنون به یک کالا دسترسی داشته باشیم تا در آینده. در حالی که ترجیح زمانی می‌تواند بین افراد متفاوت باشد، به دلیل عوامل متعددی مانند فرهنگ، ثروت، تحصیلات، فیزیولوژی و غیره، ترجیحات زمانی همیشه مثبت هستند، به این معنا که با برابر بودن همه چیز، ما همیشه کالاهای حال را بیشتر از کالاهای آینده ارزش‌گذاری می‌کنیم.
reviewed: true