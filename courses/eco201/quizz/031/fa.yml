question: نقش کالاهای سرمایه‌ای در اقتصاد چیست؟
answer: کالاهای سرمایه‌ای در تولید کالاهای دیگر استفاده می‌شوند. آن‌ها به افراد امکان می‌دهند تا کالاهای مصرفی به دست آورند.
wrong_answers:
  - کالاهای سرمایه‌ای برای مصرف استفاده می‌شوند.
  - کالاهای سرمایه‌ای هیچ نقشی در اقتصاد ندارند.
  - کالاهای سرمایه‌ای برای تولید کالاهای سرمایه‌ای دیگر استفاده می‌شوند.
explanation: |
  برای تولید کالاهای مصرفی، کارآفرینان کالاهای واسطه‌ای مختلف را با عوامل تولید اصلی (کار، زمین و سرمایه) ترکیب می‌کنند طبق الگویی که تولید حاصل را به حداکثر می‌رساند. تمام کالاهای دیگر در اقتصاد، که می‌توانیم آن‌ها را کالاهای واسطه‌ای بنامیم، فقط به این دلیل ارزش دارند که به افراد امکان می‌دهند این کالاهای مصرفی را به دست آورند؛ آن‌ها کالاهایی هستند که در تولید کالاهای دیگر استفاده می‌شوند.
reviewed: true