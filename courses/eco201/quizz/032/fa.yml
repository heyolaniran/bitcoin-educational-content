question: هدف نهایی فعالیت اقتصادی از نظر کارل منگر چیست؟
answer: هدف نهایی فعالیت اقتصادی مصرف است.
wrong_answers:
  - هدف نهایی فعالیت اقتصادی تولید است.
  - هدف نهایی فعالیت اقتصادی پس‌انداز است.
  - هدف نهایی فعالیت اقتصادی سرمایه‌گذاری است.
explanation: |
  بر اساس نظر کارل منگر، کالاها تنها زمانی به عنوان کالاهای اقتصادی (ارزش‌گذاری شده) در نظر گرفته می‌شوند که به عنوان وسیله‌ای برای اهداف انتخاب شده و ارزش‌گذاری شده توسط افراد عمل کنند. بنابراین، برای منگر، نقطه شروع تحلیل اقتصادی کالاهای مصرفی یا کالاهای نهایی است، زیرا آن‌ها نمایانگر هدف نهایی فعالیت اقتصادی هستند.
reviewed: true