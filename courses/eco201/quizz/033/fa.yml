question: رابطه بین پس‌انداز و استاندارد زندگی از دیدگاه اقتصاددانان اتریشی چیست؟
answer: هرچه بیشتر پس‌انداز کنیم، سرمایه بیشتری می‌توانیم انباشته کنیم که به نوبه خود به افزایش بهره‌وری منجر می‌شود و کالاهای بیشتری تولید می‌کند. بنابراین، استاندارد زندگی بالاتری به دست می‌آید.
wrong_answers:
  - هرچه بیشتر پس‌انداز کنیم، سطح زندگی‌مان پایین‌تر می‌آید.
  - هیچ رابطه‌ای بین پس‌انداز و استاندارد زندگی وجود ندارد.
  - هرچه کمتر پس‌انداز کنیم، سطح زندگی‌مان بالاتر می‌رود.
explanation: |
  اقتصاددانان اتریشی معتقدند که کاهش ترجیحات زمانی نقطه شروع چرخه فضیلت پس‌انداز → کالاهای سرمایه‌ای بیشتر → بهره‌وری بیشتر → کالاهای بیشتر = استاندارد زندگی بالاتر → ترجیحات زمانی پایین‌تر است. بنابراین، هرچه بیشتر پس‌انداز کنیم، می‌توانیم سرمایه بیشتری انباشته کنیم که به نوبه خود به افزایش بهره‌وری و تولید کالاهای بیشتر منجر می‌شود. این به استاندارد زندگی بالاتری منجر می‌شود.
reviewed: true