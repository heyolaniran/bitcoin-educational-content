question: نظریه چرخه تجاری اتریشی چیست؟
answer: نظریه چرخه تجاری اتریشی نظریه‌ای است که چرخه‌های اقتصادی را به عنوان پویایی‌های درونی سیستم بانکداری ذخیره کسری توضیح می‌دهد و بر ماهیت متوالی عمل انسانی و تأثیر نوسانات نرخ بهره بر هماهنگی بین‌زمانی عوامل اقتصادی تأکید دارد.
wrong_answers:
  - نظریه چرخه تجاری اتریشی نظریه‌ای است که چرخه‌های اقتصادی را به عنوان نتیجه‌ای از رویدادهای خارجی و روحیه‌های حیوانی توضیح می‌دهد.
  - نظریه چرخه تجاری اتریشی نظریه‌ای است که چرخه‌های اقتصادی را به عنوان نتیجه تغییرات در تقاضای کل و Supply توضیح می‌دهد.
  - نظریه چرخه تجاری اتریشی نظریه‌ای است که چرخه‌های اقتصادی را به عنوان نتیجه تغییرات در سطح اشتغال، تولید ناخالص داخلی، یا شاخص قیمت مصرف‌کننده توضیح می‌دهد.
explanation: |
  نظریه اتریشی چرخه کسب‌وکار، که توسط لودویگ فون میزس و فریدریش هایک توسعه یافته است، چرخه‌های اقتصادی را به عنوان پویایی‌های درونی سیستم بانکداری ذخیره کسری توضیح می‌دهد. این نظریه بر ماهیت ترتیبی عمل انسانی و تأثیر نوسانات نرخ بهره بر هماهنگی بین‌زمانی عوامل اقتصادی تأکید دارد.
reviewed: true