explanation: |
  بر اساس نظریه چرخه تجاری اتریشی، زمانی که کاهش نرخ بهره به دلیل افزایش پس‌انداز رخ می‌دهد، مقدار کالاهای نهایی مصرف‌شده کاهش می‌یابد زیرا پس‌انداز شامل به تعویق انداختن بخشی از مصرف به تاریخ بعدی است. در نتیجه، نرخ بهره کاهش می‌یابد زیرا Supply سرمایه در حال افزایش است. این امر به کارآفرینان اجازه می‌دهد تا از این جریان سرمایه برای ایجاد کالاهای سرمایه‌گذاری جدید استفاده کرده و ساختار تولید را طولانی‌تر کنند.
