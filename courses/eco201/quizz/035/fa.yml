question: طبق نظریه اتریشی چرخه کسب‌وکار، زمانی که به دلیل افزایش پس‌اندازها نرخ بهره کاهش می‌یابد، چه اتفاقی می‌افتد؟
answer: مقدار کالاهای نهایی مصرف‌شده کاهش خواهد یافت، نرخ بهره کاهش می‌یابد، کارآفرینان از این جریان سرمایه برای ایجاد کالاهای سرمایه‌گذاری جدید استفاده خواهند کرد و بدین ترتیب ساختار تولید را طولانی‌تر خواهند کرد.
