question: طرفداران اصلی نظریه چرخه تجاری اتریشی چه کسانی هستند؟
answer: لودویگ فن میزس و فریدریش هایک
wrong_answers:
  - جان مینارد کینز و میلتون فریدمن
  - آدام اسمیت و دیوید ریکاردو
  - کارل مارکس و فریدریش انگلس
explanation: |
  نظریه چرخه تجاری اتریشی توسط لودویگ فون میزس و فریدریش هایک توسعه یافت، که هر دو از اعضای برجسته مکتب اقتصادی اتریش بودند.
reviewed: true