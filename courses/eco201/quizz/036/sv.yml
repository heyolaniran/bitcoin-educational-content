question: Vilka är de främsta förespråkarna för den österrikiska teorin om konjunkturcykeln?
answer: Ludwig von Mises och Friedrich Hayek
wrong_answers:
  - John Maynard Keynes och Milton Friedman
  - Adam Smith och David Ricardo
  - Karl Marx och Friedrich Engels
explanation: |
  Den österrikiska teorin om konjunkturcykeln utvecklades av Ludwig Von
  Mises och Friedrich Hayek, som båda var framstående medlemmar av den österrikiska skolan
  inom nationalekonomin.
reviewed: true