question: کاهش نرخ بهره به دلیل افزایش اعتبار طبق نظریه اتریشی چرخه کسب و کار چه اثرات فوری دارد؟
answer: کارآفرینان می‌توانند منابع بیشتری قرض بگیرند و در نتیجه مراحل تولید با ترتیب بالاتری ایجاد کنند. این گسترش ساختار تولید منجر به کاهش مصرف نخواهد شد زیرا هیچ به تعویق انداختن مصرف فعلی توسط مصرف‌کنندگان صورت نگرفته است. به عبارت دیگر، تولید ناخالص داخلی (GDP) رشد می‌کند.
