question: نقش قیمت‌های نسبی در نظریه چرخه تجاری اتریشی چیست؟
answer: قیمت‌های نسبی برای هماهنگی عوامل اقتصادی مهم هستند.
wrong_answers:
  - قیمت‌های نسبی در نظریه اتریشی چرخه کسب‌وکار بی‌اهمیت هستند.
  - قیمت‌های نسبی برای تعیین سطح اشتغال مهم هستند.
  - قیمت‌های نسبی برای تعیین سطح تولید ناخالص داخلی مهم هستند.
explanation: |
  مکتب اتریشی بر اهمیت قیمت‌های نسبی برای هماهنگی عوامل اقتصادی تأکید دارد. قیمت‌های نسبی نشان‌دهنده کمبود واقعی عوامل تولید هستند و به عوامل اقتصادی اجازه می‌دهند تا تصمیمات خود را عقلانی کنند.
reviewed: true