question: علت افسردگی از نظر پول‌گرایان و کینزی‌ها چیست؟
answer: تقاضای کل ناکافی
wrong_answers:
  - تولید بیش از حد
  - نرخ بهره بالا
  - تورم بالا
explanation: |
  برای هر دو گروه پول‌گرایان و کینزی‌ها، علت رکود اقتصادی، تقاضای کل ناکافی است. آن‌ها بر این باورند که ارائه انگیزه برای گسترش اعتبار (کاهش نرخ بهره) و استفاده از ظرفیت کسری دولت برای افزایش تقاضا، باعث شروع بهبود اقتصادی خواهد شد.
reviewed: true