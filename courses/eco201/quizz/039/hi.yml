question: मुद्रावादियों और कीन्सवादियों दोनों के अनुसार मंदी का कारण क्या है?
answer: अपर्याप्त समग्र मांग
wrong_answers:
  - अधिक उत्पादन
  - उच्च ब्याज दरें
  - उच्च मुद्रास्फीति
explanation: |
  मौद्रिकवादियों और कीनेसियन दोनों के लिए, मंदी का कारण अपर्याप्त समग्र मांग है। उनका मानना ​​है कि ऋण विस्तार (ब्याज दरों को कम करना) के लिए प्रोत्साहन प्रदान करना और मांग को बढ़ावा देने के लिए राज्य की घाटे की क्षमता का उपयोग करना सुधार को गति देगा।
reviewed: true