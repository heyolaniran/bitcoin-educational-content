question: پیامدهای نهایی کاهش نرخ بهره به دلیل افزایش اعتبار طبق نظریه چرخه تجاری اتریشی چیست؟
answer: اقتصاد وارد رکود می‌شود؛ قیمت دارایی‌ها کاهش می‌یابد، دستمزدهای واقعی کاهش می‌یابد، قیمت‌های مصرف‌کننده کاهش می‌یابد و موجودی انبارها انباشته می‌شود.
wrong_answers:
  - اقتصاد وارد رونق می‌شود؛ قیمت دارایی‌ها افزایش می‌یابد، دستمزدهای واقعی افزایش می‌یابد، قیمت‌های مصرف‌کننده افزایش می‌یابد و موجودی کاهش می‌یابد.
  - اقتصاد وارد رکود می‌شود؛ قیمت دارایی‌ها ثابت می‌ماند، دستمزدهای واقعی ثابت می‌ماند، قیمت‌های مصرف‌کننده ثابت می‌ماند، و موجودی کالا ثابت می‌ماند.
  - اقتصاد وارد رکود تورمی می‌شود؛ قیمت دارایی‌ها کاهش می‌یابد، دستمزدهای واقعی افزایش می‌یابد، قیمت‌های مصرف‌کننده کاهش می‌یابد و موجودی انبار افزایش می‌یابد.
explanation: |
  بر اساس نظریه چرخه تجاری اتریشی، زمانی که به دلیل افزایش اعتبار، نرخ بهره کاهش می‌یابد، اقتصاد وارد رکود می‌شود؛ قیمت دارایی‌ها کاهش می‌یابد، دستمزدهای واقعی کاهش پیدا می‌کند، قیمت‌های مصرف‌کننده کاهش می‌یابد و موجودی انبارها افزایش می‌یابد. این به این دلیل است که کاهش نرخ بهره منجر به تخصیص نادرست سرمایه می‌شود که در نهایت به رکود اقتصادی منجر می‌شود.
reviewed: true