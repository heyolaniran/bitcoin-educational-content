  - اقتصاد وارد رکود می‌شود؛ قیمت دارایی‌ها ثابت می‌ماند، دستمزدهای واقعی ثابت می‌ماند، قیمت‌های مصرف‌کننده ثابت می‌ماند، و موجودی کالا ثابت می‌ماند.
  - اقتصاد وارد یک دوره کاهش تورم می‌شود؛ قیمت دارایی‌ها کاهش می‌یابد، دستمزدهای واقعی افزایش می‌یابد، قیمت‌های مصرف‌کننده کاهش می‌یابد و موجودی انبار افزایش می‌یابد.
explanation: |
  بر اساس نظریه چرخه تجاری اتریشی، زمانی که به دلیل افزایش اعتبار، نرخ بهره کاهش می‌یابد، اقتصاد وارد رکود می‌شود؛ قیمت دارایی‌ها کاهش می‌یابد، دستمزدهای واقعی کاهش می‌یابد، قیمت‌های مصرف‌کننده کاهش می‌یابد و موجودی انبار افزایش می‌یابد. این به این دلیل است که کاهش نرخ بهره منجر به تخصیص نادرست سرمایه می‌شود که در نهایت به رکود منجر می‌شود.
