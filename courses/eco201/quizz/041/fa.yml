question: نقش بخش بانکی در ایجاد رکود طبق نظریه اتریشی چرخه کسب و کار چیست؟
answer: بخش بانکی زمانی رکود را ایجاد می‌کند که تصمیم می‌گیرد ریسک خود را کاهش دهد و بنابراین جریان اعتبار را کاهش می‌دهد.
wrong_answers:
  - بخش بانکی زمانی رکود اقتصادی را ایجاد می‌کند که تصمیم می‌گیرد ریسک خود را افزایش دهد و بنابراین جریان اعتبار را افزایش می‌دهد.
  - بخش بانکی زمانی رکود را ایجاد می‌کند که تصمیم می‌گیرد ریسک خود را حفظ کند و بنابراین جریان اعتبار را حفظ می‌کند.
  - بنا بر نظریه اتریشی چرخه کسب‌وکار، بخش بانکی نقشی در ایجاد رکود ندارد.
explanation: |
  بر اساس نظریه چرخه تجاری اتریشی، بخش بانکی زمانی که تصمیم می‌گیرد ریسک خود را کاهش دهد و در نتیجه جریان اعتبار را کاهش دهد، رکود اقتصادی را آغاز می‌کند. این امر منجر به ورشکستگی‌های متعدد، سخت‌گیری در اعطای اعتبار، کاهش قدرت خرید موجود و فروپاشی‌های مالی می‌شود.
reviewed: true