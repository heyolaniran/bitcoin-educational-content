question: ऑस्ट्रियाई व्यापार चक्र सिद्धांत के अनुसार मंदी को बढ़ावा देने में बैंकिंग क्षेत्र की क्या भूमिका है?
answer: बैंकिंग क्षेत्र में मंदी तब आती है जब वह अपने जोखिम को कम करने का निर्णय लेता है और परिणामस्वरूप ऋण का प्रवाह कम हो जाता है।
wrong_answers:
  - बैंकिंग क्षेत्र में मंदी तब आती है जब वह अपना जोखिम बढ़ाने का निर्णय लेता है और इस प्रकार ऋण का प्रवाह बढ़ा देता है।
  - बैंकिंग क्षेत्र में मंदी तब आती है जब वह अपने जोखिम को बरकरार रखने का निर्णय लेता है और इस प्रकार ऋण का प्रवाह बनाए रखता है।
  - ऑस्ट्रियाई व्यापार चक्र सिद्धांत के अनुसार मंदी को शुरू करने में बैंकिंग क्षेत्र की कोई भूमिका नहीं होती है।
explanation: |
  ऑस्ट्रियाई व्यापार चक्र सिद्धांत के अनुसार, बैंकिंग क्षेत्र में मंदी तब आती है जब वह अपने जोखिम को कम करने का फैसला करता है और इसलिए ऋण प्रवाह कम हो जाता है। इससे कई दिवालियापन, ऋण में कमी, उपलब्ध क्रय शक्ति में कमी और वित्तीय संकट पैदा होते हैं।
reviewed: true