question: تفاوت اصلی بین تحلیل اتریشی و تحلیل پول‌گرایان و کینزی‌ها چیست؟
answer: تحلیل اتریشی توجه ویژه‌ای به مراحل مختلف تولید و ساختار قیمت‌های نسبی دارد، در حالی که پول‌گرایان و کینزی‌ها به متغیرهای تجمیعی مانند سطح اشتغال، تولید ناخالص داخلی یا شاخص قیمت مصرف‌کننده اکتفا می‌کنند.
wrong_answers:
  - تجزیه و تحلیل اتریشی در متغیرهای تجمیعی مانند سطح اشتغال، تولید ناخالص داخلی یا شاخص قیمت مصرف‌کننده متوقف می‌شود، در حالی که پول‌گرایان و کینزی‌ها به مراحل مختلف تولید و ساختار قیمت‌های نسبی توجه ویژه‌ای دارند.
  - تجزیه و تحلیل اتریشی و تحلیل پول‌گرایان و کینزی‌ها اساساً یکسان است.
  - تجزیه و تحلیل اتریشی بر رویدادهای خارجی و روحیه حیوانی تمرکز دارد، در حالی که پول‌گرایان و کینزی‌ها بر پویایی درونی سیستم بانکداری ذخیره کسری تمرکز می‌کنند.
explanation: |
  تفاوت اصلی بین تحلیل اتریشی و تحلیل پول‌گرایان و کینزی‌ها این است که اولی توجه خاصی به مراحل مختلف تولید و ساختار قیمت‌های نسبی دارد، در حالی که دومی به متغیرهای تجمعی مانند سطح اشتغال، تولید ناخالص داخلی یا شاخص قیمت مصرف‌کننده اکتفا می‌کند.
reviewed: true