question: استدلال اصلی لودویگ فون میزس در مقاله "محاسبه اقتصادی در یک جامعه سوسیالیستی" این است که در یک سیستم سوسیالیستی، به دلیل عدم وجود بازار آزاد و قیمت‌های تعیین‌شده توسط بازار، محاسبه اقتصادی کارآمد غیرممکن است. او معتقد است که بدون قیمت‌های بازار، برنامه‌ریزان مرکزی نمی‌توانند تخصیص منابع را بهینه کنند، زیرا نمی‌توانند ارزش نسبی کالاها و خدمات را به درستی تعیین کنند.
answer: سازمان اقتصادی عقلانی بدون قیمت‌ها برای عوامل واسطه تولید غیرممکن است.
wrong_answers:
  - سوسیالیسم از نظر اخلاقی برتر از سرمایه‌داری است.
  - سرمایه‌داری تنها نظام اقتصادی قابل اجرا است.
  - سوسیالیسم می‌تواند افرادی بدون غرایز سرمایه‌داری تولید کند.
explanation: |
  میس استدلال کرد که بدون بازاری برای تعیین قیمت‌ها برای عوامل واسطه تولید، عقلانی‌سازی استفاده از منابع در صنایع مختلف غیرممکن می‌شود. این بدان معناست که حتی اگر سازماندهی کامل در هر شرکت یا زیرمجموعه‌ای از اقتصاد وجود داشته باشد، کل اقتصاد نمی‌تواند به طور کارآمد به تغییرات در دسترسی به منابع، شرایط تولید و ترجیحات مصرف‌کننده تطبیق یابد.
reviewed: true