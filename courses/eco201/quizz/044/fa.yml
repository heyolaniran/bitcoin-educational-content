question: نقش کارآفرینان و سهامداران در یک اقتصاد سرمایه‌داری از نظر میزس چیست؟
answer: آن‌ها سرمایه را در صنایع مختلف تخصیص می‌دهند و بدین ترتیب قیمت‌هایی را تشکیل می‌دهند که به عنوان ورودی در محاسبات اقتصادی مدیران عمل می‌کنند.
wrong_answers:
  - آن‌ها مسئول ایجاد شغل‌های جدید هستند.
  - آن‌ها مسئول افزایش ثروت یک ملت هستند.
  - آن‌ها مسئول کنترل Supply پول در اقتصاد هستند.
explanation: |
  میزس بر اهمیت کارآفرینان و سهامداران تأکید کرد، که به عنوان صاحبان وسایل تولید، سرمایه را در صنایع مختلف تخصیص می‌دهند و بدین ترتیب قیمت‌هایی را تشکیل می‌دهند که به عنوان ورودی در محاسبات اقتصادی مدیران عمل می‌کنند.
reviewed: true