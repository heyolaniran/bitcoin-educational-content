question: دلیل اصلی اینکه چرا یک اقتصاد برنامه‌ریزی شده مرکزی به ناچار با تخصیص نادرست سرمایه مواجه خواهد شد چیست؟
answer: هیچ قیمت بازاری یا ورشکستگی وجود ندارد تا تخصیص‌های نادرست را آشکار و اصلاح کند.
wrong_answers:
  - برنامه‌ریزان مرکزی کارآمد نیستند.
  - برنامه‌ریزان مرکزی اطلاعات کافی ندارند.
  - برنامه‌ریزان مرکزی انگیزه‌ای برای تخصیص منابع به‌صورت کارآمد ندارند.
explanation: |
  در یک اقتصاد برنامه‌ریزی‌شده مرکزی، هیچ قیمت بازاری یا ورشکستگی وجود ندارد تا تخصیص‌های نادرست را آشکار و اصلاح کند. در نتیجه، خطاها انباشته می‌شوند تا زمانی که اسراف از طریق کاهش قابل توجه در شرایط زندگی آشکار شود.
reviewed: true