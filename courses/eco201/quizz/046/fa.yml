question: نظریه چرخه تجاری اتریشی چگونه به عدم امکان محاسبه اقتصادی در سوسیالیسم مرتبط است؟
answer: می‌توان آن را به عنوان یک مورد خاص از عدم امکان محاسبه اقتصادی تحت سوسیالیسم در نظر گرفت که به حوزه بازارهای پولی اعمال می‌شود.
wrong_answers:
  - این یک نقد بر عدم امکان محاسبه اقتصادی در سوسیالیسم است.
  - این یک راه‌حل برای غیرممکن بودن محاسبه اقتصادی در سوسیالیسم است.
  - این به عدم امکان محاسبه اقتصادی تحت سوسیالیسم بی‌ارتباط است.
explanation: |
  نظریه اتریشی چرخه تجاری، پویایی‌های سرمایه‌گذاری بیش از حد و تخصیص نادرست سرمایه را که ناشی از دستکاری نرخ بهره توسط بانک‌های مرکزی است، توضیح می‌دهد و بنابراین می‌توان آن را به عنوان یک مورد خاص از عدم امکان محاسبه اقتصادی تحت سوسیالیسم، که در حوزه بازارهای پول اعمال می‌شود، در نظر گرفت.
reviewed: true