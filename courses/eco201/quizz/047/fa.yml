question: چرا اقتصاددانان جریان اصلی و برنامه‌ریزان مرکزی اغلب از اقتصاددانان اتریشی خوششان نمی‌آید؟
answer: اقتصاددانان اتریشی بر عدم قطعیت آینده، اشتباه بودن پیش‌بینی‌های کمی اقتصادی و اثرات زیان‌بار مداخله اقتصادی تأکید می‌کنند.
wrong_answers:
  - اقتصاددانان اتریشی از سوسیالیسم حمایت می‌کنند.
  - اقتصاددانان اتریشی به قدرت بازار اعتقاد ندارند.
  - اقتصاددانان اتریشی از مدل‌های ریاضی استفاده نمی‌کنند.
explanation: |
  اقتصاددانان اتریشی بر عدم قطعیت آینده، اشتباه بودن پیش‌بینی‌های اقتصادی کمی، و اثرات زیان‌بار مداخله اقتصادی تأکید می‌کنند، که این موارد برخلاف باورها و روش‌های اقتصاددانان جریان اصلی و برنامه‌ریزان مرکزی است.
reviewed: true