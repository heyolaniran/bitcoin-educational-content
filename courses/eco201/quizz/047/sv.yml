question: Varför ogillar mainstreamekonomer och centralplanerare ofta österrikiska ekonomer?
answer: Österrikiska ekonomer lyfter fram osäkerheten i framtiden, det felaktiga i kvantitativa ekonomiska förutsägelser och de skadliga effekterna av ekonomiska ingripanden.
wrong_answers:
  - Österrikiska ekonomer förespråkar socialism.
  - Österrikiska ekonomer tror inte på marknadens makt.
  - Österrikiska ekonomer använder sig inte av matematiska modeller.
explanation: |
  Österrikiska ekonomer lyfter fram framtidens osäkerhet, felaktigheten
  av kvantitativa ekonomiska förutsägelser och de skadliga effekterna av ekonomisk intervention,
  vilket går emot de vanliga ekonomernas och centralplanerarnas tro och praxis
  planerare.
reviewed: true