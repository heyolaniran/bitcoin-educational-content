question: روش اصولی-استنتاجی که توسط لودویگ فون میزس در مطالعه علوم اجتماعی پیشنهاد شده چیست؟
answer: این رویکرد بر اساس گزاره‌های بنیادی به نام اصول موضوعه استوار است، مشابه آن‌هایی که در ریاضیات استفاده می‌شوند.
wrong_answers:
  - این رویکرد بر اساس داده‌های تجربی و مشاهدات است.
  - این رویکرد بر اساس آزمایش‌ها و فرضیه‌های موقت است.
  - این رویکرد بر اساس رویکرد پوزیتیویستی است که اغلب در علوم اجتماعی استفاده می‌شود.
explanation: |
  آزمایش‌های اقتصادی را نمی‌توان در یک آزمایشگاه بازتولید کرد و مهم است که توجه داشته باشیم مشاهده همبستگی بین دو متغیر، رابطه علّی بین آن‌ها را اثبات نمی‌کند. این دلیل است که لودویگ فون میزس روش قیاسی-اصل موضوعی را پیشنهاد کرد.
reviewed: true