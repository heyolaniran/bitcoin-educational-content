question: सामाजिक विज्ञान के अध्ययन में लुडविग वॉन मिज़ेस द्वारा प्रस्तावित स्वयंसिद्ध-निगमनात्मक विधि क्या है?
answer: यह दृष्टिकोण मूल प्रस्तावों पर आधारित है, जिन्हें स्वयंसिद्ध कहा जाता है, जो गणित में प्रयुक्त स्वयंसिद्धों के समान हैं।
wrong_answers:
  - यह दृष्टिकोण अनुभवजन्य डेटा और अवलोकनों पर आधारित है।
  - यह दृष्टिकोण अस्थायी प्रयोगों और परिकल्पनाओं पर आधारित है।
  - यह दृष्टिकोण सामाजिक विज्ञानों में अक्सर प्रयुक्त प्रत्यक्षवादी दृष्टिकोण पर आधारित है।
explanation: |
  आर्थिक प्रयोगों को प्रयोगशाला में दोहराया नहीं जा सकता है, और यह ध्यान रखना महत्वपूर्ण है कि दो चरों के बीच सहसंबंध का अवलोकन उनके बीच एक कारण संबंध साबित नहीं करता है। यही कारण है कि लुडविग वॉन मिज़ ने स्वयंसिद्ध-निगमनात्मक विधि का प्रस्ताव रखा।
reviewed: true