question: نقش قیمت‌ها در مکتب اقتصادی اتریشی چیست؟
answer: قیمت‌ها نقش حیاتی در سازماندهی منطقی افراد با اطلاعات جزئی ایفا می‌کنند.
wrong_answers:
  - قیمت‌ها در مکتب اقتصادی اتریشی بی‌اهمیت هستند.
  - قیمت‌ها توسط دولت در مکتب اقتصادی اتریشی تعیین می‌شوند.
  - قیمت‌ها در مکتب اقتصادی اتریشی ثابت هستند و تغییر نمی‌کنند.
explanation: |
  در مکتب اقتصادی اتریشی، قیمت‌ها نقش حیاتی در سازماندهی منطقی افراد با اطلاعات جزئی ایفا می‌کنند. آن‌ها به تعادل Supply و تقاضای سرمایه در بازار کمک می‌کنند و بدین ترتیب اقتصاد را تقویت می‌کنند.
reviewed: true