question: دیدگاه اقتصاددانان اتریشی در مورد تعیین نرخ بهره چیست؟
answer: اقتصاددانان اتریشی تأکید می‌کنند که تعیین نرخ بهره به‌صورت دلخواه می‌تواند به بحران‌های اقتصادی منجر شود.
wrong_answers:
  - اقتصاددانان اتریشی معتقدند که دولت باید نرخ‌های بهره را تعیین کند.
  - اقتصاددانان اتریشی معتقدند که نرخ‌های بهره باید ثابت و بدون تغییر باشند.
  - اقتصاددانان اتریشی معتقدند که نرخ‌های بهره باید توسط بانک مرکزی تعیین شود.
explanation: |
  اقتصاددانان اتریشی تأکید می‌کنند که تعیین خودسرانه نرخ بهره می‌تواند به بحران‌های اقتصادی منجر شود و محاسبه را در یک رژیم سوسیالیستی غیرممکن سازد. آنها استدلال می‌کنند که روابط ارزشیابی ذهنی هستند، بنابراین نرخ‌های بهره می‌توانند بسته به افراد و شرایط متفاوت باشند.
reviewed: true