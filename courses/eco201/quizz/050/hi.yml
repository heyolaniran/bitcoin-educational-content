question: ब्याज दरें निर्धारित करने पर ऑस्ट्रियाई अर्थशास्त्रियों का क्या विचार है?
answer: ऑस्ट्रियाई अर्थशास्त्री इस बात पर जोर देते हैं कि मनमाने ढंग से ब्याज दर निर्धारित करने से आर्थिक संकट पैदा हो सकता है।
wrong_answers:
  - ऑस्ट्रियाई अर्थशास्त्रियों का मानना ​​है कि सरकार को ब्याज दरें निर्धारित करनी चाहिए।
  - ऑस्ट्रियाई अर्थशास्त्रियों का मानना ​​है कि ब्याज दरें स्थिर और अपरिवर्तनीय होनी चाहिए।
  - ऑस्ट्रियाई अर्थशास्त्रियों का मानना ​​है कि ब्याज दरें केंद्रीय बैंक द्वारा निर्धारित की जानी चाहिए।
explanation: |
  ऑस्ट्रियाई अर्थशास्त्री इस बात पर ज़ोर देते हैं कि मनमाने ढंग से ब्याज दर निर्धारित करने से आर्थिक संकट पैदा हो सकता है और समाजवादी शासन में गणना असंभव हो सकती है। उनका तर्क है कि मूल्यांकन संबंध व्यक्तिपरक होते हैं, इसलिए ब्याज दरें व्यक्तियों और परिस्थितियों के आधार पर अलग-अलग हो सकती हैं।
reviewed: true