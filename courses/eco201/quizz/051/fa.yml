question: یکی از اصول اساسی در اقتصاد اتریشی چیست؟
answer: یکی از اصول اساسی، ترجیحات زمانی مثبت است که بر اساس انتخاب‌های فردی کالاها یا خدمات امروز به جای فردا استوار است.
wrong_answers:
  - یکی از اصول بنیادی، تعیین دلخواه نرخ‌های بهره است.
  - یکی از اصول بنیادی، اتکا به داده‌های تجربی است.
  - یکی از اصول اساسی استفاده از آزمایش‌های موقت برای تأیید یا
explanation: |
  در اقتصاد اتریشی، یکی از اصول بنیادی، ترجیحات زمانی مثبت است که بر اساس انتخاب‌های فردی کالاها یا خدمات امروز به جای فردا است، به دلیل عدم قطعیت درباره آینده.
