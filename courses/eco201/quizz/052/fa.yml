question: موضع طرفداران نظریه پولی مدرن (MMT) در رابطه با چاپ پول چیست؟
answer: طرفداران MMT از چاپ پول برای دستیابی به اهداف سیاسی حمایت می‌کنند.
wrong_answers:
  - طرفداران MMT تحت هیچ شرایطی با چاپ پول مخالف نیستند.
  - طرفداران نظریه پولی مدرن (MMT) بر این باورند که چاپ پول باید توسط بانک مرکزی کنترل شود.
  - طرفداران نظریه پولی مدرن (MMT) بر این باورند که چاپ پول باید به دلیل خطر تورم اجتناب شود.
explanation: |
  نظریه پولی مدرن (MMT) از چاپ پول برای دستیابی به اهداف سیاسی حمایت می‌کند و از عدم وجود تورم بین سال‌های 2008 تا 2019 به عنوان یک استدلال استفاده می‌کند.
reviewed: true