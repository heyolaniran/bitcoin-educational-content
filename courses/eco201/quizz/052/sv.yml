question: Hur ställer sig förespråkare för modern monetär teori (MMT) till sedelpressar?
answer: MMT-förespråkare stöder penningtryckning för att uppnå politiska mål.
wrong_answers:
  - MMT-förespråkare är emot penningtryckning under alla omständigheter.
  - MMT-förespråkare anser att penningtryckningen bör kontrolleras av centralbanken.
  - MMT-förespråkare anser att penningtryckning bör undvikas på grund av risken för inflation.
explanation: |
  Förespråkare för modern monetär teori (MMT) stöder pengatryckning
  för att uppnå politiska mål och använder avsaknaden av inflation mellan 2008 och 2019
  som ett argument.
reviewed: true