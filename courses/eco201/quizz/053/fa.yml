question: چری پیکینگ در زمینه اقتصاد به چه معناست؟
answer: انتخاب گزینشی شامل انتخاب داده‌ها به صورت انتخابی برای ایجاد روابط بین متغیرها است.
wrong_answers:
  - چری‌پیکینگ شامل نادیده گرفتن تمام داده‌ها و تکیه صرف بر فرضیه‌ها است.
  - چری پیکینگ شامل استفاده از تمام داده‌های موجود بدون هیچ‌گونه انتخاب است.
  - چیدن گیلاس شامل استفاده از داده‌هایی است که فقط از سیاست‌های دولت حمایت می‌کنند.
explanation: |
  در اقتصاد، انتخاب گزینشی شامل انتخاب داده‌ها به صورت انتخابی برای ایجاد روابط بین متغیرها است. این روش به عنوان یک روش غیرعلمی و غیر دقیق در نظر گرفته می‌شود.
reviewed: true