question: تفاوت اصلی بین اقتصاددانان اتریشی و اقتصاددانان کینزی یا پول‌گرایان در روش‌های تحلیل آن‌ها چیست؟
answer: در حالی که اتریشی‌ها از اصول بنیادی استدلال می‌کنند، اقتصاددانان کینزی یا پول‌گرایان تمایل دارند به داده‌های تجربی تکیه کنند.
wrong_answers:
  - اقتصاددانان اتریشی به داده‌های تجربی تکیه می‌کنند، در حالی که اقتصاددانان کینزی یا پول‌گرایان از اصول بنیادی استدلال می‌کنند.
  - اقتصاددانان اتریشی و اقتصاددانان کینزی یا پول‌گرایان از روش‌های تحلیل یکسانی استفاده می‌کنند.
  - اقتصاددانان اتریشی به سیاست‌های دولتی تکیه می‌کنند، در حالی که اقتصاددانان کینزی یا پول‌گرا به نیروهای بازار متکی هستند.
explanation: |
  تفاوت اصلی بین اقتصاددانان اتریشی و اقتصاددانان کینزی یا پول‌گرایان از نظر روش‌های تحلیل این است که در حالی که اتریشی‌ها از اصول بنیادی استدلال می‌کنند که از آن‌ها می‌توان استنتاجات منطقی انجام داد، اقتصاددانان کینزی یا پول‌گرا تمایل دارند به داده‌های تجربی برای تعیین قوانین کلی اقتصادی تکیه کنند.
reviewed: true