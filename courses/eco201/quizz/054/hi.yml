question: विश्लेषण के तरीकों के संदर्भ में ऑस्ट्रियाई अर्थशास्त्रियों और कीन्सियन या मौद्रिकवादी अर्थशास्त्रियों के बीच मुख्य अंतर क्या है?
answer: जबकि ऑस्ट्रियाई लोग मौलिक स्वयंसिद्धों के आधार पर तर्क करते हैं, कीन्सवादी या मौद्रिकवादी अर्थशास्त्री अनुभवजन्य आंकड़ों पर निर्भर रहते हैं।
wrong_answers:
  - ऑस्ट्रियाई अर्थशास्त्री अनुभवजन्य आंकड़ों पर भरोसा करते हैं, जबकि कीनेसियन या मौद्रिकवादी अर्थशास्त्री मौलिक सिद्धांतों पर आधारित तर्क करते हैं।
  - ऑस्ट्रियाई अर्थशास्त्री और कीन्सियन या मुद्रावादी अर्थशास्त्री विश्लेषण की समान पद्धति का उपयोग करते हैं।
  - ऑस्ट्रियाई अर्थशास्त्री सरकारी नीतियों पर भरोसा करते हैं, जबकि कीनेसियन या मौद्रिकवादी अर्थशास्त्री बाजार की ताकतों पर भरोसा करते हैं।
explanation: |
  विश्लेषण के तरीकों के संदर्भ में ऑस्ट्रियाई अर्थशास्त्रियों और कीनेसियन या मौद्रिक अर्थशास्त्रियों के बीच मुख्य अंतर यह है कि जहां ऑस्ट्रियाई लोग मौलिक स्वयंसिद्धों से तर्क करते हैं जिनसे तार्किक निष्कर्ष निकाले जा सकते हैं, वहीं कीनेसियन या मौद्रिक अर्थशास्त्री सामान्य आर्थिक कानूनों को स्थापित करने के लिए अनुभवजन्य आंकड़ों पर भरोसा करते हैं।
reviewed: true