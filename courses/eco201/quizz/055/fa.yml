question: نقش اصول بدیهی در استدلال اقتصادی اتریشی چیست؟
answer: اصل‌ها Elements بنیادی هستند که از آن‌ها می‌توان استنتاجات منطقی انجام داد.
wrong_answers:
  - اصول در استدلال اقتصادی اتریشی بی‌اهمیت هستند.
  - اصل‌ها برای ایجاد روابط بین متغیرها بر اساس داده‌های تجربی استفاده می‌شوند.
  - اصل‌ها برای تأیید یا رد فرضیه‌ها از طریق آزمایش‌های موقت استفاده می‌شوند.
explanation: |
  در استدلال اقتصادی اتریشی، اصول بدیهی نقش حیاتی ایفا می‌کنند. آن‌ها Elements بنیادی هستند که از آن‌ها می‌توان استنتاجات منطقی انجام داد.
reviewed: true