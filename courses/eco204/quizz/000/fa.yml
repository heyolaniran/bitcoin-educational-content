question: رابطه ذاتی بین گسترش پولی و تورم طبق گفته میلتون فریدمن چیست؟
answer: تورم همیشه و همه جا یک پدیده پولی است.
wrong_answers:
  - تورم همیشه و همه جا یک پدیده مالی است.
  - تورم همیشه و همه جا یک پدیده سیاسی است.
  - تورم همیشه و همه جا یک پدیده اجتماعی است.
explanation: |
  میلتون فریدمن، اقتصاددان مشهور، به‌طور معروف اظهار داشت که تورم همیشه و همه‌جا یک پدیده پولی است. این بیان بر رابطه ذاتی بین گسترش پولی و تورم تأکید دارد.
reviewed: false