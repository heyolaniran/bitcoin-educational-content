question: मिल्टन फ्रीडमैन के अनुसार मौद्रिक विस्तार और मुद्रास्फीति के बीच अंतर्निहित संबंध क्या है?
answer: मुद्रास्फीति सदैव और सर्वत्र एक मौद्रिक घटना है।
wrong_answers:
  - मुद्रास्फीति सदैव और हर जगह एक राजकोषीय घटना है।
  - मुद्रास्फीति सदैव और हर जगह एक राजनीतिक घटना है।
  - मुद्रास्फीति सदैव और सर्वत्र एक सामाजिक घटना है।
explanation: |
  प्रसिद्ध अर्थशास्त्री मिल्टन फ्रीडमैन ने कहा था कि मुद्रास्फीति हमेशा और हर जगह एक मौद्रिक घटना है। यह कथन मौद्रिक विस्तार और मुद्रास्फीति के बीच अंतर्निहित संबंध को उजागर करता है।
reviewed: false