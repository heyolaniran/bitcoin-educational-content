question: دو روش اصلی که به‌طور تاریخی برای افزایش پول Supply استفاده می‌شدند چه بودند؟
answer: چاپ پول و کاهش محتوای فلزی
wrong_answers:
  - چاپ پول و افزایش محتوای فلزی
  - کاهش پولی و افزایش محتوای فلزی
  - کاهش پولی و کاهش محتوای فلزی
explanation: |
  به‌طور تاریخی، دو روش اصلی برای افزایش پول وجود داشته است
  
  Supply؛ چاپ پول و کاهش محتوای فلزی.
