question: تعریف تورم از نظر رابرت چیست؟
answer: تورم افزایش بیش از حد ابزارهای پرداخت است که باعث افزایش قیمت‌ها و کاهش ارزش پول می‌شود.
wrong_answers:
  - تورم کاهش ابزارهای پرداخت است که باعث افزایش قیمت‌ها و کاهش ارزش ارز می‌شود.
  - تورم افزایش بیش از حد ابزارهای پرداخت است که باعث کاهش قیمت‌ها و کاهش ارزش پول می‌شود.
  - تورم افزایش بیش از حد ابزارهای پرداخت است که باعث افزایش قیمت‌ها و افزایش ارزش ارز می‌شود.
explanation: |
  به گفته رابرت، تورم به عنوان افزایش بیش از حد ابزارهای پرداخت (اسکناس‌ها، سرمایه) تعریف می‌شود که باعث افزایش قیمت‌ها و کاهش ارزش پول می‌گردد.
