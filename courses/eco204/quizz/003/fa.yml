question: استراتژی ایالات متحده در سال‌های ۱۹۳۳-۱۹۳۴ برای کاهش ارزش دلار چه بود؟
answer: دولت طلای شهروندان را مصادره کرد، سپس با تغییر قوانین بازی، ارزش طلا را به نفع خزانه و به ضرر کسانی که ابتدا طلای خود را با اسکناس مبادله کرده بودند، تجدید نظر کرد.
wrong_answers:
  - دولت Supply طلا را افزایش داد، سپس با کاهش ارزش طلا به نفع خزانه و به ضرر کسانی که در ابتدا طلای خود را با اسکناس مبادله کرده بودند، قوانین بازی را تغییر داد.
  - دولت طلای شهروندان را مصادره کرد، سپس با کاهش ارزش طلا قوانین بازی را تغییر داد تا به خزانه‌داری سود برساند و به ضرر کسانی باشد که در ابتدا طلای خود را با اسکناس مبادله کرده بودند.
  - دولت Supply طلا را افزایش داد، سپس با تجدید ارزش طلا به نفع خزانه و به ضرر کسانی که در ابتدا طلای خود را با اسکناس مبادله کرده بودند، قوانین بازی را تغییر داد.
explanation: |
  در سال ۱۹۳۳، دولت ایالات متحده طلای شهروندان را مصادره کرد. سپس در سال ۱۹۳۴، قیمت طلا را به ۳۵ دلار در هر اونس، به جای ۲۰.۶۷ دلار، بازارزیابی کرد. اساساً، دولت ارزش دلارهایی که مردم داشتند را کاهش داد. با خرید طلا از مردم به قیمت ۲۰.۶۷ دلار در هر اونس در سال ۱۹۳۳ و سپس بازارزیابی قیمت طلا در سال ۱۹۳۴، دولت سود قابل توجهی به دست آورد در حالی که پس‌انداز شهروندانش را کاهش داد.
reviewed: false