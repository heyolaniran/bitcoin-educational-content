question: تعریف تورم طبق لاروس چیست؟
answer: تورم پدیده‌ای است که با افزایش عمومی و مداوم سطح قیمت‌ها مشخص می‌شود.
wrong_answers:
  - تورم پدیده‌ای است که با کاهش عمومی و مداوم سطح قیمت‌ها مشخص می‌شود.
  - تورم پدیده‌ای است که با افزایش خاص و مداوم سطح قیمت‌ها مشخص می‌شود.
  - تورم پدیده‌ای است که با افزایش کلی و متناوب سطح قیمت‌ها مشخص می‌شود.
explanation: |
  طبق تعریف لاروس، تورم به عنوان پدیده‌ای تعریف می‌شود که با افزایش عمومی و مداوم سطح قیمت‌ها مشخص می‌شود.
reviewed: false