question: استراتژی اسپانیا برای کاهش ارزش پول خود بدون تأثیر بر موقعیتش در تجارت بین‌المللی چه بود؟
answer: اسپانیا ارزش ماراویدی، یک ارز محلی، را به صورت انتخابی کاهش داد، در حالی که ارزش دلار اسپانیا را در سطح جهانی حفظ کرد.
wrong_answers:
  - اسپانیا به طور انتخابی ارزش دلار اسپانیایی، یک ارز محلی، را کاهش داد، در حالی که ارزش ماراودی را در سطح جهانی حفظ کرد.
  - اسپانیا به طور انتخابی ارزش ماراویدی، یک ارز محلی، را افزایش داد، در حالی که ارزش دلار اسپانیا را در سطح جهانی حفظ کرد.
  - اسپانیا به‌طور انتخابی ارزش دلار اسپانیایی، یک ارز محلی، را افزایش داد، در حالی که ارزش مراودی را در سطح جهانی حفظ کرد.
explanation: |
  اسپانیا خود را در یک وضعیت حساس یافت. کاهش ارزش دلار اسپانیا می‌توانست موقعیت آن را در تجارت بین‌المللی به خطر بیندازد. برای غلبه بر این معضل، اسپانیا به ماراویدی، یک ارز مسی که عمدتاً در میان جمعیت محلی استفاده می‌شد، روی آورد. این ارز هدف کاهش ارزش قرار گرفت.
