question: علت اصلی انقلاب قیمتی بین قرون ۱۵ و ۱۷ در اروپا چه بود؟
answer: انقلاب قیمت‌ها عمدتاً توسط ورود گسترده فلزات گرانبها، به ویژه طلا و نقره، از قاره آمریکا تحریک شد.
wrong_answers:
  - انقلاب قیمت‌ها عمدتاً توسط خروج گسترده فلزات گرانبها، به ویژه طلا و نقره، به قاره آمریکا تحریک شد.
  - انقلاب قیمت‌ها عمدتاً توسط ورود گسترده فلزات گرانبها، به ویژه طلا و نقره، از آسیا تحریک شد.
  - انقلاب قیمت‌ها عمدتاً توسط خروج گسترده فلزات گرانبها، به ویژه طلا و نقره، به آسیا تحریک شد.
explanation: |
  بین قرن‌های ۱۵ و ۱۷، اروپا شاهد یک پدیده اقتصادی قابل توجه بود که اغلب به عنوان انقلاب قیمت‌ها شناخته می‌شود. این دوره تورم عمدتاً به دلیل ورود گسترده فلزات گرانبها، به ویژه طلا و نقره، از قاره آمریکا آغاز شد.
