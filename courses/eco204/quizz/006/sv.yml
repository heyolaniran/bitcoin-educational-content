question: Vad var den främsta orsaken till prisrevolutionen mellan 1400- och 1600-talen i Europa?
answer: Prisrevolutionen utlöstes till stor del av ett massivt inflöde av ädelmetaller, särskilt guld och silver, från Nord- och Sydamerika.
wrong_answers:
  - Prisrevolutionen utlöstes till stor del av ett massivt utflöde av ädelmetaller, särskilt guld och silver, till Nord- och Sydamerika.
  - Prisrevolutionen utlöstes till stor del av ett massivt inflöde av ädelmetaller, särskilt guld och silver, från Asien.
  - Prisrevolutionen utlöstes till stor del av ett massivt utflöde av ädelmetaller, i synnerhet guld och silver, till Asien.
explanation: |
  Mellan 1400- och 1600-talet upplevde Europa ett anmärkningsvärt ekonomiskt
  fenomen som ofta kallas prisrevolutionen. Denna period av inflation
  utlöstes till stor del av ett massivt inflöde av ädelmetaller, särskilt guld
  och silver, från Nord- och Sydamerika.
reviewed: false