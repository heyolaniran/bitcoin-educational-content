question: تفاوت اساسی بین افزایش قیمت و تورم چیست؟
answer: افزایش قیمت می‌تواند به‌صورت خاص در یک بخش رخ دهد و توسط عوامل مختلفی ایجاد شود، در حالی که تورم به‌عنوان افزایش عمومی قیمت‌ها در طیف وسیعی از کالاها و خدمات تعریف می‌شود.
wrong_answers:
  - افزایش قیمت یک افزایش کلی در قیمت‌ها در طیف وسیعی از کالاها و خدمات است، در حالی که تورم به یک بخش خاص مربوط می‌شود و توسط عوامل مختلفی ایجاد می‌شود.
  - افزایش قیمت و تورم یکسان هستند، هر دو به افزایش عمومی قیمت‌ها در طیف وسیعی از کالاها و خدمات اشاره دارند.
  - افزایش قیمت به کاهش قیمت‌ها اشاره دارد، در حالی که تورم به افزایش قیمت‌ها اشاره دارد.
explanation: |
  فصل توضیح می‌دهد که افزایش قیمت می‌تواند به یک بخش خاص محدود شود و توسط عوامل مختلفی مانند کاهش تولید اوپک برای نفت یا شرایط نامساعد جوی برای گندم ایجاد شود. از سوی دیگر، تورم به عنوان افزایش عمومی قیمت‌ها در طیف گسترده‌ای از کالاها و خدمات تعریف می‌شود، نه فقط در یک بخش خاص.
reviewed: false