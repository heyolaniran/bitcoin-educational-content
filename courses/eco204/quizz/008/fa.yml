question: تأثیر افزایش پول Supply بر تورم و کاهش قیمت‌ها در یک سیستم پولی ثابت Supply چیست؟
answer: افزایش پول Supply اثرات کاهش قیمت احتمالی ناشی از افزایش تولید را خنثی می‌کند.
wrong_answers:
  - افزایش پول Supply منجر به کاهش تورم می‌شود.
  - افزایش پول Supply هیچ تأثیری بر تورم یا کاهش قیمت‌ها ندارد.
  - افزایش پول Supply منجر به کاهش تولید می‌شود.
explanation: |
  این فصل توضیح می‌دهد که در یک سیستم پولی ثابت Supply، افزایش تولید به‌طور نظری باید به کاهش قیمت‌ها، یعنی کاهش قیمت‌ها، منجر شود، زیرا کالاها و خدمات بیشتری در دسترس خواهد بود. با این حال، در سیستم پولی فیات فعلی، افزایش پول Supply اثر کاهش قیمت بالقوه ناشی از افزایش تولید را خنثی می‌کند.
reviewed: false