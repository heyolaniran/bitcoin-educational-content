question: رابطه بین تورم و کاهش تورم در یک اقتصاد چیست؟
answer: تورم و کاهش قیمت‌ها مانند ظروف مرتبط در یک اقتصاد هستند. افزایش تولید می‌تواند به کاهش قیمت‌ها منجر شود، اما اگر پول Supply به طور همزمان افزایش یابد، اثر کاهش قیمت‌ها خنثی شده و منجر به تورم می‌شود.
wrong_answers:
  - تورم و کاهش قیمت‌ها در یک اقتصاد مستقل از یکدیگر هستند.
  - تورم همیشه به کاهش تورم در یک اقتصاد منجر می‌شود.
  - کاهش قیمت همیشه به تورم در یک اقتصاد منجر می‌شود.
explanation: |
  فصل توضیح می‌دهد که تورم و کاهش قیمت مانند ظروف مرتبط در یک اقتصاد هستند. افزایش تولید می‌تواند به کاهش قیمت منجر شود، اما اگر پول Supply به‌طور همزمان افزایش یابد، اثر کاهش قیمت خنثی می‌شود و نتیجه آن تورم خواهد بود.
reviewed: false