question: تأثیر شاخص قیمت مصرف‌کننده (CPI) بر اندازه‌گیری تورم چیست؟
answer: CPI می‌تواند تورم واقعی را کمتر از حد نشان دهد زیرا به طور جامع تغییرات قیمت املاک و مستغلات را در نظر نمی‌گیرد و می‌تواند افزایش واقعی قیمت‌ها را جبران یا پنهان کند.
wrong_answers:
  - CPI همیشه به طور دقیق تورم را اندازه‌گیری می‌کند.
  - CPI تورم واقعی را بیش از حد برآورد می‌کند.
  - CPI هیچ تأثیری بر اندازه‌گیری تورم ندارد.
explanation: |
  این فصل توضیح می‌دهد که شاخص قیمت مصرف‌کننده (CPI)، که به عنوان شاخص اصلی تورم استفاده می‌شود، دارای محدودیت‌هایی است. به عنوان مثال، این شاخص به طور جامع تغییرات قیمت املاک و مستغلات را در نظر نمی‌گیرد. همچنین، محاسبه CPI شامل برخی روش‌شناسی‌هایی است که می‌تواند افزایش واقعی قیمت‌ها را جبران یا پنهان کند.
