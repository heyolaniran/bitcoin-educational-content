question: دیدگاه نظریه پولی مدرن (MMT) درباره خلق پول و تورم چیست؟
answer: بر اساس نظریه MMT، پول عمدتاً از دولت نشأت می‌گیرد که می‌تواند مقادیر زیادی را برای تأمین نیازهای خود چاپ کند بدون اینکه باعث تورم شود، به شرطی که بخش‌هایی که این وجوه به آنها اختصاص می‌یابد اشباع نشده باشند.
wrong_answers:
  - طبق نظریه MMT، پول عمدتاً از بخش خصوصی نشأت می‌گیرد و چاپ پول بیشتر همیشه منجر به تورم می‌شود.
  - بر اساس نظریه MMT، پول عمدتاً از دولت نشأت می‌گیرد، اما چاپ پول بیشتر همیشه منجر به تورم می‌شود.
  - بر اساس نظریه MMT، پول عمدتاً از بخش خصوصی نشأت می‌گیرد و چاپ پول بیشتر هرگز به تورم منجر نمی‌شود.
explanation: |
  این فصل توضیح می‌دهد که نظریه پولی مدرن (MMT) دیدگاه متمایزی در مورد ایجاد پول و تورم ارائه می‌دهد. بر اساس MMT، پول عمدتاً از دولت نشأت می‌گیرد که می‌تواند مقادیر زیادی را برای تأمین نیازهای خود چاپ کند بدون اینکه تورم ایجاد کند، به شرطی که بخش‌های هدف این وجوه اشباع نشده باشند.
