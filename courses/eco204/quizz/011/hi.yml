question: धन सृजन और मुद्रास्फीति पर आधुनिक मौद्रिक सिद्धांत (एमएमटी) का परिप्रेक्ष्य क्या है?
answer: एमएमटी के अनुसार, धन मुख्य रूप से सरकार से आता है, जो मुद्रास्फीति उत्पन्न किए बिना अपनी आवश्यकताओं को पूरा करने के लिए पर्याप्त मात्रा में मुद्रा छाप सकती है, जब तक कि इन निधियों द्वारा लक्षित क्षेत्र संतृप्त न हो जाएं।
wrong_answers:
  - एमएमटी के अनुसार, धन मुख्य रूप से निजी क्षेत्र से आता है तथा अधिक धन छापने से सदैव मुद्रास्फीति बढ़ती है।
  - एमएमटी के अनुसार, धन मुख्य रूप से सरकार से आता है, लेकिन अधिक धन छापने से हमेशा मुद्रास्फीति बढ़ती है।
  - एमएमटी के अनुसार, धन मुख्य रूप से निजी क्षेत्र से आता है तथा अधिक धन छापने से कभी भी मुद्रास्फीति नहीं होती।
explanation: |
  अध्याय में बताया गया है कि आधुनिक मौद्रिक सिद्धांत (MMT) मुद्रा सृजन और मुद्रास्फीति पर एक अलग दृष्टिकोण प्रस्तुत करता है। MMT के अनुसार, धन मुख्य रूप से सरकार से आता है, जो मुद्रास्फीति पैदा किए बिना अपनी आवश्यकताओं को पूरा करने के लिए पर्याप्त मात्रा में मुद्रा छाप सकती है, जब तक कि इन निधियों द्वारा लक्षित क्षेत्र संतृप्त न हों।
