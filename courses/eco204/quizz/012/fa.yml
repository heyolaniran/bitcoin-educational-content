question: تأثیر ترازنامه‌های بانک و بانک مرکزی بر تورم چیست؟
answer: اگر پول تازه ایجاد شده در ترازنامه‌های بانک‌های خصوصی باقی بماند و به بازیگران اقتصادی وام داده نشود، به طور مستقیم بر اقتصاد واقعی تأثیر نخواهد گذاشت و بنابراین منجر به تورم نخواهد شد.
wrong_answers:
  - اگر پول تازه ایجاد شده در ترازنامه‌های بانک‌های خصوصی باقی بماند، همیشه منجر به تورم خواهد شد.
  - ترازنامه‌های بانک و بانک مرکزی هیچ تأثیری بر تورم ندارند.
  - اگر پول تازه ایجاد شده به بازیگران اقتصادی قرض داده شود، منجر به تورم نخواهد شد.
explanation: |
  این فصل توضیح می‌دهد که رابطه بین چاپ پول و تورم توسط نحوه ورود پول تازه ایجاد شده به اقتصاد تنظیم می‌شود. اگر این پول در ترازنامه‌های بانک‌های خصوصی باقی بماند و به بازیگران اقتصادی وام داده نشود، به طور مستقیم بر اقتصاد واقعی تأثیر نخواهد گذاشت و بنابراین منجر به تورم نخواهد شد.
