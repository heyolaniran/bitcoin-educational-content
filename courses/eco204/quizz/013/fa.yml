question: نقش انتظارات و رفتار عوامل اقتصادی در رابطه بین چاپ پول و تورم چیست؟
answer: ابهامات اقتصادی و انتظارات عوامل اقتصادی می‌توانند اثرات تورمی چاپ پول را تسریع یا به تأخیر بیندازند.
wrong_answers:
  - انتظارات و رفتار عوامل اقتصادی هیچ تأثیری بر رابطه بین چاپ پول و تورم ندارند.
  - انتظارات و رفتار عوامل اقتصادی همیشه اثرات تورمی چاپ پول را تسریع می‌کنند.
  - انتظارات و رفتار عوامل اقتصادی همیشه اثرات تورمی چاپ پول را به تأخیر می‌اندازند.
explanation: |
  این فصل توضیح می‌دهد که مثال جمهوری وایمار نقش انتظارات و رفتار عوامل اقتصادی را در رابطه بین چاپ پول و تورم نشان می‌دهد. عدم قطعیت‌های اقتصادی و انتظارات عوامل اقتصادی می‌توانند اثرات تورمی چاپ پول را تسریع یا به تأخیر بیندازند.
