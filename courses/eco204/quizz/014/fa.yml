question: تفاوت بین تورم ناشی از تقاضا و تورم ناشی از هزینه چیست؟
answer: تورم ناشی از تقاضا وضعیتی است که در آن تقاضا در اقتصاد از تولید موجود فراتر می‌رود، در حالی که تورم ناشی از فشار هزینه به افزایش هزینه‌های تولید نسبت داده می‌شود.
wrong_answers:
  - تورم ناشی از تقاضا به افزایش هزینه‌های تولید نسبت داده می‌شود، در حالی که تورم ناشی از فشار هزینه وضعیتی است که در آن تقاضا در اقتصاد از تولید موجود فراتر می‌رود.
  - تورم ناشی از تقاضا و تورم ناشی از هزینه یکسان هستند، هر دو به وضعیتی اشاره دارند که در آن تقاضا در اقتصاد از تولید موجود فراتر می‌رود.
  - تورم ناشی از تقاضا و تورم ناشی از هزینه یکسان نیستند، هر دو به افزایش هزینه‌های تولید اشاره دارند.
explanation: |
  این فصل توضیح می‌دهد که تورم ناشی از تقاضا اغلب به عنوان وضعیتی توضیح داده می‌شود که در آن تقاضا در اقتصاد از تولید موجود فراتر می‌رود. از سوی دیگر، تورم ناشی از هزینه به افزایش هزینه‌های تولید نسبت داده می‌شود.
