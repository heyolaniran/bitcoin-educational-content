question: تعریف ابر تورم طبق نظر برنهولتز چیست؟
answer: اَبَرتورم گسترشی از تورم بالا است که با کسری بودجه‌های بزرگ که از طریق ایجاد پول تأمین می‌شود، مشخص می‌شود.
wrong_answers:
  - اَبَرتورم کاهش ارزش پول Supply است.
  - اَبَرتورم یک افزایش متوسط در پول Supply است.
  - اَبَرتورم کاهش در تولید است.
explanation: |
  این فصل توضیح می‌دهد که به گفته برنهولز، ابر تورم یک گسترش از تورم بالا است که با کسری بودجه بزرگ که از طریق ایجاد پول تأمین می‌شود، مشخص می‌شود.
reviewed: false