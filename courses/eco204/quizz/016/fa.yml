question: آستانه ابر تورم طبق تعریف فیلیپ کاگان چیست؟
answer: تورم ماهانه از ۵۰٪ فراتر می‌رود
wrong_answers:
  - تورم ماهانه از ۴۰٪ فراتر می‌رود
  - تورم ماهانه از ۶۰٪ فراتر می‌رود
  - تورم ماهانه از ۷۰٪ فراتر می‌رود
explanation: |
  بر اساس تعریف فیلیپ کاگان، ابر تورم زمانی آغاز می‌شود که تورم ماهانه از ۵۰٪ فراتر رود.
reviewed: false