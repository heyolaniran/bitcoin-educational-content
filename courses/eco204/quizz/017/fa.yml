question: انتقاد اصلی به تعریف کاگان از ابر تورم چیست؟
answer: آستانه ۵۰٪ دلخواه است و برخی از دوره‌های تورم بالا را مستثنی می‌کند.
wrong_answers:
  - تعریف بیش از حد گسترده است و شامل تعداد زیادی از دوره‌های تورم می‌شود.
  - تعریف قدیمی است و برای اقتصادهای مدرن قابل اجرا نیست.
  - تعریف تأثیر تورم بر اقتصاد را در نظر نمی‌گیرد.
explanation: |
  منتقدان تعریف کاگان، مانند برنهولتز، استدلال می‌کنند که آستانه ۵۰٪ دلخواه است و برخی از دوره‌های تورم بالا را که دارای ویژگی‌های کیفی مشابه با دوره‌های ابر تورم هستند، مستثنی می‌کند.
reviewed: false