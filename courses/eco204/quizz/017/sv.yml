question: Vilken är den huvudsakliga kritiken mot Cagans definition av hyperinflation?
answer: Gränsen på 50% är godtycklig och utesluter vissa perioder med hög inflation
wrong_answers:
  - Definitionen är för bred och omfattar för många inflationsperioder
  - Definitionen är föråldrad och inte tillämplig på moderna ekonomier
  - Definitionen tar inte hänsyn till inflationens inverkan på ekonomin
explanation: |
  Kritiker av Cagans definition, såsom Bernholz, hävdar att 50%-gränsen
  tröskeln
  är godtycklig och utesluter vissa episoder av hög inflation som har samma
  kvalitativa egenskaper som episoder av hyperinflation.
reviewed: false