question: محدودیت اصلی جداول کلاسیک ابرتورم چیست؟
answer: آن‌ها به دلیل معیارهای طبقه‌بندی سخت‌گیرانه، برخی دوره‌های تاریخی با تورم بالا را مستثنی می‌کنند.
wrong_answers:
  - آن‌ها شامل تعداد زیادی از دوره‌های تورم هستند که به عنوان ابر تورم واجد شرایط نیستند.
  - آنها قدیمی و برای اقتصادهای مدرن قابل اجرا نیستند.
  - آن‌ها تأثیر تورم بر اقتصاد را در نظر نمی‌گیرند.
explanation: |
  جدول‌های کلاسیک ابرتورم، مانند جدول هنکه-کروس، اغلب به دلیل معیارهای طبقه‌بندی سختگیرانه، برخی از دوره‌های تاریخی با تورم بالا را نادیده می‌گیرند، مانند آستانه تورم ماهانه ۵۰٪ که در تعریف کاگان مشخص شده است.
reviewed: false