question: چه کسی شناخته‌شده‌ترین تعریف از ابر تورم را پیشنهاد داد؟
answer: فیلیپ کاگان
wrong_answers:
  - برنهولز
  - دیوید
  - هانکه-کروس
explanation: |
  شناخته‌شده‌ترین تعریف از ابرتورم از فیلیپ کاگان می‌آید، که در اثر خود در سال ۱۹۵۶، پویایی‌های پولی ابرتورم، یک درک کمی از ابرتورم را پیشنهاد کرد.
reviewed: false