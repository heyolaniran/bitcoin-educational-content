question: تمرکز اصلی کار کاگان، "پویایی‌های پولی ابر تورم" چیست؟
answer: درک کمی از ابر تورم
wrong_answers:
  - درک کیفی از ابر تورم
  - تحلیل تاریخی ابر تورم
  - یک مدل نظری از ابر تورم
explanation: |
  در اثر خود، پویایی‌های پولی ابر تورم، فیلیپ کاگان یک درک کمی از ابر تورم ارائه می‌دهد.
reviewed: false