question: ویژگی اصلی ابرتورم بر اساس تعریف کاگان چیست؟
answer: نرخ تورم ماهانه بسیار بالا
wrong_answers:
  - نرخ تورم سالانه بسیار بالا
  - نرخ تورم هفتگی بسیار بالا
  - نرخ تورم روزانه بسیار بالا
explanation: |
  بر اساس تعریف کاگان، ابر تورم با نرخ تورم ماهانه بسیار بالا که از ۵۰٪ فراتر می‌رود، مشخص می‌شود.
reviewed: false