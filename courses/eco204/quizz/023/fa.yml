question: اهمیت اصطلاح Burner-preneurs در زمینه ابر تورم چیست؟
answer: این به کارآفرینانی اشاره دارد که با قرض گرفتن ارز کاهش‌یافته برای سرمایه‌گذاری در دارایی‌های ملموس رشد می‌کنند و سپس بدهی‌های خود را با ارزی که حتی بیشتر کاهش یافته است، بازپرداخت می‌کنند.
wrong_answers:
  - این به افرادی اشاره دارد که ارز بی‌ارزش شده را برای گرمایش می‌سوزانند.
  - به افرادی اشاره دارد که کسب‌وکارهایی مرتبط با تولید اسکناس راه‌اندازی می‌کنند.
  - به افرادی اشاره دارد که به صورت غیرقانونی در ارزهای خارجی معامله می‌کنند.
explanation: |
  در دوره‌های ابر تورم، ارزش ارز به سرعت کاهش می‌یابد.  
  این وضعیت فرصت‌هایی را برای کارآفرینان، که اغلب به عنوان کارآفرینان سوختی شناخته می‌شوند، ایجاد می‌کند که ارز کاهش‌یافته را قرض می‌گیرند تا در دارایی‌های ملموس سرمایه‌گذاری کنند و سپس بدهی‌های خود را با ارز حتی بیشتر کاهش‌یافته بازپرداخت می‌کنند.
reviewed: false