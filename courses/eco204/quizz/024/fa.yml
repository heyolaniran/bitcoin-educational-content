question: پاسخ مشترک دولت‌ها به بحران پولی یا اقتصادی، همان‌طور که در موارد زیمبابوه و جمهوری وایمار مشاهده شد، چه بود؟
answer: اعمال کنترل شدید بر حرکت و اشکال سرمایه.
wrong_answers:
  - کاهش ارزش پول ملی.
  - تشویق سرمایه‌گذاری خارجی.
  - افزایش نرخ بهره.
explanation: |
  وقتی یک کشور با بحران پولی یا اقتصادی مواجه می‌شود، یکی از واکنش‌های رایج دولت‌ها اعمال کنترل شدید بر حرکت و اشکال سرمایه است. این کار اغلب به منظور مهار وحشت و بازگرداندن اعتماد انجام می‌شود.
reviewed: false