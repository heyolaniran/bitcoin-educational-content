question: Vad var en vanlig reaktion från regeringarna på en monetär eller ekonomisk kris, som i fallen Zimbabwe och Weimarrepubliken?
answer: Utöva strikt kontroll över kapitalets rörelse och former.
wrong_answers:
  - Devalvering av den nationella valutan.
  - Främja utländska investeringar.
  - Ökande räntenivåer.
explanation: |
  När ett land står inför en monetär eller ekonomisk kris är en vanlig reaktion
  är att utöva strikt kontroll över kapitalets rörelser och former.
  Detta görs ofta i ett försök att dämpa paniken och återställa förtroendet.
reviewed: false