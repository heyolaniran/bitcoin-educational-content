question: نقش بانک‌های جهانی در دوره‌های ابر تورم در زیمبابوه و جمهوری وایمار چه بود؟
answer: آن‌ها پناهگاهی برای کسانی که به دنبال حفاظت از دارایی‌های خود در برابر کاهش ارزش بودند، فراهم کردند.
wrong_answers:
  - آن‌ها اسکناس‌های جدیدی چاپ کردند تا بازار را اشباع کنند.
  - آن‌ها نرخ Exchange ارز ملی را تنظیم کردند.
  - آنها به دولت وام دادند.
explanation: |
  در شرایط ابر تورم یا بحران پولی، بازارهای موازی و غیرقانونی برای ارزهای خارجی تمایل به گسترش دارند. این بانک‌های غیررسمی که اغلب به‌طور طنزآمیز به عنوان بانک‌های جهانی یا با نام‌های محلی دیگر شناخته می‌شوند، پناهگاهی برای کسانی فراهم می‌کنند که به دنبال حفاظت از دارایی‌های خود در برابر کاهش ارزش هستند.
reviewed: false