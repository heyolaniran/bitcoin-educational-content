question: یک روش رایج که توسط دولت‌ها برای حفظ ظاهر عادی در طول فروپاشی اقتصادی استفاده می‌شد، چه بود؟
answer: مجبور کردن بازرگانان به باز نگه داشتن مغازه‌هایشان.
wrong_answers:
  - تشویق سرمایه‌گذاری خارجی.
  - کاهش مالیات‌ها.
  - افزایش هزینه‌های عمومی.
explanation: |
  وقتی اقتصاد فرو می‌پاشد و ارزش ارز کاهش می‌یابد، دولت‌ها می‌توانند به اقدامات شدید متوسل شوند تا ظاهری از عادی بودن را حفظ کنند. یکی از این اقدامات مجبور کردن بازرگانان به باز نگه داشتن مغازه‌هایشان است.
reviewed: false