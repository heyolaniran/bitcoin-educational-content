question: आर्थिक पतन के दौरान सामान्य स्थिति बनाए रखने के लिए सरकारों द्वारा अपनाई जाने वाली सामान्य विधि क्या थी?
answer: व्यापारियों को अपनी दुकानें खुली रखने के लिए मजबूर करना।
wrong_answers:
  - विदेशी निवेश को प्रोत्साहित करना।
  - करों में कमी करना।
  - सार्वजनिक व्यय में वृद्धि करना।
explanation: |
  जब अर्थव्यवस्था ध्वस्त हो जाती है और मुद्रा अपना मूल्य खो देती है, तो सरकारें सामान्य स्थिति बनाए रखने के लिए कठोर उपायों का सहारा ले सकती हैं। ऐसा ही एक उपाय व्यापारियों को अपनी दुकानें खुली रखने के लिए मजबूर करना है।
reviewed: false