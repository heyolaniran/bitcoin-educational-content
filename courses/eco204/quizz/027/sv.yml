question: Vilken var en vanlig metod som användes av regeringar för att upprätthålla ett sken av normalitet under en ekonomisk kollaps?
answer: Tvingar handlare att hålla sina butiker öppna.
wrong_answers:
  - Främja utländska investeringar.
  - Sänka skatterna.
  - Öka de offentliga utgifterna.
explanation: |
  När ekonomin kollapsar och valutan förlorar sitt värde kan regeringar ta till
  kan regeringar ta till drastiska åtgärder för att upprätthålla ett sken av normalitet. En sådan åtgärd
  är att tvinga handlare att hålla sina butiker öppna.
reviewed: false