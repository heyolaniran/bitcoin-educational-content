question: شباهت رایج در پیامدهای ابر تورم در زیمبابوه و جمهوری وایمار چیست؟
answer: اجرای یک سیستم سهمیه‌بندی برای کنترل توزیع کالاهای اساسی.
wrong_answers:
  - افزایش سرمایه‌گذاری خارجی.
  - افزایش ارزش ارز ملی.
  - کاهش تقاضا برای کالاهای اساسی.
explanation: |
  در زمینه اقتصادی رو به زوال و کمبود منابع، دولت‌ها ممکن است سیستم‌های سهمیه‌بندی را برای کنترل توزیع کالاهای اساسی اجرا کنند. این شامل استفاده از کوپن‌ها یا واچرها برای تنظیم خرید بنزین یا سوخت می‌شود.
reviewed: false