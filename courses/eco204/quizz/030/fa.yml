question: یک پیامد رایج ابرتورم که در موارد زیمبابوه و جمهوری وایمار مشاهده شده است چیست؟
answer: ارزش ذاتی یک اسکناس می‌تواند کمتر از ارزش کاغذی باشد که روی آن چاپ شده است.
wrong_answers:
  - ارزش ارز افزایش می‌یابد.
  - تقاضا برای اسکناس کاهش می‌یابد.
  - ارزش دارایی‌های ملموس کاهش می‌یابد.
explanation: |
  در شرایط اقتصادی خاص، مانند ابر تورم، ارزش ذاتی یک اسکناس می‌تواند کمتر از ارزش کاغذی باشد که روی آن چاپ شده است. این کاهش شدید ارزش، اسکناس‌ها را که معمولاً نماد ارزش و قدرت خرید هستند، به تکه‌های کاغذ بی‌ارزش تبدیل می‌کند.
reviewed: false