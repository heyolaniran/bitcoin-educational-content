question: درک جمعیت آلمان در دوره ابر تورم در جمهوری وایمار چگونه بود؟
answer: آن‌ها تورم را به افزایش ارزش دلار نسبت دادند تا به کاهش ارزش ذاتی ارز خودشان.
wrong_answers:
  - آن‌ها به‌طور کامل از علت اصلی ابرتورمی که تجربه می‌کردند، آگاه بودند.
  - آنها دولت را برای مشکلات اقتصادی خود مقصر دانستند.
  - آن‌ها معتقد بودند که ابر تورم نتیجه غرامت‌های جنگی بود.
explanation: |
  جمعیت آلمان در دوران جمهوری وایمار تورمی را که تجربه می‌کردند به افزایش دلار نسبت می‌دادند و هرگونه ارتباط بین مشکلات اقتصادی خود و کاهش ارزش پول، که عمدتاً ناشی از ایجاد بیش از حد پول بود، را نادیده می‌گرفتند.
reviewed: false