question: वाइमर गणराज्य में अति मुद्रास्फीति के दौर के दौरान जर्मन जनसंख्या की धारणा क्या थी?
answer: उन्होंने मुद्रास्फीति के लिए अपनी मुद्रा के अवमूल्यन के बजाय डॉलर के मूल्य में वृद्धि को जिम्मेदार ठहराया।
wrong_answers:
  - वे जिस अति मुद्रास्फीति का अनुभव कर रहे थे, उसके मूल कारण से वे पूरी तरह अवगत थे।
  - उन्होंने अपनी आर्थिक कठिनाइयों के लिए सरकार को दोषी ठहराया।
  - उनका मानना ​​था कि अति मुद्रास्फीति युद्ध क्षतिपूर्ति का परिणाम थी।
explanation: |
  वाइमर गणराज्य के दौरान जर्मन आबादी ने मुद्रास्फीति के लिए डॉलर के उदय को जिम्मेदार ठहराया, और अपनी आर्थिक कठिनाई और मौद्रिक अवमूल्यन के बीच किसी भी संबंध को खारिज कर दिया, जो मुख्य रूप से अत्यधिक धन सृजन से प्रेरित था।
reviewed: false