question: هدف از انتشار نوت‌گلد در دوران بحران اقتصادی آلمان چه بود؟
answer: طراحی شده بود تا Address کمبود ارز رایج را برطرف کند.
wrong_answers:
  - برای پرداخت غرامت‌های جنگی استفاده شد.
  - این یک شکل از اعتراض علیه دولت بود.
  - این راهی برای تحریک اقتصاد بود.
explanation: |
  در مواجهه با بحران پولی و اقتصادی، آلمان به نوت‌گلد (پول اضطراری) متوسل شد. این اسکناس‌ها که توسط شهرها یا شرکت‌های خاصی چاپ می‌شدند، برای Address کمبود ارز رایج طراحی شده بودند.
reviewed: false