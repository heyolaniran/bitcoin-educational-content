question: जर्मनी में आर्थिक संकट के दौरान नोटगेल्ड का उद्देश्य क्या था?
answer: इसे सामान्य मुद्रा की कमी को पूरा करने के लिए डिज़ाइन किया गया था।
wrong_answers:
  - इसका उपयोग युद्ध क्षतिपूर्ति के भुगतान के लिए किया गया था।
  - यह सरकार के खिलाफ विरोध का एक रूप था।
  - यह अर्थव्यवस्था को प्रोत्साहित करने का एक तरीका था।
explanation: |
  मौद्रिक और आर्थिक संकट का सामना करते हुए, जर्मनी ने नोटगेल्ड (आपातकालीन मुद्रा) का सहारा लिया। शहरों या कुछ कंपनियों द्वारा मुद्रित ये नोट, आम मुद्रा की कमी को पूरा करने के लिए डिज़ाइन किए गए थे।
reviewed: false