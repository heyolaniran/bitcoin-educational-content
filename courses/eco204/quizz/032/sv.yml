question: Vad var syftet med Notgeld under den ekonomiska krisen i Tyskland?
answer: Det var utformat för att Address en brist på gemensam valuta.
wrong_answers:
  - Pengarna användes för att betala krigsskadestånd.
  - Det var en form av protest mot regeringen.
  - Det var ett sätt att stimulera ekonomin.
explanation: |
  Inför den monetära och ekonomiska krisen använde sig Tyskland av Notgeld
  (nödpengar). Dessa sedlar, som trycktes av städer eller vissa företag, var utformade
  för att Address en brist på gemensam valuta.
reviewed: false