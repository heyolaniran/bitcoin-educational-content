question: تأثیر بازنگری بدهی‌ها در وایمار چه بود؟
answer: سهامداران ۲.۵ درصد از سرمایه‌گذاری اولیه خود را دریافت کردند به شرطی که تمام غرامت‌ها پرداخت شده باشد.
wrong_answers:
  - این منجر به کاهش بیشتر ارزش ارز شد.
  - این باعث افزایش بیکاری شد.
  - این منجر به کاهش سرمایه‌گذاری خارجی شد.
explanation: |
  در وایمار، برخی از بدهی‌ها برای جبران تأثیر تورم مجدداً ارزیابی شدند.  
  تصمیم به ارزیابی مجدد وام‌های دولتی در سال ۱۹۲۵ به قانون تبدیل شد که نتیجه آن دریافت ۲.۵ درصد از سرمایه‌گذاری اولیه توسط سهامداران بود، به شرطی که تمامی غرامت‌ها پرداخت شده باشد.
reviewed: false