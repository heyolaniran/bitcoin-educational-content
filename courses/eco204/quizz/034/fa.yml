question: یک شرکت زامبی چیست؟
answer: یک شرکت که تحت شرایط عادی بازار، ورشکسته یا نزدیک به ورشکستگی خواهد بود، اما عمدتاً از طریق وام‌گیری با هزینه کم به فعالیت خود ادامه می‌دهد.
wrong_answers:
  - یک شرکت که بیش از 100 سال در کسب و کار بوده است.
  - یک شرکت که در بخش فناوری فعالیت می‌کند.
  - یک شرکت که توسط دولت نجات یافته است.
explanation: |
  یک شرکت زامبی شرکتی است که در شرایط عادی بازار، ورشکسته یا نزدیک به ورشکستگی خواهد بود، اما عمدتاً از طریق وام‌گیری با هزینه کم به فعالیت خود ادامه می‌دهد. این شرکت‌ها فقط به اندازه‌ای درآمد کسب می‌کنند که بتوانند بدهی‌های خود را پوشش دهند اما قادر به رشد قابل توجهی نیستند.
reviewed: false