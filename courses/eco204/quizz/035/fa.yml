question: تأثیر ابر تورم بر پس‌اندازها چیست؟
answer: این امر ارزش سرمایه و درآمد را کاهش می‌دهد و برنامه‌ریزی بلندمدت را دشوار می‌سازد.
wrong_answers:
  - این ارزش پس‌اندازها را افزایش می‌دهد.
  - این هیچ تأثیری بر پس‌انداز ندارد.
  - این افراد را تشویق می‌کند تا بیشتر پس‌انداز کنند.
explanation: |
  در دوره‌ای از ابر تورم، پس‌انداز کردن به یک چالش تبدیل می‌شود. پول به سرعت ارزش خود را از دست می‌دهد و برنامه‌ریزی بلندمدت را دشوار می‌سازد. این بی‌ثباتی مالی می‌تواند باعث استرس و اضطراب شود.
reviewed: false