question: Hur påverkas sparandet av hyperinflation?
answer: Det urholkar värdet på kapital och inkomster, vilket försvårar långsiktig planering.
wrong_answers:
  - Det ökar värdet på sparandet.
  - Det har ingen inverkan på sparandet.
  - Det uppmuntrar människor att spara mer.
explanation: |
  I en period av hyperinflation blir sparande en utmaning. Pengar förlorar snabbt
  förlorar snabbt sitt värde, vilket gör det svårt att planera långsiktigt. Denna finansiella instabilitet
  kan orsaka stress och ångest.
