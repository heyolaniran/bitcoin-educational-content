question: نقش پس‌انداز در زمان‌های عدم اطمینان چیست؟
answer: پس‌اندازها به عنوان درمانی در برابر عدم قطعیت عمل می‌کنند و ذخایر مالی برای مدیریت موقعیت‌های پیش‌بینی‌نشده فراهم می‌آورند.
wrong_answers:
  - پس‌انداز در زمان‌های عدم اطمینان ضروری نیست.
  - پس‌اندازها برای تحریک اقتصاد در زمان‌های عدم اطمینان استفاده می‌شوند.
  - پس‌اندازها برای پرداخت بدهی‌ها در زمان‌های عدم اطمینان استفاده می‌شوند.
explanation: |
  پس‌انداز همیشه راه‌حلی در برابر عدم قطعیت بوده است. داشتن ذخایر مالی برای مدیریت موقعیت‌های پیش‌بینی‌نشده به آرامش ذهن کمک می‌کند و انسجام اجتماعی را تقویت می‌کند.
reviewed: false