question: Vad är sparandets roll i tider av osäkerhet?
answer: Sparande fungerar som ett botemedel mot osäkerhet och ger ekonomiska reserver för att hantera oförutsedda situationer.
wrong_answers:
  - Besparingar är inte nödvändiga i tider av osäkerhet.
  - Besparingar används för att stimulera ekonomin i tider av osäkerhet.
  - Besparingar används för att betala av skulder i osäkra tider.
explanation: |
  Sparande har alltid varit ett botemedel mot osäkerhet. Att ha ekonomiska reserver
  reserver för att hantera oförutsedda situationer bidrar till sinnesfrid och stärker den
  den sociala sammanhållningen.
