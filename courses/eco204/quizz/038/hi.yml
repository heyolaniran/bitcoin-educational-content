question: उस कंपनी को क्या कहा जाता है जो सामान्य बाजार स्थितियों में दिवालिया होने या दिवालियापन के करीब होने के बावजूद मुख्य रूप से कम लागत वाली उधारी के माध्यम से परिचालन जारी रखती है?
answer: ज़ोंबी कंपनी
wrong_answers:
  - भूत कंपनी
  - वैम्पायर कंपनी
  - फैंटम कंपनी
explanation: |
  ज़ोंबी कंपनी वह कंपनी है जो सामान्य बाजार स्थितियों में दिवालिया या दिवालियापन के करीब होती है, लेकिन मुख्य रूप से कम लागत वाली उधारी के माध्यम से काम करना जारी रखती है।
reviewed: false