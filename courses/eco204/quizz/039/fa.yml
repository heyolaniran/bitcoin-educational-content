question: تأثیر ابر تورم بر ارزش پول چیست؟
answer: این باعث می‌شود که پول به سرعت ارزش خود را از دست بدهد.
wrong_answers:
  - این باعث می‌شود که ارزش پول افزایش یابد.
  - این بر ارزش پول تأثیری ندارد.
  - این باعث می‌شود ارزش پول به‌طور غیرقابل‌پیش‌بینی نوسان کند.
explanation: |
  در دوره‌ای از ابر تورم، پول به سرعت ارزش خود را از دست می‌دهد و برنامه‌ریزی بلندمدت را دشوار می‌سازد.
