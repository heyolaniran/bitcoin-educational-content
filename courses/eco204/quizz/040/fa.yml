question: معیار کاگان برای ابر تورم چیست؟
answer: نرخ تورم ۵۰٪ در ماه.
wrong_answers:
  - نرخ تورم ۵۰٪ در سال.
  - نرخ تورم ۲۵٪ در ماه.
  - نرخ تورم ۲۵٪ در سال.
explanation: |
  معیار کاگان ابر تورم را به عنوان نرخ تورم 50% در ماه تعریف می‌کند. این معیار گاهی اوقات می‌تواند به تفسیرهای مبهم منجر شود، به طوری که سال‌هایی با نرخ‌های تورم بالا وجود دارند اما تعریف دقیق ابر تورم را برآورده نمی‌کنند.
