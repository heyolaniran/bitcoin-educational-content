question: علت اصلی ابر تورم که تغییر واحد پولی آن را Address نمی‌کند چیست؟
answer: گسترش پول Supply.
wrong_answers:
  - کاهش در پول Supply.
  - افزایش تقاضا برای کالاها و خدمات.
  - کاهش تقاضا برای کالاها و خدمات.
explanation: |
  علت اصلی ابر تورم، گسترش پول Supply است.
  
  تغییر واحد پولی یک اقدام رایج است که توسط دولت‌ها در دوره‌های تورم انجام می‌شود،
  
  اما این مشکل اساسی را حل نمی‌کند. این فقط روشی برای تغییر نام ارز
  
  و حذف صفرها است.'
