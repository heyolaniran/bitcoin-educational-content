question: واحد پول آرژانتین قبل از سال 1826 چه بود؟
answer: دلار اسپانیایی.
wrong_answers:
  - پزوی آرژانتین.
  - پزو مونه‌دا ناسیونال.
  - پزو واقعی.
explanation: |
  قبل از سال 1826، آرژانتین از دلار اسپانیایی استفاده می‌کرد. پس از استقلال خود در سال 1816، ارز خود را بر اساس رئال اسپانیایی معرفی کرد که منجر به ایجاد ارزی مشابه شد.
reviewed: false