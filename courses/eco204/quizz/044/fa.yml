question: نرخ تورم سالانه در بولیوی در سال ۱۹۸۵ چقدر بود؟
answer: ۱۱,۷۴۹٪
wrong_answers:
  - ۱۲,۸۰۰٪
  - ۱۰,۰۰۰٪
  - ۱۵,۰۰۰٪
explanation: |
  در سال 1985، نرخ تورم سالانه بولیوی به 11,749% رسید، که نشان می‌دهد
  
  تقریباً هر ماه، تورم نزدیک به یا بیش از آستانه ابر تورم
  
  50% بود.
