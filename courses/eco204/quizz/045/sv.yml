question: Vilken valuta hade Peru före 1800-talet?
answer: Spanskt guld.
wrong_answers:
  - Den peruanska dollarn.
  - Den peruanska verkligheten.
  - Soldi oro.
explanation: |
  Peru använde spanskt guld fram till 1800-talet. Den peruanska dollarn var
  
  i bruk från 1822 till 1863
