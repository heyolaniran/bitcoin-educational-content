question: پیامد چندین بار تغییر واحد پولی بر جمعیت چیست؟
answer: از دست دادن پس‌انداز و مشکلات غذایی.
wrong_answers:
  - افزایش ثروت و فراوانی غذا.
  - افزایش پس‌انداز و کمبود مواد غذایی.
  - کاهش ثروت و فراوانی غذا.
explanation: |
  حذف صفرها یا تغییر نام ارز چندین بار، تأثیرات مستقیمی بر جمعیت دارد که از دست دادن کمک‌ها تا مشکلات غذایی را شامل می‌شود.
reviewed: false