question: Vad är konsekvensen av flera redenomineringar på befolkningen?
answer: Förlust av besparingar och livsmedelsproblem.
wrong_answers:
  - Ökning av välstånd och livsmedelsöverflöd.
  - Ökat sparande och brist på mat.
  - Minskat välstånd och minskat överflöd av livsmedel.
explanation: |
  Omdefiniera flera gånger, ta bort nollor eller ändra namnet på
  av
  
  valutans namn får direkta återverkningar på befolkningen, allt från förlust av pengar till
  
  från uteblivet bistånd till livsmedelsproblem
reviewed: false