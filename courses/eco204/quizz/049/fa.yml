question: به گفته برنولد، تنها روش برای پایان دادن به تورم چیست؟
answer: انجام اصلاحات پولی و اعمال محدودیت‌ها بر دولت
wrong_answers:
  - افزایش پول Supply
  - کاهش پول Supply
  - پذیرش یک ارز خارجی
explanation: |
  برنولد پیشنهاد می‌کند که تنها راه پایان دادن به تورم، انجام یک اصلاح پولی و اعمال محدودیت‌هایی بر دولت است. این شامل تأسیس نهادی مانند بانک مرکزی است که به‌طور مستقل از تصمیمات سیاسی دولت عمل می‌کند.
reviewed: false