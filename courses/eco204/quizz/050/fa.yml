question: راه‌حل اتخاذ شده توسط زیمبابوه برای مقابله با تورم چه بود؟
answer: دلاریزاسیون
wrong_answers:
  - چاپ پول بیشتر
  - معرفی یک ارز جدید
  - کاهش پول Supply
explanation: |
  زیمبابوه دلاریزاسیون را برای مقابله با تورم اتخاذ کرد. این به این معناست که آنها دلار آمریکا یا سایر ارزهای کشورهای همسایه را پذیرفتند، که مانع از چاپ پول توسط دولت به دلخواه می‌شود.
reviewed: false