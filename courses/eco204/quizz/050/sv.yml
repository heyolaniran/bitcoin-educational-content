question: Vilken var Zimbabwes lösning för att motverka inflationen?
answer: Dollarisering
wrong_answers:
  - Trycka mer pengar
  - Införandet av en ny valuta
  - Minskning av pengarna Supply
explanation: |
  Zimbabwe införde dollarisering för att motverka inflationen. Detta innebär att de
  amerikanska dollarn eller andra valutor från grannländerna, vilket hindrar regeringen
  regeringen från att trycka pengar efter behag.
