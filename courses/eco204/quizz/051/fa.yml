question: راه‌حل اتخاذ شده توسط آلمان برای مقابله با تورم پس از جنگ جهانی اول چه بود؟
answer: ایجاد یک ارز جدید، رنتن‌مارک
wrong_answers:
  - دولاری‌سازی
  - چاپ پول بیشتر
  - کاهش پول Supply
explanation: |
  آلمان پس از جنگ جهانی اول برای مقابله با تورم، ارز جدیدی به نام رنتن‌مارک ایجاد کرد. این ارز توسط دارایی‌های سرزمینی رایش پشتیبانی می‌شد و این استراتژی مؤثر واقع شد.
reviewed: false