question: عامل کلیدی در موفقیت یا شکست یک اصلاح پولی به گفته برنولد چیست؟
answer: اعتمادی که جمعیت به آن دارد
wrong_answers:
  - مقدار پول در گردش
  - ارزش ارز
  - سیاست‌های اقتصادی دولت
explanation: |
  برنولد پیشنهاد می‌کند که موفقیت یک اصلاح پولی نه تنها به مرتبط بودن فنی آن بستگی دارد بلکه به اعتمادی که مردم به آن دارند نیز وابسته است. بنابراین، ادراک و اعتماد عمومی برای موفقیت یا شکست یک اصلاح پولی ضروری هستند.
reviewed: false