question: یکی از پیامدهای دلاریزاسیون چیست؟
answer: از دست دادن سیاست پولی مستقل
wrong_answers:
  - افزایش تورم
  - افزایش پول Supply
  - کاهش اعتماد عمومی
explanation: |
  دلاریزاسیون می‌تواند به ابر تورم پایان دهد، اما چالش‌های اقتصادی دیگری را به همراه دارد. یکی از پیامدهای آن از دست دادن سیاست پولی مستقل است. بدون داشتن ارز خود، یک کشور نمی‌تواند سیاست پولی خود را برای پاسخ به شوک‌های اقتصادی داخلی تنظیم کند.
reviewed: false