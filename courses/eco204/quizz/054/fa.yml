question: آستانه رسمی برای اینکه یک کشور در وضعیت ابر تورم در نظر گرفته شود چیست؟
answer: ۵۰٪ در ماه
wrong_answers:
  - ۱۰٪ در ماه
  - ۲۵٪ در ماه
  - ۷۵٪ در ماه
explanation: |
  در سال 2007، نرخ تورم زیمبابوه به آستانه 50% در ماه رسید و به طور رسمی کشور را در وضعیت ابر تورم قرار داد.
reviewed: false