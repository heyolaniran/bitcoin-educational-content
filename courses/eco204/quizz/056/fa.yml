question: نرخ اولیه دلار زیمبابوه (Exchange) در زمان معرفی آن در سال 1980 چه بود؟
answer: دو دلار زیمبابوه‌ای حدود ۱.۶۰ دلار آمریکا ارزش داشت.
wrong_answers:
  - یک دلار زیمبابوه تقریباً برابر با 1 دلار آمریکا بود
  - یک دلار زیمبابوه‌ای حدود 2 دلار آمریکا ارزش داشت
  - دو دلار زیمبابوه تقریباً برابر با ۲ دلار آمریکا بود
explanation: |
  زیمبابوه در سال 1980 استقلال یافت و دلار زیمبابوه را معرفی کرد.  
  در ابتدا، دو دلار زیمبابوه حدود 1.60 دلار آمریکا ارزش داشت.
reviewed: false