question: نام کتاب کمیکی که برای کسانی که به تجربه آلمان پس از جنگ جهانی اول کنجکاو هستند توصیه می‌شود چیست؟
answer: بانکدار رایش
wrong_answers:
  - دلار رایش
  - تورم رایش
  - اقتصاد رایش
explanation: |
  برای کسانی که به تجربه آلمان پس از جنگ جهانی اول کنجکاو هستند، 
  سخنرانی کتاب کمیک بانکدار رایش را توصیه می‌کند. این کتاب روایت می‌کند که چگونه آلمان 
  موفق به غلبه بر ابر تورم شد، به ویژه از طریق ایجاد رنتن‌مارک.
reviewed: false