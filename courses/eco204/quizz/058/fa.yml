question: ویژگی منحصر به فرد سفته‌هایی که در قرن شانزدهم در بورس آنتورپ Exchange معرفی شدند چه بود؟
answer: آن‌ها نام‌ها و تاریخ‌های سررسید داشتند
wrong_answers:
  - آنها از طلا ساخته شده بودند
  - آنها توسط بانک آمستردام صادر شدند
  - آنها قابل تبدیل به فلورین بودند
explanation: |
  بورس آنتورپ Exchange سفته‌هایی را معرفی کرد که دارای نام‌ها و تاریخ‌های سررسید بودند. این امر باعث شد که آن‌ها قبل از تاریخ سررسید به سختی Exchange شوند. با این حال، Exchange عمل تنزیل این سفته‌ها قبل از تاریخ سررسید آن‌ها را معرفی کرد، که آن‌ها را بیشتر Liquid کرد و مفهوم ارزش زمانی پول را معرفی نمود.
reviewed: false