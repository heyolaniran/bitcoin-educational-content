question: 16वीं शताब्दी में एंटवर्प स्टॉक Exchange में प्रस्तुत वचन-पत्रों की अनोखी विशेषता क्या थी?
answer: उन पर नाम और परिपक्वता तिथि अंकित थी
wrong_answers:
  - वे सोने से बने थे
  - इन्हें बैंक ऑफ एम्स्टर्डम द्वारा जारी किया गया था
  - वे फ्लोरिन में परिवर्तनीय थे
explanation: |
  एंटवर्प स्टॉक Exchange ने वचन पत्र प्रस्तुत किए जिन पर नाम और परिपक्वता तिथियां अंकित थीं। इससे उन्हें नियत तिथि से पहले Exchange करना मुश्किल हो गया। हालाँकि, Exchange ने इन नोटों को उनकी नियत तिथि से पहले छूट देने की प्रथा शुरू की, जिससे वे अधिक Liquid बन गए और पैसे के समय मूल्य की अवधारणा शुरू हुई।
reviewed: false