question: اولین Layer پول در قرن سیزدهم ایتالیا چه بود؟
answer: طلا، که با فلورین نمایش داده می‌شود
wrong_answers:
  - صورتحساب‌های Exchange
  - اسناد تعهدی
  - سکه‌های نقره‌ای
explanation: |
  در ایتالیا در قرن سیزدهم، به‌ویژه فلورانس، اولین Layer پول
  طلا واقعی بود که توسط فلورین نمایندگی می‌شد. زرگران صورتحساب‌های Exchange را در
  Exchange برای فلورین‌های سپرده‌شده صادر کردند که دومین Layer پول را تشکیل می‌داد.
reviewed: false