question: Vad var den första Layer av pengar i Italien på 1200-talet?
answer: Guld, representerat av florinen
wrong_answers:
  - Räkningar av Exchange
  - Skuldebrev
  - Silvermynt
explanation: |
  I 1200-talets Italien, närmare bestämt Florens, var den första Layer-pengarna
  var äkta guld, representerat av florinen. Guldsmeder utfärdade växlar på Exchange i
  Exchange för deponerade floriner, som utgjorde pengarnas andra Layer.
reviewed: false