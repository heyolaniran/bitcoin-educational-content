question: دلیل اصلی ایجاد بانک انگلستان چه بود؟
answer: برای تأمین مالی جنگ در پایان قرن هفدهم
wrong_answers:
  - برای صدور ارز خود
  - برای رقابت با بانک آمستردام
  - برای تنظیم بازار سهام
explanation: |
  بانک انگلستان در اواخر قرن هفدهم با انگیزه اصلی تأمین مالی جنگ ایجاد شد. این بانک با صدور فرمان، سپرده‌گذاری را تحمیل کرد و بانک‌های خصوصی را به موقعیتی ثانویه در سیستم پولی تنزل داد.
reviewed: false