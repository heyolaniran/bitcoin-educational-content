question: پیامد بانک انگلستان در قرار دادن بانک‌های خصوصی در موقعیت ثانویه در سیستم پولی چه بود؟
answer: سومین Layer ارز ایجاد شد
wrong_answers:
  - بانک انگلستان ورشکست شد
  - ارزش طلا افزایش یافت
  - بانک آمستردام به مرکز اقتصادی جهانی تبدیل شد
explanation: |
  زمانی که بانک انگلستان بانک‌های خصوصی را به موقعیتی ثانویه در سیستم پولی تنزل داد، یک Layer سوم از ارز ایجاد شد. اسکناس‌های صادر شده توسط بانک‌های خصوصی دیگر قابل تبدیل به طلا نبودند، بلکه به ارز کاغذی از بانک انگلستان تبدیل می‌شدند که خود قابل تبدیل به طلا بود.
reviewed: false