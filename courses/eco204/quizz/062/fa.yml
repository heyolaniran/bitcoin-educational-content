question: واکنش بانک انگلستان به وحشت بانکی سال 1796 چه بود؟
answer: قابلیت تبدیل اسکناس‌های خود به طلا را به حالت تعلیق درآورد.
wrong_answers:
  - اسکناس‌های بیشتری صادر کرد
  - بسته شد
  - ارزش اسکناس‌های خود را افزایش داد.
explanation: |
  پس از وحشت بانکی سال 1796، بانک انگلستان تبدیل‌پذیری اسکناس‌های خود به طلا را به حالت تعلیق درآورد تا از کاهش احتمالی ذخایر طلای خود جلوگیری کند. این تعلیق که در ابتدا به عنوان یک اقدام موقت در نظر گرفته شده بود، به مدت دو دهه به طول انجامید.
reviewed: false