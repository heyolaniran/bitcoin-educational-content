question: Hur reagerade Bank of England på bankpaniken 1796?
answer: Den upphävde konvertibiliteten av sina sedlar till guld
wrong_answers:
  - Det gav ut fler sedlar
  - Det stängdes ner
  - Det ökade värdet på sina sedlar
explanation: |
  Efter 1796 års bankpanik suspenderade Bank of England den
  
  konvertibiliteten
  
  av sina sedlar till guld för att förhindra en potentiell deflation av guldreserverna. Detta
  
  som ursprungligen var avsedd som en tillfällig åtgärd, varade under en period av två år
  
  decennier
reviewed: false