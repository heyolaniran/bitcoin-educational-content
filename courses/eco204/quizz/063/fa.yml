question: استراتژی مورد استفاده توسط هلندی‌ها برای پایان دادن به برتری آنتورپ به عنوان یک مرکز اقتصادی بین‌المللی چه بود؟
answer: آنها دسترسی به رودخانه شلد را مسدود کردند
wrong_answers:
  - آن‌ها مفهوم ارزش زمانی پول را معرفی کردند.
  - آن‌ها ارز خود را صادر کردند
  - آن‌ها اولین بازار بورس را ایجاد کردند
explanation: |
  هلندی‌ها توانستند با مسدود کردن دسترسی به رودخانه شلد، به برتری آنتورپ به عنوان یک مرکز اقتصادی بین‌المللی پایان دهند. این استراتژی بخشی از یک حرکت تاریخی بزرگتر، شورش گدایان بود.
reviewed: false