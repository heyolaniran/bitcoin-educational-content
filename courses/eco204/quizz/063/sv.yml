question: Vilken strategi använde holländarna för att bryta Antwerpens överlägsenhet som internationellt ekonomiskt centrum?
answer: De blockerade tillträdet till floden Scheldt
wrong_answers:
  - De introducerade begreppet pengars tidsvärde
  - De gav ut sin egen valuta
  - De skapade den första aktiemarknaden
explanation: |
  Holländarna lyckades bryta Antwerpens överlägsenhet som internationellt ekonomiskt centrum
  
  genom att blockera tillträdet till floden Scheldt. Denna strategi var en del av en större
  
  historisk rörelse, tiggarnas revolt
reviewed: false