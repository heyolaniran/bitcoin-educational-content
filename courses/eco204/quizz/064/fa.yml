question: نقش زرگران در ایتالیا در قرن سیزدهم چه بود؟
answer: آنها اسکناس‌های Exchange را در Exchange برای فلورین‌های سپرده‌شده صادر کردند.
wrong_answers:
  - آن‌ها اولین بازار بورس را ایجاد کردند.
  - آن‌ها مفهوم ارزش زمانی پول را معرفی کردند.
  - آن‌ها دسترسی به رودخانه شلدت را مسدود کردند.
explanation: |
  در ایتالیا در قرن سیزدهم، زرگران اسکناس‌های Exchange را در Exchange
  
  برای فلورین‌های سپرده‌شده صادر کردند. این فلورین‌ها به دقت در خزانه‌های آن‌ها نگهداری می‌شدند و
  
  اولین Layer پول را تشکیل می‌دادند، در حالی که اسکناس‌های Exchange دومین Layer را تشکیل می‌دادند.
reviewed: false