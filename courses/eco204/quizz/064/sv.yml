question: Vad hade guldsmederna för roll i 1200-talets Italien?
answer: De utfärdade växlar på Exchange i Exchange för deponerade floriner
wrong_answers:
  - De skapade den första aktiemarknaden
  - De introducerade begreppet pengars tidsvärde
  - De blockerade tillträdet till floden Scheldt
explanation: |
  I Italien på 1200-talet utfärdade guldsmeder växlar på Exchange i Exchange
  
  för deponerade floriner. Dessa floriner förvarades omsorgsfullt i deras valv och bildade
  
  den första Layer av pengar, medan växlar på Exchange bildade en andra Layer
reviewed: false