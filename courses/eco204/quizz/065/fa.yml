question: ایده اصلی پشت مفهوم ارزش زمانی پول چیست؟
answer: زمان ارزش دارد
wrong_answers:
  - پول با گذشت زمان ارزش خود را از دست می‌دهد
  - پول را می‌توان با زمان مبادله کرد
  - زمان را می‌توان با پول مبادله کرد
explanation: |
  ایده اصلی پشت مفهوم ارزش زمانی پول این است که زمان دارای ارزش است. اگر کسی تصمیم بگیرد یک سفته به ارزش ۱۰۰ دلار را یک ماه زودتر پرداخت کند، می‌تواند آن را به عنوان مثال به قیمت ۹۸ دلار دریافت کند و در تاریخ سررسید ۱۰۰ دلار دریافت کند.
reviewed: false