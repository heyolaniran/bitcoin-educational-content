question: کدام رمزنگاران سیستم رمزنگاری RSA را در سال ۱۹۷۸ ایجاد کردند؟
answer: رونالد ریوت، آدی شامیر، و لئونارد ادلمن
wrong_answers:
  - ویتفیلد دیفی، مارتین هلمن، و رالف مرکله
  - مارک ژیرو، گیوم پوپارد، و ژاک استرن
  - آلفرد منزز، مینگهوا کو، و اسکات ون‌استون
explanation: |
  ریوست، شامیر، و آدلمن الگوریتم RSA را با استفاده از حروف اول نام خود نام‌گذاری کردند.
reviewed: false