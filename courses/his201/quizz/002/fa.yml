question: مدل پول الکترونیکی eCash بر چه فرآیندی استوار است؟
answer: امضاهای کور
wrong_answers:
  - امضاهای گروهی
  - امضاهای حلقه‌ای
  - امضاهای آستانه‌ای
explanation: |
  ای‌کش بر اساس فرآیند امضای کور است که به امضاکننده اجازه می‌دهد چیزی را امضا کند بدون اینکه ببیند چه چیزی را امضا می‌کند.
reviewed: false