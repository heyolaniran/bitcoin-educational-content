question: نام شرکت دیوید چام که از طریق آن مفهوم ارز دیجیتال خود را پیاده‌سازی کرد، "DigiCash" بود.
answer: دیجی‌کش ب.و.
wrong_answers:
  - eCash Ltd.
  - CyberCash Inc.
  - شرکت فرست ویرچوال هولدینگز
explanation: |
  تأسیس شده در سال 1990، DigiCash B.V. در آمستردام، هلند مستقر بود و حق امتیاز اختراع دیوید چام، eCash را در اختیار داشت.
reviewed: false