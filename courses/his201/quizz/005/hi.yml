question: किस अर्थशास्त्री ने 1999 में कहा था कि एकमात्र चीज जो गायब है, लेकिन जिसे जल्द ही विकसित किया जाएगा, वह है विश्वसनीय इलेक्ट्रॉनिक नकदी?
answer: मिल्टन फ्रीडमैन
wrong_answers:
  - फ्रेडरिक हायेक
  - मरे रोथबर्ड
  - पॉल क्रुगमैन
explanation: |
  अर्थशास्त्र में नोबेल पुरस्कार विजेता और शिकागो स्कूल के संस्थापक, उन्होंने नेशनल टैक्सपेयर्स यूनियन फाउंडेशन के माइक्रोफोन पर यह भविष्यवाणी की। [माइक्रो](https://www.youtube.com/watch?v=mlwxdyLnMXM&t=872s)
reviewed: true