question: کدام فرمان امضا شده توسط فرانکلین دی. روزولت، مالکیت طلا را برای افراد در ایالات متحده بین سال‌های ۱۹۳۳ تا ۱۹۷۵ ممنوع کرد؟
answer: فرمان اجرایی 6102
wrong_answers:
  - قانون فدرال رزرو
  - قانون گلس-استیگال
  - فرمان اجرایی ۹۰۶۶
explanation: |
  این فرمان اجرایی که در تاریخ ۵ آوریل ۱۹۳۳ امضا شد، توسط روزولت به عنوان بخشی از نیو دیل به اجرا درآمد. این فرمان توسط قانون ذخیره طلای سال ۱۹۳۴ تقویت شد.
reviewed: false