question: ای‌گلد چه بود؟
answer: یک ارز دیجیتال که توسط مقدار معادل طلا ذخیره‌شده در یک خزانه پشتیبانی می‌شود
wrong_answers:
  - یک واحد پول در دنیای وارکرفت
  - یک مفهوم ارز دیجیتال که انتشار آن بر اساس Proof of Work بود
  - یک سیستم آنلاین Exchange برای جواهرات طلا
explanation: |
  سیستم توسط داگلاس جکسون و بری داونی در سال ۱۹۹۶ تأسیس شد و با یک مرورگر وب ساده قابل دسترسی بود.
reviewed: false