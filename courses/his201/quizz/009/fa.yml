question: در چه سالی سیستم Liberty Reserve توسط مقامات ایالات متحده تعطیل شد؟
answer: ۲۰۱۳
wrong_answers:
  - ۲۰۰۷
  - ۲۰۰۹
  - ۲۰۱۱
explanation: |
  در 24 مه 2013، بنیان‌گذار آن، آرتور بودوفسکی، و همکاران اصلی‌اش متهم و دستگیر شدند و سایت اصلی توسط وزارت دادگستری ایالات متحده توقیف شد.
reviewed: false