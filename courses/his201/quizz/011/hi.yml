question: जी.डब्लू.-0 नाकामोटो ने अपने लेखन में किस निजी मुद्रा प्रणाली का स्पष्ट उल्लेख किया?
answer: लिबरटी रिजर्व
wrong_answers:
  - ई-गोल्ड
  - लिबर्टी डॉलर
  - ई-बुलियन
explanation: |
  यह वास्तव में Bitcoin के समय भी सक्रिय था, ई-गोल्ड और लिबर्टी डॉलर के विपरीत। Satoshi में 2002 में बनाई गई डिजिटल गोल्ड करेंसी पेकुनिक्स का भी उल्लेख किया गया है।
reviewed: true