question: چه نامی به مسئله اجماع در یک شبکه توزیع‌شده داده می‌شود؟
answer: مسئله ژنرال‌های بیزانسی
wrong_answers:
  - مشکل سنتوریون‌های رومی
  - مشکل سرهنگ‌های آلبانیایی
  - مشکل تایشوهای ژاپنی
explanation: |
  نام این مسئله (که توسط لمپورت، شستاک و پیس در سال ۱۹۸۲ رسمی شد) به‌گونه‌ای انتخاب شد که خواننده را ناراحت نکند، زیرا هیچ‌کس تاکنون خود را بیزانسی معرفی نکرده است.
reviewed: false