question: Satoshi नाकामोटो द्वारा Bitcoin श्वेत पत्र में प्रमाणित टाइमस्टैम्पिंग पर उनके कार्य के लिए किन शोधकर्ताओं का उल्लेख किया गया था?
answer: स्टुअर्ट हैबर और स्कॉट स्टोर्नेटा
wrong_answers:
  - लेस्ली लैम्पॉर्ट, रॉबर्ट शोस्टक, और मार्शल पीज़
  - सिंथिया ड्वॉर्क और मोनी नाओर
  - रोनाल्ड रिवेस्ट और आदि शमीर
explanation: |
  श्वेत पत्र में 1990 के दशक के हैबर और स्टोर्नेटा के तीन शोधपत्रों का हवाला दिया गया है। वे [पहला टाइमस्टैम्प्ड Blockchain](https://www.vice.com/en/article/j5nzx4/what-was-the-first-Blockchain) बनाने के लिए जाने जाते हैं, जिसे 1992 में न्यूयॉर्क टाइम्स में प्रकाशित किया गया था।
reviewed: true