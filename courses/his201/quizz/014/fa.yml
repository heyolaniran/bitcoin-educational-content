question: چه کسی مفهوم Proof of Work را اختراع کرد؟
answer: سینتیا دورک و مونی نائور
wrong_answers:
  - مارکوس جاکوبسون و آری جولز
  - آدام بک
  - Satoshi ناکاموتو
explanation: |
  آن‌ها این مفهوم را در سال ۱۹۹۲ توصیف کردند. مارکوس جاکوبسون و آری جولز اصطلاح Proof of Work را ابداع کردند. آدام بک بعدها این مفهوم را برای هش‌کش به کار گرفت.
reviewed: false