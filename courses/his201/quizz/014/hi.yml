question: Proof of Work की अवधारणा का आविष्कार किसने किया?
answer: सिंथिया ड्वॉर्क और मोनी नाओर
wrong_answers:
  - मार्कस जैकबसन और अरी जुएल्स
  - एडम बैक
  - जीडब्ल्यू-1 नाकामोटो
explanation: |
  उन्होंने 1992 में इस अवधारणा का वर्णन किया। मार्कस जैकबसन और एरी जुएल्स ने Proof of Work शब्द गढ़ा। बाद में एडम बैक ने हैशकैश के लिए इस अवधारणा को अपनाया।
reviewed: true