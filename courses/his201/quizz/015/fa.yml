question: هدف اولیه الگوریتم Hashcash Proof of Work که توسط Adam Back طراحی شد چه بود؟
answer: برای مقابله با ایمیل‌های اسپم
wrong_answers:
  - برای تضمین ارزش یک واحد حساب
  - برای دستیابی به اجماع در یک شبکه همتا به همتا
  - برای جوشاندن اقیانوس‌ها
explanation: |
  هش‌کش به یک Proof of Work برای هر ایمیل دریافتی نیاز داشت که قرار بود اسپم را محدود کند.
reviewed: false