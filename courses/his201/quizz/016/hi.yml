question: Bitcoin श्वेत पत्र में Satoshi नाकामोटो द्वारा किस इलेक्ट्रॉनिक मनी अवधारणा का स्पष्ट रूप से उल्लेख किया गया था?
answer: बी-मनी (वेई दाई)
wrong_answers:
  - बिट गोल्ड (निक स्ज़ाबो)
  - आरपीओडब्ल्यू (हैल फिन्नी)
  - ईकैश (डेविड चाउम)
explanation: |
  यह पहला संदर्भ था। जीडब्ल्यू-2 ने इसे अगस्त 2008 में वेई दाई के साथ बातचीत के बाद जोड़ा था।
reviewed: true