question: نیک سابو اولین بار مفهوم بیت گلد را در سال ۱۹۹۸ کجا ارائه کرد؟
answer: لیست پستی libtech-l
wrong_answers:
  - لیست پستی سایفرپانک‌ها
  - لیست پستی رمزنگاری
  - لیست پستی اکستروپیان‌ها
explanation: |
  این لیست پستی خصوصی خودش بود که شامل سایفرپانک‌هایی مانند وی دای و هال فینی و اقتصاددانانی مانند لری وایت و جورج سلگین می‌شد.
