question: چه چیزی RPOW را در مقایسه با سایر مفاهیم ارز دیجیتال مانند eCash، b-money و bit gold منحصر به فرد می‌کرد؟
answer: این بر اساس یک سرور شفاف بود
wrong_answers:
  - از Proof of Work استفاده کرد
  - واحد حساب آن توسط هیچ چیزی پشتیبانی نمی‌شد
  - کاربران به جای حساب‌ها، یادداشت‌های دیجیتالی با ارزش‌های خاص را نگه می‌داشتند.
explanation: |
  از Proof of Work مانند b-money و bit gold استفاده کرد. هیچ پشتیبانی مانند bit gold وجود نداشت. مانند eCash (و مانند Bitcoin بعداً)، RPOW اجازه نگهداری یادداشت‌های دیجیتال فردی را می‌داد، به جای یک حساب، و از این نظر نسبتاً محرمانه بود.
reviewed: false