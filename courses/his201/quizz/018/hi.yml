question: ईकैश, बी-मनी और बिट गोल्ड जैसी अन्य डिजिटल मुद्रा अवधारणाओं की तुलना में आरपीओडब्ल्यू में क्या अनोखा था?
answer: यह एक पारदर्शी सर्वर पर आधारित था
wrong_answers:
  - इसमें Proof of Work का प्रयोग किया गया
  - इसकी लेखा इकाई किसी भी चीज द्वारा समर्थित नहीं थी
  - उपयोगकर्ताओं के पास खातों के बजाय विशिष्ट मूल्यवर्ग के डिजिटल नोट थे
explanation: |
  इसमें बी-मनी और बिट गोल्ड की तरह Proof of Work का इस्तेमाल किया गया, लेकिन बिट गोल्ड की तरह इसमें कोई बैकिंग नहीं थी। ईकैश (और बाद में Bitcoin की तरह) की तरह, RPOW ने खाते के बजाय व्यक्तिगत डिजिटल नोट रखने की अनुमति दी और इस संबंध में, यह अपेक्षाकृत गोपनीय था।
reviewed: true