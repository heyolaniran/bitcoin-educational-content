question: रयान फूगर द्वारा 2004 में डिजाइन किए गए वितरित क्रेडिट प्रोटोकॉल का नाम क्या था जिसका उल्लेख Satoshi नाकामोटो ने अपने लेखन में कई बार किया था?
answer: लहर
wrong_answers:
  - लहरें
  - सुनामी
  - सूजना
explanation: |
  2009 में, Satoshi ने लिखा कि रिपल इस मायने में अद्वितीय है कि यह विश्वास को केंद्रित करने के बजाय फैलाता है।
reviewed: true