question: What was Satoshi Nakamoto's main inspiration during the initial design of Bitcoin?
answer: eCash (David Chaum)
wrong_answers:
  - b-money (Wei Dai)
  - bit gold (Nick Szabo)
  - RPOW (Hal Finney)
explanation: |
  Despite their great similarities, Satoshi's main inspiration was not the models of b-money, bit gold, and RPOW because he was simply not aware of them before August 2008.
reviewed: true
