question: Bitcoin के प्रारंभिक डिजाइन के दौरान Satoshi नाकामोटो की मुख्य प्रेरणा क्या थी?
answer: ईकैश (डेविड चाउम)
wrong_answers:
  - बी-मनी (वेई दाई)
  - बिट गोल्ड (निक स्ज़ाबो)
  - आरपीओडब्ल्यू (हैल फिन्नी)
explanation: |
  इनमें काफी समानता होने के बावजूद, Satoshi की मुख्य प्रेरणा बी-मनी, बिट गोल्ड और RPOW मॉडल नहीं थे, क्योंकि अगस्त 2008 से पहले वह इनके बारे में जानता ही नहीं था।
reviewed: true