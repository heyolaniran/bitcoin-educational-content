question: Who was the first person that Satoshi Nakamoto contacted in August 2008?
answer: Adam Back
wrong_answers:
  - Wei Dai
  - Hal Finney
  - James A. Donald
explanation: |
  He contacted him on August 20th, informing him he would cite his Hashcash paper in the white paper. After responding, Adam Back directed him to Wei Dai (for his concept of b-money), with whom Satoshi communicated two days later.
reviewed: true
