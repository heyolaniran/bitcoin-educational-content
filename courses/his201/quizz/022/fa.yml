question: اولین فردی که در آگوست ۲۰۰۸ توسط Satoshi Nakamoto تماس گرفته شد چه کسی بود؟
answer: آدام بک
wrong_answers:
  - وی دای
  - هال فینی
  - جیمز ای. دونالد
explanation: |
  او در تاریخ ۲۰ اوت با او تماس گرفت و پرسید چگونه مقاله‌اش درباره Hashcash را در وایت پیپر ذکر کند. پس از پاسخ، آدام بک او را به وی دای (برای مفهوم b-money) ارجاع داد که Satoshi دو روز بعد با او ارتباط برقرار کرد.
reviewed: false