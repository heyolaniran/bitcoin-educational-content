question: Satoshi ناکاموتو کاغذ سفید Bitcoin را در تاریخ 31 اکتبر 2008 کجا منتشر کرد؟
answer: لیست پستی رمزنگاری
wrong_answers:
  - ردیت
  - توییتر
  - هکرنیوز
explanation: |
  به عنوان جانشین لیست پستی سایفرپانک‌ها، این لیست پستی ایمیل از سال ۱۹۹۶ توسط توسعه‌دهنده پری متزگر مدیریت می‌شد.
reviewed: false