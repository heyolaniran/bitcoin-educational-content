question: زمان دقیق راه‌اندازی شبکه نمونه اولیه Bitcoin در سال 2009 چه زمانی بود؟
answer: 9 ژانویه 2009، ساعت 02; 54; 25 به وقت هماهنگ جهانی (UTC)
wrong_answers:
  - ۳ ژانویه ۲۰۰۹، ساعت ۱۸:۱۵:۰۵ به وقت هماهنگ جهانی (UTC)
  - ۸ ژانویه ۲۰۰۹، ساعت ۱۹: ۲۷؛ ۴۰ به وقت هماهنگ جهانی (UTC)
  - ۱۲ ژانویه ۲۰۰۹، ساعت ۰۳: ۳۰؛ ۲۵ به وقت هماهنگ جهانی (UTC)
explanation: |
  این Timestamp از بلوک 1 از Blockchain است که توسط Satoshi ناکاموتو استخراج شد پس از اینکه کد نرم‌افزار را چند ساعت قبل‌تر در لیست پستی منتشر کرده بود. بلوک Genesis (0) بین 3 و 8 ژانویه ایجاد شد، اما شبکه واقعی به معنای واقعی کلمه وجود نداشت.
reviewed: false