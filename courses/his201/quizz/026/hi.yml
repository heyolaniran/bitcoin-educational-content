question: 31 अक्टूबर 2008 को Bitcoin के डिज़ाइन में कौन सा तत्व गायब था?
answer: इकाइयों की परिमित मात्रा
wrong_answers:
  - जीडब्ल्यू-1
  - सरलीकृत भुगतान सत्यापन
  - जीडब्ल्यू-2
explanation: |
  प्रारंभिक मौद्रिक नीति निरंतर जारीकरण (एक्स बीटीसी / ब्लॉक) के अनुरूप थी जैसा कि श्वेत पत्र के पहले संस्करण और जीडब्ल्यू -3 के [एक्सचेंज](https://www.metzdowd.com/pipermail/cryptography/2008-November/014831.html) रे डिलिंगर के साथ संकेत दिया गया है।
reviewed: true