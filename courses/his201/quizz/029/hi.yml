question: जनवरी 2009 में साइफरपंक के संस्थापक सदस्य जॉन गिलमोर ने Satoshi नाकामोटो के आविष्कार की क्या आलोचना की?
answer: Bitcoin ग्रह को प्रदूषित करता है
wrong_answers:
  - Bitcoin कर चोरी को बढ़ावा देता है
  - Bitcoin सिबिल हमलों के प्रति संवेदनशील है
  - Bitcoin अपस्फीतिकारी है
explanation: |
  उन्होंने बिजली की खपत और कार्बन डाइऑक्साइड (एक ग्रीनहाउस गैस) उत्पन्न करने के लिए Bitcoin की आलोचना की।
reviewed: true