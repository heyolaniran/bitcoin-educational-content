question: تاریخ تولدی که توسط Satoshi ناکاموتو در انجمن P2P Foundation ذکر شده بود چه بود؟
answer: ۵ آوریل ۱۹۷۵
wrong_answers:
  - ۳ آوریل ۱۹۷۳
  - ۵ آوریل ۱۹۷۳
  - ۳ آوریل ۱۹۷۵
explanation: |
  این تاریخ ترکیبی به ممنوعیت مالکیت طلا توسط شهروندان آمریکایی بین سال‌های ۱۹۳۳ تا ۱۹۷۵ اشاره دارد: ۵ آوریل روزی است که این ممنوعیت در سال ۱۹۳۳ (دستور اجرایی ۶۱۰۲) وضع شد و سال ۱۹۷۵ زمانی است که این ممنوعیت لغو شد (قانون عمومی ۹۳-۳۷۳).
reviewed: false