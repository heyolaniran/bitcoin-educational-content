question: P2P फाउंडेशन फोरम पर Satoshi नाकामोटो द्वारा सूचीबद्ध जन्म तिथि क्या थी?
answer: 5 अप्रैल, 1975
wrong_answers:
  - 3 अप्रैल, 1973
  - 5 अप्रैल, 1973
  - 3 अप्रैल, 1975
explanation: |
  यह संयुक्त तिथि 1933 और 1975 के बीच अमेरिकी नागरिकों के लिए सोना रखने पर प्रतिबन्ध को संदर्भित करती है: 5 अप्रैल वह दिन है जब 1933 में यह प्रतिबन्ध लगाया गया था (कार्यकारी आदेश 6102), और वर्ष 1975 वह दिन है जब इसे निरस्त कर दिया गया था (सार्वजनिक कानून 93-373)।
reviewed: true