question: مهندس گوگل مایک هرن به کدام سیستم ارز دیجیتال علاقه‌مند بود قبل از کشف Bitcoin؟
answer: ریپل
wrong_answers:
  - لیبرتی رزرو
  - eLD
  - RPOW
explanation: |
  اولین بار در آوریل 2009 بود که رایان فوگر در گروه گوگل پروژه‌اش درباره Bitcoin شنید. او بلافاصله با Satoshi تماس گرفت تا سوالاتی بپرسد.
reviewed: false