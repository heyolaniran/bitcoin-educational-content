question: نام فنلاندی جوانی که در سال 2009 به Satoshi در ارتباطات مربوط به پروژه‌اش کمک کرد، به ویژه با مدیریت وب‌سایت و انجمن Bitcoin، چه بود؟
answer: مارتتی مالمی
wrong_answers:
  - مایک هرن
  - گوین آندرسن
  - RPOW
explanation: |
  او در آوریل ۲۰۰۹ با Satoshi تماس گرفت. Satoshi بلافاصله او را موظف به نوشتن یک FAQ و یک ارائه برای وب‌سایت کرد. مارتتی مالمی بیش از یک سال دست راست Satoshi بود.
reviewed: false