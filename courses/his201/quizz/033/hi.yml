question: 2009 के किस Miner ने 2013 में अपने कंप्यूटर को कूड़ेदान में फेंक कर अपने सभी बिटकॉइन खो दिए?
answer: जेम्स हॉवेल्स
wrong_answers:
  - डस्टिन ट्रैमेल
  - मार्टी माल्मी
  - न्यूलिबर्टीस्टैंडर्ड
explanation: |
  इस ब्रिटिश इंजीनियर ने फरवरी और अप्रैल 2009 के बीच अपने कंप्यूटर से 8,000 बिटकॉइन उत्पन्न किए थे। उनके मामले को गार्जियन द्वारा [प्रचारित](https://www.theguardian.com/technology/2013/nov/27/Hard-drive-Bitcoin-landfill-site) किया गया था।
reviewed: true