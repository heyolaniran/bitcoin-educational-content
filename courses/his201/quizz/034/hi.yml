question: अक्टूबर 2009 में Bitcoin और डॉलर के बीच पहली Exchange सेवा किसने स्थापित की?
answer: न्यूलिबर्टीस्टैंडर्ड
wrong_answers:
  - सिरियस-एम
  - dwडॉलर
  - बहुत ज्यादा धुआँ
explanation: |
  यह सेवा प्राथमिक थी: ईमेल के ज़रिए लेन-देन पर बातचीत की जाती थी और भुगतान PayPal के ज़रिए किया जाता था। Exchange दर न्यूलिबर्टीस्टैंडर्ड की अपनी Mining लागतों पर आधारित थी।
reviewed: true