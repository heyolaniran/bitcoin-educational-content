question: اولین Exchange بین Bitcoin و دلار چه زمانی اتفاق افتاد؟
answer: ۱۲ اکتبر ۲۰۰۹
wrong_answers:
  - ۸ مه ۲۰۰۹
  - ۳۰ دسامبر ۲۰۰۹
  - ۱۱ مارس ۲۰۱۰
explanation: |
  مارتتی ۵,۰۵۰ بیت‌کوین به NLS منتقل کرد، که سپس ۵.۰۲ دلار به حساب پی‌پال او منتقل کرد. این معادل قیمت واحد حدود $0.001 بود.
reviewed: false