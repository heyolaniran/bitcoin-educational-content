question: چه کسی اولین لوگوی واقعی Bitcoin (یک حرف بزرگ B طلایی که توسط دو خط عمودی قطع شده است) را در فوریه 2010 طراحی کرد؟
answer: Satoshi ناکاموتو
wrong_answers:
  - نیو لیبرتی استاندارد
  - مارتتی مالمی
  - بیت‌بوی
explanation: |
  او از پیشنهاد NewLibertyStandard برای استفاده از نماد بات تایلند (฿) استفاده کرد. لوگوی نارنجی بعداً توسط کسی به نام بیت‌بوی ایجاد شد.
reviewed: false