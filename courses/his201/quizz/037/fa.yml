question: کدام سرویس Exchange که در مارس 2010 ایجاد شد، قبل از ظهور Mt. Gox در جولای محبوب‌ترین بود؟
answer: Bitcoin بازار
wrong_answers:
  - بیت‌کوینFX
  - بیت‌کوین‌اکسچنج
  - مای‌بیت‌کوین
explanation: |
  این یک بازار همتا به همتا با استفاده از PayPal بود که در 16 مارس 2010 توسط فردی به نام dwdollar راه‌اندازی شد و قبل از Mt. Gox پلتفرم اصلی بود.
reviewed: false