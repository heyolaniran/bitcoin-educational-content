question: अप्रैल 2010 में बनाए गए मोबाइल पर Bitcoin के सरल उपयोग की अनुमति देने वाले पहले कस्टोडियल एप्लिकेशन का नाम क्या था?
answer: मायबिटकॉइन
wrong_answers:
  - जीडब्ल्यू-1 जीडब्ल्यू-2
  - बीटीसी 2 पीएससी
  - गोपनीयता शार्क
explanation: |
  इसे 30 अप्रैल 2010 को कोमोडो नामक किसी व्यक्ति द्वारा फोरम पर [प्रचारित](https://bitcointalk.org/index.php?topic=30.msg1035#msg1035) किया गया था।
reviewed: true