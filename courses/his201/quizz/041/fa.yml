question: در چه تاریخی جرمی استوردیوانت دو پیتزا را به لازلو هانیچز در Exchange تحویل داد و در ازای آن ۱۰,۰۰۰ بیت‌کوین دریافت کرد، که به عنوان اولین خرید کالای فیزیکی با ارز دیجیتال شناخته می‌شود؟
answer: ۲۲ مه ۲۰۱۰
wrong_answers:
  - ۱۲ اکتبر ۲۰۰۹
  - ۱۸ آوریل ۲۰۱۰
  - ۱۱ ژوئن ۲۰۱۰
explanation: |
  پس از اعلامیه‌ای که در انجمن منتشر شد، پیشنهاد در 22 مه 2010 پذیرفته شد. در آن زمان، 10,000 بیت‌کوین حدود 44 دلار ارزش داشت.
reviewed: false