question: På vilket datum levererade Jeremy Sturdivant två pizzor till Laszlo Hanyecz i Exchange mot en betalning på 10 000 bitcoins, vilket markerade det första köpet av en fysisk vara med kryptovaluta?
answer: 22 maj 2010
wrong_answers:
  - 12 oktober 2009
  - 18 april 2010
  - 11 juni 2010
explanation: |
  Efter ett meddelande som publicerades på forumet accepterades erbjudandet den 22 maj 2010. Vid den tidpunkten var de 10.000 bitcoins värda cirka 44 USD.
reviewed: true