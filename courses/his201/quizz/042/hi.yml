question: गैविन एंड्रेसन, जिन्होंने जून 2010 में पहला Bitcoin Faucet बनाया और सॉफ्टवेयर विकसित करने में Satoshi की सहायता की, मूल रूप से किस देश से हैं?
answer: ऑस्ट्रेलिया
wrong_answers:
  - संयुक्त राज्य
  - फ्रांस
  - नीदरलैंड
explanation: |
  उनका जन्म ऑस्ट्रेलिया में हुआ था लेकिन उन्होंने 2004 में अमेरिकी नागरिकता प्राप्त कर ली थी।
reviewed: true