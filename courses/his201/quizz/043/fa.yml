question: Bitcoin Faucet که در ژوئن 2010 توسط گاوین آندرسن ایجاد شد، چه چیزی ارائه داد؟
answer: بیت‌کوین‌ها
wrong_answers:
  - کارت‌های خرید
  - تخفیف‌های هزینه برای بازار Bitcoin
  - شانس استخراج یک بلوک
explanation: |
  این سرویس در ابتدا ۵ بیت‌کوین به ازای هر درخواست توزیع می‌کرد تا به مردم اجازه دهد سیستم را امتحان کنند. این مقدار به مرور زمان کاهش یافت و Faucet در سال ۲۰۱۲ بسته شد.
reviewed: false