question: मुख्य Bitcoin नेटवर्क को नुकसान से बचाने के लिए परीक्षण नेटवर्क स्थापित करने का विचार किसके दिमाग में आया?
answer: गैविन एन्ड्रेसन
wrong_answers:
  - जीडब्ल्यू-1 नाकामोटो
  - मार्टी माल्मी
  - लास्ज़लो हनयेज़
explanation: |
  उन्होंने 9 जून को फोरम पर इस विचार का उल्लेख किया और Satoshi ने इसे मंजूरी दे दी। उन्होंने 15 जुलाई को Testnet बनाया।
reviewed: true