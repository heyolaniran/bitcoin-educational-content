question: نام وب‌سایتی که به طور قابل توجهی به شناخته شدن Bitcoin در ژوئیه 2010 کمک کرد چیست؟
answer: اسلش‌دات
wrong_answers:
  - هکرنیوز
  - استک اورفلو
  - ردیت
explanation: |
  در 11 ژوئیه 2010، ارائه‌ای از Bitcoin نوشته شده توسط Teppy در این سایت محبوب منتشر شد که منجر به هجوم گسترده کاربران شد.
reviewed: false