question: जुलाई 2010 में अपने संचार में Bitcoin के किस पहलू को Satoshi कम महत्व देना चाहता था?
answer: लेन-देन की गुमनामी
wrong_answers:
  - मौद्रिक नीति
  - ई-कॉमर्स
  - प्रोग्रामिंग
explanation: |
  स्लैशडॉट के लिए ड्राफ्ट प्रेजेंटेशन के बारे में उन्होंने कहा कि वे गुमनाम पहलू पर ज़ोर नहीं देना चाहते थे। उन्होंने मार्टी माल्मी को [निजी तौर पर](https://mmalmi.github.io/Satoshi/#email-197) अपने कारण बताए।
reviewed: true