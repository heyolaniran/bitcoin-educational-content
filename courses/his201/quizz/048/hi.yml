question: Bitcoin को स्वीकार करने वाली कौन सी सेवा टेपी द्वारा प्रबंधित की गई थी, जिसने 11 जुलाई 2010 को स्लैशडॉट पर Bitcoin को पेश किया था?
answer: MMORPG रेगिस्तान में एक कहानी
wrong_answers:
