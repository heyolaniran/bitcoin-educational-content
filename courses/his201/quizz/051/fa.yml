question: چه آسیب‌پذیری‌ای که توسط ArtForz در ۲۸ ژوئیه ۲۰۱۰ گزارش شد، اجازه می‌داد بیت‌کوین‌ها از هر Address با استفاده از یک اسکریپت خاص خرج شوند؟
answer: باگ 1 RETURN
wrong_answers:
  - باگ سرریز مقدار
  - اشکال OP_NOP
  - LSHIFT باگ
explanation: |
  این نقص مورد سوءاستفاده قرار نگرفت. Satoshi به سرعت اصلاحیه را در نرم‌افزار گنجاند و به همه کاربران توصیه کرد که ارتقاء دهند.
reviewed: false