question: حداکثر اندازه بلوکی که توسط Satoshi به پروتکل Bitcoin در سپتامبر 2010 اضافه شد چه بود؟
answer: ۱ مگابایت
wrong_answers:
  - ۲ مگابایت
  - ۴ مگابایت
  - ۸ مگابایت
explanation: |
  پارامتر MAX_BLOCK_SIZE در ماه ژوئیه اضافه شد، سپس محدودیت از ۱۲ سپتامبر بر روی تمام گره‌های شبکه اعمال شد.
reviewed: false