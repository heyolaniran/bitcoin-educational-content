question: Vilken var den maximala blockstorleken som Satoshi lade till i Bitcoin-protokollet i september 2010?
answer: 1 MB
wrong_answers:
  - 2 MB
  - 4 MB
  - 8 MB
explanation: |
  Parametern MAX_BLOCK_SIZE lades till i juli och begränsningen tillämpades på alla nätverksnoder den 12 september.
reviewed: true