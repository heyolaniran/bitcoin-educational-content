question: چه چیزی در تابستان 2010 اضافه شد که به دنبال آن اجازه داد تا Soft در Bitcoin فورک شود؟
answer: کدهای عملیات OP_NOP
wrong_answers:
  - سیستم هشدار
  - حد اندازه بلوک
  - قالب تراکنش استاندارد
explanation: |
  این‌ها دستورالعمل‌های بدون عملیات بودند که در صورت اجرا، اسکریپت را نامعتبر نمی‌کردند. آن‌ها افزودن OP_CHECKLOCKTIMEVERIFY و OP_CHECKSEQUENCEVERIFY به پروتکل در سال‌های ۲۰۱۵/۲۰۱۶ را ممکن ساختند.
reviewed: false