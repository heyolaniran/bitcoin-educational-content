question: پس از حادثه سرریز ارزش، چه مکانیزمی توسط Satoshi به نرم‌افزار اضافه شد تا تأثیر آسیب‌پذیری‌های احتمالی بر سیستم را محدود کند؟
answer: سیستم هشدار
wrong_answers:
  - ماهیت استاندارد معاملات
  - حد اندازه بلوک
  - کدهای عملیاتی OP_NOP
explanation: |
  این سیستم هشدار مؤثر به او اجازه داد تا با استفاده از یک کلید خصوصی، در صورت بروز مشکل فنی، به گره‌های شبکه هشدار دهد و برخی از دستورات API را به حالت تعلیق درآورد.
reviewed: false