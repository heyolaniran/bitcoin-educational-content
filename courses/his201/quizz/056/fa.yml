question: الگوهای خروجی استاندارد اسکریپت که توسط نرم‌افزار در سپتامبر 2010 شناسایی شدند چه بودند؟
answer: دریافت توسط کلید عمومی (P2PK) و دریافت توسط Address (P2PKH)
wrong_answers:
  - دریافت توسط یک Address (P2PKH) و دریافت توسط یک اسکریپت امضای چند امضایی (P2MS)
  - رسید توسط یک Address (P2PKH) و رسید توسط یک اسکریپت (P2SH)
  - دریافت توسط کلید عمومی (P2PK) و دریافت توسط اسکریپت (P2SH)
explanation: |
  این‌ها دو نوعی بودند که از ابتدای Bitcoin استفاده می‌شدند. نوع P2MS در مارس 2012 استاندارد شد. نوع P2SH در آوریل 2012 به پروتکل اضافه شد.
reviewed: false