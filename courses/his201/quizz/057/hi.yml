question: किस जर्मन Miner ने 2010 में कई महीनों तक Bitcoin नेटवर्क की Hash दर का 20% हिस्सा अपने पास रखा था?
answer: आर्टफोर्ज़
wrong_answers:
  - टीसीएटीम
  - m0mchil
  - नाइटएमबी
explanation: |
  उन्होंने 2010 की गर्मियों के दौरान ग्राफिक्स कार्डों से बना एक Mining फार्म (जिसे आर्टफार्म कहा जाता है) स्थापित किया, जिससे शरद ऋतु आते-आते उन्हें अपने प्रतिस्पर्धियों पर महत्वपूर्ण बढ़त हासिल हो गई।
reviewed: true