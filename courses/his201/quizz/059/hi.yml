question: 18 सितम्बर 2010 को जेफ गार्ज़िक से मिले उदार दान के बाद किस फोरम सदस्य ने अपना Mining एल्गोरिथम सार्वजनिक किया?
answer: पुडिनपॉप
wrong_answers:
  - नेलिस्की
  - m0mchil
  - टीसीएटीम
explanation: |
  तब तक, वे अपने सॉफ़्टवेयर के उपयोग पर कमीशन से लाभ कमा रहे थे। उन्होंने इसे एक निःशुल्क लाइसेंस के तहत [प्रकाशित](https://bitcointalk.org/index.php?topic=133.msg13135#msg13135) किया।
reviewed: true