question: کدام تابع، که در اکتبر 2010 توسط Miner m0mchil طراحی شد، به نودهای کلاینت اجازه می‌داد تا یک بلوک کاندید را بازیابی کرده و در صورت یافتن راه‌حل، Proof of Work را برگردانند؟
answer: دریافت‌کار
wrong_answers:
  - استراتوم
  - gethash
  - گت‌کردیت
explanation: |
  این در تاریخ ۱ اکتبر منتشر شد. Satoshi نسخه اصلاح‌شده‌ای از این تابع را در نرم‌افزار اصلی در تاریخ ۲۳ نوامبر گنجاند.
reviewed: false