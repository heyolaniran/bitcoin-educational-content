question: जुलाई 2010 में Bitcoin फोरम का पहला गैर-अंग्रेजी उप-फोरम किस भाषा को समर्पित था?
answer: रूसी
wrong_answers:
  - फ्रेंच
  - जर्मन
  - इतालवी
explanation: |
  इसे 28 जुलाई को मार्टी माल्मी द्वारा [स्थापित](https://bitcointalk.org/index.php?topic=151.msg6241#msg6241) किया गया था। अगले महीनों में अन्य भाषाओं को जोड़ा गया।
reviewed: true