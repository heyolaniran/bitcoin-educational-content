question: Bitcoin का परिचय देने वाले प्रथम लेख का लेखक कौन था जो फ्रेंच भाषा में प्रकाशित हुआ था?
answer: लुसिएन ग्रोंडिन (ग्रोंडिलु)
wrong_answers:
  - लियोनेल ड्रिकोट (प्लौम)
  - अमौरी सेचेट (डेडलनिक्स)
  - डेविड फ़्राँस्वा (डेवाउट)
explanation: |
  यह [text](https://linuxfr.org/news/connaissez-vous-les-bitcoins) 30 सितंबर 2010 को LinuxFr.org पर प्रकाशित हुआ था, जिसका शीर्षक था क्या आप बिटकॉइन के बारे में जानते हैं?
reviewed: true