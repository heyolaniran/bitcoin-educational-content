question: जॉन मैटोनिस द्वारा संचालित ब्लॉग का नाम क्या था जिसमें डिजिटल मुद्राओं (मार्च 2010 से Bitcoin सहित) को कवर किया गया था?
answer: मौद्रिक भविष्य
wrong_answers:
  - क्लासिक आर्थिक अध्ययन
  - नकदी पर वापसी
  - नाकामोटो संस्थान
explanation: |
  Satoshi के साथ ईमेल का आदान-प्रदान करने के बाद, उन्होंने 13 मार्च 2010 को Bitcoin पर अपना पहला लेख प्रकाशित किया।
reviewed: true