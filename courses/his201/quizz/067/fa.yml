question: کدام سازمان پس از لابی‌گری جامعه در نوامبر ۲۰۱۰ شروع به پذیرش Bitcoin کرد؟
answer: بنیاد مرز الکترونیک
wrong_answers:
  - ویکی‌لیکس
  - صلیب سرخ
  - عفو بین‌الملل
explanation: |
  این سازمان که در سال ۱۹۰۰ توسط میچ کاپور، جان گیل‌مور و جان پری بارلو تأسیس شد، هدفش حفاظت از آزادی‌های اینترنتی بود. این سازمان از ۹ نوامبر شروع به پذیرش Bitcoin کرد.
reviewed: false