question: Bitcoin की खोज के कुछ महीने बाद, अगस्त 2009 में Cypherpunk हैल फिन्नी को किस बीमारी का पता चला?
answer: लू गेह्रिग रोग
wrong_answers:
  - हंटिंगटन रोग
  - अल्ज़ाइमर रोग
  - पार्किंसंस रोग
explanation: |
  अंग्रेजी बोलने वाली दुनिया में एमियोट्रोफिक लेटरल स्क्लेरोसिस (एएलएस) के रूप में जानी जाने वाली इस बीमारी का निदान अगस्त 2009 में किया गया था। 2014 में इस बीमारी से उनका निधन हो गया।
reviewed: true