question: چه کسی پیشنهاد داد که با سازمان ویکی‌لیکس تماس گرفته شود تا آنها را تشویق به پذیرش Bitcoin در نوامبر 2010 کنند؟
answer: امیر تاکی
wrong_answers:
  - ولادیمیر فان در لان
  - رابرت هورنینگ
  - Satoshi ناکاموتو
explanation: |
  او با نوشتن اینکه سازمان چندین بار شاهد مسدود شدن وجوه خود بوده است، آن را توجیه کرد. به طور خاص، مانی‌بوکرز حساب ویکی‌لیکس را در ماه اکتبر مسدود کرده بود.
reviewed: false