question: दिसंबर 2010 में जी.डब्लू.-0 नाकामोटो के अचानक चले जाने का क्या कारण था?
answer: Bitcoin और विकीलीक्स को जोड़ने वाले एक लेख का प्रकाशन
wrong_answers:
  - विकीलीक्स द्वारा Bitcoin की स्वीकृति
  - गैविन एंड्रेसन ने कोड का नियंत्रण अपने हाथ में ले लिया
  - Bitcoin की इकाई कीमत में वृद्धि
explanation: |
  "क्या विकीलीक्स घोटाला नई आभासी मुद्रा को जन्म दे सकता है?" शीर्षक से यह लेख पीसी वर्ल्ड पर प्रकाशित हुआ था, जो कंप्यूटिंग के लिए समर्पित सबसे बड़ी अमेरिकी वेबसाइटों में से एक है।
reviewed: true