question: जी.डब्लू.-0 ने कंपनी छोड़ते समय सॉफ्टवेयर विकास की जिम्मेदारियां किसे सौंपी?
answer: गैविन एन्ड्रेसन
wrong_answers:
  - मार्टी माल्मी
  - जेफ़ गार्ज़िक
  - माइक हर्न
explanation: |
  गैविन ने पहले कहा था कि वह Bitcoin परियोजना को अधिक सक्रिय रूप से प्रबंधित करेंगे और उन्होंने दिसंबर 2010 में GitHub रिपोजिटरी खोली थी।
reviewed: true