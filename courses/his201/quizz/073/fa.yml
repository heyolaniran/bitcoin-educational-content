question: کدام سرویس اطلاعاتی فدرال ایالات متحده در آوریل ۲۰۱۱ از گاوین آندرسن دعوت کرد تا چند ماه بعد Bitcoin را ارائه دهد؟
answer: سیا
wrong_answers:
  - اف‌بی‌آی
  - آژانس امنیت ملی (NSA)
  - DEA
explanation: |
  به طور خاص، این In-Q-Tel بود، یک صندوق سرمایه‌گذاری خطرپذیر آمریکایی که توسط CIA مدیریت می‌شود، اما بازدید واقعاً در مقر CIA انجام شد.
