question: टेम्पल सिटी के उस दूरसंचार इंजीनियर का पहला नाम क्या था, जिसे न्यूज़वीक के एक पत्रकार ने मार्च 2014 में गलती से Satoshi नाकामोटो के रूप में पहचान लिया था?
answer: डोरियन
wrong_answers:
  - अप्रेंटिस
  - जीडब्ल्यू-1
  - पतोशी
explanation: |
  उनका पूरा नाम डोरियन प्रेंटिस Satoshi नाकामोटो था। वे जापानी मूल के थे। [न्यूज़वीक लेख](https://www.newsweek.com/2014/03/14/face-behind-Bitcoin-247957.html) देखें।
reviewed: true