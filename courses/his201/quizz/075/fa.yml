question: نام نرم‌افزار منتشر شده توسط مایک هرن در مارس 2011 که پیاده‌سازی تأیید پرداخت ساده‌شده (SPV) را انجام داد، چه بود؟
answer: بیت‌کوین‌جی
wrong_answers:
  - اسپسمیلو
  - بکوین
  - لیب‌بیت‌کوین
explanation: |
  او آن را تحت مجوز منبع‌باز (Apache 2.0) منتشر کرد، که آن را به گوگل (کارفرمایش در آن زمان) نسبت داد. این پیاده‌سازی امکان راه‌اندازی اولین Wallet سبک‌وزن را که بر روی اندروید اجرا می‌شود، فراهم کرد.
reviewed: false