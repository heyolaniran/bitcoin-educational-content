question: मार्च 2011 में माइक हर्न द्वारा जारी सॉफ्टवेयर कार्यान्वयन का नाम क्या था, जिसने सरलीकृत भुगतान सत्यापन (एसपीवी) को कार्यान्वित किया?
answer: बिटकॉइनजे
wrong_answers:
  - स्पेस्मिलो
  - बीकॉइन
  - लिबिटकॉइन
explanation: |
  उन्होंने इसे ओपन-सोर्स लाइसेंस (अपाचे 2.0) के तहत [प्रकाशित](https://bitcointalk.org/index.php?topic=4236.msg61438#msg61438) किया, जिसका श्रेय उन्होंने Google (उस समय उनके नियोक्ता) को दिया। इस कार्यान्वयन ने Android पर चलने वाले पहले हल्के Wallet को लॉन्च करना संभव बना दिया।
reviewed: true