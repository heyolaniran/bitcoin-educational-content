question: چه کسی سیستم پیشنهادات بهبود Bitcoin را که فرآیندی برای هماهنگی بهبود Bitcoin است، در سپتامبر 2011 افتتاح کرد؟
answer: امیر تاکی
wrong_answers:
  - گوین آندرسن
  - جف گارزیک
  - نیلز اشنایدر
explanation: |
  این سیستم بر اساس پیشنهادات بهبود پایتون (PEP) که مختص زبان برنامه‌نویسی پایتون است، مدل‌سازی شده است.
reviewed: false