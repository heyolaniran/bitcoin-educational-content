question: در چه تاریخی لیست پستی Bitcoin-development ایجاد شد؟
answer: ۱۲ ژوئن ۲۰۱۱
wrong_answers:
  - ۱۳ ژانویه ۲۰۱۱
  - ۷ مارس ۲۰۱۱
  - ۱۹ سپتامبر ۲۰۱۱
explanation: |
  این توسط توسعه‌دهنده جف گارزیک ایجاد شد و امکان بحث‌های رسمی درباره تغییراتی که باید در Bitcoin انجام شود را فراهم کرد.
reviewed: false