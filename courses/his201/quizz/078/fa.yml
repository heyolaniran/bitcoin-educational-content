question: کنترل وب‌سایت (که شامل انجمن و ویکی نیز می‌شود) پس از خروج Satoshi ناکاموتو به چه کسی منتقل شد؟
answer: مارتی مالمی
wrong_answers:
  - گوین آندرسن
  - هال فینی
  - مایک هرن
explanation: |
  او وقت نداشت که آن را مدیریت کند و به سرعت وظیفه را واگذار کرد. سایت و انجمن توسط Theymos و Cøbra تصاحب شدند.
reviewed: false