question: چه کسی اولین ویدئوی با کیفیت بالا درباره Bitcoin را در مارس 2011 تولید کرد؟
answer: استفان توماس
wrong_answers:
  - مایک هیرن
  - کریستین دکر
  - بروس واگنر
explanation: |
  ویدئویی که به سادگی با عنوان What is Bitcoin? نام‌گذاری شده است، از طریق تأمین مالی جمعی توسط جامعه تولید شده است.
reviewed: false