question: نام بنیان‌گذار حزب دزدان دریایی سوئد که در ماه مه 2011 از Bitcoin به عنوان Napster بانکداری یاد کرد چیست؟
answer: ریک فالکوینگ
wrong_answers:
  - اسمار مک‌کارتی
  - ادوارد اسنودن
  - فلوریان هوفسکی
explanation: |
  عاشق آزادی، Bitcoin به نظر او ایده خوبی بود وقتی که آن را کشف کرد. او در سال‌های بعد یکی از مروجان اصلی ارزهای دیجیتال بوده است.