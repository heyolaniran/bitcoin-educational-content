question: Který ministr se na konci 17. století stal pro státníky referencí v oblasti ekonomie?
answer: Colbert
wrong_answers:
  - Turgot
  - Sully
  - Mazarin
explanation: |
  Colbert, ministr financí Ludvíka XIV., zanechal ve své éře stopu intervencionistickou hospodářskou politikou známou jako colbertismus, jejímž cílem byl rozvoj francouzského průmyslu a obchodu. Jeho kroky sloužily jako vzor pro mnoho evropských státníků.