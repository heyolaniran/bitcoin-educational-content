question: Welcher Minister wurde Ende des 17. Jahrhunderts zur Referenz für Staatsmänner, wenn es um Wirtschaftsfragen ging?
answer: Colbert
wrong_answers:
  - Turgot
  - Sully
  - Mazarin
explanation: |
  Colbert, der Finanzminister Ludwigs XIV., prägte seine Ära mit einer interventionistischen Wirtschaftspolitik, die als Colbertismus bekannt wurde und auf die Entwicklung der französischen Industrie und des Handels abzielte. Sein Handeln diente vielen europäischen Staatsmännern als Vorbild.