question: At the end of the 17th century, which minister became the reference for statesmen when it came to economics?
answer: Colbert
wrong_answers:
  - Turgot
  - Sully
  - Mazarin
explanation: |
  Colbert, Louis XIV's finance minister, left his mark on his era with an interventionist economic policy known as Colbertism, aimed at developing French industry and commerce. His actions served as a model for many European statesmen.