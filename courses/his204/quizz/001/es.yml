question: A finales del siglo XVII, ¿qué ministro se convirtió en la referencia de los estadistas en materia de economía?
answer: Colbert
wrong_answers:
  - Turgot
  - Sully
  - Mazarin
explanation: |
  Colbert, ministro de Hacienda de Luis XIV, dejó huella en su época con una política económica intervencionista conocida como colbertismo, destinada a desarrollar la industria y el comercio franceses. Su actuación sirvió de modelo a muchos estadistas europeos.