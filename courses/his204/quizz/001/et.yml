question: Millisest ministrist sai 17. sajandi lõpus riigimeeste jaoks eeskujuks, kui juttu oli majandusest?
answer: Colbert
wrong_answers:
  - Turgot
  - Sully
  - Mazarin
explanation: |
  Louis XIV rahandusminister Colbert jättis oma ajastule oma jälje kolbertismi nime all tuntud sekkuva majanduspoliitikaga, mille eesmärk oli arendada Prantsuse tööstust ja kaubandust. Tema tegevus oli eeskujuks paljudele Euroopa riigimeestele.