question: در پایان قرن هفدهم، کدام وزیر به مرجع سیاستمداران در زمینه اقتصاد تبدیل شد؟
answer: کولبرت
wrong_answers:
  - ترگوٹ
  - سالی
  - مازارین
explanation: |
  کولبر، وزیر دارایی لویی چهاردهم، با سیاست اقتصادی مداخله‌گرانه‌ای به نام کولبریسم که هدف آن توسعه صنعت و تجارت فرانسه بود، بر دوران خود تأثیر گذاشت. اقدامات او به عنوان الگویی برای بسیاری از دولتمردان اروپایی عمل کرد.