question: Kenestä ministeristä tuli 1600-luvun lopulla valtiomiesten viitekehys taloustieteen alalla?
answer: Colbert
wrong_answers:
  - Turgot
  - Sully
  - Mazarin
explanation: |
  Ludvig XIV:n valtiovarainministeri Colbert jätti aikakauteensa jälkensä Colbertismiksi kutsutulla interventionistisella talouspolitiikalla, jonka tavoitteena oli kehittää Ranskan teollisuutta ja kauppaa. Hänen toimintansa toimi mallina monille eurooppalaisille valtiomiehille.