question: À la fin du XVIIe siècle, quel ministre devient la référence des hommes d’État en matière d’économie ?
answer: Colbert
wrong_answers:
  - Turgot
  - Sully
  - Mazarin
explanation: |
  Colbert, ministre des finances de Louis XIV, a marqué son époque par une politique économique interventionniste, le colbertisme, qui visait à développer l'industrie et le commerce français. Son action a servi de modèle pour de nombreux hommes d'État européens.
