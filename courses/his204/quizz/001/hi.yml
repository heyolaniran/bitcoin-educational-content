question: 17वीं शताब्दी के अंत में, अर्थशास्त्र के मामले में कौन सा मंत्री राजनेताओं के लिए संदर्भ बन गया?
answer: कोलबर्ट
wrong_answers:
  - टरगोट
  - मैला करना
  - माज़रीन
explanation: |
  लुई XIV के वित्त मंत्री कोलबर्ट ने अपने युग में हस्तक्षेपवादी आर्थिक नीति के साथ अपनी छाप छोड़ी, जिसे कोलबर्टवाद के नाम से जाना जाता है, जिसका उद्देश्य फ्रांसीसी उद्योग और वाणिज्य का विकास करना था। उनके कार्यों ने कई यूरोपीय राजनेताओं के लिए एक आदर्श के रूप में कार्य किया।