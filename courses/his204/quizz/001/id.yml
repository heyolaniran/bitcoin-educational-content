question: Pada akhir abad ke-17, menteri mana yang menjadi rujukan para negarawan dalam hal ekonomi?
answer: Colbert
wrong_answers:
  - Turgot
  - Sully
  - Mazarin
explanation: |
  Colbert, menteri keuangan Louis XIV, meninggalkan jejaknya di eranya dengan kebijakan ekonomi intervensionis yang dikenal sebagai Colbertisme, yang bertujuan untuk mengembangkan industri dan perdagangan Prancis. Tindakannya menjadi model bagi banyak negarawan Eropa.