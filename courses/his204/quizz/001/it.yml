question: Alla fine del XVII secolo, quale ministro divenne il punto di riferimento per gli statisti in materia di economia?
answer: Colbert
wrong_answers:
  - Turgot
  - Sully
  - Mazzarino
explanation: |
  Colbert, ministro delle finanze di Luigi XIV, ha lasciato il segno nella sua epoca con una politica economica interventista nota come colbertismo, volta a sviluppare l'industria e il commercio francesi. Le sue azioni servirono da modello per molti statisti europei.