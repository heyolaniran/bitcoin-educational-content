question: Hvilken minister ble på slutten av 1600-tallet statsmennenes referanse når det gjaldt økonomi?
answer: Colbert
wrong_answers:
  - Turgot
  - Sully
  - Mazarin
explanation: |
  Ludvig 14.s finansminister Colbert satte sitt preg på sin samtid med en intervensjonistisk økonomisk politikk, kjent som colbertisme, som tok sikte på å utvikle fransk industri og handel. Hans handlinger fungerte som et forbilde for mange europeiske statsmenn.