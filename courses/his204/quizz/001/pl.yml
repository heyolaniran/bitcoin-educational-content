question: Pod koniec XVII wieku, który minister stał się punktem odniesienia dla mężów stanu, jeśli chodzi o ekonomię?
answer: Colbert
wrong_answers:
  - Turgot
  - Sully
  - Mazarin
explanation: |
  Colbert, minister finansów Ludwika XIV, odcisnął piętno na swojej epoce dzięki interwencjonistycznej polityce gospodarczej znanej jako colbertyzm, mającej na celu rozwój francuskiego przemysłu i handlu. Jego działania stanowiły wzór dla wielu europejskich mężów stanu.