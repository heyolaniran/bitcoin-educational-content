question: No final do século XVII, que ministro se tornou a referência para os estadistas em matéria de economia?
answer: Colbert
wrong_answers:
  - Turgot
  - Sully
  - Mazarin
explanation: |
  Colbert, ministro das finanças de Luís XIV, marcou a sua época com uma política económica intervencionista, conhecida como Colbertismo, que visava desenvolver a indústria e o comércio franceses. As suas acções serviram de modelo a muitos estadistas europeus.