question: В конце XVII века какой министр стал эталоном для государственных деятелей, когда речь зашла об экономике?
answer: Кольбер
wrong_answers:
  - Турго
  - Салли
  - Мазарин
explanation: |
  Кольбер, министр финансов Людовика XIV, оставил след в своей эпохе интервенционистской экономической политикой, известной как кольбертизм, направленной на развитие французской промышленности и торговли. Его действия послужили примером для многих европейских государственных деятелей.