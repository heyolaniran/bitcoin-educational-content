question: Krajem 17. veka, koji ministar je postao referenca za državnike kada je reč o ekonomiji?
answer: Kolber
wrong_answers:
  - Turgot
  - Sully
  - Mazarin
explanation: |
  Colbert, ministar finansija Luja XIV, ostavio je trag na svoje doba intervencionističkom ekonomskom politikom poznatom kao kolbertizam, koja je imala za cilj razvoj francuske industrije i trgovine. Njegove akcije su poslužile kao model mnogim evropskim državnicima.