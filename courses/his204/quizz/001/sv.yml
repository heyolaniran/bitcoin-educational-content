question: Vilken minister blev i slutet av 1600-talet en referens för statsmännen när det gällde ekonomi?
answer: Colbert
wrong_answers:
  - Turgot
  - Sully
  - Mazarin
explanation: |
  Colbert, Ludvig XIV:s finansminister, satte sin prägel på sin tid med en interventionistisk ekonomisk politik, känd som Colbertism, som syftade till att utveckla fransk industri och handel. Hans agerande tjänade som förebild för många europeiska statsmän.