question: Mwishoni mwa karne ya 17, ni waziri gani aliyerejelewa na wakuu wa serikali linapokuja suala la uchumi?
answer: Colbert
wrong_answers:
  - Turgot
  - Sully
  - Mazarin
explanation: |
  Colbert, waziri wa fedha wa Louis XIV, aliacha alama yake katika enzi yake na sera ya uingiliaji kati ya uchumi inayojulikana kama Colbertism, inayolenga kukuza tasnia na biashara ya Ufaransa. Vitendo vyake vilitumika kama mfano kwa viongozi wengi wa Uropa.