question: Vào cuối thế kỷ 17, bộ trưởng nào đã trở thành người tham khảo cho các chính khách khi nói đến kinh tế?
answer: Colbert
wrong_answers:
  - Gà lôi
  - Sully
  - Mazarin
explanation: |
  Colbert, bộ trưởng tài chính của Louis XIV, đã để lại dấu ấn của mình trong thời đại của ông với chính sách kinh tế can thiệp được gọi là Colbertism, nhằm mục đích phát triển công nghiệp và thương mại của Pháp. Hành động của ông là hình mẫu cho nhiều chính khách châu Âu.