question: Který král byl Sullyho ministrem?
answer: Henri IV
wrong_answers:
  - Ludvík XIV
  - Ludvík XV
  - Ludvík XIII
explanation: |
  Maximilien de Béthune, vévoda de Sully, byl hlavním ministrem Jindřicha IV. Hrál klíčovou roli při obnově královských financí a hospodářské obnově království po náboženských válkách.