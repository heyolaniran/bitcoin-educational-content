question: Welcher König war der Minister von Sully?
answer: Henri IV
wrong_answers:
  - Ludwig XIV
  - Ludwig XV
  - Ludwig XIII
explanation: |
  Maximilien de Béthune, Duc de Sully, war der wichtigste Minister von Henri IV. Er spielte eine Schlüsselrolle bei der Wiederherstellung der königlichen Finanzen und der wirtschaftlichen Erholung des Königreichs nach den Religionskriegen.