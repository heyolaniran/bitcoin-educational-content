question: Kuka kuningas oli Sullyn ministeri?
answer: Henri IV
wrong_answers:
  - Ludvig XIV
  - Ludvig XV
  - Ludvig XIII
explanation: |
  Maximilien de Béthune, Duc de Sully, oli Henrik IV:n pääministeri. Hänellä oli keskeinen rooli kuninkaallisen talouden palauttamisessa ja kuningaskunnan talouden elpymisessä uskonsotien jälkeen.