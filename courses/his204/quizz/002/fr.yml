question: De quel roi Sully fut-il le ministre ?
answer: Henri IV
wrong_answers:
  - Louis XIV
  - Louis XV
  - Louis XIII
explanation: |
  Maximilien de Béthune, duc de Sully, fut le principal ministre d'Henri IV. Il a joué un rôle essentiel dans la restauration des finances royales et le redressement économique du royaume après les guerres de religion.
