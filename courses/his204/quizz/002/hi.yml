question: सुली का मंत्री कौन सा राजा था?
answer: हेनरी चतुर्थ
wrong_answers:
  - लुई XIV
  - लुई XV
  - लुई तेरहवें
explanation: |
  मैक्सिमिलियन डी बेथ्यून, ड्यूक डी सुली, हेनरी चतुर्थ के प्रधान मंत्री थे। उन्होंने धार्मिक युद्धों के बाद शाही वित्त की बहाली और राज्य की आर्थिक सुधार में महत्वपूर्ण भूमिका निभाई।