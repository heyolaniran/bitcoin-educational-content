question: Raja mana yang menjadi menteri Sully?
answer: Henri IV
wrong_answers:
  - Louis XIV
  - Louis XV
  - Louis XIII
explanation: |
  Maximilien de Béthune, Duc de Sully, adalah menteri utama Henri IV. Ia memainkan peran kunci dalam pemulihan keuangan kerajaan dan pemulihan ekonomi kerajaan setelah Perang Agama.