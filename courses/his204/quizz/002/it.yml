question: Quale re era il ministro di Sully?
answer: Enrico IV
wrong_answers:
  - Luigi XIV
  - Luigi XV
  - Luigi XIII
explanation: |
  Maximilien de Béthune, duca di Sully, fu il principale ministro di Enrico IV. Svolse un ruolo chiave nel ripristino delle finanze reali e nella ripresa economica del regno dopo le Guerre di religione.