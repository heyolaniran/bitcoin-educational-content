question: Hvilken konge var Sullys minister?
answer: Henri IV
wrong_answers:
  - Ludvig XIV
  - Ludvig XV
  - Ludvig XIII
explanation: |
  Maximilien de Béthune, hertug av Sully, var Henrik 4.s viktigste minister. Han spilte en nøkkelrolle i gjenopprettelsen av de kongelige finansene og kongedømmets økonomiske gjenreisning etter religionskrigene.