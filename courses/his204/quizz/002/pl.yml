question: Który król był ministrem Sully'ego?
answer: Henryk IV
wrong_answers:
  - Ludwik XIV
  - Ludwik XV
  - Ludwik XIII
explanation: |
  Maximilien de Béthune, Duc de Sully, był głównym ministrem Henryka IV. Odegrał kluczową rolę w przywróceniu królewskich finansów i odbudowie gospodarczej królestwa po wojnach religijnych.