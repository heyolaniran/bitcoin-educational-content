question: Que rei era ministro de Sully?
answer: Henrique IV
wrong_answers:
  - Luís XIV
  - Luís XV
  - Luís XIII
explanation: |
  Maximilien de Béthune, duque de Sully, foi o principal ministro de Henrique IV. Desempenhou um papel fundamental no restabelecimento das finanças reais e na recuperação económica do reino após as Guerras Religiosas.