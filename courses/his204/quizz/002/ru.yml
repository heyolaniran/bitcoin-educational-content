question: Какой король был министром Сюлли?
answer: Анри IV
wrong_answers:
  - Людовик XIV
  - Людовик XV
  - Людовик XIII
explanation: |
  Максимилиан де Бетюн, герцог де Сюлли, был главным министром Генриха IV. Он сыграл ключевую роль в восстановлении королевских финансов и экономическом возрождении королевства после Религиозных войн.