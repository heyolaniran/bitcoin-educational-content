question: Koji kralj je bio Sullyjev ministar?
answer: Henri IV
wrong_answers:
  - Luj XIV
  - Luj XV
  - Luj XIII
explanation: |
  Maksimilijan de Betun, Vojvoda od Sulija, bio je glavni ministar Anrija IV. Igrao je ključnu ulogu u obnovi kraljevskih finansija i ekonomskom oporavku kraljevstva nakon Verskih ratova.