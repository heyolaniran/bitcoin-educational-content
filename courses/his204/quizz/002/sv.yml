question: Vilken kung var Sullys minister?
answer: Henri IV
wrong_answers:
  - Ludvig XIV
  - Ludvig XV
  - Ludvig XIII
explanation: |
  Maximilien de Béthune, Duc de Sully, var Henri IV:s främste minister. Han spelade en nyckelroll i återställandet av de kungliga finanserna och rikets ekonomiska återhämtning efter religionskrigen.