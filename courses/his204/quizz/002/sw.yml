question: Ni mfalme gani alikuwa waziri wa Sully?
answer: Henri IV
wrong_answers:
  - Louis XIV
  - Louis XV
  - Louis XIII
explanation: |
  Maximilien de Béthune, Duc de Sully, alikuwa waziri mkuu wa Henri IV. Alichukua jukumu muhimu katika kurejesha fedha za kifalme na kufufua uchumi wa ufalme baada ya Vita vya Dini.