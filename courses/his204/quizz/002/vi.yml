question: Vị vua nào là bộ trưởng của Sully?
answer: Henri IV
wrong_answers:
  - Louis XIV
  - Louis XV
  - Louis XIII
explanation: |
  Maximilien de Béthune, Công tước Sully, là bộ trưởng chính của Henri IV. Ông đóng vai trò quan trọng trong việc khôi phục tài chính hoàng gia và phục hồi kinh tế của vương quốc sau Chiến tranh tôn giáo.