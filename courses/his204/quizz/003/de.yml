question: Was empfiehlt La politique mercantiliste?
answer: ausfuhren, um das als Bezahlung erhaltene Gold und Silber zu horten
wrong_answers:
  - einfuhren, Anhäufung ausländischer Waren
  - weder noch, denn der Handel ist steril und sinnlos
  - gleichgewicht zwischen Einfuhren und Ausfuhren
explanation: |
  Der Merkantilismus ist eine Wirtschaftsdoktrin, die staatliche Eingriffe zur Förderung der nationalen Bereicherung befürwortet. Das Hauptziel ist die Anhäufung von Edelmetallen (Gold und Silber) durch einen Handelsbilanzüberschuss, d. h. mehr zu exportieren als zu importieren.