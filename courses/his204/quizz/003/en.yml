question: What does La politique mercantiliste recommend?
answer: exports, to hoard the gold and silver received in payment
wrong_answers:
  - imports, to amass foreign goods
  - neither, trade being sterile and pointless
  - balance between imports and exports
explanation: |
  Mercantilism is an economic doctrine that advocates state intervention to promote national enrichment. The main objective is to accumulate precious metals (gold and silver) by running a balance of trade surplus, i.e. exporting more than importing.