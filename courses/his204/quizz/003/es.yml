question: ¿Qué recomienda La politique mercantiliste?
answer: exportaciones, para atesorar el oro y la plata recibidos en pago
wrong_answers:
  - importaciones, amasar mercancías extranjeras
  - tampoco, el comercio es estéril y sin sentido
  - equilibrio entre importaciones y exportaciones
explanation: |
  El mercantilismo es una doctrina económica que propugna la intervención del Estado para promover el enriquecimiento nacional. El principal objetivo es acumular metales preciosos (oro y plata) mediante el superávit de la balanza comercial, es decir, exportando más que importando.