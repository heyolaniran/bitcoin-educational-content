question: La politique mercantiliste چه توصیه‌ای می‌کند؟
answer: صادرات، برای انباشتن طلا و نقره دریافت شده به عنوان پرداخت
wrong_answers:
  - واردات، برای انباشت کالاهای خارجی
  - نه، تجارت بی‌حاصل و بی‌هدف است.
  - تعادل بین واردات و صادرات
explanation: |
  مرکانتیلیسم یک دکترین اقتصادی است که از مداخله دولت برای ترویج ثروت ملی حمایت می‌کند. هدف اصلی آن انباشت فلزات گران‌بها (طلا و نقره) از طریق داشتن مازاد تراز تجاری، یعنی صادرات بیشتر از واردات است.