question: ला पॉलिटिक मर्केंटिलिस्टे क्या अनुशंसा करता है?
answer: निर्यात के भुगतान में प्राप्त सोने और चांदी को जमा करना
wrong_answers:
  - आयात, विदेशी माल इकट्ठा करना
  - न तो व्यापार निष्फल और निरर्थक है
  - आयात और निर्यात के बीच संतुलन
explanation: |
  मर्केंटीलिज़्म एक आर्थिक सिद्धांत है जो राष्ट्रीय समृद्धि को बढ़ावा देने के लिए राज्य के हस्तक्षेप की वकालत करता है। इसका मुख्य उद्देश्य व्यापार अधिशेष का संतुलन चलाकर कीमती धातुओं (सोना और चांदी) को इकट्ठा करना है, यानी आयात से ज़्यादा निर्यात करना।