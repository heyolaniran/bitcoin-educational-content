question: Apa yang direkomendasikan oleh La politique mercantiliste?
answer: ekspor, untuk menimbun emas dan perak yang diterima sebagai pembayaran
wrong_answers:
  - impor, untuk mengumpulkan barang-barang asing
  - tidak juga, perdagangan menjadi steril dan tidak ada gunanya
  - keseimbangan antara impor dan ekspor
explanation: |
  Merkantilisme adalah doktrin ekonomi yang menganjurkan intervensi negara untuk mendorong pengayaan nasional. Tujuan utamanya adalah mengakumulasi logam mulia (emas dan perak) dengan menjalankan neraca perdagangan yang surplus, yaitu mengekspor lebih banyak daripada mengimpor.