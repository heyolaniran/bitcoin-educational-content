question: Cosa raccomanda La politique mercantiliste?
answer: esportazioni, per accumulare l'oro e l'argento ricevuti in pagamento
wrong_answers:
  - importazioni, per accumulare beni stranieri
  - né l'uno né l'altro, essendo il commercio sterile e inutile
  - equilibrio tra importazioni ed esportazioni
explanation: |
  Il mercantilismo è una dottrina economica che sostiene l'intervento dello Stato per promuovere l'arricchimento nazionale. L'obiettivo principale è quello di accumulare metalli preziosi (oro e argento) attraverso un'eccedenza della bilancia commerciale, cioè esportando più che importando.