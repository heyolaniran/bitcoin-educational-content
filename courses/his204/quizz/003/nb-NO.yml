question: Hva anbefaler La politique mercantiliste?
answer: eksport, for å hamstre gullet og sølvet som ble mottatt som betaling
wrong_answers:
  - import, for å samle utenlandske varer
  - ingen av delene, handel er sterilt og meningsløst
  - balanse mellom import og eksport
explanation: |
  Merkantilisme er en økonomisk doktrine som går inn for statlig inngripen for å fremme nasjonal berikelse. Hovedmålet er å akkumulere edle metaller (gull og sølv) ved å ha overskudd på handelsbalansen, det vil si å eksportere mer enn man importerer.