question: Co zaleca La politique mercantiliste?
answer: eksportu, aby gromadzić złoto i srebro otrzymane jako zapłata
wrong_answers:
  - import, gromadzenie towarów zagranicznych
  - handel jest jałowy i bezcelowy
  - równowaga między importem a eksportem
explanation: |
  Merkantylizm to doktryna ekonomiczna, która opowiada się za interwencją państwa w celu promowania bogactwa narodowego. Głównym celem jest gromadzenie metali szlachetnych (złota i srebra) poprzez prowadzenie nadwyżki bilansu handlowego, tj. eksportowanie więcej niż importowanie.