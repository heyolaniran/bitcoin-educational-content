question: O que é que La politique mercantiliste recomenda?
answer: exportações, para entesourar o ouro e a prata recebidos em pagamento
wrong_answers:
  - importações, para acumular bens estrangeiros
  - nem um nem outro, sendo o comércio estéril e inútil
  - equilíbrio entre importações e exportações
explanation: |
  O mercantilismo é uma doutrina económica que defende a intervenção do Estado para promover o enriquecimento nacional. O principal objetivo é a acumulação de metais preciosos (ouro e prata) através de um excedente da balança comercial, ou seja, exportar mais do que importar.