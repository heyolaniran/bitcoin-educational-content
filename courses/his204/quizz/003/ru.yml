question: Что рекомендует La politique mercantiliste?
answer: экспорт, чтобы хранить золото и серебро, полученные в качестве оплаты
wrong_answers:
  - импорт, накопление иностранных товаров
  - ни то, ни другое, торговля бесплодна и бессмысленна
  - баланс между импортом и экспортом
explanation: |
  Меркантилизм - это экономическая доктрина, выступающая за вмешательство государства в процесс национального обогащения. Основная цель - накопление драгоценных металлов (золота и серебра) за счет положительного сальдо торгового баланса, то есть экспорта больше, чем импорта.