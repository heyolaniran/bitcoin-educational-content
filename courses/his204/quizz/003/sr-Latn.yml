question: Šta preporučuje La politique mercantiliste?
answer: izvoz, da se gomilaju zlato i srebro primljeni kao uplata
wrong_answers:
  - uvoz, da bi se prikupila strana roba
  - ni jedno, trgovina je sterilna i besmislena
  - ravnoteža između uvoza i izvoza
explanation: |
  Merkantilizam je ekonomska doktrina koja zagovara državnu intervenciju radi promovisanja nacionalnog bogatstva. Glavni cilj je akumulacija plemenitih metala (zlata i srebra) ostvarivanjem suficita u trgovinskoj bilansi, tj. izvozom više nego uvozom.