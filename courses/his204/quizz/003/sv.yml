question: Vad rekommenderar La politique mercantiliste?
answer: export, att hamstra guld och silver som erhållits som betalning
wrong_answers:
  - import, att samla på sig utländska varor
  - ingetdera, handel är sterilt och meningslöst
  - balans mellan import och export
explanation: |
  Merkantilism är en ekonomisk doktrin som förespråkar statligt ingripande för att främja nationell berikning. Huvudsyftet är att ackumulera ädelmetaller (guld och silver) genom att ha ett överskott i handelsbalansen, dvs. exportera mer än man importerar.