question: Je, La politique mercantiliste inapendekeza nini?
answer: mauzo ya nje, kuhifadhi dhahabu na fedha iliyopokelewa kwa malipo
wrong_answers:
  - uagizaji, kukusanya bidhaa za kigeni
  - wala, biashara kuwa tasa na haina maana
  - usawa kati ya uagizaji na mauzo ya nje
explanation: |
  Mercantilism ni fundisho la kiuchumi ambalo linatetea uingiliaji kati wa serikali ili kukuza utajiri wa kitaifa. Lengo kuu ni kukusanya madini ya thamani (dhahabu na fedha) kwa kutumia urari wa ziada ya biashara, yaani kusafirisha zaidi ya kuagiza nje.