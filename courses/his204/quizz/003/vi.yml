question: La Politique Mercantiliste khuyên bạn nên làm gì?
answer: xuất khẩu, tích trữ vàng và bạc nhận được khi thanh toán
wrong_answers:
  - nhập khẩu, tích trữ hàng hóa nước ngoài
  - không, thương mại là vô nghĩa và vô nghĩa
  - cân bằng giữa nhập khẩu và xuất khẩu
explanation: |
  Chủ nghĩa trọng thương là một học thuyết kinh tế ủng hộ sự can thiệp của nhà nước để thúc đẩy sự giàu có của quốc gia. Mục tiêu chính là tích lũy kim loại quý (vàng và bạc) bằng cách duy trì cán cân thặng dư thương mại, tức là xuất khẩu nhiều hơn nhập khẩu.