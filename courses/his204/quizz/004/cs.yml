question: Proč je podle Colbertových žáků obchod věčnou válkou?
answer: Národy mohou bohatnout pouze na úkor druhých
wrong_answers:
  - Válečné lodě jsou potřeba k podpoře obchodu
  - Obchod nejvíce vzkvétá v době války
  - Obchod je neustálá soutěž o zdroje
explanation: |
  V merkantilistické vizi je světové bohatství považováno za pevně danou veličinu. V důsledku toho je obohacování jednoho národa nutně na úkor ostatních, z čehož plyne myšlenka permanentní "hospodářské války".