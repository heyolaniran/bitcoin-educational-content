question: Warum, so Colberts Jünger, ist der Handel ein ständiger Krieg?
answer: Nationen können nur auf Kosten der anderen reich werden
wrong_answers:
  - Kriegsschiffe werden zur Unterstützung des Handels benötigt
  - In Kriegszeiten floriert der Handel am meisten
  - Handel ist ein ständiger Wettbewerb um Ressourcen
explanation: |
  In der merkantilistischen Vision wird der Reichtum der Welt als eine feste Größe betrachtet. Folglich geht die Bereicherung einer Nation zwangsläufig auf Kosten anderer, daher die Idee eines permanenten "Wirtschaftskriegs".