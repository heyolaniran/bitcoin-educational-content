question: Why, according to Colbert's disciples, is commerce a perpetual war?
answer: Nations can only grow rich at each other's expense
wrong_answers:
  - Warships are needed to support trade
  - Trade flourishes most in times of war
  - Trade is a constant competition for resources
explanation: |
  In the mercantilist vision, the world's wealth is considered a fixed quantity. Consequently, the enrichment of one nation is necessarily at the expense of others, hence the idea of a permanent "economic war".