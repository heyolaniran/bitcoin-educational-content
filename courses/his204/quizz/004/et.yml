question: Miks on Colberti jüngrite sõnul kaubandus igavene sõda?
answer: Riigid saavad rikastuda ainult üksteise kulul
wrong_answers:
  - Sõjalaevu on vaja kaubanduse toetamiseks
  - Kaubandus õitseb kõige rohkem sõja ajal
  - Kaubandus on pidev konkurents ressursside pärast
explanation: |
  Merkantilistlikus nägemuses peetakse maailma rikkust fikseeritud suuruseks. Järelikult toimub ühe rahva rikastumine tingimata teiste arvelt, sellest tuleneb ka idee pidevast "majandussõjast".