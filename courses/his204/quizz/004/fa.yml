question: چرا، به گفتهٔ پیروان کُلبر، تجارت یک جنگ دائمی است؟
answer: ملت‌ها فقط می‌توانند به هزینه یکدیگر ثروتمند شوند
wrong_answers:
  - کشتی‌های جنگی برای حمایت از تجارت مورد نیاز هستند
  - تجارت در زمان جنگ بیشترین رونق را دارد
  - تجارت یک رقابت مداوم برای منابع است
explanation: |
  در دیدگاه مرکانتیلیستی، ثروت جهان به عنوان یک مقدار ثابت در نظر گرفته می‌شود. بنابراین، ثروتمند شدن یک کشور لزوماً به ضرر دیگران است، از این رو ایده "جنگ اقتصادی" دائمی مطرح می‌شود.