question: कोलबर्ट के अनुयायियों के अनुसार, वाणिज्य एक सतत युद्ध क्यों है?
answer: राष्ट्र केवल एक दूसरे की कीमत पर ही समृद्ध हो सकते हैं
wrong_answers:
  - व्यापार को बढ़ावा देने के लिए युद्धपोतों की आवश्यकता है
  - युद्ध के समय व्यापार सबसे अधिक फलता-फूलता है
  - व्यापार संसाधनों के लिए एक निरंतर प्रतिस्पर्धा है
explanation: |
  व्यापारिक दृष्टिकोण में, दुनिया की संपत्ति को एक निश्चित मात्रा माना जाता है। नतीजतन, एक राष्ट्र का समृद्ध होना अनिवार्य रूप से अन्य की कीमत पर होता है, इसलिए एक स्थायी "आर्थिक युद्ध" का विचार है।