question: Mengapa, menurut murid-murid Colbert, perdagangan adalah perang yang tak berkesudahan?
answer: Bangsa hanya bisa menjadi kaya dengan mengorbankan satu sama lain
wrong_answers:
  - Kapal perang dibutuhkan untuk mendukung perdagangan
  - Perdagangan berkembang paling pesat pada masa perang
  - Perdagangan adalah persaingan konstan untuk mendapatkan sumber daya
explanation: |
  Dalam visi merkantilis, kekayaan dunia dianggap sebagai jumlah yang tetap. Akibatnya, pengayaan satu negara harus mengorbankan negara lain, sehingga muncullah ide "perang ekonomi" yang permanen.