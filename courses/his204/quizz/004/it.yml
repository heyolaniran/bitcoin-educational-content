question: Perché, secondo i discepoli di Colbert, il commercio è una guerra perpetua?
answer: Le nazioni possono arricchirsi solo a spese reciproche
wrong_answers:
  - Le navi da guerra sono necessarie per sostenere il commercio
  - Il commercio fiorisce maggiormente in tempo di guerra
  - Il commercio è una competizione costante per le risorse
explanation: |
  Nella visione mercantilista, la ricchezza del mondo è considerata una quantità fissa. Di conseguenza, l'arricchimento di una nazione è necessariamente a spese di altre, da cui l'idea di una "guerra economica" permanente.