question: Hvorfor er handel ifølge Colberts disipler en evigvarende krig?
answer: Nasjoner kan bare bli rike på hverandres bekostning
wrong_answers:
  - Krigsskip er nødvendig for å støtte handelen
  - Handelen blomstrer mest i krigstider
  - Handel er en konstant konkurranse om ressurser
explanation: |
  I den merkantilistiske visjonen betraktes verdens rikdom som en fast størrelse. Følgelig vil berikelsen av én nasjon nødvendigvis gå på bekostning av andre, derav ideen om en permanent "økonomisk krig".