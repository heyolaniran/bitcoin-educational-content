question: Dlaczego, według uczniów Colberta, handel jest wieczną wojną?
answer: Narody mogą bogacić się tylko kosztem siebie nawzajem
wrong_answers:
  - Okręty wojenne są potrzebne do wspierania handlu
  - Handel kwitnie najbardziej w czasach wojny
  - Handel to ciągła rywalizacja o zasoby
explanation: |
  W merkantylistycznej wizji bogactwo świata jest uważane za wielkość stałą. W związku z tym wzbogacanie się jednego narodu musi odbywać się kosztem innych, stąd idea permanentnej "wojny gospodarczej".