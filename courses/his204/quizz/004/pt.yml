question: Porque é que, segundo os discípulos de Colbert, o comércio é uma guerra perpétua?
answer: As nações só podem enriquecer à custa umas das outras
wrong_answers:
  - Os navios de guerra são necessários para apoiar o comércio
  - O comércio floresce mais em tempos de guerra
  - O comércio é uma competição constante pelos recursos
explanation: |
  Na visão mercantilista, a riqueza do mundo é considerada uma quantidade fixa. Por conseguinte, o enriquecimento de uma nação é necessariamente feito à custa de outras, daí a ideia de uma "guerra económica" permanente.