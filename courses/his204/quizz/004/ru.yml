question: Почему, по мнению учеников Колберта, коммерция - это вечная война?
answer: Нации могут богатеть только за счет друг друга
wrong_answers:
  - Военные корабли нужны для поддержки торговли
  - Торговля процветает во время войны
  - Торговля - это постоянная конкуренция за ресурсы
explanation: |
  В меркантилистском видении мировое богатство рассматривается как фиксированная величина. Следовательно, обогащение одной нации обязательно происходит за счет других, отсюда и идея постоянной "экономической войны".