question: Varför, enligt Colberts lärjungar, är handeln ett evigt krig?
answer: Nationer kan bara bli rika på varandras bekostnad
wrong_answers:
  - Krigsfartyg behövs för att stödja handeln
  - Handeln blomstrar som mest i krigstider
  - Handel är en ständig konkurrens om resurser
explanation: |
  I den merkantilistiska visionen betraktas världens rikedomar som en fast kvantitet. Följaktligen sker berikandet av en nation med nödvändighet på bekostnad av andra, därav idén om ett permanent "ekonomiskt krig".