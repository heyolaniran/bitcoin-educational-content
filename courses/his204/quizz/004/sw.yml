question: Kwa nini, kulingana na wanafunzi wa Colbert, biashara ni vita ya kudumu?
answer: Mataifa yanaweza kutajirika kwa gharama ya kila mmoja
wrong_answers:
  - Meli za kivita zinahitajika kusaidia biashara
  - Biashara hustawi zaidi nyakati za vita
  - Biashara ni ushindani wa mara kwa mara wa rasilimali
explanation: |
  Katika maono ya wanabiashara, utajiri wa dunia unachukuliwa kuwa kiasi fulani. Kwa hiyo, utajiri wa taifa moja ni lazima kwa gharama ya wengine, hivyo wazo la kudumu "vita ya kiuchumi".