question: Theo các học trò của Colbert, tại sao thương mại lại là một cuộc chiến tranh liên miên?
answer: Các quốc gia chỉ có thể giàu lên bằng cách bóc lột lẫn nhau
wrong_answers:
  - Tàu chiến là cần thiết để hỗ trợ thương mại
  - Thương mại phát triển mạnh nhất trong thời chiến
  - Thương mại là sự cạnh tranh liên tục để giành lấy tài nguyên
explanation: |
  Theo quan điểm của chủ nghĩa trọng thương, của cải của thế giới được coi là một số lượng cố định. Do đó, sự giàu có của một quốc gia nhất thiết phải bằng cái giá phải trả của các quốc gia khác, do đó có ý tưởng về một "cuộc chiến kinh tế" vĩnh viễn.