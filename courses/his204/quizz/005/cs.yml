question: Jakou podobu měla regulace práce a průmyslu za starého režimu?
answer: Stovky předpisů pro všechny typy průmyslových odvětví
wrong_answers:
  - Obecný kodex pro hospodářskou činnost
  - Některá poměrně flexibilní ustanovení, která ponechávají dostatek volnosti pro práci a průmysl
  - Naprostá absence pravidel, která dává volný průchod individuální iniciativě
explanation: |
  Ancien Régime se vyznačoval systémem cechů a přísnými předpisy upravujícími práci a průmysl. Každé řemeslo podléhalo specifickým, často velmi podrobným pravidlům, která omezovala konkurenci a inovace.