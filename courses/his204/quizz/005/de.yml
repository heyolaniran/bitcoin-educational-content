question: Wie sah die Regulierung von Arbeit und Industrie im Ancien Régime aus?
answer: Hunderte von Vorschriften für jede Art von Industrie
wrong_answers:
  - Ein allgemeiner Kodex für die Wirtschaftstätigkeit
  - Einige recht flexible Bestimmungen, die viel Freiraum für Arbeit und Industrie lassen
  - Völlige Abwesenheit von Regeln, die der Eigeninitiative freien Lauf lassen
explanation: |
  Das Ancien Régime war durch ein System von Zünften und strengen Vorschriften für Arbeit und Industrie gekennzeichnet. Jedes Gewerbe war spezifischen, oft sehr detaillierten Regeln unterworfen, die Wettbewerb und Innovation einschränkten.