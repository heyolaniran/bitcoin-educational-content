question: What form did regulation of work and industry take under the Ancien Régime?
answer: Hundreds of regulations for every type of industry
wrong_answers:
  - A general code for economic activity
  - Some fairly flexible provisions, leaving plenty of freedom for work and industry
  - A total absence of rules, giving free rein to individual initiative
explanation: |
  The Ancien Régime was characterized by a system of guilds and strict regulations governing work and industry. Each trade was subject to specific, often highly detailed rules that limited competition and innovation.