question: ¿Qué forma adoptó la regulación del trabajo y la industria bajo el Antiguo Régimen?
answer: Cientos de normativas para cada tipo de industria
wrong_answers:
  - Un código general para la actividad económica
  - Disposiciones bastante flexibles, que dejan mucha libertad para el trabajo y la industria
  - Ausencia total de normas, dando rienda suelta a la iniciativa individual
explanation: |
  El Antiguo Régimen se caracterizaba por un sistema de gremios y una estricta normativa que regulaba el trabajo y la industria. Cada oficio estaba sujeto a normas específicas, a menudo muy detalladas, que limitaban la competencia y la innovación.