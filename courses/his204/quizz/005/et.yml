question: Milline oli töö ja tööstuse reguleerimine Ancien Régime'i ajal?
answer: Sajad määrused igat liiki tööstusharude jaoks
wrong_answers:
  - Majandustegevuse üldkoodeks
  - Mõned üsna paindlikud sätted, mis jätavad palju vabadust töö ja tööstuse jaoks
  - Reeglite täielik puudumine, mis annab vaba voli individuaalsele initsiatiivile
explanation: |
  Ancien Régime'ile oli iseloomulik kildkondade süsteem ning ranged töö- ja tööstusharu eeskirjad. Iga kutseala suhtes kehtisid konkreetsed, sageli väga üksikasjalikud eeskirjad, mis piirasid konkurentsi ja uuendusi.