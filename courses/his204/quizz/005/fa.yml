question: تنظیم کار و صنعت تحت رژیم قدیم به چه شکلی بود؟
answer: صدها مقررات برای هر نوع صنعت
wrong_answers:
  - یک کد کلی برای فعالیت اقتصادی
  - برخی از مقررات نسبتاً انعطاف‌پذیر، که آزادی زیادی برای کار و صنعت باقی می‌گذارد
  - عدم وجود کامل قوانین، دادن آزادی کامل به ابتکار فردی
explanation: |
  رژیم قدیم با سیستمی از اصناف و مقررات سختگیرانه‌ای که کار و صنعت را کنترل می‌کرد، مشخص می‌شد. هر حرفه تحت قوانین خاص و اغلب بسیار دقیقی بود که رقابت و نوآوری را محدود می‌کرد.