question: Minkälainen oli työn ja teollisuuden sääntely Ancien Régimen aikana?
answer: Satoja säädöksiä kaikentyyppisille teollisuudenaloille
wrong_answers:
  - Taloudellista toimintaa koskevat yleiset säännöt
  - Joitakin melko joustavia säännöksiä, jotka jättävät paljon vapautta työlle ja teollisuudelle
  - Sääntöjen täydellinen puuttuminen, jolloin yksilöllinen aloitteellisuus saa vapaat kädet
explanation: |
  Ancien Régime -aikakaudelle oli ominaista kiltojen järjestelmä ja tiukat työ- ja elinkeinoelämää koskevat säännökset. Jokaiseen elinkeinoon sovellettiin erityisiä, usein hyvin yksityiskohtaisia sääntöjä, jotka rajoittivat kilpailua ja innovaatioita.