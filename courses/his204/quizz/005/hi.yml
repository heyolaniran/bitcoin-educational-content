question: प्राचीन शासन के अंतर्गत कार्य और उद्योग का विनियमन किस रूप में हुआ?
answer: हर प्रकार के उद्योग के लिए सैकड़ों नियम
wrong_answers:
  - आर्थिक गतिविधि के लिए एक सामान्य कोड
  - कुछ काफी लचीले प्रावधान, काम और उद्योग के लिए पर्याप्त स्वतंत्रता प्रदान करते हैं
  - नियमों का पूर्ण अभाव, व्यक्तिगत पहल को पूरी छूट
explanation: |
  एन्सियन शासन की विशेषता गिल्ड की व्यवस्था और काम तथा उद्योग को नियंत्रित करने वाले सख्त नियमों से थी। प्रत्येक व्यापार विशिष्ट, अक्सर अत्यधिक विस्तृत नियमों के अधीन था जो प्रतिस्पर्धा और नवाचार को सीमित करते थे।