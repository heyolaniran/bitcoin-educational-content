question: Bagaimana bentuk regulasi kerja dan industri di bawah Ancien Régime?
answer: Ratusan peraturan untuk setiap jenis industri
wrong_answers:
  - Kode umum untuk aktivitas ekonomi
  - Beberapa ketentuan yang cukup fleksibel, memberikan banyak kebebasan untuk bekerja dan industri
  - Tidak adanya aturan sama sekali, memberikan kebebasan untuk inisiatif individu
explanation: |
  Rezim Ancien ditandai dengan sistem serikat pekerja dan peraturan ketat yang mengatur pekerjaan dan industri. Setiap perdagangan tunduk pada peraturan khusus yang sering kali sangat terperinci yang membatasi persaingan dan inovasi.