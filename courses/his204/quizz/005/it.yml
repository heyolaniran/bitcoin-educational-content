question: Quale forma di regolamentazione del lavoro e dell'industria assunse l'Ancien Régime?
answer: Centinaia di normative per ogni tipo di industria
wrong_answers:
  - Un codice generale per l'attività economica
  - Disposizioni abbastanza flessibili, che lasciano ampia libertà al lavoro e all'industria
  - Una totale assenza di regole, che dà libero sfogo all'iniziativa individuale
explanation: |
  L'Ancien Régime era caratterizzato da un sistema di corporazioni e da una rigida regolamentazione del lavoro e dell'industria. Ogni mestiere era soggetto a regole specifiche, spesso molto dettagliate, che limitavano la concorrenza e l'innovazione.