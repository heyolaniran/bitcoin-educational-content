question: Hvordan var reguleringen av arbeid og industri under Ancien Régime?
answer: Hundrevis av forskrifter for alle typer bransjer
wrong_answers:
  - En generell kodeks for økonomisk aktivitet
  - Noen ganske fleksible bestemmelser som gir stor frihet for arbeid og næringsliv
  - Et totalt fravær av regler, noe som gir fritt spillerom for individuelle initiativ
explanation: |
  Ancien Régime var preget av et system med laug og strenge regler for arbeid og industri. Hvert fag var underlagt spesifikke, ofte svært detaljerte regler som begrenset konkurranse og innovasjon.