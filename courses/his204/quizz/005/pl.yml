question: Jaką formę przyjęła regulacja pracy i przemysłu w czasach ancien régime'u?
answer: Setki przepisów dla każdego rodzaju branży
wrong_answers:
  - Ogólny kodeks działalności gospodarczej
  - Niektóre przepisy są dość elastyczne, pozostawiając dużo swobody dla pracy i przemysłu
  - Całkowity brak zasad, dający wolną rękę indywidualnej inicjatywie
explanation: |
  Ancien Régime charakteryzował się systemem cechów i ścisłymi przepisami regulującymi pracę i przemysł. Każda branża podlegała określonym, często bardzo szczegółowym zasadom, które ograniczały konkurencję i innowacje.