question: Que forma assumiu a regulamentação do trabalho e da indústria durante o Antigo Regime?
answer: Centenas de regulamentos para cada tipo de indústria
wrong_answers:
  - Um código geral para a atividade económica
  - Algumas disposições bastante flexíveis, que permitem uma grande liberdade de trabalho e de indústria
  - Uma ausência total de regras, dando rédea solta à iniciativa individual
explanation: |
  O Ancien Régime caracterizava-se por um sistema de corporações e por uma regulamentação rigorosa do trabalho e da indústria. Cada profissão estava sujeita a regras específicas, muitas vezes muito pormenorizadas, que limitavam a concorrência e a inovação.