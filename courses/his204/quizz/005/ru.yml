question: Какую форму приняло регулирование труда и промышленности в эпоху Древнего режима?
answer: Сотни нормативных актов для всех отраслей промышленности
wrong_answers:
  - Общий кодекс экономической деятельности
  - Некоторые довольно гибкие положения, оставляющие много свободы для работы и промышленности
  - Полное отсутствие правил, дающее свободу индивидуальной инициативе
explanation: |
  Для Древнего режима была характерна система гильдий и строгие правила, регулирующие работу и промышленность. Каждая профессия подчинялась определенным, часто очень подробным правилам, которые ограничивали конкуренцию и инновации.