question: Kakav oblik je regulacija rada i industrije imala pod Ancien Régime?
answer: Stotine propisa za svaku vrstu industrije
wrong_answers:
  - Opšti kod za ekonomsku aktivnost
  - Neke prilično fleksibilne odredbe, ostavljajući puno slobode za rad i industriju
  - Potpuni izostanak pravila, dajući slobodu individualnoj inicijativi
explanation: |
  Ancien Régime je bio karakterisan sistemom cehova i strogim propisima koji su upravljali radom i industrijom. Svaka zanatska delatnost bila je podložna specifičnim, često veoma detaljnim pravilima koja su ograničavala konkurenciju i inovacije.