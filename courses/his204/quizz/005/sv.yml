question: Hur såg regleringen av arbete och industri ut under Ancien Régime?
answer: Hundratals regelverk för alla typer av branscher
wrong_answers:
  - En allmän kod för ekonomisk verksamhet
  - Några ganska flexibla bestämmelser som ger stor frihet för arbete och näringsliv
  - En total avsaknad av regler, vilket ger fritt spelrum för individuella initiativ
explanation: |
  Ancien Régime kännetecknades av ett system med skråväsende och strikta regler för arbete och industri. Varje yrke omfattades av specifika, ofta mycket detaljerade regler som begränsade konkurrens och innovation.