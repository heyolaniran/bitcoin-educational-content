question: Je, udhibiti wa kazi na tasnia ulichukua namna gani chini ya Utawala wa Kale?
answer: Mamia ya kanuni kwa kila aina ya tasnia
wrong_answers:
  - Kanuni ya jumla ya shughuli za kiuchumi
  - Baadhi ya vifungu vinavyoweza kunyumbulika, vinavyoacha uhuru mwingi wa kazi na tasnia
  - Kutokuwepo kabisa kwa sheria, kutoa uhuru kwa mpango wa mtu binafsi
explanation: |
  Utawala wa Ancien ulikuwa na mfumo wa vyama na kanuni kali zinazosimamia kazi na tasnia. Kila biashara ilikuwa chini ya sheria mahususi, ambazo mara nyingi zilikuwa na maelezo mengi ambayo yalipunguza ushindani na uvumbuzi.