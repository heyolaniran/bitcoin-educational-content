question: Hình thức quản lý lao động và công nghiệp dưới chế độ cũ diễn ra như thế nào?
answer: Hàng trăm quy định cho mọi loại ngành công nghiệp
wrong_answers:
  - Một mã chung cho hoạt động kinh tế
  - Một số điều khoản khá linh hoạt, tạo ra nhiều tự do cho công việc và ngành công nghiệp
  - Hoàn toàn không có quy tắc, tạo điều kiện cho sáng kiến cá nhân được tự do
explanation: |
  Ancien Régime được đặc trưng bởi một hệ thống các hội nhóm và các quy định nghiêm ngặt chi phối công việc và ngành công nghiệp. Mỗi ngành nghề đều phải tuân theo các quy tắc cụ thể, thường rất chi tiết, hạn chế sự cạnh tranh và đổi mới.