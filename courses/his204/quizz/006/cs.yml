question: Kdy Vauban poprvé navrhl daňovou reformu?
answer: 1695
wrong_answers:
  - 1693
  - 1697
  - 1700
explanation: |
  Vauban, francouzský maršál a vojenský inženýr, navrhl v roce 1695 daňovou reformu známou jako "Dîme Royale". Cílem tohoto návrhu bylo zjednodušit daňový systém a spravedlivěji rozložit daňové břemeno.