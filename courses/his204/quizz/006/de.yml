question: Wann hat Vauban zum ersten Mal eine Steuerreform vorgeschlagen?
answer: 1695
wrong_answers:
  - 1693
  - 1697
  - 1700
explanation: |
  Vauban, Marschall von Frankreich und Militäringenieur, schlug 1695 eine Steuerreform vor, die als "Dîme Royale" bekannt wurde. Dieser Vorschlag zielte auf eine Vereinfachung des Steuersystems und eine gerechtere Verteilung der Steuerlast ab.