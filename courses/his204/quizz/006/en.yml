question: When did Vauban first propose tax reform?
answer: 1695
wrong_answers:
  - 1693
  - 1697
  - 1700
explanation: |
  Vauban, marshal of France and military engineer, proposed a tax reform in 1695, known as the "Dîme Royale". This proposal aimed to simplify the tax system and distribute the burden of taxation more equitably.