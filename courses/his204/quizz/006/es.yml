question: ¿Cuándo propuso Vauban por primera vez una reforma fiscal?
answer: 1695
wrong_answers:
  - 1693
  - 1697
  - 1700
explanation: |
  Vauban, mariscal de Francia e ingeniero militar, propuso en 1695 una reforma fiscal conocida como la "Dîme Royale". Esta propuesta pretendía simplificar el sistema fiscal y distribuir la carga impositiva de forma más equitativa.