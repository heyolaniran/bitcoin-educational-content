question: Millal tegi Vauban esimest korda ettepaneku maksureformi kohta?
answer: 1695
wrong_answers:
  - 1693
  - 1697
  - 1700
explanation: |
  Vauban, Prantsusmaa marssal ja sõjaväeinsener, tegi 1695. aastal ettepaneku maksureformi kohta, mida tuntakse "Dîme Royale" nime all. Selle ettepaneku eesmärk oli lihtsustada maksusüsteemi ja jaotada maksukoormus õiglasemalt.