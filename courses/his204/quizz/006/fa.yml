question: Vauban اولین بار چه زمانی اصلاحات مالیاتی را پیشنهاد داد؟
answer: ۱۶۹۵
wrong_answers:
  - ۱۶۹۳
  - ۱۶۹۷
  - ۱۷۰۰
explanation: |
  واوبان، مارشال فرانسه و مهندس نظامی، در سال 1695 اصلاحات مالیاتی را پیشنهاد داد که به عنوان "Dîme Royale" شناخته می‌شود. این پیشنهاد به منظور ساده‌سازی سیستم مالیاتی و توزیع عادلانه‌تر بار مالیات طراحی شده بود.