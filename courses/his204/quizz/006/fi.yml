question: Milloin Vauban ehdotti ensimmäisen kerran verouudistusta?
answer: 1695
wrong_answers:
  - 1693
  - 1697
  - 1700
explanation: |
  Vauban, Ranskan marsalkka ja sotilasinsinööri, ehdotti vuonna 1695 verouudistusta, joka tunnettiin nimellä "Dîme Royale". Ehdotuksen tavoitteena oli yksinkertaistaa verojärjestelmää ja jakaa verotaakka oikeudenmukaisemmin.