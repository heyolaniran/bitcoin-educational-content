question: De quand date la première proposition de réforme fiscale de Vauban ?
answer: 1695
wrong_answers:
  - 1693
  - 1697
  - 1700
explanation: |
  Vauban, maréchal de France et ingénieur militaire, a proposé une réforme fiscale en 1695, connue sous le nom de "Dîme Royale". Cette proposition visait à simplifier le système fiscal et à répartir plus équitablement la charge de l'impôt.
