question: वाउबन ने पहली बार कर सुधार का प्रस्ताव कब रखा?
answer: 1695
wrong_answers:
  - 1693
  - 1697
  - 1700
explanation: |
  फ्रांस के मार्शल और सैन्य इंजीनियर वाउबन ने 1695 में एक कर सुधार का प्रस्ताव रखा, जिसे "डिमे रॉयल" के नाम से जाना जाता है। इस प्रस्ताव का उद्देश्य कर प्रणाली को सरल बनाना और कराधान के बोझ को अधिक समान रूप से वितरित करना था।