question: Kapan Vauban pertama kali mengusulkan reformasi pajak?
answer: 1695
wrong_answers:
  - 1693
  - 1697
  - 1700
explanation: |
  Vauban, marsekal Perancis dan insinyur militer, mengusulkan reformasi pajak pada tahun 1695, yang dikenal sebagai "Dîme Royale". Usulan ini bertujuan untuk menyederhanakan sistem pajak dan mendistribusikan beban perpajakan secara lebih adil.