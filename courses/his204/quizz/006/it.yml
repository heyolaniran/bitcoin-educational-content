question: Quando Vauban propose per la prima volta la riforma fiscale?
answer: 1695
wrong_answers:
  - 1693
  - 1697
  - 1700
explanation: |
  Vauban, maresciallo di Francia e ingegnere militare, propose una riforma fiscale nel 1695, nota come "Dîme Royale". Questa proposta mirava a semplificare il sistema fiscale e a distribuire in modo più equo l'onere della tassazione.