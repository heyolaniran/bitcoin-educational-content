question: Når foreslo Vauban for første gang en skattereform?
answer: 1695
wrong_answers:
  - 1693
  - 1697
  - 1700
explanation: |
  Vauban, marskalk av Frankrike og militær ingeniør, foreslo en skattereform i 1695, kjent som "Dîme Royale". Forslaget hadde som mål å forenkle skattesystemet og fordele skattebyrden mer rettferdig.