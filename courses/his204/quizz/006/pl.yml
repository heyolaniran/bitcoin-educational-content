question: Kiedy Vauban po raz pierwszy zaproponował reformę podatkową?
answer: 1695
wrong_answers:
  - 1693
  - 1697
  - 1700
explanation: |
  Vauban, marszałek Francji i inżynier wojskowy, zaproponował w 1695 r. reformę podatkową, znaną jako "Dîme Royale". Propozycja ta miała na celu uproszczenie systemu podatkowego i bardziej sprawiedliwe rozłożenie obciążeń podatkowych.