question: Quando é que Vauban propôs pela primeira vez uma reforma fiscal?
answer: 1695
wrong_answers:
  - 1693
  - 1697
  - 1700
explanation: |
  Vauban, marechal de França e engenheiro militar, propôs uma reforma fiscal em 1695, conhecida como "Dîme Royale". Esta proposta tinha por objetivo simplificar o sistema fiscal e distribuir de forma mais equitativa a carga fiscal.