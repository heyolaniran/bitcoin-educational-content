question: Когда Вобан впервые предложил налоговую реформу?
answer: 1695
wrong_answers:
  - 1693
  - 1697
  - 1700
explanation: |
  Вобан, маршал Франции и военный инженер, в 1695 году предложил налоговую реформу, известную как "Королевская доминанта". Это предложение было направлено на упрощение налоговой системы и более справедливое распределение налогового бремени.