question: Kada je Vauban prvi put predložio poresku reformu?
answer: 1695
wrong_answers:
  - 1693
  - 1697
  - 1700
explanation: |
  Vauban, maršal Francuske i vojni inženjer, predložio je poresku reformu 1695. godine, poznatu kao "Dîme Royale". Ovaj predlog je imao za cilj da pojednostavi poreski sistem i ravnomernije raspodeli teret oporezivanja.