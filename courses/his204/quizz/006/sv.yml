question: När föreslog Vauban för första gången en skattereform?
answer: 1695
wrong_answers:
  - 1693
  - 1697
  - 1700
explanation: |
  Vauban, marskalk av Frankrike och militäringenjör, föreslog 1695 en skattereform, känd som "Dîme Royale". Förslaget syftade till att förenkla skattesystemet och fördela skattebördan på ett mer rättvist sätt.