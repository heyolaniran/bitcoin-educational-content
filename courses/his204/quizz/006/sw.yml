question: Ni lini Vauban alipendekeza marekebisho ya kodi kwa mara ya kwanza?
answer: 1695
wrong_answers:
  - 1693
  - 1697
  - 1700
explanation: |
  Vauban, marshal wa Ufaransa na mhandisi wa kijeshi, alipendekeza mageuzi ya ushuru mnamo 1695, inayojulikana kama "Dîme Royale". Pendekezo hili lililenga kurahisisha mfumo wa ushuru na kusambaza mzigo wa ushuru kwa usawa zaidi.