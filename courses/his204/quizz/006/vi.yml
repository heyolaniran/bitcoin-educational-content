question: Vauban lần đầu đề xuất cải cách thuế vào khi nào?
answer: 1695
wrong_answers:
  - 1693
  - 1697
  - 1700
explanation: |
  Vauban, thống chế của Pháp và kỹ sư quân sự, đã đề xuất một cuộc cải cách thuế vào năm 1695, được gọi là "Dîme Royale". Đề xuất này nhằm mục đích đơn giản hóa hệ thống thuế và phân bổ gánh nặng thuế một cách công bằng hơn.