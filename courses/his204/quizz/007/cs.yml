question: Proč je daňový systém Ancien Régime označován jako "demotivační"?
answer: Protože sotva obohacený člověk by se mohl v následujícím roce ocitnout ve dvojnásobném daňovém zatížení
wrong_answers:
  - Protože jeho složitost odrazovala daňové úředníky od vybírání daní
  - Protože jeho mírnost odrazovala Francouze od útěku do zahraničí
  - Protože to bylo příliš jednoduché a předvídatelné
explanation: |
  Zdanění za starého režimu bylo často svévolné a nepředvídatelné. Absence jasných pravidel a možnost nadměrného zdanění odrazovala od investic a obohacování, protože zisky mohly být zdaněním zabaveny.