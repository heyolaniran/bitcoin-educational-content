question: Warum wird das Steuersystem des Ancien Régime als "abschreckend" bezeichnet?
answer: Denn ein kaum bereicherter Mann könnte im folgenden Jahr doppelt besteuert werden
wrong_answers:
  - Weil seine Komplexität die Steuerbeamten von der Steuererhebung abhielt
  - Weil seine Milde die Franzosen davon abhielt, ins Ausland zu fliehen
  - Weil es zu einfach und vorhersehbar war
explanation: |
  Die Besteuerung unter dem Ancien Régime war oft willkürlich und unberechenbar. Das Fehlen klarer Regeln und die Möglichkeit, übermäßig besteuert zu werden, hielten von Investitionen und Bereicherung ab, da Gewinne durch Besteuerung konfisziert werden konnten.