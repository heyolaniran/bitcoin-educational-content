question: Why is the Ancien Régime tax system described as "disincentive"?
answer: Because a barely enriched man could find himself taxed twice the following year
wrong_answers:
  - Because its complexity discouraged tax agents from collecting taxes
  - Because its mildness discouraged French people from fleeing abroad
  - Because it was too simple and predictable
explanation: |
  Taxation under the Ancien Régime was often arbitrary and unpredictable. The absence of clear rules and the possibility of being over-taxed discouraged investment and enrichment, as gains could be confiscated by taxation.