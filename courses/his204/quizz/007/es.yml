question: ¿Por qué se califica de "desincentivador" el sistema fiscal del Antiguo Régimen?
answer: Porque un hombre apenas enriquecido podría verse gravado dos veces al año siguiente
wrong_answers:
  - Porque su complejidad disuadía a los agentes fiscales de recaudar impuestos
  - Porque su suavidad disuadió a los franceses de huir al extranjero
  - Porque era demasiado simple y predecible
explanation: |
  La fiscalidad del Antiguo Régimen era a menudo arbitraria e imprevisible. La ausencia de normas claras y la posibilidad de tributar en exceso desalentaban la inversión y el enriquecimiento, ya que las ganancias podían ser confiscadas por los impuestos.