question: چرا سیستم مالیاتی رژیم قدیم به عنوان "بازدارنده" توصیف می‌شود؟
answer: زیرا ممکن است مردی که به سختی ثروتمند شده است، در سال بعد دو بار مالیات پرداخت کند.
wrong_answers:
  - زیرا پیچیدگی آن مأموران مالیاتی را از جمع‌آوری مالیات منصرف کرد
  - زیرا ملایمت آن، مردم فرانسه را از فرار به خارج از کشور منصرف کرد
  - زیرا خیلی ساده و قابل پیش‌بینی بود
explanation: |
  مالیات در دوران رژیم قدیم اغلب خودسرانه و غیرقابل پیش‌بینی بود. نبود قوانین روشن و امکان مالیات‌گیری بیش از حد، سرمایه‌گذاری و ثروت‌اندوزی را دلسرد می‌کرد، زیرا سودها می‌توانستند توسط مالیات مصادره شوند.