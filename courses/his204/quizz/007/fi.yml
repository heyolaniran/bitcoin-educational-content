question: Miksi Ancien Régime -verojärjestelmää kuvataan "kannustavaksi"?
answer: Koska tuskin rikastunut mies saattoi joutua seuraavana vuonna kaksinkertaiseen verotukseen
wrong_answers:
  - Koska sen monimutkaisuus esti verovirkailijoita keräämästä veroja
  - Koska sen lempeys lannisti ranskalaisia pakenemaan ulkomaille
  - Koska se oli liian yksinkertainen ja ennalta arvattava
explanation: |
  Ancien Régimen aikainen verotus oli usein mielivaltaista ja arvaamatonta. Selkeiden sääntöjen puuttuminen ja mahdollisuus joutua yliverotetuksi lannisti investointeja ja rikastumista, sillä voitot voitiin takavarikoida verotuksen avulla.