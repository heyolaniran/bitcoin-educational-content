question: एन्सियन रेजीम कर प्रणाली को "निराशाजनक" क्यों कहा गया है?
answer: क्योंकि मुश्किल से अमीर हुए व्यक्ति पर अगले साल दोगुना कर लगाया जा सकता है
wrong_answers:
  - क्योंकि इसकी जटिलता ने कर एजेंटों को कर एकत्र करने से हतोत्साहित किया
  - क्योंकि इसकी सौम्यता ने फ्रांसीसी लोगों को विदेश भागने से हतोत्साहित किया
  - क्योंकि यह बहुत सरल और पूर्वानुमानित था
explanation: |
  एन्सियन रेजीम के तहत कराधान अक्सर मनमाना और अप्रत्याशित था। स्पष्ट नियमों की अनुपस्थिति और अत्यधिक कर लगाए जाने की संभावना ने निवेश और समृद्धि को हतोत्साहित किया, क्योंकि कराधान द्वारा लाभ जब्त किया जा सकता था।