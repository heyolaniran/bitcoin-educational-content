question: Mengapa sistem pajak Ancien Régime digambarkan sebagai "disinsentif"?
answer: Karena orang yang baru saja diperkaya dapat menemukan dirinya dikenai pajak dua kali pada tahun berikutnya
wrong_answers:
  - Karena kerumitannya membuat agen pajak enggan mengumpulkan pajak
  - Karena kelembutannya membuat orang Prancis enggan melarikan diri ke luar negeri
  - Karena terlalu sederhana dan mudah ditebak
explanation: |
  Perpajakan di bawah Ancien Régime sering kali sewenang-wenang dan tidak dapat diprediksi. Tidak adanya aturan yang jelas dan kemungkinan dikenakan pajak yang berlebihan membuat investasi dan pengayaan menjadi tidak menarik, karena keuntungan yang diperoleh dapat disita oleh pajak.