question: Perché il sistema fiscale dell'Ancien Régime viene definito "disincentivante"?
answer: Perché un uomo appena arricchito potrebbe trovarsi tassato due volte l'anno successivo
wrong_answers:
  - Perché la sua complessità scoraggiava gli agenti fiscali dal riscuotere le imposte
  - Perché la sua mitezza scoraggiava i francesi a fuggire all'estero
  - Perché era troppo semplice e prevedibile
explanation: |
  La tassazione sotto l'Ancien Régime era spesso arbitraria e imprevedibile. L'assenza di regole chiare e la possibilità di essere tassati eccessivamente scoraggiavano gli investimenti e l'arricchimento, poiché i guadagni potevano essere confiscati dalla tassazione.