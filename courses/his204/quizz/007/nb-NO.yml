question: Hvorfor blir Ancien Régimes skattesystem beskrevet som "avskrekkende"?
answer: Fordi en knapt beriket mann kunne oppleve å bli beskattet to ganger året etter
wrong_answers:
  - Fordi kompleksiteten avskrekket skatteagenter fra å kreve inn skatt
  - Fordi dens mildhet avskrekket franskmenn fra å flykte til utlandet
  - Fordi det var for enkelt og forutsigbart
explanation: |
  Beskatningen under Ancien Régime var ofte vilkårlig og uforutsigbar. Fraværet av klare regler og muligheten for å bli overbeskattet motvirket investeringer og berikelse, ettersom gevinster kunne bli konfiskert ved beskatning.