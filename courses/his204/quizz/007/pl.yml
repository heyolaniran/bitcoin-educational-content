question: Dlaczego system podatkowy Ancien Régime jest określany jako "zniechęcający"?
answer: Ponieważ ledwo wzbogacony człowiek może zostać opodatkowany dwukrotnie w następnym roku
wrong_answers:
  - Ponieważ jego złożoność zniechęcała agentów podatkowych do pobierania podatków
  - Ponieważ jego łagodność zniechęcała Francuzów do ucieczki za granicę
  - Ponieważ był zbyt prosty i przewidywalny
explanation: |
  Opodatkowanie w czasach ancien régime'u było często arbitralne i nieprzewidywalne. Brak jasnych zasad i możliwość bycia nadmiernie opodatkowanym zniechęcały do inwestowania i bogacenia się, ponieważ zyski mogły zostać skonfiskowane przez opodatkowanie.