question: Porque é que o sistema fiscal do Antigo Regime é descrito como "desincentivador"?
answer: Porque um homem pouco enriquecido pode ser tributado duas vezes no ano seguinte
wrong_answers:
  - Porque a sua complexidade desencorajava os agentes fiscais de cobrarem impostos
  - Porque a sua brandura desencorajava os franceses a fugir para o estrangeiro
  - Porque era demasiado simples e previsível
explanation: |
  A tributação durante o Antigo Regime era frequentemente arbitrária e imprevisível. A ausência de regras claras e a possibilidade de ser tributado em excesso desencorajavam o investimento e o enriquecimento, uma vez que os ganhos podiam ser confiscados pela tributação.