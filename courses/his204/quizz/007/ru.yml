question: Почему налоговая система эпохи Древнего режима называется "дестимулирующей"?
answer: Потому что едва обогатившийся человек может оказаться дважды обложенным налогом в следующем году
wrong_answers:
  - Поскольку его сложность мешала налоговым агентам собирать налоги
  - Потому что его мягкость отбивала у французов желание бежать за границу
  - Потому что она была слишком простой и предсказуемой
explanation: |
  Налогообложение в эпоху Древнего режима часто было произвольным и непредсказуемым. Отсутствие четких правил и возможность чрезмерного налогообложения препятствовали инвестициям и обогащению, поскольку доходы могли быть конфискованы в результате налогообложения.