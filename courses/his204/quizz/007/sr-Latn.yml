question: Zašto se poreski sistem Ancien Régime opisuje kao "destimulativan"?
answer: Jer čovek koji je jedva obogaćen mogao bi se naći oporezovan dvaput sledeće godine
wrong_answers:
  - Zbog svoje složenosti obeshrabrivao je poreske agente od prikupljanja poreza
  - Zbog svoje blagosti obeshrabrila je Francuze da beže u inostranstvo
  - Jer je bilo previše jednostavno i predvidljivo
explanation: |
  Oporezivanje pod Ancien Régimeom često je bilo proizvoljno i nepredvidivo. Odsustvo jasnih pravila i mogućnost prekomernog oporezivanja obeshrabrivali su ulaganja i bogaćenje, jer su dobici mogli biti konfiskovani putem oporezivanja.