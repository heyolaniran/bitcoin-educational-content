question: Varför beskrivs Ancien Régimes skattesystem som "avskräckande"?
answer: Eftersom en knappt berikad man kan bli beskattad två gånger året därpå
wrong_answers:
  - Eftersom dess komplexitet avskräckte skatteombud från att driva in skatter
  - Eftersom dess mildhet avskräckte fransmän från att fly utomlands
  - För att den var för enkel och förutsägbar
explanation: |
  Beskattningen under Ancien Régime var ofta godtycklig och oförutsägbar. Avsaknaden av tydliga regler och möjligheten att bli överbeskattad avskräckte från investeringar och berikande, eftersom vinster kunde konfiskeras genom beskattning.