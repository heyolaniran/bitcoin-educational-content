question: Kwa nini mfumo wa ushuru wa Ancien Régime unafafanuliwa kama "usiojali"?
answer: Kwa sababu mtu aliyetajirika kidogo angeweza kujikuta akitozwa ushuru mara mbili mwaka uliofuata
wrong_answers:
  - Kwa sababu utata wake ulikatisha tamaa mawakala wa ushuru kukusanya kodi
  - Kwa sababu upole wake uliwavunja moyo Wafaransa wasitoroke nje ya nchi
  - Kwa sababu ilikuwa rahisi sana na kutabirika
explanation: |
  Ushuru chini ya Utawala wa Kale mara nyingi ulikuwa wa kiholela na hautabiriki. Kutokuwepo kwa sheria zilizo wazi na uwezekano wa kutozwa ushuru kupita kiasi kulikatisha tamaa uwekezaji na utajilishaji, kwani faida zinaweza kutwaliwa na ushuru.