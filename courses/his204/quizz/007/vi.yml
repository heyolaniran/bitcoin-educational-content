question: Tại sao hệ thống thuế của Ancien Régime được mô tả là "không khuyến khích"?
answer: Bởi vì một người đàn ông hầu như không giàu có có thể thấy mình bị đánh thuế gấp đôi vào năm sau
wrong_answers:
  - Bởi vì sự phức tạp của nó đã làm nản lòng các nhân viên thuế trong việc thu thuế
  - Bởi vì sự ôn hòa của nó đã ngăn cản người Pháp chạy trốn ra nước ngoài
  - Bởi vì nó quá đơn giản và dễ đoán
explanation: |
  Thuế theo Ancien Régime thường tùy tiện và không thể đoán trước. Việc không có các quy tắc rõ ràng và khả năng bị đánh thuế quá mức đã ngăn cản đầu tư và làm giàu, vì lợi nhuận có thể bị tịch thu bằng thuế.