question: واوبان در نوشته‌های خود از چه نوع مالیاتی حمایت می‌کرد؟
answer: مالیات متناسب همه باید همان درصد از درآمد خود را به دولت بدهند
wrong_answers:
  - مالیات تصاعدی نرخ مالیات برای ثروتمندان باید بالاتر از نرخ مالیات برای فقرا باشد.
  - مالیات با نرخ ثابت بدون توجه به درآمد شما، هر سال همان مبلغ را به دولت پرداخت می‌کنید.
  - نرخ‌های مالیات بازگشتی برای فقرا باید بالاتر از نرخ‌های مالیات برای ثروتمندان باشد.
explanation: |
  وابان از یک مالیات متناسب به نام "عشر سلطنتی" حمایت می‌کرد که شامل دریافت یک دهم (10٪) از درآمد همه مردم فرانسه، بدون توجه به وضعیت اجتماعی آن‌ها بود. او معتقد بود که این مالیات عادلانه‌تر و کارآمدتر از سیستم مالیاتی موجود خواهد بود.