question: वौबन ने अपने लेखन में किस प्रकार के कर की वकालत की?
answer: आनुपातिक कर प्रत्येक व्यक्ति को अपनी आय का समान प्रतिशत राज्य को देना होगा
wrong_answers:
  - प्रगतिशील कराधान में अमीरों के लिए कर की दर गरीबों की तुलना में अधिक होनी चाहिए
  - आपकी आय चाहे जो भी हो, फ्लैट-रेट टैक्स के तहत आप सरकार को हर साल एक ही राशि का भुगतान करते हैं
  - प्रतिगामी कराधान: गरीबों के लिए कर की दरें अमीरों की तुलना में अधिक होनी चाहिए
explanation: |
  वाउबन ने एक आनुपातिक कर, "शाही दशमांश" की वकालत की, जिसमें सभी फ्रांसीसी लोगों की आय का दसवां हिस्सा (10%) लगाया जाना शामिल था, चाहे उनकी सामाजिक स्थिति कुछ भी हो। उनका मानना ​​था कि यह कर मौजूदा कर प्रणाली की तुलना में अधिक न्यायपूर्ण और कुशल होगा।