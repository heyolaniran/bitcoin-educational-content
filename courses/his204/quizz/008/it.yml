question: Che tipo di tassa sosteneva Vauban nei suoi scritti?
answer: Imposta proporzionale Tutti devono dare la stessa percentuale del loro reddito allo Stato
wrong_answers:
  - Tassazione progressiva: l'aliquota fiscale per i ricchi deve essere più alta di quella per i poveri
  - L'imposta forfettaria, a prescindere dal reddito, si paga lo stesso importo ogni anno al governo
  - Tassazione regressiva Le aliquote fiscali per i poveri devono essere più alte di quelle per i ricchi
explanation: |
  Vauban sostenne una tassa proporzionale, la "decima reale", che consisteva nel prelevare un decimo (10%) del reddito di tutti i francesi, indipendentemente dal loro status sociale. Egli riteneva che questa tassa sarebbe stata più equa e più efficiente del sistema fiscale esistente.