question: ヴォーバンは著作の中でどのような税制を提唱したのか？
answer: 比例税 すべての人が所得の同じ割合を国に納めなければならない。
wrong_answers:
  - 累進課税......金持ちの税率は貧乏人の税率より高くなければならない。
  - 所得に関係なく毎年同額を国に納める定率減税
  - 逆進性課税 貧民の税率は富裕層の税率より高くなければならない。
explanation: |
  ヴォーバンは比例税「王室什分の一」を提唱し、社会的地位に関係なく、すべてのフランス人の所得の10分の1（10％）を徴収することを決めた。彼は、この税は現行の税制よりも公平で効率的であると考えた。