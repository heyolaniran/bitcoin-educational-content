question: За какой тип налога выступал Вобан в своих трудах?
answer: Пропорциональный налог Все должны отдавать государству одинаковый процент от своего дохода
wrong_answers:
  - Прогрессивное налогообложение, при котором ставка налога для богатых должна быть выше, чем для бедных
  - Налог по единой ставке, независимо от вашего дохода, вы платите государству одну и ту же сумму каждый год
  - Регрессивное налогообложение Налоговые ставки для бедных должны быть выше, чем для богатых
explanation: |
  Вобан выступал за введение пропорционального налога, "королевской десятины", который заключался во взимании десятой части (10 %) доходов всех французов, независимо от их социального статуса. Он считал, что такой налог будет справедливее и эффективнее существующей налоговой системы.