question: Jak Tocqueville hodnotil Vaubanovy výroky o stavu Francie na počátku 18. století?
answer: Jeho poznámky byly děsivé, ale opodstatněné
wrong_answers:
  - Jedná se o přehánění
  - Byl outsiderem
  - Byly úplně mimo mísu
explanation: |
  Alexis de Tocqueville ve své knize "L'Ancien Régime et la Révolution" zdůraznil význam Vaubanových postřehů o bídě lidu a sociální nerovnosti ve Francii na počátku 18. století. Domníval se, že Vauban vykreslil realistický a alarmující obraz situace.