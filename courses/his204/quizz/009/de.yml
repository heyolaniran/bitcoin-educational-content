question: Wie beurteilte Tocqueville Vaubans Äußerungen über den Zustand Frankreichs im frühen 18. Jahrhundert?
answer: Seine Äußerungen waren erschreckend, aber fundiert
wrong_answers:
  - Dies sind Übertreibungen
  - Er war ein Außenseiter
  - Sie waren völlig fehl am Platz
explanation: |
  Alexis de Tocqueville unterstrich in seinem Buch "L'Ancien Régime et la Révolution" die Bedeutung von Vaubans Beobachtungen über das Elend der Menschen und die sozialen Ungleichheiten in Frankreich zu Beginn des 18. Er war der Ansicht, dass Vauban ein realistisches und alarmierendes Bild der Situation gezeichnet hatte.