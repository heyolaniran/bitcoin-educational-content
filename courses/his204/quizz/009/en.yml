question: How did Tocqueville judge Vauban's remarks on the state of France in the early 18th century?
answer: His remarks were frightening but well-founded
wrong_answers:
  - These are exaggerations
  - He was an underdog
  - They were totally out of place
explanation: |
  Alexis de Tocqueville, in his book "L'Ancien Régime et la Révolution", underlined the relevance of Vauban's observations on the misery of the people and social inequalities in France at the beginning of the 18th century. He felt that Vauban had painted a realistic and alarming picture of the situation.