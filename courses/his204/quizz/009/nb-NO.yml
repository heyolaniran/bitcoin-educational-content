question: Hvordan vurderte Tocqueville Vaubans uttalelser om tilstanden i Frankrike på begynnelsen av 1700-tallet?
answer: Hans bemerkninger var skremmende, men velbegrunnede
wrong_answers:
  - Dette er overdrivelser
  - Han var en underdog
  - De var helt malplassert
explanation: |
  Alexis de Tocqueville understreket i sin bok "L'Ancien Régime et la Révolution" relevansen av Vaubans observasjoner av elendigheten blant folket og de sosiale ulikhetene i Frankrike på begynnelsen av 1700-tallet. Han mente at Vauban hadde tegnet et realistisk og alarmerende bilde av situasjonen.