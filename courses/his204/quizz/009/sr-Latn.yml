question: Kako je Tokvil ocenio Vaubanove primedbe o stanju Francuske početkom 18. veka?
answer: Njegove primedbe bile su zastrašujuće, ali dobro utemeljene.
wrong_answers:
  - Ovo su preterivanja
  - Bio je autsajder
  - Bili su potpuno van mesta
explanation: |
  Alexis de Tocqueville, u svojoj knjizi "L'Ancien Régime et la Révolution", istakao je relevantnost Vaubanovih zapažanja o bedi naroda i društvenim nejednakostima u Francuskoj početkom 18. veka. Smatrao je da je Vauban naslikao realističnu i alarmantnu sliku situacije.