question: Hur bedömde Tocqueville Vaubans kommentarer om tillståndet i Frankrike i början av 1700-talet?
answer: Hans kommentarer var skrämmande men välgrundade
wrong_answers:
  - Detta är överdrifter
  - Han var en underdog
  - De var helt malplacerade
explanation: |
  Alexis de Tocqueville underströk i sin bok "L'Ancien Régime et la Révolution" relevansen av Vaubans iakttagelser om folkets misär och de sociala orättvisorna i Frankrike i början av 1700-talet. Han ansåg att Vauban hade målat upp en realistisk och alarmerande bild av situationen.