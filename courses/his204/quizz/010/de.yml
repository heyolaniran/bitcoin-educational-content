question: Warum, so Vauban, ist es richtig und natürlich, dass jeder Steuern zahlt?
answer: Da der Staat seine Dienstleistungen allen zur Verfügung stellt, ist es nur fair, dass alle zur Finanzierung beitragen
wrong_answers:
  - Weil der Staat mehr Geld einnehmen kann, wenn er die gesamte Bevölkerung auf einmal besteuert
  - Da jeder Mensch im Laufe seines Lebens mal reich und mal arm ist, ist es besser, alle gleich zu besteuern
  - Weil es hilft, Kriege zu finanzieren und die Größe des Königreichs zu sichern
explanation: |
  Vauban war der Ansicht, dass die Besteuerung universell sein sollte, da alle Bürger von den staatlichen Dienstleistungen wie Sicherheit, Justiz und Infrastruktur profitieren. Er hielt es daher für gerecht, dass jeder nach seinen Möglichkeiten zu ihrer Finanzierung beitragen sollte.