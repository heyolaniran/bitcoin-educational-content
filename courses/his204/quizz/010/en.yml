question: Why, according to Vauban, is it right and natural for everyone to pay taxes?
answer: Because the State offers its services to all, it's only fair that everyone should contribute to paying for them
wrong_answers:
  - Because the state can raise more by taxing the whole population at once
  - Because everyone is sometimes rich and sometimes poor in the course of their lives, it is better to tax everyone uniformly
  - Because it helps finance wars and ensure the kingdom's greatness
explanation: |
  Vauban believed that taxation should be universal, as all citizens benefited from state services such as security, justice and infrastructure. He therefore considered it fair that everyone should contribute to their funding according to their means.