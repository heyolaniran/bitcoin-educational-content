question: چرا به گفته ووبان، پرداخت مالیات برای همه درست و طبیعی است؟
answer: زیرا دولت خدمات خود را به همه ارائه می‌دهد، منصفانه است که همه در پرداخت هزینه‌های آن مشارکت کنند.
wrong_answers:
  - زیرا دولت می‌تواند با مالیات‌گیری از کل جمعیت به‌طور همزمان، درآمد بیشتری کسب کند
  - زیرا هر کسی در طول زندگی خود گاهی ثروتمند و گاهی فقیر است، بهتر است که از همه به‌طور یکنواخت مالیات گرفته شود.
  - زیرا این امر به تأمین مالی جنگ‌ها و تضمین عظمت پادشاهی کمک می‌کند
explanation: |
  واوبان معتقد بود که مالیات باید همگانی باشد، زیرا همه شهروندان از خدمات دولتی مانند امنیت، عدالت و زیرساخت‌ها بهره‌مند می‌شوند. بنابراین او معتقد بود که عادلانه است که همه بر اساس توانایی‌های خود به تأمین مالی این خدمات کمک کنند.