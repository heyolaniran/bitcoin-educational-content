question: Pourquoi, selon Vauban, il est juste et naturel que l’impôt soit payé par tous ?
answer: Parce que l’Etat offrant ses services à tous, il est juste que tous contribuent à les payer
wrong_answers:
  - Parce que l’Etat peut prélever davantage en taxant toute la population à la fois
  - Parce que chacun étant au cours de sa vie tantôt riche et tantôt pauvre, il vaut mieux taxer uniformément tout le monde
  - Parce que cela permet de financer les guerres et d'assurer la grandeur du royaume
explanation: |
  Vauban estimait que l'impôt devait être universel car tous les citoyens bénéficiaient des services offerts par l'État, tels que la sécurité, la justice et les infrastructures. Il considérait donc qu'il était juste que chacun contribue à leur financement en fonction de ses moyens.
