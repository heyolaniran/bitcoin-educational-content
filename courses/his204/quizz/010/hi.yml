question: वाउबन के अनुसार, सभी के लिए कर देना सही और स्वाभाविक क्यों है?
answer: चूंकि राज्य अपनी सेवाएं सभी को प्रदान करता है, इसलिए यह उचित है कि सभी लोग इसके भुगतान में योगदान दें।
wrong_answers:
  - क्योंकि राज्य पूरी आबादी पर एक साथ कर लगाकर अधिक धन जुटा सकता है
  - क्योंकि हर व्यक्ति अपने जीवन में कभी अमीर होता है और कभी गरीब, इसलिए सभी पर समान कर लगाना बेहतर है।
  - क्योंकि यह युद्धों के लिए वित्तीय सहायता प्रदान करता है और राज्य की महानता सुनिश्चित करता है
explanation: |
  वाउबन का मानना ​​था कि कराधान सार्वभौमिक होना चाहिए, क्योंकि सभी नागरिकों को सुरक्षा, न्याय और बुनियादी ढांचे जैसी राज्य सेवाओं से लाभ मिलता है। इसलिए उन्होंने इसे उचित माना कि हर किसी को अपने साधनों के अनुसार अपने वित्त पोषण में योगदान देना चाहिए।