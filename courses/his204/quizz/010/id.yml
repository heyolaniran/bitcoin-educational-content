question: Mengapa, menurut Vauban, semua orang harus membayar pajak?
answer: Karena Negara menawarkan layanannya kepada semua orang, maka sudah sewajarnya setiap orang berkontribusi untuk membayarnya
wrong_answers:
  - Karena negara dapat mengumpulkan lebih banyak dengan memajaki seluruh populasi sekaligus
  - Karena setiap orang terkadang kaya dan terkadang miskin dalam perjalanan hidup mereka, lebih baik mengenakan pajak kepada semua orang secara seragam
  - Karena membantu membiayai perang dan memastikan kebesaran kerajaan
explanation: |
  Vauban percaya bahwa pajak harus bersifat universal, karena semua warga negara mendapat manfaat dari layanan negara seperti keamanan, keadilan dan infrastruktur. Oleh karena itu, ia menganggap adil jika setiap orang harus berkontribusi pada pendanaan sesuai dengan kemampuan mereka.