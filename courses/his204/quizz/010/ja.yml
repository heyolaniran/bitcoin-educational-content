question: ヴォーバンによれば、なぜすべての人が税金を払うのが当然であり、正しいことなのか？
answer: 国はすべての人にサービスを提供しているのだから、すべての人がその費用を負担するのは当然だ
wrong_answers:
  - 国民全員に一度に課税すれば、国家はより多くの税金を集めることができるからだ。
  - 誰もが人生の中で金持ちになることもあれば貧乏になることもあるのだから、全員に一律に課税する方がよい。
  - 戦争資金を調達し、王国の偉大さを確保するのに役立つからだ
explanation: |
  ヴォーバンは、すべての国民が治安、司法、インフラといった国家サービスの恩恵を受けている以上、課税は普遍的であるべきだと考えていた。そのため、すべての国民がその負担に応じて資金を拠出することが公平であると考えていた。