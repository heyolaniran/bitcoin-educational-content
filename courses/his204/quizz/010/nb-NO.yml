question: Hvorfor er det ifølge Vauban riktig og naturlig at alle skal betale skatt?
answer: Fordi staten tilbyr sine tjenester til alle, er det ikke mer enn rettferdig at alle bidrar til å betale for dem
wrong_answers:
  - Fordi staten kan få inn mer ved å skattlegge hele befolkningen på én gang
  - Fordi alle mennesker i løpet av livet kan være både rike og fattige, er det bedre å skattlegge alle likt
  - Fordi det bidrar til å finansiere kriger og sikre rikets storhet
explanation: |
  Vauban mente at beskatningen burde være universell, ettersom alle borgere nøt godt av statlige tjenester som sikkerhet, rettsvesen og infrastruktur. Han mente derfor at det var rettferdig at alle skulle bidra til finansieringen etter evne.