question: Dlaczego, według Vaubana, płacenie podatków przez wszystkich jest słuszne i naturalne?
answer: Ponieważ państwo oferuje swoje usługi wszystkim, sprawiedliwe jest, aby każdy przyczyniał się do ich opłacania
wrong_answers:
  - Ponieważ państwo może zebrać więcej, opodatkowując całą populację naraz
  - Ponieważ każdy jest czasem bogaty, a czasem biedny w ciągu swojego życia, lepiej jest opodatkować wszystkich jednakowo
  - Ponieważ pomaga finansować wojny i zapewnia królestwu wielkość
explanation: |
  Vauban uważał, że opodatkowanie powinno być powszechne, ponieważ wszyscy obywatele korzystali z usług państwowych, takich jak bezpieczeństwo, wymiar sprawiedliwości i infrastruktura. Dlatego też uważał za sprawiedliwe, aby każdy przyczyniał się do ich finansowania zgodnie z posiadanymi środkami.