question: Почему, по мнению Вобана, платить налоги - это правильно и естественно для всех?
answer: Поскольку государство предоставляет свои услуги всем, справедливо, что каждый должен вносить свой вклад в их оплату
wrong_answers:
  - Потому что государство может собрать больше налогов, обложив все население сразу
  - Поскольку в течение жизни каждый человек иногда богатеет, а иногда беднеет, лучше облагать всех одинаковыми налогами
  - Потому что это помогает финансировать войны и обеспечивать величие королевства
explanation: |
  Вобан считал, что налогообложение должно быть всеобщим, поскольку все граждане пользуются государственными услугами, такими как безопасность, правосудие и инфраструктура. Поэтому он считал справедливым, что каждый должен вносить свой вклад в их финансирование в соответствии со своими средствами.