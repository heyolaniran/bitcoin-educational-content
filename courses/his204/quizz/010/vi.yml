question: Theo Vauban, tại sao việc mọi người đều phải nộp thuế lại là điều đúng đắn và tự nhiên?
answer: Bởi vì Nhà nước cung cấp dịch vụ cho tất cả mọi người, nên công bằng mà nói, mọi người đều phải đóng góp để trả tiền cho các dịch vụ đó.
wrong_answers:
  - Bởi vì nhà nước có thể tăng thêm thu nhập bằng cách đánh thuế toàn bộ dân số cùng một lúc
  - Bởi vì mọi người đôi khi giàu có và đôi khi nghèo đói trong suốt cuộc đời của họ, tốt hơn là đánh thuế mọi người một cách đồng đều
  - Bởi vì nó giúp tài trợ cho chiến tranh và đảm bảo sự vĩ đại của vương quốc
explanation: |
  Vauban tin rằng thuế phải mang tính phổ quát, vì tất cả công dân đều được hưởng lợi từ các dịch vụ nhà nước như an ninh, tư pháp và cơ sở hạ tầng. Do đó, ông cho rằng công bằng khi mọi người đóng góp vào quỹ của họ theo khả năng của họ.