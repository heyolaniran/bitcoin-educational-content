question: Was hat Boisguilbert mit Vauban gemeinsam?
answer: Weil er das Elend der Landbevölkerung ausführlich beschrieben und eine proportionale Steuer für alle vorgeschlagen hat
wrong_answers:
  - Weil er das Elend der Landbevölkerung ausführlich beschrieben hat und weil er seine Karriere als Schriftsteller begann
  - Weil er eine proportionale Steuer für alle vorgeschlagen hat und weil er Finanzminister war
  - Finanzminister gewesen zu sein und mit einer literarischen Karriere begonnen zu haben
explanation: |
  Pierre Le Pesant, sieur de Boisguilbert, war wie Vauban ein scharfer Beobachter des bäuerlichen Elends und schlug eine Steuerreform auf der Grundlage einer proportionalen Steuer vor. Im Gegensatz zu Colbert waren jedoch weder Boisguilbert noch Vauban Finanzminister.