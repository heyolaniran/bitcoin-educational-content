question: What does Boisguilbert have in common with Vauban?
answer: For having described at length the misery of rural people and for having proposed a proportional tax for all
wrong_answers:
  - For having described at length the misery of rural people, and for having begun his career as a writer
  - For having proposed a proportional tax for all and for having been Finance Minister
  - To have been Minister of Finance and to have started out with a literary career
explanation: |
  Pierre Le Pesant, sieur de Boisguilbert, like Vauban, was a keen observer of peasant misery and proposed a tax reform based on a proportional tax. However, unlike Colbert, neither Boisguilbert nor Vauban were finance ministers.