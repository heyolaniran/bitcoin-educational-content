question: بوآگیلبر چه وجه اشتراکی با ووبان دارد؟
answer: به خاطر توصیف طولانی بدبختی مردم روستایی و پیشنهاد مالیات متناسب برای همه
wrong_answers:
  - به خاطر توصیف طولانی بدبختی مردم روستایی و آغاز حرفه‌اش به عنوان نویسنده
  - برای پیشنهاد مالیات متناسب برای همه و برای اینکه وزیر دارایی بوده است
  - وزیر دارایی بودن و با یک حرفه ادبی شروع کردن
explanation: |
  پیر لو پزان، سیور دو بواگیلبر، مانند ووبان، ناظر دقیق بدبختی دهقانان بود و اصلاح مالیاتی بر اساس مالیات متناسب پیشنهاد کرد. با این حال، برخلاف کولبر، نه بواگیلبر و نه ووبان وزیر دارایی نبودند.