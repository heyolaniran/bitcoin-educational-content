question: Mitä yhteistä on Boisguilbertillä ja Vaubanilla?
answer: Koska hän on kuvaillut perusteellisesti maaseudun asukkaiden kurjuutta ja ehdottanut suhteellista veroa, joka koskisi kaikkia
wrong_answers:
  - Koska hän on kuvannut pitkään maaseudun ihmisten kurjuutta ja koska hän on aloittanut uransa kirjailijana
  - Koska hän ehdotti suhteellista veroa kaikille ja koska hän oli valtiovarainministeri
  - Ollut valtiovarainministerinä ja aloittanut kirjallisen uran -
explanation: |
  Pierre Le Pesant, sieur de Boisguilbert, oli Vaubanin tavoin tarkkailija talonpoikien kurjuudesta ja ehdotti verouudistusta, joka perustui suhteelliseen veroon. Toisin kuin Colbert, Boisguilbert ja Vauban eivät kuitenkaan olleet valtiovarainministereitä.