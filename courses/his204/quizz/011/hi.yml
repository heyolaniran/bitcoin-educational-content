question: बोइसगिल्बर्ट और वौबन में क्या समानता है?
answer: ग्रामीण लोगों की दुर्दशा का विस्तार से वर्णन करने तथा सभी के लिए आनुपातिक कर का प्रस्ताव करने के लिए
wrong_answers:
  - ग्रामीण लोगों की व्यथा का विस्तार से वर्णन करने के लिए, तथा एक लेखक के रूप में अपना करियर शुरू करने के लिए
  - सभी के लिए आनुपातिक कर का प्रस्ताव रखने और वित्त मंत्री रहने के लिए
  - वित्त मंत्री रहे और साहित्यिक जीवन की शुरुआत की
explanation: |
  पियरे ले पेसेंट, सीउर डी बोइसगिलबर्ट, वाउबन की तरह, किसानों की दुर्दशा के एक उत्सुक पर्यवेक्षक थे और उन्होंने आनुपातिक कर के आधार पर कर सुधार का प्रस्ताव रखा। हालांकि, कोलबर्ट के विपरीत, न तो बोइसगिलबर्ट और न ही वाउबन वित्त मंत्री थे।