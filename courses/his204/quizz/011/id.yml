question: Apa kesamaan antara Boisguilbert dengan Vauban?
answer: Karena telah menggambarkan secara panjang lebar kesengsaraan rakyat pedesaan dan karena telah mengusulkan pajak proporsional untuk semua
wrong_answers:
  - Karena telah menggambarkan secara panjang lebar kesengsaraan masyarakat pedesaan, dan karena telah memulai karirnya sebagai penulis
  - Karena telah mengusulkan pajak proporsional untuk semua dan pernah menjadi Menteri Keuangan
  - Pernah menjadi Menteri Keuangan dan memulai karier sebagai sastrawan
explanation: |
  Pierre Le Pesant, sieur de Boisguilbert, seperti halnya Vauban, adalah seorang pengamat yang tajam terhadap kesengsaraan petani dan mengusulkan reformasi pajak berdasarkan pajak proporsional. Namun, tidak seperti Colbert, baik Boisguilbert maupun Vauban bukanlah menteri keuangan.