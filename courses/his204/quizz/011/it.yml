question: Che cosa ha in comune Boisguilbert con Vauban?
answer: Per aver descritto a lungo la miseria delle popolazioni rurali e per aver proposto un'imposta proporzionale per tutti
wrong_answers:
  - Per aver descritto a lungo la miseria delle popolazioni rurali, e per aver iniziato la sua carriera di scrittore
  - Per aver proposto un'imposta proporzionale per tutti e per essere stato Ministro delle Finanze
  - Essere stato Ministro delle Finanze e aver iniziato una carriera letteraria
explanation: |
  Pierre Le Pesant, sieur de Boisguilbert, come Vauban, era un attento osservatore della miseria contadina e propose una riforma fiscale basata su un'imposta proporzionale. Tuttavia, a differenza di Colbert, né Boisguilbert né Vauban furono ministri delle finanze.