question: ボワジルベールとヴォーバンの共通点は？
answer: 農村の人々の悲惨さを長々と説明し、すべての人々に比例税を課すことを提案した。
wrong_answers:
  - 農村の人々の悲惨さを長々と描写し、作家としてのキャリアをスタートさせたからだ。
  - 万人への比例課税を提案し、財務大臣を務めたこと。
  - 大蔵大臣になったこと、そして文学者としてのキャリアをスタートさせたこと
explanation: |
  ボワギルベール伯ピエール・ル・ペザンは、ヴォーバンと同様、農民の悲惨さを鋭く観察し、比例税に基づく税制改革を提案した。しかし、コルベールとは異なり、ボワギルベールもヴォーバンも大蔵大臣ではなかった。