question: Hva har Boisguilbert til felles med Vauban?
answer: For å ha beskrevet elendigheten på landsbygda og for å ha foreslått en proporsjonal skatt for alle
wrong_answers:
  - For å ha beskrevet bygdefolkets elendighet i detalj, og for å ha begynt sin karriere som forfatter
  - For å ha foreslått en proporsjonal skatt for alle og for å ha vært finansminister
  - Å ha vært finansminister og å ha startet med en litterær karriere
explanation: |
  Pierre Le Pesant, sieur de Boisguilbert, var i likhet med Vauban en skarp observatør av bøndenes elendighet, og foreslo en skattereform basert på en proporsjonal skatt. Men i motsetning til Colbert var verken Boisguilbert eller Vauban finansministre.