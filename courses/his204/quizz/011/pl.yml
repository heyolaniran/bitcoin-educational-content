question: Co Boisguilbert ma wspólnego z Vaubanem?
answer: Za obszerne opisanie nędzy ludności wiejskiej i zaproponowanie proporcjonalnego podatku dla wszystkich
wrong_answers:
  - Za to, że obszernie opisał niedolę ludności wiejskiej i rozpoczął swoją karierę jako pisarz
  - Za zaproponowanie podatku proporcjonalnego dla wszystkich i bycie ministrem finansów
  - Bycie ministrem finansów i rozpoczęcie kariery literackiej
explanation: |
  Pierre Le Pesant, sieur de Boisguilbert, podobnie jak Vauban, był bystrym obserwatorem nędzy chłopów i zaproponował reformę podatkową opartą na podatku proporcjonalnym. Jednak w przeciwieństwie do Colberta, ani Boisguilbert, ani Vauban nie byli ministrami finansów.