question: Что общего между Буагильбером и Вобаном?
answer: За то, что он подробно описал бедственное положение сельских жителей и предложил ввести пропорциональный налог для всех
wrong_answers:
  - За то, что он подробно описал страдания сельских жителей, и за то, что он начал свою карьеру как писатель
  - За предложение ввести пропорциональный налог для всех и за то, что он был министром финансов
  - Быть министром финансов и начать литературную карьеру
explanation: |
  Пьер Ле Пезан, сьер де Буагильбер, как и Вобан, был внимательным наблюдателем крестьянских бедствий и предложил налоговую реформу, основанную на пропорциональном налоге. Однако, в отличие от Кольбера, ни Буагильбер, ни Вобан не были министрами финансов.