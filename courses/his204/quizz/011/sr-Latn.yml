question: Šta Boisguilbert ima zajedničko sa Vaubanom?
answer: Zbog toga što je opširno opisao bedu seoskog stanovništva i predložio proporcionalni porez za sve
wrong_answers:
  - Zbog toga što je opširno opisao bedu seoskog stanovništva i što je započeo svoju karijeru kao pisac
  - Za predlaganje proporcionalnog poreza za sve i za to što je bio ministar finansija
  - Da je bio ministar finansija i da je započeo književnu karijeru
explanation: |
  Pierre Le Pesant, sieur de Boisguilbert, kao i Vauban, bio je pažljiv posmatrač seljačke bede i predložio je poresku reformu zasnovanu na proporcionalnom porezu. Međutim, za razliku od Colberta, ni Boisguilbert ni Vauban nisu bili ministri finansija.