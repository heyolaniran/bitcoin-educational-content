question: Vad har Boisguilbert gemensamt med Vauban?
answer: För att utförligt ha beskrivit landsbygdsbefolkningens misär och för att ha föreslagit en proportionell skatt för alla
wrong_answers:
  - För att utförligt ha beskrivit landsbygdsbefolkningens misär och för att ha inlett sin författarkarriär
  - För att ha föreslagit en proportionell skatt för alla och för att ha varit finansminister
  - Att ha varit finansminister och att ha börjat med en litterär karriär
explanation: |
  Pierre Le Pesant, sieur de Boisguilbert, var liksom Vauban en skarp iakttagare av böndernas misär och föreslog en skattereform baserad på en proportionell skatt. Till skillnad från Colbert var dock varken Boisguilbert eller Vauban finansministrar.