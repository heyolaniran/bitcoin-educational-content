question: Boisguilbert có điểm gì chung với Vauban?
answer: Vì đã mô tả dài dòng về cảnh khốn khổ của người dân nông thôn và đã đề xuất một loại thuế theo tỷ lệ cho tất cả mọi người
wrong_answers:
  - Vì đã mô tả dài dòng về nỗi thống khổ của người dân nông thôn và đã bắt đầu sự nghiệp của mình như một nhà văn
  - Vì đã đề xuất một loại thuế theo tỷ lệ cho tất cả mọi người và đã từng là Bộ trưởng Tài chính
  - Đã từng là Bộ trưởng Bộ Tài chính và bắt đầu sự nghiệp văn chương
explanation: |
  Pierre Le Pesant, sieur de Boisguilbert, giống như Vauban, là người quan sát sâu sắc về sự khốn khổ của nông dân và đề xuất cải cách thuế dựa trên thuế theo tỷ lệ. Tuy nhiên, không giống như Colbert, cả Boisguilbert và Vauban đều không phải là bộ trưởng tài chính.