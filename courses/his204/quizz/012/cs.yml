question: Co nebo koho je podle Boisguilberta třeba ponechat na svobodě?
answer: Příroda, tj. přirozený řád věcí
wrong_answers:
  - Moc, tj. král, jeho rada a ministři
  - Muži, tj. rolníci, řemeslníci a dělníci
  - Finanční trhy
explanation: |
  Boisguilbert byl zastáncem přirozeného řádu a laissez-faire. Věřil, že ekonomika by měla být ponechána sama sobě, bez nadměrných státních zásahů, aby se mohl rozvinout přirozený řád věcí a zaručit prosperitu.