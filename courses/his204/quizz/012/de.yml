question: Was oder wer sollte nach Boisguilbert frei bleiben?
answer: Natur, d.h. die natürliche Ordnung der Dinge
wrong_answers:
  - Macht, d.h. der König, sein Rat und seine Minister
  - Männer, d. h. Bauern, Handwerker und Arbeiter
  - Finanzmärkte
explanation: |
  Boisguilbert war ein Verfechter der natürlichen Ordnung und des Laissez-faire. Er war der Ansicht, dass die Wirtschaft sich selbst überlassen bleiben sollte, ohne übermäßige staatliche Eingriffe, damit sich die natürliche Ordnung der Dinge entfalten und Wohlstand garantieren kann.