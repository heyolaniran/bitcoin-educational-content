question: According to Boisguilbert, what or whom should be left free?
answer: Nature, i.e. the natural order of things
wrong_answers:
  - Power, i.e. the King, his council and ministers
  - Men, i.e. peasants, craftsmen and workers
  - Financial markets
explanation: |
  Boisguilbert was an advocate of the natural order and laissez-faire. He believed that the economy should be left to its own devices, without excessive state intervention, to allow the natural order of things to unfold and guarantee prosperity.