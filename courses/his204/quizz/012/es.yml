question: Según Boisguilbert, ¿qué o a quién hay que dejar libre?
answer: Naturaleza, es decir, el orden natural de las cosas
wrong_answers:
  - El poder, es decir, el Rey, su consejo y sus ministros
  - Hombres, es decir, campesinos, artesanos y obreros
  - Mercados financieros
explanation: |
  Boisguilbert era partidario del orden natural y del laissez-faire. Creía que la economía debía dejarse a su aire, sin excesiva intervención estatal, para permitir que el orden natural de las cosas se desarrollara y garantizara la prosperidad.