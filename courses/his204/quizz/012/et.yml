question: Mida või keda tuleks Boisguilbert'i sõnul vabaks jätta?
answer: Loodus, s.t. asjade loomulik kord
wrong_answers:
  - Võim, st kuningas, tema nõukogu ja ministrid
  - Mehed, st talupojad, käsitöölised ja töölised
  - Finantsturud
explanation: |
  Boisguilbert oli loomuliku korra ja laissez-faire'i pooldaja. Ta uskus, et majandus tuleks jätta omaette, ilma liigse riigipoolse sekkumiseta, et võimaldada asjade loomulikul teel areneda ja tagada heaolu.