question: Boisguilbertin mukaan mitä tai ketä pitäisi jättää vapaaksi?
answer: Luonto eli asioiden luonnollinen järjestys
wrong_answers:
  - Valta eli kuningas, hänen neuvostonsa ja ministerinsä
  - Miehet eli talonpojat, käsityöläiset ja työläiset
  - Rahoitusmarkkinat
explanation: |
  Boisguilbert oli luonnonjärjestyksen ja laissez-fairen kannattaja. Hän uskoi, että talous olisi jätettävä oman onnensa nojaan ilman liiallista valtion puuttumista, jotta asioiden luonnollinen järjestys voisi kehittyä ja taata vaurauden.