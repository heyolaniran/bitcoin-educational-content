question: Selon Boisguilbert, que faut-il, ou qui faut-il laisser libre ?
answer: La nature, c’est-à-dire l’ordre naturel des choses
wrong_answers:
  - Le pouvoir, c’est-à-dire le Roi, son conseil et ses ministres
  - Les hommes, c’est-à-dire les paysans, les artisans et les ouvriers
  - Les marchés financiers
explanation: |
  Boisguilbert était un partisan de l'ordre naturel et du laisser-faire. Il pensait que l'économie devait être laissée à elle-même, sans intervention excessive de l'État, afin de permettre à l'ordre naturel des choses de se déployer et de garantir la prospérité.
