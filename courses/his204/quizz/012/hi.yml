question: बोइसगिल्बर्ट के अनुसार, क्या या किसे स्वतंत्र छोड़ दिया जाना चाहिए?
answer: प्रकृति, यानी चीज़ों का प्राकृतिक क्रम
wrong_answers:
  - सत्ता, अर्थात राजा, उसकी परिषद और मंत्री
  - पुरुष, यानि किसान, कारीगर और श्रमिक
  - आर्थिक बाज़ार
explanation: |
  बोइसगिलबर्ट प्राकृतिक व्यवस्था और अहस्तक्षेप के समर्थक थे। उनका मानना ​​था कि अर्थव्यवस्था को अपने हाल पर छोड़ देना चाहिए, बिना राज्य के अत्यधिक हस्तक्षेप के, ताकि चीजों का प्राकृतिक क्रम सामने आए और समृद्धि की गारंटी हो।