question: Secondo Boisguilbert, cosa o chi deve essere lasciato libero?
answer: Natura, cioè l'ordine naturale delle cose
wrong_answers:
  - Il potere, cioè il Re, il suo consiglio e i suoi ministri
  - Uomini, cioè contadini, artigiani e operai
  - Mercati finanziari
explanation: |
  Boisguilbert era un sostenitore dell'ordine naturale e del laissez-faire. Credeva che l'economia dovesse essere lasciata a se stessa, senza eccessivi interventi statali, per permettere all'ordine naturale delle cose di svolgersi e garantire la prosperità.