question: Hva eller hvem bør ifølge Boisguilbert stå fritt?
answer: Naturen, dvs. tingenes naturlige orden
wrong_answers:
  - Makten, dvs. kongen, hans råd og ministre
  - Menn, dvs. bønder, håndverkere og arbeidere
  - Finansmarkedene
explanation: |
  Boisguilbert var en forkjemper for den naturlige orden og laissez-faire. Han mente at økonomien burde overlates til seg selv, uten overdreven statlig inngripen, slik at tingenes naturlige orden kunne utfolde seg og garantere velstand.