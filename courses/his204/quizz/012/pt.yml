question: Segundo Boisguilbert, o que ou quem deve ser deixado em liberdade?
answer: Natureza, ou seja, a ordem natural das coisas
wrong_answers:
  - O poder, ou seja, o rei, o seu conselho e os seus ministros
  - Homens, ou seja, camponeses, artesãos e operários
  - Mercados financeiros
explanation: |
  Boisguilbert era um defensor da ordem natural e do laissez-faire. Considerava que a economia devia ser deixada à sua sorte, sem intervenção excessiva do Estado, para permitir que a ordem natural das coisas se desenvolvesse e garantisse a prosperidade.