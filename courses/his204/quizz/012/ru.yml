question: По мнению Буагильбера, что или кого следует оставить свободным?
answer: Природа, т.е. естественный порядок вещей
wrong_answers:
  - Власть, т.е. король, его совет и министры
  - Мужчины, т.е. крестьяне, ремесленники и рабочие
  - Финансовые рынки
explanation: |
  Буагильбер был сторонником естественного порядка и laissez-faire. Он считал, что экономика должна быть предоставлена самой себе, без чрезмерного вмешательства государства, чтобы позволить естественному порядку вещей развиваться и гарантировать процветание.