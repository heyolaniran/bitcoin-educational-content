question: Prema Boisguilbertu, šta ili koga treba ostaviti slobodnim?
answer: Priroda, tj. prirodni poredak stvari
wrong_answers:
  - Moć, tj. Kralj, njegovo veće i ministri
  - Muškarci, tj. seljaci, zanatlije i radnici
  - Finansijska tržišta
explanation: |
  Boisguilbert je bio zagovornik prirodnog poretka i laissez-faire. Verovao je da ekonomiju treba prepustiti njenim sopstvenim mehanizmima, bez prekomerne državne intervencije, kako bi se omogućilo prirodnom poretku stvari da se razvija i garantuje prosperitet.