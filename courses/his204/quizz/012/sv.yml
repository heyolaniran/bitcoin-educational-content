question: Enligt Boisguilbert, vad eller vem ska lämnas fri?
answer: Naturen, d.v.s. tingens naturliga ordning
wrong_answers:
  - Makt, dvs. kungen, hans råd och ministrar
  - Män, dvs. bönder, hantverkare och arbetare
  - Finansiella marknader
explanation: |
  Boisguilbert var en förespråkare för den naturliga ordningen och laissez-faire. Han ansåg att ekonomin skulle lämnas åt sitt eget öde, utan överdrivna statliga ingripanden, för att låta den naturliga ordningen utvecklas och garantera välstånd.