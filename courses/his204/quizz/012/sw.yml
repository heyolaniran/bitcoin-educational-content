question: Kulingana na Boisguilbert, ni nini au ni nani anayepaswa kuachwa huru?
answer: Asili, i.e. mpangilio wa asili wa vitu
wrong_answers:
  - Nguvu, yaani Mfalme, baraza lake na mawaziri
  - Wanaume, i.e. wakulima, mafundi na wafanyikazi
  - Masoko ya fedha
explanation: |
  Boisguilbert alikuwa mtetezi wa utaratibu wa asili na laissez-faire. Aliamini kwamba uchumi unapaswa kuachwa ujitegemee wenyewe, bila uingiliaji mwingi wa serikali, ili kuruhusu utaratibu wa asili wa mambo kujitokeza na kuhakikisha ustawi.