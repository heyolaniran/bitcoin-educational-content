question: Theo Boisguilbert, điều gì hoặc ai nên được tự do?
answer: Thiên nhiên, tức là trật tự tự nhiên của mọi vật
wrong_answers:
  - Quyền lực, tức là nhà vua, hội đồng và các bộ trưởng của ông ta
  - Đàn ông, tức là nông dân, thợ thủ công và công nhân
  - Thị trường tài chính
explanation: |
  Boisguilbert là người ủng hộ trật tự tự nhiên và tự do kinh tế. Ông tin rằng nền kinh tế nên được để tự nhiên, không có sự can thiệp quá mức của nhà nước, để trật tự tự nhiên của mọi thứ diễn ra và đảm bảo sự thịnh vượng.