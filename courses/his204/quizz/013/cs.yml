question: Co vytýká "dobrým duším"?
answer: Způsobuje utrpení tím, že nutí ceny být stále nízké
wrong_answers:
  - Podpora zemědělství na úkor zpracovatelského průmyslu
  - Příliš lehkomyslné utrácení veřejných peněz na podporu chudých
  - Nedostatečná pomoc chudým
explanation: |
  Boisguilbert kritizoval ty, kteří se snažili uměle udržovat nízké ceny, protože se domníval, že to odrazuje od výroby, způsobuje nedostatek a v konečném důsledku způsobuje bídu. Domníval se, že ceny by měl určovat trh podle Supply a poptávky.