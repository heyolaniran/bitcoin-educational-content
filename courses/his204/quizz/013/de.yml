question: Was wirft er den "guten Seelen" vor?
answer: Verursachung von Elend durch die Erzwingung immer niedriger Preise
wrong_answers:
  - Unterstützung der Landwirtschaft auf Kosten des verarbeitenden Gewerbes
  - Zu sorgloser Umgang mit öffentlichen Geldern zur Unterstützung der Armen
  - Nicht genug Hilfe für die Armen
explanation: |
  Boisguilbert kritisierte diejenigen, die versuchten, die Preise künstlich niedrig zu halten, da sie der Meinung waren, dass dies von der Produktion abhielt, zu Engpässen führte und letztlich Elend verursachte. Seiner Meinung nach sollten die Preise vom Markt bestimmt werden, entsprechend Supply und Nachfrage.