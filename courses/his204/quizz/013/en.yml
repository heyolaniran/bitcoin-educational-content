question: What does he reproach the "good souls" for?
answer: Causing misery by forcing prices to be always low
wrong_answers:
  - Supporting agriculture at the expense of manufacturing
  - Spending public money too carelessly to support the poor
  - Not helping the poor enough
explanation: |
  Boisguilbert criticized those who sought to keep prices artificially low, believing that this discouraged production, created shortages and, ultimately, caused misery. He believed that prices should be determined by the market, according to supply and demand.