question: ¿Qué reprocha a las "almas buenas"?
answer: Causar miseria obligando a que los precios sean siempre bajos
wrong_answers:
  - Apoyar la agricultura en detrimento de la industria
  - Gastar el dinero público sin cuidado para ayudar a los pobres
  - No se ayuda lo suficiente a los pobres
explanation: |
  Boisguilbert criticaba a quienes pretendían mantener los precios artificialmente bajos, pues consideraba que ello desalentaba la producción, creaba escasez y, en última instancia, causaba miseria. Creía que los precios debían ser determinados por el mercado, según Supply y la demanda.