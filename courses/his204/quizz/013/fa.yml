question: او به "روح‌های خوب" چه سرزنشی می‌کند؟
answer: ایجاد بدبختی با مجبور کردن قیمت‌ها به همیشه پایین بودن
wrong_answers:
  - حمایت از کشاورزی به قیمت صنعت تولید
  - خرج کردن پول عمومی بیش از حد بی‌ملاحظه برای حمایت از فقرا
  - کمک کافی به فقرا نکردن
explanation: |
  بواسگیلبر کسانی را که به دنبال پایین نگه داشتن مصنوعی قیمت‌ها بودند، مورد انتقاد قرار داد و معتقد بود که این کار تولید را دلسرد می‌کند، کمبود ایجاد می‌کند و در نهایت باعث بدبختی می‌شود. او بر این باور بود که قیمت‌ها باید توسط بازار و بر اساس Supply و تقاضا تعیین شوند.