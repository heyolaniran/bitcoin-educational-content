question: Mistä hän moittii "hyviä sieluja"?
answer: Aiheuttaa kurjuutta pakottamalla hinnat aina alhaisiksi
wrong_answers:
  - Maatalouden tukeminen teollisuuden kustannuksella
  - Julkisia varoja käytetään liian huolimattomasti köyhien tukemiseen
  - Köyhiä ei auteta tarpeeksi
explanation: |
  Boisguilbert kritisoi niitä, jotka pyrkivät pitämään hinnat keinotekoisen alhaisina, sillä hän uskoi, että tämä lannisti tuotantoa, aiheutti pulaa ja lopulta kurjuutta. Hän uskoi, että hintojen pitäisi määräytyä markkinoilla Supply:n ja kysynnän mukaan.