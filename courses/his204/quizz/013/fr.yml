question: Que reproche-t-il aux « bonnes âmes » ?
answer: De causer la misère en voulant forcer les prix à être toujours bas
wrong_answers:
  - De soutenir l’agriculture au détriment des manufactures
  - De dépenser trop négligemment l’argent public pour soutenir les pauvres
  - De ne pas assez aider les pauvres
explanation: |
  Boisguilbert critiquait ceux qui cherchaient à maintenir les prix artificiellement bas, car il pensait que cela décourageait la production, créait des pénuries et, en fin de compte, causait la misère. Il considérait que les prix devaient être déterminés par le marché, en fonction de l'offre et de la demande.
