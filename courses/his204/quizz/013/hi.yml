question: वह "अच्छी आत्माओं" को किस बात के लिए दोषी ठहराता है?
answer: कीमतें हमेशा कम रखने पर मजबूर करके दुख पैदा करना
wrong_answers:
  - विनिर्माण की कीमत पर कृषि को समर्थन देना
  - गरीबों की सहायता के लिए सार्वजनिक धन को लापरवाही से खर्च करना
  - गरीबों की पर्याप्त मदद नहीं की जा रही
explanation: |
  बोइसगिलबर्ट ने उन लोगों की आलोचना की जो कृत्रिम रूप से कीमतें कम रखने की कोशिश करते हैं, उनका मानना ​​है कि इससे उत्पादन हतोत्साहित होता है, कमी पैदा होती है और अंततः दुख होता है। उनका मानना ​​था कि कीमतें Supply और मांग के अनुसार बाजार द्वारा निर्धारित की जानी चाहिए।