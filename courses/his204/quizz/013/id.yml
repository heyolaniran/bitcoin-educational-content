question: Untuk apa dia mencela "jiwa-jiwa yang baik"?
answer: Menyebabkan kesengsaraan dengan memaksa harga selalu rendah
wrong_answers:
  - Mendukung pertanian dengan mengorbankan manufaktur
  - Membelanjakan uang rakyat terlalu sembarangan untuk membantu orang miskin
  - Tidak cukup membantu orang miskin
explanation: |
  Boisguilbert mengkritik mereka yang berusaha menjaga harga tetap rendah secara artifisial, percaya bahwa hal ini akan menghambat produksi, menciptakan kelangkaan, dan pada akhirnya menyebabkan kesengsaraan. Dia percaya bahwa harga harus ditentukan oleh pasar, sesuai dengan Supply dan permintaan.