question: Cosa rimprovera alle "anime buone"?
answer: Causare miseria costringendo i prezzi a essere sempre bassi
wrong_answers:
  - Sostenere l'agricoltura a scapito del settore manifatturiero
  - Spendere con troppa leggerezza il denaro pubblico a sostegno dei poveri
  - Non aiutiamo abbastanza i poveri
explanation: |
  Boisguilbert criticò coloro che cercavano di mantenere i prezzi artificialmente bassi, ritenendo che ciò scoraggiasse la produzione, creasse carenze e, in ultima analisi, causasse miseria. Egli riteneva che i prezzi dovessero essere determinati dal mercato, in base a Supply e alla domanda.