question: Hva bebreider han de "gode sjelene" for?
answer: Forårsaker elendighet ved å tvinge prisene til å alltid være lave
wrong_answers:
  - Støtte til landbruket på bekostning av industrien
  - Vi bruker offentlige midler for skjødesløst til å støtte de fattige
  - Hjelper ikke de fattige nok
explanation: |
  Boisguilbert kritiserte dem som forsøkte å holde prisene kunstig lave, og mente at dette motvirket produksjon, skapte knapphet og til syvende og sist førte til elendighet. Han mente at prisene burde bestemmes av markedet, i henhold til Supply og etterspørsel.