question: Co zarzuca "dobrym duszom"?
answer: Powodowanie nędzy poprzez wymuszanie zawsze niskich cen
wrong_answers:
  - Wspieranie rolnictwa kosztem produkcji
  - Zbyt beztroskie wydawanie publicznych pieniędzy na wsparcie ubogich
  - Niewystarczająca pomoc ubogim
explanation: |
  Boisguilbert krytykował tych, którzy starali się sztucznie utrzymywać ceny na niskim poziomie, wierząc, że zniechęca to do produkcji, powoduje niedobory i ostatecznie prowadzi do nędzy. Uważał, że ceny powinny być ustalane przez rynek, zgodnie z Supply i popytem.