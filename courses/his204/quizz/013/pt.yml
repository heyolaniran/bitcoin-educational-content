question: De que é que ele censura as "almas boas"?
answer: Causar miséria ao obrigar os preços a serem sempre baixos
wrong_answers:
  - Apoiar a agricultura em detrimento da indústria transformadora
  - Gastar o dinheiro público de forma demasiado descuidada para apoiar os pobres
  - Não ajudar suficientemente os pobres
explanation: |
  Boisguilbert criticava aqueles que procuravam manter os preços artificialmente baixos, considerando que isso desencorajava a produção, criava escassez e, em última análise, causava miséria. Para ele, os preços devem ser determinados pelo mercado, de acordo com a procura e a procura.