question: За что он упрекает "добрые души"?
answer: Причинение страданий, заставляя цены быть всегда низкими
wrong_answers:
  - Поддержка сельского хозяйства за счет обрабатывающей промышленности
  - Небрежное расходование государственных средств на поддержку бедных
  - Недостаточная помощь бедным
explanation: |
  Буагильбер критиковал тех, кто стремился искусственно занижать цены, считая, что это препятствует производству, создает дефицит и, в конечном счете, приводит к несчастьям. Он считал, что цены должны определяться рынком, в соответствии с Supply и спросом.