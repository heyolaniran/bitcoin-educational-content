question: Za šta on prekorava "dobre duše"?
answer: Izazivanje patnje forsiranjem cena da uvek budu niske
wrong_answers:
  - Podrška poljoprivredi na račun proizvodnje
  - Trošenje javnog novca previše neoprezno za podršku siromašnima
  - Ne pomažemo dovoljno siromašnima
explanation: |
  Boisguilbert je kritikovao one koji su nastojali da veštački drže cene niskim, verujući da to obeshrabruje proizvodnju, stvara nestašice i, na kraju, izaziva bedu. Verovao je da cene treba da budu određene tržištem, prema Supply i potražnji.