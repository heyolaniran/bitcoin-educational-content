question: Vad förebrår han de "goda själarna" för?
answer: Orsakar elände genom att tvinga priserna att alltid vara låga
wrong_answers:
  - Stöd till jordbruket på bekostnad av tillverkningsindustrin
  - Spenderar offentliga medel alltför slarvigt för att stödja de fattiga
  - Hjälper inte de fattiga tillräckligt
explanation: |
  Boisguilbert kritiserade dem som försökte hålla priserna artificiellt låga och menade att detta avskräckte från produktion, skapade brist och i slutändan orsakade elände. Han ansåg att priserna skulle bestämmas av marknaden, enligt Supply och efterfrågan.