question: Anakemea “roho njema” kwa ajili ya nini?
answer: Kusababisha taabu kwa kulazimisha bei kuwa chini kila wakati
wrong_answers:
  - Kusaidia kilimo kwa gharama ya utengenezaji
  - Kutumia pesa za umma hovyo sana kusaidia masikini
  - Kutowasaidia maskini vya kutosha
explanation: |
  Boisguilbert alikosoa wale ambao walitaka kuweka bei ya chini kwa njia ya bandia, akiamini kwamba uzalishaji huu ulivunja moyo, uliunda uhaba na, hatimaye, ulisababisha taabu. Aliamini kuwa bei inapaswa kuamuliwa na soko, kulingana na Supply na mahitaji.