question: Ông ta trách móc những "tâm hồn tốt" vì điều gì?
answer: Gây ra đau khổ bằng cách buộc giá cả luôn ở mức thấp
wrong_answers:
  - Hỗ trợ nông nghiệp bằng cách cắt giảm sản xuất
  - Chi tiêu tiền công quỹ quá bất cẩn để hỗ trợ người nghèo
  - Không giúp đỡ người nghèo đủ
explanation: |
  Boisguilbert chỉ trích những người tìm cách giữ giá thấp một cách giả tạo, tin rằng điều này làm nản lòng sản xuất, tạo ra tình trạng thiếu hụt và cuối cùng gây ra đau khổ. Ông tin rằng giá cả nên được xác định bởi thị trường, theo Supply và nhu cầu.