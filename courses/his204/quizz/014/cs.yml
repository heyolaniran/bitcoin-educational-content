question: Jaká teorie nebyla Boisguilbertovi připsána?
answer: Žádná z těchto odpovědí není vhodná
wrong_answers:
  - Keynesova teorie podzaměstnanosti
  - Marxistická teorie tříd
  - Teorie oživení založeného na spotřebě
explanation: |
  Boisguilbertovi se připisují myšlenky, které předcházely Keynesově teorii podzaměstnanosti, Marxově třídní teorii a teorii oživení založeného na spotřebě, ačkoli tyto teorie neformuloval tak explicitně.