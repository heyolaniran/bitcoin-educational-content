question: Welche Theorie ist Boisguilbert nicht zugeschrieben worden?
answer: Keine dieser Antworten ist angemessen
wrong_answers:
  - Keynes' Theorie der Unterbeschäftigung
  - Marxistische Klassentheorie
  - Die Theorie des konsumgetriebenen Aufschwungs
explanation: |
  Boisguilbert werden Vorläuferideen für die Unterbeschäftigungstheorie von Keynes, die Klassentheorie von Marx und die Theorie des konsumgetriebenen Aufschwungs zugeschrieben, auch wenn er diese Theorien nicht so explizit formuliert hat.