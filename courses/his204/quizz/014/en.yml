question: What theory has Boisguilbert not been credited with?
answer: None of these answers are appropriate
wrong_answers:
  - Keynes' theory of underemployment
  - Marxist class theory
  - The theory of consumption-led recovery
explanation: |
  Boisguilbert has been credited with precursor ideas to Keynes's theory of underemployment, Marx's class theory and the theory of consumption-led recovery, although he did not formulate these theories as explicitly.