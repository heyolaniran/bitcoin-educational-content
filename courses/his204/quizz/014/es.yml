question: ¿Qué teoría no se le atribuye a Boisguilbert?
answer: Ninguna de estas respuestas es adecuada
wrong_answers:
  - La teoría del subempleo de Keynes
  - Teoría marxista de las clases
  - La teoría de la recuperación impulsada por el consumo
explanation: |
  A Boisguilbert se le atribuyen ideas precursoras de la teoría del subempleo de Keynes, de la teoría de clases de Marx y de la teoría de la recuperación impulsada por el consumo, aunque no formuló estas teorías de forma tan explícita.