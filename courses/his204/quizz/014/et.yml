question: Millist teooriat ei ole Boisguilbert'ile omistatud?
answer: Ükski neist vastustest ei ole asjakohane
wrong_answers:
  - Keynesi alatööhõive teooria
  - Marksistlik klassiteooria
  - Tarbimisele suunatud taastumise teooria
explanation: |
  Boisguilbertile on omistatud Keynesi alatööhõive teooria, Marxi klassiteooria ja tarbimisest tingitud taastumise teooria eelkäijaid, kuigi ta ei sõnastanud neid teooriaid nii selgelt.