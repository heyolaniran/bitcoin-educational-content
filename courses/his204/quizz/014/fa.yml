question: چه نظریه‌ای به بواسگیلبر نسبت داده نشده است؟
answer: هیچ‌کدام از این پاسخ‌ها مناسب نیستند
wrong_answers:
  - نظریه بیکاری کینز
  - نظریه طبقاتی مارکسیستی
  - نظریه بهبود اقتصادی مبتنی بر مصرف
explanation: |
  بوازگیلبر به خاطر ایده‌های پیشگامانه‌ای که به نظریه بیکاری کینز، نظریه طبقاتی مارکس و نظریه بهبود اقتصادی مبتنی بر مصرف منجر شد، شناخته شده است، اگرچه او این نظریه‌ها را به‌طور صریح فرموله نکرده بود.