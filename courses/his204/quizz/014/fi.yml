question: Mitä teoriaa Boisguilbertille ei ole uskottu?
answer: Mikään näistä vastauksista ei ole asianmukainen
wrong_answers:
  - Keynesin teoria alityöllisyydestä
  - Marxilainen luokkateoria
  - Kulutukseen perustuvan elpymisen teoria
explanation: |
  Boisguilbertin on katsottu olleen Keynesin alityöllisyysteorian, Marxin luokkateorian ja kulutukseen perustuvan elpymisen teorian edeltäjä, vaikka hän ei muotoillut näitä teorioita yhtä selkeästi.