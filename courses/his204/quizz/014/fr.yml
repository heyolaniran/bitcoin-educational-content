question: De quelle théorie n’a-t-on pas attribué la paternité à Boisguilbert ?
answer: Aucune de ces réponses ne convient
wrong_answers:
  - La théorie du sous-emploi de Keynes
  - La théorie marxiste des classes
  - La théorie de la relance par la consommation
explanation: |
  On a attribué à Boisguilbert des idées précurseurs de la théorie du sous-emploi de Keynes, de la théorie des classes de Marx et de la théorie de la relance par la consommation, bien qu'il n'ait pas formulé ces théories de manière aussi explicite.
