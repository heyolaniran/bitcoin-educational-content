question: बोइसगिल्बर्ट को किस सिद्धांत का श्रेय नहीं दिया गया है?
answer: इनमें से कोई भी उत्तर उचित नहीं है
wrong_answers:
  - कीन्स का अल्परोज़गार का सिद्धांत
  - मार्क्सवादी वर्ग सिद्धांत
  - उपभोग-आधारित पुनर्प्राप्ति का सिद्धांत
explanation: |
  बोइसगिल्बर्ट को कीन्स के अल्परोजगार सिद्धांत, मार्क्स के वर्ग सिद्धांत और उपभोग-आधारित पुनरुद्धार के सिद्धांत के अग्रदूत विचारों का श्रेय दिया जाता है, हालांकि उन्होंने इन सिद्धांतों को स्पष्ट रूप से तैयार नहीं किया।