question: Teori apa yang belum dikreditkan oleh Boisguilbert?
answer: Tak satu pun dari jawaban berikut ini yang sesuai
wrong_answers:
  - Teori Keynes tentang setengah pengangguran
  - Teori kelas Marxis
  - Teori pemulihan yang dipimpin oleh konsumsi
explanation: |
  Boisguilbert telah dikreditkan dengan ide-ide pendahulu untuk teori pengangguran Keynes, teori kelas Marx dan teori pemulihan yang dipimpin oleh konsumsi, meskipun ia tidak merumuskan teori-teori ini secara eksplisit.