question: Quale teoria non è stata accreditata a Boisguilbert?
answer: Nessuna di queste risposte è appropriata
wrong_answers:
  - La teoria della sottoccupazione di Keynes
  - Teoria marxista delle classi
  - La teoria della ripresa guidata dai consumi
explanation: |
  A Boisguilbert sono state attribuite idee precorritrici della teoria della sottoccupazione di Keynes, della teoria delle classi di Marx e della teoria della ripresa guidata dai consumi, sebbene non abbia formulato queste teorie in modo così esplicito.