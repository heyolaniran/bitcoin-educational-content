question: Hvilken teori har Boisguilbert ikke blitt kreditert for?
answer: Ingen av disse svarene er passende
wrong_answers:
  - Keynes' teori om undersysselsetting
  - Marxistisk klasseteori
  - Teorien om forbruksdrevet gjeninnhenting
explanation: |
  Boisguilbert har blitt tilskrevet forløperne til Keynes' teori om undersysselsetting, Marx' klasseteori og teorien om forbruksdrevet gjeninnhenting, selv om han ikke formulerte disse teoriene like eksplisitt.