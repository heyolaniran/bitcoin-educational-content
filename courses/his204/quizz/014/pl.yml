question: Jakiej teorii nie przypisuje się Boisguilbertowi?
answer: Żadna z tych odpowiedzi nie jest właściwa
wrong_answers:
  - Teoria niedostatecznego zatrudnienia Keynesa
  - Marksistowska teoria klas
  - Teoria ożywienia opartego na konsumpcji
explanation: |
  Boisguilbertowi przypisuje się prekursorskie idee teorii niedostatecznego zatrudnienia Keynesa, teorii klas Marksa i teorii ożywienia opartego na konsumpcji, choć nie sformułował on tych teorii tak wyraźnie.