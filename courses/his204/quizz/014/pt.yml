question: Qual é a teoria que não foi atribuída a Boisguilbert?
answer: Nenhuma destas respostas é adequada
wrong_answers:
  - A teoria do subemprego de Keynes
  - Teoria marxista das classes
  - A teoria da retoma induzida pelo consumo
explanation: |
  Atribui-se a Boisguilbert as ideias precursoras da teoria do subemprego de Keynes, da teoria das classes de Marx e da teoria da retoma induzida pelo consumo, embora não tenha formulado estas teorias de forma tão explícita.