question: Какую теорию Буагильберу не приписывали?
answer: Ни один из этих ответов не подходит
wrong_answers:
  - Теория неполной занятости Кейнса
  - Марксистская теория классов
  - Теория восстановления экономики на основе потребления
explanation: |
  Буагильберу приписывают идеи, предшествовавшие теории неполной занятости Кейнса, классовой теории Маркса и теории восстановления экономики на основе потребления, хотя он не формулировал эти теории в явном виде.