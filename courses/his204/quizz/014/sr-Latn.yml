question: Koju teoriju nije zaslužan Boisguilbert?
answer: Nijedan od ovih odgovora nije odgovarajući.
wrong_answers:
  - Kejnizova teorija o neuposlenosti
  - Marksistička teorija klase
  - Teorija oporavka vođenog potrošnjom
explanation: |
  Boisguilbert je zaslužan za ideje koje su prethodile Kejnsovoj teoriji o nezaposlenosti, Marksovoj klasnoj teoriji i teoriji oporavka vođenog potrošnjom, iako on nije eksplicitno formulisao ove teorije.