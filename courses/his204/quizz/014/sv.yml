question: Vilken teori har Boisguilbert inte fått erkännande för?
answer: Inget av dessa svar är lämpligt
wrong_answers:
  - Keynes teori om undersysselsättning
  - Marxistisk klassteori
  - Teorin om konsumtionsledd återhämtning
explanation: |
  Boisguilbert har tillskrivits föregångaridéer till Keynes teori om undersysselsättning, Marx klassteori och teorin om konsumtionsledd återhämtning, även om han inte formulerade dessa teorier lika explicit.