question: Lý thuyết nào mà Boisguilbert chưa được công nhận?
answer: Không có câu trả lời nào trong số này là phù hợp
wrong_answers:
  - Lý thuyết của Keynes về tình trạng thiếu việc làm
  - Lý thuyết giai cấp của chủ nghĩa Marx
  - Lý thuyết phục hồi do tiêu dùng dẫn dắt
explanation: |
  Boisguilbert được cho là người khởi xướng những ý tưởng cho lý thuyết về tình trạng thiếu việc làm của Keynes, lý thuyết giai cấp của Marx và lý thuyết phục hồi do tiêu dùng dẫn dắt, mặc dù ông không xây dựng các lý thuyết này một cách rõ ràng.