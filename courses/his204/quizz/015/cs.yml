question: Pod jakým názvem vydal Boisguilbert v roce 1696 znovu svůj Détail de la France?
answer: Francie zničena za vlády Ludvíka XIV., kdo a jak ji obnovil a jaké prostředky k tomu použil
wrong_answers:
  - Francie zničena za vlády Ludvíka XIV., proč a jak, s doprovodnými údaji
  - Francie se za vlády Ludvíka XIV. rozdělila, které frakce a proč, a jak ji znovu sjednotit
  - Francie za vlády Ludvíka XIV. prosperovala, díky komu a jak, s konkrétními příklady
explanation: |
  Plný název nového vydání jeho díla z roku 1696 skutečně zní "La France ruinée sous le règne de Louis XIV, par qui et comment, avec les moyens de la rétablir". Tento název odráží Boisguilbertovu ostrou kritiku hospodářské politiky Ludvíka XIV.