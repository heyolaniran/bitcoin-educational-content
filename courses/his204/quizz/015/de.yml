question: Unter welchem Titel veröffentlichte Boisguilbert 1696 seinen Détail de la France neu?
answer: Das unter der Herrschaft Ludwigs XIV. ruinierte Frankreich, von wem und wie, mit den Mitteln zu seiner Wiederherstellung
wrong_answers:
  - Frankreich ruiniert unter der Herrschaft von Ludwig XIV., warum und wie, mit Belegzahlen
  - Die Spaltung Frankreichs während der Herrschaft Ludwigs XIV., die Gründe für die Spaltung und die Wiedervereinigung des Landes
  - Frankreich blühte unter der Herrschaft Ludwigs XIV. auf, dank wem und wie, mit konkreten Beispielen
explanation: |
  Der vollständige Titel der Neuauflage seines Werks im Jahr 1696 lautet tatsächlich "La France ruinée sous le règne de Louis XIV, par qui et comment, avec les moyens de la rétablir". Dieser Titel spiegelt Boisguilberts heftige Kritik an der Wirtschaftspolitik Ludwigs XIV. wider.