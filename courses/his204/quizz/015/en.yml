question: Under what title did Boisguilbert republish his Détail de la France in 1696?
answer: France ruined under the reign of Louis XIV, by whom and how, with the means to restore it
wrong_answers:
  - France ruined under the reign of Louis XIV, why and how, with supporting figures
  - France divided during the reign of Louis XIV, by which factions and why, and how to unify it once again
  - France prospered under the reign of Louis XIV, thanks to whom and how, with concrete examples
explanation: |
  The full title of the republication of his work in 1696 is indeed "La France ruinée sous le règne de Louis XIV, par qui et comment, avec les moyens de la rétablir". This title reflects Boisguilbert's virulent criticism of Louis XIV's economic policy.