question: ¿Bajo qué título reeditó Boisguilbert su Détail de la France en 1696?
answer: Francia arruinada bajo el reinado de Luis XIV, por quién y cómo, con los medios para restaurarla
wrong_answers:
  - Francia arruinada bajo el reinado de Luis XIV, por qué y cómo, con cifras de apoyo
  - Francia dividida durante el reinado de Luis XIV, por qué facciones y por qué, y cómo unificarla de nuevo
  - Francia prosperó bajo el reinado de Luis XIV, gracias a quién y cómo, con ejemplos concretos
explanation: |
  En efecto, el título completo de la reedición de su obra en 1696 es "La France ruinée sous le règne de Louis XIV, par qui et comment, avec les moyens de la rétablir". Este título refleja la virulenta crítica de Boisguilbert a la política económica de Luis XIV.