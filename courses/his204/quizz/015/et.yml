question: Millise pealkirja all avaldas Boisguilbert 1696. aastal uuesti oma "Détail de la France"?
answer: Louis XIV valitsemise ajal hävitatud Prantsusmaa, kelle poolt ja kuidas, koos vahenditega selle taastamiseks
wrong_answers:
  - Prantsusmaa hävitati Louis XIV valitsemise ajal, miks ja kuidas, koos toetavate arvudega
  - Prantsusmaa jagunes Louis XIV valitsemise ajal, milliste fraktsioonide poolt ja miks, ning kuidas seda taas ühendada
  - Prantsusmaa õitseng Louis XIV valitsemise ajal, tänu kellele ja kuidas, konkreetsete näidetega
explanation: |
  Tema 1696. aastal ilmunud teose täielik pealkiri on tõepoolest "La France ruinée sous le règne de Louis XIV, par qui et comment, avec les moyens de la rétablir" (La France ruinée sous le règne de Louis XIV, par qui et comment, avec les moyens de la rétablir). See pealkiri peegeldab Boisguilbert'i teravat kriitikat Louis XIV majanduspoliitika suhtes.