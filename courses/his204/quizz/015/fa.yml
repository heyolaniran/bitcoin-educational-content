question: بوآگیلبر اثر خود "جزئیات فرانسه" را در سال ۱۶۹۶ تحت چه عنوانی بازنشر کرد؟
answer: فرانسه در دوران سلطنت لویی چهاردهم ویران شد، توسط چه کسی و چگونه، با راه‌های بازسازی آن
wrong_answers:
  - فرانسه تحت سلطنت لوئی چهاردهم ویران شد، چرا و چگونه، با ارقام پشتیبان
  - فرانسه در دوران سلطنت لویی چهاردهم به چه جناح‌هایی تقسیم شد و چرا، و چگونه می‌توان دوباره آن را متحد کرد؟
  - فرانسه تحت سلطنت لوئی چهاردهم رونق یافت، به لطف چه کسی و چگونه، با مثال‌های مشخص
explanation: |
  عنوان کامل تجدید انتشار اثر او در سال 1696 در واقع "La France ruinée sous le règne de Louis XIV, par qui et comment, avec les moyens de la rétablir" است. این عنوان نشان‌دهنده انتقاد شدید بواگیلبر از سیاست اقتصادی لوئی چهاردهم است.