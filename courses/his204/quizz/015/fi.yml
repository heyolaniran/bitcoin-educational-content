question: Millä nimellä Boisguilbert julkaisi Détail de la France -teoksensa uudelleen vuonna 1696?
answer: Ranska tuhoutui Ludvig XIV:n valtakaudella, kuka sen teki ja miten, ja keinot sen palauttamiseksi
wrong_answers:
  - Ranska tuhoutui Ludvig XIV:n valtakaudella, miksi ja miten, sekä tukevat luvut
  - Ranska jakaantui Ludvig XIV:n valtakaudella, minkä ryhmittymien toimesta ja miksi, ja miten se voitaisiin yhdistää uudelleen
  - Ranska kukoisti Ludvig XIV:n aikana, kenen ansiosta ja miten, konkreettisten esimerkkien avulla
explanation: |
  Hänen teoksensa vuonna 1696 julkaistun uudelleenjulkaisun täydellinen nimi on todellakin "La France ruinée sous le règne de Louis XIV, par qui et comment, avec les moyens de la rétablir". Tämä otsikko kuvastaa Boisguilbertin raivokasta kritiikkiä Ludvig XIV:n talouspolitiikkaa kohtaan.