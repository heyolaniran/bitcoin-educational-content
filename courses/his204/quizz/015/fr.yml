question: Sous quel titre Boisguilbert a-t-il republié son Détail de la France en 1696 ?
answer: La France ruinée sous le règne de Louis XIV, par qui et comment, avec les moyens de la rétablir
wrong_answers:
  - La France ruinée sous le règne de Louis XIV, pourquoi et comment, avec des chiffres à l’appui
  - La France divisée sous le règne de Louis XIV, par quelles factions et pourquoi, avec les moyens de l’unifier à nouveau
  - La France prospère sous le règne de Louis XIV, grâce à qui et comment, avec des exemples concrets
explanation: |
  Le titre complet de la republication de son ouvrage en 1696 est bien "La France ruinée sous le règne de Louis XIV, par qui et comment, avec les moyens de la rétablir". Ce titre reflète la critique virulente de Boisguilbert à l'égard de la politique économique de Louis XIV.
