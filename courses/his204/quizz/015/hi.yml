question: बोइसगिल्बर्ट ने 1696 में अपनी पुस्तक डीटेल डे ला फ्रांस को किस शीर्षक से पुनः प्रकाशित किया?
answer: लुई XIV के शासनकाल में फ्रांस बर्बाद हो गया, किसने और कैसे, तथा इसे बहाल करने के क्या उपाय थे?
wrong_answers:
  - लुई XIV के शासनकाल में फ्रांस बर्बाद हो गया, क्यों और कैसे, सहायक आंकड़े सहित
  - लुई XIV के शासनकाल में फ्रांस किस गुट में विभाजित हुआ और क्यों, तथा इसे पुनः एकीकृत कैसे किया जाए?
  - लुई XIV के शासनकाल में फ्रांस समृद्ध हुआ, इसका श्रेय किसको और कैसे दिया जाता है, तथा इसके ठोस उदाहरण भी दिए गए हैं
explanation: |
  1696 में उनके काम के पुनर्प्रकाशन का पूरा शीर्षक वास्तव में "ला फ्रांस रुनी सूस ले रेग्ने डे लुईस XIV, पार क्वि एट कमेंट, एवेक लेस मोयेंस डे ला रेटाब्लिर" है। यह शीर्षक लुई XIV की आर्थिक नीति की बोइसगुइल्बर्ट की ज़बरदस्त आलोचना को दर्शाता है।