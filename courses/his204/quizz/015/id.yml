question: Dengan judul apa Boisguilbert menerbitkan ulang Détail de la France pada tahun 1696?
answer: Prancis hancur di bawah pemerintahan Louis XIV, oleh siapa dan bagaimana, dengan cara untuk memulihkannya
wrong_answers:
  - Prancis hancur di bawah pemerintahan Louis XIV, mengapa dan bagaimana, dengan tokoh-tokoh pendukung
  - Prancis terpecah pada masa pemerintahan Louis XIV, oleh faksi mana dan mengapa, dan bagaimana menyatukannya kembali
  - Prancis makmur di bawah pemerintahan Louis XIV, berkat siapa dan bagaimana, dengan contoh konkret
explanation: |
  Judul lengkap dari penerbitan ulang karyanya pada tahun 1696 adalah "La France ruinée sous le règne de Louis XIV, par qui et comment, avec les moyens de la rétablir". Judul ini mencerminkan kritik pedas Boisguilbert terhadap kebijakan ekonomi Louis XIV.