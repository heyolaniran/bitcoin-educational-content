question: Con quale titolo Boisguilbert ripubblicò il suo Détail de la France nel 1696?
answer: La Francia rovinata sotto il regno di Luigi XIV, da chi e come, con i mezzi per restaurarla
wrong_answers:
  - La Francia in rovina sotto il regno di Luigi XIV, perché e come, con dati di supporto
  - La Francia divisa durante il regno di Luigi XIV, da quali fazioni e perché, e come unificarla di nuovo
  - La Francia prosperò sotto il regno di Luigi XIV, grazie a chi e come, con esempi concreti
explanation: |
  Il titolo completo della ripubblicazione della sua opera nel 1696 è infatti "La France ruinée sous le règne de Louis XIV, par qui et comment, avec les moyens de la rétablir". Questo titolo riflette la critica virulenta di Boisguilbert alla politica economica di Luigi XIV.