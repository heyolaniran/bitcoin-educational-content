question: 1696年、ボワギルベールは『Détail de la France』をどのような題名で再刊したのか？
answer: ルイ14世の治世下で破滅したフランス。
wrong_answers:
  - ルイ14世の治世下で破滅したフランス。
  - ルイ14世の時代に分裂したフランス、どの派閥がなぜ分裂したのか。
  - ルイ14世の治世下、フランスは誰のおかげで、どのように繁栄したのか。
explanation: |
  1696年に出版された彼の著作の正式なタイトルは、まさに「ルイ14世の経済政策によって破滅したフランス、その理由と理由、そして再建の手段」であった。このタイトルは、ルイ14世の経済政策に対するボワギルベールの激しい批判を反映している。