question: Under hvilken tittel gjenutga Boisguilbert sin Détail de la France i 1696?
answer: Frankrike ruinert under Ludvig XIV, av hvem og hvordan, med midler til å gjenopprette det
wrong_answers:
  - Frankrike ble ødelagt under Ludvig XIV, hvorfor og hvordan, med tilhørende figurer
  - Frankrike ble splittet under Ludvig XIV, av hvilke fraksjoner og hvorfor, og hvordan man kan forene landet igjen
  - Frankrike blomstret under Ludvig XIV, takket være hvem og hvordan, med konkrete eksempler
explanation: |
  Den fulle tittelen på nyutgivelsen av verket hans i 1696 er nemlig "La France ruinée sous le règne de Louis XIV, par qui et comment, avec les moyens de la rétablir". Tittelen gjenspeiler Boisguilberts voldsomme kritikk av Ludvig XIVs økonomiske politikk.