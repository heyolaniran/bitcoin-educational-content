question: Pod jakim tytułem Boisguilbert ponownie opublikował swój Détail de la France w 1696 roku?
answer: Francja zrujnowana za panowania Ludwika XIV, przez kogo i w jaki sposób, ze środkami do jej przywrócenia
wrong_answers:
  - Francja zrujnowana za panowania Ludwika XIV, dlaczego i jak, z postaciami wspierającymi
  - Francja podzielona za panowania Ludwika XIV, przez które frakcje i dlaczego, oraz jak ponownie ją zjednoczyć
  - Francja prosperowała za panowania Ludwika XIV, dzięki komu i w jaki sposób, z konkretnymi przykładami
explanation: |
  Pełny tytuł publikacji jego pracy w 1696 r. brzmi rzeczywiście "La France ruinée sous le règne de Louis XIV, par qui et comment, avec les moyens de la rétablir". Tytuł ten odzwierciedla zjadliwą krytykę polityki gospodarczej Ludwika XIV ze strony Boisguilberta.