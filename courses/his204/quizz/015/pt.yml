question: Sob que título é que Boisguilbert republicou o seu Détail de la France em 1696?
answer: A França arruinada no reinado de Luís XIV, por quem e como, com os meios para a restaurar
wrong_answers:
  - A França arruinada sob o reinado de Luís XIV, porquê e como, com números de apoio
  - A França dividida durante o reinado de Luís XIV, por que facções e porquê, e como unificá-la de novo
  - A França prosperou durante o reinado de Luís XIV, graças a quem e como, com exemplos concretos
explanation: |
  O título completo da republicação da sua obra em 1696 é, de facto, "La France ruinée sous le règne de Louis XIV, par qui et comment, avec les moyens de la rétablir". Este título reflecte a crítica virulenta de Boisguilbert à política económica de Luís XIV.