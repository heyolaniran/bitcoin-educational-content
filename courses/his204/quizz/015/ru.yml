question: Под каким названием Буагильбер в 1696 году переиздал свой "Détail de la France"?
answer: Франция, разрушенная в правление Людовика XIV, кем и как, со средствами ее восстановления
wrong_answers:
  - Франция, разрушенная при Людовике XIV, почему и как, с подтверждающими цифрами
  - Франция разделилась во время правления Людовика XIV, на какие фракции и почему, и как ее снова объединить
  - Процветание Франции при Людовике XIV, благодаря кому и как, с конкретными примерами
explanation: |
  Полное название переиздания его работы в 1696 году - "Франция, разрушенная Людовиком XIV, ее причины и последствия, а также способы ее восстановления". Это название отражает яростную критику Буагильбером экономической политики Людовика XIV.