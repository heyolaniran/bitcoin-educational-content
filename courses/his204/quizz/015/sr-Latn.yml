question: Pod kojim naslovom je Boisguilbert ponovo objavio svoj Détail de la France 1696. godine?
answer: Francuska uništena pod vladavinom Luja XIV, od koga i kako, sa sredstvima za njeno obnavljanje
wrong_answers:
  - Francuska uništena pod vladavinom Luja XIV, zašto i kako, sa pratećim ciframa
  - Francuska podeljena tokom vladavine Luja XIV, od strane kojih frakcija i zašto, i kako je ponovo ujediniti
  - Francuska je prosperirala pod vladavinom Luja XIV, zahvaljujući kome i kako, sa konkretnim primerima
explanation: |
  Puni naslov ponovnog izdanja njegovog dela iz 1696. zaista je "La France ruinée sous le règne de Louis XIV, par qui et comment, avec les moyens de la rétablir". Ovaj naslov odražava Boisguilbertovu žestoku kritiku ekonomske politike Luja XIV.