question: Under vilken titel återutgav Boisguilbert sin Détail de la France 1696?
answer: Frankrike förstört under Ludvig XIV:s regeringstid, av vem och hur, med medel för att återställa det
wrong_answers:
  - Frankrike ruinerades under Ludvig XIV:s styre, varför och hur, med stödjande figurer
  - Frankrike delat under Ludvig XIV:s regeringstid, av vilka fraktioner och varför, och hur man kan ena det igen
  - Frankrike blomstrade under Ludvig XIV:s regeringstid, tack vare vem och hur, med konkreta exempel
explanation: |
  Den fullständiga titeln på återutgivningen av hans verk 1696 är "La France ruinée sous le règne de Louis XIV, par qui et comment, avec les moyens de la rétablir". Titeln återspeglar Boisguilberts skarpa kritik av Ludvig XIV:s ekonomiska politik.