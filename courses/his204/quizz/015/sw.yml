question: Ni chini ya jina gani Boisguilbert alichapisha tena Détail de la France mnamo 1696?
answer: Ufaransa iliharibiwa chini ya utawala wa Louis XIV, na nani na jinsi gani, kwa njia ya kuirejesha
wrong_answers:
  - Ufaransa iliharibiwa chini ya utawala wa Louis XIV, kwa nini na jinsi gani, na takwimu zinazounga mkono
  - Ufaransa iligawanyika wakati wa utawala wa Louis XIV, na vikundi gani na kwa nini, na jinsi ya kuiunganisha tena
  - Ufaransa ilifanikiwa chini ya utawala wa Louis XIV, shukrani kwa nani na jinsi gani, kwa mifano halisi
explanation: |
  Jina kamili la kuchapishwa kwa kazi yake mnamo 1696 kwa hakika ni "La France ruinée sous le règne de Louis XIV, par qui et comment, avec les moyens de la rétablir". Kichwa hiki kinaonyesha ukosoaji mkali wa Boisguilbert wa sera ya kiuchumi ya Louis XIV.