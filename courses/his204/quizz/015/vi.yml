question: Boisguilbert đã tái bản tác phẩm Détail de la France của mình vào năm 1696 dưới tựa đề gì?
answer: Nước Pháp bị tàn phá dưới triều đại của Louis XIV, ai và bằng cách nào, với các phương tiện để khôi phục nó
wrong_answers:
  - Nước Pháp bị tàn phá dưới triều đại của Louis XIV, tại sao và như thế nào, với những nhân vật ủng hộ
  - Nước Pháp bị chia cắt dưới thời vua Louis XIV, do phe phái nào và tại sao, và làm thế nào để thống nhất lại một lần nữa
  - Nước Pháp thịnh vượng dưới triều đại của Louis XIV, nhờ ai và như thế nào, với những ví dụ cụ thể
explanation: |
  Tên đầy đủ của lần tái bản tác phẩm của ông năm 1696 quả thực là "La France Ruinée sous le règne de Louis XIV, par qui et comment, avec les moyens de la rétablir". Tiêu đề này phản ánh sự chỉ trích gay gắt của Boisguilbert đối với chính sách kinh tế của Louis XIV.