question: Kdo označil Cantillona za zakladatele ekonomie?
answer: Murray Rothbard
wrong_answers:
  - Joseph A. Schumpeter
  - Mark Blaug
  - Adam Smith
explanation: |
  Murray Rothbard, ekonom rakouské školy, označil Richarda Cantillona za zakladatele ekonomie kvůli jeho inovativnímu přístupu a významnému přínosu k ekonomické teorii.