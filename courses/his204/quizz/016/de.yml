question: Wer nannte Cantillon den Begründer der Wirtschaftswissenschaften?
answer: Murray Rothbard
wrong_answers:
  - Joseph A. Schumpeter
  - Mark Blaug
  - Adam Smith
explanation: |
  Murray Rothbard, ein Ökonom der österreichischen Schule, bezeichnete Richard Cantillon aufgrund seines innovativen Ansatzes und seiner wichtigen Beiträge zur Wirtschaftstheorie als den Begründer der Wirtschaftswissenschaften.