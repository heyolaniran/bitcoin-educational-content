question: ¿Quién llamó a Cantillon fundador de la economía?
answer: Murray Rothbard
wrong_answers:
  - Joseph A. Schumpeter
  - Mark Blaug
  - Adam Smith
explanation: |
  Murray Rothbard, economista de la escuela austriaca, calificó a Richard Cantillon de fundador de la economía por su enfoque innovador y sus importantes aportaciones a la teoría económica.