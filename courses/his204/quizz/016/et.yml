question: Kes nimetas Cantillonit majandusteaduse rajajaks?
answer: Murray Rothbard
wrong_answers:
  - Joseph A. Schumpeter
  - Mark Blaug
  - Adam Smith
explanation: |
  Austria koolkonna majandusteadlane Murray Rothbard nimetas Richard Cantillonit majandusteaduse rajajaks tema uuendusliku lähenemise ja olulise panuse tõttu majandusteooriasse.