question: چه کسی کانتیلون را بنیان‌گذار اقتصاد نامید؟
answer: موری راتبارد
wrong_answers:
  - جوزف آ. شومپیتر
  - مارک بلاگ
  - آدام اسمیت
explanation: |
  موری راتبارد، اقتصاددان مکتب اتریش، ریچارد کانتیلون را بنیان‌گذار علم اقتصاد نامید به دلیل رویکرد نوآورانه و مشارکت‌های مهم او در نظریه اقتصادی.