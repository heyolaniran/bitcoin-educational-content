question: Kuka kutsui Cantillonia taloustieteen perustajaksi?
answer: Murray Rothbard
wrong_answers:
  - Joseph A. Schumpeter
  - Mark Blaug
  - Adam Smith
explanation: |
  Itävaltalaiseen koulukuntaan kuuluva taloustieteilijä Murray Rothbard kutsui Richard Cantillonia taloustieteen perustajaksi innovatiivisen lähestymistapansa ja talousteoriaan antamiensa merkittävien panosten vuoksi.