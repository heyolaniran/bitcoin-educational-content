question: Qui a qualifié Cantillon de fondateur de la science économique ?
answer: Murray Rothbard
wrong_answers:
  - Joseph A. Schumpeter
  - Mark Blaug
  - Adam Smith
explanation: |
  Murray Rothbard, un économiste de l'école autrichienne, a qualifié Richard Cantillon de fondateur de la science économique en raison de son approche novatrice et de ses contributions importantes à la théorie économique.
