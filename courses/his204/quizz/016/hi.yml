question: कैन्टिलन को अर्थशास्त्र का संस्थापक किसने कहा?
answer: मरे रोथबर्ड
wrong_answers:
  - जोसेफ ए. शुम्पीटर
  - मार्क ब्लाग
  - एडम स्मिथ
explanation: |
  ऑस्ट्रियाई स्कूल के अर्थशास्त्री मरे रोथबर्ड ने रिचर्ड कैंटिलोन को उनके नवीन दृष्टिकोण और आर्थिक सिद्धांत में महत्वपूर्ण योगदान के कारण अर्थशास्त्र का संस्थापक कहा।