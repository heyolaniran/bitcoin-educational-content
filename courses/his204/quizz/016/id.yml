question: Siapa yang menyebut Cantillon sebagai pendiri ekonomi?
answer: Murray Rothbard
wrong_answers:
  - Joseph A. Schumpeter
  - Mark Blaug
  - Adam Smith
explanation: |
  Murray Rothbard, seorang ekonom mazhab Austria, menyebut Richard Cantillon sebagai pendiri ilmu ekonomi karena pendekatannya yang inovatif dan kontribusinya yang penting terhadap teori ekonomi.