question: Chi ha definito Cantillon il fondatore dell'economia?
answer: Murray Rothbard
wrong_answers:
  - Joseph A. Schumpeter
  - Mark Blaug
  - Adam Smith
explanation: |
  Murray Rothbard, economista della scuola austriaca, ha definito Richard Cantillon il fondatore dell'economia per il suo approccio innovativo e i suoi importanti contributi alla teoria economica.