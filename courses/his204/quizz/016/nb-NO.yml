question: Hvem kalte Cantillon for økonomifagets grunnlegger?
answer: Murray Rothbard
wrong_answers:
  - Joseph A. Schumpeter
  - Mark Blaug
  - Adam Smith
explanation: |
  Murray Rothbard, en økonom av den østerrikske skolen, kalte Richard Cantillon for økonomifagets grunnlegger på grunn av hans innovative tilnærming og viktige bidrag til økonomisk teori.