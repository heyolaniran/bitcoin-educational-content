question: Kto nazwał Cantillona założycielem ekonomii?
answer: Murray Rothbard
wrong_answers:
  - Joseph A. Schumpeter
  - Mark Blaug
  - Adam Smith
explanation: |
  Murray Rothbard, ekonomista szkoły austriackiej, nazwał Richarda Cantillona założycielem ekonomii ze względu na jego innowacyjne podejście i istotny wkład w teorię ekonomii.