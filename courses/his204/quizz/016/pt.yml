question: Quem chamou a Cantillon o fundador da economia?
answer: Murray Rothbard
wrong_answers:
  - Joseph A. Schumpeter
  - Mark Blaug
  - Adam Smith
explanation: |
  Murray Rothbard, um economista da escola austríaca, chamou a Richard Cantillon o fundador da economia devido à sua abordagem inovadora e às suas importantes contribuições para a teoria económica.