question: Кто назвал Кантильона основателем экономики?
answer: Мюррей Ротбард
wrong_answers:
  - Йозеф А. Шумпетер
  - Марк Блауг
  - Адам Смит
explanation: |
  Мюррей Ротбард, экономист австрийской школы, назвал Ричарда Кантильона основателем экономики за его новаторский подход и важный вклад в экономическую теорию.