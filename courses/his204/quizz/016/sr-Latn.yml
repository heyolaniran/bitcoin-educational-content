question: Ko je nazvao Cantillona osnivačem ekonomije?
answer: Murray Rothbard
wrong_answers:
  - Joseph A. Schumpeter
  - Mark Blaug
  - Adam Smith
explanation: |
  Murray Rothbard, ekonomista austrijske škole, nazvao je Richarda Cantillona osnivačem ekonomije zbog njegovog inovativnog pristupa i važnih doprinosa ekonomskoj teoriji.