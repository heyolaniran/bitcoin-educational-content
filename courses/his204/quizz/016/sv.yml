question: Vem kallade Cantillon för ekonomins grundare?
answer: Murray Rothbard
wrong_answers:
  - Joseph A. Schumpeter
  - Mark Blaug
  - Adam Smith
explanation: |
  Murray Rothbard, en ekonom av den österrikiska skolan, kallade Richard Cantillon för ekonomins grundare på grund av hans innovativa synsätt och viktiga bidrag till den ekonomiska teorin.