question: Nani alimwita Cantillon mwanzilishi wa uchumi?
answer: Murray Rothbard
wrong_answers:
  - Joseph A. Schumpeter
  - Mark Blaug
  - Adam Smith
explanation: |
  Murray Rothbard, mwanauchumi wa shule ya Austria, alimwita Richard Cantillon mwanzilishi wa uchumi kwa sababu ya mbinu yake ya ubunifu na mchango muhimu kwa nadharia ya kiuchumi.