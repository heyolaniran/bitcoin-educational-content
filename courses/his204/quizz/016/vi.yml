question: Ai gọi Cantillon là người sáng lập ra ngành kinh tế học?
answer: Murray Rothbard
wrong_answers:
  - Joseph A. Schumpeter
  - Đánh dấu Blaug
  - Adam Smith
explanation: |
  Murray Rothbard, một nhà kinh tế học của trường phái Áo, gọi Richard Cantillon là người sáng lập ra ngành kinh tế học vì cách tiếp cận sáng tạo và những đóng góp quan trọng của ông cho lý thuyết kinh tế.