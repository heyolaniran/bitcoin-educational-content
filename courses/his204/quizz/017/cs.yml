question: Ačkoli se Richard Cantillon stal v roce 1708 francouzským občanem, odkud pocházel?
answer: Z Irska
wrong_answers:
  - Ze Španělska
  - Z Anglie
  - Z Německa
explanation: |
  Richard Cantillon byl irského původu a později, v roce 1708, získal francouzské občanství. Většinu života strávil ve Francii a byl ovlivněn francouzskými ekonomickými myšlenkami své doby.