question: Richard Cantillon wurde zwar 1708 französischer Staatsbürger, aber woher kam er?
answer: Aus Irland
wrong_answers:
  - Aus Spanien
  - Aus England
  - Aus Deutschland
explanation: |
  Richard Cantillon war irischer Herkunft und erwarb 1708 die französische Staatsbürgerschaft. Er verbrachte einen Großteil seines Lebens in Frankreich und wurde von den französischen Wirtschaftsideen seiner Zeit beeinflusst.