question: Aunque Richard Cantillon se nacionalizó francés en 1708, ¿de dónde procedía?
answer: Desde Irlanda
wrong_answers:
  - Desde España
  - Desde Inglaterra
  - Desde Alemania
explanation: |
  Richard Cantillon era de origen irlandés y posteriormente adquirió la nacionalidad francesa en 1708. Pasó gran parte de su vida en Francia y se vio influido por las ideas económicas francesas de su época.