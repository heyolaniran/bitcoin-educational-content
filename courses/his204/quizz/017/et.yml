question: Kuigi Richard Cantillon sai 1708. aastal Prantsuse kodanikuks, kust ta ikkagi pärit oli?
answer: Iirimaalt
wrong_answers:
  - Hispaaniast
  - Inglismaalt
  - Saksamaalt
explanation: |
  Richard Cantillon oli iiri päritolu ja omandas hiljem, 1708. aastal, Prantsuse kodakondsuse. Ta veetis suure osa oma elust Prantsusmaal ja oli mõjutatud oma aja prantsuse majandusideedest.