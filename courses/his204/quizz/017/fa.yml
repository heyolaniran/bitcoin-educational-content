question: اگرچه ریچارد کانتیلون در سال 1708 شهروند فرانسه شد، او اهل کجا بود؟
answer: از ایرلند
wrong_answers:
  - از اسپانیا
  - از انگلستان
  - از آلمان
explanation: |
  ریچارد کانتیلون اصالتی ایرلندی داشت و بعدها در سال 1708 تابعیت فرانسوی را کسب کرد. او بخش زیادی از زندگی خود را در فرانسه گذراند و تحت تأثیر ایده‌های اقتصادی فرانسه در زمان خود قرار گرفت.