question: Vaikka Richard Cantillonista tuli Ranskan kansalainen vuonna 1708, mistä hän oli kotoisin?
answer: Irlannista
wrong_answers:
  - Espanjasta
  - Englannista
  - Saksasta
explanation: |
  Richard Cantillon oli irlantilaissyntyinen ja sai myöhemmin Ranskan kansalaisuuden vuonna 1708. Hän vietti suuren osan elämästään Ranskassa ja sai vaikutteita aikansa ranskalaisista talousajatteluista.