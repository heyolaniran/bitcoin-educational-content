question: Bien que Richard Cantillon a acquis la nationalité française en 1708, de quelle origine était-il ?
answer: D’Irlande
wrong_answers:
  - D’Espagne
  - D’Angleterre
  - D'Allemagne
explanation: |
  Richard Cantillon était d'origine irlandaise et a ensuite acquis la nationalité française en 1708. Il a passé une grande partie de sa vie en France et a été influencé par les idées économiques françaises de son époque.
