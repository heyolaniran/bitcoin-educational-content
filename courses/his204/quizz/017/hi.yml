question: यद्यपि रिचर्ड कैन्टिलन 1708 में फ्रांसीसी नागरिक बन गये थे, लेकिन वे कहां से आये थे?
answer: आयरलैंड से
wrong_answers:
  - स्पेन का
  - इंग्लैंड से
  - जर्मनी से
explanation: |
  रिचर्ड कैन्टिलन आयरिश मूल के थे और बाद में उन्होंने 1708 में फ्रांसीसी नागरिकता प्राप्त कर ली। उन्होंने अपना अधिकांश जीवन फ्रांस में बिताया और वे अपने समय के फ्रांसीसी आर्थिक विचारों से प्रभावित थे।