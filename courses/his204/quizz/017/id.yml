question: Meskipun Richard Cantillon menjadi warga negara Prancis pada tahun 1708, dari manakah dia berasal?
answer: Dari Irlandia
wrong_answers:
  - Dari Spanyol
  - Dari Inggris
  - Dari Jerman
explanation: |
  Richard Cantillon berasal dari Irlandia dan kemudian memperoleh kewarganegaraan Prancis pada tahun 1708. Dia menghabiskan sebagian besar hidupnya di Prancis dan dipengaruhi oleh ide-ide ekonomi Prancis pada masanya.