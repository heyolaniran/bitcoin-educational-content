question: Sebbene Richard Cantillon sia diventato cittadino francese nel 1708, da dove proveniva?
answer: Dall'Irlanda
wrong_answers:
  - Dalla Spagna
  - Dall'Inghilterra
  - Dalla Germania
explanation: |
  Richard Cantillon era di origine irlandese e successivamente acquisì la cittadinanza francese nel 1708. Trascorse gran parte della sua vita in Francia e fu influenzato dalle idee economiche francesi del suo tempo.