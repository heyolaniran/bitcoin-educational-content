question: Selv om Richard Cantillon ble fransk statsborger i 1708, hvor kom han fra?
answer: Fra Irland
wrong_answers:
  - Fra Spania
  - Fra England
  - Fra Tyskland
explanation: |
  Richard Cantillon var av irsk opprinnelse og fikk senere fransk statsborgerskap i 1708. Han tilbrakte store deler av livet sitt i Frankrike, og var påvirket av sin samtids franske økonomiske ideer.