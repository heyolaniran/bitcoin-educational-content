question: Chociaż Richard Cantillon został obywatelem Francji w 1708 roku, skąd pochodził?
answer: Z Irlandii
wrong_answers:
  - Z Hiszpanii
  - Z Anglii
  - Z Niemiec
explanation: |
  Richard Cantillon pochodził z Irlandii, a w 1708 r. uzyskał obywatelstwo francuskie. Większość swojego życia spędził we Francji i był pod wpływem francuskich idei ekonomicznych swoich czasów.