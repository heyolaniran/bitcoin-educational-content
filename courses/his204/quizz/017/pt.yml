question: Embora Richard Cantillon se tenha tornado cidadão francês em 1708, de onde é que ele veio?
answer: Da Irlanda
wrong_answers:
  - De Espanha
  - De Inglaterra
  - Da Alemanha
explanation: |
  Richard Cantillon era de origem irlandesa e adquiriu posteriormente a nacionalidade francesa em 1708. Passou grande parte da sua vida em França e foi influenciado pelas ideias económicas francesas do seu tempo.