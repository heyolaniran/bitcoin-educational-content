question: Хотя Ришар Кантильон стал гражданином Франции в 1708 году, откуда он родом?
answer: Из Ирландии
wrong_answers:
  - Из Испании
  - Из Англии
  - Из Германии
explanation: |
  Ричард Кантильон был ирландцем по происхождению, а в 1708 году получил французское гражданство. Большую часть своей жизни он провел во Франции и находился под влиянием французских экономических идей своего времени.