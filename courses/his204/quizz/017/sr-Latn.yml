question: Iako je Richard Cantillon postao francuski državljanin 1708. godine, odakle je došao?
answer: Iz Irske
wrong_answers:
  - Iz Španije
  - Iz Engleske
  - Iz Nemačke
explanation: |
  Richard Cantillon je bio irskog porekla i kasnije je stekao francusko državljanstvo 1708. godine. Veći deo svog života proveo je u Francuskoj i bio je pod uticajem francuskih ekonomskih ideja svog vremena.