question: Richard Cantillon blev visserligen fransk medborgare 1708, men varifrån kom han?
answer: Från Irland
wrong_answers:
  - Från Spanien
  - Från England
  - Från Tyskland
explanation: |
  Richard Cantillon var av irländskt ursprung och fick senare franskt medborgarskap 1708. Han tillbringade en stor del av sitt liv i Frankrike och påverkades av sin tids franska ekonomiska idéer.