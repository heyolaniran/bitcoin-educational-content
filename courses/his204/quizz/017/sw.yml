question: Ingawa Richard Cantillon alikua raia wa Ufaransa mnamo 1708, alitoka wapi?
answer: Kutoka Ireland
wrong_answers:
  - Kutoka Uhispania
  - Kutoka Uingereza
  - Kutoka Ujerumani
explanation: |
  Richard Cantillon alikuwa mwenye asili ya Ireland na baadaye akapata uraia wa Ufaransa mwaka wa 1708. Alitumia muda mwingi wa maisha yake nchini Ufaransa na aliathiriwa na mawazo ya kiuchumi ya Ufaransa ya wakati wake.