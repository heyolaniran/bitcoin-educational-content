question: Mặc dù Richard Cantillon đã trở thành công dân Pháp vào năm 1708, nhưng ông đến từ đâu?
answer: Từ Ireland
wrong_answers:
  - Từ Tây Ban Nha
  - Từ Anh
  - Từ Đức
explanation: |
  Richard Cantillon là người gốc Ireland và sau đó nhập quốc tịch Pháp vào năm 1708. Ông đã dành phần lớn cuộc đời ở Pháp và chịu ảnh hưởng bởi các tư tưởng kinh tế của Pháp thời bấy giờ.