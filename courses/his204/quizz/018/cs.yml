question: Co jsou Cantillonovy efekty?
answer: Zvýšení množství peněz v zemi ovlivňuje rozdělení příjmů
wrong_answers:
  - Zvýšení množství peněz má vliv na chování lidí
  - Zvyšování množství peněz má vliv na výši veřejného dluhu
  - Zvýšení množství peněz nemá významný vliv
explanation: |
  Cantillonův efekt popisuje, jak zvýšení peněz Supply ovlivňuje ceny a důchody v různých sektorech ekonomiky odlišně. Příliv nových peněz se nerozšiřuje rovnoměrně, což způsobuje deformace a nerovnosti.