question: Was sind Cantillon-Effekte?
answer: Eine Erhöhung der Geldmenge in einem Land wirkt sich auf die Einkommensverteilung aus
wrong_answers:
  - Die Erhöhung der Geldmenge hat Auswirkungen auf das Verhalten der Menschen
  - Die Erhöhung der Geldmenge wirkt sich auf die Höhe der Staatsverschuldung aus
  - Eine Erhöhung der Geldmenge hat keine nennenswerten Auswirkungen
explanation: |
  Cantillon-Effekte beschreiben, wie sich eine Erhöhung der Geldmenge Supply auf die Preise und Einkommen in den verschiedenen Sektoren der Wirtschaft unterschiedlich auswirkt. Die Zufuhr von neuem Geld verteilt sich nicht gleichmäßig, was zu Verzerrungen und Ungleichheiten führt.