question: What are Cantillon effects?
answer: Increasing the quantity of money in a country affects income distribution
wrong_answers:
  - Increasing the quantity of money has an impact on people's behavior
  - Increasing the quantity of money has an impact on the amount of public debt
  - Increasing the quantity of money has no significant effect
explanation: |
  Cantillon effects describe how an increase in the money supply affects prices and incomes differently in different sectors of the economy. The injection of new money does not spread evenly, creating distortions and inequalities.