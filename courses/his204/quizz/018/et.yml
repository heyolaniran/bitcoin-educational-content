question: Mis on Cantilloni mõju?
answer: Rahakoguse suurendamine riigis mõjutab sissetulekute jaotumist
wrong_answers:
  - Raha hulga suurendamine mõjutab inimeste käitumist
  - Rahakoguse suurendamine mõjutab riigivõla suurust
  - Rahakoguse suurendamine ei avalda olulist mõju
explanation: |
  Cantilloni mõju kirjeldab, kuidas raha Supply suurenemine mõjutab hindu ja sissetulekuid erinevalt erinevates majandussektorites. Uue raha süstimine ei levi ühtlaselt, tekitades moonutusi ja ebavõrdsust.