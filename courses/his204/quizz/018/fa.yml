question: اثرات کانتیلون چیست؟
answer: افزایش مقدار پول در یک کشور بر توزیع درآمد تأثیر می‌گذارد
wrong_answers:
  - افزایش مقدار پول بر رفتار مردم تأثیر می‌گذارد
  - افزایش مقدار پول بر میزان بدهی عمومی تأثیر دارد
  - افزایش مقدار پول تأثیر قابل‌توجهی ندارد
explanation: |
  اثرات کانتیلون توصیف می‌کنند که چگونه افزایش پول Supply قیمت‌ها و درآمدها را در بخش‌های مختلف اقتصاد به‌طور متفاوتی تحت تأثیر قرار می‌دهد. تزریق پول جدید به‌طور یکنواخت پخش نمی‌شود و باعث ایجاد تحریف‌ها و نابرابری‌ها می‌شود.