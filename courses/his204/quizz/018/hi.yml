question: कैन्टिलोन प्रभाव क्या हैं?
answer: किसी देश में मुद्रा की मात्रा बढ़ने से आय वितरण प्रभावित होता है
wrong_answers:
  - धन की मात्रा बढ़ने से लोगों के व्यवहार पर प्रभाव पड़ता है
  - धन की मात्रा में वृद्धि से सार्वजनिक ऋण की मात्रा पर प्रभाव पड़ता है
  - धन की मात्रा बढ़ाने से कोई महत्वपूर्ण प्रभाव नहीं पड़ता
explanation: |
  कैंटिलन प्रभाव बताते हैं कि Supply मुद्रा में वृद्धि किस तरह अर्थव्यवस्था के विभिन्न क्षेत्रों में कीमतों और आय को अलग-अलग तरीके से प्रभावित करती है। नए पैसे का इंजेक्शन समान रूप से नहीं फैलता है, जिससे विकृतियाँ और असमानताएँ पैदा होती हैं।