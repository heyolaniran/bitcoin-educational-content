question: Apa yang dimaksud dengan efek Cantillon?
answer: Peningkatan jumlah uang di suatu negara mempengaruhi distribusi pendapatan
wrong_answers:
  - Meningkatnya jumlah uang berdampak pada perilaku masyarakat
  - Peningkatan jumlah uang berdampak pada jumlah utang publik
  - Meningkatkan jumlah uang tidak memiliki pengaruh yang signifikan
explanation: |
  Efek Cantillon menggambarkan bagaimana peningkatan jumlah uang Supply mempengaruhi harga dan pendapatan secara berbeda di berbagai sektor ekonomi. Suntikan uang baru tidak menyebar secara merata, menciptakan distorsi dan ketidaksetaraan.