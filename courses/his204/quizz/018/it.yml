question: Cosa sono gli effetti Cantillon?
answer: L'aumento della quantità di moneta in un paese influisce sulla distribuzione del reddito
wrong_answers:
  - L'aumento della quantità di denaro ha un impatto sul comportamento delle persone
  - L'aumento della quantità di moneta ha un impatto sull'ammontare del debito pubblico
  - L'aumento della quantità di moneta non ha effetti significativi
explanation: |
  Gli effetti Cantillon descrivono come un aumento della moneta Supply influisca sui prezzi e sui redditi in modo diverso nei vari settori dell'economia. L'iniezione di nuova moneta non si distribuisce in modo uniforme, creando distorsioni e disuguaglianze.