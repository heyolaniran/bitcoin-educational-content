question: Hva er Cantillon-effekter?
answer: Økt pengemengde i et land påvirker inntektsfordelingen
wrong_answers:
  - Økt pengemengde har innvirkning på folks atferd
  - Økning av pengemengden påvirker størrelsen på den offentlige gjelden
  - Å øke pengemengden har ingen signifikant effekt
explanation: |
  Cantillon-effekter beskriver hvordan en økning i pengemengden Supply påvirker priser og inntekter ulikt i ulike sektorer av økonomien. Tilførselen av nye penger spres ikke jevnt, noe som skaper skjevheter og ulikheter.