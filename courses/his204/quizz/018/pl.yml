question: Czym są efekty Cantillon?
answer: Zwiększenie ilości pieniądza w kraju wpływa na dystrybucję dochodu
wrong_answers:
  - Zwiększenie ilości pieniędzy ma wpływ na zachowanie ludzi
  - Zwiększenie ilości pieniądza ma wpływ na wysokość długu publicznego
  - Zwiększenie ilości pieniądza nie ma znaczącego wpływu
explanation: |
  Efekty Cantillona opisują, w jaki sposób wzrost Supply pieniądza wpływa na ceny i dochody w różny sposób w różnych sektorach gospodarki. Zastrzyk nowych pieniędzy nie rozprzestrzenia się równomiernie, tworząc zakłócenia i nierówności.