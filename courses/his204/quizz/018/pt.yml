question: O que são efeitos Cantillon?
answer: O aumento da quantidade de moeda num país afecta a distribuição do rendimento
wrong_answers:
  - O aumento da quantidade de dinheiro tem um impacto no comportamento das pessoas
  - O aumento da quantidade de moeda tem um impacto no montante da dívida pública
  - O aumento da quantidade de moeda não tem um efeito significativo
explanation: |
  Os efeitos Cantillon descrevem a forma como um aumento da moeda Supply afecta os preços e os rendimentos de forma diferente nos diferentes sectores da economia. A injeção de dinheiro novo não se distribui uniformemente, criando distorções e desigualdades.