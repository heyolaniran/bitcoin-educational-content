question: Что такое кантильонские эффекты?
answer: Увеличение количества денег в стране влияет на распределение доходов
wrong_answers:
  - Увеличение количества денег влияет на поведение людей
  - Увеличение количества денег влияет на размер государственного долга
  - Увеличение количества денег не оказывает существенного влияния
explanation: |
  Эффект Кантильона описывает, как увеличение денежного Supply по-разному влияет на цены и доходы в разных секторах экономики. Вливание новых денег происходит неравномерно, создавая перекосы и неравенство.