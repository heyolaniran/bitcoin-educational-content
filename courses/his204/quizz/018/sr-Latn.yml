question: Šta su Cantillon efekti?
answer: Povećanje količine novca u zemlji utiče na distribuciju dohotka
wrong_answers:
  - Povećanje količine novca utiče na ponašanje ljudi
  - Povećanje količine novca ima uticaj na iznos javnog duga
  - Povećanje količine novca nema značajan efekat
explanation: |
  Cantillon efekti opisuju kako povećanje novca Supply različito utiče na cene i prihode u različitim sektorima ekonomije. Injekcija novog novca se ne širi ravnomerno, stvarajući distorzije i nejednakosti.