question: Vad är Cantillon-effekter?
answer: Ökad penningmängd i ett land påverkar inkomstfördelningen
wrong_answers:
  - Ökad penningmängd påverkar människors beteende
  - En ökning av penningmängden har en inverkan på storleken på den offentliga skulden
  - En ökning av penningmängden har ingen signifikant effekt
explanation: |
  Cantilloneffekter beskriver hur en ökning av penningmängden Supply påverkar priser och inkomster olika i olika sektorer av ekonomin. Injektionen av nya pengar sprids inte jämnt, vilket skapar snedvridningar och ojämlikheter.