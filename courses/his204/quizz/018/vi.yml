question: Hiệu ứng Cantillon là gì?
answer: Sự gia tăng lượng tiền trong một quốc gia ảnh hưởng đến phân phối thu nhập
wrong_answers:
  - Sự gia tăng số lượng tiền có tác động đến hành vi của con người
  - Việc tăng lượng tiền có tác động đến số lượng nợ công
  - Việc tăng lượng tiền không có tác dụng đáng kể
explanation: |
  Hiệu ứng Cantillon mô tả cách thức tăng tiền Supply ảnh hưởng đến giá cả và thu nhập khác nhau ở các khu vực khác nhau của nền kinh tế. Việc bơm tiền mới không phân bổ đều, tạo ra sự bóp méo và bất bình đẳng.