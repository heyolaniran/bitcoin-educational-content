question: Jaká je podle Cantillona hlavní charakteristika podnikatele?
answer: Vyvíjí se v nejistotě
wrong_answers:
  - Má velké písmeno
  - Je inovátorem
  - Pochází z bohaté rodiny
explanation: |
  Cantillon zdůrazňuje roli podnikatele tváří v tvář nejistotě a riziku. Podnikatel je ten, kdo se rozhoduje v nejistém prostředí a nese důsledky svých rozhodnutí.