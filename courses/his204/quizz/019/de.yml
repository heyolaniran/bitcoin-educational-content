question: Was ist nach Cantillon das Hauptmerkmal eines Unternehmers?
answer: Sie entwickelt sich in Ungewissheit
wrong_answers:
  - Sie hat ein Kapital
  - Er ist ein Innovator
  - Er stammt aus einer wohlhabenden Familie
explanation: |
  Cantillon unterstreicht die Rolle des Unternehmers angesichts von Unsicherheit und Risiko. Der Unternehmer ist derjenige, der in einem unsicheren Umfeld Entscheidungen trifft und die Konsequenzen seiner Entscheidungen trägt.