question: According to Cantillon, what is the main characteristic of an entrepreneur?
answer: It evolves in uncertainty
wrong_answers:
  - It has a capital
  - He's an innovator
  - He comes from a wealthy family
explanation: |
  Cantillon emphasizes the role of the entrepreneur in the face of uncertainty and risk. The entrepreneur is the one who makes decisions in an uncertain environment and assumes the consequences of his or her choices.