question: Según Cantillon, ¿cuál es la principal característica de un empresario?
answer: Evoluciona en la incertidumbre
wrong_answers:
  - Tiene una capital
  - Es un innovador
  - Proviene de una familia adinerada
explanation: |
  Cantillon hace hincapié en el papel del empresario frente a la incertidumbre y el riesgo. El empresario es quien toma decisiones en un entorno incierto y asume las consecuencias de sus elecciones.