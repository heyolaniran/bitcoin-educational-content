question: Milline on Cantilloni sõnul ettevõtja peamine tunnusjoon?
answer: See areneb ebakindluses
wrong_answers:
  - Sellel on suurtähtede
  - Ta on uuendaja
  - Ta on pärit jõukast perekonnast
explanation: |
  Cantillon rõhutab ettevõtja rolli ebakindluse ja riski tingimustes. Ettevõtja on see, kes teeb otsuseid ebakindlas keskkonnas ja võtab enda kanda oma valikute tagajärjed.