question: طبق نظر کانتیلون، ویژگی اصلی یک کارآفرین چیست؟
answer: در عدم قطعیت تکامل می‌یابد
wrong_answers:
  - این یک پایتخت دارد
  - او یک نوآور است
  - او از یک خانواده ثروتمند می‌آید
explanation: |
  کانتیلون بر نقش کارآفرین در مواجهه با عدم قطعیت و ریسک تأکید می‌کند. کارآفرین کسی است که در محیطی نامطمئن تصمیم‌گیری می‌کند و پیامدهای انتخاب‌های خود را می‌پذیرد.