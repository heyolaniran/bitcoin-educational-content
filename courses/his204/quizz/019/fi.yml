question: Mikä on Cantillonin mukaan yrittäjän tärkein ominaisuus?
answer: Se kehittyy epävarmuudessa
wrong_answers:
  - Sen pääkirjain on
  - Hän on innovaattori
  - Hän tulee varakkaasta perheestä
explanation: |
  Cantillon korostaa yrittäjän roolia epävarmuuden ja riskien edessä. Yrittäjä on se, joka tekee päätöksiä epävarmassa ympäristössä ja vastaa valintojensa seurauksista.