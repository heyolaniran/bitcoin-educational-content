question: Quel est selon Cantillon la principale caractéristique de l’entrepreneur ?
answer: Il évolue dans l’incertitude
wrong_answers:
  - Il dispose d’un capital
  - C’est un innovateur
  - Il est issu d'une famille riche
explanation: |
  Cantillon met l'accent sur le rôle de l'entrepreneur face à l'incertitude et au risque. L'entrepreneur est celui qui prend des décisions dans un environnement incertain et qui assume les conséquences de ses choix.
