question: कैन्टिलन के अनुसार एक उद्यमी की मुख्य विशेषता क्या है?
answer: यह अनिश्चितता में विकसित होता है
wrong_answers:
  - इसकी एक राजधानी है
  - वह एक नवप्रवर्तक हैं
  - वह एक धनी परिवार से आता है
explanation: |
  कैंटिलन अनिश्चितता और जोखिम के सामने उद्यमी की भूमिका पर जोर देते हैं। उद्यमी वह व्यक्ति होता है जो अनिश्चित वातावरण में निर्णय लेता है और अपने विकल्पों के परिणामों को स्वीकार करता है।