question: Menurut Cantillon, apa karakteristik utama dari seorang wirausahawan?
answer: Ini berkembang dalam ketidakpastian
wrong_answers:
  - Ini memiliki modal
  - Dia adalah seorang inovator
  - Ia berasal dari keluarga kaya raya
explanation: |
  Cantillon menekankan peran wirausahawan dalam menghadapi ketidakpastian dan risiko. Wirausahawan adalah orang yang membuat keputusan dalam lingkungan yang tidak pasti dan menanggung konsekuensi dari pilihannya.