question: Secondo Cantillon, qual è la caratteristica principale di un imprenditore?
answer: Si evolve nell'incertezza
wrong_answers:
  - Ha una capitale
  - È un innovatore
  - Proviene da una famiglia benestante
explanation: |
  Cantillon sottolinea il ruolo dell'imprenditore di fronte all'incertezza e al rischio. L'imprenditore è colui che prende decisioni in un ambiente incerto e si assume le conseguenze delle sue scelte.