question: Hva er ifølge Cantillon det viktigste kjennetegnet ved en gründer?
answer: Den utvikler seg i usikkerhet
wrong_answers:
  - Den har en hovedstad
  - Han er en innovatør
  - Han kommer fra en velstående familie
explanation: |
  Cantillon legger vekt på entreprenørens rolle i møte med usikkerhet og risiko. Entreprenøren er den som tar beslutninger i et usikkert miljø og tar konsekvensene av sine valg.