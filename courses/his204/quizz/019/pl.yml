question: Jaka jest główna cecha przedsiębiorcy według Cantillona?
answer: Rozwija się w niepewności
wrong_answers:
  - Ma kapitał
  - Jest innowatorem
  - Pochodzi z zamożnej rodziny
explanation: |
  Cantillon podkreśla rolę przedsiębiorcy w obliczu niepewności i ryzyka. Przedsiębiorca to ten, który podejmuje decyzje w niepewnym środowisku i ponosi konsekwencje swoich wyborów.