question: Segundo Cantillon, qual é a principal caraterística de um empresário?
answer: Evolui na incerteza
wrong_answers:
  - Tem uma capital
  - Ele é um inovador
  - Ele vem de uma família rica
explanation: |
  Cantillon sublinha o papel do empresário face à incerteza e ao risco. O empresário é aquele que toma decisões num ambiente incerto e assume as consequências das suas escolhas.