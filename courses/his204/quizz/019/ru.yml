question: Какова, по мнению Кантильона, главная характеристика предпринимателя?
answer: Она развивается в условиях неопределенности
wrong_answers:
  - У него есть столица
  - Он новатор
  - Он происходит из богатой семьи
explanation: |
  Кантильон подчеркивает роль предпринимателя в условиях неопределенности и риска. Предприниматель - это тот, кто принимает решения в условиях неопределенности и берет на себя последствия своего выбора.