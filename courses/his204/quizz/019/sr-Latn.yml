question: Prema Kantijonu, koja je glavna karakteristika preduzetnika?
answer: Razvija se u neizvesnosti
wrong_answers:
  - Ima glavni grad
  - On je inovator
  - On dolazi iz bogate porodice
explanation: |
  Cantillon naglašava ulogu preduzetnika suočenog sa neizvesnošću i rizikom. Preduzetnik je taj koji donosi odluke u neizvesnom okruženju i preuzima posledice svojih izbora.