question: Enligt Cantillon, vad är det som främst kännetecknar en entreprenör?
answer: Den utvecklas under osäkerhet
wrong_answers:
  - Den har en huvudstad
  - Han är en innovatör
  - Han kommer från en förmögen familj
explanation: |
  Cantillon betonar entreprenörens roll när det gäller att hantera osäkerhet och risk. Entreprenören är den som fattar beslut i en osäker miljö och som tar konsekvenserna av sina val.