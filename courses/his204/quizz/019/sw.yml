question: Kulingana na Cantillon, ni nini sifa kuu ya mjasiriamali?
answer: Inabadilika kwa kutokuwa na uhakika
wrong_answers:
  - Ina mtaji
  - Yeye ni mvumbuzi
  - Anatoka katika familia tajiri
explanation: |
  Cantillon inasisitiza jukumu la mjasiriamali katika uso wa kutokuwa na uhakika na hatari. Mjasiriamali ndiye anayefanya maamuzi katika mazingira yasiyo na uhakika na kuchukua matokeo ya uchaguzi wake.