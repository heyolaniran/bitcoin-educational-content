question: Theo Cantillon, đặc điểm chính của một doanh nhân là gì?
answer: Nó phát triển trong sự không chắc chắn
wrong_answers:
  - Nó có một thủ đô
  - Anh ấy là một nhà cải tiến
  - Anh ấy xuất thân từ một gia đình giàu có
explanation: |
  Cantillon nhấn mạnh vai trò của doanh nhân khi đối mặt với sự không chắc chắn và rủi ro. Doanh nhân là người đưa ra quyết định trong môi trường không chắc chắn và chịu trách nhiệm về hậu quả của những lựa chọn của mình.