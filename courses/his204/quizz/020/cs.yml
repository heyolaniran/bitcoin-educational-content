question: Jaká událost, jíž byl současníkem, inspirovala Cantillona k jeho ekonomické teorii?
answer: Selhání systému Johna Lawa
wrong_answers:
  - Velká hospodářská krize v letech 1705-1707
  - Válka mezi Francií a Holandskem
  - Anglická revoluce
explanation: |
  Cantillon byl svědkem zhroucení Lawova systému a analyzoval jeho příčiny a důsledky ve svém díle "Essai sur la nature du commerce en général". Tato událost hluboce ovlivnila jeho ekonomické myšlení a chápání měnových jevů.