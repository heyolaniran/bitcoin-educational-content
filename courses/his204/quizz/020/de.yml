question: Welches Ereignis, das er als Zeitgenosse miterlebte, inspirierte Cantillon zu seiner Wirtschaftstheorie?
answer: Das Scheitern des Systems von John Law
wrong_answers:
  - Die große Wirtschaftskrise von 1705-1707
  - Der Krieg zwischen Frankreich und Holland
  - Die englische Revolution
explanation: |
  Cantillon wurde Zeuge des Zusammenbruchs des Lawschen Systems und analysierte dessen Ursachen und Folgen in seinem "Essai sur la nature du commerce en général". Dieses Ereignis beeinflusste sein wirtschaftliches Denken und sein Verständnis der monetären Phänomene tiefgreifend.