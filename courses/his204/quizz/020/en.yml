question: What was the event of which he was a contemporary that inspired Cantillon's economic theory?
answer: The failure of John Law's system
wrong_answers:
  - The great economic crisis of 1705-1707
  - The war between France and Holland
  - The English revolution
explanation: |
  Cantillon witnessed the collapse of Law's system and analyzed its causes and consequences in his "Essai sur la nature du commerce en général". This event profoundly influenced his economic thinking and his understanding of monetary phenomena.