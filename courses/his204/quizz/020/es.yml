question: ¿Cuál fue el acontecimiento del que fue contemporáneo que inspiró la teoría económica de Cantillon?
answer: El fracaso del sistema de John Law
wrong_answers:
  - La gran crisis económica de 1705-1707
  - La guerra entre Francia y Holanda
  - La revolución inglesa
explanation: |
  Cantillon fue testigo del hundimiento del sistema de Law y analizó sus causas y consecuencias en su "Essai sur la nature du commerce en général". Este acontecimiento influyó profundamente en su pensamiento económico y en su comprensión de los fenómenos monetarios.