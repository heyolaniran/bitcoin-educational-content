question: Milline sündmus, mille kaasaegne ta oli, inspireeris Cantilloni majandusteooriat?
answer: John Law süsteemi ebaõnnestumine
wrong_answers:
  - Suur majanduskriis aastatel 1705-1707
  - Sõda Prantsusmaa ja Hollandi vahel
  - Inglise revolutsioon
explanation: |
  Cantillon oli Law'i süsteemi kokkuvarisemise tunnistajaks ning analüüsis selle põhjuseid ja tagajärgi oma teoses "Essai sur la nature du commerce en général". See sündmus mõjutas sügavalt tema majanduslikku mõtlemist ja arusaamist rahapoliitilistest nähtustest.