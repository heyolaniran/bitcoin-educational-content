question: رویدادی که او هم‌عصر آن بود و نظریه اقتصادی کانتیلون را الهام بخشید چه بود؟
answer: شکست سیستم جان لاو
wrong_answers:
  - بحران بزرگ اقتصادی ۱۷۰۵-۱۷۰۷
  - جنگ بین فرانسه و هلند
  - انقلاب انگلیسی
explanation: |
  کانتیون شاهد فروپاشی سیستم لاو بود و علل و پیامدهای آن را در "مقاله‌ای دربارهٔ ماهیت تجارت به‌طور کلی" تحلیل کرد. این رویداد به‌طور عمیقی بر تفکر اقتصادی او و درک او از پدیده‌های پولی تأثیر گذاشت.