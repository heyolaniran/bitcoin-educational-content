question: De quel évènement dont il fut un contemporain Cantillon s’est-il inspiré pour sa théorie économique ?
answer: La faillite du système de John Law
wrong_answers:
  - La grande crise économique de 1705-1707
  - La guerre entre la France et la Hollande
  - La révolution anglaise
explanation: |
  Cantillon a été témoin de la faillite du système de Law et a analysé ses causes et conséquences dans son "Essai sur la nature du commerce en général". Cet événement a profondément influencé sa pensée économique et sa compréhension des phénomènes monétaires.
