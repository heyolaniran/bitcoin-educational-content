question: Peristiwa apa yang mengilhami teori ekonomi Cantillon?
answer: Kegagalan sistem John Law
wrong_answers:
  - Krisis ekonomi besar pada tahun 1705-1707
  - Perang antara Prancis dan Belanda
  - Revolusi Inggris
explanation: |
  Cantillon menyaksikan runtuhnya sistem Law dan menganalisis penyebab dan konsekuensinya dalam "Essai sur la nature du commerce en général". Peristiwa ini sangat memengaruhi pemikiran ekonominya dan pemahamannya tentang fenomena moneter.