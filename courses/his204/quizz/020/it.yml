question: Quale fu l'evento di cui fu contemporaneo che ispirò la teoria economica di Cantillon?
answer: Il fallimento del sistema di John Law
wrong_answers:
  - La grande crisi economica del 1705-1707
  - La guerra tra Francia e Olanda
  - La rivoluzione inglese
explanation: |
  Cantillon fu testimone del crollo del sistema di Law e ne analizzò le cause e le conseguenze nel suo "Essai sur la nature du commerce en général". Questo evento influenzò profondamente il suo pensiero economico e la sua comprensione dei fenomeni monetari.