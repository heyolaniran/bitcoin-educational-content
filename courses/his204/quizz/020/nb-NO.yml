question: Hva var det som skjedde i hans samtid, og som inspirerte Cantillons økonomiske teori?
answer: John Laws system mislyktes
wrong_answers:
  - Den store økonomiske krisen i 1705-1707
  - Krigen mellom Frankrike og Nederland
  - Den engelske revolusjonen
explanation: |
  Cantillon var vitne til sammenbruddet i Laws system og analyserte årsakene til og konsekvensene av det i sin "Essai sur la nature du commerce en général". Denne hendelsen fikk stor innflytelse på hans økonomiske tenkning og hans forståelse av monetære fenomener.