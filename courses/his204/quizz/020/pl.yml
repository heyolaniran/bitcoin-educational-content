question: Jakie wydarzenie, którego był świadkiem, zainspirowało teorię ekonomiczną Cantillona?
answer: Niepowodzenie systemu Johna Law'a
wrong_answers:
  - Wielki kryzys gospodarczy w latach 1705-1707
  - Wojna między Francją a Holandią
  - Angielska rewolucja
explanation: |
  Cantillon był świadkiem upadku systemu Law i przeanalizował jego przyczyny i konsekwencje w swoim "Essai sur la nature du commerce en général". Wydarzenie to wywarło głęboki wpływ na jego myślenie ekonomiczne i rozumienie zjawisk monetarnych.