question: Qual foi o acontecimento de que foi contemporâneo e que inspirou a teoria económica de Cantillon?
answer: O fracasso do sistema de John Law
wrong_answers:
  - A grande crise económica de 1705-1707
  - A guerra entre a França e a Holanda
  - A revolução inglesa
explanation: |
  Cantillon assistiu ao colapso do sistema de Law e analisou as suas causas e consequências no seu "Essai sur la nature du commerce en général". Este acontecimento influenciou profundamente o seu pensamento económico e a sua compreensão dos fenómenos monetários.