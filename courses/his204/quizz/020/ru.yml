question: Какое событие, современником которого он был, вдохновило Кантильона на создание экономической теории?
answer: Провал системы Джона Лоу
wrong_answers:
  - Великий экономический кризис 1705-1707 годов
  - Война между Францией и Голландией
  - Английская революция
explanation: |
  Кантильон стал свидетелем краха системы Лоу и проанализировал его причины и последствия в своей работе "Essai sur la nature du commerce en général". Это событие оказало глубокое влияние на его экономическое мышление и понимание монетарных явлений.