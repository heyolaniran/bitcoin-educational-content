question: Koji je događaj kojem je bio savremenik inspirisao Kantijonovu ekonomsku teoriju?
answer: Neuspeh sistema Džona Lawa
wrong_answers:
  - Velika ekonomska kriza od 1705-1707
  - Rat između Francuske i Holandije
  - Engleska revolucija
explanation: |
  Cantillon je bio svedok kolapsa Lawovog sistema i analizirao je njegove uzroke i posledice u svom "Essai sur la nature du commerce en général". Ovaj događaj je duboko uticao na njegovo ekonomsko razmišljanje i razumevanje monetarnih fenomena.