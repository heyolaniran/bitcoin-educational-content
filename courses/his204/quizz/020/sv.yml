question: Vad var det för händelse som han var med om och som inspirerade Cantillons ekonomiska teori?
answer: John Laws system misslyckades
wrong_answers:
  - Den stora ekonomiska krisen 1705-1707
  - Kriget mellan Frankrike och Holland
  - Den engelska revolutionen
explanation: |
  Cantillon bevittnade kollapsen av Laws system och analyserade dess orsaker och konsekvenser i sin "Essai sur la nature du commerce en général". Denna händelse påverkade i hög grad hans ekonomiska tänkande och hans förståelse av monetära fenomen.