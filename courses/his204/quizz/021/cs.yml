question: Který francouzský ekonom 19. století věnoval knihu abbé de Saint-Pierre?
answer: Gustave de Molinari
wrong_answers:
  - Frédéric Bastiat
  - Jean-Baptiste Say
  - Léon Walras
explanation: |
  Gustave de Molinari, liberální ekonom 19. století, napsal knihu o abbé de Saint-Pierre a vyzdvihl jeho roli předchůdce liberálního myšlení a obrany míru.