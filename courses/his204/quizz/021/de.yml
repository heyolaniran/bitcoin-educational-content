question: Welcher französische Wirtschaftswissenschaftler aus dem 19. Jahrhundert widmete dem Abbé de Saint-Pierre ein Buch?
answer: Gustave de Molinari
wrong_answers:
  - Frédéric Bastiat
  - Jean-Baptiste Say
  - Léon Walras
explanation: |
  Gustave de Molinari, ein liberaler Wirtschaftswissenschaftler des 19. Jahrhunderts, schrieb ein Buch über den Abbé de Saint-Pierre, in dem er seine Rolle als Vorreiter des liberalen Denkens und der Verteidigung des Friedens hervorhob.