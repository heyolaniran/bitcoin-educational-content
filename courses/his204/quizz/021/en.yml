question: Which 19th-century French economist dedicated a book to the Abbé de Saint-Pierre?
answer: Gustave de Molinari
wrong_answers:
  - Frédéric Bastiat
  - Jean-Baptiste Say
  - Léon Walras
explanation: |
  Gustave de Molinari, a 19th-century liberal economist, wrote a book on the Abbé de Saint-Pierre, highlighting his role as a precursor of liberal thought and the defense of peace.