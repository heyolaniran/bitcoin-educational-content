question: ¿Qué economista francés del siglo XIX dedicó un libro al Abate de Saint-Pierre?
answer: Gustave de Molinari
wrong_answers:
  - Frédéric Bastiat
  - Jean-Baptiste Say
  - Léon Walras
explanation: |
  Gustave de Molinari, economista liberal del siglo XIX, escribió un libro sobre el Abate de Saint-Pierre, destacando su papel como precursor del pensamiento liberal y de la defensa de la paz.