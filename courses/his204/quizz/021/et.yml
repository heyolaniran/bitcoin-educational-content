question: Milline 19. sajandi prantsuse majandusteadlane pühendas raamatu Abbé de Saint-Pierre'ile?
answer: Gustave de Molinari
wrong_answers:
  - Frédéric Bastiat
  - Jean-Baptiste Say
  - Léon Walras
explanation: |
  Gustave de Molinari, 19. sajandi liberaalne majandusteadlane, kirjutas raamatu Abbé de Saint-Pierre'i kohta, rõhutades tema rolli liberaalse mõtte ja rahu kaitsmise eelkäijana.