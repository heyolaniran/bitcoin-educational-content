question: کدام اقتصاددان فرانسوی قرن نوزدهم کتابی را به Abbé de Saint-Pierre تقدیم کرد؟
answer: گوستاو دو مولیناری
wrong_answers:
  - فردریک باستیا
  - ژان-باپتیست سه‌
  - لئون والراس
explanation: |
  گوستاو دو مولیناری، اقتصاددان لیبرال قرن نوزدهم، کتابی درباره آبه دو سن پیر نوشت که نقش او را به عنوان پیشگام اندیشه لیبرال و دفاع از صلح برجسته می‌کند.