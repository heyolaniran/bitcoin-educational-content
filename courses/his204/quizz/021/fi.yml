question: Kuka 1800-luvun ranskalainen taloustieteilijä omisti kirjan Abbé de Saint-Pierrelle?
answer: Gustave de Molinari
wrong_answers:
  - Frédéric Bastiat
  - Jean-Baptiste Say
  - Léon Walras
explanation: |
  Gustave de Molinari, 1800-luvun liberaali taloustieteilijä, kirjoitti kirjan Abbé de Saint-Pierrestä ja korosti hänen rooliaan liberaalin ajattelun ja rauhan puolustamisen edelläkävijänä.