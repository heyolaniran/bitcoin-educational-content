question: Quel économiste français du XIXe siècle a consacré un livre à l’abbé de Saint-Pierre ?
answer: Gustave de Molinari
wrong_answers:
  - Frédéric Bastiat
  - Jean-Baptiste Say
  - Léon Walras
explanation: |
  Gustave de Molinari, un économiste libéral du XIXe siècle, a écrit un livre sur l'abbé de Saint-Pierre, soulignant son rôle de précurseur de la pensée libérale et de la défense de la paix.
