question: 19वीं सदी के किस फ्रांसीसी अर्थशास्त्री ने एबे डी सेंट-पियरे को एक पुस्तक समर्पित की?
answer: गुस्ताव डी मोलिनारी
wrong_answers:
  - फ़्रेडरिक बास्टियाट
  - जीन-बैप्टिस्ट से
  - लियोन वाल्रास
explanation: |
  19वीं सदी के उदारवादी अर्थशास्त्री गुस्ताव डी मोलिनारी ने एबे डी सेंट-पियरे पर एक किताब लिखी, जिसमें उदारवादी विचार और शांति की रक्षा के अग्रदूत के रूप में उनकी भूमिका पर प्रकाश डाला गया।