question: Ekonom Prancis abad ke-19 mana yang mendedikasikan sebuah buku untuk Abbé de Saint-Pierre?
answer: Gustave de Molinari
wrong_answers:
  - Frédéric Bastiat
  - Jean-Baptiste Say
  - Léon Walras
explanation: |
  Gustave de Molinari, seorang ekonom liberal abad ke-19, menulis sebuah buku tentang Abbé de Saint-Pierre, yang menyoroti perannya sebagai pelopor pemikiran liberal dan pembela perdamaian.