question: Quale economista francese del XIX secolo ha dedicato un libro all'Abbé de Saint-Pierre?
answer: Gustave de Molinari
wrong_answers:
  - Frédéric Bastiat
  - Jean-Baptiste Say
  - Léon Walras
explanation: |
  Gustave de Molinari, economista liberale del XIX secolo, ha scritto un libro sull'Abbé de Saint-Pierre, sottolineando il suo ruolo di precursore del pensiero liberale e della difesa della pace.