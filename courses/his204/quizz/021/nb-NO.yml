question: Hvilken fransk økonom fra 1800-tallet dedikerte en bok til Abbé de Saint-Pierre?
answer: Gustave de Molinari
wrong_answers:
  - Frédéric Bastiat
  - Jean-Baptiste Say
  - Léon Walras
explanation: |
  Gustave de Molinari, en liberal økonom fra 1800-tallet, skrev en bok om Abbé de Saint-Pierre, der han fremhevet hans rolle som en forløper for liberal tenkning og forsvar for fred.