question: Który XIX-wieczny francuski ekonomista zadedykował książkę Abbé de Saint-Pierre?
answer: Gustave de Molinari
wrong_answers:
  - Frédéric Bastiat
  - Jean-Baptiste Say
  - Léon Walras
explanation: |
  Gustave de Molinari, XIX-wieczny liberalny ekonomista, napisał książkę o Abbé de Saint-Pierre, podkreślając jego rolę jako prekursora myśli liberalnej i obrońcy pokoju.