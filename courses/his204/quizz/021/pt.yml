question: Que economista francês do século XIX dedicou um livro ao Abbé de Saint-Pierre?
answer: Gustave de Molinari
wrong_answers:
  - Frédéric Bastiat
  - Jean-Baptiste Say
  - Léon Walras
explanation: |
  Gustave de Molinari, economista liberal do século XIX, escreveu um livro sobre o Abade de Saint-Pierre, destacando o seu papel como precursor do pensamento liberal e da defesa da paz.