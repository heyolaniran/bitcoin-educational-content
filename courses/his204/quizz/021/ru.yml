question: Какой французский экономист XIX века посвятил свою книгу аббату де Сен-Пьеру?
answer: Гюстав де Молинари
wrong_answers:
  - Фредерик Бастиат
  - Жан-Батист Сэй
  - Леон Вальрас
explanation: |
  Гюстав де Молинари, либеральный экономист XIX века, написал книгу об аббате де Сен-Пьере, подчеркнув его роль как провозвестника либеральной мысли и защитника мира.