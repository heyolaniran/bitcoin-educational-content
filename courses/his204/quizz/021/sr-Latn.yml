question: Koji je francuski ekonomista iz 19. veka posvetio knjigu Abbé de Saint-Pierreu?
answer: Gustave de Molinari
wrong_answers:
  - Frédéric Bastiat
  - Žan-Batist Sej
  - Léon Walras
explanation: |
  Gustave de Molinari, ekonomista liberalni iz 19. veka, napisao je knjigu o Abbé de Saint-Pierreu, ističući njegovu ulogu kao preteče liberalne misli i odbrane mira.