question: Vilken fransk ekonom från 1800-talet tillägnade Abbé de Saint-Pierre en bok?
answer: Gustave de Molinari
wrong_answers:
  - Frédéric Bastiat
  - Jean-Baptiste Say
  - Léon Walras
explanation: |
  Gustave de Molinari, en liberal ekonom från 1800-talet, skrev en bok om Abbé de Saint-Pierre och lyfte fram hans roll som föregångare för liberalt tänkande och försvar av freden.