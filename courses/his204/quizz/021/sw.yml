question: Ni mwanauchumi gani Mfaransa wa karne ya 19 aliyejitolea kitabu kwa Abbé de Saint-Pierre?
answer: Gustave de Molinari
wrong_answers:
  - Frédéric Bastiat
  - Jean-Baptiste Sema
  - Léon Walras
explanation: |
  Gustave de Molinari, mwanauchumi wa kiliberali wa karne ya 19, aliandika kitabu juu ya Abbé de Saint-Pierre, akiangazia jukumu lake kama mtangulizi wa fikra huria na ulinzi wa amani.