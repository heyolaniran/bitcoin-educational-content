question: Nhà kinh tế học người Pháp nào vào thế kỷ 19 đã dành tặng một cuốn sách cho Abbé de Saint-Pierre?
answer: Gustave de Molinari
wrong_answers:
  - Frédéric Bastiat
  - Jean-Baptiste nói
  - Léon Walras
explanation: |
  Gustave de Molinari, một nhà kinh tế học tự do thế kỷ 19, đã viết một cuốn sách về Abbé de Saint-Pierre, nhấn mạnh vai trò của ông như một người đi đầu trong tư tưởng tự do và bảo vệ hòa bình.