question: Předchůdcem kterého filozofa je abbé de Saint-Pierre se svým Projektem věčného míru?
answer: Emmanuel Kant
wrong_answers:
  - Jeremy Bentham
  - Jean-Jacques Rousseau
  - Baruch Spinoza
explanation: |
  Projekt věčného míru abbého de Saint-Pierre je považován za předchůdce myšlenek Immanuela Kanta o univerzálním míru. Oba myslitelé prosazovali vytvoření mezinárodní organizace, která by byla schopna zajistit mír mezi národy.