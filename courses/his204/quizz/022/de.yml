question: Von welchem Philosophen ist der Abbé de Saint-Pierre mit seinem Projekt des ewigen Friedens ein Vorläufer?
answer: Emanuel Kant
wrong_answers:
  - Jeremy Bentham
  - Jean-Jacques Rousseau
  - Baruch Spinoza
explanation: |
  Das Projekt des Abbé de Saint-Pierre für den Ewigen Frieden gilt als Vorläufer der Ideen Immanuel Kants zum Weltfrieden. Beide Denker sprachen sich für die Schaffung einer internationalen Organisation aus, die den Frieden zwischen den Nationen garantieren sollte.