question: ¿De qué filósofo aparece como precursor el abate de Saint-Pierre con su Proyecto de Paz Perpetua?
answer: Emmanuel Kant
wrong_answers:
  - Jeremy Bentham
  - Jean-Jacques Rousseau
  - Baruch Spinoza
explanation: |
  El Proyecto de Paz Perpetua del abate de Saint-Pierre se considera precursor de las ideas de Immanuel Kant sobre la paz universal. Ambos pensadores abogaban por la creación de una organización internacional capaz de garantizar la paz entre las naciones.