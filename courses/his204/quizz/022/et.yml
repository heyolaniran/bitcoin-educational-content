question: Millise filosoofi eelkäijana esineb abbé de Saint-Pierre oma projektiga "Igavene rahu"?
answer: Emmanuel Kant
wrong_answers:
  - Jeremy Bentham
  - Jean-Jacques Rousseau
  - Baruch Spinoza
explanation: |
  Abbé de Saint-Pierre'i projekti "Igavene rahu" peetakse Immanuel Kanti universaalse rahu ideede eelkäijaks. Mõlemad mõtlejad pooldasid rahvusvahelise organisatsiooni loomist, mis suudaks tagada rahu riikide vahel.