question: کدام فیلسوف با پروژه صلح دائمی خود به نظر می‌رسد که پیشگام abbé de Saint-Pierre باشد؟
answer: امانوئل کانت
wrong_answers:
  - جرمی بنتام
  - ژان-ژاک روسو
  - باروخ اسپینوزا
explanation: |
  پروژه صلح پایدار آبه دو سن پیر به عنوان پیش‌درآمدی بر ایده‌های ایمانوئل کانت درباره صلح جهانی در نظر گرفته می‌شود. هر دو متفکر خواستار ایجاد یک سازمان بین‌المللی بودند که قادر به تضمین صلح بین ملت‌ها باشد.