question: Minkä filosofin edeltäjä on abbé de Saint-Pierre ikuisen rauhan hankkeellaan?
answer: Emmanuel Kant
wrong_answers:
  - Jeremy Bentham
  - Jean-Jacques Rousseau
  - Baruch Spinoza
explanation: |
  Abbé de Saint-Pierren ikuista rauhaa koskevaa hanketta pidetään Immanuel Kantin universaalia rauhaa koskevien ajatusten edeltäjänä. Molemmat ajattelijat kannattivat sellaisen kansainvälisen järjestön perustamista, joka pystyisi takaamaan rauhan kansojen välillä.