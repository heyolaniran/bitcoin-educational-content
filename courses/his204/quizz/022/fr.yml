question: De quel philosophe l’abbé de Saint-Pierre apparaît-il comme un précurseur avec son Projet de paix perpétuelle ?
answer: Emmanuel Kant
wrong_answers:
  - Jeremy Bentham
  - Jean-Jacques Rousseau
  - Baruch Spinoza
explanation: |
  Le Projet de paix perpétuelle de l'abbé de Saint-Pierre est considéré comme un précurseur des idées d'Emmanuel Kant sur la paix universelle. Les deux penseurs ont plaidé pour la création d'une organisation internationale capable de garantir la paix entre les nations.
