question: एबे डी सेंट-पियरे किस दार्शनिक के अग्रदूत के रूप में अपनी परियोजना 'सतत शांति' के साथ सामने आते हैं?
answer: इमैनुएल कांत
wrong_answers:
  - जेरेमी बेन्थम
  - जीन-जैक्स रूसो
  - बारूक स्पिनोज़ा
explanation: |
  एबे डे सेंट-पियरे की सतत शांति परियोजना को इमैनुअल कांट के सार्वभौमिक शांति के विचारों का अग्रदूत माना जाता है। दोनों विचारकों ने राष्ट्रों के बीच शांति की गारंटी देने में सक्षम एक अंतरराष्ट्रीय संगठन के निर्माण की वकालत की।