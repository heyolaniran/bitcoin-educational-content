question: Filsuf mana yang muncul sebagai pendahulu abbé de Saint-Pierre dengan Proyek Perdamaian Abadi-nya?
answer: Emmanuel Kant
wrong_answers:
  - Jeremy Bentham
  - Jean-Jacques Rousseau
  - Baruch Spinoza
explanation: |
  Proyek Perdamaian Abadi dari Abbé de Saint-Pierre dianggap sebagai pendahulu dari gagasan Immanuel Kant tentang perdamaian universal. Kedua pemikir ini menganjurkan pembentukan organisasi internasional yang mampu menjamin perdamaian antar bangsa.