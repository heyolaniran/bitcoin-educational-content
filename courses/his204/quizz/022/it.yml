question: Di quale filosofo l'abbé de Saint-Pierre appare come un precursore con il suo Progetto di pace perpetua?
answer: Emmanuel Kant
wrong_answers:
  - Jeremy Bentham
  - Jean-Jacques Rousseau
  - Baruch Spinoza
explanation: |
  Il Progetto di pace perpetua dell'Abbé de Saint-Pierre è considerato un precursore delle idee di Immanuel Kant sulla pace universale. Entrambi i pensatori sostenevano la creazione di un'organizzazione internazionale in grado di garantire la pace tra le nazioni.