question: Hvilken filosof fremstår abbé de Saint-Pierre som en forløper for med sitt Prosjekt for evig fred?
answer: Emmanuel Kant
wrong_answers:
  - Jeremy Bentham
  - Jean-Jacques Rousseau
  - Baruch Spinoza
explanation: |
  Abbé de Saint-Pierres Prosjekt for evig fred regnes som en forløper for Immanuel Kants ideer om universell fred. Begge tok til orde for å opprette en internasjonal organisasjon som kunne garantere fred mellom nasjonene.