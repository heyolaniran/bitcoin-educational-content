question: Którego filozofa prekursorem jest opat de Saint-Pierre ze swoim Projektem Wiecznego Pokoju?
answer: Emmanuel Kant
wrong_answers:
  - Jeremy Bentham
  - Jean-Jacques Rousseau
  - Baruch Spinoza
explanation: |
  Projekt Wieczystego Pokoju Abbé de Saint-Pierre'a jest uważany za prekursora idei powszechnego pokoju Immanuela Kanta. Obaj myśliciele opowiadali się za stworzeniem międzynarodowej organizacji zdolnej do zagwarantowania pokoju między narodami.