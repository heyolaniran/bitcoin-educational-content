question: De que filósofo surge o abade de Saint-Pierre como precursor com o seu Projeto de Paz Perpétua?
answer: Emmanuel Kant
wrong_answers:
  - Jeremy Bentham
  - Jean-Jacques Rousseau
  - Baruch Spinoza
explanation: |
  O Projeto de Paz Perpétua do Abade de Saint-Pierre é considerado um precursor das ideias de Immanuel Kant sobre a paz universal. Ambos os pensadores defendiam a criação de uma organização internacional capaz de garantir a paz entre as nações.