question: Предвестником какого философа является аббат де Сен-Пьер со своим "Проектом вечного мира"?
answer: Эммануил Кант
wrong_answers:
  - Джереми Бентам
  - Жан-Жак Руссо
  - Барух Спиноза
explanation: |
  Проект аббата де Сен-Пьера "Вечный мир" считается предшественником идей Иммануила Канта о всеобщем мире. Оба мыслителя выступали за создание международной организации, способной гарантировать мир между государствами.