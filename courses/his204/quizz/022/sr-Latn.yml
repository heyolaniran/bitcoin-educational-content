question: Kojem filozofu se abbé de Saint-Pierre pojavljuje kao preteča sa svojim Projektom za večni mir?
answer: Emanuel Kant
wrong_answers:
  - Džeremi Bentam
  - Žan-Žak Ruso
  - Baruch Spinoza
explanation: |
  Projekat za večni mir Abbé de Saint-Pierrea smatra se pretečom ideja Immanuela Kanta o univerzalnom miru. Obojica mislilaca su zagovarali stvaranje međunarodne organizacije sposobne da garantuje mir između nacija.