question: Vilken filosof framstår abbé de Saint-Pierre som en föregångare till med sitt Projekt för evig fred?
answer: Emmanuel Kant
wrong_answers:
  - Jeremy Bentham
  - Jean-Jacques Rousseau
  - Baruch Spinoza
explanation: |
  Abbé de Saint-Pierres projekt för evig fred anses vara en föregångare till Immanuel Kants idéer om universell fred. Båda tänkarna förespråkade skapandet av en internationell organisation som skulle kunna garantera fred mellan nationerna.