question: Je, abbé de Saint-Pierre anaonekana kama mwanafalsafa gani kama mtangulizi wa Mradi wake wa Amani ya Milele?
answer: Emmanuel Kant
wrong_answers:
  - Jeremy Bentham
  - Jean-Jacques Rousseau
  - Baruch Spinoza
explanation: |
  Mradi wa Abbé de Saint-Pierre wa Amani ya Daima unachukuliwa kuwa mtangulizi wa mawazo ya Immanuel Kant kuhusu amani ya ulimwengu. Wanafikra hao wawili walitetea kuundwa kwa shirika la kimataifa lenye uwezo wa kuhakikisha amani kati ya mataifa.