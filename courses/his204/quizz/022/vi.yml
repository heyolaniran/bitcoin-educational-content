question: Tu sĩ Saint-Pierre được coi là người đi đầu trong Dự án Hòa bình Vĩnh cửu của triết gia nào?
answer: Emmanuel Kant
wrong_answers:
  - Jeremy Bentham
  - Jean-Jacques Rousseau
  - Baruch Spinoza
explanation: |
  Dự án Hòa bình Vĩnh cửu của Abbé de Saint-Pierre được coi là tiền thân cho các ý tưởng của Immanuel Kant về hòa bình toàn cầu. Cả hai nhà tư tưởng đều ủng hộ việc thành lập một tổ chức quốc tế có khả năng đảm bảo hòa bình giữa các quốc gia.