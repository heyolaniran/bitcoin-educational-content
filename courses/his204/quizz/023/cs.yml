question: Proč byl Saint-Pierre vyloučen z Francouzské akademie?
answer: Odvážil se kritizovat vládu Ludvíka XIV., plnou válek a excesů
wrong_answers:
  - Trpěl vážnou nemocí a byl napůl šílený
  - Odvážil se podpořit anglického krále, dědičného nepřítele Francie
  - Plagioval jiného akademika
explanation: |
  Saint-Pierre byl vyloučen z Francouzské akademie za kritiku vlády Ludvíka XIV., zejména jeho válek a nadměrných výdajů. Jeho kritika byla považována za neuctivou vůči panovníkovi.