question: Warum wurde Saint-Pierre aus der Académie française ausgeschlossen?
answer: Er wagte es, die Herrschaft Ludwigs XIV. zu kritisieren, die von Krieg und Exzessen geprägt war
wrong_answers:
  - Er litt an einer schweren Krankheit und war halb wahnsinnig geworden
  - Er hatte es gewagt, den König von England, Frankreichs Erbfeind, zu unterstützen
  - Er hatte einen anderen Akademiker plagiiert
explanation: |
  Saint-Pierre wurde aus der Académie française ausgeschlossen, weil er die Herrschaft Ludwigs XIV. kritisiert hatte, insbesondere seine Kriege und übermäßigen Ausgaben. Seine Kritik wurde als respektlos gegenüber dem Monarchen angesehen.