question: Why was Saint-Pierre excluded from the Académie française?
answer: He dared to criticize the reign of Louis XIV, full of war and excess
wrong_answers:
  - Suffering from a serious illness, he had gone half-mad
  - He had dared to support the King of England, France's hereditary enemy
  - He had plagiarized another academician
explanation: |
  Saint-Pierre was expelled from the Académie française for criticizing the reign of Louis XIV, in particular his wars and excessive spending. His criticism was deemed disrespectful to the monarch.