question: ¿Por qué se excluyó a Saint-Pierre de la Academia Francesa?
answer: Se atrevió a criticar el reinado de Luis XIV, lleno de guerras y excesos
wrong_answers:
  - Aquejado de una grave enfermedad, se había vuelto medio loco..
  - Se había atrevido a apoyar al rey de Inglaterra, enemigo hereditario de Francia
  - Había plagiado a otro académico
explanation: |
  Saint-Pierre fue expulsado de la Academia Francesa por criticar el reinado de Luis XIV, en particular sus guerras y gastos excesivos. Sus críticas se consideraron una falta de respeto al monarca.