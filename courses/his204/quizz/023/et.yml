question: Miks jäeti Saint-Pierre välja Académie française'ist?
answer: Ta julges kritiseerida Louis XIV valitsemisaega, mis oli täis sõda ja liialdusi
wrong_answers:
  - Raske haiguse käes kannatades oli ta pooleldi hulluks läinud..
  - Ta oli julgenud toetada Inglismaa kuningat, Prantsusmaa pärilusvaenlast
  - Ta oli plagieerinud teise akadeemiku
explanation: |
  Saint-Pierre heideti välja Prantsuse Akadeemiast, kuna ta kritiseeris Louis XIV valitsemisaega, eelkõige tema sõdu ja ülemääraseid kulutusi. Tema kriitikat peeti monarhi suhtes lugupidamatuks.