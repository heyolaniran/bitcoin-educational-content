question: چرا سن-پیر از آکادمی فرانسه کنار گذاشته شد؟
answer: او جرأت کرد که از سلطنت لویی چهاردهم، که پر از جنگ و افراط بود، انتقاد کند.
wrong_answers:
  - در اثر ابتلا به بیماری جدی، او نیمه‌دیوانه شده بود
  - او جرأت کرده بود که از پادشاه انگلستان، دشمن موروثی فرانسه، حمایت کند
  - او از یک دانشگاهی دیگر سرقت ادبی کرده بود
explanation: |
  سن-پیر به دلیل انتقاد از سلطنت لویی چهاردهم، به‌ویژه جنگ‌ها و هزینه‌های بیش از حد او، از آکادمی فرانسه اخراج شد. انتقاد او به عنوان بی‌احترامی به پادشاه تلقی شد.