question: Miksi Saint-Pierre suljettiin Académie française -akatemian ulkopuolelle?
answer: Hän uskalsi kritisoida Ludvig XIV:n valtakautta, joka oli täynnä sotaa ja ylilyöntejä
wrong_answers:
  - Hän kärsi vakavasta sairaudesta ja oli mennyt puolihulluksi -
  - Hän oli uskaltanut tukea Englannin kuningasta, Ranskan perinnevihollista
  - Hän oli plagioinut toista akateemikkoa -
explanation: |
  Saint-Pierre erotettiin Académie française -akatemiasta, koska hän arvosteli Ludvig XIV:n hallintoa, erityisesti hänen sotiaan ja kohtuuttomia menojaan. Hänen kritiikkinsä katsottiin epäkunnioittavaksi monarkkia kohtaan.