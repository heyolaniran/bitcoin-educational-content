question: Pour quelle raison Saint-Pierre fut-il exclu de l’Académie française ?
answer: Il avait osé critiquer le règne de Louis XIV, plein de guerres et d’excès
wrong_answers:
  - Atteint d’une grave maladie, il était devenu à moitié fou
  - Il avait osé soutenir le Roi d’Angleterre, ennemi héréditaire de la France
  - Il avait plagié un autre académicien
explanation: |
  Saint-Pierre a été exclu de l'Académie française pour avoir critiqué le règne de Louis XIV, notamment ses guerres et ses dépenses excessives. Ses critiques ont été jugées irrespectueuses envers le monarque.
