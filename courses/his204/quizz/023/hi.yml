question: सेंट-पियरे को अकादमी फ़्रैंचाइज़ से क्यों बाहर रखा गया?
answer: उन्होंने लुई XIV के युद्ध और अतिरेक से भरे शासनकाल की आलोचना करने का साहस किया
wrong_answers:
  - गंभीर बीमारी से पीड़ित होकर वह आधा पागल हो गया था
  - उन्होंने फ्रांस के वंशानुगत दुश्मन इंग्लैंड के राजा का समर्थन करने का साहस किया था
  - उसने एक अन्य शिक्षाविद की साहित्यिक चोरी की थी
explanation: |
  सेंट-पियरे को लुई XIV के शासनकाल, खास तौर पर उसके युद्धों और अत्यधिक खर्च की आलोचना करने के कारण अकादमी फ़्रैन्काइज़ से निष्कासित कर दिया गया था। उनकी आलोचना को सम्राट के प्रति अपमानजनक माना गया।