question: Mengapa Saint-Pierre dikeluarkan dari Académie française?
answer: Ia berani mengkritik pemerintahan Louis XIV yang penuh dengan perang dan ekses
wrong_answers:
  - Menderita penyakit serius, ia menjadi setengah gila
  - Dia berani mendukung Raja Inggris, musuh turun-temurun Prancis
  - Dia telah menjiplak akademisi lain
explanation: |
  Saint-Pierre dikeluarkan dari Académie française karena mengkritik pemerintahan Louis XIV, khususnya perang-perangnya dan pengeluarannya yang berlebihan. Kritiknya dianggap tidak menghormati raja.