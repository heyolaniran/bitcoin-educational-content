question: Perché Saint-Pierre fu escluso dall'Académie française?
answer: Osò criticare il regno di Luigi XIV, pieno di guerre e di eccessi
wrong_answers:
  - Soffrendo di una grave malattia, era diventato mezzo matto
  - Aveva osato sostenere il re d'Inghilterra, nemico ereditario della Francia
  - Aveva plagiato un altro accademico
explanation: |
  Saint-Pierre fu espulso dall'Académie française per aver criticato il regno di Luigi XIV, in particolare le sue guerre e le spese eccessive. Le sue critiche furono ritenute irrispettose nei confronti del monarca.