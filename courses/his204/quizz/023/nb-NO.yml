question: Hvorfor ble Saint-Pierre ekskludert fra Académie française?
answer: Han våget å kritisere Ludvig XIVs regjeringstid, som var full av krig og utskeielser
wrong_answers:
  - Han led av en alvorlig sykdom og var blitt halvgal
  - Han hadde våget å støtte kongen av England, Frankrikes arvefiende
  - Han hadde plagiert en annen akademiker
explanation: |
  Saint-Pierre ble utvist fra Académie française for å ha kritisert Ludvig 14s regjeringstid, særlig hans kriger og overdrevne pengebruk. Kritikken hans ble ansett som respektløs mot monarken.