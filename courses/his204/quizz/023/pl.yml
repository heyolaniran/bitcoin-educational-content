question: Dlaczego Saint-Pierre został wykluczony z Académie française?
answer: Odważył się skrytykować rządy Ludwika XIV, pełne wojen i ekscesów
wrong_answers:
  - Cierpiąc na poważną chorobę, na wpół oszalał
  - Odważył się poprzeć króla Anglii, dziedzicznego wroga Francji
  - Dokonał plagiatu innego naukowca
explanation: |
  Saint-Pierre został wydalony z Académie française za krytykę rządów Ludwika XIV, w szczególności jego wojen i nadmiernych wydatków. Jego krytyka została uznana za brak szacunku dla monarchy.