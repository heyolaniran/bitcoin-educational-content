question: Porque é que Saint-Pierre foi excluído da Académie française?
answer: Ousou criticar o reinado de Luís XIV, cheio de guerras e excessos
wrong_answers:
  - Sofrendo de uma doença grave, ficou meio louco
  - Atreveu-se a apoiar o rei de Inglaterra, inimigo hereditário da França
  - Ele tinha plagiado outro académico
explanation: |
  Saint-Pierre foi expulso da Académie française por criticar o reinado de Luís XIV, nomeadamente as suas guerras e despesas excessivas. As suas críticas foram consideradas desrespeitosas para com o monarca.