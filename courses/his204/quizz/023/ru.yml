question: Почему Сен-Пьер был исключен из Французской академии?
answer: Он осмелился критиковать правление Людовика XIV, полное войн и излишеств
wrong_answers:
  - Страдая от тяжелой болезни, он впал в полубезумие
  - Он осмелился поддержать короля Англии, наследственного врага Франции
  - Он занимался плагиатом у другого академика
explanation: |
  Сен-Пьер был исключен из Французской академии за критику правления Людовика XIV, в частности его войн и чрезмерных расходов. Его критика была сочтена неуважительной по отношению к монарху.