question: Zašto je Saint-Pierre isključen iz Académie française?
answer: Usudio je da kritikuje vladavinu Luja XIV, punu rata i preterivanja.
wrong_answers:
  - Patio od ozbiljne bolesti, napola je poludeo.
  - Usudio je da podrži kralja Engleske, naslednog neprijatelja Francuske
  - On je plagirao drugog akademika
explanation: |
  Saint-Pierre je bio izbačen iz Académie française zbog kritike vladavine Luja XIV, posebno njegovih ratova i prekomernog trošenja. Njegova kritika je smatrana nepoštovanjem prema monarhu.