question: Varför uteslöts Saint-Pierre från Académie française?
answer: Han vågade kritisera Ludvig XIV:s regeringstid, som var full av krig och överdrifter
wrong_answers:
  - Han led av en allvarlig sjukdom och hade blivit halvgalen
  - Han hade vågat stödja kungen av England, Frankrikes ärkefiende
  - Han hade plagierat en annan akademiker
explanation: |
  Saint-Pierre uteslöts ur Académie française för att ha kritiserat Ludvig XIV:s regeringstid, i synnerhet hans krig och överdrivna utgifter. Hans kritik ansågs vara respektlös mot monarken.