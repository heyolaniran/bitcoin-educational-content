question: Kwa nini Saint-Pierre alitengwa na Academy française?
answer: Alithubutu kukosoa utawala wa Louis XIV, uliojaa vita na kupita kiasi
wrong_answers:
  - Akiwa anaugua ugonjwa mbaya, alikuwa ameenda nusu wazimu
  - Alikuwa amethubutu kumuunga mkono Mfalme wa Uingereza, adui wa urithi wa Ufaransa
  - Alikuwa plagiarized mwanataaluma mwingine
explanation: |
  Saint-Pierre alifukuzwa kutoka Chuo cha Ufaransa kwa kukosoa utawala wa Louis XIV, haswa vita vyake na matumizi ya kupita kiasi. Ukosoaji wake ulionekana kukosa heshima kwa mfalme.