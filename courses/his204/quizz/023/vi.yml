question: Tại sao Saint-Pierre bị loại khỏi Académie française?
answer: Ông dám chỉ trích triều đại của Louis XIV, đầy rẫy chiến tranh và sự xa hoa
wrong_answers:
  - Đang mắc một căn bệnh nghiêm trọng, anh ta đã trở nên nửa điên
  - Ông đã dám ủng hộ Vua Anh, kẻ thù truyền kiếp của nước Pháp
  - Ông ta đã đạo văn của một học giả khác
explanation: |
  Saint-Pierre bị trục xuất khỏi Viện Hàn lâm Pháp vì chỉ trích triều đại của Louis XIV, đặc biệt là các cuộc chiến tranh và chi tiêu quá mức của ông. Lời chỉ trích của ông bị coi là thiếu tôn trọng nhà vua.