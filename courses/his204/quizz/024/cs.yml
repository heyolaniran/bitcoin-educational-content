question: Co navrhuje svatý Petr jako záruku míru mezi národy?
answer: Další 3 odpovědi najednou
wrong_answers:
  - Vytvořit radu národů
  - Vytvoření společné armády
  - V případě sporů se obrátit na rozhodčí soud
explanation: |
  Abbé de Saint-Pierre navrhl řadu opatření k zajištění míru, včetně rady národů, společné armády a arbitráže. Věřil, že tyto instituce pomohou řešit konflikty mírovou cestou a zabrání válkám.