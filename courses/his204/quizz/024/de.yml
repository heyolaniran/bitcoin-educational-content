question: Was schlägt Petrus vor, um den Frieden zwischen den Völkern zu gewährleisten?
answer: Die 3 anderen Antworten auf einmal
wrong_answers:
  - Einen Rat der Nationen zu bilden
  - Eine gemeinsame Armee aufstellen
  - Im Falle von Streitigkeiten ein Schiedsverfahren in Anspruch nehmen können
explanation: |
  Der Abbé de Saint-Pierre schlug eine Reihe von Maßnahmen zur Sicherung des Friedens vor, darunter einen Rat der Nationen, eine gemeinsame Armee und ein Schiedsgericht. Er war der Meinung, dass diese Institutionen dazu beitragen würden, Konflikte friedlich zu lösen und Kriege zu verhindern.