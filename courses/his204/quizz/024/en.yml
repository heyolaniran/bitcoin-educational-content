question: What does Saint Peter propose to guarantee peace between nations?
answer: The 3 other answers at once
wrong_answers:
  - To form a council of nations
  - Set up a common army
  - Have recourse to arbitration in the event of disputes
explanation: |
  The Abbé de Saint-Pierre proposed a series of measures to guarantee peace, including a council of nations, a common army and arbitration. He believed these institutions would help resolve conflicts peacefully and prevent wars.