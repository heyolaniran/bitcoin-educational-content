question: ¿Qué propone San Pedro para garantizar la paz entre las naciones?
answer: Las otras 3 respuestas a la vez
wrong_answers:
  - Formar un consejo de naciones
  - Crear un ejército común
  - Recurrir al arbitraje en caso de litigio
explanation: |
  El abate de Saint-Pierre propuso una serie de medidas para garantizar la paz, entre ellas un consejo de naciones, un ejército común y el arbitraje. Creía que estas instituciones ayudarían a resolver pacíficamente los conflictos y a evitar las guerras.