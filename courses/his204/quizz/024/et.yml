question: Mida soovitab Püha Peetrus, et tagada rahu rahvaste vahel?
answer: 3 muud vastust korraga
wrong_answers:
  - Moodustada rahvaste nõukogu
  - Luua ühine armee
  - Kasutada vaidluste korral arbitraaži
explanation: |
  Abbé de Saint-Pierre pakkus välja rea meetmeid rahu tagamiseks, sealhulgas rahvaste nõukogu, ühise armee ja vahekohtu. Ta uskus, et need institutsioonid aitaksid lahendada konflikte rahumeelselt ja ennetada sõdu.