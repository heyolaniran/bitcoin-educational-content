question: پطرس مقدس چه پیشنهادی برای تضمین صلح بین ملت‌ها دارد؟
answer: 3 پاسخ دیگر به طور همزمان
wrong_answers:
  - برای تشکیل یک شورای ملل
  - ایجاد یک ارتش مشترک
  - در صورت بروز اختلافات به داوری متوسل شوید
explanation: |
  آبه دو سن-پیر مجموعه‌ای از تدابیر را برای تضمین صلح پیشنهاد داد که شامل یک شورای ملل، یک ارتش مشترک و داوری بود. او معتقد بود که این نهادها به حل مسالمت‌آمیز مناقشات و جلوگیری از جنگ‌ها کمک خواهند کرد.