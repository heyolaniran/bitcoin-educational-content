question: Mitä Pietari ehdottaa kansojen välisen rauhan takaamiseksi?
answer: 3 muuta vastausta kerralla
wrong_answers:
  - Kansakuntien neuvoston muodostaminen
  - Perustetaan yhteinen armeija
  - Turvautua välimiesmenettelyyn riitatapauksissa
explanation: |
  Abbé de Saint-Pierre ehdotti useita toimenpiteitä rauhan takaamiseksi, muun muassa kansojen neuvostoa, yhteistä armeijaa ja välimiesmenettelyä. Hän uskoi, että nämä instituutiot auttaisivat ratkaisemaan konfliktit rauhanomaisesti ja estämään sodat.