question: Que propose Saint-Pierre pour garantir la paix entre les nations ?
answer: Les 3 autres réponses à la fois
wrong_answers:
  - De constituer un conseil des nations
  - De mettre en place une armée commune
  - De recourir à l’arbitrage en cas de différends
explanation: |
  L'abbé de Saint-Pierre proposait un ensemble de mesures pour garantir la paix, incluant un conseil des nations, une armée commune et l'arbitrage. Il pensait que ces institutions permettraient de résoudre les conflits pacifiquement et de prévenir les guerres.
