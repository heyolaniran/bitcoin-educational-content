question: राष्ट्रों के बीच शांति की गारंटी के लिए संत पीटर क्या प्रस्ताव देते हैं?
answer: एक साथ 3 अन्य उत्तर
wrong_answers:
  - राष्ट्रों की एक परिषद का गठन करना
  - एक साझा सेना स्थापित करें
  - विवाद की स्थिति में मध्यस्थता का सहारा लें
explanation: |
  एबे डी सेंट-पियरे ने शांति की गारंटी के लिए कई उपायों का प्रस्ताव रखा, जिसमें राष्ट्रों की एक परिषद, एक आम सेना और मध्यस्थता शामिल थी। उनका मानना ​​था कि ये संस्थाएँ संघर्षों को शांतिपूर्ण तरीके से हल करने और युद्धों को रोकने में मदद करेंगी।