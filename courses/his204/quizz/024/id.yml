question: Apa yang diusulkan oleh Santo Petrus untuk menjamin perdamaian di antara bangsa-bangsa?
answer: 3 jawaban lainnya sekaligus
wrong_answers:
  - Untuk membentuk dewan bangsa-bangsa
  - Membentuk pasukan bersama
  - Memiliki jalan lain untuk melakukan arbitrase jika terjadi perselisihan
explanation: |
  Abbé de Saint-Pierre mengusulkan serangkaian langkah untuk menjamin perdamaian, termasuk dewan negara, tentara bersama, dan arbitrase. Ia percaya bahwa lembaga-lembaga ini akan membantu menyelesaikan konflik secara damai dan mencegah perang.