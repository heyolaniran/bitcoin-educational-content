question: Cosa propone San Pietro per garantire la pace tra le nazioni?
answer: Le altre 3 risposte in una volta sola
wrong_answers:
  - Formare un consiglio delle nazioni
  - Creare un esercito comune
  - Ricorrere all'arbitrato in caso di controversie
explanation: |
  L'Abbé de Saint-Pierre propose una serie di misure per garantire la pace, tra cui un consiglio delle nazioni, un esercito comune e l'arbitrato. Egli riteneva che queste istituzioni avrebbero aiutato a risolvere i conflitti in modo pacifico e a prevenire le guerre.