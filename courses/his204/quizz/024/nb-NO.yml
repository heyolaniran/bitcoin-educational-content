question: Hva foreslår Peter den hellige for å sikre fred mellom nasjonene?
answer: De 3 andre svarene på en gang
wrong_answers:
  - Å danne et råd av nasjoner
  - Sette opp en felles hær
  - Har adgang til voldgift i tilfelle tvister
explanation: |
  Abbé de Saint-Pierre foreslo en rekke tiltak for å sikre freden, blant annet et nasjonenes råd, en felles hær og voldgift. Han mente at disse institusjonene ville bidra til å løse konflikter på fredelig vis og forhindre kriger.