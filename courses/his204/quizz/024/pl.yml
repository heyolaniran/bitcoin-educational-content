question: Co proponuje święty Piotr, aby zagwarantować pokój między narodami?
answer: 3 inne odpowiedzi jednocześnie
wrong_answers:
  - Utworzenie rady narodów
  - Utworzenie wspólnej armii
  - Możliwość skorzystania z arbitrażu w przypadku sporów
explanation: |
  Abbé de Saint-Pierre zaproponował szereg środków mających zagwarantować pokój, w tym radę narodów, wspólną armię i arbitraż. Wierzył, że instytucje te pomogą w pokojowym rozwiązywaniu konfliktów i zapobieganiu wojnom.