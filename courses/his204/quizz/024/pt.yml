question: O que é que São Pedro propõe para garantir a paz entre as nações?
answer: As 3 outras respostas ao mesmo tempo
wrong_answers:
  - Formar um conselho de nações
  - Criar um exército comum
  - Recorrer à arbitragem em caso de litígio
explanation: |
  O Abade de Saint-Pierre propôs uma série de medidas para garantir a paz, incluindo um conselho de nações, um exército comum e a arbitragem. Para ele, estas instituições ajudariam a resolver os conflitos de forma pacífica e a evitar as guerras.