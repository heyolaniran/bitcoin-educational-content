question: Что предлагает святой Петр для обеспечения мира между народами?
answer: Сразу 3 других ответа
wrong_answers:
  - Создать Совет наций
  - Создать общую армию
  - Обращаться в арбитраж в случае возникновения споров
explanation: |
  Аббат де Сен-Пьер предложил ряд мер для обеспечения мира, в том числе совет наций, общую армию и арбитраж. Он считал, что эти институты помогут разрешать конфликты мирным путем и предотвращать войны.