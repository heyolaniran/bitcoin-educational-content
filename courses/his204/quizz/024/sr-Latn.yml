question: Šta Sveti Petar predlaže da bi se garantovao mir među narodima?
answer: 3 druga odgovora odjednom
wrong_answers:
  - Da se formira savet nacija
  - Postaviti zajedničku vojsku
  - Pribegnite arbitraži u slučaju sporova
explanation: |
  Abbé de Saint-Pierre je predložio niz mera za garantovanje mira, uključujući savet nacija, zajedničku vojsku i arbitražu. Verovao je da bi ove institucije pomogle u mirnom rešavanju sukoba i sprečavanju ratova.