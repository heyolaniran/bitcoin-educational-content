question: Vad föreslår Sankt Peter för att garantera fred mellan nationerna?
answer: De 3 andra svaren på en gång
wrong_answers:
  - Att bilda ett nationsråd
  - Upprätta en gemensam armé
  - Ha tillgång till skiljedomsförfarande i händelse av tvister
explanation: |
  Abbé de Saint-Pierre föreslog en rad åtgärder för att garantera fred, bland annat ett nationsråd, en gemensam armé och skiljedomsförfarande. Han menade att dessa institutioner skulle bidra till att lösa konflikter på fredlig väg och förhindra krig.