question: Je, Mtakatifu Petro anapendekeza nini kuhakikisha amani kati ya mataifa?
answer: Majibu mengine 3 mara moja
wrong_answers:
  - Kuunda baraza la mataifa
  - Anzisha jeshi la pamoja
  - Kuwa na njia ya usuluhishi katika tukio la migogoro
explanation: |
  Abbe de Saint-Pierre ilipendekeza mfululizo wa hatua za kuhakikisha amani, ikiwa ni pamoja na baraza la mataifa, jeshi la pamoja na usuluhishi. Aliamini taasisi hizi zitasaidia kutatua migogoro kwa amani na kuzuia vita.