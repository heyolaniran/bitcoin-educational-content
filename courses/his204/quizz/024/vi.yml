question: Thánh Phêrô đề xuất điều gì để đảm bảo hòa bình giữa các quốc gia?
answer: 3 câu trả lời khác cùng một lúc
wrong_answers:
  - Để thành lập một hội đồng các quốc gia
  - Thành lập một đội quân chung
  - Có thể nhờ đến trọng tài trong trường hợp có tranh chấp
explanation: |
  Abbé de Saint-Pierre đề xuất một loạt các biện pháp để đảm bảo hòa bình, bao gồm một hội đồng các quốc gia, một đội quân chung và trọng tài. Ông tin rằng các thể chế này sẽ giúp giải quyết xung đột một cách hòa bình và ngăn ngừa chiến tranh.