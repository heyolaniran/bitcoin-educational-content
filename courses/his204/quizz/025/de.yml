question: Warum ist Exchange nach Ansicht des Abbé de Saint-Pierre immer und notwendigerweise ein Positivsummenspiel?
answer: Wenn sich zwei Männer freiwillig für ein Contract entscheiden, dann deshalb, weil jeder von ihnen darin einen Vorteil sieht
wrong_answers:
  - Je öfter Waren den Besitzer wechseln, desto reicher wird die Nation
  - Eine Nation, die Handel treibt, ist immer reicher als eine, die in Autarkie lebt
  - Weil Gott es will
explanation: |
  Der Abbé de Saint-Pierre glaubte wie andere liberale Denker, dass freiwillige Exchange für beide Seiten von Vorteil sind. Wenn zwei Menschen sich auf Exchange einigen, dann deshalb, weil sie beide das Gefühl haben, dass sie etwas davon haben, sonst würden sie es nicht tun.