question: Why is exchange always and necessarily a positive-sum game, according to the Abbé de Saint-Pierre?
answer: If two men freely choose to enter into a contract, it's because they each see an advantage in doing so
wrong_answers:
  - The more often goods change hands, the richer the nation becomes
  - A nation that trades is always richer than one that lives in autarky
  - Because God wants it
explanation: |
  The Abbé de Saint-Pierre, like other liberal thinkers, believed that voluntary exchange is mutually beneficial. If two people agree to exchange something, it's because they both feel they gain something, otherwise they wouldn't do it.