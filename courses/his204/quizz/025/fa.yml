question: چرا Exchange همیشه و لزوماً یک بازی با مجموع مثبت است، طبق نظر Abbé de Saint-Pierre؟
answer: اگر دو مرد آزادانه انتخاب کنند که وارد یک Contract شوند، به این دلیل است که هر کدام مزیتی در انجام این کار می‌بینند.
wrong_answers:
  - هرچه کالاها بیشتر دست به دست شوند، ملت ثروتمندتر می‌شود
  - ملتی که تجارت می‌کند همیشه ثروتمندتر از ملتی است که در خودکفایی زندگی می‌کند
  - چون خدا می‌خواهد
explanation: |
  آبه دو سن پیر، مانند دیگر متفکران لیبرال، معتقد بود که Exchange داوطلبانه برای هر دو طرف سودمند است. اگر دو نفر توافق کنند که Exchange انجام دهند، به این دلیل است که هر دو احساس می‌کنند چیزی به دست می‌آورند، در غیر این صورت این کار را نمی‌کردند.