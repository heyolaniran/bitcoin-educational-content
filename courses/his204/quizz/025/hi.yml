question: एबे डी सेंट-पियरे के अनुसार, Exchange हमेशा और अनिवार्य रूप से एक सकारात्मक-योग खेल क्यों होता है?
answer: यदि दो व्यक्ति स्वतंत्र रूप से Contract में प्रवेश करना चुनते हैं, तो ऐसा इसलिए है क्योंकि वे ऐसा करने में लाभ देखते हैं।
wrong_answers:
  - जितनी अधिक बार माल हाथ बदलता है, राष्ट्र उतना ही समृद्ध बनता है
  - जो राष्ट्र व्यापार करता है वह सदैव उस राष्ट्र से अधिक समृद्ध होता है जो निरंकुश शासन में रहता है
  - क्योंकि भगवान् यही चाहते हैं
explanation: |
  एबे डी सेंट-पियरे, अन्य उदार विचारकों की तरह, मानते थे कि स्वैच्छिक Exchange पारस्परिक रूप से लाभकारी है। अगर दो लोग Exchange के लिए सहमत होते हैं, तो ऐसा इसलिए होता है क्योंकि उन्हें लगता है कि इससे उन्हें कुछ हासिल होगा, अन्यथा वे ऐसा नहीं करेंगे।