question: Mengapa Exchange selalu dan selalu merupakan permainan penjumlahan positif, menurut Abbé de Saint-Pierre?
answer: Jika dua orang dengan bebas memilih untuk masuk ke dalam Contract, itu karena mereka masing-masing melihat keuntungan dalam melakukannya
wrong_answers:
  - Semakin sering barang berpindah tangan, semakin kaya negara tersebut
  - Bangsa yang berdagang selalu lebih kaya daripada bangsa yang hidup dalam autarki
  - Karena Tuhan menginginkannya
explanation: |
  Abbé de Saint-Pierre, seperti pemikir liberal lainnya, percaya bahwa Exchange sukarela saling menguntungkan. Jika dua orang setuju untuk melakukan Exchange, itu karena mereka berdua merasa mendapatkan sesuatu, jika tidak, mereka tidak akan melakukannya.