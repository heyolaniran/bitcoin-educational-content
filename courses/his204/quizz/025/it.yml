question: Perché il Exchange è sempre e necessariamente un gioco a somma positiva, secondo l'Abbé de Saint-Pierre?
answer: Se due uomini scelgono liberamente di entrare in un Contract, è perché ciascuno di loro vede un vantaggio nel farlo
wrong_answers:
  - Più spesso i beni cambiano di mano, più la nazione diventa ricca
  - Una nazione che commercia è sempre più ricca di una che vive in autarchia
  - Perché Dio lo vuole
explanation: |
  L'Abbé de Saint-Pierre, come altri pensatori liberali, credeva che il Exchange volontario fosse reciprocamente vantaggioso. Se due persone accettano di fare un Exchange, è perché entrambe sentono di guadagnarci qualcosa, altrimenti non lo farebbero.