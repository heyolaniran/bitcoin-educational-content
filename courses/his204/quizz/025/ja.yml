question: サン・ピエール修道院長によれば、なぜExchangeは常に、そして必然的にポジティブサムゲームなのか？
answer: 二人の男が自由にContractに入ることを選ぶとしたら、それはそれぞれがそうすることに利点を見出すからだ
wrong_answers:
  - 商品が頻繁に入れ替わるほど、国家は豊かになる
  - 貿易を行う国は、自給自足の国よりも常に豊かである。
  - 神がそれを望んでおられるからだ
explanation: |
  アベ・ド・サン＝ピエールは、他の自由主義思想家と同様、自発的なExchangeは相互に有益であると信じていた。もし二人の人間がExchangeに合意するならば、それは二人とも何かを得ると感じているからであり、そうでなければそんなことはしない。