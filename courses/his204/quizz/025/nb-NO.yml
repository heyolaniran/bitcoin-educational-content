question: Hvorfor er Exchange alltid og nødvendigvis et pluss-sum-spill, ifølge Abbé de Saint-Pierre?
answer: Hvis to menn fritt velger å inngå en Contract, er det fordi de hver for seg ser en fordel i å gjøre det
wrong_answers:
  - Jo oftere varer skifter hender, desto rikere blir nasjonen
  - En nasjon som driver handel er alltid rikere enn en nasjon som lever i autarki
  - Fordi Gud ønsker det
explanation: |
  Abbé de Saint-Pierre, i likhet med andre liberale tenkere, mente at frivillig Exchange er gjensidig fordelaktig. Hvis to mennesker blir enige om å Exchange noe, er det fordi de begge føler at de får noe igjen for det, ellers ville de ikke gjort det.