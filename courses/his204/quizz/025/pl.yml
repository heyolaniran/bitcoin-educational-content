question: Dlaczego Exchange jest zawsze i koniecznie grą o sumie dodatniej, według Abbé de Saint-Pierre?
answer: Jeśli dwóch mężczyzn dobrowolnie decyduje się na zawarcie Contract, dzieje się tak dlatego, że każdy z nich widzi w tym korzyść
wrong_answers:
  - Im częściej towary zmieniają właściciela, tym bogatszy staje się naród
  - Naród, który handluje, jest zawsze bogatszy niż ten, który żyje w autarkii
  - Ponieważ Bóg tego chce
explanation: |
  Abbé de Saint-Pierre, podobnie jak inni liberalni myśliciele, wierzył, że dobrowolne Exchange jest korzystne dla obu stron. Jeśli dwoje ludzi zgadza się na Exchange, to dlatego, że oboje czują, że coś zyskują, w przeciwnym razie nie zrobiliby tego.