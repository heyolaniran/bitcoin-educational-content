question: Почему, согласно аббату де Сен-Пьеру, Exchange всегда и обязательно является игрой с положительной суммой?
answer: Если двое мужчин добровольно решили вступить в Contract, то это потому, что каждый из них видит в этом свою выгоду
wrong_answers:
  - Чем чаще товары переходят из рук в руки, тем богаче становится страна
  - Нация, которая торгует, всегда богаче той, которая живет в автаркии
  - Потому что так хочет Бог
explanation: |
  Аббат де Сен-Пьер, как и другие либеральные мыслители, считал, что добровольное ГВ-2 взаимовыгодно. Если два человека соглашаются на ГВ-2, то это потому, что они оба чувствуют, что что-то получают, иначе они бы не стали этого делать.