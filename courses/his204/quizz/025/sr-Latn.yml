question: Zašto je Exchange uvek i nužno igra sa pozitivnim ishodom, prema Abbé de Saint-Pierreu?
answer: Ako dva muškarca slobodno odluče da uđu u Contract, to je zato što svaki od njih vidi prednost u tome.
wrong_answers:
  - Što češće roba menja vlasnika, nacija postaje bogatija
  - Nacija koja trguje uvek je bogatija od one koja živi u autarkiji
  - Jer Bog to želi
explanation: |
  Abbé de Saint-Pierre, kao i drugi liberalni mislioci, verovao je da je dobrovoljni Exchange obostrano koristan. Ako se dve osobe slože da Exchange nešto, to je zato što obe osećaju da dobijaju nešto, inače to ne bi radile.