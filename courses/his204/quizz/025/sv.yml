question: Varför är Exchange alltid och nödvändigtvis ett positivt summespel enligt Abbé de Saint-Pierre?
answer: Om två män fritt väljer att ingå en Contract, är det för att de båda ser en fördel med att göra det
wrong_answers:
  - Ju oftare varor byter ägare, desto rikare blir nationen
  - En nation som handlar är alltid rikare än en som lever i autarki
  - För att Gud vill det
explanation: |
  Abbé de Saint-Pierre, liksom andra liberala tänkare, trodde att frivillig Exchange är ömsesidigt fördelaktigt. Om två personer kommer överens om att Exchange:a något är det för att de båda känner att de vinner något på det, annars skulle de inte göra det.