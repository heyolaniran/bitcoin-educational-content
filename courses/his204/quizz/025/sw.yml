question: Kwa nini Exchange ni mchezo wa kila mara na lazima uwe chanya, kulingana na Abbé de Saint-Pierre?
answer: Ikiwa wanaume wawili watachagua kwa hiari kuingia kwenye Contract, ni kwa sababu kila mmoja anaona faida katika kufanya hivyo
wrong_answers:
  - Kadiri bidhaa zinavyobadilika mara nyingi ndivyo taifa linavyozidi kuwa tajiri
  - Taifa linalofanya biashara daima ni tajiri zaidi kuliko lile linaloishi katika mji mkuu
  - Kwa sababu Mungu anataka
explanation: |
  Abbe de Saint-Pierre, kama wanafikra huria wengine, waliamini kuwa Exchange ya hiari ina manufaa kwa pande zote. Ikiwa watu wawili wanakubali kitu cha Exchange, ni kwa sababu wote wawili wanahisi kupata kitu, vinginevyo hawangefanya.