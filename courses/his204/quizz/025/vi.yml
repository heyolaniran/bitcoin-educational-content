question: Tại sao theo Abbé de Saint-Pierre, Exchange luôn luôn và nhất thiết là một trò chơi có tổng dương?
answer: Nếu hai người đàn ông tự do lựa chọn tham gia Contract, đó là vì mỗi người đều thấy có lợi khi làm như vậy
wrong_answers:
  - Hàng hóa càng đổi chủ nhiều thì quốc gia càng giàu có
  - Một quốc gia buôn bán luôn giàu có hơn một quốc gia sống trong chế độ tự cung tự cấp
  - Bởi vì Chúa muốn thế
explanation: |
  Abbé de Saint-Pierre, giống như những nhà tư tưởng tự do khác, tin rằng Exchange tự nguyện có lợi cho cả hai bên. Nếu hai người đồng ý Exchange một điều gì đó, thì đó là vì cả hai đều cảm thấy họ đạt được điều gì đó, nếu không thì họ đã không làm điều đó.