question: Kdo před markýzem d'Argensonem rozvinul myšlenku laissez-faire?
answer: Boisguilbert
wrong_answers:
  - Vauban
  - Cantillon
  - Colbert
explanation: |
  Pierre Le Pesant de Boisguilbert je považován za předchůdce laissez-faire, protože hájil hospodářskou svobodu a kritizoval nadměrné státní zásahy do ekonomiky.