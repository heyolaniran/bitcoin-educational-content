question: Wer hat vor dem Marquis d'Argenson die Idee des Laissez-faire entwickelt?
answer: Boisguilbert
wrong_answers:
  - Vauban
  - Cantillon
  - Colbert
explanation: |
  Pierre Le Pesant de Boisguilbert gilt aufgrund seiner Verteidigung der wirtschaftlichen Freiheit und seiner Kritik an übermäßigen staatlichen Eingriffen in die Wirtschaft als Vorläufer des Laissez-faire.