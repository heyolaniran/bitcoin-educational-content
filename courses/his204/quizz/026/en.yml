question: Before the Marquis d'Argenson, who developed the idea of laissez-faire?
answer: Boisguilbert
wrong_answers:
  - Vauban
  - Cantillon
  - Colbert
explanation: |
  Pierre Le Pesant de Boisguilbert is regarded as a precursor of laissez-faire because of his defense of economic freedom and his criticism of excessive state intervention in the economy.