question: Antes del Marqués de Argenson, ¿quién desarrolló la idea del laissez-faire?
answer: Boisguilbert
wrong_answers:
  - Vauban
  - Cantillon
  - Colbert
explanation: |
  Pierre Le Pesant de Boisguilbert es considerado un precursor del laissez-faire por su defensa de la libertad económica y su crítica a la excesiva intervención del Estado en la economía.