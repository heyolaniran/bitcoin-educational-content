question: Kes töötas enne markii d'Argensoni välja laissez-faire'i idee?
answer: Boisguilbert
wrong_answers:
  - Vauban
  - Cantillon
  - Colbert
explanation: |
  Pierre Le Pesant de Boisguilbert'i peetakse laissez-faire'i eelkäijaks, sest ta kaitses majandusvabadust ja kritiseeris riigi liigset sekkumist majandusse.