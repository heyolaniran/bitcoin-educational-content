question: Kuka kehitti laissez-faire-ajatuksen ennen markiisi d'Argensonia?
answer: Boisguilbert
wrong_answers:
  - Vauban
  - Cantillon
  - Colbert
explanation: |
  Pierre Le Pesant de Boisguilbertia pidetään laissez-fairen edelläkävijänä, koska hän puolusti taloudellista vapautta ja kritisoi valtion liiallista puuttumista talouteen.