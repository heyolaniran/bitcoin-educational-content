question: Avant le marquis d’Argenson, par qui l’idée du laissez-faire fut-elle développée ?
answer: Boisguilbert
wrong_answers:
  - Vauban
  - Cantillon
  - Colbert
explanation: |
  Pierre Le Pesant de Boisguilbert est considéré comme un précurseur du laissez-faire en raison de sa défense de la liberté économique et de sa critique de l'intervention excessive de l'État dans l'économie.
