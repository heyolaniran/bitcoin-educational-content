question: मार्क्विस डी'अर्गेन्सन से पहले, लेसेज-फेयर का विचार किसने विकसित किया था?
answer: बोइसगिल्बर्ट
wrong_answers:
  - वौबन
  - कैंटिलोन
  - कोलबर्ट
explanation: |
  पियरे ले पेसेंट डी बोइसगिल्बर्ट को आर्थिक स्वतंत्रता के बचाव और अर्थव्यवस्था में अत्यधिक राज्य हस्तक्षेप की आलोचना के कारण लेसेज-फेयर का अग्रदूत माना जाता है।