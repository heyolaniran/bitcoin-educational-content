question: Sebelum Marquis d'Argenson, siapa yang mengembangkan ide laissez-faire?
answer: Boisguilbert
wrong_answers:
  - Vauban
  - Cantillon
  - Colbert
explanation: |
  Pierre Le Pesant de Boisguilbert dianggap sebagai pelopor laissez-faire karena pembelaannya terhadap kebebasan ekonomi dan kritiknya terhadap intervensi negara yang berlebihan dalam perekonomian.