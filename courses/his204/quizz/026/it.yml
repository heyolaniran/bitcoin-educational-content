question: Prima del marchese d'Argenson, chi ha sviluppato l'idea del laissez-faire?
answer: Boisguilbert
wrong_answers:
  - Vauban
  - Cantillon
  - Colbert
explanation: |
  Pierre Le Pesant de Boisguilbert è considerato un precursore del laissez-faire per la sua difesa della libertà economica e la sua critica all'eccessivo intervento dello Stato nell'economia.