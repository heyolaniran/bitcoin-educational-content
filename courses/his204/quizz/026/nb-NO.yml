question: Hvem utviklet ideen om laissez-faire før markis d'Argenson?
answer: Boisguilbert
wrong_answers:
  - Vauban
  - Cantillon
  - Colbert
explanation: |
  Pierre Le Pesant de Boisguilbert regnes som en forløper for laissez-faire på grunn av sitt forsvar for økonomisk frihet og sin kritikk av overdreven statlig innblanding i økonomien.