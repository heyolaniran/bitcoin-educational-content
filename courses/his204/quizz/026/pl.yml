question: Kto przed markizem d'Argenson rozwinął ideę leseferyzmu?
answer: Boisguilbert
wrong_answers:
  - Vauban
  - Cantillon
  - Colbert
explanation: |
  Pierre Le Pesant de Boisguilbert jest uważany za prekursora leseferyzmu ze względu na jego obronę wolności gospodarczej i krytykę nadmiernej interwencji państwa w gospodarkę.