question: Antes do Marquês d'Argenson, quem desenvolveu a ideia do laissez-faire?
answer: Boisguilbert
wrong_answers:
  - Vauban
  - Cantillon
  - Colbert
explanation: |
  Pierre Le Pesant de Boisguilbert é considerado um precursor do laissez-faire devido à sua defesa da liberdade económica e às suas críticas à excessiva intervenção do Estado na economia.