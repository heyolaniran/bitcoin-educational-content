question: Кто до маркиза д'Аржансона развивал идею laissez-faire?
answer: Буагильбер
wrong_answers:
  - Вобан
  - Кантильон
  - Кольбер
explanation: |
  Пьер Ле Пезан де Буагильбер считается предшественником laissez-faire благодаря своей защите экономической свободы и критике чрезмерного вмешательства государства в экономику.