question: Pre markiza d'Argensona, ko je razvio ideju laissez-faire?
answer: Boisguilbert
wrong_answers:
  - Vauban
  - Cantillon
  - Colbert
explanation: |
  Pierre Le Pesant de Boisguilbert se smatra pretečom laissez-faire zbog svoje odbrane ekonomske slobode i kritike prekomerne državne intervencije u ekonomiji.