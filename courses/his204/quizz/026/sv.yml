question: Vem före Marquis d'Argenson utvecklade idén om laissez-faire?
answer: Boisguilbert
wrong_answers:
  - Vauban
  - Cantillon
  - Colbert
explanation: |
  Pierre Le Pesant de Boisguilbert betraktas som en föregångare till laissez-faire på grund av sitt försvar för ekonomisk frihet och sin kritik av överdrivet statligt ingripande i ekonomin.