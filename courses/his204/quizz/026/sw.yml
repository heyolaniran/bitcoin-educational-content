question: Kabla ya Marquis d'Argenson, ni nani aliyeanzisha wazo la laissez-faire?
answer: Boisguilbert
wrong_answers:
  - Vauban
  - Cantillon
  - Colbert
explanation: |
  Pierre Le Pesant de Boisguilbert anachukuliwa kuwa mtangulizi wa laissez-faire kwa sababu ya utetezi wake wa uhuru wa kiuchumi na ukosoaji wake wa kuingilia serikali kupindukia katika uchumi.