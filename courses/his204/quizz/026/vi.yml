question: Trước Hầu tước d'Argenson, ai là người phát triển ý tưởng tự do kinh tế?
answer: Boisguilbert
wrong_answers:
  - Vauban
  - Cantillon
  - Colbert
explanation: |
  Pierre Le Pesant de Boisguilbert được coi là người đi đầu của chủ nghĩa tự do kinh tế vì ông bảo vệ quyền tự do kinh tế và chỉ trích sự can thiệp quá mức của nhà nước vào nền kinh tế.