question: Jaké zásady markýze d'Argensona sdílí Adam Smith?
answer: Dělba práce a vlastní zájem
wrong_answers:
  - Laissez faire a vlastní zájem
  - Laissez faire a dělba práce
  - Dělba práce a protekcionismus
explanation: |
  Markýz d'Argenson předjímal některé klíčové myšlenky Adama Smithe, jako například dělbu práce a roli vlastního zájmu ve fungování ekonomiky. Smith tyto myšlenky systematičtěji rozvinul v díle Bohatství národů.