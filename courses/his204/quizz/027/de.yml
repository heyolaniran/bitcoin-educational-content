question: Welches sind die Grundsätze des Marquis d'Argenson, die Adam Smith teilt?
answer: Arbeitsteilung und Eigeninteresse
wrong_answers:
  - Laissez faire und Eigeninteresse
  - Laissez faire und Arbeitsteilung
  - Arbeitsteilung und Protektionismus
explanation: |
  Der Marquis d'Argenson nahm einige der wichtigsten Ideen von Adam Smith vorweg, wie etwa die Arbeitsteilung und die Rolle des Eigeninteresses für das Funktionieren der Wirtschaft. Smith entwickelte diese Ideen systematischer in "The Wealth of Nations".