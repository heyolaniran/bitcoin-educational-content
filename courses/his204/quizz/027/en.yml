question: What are the principles of the Marquis d'Argenson that Adam Smith shares?
answer: Division of labor and self-interest
wrong_answers:
  - Laissez faire and self-interest
  - Laissez faire and division of labor
  - Division of labor and protectionism
explanation: |
  The Marquis d'Argenson anticipated some of Adam Smith's key ideas, such as the division of labor and the role of self-interest in the functioning of the economy. Smith developed these ideas more systematically in "The Wealth of Nations".