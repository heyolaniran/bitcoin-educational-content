question: ¿Cuáles son los principios del Marqués de Argenson que comparte Adam Smith?
answer: División del trabajo e interés propio
wrong_answers:
  - Laissez faire y egoísmo
  - Laissez faire y división del trabajo
  - División del trabajo y proteccionismo
explanation: |
  El Marqués de Argenson anticipó algunas de las ideas clave de Adam Smith, como la división del trabajo y el papel del interés propio en el funcionamiento de la economía. Smith desarrolló estas ideas de forma más sistemática en "La riqueza de las naciones".