question: Millised on markii d'Argensoni põhimõtted, mida Adam Smith jagab?
answer: Tööjaotus ja omakasu
wrong_answers:
  - Laissez faire ja omakasu
  - Laissez faire ja tööjaotus
  - Tööjaotus ja protektsionism
explanation: |
  Markii d'Argenson ennetas mõningaid Adam Smithi põhilisi ideid, näiteks tööjaotust ja omakasu rolli majanduse toimimises. Smith arendas neid ideid süstemaatilisemalt välja teoses "Rahvaste rikkus".