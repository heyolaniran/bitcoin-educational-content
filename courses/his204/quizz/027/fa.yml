question: اصول مارکی دو آرژنسون که آدام اسمیت با آن‌ها مشترک است چیست؟
answer: تقسیم کار و نفع شخصی
wrong_answers:
  - لسه فر و خودخواهی
  - عدم مداخله و تقسیم کار
  - تقسیم کار و حمایت‌گرایی
explanation: |
  مارکی دآرژنسون برخی از ایده‌های کلیدی آدام اسمیت، مانند تقسیم کار و نقش خودخواهی در عملکرد اقتصاد را پیش‌بینی کرده بود. اسمیت این ایده‌ها را به‌طور سیستماتیک‌تر در "ثروت ملل" توسعه داد.