question: Mitkä ovat Adam Smithin jakamat markiisi d'Argensonin periaatteet?
answer: Työnjako ja oman edun tavoittelu
wrong_answers:
  - Laissez faire ja oman edun tavoittelu
  - Laissez faire ja työnjako
  - Työnjako ja protektionismi
explanation: |
  Markiisi d'Argenson ennakoi joitakin Adam Smithin keskeisiä ajatuksia, kuten työnjakoa ja oman edun tavoittelun merkitystä talouden toiminnassa. Smith kehitti näitä ajatuksia systemaattisemmin teoksessa The Wealth of Nations.