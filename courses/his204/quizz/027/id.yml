question: Apa saja prinsip-prinsip Marquis d'Argenson yang dianut oleh Adam Smith?
answer: Pembagian kerja dan kepentingan pribadi
wrong_answers:
  - Laissez faire dan kepentingan pribadi
  - Laissez faire dan pembagian kerja
  - Pembagian kerja dan proteksionisme
explanation: |
  Marquis d'Argenson mengantisipasi beberapa gagasan utama Adam Smith, seperti pembagian kerja dan peran kepentingan pribadi dalam fungsi ekonomi. Smith mengembangkan ide-ide ini secara lebih sistematis dalam "The Wealth of Nations".