question: Quali sono i principi del Marchese d'Argenson che Adam Smith condivide?
answer: Divisione del lavoro e interesse personale
wrong_answers:
  - Laissez faire e interesse personale
  - Laissez faire e divisione del lavoro
  - Divisione del lavoro e protezionismo
explanation: |
  Il Marchese d'Argenson anticipò alcune delle idee chiave di Adam Smith, come la divisione del lavoro e il ruolo dell'interesse personale nel funzionamento dell'economia. Smith sviluppò queste idee in modo più sistematico ne "La ricchezza delle nazioni".