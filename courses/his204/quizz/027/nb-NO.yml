question: Hvilke prinsipper deler Adam Smith med marki d'Argenson?
answer: Arbeidsdeling og egeninteresse
wrong_answers:
  - Laissez faire og egeninteresse
  - Laissez faire og arbeidsdeling
  - Arbeidsdeling og proteksjonisme
explanation: |
  Marquis d'Argenson foregrep noen av Adam Smiths sentrale ideer, som arbeidsdelingen og egeninteressens rolle i økonomiens virkemåte. Smith utviklet disse ideene mer systematisk i "The Wealth of Nations".