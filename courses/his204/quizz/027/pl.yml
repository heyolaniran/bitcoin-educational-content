question: Jakie zasady markiza d'Argenson podziela Adam Smith?
answer: Podział pracy i własny interes
wrong_answers:
  - Laissez faire i interes własny
  - Laissez faire i podział pracy
  - Podział pracy i protekcjonizm
explanation: |
  Markiz d'Argenson przewidział niektóre z kluczowych idei Adama Smitha, takich jak podział pracy i rola interesu własnego w funkcjonowaniu gospodarki. Smith rozwinął te idee bardziej systematycznie w "Bogactwie narodów".