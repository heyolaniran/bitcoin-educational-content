question: Quais são os princípios do Marquês d'Argenson que Adam Smith partilha?
answer: Divisão do trabalho e interesse próprio
wrong_answers:
  - Laissez faire e interesse próprio
  - Laissez faire e divisão do trabalho
  - Divisão do trabalho e protecionismo
explanation: |
  O Marquês d'Argenson antecipou algumas das ideias-chave de Adam Smith, como a divisão do trabalho e o papel do interesse próprio no funcionamento da economia. Smith desenvolveu estas ideias de forma mais sistemática em "A Riqueza das Nações".