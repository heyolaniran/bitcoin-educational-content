question: Какие принципы маркиза д'Аржансона разделяет Адам Смит?
answer: Разделение труда и корысть
wrong_answers:
  - Свобода действий и корысть
  - Свобода действий и разделение труда
  - Разделение труда и протекционизм
explanation: |
  Маркиз д'Аржансон предвосхитил некоторые ключевые идеи Адама Смита, такие как разделение труда и роль собственного интереса в функционировании экономики. Смит развил эти идеи более систематично в "Богатстве народов".