question: Koji su principi markiza d'Argensona koje deli Adam Smit?
answer: Podela rada i lični interes
wrong_answers:
  - Laissez faire i lični interes
  - Laissez faire i podela rada
  - Podela rada i protekcionizam
explanation: |
  Markiz d'Arženson je predvideo neke od ključnih ideja Adama Smita, kao što su podela rada i uloga ličnog interesa u funkcionisanju ekonomije. Smit je ove ideje sistematičnije razvio u "Bogatstvu naroda".