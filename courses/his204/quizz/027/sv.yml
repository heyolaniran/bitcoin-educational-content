question: Vilka är de principer som Adam Smith delar med markis d'Argenson?
answer: Arbetsfördelning och egenintresse
wrong_answers:
  - Laissez faire och egenintresse
  - Laissez faire och arbetsdelning
  - Arbetsfördelning och protektionism
explanation: |
  Marquis d'Argenson föregrep några av Adam Smiths viktigaste idéer, t.ex. arbetsfördelningen och egenintressets roll för ekonomins funktionssätt. Smith utvecklade dessa idéer mer systematiskt i "The Wealth of Nations".