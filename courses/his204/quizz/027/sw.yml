question: Je, ni kanuni gani za Marquis d'Argenson ambazo Adam Smith anashiriki?
answer: Mgawanyiko wa kazi na maslahi binafsi
wrong_answers:
  - Laissez faire na maslahi binafsi
  - Laissez faire na mgawanyiko wa kazi
  - Idara ya kazi na ulinzi
explanation: |
  Gazeti la Marquis d'Argenson lilitarajia baadhi ya mawazo muhimu ya Adam Smith, kama vile mgawanyo wa kazi na jukumu la maslahi binafsi katika utendakazi wa uchumi. Smith aliendeleza mawazo haya kwa utaratibu zaidi katika "The Wealth of Nations".