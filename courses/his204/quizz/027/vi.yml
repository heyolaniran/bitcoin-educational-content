question: Những nguyên tắc của Hầu tước d'Argenson mà Adam Smith chia sẻ là gì?
answer: Phân công lao động và lợi ích cá nhân
wrong_answers:
  - Laissez faire và tư lợi
  - Tự do và phân công lao động
  - Phân công lao động và chủ nghĩa bảo hộ
explanation: |
  Hầu tước d'Argenson đã dự đoán trước một số ý tưởng chính của Adam Smith, chẳng hạn như sự phân công lao động và vai trò của lợi ích cá nhân trong hoạt động của nền kinh tế. Smith đã phát triển những ý tưởng này một cách có hệ thống hơn trong "Sự giàu có của các quốc gia".