question: Jaký by měl být stát v pojetí markýze d'Argensona?
answer: Minimální stát, který musí zajistit bezpečnost, spravedlnost, měnu a infrastrukturu
wrong_answers:
  - Ochranný stát, který chrání obchodníky a řemeslníky
  - Stát nemá žádnou legitimitu, nesmí nabízet žádné služby
  - Intervencionistický stát, který musí regulovat všechny aspekty hospodářského života
explanation: |
  Markýz d'Argenson upřednostňoval minimální stát, který by se omezil na základní funkce, jako je bezpečnost, justice, měna a infrastruktura. Domníval se, že stát by měl ponechat jednotlivcům volnost v jednání v ekonomické oblasti.