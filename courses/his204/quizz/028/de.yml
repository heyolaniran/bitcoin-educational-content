question: Was sollte der Staat nach der Vorstellung des Marquis d'Argenson sein?
answer: Ein Minimalstaat, der für Sicherheit, Recht, Währung und Infrastruktur sorgen muss
wrong_answers:
  - Ein schützender Staat, der Kaufleute und Handwerker schützt
  - Der Staat hat keine Legitimität; er darf keine Dienstleistungen anbieten
  - Ein interventionistischer Staat, der alle Aspekte des Wirtschaftslebens regeln muss
explanation: |
  Der Marquis d'Argenson befürwortete einen Minimalstaat, der sich auf wesentliche Funktionen wie Sicherheit, Justiz, Währung und Infrastruktur beschränkt. Er war der Ansicht, dass der Staat dem Einzelnen die Freiheit lassen sollte, im wirtschaftlichen Bereich zu handeln.