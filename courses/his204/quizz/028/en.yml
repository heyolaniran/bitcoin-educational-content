question: In the Marquis d'Argenson's conception, what should the State be?
answer: A minimal state, it must provide security, justice, currency and infrastructure
wrong_answers:
  - A protective state, protecting merchants and craftsmen
  - The state has no legitimacy; it must not offer any services
  - An interventionist state, which must regulate all aspects of economic life
explanation: |
  The Marquis d'Argenson favored a minimal state, limiting itself to essential functions such as security, justice, currency and infrastructure. He believed that the state should leave individuals free to act in the economic sphere.
