question: En la concepción del Marqués d'Argenson, ¿qué debe ser el Estado?
answer: Un Estado mínimo, debe proporcionar seguridad, justicia, moneda e infraestructuras
wrong_answers:
  - Un Estado protector, que protege a comerciantes y artesanos
  - El Estado no tiene legitimidad; no debe ofrecer ningún servicio
  - Un Estado intervencionista, que debe regular todos los aspectos de la vida económica
explanation: |
  El marqués d'Argenson era partidario de un Estado mínimo, que se limitara a funciones esenciales como la seguridad, la justicia, la moneda y las infraestructuras. Creía que el Estado debía dejar libertad a los individuos para actuar en la esfera económica.