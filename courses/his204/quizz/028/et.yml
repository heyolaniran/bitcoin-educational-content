question: Milline peaks markii d'Argensoni kontseptsioonis olema riik?
answer: Minimaalne riik, see peab tagama julgeoleku, õigusemõistmise, valuuta ja infrastruktuuri
wrong_answers:
  - Kaitsev riik, mis kaitseb kaupmehi ja käsitöölisi
  - Riigil puudub legitiimsus; ta ei tohi pakkuda mingeid teenuseid
  - Interventiivne riik, mis peab reguleerima kõiki majanduselu aspekte
explanation: |
  Markii d'Argenson pooldas minimaalset riiki, mis piirdub selliste oluliste funktsioonidega nagu julgeolek, õigusemõistmine, valuuta ja infrastruktuur. Ta uskus, et riik peaks jätma üksikisikutele vabaduse tegutseda majandussfääris.