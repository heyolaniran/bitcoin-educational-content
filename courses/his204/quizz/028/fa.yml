question: در تصور مارکی د'آرژنسون، دولت باید چگونه باشد؟
answer: یک دولت حداقلی باید امنیت، عدالت، ارز و زیرساخت‌ها را فراهم کند.
wrong_answers:
  - یک دولت محافظ، محافظت از بازرگانان و صنعتگران
  - دولت مشروعیت ندارد؛ نباید هیچ خدماتی ارائه دهد
  - یک دولت مداخله‌گر، که باید تمام جنبه‌های زندگی اقتصادی را تنظیم کند
explanation: |
  مارکی دآرژنسون طرفدار یک دولت حداقلی بود که خود را به وظایف اساسی مانند امنیت، عدالت، ارز و زیرساخت محدود می‌کرد. او معتقد بود که دولت باید افراد را در حوزه اقتصادی آزاد بگذارد تا عمل کنند.