question: Mitä valtion pitäisi olla markiisi d'Argensonin käsityksen mukaan?
answer: Minimivaltio, jonka on tarjottava turvallisuutta, oikeutta, valuuttaa ja infrastruktuuria
wrong_answers:
  - Suojeleva valtio, joka suojelee kauppiaita ja käsityöläisiä
  - Valtiolla ei ole legitimiteettiä; se ei saa tarjota mitään palveluja
  - Interventionistinen valtio, jonka on säänneltävä talouselämän kaikkia osa-alueita
explanation: |
  Markiisi d'Argenson kannatti minimaalista valtiota, joka rajoittuu välttämättömiin tehtäviin, kuten turvallisuuteen, oikeuteen, valuuttaan ja infrastruktuuriin. Hän uskoi, että valtion tulisi jättää yksilöille vapaus toimia talouden alalla.