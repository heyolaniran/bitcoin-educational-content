question: मार्क्विस डी'अर्गेन्सन की अवधारणा में राज्य कैसा होना चाहिए?
answer: एक न्यूनतम राज्य के रूप में, इसे सुरक्षा, न्याय, मुद्रा और बुनियादी ढांचा प्रदान करना होगा
wrong_answers:
  - एक सुरक्षात्मक राज्य, व्यापारियों और शिल्पकारों की रक्षा करना
  - राज्य की कोई वैधता नहीं है; उसे कोई भी सेवा प्रदान नहीं करनी चाहिए
  - एक हस्तक्षेपकारी राज्य, जिसे आर्थिक जीवन के सभी पहलुओं को विनियमित करना होगा
explanation: |
  मार्क्विस डी'अर्गेन्सन न्यूनतम राज्य के पक्षधर थे, जो खुद को सुरक्षा, न्याय, मुद्रा और बुनियादी ढांचे जैसे आवश्यक कार्यों तक सीमित रखता था। उनका मानना ​​था कि राज्य को व्यक्तियों को आर्थिक क्षेत्र में कार्य करने के लिए स्वतंत्र छोड़ देना चाहिए।