question: Dalam konsepsi Marquis d'Argenson, apa yang seharusnya menjadi Negara?
answer: Sebuah negara minimal harus menyediakan keamanan, keadilan, mata uang, dan infrastruktur
wrong_answers:
  - Negara yang protektif, melindungi pedagang dan pengrajin
  - Negara tidak memiliki legitimasi; negara tidak boleh menawarkan layanan apa pun
  - Negara intervensionis, yang harus mengatur semua aspek kehidupan ekonomi
explanation: |
  Marquis d'Argenson lebih menyukai negara yang minimal, membatasi diri pada fungsi-fungsi penting seperti keamanan, keadilan, mata uang, dan infrastruktur. Dia percaya bahwa negara harus membiarkan individu bebas bertindak dalam bidang ekonomi.