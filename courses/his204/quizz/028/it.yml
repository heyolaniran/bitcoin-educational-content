question: Nella concezione del marchese d'Argenson, cosa dovrebbe essere lo Stato?
answer: Uno Stato minimo, che deve fornire sicurezza, giustizia, moneta e infrastrutture
wrong_answers:
  - Uno Stato protettivo, che protegge mercanti e artigiani
  - Lo Stato non ha alcuna legittimità, non deve offrire alcun servizio
  - Uno Stato interventista, che deve regolare tutti gli aspetti della vita economica
explanation: |
  Il marchese d'Argenson era favorevole a uno Stato minimo, che si limitasse a funzioni essenziali come la sicurezza, la giustizia, la moneta e le infrastrutture. Egli riteneva che lo Stato dovesse lasciare gli individui liberi di agire nella sfera economica.