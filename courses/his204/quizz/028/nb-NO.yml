question: Hva skulle staten være i marki d'Argensons øyne?
answer: En minimalstat skal sørge for sikkerhet, rettsvesen, valuta og infrastruktur
wrong_answers:
  - En beskyttende stat, som beskytter kjøpmenn og håndverkere
  - Staten har ingen legitimitet; den må ikke tilby noen tjenester
  - En intervensjonistisk stat, som må regulere alle aspekter av det økonomiske livet
explanation: |
  Markis d'Argenson gikk inn for en minimalstat, som skulle begrense seg til essensielle funksjoner som sikkerhet, rettsvesen, valuta og infrastruktur. Han mente at staten burde overlate individene til å handle fritt i den økonomiske sfæren.