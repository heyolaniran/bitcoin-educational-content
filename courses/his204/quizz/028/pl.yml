question: Czym powinno być państwo w koncepcji markiza d'Argenson?
answer: Państwo minimalne musi zapewniać bezpieczeństwo, sprawiedliwość, walutę i infrastrukturę
wrong_answers:
  - Państwo opiekuńcze, chroniące kupców i rzemieślników
  - Państwo nie ma legitymacji; nie może oferować żadnych usług
  - Interwencjonistyczne państwo, które musi regulować wszystkie aspekty życia gospodarczego
explanation: |
  Markiz d'Argenson opowiadał się za państwem minimalnym, ograniczającym się do podstawowych funkcji, takich jak bezpieczeństwo, wymiar sprawiedliwości, waluta i infrastruktura. Uważał, że państwo powinno pozostawić jednostkom swobodę działania w sferze gospodarczej.