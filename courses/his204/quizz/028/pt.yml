question: Na conceção do Marquês d'Argenson, o que deve ser o Estado?
answer: Um Estado mínimo, que deve garantir a segurança, a justiça, a moeda e as infra-estruturas
wrong_answers:
  - Um Estado protetor, que protege os comerciantes e os artesãos
  - O Estado não tem legitimidade, não deve oferecer nenhum serviço
  - Um Estado intervencionista, que deve regular todos os aspectos da vida económica
explanation: |
  O Marquês d'Argenson defendia um Estado mínimo, que se limitasse a funções essenciais como a segurança, a justiça, a moeda e as infra-estruturas. Para ele, o Estado deve deixar aos indivíduos a liberdade de agir na esfera económica.