question: Каким должно быть государство в представлении маркиза д'Аржансона?
answer: Минимальное государство, которое должно обеспечивать безопасность, правосудие, валюту и инфраструктуру
wrong_answers:
  - Защитное государство, защищающее купцов и ремесленников
  - Государство не имеет легитимности; оно не должно предлагать никаких услуг
  - Интервенционистское государство, которое должно регулировать все аспекты экономической жизни
explanation: |
  Маркиз д'Аржансон выступал за минимальное государство, ограничивающееся такими важнейшими функциями, как безопасность, правосудие, валюта и инфраструктура. Он считал, что государство должно оставлять индивидам свободу действий в экономической сфере.