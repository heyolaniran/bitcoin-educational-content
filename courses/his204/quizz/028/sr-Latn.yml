question: U Marquisa d'Aržensona, kakva bi država trebalo da bude?
answer: Minimalna država, mora obezbediti sigurnost, pravdu, valutu i infrastrukturu
wrong_answers:
  - Zaštitnička država, koja štiti trgovce i zanatlije
  - Država nema legitimitet; ne sme nuditi nikakve usluge
  - Intervencionistička država, koja mora regulisati sve aspekte ekonomskog života
explanation: |
  Markiz d'Arženson je favorizovao minimalnu državu, ograničavajući se na osnovne funkcije kao što su bezbednost, pravda, valuta i infrastruktura. Verovao je da bi država trebalo da ostavi pojedince slobodnim da deluju u ekonomskoj sferi.