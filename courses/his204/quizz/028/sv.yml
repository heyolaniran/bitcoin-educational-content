question: Enligt markis d'Argensons uppfattning, vad skulle staten vara?
answer: En minimal stat som ska tillhandahålla säkerhet, rättvisa, valuta och infrastruktur
wrong_answers:
  - En skyddande stat, som skyddar köpmän och hantverkare
  - Staten har ingen legitimitet; den får inte erbjuda några tjänster
  - En interventionistisk stat som måste reglera alla aspekter av det ekonomiska livet
explanation: |
  Marquis d'Argenson förespråkade en minimal stat som begränsar sig till väsentliga funktioner som säkerhet, rättvisa, valuta och infrastruktur. Han ansåg att staten skulle lämna individerna fria att agera inom den ekonomiska sfären.