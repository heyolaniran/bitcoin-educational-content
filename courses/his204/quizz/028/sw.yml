question: Katika dhana ya Marquis d'Argenson, Jimbo linapaswa kuwa nini?
answer: hali ndogo, ni lazima kutoa usalama, haki, fedha na miundombinu
wrong_answers:
  - Hali ya ulinzi, kulinda wafanyabiashara na mafundi
  - Jimbo halina uhalali; lazima isitoe huduma zozote
  - Jimbo la kuingilia kati, ambalo lazima lidhibiti nyanja zote za maisha ya kiuchumi
explanation: |
  Marquis d'Argenson ilipendelea hali ya chini, ikijiwekea kikomo kwa kazi muhimu kama vile usalama, haki, sarafu na miundombinu. Aliamini kwamba serikali inapaswa kuwaacha watu binafsi huru kuchukua hatua katika nyanja ya kiuchumi.