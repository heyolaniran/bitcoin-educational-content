question: Theo quan niệm của Hầu tước d'Argenson, Nhà nước nên như thế nào?
answer: Một quốc gia tối thiểu phải cung cấp an ninh, công lý, tiền tệ và cơ sở hạ tầng
wrong_answers:
  - Một nhà nước bảo vệ, bảo vệ thương gia và thợ thủ công
  - Nhà nước không có tính hợp pháp; nó không được cung cấp bất kỳ dịch vụ nào
  - Một nhà nước can thiệp, phải điều chỉnh mọi mặt của đời sống kinh tế
explanation: |
  Hầu tước d'Argenson ủng hộ một nhà nước tối thiểu, giới hạn bản thân ở các chức năng thiết yếu như an ninh, công lý, tiền tệ và cơ sở hạ tầng. Ông tin rằng nhà nước nên để cá nhân tự do hành động trong lĩnh vực kinh tế.