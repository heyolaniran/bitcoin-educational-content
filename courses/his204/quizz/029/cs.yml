question: K čemu markýz d'Argenson přirovnal společnost?
answer: Na řeku, která teče přirozeně bez zásahu zákonů
wrong_answers:
  - Do džungle, kde vládne jen právo silnějšího
  - Na včelí úl, kde každý hmyz jedná podle svých zájmů, což vede ke společnému blahu všech
  - Složitý stroj vyžadující neustálou údržbu
explanation: |
  Markýz d'Argenson přirovnal společnost k řece a zdůraznil, že je důležité nechat věcem přirozený průběh bez nadměrných státních zásahů. Věřil, že ekonomika má své vlastní zákony a že je lepší je respektovat, než se je snažit ovládat.