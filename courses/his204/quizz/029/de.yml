question: Womit hat der Marquis d'Argenson die Gesellschaft verglichen?
answer: Einem Fluss, der natürlich fließt, ohne das Eingreifen von Gesetzen
wrong_answers:
  - In einen Dschungel, in dem nur das Recht des Stärkeren herrscht
  - Einem Bienenstock, in dem jedes Insekt nach seinen eigenen Interessen handelt, was zum gemeinsamen Wohl aller führt
  - Eine komplexe Maschine, die ständig gewartet werden muss
explanation: |
  Der Marquis d'Argenson verglich die Gesellschaft mit einem Fluss und betonte, wie wichtig es sei, den Dingen ihren natürlichen Lauf zu lassen, ohne übermäßige staatliche Eingriffe. Er war der Ansicht, dass die Wirtschaft ihre eigenen Gesetze hat und dass es besser ist, sie zu respektieren, als zu versuchen, sie zu kontrollieren.