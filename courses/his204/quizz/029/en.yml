question: What did the Marquis d'Argenson compare society to?
answer: To a river, which flows naturally without the intervention of laws
wrong_answers:
  - To a jungle, where only the law of the strongest reigns
  - To a beehive, where each insect acts according to its own interests, resulting in the common well-being of all
  - A complex machine requiring constant maintenance
explanation: |
  The Marquis d'Argenson compared society to a river, emphasizing the importance of letting things take their natural course, without excessive state intervention. He believed that the economy had its own laws, and that it was preferable to respect them rather than try to control them.