question: ¿Con qué comparaba el Marqués de Argenson la sociedad?
answer: A un río, que fluye naturalmente sin la intervención de leyes
wrong_answers:
  - A una jungla, donde sólo reina la ley del más fuerte
  - A una colmena, donde cada insecto actúa según sus propios intereses, lo que redunda en el bienestar común de todos
  - Una máquina compleja que requiere un mantenimiento constante
explanation: |
  El Marqués d'Argenson comparaba la sociedad con un río, insistiendo en la importancia de dejar que las cosas siguieran su curso natural, sin una excesiva intervención del Estado. Creía que la economía tenía sus propias leyes y que era preferible respetarlas que intentar controlarlas.