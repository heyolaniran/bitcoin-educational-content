question: Millega võrdles markii d'Argenson ühiskonda?
answer: Jõele, mis voolab loomulikult ilma seaduste sekkumiseta
wrong_answers:
  - Džunglisse, kus valitseb ainult tugevama seadus
  - Mesilasperre, kus iga putukas tegutseb vastavalt oma huvidele, mille tulemuseks on kõigi ühine heaolu
  - Keeruline masin, mis nõuab pidevat hooldust
explanation: |
  Markii d'Argenson võrdles ühiskonda jõega, rõhutades, kui oluline on lasta asjadel võtta oma loomulikku kulgu, ilma liigse riigipoolse sekkumiseta. Ta uskus, et majandusel on oma seadused ja et parem on neid austada, kui püüda neid kontrollida.