question: مارکی دآرژنسون جامعه را به چه چیزی تشبیه کرد؟
answer: به رودی که به طور طبیعی بدون دخالت قوانین جریان دارد
wrong_answers:
  - به جنگلی که تنها قانون قوی‌ترین حکم‌فرماست
  - به یک کندو، جایی که هر حشره بر اساس منافع خود عمل می‌کند و در نتیجه به رفاه عمومی همه منجر می‌شود
  - یک ماشین پیچیده که نیاز به نگهداری مداوم دارد
explanation: |
  مارکی دآرژنسون جامعه را به رودخانه‌ای تشبیه کرد و بر اهمیت رها کردن امور به مسیر طبیعی خود، بدون دخالت بیش از حد دولت تأکید کرد. او معتقد بود که اقتصاد قوانین خاص خود را دارد و بهتر است به جای تلاش برای کنترل آن‌ها، به این قوانین احترام گذاشت.