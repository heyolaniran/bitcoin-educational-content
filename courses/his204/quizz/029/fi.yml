question: Mihin markiisi d'Argenson vertasi yhteiskuntaa?
answer: Joelle, joka virtaa luonnollisesti ilman lakien vaikutusta
wrong_answers:
  - Viidakkoon, jossa vallitsee vain vahvimman laki..
  - Mehiläispesään, jossa jokainen hyönteinen toimii omien etujensa mukaisesti, mikä johtaa kaikkien yhteiseen hyvinvointiin
  - Monimutkainen kone, joka vaatii jatkuvaa huoltoa
explanation: |
  Markiisi d'Argenson vertasi yhteiskuntaa jokeen ja korosti, että on tärkeää antaa asioiden kulkea luonnollista tietään ilman valtion liiallista puuttumista. Hän uskoi, että taloudella oli omat lakinsa ja että oli parempi kunnioittaa niitä kuin yrittää hallita niitä.