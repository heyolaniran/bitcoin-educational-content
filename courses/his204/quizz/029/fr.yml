question: A quoi le marquis d'Argenson comparait la société ?
answer: À un fleuve, qui coule naturellement sans l’intervention des lois
wrong_answers:
  - À une jungle, où seule règne la loi du plus fort
  - À une ruche d’abeille, où chaque insecte agit selon son intérêt et où il en résulte le bien-être commun
  - A une machine complexe nécessitant un entretien constant
explanation: |
  Le marquis d'Argenson comparait la société à un fleuve, soulignant l'importance de laisser les choses suivre leur cours naturel, sans intervention excessive de l'État. Il pensait que l'économie avait ses propres lois et qu'il était préférable de les respecter plutôt que de chercher à les contrôler.
