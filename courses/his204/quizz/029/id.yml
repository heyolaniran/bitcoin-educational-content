question: Dengan apa Marquis d'Argenson membandingkan masyarakat?
answer: Ke sungai, yang mengalir secara alami tanpa campur tangan hukum
wrong_answers:
  - Ke hutan, di mana hanya hukum yang terkuat yang berkuasa
  - Untuk sarang lebah, di mana setiap serangga bertindak sesuai dengan kepentingannya masing-masing, yang menghasilkan kesejahteraan bersama bagi semua
  - Alat berat yang kompleks dan membutuhkan perawatan yang konstan
explanation: |
  Marquis d'Argenson membandingkan masyarakat dengan sungai, menekankan pentingnya membiarkan segala sesuatunya berjalan dengan sendirinya, tanpa campur tangan negara yang berlebihan. Dia percaya bahwa ekonomi memiliki hukumnya sendiri, dan bahwa lebih baik untuk menghormatinya daripada mencoba mengendalikannya.