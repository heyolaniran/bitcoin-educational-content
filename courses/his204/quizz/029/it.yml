question: A cosa paragonava il Marchese d'Argenson la società?
answer: Ad un fiume, che scorre naturalmente senza l'intervento delle leggi
wrong_answers:
  - In una giungla, dove regna solo la legge del più forte
  - Ad un alveare, dove ogni insetto agisce secondo i propri interessi, con il risultato di un benessere comune a tutti
  - Una macchina complessa che richiede una manutenzione costante
explanation: |
  Il marchese d'Argenson paragonava la società a un fiume, sottolineando l'importanza di lasciare che le cose seguano il loro corso naturale, senza un eccessivo intervento dello Stato. Egli riteneva che l'economia avesse le sue leggi e che fosse preferibile rispettarle piuttosto che cercare di controllarle.