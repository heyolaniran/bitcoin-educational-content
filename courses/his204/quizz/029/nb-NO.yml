question: Hva sammenlignet markien d'Argenson samfunnet med?
answer: Til en elv, som flyter naturlig uten innblanding av lover
wrong_answers:
  - Til en jungel der bare den sterkestes rett hersker
  - Til en bikube, der hvert insekt handler i henhold til sine egne interesser, noe som resulterer i felles velferd for alle
  - En kompleks maskin som krever kontinuerlig vedlikehold
explanation: |
  Markis d'Argenson sammenlignet samfunnet med en elv, og understreket viktigheten av å la ting gå sin naturlige gang, uten overdreven statlig innblanding. Han mente at økonomien hadde sine egne lover, og at det var bedre å respektere dem enn å forsøke å kontrollere dem.