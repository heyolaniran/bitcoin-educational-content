question: Do czego markiz d'Argenson porównał społeczeństwo?
answer: Do rzeki, która płynie naturalnie bez interwencji praw
wrong_answers:
  - Do dżungli, gdzie rządzi tylko prawo najsilniejszego
  - Do ula, w którym każdy owad działa zgodnie z własnymi interesami, co skutkuje wspólnym dobrobytem wszystkich
  - Złożona maszyna wymagająca stałej konserwacji
explanation: |
  Markiz d'Argenson porównał społeczeństwo do rzeki, podkreślając, jak ważne jest, aby pozwolić rzeczom toczyć się ich naturalnym biegiem, bez nadmiernej interwencji państwa. Wierzył, że gospodarka rządzi się własnymi prawami i że lepiej jest je szanować, niż próbować je kontrolować.