question: A que é que o Marquês d'Argenson comparava a sociedade?
answer: A um rio, que corre naturalmente sem a intervenção de leis
wrong_answers:
  - Para uma selva, onde só reina a lei do mais forte
  - A uma colmeia, onde cada inseto age de acordo com os seus próprios interesses, resultando no bem-estar comum de todos
  - Uma máquina complexa que requer manutenção constante
explanation: |
  O Marquês d'Argenson comparava a sociedade a um rio, sublinhando a importância de deixar as coisas seguirem o seu curso natural, sem uma intervenção excessiva do Estado. Acreditava que a economia tinha as suas próprias leis e que era preferível respeitá-las do que tentar controlá-las.