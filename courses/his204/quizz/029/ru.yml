question: С чем сравнивал общество маркиз д'Аржансон?
answer: К реке, которая течет естественно, без вмешательства законов
wrong_answers:
  - В джунгли, где царит закон сильнейшего
  - В пчелиный улей, где каждое насекомое действует в соответствии со своими интересами, что приводит к общему благополучию всех
  - Сложная машина, требующая постоянного обслуживания
explanation: |
  Маркиз д'Аржансон сравнивал общество с рекой, подчеркивая важность того, чтобы позволить вещам идти своим естественным путем, без чрезмерного вмешательства государства. Он считал, что экономика имеет свои собственные законы, и предпочтительнее уважать их, чем пытаться контролировать.