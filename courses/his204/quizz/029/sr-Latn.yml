question: Čemu je markiz d'Argenson uporedio društvo?
answer: Do reci, koja teče prirodno bez intervencije zakona
wrong_answers:
  - U džunglu, gde vlada samo zakon jačeg
  - Do košnice, gde svaki insekt deluje u skladu sa sopstvenim interesima, što rezultira zajedničkim blagostanjem svih
  - Složena mašina koja zahteva stalno održavanje
explanation: |
  Markiz d'Arženson je uporedio društvo sa rekom, naglašavajući važnost puštanja stvari da idu svojim prirodnim tokom, bez prekomerne državne intervencije. Verovao je da ekonomija ima svoje zakone i da je bolje poštovati ih nego pokušavati ih kontrolisati.