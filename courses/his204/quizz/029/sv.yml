question: Vad jämförde Marquis d'Argenson samhället med?
answer: Som en flod, som flyter naturligt utan inblandning av lagar
wrong_answers:
  - Till en djungel där bara den starkares lag gäller
  - Som en bikupa, där varje insekt agerar utifrån sina egna intressen, vilket leder till allas gemensamma välbefinnande
  - En komplex maskin som kräver konstant underhåll
explanation: |
  Marquis d'Argenson jämförde samhället med en flod och betonade vikten av att låta saker och ting ha sin naturliga gång, utan överdriven statlig inblandning. Han menade att ekonomin hade sina egna lagar och att det var bättre att respektera dem än att försöka kontrollera dem.