question: Hầu tước d'Argenson so sánh xã hội với điều gì?
answer: Đến một dòng sông chảy tự nhiên mà không có sự can thiệp của luật pháp
wrong_answers:
  - Đến một khu rừng, nơi chỉ có luật lệ của kẻ mạnh nhất ngự trị
  - Đến một tổ ong, nơi mỗi loài côn trùng hành động theo sở thích riêng của mình, mang lại hạnh phúc chung cho tất cả
  - Một cỗ máy phức tạp đòi hỏi phải bảo trì thường xuyên
explanation: |
  Hầu tước d'Argenson so sánh xã hội với một dòng sông, nhấn mạnh tầm quan trọng của việc để mọi thứ diễn ra tự nhiên, không có sự can thiệp quá mức của nhà nước. Ông tin rằng nền kinh tế có luật riêng của nó, và tốt hơn là tôn trọng chúng hơn là cố gắng kiểm soát chúng.