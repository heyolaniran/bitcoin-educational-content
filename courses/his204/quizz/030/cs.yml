question: Jak markýz d'Argenson reagoval na tehdejší ministry, kteří navrhovali regulovat tu či onu hospodářskou činnost?
answer: Nejprve jsme se museli ujistit, že regulace je lepší než svoboda
wrong_answers:
  - Že tato činnost by měla nejprve dozrát, než bude regulována
  - Že je třeba dodržovat nařízení Angličanů a Holanďanů
  - Že před přijetím rozhodnutí musí být konzultováni občané
explanation: |
  Markýz d'Argenson trval na tom, aby dokázal, že regulace je lepší než svoboda. Věřil, že základním principem je svoboda a že jakákoli omezení musí být odůvodněna pádnými argumenty.