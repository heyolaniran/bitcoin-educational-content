question: Wie reagierte der Marquis d'Argenson auf die Minister seiner Zeit, die vorschlugen, diese oder jene Wirtschaftstätigkeit zu regulieren?
answer: Erstens mussten wir sicherstellen, dass die Regulierung besser ist als die Freiheit
wrong_answers:
  - Dass diese Tätigkeit erst ausreifen sollte, bevor sie reguliert wird
  - Dass die von den Engländern und Holländern erlassenen Vorschriften befolgt werden müssen
  - Dass die Bevölkerung konsultiert werden muss, bevor eine Entscheidung getroffen wird
explanation: |
  Der Marquis d'Argenson bestand darauf zu beweisen, dass Regulierung der Freiheit vorzuziehen sei. Er vertrat die Auffassung, dass die Freiheit das Grundprinzip sei und dass jede Einschränkung durch stichhaltige Argumente gerechtfertigt sein müsse.