question: How did the Marquis d'Argenson respond to the ministers of his day, who were proposing to regulate this or that economic activity?
answer: First, we had to make sure that regulation was better than freedom
wrong_answers:
  - That this activity should first be allowed to mature before being regulated
  - That the regulations made by the English and Dutch had to be followed
  - That the people must be consulted before a decision is taken
explanation: |
  The Marquis d'Argenson insisted on proving that regulation was preferable to freedom. He believed that freedom was the basic principle, and that any restrictions had to be justified by sound arguments.