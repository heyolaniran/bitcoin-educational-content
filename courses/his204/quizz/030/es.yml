question: ¿Qué respondió el Marqués de Argenson a los ministros de su época, que proponían regular tal o cual actividad económica?
answer: En primer lugar, teníamos que asegurarnos de que la regulación era mejor que la libertad
wrong_answers:
  - Que se deje madurar esta actividad antes de regularla
  - Que había que seguir las normas dictadas por ingleses y holandeses
  - Que se consulte a la población antes de tomar una decisión
explanation: |
  El Marqués d'Argenson insistía en demostrar que la regulación era preferible a la libertad. Creía que la libertad era el principio básico, y que cualquier restricción debía justificarse con argumentos sólidos.