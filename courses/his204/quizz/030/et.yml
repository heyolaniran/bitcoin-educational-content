question: Kuidas reageeris markii d'Argenson omaaegsetele ministritele, kes tegid ettepaneku reguleerida seda või teist majandustegevust?
answer: Esiteks pidime veenduma, et reguleerimine on parem kui vabadus
wrong_answers:
  - Et enne reguleerimist tuleks sellel tegevusel lasta kõigepealt küpseda
  - Et inglaste ja hollandlaste tehtud määrusi tuli järgida
  - Et enne otsuse vastuvõtmist tuleb konsulteerida rahvaga
explanation: |
  Markiis d'Argenson nõudis kindlalt, et tõestada, et reguleerimine on vabaduse asemel parem. Ta uskus, et vabadus on põhiprintsiip ja et kõik piirangud peavad olema põhjendatud mõistlike argumentidega.