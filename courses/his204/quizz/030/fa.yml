question: مارکی دآرژنسون چگونه به وزرای زمان خود پاسخ داد، که پیشنهاد می‌دادند این یا آن فعالیت اقتصادی را تنظیم کنند؟
answer: اول، باید مطمئن می‌شدیم که مقررات بهتر از آزادی است
wrong_answers:
  - این فعالیت باید ابتدا اجازه یابد تا قبل از تنظیم شدن، به بلوغ برسد.
  - اینکه مقررات وضع شده توسط انگلیسی‌ها و هلندی‌ها باید رعایت می‌شد
  - که باید قبل از اتخاذ تصمیم با مردم مشورت شود
explanation: |
  مارکی دآرژنسون اصرار داشت که اثبات کند تنظیم‌گری بر آزادی ترجیح دارد. او معتقد بود که آزادی اصل اساسی است و هرگونه محدودیتی باید با استدلال‌های قوی توجیه شود.