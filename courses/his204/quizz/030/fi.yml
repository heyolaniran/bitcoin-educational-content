question: Miten markiisi d'Argenson vastasi aikansa ministereille, jotka ehdottivat tämän tai tuon taloudellisen toiminnan sääntelyä?
answer: Ensinnäkin meidän oli varmistettava, että sääntely on parempi kuin vapaus
wrong_answers:
  - Tämän toiminnan olisi annettava ensin kypsyä ennen sääntelyä
  - Englantilaisten ja hollantilaisten antamia määräyksiä oli noudatettava
  - Kansalaisia on kuultava ennen päätöksen tekemistä
explanation: |
  Markiisi d'Argenson halusi ehdottomasti todistaa, että sääntely oli parempi kuin vapaus. Hän uskoi, että vapaus oli perusperiaate ja että kaikki rajoitukset oli perusteltava hyvillä argumenteilla.