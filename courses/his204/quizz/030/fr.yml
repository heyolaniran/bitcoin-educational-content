question: Que répondait le marquis d'Argenson aux ministres de son époque, qui proposaient de réglementer telle ou telle activité économique ?
answer: Qu’il fallait d’abord s’assurer que la réglementation valait mieux que la liberté
wrong_answers:
  - Qu’il fallait d’abord laisser cette activité arriver à maturité avant de la réglementer
  - Qu’il fallait suivre les règlements qu’avaient fait les Anglais et les Hollandais
  - Qu'il fallait consulter le peuple avant de prendre une décision
explanation: |
  Le marquis d'Argenson insistait sur la nécessité de prouver que la réglementation était préférable à la liberté. Il pensait que la liberté était le principe de base et que toute restriction devait être justifiée par des arguments solides.
