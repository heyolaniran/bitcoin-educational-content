question: मार्क्विस डी'अर्गेन्सन ने अपने समय के मंत्रियों को क्या जवाब दिया, जो इस या उस आर्थिक गतिविधि को विनियमित करने का प्रस्ताव कर रहे थे?
answer: सबसे पहले, हमें यह सुनिश्चित करना था कि विनियमन स्वतंत्रता से बेहतर है
wrong_answers:
  - इस गतिविधि को विनियमित करने से पहले परिपक्व होने दिया जाना चाहिए
  - अंग्रेजों और डचों द्वारा बनाए गए नियमों का पालन करना होगा
  - कोई भी निर्णय लेने से पहले लोगों से परामर्श अवश्य किया जाना चाहिए
explanation: |
  मार्क्विस डी'अर्गेन्सन ने यह साबित करने पर जोर दिया कि स्वतंत्रता की तुलना में विनियमन बेहतर है। उनका मानना ​​था कि स्वतंत्रता मूल सिद्धांत है, और किसी भी प्रतिबंध को ठोस तर्कों द्वारा उचित ठहराया जाना चाहिए।