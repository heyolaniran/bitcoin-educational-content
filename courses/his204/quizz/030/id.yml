question: Bagaimana tanggapan Marquis d'Argenson terhadap para menteri pada zamannya, yang mengusulkan untuk mengatur kegiatan ekonomi ini atau itu?
answer: Pertama, kami harus memastikan bahwa regulasi lebih baik daripada kebebasan
wrong_answers:
  - Bahwa kegiatan ini harus dibiarkan terlebih dahulu menjadi matang sebelum diatur
  - Bahwa peraturan yang dibuat oleh Inggris dan Belanda harus diikuti
  - Bahwa masyarakat harus diajak berkonsultasi sebelum keputusan diambil
explanation: |
  Marquis d'Argenson bersikeras untuk membuktikan bahwa peraturan lebih baik daripada kebebasan. Dia percaya bahwa kebebasan adalah prinsip dasar, dan bahwa setiap pembatasan harus dibenarkan oleh argumen yang kuat.