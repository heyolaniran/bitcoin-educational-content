question: Come rispondeva il marchese d'Argenson ai ministri del suo tempo che proponevano di regolamentare questa o quella attività economica?
answer: In primo luogo, dovevamo assicurarci che la regolamentazione fosse migliore della libertà
wrong_answers:
  - Che questa attività dovrebbe essere lasciata maturare prima di essere regolamentata
  - Che le regole stabilite dagli inglesi e dagli olandesi dovevano essere seguite
  - La popolazione deve essere consultata prima di prendere una decisione
explanation: |
  Il marchese d'Argenson insisteva nel dimostrare che la regolamentazione era preferibile alla libertà. Credeva che la libertà fosse il principio fondamentale e che qualsiasi restrizione dovesse essere giustificata da validi argomenti.