question: ダルジェンソン侯爵は、経済活動の規制を提案する当時の大臣たちにどう対応したのだろうか？
answer: まず、規制が自由よりも優れていることを確認する必要があった。
wrong_answers:
  - この活動は、規制される前にまず成熟することを許されるべきだ
  - イギリスとオランダが作った規則に従わなければならなかったこと
  - 決定が下される前に、国民の意見を聞かなければならないこと
explanation: |
  ダルジェンソン侯爵は、規制が自由よりも望ましいことを証明することを主張した。彼は、自由が基本原則であり、いかなる制限も健全な論拠によって正当化されなければならないと信じていた。