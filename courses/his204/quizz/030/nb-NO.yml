question: Hvordan reagerte marki d'Argenson på samtidens ministre, som foreslo å regulere den ene eller andre økonomiske aktiviteten?
answer: Først måtte vi sørge for at regulering var bedre enn frihet
wrong_answers:
  - At denne aktiviteten først bør få lov til å modnes før den reguleres
  - At reglene som var laget av engelskmennene og nederlenderne måtte følges
  - At folket må konsulteres før en beslutning tas
explanation: |
  Markis d'Argenson insisterte på å bevise at regulering var å foretrekke fremfor frihet. Han mente at frihet var det grunnleggende prinsippet, og at enhver innskrenkning måtte begrunnes med gode argumenter.