question: Jak markiz d'Argenson reagował na ówczesnych ministrów, którzy proponowali uregulowanie tej czy innej działalności gospodarczej?
answer: Po pierwsze, musieliśmy upewnić się, że regulacja jest lepsza niż wolność
wrong_answers:
  - Działalność ta powinna najpierw dojrzeć, zanim zostanie uregulowana
  - Że przepisy ustanowione przez Anglików i Holendrów muszą być przestrzegane
  - Przed podjęciem decyzji należy skonsultować się z obywatelami
explanation: |
  Markiz d'Argenson nalegał na udowodnienie, że regulacja jest lepsza od wolności. Uważał, że wolność jest podstawową zasadą, a wszelkie ograniczenia muszą być uzasadnione solidnymi argumentami.