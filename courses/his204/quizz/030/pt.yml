question: Como reagiu o Marquês de Argenson aos ministros do seu tempo, que propunham regulamentar esta ou aquela atividade económica?
answer: Em primeiro lugar, tínhamos de nos certificar de que a regulamentação era melhor do que a liberdade
wrong_answers:
  - Que se deve permitir que esta atividade amadureça antes de ser regulamentada
  - Que os regulamentos estabelecidos pelos ingleses e holandeses tinham de ser seguidos
  - Que os cidadãos devem ser consultados antes de ser tomada uma decisão
explanation: |
  O Marquês d'Argenson insistia em provar que a regulamentação era preferível à liberdade. Acreditava que a liberdade era o princípio básico e que quaisquer restrições tinham de ser justificadas com argumentos sólidos.