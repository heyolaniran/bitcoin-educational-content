question: Как маркиз д'Аржансон отвечал министрам своего времени, которые предлагали регулировать ту или иную экономическую деятельность?
answer: Во-первых, мы должны были убедиться, что регулирование лучше, чем свобода
wrong_answers:
  - Что сначала нужно дать этой деятельности созреть, прежде чем регулировать ее
  - Что правила, принятые англичанами и голландцами, должны соблюдаться
  - Перед принятием решения необходимо проконсультироваться с народом
explanation: |
  Маркиз д'Аржансон настаивал на доказательстве того, что регулирование предпочтительнее свободы. Он считал, что свобода - это основной принцип, а любые ограничения должны быть обоснованы вескими аргументами.