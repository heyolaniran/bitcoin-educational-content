question: Kako je markiz d'Argenson odgovorio ministrima svog vremena, koji su predlagali regulisanje ove ili one ekonomske aktivnosti?
answer: Prvo, morali smo se uveriti da je regulacija bolja od slobode.
wrong_answers:
  - Da bi ova aktivnost prvo trebalo da sazri pre nego što bude regulisana
  - Da su propisi koje su doneli Englezi i Holanđani morali biti poštovani
  - Da se narod mora konsultovati pre nego što se donese odluka
explanation: |
  Markiz d'Argenson je insistirao na dokazivanju da je regulacija poželjnija od slobode. Verovao je da je sloboda osnovni princip i da svako ograničenje mora biti opravdano valjanim argumentima.