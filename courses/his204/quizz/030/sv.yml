question: Hur reagerade markis d'Argenson på sin tids ministrar, som föreslog att den ena eller andra ekonomiska aktiviteten skulle regleras?
answer: Först var vi tvungna att se till att reglering var bättre än frihet
wrong_answers:
  - Att denna verksamhet först bör tillåtas mogna innan den regleras
  - Att de bestämmelser som utfärdats av engelsmännen och holländarna måste följas
  - Att folket måste rådfrågas innan beslut fattas
explanation: |
  Marquis d'Argenson insisterade på att bevisa att reglering var att föredra framför frihet. Han ansåg att frihet var den grundläggande principen och att alla begränsningar måste motiveras med goda argument.