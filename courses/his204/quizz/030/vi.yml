question: Hầu tước d'Argenson đã phản ứng thế nào với các bộ trưởng thời đó khi họ đề xuất điều chỉnh hoạt động kinh tế này hay hoạt động kinh tế khác?
answer: Đầu tiên, chúng ta phải đảm bảo rằng quy định tốt hơn tự do
wrong_answers:
  - Hoạt động này trước tiên phải được phép trưởng thành trước khi được điều chỉnh
  - Các quy định do người Anh và người Hà Lan đưa ra phải được tuân theo
  - Rằng người dân phải được tham khảo ý kiến trước khi đưa ra quyết định
explanation: |
  Hầu tước d'Argenson nhấn mạnh vào việc chứng minh rằng quy định tốt hơn tự do. Ông tin rằng tự do là nguyên tắc cơ bản và bất kỳ hạn chế nào cũng phải được biện minh bằng những lập luận hợp lý.