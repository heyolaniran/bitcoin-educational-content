question: Které národy navrhuje Vincent de Gournay za vzor?
answer: Anglie a Holandsko
wrong_answers:
  - Holandsko a Švýcarsko
  - Skotsko a Anglie
  - Španělsko a Portugalsko
explanation: |
  Gournay obdivoval ekonomické systémy Anglie a Holandska, které byly liberálnější a obchodně příznivější než francouzské.