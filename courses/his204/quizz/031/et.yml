question: Milliseid riike pakub Vincent de Gournay eeskujuks?
answer: Inglismaa ja Holland
wrong_answers:
  - Holland ja Šveits
  - Šotimaa ja Inglismaa
  - Hispaania ja Portugal
explanation: |
  Gournay imetles Inglismaa ja Hollandi majandussüsteeme, mis olid Prantsusmaa omast liberaalsemad ja kaubandussõbralikumad.