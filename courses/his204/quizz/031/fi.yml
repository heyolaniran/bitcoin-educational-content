question: Mitä kansoja Vincent de Gournay ehdottaa malleiksi?
answer: Englanti ja Hollanti
wrong_answers:
  - Alankomaat ja Sveitsi
  - Skotlanti ja Englanti
  - Espanja ja Portugali
explanation: |
  Gournay ihaili Englannin ja Hollannin talousjärjestelmiä, jotka olivat vapaampia ja kauppaa suosivampia kuin Ranskan.