question: Quelles nations Vincent de Gournay propose-t-il comme modèles ?
answer: L’Angleterre et la Hollande
wrong_answers:
  - La Hollande et la Suisse
  - L’Ecosse et l’Angleterre
  - L'Espagne et le Portugal
explanation: |
  Gournay admirait les systèmes économiques de l'Angleterre et de la Hollande, qui étaient plus libéraux et plus favorables au commerce que celui de la France.
