question: विंसेंट डी गौर्ने किन देशों को मॉडल के रूप में प्रस्तावित करते हैं?
answer: इंग्लैंड और हॉलैंड
wrong_answers:
  - हॉलैंड और स्विटजरलैंड
  - स्कॉटलैंड और इंग्लैंड
  - स्पेन और पुर्तगाल
explanation: |
  गौरने इंग्लैंड और हॉलैंड की आर्थिक प्रणालियों की प्रशंसा करते थे, जो फ्रांस की तुलना में अधिक उदार और व्यापार-अनुकूल थीं।