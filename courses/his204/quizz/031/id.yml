question: Negara mana yang diusulkan Vincent de Gournay sebagai model?
answer: Inggris dan Belanda
wrong_answers:
  - Belanda dan Swiss
  - Skotlandia dan Inggris
  - Spanyol dan Portugal
explanation: |
  Gournay mengagumi sistem ekonomi Inggris dan Belanda, yang lebih liberal dan ramah terhadap perdagangan dibandingkan dengan Prancis.