question: Quali nazioni Vincent de Gournay propone come modelli?
answer: Inghilterra e Olanda
wrong_answers:
  - Olanda e Svizzera
  - Scozia e Inghilterra
  - Spagna e Portogallo
explanation: |
  Gournay ammirava i sistemi economici di Inghilterra e Olanda, più liberali e favorevoli al commercio rispetto a quelli francesi.