question: Hvilke nasjoner foreslår Vincent de Gournay som forbilder?
answer: England og Nederland
wrong_answers:
  - Nederland og Sveits
  - Skottland og England
  - Spania og Portugal
explanation: |
  Gournay beundret de økonomiske systemene i England og Holland, som var mer liberale og handelsvennlige enn de franske.