question: Que nações propõe Vincent de Gournay como modelos?
answer: Inglaterra e Holanda
wrong_answers:
  - Holanda e Suíça
  - Escócia e Inglaterra
  - Espanha e Portugal
explanation: |
  Gournay admirava os sistemas económicos da Inglaterra e da Holanda, que eram mais liberais e favoráveis ao comércio do que os da França.