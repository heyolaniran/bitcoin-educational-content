question: Какие страны Винсент де Гурне предлагает в качестве образца?
answer: Англия и Голландия
wrong_answers:
  - Голландия и Швейцария
  - Шотландия и Англия
  - Испания и Португалия
explanation: |
  Гурне восхищался экономическими системами Англии и Голландии, которые были более либеральными и благоприятными для торговли, чем французская.