question: Koje nacije Vincent de Gournay predlaže kao modele?
answer: Engleska i Holandija
wrong_answers:
  - Holandija i Švajcarska
  - Škotska i Engleska
  - Španija i Portugal
explanation: |
  Gournay je cenio ekonomske sisteme Engleske i Holandije, koji su bili liberalniji i trgovinski naklonjeniji od onih u Francuskoj.