question: Vincent de Gournay đề xuất những quốc gia nào làm hình mẫu?
answer: Anh và Hà Lan
wrong_answers:
  - Hà Lan và Thụy Sĩ
  - Scotland và Anh
  - Tây Ban Nha và Bồ Đào Nha
explanation: |
  Gournay ngưỡng mộ hệ thống kinh tế của Anh và Hà Lan, vốn tự do và thân thiện hơn với thương mại so với Pháp.