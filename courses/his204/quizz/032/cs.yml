question: Gournay bojoval za volný obchod zejména se dvěma druhy zboží
answer: Obilné a malované plátno
wrong_answers:
  - Železo a uhlí
  - Víno a obilí
  - Sůl a tabák
explanation: |
  Gournay se zasazoval o liberalizaci obchodu s obilím a plátnem, protože se domníval, že regulace, které tato odvětví zatěžují, jsou pro hospodářství škodlivé.