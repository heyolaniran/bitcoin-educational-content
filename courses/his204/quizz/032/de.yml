question: Gournay setzte sich insbesondere für den Freihandel mit zwei Waren ein
answer: Maserung und bemalte Leinwand
wrong_answers:
  - Eisen und Kohle
  - Wein und Körner
  - Salz und Tabak
explanation: |
  Gournay setzte sich für die Liberalisierung des Getreide- und Leinwandhandels ein, da er der Meinung war, dass die Vorschriften, die diese Sektoren belasteten, der Wirtschaft schadeten.