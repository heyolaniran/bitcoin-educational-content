question: Gournay luchó por el libre comercio de dos productos en particular
answer: Grano y lienzo pintado
wrong_answers:
  - Hierro y carbón
  - Vino y cereales
  - Sal y tabaco
explanation: |
  Gournay abogó por la liberalización del comercio de cereales y lonas, pues consideraba que las normativas que pesaban sobre estos sectores eran perjudiciales para la economía.