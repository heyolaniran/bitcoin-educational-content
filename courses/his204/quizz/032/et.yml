question: Gournay võitles eelkõige kahe kauba vabakaubanduse eest
answer: Teravik ja värvitud lõuend
wrong_answers:
  - Raud ja kivisüsi
  - Vein ja terad
  - Sool ja tubakas
explanation: |
  Gournay võitles teravilja- ja lõuendikaubanduse liberaliseerimise eest, sest ta uskus, et neid sektoreid koormavad eeskirjad olid majandusele kahjulikud.