question: گورنی به‌طور خاص برای تجارت آزاد در دو کالا مبارزه کرد
answer: بوم دانه‌دار و رنگ‌شده
wrong_answers:
  - آهن و زغال‌سنگ
  - شراب و غلات
  - نمک و تنباکو
explanation: |
  گورنی برای آزادسازی تجارت غلات و بوم کمپین کرد و معتقد بود که مقرراتی که این بخش‌ها را سنگین می‌کنند به اقتصاد آسیب می‌رسانند.