question: Gournay taisteli erityisesti kahden tavaran vapaakaupan puolesta
answer: Jyvä ja maalattu kangas
wrong_answers:
  - Rauta ja hiili
  - Viini ja jyvät
  - Suola ja tupakka
explanation: |
  Gournay kampanjoi vilja- ja kangaskaupan vapauttamisen puolesta, sillä hän katsoi, että näitä aloja painavat säännökset olivat haitallisia taloudelle.