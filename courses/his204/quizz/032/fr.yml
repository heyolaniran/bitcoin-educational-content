question: Gournay s’est battu pour la liberté du commerce de deux marchandises en particulier
answer: Les grains et les toiles peintes
wrong_answers:
  - Le fer et la houille
  - Le vin et les grains
  - Le sel et le tabac
explanation: |
  Gournay a milité pour la libéralisation du commerce des grains et des toiles peintes, car il pensait que les réglementations qui pesaient sur ces secteurs étaient nuisibles à l'économie.
