question: गौर्ने ने विशेष रूप से दो वस्तुओं में मुक्त व्यापार के लिए लड़ाई लड़ी
answer: अनाज और चित्रित कैनवास
wrong_answers:
  - लोहा और कोयला
  - शराब और अनाज
  - नमक और तम्बाकू
explanation: |
  गौर्ने ने अनाज और कैनवास व्यापार के उदारीकरण के लिए अभियान चलाया, उनका मानना ​​था कि इन क्षेत्रों पर नियंत्रण रखने वाले नियम अर्थव्यवस्था के लिए हानिकारक थे।