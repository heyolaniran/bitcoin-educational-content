question: Gournay memperjuangkan perdagangan bebas dalam dua barang khususnya
answer: Biji-bijian dan kanvas yang dicat
wrong_answers:
  - Besi dan batu bara
  - Anggur dan biji-bijian
  - Garam dan tembakau
explanation: |
  Gournay berkampanye untuk liberalisasi perdagangan biji-bijian dan kanvas, dengan keyakinan bahwa peraturan yang membebani sektor-sektor ini berbahaya bagi perekonomian.