question: Gournay si è battuto per il libero scambio di due beni in particolare
answer: Tela a grana e dipinta
wrong_answers:
  - Ferro e carbone
  - Vino e cereali
  - Sale e tabacco
explanation: |
  Gournay si batté per la liberalizzazione del commercio dei cereali e delle tele, ritenendo che le norme che gravavano su questi settori fossero dannose per l'economia.