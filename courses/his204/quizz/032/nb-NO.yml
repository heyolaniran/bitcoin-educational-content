question: Gournay kjempet for frihandel med særlig to varer
answer: Korn og malt lerret
wrong_answers:
  - Jern og kull
  - Vin og korn
  - Salt og tobakk
explanation: |
  Gournay kjempet for liberalisering av korn- og lerretshandelen, og mente at reguleringene som tynget disse sektorene, var skadelige for økonomien.