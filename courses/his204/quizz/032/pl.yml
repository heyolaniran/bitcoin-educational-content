question: Gournay walczył o wolny handel w szczególności dwoma towarami
answer: Ziarno i malowane płótno
wrong_answers:
  - Żelazo i węgiel
  - Wino i zboża
  - Sól i tytoń
explanation: |
  Gournay prowadził kampanię na rzecz liberalizacji handlu zbożem i płótnem, wierząc, że regulacje obciążające te sektory są szkodliwe dla gospodarki.