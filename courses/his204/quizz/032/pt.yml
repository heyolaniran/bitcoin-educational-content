question: Gournay lutou pelo comércio livre de duas mercadorias em particular
answer: Grão e tela pintada
wrong_answers:
  - Ferro e carvão
  - Vinho e cereais
  - Sal e tabaco
explanation: |
  Gournay fez campanha pela liberalização do comércio de cereais e de telas, considerando que os regulamentos que pesavam sobre estes sectores eram prejudiciais para a economia.