question: Гурне боролся за свободную торговлю, в частности, двумя товарами
answer: Зерно и окрашенный холст
wrong_answers:
  - Железо и уголь
  - Вино и зерно
  - Соль и табак
explanation: |
  Гурне выступал за либерализацию торговли зерном и холстом, считая, что правила, сковывающие эти отрасли, вредят экономике.