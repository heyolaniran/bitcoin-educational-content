question: Gournay se borio za slobodnu trgovinu posebno u dve robe
answer: Platno sa teksturom i bojom
wrong_answers:
  - Gvožđe i ugalj
  - Vino i žitarice
  - So i duvan
explanation: |
  Gournay je vodio kampanju za liberalizaciju trgovine žitom i platnom, verujući da su propisi koji opterećuju ove sektore štetni za ekonomiju.