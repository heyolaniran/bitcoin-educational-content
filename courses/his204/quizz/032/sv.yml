question: Gournay kämpade för frihandel med framför allt två varor
answer: Korn och målad duk
wrong_answers:
  - Järn och kol
  - Vin och spannmål
  - Salt och tobak
explanation: |
  Gournay kämpade för liberaliseringen av spannmåls- och canvashandeln och ansåg att de regleringar som tyngde ner dessa sektorer var skadliga för ekonomin.