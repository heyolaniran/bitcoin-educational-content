question: Gournay alipigania biashara huria katika bidhaa mbili haswa
answer: Nafaka na turubai iliyopakwa rangi
wrong_answers:
  - Chuma na makaa ya mawe
  - Mvinyo na nafaka
  - Chumvi na tumbaku
explanation: |
  Gournay alifanya kampeni ya ukombozi wa biashara ya nafaka na turubai, akiamini kuwa kanuni zinazolemea sekta hizi zilikuwa na madhara kwa uchumi.