question: Gournay đã đấu tranh cho tự do thương mại trong hai loại hàng hóa cụ thể
answer: Vải bố vân gỗ và sơn
wrong_answers:
  - Sắt và than
  - Rượu và ngũ cốc
  - Muối và thuốc lá
explanation: |
  Gournay vận động tự do hóa ngành buôn bán ngũ cốc và vải bạt, tin rằng các quy định gây cản trở các ngành này sẽ gây hại cho nền kinh tế.