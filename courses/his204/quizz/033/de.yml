question: Warum glaubt er, dass der Schmuggel in Frankreich so weit verbreitet ist?
answer: Da Vorschriften den legalen Handel mit bestimmten Waren verhindern, wird ein Parallelmarkt eröffnet
wrong_answers:
  - Weil es in Frankreich so viele arme Menschen gibt, ist ihre einzige Einnahmequelle der Schmuggel
  - Weil die protestantische Emigration ein Nährboden für Schmuggelware ist
  - Weil Zollbeamte korrupt sind
explanation: |
  Gournay war der Ansicht, dass eine übermäßige Regulierung den Schmuggel fördere, indem sie Parallelmärkte für Waren schaffe, deren Handel verboten oder stark besteuert sei.