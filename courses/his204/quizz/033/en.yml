question: Why does he think smuggling is so widespread in France?
answer: Because regulations prevent the legal trade of certain goods, opening up a parallel market
wrong_answers:
  - Because France has so many poor people, their only resource is smuggling
  - Because Protestant emigration is a breeding ground for contraband
  - Because customs officers are corrupt
explanation: |
  Gournay believed that excessive regulation encouraged smuggling by creating parallel markets for goods whose trade was prohibited or heavily taxed.