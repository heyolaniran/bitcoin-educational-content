question: چرا او فکر می‌کند قاچاق در فرانسه این‌قدر گسترده است؟
answer: زیرا مقررات از تجارت قانونی برخی کالاها جلوگیری می‌کند، بازار موازی را باز می‌کند
wrong_answers:
  - زیرا فرانسه افراد فقیر زیادی دارد، تنها منبع آنها قاچاق است.
  - زیرا مهاجرت پروتستان‌ها زمینه‌ای برای قاچاق است
  - زیرا مأموران گمرک فاسد هستند
explanation: |
  گورنی معتقد بود که مقررات بیش از حد، با ایجاد بازارهای موازی برای کالاهایی که تجارت آن‌ها ممنوع یا به شدت مشمول مالیات است، قاچاق را تشویق می‌کند.