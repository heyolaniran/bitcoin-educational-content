question: Miksi salakuljetus on hänen mielestään niin yleistä Ranskassa?
answer: Koska säädökset estävät tiettyjen tavaroiden laillisen kaupan, rinnakkaismarkkinoiden avaaminen
wrong_answers:
  - Koska Ranskassa on niin paljon köyhiä ihmisiä, heidän ainoa resurssinsa on salakuljetus..
  - Koska protestanttinen maastamuutto on salakuljetuksen kasvualusta..
  - Koska tullivirkailijat ovat korruptoituneita
explanation: |
  Gournay uskoi, että liiallinen sääntely edisti salakuljetusta luomalla rinnakkaismarkkinoita tavaroille, joiden kauppa oli kielletty tai raskaasti verotettu.