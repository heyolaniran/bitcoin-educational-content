question: उनका मानना ​​है कि फ्रांस में तस्करी इतनी व्यापक क्यों है?
answer: क्योंकि विनियमन कुछ वस्तुओं के वैध व्यापार को रोकते हैं, जिससे समानांतर बाजार खुल जाता है
wrong_answers:
  - क्योंकि फ्रांस में बहुत सारे गरीब लोग हैं, इसलिए उनका एकमात्र संसाधन तस्करी है।
  - क्योंकि प्रोटेस्टेंट प्रवासन तस्करी के लिए प्रजनन स्थल है
  - क्योंकि सीमा शुल्क अधिकारी भ्रष्ट हैं
explanation: |
  गौरने का मानना ​​था कि अत्यधिक विनियमन से उन वस्तुओं के लिए समानांतर बाजार का निर्माण होता है, जिनका व्यापार प्रतिबंधित है या जिन पर भारी कर लगाया जाता है, जिससे तस्करी को बढ़ावा मिलता है।