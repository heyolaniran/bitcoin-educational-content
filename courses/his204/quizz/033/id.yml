question: Menurut dia, mengapa penyelundupan begitu marak di Prancis?
answer: Karena peraturan mencegah perdagangan legal barang-barang tertentu, membuka pasar paralel
wrong_answers:
  - Karena Prancis memiliki begitu banyak orang miskin, satu-satunya sumber daya mereka adalah penyelundupan
  - Karena emigrasi Protestan adalah tempat berkembang biaknya penyelundupan
  - Karena petugas bea cukai korup
explanation: |
  Gournay percaya bahwa regulasi yang berlebihan mendorong penyelundupan dengan menciptakan pasar paralel untuk barang-barang yang perdagangannya dilarang atau dikenai pajak tinggi.