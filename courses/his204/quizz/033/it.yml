question: Perché pensa che il contrabbando sia così diffuso in Francia?
answer: Poiché le normative impediscono il commercio legale di alcuni beni, l'apertura di un mercato parallelo
wrong_answers:
  - Poiché in Francia ci sono così tanti poveri, la loro unica risorsa è il contrabbando
  - Perché l'emigrazione protestante è un terreno di coltura per il contrabbando
  - Perché i doganieri sono corrotti
explanation: |
  Gournay riteneva che un'eccessiva regolamentazione incoraggiasse il contrabbando creando mercati paralleli per i beni il cui commercio era vietato o pesantemente tassato.