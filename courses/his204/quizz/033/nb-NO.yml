question: Hvorfor tror han smugling er så utbredt i Frankrike?
answer: Fordi reguleringer hindrer lovlig handel med visse varer, åpnes det for et parallelt marked
wrong_answers:
  - Fordi Frankrike har så mange fattige mennesker, er smugling deres eneste ressurs
  - Fordi protestantisk emigrasjon er en grobunn for smugling
  - Fordi tollerne er korrupte
explanation: |
  Gournay mente at overdreven regulering oppmuntret til smugling ved å skape parallelle markeder for varer som det var forbudt å handle med, eller som var sterkt beskattet.