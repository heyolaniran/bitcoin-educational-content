question: Dlaczego uważa, że przemyt jest tak powszechny we Francji?
answer: Ponieważ przepisy uniemożliwiają legalny handel niektórymi towarami, otwarcie rynku równoległego
wrong_answers:
  - Ponieważ Francja ma tak wielu biednych ludzi, ich jedynym zasobem jest przemyt
  - Ponieważ emigracja protestancka jest wylęgarnią kontrabandy
  - Ponieważ celnicy są skorumpowani
explanation: |
  Gournay uważał, że nadmierne regulacje zachęcały do przemytu, tworząc równoległe rynki dla towarów, których handel był zabroniony lub obłożony wysokimi podatkami.