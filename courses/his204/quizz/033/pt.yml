question: Porque é que ele acha que o contrabando está tão difundido em França?
answer: Uma vez que a regulamentação impede o comércio legal de certos bens, a abertura de um mercado paralelo
wrong_answers:
  - Como a França tem muitos pobres, o seu único recurso é o contrabando
  - Porque a emigração protestante é um terreno fértil para o contrabando
  - Porque os funcionários aduaneiros são corruptos
explanation: |
  Gournay considerava que a regulamentação excessiva incentivava o contrabando, criando mercados paralelos para mercadorias cujo comércio era proibido ou fortemente tributado.