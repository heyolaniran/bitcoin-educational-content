question: Почему, по его мнению, контрабанда так широко распространена во Франции?
answer: Поскольку нормативные акты не позволяют легально торговать некоторыми товарами, открывается параллельный рынок
wrong_answers:
  - Поскольку во Франции так много бедных людей, их единственным ресурсом является контрабанда
  - Потому что протестантская эмиграция - это рассадник контрабанды
  - Потому что таможенники коррумпированы
explanation: |
  Гурне считал, что чрезмерное регулирование способствует контрабанде, создавая параллельные рынки для товаров, торговля которыми была запрещена или облагалась высокими налогами.