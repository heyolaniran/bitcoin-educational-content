question: Zašto on misli da je krijumčarenje tako rasprostranjeno u Francuskoj?
answer: Zbog propisa koji sprečavaju legalnu trgovinu određenom robom, otvara se paralelno tržište
wrong_answers:
  - Zbog toga što Francuska ima toliko siromašnih ljudi, njihov jedini resurs je krijumčarenje.
  - Jer protestantska emigracija je plodno tlo za krijumčarenje
  - Zato što su carinici korumpirani
explanation: |
  Gournay je verovao da prekomerna regulacija podstiče krijumčarenje stvaranjem paralelnih tržišta za robu čija je trgovina zabranjena ili jako oporezovana.