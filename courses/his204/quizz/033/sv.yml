question: Varför tror han att smugglingen är så utbredd i Frankrike?
answer: Eftersom regleringar förhindrar laglig handel med vissa varor, vilket öppnar upp för en parallell marknad
wrong_answers:
  - Eftersom Frankrike har så många fattiga människor är deras enda resurs smuggling
  - Eftersom protestantisk emigration är en grogrund för smuggelgods
  - Eftersom tulltjänstemän är korrupta
explanation: |
  Gournay menade att överdriven reglering uppmuntrade smuggling genom att skapa parallella marknader för varor vars handel var förbjuden eller kraftigt beskattad.