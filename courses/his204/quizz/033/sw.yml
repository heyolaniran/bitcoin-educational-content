question: Kwa nini anafikiri magendo yameenea sana nchini Ufaransa?
answer: Kwa sababu kanuni zinazuia biashara ya kisheria ya bidhaa fulani, kufungua soko sambamba
wrong_answers:
  - Kwa sababu Ufaransa ina watu wengi maskini, rasilimali yao pekee ni magendo
  - Kwa sababu kuhama kwa Waprotestanti ni mahali pa kuzaliana kwa magendo
  - Kwa sababu maafisa wa forodha ni wala rushwa
explanation: |
  Gournay aliamini kuwa udhibiti mwingi ulihimiza ulanguzi kwa kuunda masoko sambamba ya bidhaa ambazo biashara yake ilikuwa imepigwa marufuku au kutozwa ushuru mwingi.