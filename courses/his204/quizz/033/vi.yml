question: Tại sao ông lại nghĩ rằng nạn buôn lậu lại phổ biến ở Pháp?
answer: Bởi vì các quy định ngăn cản việc buôn bán hợp pháp một số hàng hóa nhất định, mở ra một thị trường song song
wrong_answers:
  - Bởi vì nước Pháp có quá nhiều người nghèo nên nguồn lực duy nhất của họ là buôn lậu
  - Bởi vì sự di cư của người Tin Lành là nơi sinh sôi của hàng lậu
  - Bởi vì các viên chức hải quan tham nhũng
explanation: |
  Gournay tin rằng quy định quá mức đã khuyến khích nạn buôn lậu bằng cách tạo ra các thị trường song song cho những hàng hóa bị cấm hoặc bị đánh thuế nặng.