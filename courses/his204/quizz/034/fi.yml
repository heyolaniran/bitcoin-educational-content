question: Kuka näistä kirjailijoista oli erityisen innoittunut Gournaysta?
answer: Turgot
wrong_answers:
  - Josiah Child
  - François Quesnay
  - Adam Smith
explanation: |
  Gournayn ajatukset vaikuttivat voimakkaasti Turgot'hon, erityisesti hänen taloudellisen vapauden puolustamisensa ja valtion väliintulon arvostelunsa.