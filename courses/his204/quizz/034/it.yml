question: Chi tra questi autori si è ispirato particolarmente a Gournay?
answer: Turgot
wrong_answers:
  - Josiah Child
  - François Quesnay
  - Adam Smith
explanation: |
  Turgot fu fortemente influenzato dalle idee di Gournay, in particolare dalla sua difesa della libertà economica e dalla sua critica all'intervento statale.