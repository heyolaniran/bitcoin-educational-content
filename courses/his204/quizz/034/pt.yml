question: Quem, de entre estes autores, se inspirou particularmente em Gournay?
answer: Turgot
wrong_answers:
  - Josias Filho
  - François Quesnay
  - Adam Smith
explanation: |
  Turgot foi fortemente influenciado pelas ideias de Gournay, em particular a sua defesa da liberdade económica e a sua crítica à intervenção do Estado.