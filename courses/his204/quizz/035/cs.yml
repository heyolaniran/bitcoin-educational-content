question: Kterou myšlenku katolické církve Gournay napadl?
answer: Zákaz úročených půjček
wrong_answers:
  - Almužna pro potřebné
  - Soběstačný život mnichů
  - Desátek
explanation: |
  Gournay kritizoval zákaz úročených půjček za to, že brání hospodářskému rozvoji, protože podnikatelům znemožňuje přístup k úvěrům.