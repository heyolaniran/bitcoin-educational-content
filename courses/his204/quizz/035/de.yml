question: Welche von der katholischen Kirche entwickelte Idee hat Gournay angegriffen?
answer: Verbot von verzinslichen Darlehen
wrong_answers:
  - Almosen für die Bedürftigen
  - Das autarke Leben der Mönche
  - Der Zehnte
explanation: |
  Gournay kritisierte, dass das Verbot von verzinslichen Krediten die wirtschaftliche Entwicklung behindere, weil es Unternehmern den Zugang zu Krediten verwehre.