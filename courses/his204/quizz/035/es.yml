question: ¿Qué idea desarrollada por la Iglesia Católica atacó Gournay?
answer: Prohibición de préstamos con intereses
wrong_answers:
  - Limosna para los necesitados
  - La vida autosuficiente de los monjes
  - El diezmo
explanation: |
  Gournay criticó la prohibición de los préstamos con intereses por obstaculizar el desarrollo económico al impedir a los empresarios acceder al crédito.