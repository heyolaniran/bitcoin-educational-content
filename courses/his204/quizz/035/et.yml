question: Millist katoliku kiriku poolt välja töötatud ideed Gournay ründas?
answer: Intressi kandvate laenude keeld
wrong_answers:
  - Almus abivajajatele
  - Munkade isemajandav elu
  - Kümnendik
explanation: |
  Gournay kritiseeris intressi kandvate laenude keelustamist, kuna see takistab ettevõtjate juurdepääsu krediidile, mis takistab majandusarengut.