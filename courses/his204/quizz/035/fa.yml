question: کدام ایده‌ای که توسط کلیسای کاتولیک توسعه یافته بود را گورنی مورد حمله قرار داد؟
answer: ممنوعیت وام‌های بهره‌دار
wrong_answers:
  - صدقه برای نیازمندان
  - زندگی خودکفای راهبان
  - عُشر
explanation: |
  گورنی انتقاد کرد که ممنوعیت وام‌های بهره‌دار مانع توسعه اقتصادی می‌شود زیرا از دسترسی کارآفرینان به اعتبار جلوگیری می‌کند.