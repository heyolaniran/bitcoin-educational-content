question: Mitä katolisen kirkon kehittämää ajatusta vastaan Gournay hyökkäsi?
answer: Korkoa tuottavien lainojen kielto
wrong_answers:
  - Almuja vähävaraisille
  - Munkkien omavarainen elämä
  - Kymmenykset
explanation: |
  Gournay kritisoi korollisten lainojen kieltämistä siitä, että se haittaa talouskehitystä, koska se estää yrittäjiä saamasta luottoa.