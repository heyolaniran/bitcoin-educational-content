question: Quelle idée développée par l’Eglise catholique Gournay a-t-il attaqué ?
answer: La prohibition du prêt à intérêt
wrong_answers:
  - L’aumône aux démunis
  - La vie en autarcie des moines
  - La dîme
explanation: |
  Gournay critiquait la prohibition du prêt à intérêt, car elle entravait le développement économique en empêchant les entrepreneurs d'accéder au crédit.
