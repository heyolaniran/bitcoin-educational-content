question: कैथोलिक चर्च द्वारा विकसित किस विचार पर गौरने ने हमला किया?
answer: ब्याज वाले ऋणों पर प्रतिबंध
wrong_answers:
  - जरूरतमंदों के लिए दान
  - भिक्षुओं का आत्मनिर्भर जीवन
  - दशमांश
explanation: |
  गौरने ने ब्याज-आधारित ऋणों पर प्रतिबंध की आलोचना करते हुए कहा कि इससे उद्यमियों को ऋण प्राप्त करने में बाधा उत्पन्न हो रही है, जिससे आर्थिक विकास में बाधा उत्पन्न हो रही है।