question: Ide yang dikembangkan oleh Gereja Katolik mana yang diserang oleh Gournay?
answer: Larangan pinjaman berbunga
wrong_answers:
  - Sedekah untuk yang membutuhkan
  - Kehidupan mandiri para biksu
  - Persepuluhan
explanation: |
  Gournay mengkritik pelarangan pinjaman berbunga karena menghambat pembangunan ekonomi dengan mencegah pengusaha mengakses kredit.