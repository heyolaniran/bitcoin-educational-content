question: Quale idea sviluppata dalla Chiesa cattolica attaccò Gournay?
answer: Divieto di prestiti a interesse
wrong_answers:
  - Elemosina per i bisognosi
  - La vita autosufficiente dei monaci
  - La decima
explanation: |
  Gournay ha criticato il divieto di concedere prestiti a interesse perché ostacola lo sviluppo economico, impedendo agli imprenditori di accedere al credito.