question: Hvilken idé utviklet av den katolske kirken angrep Gournay?
answer: Forbud mot rentebærende lån
wrong_answers:
  - Almisser til de trengende
  - Munkenes selvforsynte liv
  - Tienden
explanation: |
  Gournay kritiserte forbudet mot rentebærende lån for å hindre økonomisk utvikling ved å hindre gründere i å få tilgang til kreditt.