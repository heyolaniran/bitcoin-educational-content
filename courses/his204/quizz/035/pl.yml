question: Którą ideę opracowaną przez Kościół katolicki zaatakował Gournay?
answer: Zakaz udzielania oprocentowanych pożyczek
wrong_answers:
  - Jałmużna dla potrzebujących
  - Samowystarczalne życie mnichów
  - Dziesięcina
explanation: |
  Gournay skrytykował zakaz udzielania oprocentowanych pożyczek za utrudnianie rozwoju gospodarczego poprzez uniemożliwianie przedsiębiorcom dostępu do kredytów.