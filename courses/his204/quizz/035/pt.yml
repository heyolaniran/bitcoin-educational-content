question: Que ideia desenvolvida pela Igreja Católica foi atacada por Gournay?
answer: Proibição de empréstimos remunerados
wrong_answers:
  - Esmolas para os necessitados
  - A vida autossuficiente dos monges
  - O dízimo
explanation: |
  Gournay criticou a proibição dos empréstimos remunerados por dificultar o desenvolvimento económico ao impedir os empresários de acederem ao crédito.