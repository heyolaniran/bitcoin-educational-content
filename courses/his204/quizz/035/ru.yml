question: На какую идею, разработанную католической церковью, напал Гурне?
answer: Запрет на выдачу займов под проценты
wrong_answers:
  - Милостыня для нуждающихся
  - Самодостаточная жизнь монахов
  - Десятина
explanation: |
  Гурне критиковал запрет на выдачу кредитов под проценты за то, что он препятствует экономическому развитию, лишая предпринимателей доступа к кредитам.