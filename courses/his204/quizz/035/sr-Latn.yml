question: Koju ideju koju je razvila Katolička crkva je Gournay napala?
answer: Zabrana zajmova s kamatama
wrong_answers:
  - Milostinja za potrebite
  - Samodostatan život monaha
  - Desetina
explanation: |
  Gournay je kritikovao zabranu zajmova s kamatom jer ometaju ekonomski razvoj sprečavanjem preduzetnika da dođu do kredita.