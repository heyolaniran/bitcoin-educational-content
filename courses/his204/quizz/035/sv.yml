question: Vilken idé som utvecklats av den katolska kyrkan angrep Gournay?
answer: Förbud mot räntebärande lån
wrong_answers:
  - Allmosor till behövande
  - Munkarnas självförsörjande liv
  - Tiondet
explanation: |
  Gournay kritiserade förbudet mot räntebärande lån för att hindra ekonomisk utveckling genom att hindra entreprenörer från att få tillgång till krediter.