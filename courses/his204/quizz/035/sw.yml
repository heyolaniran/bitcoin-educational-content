question: Ni wazo gani lililoanzishwa na Kanisa Katoliki ambalo Gournay alishambulia?
answer: Marufuku ya mikopo yenye riba
wrong_answers:
  - Sadaka kwa wahitaji
  - Maisha ya kujitosheleza ya watawa
  - Zaka
explanation: |
  Gournay alikosoa marufuku ya mikopo yenye riba kwa kuzuia maendeleo ya kiuchumi kwa kuzuia wajasiriamali kupata mikopo.