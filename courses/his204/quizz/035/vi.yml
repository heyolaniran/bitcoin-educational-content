question: Gournay đã chỉ trích ý tưởng nào của Giáo hội Công giáo?
answer: Cấm cho vay có tính lãi
wrong_answers:
  - Bố thí cho người nghèo
  - Cuộc sống tự cung tự cấp của các nhà sư
  - Tiền thập phân
explanation: |
  Gournay chỉ trích lệnh cấm cho vay có tính lãi vì cản trở sự phát triển kinh tế bằng cách ngăn cản các doanh nhân tiếp cận tín dụng.