question: Co je zvláštního na spisech Gournayova kruhu?
answer: Jedná se především o překlady zahraničních autorů
wrong_answers:
  - Jsou to všechno spisy obhajující ekonomický liberalismus
  - Jedná se o pojednání o vědeckém studiu ekonomie
  - Jedná se o satirické pamflety
explanation: |
  Církev de Gournay je známá překlady anglických a nizozemských ekonomických děl, které přispěly k šíření liberálních myšlenek ve Francii.