question: Was ist das Besondere an den Schriften des Gournay-Kreises?
answer: Es handelt sich hauptsächlich um Übersetzungen ausländischer Autoren
wrong_answers:
  - Es sind alles Schriften, die den Wirtschaftsliberalismus verteidigen
  - Es handelt sich um Abhandlungen über das wissenschaftliche Studium der Wirtschaftswissenschaften
  - Es handelt sich um satirische Pamphlete
explanation: |
  Der Cercle de Gournay ist für die Übersetzung englischer und niederländischer Wirtschaftswerke bekannt und trug zur Verbreitung liberaler Ideen in Frankreich bei.