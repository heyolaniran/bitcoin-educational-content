question: ¿Qué tienen de especial los escritos del círculo de Gournay?
answer: Se trata principalmente de traducciones de autores extranjeros
wrong_answers:
  - Son todos escritos que defienden el liberalismo económico
  - Se trata de tratados sobre el estudio científico de la economía
  - Se trata de panfletos satíricos
explanation: |
  El cercle de Gournay es conocido por traducir obras económicas inglesas y holandesas, contribuyendo a difundir las ideas liberales en Francia.