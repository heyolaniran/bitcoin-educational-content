question: چه چیزی در مورد نوشته‌های دایره گورنی خاص است؟
answer: این‌ها عمدتاً ترجمه‌هایی از نویسندگان خارجی هستند.
wrong_answers:
  - همه نوشته‌هایی در دفاع از لیبرالیسم اقتصادی هستند.
  - اینها رساله‌هایی در مورد مطالعه علمی اقتصاد هستند.
  - این‌ها جزوه‌های طنزآمیز هستند
explanation: |
  سِرکل دو گورنی به خاطر ترجمه آثار اقتصادی انگلیسی و هلندی شناخته شده است و به گسترش ایده‌های لیبرال در فرانسه کمک می‌کند.