question: Quelle est la particularité des écrits issus du cercle de Gournay ?
answer: Ce sont principalement des traductions d’auteurs étrangers
wrong_answers:
  - Ce sont des écrits défendant tous le libéralisme économique
  - Ce sont des traités, étudiant scientifiquement l’économie
  - Ce sont des pamphlets satiriques
explanation: |
  Le cercle de Gournay est connu pour avoir traduit des ouvrages économiques anglais et hollandais, contribuant ainsi à diffuser les idées libérales en France.
