question: Apa yang istimewa dari tulisan-tulisan lingkaran Gournay?
answer: Sebagian besar merupakan terjemahan dari penulis asing
wrong_answers:
  - Semuanya adalah tulisan yang membela liberalisme ekonomi
  - Ini adalah risalah tentang studi ilmiah ekonomi
  - Ini adalah pamflet satir
explanation: |
  Cercle de Gournay dikenal sebagai penerjemah karya-karya ekonomi berbahasa Inggris dan Belanda, yang membantu menyebarkan ide-ide liberal di Prancis.