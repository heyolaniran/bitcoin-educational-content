question: Cosa c'è di speciale negli scritti del circolo di Gournay?
answer: Si tratta principalmente di traduzioni di autori stranieri
wrong_answers:
  - Sono tutti scritti che difendono il liberalismo economico
  - Si tratta di trattati sullo studio scientifico dell'economia
  - Si tratta di opuscoli satirici
explanation: |
  Il Cercle de Gournay è noto per aver tradotto opere economiche inglesi e olandesi, contribuendo a diffondere le idee liberali in Francia.