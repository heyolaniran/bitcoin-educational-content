question: Hva er det spesielle med skriftene til Gournay-kretsen?
answer: Dette er hovedsakelig oversettelser av utenlandske forfattere
wrong_answers:
  - De er alle skrifter som forsvarer økonomisk liberalisme
  - Dette er avhandlinger om det vitenskapelige studiet av økonomi
  - Dette er satiriske pamfletter
explanation: |
  Cercle de Gournay er kjent for å oversette engelske og nederlandske økonomiske verker, noe som bidro til å spre liberale ideer i Frankrike.