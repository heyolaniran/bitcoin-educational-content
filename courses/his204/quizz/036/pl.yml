question: Co jest szczególnego w pismach kręgu Gournay?
answer: Są to głównie tłumaczenia zagranicznych autorów
wrong_answers:
  - Wszystkie one są pismami broniącymi liberalizmu gospodarczego
  - Są to traktaty na temat naukowego badania ekonomii
  - Są to satyryczne broszury
explanation: |
  Cercle de Gournay jest znany z tłumaczenia angielskich i holenderskich dzieł ekonomicznych, pomagając w szerzeniu liberalnych idei we Francji.