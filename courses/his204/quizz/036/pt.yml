question: O que é que os escritos do círculo de Gournay têm de especial?
answer: Trata-se sobretudo de traduções de autores estrangeiros
wrong_answers:
  - Todos eles são escritos que defendem o liberalismo económico
  - Trata-se de tratados sobre o estudo científico da economia
  - Trata-se de panfletos satíricos
explanation: |
  O cercle de Gournay é conhecido pela tradução de obras económicas inglesas e holandesas, contribuindo para a difusão das ideias liberais em França.