question: Что особенного в трудах круга Гурне?
answer: В основном это переводы зарубежных авторов
wrong_answers:
  - Все они являются трудами, защищающими экономический либерализм
  - Это трактаты, посвященные научному изучению экономики
  - Это сатирические памфлеты
explanation: |
  Церковь де Гурне известна переводами английских и голландских экономических работ, что способствовало распространению либеральных идей во Франции.