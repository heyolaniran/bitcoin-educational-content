question: Šta je posebno u spisima kruga Gournay?
answer: Ovo su uglavnom prevodi stranih autora
wrong_answers:
  - Oni su svi spisi koji brane ekonomski liberalizam
  - Ovo su rasprave o naučnom proučavanju ekonomije
  - Ovo su satirične brošure
explanation: |
  Cercle de Gournay je poznat po prevođenju engleskih i holandskih ekonomskih dela, pomažući širenju liberalnih ideja u Francuskoj.