question: Ni nini maalum kuhusu maandishi ya duara ya Gournay?
answer: Hizi ni hasa tafsiri za waandishi wa kigeni
wrong_answers:
  - Yote ni maandishi yanayotetea uliberali wa kiuchumi
  - Hizi ni nakala juu ya utafiti wa kisayansi wa uchumi
  - Hivi ni vipeperushi vya kejeli
explanation: |
  The cercle de Gournay inajulikana kwa kutafsiri kazi za kiuchumi za Kiingereza na Kiholanzi, kusaidia kueneza mawazo huria nchini Ufaransa.