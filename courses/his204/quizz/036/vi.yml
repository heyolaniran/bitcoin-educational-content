question: Những bài viết của nhóm Gournay có gì đặc biệt?
answer: Đây chủ yếu là bản dịch của các tác giả nước ngoài
wrong_answers:
  - Tất cả đều là những bài viết bảo vệ chủ nghĩa tự do kinh tế
  - Đây là những chuyên luận về nghiên cứu khoa học kinh tế
  - Đây là những tập sách châm biếm
explanation: |
  Cercle de Gournay nổi tiếng với việc dịch các tác phẩm kinh tế tiếng Anh và tiếng Hà Lan, góp phần truyền bá tư tưởng tự do ở Pháp.