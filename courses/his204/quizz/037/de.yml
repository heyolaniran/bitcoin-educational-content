question: Welcher der folgenden Autoren gehört nicht zum Gournay-Kreis?
answer: Dupont de Nemours
wrong_answers:
  - Véron de Forbonnais
  - Turgot
  - Adam Smith
explanation: |
  Dupont de Nemours war ein Physiokrat, kein Mitglied des Gournay-Kreises. Die Physiokraten hatten Ideen, die denen des Gournay-Kreises nahe standen, aber sie bildeten eine eigene Gruppe.