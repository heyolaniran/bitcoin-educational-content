question: Which of these authors does not belong to the Gournay circle?
answer: Dupont de Nemours
wrong_answers:
  - Véron de Forbonnais
  - Turgot
  - Adam Smith
explanation: |
  Dupont de Nemours was a physiocrat, not a member of the Gournay circle. The physiocrats had ideas close to those of the Gournay circle, but they formed a distinct group.