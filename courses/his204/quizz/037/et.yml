question: Milline neist autoritest ei kuulu Gournay ringkonda?
answer: Dupont de Nemours
wrong_answers:
  - Véron de Forbonnais
  - Turgot
  - Adam Smith
explanation: |
  Dupont de Nemours oli füsiokraat, mitte Gournay ringkonna liige. Füsiokraatide ideed olid lähedased Gournay ringkonna ideedele, kuid nad moodustasid eraldi rühma.