question: کدام یک از این نویسندگان به دایره گورنی تعلق ندارد؟
answer: دوپونت دو نمیور
wrong_answers:
  - ورون دو فوربونیس
  - تورگوt
  - آدام اسمیت
explanation: |
  دوپونت دو نمور یک فیزیوکرات بود، نه عضوی از حلقه گورنی. فیزیوکرات‌ها ایده‌هایی نزدیک به ایده‌های حلقه گورنی داشتند، اما آن‌ها یک گروه متمایز تشکیل دادند.