question: Kuka näistä kirjailijoista ei kuulu Gournayn piiriin?
answer: Dupont de Nemours
wrong_answers:
  - Véron de Forbonnais
  - Turgot
  - Adam Smith
explanation: |
  Dupont de Nemours oli fysiokraatti, ei Gournayn piirin jäsen. Fysiokraattien ajatukset olivat lähellä Gournayn piirin ajatuksia, mutta he muodostivat erillisen ryhmän.