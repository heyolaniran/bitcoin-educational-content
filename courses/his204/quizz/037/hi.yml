question: इनमें से कौन सा लेखक गौरने समूह से संबंधित नहीं है?
answer: ड्यूपॉन्ट डी नेमॉर्स
wrong_answers:
  - वेरोन डे फ़ोरबोनिस
  - टरगोट
  - एडम स्मिथ
explanation: |
  ड्यूपॉन्ट डी नेमोर्स एक फिजियोक्रेट थे, जो गौरने समूह के सदस्य नहीं थे। फिजियोक्रेट के विचार गौरने समूह के विचारों के करीब थे, लेकिन उन्होंने एक अलग समूह बनाया।