question: Siapakah di antara para penulis ini yang tidak termasuk dalam lingkaran Gournay?
answer: Dupont de Nemours
wrong_answers:
  - Véron de Forbonnais
  - Turgot
  - Adam Smith
explanation: |
  Dupont de Nemours adalah seorang fisiokrat, bukan anggota lingkaran Gournay. Kaum fisiokrat memiliki ide-ide yang mirip dengan lingkaran Gournay, tetapi mereka membentuk kelompok yang berbeda.