question: Hvilken av disse forfatterne tilhører ikke Gournay-kretsen?
answer: Dupont de Nemours
wrong_answers:
  - Véron de Forbonnais
  - Turgot
  - Adam Smith
explanation: |
  Dupont de Nemours var fysiokrat, ikke medlem av Gournay-kretsen. Fysiokratene hadde ideer som lå nær Gournay-kretsens, men de utgjorde en egen gruppe.