question: Qual destes autores não pertence ao círculo de Gournay?
answer: Dupont de Nemours
wrong_answers:
  - Véron de Forbonnais
  - Turgot
  - Adam Smith
explanation: |
  Dupont de Nemours era um fisiocrata e não um membro do círculo de Gournay. Os fisiocratas tinham ideias próximas das do círculo de Gournay, mas formavam um grupo distinto.