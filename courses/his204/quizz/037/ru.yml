question: Кто из этих авторов не принадлежит к кругу Гурне?
answer: Дюпон де Немур
wrong_answers:
  - Верон де Форбонне
  - Турго
  - Адам Смит
explanation: |
  Дюпон де Немур был физиократом, а не членом кружка Гурне. Идеи физиократов были близки к идеям кружка Гурне, но они составляли отдельную группу.