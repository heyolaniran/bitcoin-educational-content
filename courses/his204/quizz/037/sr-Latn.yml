question: Koji od ovih autora ne pripada krugu Gournay?
answer: Dupont de Nemours
wrong_answers:
  - Véron de Forbonnais
  - Turgot
  - Adam Smith
explanation: |
  Dupont de Nemours je bio fiziokrata, a ne član Gournay kruga. Fiziokrati su imali ideje slične onima iz Gournay kruga, ali su formirali posebnu grupu.