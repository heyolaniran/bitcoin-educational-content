question: Vilken av dessa författare tillhör inte Gournay-kretsen?
answer: Dupont de Nemours
wrong_answers:
  - Véron de Forbonnais
  - Turgot
  - Adam Smith
explanation: |
  Dupont de Nemours var fysiokrat och inte medlem av Gournay-kretsen. Fysiokraterna hade idéer som låg nära Gournay-kretsens, men de utgjorde en egen grupp.