question: Ni nani kati ya waandishi hawa ambaye si wa mduara wa Gournay?
answer: Dupont de Nemours
wrong_answers:
  - Véron de Forbonnais
  - Turgot
  - Adam Smith
explanation: |
  Dupont de Nemours alikuwa mwanafiziokrati, si mwanachama wa mduara wa Gournay. Wanafiziokrati walikuwa na maoni karibu na yale ya duara ya Gournay, lakini waliunda kikundi tofauti.