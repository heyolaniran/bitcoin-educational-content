question: Tác giả nào sau đây không thuộc nhóm Gournay?
answer: Dupont de Nemours
wrong_answers:
  - Véron de Forbonnais
  - Gà lôi
  - Adam Smith
explanation: |
  Dupont de Nemours là một nhà trọng nông, không phải là thành viên của nhóm Gournay. Những người trọng nông có những ý tưởng gần giống với nhóm Gournay, nhưng họ tạo thành một nhóm riêng biệt.