question: Jaká je teze románu Chinki, histoire cochininoise, použitelná i v jiných zemích?
answer: Že firemní předpisy brání mužům v práci a odrazují je od úsilí
wrong_answers:
  - Že Kočinčína je příkladem liberální vlády
  - Že obchod s obilím musí být volný ve všech přístavech
  - Kočinčína je země bohatá na přírodní zdroje
explanation: |
  "Chinki" kritizuje podnikové regulace, které brzdí hospodářskou činnost a odrazují od individuální iniciativy.