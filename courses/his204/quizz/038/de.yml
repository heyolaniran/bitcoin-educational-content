question: Wie lässt sich die These des Kurzromans Chinki, histoire cochininoise, auf andere Länder übertragen?
answer: Dass die Vorschriften der Unternehmen Männer von der Arbeit abhalten und sie von Anstrengungen abhalten
wrong_answers:
  - Dass Cochinchina ein Beispiel für eine liberale Regierung ist
  - Dass der Getreidehandel in allen Häfen frei sein muss
  - Cochinchina ist ein Land, das reich an natürlichen Ressourcen ist
explanation: |
  "Chinki" kritisiert die Vorschriften für Unternehmen, die die Wirtschaftstätigkeit behindern und die Eigeninitiative entmutigen.