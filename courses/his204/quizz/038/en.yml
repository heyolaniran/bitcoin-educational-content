question: What is the thesis behind the short novel Chinki, histoire cochininoise, applicable to other countries?
answer: That corporate regulations prevent men from working and discourage effort
wrong_answers:
  - That Cochinchina is an example of liberal government
  - That the grain trade must be free through all ports
  - Cochinchina is a country rich in natural resources
explanation: |
  "Chinki" criticizes corporate regulations that hamper economic activity and discourage individual initiative.