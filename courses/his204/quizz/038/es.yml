question: ¿Cuál es la tesis de la novela corta Chinki, histoire cochininoise, aplicable a otros países?
answer: Que la normativa empresarial impide trabajar a los hombres y desincentiva el esfuerzo
wrong_answers:
  - Que Cochinchina es un ejemplo de gobierno liberal
  - Que el comercio de grano debe ser libre a través de todos los puertos
  - Cochinchina es un país rico en recursos naturales
explanation: |
  "Chinki" critica las normativas empresariales que obstaculizan la actividad económica y desalientan la iniciativa individual.