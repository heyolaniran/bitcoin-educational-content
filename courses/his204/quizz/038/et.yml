question: Milline on lühiromaani "Chinki, histoire cochininoise" tees, mis on kohaldatav teistes riikides?
answer: Et ettevõtete eeskirjad takistavad meeste töötamist ja pärsivad pingutusi
wrong_answers:
  - See, et Cochinchina on näide liberaalsest valitsemisest
  - Et teraviljakaubandus peab olema vaba kõigis sadamates
  - Cochinchina on loodusvarade poolest rikas riik
explanation: |
  "Chinki" kritiseerib ettevõtete regulatsioone, mis takistavad majandustegevust ja pärsivad individuaalset algatust.