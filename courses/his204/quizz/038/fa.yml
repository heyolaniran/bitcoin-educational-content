question: پایان‌نامه پشت رمان کوتاه "Chinki, histoire cochininoise" چیست که می‌تواند به کشورهای دیگر اعمال شود؟
answer: مقررات شرکتی مانع از کار کردن مردان می‌شود و تلاش را دلسرد می‌کند.
wrong_answers:
  - که کوچین‌چین نمونه‌ای از حکومت لیبرال است
  - که تجارت غلات باید از طریق همه بنادر آزاد باشد
  - کوچین‌چین کشوری غنی از منابع طبیعی است
explanation: |
  "چینکی" از مقررات شرکتی که فعالیت‌های اقتصادی را مختل کرده و ابتکار فردی را دلسرد می‌کنند، انتقاد می‌کند.