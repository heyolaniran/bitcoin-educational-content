question: Mitä teesiä novellin Chinki, histoire cochininoise taustalla oleva teesi on sovellettavissa muihin maihin?
answer: Yritysten säännökset estävät miehiä tekemästä työtä ja lannistavat ponnisteluita
wrong_answers:
  - Cochinchina on esimerkki liberaalista hallinnosta
  - Viljakaupan on oltava vapaata kaikissa satamissa
  - Cochinchina on maa, jolla on runsaasti luonnonvaroja
explanation: |
  "Chinki" kritisoi yrityssääntelyä, joka haittaa taloudellista toimintaa ja estää yksilöiden aloitteellisuutta.