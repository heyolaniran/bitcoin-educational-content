question: Quelle thèse défend le court roman Chinki, histoire cochininoise applicable à d’autres pays ?
answer: Que les réglements corporatifs empêchent les hommes de travailler et découragent l’effort
wrong_answers:
  - Que la Cochinchine est un exemple de gouvernement libéral
  - Que le commerce des grains doit être libre par tous les ports
  - Que la Cochinchine est un pays riche en ressources naturelles
explanation: |
  "Chinki" critique les réglementations corporatives qui entravent l'activité économique et découragent l'initiative individuelle.
