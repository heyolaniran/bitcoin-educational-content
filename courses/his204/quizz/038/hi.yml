question: लघु उपन्यास 'चिंकी, हिस्ट्री कोचीनिनोइस' के पीछे क्या थीसिस है, जो अन्य देशों पर भी लागू होती है?
answer: कॉर्पोरेट नियम पुरुषों को काम करने से रोकते हैं और प्रयास को हतोत्साहित करते हैं
wrong_answers:
  - कोचीनचिना उदार सरकार का एक उदाहरण है
  - सभी बंदरगाहों से अनाज का व्यापार मुक्त होना चाहिए
  - कोचीनचिना प्राकृतिक संसाधनों से समृद्ध देश है
explanation: |
  "चिंकी" उन कॉर्पोरेट विनियमनों की आलोचना करती है जो आर्थिक गतिविधि में बाधा डालते हैं और व्यक्तिगत पहल को हतोत्साहित करते हैं।