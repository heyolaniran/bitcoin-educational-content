question: Apa tesis di balik novel pendek Chinki, histoire cochininoise, yang dapat diterapkan di negara lain?
answer: Peraturan perusahaan yang menghalangi laki-laki untuk bekerja dan menghambat usaha
wrong_answers:
  - Bahwa Cochinchina adalah contoh pemerintahan liberal
  - Bahwa perdagangan biji-bijian harus bebas melalui semua pelabuhan
  - Cochinchina adalah negara yang kaya akan sumber daya alam
explanation: |
  "Chinki" mengkritik peraturan perusahaan yang menghambat aktivitas ekonomi dan menghambat inisiatif individu.