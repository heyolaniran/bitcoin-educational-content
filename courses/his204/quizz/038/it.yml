question: Qual è la tesi del romanzo breve Chinki, histoire cochininoise, applicabile ad altri Paesi?
answer: Che le norme aziendali impediscono agli uomini di lavorare e scoraggiano gli sforzi
wrong_answers:
  - Che la Cochinchina sia un esempio di governo liberale
  - Che il commercio dei cereali deve essere libero attraverso tutti i porti
  - La Cochinchina è un paese ricco di risorse naturali
explanation: |
  "Chinki" critica i regolamenti aziendali che ostacolano l'attività economica e scoraggiano l'iniziativa individuale.