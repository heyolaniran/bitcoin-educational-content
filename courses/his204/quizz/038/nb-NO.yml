question: Hva er tesen bak kortromanen Chinki, histoire cochininoise, som kan overføres til andre land?
answer: At bedriftsreguleringer hindrer menn i å jobbe og motvirker innsats
wrong_answers:
  - At Cochinchina er et eksempel på liberalt styresett
  - At kornhandelen må være fri gjennom alle havner
  - Cochinchina er et land rikt på naturressurser
explanation: |
  "Chinki" kritiserer selskapsreguleringer som hemmer økonomisk aktivitet og motvirker individuelt initiativ.