question: Jaka teza kryje się za krótką powieścią Chinki, histoire cochininoise, mającą zastosowanie w innych krajach?
answer: Regulacje korporacyjne uniemożliwiają mężczyznom pracę i zniechęcają do wysiłku
wrong_answers:
  - Cochinchina jest przykładem liberalnego rządu
  - Handel zbożem musi być wolny we wszystkich portach
  - Cochinchina to kraj bogaty w zasoby naturalne
explanation: |
  "Chinki" krytykuje regulacje korporacyjne, które hamują działalność gospodarczą i zniechęcają do indywidualnej inicjatywy.