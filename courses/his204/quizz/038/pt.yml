question: Qual é a tese do pequeno romance Chinki, histoire cochininoise, aplicável a outros países?
answer: Que os regulamentos das empresas impedem os homens de trabalhar e desencorajam o esforço
wrong_answers:
  - Que a Cochinchina é um exemplo de governo liberal
  - Que o comércio de cereais deve ser livre em todos os portos
  - A Cochinchina é um país rico em recursos naturais
explanation: |
  "Chinki" critica a regulamentação das empresas que dificulta a atividade económica e desencoraja a iniciativa individual.