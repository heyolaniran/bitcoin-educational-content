question: Какой тезис, лежащий в основе короткого романа "Чинки, история Кохино", применим к другим странам?
answer: Корпоративные правила не позволяют мужчинам работать и препятствуют их усилиям
wrong_answers:
  - Что Кочинчина является примером либерального правительства
  - Торговля зерном должна быть свободной во всех портах
  - Кочин - страна, богатая природными ресурсами
explanation: |
  в "Чинки" критикуются корпоративные правила, которые тормозят экономическую активность и препятствуют индивидуальной инициативе.