question: Koja je teza iza kratkog romana Chinki, histoire cochininoise, primenljiva na druge zemlje?
answer: Da korporativni propisi sprečavaju muškarce da rade i obeshrabruju trud
wrong_answers:
  - Da je Kočin Kina primer liberalne vlade
  - Da trgovina žitom mora biti slobodna kroz sve luke
  - Cochinchina je zemlja bogata prirodnim resursima
explanation: |
  "Chinki" kritikuje korporativne regulative koje ometaju ekonomsku aktivnost i obeshrabruju individualnu inicijativu.