question: Hur kan tesen bakom kortromanen Chinki, histoire cochininoise tillämpas på andra länder?
answer: Att företagsbestämmelser hindrar män från att arbeta och motverkar ansträngning
wrong_answers:
  - Att Cochinchina är ett exempel på liberalt styre
  - Att spannmålshandeln måste vara fri genom alla hamnar
  - Cochinchina är ett land som är rikt på naturresurser
explanation: |
  "Chinki" kritiserar företagsregleringar som hämmar den ekonomiska aktiviteten och motverkar individuella initiativ.