question: Ni nadharia gani iliyo nyuma ya riwaya fupi ya Chinki, histoire cochininoise, inayotumika kwa nchi zingine?
answer: Kwamba kanuni za ushirika huzuia wanaume kufanya kazi na kukatisha tamaa juhudi
wrong_answers:
  - Hiyo Cochinchina ni mfano wa serikali huria
  - Kwamba biashara ya nafaka lazima iwe huru kupitia bandari zote
  - Cochinchina ni nchi yenye utajiri wa maliasili
explanation: |
  "Chinki" inakosoa kanuni za shirika ambazo zinatatiza shughuli za kiuchumi na kukatisha tamaa mpango wa mtu binafsi.