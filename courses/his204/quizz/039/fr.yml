question: Durant quelle décennie le cercle de Gournay a-t-il été en activité ?
answer: La décennie 1750
wrong_answers:
  - La décennie 1740
  - La décennie 1760
  - La décennie 1770
explanation: |
  Le cercle de Gournay était actif dans les années 1750, une période de bouillonnement intellectuel en France.
