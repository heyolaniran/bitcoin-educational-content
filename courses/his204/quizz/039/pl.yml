question: W której dekadzie aktywny był krąg Gournay?
answer: Dekada 1750 r
wrong_answers:
  - Lata czterdzieste XVII wieku
  - Lata sześćdziesiąte XVII wieku
  - Lata siedemdziesiąte
explanation: |
  Krąg Gournaya był aktywny w latach pięćdziesiątych XVII wieku, okresie intelektualnego fermentu we Francji.