question: Jakou slavnou knihu umožnila vydat skupina de Gournay?
answer: Esej o povaze obchodu obecně od Richarda Cantillona
wrong_answers:
  - Politické rozpravy Davida Huma
  - Obchodní smlouvy Josiaha Childa
  - Machiavelliho Princ
explanation: |
  Le cercle de Gournay přispěl k posmrtnému vydání Cantillonova díla "Essai", významného díla ekonomického myšlení.