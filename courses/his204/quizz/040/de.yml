question: Welches berühmte Buch hat die de Gournay-Gruppe ermöglicht?
answer: Essay über das Wesen des Handels im Allgemeinen von Richard Cantillon
wrong_answers:
  - David Humes politische Reden
  - Josiah Childs Handelsverträge
  - Machiavellis Fürst
explanation: |
  Le cercle de Gournay trug zur posthumen Veröffentlichung von Cantillons "Essai" bei, einem Hauptwerk des wirtschaftlichen Denkens.