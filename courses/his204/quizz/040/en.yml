question: What famous book did the de Gournay group enable to be published?
answer: Essay on the nature of commerce in general by Richard Cantillon
wrong_answers:
  - David Hume's Political Discourses
  - Josiah Child's Treaties of Commerce
  - Machiavelli's Prince
explanation: |
  Le cercle de Gournay contributed to the posthumous publication of Cantillon's "Essai", a major work of economic thought.