question: ¿Qué famoso libro permitió publicar el grupo de Gournay?
answer: Ensayo sobre la naturaleza del comercio en general por Richard Cantillon
wrong_answers:
  - Discursos políticos de David Hume
  - Tratados de comercio de Josiah Child
  - El Príncipe de Maquiavelo
explanation: |
  Le cercle de Gournay contribuyó a la publicación póstuma del "Essai" de Cantillon, obra capital del pensamiento económico.