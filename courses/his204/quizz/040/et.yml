question: Millise kuulsa raamatu väljaandmist võimaldas de Gournay rühm?
answer: Richard Cantilloni essee kaubanduse olemusest üldiselt
wrong_answers:
  - David Hume'i poliitilised diskursused
  - Josiah Childi kaubanduslepingud
  - Machiavelli vürst
explanation: |
  Le cercle de Gournay aitas kaasa Cantillon'i "Essai", majanduslike mõtete peateose postuumsele väljaandmisele.