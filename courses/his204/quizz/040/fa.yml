question: کدام کتاب معروف توسط گروه de Gournay منتشر شد؟
answer: مقاله‌ای دربارهٔ ماهیت کلی تجارت اثر ریچارد کانتیلون
wrong_answers:
  - گفتارهای سیاسی دیوید هیوم
  - معاهدات بازرگانی جوزایا چایلد
  - شاهزاده ماکیاولی
explanation: |
  حلقه گورنی به انتشار پس از مرگ "Essai" کانتیلون، یک اثر مهم در اندیشه اقتصادی، کمک کرد.