question: Minkä kuuluisan kirjan de Gournayn ryhmä mahdollisti julkaisemisen?
answer: Richard Cantillonin essee kaupankäynnin luonteesta yleensä
wrong_answers:
  - David Humen poliittiset puheet
  - Josiah Childin kauppasopimukset
  - Machiavellin ruhtinas
explanation: |
  Le cercle de Gournay osallistui Cantillonin "Essai" -teoksen, joka on merkittävä taloustieteellinen teos, postuumisti julkaisemiseen.