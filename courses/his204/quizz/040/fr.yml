question: De quel livre fameux le groupe de Gournay a-t-il permis la publication inédite ?
answer: L’Essai sur la nature du commerce en général de Richard Cantillon
wrong_answers:
  - Les Discours politiques de David Hume
  - Les Traités sur le commerce de Josiah Child
  - Le Prince de Machiavel
explanation: |
  Le cercle de Gournay a contribué à la publication posthume de l'"Essai" de Cantillon, un ouvrage majeur de la pensée économique.
