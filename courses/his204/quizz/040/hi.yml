question: डी गौरने समूह ने किस प्रसिद्ध पुस्तक को प्रकाशित होने में सक्षम बनाया?
answer: रिचर्ड कैंटिलन द्वारा सामान्यतः वाणिज्य की प्रकृति पर निबंध
wrong_answers:
  - डेविड ह्यूम के राजनीतिक प्रवचन
  - जोशिया चाइल्ड की वाणिज्य संधियाँ
  - मैकियावेली का राजकुमार
explanation: |
  ले सर्कल डे गौर्ने ने कैन्टिलन के "एस्से" के मरणोपरांत प्रकाशन में योगदान दिया, जो आर्थिक विचार का एक प्रमुख कार्य था।