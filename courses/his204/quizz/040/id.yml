question: Buku terkenal apa yang memungkinkan kelompok de Gournay untuk diterbitkan?
answer: Esai tentang sifat perdagangan secara umum oleh Richard Cantillon
wrong_answers:
  - Wacana Politik David Hume
  - Perjanjian Perdagangan Josiah Child
  - Pangeran Machiavelli
explanation: |
  Le cercle de Gournay berkontribusi pada publikasi anumerta "Essai" karya Cantillon, sebuah karya besar dalam pemikiran ekonomi.