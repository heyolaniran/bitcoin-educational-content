question: Quale famoso libro il gruppo de Gournay ha permesso di pubblicare?
answer: Saggio sulla natura del commercio in generale di Richard Cantillon
wrong_answers:
  - I discorsi politici di David Hume
  - I trattati di commercio di Josiah Child
  - Il Principe di Machiavelli
explanation: |
  Il Cercle de Gournay contribuì alla pubblicazione postuma dell'"Essai" di Cantillon, un'opera fondamentale del pensiero economico.