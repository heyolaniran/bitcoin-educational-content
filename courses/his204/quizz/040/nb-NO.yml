question: Hvilken berømt bok gjorde de Gournay-gruppen det mulig å få utgitt?
answer: Essay om handelens natur generelt av Richard Cantillon
wrong_answers:
  - David Humes politiske diskurser
  - Josiah Childs handelsavtaler
  - Machiavellis Fyrsten
explanation: |
  Le cercle de Gournay bidro til den posthume utgivelsen av Cantillons "Essai", et hovedverk innen økonomisk tenkning.