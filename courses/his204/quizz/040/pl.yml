question: Jaką słynną książkę grupa de Gournay umożliwiła opublikować?
answer: Esej na temat ogólnej natury handlu autorstwa Richarda Cantillona
wrong_answers:
  - Dyskursy polityczne Davida Hume'a
  - Traktaty handlowe Josiaha Childa
  - Książę Machiavellego
explanation: |
  Le cercle de Gournay przyczynił się do pośmiertnej publikacji "Essai" Cantillona, ważnego dzieła myśli ekonomicznej.