question: Que livro famoso é que o grupo de Gournay permitiu que fosse publicado?
answer: Ensaio sobre a natureza do comércio em geral, por Richard Cantillon
wrong_answers:
  - Os discursos políticos de David Hume
  - Tratados de comércio de Josiah Child
  - O Príncipe de Maquiavel
explanation: |
  O círculo de Gournay contribuiu para a publicação póstuma do "Essai" de Cantillon, uma obra fundamental do pensamento económico.