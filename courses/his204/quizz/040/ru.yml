question: Какую знаменитую книгу удалось опубликовать группе де Гурне?
answer: Эссе о природе коммерции в целом Ричарда Кантильона
wrong_answers:
  - Политические рассуждения Дэвида Юма
  - Торговые договоры Джозайи Чайлда
  - Князь Макиавелли
explanation: |
  Le cercle de Gournay способствовал посмертному изданию "Essai" Кантильона, главного произведения экономической мысли.