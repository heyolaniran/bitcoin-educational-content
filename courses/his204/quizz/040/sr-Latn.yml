question: Koju poznatu knjigu je grupa de Gournay omogućila da bude objavljena?
answer: Esej o prirodi trgovine uopšte od Ričarda Kantijona
wrong_answers:
  - Politički diskursi Davida Humea
  - Josiah Child's Treaties of Commerce
  - Makiavelijev Princ
explanation: |
  Krug Gurnej je doprineo posthumnoj objavi Kantijonovog "Eseja", značajnog dela ekonomske misli.