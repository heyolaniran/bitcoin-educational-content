question: Vilken berömd bok gjorde de Gournay-gruppen det möjligt att publicera?
answer: Essä om handelns natur i allmänhet av Richard Cantillon
wrong_answers:
  - David Humes politiska diskurser
  - Josiah Childs handelsfördrag
  - Machiavellis furste
explanation: |
  Le cercle de Gournay bidrog till den postuma utgivningen av Cantillons "Essai", ett viktigt verk inom ekonomiskt tänkande.