question: Ni kitabu gani maarufu ambacho kikundi cha de Gournay kiliwezesha kuchapishwa?
answer: Insha juu ya asili ya biashara kwa ujumla na Richard Cantillon
wrong_answers:
  - Hotuba za Kisiasa za David Hume
  - Mikataba ya Biashara ya Mtoto wa Yosia
  - Mkuu wa Machiavelli
explanation: |
  Le cercle de Gournay alichangia katika uchapishaji wa baada ya kifo cha Cantillon "Essai", kazi kuu ya mawazo ya kiuchumi.