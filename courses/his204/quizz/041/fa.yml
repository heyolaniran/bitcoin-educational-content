question: به صورت ناشناس منتشر شد، L'Ami des Hommes چنان تأثیری گذاشت که در ابتدا به ? نسبت داده شد.
answer: مونتسکیو
wrong_answers:
  - ولتر
  - دیدرو
  - روسو
explanation: |
  L'Ami des Hommes ابتدا به دلیل سبک و اهمیتش به منتسکیو نسبت داده شد، قبل از اینکه کشف شود که نویسنده در واقع مارکی دو میراپو بوده است.