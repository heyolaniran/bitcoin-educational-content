question: गुमनाम रूप से प्रकाशित, L'Ami des Hommes ने इतना प्रभाव डाला कि शुरू में इसे ?
answer: Montesquieu
wrong_answers:
  - वॉल्टेयर
  - Diderot
  - रूसो
explanation: |
  'लामी देस होम्स' को पहले इसकी शैली और महत्व के कारण मोंटेस्क्यू को जिम्मेदार ठहराया गया था, लेकिन बाद में पता चला कि इसके लेखक वास्तव में मार्क्विस डी मिराब्यू थे।