question: Diterbitkan secara anonim, L'Ami des Hommes memberikan kesan yang begitu mengesankan sehingga pada awalnya dikaitkan dengan ?
answer: Montesquieu
wrong_answers:
  - Voltaire
  - Diderot
  - Rousseau
explanation: |
  L'Ami des Hommes pertama kali dikaitkan dengan Montesquieu karena gaya dan kepentingannya, sebelum diketahui bahwa penulisnya sebenarnya adalah Marquis de Mirabeau.