question: Pubblicato in forma anonima, L'Ami des Hommes fece una tale impressione che inizialmente fu attribuito a ?
answer: Montesquieu
wrong_answers:
  - Voltaire
  - Diderot
  - Rousseau
explanation: |
  L'Ami des Hommes fu inizialmente attribuito a Montesquieu per il suo stile e la sua importanza, prima che si scoprisse che l'autore era in realtà il marchese de Mirabeau.