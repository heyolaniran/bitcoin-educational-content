question: L'Ami des Hommes, som ble utgitt anonymt, gjorde så stort inntrykk at den først ble tilskrevet ?
answer: Montesquieu
wrong_answers:
  - Voltaire
  - Diderot
  - Rousseau
explanation: |
  L'Ami des Hommes ble først tilskrevet Montesquieu på grunn av sin stil og betydning, før det ble oppdaget at forfatteren i virkeligheten var markis de Mirabeau.