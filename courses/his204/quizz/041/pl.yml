question: Opublikowany anonimowo L'Ami des Hommes wywarł takie wrażenie, że początkowo przypisywano go ?
answer: Montesquieu
wrong_answers:
  - Wolter
  - Diderot
  - Rousseau
explanation: |
  L'Ami des Hommes był początkowo przypisywany Montesquieu ze względu na jego styl i znaczenie, zanim odkryto, że autorem był w rzeczywistości markiz de Mirabeau.