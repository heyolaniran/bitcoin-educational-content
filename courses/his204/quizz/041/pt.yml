question: Publicado anonimamente, L'Ami des Hommes causou tal impressão que foi inicialmente atribuído a ?
answer: Montesquieu
wrong_answers:
  - Voltaire
  - Diderot
  - Rousseau
explanation: |
  L'Ami des Hommes foi inicialmente atribuído a Montesquieu pelo seu estilo e importância, antes de se descobrir que o autor era na realidade o Marquês de Mirabeau.