question: Опубликованная анонимно, книга L'Ami des Hommes произвела такое впечатление, что ее первоначально приписывали ?
answer: Монтескье
wrong_answers:
  - Вольтер
  - Дидро
  - Руссо
explanation: |
  Книга "Друзья людей" сначала приписывалась Монтескье за ее стиль и значимость, но потом выяснилось, что ее автором на самом деле был маркиз де Мирабо.