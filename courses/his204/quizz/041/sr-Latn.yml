question: Objavljen anonimno, L'Ami des Hommes ostavio je takav utisak da je isprva pripisan ?
answer: Monteskje
wrong_answers:
  - Volter
  - Diderot
  - Ruso
explanation: |
  L'Ami des Hommes je prvo bio pripisan Montesquieu zbog svog stila i važnosti, pre nego što je otkriveno da je autor zapravo Markiz de Mirabeau.