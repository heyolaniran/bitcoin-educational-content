question: L'Ami des Hommes, som publicerades anonymt, gjorde ett sådant intryck att den först tillskrevs ?
answer: Montesquieu
wrong_answers:
  - Voltaire
  - Diderot
  - Rousseau
explanation: |
  L'Ami des Hommes tillskrevs först Montesquieu på grund av sin stil och betydelse, innan det upptäcktes att författaren i själva verket var markis de Mirabeau.