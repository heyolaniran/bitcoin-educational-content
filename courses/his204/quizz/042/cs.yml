question: Z jakého autora čerpá Mirabeau v L'Ami des Hommes?
answer: François Quesnay
wrong_answers:
  - Vincent de Gournay
  - Richard Cantillon
  - Adam Smith
explanation: |
  Mirabeau se inspiroval myšlenkami Françoise Quesnaye a fyziokracie, která zdůrazňovala význam zemědělství a hospodářské svobody.