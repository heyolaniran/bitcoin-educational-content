question: Auf welchen Autor bezieht sich Mirabeau in L'Ami des Hommes?
answer: François Quesnay
wrong_answers:
  - Vinzenz von Gournay
  - Richard Cantillon
  - Adam Smith
explanation: |
  Mirabeau ließ sich von den Ideen von François Quesnay und der Physiokratie inspirieren, die die Bedeutung der Landwirtschaft und der wirtschaftlichen Freiheit betonten.