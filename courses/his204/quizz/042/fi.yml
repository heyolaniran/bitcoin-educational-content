question: Mihin kirjailijaan Mirabeau tukeutuu teoksessaan L'Ami des Hommes?
answer: François Quesnay
wrong_answers:
  - Vincent de Gournay
  - Richard Cantillon
  - Adam Smith
explanation: |
  Mirabeau sai vaikutteita François Quesnayn ajatuksista ja fysiokratiasta, jossa korostettiin maatalouden ja taloudellisen vapauden merkitystä.