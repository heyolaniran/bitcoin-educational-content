question: Sur quel auteur s’inspire Mirabeau dans l’Ami des Hommes ?
answer: François Quesnay
wrong_answers:
  - Vincent de Gournay
  - Richard Cantillon
  - Adam Smith
explanation: |
  Mirabeau s'est inspiré des idées de François Quesnay et de la physiocratie, qui mettaient l'accent sur l'importance de l'agriculture et de la liberté économique.
