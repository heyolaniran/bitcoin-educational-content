question: एल'अमी डेस होम्स में मिराब्यू ने किस लेखक का चित्रण किया है?
answer: फ़्राँस्वा क्वेस्ने
wrong_answers:
  - विंसेंट डी गौर्ने
  - रिचर्ड कैन्टिलन
  - एडम स्मिथ
explanation: |
  मीराब्यू फ्रांकोइस क्वेस्ने और फिजियोक्रेसी के विचारों से प्रेरित थे, जिसमें कृषि और आर्थिक स्वतंत्रता के महत्व पर जोर दिया गया था।