question: Penulis mana yang menjadi referensi Mirabeau dalam L'Ami des Hommes?
answer: François Quesnay
wrong_answers:
  - Vincent de Gournay
  - Richard Cantillon
  - Adam Smith
explanation: |
  Mirabeau terinspirasi oleh ide-ide François Quesnay dan fisiokrasi, yang menekankan pentingnya pertanian dan kebebasan ekonomi.