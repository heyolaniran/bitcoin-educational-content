question: A quale autore si ispira Mirabeau ne L'Ami des Hommes?
answer: François Quesnay
wrong_answers:
  - Vincent de Gournay
  - Richard Cantillon
  - Adam Smith
explanation: |
  Mirabeau si ispirò alle idee di François Quesnay e della fisiocrazia, che sottolineavano l'importanza dell'agricoltura e della libertà economica.