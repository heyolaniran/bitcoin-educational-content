question: Hvilken forfatter henter Mirabeau inspirasjon fra i L'Ami des Hommes?
answer: François Quesnay
wrong_answers:
  - Vincent de Gournay
  - Richard Cantillon
  - Adam Smith
explanation: |
  Mirabeau var inspirert av François Quesnays ideer og fysiokratiet, som la vekt på jordbruk og økonomisk frihet.