question: Z którego autora czerpie Mirabeau w L'Ami des Hommes?
answer: François Quesnay
wrong_answers:
  - Vincent de Gournay
  - Richard Cantillon
  - Adam Smith
explanation: |
  Mirabeau inspirował się ideami François Quesnaya i fizjokratyzmu, które podkreślały znaczenie rolnictwa i wolności gospodarczej.