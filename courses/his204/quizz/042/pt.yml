question: Em que autor é que Mirabeau se inspira em L'Ami des Hommes?
answer: François Quesnay
wrong_answers:
  - Vincent de Gournay
  - Richard Cantillon
  - Adam Smith
explanation: |
  Mirabeau inspirava-se nas ideias de François Quesnay e da fisiocracia, que enfatizavam a importância da agricultura e da liberdade económica.