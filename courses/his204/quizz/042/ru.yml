question: На какого автора опирается Мирабо в "Людях людей"?
answer: Франсуа Кесне
wrong_answers:
  - Винсент де Гурне
  - Ричард Кантильон
  - Адам Смит
explanation: |
  Мирабо вдохновлялся идеями Франсуа Кеснея и физиократии, которые подчеркивали важность сельского хозяйства и экономической свободы.