question: Na kojeg autora se Mirabeau oslanja u L'Ami des Hommes?
answer: François Quesnay
wrong_answers:
  - Vincent de Gournay
  - Richard Cantillon
  - Adam Smith
explanation: |
  Mirabeau je bio inspirisan idejama Françoisa Quesnaya i fiziokratije, koja je naglašavala važnost poljoprivrede i ekonomske slobode.