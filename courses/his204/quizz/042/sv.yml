question: Vilken författare använder Mirabeau sig av i L'Ami des Hommes?
answer: François Quesnay
wrong_answers:
  - Vincent de Gournay
  - Richard Cantillon
  - Adam Smith
explanation: |
  Mirabeau var inspirerad av François Quesnays idéer och fysiokratin, som betonade vikten av jordbruk och ekonomisk frihet.