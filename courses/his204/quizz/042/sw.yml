question: Je, Mirabeau anavutiwa na mwandishi gani katika L'Ami des Hommes?
answer: François Quesnay
wrong_answers:
  - Vincent de Gournay
  - Richard Cantillon
  - Adam Smith
explanation: |
  Mirabeau alitiwa moyo na mawazo ya François Quesnay na physiocracy, ambayo yalisisitiza umuhimu wa kilimo na uhuru wa kiuchumi.