question: Mirabeau vẽ về tác giả nào trong L'Ami des Hommes?
answer: François Quesnay
wrong_answers:
  - Vincent de Gournay
  - Richard Cantillon
  - Adam Smith
explanation: |
  Mirabeau lấy cảm hứng từ những ý tưởng của François Quesnay và chủ nghĩa trọng nông, nhấn mạnh tầm quan trọng của nông nghiệp và tự do kinh tế.