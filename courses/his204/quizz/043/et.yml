question: Millise raamatu eest Mirabeau vangistati?
answer: Maksustamise teooria
wrong_answers:
  - L'Ami des Hommes
  - Essee kaubanduse olemuse kohta üldiselt
  - Sotsiaalne Contract
explanation: |
  Mirabeau vangistati teose "La Théorie de l'Impôt" eest, milles ta kritiseeris Prantsuse maksusüsteemi.