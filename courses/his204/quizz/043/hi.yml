question: मीराब्यू को किस पुस्तक के लिए कैद किया गया था?
answer: कराधान का सिद्धांत
wrong_answers:
  - लामी देस होम्स
  - सामान्यतः वाणिज्य की प्रकृति पर निबंध
  - सोशल Contract
explanation: |
  मीराब्यू को "ला थ्योरी डे ल'इम्पॉट" नामक कृति के लिए कैद किया गया था, जिसमें उन्होंने फ्रांसीसी कर प्रणाली की आलोचना की थी।