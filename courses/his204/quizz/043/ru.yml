question: За какую книгу Мирабо был заключен в тюрьму?
answer: Теория налогообложения
wrong_answers:
  - L'Ami des Hommes
  - Эссе о природе коммерции в целом
  - Социальный Contract
explanation: |
  Мирабо был заключен в тюрьму за "Теорию импотента", работу, в которой он критиковал французскую налоговую систему.