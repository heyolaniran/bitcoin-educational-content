question: Mirabeau alifungwa kwa kitabu gani?
answer: Nadharia ya Ushuru
wrong_answers:
  - L'Ami des Hommes
  - Insha juu ya asili ya biashara kwa ujumla
  - Contract ya Jamii
explanation: |
  Mirabeau alifungwa kwa ajili ya "La Théorie de l'Impôt", kazi ambayo alikosoa mfumo wa ushuru wa Ufaransa.