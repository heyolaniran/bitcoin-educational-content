question: Mirabeau bị bỏ tù vì cuốn sách nào?
answer: Lý thuyết về thuế
wrong_answers:
  - Bạn của đàn ông
  - Bài luận về bản chất của thương mại nói chung
  - Xã hội Contract
explanation: |
  Mirabeau bị bỏ tù vì tác phẩm "La Théorie de l'Impôt", một tác phẩm mà ông chỉ trích hệ thống thuế của Pháp.