question: Mirabeau hrál aktivní roli ve fyziokratické škole. Koho konkrétně obrátil na víru?
answer: Dupont de Nemours
wrong_answers:
  - François Quesnay
  - Turgot
  - Adam Smith
explanation: |
  Mirabeau přivedl Duponta de Nemours k fyziokratismu a umožnil mu stát se předním zastáncem této myšlenkové školy.