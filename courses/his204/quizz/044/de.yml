question: Mirabeau spielte eine aktive Rolle in der physiokratischen Schule. Wen hat er im Besonderen bekehrt?
answer: Dupont de Nemours
wrong_answers:
  - François Quesnay
  - Turgot
  - Adam Smith
explanation: |
  Mirabeau bekehrte Dupont de Nemours zur Physiokratie und ermöglichte es ihm, ein führender Vertreter dieser Denkschule zu werden.