question: Mirabeau desempeñó un papel activo en la escuela fisiocrática. ¿A quién convirtió en particular?
answer: Dupont de Nemours
wrong_answers:
  - François Quesnay
  - Turgot
  - Adam Smith
explanation: |
  Mirabeau convirtió a Dupont de Nemours a la fisiocracia, lo que permitió a este último convertirse en uno de los principales defensores de esta escuela de pensamiento.