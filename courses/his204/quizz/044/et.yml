question: Mirabeau mängis aktiivset rolli füsiokraatlikus koolkonnas. Keda ta eriti usku pööras?
answer: Dupont de Nemours
wrong_answers:
  - François Quesnay
  - Turgot
  - Adam Smith
explanation: |
  Mirabeau pööras Dupont de Nemours'i füsiokraatia poole, mis võimaldas viimasel saada selle koolkonna juhtivaks propageerijaks.