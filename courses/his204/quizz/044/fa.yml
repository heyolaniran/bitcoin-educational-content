question: میرابو نقش فعالی در مکتب فیزیوکرات داشت. او به‌طور خاص چه کسی را متحول کرد؟
answer: دوپونت دو نمیورز
wrong_answers:
  - فرانسوا کنه
  - ترگوٹ
  - آدام اسمیت
explanation: |
  میرابو دوپونت دو نمور را به فیزیوکراسی تبدیل کرد و این امر به او امکان داد تا به یکی از پیشروان این مکتب فکری تبدیل شود.