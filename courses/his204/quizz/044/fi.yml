question: Mirabeaulla oli aktiivinen rooli fysiokraattisessa koulukunnassa. Kenet hän käännytti erityisesti?
answer: Dupont de Nemours
wrong_answers:
  - François Quesnay
  - Turgot
  - Adam Smith
explanation: |
  Mirabeau käännytti Dupont de Nemoursin fysiokratian kannattajaksi, minkä ansiosta jälkimmäisestä tuli tämän koulukunnan johtava puolestapuhuja.