question: मिराब्यू ने फिजियोक्रेटिक स्कूल में सक्रिय भूमिका निभाई। उन्होंने विशेष रूप से किसे धर्मांतरित किया?
answer: ड्यूपॉन्ट डी नेमॉर्स
wrong_answers:
  - फ़्राँस्वा क्वेस्ने
  - टरगोट
  - एडम स्मिथ
explanation: |
  मिराब्यू ने ड्यूपॉन्ट डी नेमॉर्स को फिजियोक्रेसी में परिवर्तित कर दिया, जिससे बाद में वे इस विचारधारा के अग्रणी समर्थक बन गए।