question: Mirabeau memainkan peran aktif dalam sekolah fisiokratis. Siapa yang secara khusus dia pertobatkan?
answer: Dupont de Nemours
wrong_answers:
  - François Quesnay
  - Turgot
  - Adam Smith
explanation: |
  Mirabeau mengubah Dupont de Nemours menjadi fisiokrasi, sehingga ia menjadi pendukung utama aliran ini.