question: Mirabeau ebbe un ruolo attivo nella scuola fisiocratica. Chi convertì in particolare?
answer: Dupont de Nemours
wrong_answers:
  - François Quesnay
  - Turgot
  - Adam Smith
explanation: |
  Mirabeau convertì Dupont de Nemours alla fisiocrazia, permettendo a quest'ultimo di diventare uno dei principali sostenitori di questa scuola di pensiero.