question: Mirabeau spilte en aktiv rolle i den fysiokratiske skolen. Hvem var det særlig han omvendte?
answer: Dupont de Nemours
wrong_answers:
  - François Quesnay
  - Turgot
  - Adam Smith
explanation: |
  Mirabeau omvendte Dupont de Nemours til fysiokratiet, noe som gjorde Dupont de Nemours til en ledende talsmann for denne retningen.