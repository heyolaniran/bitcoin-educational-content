question: Mirabeau odegrał aktywną rolę w szkole fizjokratycznej. Kogo w szczególności nawrócił?
answer: Dupont de Nemours
wrong_answers:
  - François Quesnay
  - Turgot
  - Adam Smith
explanation: |
  Mirabeau przekonał Dupont de Nemours do fizjokratyzmu, dzięki czemu ten ostatni stał się czołowym orędownikiem tej szkoły myślenia.