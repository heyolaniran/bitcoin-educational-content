question: Mirabeau desempenhou um papel ativo na escola fisiocrática. Quem é que ele converteu em particular?
answer: Dupont de Nemours
wrong_answers:
  - François Quesnay
  - Turgot
  - Adam Smith
explanation: |
  Mirabeau converteu Dupont de Nemours à fisiocracia, permitindo a este último tornar-se um dos principais defensores desta escola de pensamento.