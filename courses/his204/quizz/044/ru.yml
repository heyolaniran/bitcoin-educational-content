question: Мирабо играл активную роль в физиократической школе. Кого он обратил в свою веру?
answer: Дюпон де Немур
wrong_answers:
  - Франсуа Кесне
  - Турго
  - Адам Смит
explanation: |
  Мирабо обратил Дюпона де Немура в физиократию, что позволило последнему стать одним из ведущих сторонников этой школы мысли.