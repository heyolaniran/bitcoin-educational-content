question: Mirabeau je igrao aktivnu ulogu u fiziokratskoj školi. Koga je posebno preobratio?
answer: Dupont de Nemours
wrong_answers:
  - François Quesnay
  - Turgot
  - Adam Smith
explanation: |
  Mirabeau je preobratio Duponta de Nemoursa na fiziokratiju, omogućivši potonjem da postane vodeći zagovornik ove škole mišljenja.