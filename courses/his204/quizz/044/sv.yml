question: Mirabeau spelade en aktiv roll i den fysiokratiska skolan. Vem omvände han särskilt?
answer: Dupont de Nemours
wrong_answers:
  - François Quesnay
  - Turgot
  - Adam Smith
explanation: |
  Mirabeau omvände Dupont de Nemours till fysiokratin, vilket gjorde det möjligt för den senare att bli en ledande förespråkare för denna tankeskola.