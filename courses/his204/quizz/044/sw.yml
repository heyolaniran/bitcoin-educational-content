question: Mirabeau ilichukua jukumu kubwa katika shule ya fizikia. Je, ni nani hasa aliyembadili?
answer: Dupont de Nemours
wrong_answers:
  - François Quesnay
  - Turgot
  - Adam Smith
explanation: |
  Mirabeau alibadilisha Dupont de Nemours kuwa fiziokrasia, na kumwezesha huyu wa pili kuwa mtetezi mkuu wa shule hii ya mawazo.