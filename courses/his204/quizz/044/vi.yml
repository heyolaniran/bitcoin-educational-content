question: Mirabeau đóng vai trò tích cực trong trường phái trọng nông. Ông đã cải đạo cụ thể ai?
answer: Dupont de Nemours
wrong_answers:
  - François Quesnay
  - Gà lôi
  - Adam Smith
explanation: |
  Mirabeau đã cải đạo Dupont de Nemours theo chủ nghĩa trọng nông, giúp ông trở thành người ủng hộ hàng đầu của trường phái tư tưởng này.