question: Co v L'Ami des hommes nenajdete?
answer: Zpracovatelský průmysl skomírá, protože zemědělství přebírá roli zpracovatelského průmyslu
wrong_answers:
  - Národy mají harmonické zájmy
  - Obchod mezi všemi národy by měl být volný
  - Potřeba silné centralizované vlády
explanation: |
  L'Ami des Hommes se zaměřuje na zemědělství a nekritizuje zanedbávání výroby. Naopak, zemědělství považuje za jediný zdroj skutečného bohatství.