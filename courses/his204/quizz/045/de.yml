question: Was gibt es in L'Ami des hommes nicht zu finden?
answer: Das verarbeitende Gewerbe schwächelt, während die Landwirtschaft das verarbeitende Gewerbe ablöst
wrong_answers:
  - Nationen haben harmonische Interessen
  - Der Handel sollte zwischen allen Völkern frei sein
  - Die Notwendigkeit einer starken, zentralisierten Regierung
explanation: |
  L'Ami des Hommes konzentriert sich auf die Landwirtschaft und kritisiert nicht die Vernachlässigung der Industrie. Im Gegenteil, er sieht in der Landwirtschaft die einzige Quelle echten Wohlstands.