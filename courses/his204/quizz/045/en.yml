question: What's not to find in L'Ami des hommes?
answer: Manufacturing languishes as agriculture takes over from manufacturing
wrong_answers:
  - Nations have harmonious interests
  - Trade should be free between all peoples
  - The need for a strong, centralized government
explanation: |
  L'Ami des Hommes focuses on agriculture and does not criticize the neglect of manufacturing. On the contrary, he sees agriculture as the only source of real wealth.