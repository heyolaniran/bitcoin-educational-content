question: چه چیزی در L'Ami des hommes پیدا نمی‌شود؟
answer: تولید در حال رکود است زیرا کشاورزی جایگزین تولید می‌شود
wrong_answers:
  - ملت‌ها دارای منافع هماهنگ هستند
  - تجارت باید بین همه مردم آزاد باشد
  - نیاز به یک دولت قوی و متمرکز
explanation: |
  L'Ami des Hommes بر کشاورزی تمرکز دارد و از بی‌توجهی به تولید انتقاد نمی‌کند. برعکس، او کشاورزی را تنها منبع ثروت واقعی می‌داند.