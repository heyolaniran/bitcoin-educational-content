question: Quelle idée ne trouve-t-on pas dans l’Ami des hommes ?
answer: Les manufactures languissent parce que délaissées au profit de l’agriculture
wrong_answers:
  - Les nations ont des intérêts harmoniques
  - Le commerce devrait être libre entre tous les peuples
  - La nécessité d'un gouvernement fort et centralisé
explanation: |
  L'Ami des Hommes met l'accent sur l'agriculture et ne critique pas le délaissement des manufactures. Au contraire, il considère que l'agriculture est la seule source de richesse véritable.
