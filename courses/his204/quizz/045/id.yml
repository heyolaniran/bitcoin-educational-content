question: Apa yang tidak dapat ditemukan di L'Ami des hommes?
answer: Manufaktur merana karena pertanian mengambil alih dari manufaktur
wrong_answers:
  - Bangsa-bangsa memiliki kepentingan yang harmonis
  - Perdagangan harus bebas antara semua orang
  - Kebutuhan akan pemerintahan yang kuat dan terpusat
explanation: |
  L'Ami des Hommes berfokus pada pertanian dan tidak mengkritik pengabaian manufaktur. Sebaliknya, ia melihat pertanian sebagai satu-satunya sumber kekayaan yang sesungguhnya.