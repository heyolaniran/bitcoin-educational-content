question: Cosa non si trova in L'Ami des hommes?
answer: La produzione langue mentre l'agricoltura prende il posto della manifattura
wrong_answers:
  - Le nazioni hanno interessi armoniosi
  - Il commercio deve essere libero tra tutti i popoli
  - La necessità di un governo forte e centralizzato
explanation: |
  L'Ami des Hommes si concentra sull'agricoltura e non critica l'abbandono della manifattura. Al contrario, vede nell'agricoltura l'unica fonte di ricchezza reale.