question: Hva er det man ikke finner i L'Ami des hommes?
answer: Industrien svinner hen når landbruket overtar for industrien
wrong_answers:
  - Nasjoner har harmoniske interesser
  - Handel skal være fri mellom alle folkeslag
  - Behovet for en sterk, sentralisert regjering
explanation: |
  L'Ami des Hommes fokuserer på landbruket og kritiserer ikke forsømmelsen av industrien. Tvert imot ser han landbruket som den eneste kilden til virkelig rikdom.