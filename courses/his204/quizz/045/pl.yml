question: Czego nie można znaleźć w L'Ami des hommes?
answer: Produkcja słabnie, a rolnictwo przejmuje jej rolę
wrong_answers:
  - Narody mają harmonijne interesy
  - Handel między wszystkimi narodami powinien być wolny
  - Potrzeba silnego, scentralizowanego rządu
explanation: |
  L'Ami des Hommes koncentruje się na rolnictwie i nie krytykuje zaniedbania produkcji. Wręcz przeciwnie, postrzega rolnictwo jako jedyne źródło prawdziwego bogactwa.