question: O que é que não há para encontrar em L'Ami des hommes?
answer: A indústria transformadora definha à medida que a agricultura substitui a indústria transformadora
wrong_answers:
  - As nações têm interesses harmoniosos
  - O comércio deve ser livre entre todos os povos
  - A necessidade de um governo forte e centralizado
explanation: |
  L'Ami des Hommes centra-se na agricultura e não critica o abandono da indústria transformadora. Pelo contrário, considera a agricultura como a única fonte de riqueza real.