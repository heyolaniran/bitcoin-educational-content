question: Чего только нет в L'Ami des hommes?
answer: Промышленное производство затухает по мере того, как сельское хозяйство сменяет производство
wrong_answers:
  - Нации имеют гармоничные интересы
  - Торговля должна быть свободной между всеми народами
  - Необходимость сильного, централизованного правительства
explanation: |
  L'Ami des Hommes уделяет особое внимание сельскому хозяйству и не критикует пренебрежение к обрабатывающей промышленности. Напротив, он рассматривает сельское хозяйство как единственный источник реального богатства.