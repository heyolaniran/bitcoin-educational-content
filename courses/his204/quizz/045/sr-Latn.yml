question: Šta se ne može naći u L'Ami des hommes?
answer: Proizvodnja stagnira dok poljoprivreda preuzima primat od proizvodnje
wrong_answers:
  - Nacije imaju harmonične interese
  - Trgovina bi trebala biti slobodna između svih naroda
  - Potreba za snažnom, centralizovanom vladom
explanation: |
  L'Ami des Hommes se fokusira na poljoprivredu i ne kritikuje zanemarivanje proizvodnje. Naprotiv, on vidi poljoprivredu kao jedini izvor stvarnog bogatstva.