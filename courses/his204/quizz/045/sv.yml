question: Vad är det som inte finns i L'Ami des hommes?
answer: Tillverkningsindustrin försvagas när jordbruket tar över från tillverkningsindustrin
wrong_answers:
  - Nationerna har harmoniska intressen
  - Handel ska vara fri mellan alla folk
  - Behovet av en stark, centraliserad regering
explanation: |
  L'Ami des Hommes fokuserar på jordbruket och kritiserar inte att tillverkningsindustrin försummas. Tvärtom ser han jordbruket som den enda källan till verklig rikedom.