question: Huwezi kupata nini huko L'Ami des hommes?
answer: Uzalishaji unadorora huku kilimo kikichukua nafasi ya viwanda
wrong_answers:
  - Mataifa yana maslahi yenye usawa
  - Biashara inapaswa kuwa huru kati ya watu wote
  - Haja ya kuwa na serikali yenye nguvu na ya kati
explanation: |
  L'Ami des Hommes inaangazia kilimo na haikosoi kupuuzwa kwa utengenezaji wa bidhaa. Kinyume chake, anaona kilimo ndio chanzo pekee cha utajiri wa kweli.