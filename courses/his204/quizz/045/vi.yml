question: Có gì mà bạn không tìm thấy ở L'Ami des hommes?
answer: Sản xuất trì trệ khi nông nghiệp thay thế sản xuất
wrong_answers:
  - Các quốc gia có lợi ích hài hòa
  - Thương mại phải được tự do giữa tất cả mọi người
  - Nhu cầu về một chính quyền mạnh mẽ, tập trung
explanation: |
  L'Ami des Hommes tập trung vào nông nghiệp và không chỉ trích việc bỏ bê sản xuất. Ngược lại, ông coi nông nghiệp là nguồn duy nhất của cải thực sự.