question: Kabla ya uchumi, taaluma ya matibabu ya Quesnay ilikuwa nini?
answer: Daktari wa upasuaji
wrong_answers:
  - Daktari wa meno
  - Muuguzi
  - Mfamasia
explanation: |
  François Quesnay alikuwa daktari wa upasuaji kabla ya kuwa mwanauchumi. Alikuwa hata daktari wa upasuaji wa Madame de Pompadour.