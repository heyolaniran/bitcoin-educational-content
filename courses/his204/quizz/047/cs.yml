question: Proč François Quesnay bydlel ve Versailles v apartmá paní de Pompadour?
answer: Byl jejím osobním lékařem
wrong_answers:
  - Byl to jeden z jejích nejoblíbenějších
  - Hledal její ochranu a výhody
  - Byl jejím finančním poradcem
explanation: |
  Quesnay byl osobním lékařem madame de Pompadour, což mu umožňovalo privilegovaný přístup ke dvoru a ovlivňování politických rozhodnutí.