question: Warum wohnte François Quesnay in Versailles, im Entresol der Appartements von Madame de Pompadour?
answer: Er war ihr Leibarzt
wrong_answers:
  - Es war eines ihrer Lieblingsstücke
  - Er suchte ihren Schutz und ihre Vorteile
  - Er war ihr Finanzberater
explanation: |
  Quesnay war der Leibarzt von Madame de Pompadour, was ihm einen privilegierten Zugang zum Hof verschaffte und es ihm ermöglichte, politische Entscheidungen zu beeinflussen.