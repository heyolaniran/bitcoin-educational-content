question: Why did François Quesnay stay at Versailles, in the entresol of Madame de Pompadour's apartments?
answer: He was her personal physician
wrong_answers:
  - It was one of her favorites
  - He sought her protection and benefits
  - He was her financial advisor
explanation: |
  Quesnay was Madame de Pompadour's personal physician, which gave him privileged access to the court and enabled him to influence political decisions.