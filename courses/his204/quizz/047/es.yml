question: ¿Por qué se alojó François Quesnay en Versalles, en el entresuelo de los apartamentos de Madame de Pompadour?
answer: Era su médico personal
wrong_answers:
  - Era uno de sus favoritos
  - Buscó su protección y beneficios
  - Era su asesor financiero
explanation: |
  Quesnay era el médico personal de Madame de Pompadour, lo que le daba un acceso privilegiado a la corte y le permitía influir en las decisiones políticas.