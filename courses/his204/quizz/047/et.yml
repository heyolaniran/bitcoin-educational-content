question: Miks viibis François Quesnay Versailles's, Madame de Pompadouri korterite entresol'is?
answer: Ta oli tema isiklik arst
wrong_answers:
  - See oli üks tema lemmikuid
  - Ta otsis tema kaitset ja kasu
  - Ta oli tema finantsnõustaja
explanation: |
  Quesnay oli Madame de Pompadouri isiklik arst, mis andis talle privilegeeritud juurdepääsu õukonnale ja võimaldas tal mõjutada poliitilisi otsuseid.