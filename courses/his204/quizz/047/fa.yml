question: چرا فرانسوا کنه در ورسای، در اتاق‌های مادام دو پومپادور اقامت داشت؟
answer: او پزشک شخصی او بود
wrong_answers:
  - این یکی از مورد علاقه‌های او بود
  - او به دنبال حمایت و مزایای او بود
  - او مشاور مالی او بود
explanation: |
  کِنِه پزشک شخصی مادام دو پومپادور بود که به او دسترسی ویژه‌ای به دربار می‌داد و به او امکان می‌داد تا بر تصمیمات سیاسی تأثیر بگذارد.