question: Miksi François Quesnay asui Versailles'ssa Madame de Pompadourin huoneistojen entresolissa?
answer: Hän oli hänen henkilökohtainen lääkärinsä
wrong_answers:
  - Se oli yksi hänen suosikeistaan
  - Hän haki tytön suojelua ja etuja
  - Hän oli hänen taloudellinen neuvonantajansa
explanation: |
  Quesnay oli Madame de Pompadourin henkilökohtainen lääkäri, minkä ansiosta hänellä oli etuoikeutettu pääsy hoviin ja hän pystyi vaikuttamaan poliittisiin päätöksiin.