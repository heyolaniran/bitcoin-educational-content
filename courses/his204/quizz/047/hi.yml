question: फ्रांकोइस क्वेस्ने वर्साय में मैडम डी पोम्पादोर के अपार्टमेंट के प्रवेशद्वार में क्यों रुके थे?
answer: वह उनके निजी चिकित्सक थे
wrong_answers:
  - यह उसकी पसंदीदा में से एक थी
  - वह उसकी सुरक्षा और लाभ चाहता था
  - वह उनके वित्तीय सलाहकार थे
explanation: |
  क्वेस्ने मैडम डी पोम्पादोर के निजी चिकित्सक थे, जिससे उन्हें दरबार में विशेषाधिकार प्राप्त हुआ और वे राजनीतिक निर्णयों को प्रभावित करने में सक्षम हुए।