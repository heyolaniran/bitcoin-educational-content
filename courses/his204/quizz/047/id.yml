question: Mengapa François Quesnay tinggal di Versailles, di entresol apartemen Madame de Pompadour?
answer: Dia adalah dokter pribadinya
wrong_answers:
  - Itu adalah salah satu favoritnya
  - Dia mencari perlindungan dan manfaat baginya
  - Dia adalah penasihat keuangannya
explanation: |
  Quesnay adalah dokter pribadi Madame de Pompadour, yang memberinya akses istimewa ke istana dan memungkinkannya untuk mempengaruhi keputusan politik.