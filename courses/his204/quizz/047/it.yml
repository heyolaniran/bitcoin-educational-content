question: Perché François Quesnay soggiornò a Versailles, nell'entresol degli appartamenti di Madame de Pompadour?
answer: Era il suo medico personale
wrong_answers:
  - Era uno dei suoi preferiti
  - Ha cercato la sua protezione e i suoi benefici
  - Era il suo consulente finanziario
explanation: |
  Quesnay era il medico personale di Madame de Pompadour, il che gli diede un accesso privilegiato alla corte e gli permise di influenzare le decisioni politiche.