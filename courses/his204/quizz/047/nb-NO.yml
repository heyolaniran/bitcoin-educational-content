question: Hvorfor bodde François Quesnay i Versailles, i entreen til Madame de Pompadours leilighet?
answer: Han var hennes personlige lege
wrong_answers:
  - Det var en av hennes favoritter
  - Han søkte hennes beskyttelse og fordeler
  - Han var hennes økonomiske rådgiver
explanation: |
  Quesnay var Madame de Pompadours livlege, noe som ga ham privilegert adgang til hoffet og gjorde ham i stand til å påvirke politiske beslutninger.