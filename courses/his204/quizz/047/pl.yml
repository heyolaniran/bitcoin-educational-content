question: Dlaczego François Quesnay zatrzymał się w Wersalu, w antresoli apartamentów Madame de Pompadour?
answer: Był jej osobistym lekarzem
wrong_answers:
  - Był to jeden z jej ulubionych
  - Szukał jej ochrony i korzyści
  - Był jej doradcą finansowym
explanation: |
  Quesnay był osobistym lekarzem Madame de Pompadour, co dało mu uprzywilejowany dostęp do dworu i umożliwiło wpływanie na decyzje polityczne.