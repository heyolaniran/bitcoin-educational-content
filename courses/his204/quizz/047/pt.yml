question: Porque é que François Quesnay ficou em Versalhes, no entresol dos apartamentos de Madame de Pompadour?
answer: Ele era o seu médico pessoal
wrong_answers:
  - Era um dos seus favoritos
  - Ele procurou a sua proteção e benefícios
  - Ele era o seu consultor financeiro
explanation: |
  Quesnay era o médico pessoal de Madame de Pompadour, o que lhe dava acesso privilegiado à corte e lhe permitia influenciar as decisões políticas.