question: Почему Франсуа Кесне остановился в Версале, в антресолях апартаментов мадам де Помпадур?
answer: Он был ее личным врачом
wrong_answers:
  - Это был один из ее любимых
  - Он искал у нее защиты и выгоды
  - Он был ее финансовым консультантом
explanation: |
  Кесне был личным врачом мадам де Помпадур, что давало ему привилегированный доступ ко двору и позволяло влиять на политические решения.