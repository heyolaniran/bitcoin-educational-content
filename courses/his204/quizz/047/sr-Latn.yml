question: Zašto je François Quesnay boravio u Versaju, u entresolu apartmana Madame de Pompadour?
answer: Bio je njen lični lekar
wrong_answers:
  - To je bila jedna od njenih omiljenih
  - Tražio je njenu zaštitu i beneficije
  - Bio je njen finansijski savetnik
explanation: |
  Kene je bio lični lekar Madame de Pompadour, što mu je omogućilo privilegovan pristup dvoru i omogućilo mu da utiče na političke odluke.