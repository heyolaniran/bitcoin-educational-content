question: Varför bodde François Quesnay i Versailles, i entresolen till Madame de Pompadours lägenheter?
answer: Han var hennes personliga läkare
wrong_answers:
  - Det var en av hennes favoriter
  - Han sökte hennes skydd och förmåner
  - Han var hennes finansiella rådgivare
explanation: |
  Quesnay var Madame de Pompadours livläkare, vilket gav honom privilegierad tillgång till hovet och gjorde det möjligt för honom att påverka politiska beslut.