question: Kwa nini François Quesnay alikaa Versailles, kwenye ukumbi wa vyumba vya Madame de Pompadour?
answer: Alikuwa daktari wake binafsi
wrong_answers:
  - Ilikuwa moja ya vipendwa vyake
  - Alitafuta ulinzi na manufaa yake
  - Alikuwa mshauri wake wa kifedha
explanation: |
  Quesnay alikuwa daktari wa kibinafsi wa Madame de Pompadour, ambayo ilimpa fursa ya upendeleo kwa mahakama na kumwezesha kushawishi maamuzi ya kisiasa.