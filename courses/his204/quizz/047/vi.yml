question: Tại sao François Quesnay lại ở Versailles, tại tầng lửng căn hộ của Madame de Pompadour?
answer: Anh ấy là bác sĩ riêng của cô ấy
wrong_answers:
  - Đó là một trong những sở thích của cô ấy
  - Anh ta tìm kiếm sự bảo vệ và lợi ích của cô ấy
  - Anh ấy là cố vấn tài chính của cô ấy
explanation: |
  Quesnay là bác sĩ riêng của Madame de Pompadour, điều này giúp ông có quyền tiếp cận tòa án và có thể tác động đến các quyết định chính trị.