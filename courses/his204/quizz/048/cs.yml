question: v roce 1757 se zrodila fyziokracie. Jaké dva články publikoval Quesnay v Encyklopedii?
answer: Zemědělci a obilí
wrong_answers:
  - Zájem o peníze a zemědělství
  - Obdělávání půdy a střídání plodin
  - Daně a obchod
explanation: |
  Quesnay publikoval články "Zemědělci" a "Obilí" v Diderotově a d'Alembertově Encyklopedii, čímž se zrodila fyziokracie jako škola ekonomického myšlení.