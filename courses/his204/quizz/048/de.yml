question: 1757 war die Geburtsstunde der Physiokratie. Welche beiden Artikel veröffentlichte Quesnay in der Encyclopédie?
answer: Landwirte und Körner
wrong_answers:
  - Interesse an Geld und Landwirtschaft
  - Bodenbearbeitung und Fruchtfolge
  - Steuern und Handel
explanation: |
  Quesnay veröffentlichte die Artikel "Bauern" und "Getreide" in der Encyclopédie von Diderot und d'Alembert und begründete damit die Physiokratie als Schule des wirtschaftlichen Denkens.