question: 1757 marked the birth of Physiocracy. What two articles did Quesnay publish in the Encyclopédie?
answer: Farmers and Grains
wrong_answers:
  - Interest in money and agriculture
  - Land cultivation and crop rotation
  - Taxes and Trade
explanation: |
  Quesnay published the articles "Farmers" and "Grains" in Diderot and d'Alembert's Encyclopédie, marking the birth of physiocracy as a school of economic thought.