question: 1757 marca el nacimiento de la fisiocracia. ¿Qué dos artículos publicó Quesnay en la Encyclopédie?
answer: Agricultores y cereales
wrong_answers:
  - Interés por el dinero y la agricultura
  - Cultivo de la tierra y rotación de cultivos
  - Impuestos y comercio
explanation: |
  Quesnay publica los artículos "Los agricultores" y "Los cereales" en la Encyclopédie de Diderot y d'Alembert, lo que marca el nacimiento de la fisiocracia como escuela de pensamiento económico.