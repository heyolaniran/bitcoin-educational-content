question: 1757 tähistas füsiokraatia sündi. Millised kaks artiklit avaldas Quesnay Encyclopédie's?
answer: Põllumajandustootjad ja teraviljad
wrong_answers:
  - Huvi raha ja põllumajanduse vastu
  - Maaharimine ja külvikord
  - Maksud ja kaubandus
explanation: |
  Quesnay avaldas artiklid "Põllumehed" ja "Teraviljad" Diderot' ja d'Alembert' Encyclopédie's, mis tähistab füsiokraatia kui majandusmõtte koolkonna sündi.