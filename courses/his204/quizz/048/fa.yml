question: سال 1757 تولد فیزیوکراسی را رقم زد. کدام دو مقاله را کِنِه در دایرةالمعارف منتشر کرد؟
answer: کشاورزان و غلات
wrong_answers:
  - علاقه به پول و کشاورزی
  - کشت زمین و تناوب زراعی
  - مالیات و تجارت
explanation: |
  کنه مقاله‌های "کشاورزان" و "غلات" را در دایرة‌المعارف دیدرو و دالامبر منتشر کرد که نشان‌دهنده تولد فیزیوکراسی به عنوان یک مکتب فکری اقتصادی بود.