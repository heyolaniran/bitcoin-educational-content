question: vuosi 1757 merkitsi fysiokratian syntyä. Mitkä kaksi artikkelia Quesnay julkaisi Encyclopédie-lehdessä?
answer: Viljelijät ja viljat
wrong_answers:
  - Kiinnostus rahaa ja maataloutta kohtaan
  - Maanmuokkaus ja viljelykierto
  - Verot ja kauppa
explanation: |
  Quesnay julkaisi artikkelit "Maanviljelijät" ja "Viljat" Diderot'n ja d'Alembertin Encyclopédie-tietokirjassa, mikä merkitsi fysiokratian syntyä taloudellisen ajattelun koulukuntana.