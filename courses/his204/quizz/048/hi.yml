question: 1757 में फिजियोक्रेसी का जन्म हुआ। क्वेस्ने ने एनसाइक्लोपीडी में कौन से दो लेख प्रकाशित किए?
answer: किसान और अनाज
wrong_answers:
  - धन और कृषि में रुचि
  - भूमि पर खेती और फसल चक्र
  - कर और व्यापार
explanation: |
  क्वेस्ने ने डिडेरो और डी'अलेम्बर्ट के एनसाइक्लोपीडी में "किसान" और "अनाज" नामक लेख प्रकाशित किए, जिससे आर्थिक विचारधारा के एक स्कूल के रूप में फिजियोक्रेसी का जन्म हुआ।