question: tahun 1757 menandai kelahiran Fisiokrasi. Dua artikel apa yang diterbitkan Quesnay dalam Encyclopédie?
answer: Petani dan Biji-bijian
wrong_answers:
  - Ketertarikan pada uang dan pertanian
  - Budidaya lahan dan rotasi tanaman
  - Pajak dan Perdagangan
explanation: |
  Quesnay menerbitkan artikel "Petani" dan "Biji-bijian" dalam Encyclopédie karya Diderot dan d'Alembert, yang menandai lahirnya fisiokrasi sebagai sebuah aliran pemikiran ekonomi.