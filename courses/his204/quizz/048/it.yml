question: il 1757 segna la nascita della Fisiocrazia. Quali sono i due articoli che Quesnay pubblicò nell'Encyclopédie?
answer: Agricoltori e cereali
wrong_answers:
  - Interesse per il denaro e l'agricoltura
  - Coltivazione del terreno e rotazione delle colture
  - Tasse e commercio
explanation: |
  Quesnay pubblicò gli articoli "Agricoltori" e "Grani" nell'Encyclopédie di Diderot e d'Alembert, segnando la nascita della fisiocrazia come scuola di pensiero economico.