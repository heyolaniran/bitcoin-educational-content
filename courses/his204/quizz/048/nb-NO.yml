question: 1757 markerte fysiokratiets fødsel. Hvilke to artikler publiserte Quesnay i Encyclopédie?
answer: Bønder og korn
wrong_answers:
  - Interesse for penger og landbruk
  - Dyrking av jord og vekstskifte
  - Skatter og handel
explanation: |
  Quesnay publiserte artiklene "Bønder" og "Korn" i Diderots og d'Alemberts Encyclopédie, som markerte fysiokratiets fødsel som økonomisk skoleretning.