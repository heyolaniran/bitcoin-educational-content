question: rok 1757 oznaczał narodziny fizjokratyzmu. Jakie dwa artykuły opublikował Quesnay w Encyclopédie?
answer: Rolnicy i zboża
wrong_answers:
  - Zainteresowanie pieniędzmi i rolnictwem
  - Uprawa ziemi i płodozmian
  - Podatki i handel
explanation: |
  Quesnay opublikował artykuły "Farmers" i "Grains" w Encyclopédie Diderota i d'Alemberta, wyznaczając narodziny fizjokracji jako szkoły myśli ekonomicznej.