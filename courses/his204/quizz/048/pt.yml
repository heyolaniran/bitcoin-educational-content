question: 1757 marca o nascimento da Fisiocracia. Que dois artigos publicou Quesnay na Encyclopédie?
answer: Agricultores e cereais
wrong_answers:
  - Interesse pelo dinheiro e pela agricultura
  - Cultivo de terras e rotação de culturas
  - Impostos e comércio
explanation: |
  Quesnay publicou os artigos "Agricultores" e "Grãos" na Encyclopédie de Diderot e d'Alembert, marcando o nascimento da fisiocracia como escola de pensamento económico.