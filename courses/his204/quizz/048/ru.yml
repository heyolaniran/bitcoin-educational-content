question: 1757 год ознаменовался рождением физиократии. Какие две статьи опубликовал Кесней в "Энциклопедии"?
answer: Фермеры и зерно
wrong_answers:
  - Интерес к деньгам и сельскому хозяйству
  - Обработка земли и севооборот
  - Налоги и торговля
explanation: |
  Кесне опубликовал статьи "Фермеры" и "Зерно" в "Энциклопедии" Дидро и д'Алембера, ознаменовав тем самым рождение физиократии как школы экономической мысли.