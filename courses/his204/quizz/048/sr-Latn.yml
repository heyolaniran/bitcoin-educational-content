question: 1757. godine obeležila je rođenje fiziokratije. Koja dva članka je Kene objavio u Enciklopediji?
answer: Poljoprivrednici i žitarice
wrong_answers:
  - Interesovanje za novac i poljoprivredu
  - Obrada zemljišta i plodored
  - Porezi i Trgovina
explanation: |
  Quesnay je objavio članke "Farmers" i "Grains" u Diderotovoj i d'Alembertovoj Enciklopediji, označavajući rođenje fiziokratije kao škole ekonomske misli.