question: 1757 markerade fysiokratins födelse. Vilka två artiklar publicerade Quesnay i Encyclopédie?
answer: Bönder och spannmål
wrong_answers:
  - Intresse för pengar och jordbruk
  - Jordbearbetning och växtföljd
  - Skatter och handel
explanation: |
  Quesnay publicerade artiklarna "Farmers" och "Grains" i Diderots och d'Alemberts Encyclopédie, vilket markerade fysiokratins födelse som en skola för ekonomiskt tänkande.