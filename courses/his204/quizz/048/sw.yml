question: 1757 iliashiria kuzaliwa kwa Fiziokrasia. Quesnay alichapisha makala gani mbili katika Encyclopédie?
answer: Wakulima na Nafaka
wrong_answers:
  - Nia ya pesa na kilimo
  - Kilimo cha ardhi na mzunguko wa mazao
  - Ushuru na Biashara
explanation: |
  Quesnay alichapisha makala "Wakulima" na "Nafaka" katika Diderot na Encyclopédie ya d'Alembert, kuashiria kuzaliwa kwa fiziokrasia kama shule ya mawazo ya kiuchumi.