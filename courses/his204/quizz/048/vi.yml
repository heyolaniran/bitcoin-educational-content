question: Năm 1757 đánh dấu sự ra đời của chủ nghĩa trọng nông. Quesnay đã xuất bản hai bài viết nào trên Encyclopédie?
answer: Nông dân và ngũ cốc
wrong_answers:
  - Quan tâm đến tiền bạc và nông nghiệp
  - Trồng trọt và luân canh cây trồng
  - Thuế và Thương mại
explanation: |
  Quesnay đã xuất bản các bài viết "Nông dân" và "Hạt ngũ cốc" trong bộ Encyclopédie của Diderot và d'Alembert, đánh dấu sự ra đời của chủ nghĩa trọng nông như một trường phái tư tưởng kinh tế.