question: Odkud pochází pojem fyziokracie?
answer: Ve významu "vláda přírody" byl poprvé použit jako název Quesnayovy sbírky článků
wrong_answers:
  - Tento název, který znamená "láska k přírodě", přijala skupina agronomů, kteří se brzy stali ekonomy
  - Název, který dali Řekové pro označení hospodářské politiky, převzal Quesnay pro pojmenování nové ekonomické vědy
  - Tento termín vymyslel Voltaire, aby zesměšnil Quesnayovy myšlenky
explanation: |
  Termín "fyziokracie" znamená "vláda přírody" a Quesnay jím označil své ekonomické učení, které zdůrazňovalo význam zemědělství a přirozeného řádu.