question: Woher kommt der Begriff Physiokratie?
answer: Er bedeutet "Regierung der Natur" und wurde erstmals als Titel einer Sammlung von Artikeln von Quesnay verwendet
wrong_answers:
  - Der Name bedeutet "Liebe zur Natur" und wurde von einer Gruppe von Agronomen angenommen, die bald zu Ökonomen werden sollten
  - Ein von den Griechen gegebener Name für die Wirtschaftspolitik, der von Quesnay aufgegriffen wurde, um die neue Wissenschaft der Ökonomie zu benennen
  - Dieser Begriff wurde von Voltaire geprägt, um sich über die Ideen von Quesnay lustig zu machen
explanation: |
  Der Begriff "Physiokratie" bedeutet "Regierung der Natur" und wurde von Quesnay verwendet, um seine Wirtschaftslehre zu bezeichnen, die die Bedeutung der Landwirtschaft und der natürlichen Ordnung hervorhob.