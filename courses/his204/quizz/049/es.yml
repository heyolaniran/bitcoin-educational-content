question: ¿De dónde procede el término fisiocracia?
answer: Significa gobierno de la naturaleza y se utilizó por primera vez como título de una colección de artículos de Quesnay
wrong_answers:
  - Significa "amor a la naturaleza" y fue el nombre adoptado por un grupo de agrónomos que pronto se convertirían en economistas
  - Nombre dado por los griegos para designar la política económica, fue retomado por Quesnay para denominar la nueva ciencia económica
  - Este término fue acuñado por Voltaire para burlarse de las ideas de Quesnay
explanation: |
  El término "fisiocracia" significa "gobierno de la naturaleza" y fue utilizado por Quesnay para designar su doctrina económica, que hacía hincapié en la importancia de la agricultura y el orden natural.