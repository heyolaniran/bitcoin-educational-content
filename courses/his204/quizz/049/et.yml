question: Kust pärineb mõiste "füsiokraatia"?
answer: See tähendab looduse valitsemist ja seda kasutati esmakordselt Quesnay artiklikogumiku pealkirjana
wrong_answers:
  - Tähendab "armastust looduse vastu", see oli nimi, mille võttis vastu grupp agronoome, kellest peagi said majandusteadlased
  - Kreeklaste poolt majanduspoliitika tähistamiseks antud nimetus, mille Quesnay võttis üle uue majandusteaduse nimetamiseks
  - Selle termini mõtles välja Voltaire, et mõnitada Quesnay ideid
explanation: |
  Mõiste "füsiokraatia" tähendab "looduse valitsemist" ja seda kasutas Quesnay oma majandusdoktriini tähistamiseks, mis rõhutas põllumajanduse ja loodusliku korra tähtsust.