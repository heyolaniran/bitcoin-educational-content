question: اصطلاح فیزیوکراسی از کجا آمده است؟
answer: به معنای حکومت طبیعت، این عنوان برای اولین بار به عنوان عنوان مجموعه‌ای از مقالات توسط کِنِه استفاده شد.
wrong_answers:
  - به معنای "عشق به طبیعت"، این نامی بود که توسط گروهی از کشاورزان که به زودی اقتصاددان شدند، انتخاب شد.
  - نامی که یونانیان برای تعیین سیاست اقتصادی به کار بردند، توسط کِنِه برای نامگذاری علم جدید اقتصاد استفاده شد.
  - این اصطلاح توسط ولتر برای تمسخر ایده‌های کِسنه ابداع شد
explanation: |
  اصطلاح "فیزیوکراسی" به معنای "حکومت طبیعت" است و توسط کِنِه برای تعیین دکترین اقتصادی او استفاده شد که بر اهمیت کشاورزی و نظم طبیعی تأکید داشت.