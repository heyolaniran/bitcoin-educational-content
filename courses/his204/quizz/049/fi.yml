question: Mistä termi fysiokratia on peräisin?
answer: Se tarkoitti luonnonhallintoa ja sitä käytettiin ensimmäisen kerran Quesnayn artikkelikokoelman otsikkona
wrong_answers:
  - Se tarkoittaa "luonnonrakkautta", ja sen nimen otti käyttöön joukko agronomeja, joista pian tuli taloustieteilijöitä
  - Kreikkalaisten talouspolitiikalle antama nimi, jonka Quesnay otti käyttöön nimeksi uudelle taloustieteelle
  - Voltaire keksi tämän termin pilkatakseen Quesnayn ajatuksia
explanation: |
  Termi "fysiokratia" tarkoittaa "luonnonhallintoa", ja Quesnay käytti sitä kuvaamaan talousoppiaan, jossa korostettiin maatalouden ja luonnonjärjestyksen merkitystä.