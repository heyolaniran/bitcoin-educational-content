question: फिजियोक्रेसी शब्द कहां से आया है?
answer: इसका अर्थ है प्रकृति की सरकार, इसका पहली बार उपयोग क्वेस्ने द्वारा लेखों के संग्रह के शीर्षक के रूप में किया गया था
wrong_answers:
  - इसका अर्थ है "प्रकृति से प्रेम", यह नाम कृषि वैज्ञानिकों के एक समूह द्वारा अपनाया गया था जो जल्द ही अर्थशास्त्री बन गए
  - आर्थिक नीति को नामित करने के लिए यूनानियों द्वारा दिया गया यह नाम, क्वेस्ने द्वारा अर्थशास्त्र के नए विज्ञान का नाम रखने के लिए अपनाया गया था
  - यह शब्द क्वेस्ने के विचारों का मजाक उड़ाने के लिए वॉल्टेयर द्वारा गढ़ा गया था
explanation: |
  "फिजियोक्रेसी" शब्द का अर्थ है "प्रकृति की सरकार" और इसका प्रयोग क्वेस्ने ने अपने आर्थिक सिद्धांत को निर्दिष्ट करने के लिए किया था, जिसमें कृषि और प्राकृतिक व्यवस्था के महत्व पर जोर दिया गया था।