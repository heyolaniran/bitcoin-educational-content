question: Dari mana istilah Fisiokrasi berasal?
answer: Berarti pemerintahan alam, kata ini pertama kali digunakan sebagai judul kumpulan artikel oleh Quesnay
wrong_answers:
  - Berarti "cinta alam", nama ini diadopsi oleh sekelompok ahli agronomi yang kemudian menjadi ekonom
  - Sebuah nama yang diberikan oleh orang Yunani untuk menunjukkan kebijakan ekonomi, yang diambil oleh Quesnay untuk menamai ilmu ekonomi yang baru
  - Istilah ini diciptakan oleh Voltaire untuk mengejek gagasan Quesnay
explanation: |
  Istilah "Fisiokrasi" berarti "pemerintahan alam" dan digunakan oleh Quesnay untuk menunjukkan doktrin ekonominya, yang menekankan pentingnya pertanian dan tatanan alam.