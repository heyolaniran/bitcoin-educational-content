question: Da dove deriva il termine Fisiocrazia?
answer: Significa governo della natura e fu usato per la prima volta come titolo di una raccolta di articoli di Quesnay
wrong_answers:
  - Significa "amore per la natura" ed è il nome adottato da un gruppo di agronomi che presto diventeranno economisti
  - Nome dato dai greci per indicare la politica economica, fu ripreso da Quesnay per denominare la nuova scienza economica
  - Questo termine è stato coniato da Voltaire per deridere le idee di Quesnay
explanation: |
  Il termine "Fisiocrazia" significa "governo della natura" e fu usato da Quesnay per designare la sua dottrina economica, che sottolineava l'importanza dell'agricoltura e dell'ordine naturale.