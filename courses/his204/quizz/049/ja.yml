question: フィジオクラシーという言葉の由来は？
answer: 自然の政府を意味するこの言葉は、ケネーによる論文集のタイトルとして初めて使われた。
wrong_answers:
  - 自然への愛」を意味するこの名前は、やがて経済学者になる農学者たちによって採用された。
  - ギリシャ人が経済政策を示すためにつけた名前で、ケネーによって新しい経済学につけられた。
  - この言葉はヴォルテールがケネーの思想を嘲笑するために作ったものである。
explanation: |
  フィジオクラシー（Physiocracy）」とは「自然の政府」という意味で、ケネーが農業と自然の摂理を重視する彼の経済学説を示すために用いた言葉である。