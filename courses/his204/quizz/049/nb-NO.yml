question: Hvor kommer begrepet fysiokrati fra?
answer: Det betyr naturstyre, og ble først brukt som tittel på en artikkelsamling av Quesnay
wrong_answers:
  - Navnet betyr "kjærlighet til naturen", og ble tatt i bruk av en gruppe agronomer som snart skulle bli økonomer
  - Et navn grekerne brukte om økonomisk politikk, og som Quesnay tok opp som navn på den nye økonomiske vitenskapen
  - Dette begrepet ble skapt av Voltaire for å håne Quesnays ideer
explanation: |
  Begrepet "fysiokrati" betyr "naturstyre" og ble brukt av Quesnay for å betegne hans økonomiske doktrine, som la vekt på jordbrukets betydning og naturens orden.