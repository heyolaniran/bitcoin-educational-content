question: Skąd pochodzi termin fizjokracja?
answer: Oznaczające rząd natury, zostało po raz pierwszy użyte jako tytuł zbioru artykułów Quesnaya
wrong_answers:
  - Oznacza "miłość do natury", była to nazwa przyjęta przez grupę agronomów, którzy wkrótce stali się ekonomistami
  - Nazwa nadana przez Greków na określenie polityki gospodarczej, została przejęta przez Quesnaya do nazwania nowej nauki ekonomii
  - Termin ten został ukuty przez Voltaire'a, aby wyśmiać idee Quesnaya
explanation: |
  Termin "fizjokracja" oznacza "rząd natury" i był używany przez Quesnaya do określenia jego doktryny ekonomicznej, która podkreślała znaczenie rolnictwa i naturalnego porządku.