question: De onde vem o termo Fisiocracia?
answer: Significando governo da natureza, foi usado pela primeira vez como título de uma coleção de artigos de Quesnay
wrong_answers:
  - Significando "amor à natureza", foi o nome adotado por um grupo de agrónomos que em breve se tornariam economistas
  - Nome dado pelos gregos para designar a política económica, foi retomado por Quesnay para designar a nova ciência da economia
  - Este termo foi cunhado por Voltaire para gozar com as ideias de Quesnay
explanation: |
  O termo "Fisiocracia" significa "governo da natureza" e foi utilizado por Quesnay para designar a sua doutrina económica, que enfatizava a importância da agricultura e da ordem natural.