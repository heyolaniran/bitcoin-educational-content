question: Откуда взялся термин "физиократия"?
answer: Означающее "правительство природы", оно было впервые использовано в качестве названия сборника статей Кеснея
wrong_answers:
  - Это название, означающее "любовь к природе", было принято группой агрономов, которые вскоре стали экономистами
  - Название, данное греками для обозначения экономической политики, было взято Кеснеем для названия новой экономической науки
  - Этот термин был придуман Вольтером, чтобы высмеять идеи Кеснея
explanation: |
  Термин "физиократия" означает "правительство природы" и был использован Кеснеем для обозначения его экономической доктрины, которая подчеркивала важность сельского хозяйства и естественного порядка.