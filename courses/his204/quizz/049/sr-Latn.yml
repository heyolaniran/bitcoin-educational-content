question: Odakle potiče termin fiziokratija?
answer: Značenje vlada prirode, prvi put je korišćeno kao naslov zbirke članaka od strane Keneja.
wrong_answers:
  - Značenje "ljubav prema prirodi", to je bilo ime koje je usvojila grupa agronoma koji su ubrzo postali ekonomisti.
  - Ime koje su Grci dali za označavanje ekonomske politike, preuzeo ga je Quesnay da imenuje novu nauku ekonomije.
  - Ovaj termin je skovao Volter kako bi ismejao Kesneove ideje.
explanation: |
  Termin "Fiziokratija" znači "vladavina prirode" i koristio ga je Kene da označi svoju ekonomsku doktrinu, koja je naglašavala važnost poljoprivrede i prirodnog poretka.