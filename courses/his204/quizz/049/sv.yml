question: Var kommer begreppet fysiokrati ifrån?
answer: Betyder naturens regering och användes först som titel på en samling artiklar av Quesnay
wrong_answers:
  - Det betyder "kärlek till naturen" och var det namn som antogs av en grupp agronomer som snart skulle bli ekonomer
  - Ett namn som grekerna använde för att beteckna ekonomisk politik och som togs upp av Quesnay för att namnge den nya ekonomiska vetenskapen
  - Denna term myntades av Voltaire för att håna Quesnays idéer
explanation: |
  Termen "fysiokrati" betyder "naturstyre" och användes av Quesnay för att beteckna hans ekonomiska doktrin, som betonade vikten av jordbruk och den naturliga ordningen.