question: Neno Fiziokrasia linatoka wapi?
answer: Ikimaanisha serikali ya asili, ilitumiwa kwanza kama jina la mkusanyiko wa makala na Quesnay
wrong_answers:
  - Likimaanisha "upendo wa maumbile", lilikuwa jina lililopitishwa na kikundi cha wataalamu wa kilimo ambao hivi karibuni walikuwa wachumi.
  - Jina lililopewa na Wagiriki kuteua sera ya kiuchumi, ilichukuliwa na Quesnay kutaja sayansi mpya ya uchumi.
  - Neno hili lilianzishwa na Voltaire ili kudhihaki mawazo ya Quesnay
explanation: |
  Neno "Physiocracy" linamaanisha "serikali ya asili" na lilitumiwa na Quesnay kutaja fundisho lake la kiuchumi, ambalo lilisisitiza umuhimu wa kilimo na utaratibu wa asili.