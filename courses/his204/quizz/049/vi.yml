question: Thuật ngữ Trọng nông bắt nguồn từ đâu?
answer: Có nghĩa là chính quyền của thiên nhiên, lần đầu tiên nó được sử dụng làm tiêu đề cho một tập hợp các bài viết của Quesnay
wrong_answers:
  - Có nghĩa là "tình yêu thiên nhiên", đó là cái tên được một nhóm các nhà nông học sử dụng, những người sau này trở thành nhà kinh tế học
  - Một cái tên do người Hy Lạp đặt để chỉ chính sách kinh tế, được Quesnay sử dụng để đặt tên cho ngành khoa học kinh tế mới
  - Thuật ngữ này được Voltaire đặt ra để chế giễu những ý tưởng của Quesnay
explanation: |
  Thuật ngữ "Physiocracy" có nghĩa là "chính quyền của thiên nhiên" và được Quesnay sử dụng để chỉ học thuyết kinh tế của ông, nhấn mạnh tầm quan trọng của nông nghiệp và trật tự tự nhiên.