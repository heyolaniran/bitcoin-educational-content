question: Jakou kritiku Quesnay adresoval svým žákům?
answer: Jejich sektářský charakter
wrong_answers:
  - Jejich přílišný liberalismus
  - Jejich spokojenost s mocí Ludvíka XV
  - Jejich nedostatečná vědecká přísnost
explanation: |
  Quesnay kritizoval své stoupence za jejich sektářství a nedostatek otevřenosti vůči jiným myšlenkám. Obával se, že jejich dogmatismus bude bránit šíření fyziokracie.