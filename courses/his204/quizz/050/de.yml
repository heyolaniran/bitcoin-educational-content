question: Welche Kritik hat Quesnay an seinen Schülern geübt?
answer: Ihr sektenartiger Charakter
wrong_answers:
  - Ihr übertriebener Liberalismus
  - Ihre Selbstzufriedenheit mit der Macht von Ludwig XV
  - Ihr Mangel an wissenschaftlicher Strenge
explanation: |
  Quesnay kritisierte seine Anhänger für ihr Sektierertum und ihre mangelnde Offenheit gegenüber anderen Ideen. Er befürchtete, dass ihr Dogmatismus die Verbreitung der Physiokratie behindern würde.