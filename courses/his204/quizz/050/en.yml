question: What criticism did Quesnay level at his disciples?
answer: Their sectarian nature
wrong_answers:
  - Their excessive liberalism
  - Their complacency with the power of Louis XV
  - Their lack of scientific rigor
explanation: |
  Quesnay criticized his followers for their sectarianism and lack of openness to other ideas. He feared that their dogmatism would hinder the spread of physiocracy.