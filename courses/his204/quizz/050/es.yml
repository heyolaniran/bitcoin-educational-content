question: ¿Qué crítica dirigió Quesnay a sus discípulos?
answer: Su carácter sectario
wrong_answers:
  - Su excesivo liberalismo
  - Su complacencia con el poder de Luis XV
  - Su falta de rigor científico
explanation: |
  Quesnay criticaba a sus seguidores por su sectarismo y su falta de apertura a otras ideas. Temía que su dogmatismo obstaculizara la difusión de la fisiocracia.