question: Millist kriitikat tegi Quesnay oma õpilastele?
answer: Nende sektantlik olemus
wrong_answers:
  - Nende liigne liberalism
  - Nende rahulolu Louis XV võimuga
  - Nende teadusliku ranguse puudumine
explanation: |
  Quesnay kritiseeris oma järgijaid sektantluse ja teiste ideede suhtes vähese avatuse eest. Ta kartis, et nende dogmatism takistab füsiokraatia levikut.