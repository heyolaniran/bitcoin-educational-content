question: کزنای چه انتقادی به شاگردانش وارد کرد؟
answer: ماهیت فرقه‌ای آن‌ها
wrong_answers:
  - لیبرالیسم بیش از حد آنها
  - رضایت آن‌ها از قدرت لویی پانزدهم
  - فقدان دقت علمی آن‌ها
explanation: |
  کنه پیروان خود را به خاطر فرقه‌گرایی و عدم پذیرش ایده‌های دیگر مورد انتقاد قرار داد. او نگران بود که جزم‌اندیشی آن‌ها مانع از گسترش فیزیوکراسی شود.