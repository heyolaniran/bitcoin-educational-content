question: Mitä kritiikkiä Quesnay esitti opetuslapsilleen?
answer: Niiden lahkolaisuus
wrong_answers:
  - Heidän liiallinen liberalisminsa
  - Heidän tyytyväisyytensä Ludvig XV:n valtaan -
  - Tieteellisen tarkkuuden puute
explanation: |
  Quesnay kritisoi seuraajiaan heidän lahkolaisuudestaan ja avoimuuden puutteesta muita ajatuksia kohtaan. Hän pelkäsi, että heidän dogmatisminsa estäisi fysiokratian leviämisen.