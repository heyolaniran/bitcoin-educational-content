question: Quel reproche Quesnay faisait-il à ses disciples ?
answer: Leur caractère sectaire
wrong_answers:
  - Leur excès de libéralisme
  - Leur complaisance avec le pouvoir de Louis XV
  - Leur manque de rigueur scientifique
explanation: |
  Quesnay reprochait à ses disciples leur caractère sectaire et leur manque d'ouverture aux autres idées. Il craignait que leur dogmatisme ne nuise à la diffusion de la physiocratie.
