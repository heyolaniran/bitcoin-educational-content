question: क्वेस्ने ने अपने शिष्यों पर क्या आलोचना की?
answer: उनका सांप्रदायिक स्वभाव
wrong_answers:
  - उनका अत्यधिक उदारवाद
  - लुई XV की शक्ति के प्रति उनकी आत्मसंतुष्टि
  - उनमें वैज्ञानिक दृढ़ता का अभाव है
explanation: |
  क्वेस्ने ने अपने अनुयायियों की उनके संप्रदायवाद और अन्य विचारों के प्रति खुलेपन की कमी के लिए आलोचना की। उन्हें डर था कि उनकी हठधर्मिता फिजियोक्रेसी के प्रसार में बाधा उत्पन्न करेगी।