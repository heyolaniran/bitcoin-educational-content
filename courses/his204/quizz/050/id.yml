question: Kritik apa yang dilontarkan Quesnay kepada para muridnya?
answer: Sifat sektarian mereka
wrong_answers:
  - Liberalisme mereka yang berlebihan
  - Rasa puas diri mereka dengan kekuatan Louis XV
  - Kurangnya ketelitian ilmiah mereka
explanation: |
  Quesnay mengkritik para pengikutnya karena sektarianisme dan kurangnya keterbukaan terhadap ide-ide lain. Ia khawatir bahwa dogmatisme mereka akan menghalangi penyebaran fisiokrasi.