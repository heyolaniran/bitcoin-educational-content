question: Quali critiche Quesnay rivolgeva ai suoi discepoli?
answer: La loro natura settaria
wrong_answers:
  - Il loro eccessivo liberalismo
  - Il loro compiacimento per il potere di Luigi XV
  - La loro mancanza di rigore scientifico
explanation: |
  Quesnay criticò i suoi seguaci per il loro settarismo e la mancanza di apertura verso altre idee. Temeva che il loro dogmatismo avrebbe ostacolato la diffusione della fisiocrazia.