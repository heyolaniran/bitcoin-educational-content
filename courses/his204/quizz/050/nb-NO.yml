question: Hvilken kritikk rettet Quesnay mot sine disipler?
answer: Deres sekteriske natur
wrong_answers:
  - Deres overdrevne liberalisme
  - Deres selvtilfredshet med Ludvig XVs makt
  - Deres mangel på vitenskapelig stringens
explanation: |
  Quesnay kritiserte sine tilhengere for deres sekterisme og mangel på åpenhet for andre ideer. Han fryktet at deres dogmatisme ville hindre utbredelsen av fysiokratiet.