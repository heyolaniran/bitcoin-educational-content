question: Jaką krytykę Quesnay skierował pod adresem swoich uczniów?
answer: Ich sekciarski charakter
wrong_answers:
  - Ich nadmierny liberalizm
  - Ich samozadowolenie z władzy Ludwika XV
  - Ich brak rygoru naukowego
explanation: |
  Quesnay krytykował swoich zwolenników za ich sekciarstwo i brak otwartości na inne idee. Obawiał się, że ich dogmatyzm utrudni rozprzestrzenianie się fizjokratyzmu.