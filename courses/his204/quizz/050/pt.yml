question: Que críticas fez Quesnay aos seus discípulos?
answer: O seu carácter sectário
wrong_answers:
  - O seu liberalismo excessivo
  - A sua complacência com o poder de Luís XV
  - A sua falta de rigor científico
explanation: |
  Quesnay criticou os seus seguidores pelo seu sectarismo e falta de abertura a outras ideias. Temia que o seu dogmatismo impedisse a difusão da fisiocracia.