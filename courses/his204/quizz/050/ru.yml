question: Какую критику Кесне обрушил на своих учеников?
answer: Их сектантский характер
wrong_answers:
  - Их чрезмерный либерализм
  - Их самодовольство властью Людовика XV
  - Отсутствие научной строгости
explanation: |
  Кесней критиковал своих последователей за их сектантство и отсутствие открытости к другим идеям. Он опасался, что их догматизм помешает распространению физиократии.