question: Kakvu je kritiku Quesnay uputio svojim učenicima?
answer: Njihova sektaška priroda
wrong_answers:
  - Njihov prekomerni liberalizam
  - Njihova samozadovoljnost sa moći Luja XV
  - Njihov nedostatak naučne rigoroznosti
explanation: |
  Quesnay je kritikovao svoje sledbenike zbog njihovog sektaštva i nedostatka otvorenosti prema drugim idejama. Plašio se da će njihov dogmatizam ometati širenje fiziokratije.