question: Vilken kritik riktade Quesnay mot sina lärjungar?
answer: Deras sekteristiska karaktär
wrong_answers:
  - Deras överdrivna liberalism
  - Deras självbelåtenhet med Ludvig XV:s makt
  - Deras brist på vetenskaplig stringens
explanation: |
  Quesnay kritiserade sina anhängare för deras sekterism och brist på öppenhet för andra idéer. Han fruktade att deras dogmatism skulle hindra spridningen av fysiokratin.