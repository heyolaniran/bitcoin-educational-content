question: Quesnay aliweka shutuma gani kwa wanafunzi wake?
answer: Asili yao ya kimadhehebu
wrong_answers:
  - Uliberali wao wa kupindukia
  - Kuridhika kwao na nguvu ya Louis XV
  - Ukosefu wao wa ukali wa kisayansi
explanation: |
  Quesnay aliwakosoa wafuasi wake kwa udini wao na ukosefu wa uwazi kwa mawazo mengine. Alihofia kwamba mafundisho yao ya sharti yangezuia kuenea kwa physiocracy.