question: Quesnay đã chỉ trích các môn đồ của mình như thế nào?
answer: Bản chất giáo phái của họ
wrong_answers:
  - Chủ nghĩa tự do quá mức của họ
  - Sự tự mãn của họ với quyền lực của Louis XV
  - Sự thiếu nghiêm ngặt về mặt khoa học của họ
explanation: |
  Quesnay chỉ trích những người theo ông vì chủ nghĩa bè phái và thiếu cởi mở với những ý tưởng khác. Ông lo sợ rằng chủ nghĩa giáo điều của họ sẽ cản trở sự lan rộng của chế độ trọng nông.