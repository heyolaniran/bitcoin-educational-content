question: Která postava představuje chybějící článek mezi Boisguilbertem a fyziokraty?
answer: Vincent de Gournay
wrong_answers:
  - Voltaire
  - Turgot
  - Colbert
explanation: |
  Vincent de Gournay ovlivnil Boisguilberta i fyziokraty, šířil liberální myšlenky a kritizoval přílišné státní zásahy do ekonomiky.