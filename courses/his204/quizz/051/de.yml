question: Welche Figur stellt das fehlende Bindeglied zwischen Boisguilbert und den Physiokraten dar?
answer: Vinzenz von Gournay
wrong_answers:
  - Voltaire
  - Turgot
  - Colbert
explanation: |
  Vincent de Gournay beeinflusste sowohl Boisguilbert als auch die Physiokraten, indem er liberale Ideen verbreitete und übermäßige staatliche Eingriffe in die Wirtschaft kritisierte.