question: ¿Qué personaje representa el eslabón perdido entre Boisguilbert y los fisiócratas?
answer: Vincent de Gournay
wrong_answers:
  - Voltaire
  - Turgot
  - Colbert
explanation: |
  Vincent de Gournay influyó tanto en Boisguilbert como en los fisiócratas, difundiendo las ideas liberales y criticando la excesiva intervención del Estado en la economía.