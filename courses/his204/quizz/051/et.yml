question: Milline tegelane kujutab endast puuduvat lüli Boisguilbert'i ja füsiokraatide vahel?
answer: Vincent de Gournay
wrong_answers:
  - Voltaire
  - Turgot
  - Colbert
explanation: |
  Vincent de Gournay mõjutas nii Boisguilbert'i kui ka füsiokraate, levitades liberaalseid ideid ja kritiseerides riigi liigset sekkumist majandusse.