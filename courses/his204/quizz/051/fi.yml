question: Kuka hahmo edustaa Boisguilbertin ja fysiokraattien välistä puuttuvaa lenkkiä?
answer: Vincent de Gournay
wrong_answers:
  - Voltaire
  - Turgot
  - Colbert
explanation: |
  Vincent de Gournay vaikutti sekä Boisguilbertiin että fysiokraatteihin levittämällä liberaaleja ajatuksia ja arvostelemalla valtion liiallista puuttumista talouteen.