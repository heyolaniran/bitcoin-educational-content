question: Quel personnage représente le chaînon manquant entre Boisguilbert et les Physiocrates ?
answer: Vincent de Gournay
wrong_answers:
  - Voltaire
  - Turgot
  - Colbert
explanation: |
  Vincent de Gournay a influencé à la fois Boisguilbert et les Physiocrates, en diffusant les idées libérales et en critiquant l'intervention excessive de l'État dans l'économie.
