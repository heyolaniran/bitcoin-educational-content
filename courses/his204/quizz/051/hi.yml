question: कौन सा चरित्र बोइसगिल्बर्ट और फिजियोक्रेट्स के बीच लुप्त कड़ी का प्रतिनिधित्व करता है?
answer: विंसेंट डी गौर्ने
wrong_answers:
  - वॉल्टेयर
  - टरगोट
  - कोलबर्ट
explanation: |
  विन्सेंट डी गौर्ने ने बोइसगिल्बर्ट और फिजियोक्रेट्स दोनों को प्रभावित किया, उदार विचारों का प्रसार किया और अर्थव्यवस्था में अत्यधिक राज्य हस्तक्षेप की आलोचना की।