question: Karakter manakah yang mewakili mata rantai yang hilang antara Boisguilbert dan kaum Fisiokrat?
answer: Vincent de Gournay
wrong_answers:
  - Voltaire
  - Turgot
  - Colbert
explanation: |
  Vincent de Gournay memengaruhi Boisguilbert dan kaum Fisiokrat, menyebarkan ide-ide liberal dan mengkritik intervensi negara yang berlebihan dalam perekonomian.