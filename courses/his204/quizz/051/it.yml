question: Quale personaggio rappresenta l'anello mancante tra Boisguilbert e i Fisiocratici?
answer: Vincent de Gournay
wrong_answers:
  - Voltaire
  - Turgot
  - Colbert
explanation: |
  Vincent de Gournay influenzò sia Boisguilbert che i Fisiocratici, diffondendo idee liberali e criticando l'eccessivo intervento dello Stato nell'economia.