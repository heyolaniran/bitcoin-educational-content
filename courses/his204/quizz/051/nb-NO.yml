question: Hvilken karakter representerer det manglende leddet mellom Boisguilbert og fysiokratene?
answer: Vincent de Gournay
wrong_answers:
  - Voltaire
  - Turgot
  - Colbert
explanation: |
  Vincent de Gournay påvirket både Boisguilbert og fysiokratene ved å spre liberale ideer og kritisere overdreven statlig inngripen i økonomien.