question: Która postać reprezentuje brakujące ogniwo między Boisguilbertem a fizjokratami?
answer: Vincent de Gournay
wrong_answers:
  - Wolter
  - Turgot
  - Colbert
explanation: |
  Vincent de Gournay wywarł wpływ zarówno na Boisguilberta, jak i na fizjokratów, szerząc liberalne idee i krytykując nadmierną interwencję państwa w gospodarkę.