question: Que personagem representa o elo que faltava entre Boisguilbert e os Fisiocratas?
answer: Vincent de Gournay
wrong_answers:
  - Voltaire
  - Turgot
  - Colbert
explanation: |
  Vincent de Gournay influenciou Boisguilbert e os fisiocratas, difundindo ideias liberais e criticando a excessiva intervenção do Estado na economia.