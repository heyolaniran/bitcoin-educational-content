question: Какой персонаж представляет собой недостающее звено между Буагильбером и физиократами?
answer: Винсент де Гурне
wrong_answers:
  - Вольтер
  - Турго
  - Кольбер
explanation: |
  Винсент де Гурне оказал влияние как на Буагильбера, так и на физиократов, распространяя либеральные идеи и критикуя чрезмерное вмешательство государства в экономику.