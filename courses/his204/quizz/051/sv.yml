question: Vilken karaktär utgör den felande länken mellan Boisguilbert och fysiokraterna?
answer: Vincent de Gournay
wrong_answers:
  - Voltaire
  - Turgot
  - Colbert
explanation: |
  Vincent de Gournay påverkade både Boisguilbert och fysiokraterna genom att sprida liberala idéer och kritisera statens överdrivna inblandning i ekonomin.