question: Ni mhusika gani anayewakilisha kiungo kinachokosekana kati ya Boisguilbert na Wanafizikia?
answer: Vincent de Gournay
wrong_answers:
  - Voltaire
  - Turgot
  - Colbert
explanation: |
  Vincent de Gournay alishawishi Boisguilbert na Wanafiziokrati, akieneza mawazo ya huria na kukosoa uingiliaji mwingi wa serikali katika uchumi.