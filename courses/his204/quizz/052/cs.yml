question: Díky čímu zásahu unikl Mirabeau po vydání své Théorie de l'Impôt tvrdým represím?
answer: Madame de Pompadour
wrong_answers:
  - Ludvík XV
  - François Quesnay
  - Voltaire
explanation: |
  Po vydání "La Théorie de l'Impôt" se za Mirabeaua přimluvila paní de Pompadour a umožnila mu vyhnout se přísnějšímu trestu.