question: Wem ist es zu verdanken, dass Mirabeau nach der Veröffentlichung seiner Théorie de l'Impôt den Repressionen entkam?
answer: Madame de Pompadour
wrong_answers:
  - Ludwig XV
  - François Quesnay
  - Voltaire
explanation: |
  Madame de Pompadour setzte sich nach der Veröffentlichung von "La Théorie de l'Impôt" für Mirabeau ein, so dass er einer härteren Strafe entgehen konnte.