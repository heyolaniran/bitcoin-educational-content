question: Thanks to whose intervention did Mirabeau escape the rigors of repression after publishing his Théorie de l'Impôt?
answer: Madame de Pompadour
wrong_answers:
  - Louis XV
  - François Quesnay
  - Voltaire
explanation: |
  Madame de Pompadour interceded on Mirabeau's behalf after the publication of "La Théorie de l'Impôt", enabling him to avoid a harsher sentence.