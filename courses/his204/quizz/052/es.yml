question: Gracias a la intervención de quién, Mirabeau escapó a los rigores de la represión tras publicar su Théorie de l'Impôt?
answer: Madame de Pompadour
wrong_answers:
  - Luis XV
  - François Quesnay
  - Voltaire
explanation: |
  Madame de Pompadour intercedió en favor de Mirabeau tras la publicación de "La Théorie de l'Impôt", lo que le permitió evitar una condena más severa.