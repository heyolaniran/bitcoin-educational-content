question: Tänu kelle sekkumisele pääses Mirabeau pärast oma Théorie de l'Impôt'i avaldamist repressioonidest?
answer: Madame de Pompadour
wrong_answers:
  - Louis XV
  - François Quesnay
  - Voltaire
explanation: |
  Pärast "La Théorie de l'Impôt" avaldamist astus Madame de Pompadour Mirabeau nimel vahekorda, mis võimaldas tal vältida karmimat karistust.