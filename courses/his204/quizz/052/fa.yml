question: مداخله چه کسی باعث شد تا میرا‌بو پس از انتشار کتاب «نظریه مالیات» از سخت‌گیری‌های سرکوب‌گرانه فرار کند؟
answer: مدام دو پومپادور
wrong_answers:
  - لویی پانزدهم
  - فرانسوا کنه
  - ولتر
explanation: |
  مدام دو پومپادور پس از انتشار "نظریه مالیات" به نفع میرا‌بو وساطت کرد و به او کمک کرد تا از مجازات شدیدتری اجتناب کند.