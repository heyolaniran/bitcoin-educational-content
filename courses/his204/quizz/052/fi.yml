question: Kenen väliintulon ansiosta Mirabeau välttyi sorron ankaralta kurittomuudelta julkaistuaan Théorie de l'Impôt -teoksensa?
answer: Madame de Pompadour
wrong_answers:
  - Ludvig XV
  - François Quesnay
  - Voltaire
explanation: |
  Madame de Pompadour välitti Mirabeaun puolesta "La Théorie de l'Impôt" -teoksen julkaisemisen jälkeen, minkä ansiosta Mirabeau vältti ankaramman tuomion.