question: Berkat campur tangan siapa Mirabeau bisa lolos dari penindasan setelah menerbitkan Théorie de l'Impôt?
answer: Madame de Pompadour
wrong_answers:
  - Louis XV
  - François Quesnay
  - Voltaire
explanation: |
  Madame de Pompadour menjadi perantara atas nama Mirabeau setelah publikasi "La Théorie de l'Impôt", yang memungkinkannya untuk menghindari hukuman yang lebih berat.