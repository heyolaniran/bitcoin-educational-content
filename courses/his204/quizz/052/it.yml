question: Grazie all'intervento di chi Mirabeau sfuggì ai rigori della repressione dopo aver pubblicato la sua Théorie de l'Impôt?
answer: Madame de Pompadour
wrong_answers:
  - Luigi XV
  - François Quesnay
  - Voltaire
explanation: |
  Madame de Pompadour intercedette a favore di Mirabeau dopo la pubblicazione de "La Théorie de l'Impôt", consentendogli di evitare una condanna più severa.