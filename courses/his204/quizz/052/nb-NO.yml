question: Hvem var det som sørget for at Mirabeau slapp unna undertrykkelsen etter utgivelsen av Théorie de l'Impôt?
answer: Madame de Pompadour
wrong_answers:
  - Ludvig XV
  - François Quesnay
  - Voltaire
explanation: |
  Madame de Pompadour gikk i forbønn for Mirabeau etter utgivelsen av "La Théorie de l'Impôt", slik at han slapp en strengere dom.