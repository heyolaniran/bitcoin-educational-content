question: Dzięki czyjej interwencji Mirabeau uniknął represji po opublikowaniu Théorie de l'Impôt?
answer: Madame de Pompadour
wrong_answers:
  - Ludwik XV
  - François Quesnay
  - Wolter
explanation: |
  Madame de Pompadour wstawiła się za Mirabeau po publikacji "La Théorie de l'Impôt", umożliwiając mu uniknięcie surowszego wyroku.