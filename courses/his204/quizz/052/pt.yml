question: Graças à intervenção de quem é que Mirabeau escapou aos rigores da repressão depois de ter publicado a sua Théorie de l'Impôt?
answer: Madame de Pompadour
wrong_answers:
  - Luís XV
  - François Quesnay
  - Voltaire
explanation: |
  Madame de Pompadour intercedeu a favor de Mirabeau após a publicação de "La Théorie de l'Impôt", permitindo-lhe evitar uma sentença mais severa.