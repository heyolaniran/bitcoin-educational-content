question: Благодаря чьему вмешательству Мирабо избежал репрессий после публикации "Теории империи"?
answer: Мадам де Помпадур
wrong_answers:
  - Людовик XV
  - Франсуа Кесне
  - Вольтер
explanation: |
  Мадам де Помпадур вступилась за Мирабо после публикации "Теории импотенции", что позволило ему избежать более сурового приговора.