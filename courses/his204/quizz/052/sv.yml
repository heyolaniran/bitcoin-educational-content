question: Tack vare vems ingripande slapp Mirabeau undan förtryckets hårda tag efter att ha publicerat sin Théorie de l'Impôt?
answer: Madame de Pompadour
wrong_answers:
  - Ludvig XV
  - François Quesnay
  - Voltaire
explanation: |
  Madame de Pompadour ingrep för Mirabeaus räkning efter publiceringen av "La Théorie de l'Impôt", vilket gjorde det möjligt för honom att undvika ett strängare straff.