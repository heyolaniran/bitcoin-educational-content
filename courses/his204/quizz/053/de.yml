question: Wie lautet der Name der Zeitschrift von Physiokrates?
answer: Les Ephémérides du Citoyen
wrong_answers:
  - Die Ephémérides du Peuple
  - Die neue Bürgerin
  - Journal des économistes
explanation: |
  Die Zeitung der Physiokraten war "Les Éphémérides du Citoyen", eine Zeitschrift, in der sie ihre Ideen und wirtschaftlichen Analysen verbreiteten.