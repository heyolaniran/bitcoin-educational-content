question: ¿Cómo se llama la revista de Fisiocrates?
answer: Les Ephémérides du Citoyen
wrong_answers:
  - Los efemérides del pueblo
  - El Nuevo Ciudadano
  - Le Journal des Économistes
explanation: |
  El periódico de los fisiócratas era "Les Éphémérides du Citoyen", una publicación periódica en la que difundían sus ideas y análisis económicos.