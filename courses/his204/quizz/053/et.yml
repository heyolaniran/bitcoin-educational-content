question: Mis on Physiokratese ajakirja nimi?
answer: Les Ephémérides du Citoyen
wrong_answers:
  - Les Ephémérides du Peuple
  - Uus kodanik
  - Le Journal des Économistes
explanation: |
  Füsiokraatide ajaleht oli ajakiri "Les Éphémérides du Citoyen", milles nad levitasid oma ideid ja majandusanalüüse.