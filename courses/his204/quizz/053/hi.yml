question: फिजियोक्रेट्स पत्रिका का नाम क्या है?
answer: लेस एफेमेरिडेस डु सिटॉयन
wrong_answers:
  - लेस एफेमेरिडेस डु पीपल
  - नया नागरिक
  - ले जर्नल डेस इकोनॉमिस्ट्स
explanation: |
  फिजियोक्रेट्स का समाचार पत्र "लेस एफेमेरिडेस डू सिटॉयन" था, जो एक आवधिक पत्रिका थी जिसमें वे अपने विचारों और आर्थिक विश्लेषणों का प्रसार करते थे।