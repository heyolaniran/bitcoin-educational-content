question: Apa nama jurnal Physiocrates?
answer: Les Ephémérides du Citoyen
wrong_answers:
  - Les Ephémérides du Peuple
  - Warga Negara Baru
  - Le Journal des Économistes
explanation: |
  Surat kabar Fisiokrat adalah "Les Éphémérides du Citoyen", sebuah majalah di mana mereka menyebarkan ide-ide dan analisis ekonomi mereka.