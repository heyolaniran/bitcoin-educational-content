question: Come si chiama la rivista di Fisiocrate?
answer: Le Ephémérides del Citoyen
wrong_answers:
  - Le Ephémérides del Popolo
  - Il Nuovo Cittadino
  - Le Journal des Économistes
explanation: |
  Il giornale dei Fisiocratici era "Les Éphémérides du Citoyen", un periodico in cui diffondevano le loro idee e analisi economiche.