question: Hva heter Fysiokrates' tidsskrift?
answer: Les Ephémérides du Citoyen
wrong_answers:
  - Les Ephémérides du Peuple
  - The New Citizen
  - Le Journal des Économistes
explanation: |
  Fysiokratenes avis var "Les Éphémérides du Citoyen", et tidsskrift der de formidlet sine ideer og økonomiske analyser.