question: Jak nazywa się czasopismo Fizjokratesa?
answer: Les Ephémérides du Citoyen
wrong_answers:
  - Les Ephémérides du Peuple
  - Nowy Obywatel
  - Le Journal des Économistes
explanation: |
  Gazetą fizjokratów był "Les Éphémérides du Citoyen", czasopismo, w którym rozpowszechniali swoje idee i analizy ekonomiczne.