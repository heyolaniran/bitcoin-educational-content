question: Как называется журнал Физиократа?
answer: Эфемеры города
wrong_answers:
  - Эфемеры народа
  - Новый гражданин
  - Le Journal des Économistes
explanation: |
  Газета физиократов - "Les Éphémérides du Citoyen", периодическое издание, в котором они распространяли свои идеи и экономические анализы.