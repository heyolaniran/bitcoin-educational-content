question: Kako se zove časopis fiziokrata?
answer: Les Ephémérides du Citoyen
wrong_answers:
  - Les Ephémérides du Peuple
  - Novi Građanin
  - Le Journal des Économistes
explanation: |
  Novine fiziokrata bile su "Les Éphémérides du Citoyen", periodični list u kojem su širili svoje ideje i ekonomske analize.