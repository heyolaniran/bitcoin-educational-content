question: Vad heter Fysiokrates tidskrift?
answer: Les Ephémérides du Citoyen
wrong_answers:
  - Efemérides du Peuple
  - Den nya medborgaren
  - Le Journal des Économistes
explanation: |
  Fysiokraternas tidning var "Les Éphémérides du Citoyen", en periodisk skrift där de spred sina idéer och ekonomiska analyser.