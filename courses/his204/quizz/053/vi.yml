question: Tên tạp chí của Physiocrates là gì?
answer: Les Ephémérides du Citoyen
wrong_answers:
  - Les Ephémérides của dân tộc
  - Công dân mới
  - Tạp chí Kinh tế
explanation: |
  Tờ báo của đảng Trọng nông là "Les Éphémérides du Citoyen", một tạp chí mà họ phổ biến các ý tưởng và phân tích kinh tế của mình.