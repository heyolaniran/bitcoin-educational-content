question: Ve kterých zemích se uplatnily ekonomické reformy inspirované fyziokracií?
answer: Francie, Itálie, Německo
wrong_answers:
  - Anglie, Francie, Německo
  - Holandsko, Itálie, Švédsko
  - Španělsko, Portugalsko, Rusko
explanation: |
  O fyziokratické reformy se pokoušeli ve Francii, Itálii a Německu, ale kvůli odporu zavedených zájmů měly často krátké trvání.