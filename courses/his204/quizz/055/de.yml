question: In welchen Ländern wurden die von der Physiokratie inspirierten Wirtschaftsreformen durchgeführt?
answer: Frankreich, Italien, Deutschland
wrong_answers:
  - England, Frankreich, Deutschland
  - Holland, Italien, Schweden
  - Spanien, Portugal, Russland
explanation: |
  Physiokratische Reformen wurden in Frankreich, Italien und Deutschland versucht, waren aber aufgrund des Widerstands der etablierten Interessen oft nur von kurzer Dauer.