question: Millistes riikides rakendati füsiokraatiast inspireeritud majandusreforme?
answer: Prantsusmaa, Itaalia, Saksamaa
wrong_answers:
  - Inglismaa, Prantsusmaa, Saksamaa
  - Holland, Itaalia, Rootsi
  - Hispaania, Portugal, Venemaa
explanation: |
  Prantsusmaal, Itaalias ja Saksamaal üritati füsiokraatlikke reforme, kuid need jäid tihtipeale lühiajaliseks väljakujunenud huvide vastuseisu tõttu.