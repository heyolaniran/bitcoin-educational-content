question: در کدام کشورها اصلاحات اقتصادی الهام‌گرفته از فیزیوکراسی اعمال شد؟
answer: فرانسه، ایتالیا، آلمان
wrong_answers:
  - انگلستان، فرانسه، آلمان
  - هلند، ایتالیا، سوئد
  - اسپانیا، پرتغال، روسیه
explanation: |
  اصلاحات فیزیوکراتیک در فرانسه، ایتالیا و آلمان تلاش شد، اما اغلب به دلیل مخالفت منافع مستقر کوتاه‌مدت بودند.