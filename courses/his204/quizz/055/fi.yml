question: Missä maissa sovellettiin fysiokratian innoittamia talousuudistuksia?
answer: Ranska, Italia, Saksa
wrong_answers:
  - Englanti, Ranska, Saksa
  - Alankomaat, Italia, Ruotsi
  - Espanja, Portugali, Venäjä
explanation: |
  Fysiokraattisia uudistuksia yritettiin Ranskassa, Italiassa ja Saksassa, mutta ne jäivät usein lyhytaikaisiksi vakiintuneiden eturyhmien vastustuksen vuoksi.