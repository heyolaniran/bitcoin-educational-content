question: Dans quels pays des réformes économiques inspirées par la Physiocratie furent-ils appliquées ?
answer: La France, l’Italie, l’Allemagne
wrong_answers:
  - L’Angleterre, la France, l’Allemagne
  - La Hollande, l’Italie, la Suède
  - L'Espagne, le Portugal, la Russie
explanation: |
  Des réformes physiocratiques ont été tentées en France, en Italie et en Allemagne, mais elles ont souvent été de courte durée en raison de l'opposition des intérêts établis.
