question: फिजियोक्रेसी से प्रेरित आर्थिक सुधार किन देशों में लागू किए गए?
answer: फ्रांस, इटली, जर्मनी
wrong_answers:
  - इंग्लैंड, फ्रांस, जर्मनी
  - हॉलैंड, इटली, स्वीडन
  - स्पेन, पुर्तगाल, रूस
explanation: |
  फ्रांस, इटली और जर्मनी में फिजियोक्रेटिक सुधारों का प्रयास किया गया, लेकिन स्थापित हितों के विरोध के कारण वे प्रायः अल्पकालिक ही रहे।