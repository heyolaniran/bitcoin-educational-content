question: Di negara mana saja reformasi ekonomi yang terinspirasi oleh Fisiokrasi diterapkan?
answer: Prancis, Italia, Jerman
wrong_answers:
  - Inggris, Prancis, Jerman
  - Belanda, Italia, Swedia
  - Spanyol, Portugal, Rusia
explanation: |
  Reformasi fisiokratis pernah dicoba di Prancis, Italia, dan Jerman, tetapi sering kali tidak berhasil karena mendapat tentangan dari kepentingan-kepentingan yang sudah mapan.