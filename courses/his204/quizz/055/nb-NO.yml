question: I hvilke land ble økonomiske reformer inspirert av fysiokratiet gjennomført?
answer: Frankrike, Italia, Tyskland
wrong_answers:
  - England, Frankrike, Tyskland
  - Nederland, Italia, Sverige
  - Spania, Portugal, Russland
explanation: |
  Fysiokratiske reformer ble forsøkt gjennomført i Frankrike, Italia og Tyskland, men ble ofte kortvarige på grunn av motstand fra etablerte interesser.