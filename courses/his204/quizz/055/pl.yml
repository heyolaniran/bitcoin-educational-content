question: W których krajach zastosowano reformy gospodarcze inspirowane fizjokratyzmem?
answer: Francja, Włochy, Niemcy
wrong_answers:
  - Anglia, Francja, Niemcy
  - Holandia, Włochy, Szwecja
  - Hiszpania, Portugalia, Rosja
explanation: |
  Reformy fizjokratyczne próbowano przeprowadzić we Francji, Włoszech i Niemczech, ale często były one krótkotrwałe z powodu sprzeciwu ze strony ugruntowanych interesów.