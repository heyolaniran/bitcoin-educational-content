question: Em que países foram aplicadas as reformas económicas inspiradas na fisiocracia?
answer: França, Itália, Alemanha
wrong_answers:
  - Inglaterra, França, Alemanha
  - Holanda, Itália, Suécia
  - Espanha, Portugal, Rússia
explanation: |
  As reformas fisiocráticas foram tentadas em França, em Itália e na Alemanha, mas tiveram frequentemente uma vida curta devido à oposição dos interesses estabelecidos.