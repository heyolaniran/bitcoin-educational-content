question: В каких странах применялись экономические реформы, вдохновленные физиократией?
answer: Франция, Италия, Германия
wrong_answers:
  - Англия, Франция, Германия
  - Голландия, Италия, Швеция
  - Испания, Португалия, Россия
explanation: |
  Физиократические реформы были предприняты во Франции, Италии и Германии, но зачастую они были недолговечны из-за противодействия со стороны устоявшихся интересов.