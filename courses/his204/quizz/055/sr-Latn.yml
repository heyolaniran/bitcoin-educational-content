question: U kojim zemljama su ekonomske reforme inspirisane fiziokratijom primenjene?
answer: Francuska, Italija, Nemačka
wrong_answers:
  - Engleska, Francuska, Nemačka
  - Holandija, Italija, Švedska
  - Španija, Portugal, Rusija
explanation: |
  Fiziokratske reforme su pokušane u Francuskoj, Italiji i Nemačkoj, ali su često bile kratkog veka zbog protivljenja ustaljenih interesa.