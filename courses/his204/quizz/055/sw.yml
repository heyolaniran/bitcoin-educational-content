question: Ni katika nchi gani mageuzi ya kiuchumi yaliyochochewa na Fiziokrasia yalitumika?
answer: Ufaransa, Italia, Ujerumani
wrong_answers:
  - Uingereza, Ufaransa, Ujerumani
  - Uholanzi, Italia, Uswidi
  - Uhispania, Ureno, Urusi
explanation: |
  Marekebisho ya kifiziolojia yalijaribiwa nchini Ufaransa, Italia na Ujerumani, lakini mara nyingi yalikuwa ya muda mfupi kutokana na upinzani kutoka kwa maslahi yaliyoanzishwa.