question: Những cải cách kinh tế lấy cảm hứng từ chế độ trọng nông được áp dụng ở những nước nào?
answer: Pháp, Ý, Đức
wrong_answers:
  - Anh, Pháp, Đức
  - Hà Lan, Ý, Thụy Điển
  - Tây Ban Nha, Bồ Đào Nha, Nga
explanation: |
  Các cải cách trọng nông đã được thực hiện ở Pháp, Ý và Đức, nhưng thường không kéo dài được lâu do gặp phải sự phản đối từ các nhóm lợi ích hiện hữu.