question: Jaký je pro fyziokraty rozdíl mezi výrobou a ziskem?
answer: Průmyslník a obchodník mohou vyhrát, ale jen zemědělec vyrábí, protože výroba je tvorba užitečné hmoty
wrong_answers:
  - Výrobci a obchodníci nemusí dosahovat zisku. Pouze zemědělství nutně přináší zisk.
  - Zemědělec může vydělávat, ale vyrábět může jen průmyslník a obchodník, protože vyrábět znamená poskytovat službu
  - Výroba a zisk jsou totéž
explanation: |
  Fyziokraté věřili, že pouze zemědělství je produktivní, protože vytváří novou hmotu. Průmysl a obchod považovali za neplodné činnosti, protože pouze přeměňují nebo přemisťují existující bohatství.