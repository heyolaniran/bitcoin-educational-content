question: Was ist für die Physiokraten der Unterschied zwischen Produktion und Gewinn?
answer: Der Industrielle und der Händler können gewinnen, aber nur der Landwirt produziert, denn Produktion ist die Schaffung von nützlichen Dingen
wrong_answers:
  - Hersteller und Händler können keinen Gewinn erzielen. Nur die Landwirtschaft bringt zwangsläufig Gewinne ein.
  - Der Landwirt kann verdienen, aber nur der Industrielle und der Händler produzieren, denn produzieren bedeutet, eine Dienstleistung zu erbringen
  - Produktion und Gewinn sind ein und dasselbe
explanation: |
  Die Physiokraten glaubten, dass nur die Landwirtschaft produktiv sei, da sie neue Materie schaffe. Industrie und Handel galten als unfruchtbare Tätigkeiten, da sie lediglich vorhandenen Reichtum umwandelten oder verdrängten.