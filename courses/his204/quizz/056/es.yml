question: Para los fisiócratas, ¿cuál es la diferencia entre producción y beneficio?
answer: El industrial y el comerciante pueden ganar, pero sólo el agricultor produce, porque la producción es la creación de materia útil
wrong_answers:
  - Los fabricantes y los comerciantes pueden no obtener beneficios. Sólo la agricultura aporta necesariamente beneficios.
  - El agricultor puede ganar, pero sólo producen el industrial y el comerciante, porque producir es prestar un servicio
  - Producción y beneficio son lo mismo
explanation: |
  Los fisiócratas creían que sólo la agricultura era productiva, ya que creaba materia nueva. La industria y el comercio se consideraban actividades estériles, ya que se limitaban a transformar o desplazar la riqueza existente.