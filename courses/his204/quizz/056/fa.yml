question: برای فیزیوکرات‌ها، تفاوت بین تولید و سود چیست؟
answer: صنعتگر و تاجر می‌توانند برنده شوند، اما تنها کشاورز تولید می‌کند، زیرا تولید، خلق ماده مفید است.
wrong_answers:
  - تولیدکنندگان و بازرگانان ممکن است سودی نبرند. تنها کشاورزی است که لزوماً سودآور است.
  - کشاورز می‌تواند درآمد کسب کند، اما تنها صنعتگر و تاجر هستند که تولید می‌کنند، زیرا تولید به معنای ارائه خدمات است.
  - تولید و سود یک چیز هستند
explanation: |
  فیزیوکرات‌ها معتقد بودند که تنها کشاورزی مولد است، زیرا ماده جدیدی ایجاد می‌کند. صنعت و تجارت به عنوان فعالیت‌های عقیم در نظر گرفته می‌شدند، زیرا آن‌ها فقط ثروت موجود را تغییر داده یا جابجا می‌کردند.