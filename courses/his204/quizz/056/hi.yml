question: फिजियोक्रेट्स के लिए उत्पादन और लाभ में क्या अंतर है?
answer: उद्योगपति और व्यापारी जीत सकते हैं, लेकिन उत्पादन केवल किसान ही करता है, क्योंकि उत्पादन ही उपयोगी पदार्थ का निर्माण है
wrong_answers:
  - निर्माता और व्यापारी लाभ नहीं कमा सकते। केवल कृषि ही अनिवार्य रूप से लाभ लाती है।
  - किसान कमा सकता है, लेकिन उत्पादन तो केवल उद्योगपति और व्यापारी ही करते हैं, क्योंकि उत्पादन करना ही सेवा प्रदान करना है।
  - उत्पादन और लाभ एक ही चीज़ हैं
explanation: |
  फिजियोक्रेट्स का मानना ​​था कि केवल कृषि ही उत्पादक है, क्योंकि यह नया पदार्थ बनाती है। उद्योग और वाणिज्य को बाँझ गतिविधियाँ माना जाता था, क्योंकि वे केवल मौजूदा धन को बदलते या विस्थापित करते थे।