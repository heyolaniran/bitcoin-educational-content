question: Bagi kaum Fisiokrat, apa perbedaan antara produksi dan laba?
answer: Industrialis dan pedagang bisa menang, tetapi hanya petani yang memproduksi, karena produksi adalah penciptaan materi yang berguna
wrong_answers:
  - Produsen dan pedagang mungkin tidak menghasilkan keuntungan. Hanya pertanian yang selalu menghasilkan keuntungan.
  - Petani bisa mendapatkan penghasilan, tetapi hanya industrialis dan pedagang yang memproduksi, karena memproduksi berarti menyediakan layanan
  - Produksi dan keuntungan adalah hal yang sama
explanation: |
  Kaum Fisiokrat percaya bahwa hanya pertanian yang produktif, karena pertanian menciptakan materi baru. Industri dan perdagangan dipandang sebagai kegiatan yang steril, karena hanya mengubah atau memindahkan kekayaan yang ada.