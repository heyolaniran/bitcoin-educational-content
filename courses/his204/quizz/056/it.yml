question: Per i fisiocratici, qual è la differenza tra produzione e profitto?
answer: L'industriale e il commerciante possono vincere, ma solo l'agricoltore produce, perché la produzione è la creazione di materia utile
wrong_answers:
  - Produttori e commercianti possono non realizzare profitti. Solo l'agricoltura porta necessariamente profitti.
  - L'agricoltore può guadagnare, ma sono solo l'industriale e il commerciante a produrre, perché produrre significa fornire un servizio
  - Produzione e profitto sono la stessa cosa
explanation: |
  I fisiocratici ritenevano che solo l'agricoltura fosse produttiva, in quanto creava nuova materia. L'industria e il commercio erano considerati attività sterili, poiché si limitavano a trasformare o a spostare la ricchezza esistente.