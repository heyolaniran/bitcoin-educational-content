question: Hva er forskjellen mellom produksjon og profitt for fysiokratene?
answer: Industrimannen og handelsmannen kan vinne, men bare bonden produserer, fordi produksjon er å skape nyttig materie
wrong_answers:
  - Produsenter og handelsmenn kan ikke tjene penger. Det er bare jordbruket som nødvendigvis gir overskudd.
  - Bonden kan tjene penger, men det er bare industrimannen og handelsmannen som produserer, for det å produsere er å yte en tjeneste
  - Produksjon og profitt er det samme
explanation: |
  Fysiokratene mente at bare jordbruket var produktivt, ettersom det skapte ny materie. Industri og handel ble sett på som sterile aktiviteter, siden de bare omdannet eller fortrengte eksisterende rikdom.