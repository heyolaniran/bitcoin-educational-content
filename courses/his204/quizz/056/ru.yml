question: Для физиократов в чем разница между производством и прибылью?
answer: Промышленник и торговец могут победить, но только фермер производит, потому что производство - это создание полезной материи
wrong_answers:
  - Производители и торговцы могут не получать прибыль. Только сельское хозяйство обязательно приносит прибыль.
  - Фермер может зарабатывать, но производят только промышленники и торговцы, потому что производить - значит предоставлять услуги
  - Производство и прибыль - это одно и то же
explanation: |
  Физиократы считали, что продуктивным является только сельское хозяйство, поскольку оно создает новую материю. Промышленность и торговля считались бесплодными видами деятельности, поскольку они лишь преобразовывали или вытесняли существующие богатства.