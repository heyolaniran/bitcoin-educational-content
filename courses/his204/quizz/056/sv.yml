question: Vad är skillnaden mellan produktion och vinst för fysiokraterna?
answer: Industrimannen och handlaren kan vinna, men det är bara bonden som producerar, eftersom produktion är skapandet av användbar materia
wrong_answers:
  - Tillverkare och handlare får inte göra vinst. Endast jordbruk ger nödvändigtvis vinst.
  - Bonden kan tjäna pengar, men det är bara industrimannen och handlaren som producerar, för att producera är att tillhandahålla en tjänst
  - Produktion och vinst är samma sak
explanation: |
  Fysiokraterna ansåg att endast jordbruket var produktivt, eftersom det skapade ny materia. Industri och handel sågs som sterila aktiviteter, eftersom de bara omvandlade eller förflyttade befintlig rikedom.