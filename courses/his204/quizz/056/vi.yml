question: Đối với những người theo chủ nghĩa trọng nông, sự khác biệt giữa sản xuất và lợi nhuận là gì?
answer: Nhà công nghiệp và thương nhân có thể thắng, nhưng chỉ có người nông dân mới sản xuất, vì sản xuất là tạo ra vật chất hữu ích
wrong_answers:
  - Nhà sản xuất và thương nhân có thể không có lợi nhuận. Chỉ có nông nghiệp mới nhất thiết mang lại lợi nhuận.
  - Người nông dân có thể kiếm được, nhưng chỉ có nhà công nghiệp và thương nhân mới sản xuất, vì sản xuất là cung cấp dịch vụ
  - Sản xuất và lợi nhuận là một
explanation: |
  Những người theo chủ nghĩa trọng nông tin rằng chỉ có nông nghiệp mới có năng suất, vì nó tạo ra vật chất mới. Công nghiệp và thương mại được coi là những hoạt động vô trùng, vì chúng chỉ chuyển đổi hoặc thay thế của cải hiện có.