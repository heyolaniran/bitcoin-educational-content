question: Co podle Quesnaye a fyziokratů stimuluje úsilí a práci?
answer: Bezpečnost soukromého majetku
wrong_answers:
  - Represivní zákony
  - Zvyky řemeslníků a průmyslníků přátelské k obohacení
  - Strach z hladomoru
explanation: |
  Podle fyziokratů bylo zabezpečení soukromého vlastnictví nezbytné pro podporu investic a práce. Věřili, že jednotlivci jsou ochotnější pracovat a investovat, pokud mají jistotu, že si budou moci ponechat plody své práce.