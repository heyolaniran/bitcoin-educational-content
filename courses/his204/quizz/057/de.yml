question: Was stimuliert laut Quesnay und den Physiokraten Anstrengung und Arbeit?
answer: Die Sicherheit des Privateigentums
wrong_answers:
  - Repressive Gesetze
  - Die bereicherungsfreundlichen Sitten der Handwerker und Industriellen
  - Furcht vor Hungersnot
explanation: |
  Die Sicherheit des Privateigentums war nach Ansicht der Physiokraten eine wesentliche Voraussetzung für die Förderung von Investitionen und Arbeit. Sie waren der Meinung, dass der Einzelne eher bereit ist, zu arbeiten und zu investieren, wenn er sicher ist, die Früchte seiner Arbeit behalten zu können.