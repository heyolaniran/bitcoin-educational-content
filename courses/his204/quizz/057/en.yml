question: According to Quesnay and the Physiocrats, what stimulates effort and work?
answer: The security of private property
wrong_answers:
  - Repressive laws
  - Craftsmen's and industrialists' enrichment-friendly mores
  - Fear of famine
explanation: |
  Security of private property was essential to encourage investment and work, according to the Physiocrats. They believed that individuals were more inclined to work and invest if they were assured of being able to keep the fruits of their labor.