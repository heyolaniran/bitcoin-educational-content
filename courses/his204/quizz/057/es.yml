question: Según Quesnay y los fisiócratas, ¿qué estimula el esfuerzo y el trabajo?
answer: La seguridad de la propiedad privada
wrong_answers:
  - Leyes represivas
  - Costumbres de artesanos e industriales que favorecen el enriquecimiento
  - Miedo al hambre
explanation: |
  La seguridad de la propiedad privada era esencial para fomentar la inversión y el trabajo, según los fisiócratas. Creían que los individuos estaban más dispuestos a trabajar y a invertir si tenían la seguridad de poder conservar el fruto de su trabajo.