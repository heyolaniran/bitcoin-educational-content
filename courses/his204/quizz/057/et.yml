question: Mis Quesnay ja füsiokraatide arvates stimuleerib pingutust ja tööd?
answer: Eraomandi turvalisus
wrong_answers:
  - Represseerivad seadused
  - Käsitööliste ja töösturite rikastumissõbralikud kombed
  - Hirm nälja ees
explanation: |
  Füsiokraatide arvates oli eraomandi turvalisus hädavajalik, et soodustada investeeringuid ja tööd. Nad uskusid, et üksikisikud on altimad töötama ja investeerima, kui nad on kindlad, et saavad oma töö viljad endale jätta.