question: بر اساس نظر کِنه و فیزیوکرات‌ها، چه چیزی تلاش و کار را تحریک می‌کند؟
answer: امنیت مالکیت خصوصی
wrong_answers:
  - قوانین سرکوبگر
  - آداب و رسوم غنی‌سازی دوستانه صنعتگران و صنعت‌گران
  - ترس از قحطی
explanation: |
  طبق نظر فیزیوکرات‌ها، امنیت مالکیت خصوصی برای تشویق سرمایه‌گذاری و کار ضروری بود. آن‌ها معتقد بودند که افراد بیشتر تمایل به کار و سرمایه‌گذاری دارند اگر اطمینان داشته باشند که می‌توانند از ثمرات کار خود بهره‌مند شوند.