question: Mikä Quesnayn ja fysiokraattien mukaan stimuloi ponnistelua ja työtä?
answer: Yksityisomaisuuden turvallisuus
wrong_answers:
  - Repressiiviset lait
  - Käsityöläisten ja teollisuusmiesten rikastumista suosivat tavat
  - Nälänhädän pelko
explanation: |
  Fysiokraattien mukaan yksityisomaisuuden turvaaminen oli välttämätöntä investointien ja työnteon edistämiseksi. He uskoivat, että yksilöt olivat taipuvaisempia tekemään työtä ja investoimaan, jos he olivat varmoja siitä, että he saisivat pitää työnsä hedelmät.