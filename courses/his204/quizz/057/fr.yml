question: Selon Quesnay et les Physiocrates, qu’est-ce qui stimule l’effort et le travail ?
answer: La sûreté de la propriété privée
wrong_answers:
  - Les lois répressives
  - Les mœurs favorables à l’enrichissement des artisans et industriels
  - La peur de la famine
explanation: |
  La sécurité de la propriété privée était essentielle pour encourager l'investissement et le travail selon les Physiocrates. Ils pensaient que les individus étaient plus enclins à travailler et à investir s'ils étaient assurés de pouvoir conserver les fruits de leur labeur.
