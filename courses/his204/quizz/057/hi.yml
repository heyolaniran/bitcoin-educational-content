question: क्वेस्ने और फिजियोक्रेट्स के अनुसार, प्रयास और कार्य को क्या प्रेरित करता है?
answer: निजी संपत्ति की सुरक्षा
wrong_answers:
  - दमनकारी कानून
  - शिल्पकारों और उद्योगपतियों के समृद्धि-अनुकूल रीति-रिवाज
  - अकाल का भय
explanation: |
  फिजियोक्रेट्स के अनुसार, निवेश और काम को प्रोत्साहित करने के लिए निजी संपत्ति की सुरक्षा आवश्यक थी। उनका मानना ​​था कि अगर लोगों को उनके श्रम का फल मिलने का भरोसा हो तो वे काम करने और निवेश करने के लिए अधिक इच्छुक होते हैं।