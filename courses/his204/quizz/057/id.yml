question: Menurut Quesnay dan kaum Fisiokrat, apa yang merangsang usaha dan kerja?
answer: Keamanan properti pribadi
wrong_answers:
  - Hukum yang represif
  - Adat istiadat yang ramah terhadap pengrajin dan industrialis
  - Takut kelaparan
explanation: |
  Keamanan properti pribadi sangat penting untuk mendorong investasi dan pekerjaan, menurut kaum Fisiokrat. Mereka percaya bahwa individu akan lebih cenderung bekerja dan berinvestasi jika mereka yakin dapat menyimpan hasil kerja mereka.