question: Secondo Quesnay e i fisiocratici, cosa stimola lo sforzo e il lavoro?
answer: La sicurezza della proprietà privata
wrong_answers:
  - Leggi repressive
  - Le abitudini di arricchimento di artigiani e industriali
  - Paura della carestia
explanation: |
  Secondo i fisiocratici, la sicurezza della proprietà privata era essenziale per incoraggiare gli investimenti e il lavoro. Essi ritenevano che gli individui fossero più inclini a lavorare e a investire se avevano la certezza di poter conservare i frutti del loro lavoro.