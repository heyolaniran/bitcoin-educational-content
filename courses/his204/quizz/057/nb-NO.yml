question: Hva er det som stimulerer til innsats og arbeid, ifølge Quesnay og fysiokratene?
answer: Sikkerheten til privat eiendom
wrong_answers:
  - Undertrykkende lover
  - Håndverkere og industrimenns berikelsesvennlige sedvaner
  - Frykt for hungersnød
explanation: |
  Trygghet for privat eiendom var avgjørende for å oppmuntre til investeringer og arbeid, ifølge fysiokratene. De mente at folk var mer tilbøyelige til å arbeide og investere hvis de var sikre på å kunne beholde fruktene av arbeidet sitt.