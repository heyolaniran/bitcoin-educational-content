question: Co według Quesnaya i fizjokratów stymuluje wysiłek i pracę?
answer: Bezpieczeństwo własności prywatnej
wrong_answers:
  - Represyjne prawa
  - Obyczaje sprzyjające wzbogacaniu się rzemieślników i przemysłowców
  - Strach przed głodem
explanation: |
  Według fizjokratów bezpieczeństwo własności prywatnej było niezbędne, aby zachęcić do inwestowania i pracy. Uważali oni, że jednostki są bardziej skłonne do pracy i inwestowania, jeśli mają pewność, że będą w stanie zatrzymać owoce swojej pracy.