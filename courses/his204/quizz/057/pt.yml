question: Segundo Quesnay e os fisiocratas, o que é que estimula o esforço e o trabalho?
answer: A segurança da propriedade privada
wrong_answers:
  - Leis repressivas
  - Costumes dos artesãos e dos industriais favoráveis ao enriquecimento
  - Medo da fome
explanation: |
  A segurança da propriedade privada era essencial para incentivar o investimento e o trabalho, segundo os fisiocratas. Acreditavam que os indivíduos estavam mais inclinados a trabalhar e a investir se tivessem a garantia de poder ficar com os frutos do seu trabalho.