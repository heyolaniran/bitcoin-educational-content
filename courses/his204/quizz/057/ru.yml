question: Согласно Кеснею и физиократам, что стимулирует усилия и труд?
answer: Безопасность частной собственности
wrong_answers:
  - Репрессивные законы
  - Нравы ремесленников и промышленников, способствующие обогащению
  - Страх перед голодом
explanation: |
  По мнению физиократов, безопасность частной собственности была необходима для стимулирования инвестиций и труда. Они считали, что люди более склонны работать и инвестировать, если они уверены, что смогут сохранить плоды своего труда.