question: Prema Quesnayu i fiziokratama, šta podstiče trud i rad?
answer: Bezbednost privatne svojine
wrong_answers:
  - Represivni zakoni
  - Običaji naklonjeni obogaćivanju zanatlija i industrijalaca
  - Strah od gladi
explanation: |
  Bezbednost privatne svojine bila je ključna za podsticanje investicija i rada, prema fiziokratima. Verovali su da su pojedinci skloniji radu i investiranju ako su sigurni da će moći da zadrže plodove svog rada.