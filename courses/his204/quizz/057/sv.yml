question: Enligt Quesnay och fysiokraterna, vad stimulerar ansträngning och arbete?
answer: Säkerheten för privat egendom
wrong_answers:
  - Repressiva lagar
  - Hantverkares och industrialisters berikning - vänliga seder
  - Rädsla för hungersnöd
explanation: |
  Enligt fysiokraterna var det viktigt att trygga den privata äganderätten för att uppmuntra till investeringar och arbete. De ansåg att människor var mer benägna att arbeta och investera om de kunde vara säkra på att få behålla frukterna av sitt arbete.