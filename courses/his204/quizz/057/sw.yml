question: Kulingana na Quesnay na the Physiocrats, ni nini huchochea bidii na kazi?
answer: Usalama wa mali ya kibinafsi
wrong_answers:
  - Sheria kandamizi
  - Mafundi na wanaviwanda ni rafiki wa uboreshaji
  - Hofu ya njaa
explanation: |
  Usalama wa mali ya kibinafsi ulikuwa muhimu ili kuhimiza uwekezaji na kazi, kulingana na Physiocrats. Waliamini kwamba watu binafsi walikuwa na mwelekeo zaidi wa kufanya kazi na kuwekeza ikiwa wangehakikishiwa kuwa na uwezo wa kuweka matunda ya kazi yao.