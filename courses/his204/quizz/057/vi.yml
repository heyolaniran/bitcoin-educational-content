question: Theo Quesnay và những người theo chủ nghĩa trọng nông, điều gì thúc đẩy nỗ lực và công việc?
answer: Sự an toàn của tài sản cá nhân
wrong_answers:
  - Luật đàn áp
  - Phong tục làm giàu thân thiện của thợ thủ công và nhà công nghiệp
  - Sợ nạn đói
explanation: |
  Theo những người theo chủ nghĩa trọng nông, sự an toàn của tài sản cá nhân là điều cần thiết để khuyến khích đầu tư và làm việc. Họ tin rằng mọi người sẽ có xu hướng làm việc và đầu tư nhiều hơn nếu họ được đảm bảo có thể giữ được thành quả lao động của mình.