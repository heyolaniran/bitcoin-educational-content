question: Jak je podle názvu Le Trosnovy knihy popsána svoboda obchodu?
answer: Vždy užitečné, nikdy ne škodlivé
wrong_answers:
  - Vždy výhodné a vždy užitečné
  - Často výhodné, vždy morální
  - Někdy výhodné, jindy škodlivé
explanation: |
  Le Trosne napsal spis "De l'intérêt social, par rapport à la valeur, à la circulation, à l'industrie et au commerce intérieur et extérieur", v němž obhajuje svobodný obchod jako vždy užitečný a nikdy ne škodlivý pro společnost.