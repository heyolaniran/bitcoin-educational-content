question: Wie lautet der Titel eines Buches von Le Trosne, in dem die Handelsfreiheit beschrieben wird?
answer: Immer nützlich, nie schädlich
wrong_answers:
  - Immer profitabel und immer nützlich
  - Oft profitabel, immer moralisch
  - Manchmal gewinnbringend, manchmal schädlich
explanation: |
  Le Trosne schrieb "De l'intérêt social, par rapport à la valeur, à la circulation, à l'industrie et au commerce intérieur et extérieur", in dem er den freien Handel als immer nützlich und niemals schädlich für die Gesellschaft verteidigt.