question: According to the title of a book by Le Trosne, how is freedom of trade described?
answer: Always useful, never harmful
wrong_answers:
  - Always profitable and always useful
  - Often profitable, always moral
  - Sometimes profitable, sometimes harmful
explanation: |
  Le Trosne wrote "De l'intérêt social, par rapport à la valeur, à la circulation, à l'industrie et au commerce intérieur et extérieur", in which he defends free trade as always useful and never harmful to society.