question: Kuidas kirjeldatakse Le Trosne'i raamatu pealkirja järgi kaubandusvabadust?
answer: Alati kasulik, mitte kunagi kahjulik
wrong_answers:
  - Alati kasumlik ja alati kasulik
  - Sageli kasumlik, alati moraalne
  - Mõnikord kasulik, mõnikord kahjulik
explanation: |
  Le Trosne kirjutas "De l'intérêt social, par rapport à la valeur, à la circulation, à l'industrie et au commerce intérieur et extérieur", milles ta kaitseb vabakaubandust kui alati kasulikku ja mitte kunagi ühiskonnale kahjulikku.