question: Miten Le Trosnen kirjan otsikon mukaan kuvataan kaupan vapautta?
answer: Aina hyödyllistä, ei koskaan haitallista
wrong_answers:
  - Aina kannattavaa ja aina hyödyllistä
  - Usein kannattavaa, aina moraalista
  - Joskus kannattavaa, joskus haitallista
explanation: |
  Le Trosne kirjoitti teoksen "De l'intérêt social, par rapport à la valeur, à la circulation, à l'industrie et au commerce intérieur et extérieur", jossa hän puolustaa vapaakauppaa aina hyödyllisenä eikä koskaan haitallisena yhteiskunnalle.