question: Selon le titre d’un livre de Le Trosne, comment est décrite la liberté du commerce ?
answer: Toujours utile et jamais nuisible
wrong_answers:
  - Toujours profitable et toujours utile
  - Souvent profitable et toujours morale
  - Parfois profitable et parfois nuisible
explanation: |
  Le Trosne a écrit "De l'intérêt social, par rapport à la valeur, à la circulation, à l'industrie et au commerce intérieur et extérieur", où il défend la liberté du commerce comme étant toujours utile et jamais nuisible à la société.
