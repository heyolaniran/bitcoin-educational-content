question: ले ट्रोस्ने की पुस्तक के शीर्षक के अनुसार, व्यापार की स्वतंत्रता का वर्णन कैसे किया गया है?
answer: सदैव उपयोगी, कभी हानिकारक नहीं
wrong_answers:
  - सदैव लाभदायक और सदैव उपयोगी
  - प्रायः लाभदायक, सदैव नैतिक
  - कभी लाभदायक, कभी हानिकारक
explanation: |
  ले ट्रोस्ने ने "डी लइंट्रेट सोशल, पार रैपपोर्ट ए ला वेलेउर, ए ला सर्कुलेशन, ए ल'इंडस्ट्री एट औ कॉमर्स इंटीरियर एट एक्सटेरियर" लिखा, जिसमें उन्होंने मुक्त व्यापार को हमेशा उपयोगी बताया और समाज के लिए कभी भी हानिकारक नहीं बताया।