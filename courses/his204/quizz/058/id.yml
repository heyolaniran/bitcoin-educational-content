question: Menurut judul buku karya Le Trosne, bagaimana kebebasan berdagang digambarkan?
answer: Selalu berguna, tidak pernah berbahaya
wrong_answers:
  - Selalu menguntungkan dan selalu bermanfaat
  - Seringkali menguntungkan, selalu bermoral
  - Terkadang menguntungkan, terkadang merugikan
explanation: |
  Le Trosne menulis "De l'intérêt social, par rapport à la valeur, à la circulation, à l'industrie et au commerce intérieur et extérieur", di mana ia membela perdagangan bebas sebagai sesuatu yang selalu berguna dan tidak pernah merugikan masyarakat.