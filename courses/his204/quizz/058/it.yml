question: Secondo il titolo di un libro di Le Trosne, come viene descritta la libertà di commercio?
answer: Sempre utile, mai dannoso
wrong_answers:
  - Sempre redditizio e sempre utile
  - Spesso redditizio, sempre morale
  - A volte redditizio, a volte dannoso
explanation: |
  Le Trosne scrisse "De l'intérêt social, par rapport à la valeur, à la circulation, à l'industrie et au commerce intérieur et extérieur", in cui difende il libero scambio come sempre utile e mai dannoso per la società.