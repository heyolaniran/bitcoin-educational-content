question: ル・トロスヌの本のタイトルによれば、貿易の自由はどのように表現されているか？
answer: 常に有用で、決して有害ではない
wrong_answers:
  - 常に有益で、常に役に立つ
  - しばしば有益で、常に道徳的
  - 時に有益、時に有害
explanation: |
  ル・トロスヌは "De l'intérêt social, par ra ra ra rapport à valeur, à la circulation, à l'industrie et au commerce intérieur et extérieur "を書き、その中で自由貿易は社会にとって常に有用であり、決して有害ではないと擁護している。