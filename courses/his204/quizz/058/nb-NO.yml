question: Hvordan beskrives handelsfriheten i tittelen på en bok av Le Trosne?
answer: Alltid nyttig, aldri skadelig
wrong_answers:
  - Alltid lønnsomt og alltid nyttig
  - Ofte lønnsomt, alltid moralsk
  - Noen ganger lønnsomt, andre ganger skadelig
explanation: |
  Le Trosne skrev "De l'intérêt social, par rapport à la valeur, à la circulation, à l'industrie et au commerce intérieur et extérieur", der han forsvarer frihandel som alltid nyttig og aldri skadelig for samfunnet.