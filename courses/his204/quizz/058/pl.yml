question: Jak według tytułu książki Le Trosne'a opisana jest wolność handlu?
answer: Zawsze przydatne, nigdy szkodliwe
wrong_answers:
  - Zawsze opłacalne i zawsze przydatne
  - Często opłacalne, zawsze moralne
  - Czasami opłacalne, czasami szkodliwe
explanation: |
  Le Trosne napisał "De l'intérêt social, par rapport à la valeur, à la circulation, à l'industrie et au commerce intérieur et extérieur", w którym broni wolnego handlu jako zawsze użytecznego i nigdy nieszkodliwego dla społeczeństwa.