question: Как, согласно названию книги Ле Тросна, описывается свобода торговли?
answer: Всегда полезно, никогда не вредно
wrong_answers:
  - Всегда выгодно и всегда полезно
  - Часто выгодно, всегда морально
  - Иногда выгодно, иногда вредно
explanation: |
  Ле Тросне написал работу "О социальной ценности в соотношении с валером, циркуляцией, промышленностью и внешней торговлей", в которой он защищает свободную торговлю как всегда полезную и никогда не вредную для общества.