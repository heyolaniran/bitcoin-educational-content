question: Prema naslovu knjige autora Le Trosne, kako je opisana sloboda trgovine?
answer: Uvek korisno, nikad štetno
wrong_answers:
  - Uvek profitabilno i uvek korisno
  - Često profitabilno, uvek moralno
  - Ponekad profitabilno, ponekad štetno
explanation: |
  Le Trosne je napisao "De l'intérêt social, par rapport à la valeur, à la circulation, à l'industrie et au commerce intérieur et extérieur", u kojem brani slobodnu trgovinu kao uvek korisnu i nikada štetnu za društvo.