question: Hur beskrivs handelsfriheten enligt titeln på en bok av Le Trosne?
answer: Alltid användbar, aldrig skadlig
wrong_answers:
  - Alltid lönsamt och alltid användbart
  - Ofta lönsamt, alltid moraliskt
  - Ibland lönsamt, ibland skadligt
explanation: |
  Le Trosne skrev "De l'intérêt social, par rapport à la valeur, à la circulation, à l'industrie et au commerce intérieur et extérieur", där han försvarar frihandeln som alltid nyttig och aldrig skadlig för samhället.