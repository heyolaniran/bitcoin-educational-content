question: Kulingana na kichwa cha kitabu cha Le Trosne, uhuru wa biashara unaelezewaje?
answer: Daima ni muhimu, kamwe haina madhara
wrong_answers:
  - Daima faida na muhimu kila wakati
  - Mara nyingi faida, daima maadili
  - Wakati mwingine faida, wakati mwingine madhara
explanation: |
  Le Trosne aliandika "De l'intérêt social, par rapport à la valeur, à la circulation, à l'industrie et au commerce intérieur et extérieur", ambamo anatetea biashara huria kuwa ni muhimu kila wakati na isiyo na madhara kwa jamii.