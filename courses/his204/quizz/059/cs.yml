question: Co navrhoval Dupont de Nemours zakázat v návrhu zákona předloženém Ústavodárnému shromáždění?
answer: Útočné války
wrong_answers:
  - Obchodní války
  - Obranné války
  - Všechny války
explanation: |
  Dupont de Nemours v souladu s fyziokratickými zásadami navrhoval zákaz útočných válek, protože je považoval za škodlivé pro hospodářskou prosperitu a blahobyt obyvatelstva.