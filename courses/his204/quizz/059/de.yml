question: Was schlug Dupont de Nemours in einem der verfassungsgebenden Versammlung vorgelegten Gesetzentwurf vor, zu verbieten?
answer: Offensivkriege
wrong_answers:
  - Handelskriege
  - Verteidigungskriege
  - Alle Kriege
explanation: |
  Dupont de Nemours schlug im Einklang mit den physiokratischen Grundsätzen vor, Angriffskriege zu verbieten, da er sie für schädlich für den wirtschaftlichen Wohlstand und das Wohlergehen der Bevölkerung hielt.