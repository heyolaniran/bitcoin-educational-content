question: En un proyecto de ley presentado a la Asamblea Constituyente, ¿qué proponía prohibir Dupont de Nemours?
answer: Guerras ofensivas
wrong_answers:
  - Guerras comerciales
  - Guerras defensivas
  - Todas las guerras
explanation: |
  Dupont de Nemours, en línea con los principios fisiocráticos, propuso prohibir las guerras ofensivas, ya que las consideraba perjudiciales para la prosperidad económica y el bienestar de la población.