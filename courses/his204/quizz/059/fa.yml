question: در لایحه‌ای که به مجلس مؤسسان ارائه شد، دوپونت دو نمور پیشنهاد ممنوعیت چه چیزی را داد؟
answer: جنگ‌های تهاجمی
wrong_answers:
  - جنگ‌های تجاری
  - جنگ‌های دفاعی
  - همه جنگ‌ها
explanation: |
  دوپونت دو نمور، در راستای اصول فیزیوکراتیک، پیشنهاد داد که جنگ‌های تهاجمی ممنوع شوند، زیرا او آن‌ها را مضر برای رونق اقتصادی و رفاه جمعیت می‌دانست.