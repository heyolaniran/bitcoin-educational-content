question: Mitä Dupont de Nemours ehdotti perustuslakia säätävälle kansalliskokoukselle esitetyssä lakiesityksessä kiellettäväksi?
answer: Hyökkäyssodat
wrong_answers:
  - Kauppasodat
  - Puolustukselliset sodat
  - Kaikki sodat
explanation: |
  Dupont de Nemours ehdotti fysiokraattisten periaatteiden mukaisesti hyökkäyssotien kieltämistä, koska hän piti niitä haitallisina taloudelliselle hyvinvoinnille ja väestön hyvinvoinnille.