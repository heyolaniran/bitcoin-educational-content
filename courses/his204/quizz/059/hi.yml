question: संविधान सभा में प्रस्तुत विधेयक में ड्यूपोंट डी नेमॉर्स ने किस पर प्रतिबंध लगाने का प्रस्ताव रखा था?
answer: आक्रामक युद्ध
wrong_answers:
  - व्यापार युद्ध
  - रक्षात्मक युद्ध
  - सभी युद्ध
explanation: |
  ड्यूपोंट डी नेमॉर्स ने फिजियोक्रेटिक सिद्धांतों के अनुरूप आक्रामक युद्धों पर प्रतिबंध लगाने का प्रस्ताव रखा, क्योंकि उनका मानना ​​था कि ये आर्थिक समृद्धि और जनता की भलाई के लिए हानिकारक हैं।