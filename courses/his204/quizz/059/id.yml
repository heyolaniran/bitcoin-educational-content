question: Dalam rancangan undang-undang yang diajukan ke Majelis Konstituante, apa yang diusulkan oleh Dupont de Nemours untuk dilarang?
answer: Perang ofensif
wrong_answers:
  - Perang dagang
  - Perang defensif
  - Semua perang
explanation: |
  Dupont de Nemours, sejalan dengan prinsip-prinsip fisiokratis, mengusulkan pelarangan perang ofensif, karena ia menganggapnya berbahaya bagi kemakmuran ekonomi dan kesejahteraan penduduk.