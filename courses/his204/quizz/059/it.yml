question: In una proposta di legge presentata all'Assemblea Costituente, cosa propose Dupont de Nemours di vietare?
answer: Guerre offensive
wrong_answers:
  - Guerre commerciali
  - Guerre difensive
  - Tutte le guerre
explanation: |
  Dupont de Nemours, in linea con i principi fisiocratici, propose di vietare le guerre offensive, ritenendole dannose per la prosperità economica e il benessere della popolazione.