question: Hva foreslo Dupont de Nemours å forby i et lovforslag til den grunnlovgivende forsamlingen?
answer: Offensive kriger
wrong_answers:
  - Handelskrig
  - Defensive kriger
  - Alle kriger
explanation: |
  Dupont de Nemours foreslo, i tråd med fysiokratiske prinsipper, å forby offensive kriger, ettersom han anså dem som skadelige for den økonomiske velstanden og befolkningens velvære.