question: Co proponował zakazać Dupont de Nemours w projekcie ustawy przedłożonym Zgromadzeniu Konstytucyjnemu?
answer: Wojny ofensywne
wrong_answers:
  - Wojny handlowe
  - Wojny obronne
  - Wszystkie wojny
explanation: |
  Dupont de Nemours, zgodnie z zasadami fizjokratycznymi, zaproponował zakaz wojen ofensywnych, ponieważ uważał je za szkodliwe dla dobrobytu gospodarczego i dobrobytu ludności.