question: Num projeto de lei apresentado à Assembleia Constituinte, o que é que Dupont de Nemours propôs proibir?
answer: Guerras ofensivas
wrong_answers:
  - Guerras comerciais
  - Guerras defensivas
  - Todas as guerras
explanation: |
  Dupont de Nemours, de acordo com os princípios fisiocratas, propôs a proibição das guerras ofensivas, pois considerava-as prejudiciais à prosperidade económica e ao bem-estar da população.