question: В законопроекте, представленном в Учредительное собрание, Дюпон де Немур предлагал запретить что-либо?
answer: Наступательные войны
wrong_answers:
  - Торговые войны
  - Оборонительные войны
  - Все войны
explanation: |
  Дюпон де Немур, следуя физиократическим принципам, предложил запретить наступательные войны, так как считал их вредными для экономического процветания и благосостояния населения.