question: U predlogu zakona podnetom Ustavotvornoj skupštini, šta je Dupont de Nemours predložio da se zabrani?
answer: Ofanzivni ratovi
wrong_answers:
  - Trgovinski ratovi
  - Defanzivni ratovi
  - Svi ratovi
explanation: |
  Dupont de Nemours, u skladu sa fiziokratskim principima, predložio je zabranu ofanzivnih ratova, jer ih je smatrao štetnim za ekonomsku prosperitet i dobrobit stanovništva.