question: Vad föreslog Dupont de Nemours att förbjuda i ett lagförslag som lades fram för den konstituerande församlingen?
answer: Offensiva krig
wrong_answers:
  - Handelskrig
  - Defensiva krig
  - Alla krig
explanation: |
  Dupont de Nemours föreslog, i linje med fysiokratiska principer, att offensiva krig skulle förbjudas, eftersom han ansåg att de var skadliga för det ekonomiska välståndet och befolkningens välbefinnande.