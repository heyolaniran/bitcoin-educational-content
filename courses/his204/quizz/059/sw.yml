question: Katika mswada uliowasilishwa kwa Bunge la Katiba, Dupont de Nemours alipendekeza nini kupiga marufuku?
answer: Vita vya kukera
wrong_answers:
  - Vita vya biashara
  - Vita vya kujihami
  - Vita vyote
explanation: |
  Dupont de Nemours, kulingana na kanuni za kifizikia, alipendekeza kupiga marufuku vita vya kukera, kwani aliviona kuwa vyenye madhara kwa ustawi wa kiuchumi na ustawi wa watu.