question: Trong dự luật trình lên Hội đồng lập hiến, Dupont de Nemours đã đề xuất cấm điều gì?
answer: Chiến tranh tấn công
wrong_answers:
  - Chiến tranh thương mại
  - Chiến tranh phòng thủ
  - Tất cả các cuộc chiến tranh
explanation: |
  Dupont de Nemours, theo nguyên tắc trọng nông, đã đề xuất cấm các cuộc chiến tranh tấn công vì ông cho rằng chúng có hại cho sự thịnh vượng kinh tế và phúc lợi của người dân.