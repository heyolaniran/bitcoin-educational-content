question: Proč fyziokraté, obhájci ekonomické svobody, zůstali velkými skeptiky demokracie?
answer: Demokracie je potenciálně zotročením menšiny většinou
wrong_answers:
  - Monarchie je méně nákladná než demokracie
  - Fyziokraté měli ve svých řadách několik vysoce postavených členů královského dvora
  - Mysleli si, že lidé jsou příliš nevědomí na to, aby se rozhodovali na základě informací
explanation: |
  Fyziokraté se obávali, že demokracie povede k tyranii většiny, kdy budou zájmy menšiny obětovány ve prospěch většiny. Dávali přednost osvícené vládě, která je schopna přijímat racionální rozhodnutí a hájit práva všech.