question: Warum blieben die Physiokraten, die Verfechter der wirtschaftlichen Freiheit, große Skeptiker der Demokratie?
answer: Demokratie ist potenziell die Versklavung der Minderheit durch die Mehrheit
wrong_answers:
  - Monarchie ist weniger kostspielig als Demokratie
  - Die Physiokraten zählten mehrere hochrangige Mitglieder des königlichen Hofes zu ihren Mitgliedern
  - Sie dachten, die Menschen seien zu unwissend, um fundierte Entscheidungen zu treffen
explanation: |
  Die Physiokraten befürchteten, dass die Demokratie zu einer Tyrannei der Mehrheit führen würde, bei der die Interessen der Minderheit zum Nutzen der Mehrheit geopfert würden. Sie bevorzugten eine aufgeklärte Regierung, die in der Lage ist, rationale Entscheidungen zu treffen und die Rechte aller zu verteidigen.