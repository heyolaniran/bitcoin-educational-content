question: Why did the Physiocrats, defenders of economic freedom, remain great skeptics of democracy?
answer: Democracy is potentially the enslavement of the minority by the majority
wrong_answers:
  - Monarchy is less costly than democracy
  - The Physiocrats counted among their ranks several high-ranking members of the King's court
  - They thought people were too ignorant to make informed decisions
explanation: |
  The Physiocrats feared that democracy would lead to the tyranny of the majority, where the interests of the minority would be sacrificed for the benefit of the majority. They preferred enlightened government, capable of making rational decisions and defending the rights of all.