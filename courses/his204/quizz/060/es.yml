question: ¿Por qué los fisiócratas, defensores de la libertad económica, seguían siendo grandes escépticos de la democracia?
answer: La democracia es potencialmente la esclavitud de la minoría por la mayoría
wrong_answers:
  - La monarquía es menos costosa que la democracia
  - Los fisiócratas contaban entre sus filas con varios altos cargos de la corte del rey
  - Pensaban que la gente era demasiado ignorante para tomar decisiones informadas
explanation: |
  Los fisiócratas temían que la democracia condujera a la tiranía de la mayoría, donde los intereses de la minoría se sacrificarían en beneficio de la mayoría. Preferían un gobierno ilustrado, capaz de tomar decisiones racionales y de defender los derechos de todos.