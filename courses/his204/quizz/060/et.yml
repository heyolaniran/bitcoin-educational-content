question: Miks jäid füsiokraadid, majandusvabaduse kaitsjad, demokraatia suurteks skeptikuteks?
answer: Demokraatia on potentsiaalselt vähemuse orjastamine enamuse poolt
wrong_answers:
  - Monarhia on vähem kulukas kui demokraatia
  - Füsiokraatide hulka kuulus mitu kõrgetasemelist kuninga õukonna liiget
  - Nad arvasid, et inimesed on liiga asjatundmatud, et teha teadlikke otsuseid
explanation: |
  Füsiokraadid kartsid, et demokraatia viib enamuse türanniani, kus vähemuse huvid ohverdatakse enamuse huvides. Nad eelistasid valgustatud valitsust, mis oleks võimeline tegema ratsionaalseid otsuseid ja kaitsma kõigi õigusi.