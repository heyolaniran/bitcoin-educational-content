question: چرا فیزیوکرات‌ها، مدافعان آزادی اقتصادی، نسبت به دموکراسی همچنان شکاکان بزرگی بودند؟
answer: دموکراسی به طور بالقوه به معنای به بردگی کشیدن اقلیت توسط اکثریت است.
wrong_answers:
  - پادشاهی هزینه کمتری نسبت به دموکراسی دارد
  - فیزیوکرات‌ها در میان اعضای خود چندین عضو بلندپایه دربار پادشاه را داشتند.
  - آنها فکر می‌کردند مردم بیش از حد ناآگاه هستند تا تصمیمات آگاهانه بگیرند.
explanation: |
  فیزیوکرات‌ها نگران بودند که دموکراسی به استبداد اکثریت منجر شود، جایی که منافع اقلیت برای سود اکثریت قربانی شود. آن‌ها حکومت روشنفکرانه‌ای را ترجیح می‌دادند که قادر به اتخاذ تصمیمات عقلانی و دفاع از حقوق همه باشد.