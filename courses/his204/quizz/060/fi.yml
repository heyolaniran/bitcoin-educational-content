question: Miksi fysiokraatit, jotka puolustivat taloudellista vapautta, pysyivät demokratian suurina epäilijöinä?
answer: Demokratia on mahdollisesti enemmistön orjuuttamista vähemmistöön
wrong_answers:
  - Monarkia on halvempi kuin demokratia
  - Fysiokraattien joukkoon kuului useita korkea-arvoisia kuninkaan hovin jäseniä
  - He luulivat, että ihmiset olivat liian tietämättömiä tehdäkseen tietoon perustuvia päätöksiä
explanation: |
  Fysiokraatit pelkäsivät, että demokratia johtaisi enemmistön tyranniaan, jossa vähemmistön edut uhrattaisiin enemmistön eduksi. He pitivät parempana valistunutta hallitusta, joka kykeni tekemään järkeviä päätöksiä ja puolustamaan kaikkien oikeuksia.