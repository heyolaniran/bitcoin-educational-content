question: आर्थिक स्वतंत्रता के समर्थक फिजियोक्रेट लोकतंत्र के प्रति बड़े संशयवादी क्यों बने रहे?
answer: लोकतंत्र संभवतः बहुसंख्यकों द्वारा अल्पसंख्यकों की गुलामी है
wrong_answers:
  - राजतंत्र लोकतंत्र से कम खर्चीला है
  - फिजियोक्रेट्स की श्रेणी में राजा के दरबार के कई उच्च पदस्थ सदस्य शामिल थे
  - उनका मानना ​​था कि लोग इतने अज्ञानी हैं कि वे सही निर्णय नहीं ले सकते
explanation: |
  फिजियोक्रेट्स को डर था कि लोकतंत्र से बहुसंख्यकों का अत्याचार बढ़ेगा, जहाँ अल्पसंख्यकों के हितों को बहुसंख्यकों के लाभ के लिए बलिदान कर दिया जाएगा। वे प्रबुद्ध सरकार को प्राथमिकता देते थे, जो तर्कसंगत निर्णय लेने और सभी के अधिकारों की रक्षा करने में सक्षम हो।