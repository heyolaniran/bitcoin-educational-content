question: Mengapa kaum Fisiokrat, para pembela kebebasan ekonomi, tetap skeptis terhadap demokrasi?
answer: Demokrasi berpotensi memperbudak minoritas oleh mayoritas
wrong_answers:
  - Monarki lebih murah daripada demokrasi
  - Kaum Fisiokrat menghitung di antara barisan mereka beberapa anggota berpangkat tinggi di istana Raja
  - Mereka berpikir bahwa orang-orang terlalu bodoh untuk membuat keputusan yang tepat
explanation: |
  Kaum Fisiokrat khawatir bahwa demokrasi akan mengarah pada tirani mayoritas, di mana kepentingan minoritas akan dikorbankan demi kepentingan mayoritas. Mereka lebih menyukai pemerintahan yang tercerahkan, yang mampu membuat keputusan rasional dan membela hak-hak semua orang.