question: Perché i Fisiocratici, difensori della libertà economica, sono rimasti grandi scettici della democrazia?
answer: La democrazia è potenzialmente la schiavitù della minoranza da parte della maggioranza
wrong_answers:
  - La monarchia è meno costosa della democrazia
  - I fisiocratici annoveravano tra le loro fila alcuni membri di alto rango della corte del re
  - Pensavano che le persone fossero troppo ignoranti per prendere decisioni informate
explanation: |
  I fisiocratici temevano che la democrazia portasse alla tirannia della maggioranza, dove gli interessi della minoranza sarebbero stati sacrificati a vantaggio della maggioranza. Preferivano un governo illuminato, capace di prendere decisioni razionali e di difendere i diritti di tutti.