question: 経済的自由の擁護者であるフィジオクラットが、なぜ民主主義に懐疑的であり続けたのか？
answer: 民主主義は潜在的に多数派による少数派の奴隷化である
wrong_answers:
  - 王政は民主主義よりコストが低い
  - フィジオクラッツのメンバーには、国王の宮廷高官も含まれていた。
  - 彼らは、人々は情報に基づいた意思決定をすることができないほど無知だと考えていた。
explanation: |
  フィジオクラートは、民主主義が多数派の専制につながることを恐れ、多数派の利益のために少数派の利益が犠牲になることを恐れた。彼らは、合理的な決定を下し、すべての人の権利を守ることのできる、啓蒙的な政府を好んだ。