question: Hvorfor forble fysiokratene, forsvarerne av økonomisk frihet, store skeptikere til demokratiet?
answer: Demokrati er potensielt flertallets slaveri av mindretallet
wrong_answers:
  - Monarki er billigere enn demokrati
  - Fysiokratene hadde flere høytstående medlemmer av kongens hoff i sine rekker
  - De trodde folk var for uvitende til å ta informerte beslutninger
explanation: |
  Fysiokratene fryktet at demokratiet ville føre til flertallstyranni, der mindretallets interesser ville bli ofret til fordel for flertallets. De foretrakk et opplyst styre, som var i stand til å ta rasjonelle beslutninger og forsvare alles rettigheter.