question: Dlaczego fizjokraci, obrońcy wolności gospodarczej, pozostali wielkimi sceptykami demokracji?
answer: Demokracja jest potencjalnie zniewoleniem mniejszości przez większość
wrong_answers:
  - Monarchia jest mniej kosztowna niż demokracja
  - Fizjokraci mieli w swoich szeregach kilku wysoko postawionych członków dworu królewskiego
  - Uważali, że ludzie są zbyt nieświadomi, by podejmować świadome decyzje
explanation: |
  Fizjokraci obawiali się, że demokracja doprowadzi do tyranii większości, w której interesy mniejszości zostaną poświęcone na rzecz większości. Preferowali oświecony rząd, zdolny do podejmowania racjonalnych decyzji i obrony praw wszystkich.