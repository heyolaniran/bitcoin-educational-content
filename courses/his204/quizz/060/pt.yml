question: Porque é que os fisiocratas, defensores da liberdade económica, continuaram a ser grandes cépticos em relação à democracia?
answer: A democracia é potencialmente a escravização da minoria pela maioria
wrong_answers:
  - A monarquia é menos dispendiosa do que a democracia
  - Os fisiocratas contavam entre as suas fileiras com vários membros de alto nível da corte do Rei
  - Pensavam que as pessoas eram demasiado ignorantes para tomarem decisões informadas
explanation: |
  Os fisiocratas temiam que a democracia conduzisse à tirania da maioria, em que os interesses da minoria seriam sacrificados em benefício da maioria. Preferiam um governo esclarecido, capaz de tomar decisões racionais e de defender os direitos de todos.