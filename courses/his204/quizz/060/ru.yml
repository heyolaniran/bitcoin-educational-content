question: Почему физиократы, защитники экономической свободы, оставались большими скептиками демократии?
answer: Демократия - это потенциальное порабощение меньшинства большинством
wrong_answers:
  - Монархия менее затратна, чем демократия
  - Физиократы насчитывали в своих рядах несколько высокопоставленных членов королевского двора
  - Они считали, что люди слишком невежественны, чтобы принимать взвешенные решения
explanation: |
  Физиократы опасались, что демократия приведет к тирании большинства, когда интересы меньшинства будут принесены в жертву интересам большинства. Они предпочитали просвещенное правительство, способное принимать рациональные решения и защищать права всех.