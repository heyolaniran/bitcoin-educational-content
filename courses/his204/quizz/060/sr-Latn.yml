question: Zašto su fiziokrati, branioci ekonomske slobode, ostali veliki skeptici prema demokratiji?
answer: Demokratija je potencijalno porobljavanje manjine od strane većine
wrong_answers:
  - Monarhija je manje skupa od demokratije
  - Fiziokrate su među svojim redovima imali nekoliko visokorangiranih članova kraljevog dvora
  - Mislili su da su ljudi previše neuki da bi donosili informisane odluke
explanation: |
  Fiziokrati su se plašili da će demokratija dovesti do tiranije većine, gde bi interesi manjine bili žrtvovani za dobrobit većine. Oni su preferirali prosvetljenu vladu, sposobnu da donosi racionalne odluke i brani prava svih.