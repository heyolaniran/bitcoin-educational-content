question: Varför förblev fysiokraterna, som försvarade den ekonomiska friheten, stora skeptiker till demokratin?
answer: Demokrati är potentiellt minoritetens förslavande av majoriteten
wrong_answers:
  - Monarki är mindre kostsamt än demokrati
  - Fysiokraterna räknade bland sina medlemmar flera högt uppsatta medlemmar av kungens hov
  - De trodde att människor var för okunniga för att fatta välgrundade beslut
explanation: |
  Fysiokraterna fruktade att demokratin skulle leda till majoritetens tyranni, där minoritetens intressen skulle offras till förmån för majoritetens. De föredrog en upplyst regering, som kunde fatta rationella beslut och försvara allas rättigheter.