question: Kwa nini Wanafiziokrati, watetezi wa uhuru wa kiuchumi, walibaki kuwa na mashaka makubwa ya demokrasia?
answer: Demokrasia ni uwezekano wa utumwa wa wachache na wengi
wrong_answers:
  - Utawala wa kifalme una gharama ndogo kuliko demokrasia
  - Wanafiziokrati walihesabu miongoni mwa vyeo vyao wanachama kadhaa wa vyeo vya juu wa mahakama ya Mfalme
  - Walidhani watu walikuwa wajinga sana kufanya maamuzi sahihi
explanation: |
  Wanafisiokrasia walihofia kuwa demokrasia ingesababisha dhuluma ya walio wengi, ambapo maslahi ya wachache yangetolewa mhanga kwa manufaa ya wengi. Walipendelea serikali iliyoelimika, yenye uwezo wa kufanya maamuzi ya busara na kutetea haki za wote.