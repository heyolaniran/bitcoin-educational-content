question: Tại sao những người theo chủ nghĩa trọng nông, những người bảo vệ tự do kinh tế, vẫn là những người hoài nghi lớn về nền dân chủ?
answer: Dân chủ có khả năng là sự nô dịch của thiểu số bởi đa số
wrong_answers:
  - Chế độ quân chủ ít tốn kém hơn chế độ dân chủ
  - Những người theo chủ nghĩa trọng nông có trong hàng ngũ của họ một số thành viên cấp cao của triều đình nhà vua
  - Họ nghĩ rằng mọi người quá thiếu hiểu biết để đưa ra quyết định sáng suốt
explanation: |
  Những người theo chủ nghĩa trọng nông lo sợ rằng nền dân chủ sẽ dẫn đến sự chuyên chế của đa số, nơi mà lợi ích của thiểu số sẽ bị hy sinh vì lợi ích của đa số. Họ thích chính phủ sáng suốt, có khả năng đưa ra quyết định hợp lý và bảo vệ quyền của tất cả mọi người.