question: Proč bylo uplatňování fyziokratických myšlenek v Německu nakonec přerušeno?
answer: Stávající úředníci se zdráhali
wrong_answers:
  - Obyvatelstvo nebylo příliš vstřícné
  - Bádenský markrabě, původně stoupenec fyziokracie, nakonec svou podporu odvolal
  - Podnebí nebylo příznivé pro zemědělství
explanation: |
  Odpor dosavadních úředníků, kteří lpěli na svých výsadách a zvycích, bránil uplatnění fyziokratických myšlenek v Německu. Obávali se, že navrhované reformy zpochybní jejich moc a vliv.