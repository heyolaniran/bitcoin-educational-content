question: Warum wurde die Anwendung der physiokratischen Ideen in Deutschland letztlich abgebrochen?
answer: Bestehende Beamte waren zögerlich
wrong_answers:
  - Die Bevölkerung war nicht sehr hilfsbereit
  - Der Markgraf von Baden, ursprünglich ein Anhänger der Physiokratie, zog schließlich seine Unterstützung zurück
  - Das Klima war für die Landwirtschaft nicht förderlich
explanation: |
  Der Widerstand der amtierenden Beamten, die an ihren Privilegien und Gewohnheiten festhielten, verhinderte die Umsetzung der physiokratischen Ideen in Deutschland. Sie befürchteten, dass die vorgeschlagenen Reformen ihre Macht und ihren Einfluss in Frage stellen würden.