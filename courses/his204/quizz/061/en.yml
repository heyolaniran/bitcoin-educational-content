question: Why was the application of physiocratic ideas in Germany ultimately aborted?
answer: Existing civil servants were reluctant
wrong_answers:
  - Populations were not very supportive
  - The Margrave of Baden, initially a follower of Physiocracy, eventually withdrew his support
  - The climate was not conducive to agriculture
explanation: |
  Opposition from incumbent civil servants, attached to their privileges and habits, prevented the application of physiocratic ideas in Germany. They feared that the proposed reforms would challenge their power and influence.