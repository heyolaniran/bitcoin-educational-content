question: ¿Por qué se abortó finalmente la aplicación de las ideas fisiocráticas en Alemania?
answer: Los funcionarios existentes eran reacios
wrong_answers:
  - La población no era muy partidaria
  - El margrave de Baden, inicialmente seguidor de la fisiocracia, acabó por retirar su apoyo
  - El clima no era propicio para la agricultura
explanation: |
  La oposición de los funcionarios en activo, apegados a sus privilegios y costumbres, impidió la aplicación de las ideas fisiocráticas en Alemania. Temían que las reformas propuestas desafiaran su poder e influencia.