question: Miks katkestati lõpuks füsiokraatlike ideede rakendamine Saksamaal?
answer: Olemasolevad riigiteenistujad olid vastumeelsed
wrong_answers:
  - Elanikkond ei olnud väga toetav
  - Badeni markkrahv, algselt füsiokraatia pooldaja, võttis lõpuks oma toetuse tagasi
  - Kliima ei soosinud põllumajandust
explanation: |
  Ametisolevate, oma privileegide ja harjumustega seotud ametnike vastuseis takistas füsiokraatlike ideede rakendamist Saksamaal. Nad kartsid, et kavandatavad reformid seavad nende võimu ja mõju ohtu.