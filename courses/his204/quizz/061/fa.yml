question: چرا اجرای ایده‌های فیزیوکراتیک در آلمان در نهایت متوقف شد؟
answer: کارمندان دولتی موجود بی‌میل بودند
wrong_answers:
  - جمعیت‌ها خیلی حمایت‌کننده نبودند
  - مارگراف بادن، که در ابتدا از پیروان فیزیوکراسی بود، سرانجام حمایت خود را پس گرفت.
  - آب و هوا برای کشاورزی مساعد نبود
explanation: |
  مخالفت کارمندان دولتی فعلی، که به امتیازات و عادات خود وابسته بودند، مانع از اجرای ایده‌های فیزیوکراتیک در آلمان شد. آن‌ها نگران بودند که اصلاحات پیشنهادی قدرت و نفوذ آن‌ها را به چالش بکشد.