question: Miksi fysiokraattisten ajatusten soveltaminen Saksassa lopulta keskeytettiin?
answer: Nykyiset virkamiehet olivat haluttomia
wrong_answers:
  - Väestö ei ollut kovin myönteinen
  - Badenin markgrafi, joka oli aluksi fysiokratian kannattaja, peruutti lopulta tukensa
  - Ilmasto ei suosinut maataloutta
explanation: |
  Fysiokraattisten aatteiden soveltaminen Saksassa estettiin etuoikeuksiinsa ja tottumuksiinsa kiintyneiden virkamiesten vastustuksella. He pelkäsivät, että ehdotetut uudistukset haastaisivat heidän valtansa ja vaikutusvaltansa.