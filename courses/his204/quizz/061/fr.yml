question: Pour quelle raison l’application des idées physiocratiques en Allemagne fut finalement avortée ?
answer: Les fonctionnaires en place y étaient peu favorables
wrong_answers:
  - Les populations y étaient peu favorables
  - Le margrave de Bade, d’abord adepte de la Physiocratie, finit par se rétracter
  - Le climat n'était pas propice à l'agriculture
explanation: |
  L'opposition des fonctionnaires en place, attachés à leurs privilèges et à leurs habitudes, a empêché l'application des idées physiocratiques en Allemagne. Ils craignaient que les réformes proposées ne remettent en cause leur pouvoir et leur influence.
