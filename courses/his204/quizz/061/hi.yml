question: जर्मनी में फिजियोक्रेटिक विचारों का अनुप्रयोग अंततः क्यों निरस्त कर दिया गया?
answer: मौजूदा सिविल सेवक अनिच्छुक थे
wrong_answers:
  - आबादी बहुत सहायक नहीं थी
  - बाडेन के मार्ग्रेव, जो शुरू में फिजियोक्रेसी के अनुयायी थे, ने अंततः अपना समर्थन वापस ले लिया
  - जलवायु कृषि के लिए अनुकूल नहीं थी
explanation: |
  मौजूदा सिविल सेवकों के विरोध ने, जो उनके विशेषाधिकारों और आदतों से जुड़े थे, जर्मनी में फिजियोक्रेटिक विचारों के अनुप्रयोग को रोक दिया। उन्हें डर था कि प्रस्तावित सुधार उनकी शक्ति और प्रभाव को चुनौती देंगे।