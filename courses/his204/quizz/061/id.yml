question: Mengapa penerapan gagasan fisiokratis di Jerman pada akhirnya dibatalkan?
answer: Pegawai negeri sipil yang ada enggan
wrong_answers:
  - Populasi tidak terlalu mendukung
  - Margrave dari Baden, yang awalnya adalah pengikut Fisiokrasi, akhirnya menarik dukungannya
  - Iklim tidak kondusif untuk pertanian
explanation: |
  Oposisi dari pegawai negeri yang sedang menjabat, yang melekat pada hak-hak istimewa dan kebiasaan mereka, menghalangi penerapan ide-ide fisiokratis di Jerman. Mereka khawatir bahwa reformasi yang diusulkan akan menantang kekuasaan dan pengaruh mereka.