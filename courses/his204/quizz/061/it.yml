question: Perché l'applicazione delle idee fisiocratiche in Germania fu infine abbandonata?
answer: I dipendenti pubblici esistenti erano riluttanti
wrong_answers:
  - Le popolazioni non erano molto favorevoli
  - Il Margravio di Baden, inizialmente seguace della Fisiocrazia, alla fine ritirò il suo appoggio
  - Il clima non era favorevole all'agricoltura
explanation: |
  L'opposizione dei funzionari pubblici in carica, attaccati ai loro privilegi e alle loro abitudini, impedì l'applicazione delle idee fisiocratiche in Germania. Essi temevano che le riforme proposte avrebbero messo in discussione il loro potere e la loro influenza.