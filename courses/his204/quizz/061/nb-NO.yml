question: Hvorfor ble anvendelsen av fysiokratiske ideer i Tyskland til slutt avbrutt?
answer: Eksisterende embetsmenn var motvillige
wrong_answers:
  - Befolkningen var ikke særlig støttende
  - Markgreven av Baden, som opprinnelig var tilhenger av fysiokratiet, trakk etter hvert tilbake sin støtte
  - Klimaet var ikke gunstig for jordbruk
explanation: |
  Motstanden fra de sittende embetsmennene, som var knyttet til sine privilegier og vaner, hindret gjennomføringen av fysiokratiske ideer i Tyskland. De fryktet at de foreslåtte reformene ville utfordre deres makt og innflytelse.