question: Dlaczego zastosowanie idei fizjokratycznych w Niemczech zostało ostatecznie przerwane?
answer: Dotychczasowi urzędnicy służby cywilnej byli niechętni
wrong_answers:
  - Społeczności nie były zbyt przychylne
  - Margrabia Badenii, początkowo zwolennik fizjokratyzmu, ostatecznie wycofał swoje poparcie
  - Klimat nie sprzyjał rolnictwu
explanation: |
  Opozycja ze strony zasiedziałych urzędników państwowych, przywiązanych do swoich przywilejów i nawyków, uniemożliwiła zastosowanie idei fizjokratycznych w Niemczech. Obawiali się oni, że proponowane reformy podważą ich władzę i wpływy.