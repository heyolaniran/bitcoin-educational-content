question: Porque é que a aplicação das ideias fisiocráticas na Alemanha acabou por ser abortada?
answer: Os actuais funcionários públicos mostraram-se relutantes
wrong_answers:
  - As populações não eram muito favoráveis
  - O Marquês de Baden, inicialmente um seguidor da Fisiocracia, acabou por retirar o seu apoio
  - O clima não era propício à agricultura
explanation: |
  A oposição dos funcionários públicos em exercício, apegados aos seus privilégios e hábitos, impediu a aplicação das ideias fisiocráticas na Alemanha. Temiam que as reformas propostas pusessem em causa o seu poder e influência.