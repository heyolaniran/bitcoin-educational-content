question: Почему применение физиократических идей в Германии было в конечном итоге прервано?
answer: Существующие государственные служащие не хотели
wrong_answers:
  - Население было не очень благосклонно
  - Маркграф Баденский, первоначально приверженец физиократии, в конце концов отказался от ее поддержки
  - Климат не способствовал развитию сельского хозяйства
explanation: |
  Противодействие со стороны действующих государственных служащих, привязанных к своим привилегиям и привычкам, препятствовало применению физиократических идей в Германии. Они опасались, что предлагаемые реформы поставят под сомнение их власть и влияние.