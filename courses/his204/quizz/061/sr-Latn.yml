question: Zašto je primena fiziokratskih ideja u Nemačkoj na kraju obustavljena?
answer: Postojeći državni službenici su bili nevoljni
wrong_answers:
  - Populacije nisu bile veoma podržavajuće
  - Markgrof od Badena, koji je u početku bio pristalica fiziokratije, na kraju je povukao svoju podršku
  - Klima nije bilo pogodno za poljoprivredu
explanation: |
  Protivljenje od strane trenutnih državnih službenika, vezanih za svoje privilegije i navike, sprečilo je primenu fiziokratskih ideja u Nemačkoj. Plašili su se da bi predložene reforme mogle ugroziti njihovu moć i uticaj.