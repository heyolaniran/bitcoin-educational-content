question: Varför avbröts tillämpningen av fysiokratiska idéer i Tyskland i slutändan?
answer: Befintliga tjänstemän var ovilliga att
wrong_answers:
  - Befolkningen var inte särskilt stödjande
  - Markgreven av Baden, som ursprungligen var anhängare av fysiokratin, drog så småningom tillbaka sitt stöd
  - Klimatet var inte gynnsamt för jordbruk
explanation: |
  Motståndet från de sittande ämbetsmännen, som var fästa vid sina privilegier och vanor, förhindrade att de fysiokratiska idéerna tillämpades i Tyskland. De fruktade att de föreslagna reformerna skulle utmana deras makt och inflytande.