question: Kwa nini utumizi wa mawazo ya kifizikia nchini Ujerumani hatimaye ulikatizwa?
answer: Watumishi wa umma waliokuwepo walisitasita
wrong_answers:
  - Idadi ya watu hawakuunga mkono sana
  - The Margrave of Baden, awali mfuasi wa Fiziokrasia, hatimaye aliondoa uungwaji mkono wake
  - Hali ya hewa haikuwa nzuri kwa kilimo
explanation: |
  Upinzani kutoka kwa watumishi wa umma walio madarakani, unaohusishwa na mapendeleo na tabia zao, ulizuia matumizi ya mawazo ya kifizikia nchini Ujerumani. Walihofia kwamba mageuzi yaliyopendekezwa yangepinga uwezo na ushawishi wao.