question: Tại sao việc áp dụng tư tưởng trọng nông ở Đức cuối cùng lại bị hủy bỏ?
answer: Các công chức hiện tại đã miễn cưỡng
wrong_answers:
  - Dân số không ủng hộ lắm
  - Margrave xứ Baden, ban đầu là người theo chủ nghĩa trọng nông, cuối cùng đã rút lại sự ủng hộ của mình
  - Khí hậu không thuận lợi cho nông nghiệp
explanation: |
  Sự phản đối từ các viên chức nhà nước đương nhiệm, gắn liền với đặc quyền và thói quen của họ, đã ngăn cản việc áp dụng các ý tưởng trọng nông ở Đức. Họ lo sợ rằng các cải cách được đề xuất sẽ thách thức quyền lực và ảnh hưởng của họ.