question: Kdo vyslal Merciera de la Rivière do Ruska, aby pomohl Kateřině II. reformovat její zákony?
answer: Diderot
wrong_answers:
  - Voltaire
  - Turgot
  - Quesnay
explanation: |
  Diderot, který udržoval korespondenci s Kateřinou II., ji vybídl, aby Merciera de la Rivière vyzvala k pomoci při reformě ruského zákonodárství.