question: Wer schickte Mercier de la Rivière nach Russland, um Katharina II. bei der Reform ihrer Gesetze zu helfen?
answer: Diderot
wrong_answers:
  - Voltaire
  - Turgot
  - Quesnay
explanation: |
  Diderot, der einen Briefwechsel mit Katharina II. unterhielt, ermutigte diese, Mercier de la Rivière um Hilfe bei der Reform der russischen Gesetzgebung zu bitten.