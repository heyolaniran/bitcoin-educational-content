question: ¿Quién envió a Mercier de la Rivière a Rusia para ayudar a Catalina II a reformar sus leyes?
answer: Diderot
wrong_answers:
  - Voltaire
  - Turgot
  - Quesnay
explanation: |
  Diderot, que mantenía correspondencia con Catalina II, animó a ésta a recurrir a Mercier de la Rivière para que le ayudara a reformar la legislación rusa.