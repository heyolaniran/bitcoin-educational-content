question: Kes saatis Mercier de la Rivière'i Venemaale, et aidata Katariina II seadusi reformida?
answer: Diderot
wrong_answers:
  - Voltaire
  - Turgot
  - Quesnay
explanation: |
  Diderot, kes pidas kirjavahetust Katariina II-ga, julgustas viimast kutsuma Mercier de la Rivière'i appi, et ta aitaks reformida Venemaa seadusandlust.