question: Kuka lähetti Mercier de la Rivièren Venäjälle auttamaan Katariina II:ta uudistamaan lakejaan?
answer: Diderot
wrong_answers:
  - Voltaire
  - Turgot
  - Quesnay
explanation: |
  Diderot, joka oli kirjeenvaihdossa Katariina II:n kanssa, kannusti tätä pyytämään Mercier de la Rivièreä auttamaan Venäjän lainsäädännön uudistamisessa.