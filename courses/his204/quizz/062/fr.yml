question: Qui envoya Mercier de la Rivière en Russie pour aider Catherine II à réformer sa réforme de la législation ?
answer: Diderot
wrong_answers:
  - Voltaire
  - Turgot
  - Quesnay
explanation: |
  Diderot, qui entretenait une correspondance avec Catherine II, a encouragé cette dernière à faire appel à Mercier de la Rivière pour l'aider à réformer la législation russe.
