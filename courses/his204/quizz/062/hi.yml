question: कैथरीन द्वितीय को उसके कानूनों में सुधार करने में मदद करने के लिए मर्सिएर डे ला रिवियेर को रूस किसने भेजा था?
answer: Diderot
wrong_answers:
  - वॉल्टेयर
  - टरगोट
  - क्वेस्ने
explanation: |
  डिडेरो, जिन्होंने कैथरीन द्वितीय के साथ पत्राचार बनाए रखा था, ने कैथरीन द्वितीय को रूसी कानून में सुधार के लिए मर्सिए डे ला रिविएर से संपर्क करने के लिए प्रोत्साहित किया।