question: Siapa yang mengirim Mercier de la Rivière ke Rusia untuk membantu Ekaterina II mereformasi hukumnya?
answer: Diderot
wrong_answers:
  - Voltaire
  - Turgot
  - Quesnay
explanation: |
  Diderot, yang menjalin korespondensi dengan Ekaterina II, mendorong Ekaterina II untuk meminta Mercier de la Rivière membantu mereformasi undang-undang Rusia.