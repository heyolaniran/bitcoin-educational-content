question: Chi inviò Mercier de la Rivière in Russia per aiutare Caterina II a riformare le sue leggi?
answer: Diderot
wrong_answers:
  - Voltaire
  - Turgot
  - Quesnay
explanation: |
  Diderot, che intratteneva una corrispondenza con Caterina II, incoraggiò quest'ultima a chiedere a Mercier de la Rivière di contribuire alla riforma della legislazione russa.