question: Hvem sendte Mercier de la Rivière til Russland for å hjelpe Katarina II med å reformere lovene?
answer: Diderot
wrong_answers:
  - Voltaire
  - Turgot
  - Quesnay
explanation: |
  Diderot, som korresponderte med Katarina II, oppfordret Katarina II til å be Mercier de la Rivière om hjelp til å reformere russisk lovgivning.