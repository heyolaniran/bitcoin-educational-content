question: Kto wysłał Merciera de la Rivière do Rosji, aby pomógł Katarzynie II zreformować jej prawa?
answer: Diderot
wrong_answers:
  - Wolter
  - Turgot
  - Quesnay
explanation: |
  Diderot, który utrzymywał korespondencję z Katarzyną II, zachęcał ją do zwrócenia się do Merciera de la Rivière o pomoc w zreformowaniu rosyjskiego prawodawstwa.