question: Quem enviou Mercier de la Rivière à Rússia para ajudar Catarina II a reformar as suas leis?
answer: Diderot
wrong_answers:
  - Voltaire
  - Turgot
  - Quesnay
explanation: |
  Diderot, que mantinha uma correspondência com Catarina II, encorajou-a a recorrer a Mercier de la Rivière para ajudar a reformar a legislação russa.