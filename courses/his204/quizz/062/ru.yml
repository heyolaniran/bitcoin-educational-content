question: Кто послал Мерсье де ла Ривьера в Россию, чтобы помочь Екатерине II реформировать законы?
answer: Дидро
wrong_answers:
  - Вольтер
  - Турго
  - Quesnay
explanation: |
  Дидро, поддерживавший переписку с Екатериной II, побудил последнюю обратиться к Мерсье де ла Ривьеру за помощью в реформировании российского законодательства.