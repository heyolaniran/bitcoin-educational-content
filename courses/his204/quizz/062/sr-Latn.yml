question: Ko je poslao Merciera de la Rivière u Rusiju da pomogne Katarini II da reformiše svoje zakone?
answer: Diderot
wrong_answers:
  - Volter
  - Turgot
  - Kene
explanation: |
  Diderot, koji je održavao prepisku sa Katarinom II, ohrabrio je potonju da pozove Merciera de la Rivièrea da pomogne u reformi ruskog zakonodavstva.