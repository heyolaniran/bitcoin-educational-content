question: Vem skickade Mercier de la Rivière till Ryssland för att hjälpa Katarina II att reformera sina lagar?
answer: Diderot
wrong_answers:
  - Voltaire
  - Turgot
  - Quesnay
explanation: |
  Diderot, som brevväxlade med Katarina II, uppmanade henne att be Mercier de la Rivière om hjälp med att reformera den ryska lagstiftningen.