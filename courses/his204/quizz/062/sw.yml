question: Ni nani aliyemtuma Mercier de la Rivière kwenda Urusi kumsaidia Catherine II kurekebisha sheria zake?
answer: Diderot
wrong_answers:
  - Voltaire
  - Turgot
  - Quesnay
explanation: |
  Diderot, ambaye alidumisha mawasiliano na Catherine II, alihimiza Catherine wa pili kumwita Mercier de la Rivière kusaidia kurekebisha sheria za Urusi.