question: Ai đã cử Mercier de la Rivière tới Nga để giúp Catherine II cải cách luật pháp của bà?
answer: Diderot
wrong_answers:
  - Voltaire
  - Gà lôi
  - Quesnay
explanation: |
  Diderot, người vẫn giữ mối quan hệ thư từ với Catherine II, đã khuyến khích bà kêu gọi Mercier de la Rivière giúp cải cách luật pháp Nga.