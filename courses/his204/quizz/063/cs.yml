question: Po jaké události v roce 1774 zaznamenali fyziokraté velký úspěch?
answer: Turgotův příchod na ministerstvo
wrong_answers:
  - Příjezd společnosti Dupont de Nemours na shromáždění
  - Příchod společnosti Dupont de Nemours na ministerstvo
  - Turgotův příjezd do Shromáždění
explanation: |
  Turgotův příchod na ministerstvo v roce 1774 znamenal pro fyziokraty úspěch, neboť byl horlivým zastáncem jejich myšlenek a realizoval některá jejich doporučení.