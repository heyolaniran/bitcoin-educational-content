question: Im Jahr 1774 hatten die Physiokraten nach welchem Ereignis großen Erfolg?
answer: Ankunft von Turgot im Ministerium
wrong_answers:
  - Die Ankunft von Dupont de Nemours in der Versammlung
  - Die Ankunft von Dupont de Nemours im Ministerium
  - Ankunft von Turgot in der Versammlung
explanation: |
  Als Turgot 1774 in das Ministerium eintrat, war dies ein Erfolg für die Physiokraten, denn er war ein glühender Anhänger ihrer Ideen und setzte einige ihrer Empfehlungen um.