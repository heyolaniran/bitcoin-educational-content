question: In 1774, the Physiocrats enjoyed great success following what event?
answer: Turgot's arrival at the Ministry
wrong_answers:
  - The arrival of Dupont de Nemours at the Assembly
  - The arrival of Dupont de Nemours at the Ministry
  - Turgot's arrival at the Assembly
explanation: |
  Turgot's arrival at the ministry in 1774 marked a success for the Physiocrats, as he was a fervent supporter of their ideas and implemented some of their recommendations.