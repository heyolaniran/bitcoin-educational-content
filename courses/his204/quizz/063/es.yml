question: ¿En 1774, los fisiócratas tuvieron un gran éxito a raíz de qué acontecimiento?
answer: La llegada de Turgot al Ministerio
wrong_answers:
  - La llegada de Dupont de Nemours a la Asamblea
  - La llegada de Dupont de Nemours al Ministerio
  - Llegada de Turgot a la Asamblea
explanation: |
  La llegada de Turgot al ministerio en 1774 supuso un éxito para los fisiócratas, ya que fue un ferviente partidario de sus ideas y puso en práctica algunas de sus recomendaciones.