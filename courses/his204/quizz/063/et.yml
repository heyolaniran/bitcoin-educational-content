question: Millise sündmuse järel nautisid füsiokraadid 1774. aastal suurt edu?
answer: Turgot' saabumine ministeeriumisse
wrong_answers:
  - Dupont de Nemours'i saabumine assambleesse
  - Dupont de Nemours'i saabumine ministeeriumisse
  - Turgot' saabumine assambleesse
explanation: |
  Turgot' saabumine ministriks 1774. aastal tähistas füsiokraatide edu, kuna ta oli nende ideede innukas toetaja ja rakendas mõningaid nende soovitusi.