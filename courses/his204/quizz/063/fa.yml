question: در سال 1774، فیزیوکرات‌ها پس از چه رویدادی موفقیت بزرگی کسب کردند؟
answer: ورود تورگو به وزارتخانه
wrong_answers:
  - ورود دوپونت دو نمور به مجمع
  - ورود دوپونت دو نمور به وزارتخانه
  - ورود تورگو به مجمع
explanation: |
  ورود تورگو به وزارت در سال 1774 موفقیتی برای فیزیوکرات‌ها بود، زیرا او حامی پرشور ایده‌های آن‌ها بود و برخی از توصیه‌هایشان را اجرا کرد.