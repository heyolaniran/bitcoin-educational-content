question: Minkä tapahtuman jälkeen fysiokraatit nauttivat suurta menestystä vuonna 1774?
answer: Turgotin saapuminen ministeriöön
wrong_answers:
  - Dupont de Nemoursin saapuminen yleiskokoukseen
  - Dupont de Nemoursin saapuminen ministeriöön
  - Turgot'n saapuminen yleiskokoukseen
explanation: |
  Turgot'n tulo ministeriöön vuonna 1774 merkitsi fysiokraattien menestystä, sillä hän kannatti kiihkeästi heidän ajatuksiaan ja toteutti osan heidän suosituksistaan.