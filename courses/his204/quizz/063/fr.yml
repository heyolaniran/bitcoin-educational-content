question: En 1774, à la suite de quel évènement les Physiocrates connaissent un succès remarqué ?
answer: L’arrivée de Turgot au ministère
wrong_answers:
  - L’arrivée de Dupont de Nemours à l’Assemblée
  - L’arrivée de Dupont de Nemours au ministère
  - L’arrivée de Turgot à l'Assemblée
explanation: |
  L'arrivée de Turgot au ministère en 1774 a marqué un succès pour les Physiocrates, car il était un fervent défenseur de leurs idées et a mis en œuvre certaines de leurs recommandations.
