question: 1774 में, किस घटना के बाद फिजियोक्रेट्स को बड़ी सफलता मिली?
answer: टर्गोट का मंत्रालय में आगमन
wrong_answers:
  - ड्यूपोंट डी नेमॉर्स का विधानसभा में आगमन
  - ड्यूपोंट डी नेमॉर्स का मंत्रालय में आगमन
  - टर्गोट का विधानसभा में आगमन
explanation: |
  1774 में टर्गोट का मंत्रालय में आगमन फिजियोक्रेट्स के लिए एक सफलता थी, क्योंकि वह उनके विचारों के प्रबल समर्थक थे और उन्होंने उनकी कुछ सिफारिशों को लागू भी किया था।