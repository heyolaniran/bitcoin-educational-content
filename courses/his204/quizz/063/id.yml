question: Pada tahun 1774, kaum Fisiokrat menikmati kesuksesan besar setelah peristiwa apa?
answer: Kedatangan Turgot di Kementerian
wrong_answers:
  - Kedatangan Dupont de Nemours di Majelis
  - Kedatangan Dupont de Nemours di Kementerian
  - Kedatangan Turgot di Majelis
explanation: |
  Kedatangan Turgot di kementerian pada tahun 1774 menandai keberhasilan bagi kaum Fisiokrat, karena ia adalah pendukung kuat ide-ide mereka dan menerapkan beberapa rekomendasi mereka.