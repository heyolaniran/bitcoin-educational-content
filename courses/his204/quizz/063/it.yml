question: Nel 1774, i Fisiocratici ottennero un grande successo in seguito a quale evento?
answer: L'arrivo di Turgot al Ministero
wrong_answers:
  - L'arrivo di Dupont de Nemours all'Assemblea
  - L'arrivo di Dupont de Nemours al ministero
  - L'arrivo di Turgot all'Assemblea
explanation: |
  L'arrivo di Turgot al ministero nel 1774 segnò un successo per i fisiocratici, in quanto fu un fervente sostenitore delle loro idee e attuò alcune delle loro raccomandazioni.