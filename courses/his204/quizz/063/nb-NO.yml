question: Hvilken hendelse i 1774 førte til stor suksess for fysiokratene?
answer: Turgots ankomst til departementet
wrong_answers:
  - Dupont de Nemours' ankomst til forsamlingen
  - Dupont de Nemours' ankomst til departementet
  - Turgots ankomst til nasjonalforsamlingen
explanation: |
  Turgots inntreden i departementet i 1774 markerte en suksess for fysiokratene, ettersom han var en ivrig tilhenger av deres ideer og gjennomførte noen av deres anbefalinger.