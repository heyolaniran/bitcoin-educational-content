question: Po jakim wydarzeniu w 1774 r. fizjokraci odnieśli wielki sukces?
answer: Przybycie Turgota do ministerstwa
wrong_answers:
  - Przybycie Dupont de Nemours na zgromadzenie
  - Przybycie Dupont de Nemours do ministerstwa
  - Przybycie Turgota na Zgromadzenie
explanation: |
  Przybycie Turgota do ministerstwa w 1774 r. oznaczało sukces fizjokratów, ponieważ był on gorącym zwolennikiem ich pomysłów i wdrożył niektóre z ich zaleceń.