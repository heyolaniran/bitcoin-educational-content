question: Em 1774, os fisiocratas tiveram grande sucesso na sequência de que acontecimento?
answer: A chegada de Turgot ao Ministério
wrong_answers:
  - A chegada de Dupont de Nemours à Assembleia
  - A chegada de Dupont de Nemours ao Ministério
  - A chegada de Turgot à Assembleia
explanation: |
  A chegada de Turgot ao ministério, em 1774, marcou um sucesso para os fisiocratas, uma vez que ele era um fervoroso apoiante das suas ideias e implementou algumas das suas recomendações.