question: В 1774 году после какого события физиократы пользовались большим успехом?
answer: Прибытие Турго в министерство
wrong_answers:
  - Прибытие Дюпона де Немура на Ассамблею
  - Прибытие Дюпона де Немура в министерство
  - Прибытие Тюрго в Ассамблею
explanation: |
  Приход Турго в министерство в 1774 году ознаменовал успех физиократов, поскольку он горячо поддерживал их идеи и претворял в жизнь некоторые из их рекомендаций.