question: Godine 1774, fiziokrati su uživali veliki uspeh nakon kojeg događaja?
answer: Turgotov dolazak u Ministarstvo
wrong_answers:
  - Dolazak Dupont de Nemours-a na Skupštinu
  - Dolazak Dupont de Nemours u Ministarstvo
  - Turgotov dolazak na Skupštinu
explanation: |
  Turgotov dolazak u ministarstvo 1774. godine označio je uspeh za fiziokrate, jer je bio vatreni pristalica njihovih ideja i sproveo je neke od njihovih preporuka.