question: Vilken händelse ledde till att fysiokraterna fick stora framgångar 1774?
answer: Turgots ankomst till ministeriet
wrong_answers:
  - Dupont de Nemours ankomst till församlingen
  - Dupont de Nemours ankomst till ministeriet
  - Turgots ankomst till församlingen
explanation: |
  Turgots tillträde till ministeriet 1774 innebar en framgång för fysiokraterna, eftersom han var en varm anhängare av deras idéer och genomförde några av deras rekommendationer.