question: Mnamo 1774, Wanafiziokrati walifurahia mafanikio makubwa kufuatia tukio gani?
answer: Turgot kuwasili Wizarani
wrong_answers:
  - Kuwasili kwa Dupont de Nemours kwenye Bunge
  - Kuwasili kwa Dupont de Nemours katika Wizara
  - Turgot kuwasili Bungeni
explanation: |
  Kuwasili kwa Turgot katika wizara hiyo mnamo 1774 kuliashiria mafanikio kwa Wanafiziokrati, kwani alikuwa mfuasi wa dhati wa mawazo yao na kutekeleza baadhi ya mapendekezo yao.