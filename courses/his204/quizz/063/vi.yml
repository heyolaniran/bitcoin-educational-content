question: Năm 1774, đảng Trọng nông đã đạt được thành công lớn sau sự kiện nào?
answer: Turgot đến Bộ
wrong_answers:
  - Sự xuất hiện của Dupont de Nemours tại Hội đồng
  - Sự xuất hiện của Dupont de Nemours tại Bộ
  - Turgot đến Hội đồng
explanation: |
  Sự xuất hiện của Turgot tại bộ vào năm 1774 đánh dấu một thành công cho những người theo chủ nghĩa trọng nông, vì ông là người ủng hộ nhiệt thành các ý tưởng của họ và thực hiện một số khuyến nghị của họ.