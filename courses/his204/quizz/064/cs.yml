question: Který z těchto autorů během revoluce nezasedal ve Shromáždění?
answer: Markýz de Mirabeau
wrong_answers:
  - Dupont de Nemours
  - Louis-Paul Abeille
  - François Quesnay
explanation: |
  Markýz de Mirabeau, ačkoli byl vlivným fyziokratem, během revoluce ve shromáždění nezasedal. François Quesnay již zemřel.