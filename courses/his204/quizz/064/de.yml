question: Welcher der folgenden Autoren saß während der Revolution nicht in der Versammlung?
answer: Der Marquis de Mirabeau
wrong_answers:
  - Dupont de Nemours
  - Louis-Paul Abeille
  - François Quesnay
explanation: |
  Der Marquis de Mirabeau, obwohl ein einflussreicher Physiokrat, saß während der Revolution nicht in der Versammlung. François Quesnay war bereits verstorben.