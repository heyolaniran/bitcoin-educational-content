question: During the Revolution, which of these authors did not sit in the Assembly?
answer: The Marquis de Mirabeau
wrong_answers:
  - Dupont de Nemours
  - Louis-Paul Abeille
  - François Quesnay
explanation: |
  The Marquis de Mirabeau, although an influential physiocrat, did not sit in the Assembly during the Revolution. François Quesnay had already passed away.