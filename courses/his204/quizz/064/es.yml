question: Durante la Revolución, ¿cuál de estos autores no formó parte de la Asamblea?
answer: El marqués de Mirabeau
wrong_answers:
  - Dupont de Nemours
  - Louis-Paul Abeille
  - François Quesnay
explanation: |
  El marqués de Mirabeau, aunque era un influyente fisiócrata, no formó parte de la Asamblea durante la Revolución. François Quesnay ya había fallecido.