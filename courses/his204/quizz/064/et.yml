question: Milline neist autoritest ei istunud revolutsiooni ajal riigikogus?
answer: Marquis de Mirabeau
wrong_answers:
  - Dupont de Nemours
  - Louis-Paul Abeille
  - François Quesnay
explanation: |
  Marquis de Mirabeau, kuigi mõjukas füsiokraat, ei istunud revolutsiooni ajal assamblees. François Quesnay oli juba surnud.