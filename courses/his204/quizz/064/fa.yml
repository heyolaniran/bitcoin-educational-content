question: در طول انقلاب، کدام یک از این نویسندگان در مجلس ننشستند؟
answer: مارکی دو میرابو
wrong_answers:
  - دوپونت دو نمیورز
  - لویی-پل آبیل
  - فرانسوا کنه
explanation: |
  مارکی دو میرابو، با وجود اینکه یک فیزیوکرات تأثیرگذار بود، در طول انقلاب در مجلس حضور نداشت. فرانسوا کنه قبلاً درگذشته بود.