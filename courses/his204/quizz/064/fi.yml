question: Kuka näistä kirjailijoista ei istunut vallankumouksen aikana edustajakokouksessa?
answer: Markiisi de Mirabeau
wrong_answers:
  - Dupont de Nemours
  - Louis-Paul Abeille
  - François Quesnay
explanation: |
  Markiisi de Mirabeau, vaikka hän olikin vaikutusvaltainen fysiokraatti, ei istunut kansalliskokouksessa vallankumouksen aikana. François Quesnay oli jo kuollut.