question: Durant la révolution et parmi ces auteurs, lequel ne siégea pas à l’Assemblée ?
answer: Le marquis de Mirabeau
wrong_answers:
  - Dupont de Nemours
  - Louis-Paul Abeille
  - François Quesnay
explanation: |
  Le marquis de Mirabeau, bien qu'il ait été un physiocrate influent, n'a pas siégé à l'Assemblée pendant la Révolution. François Quesnay était déjà décédé.
