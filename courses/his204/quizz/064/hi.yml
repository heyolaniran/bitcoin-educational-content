question: क्रान्ति के दौरान इनमें से कौन सा लेखक सभा में नहीं बैठा?
answer: मार्क्विस डी मिराब्यू
wrong_answers:
  - ड्यूपॉन्ट डी नेमॉर्स
  - लुई-पॉल अबेले
  - फ़्राँस्वा क्वेस्ने
explanation: |
  मार्क्विस डी मिराब्यू, हालांकि एक प्रभावशाली फिजियोक्रेट थे, क्रांति के दौरान विधानसभा में नहीं बैठे। फ़्राँस्वा क्वेस्ने का पहले ही निधन हो चुका था।