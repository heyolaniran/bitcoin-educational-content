question: Selama Revolusi, siapa di antara para penulis ini yang tidak duduk di Majelis?
answer: Marquis de Mirabeau
wrong_answers:
  - Dupont de Nemours
  - Louis-Paul Abeille
  - François Quesnay
explanation: |
  Marquis de Mirabeau, meskipun seorang fisiokrat yang berpengaruh, tidak duduk di Majelis selama Revolusi. François Quesnay sudah meninggal dunia.