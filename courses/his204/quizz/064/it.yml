question: Durante la Rivoluzione, quale di questi autori non fece parte dell'Assemblea?
answer: Il Marchese di Mirabeau
wrong_answers:
  - Dupont de Nemours
  - Louis-Paul Abeille
  - François Quesnay
explanation: |
  Il marchese di Mirabeau, pur essendo un influente fisiocrate, non fece parte dell'Assemblea durante la Rivoluzione. François Quesnay era già morto.