question: Hvilken av disse forfatterne satt ikke i nasjonalforsamlingen under revolusjonen?
answer: Marquis de Mirabeau
wrong_answers:
  - Dupont de Nemours
  - Louis-Paul Abeille
  - François Quesnay
explanation: |
  Markis de Mirabeau var en innflytelsesrik fysiokrat, men han satt ikke i nasjonalforsamlingen under revolusjonen. François Quesnay hadde allerede gått bort.