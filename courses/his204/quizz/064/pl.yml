question: Który z tych autorów nie zasiadał w Zgromadzeniu podczas rewolucji?
answer: Markiz de Mirabeau
wrong_answers:
  - Dupont de Nemours
  - Louis-Paul Abeille
  - François Quesnay
explanation: |
  Markiz de Mirabeau, choć wpływowy fizjokrata, nie zasiadał w Zgromadzeniu podczas Rewolucji. François Quesnay już nie żył.