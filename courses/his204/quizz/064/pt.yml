question: Durante a Revolução, qual destes autores não teve assento na Assembleia?
answer: O Marquês de Mirabeau
wrong_answers:
  - Dupont de Nemours
  - Louis-Paul Abeille
  - François Quesnay
explanation: |
  O Marquês de Mirabeau, apesar de ser um fisiocrata influente, não teve assento na Assembleia durante a Revolução. François Quesnay já tinha falecido.