question: Во время революции кто из этих авторов не заседал в Собрании?
answer: Маркиз де Мирабо
wrong_answers:
  - Дюпон де Немур
  - Луи-Поль Абейль
  - Франсуа Кесне
explanation: |
  Маркиз де Мирабо, хотя и был влиятельным физиократом, не заседал в Собрании во время Революции. Франсуа Кесне уже скончался.