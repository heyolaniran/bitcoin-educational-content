question: Tokom Revolucije, koji od ovih autora nije sedeo u Skupštini?
answer: Markiz de Mirabo
wrong_answers:
  - Dupont de Nemours
  - Louis-Paul Abeille
  - François Quesnay
explanation: |
  Markiz de Mirabo, iako uticajan fiziokrat, nije sedeo u Skupštini tokom Revolucije. Fransoa Kene je već bio preminuo.