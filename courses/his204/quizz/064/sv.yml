question: Vilken av dessa författare satt inte i nationalförsamlingen under revolutionen?
answer: Markisen de Mirabeau
wrong_answers:
  - Dupont de Nemours
  - Louis-Paul Abeille
  - François Quesnay
explanation: |
  Marquis de Mirabeau, trots att han var en inflytelserik fysiokrat, satt inte i församlingen under revolutionen. François Quesnay hade redan gått bort.