question: Wakati wa Mapinduzi ni nani kati ya waandishi hawa ambaye hakuketi kwenye Bunge?
answer: Marquis de Mirabeau
wrong_answers:
  - Dupont de Nemours
  - Louis-Paul Abeille
  - François Quesnay
explanation: |
  Marquis de Mirabeau, ingawa alikuwa mwanafiziokrasia mwenye ushawishi, hakuketi katika Bunge wakati wa Mapinduzi. François Quesnay alikuwa tayari ameaga dunia.