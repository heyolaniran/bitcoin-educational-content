question: Trong thời kỳ Cách mạng, tác giả nào sau đây không tham gia Quốc hội?
answer: Hầu tước de Mirabeau
wrong_answers:
  - Dupont de Nemours
  - Louis-Paul Abeille
  - François Quesnay
explanation: |
  Hầu tước de Mirabeau, mặc dù là một nhà trọng nông có ảnh hưởng, đã không tham gia Quốc hội trong suốt cuộc Cách mạng. François Quesnay đã qua đời.