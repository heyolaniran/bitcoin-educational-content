question: Kde se setkali Adam Smith a fyziokraté?
answer: V Paříži
wrong_answers:
  - V Glasgow
  - V Londýně
  - Nikdy se nesetkali
explanation: |
  Adam Smith se s fyziokraty setkal v Paříži během své cesty po Evropě. Byl ovlivněn jejich myšlenkami, ale zároveň vytvořil vlastní ekonomickou teorii, která se od fyziokratismu v některých ohledech lišila.