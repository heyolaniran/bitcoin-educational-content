question: Wo trafen sich Adam Smith und die Physiokraten?
answer: In Paris
wrong_answers:
  - In Glasgow
  - In London
  - Sie sind sich noch nie begegnet
explanation: |
  Adam Smith lernte die Physiokraten während einer Europareise in Paris kennen. Er wurde von ihren Ideen beeinflusst, entwickelte aber auch seine eigene Wirtschaftstheorie, die sich in einigen Punkten von der Physiokratie unterschied.