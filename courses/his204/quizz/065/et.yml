question: Kus kohtusid Adam Smith ja füsiokraadid?
answer: Pariisis
wrong_answers:
  - Glasgow's
  - Londonis
  - Nad ei ole kunagi kohtunud
explanation: |
  Adam Smith kohtus füsiokraatidega Pariisi reisil Euroopas. Ta sai nende ideedest mõjutusi, kuid töötas välja ka oma majandusteooria, mis erines mõnes mõttes füsiokraatidest.