question: آدام اسمیت و فیزیوکرات‌ها کجا ملاقات کردند؟
answer: در پاریس
wrong_answers:
  - در گلاسگو
  - در لندن
  - آنها هرگز ملاقات نکرده‌اند
explanation: |
  آدام اسمیت در طی سفری به اروپا با فیزیوکرات‌ها در پاریس ملاقات کرد. او تحت تأثیر ایده‌های آن‌ها قرار گرفت، اما همچنین نظریه اقتصادی خود را توسعه داد که در برخی جنبه‌ها با فیزیوکراسی متفاوت بود.