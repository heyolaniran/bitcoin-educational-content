question: Missä Adam Smith ja fysiokraatit kohtasivat?
answer: Pariisissa
wrong_answers:
  - Glasgow'ssa
  - Lontoossa
  - He eivät ole koskaan tavanneet
explanation: |
  Adam Smith tapasi fysiokraatit Pariisissa Euroopan-matkallaan. Hän sai vaikutteita heidän ajatuksistaan, mutta kehitti myös oman talousteoriansa, joka erosi fysiokraateista joiltakin osin.