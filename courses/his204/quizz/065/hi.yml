question: एडम स्मिथ और फिजियोक्रेट्स की मुलाकात कहां हुई थी?
answer: पेरिस में
wrong_answers:
  - ग्लासगो में
  - लंदन में
  - वे कभी नहीं मिले
explanation: |
  एडम स्मिथ यूरोप की यात्रा के दौरान पेरिस में फिजियोक्रेट्स से मिले। वे उनके विचारों से प्रभावित हुए, लेकिन उन्होंने अपना खुद का आर्थिक सिद्धांत भी विकसित किया, जो कुछ मामलों में फिजियोक्रेसी से अलग था।