question: Di mana Adam Smith dan kaum Fisiokrat bertemu?
answer: Di Paris
wrong_answers:
  - Di Glasgow
  - Di London
  - Mereka belum pernah bertemu
explanation: |
  Adam Smith bertemu dengan kaum Fisiokrat di Paris dalam sebuah perjalanan ke Eropa. Dia terpengaruh oleh ide-ide mereka, tetapi juga mengembangkan teori ekonominya sendiri, yang berbeda dari Fisiokrasi dalam beberapa hal.