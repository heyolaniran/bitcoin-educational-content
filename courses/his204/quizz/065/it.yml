question: Dove si sono incontrati Adam Smith e i fisiocratici?
answer: A Parigi
wrong_answers:
  - A Glasgow
  - A Londra
  - Non si sono mai incontrati
explanation: |
  Adam Smith incontrò i fisiocratici a Parigi durante un viaggio in Europa. Fu influenzato dalle loro idee, ma sviluppò anche una propria teoria economica, che per alcuni aspetti differiva dalla Fisiocrazia.