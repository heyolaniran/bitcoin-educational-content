question: Hvor møttes Adam Smith og fysiokratene?
answer: I Paris
wrong_answers:
  - I Glasgow
  - I London
  - De har aldri møttes
explanation: |
  Adam Smith møtte fysiokratene i Paris under en reise i Europa. Han ble påvirket av deres ideer, men utviklet også sin egen økonomiske teori, som på noen punkter skilte seg fra fysiokratiet.