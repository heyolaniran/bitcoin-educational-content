question: Onde é que Adam Smith e os fisiocratas se encontraram?
answer: Em Paris
wrong_answers:
  - Em Glasgow
  - Em Londres
  - Nunca se conheceram
explanation: |
  Adam Smith conheceu os fisiocratas em Paris, durante uma viagem à Europa. Foi influenciado pelas suas ideias, mas também desenvolveu a sua própria teoria económica, que diferia da fisiocracia em alguns aspectos.