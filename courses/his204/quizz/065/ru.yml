question: Где встретились Адам Смит и физиократы?
answer: В Париже
wrong_answers:
  - В Глазго
  - В Лондоне
  - Они никогда не встречались
explanation: |
  Адам Смит познакомился с физиократами в Париже во время поездки по Европе. Он испытал влияние их идей, но также разработал собственную экономическую теорию, которая в некоторых аспектах отличалась от физиократии.