question: Gde su se sastajali Adam Smit i fiziokrati?
answer: U Parizu
wrong_answers:
  - U Glazgovu
  - U Londonu
  - Nikada se nisu sreli
explanation: |
  Adam Smith je sreo fiziokrate u Parizu tokom putovanja po Evropi. Bio je pod uticajem njihovih ideja, ali je takođe razvio svoju ekonomsku teoriju, koja se u nekim aspektima razlikovala od fiziokratije.