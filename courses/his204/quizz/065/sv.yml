question: Var träffades Adam Smith och fysiokraterna?
answer: I Paris
wrong_answers:
  - I Glasgow
  - I London
  - De har aldrig träffats
explanation: |
  Adam Smith träffade fysiokraterna i Paris under en resa i Europa. Han påverkades av deras idéer, men utvecklade också sin egen ekonomiska teori, som i vissa avseenden skilde sig från fysiokratin.