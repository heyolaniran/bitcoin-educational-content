question: Adam Smith na Wanafiziokrati walikutana wapi?
answer: Katika Paris
wrong_answers:
  - Katika Glasgow
  - Katika London
  - Hawajawahi kukutana
explanation: |
  Adam Smith alikutana na Wanafiziokrati huko Paris wakati wa safari ya kwenda Uropa. Aliathiriwa na mawazo yao, lakini pia aliendeleza nadharia yake ya kiuchumi, ambayo ilitofautiana na Physiocracy kwa namna fulani.