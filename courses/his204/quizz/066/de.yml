question: In welcher Branche ist Dupont de Nemours et Cie, gegründet vom Sohn des französischen Ökonomen, tätig?
answer: Chemie und Biologie
wrong_answers:
  - Banken und Versicherungen
  - Textilien
  - Lebensmittelindustrie
explanation: |
  Dupont de Nemours ist ein Chemie- und Biologieunternehmen, das von dem Sohn des Wirtschaftswissenschaftlers Pierre-Samuel Dupont de Nemours gegründet wurde.