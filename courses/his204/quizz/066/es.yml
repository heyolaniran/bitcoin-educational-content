question: ¿A qué actividad se dedica Dupont de Nemours et Cie, fundada por el hijo del economista francés?
answer: Química y biología
wrong_answers:
  - Banca y seguros
  - Textil
  - Industria alimentaria
explanation: |
  Dupont de Nemours es una empresa química y biológica fundada por el hijo del economista Pierre-Samuel Dupont de Nemours.