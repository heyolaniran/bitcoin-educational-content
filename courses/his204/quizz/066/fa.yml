question: دوپونت دو نمیور و شرکا، که توسط پسر اقتصاددان فرانسوی تأسیس شده است، در چه کسب‌وکاری فعالیت می‌کند؟
answer: شیمی و زیست‌شناسی
wrong_answers:
  - بانکداری و بیمه
  - نساجی
  - صنعت غذا
explanation: |
  دوپونت دو نمور یک شرکت شیمیایی و زیست‌شناسی است که توسط پسر اقتصاددان پیر-ساموئل دوپونت دو نمور تأسیس شده است.