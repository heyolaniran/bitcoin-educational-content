question: Millä alalla Dupont de Nemours et Cie, jonka perusti ranskalaisen taloustieteilijän poika, toimii?
answer: Kemia ja biologia
wrong_answers:
  - Pankkitoiminta ja vakuutukset
  - Tekstiili
  - Elintarviketeollisuus
explanation: |
  Dupont de Nemours on kemian ja biologian alan yritys, jonka perusti taloustieteilijä Pierre-Samuel Dupont de Nemoursin poika.