question: फ्रांसीसी अर्थशास्त्री के बेटे द्वारा स्थापित ड्यूपॉन्ट डी नेमॉर्स एट सी, कौन सा व्यवसाय संचालित करता है?
answer: रसायन विज्ञान और जीव विज्ञान
wrong_answers:
  - बैंकिंग और बीमा
  - कपड़ा
  - खाद्य उद्योग
explanation: |
  ड्यूपॉन्ट डी नेमॉर्स एक रसायन और जीवविज्ञान कंपनी है जिसकी स्थापना अर्थशास्त्री पियरे-सैमुअल ड्यूपॉन्ट डी नेमॉर्स के बेटे द्वारा की गई थी।