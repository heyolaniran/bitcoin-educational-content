question: Bisnis apa yang dijalankan oleh Dupont de Nemours et Cie, yang didirikan oleh putra ekonom Prancis?
answer: Kimia dan biologi
wrong_answers:
  - Perbankan & Asuransi
  - Tekstil
  - Industri makanan
explanation: |
  Dupont de Nemours adalah perusahaan bahan kimia dan biologi yang didirikan oleh putra ekonom Pierre-Samuel Dupont de Nemours.