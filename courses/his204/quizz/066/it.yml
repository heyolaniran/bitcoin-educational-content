question: In quale settore opera la Dupont de Nemours et Cie, fondata dal figlio dell'economista francese?
answer: Chimica e biologia
wrong_answers:
  - Banche e assicurazioni
  - Tessile
  - Industria alimentare
explanation: |
  Dupont de Nemours è un'azienda chimica e biologica fondata dal figlio dell'economista Pierre-Samuel Dupont de Nemours.