question: Hvilken bransje driver Dupont de Nemours et Cie, grunnlagt av den franske økonomens sønn, med?
answer: Kjemi og biologi
wrong_answers:
  - Bank og forsikring
  - Tekstil
  - Næringsmiddelindustrien
explanation: |
  Dupont de Nemours er et kjemikalie- og biologiselskap som ble grunnlagt av sønnen til økonomen Pierre-Samuel Dupont de Nemours.