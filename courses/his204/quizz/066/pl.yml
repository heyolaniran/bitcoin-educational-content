question: W jakiej branży działa firma Dupont de Nemours et Cie, założona przez syna francuskiego ekonomisty?
answer: Chemia i biologia
wrong_answers:
  - Bankowość i ubezpieczenia
  - Tekstylia
  - Przemysł spożywczy
explanation: |
  Dupont de Nemours to firma z branży chemicznej i biologicznej założona przez syna ekonomisty Pierre'a-Samuela Dupont de Nemours.