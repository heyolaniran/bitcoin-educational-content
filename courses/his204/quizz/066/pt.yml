question: Qual é o sector de atividade da Dupont de Nemours et Cie, fundada pelo filho do economista francês?
answer: Química e biologia
wrong_answers:
  - Banca e seguros
  - Têxtil
  - Indústria alimentar
explanation: |
  A Dupont de Nemours é uma empresa química e biológica fundada pelo filho do economista Pierre-Samuel Dupont de Nemours.