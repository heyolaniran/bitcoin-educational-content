question: Каким бизнесом занимается компания Dupont de Nemours et Cie, основанная сыном французского экономиста?
answer: Химия и биология
wrong_answers:
  - Банки и страхование
  - Текстиль
  - Пищевая промышленность
explanation: |
  Dupont de Nemours - химическая и биологическая компания, основанная сыном экономиста Пьера-Самюэля Дюпона де Немура.