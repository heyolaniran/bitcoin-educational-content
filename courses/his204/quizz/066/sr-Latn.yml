question: U kom posluje Dupont de Nemours et Cie, koji je osnovao sin francuskog ekonomiste?
answer: Hemija i biologija
wrong_answers:
  - Bankarstvo i osiguranje
  - Tekstil
  - Industrija hrane
explanation: |
  Dupont de Nemours je hemijska i biološka kompanija koju je osnovao sin ekonomiste Pierrea-Samuela Duponta de Nemoursa.