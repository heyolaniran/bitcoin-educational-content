question: I vilken bransch verkar Dupont de Nemours et Cie, som grundades av den franske ekonomens son?
answer: Kemi och biologi
wrong_answers:
  - Bank & Försäkring
  - Textil
  - Livsmedelsindustrin
explanation: |
  Dupont de Nemours är ett kemi- och biologiföretag som grundades av sonen till ekonomen Pierre-Samuel Dupont de Nemours.