question: Je, Dupont de Nemours et Cie, iliyoanzishwa na mtoto wa mwanauchumi wa Ufaransa, wanafanya biashara gani?
answer: Kemia na biolojia
wrong_answers:
  - Benki na Bima
  - Nguo
  - Sekta ya chakula
explanation: |
  Dupont de Nemours ni kampuni ya kemikali na biolojia iliyoanzishwa na mtoto wa mwanauchumi Pierre-Samuel Dupont de Nemours.