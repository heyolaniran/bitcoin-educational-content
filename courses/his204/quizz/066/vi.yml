question: Công ty Dupont de Nemours et Cie do con trai của nhà kinh tế học người Pháp sáng lập, hoạt động trong lĩnh vực kinh doanh gì?
answer: Hóa học và sinh học
wrong_answers:
  - Ngân hàng & Bảo hiểm
  - Dệt may
  - Ngành công nghiệp thực phẩm
explanation: |
  Dupont de Nemours là một công ty hóa chất và sinh học được thành lập bởi con trai của nhà kinh tế học Pierre-Samuel Dupont de Nemours.