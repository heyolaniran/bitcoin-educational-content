question: Why was he called Dupont de Nemours, even though he was born Pierre-Samuel Du Pont?
answer: To differentiate him from the other Duponts of the 1789 Assembly
wrong_answers:
  - He is noble by origin
  - He married the Countess de Nemours
  - It was a pen name
explanation: |
  "de Nemours" was added to Pierre-Samuel Dupont's name to distinguish him from the other Duponts who sat on the Assemblée Constitante in 1789.