question: چرا او را دوپونت دو نمور می‌نامیدند، حتی با اینکه با نام پیر-ساموئل دو پونت به دنیا آمده بود؟
answer: برای تمایز او از دیگر دوپونت‌های مجلس 1789
wrong_answers:
  - او از اصل و نسب نجیب است
  - او با کنتس دو نمور ازدواج کرد
  - این یک نام مستعار بود
explanation: |
  "دو نمور" به نام پیر-ساموئل دوپونت اضافه شد تا او را از دیگر دوپونت‌هایی که در سال 1789 در مجلس مؤسسان حضور داشتند، متمایز کند.