question: यद्यपि उनका जन्म पियरे-सैमुअल डू पोंट के नाम से हुआ था, फिर भी उन्हें डूपोंट डी नेमॉर्स क्यों कहा गया?
answer: 1789 विधानसभा के अन्य ड्यूपॉन्ट्स से उन्हें अलग करने के लिए
wrong_answers:
  - वह मूलतः कुलीन है
  - उन्होंने काउंटेस डे नेमॉर्स से विवाह किया
  - यह एक उपनाम था
explanation: |
  पियरे-सैमुअल ड्यूपॉन्ट के नाम में "डी नेमॉर्स" शब्द जोड़ा गया ताकि उन्हें 1789 में असेम्बली कॉन्स्टिटेंटे में बैठने वाले अन्य ड्यूपॉन्ट से अलग किया जा सके।