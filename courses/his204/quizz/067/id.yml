question: Mengapa ia disebut Dupont de Nemours, meskipun ia terlahir dengan nama Pierre-Samuel Du Pont?
answer: Untuk membedakannya dari Duponts lain dari Majelis 1789
wrong_answers:
  - Dia adalah orang yang mulia karena asal usulnya
  - Ia menikah dengan Countess de Nemours
  - Itu adalah nama pena
explanation: |
  "de Nemours" ditambahkan pada nama Pierre-Samuel Dupont untuk membedakannya dengan Dupont lainnya yang duduk di Assemblée Constitante pada tahun 1789.