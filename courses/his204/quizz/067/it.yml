question: Perché si chiamava Dupont de Nemours, anche se era nato Pierre-Samuel Du Pont?
answer: Per differenziarsi dagli altri Dupont dell'Assemblea del 1789
wrong_answers:
  - È nobile di origine
  - Sposò la contessa di Nemours
  - Era un nome di penna
explanation: |
  "de Nemours" fu aggiunto al nome di Pierre-Samuel Dupont per distinguerlo dagli altri Dupont che sedevano nell'Assemblée Constitante nel 1789.