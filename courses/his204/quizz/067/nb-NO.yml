question: Hvorfor ble han kalt Dupont de Nemours, selv om han var født Pierre-Samuel Du Pont?
answer: For å skille ham fra de andre Dupontene i 1789-forsamlingen
wrong_answers:
  - Han er adelig av opprinnelse
  - Han giftet seg med grevinne de Nemours
  - Det var et pseudonym
explanation: |
  "de Nemours" ble lagt til Pierre-Samuel Duponts navn for å skille ham fra de andre Dupontene som satt i den grunnlovgivende forsamlingen i 1789.