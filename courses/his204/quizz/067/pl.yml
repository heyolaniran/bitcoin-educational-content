question: Dlaczego nazywał się Dupont de Nemours, choć urodził się jako Pierre-Samuel Du Pont?
answer: Aby odróżnić go od innych Dupontów ze Zgromadzenia z 1789 r
wrong_answers:
  - Jest szlachetny z pochodzenia
  - Ożenił się z hrabiną de Nemours
  - To był pseudonim
explanation: |
  "de Nemours" zostało dodane do nazwiska Pierre'a-Samuela Duponta, aby odróżnić go od innych Dupontów, którzy zasiadali w Assemblée Constitante w 1789 roku.