question: Porque é que lhe chamaram Dupont de Nemours, apesar de ter nascido Pierre-Samuel Du Pont?
answer: Para o distinguir dos outros Duponts da Assembleia de 1789
wrong_answers:
  - Ele é nobre de origem
  - Casou com a Condessa de Nemours
  - Era um pseudónimo
explanation: |
  a palavra "de Nemours" foi acrescentada ao nome de Pierre-Samuel Dupont para o distinguir dos outros Duponts que participaram na Assembleia Constituinte em 1789.