question: Почему его называли Дюпон де Немур, хотя он был урожденным Пьером-Самюэлем Дю Поном?
answer: Чтобы отличить его от других Дюпонов из Ассамблеи 1789 года
wrong_answers:
  - Он благороден по происхождению
  - Он женился на графине де Немур
  - Это был псевдоним
explanation: |
  к фамилии Пьера-Самюэля Дюпона добавили "де Немур", чтобы отличить его от других Дюпонов, заседавших в Конституционном собрании в 1789 году.