question: Varför kallades han Dupont de Nemours, trots att han föddes som Pierre-Samuel Du Pont?
answer: För att skilja honom från de andra Duponts i 1789 års församling
wrong_answers:
  - Han är av ädelt ursprung
  - Han gifte sig med grevinnan de Nemours
  - Det var ett pseudonym
explanation: |
  "de Nemours" lades till i Pierre-Samuel Duponts namn för att skilja honom från de andra Duponts som satt i Assemblée Constitante 1789.