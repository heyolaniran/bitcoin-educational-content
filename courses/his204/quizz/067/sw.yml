question: Kwa nini aliitwa Dupont de Nemours, ingawa alizaliwa Pierre-Samuel Du Pont?
answer: Ili kumtofautisha na Duponts nyingine za Bunge la 1789
wrong_answers:
  - Yeye ni mtukufu kwa asili
  - Alioa Countess de Nemours
  - Lilikuwa jina la kalamu
explanation: |
  "de Nemours" iliongezwa kwa jina la Pierre-Samuel Dupont ili kumtofautisha na Wadupo wengine walioketi kwenye Assemblée Constitante mnamo 1789.