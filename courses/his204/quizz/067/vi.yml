question: Tại sao ông được gọi là Dupont de Nemours mặc dù ông sinh ra với tên Pierre-Samuel Du Pont?
answer: Để phân biệt ông với những người Dupont khác của Hội đồng năm 1789
wrong_answers:
  - Anh ấy có nguồn gốc cao quý
  - Ông kết hôn với Nữ bá tước de Nemours
  - Đó là một bút danh
explanation: |
  "de Nemours" được thêm vào tên của Pierre-Samuel Dupont để phân biệt ông với những người Dupont khác tham gia Assemblée Constitante vào năm 1789.