question: Proč byl Dupont de Nemours tak výjimečnou osobností fyziokratické školy?
answer: Byl nejmladší
wrong_answers:
  - Byl nejstarší
  - Byl nejbohatší
  - Byl nejvýmluvnější
explanation: |
  Dupont de Nemours byl jedním z nejmladších členů fyziokratické školy, což mu umožnilo dlouhou a významnou politickou a ekonomickou kariéru.