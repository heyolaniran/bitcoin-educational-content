question: Warum war Dupont de Nemours eine so außergewöhnliche Persönlichkeit in der physiokratischen Schule?
answer: Er war der jüngste
wrong_answers:
  - Er war der älteste
  - Er war der reichste
  - Er war der eloquenteste
explanation: |
  Dupont de Nemours war eines der jüngsten Mitglieder der physiokratischen Schule, was ihm eine lange und bedeutende politische und wirtschaftliche Karriere ermöglichte.