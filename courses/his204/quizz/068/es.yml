question: ¿Por qué Dupont de Nemours fue una figura tan excepcional en la escuela fisiocrática?
answer: Era el más joven
wrong_answers:
  - Era el mayor
  - Era el más rico
  - Era el más elocuente
explanation: |
  Dupont de Nemours fue uno de los miembros más jóvenes de la escuela fisiocrática, lo que le permitió disfrutar de una larga y distinguida carrera política y económica.