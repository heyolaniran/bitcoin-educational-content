question: Miks oli Dupont de Nemours nii erakordne tegelane füsiokraatlikus koolkonnas?
answer: Ta oli noorim
wrong_answers:
  - Ta oli vanim
  - Ta oli kõige rikkam
  - Ta oli kõige kõnekam
explanation: |
  Dupont de Nemours oli üks noorimaid füsiokraatliku koolkonna esindajaid, mis võimaldas tal nautida pikka ja silmapaistvat poliitilist ja majanduslikku karjääri.