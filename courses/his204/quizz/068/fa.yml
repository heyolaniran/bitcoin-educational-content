question: چرا دوپونت دو نمور شخصیتی استثنایی در مکتب فیزیوکرات‌ها بود؟
answer: او جوان‌ترین بود
wrong_answers:
  - او مسن‌ترین بود
  - او ثروتمندترین بود
  - او فصیح‌ترین بود
explanation: |
  دوپونت دو نمور یکی از جوان‌ترین اعضای مکتب فیزیوکرات بود که این امر به او امکان داد تا از یک دوران طولانی و برجسته در عرصه سیاسی و اقتصادی بهره‌مند شود.