question: Miksi Dupont de Nemours oli niin poikkeuksellinen henkilö fysiokraattisen koulukunnan keskuudessa?
answer: Hän oli nuorin
wrong_answers:
  - Hän oli vanhin
  - Hän oli rikkain
  - Hän oli kaunopuheisin
explanation: |
  Dupont de Nemours oli yksi fysiokraattisen koulukunnan nuorimmista jäsenistä, minkä ansiosta hän sai nauttia pitkästä ja merkittävästä poliittisesta ja taloudellisesta urasta.