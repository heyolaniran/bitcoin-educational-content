question: फिजियोक्रेटिक स्कूल में ड्यूपोंट डी नेमॉर्स इतने असाधारण व्यक्ति क्यों थे?
answer: वह सबसे छोटा था
wrong_answers:
  - वह सबसे बुजुर्ग थे
  - वह सबसे अमीर था
  - वह सबसे अधिक वाक्पटु थे
explanation: |
  ड्यूपॉन्ट डी नेमॉर्स फिजियोक्रेटिक स्कूल के सबसे युवा सदस्यों में से एक थे, जिसके कारण उन्हें एक लम्बा और प्रतिष्ठित राजनीतिक और आर्थिक कैरियर प्राप्त करने का अवसर मिला।