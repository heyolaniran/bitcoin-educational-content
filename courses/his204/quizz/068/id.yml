question: Mengapa Dupont de Nemours merupakan sosok yang luar biasa dalam sekolah fisiokratis?
answer: Dia adalah yang termuda
wrong_answers:
  - Dia adalah yang tertua
  - Dia adalah yang terkaya
  - Dia adalah yang paling fasih
explanation: |
  Dupont de Nemours adalah salah satu anggota termuda dari sekolah fisiokratis, yang memungkinkannya untuk menikmati karier politik dan ekonomi yang panjang dan terhormat.