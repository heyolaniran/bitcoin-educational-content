question: Perché Dupont de Nemours era una figura così eccezionale nella scuola fisiocratica?
answer: Era il più giovane
wrong_answers:
  - Era il più anziano
  - Era il più ricco
  - Era il più eloquente
explanation: |
  Dupont de Nemours fu uno dei più giovani esponenti della scuola fisiocratica, che gli consentì una lunga e brillante carriera politica ed economica.