question: Hvorfor var Dupont de Nemours en så eksepsjonell skikkelse i den fysiokratiske skolen?
answer: Han var den yngste
wrong_answers:
  - Han var den eldste
  - Han var den rikeste
  - Han var den mest veltalende
explanation: |
  Dupont de Nemours var et av de yngste medlemmene av den fysiokratiske skolen, noe som gjorde det mulig for ham å gjøre en lang og fremtredende politisk og økonomisk karriere.