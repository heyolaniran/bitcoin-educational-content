question: Dlaczego Dupont de Nemours był tak wyjątkową postacią w szkole fizjokratycznej?
answer: Był najmłodszy
wrong_answers:
  - Był najstarszy
  - Był najbogatszy
  - Był najbardziej elokwentnym
explanation: |
  Dupont de Nemours był jednym z najmłodszych członków szkoły fizjokratycznej, co pozwoliło mu cieszyć się długą i wybitną karierą polityczną i gospodarczą.