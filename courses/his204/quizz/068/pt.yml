question: Porque é que Dupont de Nemours foi uma figura tão excecional na escola fisiocrática?
answer: Ele era o mais jovem
wrong_answers:
  - Ele era o mais velho
  - Ele era o mais rico
  - Ele era o mais eloquente
explanation: |
  Dupont de Nemours foi um dos mais jovens membros da escola fisiocrática, o que lhe permitiu uma longa e distinta carreira política e económica.