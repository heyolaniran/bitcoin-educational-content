question: Почему Дюпон де Немур был такой исключительной фигурой в физиократической школе?
answer: Он был самым молодым
wrong_answers:
  - Он был самым старшим
  - Он был самым богатым
  - Он был самым красноречивым
explanation: |
  Дюпон де Немур был одним из самых молодых представителей физиократической школы, что позволило ему сделать долгую и выдающуюся политическую и экономическую карьеру.