question: Zašto je Dupont de Nemours bio tako izuzetna ličnost u fiziokratskoj školi?
answer: Bio je najmlađi
wrong_answers:
  - Bio je najstariji
  - Bio je najbogatiji
  - Bio je najelokventniji
explanation: |
  Dupont de Nemours je bio jedan od najmlađih članova fiziokratske škole, što mu je omogućilo dugu i istaknutu političku i ekonomsku karijeru.