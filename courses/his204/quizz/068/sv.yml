question: Varför var Dupont de Nemours en så exceptionell person inom den fysiokratiska skolan?
answer: Han var den yngste
wrong_answers:
  - Han var den äldsta
  - Han var den rikaste
  - Han var den mest vältalige
explanation: |
  Dupont de Nemours var en av de yngsta medlemmarna i den fysiokratiska skolan, vilket gjorde att han kunde njuta av en lång och framstående politisk och ekonomisk karriär.