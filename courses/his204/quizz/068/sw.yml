question: Kwa nini Dupont de Nemours alikuwa mtu wa kipekee katika shule ya fizikia?
answer: Alikuwa mdogo zaidi
wrong_answers:
  - Alikuwa mkubwa zaidi
  - Alikuwa tajiri zaidi
  - Alikuwa mzungumzaji zaidi
explanation: |
  Dupont de Nemours alikuwa mmoja wa washiriki wachanga zaidi wa shule ya fizikia, ambayo ilimwezesha kufurahia maisha marefu na mashuhuri ya kisiasa na kiuchumi.