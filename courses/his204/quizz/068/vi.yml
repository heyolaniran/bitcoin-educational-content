question: Tại sao Dupont de Nemours lại là một nhân vật đặc biệt trong trường phái trọng nông?
answer: Anh ấy là người trẻ nhất
wrong_answers:
  - Ông ấy là người lớn tuổi nhất
  - Ông ấy là người giàu nhất
  - Ông ấy là người hùng biện nhất
explanation: |
  Dupont de Nemours là một trong những thành viên trẻ nhất của trường phái trọng nông, điều này giúp ông có được sự nghiệp chính trị và kinh tế lâu dài và danh giá.