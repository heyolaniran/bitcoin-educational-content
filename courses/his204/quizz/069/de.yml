question: Für welchen Minister hat Dupont de Nemours gearbeitet?
answer: Turgot
wrong_answers:
  - Necker
  - Calonne
  - Colbert
explanation: |
  Dupont de Nemours arbeitete mit Turgot, dem Finanzminister Ludwigs XVI., zusammen und half bei der Umsetzung einer Reihe von Wirtschaftsreformen, die von der Physiokratie inspiriert waren.