question: Auprès de quel ministre Dupont de Nemours a-t-il œuvré ?
answer: Turgot
wrong_answers:
  - Necker
  - Calonne
  - Colbert
explanation: |
  Dupont de Nemours a travaillé avec Turgot, ministre des finances de Louis XVI, et a contribué à la mise en œuvre de certaines réformes économiques inspirées par la physiocratie.
