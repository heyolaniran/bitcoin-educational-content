question: Menteri mana yang bekerja untuk Dupont de Nemours?
answer: Turgot
wrong_answers:
  - Necker
  - Calonne
  - Colbert
explanation: |
  Dupont de Nemours bekerja dengan Turgot, menteri keuangan Louis XVI, dan membantu mengimplementasikan sejumlah reformasi ekonomi yang terinspirasi oleh fisiokrasi.