question: Per quale ministro ha lavorato Dupont de Nemours?
answer: Turgot
wrong_answers:
  - Necker
  - Calonne
  - Colbert
explanation: |
  Dupont de Nemours collaborò con Turgot, ministro delle finanze di Luigi XVI, e contribuì all'attuazione di una serie di riforme economiche ispirate alla fisiocrazia.