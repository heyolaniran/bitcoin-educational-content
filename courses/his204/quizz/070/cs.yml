question: Co podle Josepha A. Schumpetera chybělo Dupontu de Nemours v jeho kariéře ekonoma?
answer: Příležitost popřít svou fyziokratickou věrnost
wrong_answers:
  - Příležitosti popřít své přátelství s Turgotem
  - Příležitosti k tomu, abychom se vzdali našeho laissez-faire přístupu
  - Uznání kolegů
explanation: |
  Schumpeter se domníval, že Dupont de Nemours byl vždy věrný fyziokracii a že nikdy nezapřel své přesvědčení, i když to bylo obtížné.