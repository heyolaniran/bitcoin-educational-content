question: Mis puudus Joseph A. Schumpeteri arvates Dupont de Nemours'i majandusteadlase karjääris?
answer: Võimalused eitada oma füsiokraatlikku kuuluvust
wrong_answers:
  - Võimalused eitada oma sõprust Turgot'ga
  - Võimalused loobuda meie laissez-faire lähenemisviisist
  - Vastastikune tunnustamine
explanation: |
  Schumpeter arvas, et Dupont de Nemours oli alati olnud ustav füsikorraldusele ja et ta ei olnud kunagi eitanud oma veendumusi, isegi kui see oli raske.