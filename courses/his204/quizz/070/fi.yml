question: Mitä Dupont de Nemoursilta puuttui Joseph A. Schumpeterin mielestä hänen urallaan taloustieteilijänä?
answer: Mahdollisuudet kieltää fysiokraattisen uskollisuutensa
wrong_answers:
  - Mahdollisuudet kieltää ystävyytensä Turgot'n kanssa
  - Mahdollisuudet luopua laissez-faire -lähestymistavasta
  - Vertaisten tunnustaminen
explanation: |
  Schumpeter oli sitä mieltä, että Dupont de Nemours oli aina ollut uskollinen fysiokratialle eikä hän ollut koskaan kieltänyt vakaumustaan, vaikka se olisi ollut vaikeaa.