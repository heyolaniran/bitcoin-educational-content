question: Selon l’avis de Joseph A. Schumpeter, qu’est-ce qui n’a pas manqué à Dupont de Nemours au cours de sa carrière d’économiste ?
answer: D’occasions de renier son adhésion à la Physiocratie
wrong_answers:
  - D’occasions de renier son amitié avec Turgot
  - D’occasions de renier son adhésion au laissez-faire
  - De reconnaissance de ses pairs
explanation: |
  Schumpeter estimait que Dupont de Nemours a toujours été fidèle à la physiocratie et qu'il n'a jamais renié ses convictions, même lorsque cela était difficile.
