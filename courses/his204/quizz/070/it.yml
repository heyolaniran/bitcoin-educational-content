question: Secondo Joseph A. Schumpeter, cosa mancava a Dupont de Nemours nella sua carriera di economista?
answer: Opportunità di rinnegare la sua fedeltà fisiocratica
wrong_answers:
  - Opportunità di negare la sua amicizia con Turgot
  - Opportunità di rinunciare al nostro approccio laissez-faire
  - Riconoscimento tra pari
explanation: |
  Schumpeter ritiene che Dupont de Nemours sia sempre stato fedele alla fisiocrazia e che non abbia mai rinnegato le sue convinzioni, anche quando era difficile farlo.