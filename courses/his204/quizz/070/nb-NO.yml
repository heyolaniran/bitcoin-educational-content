question: Hva mente Joseph A. Schumpeter at Dupont de Nemours manglet i sin karriere som økonom?
answer: Muligheter til å fornekte sin fysiokratiske tilhørighet
wrong_answers:
  - Muligheter til å benekte sitt vennskap med Turgot
  - Muligheter til å gi avkall på vår laissez-faire-tilnærming
  - Anerkjennelse fra kolleger
explanation: |
  Schumpeter mente at Dupont de Nemours alltid hadde vært trofast mot fysiokratiet, og at han aldri hadde fornektet sin overbevisning, selv når det var vanskelig å gjøre det.