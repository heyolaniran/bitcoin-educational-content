question: Czego zdaniem Josepha A. Schumpetera brakowało Dupont de Nemours w jego karierze ekonomisty?
answer: Możliwości zaprzeczenia jego fizjokratycznej lojalności
wrong_answers:
  - Możliwości zaprzeczenia jego przyjaźni z Turgotem
  - Możliwości porzucenia naszego leseferystycznego podejścia
  - Uznanie rówieśników
explanation: |
  Schumpeter uważał, że Dupont de Nemours zawsze był wierny fizjokracji i nigdy nie zaprzeczał swoim przekonaniom, nawet gdy było to trudne.