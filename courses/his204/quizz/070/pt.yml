question: Na opinião de Joseph A. Schumpeter, o que é que faltou a Dupont de Nemours na sua carreira de economista?
answer: Oportunidades para negar a sua fidelidade fisiocrática
wrong_answers:
  - Oportunidades para negar a sua amizade com Turgot
  - Oportunidades para renunciar à nossa abordagem de laissez-faire
  - Reconhecimento pelos pares
explanation: |
  Schumpeter considera que Dupont de Nemours sempre foi fiel à fisiocracia e que nunca negou as suas convicções, mesmo quando era difícil fazê-lo.