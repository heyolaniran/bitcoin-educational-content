question: Чего, по мнению Йозефа А. Шумпетера, не хватало Дюпону де Немуру в его карьере экономиста?
answer: Возможности отречься от своей физиократической верности
wrong_answers:
  - Возможности отрицать свою дружбу с Тюрго
  - Возможности отказаться от нашего подхода, основанного на свободе действий
  - Признание коллег
explanation: |
  Шумпетер считал, что Дюпон де Немур всегда был верен физиократии и никогда не отказывался от своих убеждений, даже когда это было трудно сделать.