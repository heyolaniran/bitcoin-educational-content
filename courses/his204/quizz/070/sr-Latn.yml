question: Prema mišljenju Josepha A. Schumpetera, šta je Dupontu de Nemoursu nedostajalo u njegovoj karijeri kao ekonomiste?
answer: Prilike da porekne svoju fiziokratsku odanost
wrong_answers:
  - Prilike da porekne svoje prijateljstvo sa Turgotom
  - Prilike da se odreknemo našeg laissez-faire pristupa
  - Prepoznavanje od strane vršnjaka
explanation: |
  Schumpeter je smatrao da je Dupont de Nemours uvek bio veran fiziokratiji i da nikada nije porekao svoja uverenja, čak ni kada je to bilo teško učiniti.