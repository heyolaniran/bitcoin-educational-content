question: Vad ansåg Joseph A. Schumpeter att Dupont de Nemours saknade i sin karriär som ekonom?
answer: Möjligheter att förneka sin fysiokratiska tillhörighet
wrong_answers:
  - Möjligheter att förneka sin vänskap med Turgot
  - Möjligheter att avstå från vår laissez-faire-strategi
  - Erkännande av kollegor
explanation: |
  Schumpeter ansåg att Dupont de Nemours alltid hade varit fysiokratin trogen och att han aldrig hade förnekat sin övertygelse, inte ens när det var svårt att göra det.