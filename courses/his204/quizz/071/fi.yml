question: Kuka filosofi kirjoitti fysiokraattien Ephémérides du Citoyen -lehteen?
answer: Diderot
wrong_answers:
  - Voltaire
  - Condorcet
  - Rousseau
explanation: |
  Diderot osallistui fysiokraattien "Éphémérides du Citoyen" -lehteen ja kirjoitti artikkeleita taloudellisista ja yhteiskunnallisista aiheista.