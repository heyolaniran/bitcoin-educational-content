question: Filsuf mana yang menulis di Ephémérides du Citoyen, jurnal kaum Fisiokrat?
answer: Diderot
wrong_answers:
  - Voltaire
  - Condorcet
  - Rousseau
explanation: |
  Diderot berkontribusi pada "Éphémérides du Citoyen", jurnal kaum Fisiokrat, dengan menulis artikel-artikel tentang topik ekonomi dan sosial.