question: Quale filosofo scrisse nelle Ephémérides du Citoyen, la rivista dei Fisiocratici?
answer: Diderot
wrong_answers:
  - Voltaire
  - Condorcet
  - Rousseau
explanation: |
  Diderot contribuì agli "Éphémérides du Citoyen", la rivista dei Fisiocratici, scrivendo articoli su argomenti economici e sociali.