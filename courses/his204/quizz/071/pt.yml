question: Que filósofo escreveu nas Ephémérides du Citoyen, o jornal dos Fisiocratas?
answer: Diderot
wrong_answers:
  - Voltaire
  - Condorcet
  - Rousseau
explanation: |
  Diderot contribuiu para as "Éphémérides du Citoyen", a revista dos Fisiocratas, escrevendo artigos sobre temas económicos e sociais.