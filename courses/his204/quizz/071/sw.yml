question: Ni mwanafalsafa gani aliandika katika Ephémérides du Citoyen, jarida la Physiocrats?
answer: Diderot
wrong_answers:
  - Voltaire
  - Condorcet
  - Rousseau
explanation: |
  Diderot alichangia "Éphémérides du Citoyen", jarida la Physiocrats, akiandika makala kuhusu mada za kiuchumi na kijamii.