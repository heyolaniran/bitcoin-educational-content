question: Nhà triết học nào đã viết trong Ephémérides du Citoyen, tạp chí của những người theo chủ nghĩa trọng nông?
answer: Diderot
wrong_answers:
  - Voltaire
  - Condorcet
  - Rousseau
explanation: |
  Diderot đã đóng góp cho "Éphémérides du Citoyen", tạp chí của những người theo chủ nghĩa trọng nông, viết các bài báo về các chủ đề kinh tế và xã hội.