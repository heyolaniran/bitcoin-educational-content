question: Jakou literární formou napadl abbé Galiani fyziokraty a jejich tezi o svobodě obchodu s obilím?
answer: Dialog
wrong_answers:
  - Román
  - Poezie
  - Test
explanation: |
  Galiani kritizoval fyziokraty ve svém díle "Dialogues sur le commerce des blés" (Dialogy o obchodu s bílými), které je psáno formou dialogů mezi různými postavami.