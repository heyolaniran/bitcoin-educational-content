question: In welcher literarischen Form griff der Abbé Galiani die Physiokraten und ihre These von der Freiheit des Getreidehandels an?
answer: Dialog
wrong_answers:
  - Der Roman
  - Poesie
  - Der Test
explanation: |
  Galiani kritisierte die Physiokraten in seinen "Dialogues sur le commerce des blés", einem Werk, das in Form von Dialogen zwischen verschiedenen Personen geschrieben ist.