question: ¿En qué forma literaria atacó el abate Galiani a los fisiócratas y sus tesis sobre la libertad del comercio de cereales?
answer: Diálogo
wrong_answers:
  - La novela
  - Poesía
  - La prueba
explanation: |
  Galiani criticó a los fisiócratas en sus "Dialogues sur le commerce des blés", obra escrita en forma de diálogos entre distintos personajes.