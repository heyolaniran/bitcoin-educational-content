question: Millises kirjanduslikus vormis ründas Abbé Galiani füsiokraate ja nende teesi teraviljakaubanduse vabaduse kohta?
answer: Dialoog
wrong_answers:
  - Romaan
  - Luule
  - Test
explanation: |
  Galiani kritiseeris füsiokraate oma teoses "Dialogues sur le commerce des blés", mis on kirjutatud eri tegelaste vaheliste dialoogide vormis.