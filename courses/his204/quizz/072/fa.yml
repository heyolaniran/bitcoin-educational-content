question: آبه گالیانی در چه قالب ادبی به فیزیوکرات‌ها و نظریه آن‌ها درباره آزادی تجارت غلات حمله کرد؟
answer: گفتگو
wrong_answers:
  - رمان
  - شعر
  - آزمون
explanation: |
  گالیانی در اثر خود "Dialogues sur le commerce des blés" که به صورت گفتگو بین شخصیت‌های مختلف نوشته شده است، از فیزیوکرات‌ها انتقاد کرد.