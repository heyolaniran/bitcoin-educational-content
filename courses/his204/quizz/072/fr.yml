question: Sous quelle forme littéraire l’abbé Galiani attaqua les Physiocrates et leur thèse sur la liberté du commerce des grains ?
answer: Le Dialogue
wrong_answers:
  - Le Roman
  - La Poèsie
  - L'essai
explanation: |
  Galiani a critiqué les Physiocrates dans son "Dialogues sur le commerce des blés", un ouvrage écrit sous forme de dialogues entre différents personnages.
