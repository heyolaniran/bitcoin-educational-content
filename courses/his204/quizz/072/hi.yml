question: एबे गैलियानी ने किस साहित्यिक रूप में फिजियोक्रेट्स और अनाज व्यापार की स्वतंत्रता पर उनके सिद्धांत पर हमला किया?
answer: वार्ता
wrong_answers:
  - उपन्यास
  - कविता
  - कसौटी
explanation: |
  गैलियानी ने अपनी रचना "डायलॉग्स सुर ले कॉमर्स डेस ब्लेस" में फिजियोक्रेट्स की आलोचना की, जो विभिन्न पात्रों के बीच संवाद के रूप में लिखी गई थी।