question: Dalam bentuk sastra apa Abbé Galiani menyerang kaum Fisiokrat dan tesis mereka tentang kebebasan perdagangan biji-bijian?
answer: Dialog
wrong_answers:
  - Novel
  - Puisi
  - Tes
explanation: |
  Galiani mengkritik kaum Fisiokrat dalam karyanya "Dialogues sur le commerce des blés", sebuah karya yang ditulis dalam bentuk dialog antara karakter yang berbeda.