question: In quale forma letteraria l'Abbé Galiani attaccò i Fisiocratici e le loro tesi sulla libertà di commercio dei cereali?
answer: Dialogo
wrong_answers:
  - Il romanzo
  - Poesia
  - Il test
explanation: |
  Galiani criticò i Fisiocratici nei suoi "Dialoghi sul commercio dei fiori", un'opera scritta sotto forma di dialoghi tra diversi personaggi.