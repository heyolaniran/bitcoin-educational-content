question: I hvilken litterær form angrep abbé Galiani fysiokratene og deres tese om kornhandelens frihet?
answer: Dialog
wrong_answers:
  - Romanen
  - Poesi
  - Testen
explanation: |
  Galiani kritiserte fysiokratene i "Dialogues sur le commerce des blés", et verk skrevet i form av dialoger mellom ulike personer.