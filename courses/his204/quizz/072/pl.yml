question: W jakiej formie literackiej Abbé Galiani zaatakował fizjokratów i ich tezę o wolności handlu zbożem?
answer: Dialog
wrong_answers:
  - Powieść
  - Poezja
  - Test
explanation: |
  Galiani skrytykował fizjokratów w "Dialogues sur le commerce des blés", dziele napisanym w formie dialogów między różnymi postaciami.