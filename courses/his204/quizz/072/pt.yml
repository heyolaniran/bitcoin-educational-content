question: Em que forma literária é que o Abade Galiani atacou os Fisiocratas e a sua tese sobre a liberdade do comércio de cereais?
answer: Diálogo
wrong_answers:
  - O romance
  - Poesia
  - O teste
explanation: |
  Galiani criticou os fisiocratas nos seus "Diálogos sobre o comércio dos blés", uma obra escrita sob a forma de diálogos entre diferentes personagens.