question: В какой литературной форме аббат Галиани атаковал физиократов и их тезис о свободе торговли зерном?
answer: Диалог
wrong_answers:
  - Роман
  - Поэзия
  - Тест
explanation: |
  Галиани критиковал физиократов в своих "Диалогах о торговле голубыми", произведении, написанном в форме диалогов между различными персонажами.