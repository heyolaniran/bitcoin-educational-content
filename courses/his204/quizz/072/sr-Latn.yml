question: U kom obliku književnosti je Abbé Galiani napao fiziokrate i njihovu tezu o slobodi trgovine žitom?
answer: Dijalog
wrong_answers:
  - Roman
  - Poezija
  - Test
explanation: |
  Galiani je kritikovao fiziokrate u svom delu "Dialogues sur le commerce des blés", koje je napisano u formi dijaloga između različitih likova.