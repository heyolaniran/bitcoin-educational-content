question: I vilken litterär form angrep Abbé Galiani fysiokraterna och deras teser om fri spannmålshandel?
answer: Dialogen
wrong_answers:
  - Romanen
  - Poesi
  - Testet
explanation: |
  Galiani kritiserade fysiokraterna i sin "Dialogues sur le commerce des blés", ett verk som är skrivet i form av dialoger mellan olika karaktärer.