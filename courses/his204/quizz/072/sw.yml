question: Abbé Galiani alishambulia kwa njia gani ya kifasihi Wanafiziokrati na nadharia yao juu ya uhuru wa biashara ya nafaka?
answer: Mazungumzo
wrong_answers:
  - Riwaya
  - Ushairi
  - Mtihani
explanation: |
  Galiani aliwakosoa Wanafiziokrati katika "Dialogues sur le commerce des blés", kazi iliyoandikwa kwa njia ya mazungumzo kati ya wahusika tofauti.