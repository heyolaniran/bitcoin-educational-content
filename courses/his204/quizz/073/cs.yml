question: Čím se Voltaire zabývá v knize L'Homme aux quarante écus?
answer: Daňová teorie fyziokratů
wrong_answers:
  - Měnová teorie fyziokratů
  - Politická teorie fyziokratů
  - Fyziokratická teorie hodnoty
explanation: |
  Voltaire kritizuje daňovou teorii fyziokratů ve filozofické povídce "L'Homme aux quarante écus", v níž se vysmívá fyziokraty navrhované jednotné dani z půdy.