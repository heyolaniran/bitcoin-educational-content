question: Was thematisiert Voltaire in L'Homme aux quarante écus?
answer: Die Steuertheorie der Physiokraten
wrong_answers:
  - Die Geldtheorie der Physiokraten
  - Die politische Theorie der Physiokraten
  - Die Werttheorie der Physiokraten
explanation: |
  Voltaire kritisiert die Steuertheorie der Physiokraten in "L'Homme aux quarante écus", einer philosophischen Erzählung, in der er sich über die von den Physiokraten vorgeschlagene Einheitssteuer auf Grund und Boden lustig macht.