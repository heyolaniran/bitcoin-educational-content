question: What does Voltaire tackle in L'Homme aux quarante écus?
answer: The tax theory of the Physiocrats
wrong_answers:
  - The monetary theory of the Physiocrats
  - The political theory of the Physiocrats
  - The Physiocrats' theory of value
explanation: |
  Voltaire criticizes the Physiocrats' tax theory in "L'Homme aux quarante écus", a philosophical tale in which he mocks the Physiocrats' proposed single tax on land.