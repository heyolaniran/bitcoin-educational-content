question: ¿Qué aborda Voltaire en L'Homme aux quarante écus?
answer: La teoría fiscal de los fisiócratas
wrong_answers:
  - La teoría monetaria de los fisiócratas
  - La teoría política de los fisiócratas
  - La teoría del valor de los fisiócratas
explanation: |
  Voltaire critica la teoría fiscal de los fisiócratas en "L'Homme aux quarante écus", un relato filosófico en el que se burla del impuesto único sobre la tierra propuesto por los fisiócratas.