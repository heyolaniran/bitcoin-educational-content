question: Mida Voltaire käsitleb teoses L'Homme aux quarante écus?
answer: Füsiokraatide maksuteooria
wrong_answers:
  - Füsiokraatide rahateooria
  - Füsiokraatide poliitiline teooria
  - Füsiokraatide väärtusteooria
explanation: |
  Voltaire kritiseerib füsiokraatide maksuteooriat filosoofilises jutustuses "L'Homme aux quarante écus", milles ta pilkab füsiokraatide kavandatud ühtset maamaksu.