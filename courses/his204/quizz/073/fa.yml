question: ولتر در "L'Homme aux quarante écus" به چه موضوعاتی می‌پردازد؟
answer: نظریه مالیاتی فیزیوکرات‌ها
wrong_answers:
  - نظریه پولی فیزیوکرات‌ها
  - نظریه سیاسی فیزیوکرات‌ها
  - نظریه ارزش فیزیوکرات‌ها
explanation: |
  ولتر نظریه مالیاتی فیزیوکرات‌ها را در "L'Homme aux quarante écus" نقد می‌کند، داستان فلسفی‌ای که در آن او مالیات واحد پیشنهادی فیزیوکرات‌ها بر زمین را به تمسخر می‌گیرد.