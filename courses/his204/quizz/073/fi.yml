question: Mitä Voltaire käsittelee L'Homme aux quarante écus -teoksessa?
answer: Fysiokraattien veroteoria
wrong_answers:
  - Fysiokraattien rahateoria
  - Fysiokraattien poliittinen teoria
  - Fysiokraattien arvoteoria
explanation: |
  Voltaire kritisoi fysiokraattien veroteoriaa filosofisessa kertomuksessa "L'Homme aux quarante écus", jossa hän pilkkaa fysiokraattien ehdottamaa yhtenäistä maaveroa.