question: À quoi s’attaque Voltaire dans L’Homme aux quarante écus ?
answer: La théorie fiscale des Physiocrates
wrong_answers:
  - La théorie monétaire des Physiocrates
  - La théorie politique des Physiocrates
  - La théorie de la valeur des Physiocrates
explanation: |
  Voltaire critique la théorie fiscale des Physiocrates dans "L'Homme aux quarante écus", un conte philosophique dans lequel il se moque de l'impôt unique sur la terre proposé par les Physiocrates.
