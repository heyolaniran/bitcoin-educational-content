question: वोल्टेयर एल'होमे ऑक्स क्वारेंटे एकस में किससे निपटता है?
answer: फिजियोक्रेट्स का कर सिद्धांत
wrong_answers:
  - फिजियोक्रेट्स का मौद्रिक सिद्धांत
  - फिजियोक्रेट्स का राजनीतिक सिद्धांत
  - फिजियोक्रेट्स का मूल्य सिद्धांत
explanation: |
  वॉल्टेयर ने "ल'होमे ऑक्स क्वारंते एकस" नामक दार्शनिक कहानी में फिजियोक्रेट्स के कर सिद्धांत की आलोचना की है, जिसमें उन्होंने भूमि पर फिजियोक्रेट्स के प्रस्तावित एकल कर का मजाक उड़ाया है।