question: Apa yang dibahas Voltaire dalam L'Homme aux quarante écus?
answer: Teori pajak dari kaum Fisiokrat
wrong_answers:
  - Teori moneter dari kaum Fisiokrat
  - Teori politik kaum Fisiokrat
  - Teori nilai kaum Fisiokrat
explanation: |
  Voltaire mengkritik teori pajak kaum Fisiokrat dalam "L'Homme aux quarante écus", sebuah kisah filosofis yang mengolok-olok usulan pajak tunggal kaum Fisiokrat atas tanah.