question: Che cosa affronta Voltaire ne L'Homme aux quarante écus?
answer: La teoria fiscale dei fisiocratici
wrong_answers:
  - La teoria monetaria dei fisiocratici
  - La teoria politica dei fisiocratici
  - La teoria del valore dei Fisiocratici
explanation: |
  Voltaire critica la teoria fiscale dei Fisiocratici in "L'Homme aux quarante écus", un racconto filosofico in cui si fa beffe della proposta dei Fisiocratici di un'imposta unica sulla terra.