question: Hva tar Voltaire for seg i L'Homme aux quarante écus?
answer: Fysiokratenes skatteteori
wrong_answers:
  - Fysiokratenes monetære teori
  - Fysiokratenes politiske teori
  - Fysiokratenes verditeori
explanation: |
  Voltaire kritiserer fysiokratenes skatteteori i "L'Homme aux quarante écus", en filosofisk fortelling der han gjør narr av fysiokratenes forslag om én skatt på jord.