question: Czym zajmuje się Voltaire w L'Homme aux quarante écus?
answer: Teoria podatkowa fizjokratów
wrong_answers:
  - Teoria monetarna fizjokratów
  - Teoria polityczna fizjokratów
  - Teoria wartości fizjokratów
explanation: |
  Voltaire krytykuje teorię podatkową fizjokratów w "L'Homme aux quarante écus", filozoficznej opowieści, w której wyśmiewa proponowany przez fizjokratów jednolity podatek gruntowy.