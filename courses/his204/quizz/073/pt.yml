question: O que é que Voltaire aborda em L'Homme aux quarante écus?
answer: A teoria fiscal dos Fisiocratas
wrong_answers:
  - A teoria monetária dos fisiocratas
  - A teoria política dos fisiocratas
  - A teoria do valor dos fisiocratas
explanation: |
  Voltaire critica a teoria fiscal dos Fisiocratas em "L'Homme aux quarante écus", um conto filosófico em que ridiculariza a proposta dos Fisiocratas de um imposto único sobre a terra.