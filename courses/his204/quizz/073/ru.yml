question: О чем пишет Вольтер в "Человеке в карантине"?
answer: Налоговая теория физиократов
wrong_answers:
  - Монетарная теория физиократов
  - Политическая теория физиократов
  - Теория стоимости физиократов
explanation: |
  Вольтер критикует налоговую теорию физиократов в "Человеке в четыреста лет" - философской повести, в которой он высмеивает предложенный физиократами единый налог на землю.