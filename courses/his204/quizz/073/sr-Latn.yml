question: Šta Voltaire obrađuje u delu L'Homme aux quarante écus?
answer: Poreska teorija fiziokrata
wrong_answers:
  - Monetarna teorija fiziokrata
  - Politička teorija fiziokrata
  - Teorija vrednosti fiziokrata
explanation: |
  Voltaire kritikuje teoriju poreza fiziokrata u "L'Homme aux quarante écus", filozofskoj priči u kojoj ismeva predloženi jedinstveni porez fiziokrata na zemlju.