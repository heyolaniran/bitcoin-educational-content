question: Vad tar Voltaire upp i L'Homme aux quarante écus?
answer: Fysiokraternas skatteteori
wrong_answers:
  - Fysiokraternas penningteori
  - Fysiokraternas politiska teori
  - Fysiokraternas värdeteori
explanation: |
  Voltaire kritiserar fysiokraternas skatteteori i "L'Homme aux quarante écus", en filosofisk berättelse där han hånar fysiokraternas förslag om en enda skatt på mark.