question: Voltaire anashughulikia nini katika L'Homme aux quarante écus?
answer: Nadharia ya kodi ya Fizikia
wrong_answers:
  - Nadharia ya fedha ya Physiocrats
  - Nadharia ya kisiasa ya Wanafizikia
  - Nadharia ya thamani ya Fizikia
explanation: |
  Voltaire anakosoa nadharia ya kodi ya Fiziokrati katika "L'Homme aux quarante écus", hadithi ya kifalsafa ambapo anakejeli kodi moja iliyopendekezwa ya Wanafiziokrati kwenye ardhi.