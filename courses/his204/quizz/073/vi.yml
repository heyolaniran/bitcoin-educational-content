question: Voltaire giải quyết vấn đề gì trong L'Homme aux quarante écus?
answer: Lý thuyết thuế của những người theo chủ nghĩa trọng nông
wrong_answers:
  - Học thuyết tiền tệ của những người theo chủ nghĩa trọng nông
  - Lý thuyết chính trị của những người theo chủ nghĩa trọng nông
  - Lý thuyết giá trị của các nhà trọng nông
explanation: |
  Voltaire chỉ trích học thuyết thuế của những người theo chủ nghĩa trọng nông trong "L'Homme aux quarante écus", một câu chuyện triết học trong đó ông chế giễu đề xuất đánh thuế đất đai duy nhất của những người theo chủ nghĩa trọng nông.