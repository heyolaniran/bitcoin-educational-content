question: V jaké otázce získal Turgot Diderotovu podporu?
answer: Svoboda práce a zrušení cechů
wrong_answers:
  - Svoboda obchodu s obilím
  - Svoboda úročených půjček
  - Reforma vzdělávání
explanation: |
  Diderot podpořil Turgota v otázce svobody práce a zrušení cechů, protože věřil, že tato opatření jsou nezbytná pro povzbuzení ekonomiky a podporu sociálního pokroku.