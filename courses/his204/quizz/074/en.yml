question: On which question did Turgot receive Diderot's support?
answer: Freedom of work and the abolition of guilds
wrong_answers:
  - Freedom of the grain trade
  - Freedom of interest-bearing loans
  - Education reform
explanation: |
  Diderot supported Turgot on the issue of freedom of labor and the abolition of guilds, believing that these measures were necessary to stimulate the economy and promote social progress.