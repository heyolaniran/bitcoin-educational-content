question: ¿En qué cuestión recibió Turgot el apoyo de Diderot?
answer: Libertad de trabajo y abolición de los gremios
wrong_answers:
  - Libertad del comercio de cereales
  - Libertad de préstamos con intereses
  - Reforma educativa
explanation: |
  Diderot apoyó a Turgot en la cuestión de la libertad de trabajo y la abolición de los gremios, creyendo que estas medidas eran necesarias para estimular la economía y promover el progreso social.