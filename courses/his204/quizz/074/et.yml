question: Millises küsimuses sai Turgot Diderot' toetuse?
answer: Töövabadus ja kildkondade kaotamine
wrong_answers:
  - Teraviljakaubanduse vabadus
  - Intressi kandvate laenude vabadus
  - Haridusreform
explanation: |
  Diderot toetas Turgot'd töövabaduse ja gildide kaotamise küsimuses, arvates, et need meetmed on vajalikud majanduse elavdamiseks ja sotsiaalse arengu edendamiseks.