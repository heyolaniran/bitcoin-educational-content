question: تورگو در کدام سوال حمایت دیدرو را دریافت کرد؟
answer: آزادی کار و لغو اصناف
wrong_answers:
  - آزادی تجارت غلات
  - آزادی وام‌های بهره‌دار
  - اصلاحات آموزشی
explanation: |
  دیدرو در مسئله آزادی کار و لغو اصناف از تورگو حمایت کرد و معتقد بود که این اقدامات برای تحریک اقتصاد و ارتقاء پیشرفت اجتماعی ضروری هستند.