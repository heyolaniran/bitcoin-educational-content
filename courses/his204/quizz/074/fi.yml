question: Missä kysymyksessä Turgot sai Diderot'n tuen?
answer: Työn vapaus ja kiltojen lakkauttaminen
wrong_answers:
  - Viljakaupan vapaus
  - Korollisten lainojen vapaus
  - Koulutusuudistus
explanation: |
  Diderot tuki Turgot'ta työvapauden ja kiltojen lakkauttamisen kysymyksissä, sillä hän uskoi, että nämä toimenpiteet olivat välttämättömiä talouden elvyttämiseksi ja yhteiskunnallisen kehityksen edistämiseksi.