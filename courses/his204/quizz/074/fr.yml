question: Sur quelle question Turgot reçut-il le soutien de Diderot ?
answer: La liberté du travail et la suppression des corporations
wrong_answers:
  - La liberté du commerce des grains
  - La liberté des prêts à intérêt
  - La réforme de l'éducation
explanation: |
  Diderot soutenait Turgot sur la question de la liberté du travail et la suppression des corporations, car il pensait que ces mesures étaient nécessaires pour stimuler l'économie et favoriser le progrès social.
