question: किस प्रश्न पर तुर्गोट को दिदरोट का समर्थन प्राप्त हुआ?
answer: काम की स्वतंत्रता और गिल्डों का उन्मूलन
wrong_answers:
  - अनाज व्यापार की स्वतंत्रता
  - ब्याज-आधारित ऋण की स्वतंत्रता
  - शिक्षा सुधार
explanation: |
  दिदरो ने श्रम की स्वतंत्रता और गिल्डों के उन्मूलन के मुद्दे पर तुर्गोट का समर्थन किया, उनका मानना ​​था कि ये उपाय अर्थव्यवस्था को प्रोत्साहित करने और सामाजिक प्रगति को बढ़ावा देने के लिए आवश्यक थे।