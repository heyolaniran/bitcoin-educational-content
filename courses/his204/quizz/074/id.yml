question: Untuk pertanyaan yang mana Turgot menerima dukungan Diderot?
answer: Kebebasan bekerja dan penghapusan serikat pekerja
wrong_answers:
  - Kebebasan perdagangan biji-bijian
  - Bebas dari pinjaman berbunga
  - Reformasi pendidikan
explanation: |
  Diderot mendukung Turgot dalam isu kebebasan tenaga kerja dan penghapusan serikat pekerja, percaya bahwa langkah-langkah ini diperlukan untuk merangsang ekonomi dan mendorong kemajuan sosial.