question: Su quale questione Turgot ricevette il sostegno di Diderot?
answer: Libertà di lavoro e abolizione delle corporazioni
wrong_answers:
  - Libertà di commercio dei cereali
  - Libertà di prestiti a interesse
  - Riforma dell'istruzione
explanation: |
  Diderot sostenne Turgot sulla questione della libertà del lavoro e dell'abolizione delle corporazioni, ritenendo che queste misure fossero necessarie per stimolare l'economia e promuovere il progresso sociale.