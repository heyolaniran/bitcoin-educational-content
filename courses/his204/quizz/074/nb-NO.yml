question: I hvilket spørsmål fikk Turgot støtte fra Diderot?
answer: Arbeidsfrihet og avskaffelse av laug
wrong_answers:
  - Fri handel med korn
  - Frihet for rentebærende lån
  - Utdanningsreform
explanation: |
  Diderot støttet Turgot i spørsmålet om arbeidsfrihet og avskaffelse av laugene, og mente at disse tiltakene var nødvendige for å stimulere økonomien og fremme sosial fremgang.