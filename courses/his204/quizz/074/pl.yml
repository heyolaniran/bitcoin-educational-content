question: W jakiej kwestii Turgot otrzymał poparcie Diderota?
answer: Wolność pracy i zniesienie gildii
wrong_answers:
  - Wolność handlu zbożem
  - Wolność oprocentowanych pożyczek
  - Reforma edukacji
explanation: |
  Diderot poparł Turgota w kwestii wolności pracy i zniesienia gildii, wierząc, że środki te są niezbędne do stymulowania gospodarki i promowania postępu społecznego.