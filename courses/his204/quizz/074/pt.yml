question: Em que questão é que Turgot recebeu o apoio de Diderot?
answer: A liberdade de trabalho e a abolição das corporações
wrong_answers:
  - Liberdade do comércio de cereais
  - Liberdade de empréstimos com juros
  - Reforma do ensino
explanation: |
  Diderot apoiou Turgot na questão da liberdade de trabalho e da abolição das corporações, acreditando que estas medidas eram necessárias para estimular a economia e promover o progresso social.