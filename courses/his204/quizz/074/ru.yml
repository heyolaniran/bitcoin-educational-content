question: По какому вопросу Тюрго получил поддержку Дидро?
answer: Свобода труда и упразднение гильдий
wrong_answers:
  - Свобода торговли зерном
  - Свобода от процентных кредитов
  - Реформа образования
explanation: |
  Дидро поддерживал Тюрго в вопросе свободы труда и отмены гильдий, считая, что эти меры необходимы для стимулирования экономики и содействия социальному прогрессу.