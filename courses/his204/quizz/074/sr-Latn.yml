question: Na kojem pitanju je Turgot dobio podršku Diderota?
answer: Sloboda rada i ukidanje cehova
wrong_answers:
  - Sloboda trgovine žitom
  - Sloboda kamatnih zajmova
  - Reforma obrazovanja
explanation: |
  Diderot je podržavao Turgota po pitanju slobode rada i ukidanja cehova, verujući da su te mere neophodne za stimulisanje ekonomije i promovisanje društvenog napretka.