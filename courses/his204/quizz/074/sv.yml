question: I vilken fråga fick Turgot stöd av Diderot?
answer: Arbetsfrihet och avskaffande av skråväsendet
wrong_answers:
  - Frihet för spannmålshandeln
  - Frihet från räntebärande lån
  - Utbildningsreform
explanation: |
  Diderot stödde Turgot i frågan om arbetets frihet och avskaffandet av skråväsendet, eftersom han ansåg att dessa åtgärder var nödvändiga för att stimulera ekonomin och främja sociala framsteg.