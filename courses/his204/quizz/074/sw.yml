question: Ni swali gani ambalo Turgot alipokea usaidizi wa Diderot?
answer: Uhuru wa kufanya kazi na kufutwa kwa vyama
wrong_answers:
  - Uhuru wa biashara ya nafaka
  - Uhuru wa mikopo yenye riba
  - Mageuzi ya elimu
explanation: |
  Diderot alimuunga mkono Turgot kuhusu suala la uhuru wa kazi na kukomeshwa kwa vyama, akiamini kwamba hatua hizi ni muhimu ili kuchochea uchumi na kukuza maendeleo ya kijamii.