question: Turgot nhận được sự ủng hộ của Diderot về vấn đề nào?
answer: Tự do lao động và xóa bỏ các hội nhóm
wrong_answers:
  - Tự do buôn bán ngũ cốc
  - Tự do cho vay có tính lãi
  - Cải cách giáo dục
explanation: |
  Diderot ủng hộ Turgot về vấn đề tự do lao động và bãi bỏ chế độ phường hội, tin rằng những biện pháp này là cần thiết để kích thích nền kinh tế và thúc đẩy tiến bộ xã hội.