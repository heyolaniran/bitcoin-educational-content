question: Proč lze říci, že osvícenští filozofové sehráli ve vývoji politické ekonomie protichůdnou roli?
answer: Oslavovali i odsuzovali jeho zásady
wrong_answers:
  - O tuto vědu se začali zajímat až velmi pozdě
  - Někteří jsou jednoznačně ekonomové, jiní jejich odpůrci
  - Byly příliš teoretické a málo praktické
explanation: |
  Filozofové osvícenství zastávali různé názory na politickou ekonomii, příznivé i kritické. Někteří hájili zásady ekonomického liberalismu, jiní varovali před nebezpečím nerovnosti a vykořisťování.