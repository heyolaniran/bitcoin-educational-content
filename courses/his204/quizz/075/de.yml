question: Warum kann man sagen, dass die Philosophen der Aufklärung eine gegensätzliche Rolle bei der Entwicklung der politischen Ökonomie gespielt haben?
answer: Sie feierten und verurteilten ihre Prinzipien
wrong_answers:
  - Sie haben sich erst sehr spät für diese Wissenschaft interessiert
  - Einige sind eindeutig Wirtschaftswissenschaftler, andere ihre Gegner
  - Sie waren zu theoretisch und nicht praktisch genug
explanation: |
  Die Philosophen der Aufklärung vertraten eine Vielzahl von Ansichten zur politischen Ökonomie, sowohl positive als auch kritische. Einige verteidigten die Grundsätze des Wirtschaftsliberalismus, während andere vor den Gefahren von Ungleichheit und Ausbeutung warnten.