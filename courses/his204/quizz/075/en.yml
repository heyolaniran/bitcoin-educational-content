question: Why can it be said that the philosophers of the Enlightenment played a contrasting role in the development of political economy?
answer: They both celebrated and condemned its principles
wrong_answers:
  - They only became interested in this science very late in life
  - Some are clearly economists, others their opponents
  - They were too theoretical and not practical enough
explanation: |
  The philosophers of the Enlightenment held a variety of views on political economy, both favorable and critical. Some defended the principles of economic liberalism, while others warned of the dangers of inequality and exploitation.