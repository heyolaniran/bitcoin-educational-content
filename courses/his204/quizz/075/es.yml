question: ¿Por qué puede decirse que los filósofos de la Ilustración desempeñaron un papel contrastado en el desarrollo de la economía política?
answer: Celebraron y condenaron sus principios
wrong_answers:
  - Sólo se interesaron por esta ciencia muy tardíamente
  - Algunos son claramente economistas, otros sus oponentes
  - Eran demasiado teóricos y poco prácticos
explanation: |
  Los filósofos de la Ilustración mantuvieron diversas opiniones sobre la economía política, tanto favorables como críticas. Algunos defendían los principios del liberalismo económico, mientras que otros advertían de los peligros de la desigualdad y la explotación.