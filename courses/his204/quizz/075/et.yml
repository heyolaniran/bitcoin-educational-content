question: Miks võib öelda, et valgustusfilosoofid mängisid poliitilise ökonoomia arengus vastandlikku rolli?
answer: Nad nii tähistasid kui ka hukka mõistsid selle põhimõtteid
wrong_answers:
  - Nad hakkasid selle teaduse vastu huvi tundma alles väga hilja
  - Mõned on selgelt majandusteadlased, teised nende vastased
  - Nad olid liiga teoreetilised ja mitte piisavalt praktilised
explanation: |
  Valgustusajastu filosoofidel olid poliitmajanduse kohta mitmesugused seisukohad, nii soodsad kui ka kriitilised. Mõned kaitsesid majandusliberalismi põhimõtteid, teised aga hoiatasid ebavõrdsuse ja ekspluateerimise ohtude eest.