question: چرا می‌توان گفت که فیلسوفان عصر روشنگری نقش متضادی در توسعه اقتصاد سیاسی ایفا کردند؟
answer: آن‌ها هم اصول آن را جشن گرفتند و هم محکوم کردند.
wrong_answers:
  - آنها تنها در اواخر زندگی به این علم علاقه‌مند شدند.
  - برخی به وضوح اقتصاددان هستند، دیگران مخالفان آنها
  - آن‌ها بیش از حد نظری بودند و به اندازه کافی عملی نبودند
explanation: |
  فلاسفه عصر روشنگری دیدگاه‌های متنوعی در مورد اقتصاد سیاسی داشتند، هم دیدگاه‌های مثبت و هم انتقادی. برخی از اصول لیبرالیسم اقتصادی دفاع می‌کردند، در حالی که دیگران از خطرات نابرابری و استثمار هشدار می‌دادند.