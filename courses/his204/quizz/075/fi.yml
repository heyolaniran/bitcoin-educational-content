question: Miksi voidaan sanoa, että valistusfilosofeilla oli vastakkainen rooli poliittisen taloustieteen kehityksessä?
answer: He sekä ylistivät että tuomitsivat sen periaatteet
wrong_answers:
  - He kiinnostuivat tästä tieteestä vasta hyvin myöhään elämässään
  - Jotkut ovat selvästi taloustieteilijöitä, toiset heidän vastustajiaan
  - Ne olivat liian teoreettisia eivätkä tarpeeksi käytännöllisiä
explanation: |
  Valistusfilosofeilla oli erilaisia näkemyksiä poliittisesta taloudesta, sekä myönteisiä että kriittisiä. Jotkut puolustivat talousliberalismin periaatteita, kun taas toiset varoittivat eriarvoisuuden ja riiston vaaroista.