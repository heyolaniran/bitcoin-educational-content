question: Pourquoi peut-on dire que les philosophes des Lumières ont joué un rôle contrasté dans le développement de l’économie politique ?
answer: Ils ont tantôt célébré et tantôt condamné ses principes
wrong_answers:
  - Ils ne se sont intéressés à cette science que très tard
  - Certains se sont rangés distinctement parmi les économistes, d’autres dans le camp de leurs adversaires
  - Ils étaient trop théoriques et pas assez pratiques
explanation: |
  Les philosophes des Lumières ont eu des opinions diverses sur l'économie politique, tantôt favorables, tantôt critiques. Certains ont défendu les principes du libéralisme économique, tandis que d'autres ont mis en garde contre les dangers de l'inégalité et de l'exploitation.
