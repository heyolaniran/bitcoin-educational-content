question: ऐसा क्यों कहा जा सकता है कि ज्ञानोदय के दार्शनिकों ने राजनीतिक अर्थव्यवस्था के विकास में एक विपरीत भूमिका निभाई?
answer: उन्होंने इसके सिद्धांतों की सराहना भी की और निंदा भी की
wrong_answers:
  - उन्हें इस विज्ञान में जीवन में बहुत देर से रुचि पैदा हुई
  - कुछ लोग स्पष्ट रूप से अर्थशास्त्री हैं, अन्य उनके विरोधी हैं
  - वे बहुत सैद्धांतिक थे और पर्याप्त व्यावहारिक नहीं थे
explanation: |
  ज्ञानोदय के दार्शनिकों ने राजनीतिक अर्थव्यवस्था पर अनुकूल और आलोचनात्मक दोनों तरह के विचार रखे। कुछ ने आर्थिक उदारवाद के सिद्धांतों का बचाव किया, जबकि अन्य ने असमानता और शोषण के खतरों के बारे में चेतावनी दी।