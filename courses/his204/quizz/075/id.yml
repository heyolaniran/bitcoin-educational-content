question: Mengapa dapat dikatakan bahwa para filsuf pada masa Pencerahan memainkan peran yang kontras dalam perkembangan ekonomi politik?
answer: Mereka merayakan sekaligus mengutuk prinsip-prinsipnya
wrong_answers:
  - Mereka baru tertarik pada ilmu ini di usia yang sangat tua
  - Beberapa jelas-jelas ekonom, yang lain lawan mereka
  - Mereka terlalu teoritis dan tidak cukup praktis
explanation: |
  Para filsuf Abad Pencerahan memiliki beragam pandangan tentang ekonomi politik, baik yang mendukung maupun yang kritis. Beberapa membela prinsip-prinsip liberalisme ekonomi, sementara yang lain memperingatkan bahaya ketidaksetaraan dan eksploitasi.