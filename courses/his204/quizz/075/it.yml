question: Perché si può dire che i filosofi dell'Illuminismo hanno avuto un ruolo contrastante nello sviluppo dell'economia politica?
answer: Hanno sia celebrato che condannato i suoi principi
wrong_answers:
  - Si sono interessati a questa scienza solo molto tardi
  - Alcuni sono chiaramente economisti, altri i loro avversari
  - Erano troppo teorici e non abbastanza pratici
explanation: |
  I filosofi dell'Illuminismo avevano una varietà di opinioni sull'economia politica, sia favorevoli che critiche. Alcuni difendevano i principi del liberalismo economico, mentre altri mettevano in guardia dai pericoli della disuguaglianza e dello sfruttamento.