question: 啓蒙思想の哲学者たちが政治経済の発展において対照的な役割を果たしたと言えるのはなぜか。
answer: 彼らはその原則を称賛し、また非難した。
wrong_answers:
  - 彼らがこの科学に興味を持つようになったのは、人生のかなり後半になってからである。
  - ある者は明らかにエコノミストであり、ある者はその反対者である
  - 理論的で実践的ではなかった
explanation: |
  啓蒙時代の哲学者たちは、政治経済について、好意的なものも批判的なものも含め、さまざまな見解を持っていた。経済自由主義の原則を擁護する者もいれば、不平等と搾取の危険性を警告する者もいた。