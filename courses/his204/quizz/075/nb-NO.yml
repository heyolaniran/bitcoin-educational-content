question: Hvorfor kan man si at opplysningsfilosofene spilte en kontrasterende rolle i utviklingen av den politiske økonomien?
answer: De både hyllet og fordømte dens prinsipper
wrong_answers:
  - De ble først interessert i denne vitenskapen veldig sent i livet
  - Noen er helt klart økonomer, andre deres motstandere
  - De var for teoretiske og ikke praktiske nok
explanation: |
  Opplysningstidens filosofer hadde ulike syn på politisk økonomi, både positive og kritiske. Noen forsvarte prinsippene i den økonomiske liberalismen, mens andre advarte mot farene ved ulikhet og utbytting.