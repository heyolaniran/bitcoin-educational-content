question: Dlaczego można powiedzieć, że filozofowie oświecenia odegrali przeciwstawną rolę w rozwoju ekonomii politycznej?
answer: Zarówno celebrowali, jak i potępiali jego zasady
wrong_answers:
  - Zainteresowali się tą nauką dopiero bardzo późno
  - Niektórzy są wyraźnie ekonomistami, inni ich przeciwnikami
  - Były one zbyt teoretyczne i niewystarczająco praktyczne
explanation: |
  Filozofowie oświecenia mieli różne poglądy na temat ekonomii politycznej, zarówno przychylne, jak i krytyczne. Niektórzy bronili zasad liberalizmu gospodarczego, podczas gdy inni ostrzegali przed niebezpieczeństwami nierówności i wyzysku.