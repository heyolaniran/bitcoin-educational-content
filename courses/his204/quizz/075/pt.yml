question: Porque é que se pode dizer que os filósofos do Iluminismo desempenharam um papel contrastante no desenvolvimento da economia política?
answer: Tanto celebraram como condenaram os seus princípios
wrong_answers:
  - Só se interessaram por esta ciência numa fase muito tardia da sua vida
  - Alguns são claramente economistas, outros são seus opositores
  - Eram demasiado teóricos e não suficientemente práticos
explanation: |
  Os filósofos do Iluminismo tinham uma variedade de pontos de vista sobre a economia política, tanto favoráveis como críticos. Alguns defendiam os princípios do liberalismo económico, enquanto outros alertavam para os perigos da desigualdade e da exploração.