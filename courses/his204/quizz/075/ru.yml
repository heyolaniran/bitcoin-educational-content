question: Почему можно сказать, что философы эпохи Просвещения сыграли противоположную роль в развитии политической экономии?
answer: Они как прославляли, так и осуждали его принципы
wrong_answers:
  - Они заинтересовались этой наукой только в самом конце жизни
  - Некоторые из них - явные экономисты, другие - их оппоненты
  - Они были слишком теоретическими и недостаточно практичными
explanation: |
  Философы эпохи Просвещения придерживались различных взглядов на политическую экономию, как положительных, так и критических. Одни отстаивали принципы экономического либерализма, другие предупреждали об опасности неравенства и эксплуатации.