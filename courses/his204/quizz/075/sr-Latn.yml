question: Zašto se može reći da su filozofi prosvetiteljstva igrali kontrastnu ulogu u razvoju političke ekonomije?
answer: Oni su i slavili i osuđivali njegove principe
wrong_answers:
  - Za ovu nauku su se zainteresovali tek u poznim godinama života.
  - Neki su očigledno ekonomisti, drugi njihovi protivnici
  - Bili su previše teoretski i nedovoljno praktični.
explanation: |
  Filozofi prosvetiteljstva imali su različite stavove o političkoj ekonomiji, i povoljne i kritične. Neki su branili principe ekonomskog liberalizma, dok su drugi upozoravali na opasnosti nejednakosti i eksploatacije.