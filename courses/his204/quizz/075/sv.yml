question: Varför kan man säga att upplysningsfilosoferna spelade en kontrasterande roll i utvecklingen av den politiska ekonomin?
answer: De både hyllade och fördömde dess principer
wrong_answers:
  - De blev intresserade av denna vetenskap först mycket sent i livet
  - Vissa är tydliga ekonomer, andra deras motståndare
  - De var för teoretiska och inte tillräckligt praktiska
explanation: |
  Upplysningsfilosoferna hade en mängd olika åsikter om politisk ekonomi, både positiva och kritiska. Vissa försvarade den ekonomiska liberalismens principer, medan andra varnade för farorna med ojämlikhet och exploatering.