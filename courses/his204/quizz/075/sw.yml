question: Kwa nini inaweza kusemwa kwamba wanafalsafa wa Mwangaza walifanya fungu tofauti katika maendeleo ya uchumi wa kisiasa?
answer: Wote wawili walisherehekea na kulaani kanuni zake
wrong_answers:
  - Walipendezwa tu na sayansi hii marehemu sana maishani
  - Baadhi ni wazi wachumi, wengine wapinzani wao
  - Walikuwa wa kinadharia sana na sio vitendo vya kutosha
explanation: |
  Wanafalsafa wa Kutaalamika walikuwa na maoni tofauti juu ya uchumi wa kisiasa, mzuri na muhimu. Baadhi walitetea kanuni za uliberali wa kiuchumi, huku wengine wakionya juu ya hatari ya ukosefu wa usawa na unyonyaji.