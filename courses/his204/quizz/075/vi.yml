question: Tại sao có thể nói rằng các nhà triết học Khai sáng đóng vai trò tương phản trong sự phát triển của kinh tế chính trị?
answer: Họ vừa ca ngợi vừa lên án các nguyên tắc của nó
wrong_answers:
  - Họ chỉ quan tâm đến khoa học này vào giai đoạn rất muộn của cuộc đời
  - Một số rõ ràng là nhà kinh tế, những người khác là đối thủ của họ
  - Họ quá lý thuyết và không đủ thực tế
explanation: |
  Các nhà triết học của thời kỳ Khai sáng có nhiều quan điểm khác nhau về kinh tế chính trị, cả ủng hộ và chỉ trích. Một số bảo vệ các nguyên tắc của chủ nghĩa tự do kinh tế, trong khi những người khác cảnh báo về những nguy cơ của bất bình đẳng và bóc lột.