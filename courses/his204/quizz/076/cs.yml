question: Které tři faktory vysvětlují Turgotovu genialitu?
answer: Jeho rodinný původ, doba, jeho intelektuální vyspělost
wrong_answers:
  - Jeho rodinný původ, síť přátel, bohatství..
  - Doba, jeho majetek, pověst jeho bratra
  - Jeho charisma, výmluvnost a odhodlání
explanation: |
  Turgotův rodinný původ, příslušnost ke šlechtické a vlivné rodině, doba, která se vyznačovala intelektuálním kvasem a touhou po reformách, a jeho intelektuální vyspělost, která mu umožnila rychle si osvojit ekonomické a politické znalosti, to vše přispělo k jeho genialitě.