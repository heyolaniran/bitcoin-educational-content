question: Welche drei Faktoren erklären Turgots Genialität?
answer: Seine familiäre Herkunft, die Zeit, seine intellektuelle Frühreife
wrong_answers:
  - Seine familiäre Herkunft, sein Freundeskreis, sein Reichtum
  - Die Zeiten, sein Vermögen, der Ruf seines Bruders
  - Sein Charisma, seine Eloquenz, seine Entschlossenheit
explanation: |
  Turgots familiäre Herkunft, seine Zugehörigkeit zu einer adligen und einflussreichen Familie, die von intellektuellem Aufschwung und Reformwillen geprägte Zeit und seine intellektuelle Frühreife, die es ihm ermöglichte, sich rasch wirtschaftliches und politisches Wissen anzueignen, trugen zu seiner Brillanz bei.