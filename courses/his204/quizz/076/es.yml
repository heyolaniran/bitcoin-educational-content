question: ¿Qué tres factores explican la brillantez de Turgot?
answer: Sus orígenes familiares, la época, su precocidad intelectual
wrong_answers:
  - Sus orígenes familiares, su red de amigos, su riqueza
  - Los tiempos, su fortuna, la reputación de su hermano
  - Su carisma, su elocuencia, su determinación
explanation: |
  Los orígenes familiares de Turgot, su pertenencia a una familia noble e influyente, la época marcada por la efervescencia intelectual y la voluntad de reforma, así como su precocidad intelectual, que le permitió dominar rápidamente los conocimientos económicos y políticos, contribuyeron a su brillantez.