question: Millised kolm tegurit seletavad Turgot' geniaalsust?
answer: Tema perekondlik päritolu, aeg, tema intellektuaalne eelsoodumus
wrong_answers:
  - Tema perekondlik päritolu, tema sõprade võrgustik, tema rikkus
  - Aeg, tema varandus, tema venna maine..
  - Tema karisma, tema ilukõne, tema otsustavus
explanation: |
  Turgot' perekondlik päritolu, tema kuulumine aadli- ja mõjukasse perekonda, intellektuaalsest käärimisest ja reformisoovist iseloomustatud aeg ning tema intellektuaalne küpsus, mis võimaldas tal kiiresti omandada majanduslikke ja poliitilisi teadmisi, aitasid kaasa tema hiilgavusele.