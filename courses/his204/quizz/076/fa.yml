question: چه سه عاملی نبوغ تورگو را توضیح می‌دهند؟
answer: خاستگاه خانوادگی او، زمانه، پیش‌رس بودن فکری او
wrong_answers:
  - خاستگاه خانوادگی او، شبکه دوستانش، ثروتش
  - زمانه، ثروتش، شهرت برادرش
  - کاریزمای او، فصاحت او، عزم او
explanation: |
  خاستگاه خانوادگی تورگو، عضویت او در یک خانواده نجیب و بانفوذ، دوره‌ای که با جنبش‌های فکری و تمایل به اصلاحات مشخص می‌شد، و نبوغ فکری او که به او امکان داد به سرعت دانش اقتصادی و سیاسی را فراگیرد، همگی به درخشش او کمک کردند.