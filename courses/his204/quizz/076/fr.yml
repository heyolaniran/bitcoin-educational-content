question: Quels sont les trois facteurs qui expliquent l’éclat de Turgot ?
answer: Ses origines familiales, l’époque, sa précocité intellectuelle
wrong_answers:
  - Ses origines familiales, son réseau d’ami, sa fortune
  - L’époque, sa fortune, la réputation de son frère
  - Son charisme, son éloquence, sa détermination
explanation: |
  Les origines familiales de Turgot, son appartenance à une famille noble et influente, l'époque, marquée par un bouillonnement intellectuel et une volonté de réforme, et sa précocité intellectuelle, qui lui a permis de maîtriser rapidement les connaissances économiques et politiques, ont contribué à son éclat.
