question: तुर्गोट की प्रतिभा को कौन से तीन कारक समझाते हैं?
answer: उनके परिवार की उत्पत्ति, समय, उनकी बौद्धिक प्रखरता
wrong_answers:
  - उनके परिवार की उत्पत्ति, उनके मित्रों का नेटवर्क, उनकी संपत्ति
  - समय, उसका भाग्य, उसके भाई की प्रतिष्ठा
  - उनका करिश्मा, उनकी वाकपटुता, उनका दृढ़ संकल्प
explanation: |
  टर्गोट के परिवार की उत्पत्ति, एक कुलीन और प्रभावशाली परिवार की सदस्यता, बौद्धिक उथल-पुथल और सुधार की इच्छा से चिह्नित अवधि, और उनकी बौद्धिक परिपक्वता, जिसने उन्हें आर्थिक और राजनीतिक ज्ञान में शीघ्रता से महारत हासिल करने में सक्षम बनाया, इन सभी ने उनकी प्रतिभा में योगदान दिया।