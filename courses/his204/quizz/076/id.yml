question: Tiga faktor apa yang menjelaskan kecemerlangan Turgot?
answer: Asal-usul keluarganya, zamannya, kecepatan intelektualnya
wrong_answers:
  - Asal-usul keluarganya, jaringan pertemanannya, kekayaannya
  - Waktu, kekayaannya, reputasi saudaranya
  - Karismanya, kefasihannya, tekadnya
explanation: |
  Asal-usul keluarga Turgot, keanggotaannya dalam keluarga bangsawan dan berpengaruh, periode yang ditandai dengan gejolak intelektual dan keinginan untuk melakukan reformasi, serta kecepatan intelektualnya, yang memungkinkannya untuk menguasai pengetahuan ekonomi dan politik dengan cepat, semuanya berkontribusi pada kecemerlangannya.