question: Quali sono i tre fattori che spiegano la genialità di Turgot?
answer: Le sue origini familiari, i tempi, la sua precocità intellettuale
wrong_answers:
  - Le sue origini familiari, la sua rete di amicizie, la sua ricchezza
  - I tempi, la sua fortuna, la reputazione del fratello
  - Il suo carisma, la sua eloquenza, la sua determinazione
explanation: |
  Le origini familiari di Turgot, la sua appartenenza a una famiglia nobile e influente, il periodo segnato dal fermento intellettuale e dal desiderio di riforme e la sua precocità intellettuale, che gli permise di padroneggiare rapidamente le conoscenze economiche e politiche, contribuirono alla sua genialità.