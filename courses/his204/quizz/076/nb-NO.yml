question: Hvilke tre faktorer forklarer Turgots genialitet?
answer: Hans familiebakgrunn, tiden, hans intellektuelle modenhet
wrong_answers:
  - Hans familiebakgrunn, hans nettverk av venner, hans rikdom
  - Tiden, formuen hans, brorens rykte
  - Hans karisma, veltalenhet og besluttsomhet
explanation: |
  Turgots familiære opphav, hans tilhørighet til en adelig og innflytelsesrik familie, perioden som var preget av intellektuell oppblomstring og reformvilje, og hans intellektuelle presisjon, som gjorde ham i stand til raskt å tilegne seg økonomisk og politisk kunnskap, bidro alle til hans briljante evner.