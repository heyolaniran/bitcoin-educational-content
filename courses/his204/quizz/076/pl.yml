question: Jakie trzy czynniki wyjaśniają błyskotliwość Turgota?
answer: Jego pochodzenie rodzinne, czasy, jego intelektualna prekognicja
wrong_answers:
  - Jego pochodzenie rodzinne, sieć przyjaciół, bogactwo
  - Czasy, jego majątek, reputacja jego brata
  - Jego charyzma, elokwencja, determinacja
explanation: |
  Rodzinne pochodzenie Turgota, jego przynależność do szlachetnej i wpływowej rodziny, okres naznaczony intelektualnym fermentem i pragnieniem reform, a także jego intelektualna prekursorstwo, które pozwoliło mu szybko opanować wiedzę ekonomiczną i polityczną, przyczyniły się do jego błyskotliwości.