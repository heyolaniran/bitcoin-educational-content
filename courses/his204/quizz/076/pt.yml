question: Que três factores explicam o brilhantismo de Turgot?
answer: As suas origens familiares, a época, a sua precocidade intelectual
wrong_answers:
  - As suas origens familiares, a sua rede de amigos, a sua riqueza
  - Os tempos, a sua fortuna, a reputação do seu irmão
  - O seu carisma, a sua eloquência, a sua determinação
explanation: |
  As origens familiares de Turgot, o facto de pertencer a uma família nobre e influente, o período marcado pela fermentação intelectual e pelo desejo de reforma, bem como a sua precocidade intelectual, que lhe permitiu dominar rapidamente os conhecimentos económicos e políticos, contribuíram para o seu brilhantismo.