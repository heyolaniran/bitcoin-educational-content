question: Какие три фактора объясняют гениальность Тюрго?
answer: Его семейное происхождение, время, его интеллектуальные способности
wrong_answers:
  - Его семейное происхождение, круг друзей, богатство
  - Время, его состояние, репутация его брата
  - Его харизма, красноречие, решительность
explanation: |
  Семейное происхождение Турго, принадлежность к знатному и влиятельному роду, период, отмеченный интеллектуальным брожением и стремлением к реформам, а также его интеллектуальные способности, позволившие ему быстро овладеть экономическими и политическими знаниями, - все это способствовало его гениальности.