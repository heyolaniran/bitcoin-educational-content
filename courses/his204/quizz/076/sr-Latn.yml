question: Koja tri faktora objašnjavaju Turgotovu briljantnost?
answer: Njegovo porodično poreklo, vreme, njegova intelektualna preuranjenost
wrong_answers:
  - Njegovo porodično poreklo, njegova mreža prijatelja, njegovo bogatstvo
  - Vremena, njegova sreća, bratova reputacija
  - Njegova harizma, njegova elokvencija, njegova odlučnost
explanation: |
  Poreklo Turgotove porodice, njegovo članstvo u plemićkoj i uticajnoj porodici, period obeležen intelektualnim previranjem i željom za reformama, kao i njegova intelektualna preuranjenost, koja mu je omogućila da brzo savlada ekonomska i politička znanja, sve je to doprinelo njegovoj briljantnosti.