question: Vilka tre faktorer förklarar Turgots briljans?
answer: Hans familjeursprung, tiden, hans intellektuella försprång
wrong_answers:
  - Hans familjeursprung, hans nätverk av vänner, hans förmögenhet
  - Tiden, hans förmögenhet, hans brors rykte
  - Hans karisma, hans vältalighet, hans beslutsamhet
explanation: |
  Turgots familjära ursprung, hans tillhörighet till en adlig och inflytelserik familj, den period som präglades av intellektuell jäsning och reformvilja samt hans intellektuella brådmogenhet, som gjorde att han snabbt kunde tillgodogöra sig ekonomiska och politiska kunskaper, bidrog till hans briljans.