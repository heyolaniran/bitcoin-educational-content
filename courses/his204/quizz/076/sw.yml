question: Ni mambo gani matatu yanayoelezea kipaji cha Turgot?
answer: Asili ya familia yake, nyakati, uwezo wake wa kiakili
wrong_answers:
  - Asili ya familia yake, mtandao wake wa marafiki, utajiri wake
  - Nyakati, bahati yake, sifa ya kaka yake
  - Haiba yake, ufasaha wake, dhamira yake
explanation: |
  Asili ya familia ya Turgot, uanachama wake wa familia tukufu na yenye ushawishi mkubwa, kipindi kilichoonyeshwa na uchachu wa kiakili na hamu ya mageuzi, na uwezo wake wa kiakili, ambao ulimwezesha kujua haraka maarifa ya kiuchumi na kisiasa, yote yalichangia katika ustadi wake.