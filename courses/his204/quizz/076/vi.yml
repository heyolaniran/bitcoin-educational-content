question: Ba yếu tố nào giải thích cho sự thông minh của Turgot?
answer: Nguồn gốc gia đình, thời đại, sự thông minh sớm của ông
wrong_answers:
  - Nguồn gốc gia đình, mạng lưới bạn bè, sự giàu có của anh ấy
  - Thời đại, vận mệnh của anh ta, danh tiếng của anh trai anh ta
  - Sự lôi cuốn, sự hùng biện và sự quyết tâm của anh ấy
explanation: |
  Nguồn gốc gia đình của Turgot, tư cách thành viên của ông trong một gia đình quý tộc và có ảnh hưởng, giai đoạn đánh dấu sự phát triển về mặt trí tuệ và mong muốn cải cách, cùng sự thông minh sớm, giúp ông nhanh chóng nắm vững kiến thức kinh tế và chính trị, tất cả đều góp phần tạo nên sự xuất chúng của ông.