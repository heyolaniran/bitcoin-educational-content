question: Kterého ekonoma Turgot chválil?
answer: Vincent de Gournay
wrong_answers:
  - François Quesnay
  - Markýz d'Argenson
  - Adam Smith
explanation: |
  Turgot psal o Vincentu de Gournayovi pochvalně a zdůrazňoval jeho roli průkopníka ekonomického liberalismu a jeho vliv na francouzské ekonomické myšlení.