question: Welchen Wirtschaftswissenschaftler hat Turgot gelobt?
answer: Vinzenz von Gournay
wrong_answers:
  - François Quesnay
  - Der Marquis d'Argenson
  - Adam Smith
explanation: |
  Turgot lobte Vincent de Gournay und hob seine Rolle als Wegbereiter des Wirtschaftsliberalismus und seinen Einfluss auf das französische Wirtschaftsdenken hervor.