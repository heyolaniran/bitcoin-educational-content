question: ¿A qué economista elogió Turgot?
answer: Vincent de Gournay
wrong_answers:
  - François Quesnay
  - El marqués de Argenson
  - Adam Smith
explanation: |
  Turgot escribió elogios sobre Vincent de Gournay, destacando su papel como pionero del liberalismo económico y su influencia en el pensamiento económico francés.