question: Ketä taloustieteilijää Turgot kehui?
answer: Vincent de Gournay
wrong_answers:
  - François Quesnay
  - Markiisi d'Argenson
  - Adam Smith
explanation: |
  Turgot ylisti Vincent de Gournayta ja korosti hänen rooliaan talousliberalismin uranuurtajana ja hänen vaikutustaan ranskalaiseen talousajatteluun.