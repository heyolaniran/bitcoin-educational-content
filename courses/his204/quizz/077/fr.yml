question: De quel économiste Turgot a-t-il écrit l’éloge ?
answer: Vincent de Gournay
wrong_answers:
  - François Quesnay
  - Le marquis d’Argenson
  - Adam Smith
explanation: |
  Turgot a écrit l'éloge de Vincent de Gournay, soulignant son rôle de pionnier du libéralisme économique et son influence sur la pensée économique française.
