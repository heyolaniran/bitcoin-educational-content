question: तुर्गोट ने किस अर्थशास्त्री की प्रशंसा की?
answer: विंसेंट डी गौर्ने
wrong_answers:
  - फ़्राँस्वा क्वेस्ने
  - मार्क्विस डी'अर्गेन्सन
  - एडम स्मिथ
explanation: |
  टर्गोट ने विन्सेंट डी गौर्ने की प्रशंसा में लिखा, आर्थिक उदारवाद के अग्रदूत के रूप में उनकी भूमिका और फ्रांसीसी आर्थिक विचार पर उनके प्रभाव पर जोर दिया।