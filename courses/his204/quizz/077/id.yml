question: Ekonom mana yang dipuji Turgot?
answer: Vincent de Gournay
wrong_answers:
  - François Quesnay
  - Marquis d'Argenson
  - Adam Smith
explanation: |
  Turgot menulis pujian terhadap Vincent de Gournay, menekankan perannya sebagai pelopor liberalisme ekonomi dan pengaruhnya terhadap pemikiran ekonomi Prancis.