question: Quale economista lodò Turgot?
answer: Vincent de Gournay
wrong_answers:
  - François Quesnay
  - Il marchese d'Argenson
  - Adam Smith
explanation: |
  Turgot scrisse in lode di Vincent de Gournay, sottolineando il suo ruolo di pioniere del liberalismo economico e la sua influenza sul pensiero economico francese.