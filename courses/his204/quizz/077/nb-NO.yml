question: Hvilken økonom hyllet Turgot?
answer: Vincent de Gournay
wrong_answers:
  - François Quesnay
  - Marquis d'Argenson
  - Adam Smith
explanation: |
  Turgot skrev rosende om Vincent de Gournay, og fremhevet hans rolle som en pioner innen økonomisk liberalisme og hans innflytelse på fransk økonomisk tenkning.