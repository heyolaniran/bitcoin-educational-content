question: Którego ekonomistę chwalił Turgot?
answer: Vincent de Gournay
wrong_answers:
  - François Quesnay
  - Markiz d'Argenson
  - Adam Smith
explanation: |
  Turgot napisał pochwałę Vincenta de Gournay, podkreślając jego rolę jako pioniera liberalizmu gospodarczego i jego wpływ na francuską myśl ekonomiczną.