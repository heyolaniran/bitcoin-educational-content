question: Que economista elogiou Turgot?
answer: Vincent de Gournay
wrong_answers:
  - François Quesnay
  - O Marquês d'Argenson
  - Adam Smith
explanation: |
  Turgot escreveu elogios a Vincent de Gournay, salientando o seu papel como pioneiro do liberalismo económico e a sua influência no pensamento económico francês.