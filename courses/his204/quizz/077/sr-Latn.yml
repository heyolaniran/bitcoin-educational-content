question: Kog ekonomistu je Turgot hvalio?
answer: Vincent de Gournay
wrong_answers:
  - François Quesnay
  - Markiz d'Aržanson
  - Adam Smit
explanation: |
  Turgot je pisao u pohvalu Vincentu de Gournayu, ističući njegovu ulogu kao pionira ekonomskog liberalizma i njegov uticaj na francusku ekonomsku misao.