question: Vilken ekonom hyllade Turgot?
answer: Vincent de Gournay
wrong_answers:
  - François Quesnay
  - Marquis d'Argenson
  - Adam Smith
explanation: |
  Turgot skrev en hyllning till Vincent de Gournay och betonade hans roll som pionjär inom den ekonomiska liberalismen och hans inflytande på det franska ekonomiska tänkandet.