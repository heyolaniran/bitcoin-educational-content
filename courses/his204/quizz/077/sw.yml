question: Turgot alimsifia mchumi yupi?
answer: Vincent de Gournay
wrong_answers:
  - François Quesnay
  - Marquis d'Argenson
  - Adam Smith
explanation: |
  Turgot aliandika akimsifu Vincent de Gournay, akisisitiza jukumu lake kama mwanzilishi wa uliberali wa kiuchumi na ushawishi wake kwa mawazo ya kiuchumi ya Ufaransa.