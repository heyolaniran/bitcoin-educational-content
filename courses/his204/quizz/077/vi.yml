question: Turgot đã khen ngợi nhà kinh tế học nào?
answer: Vincent de Gournay
wrong_answers:
  - François Quesnay
  - Hầu tước d'Argenson
  - Adam Smith
explanation: |
  Turgot đã viết lời ca ngợi Vincent de Gournay, nhấn mạnh vai trò của ông như một người tiên phong của chủ nghĩa tự do kinh tế và ảnh hưởng của ông đối với tư tưởng kinh tế Pháp.