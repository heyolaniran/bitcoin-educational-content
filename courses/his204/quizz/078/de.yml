question: Was ist Turgots Argument in Valeurs et monnaie?
answer: Der Wert der Dinge hängt von der subjektiven Wertschätzung der Menschen ab
wrong_answers:
  - Der Wert der Dinge hängt von ihren inneren Eigenschaften ab
  - Wir können den Wert von Dingen nur mit Geld messen
  - Wert wird durch Arbeit bestimmt
explanation: |
  Turgot vertritt eine subjektive Werttheorie, nach der der Wert einer Ware von ihrem Nutzen für den Einzelnen und seiner persönlichen Wertschätzung abhängt.