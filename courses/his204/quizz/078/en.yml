question: What is Turgot's argument in Valeurs et monnaie?
answer: The value of things depends on people's subjective appreciation
wrong_answers:
  - The value of things depends on their intrinsic qualities
  - We can only measure the value of things with money
  - Value is determined by work
explanation: |
  Turgot defends a subjective theory of value, according to which the value of a good depends on the utility it provides to the individual and his personal appreciation.