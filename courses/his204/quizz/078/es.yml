question: ¿Cuál es el argumento de Turgot en Valeurs et monnaie?
answer: El valor de las cosas depende de la apreciación subjetiva de las personas
wrong_answers:
  - El valor de las cosas depende de sus cualidades intrínsecas
  - Sólo podemos medir el valor de las cosas con dinero
  - El valor lo determina el trabajo
explanation: |
  Turgot defiende una teoría subjetiva del valor, según la cual el valor de un bien depende de la utilidad que proporciona al individuo y de su apreciación personal.