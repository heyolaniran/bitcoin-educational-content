question: استدلال تورگو در "Valeurs et monnaie" چیست؟
answer: ارزش چیزها به ارزیابی ذهنی مردم بستگی دارد
wrong_answers:
  - ارزش چیزها به ویژگی‌های ذاتی آن‌ها بستگی دارد
  - ما فقط می‌توانیم ارزش چیزها را با پول اندازه‌گیری کنیم
  - ارزش توسط کار تعیین می‌شود
explanation: |
  تورگو نظریه ارزش ذهنی را دفاع می‌کند، که بر اساس آن ارزش یک کالا به سودمندی آن برای فرد و ارزیابی شخصی او بستگی دارد.