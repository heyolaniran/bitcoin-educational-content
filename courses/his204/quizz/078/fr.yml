question: Quelle est la thèse défendue par Turgot dans Valeurs et monnaie ?
answer: La valeur des choses dépend de l’appréciation subjective des hommes
wrong_answers:
  - La valeur des choses dépend des qualités intrinsèques de ces choses
  - On ne peut mesurer la valeur des choses qu’avec la monnaie
  - La valeur est déterminée par le travail
explanation: |
  Turgot défend une théorie subjective de la valeur, selon laquelle la valeur d'un bien dépend de l'utilité qu'il procure à l'individu et de son appréciation personnelle.
