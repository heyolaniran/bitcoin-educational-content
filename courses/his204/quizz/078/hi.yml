question: वेलेर्स एट मोनाई में तुर्गोट का तर्क क्या है?
answer: चीजों का मूल्य लोगों की व्यक्तिपरक प्रशंसा पर निर्भर करता है
wrong_answers:
  - चीजों का मूल्य उनके आंतरिक गुणों पर निर्भर करता है
  - हम चीज़ों का मूल्य केवल पैसे से ही माप सकते हैं
  - मूल्य काम से निर्धारित होता है
explanation: |
  टर्गोट मूल्य के व्यक्तिपरक सिद्धांत का समर्थन करते हैं, जिसके अनुसार किसी वस्तु का मूल्य उस उपयोगिता पर निर्भर करता है जो वह व्यक्ति को प्रदान करती है तथा उसकी व्यक्तिगत प्रशंसा पर निर्भर करता है।