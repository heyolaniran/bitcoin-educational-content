question: Apa argumen Turgot dalam Valeurs et monnaie?
answer: Nilai sesuatu tergantung pada apresiasi subjektif orang
wrong_answers:
  - Nilai sesuatu tergantung pada kualitas intrinsiknya
  - Kita hanya bisa mengukur nilai sesuatu dengan uang
  - Nilai ditentukan oleh pekerjaan
explanation: |
  Turgot membela teori subjektif tentang nilai, yang menyatakan bahwa nilai sebuah barang bergantung pada kegunaan yang diberikannya kepada individu dan apresiasi pribadinya.