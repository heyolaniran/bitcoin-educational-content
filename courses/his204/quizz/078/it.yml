question: Qual è l'argomentazione di Turgot in Valeurs et monnaie?
answer: Il valore delle cose dipende dall'apprezzamento soggettivo delle persone
wrong_answers:
  - Il valore delle cose dipende dalle loro qualità intrinseche
  - Possiamo misurare il valore delle cose solo con il denaro
  - Il valore è determinato dal lavoro
explanation: |
  Turgot difende una teoria soggettiva del valore, secondo la quale il valore di un bene dipende dall'utilità che fornisce all'individuo e dal suo apprezzamento personale.