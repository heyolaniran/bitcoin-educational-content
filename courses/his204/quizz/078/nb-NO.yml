question: Hva er Turgots argument i Valeurs et monnaie?
answer: Tingenes verdi avhenger av folks subjektive vurdering
wrong_answers:
  - Tingenes verdi avhenger av deres iboende egenskaper
  - Vi kan bare måle verdien av ting med penger
  - Verdien bestemmes av arbeidet
explanation: |
  Turgot forsvarer en subjektiv verditeori, der verdien av en vare avhenger av den nytten den gir den enkelte og hans personlige vurdering av den.