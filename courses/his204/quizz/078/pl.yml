question: Jaki jest argument Turgota w Valeurs et monnaie?
answer: Wartość rzeczy zależy od subiektywnej oceny ludzi
wrong_answers:
  - Wartość rzeczy zależy od ich wewnętrznych cech
  - Możemy mierzyć wartość rzeczy tylko za pomocą pieniędzy
  - Wartość jest określana przez pracę
explanation: |
  Turgot broni subiektywnej teorii wartości, zgodnie z którą wartość dobra zależy od użyteczności, jaką zapewnia jednostce i jej osobistej oceny.