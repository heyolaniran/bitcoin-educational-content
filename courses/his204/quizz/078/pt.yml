question: Qual é o argumento de Turgot em Valeurs et monnaie?
answer: O valor das coisas depende da apreciação subjectiva das pessoas
wrong_answers:
  - O valor das coisas depende das suas qualidades intrínsecas
  - Só podemos medir o valor das coisas com dinheiro
  - O valor é determinado pelo trabalho
explanation: |
  Turgot defende uma teoria subjectiva do valor, segundo a qual o valor de um bem depende da utilidade que este proporciona ao indivíduo e da sua apreciação pessoal.