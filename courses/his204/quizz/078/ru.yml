question: В чем заключается аргументация Тюрго в "Valeurs et monnaie"?
answer: Ценность вещей зависит от субъективной оценки людей
wrong_answers:
  - Ценность вещей зависит от их внутренних качеств
  - Мы можем измерить ценность вещей только деньгами
  - Ценность определяется работой
explanation: |
  Тюрго отстаивает субъективную теорию стоимости, согласно которой ценность блага зависит от полезности, которую оно приносит человеку, и от его личной оценки.