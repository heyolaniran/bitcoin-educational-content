question: Vad är Turgots argument i Valeurs et monnaie?
answer: Värdet på saker beror på människors subjektiva uppskattning
wrong_answers:
  - Tingens värde beror på deras inneboende egenskaper
  - Vi kan bara mäta värdet på saker med pengar
  - Värdet bestäms av arbetet
explanation: |
  Turgot försvarar en subjektiv värdeteori, enligt vilken värdet på en vara beror på den nytta den ger individen och dennes personliga uppskattning.