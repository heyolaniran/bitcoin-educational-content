question: Lập luận của Turgot trong Valeurs et monnaie là gì?
answer: Giá trị của sự vật phụ thuộc vào sự đánh giá chủ quan của con người
wrong_answers:
  - Giá trị của sự vật phụ thuộc vào phẩm chất bên trong của chúng
  - Chúng ta chỉ có thể đo giá trị của mọi thứ bằng tiền
  - Giá trị được xác định bởi công việc
explanation: |
  Turgot bảo vệ một lý thuyết chủ quan về giá trị, theo đó giá trị của một sản phẩm phụ thuộc vào tiện ích mà nó mang lại cho cá nhân và sự đánh giá cá nhân của người đó.