question: Ve svém Lettre sur la marque des fers Turgot vyjádřil myšlenku, že není možné vědět lépe než trh. Který rakouský ekonom ji ve 20. století rozvinul?
answer: Friedrich Hayek
wrong_answers:
  - Carl Menger
  - Murray Rothbard
  - Ludwig von Mises
explanation: |
  Hayek rozvinul myšlenku "zjišťování cen" trhem, podle níž je trh procesem zjišťování informací a ceny jsou výsledkem vzájemného působení Supply a poptávky.