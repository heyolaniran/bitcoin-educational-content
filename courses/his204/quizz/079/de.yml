question: In seiner lettre sur la marque des fers bringt Turgot die Idee zum Ausdruck, dass es unmöglich ist, es besser zu wissen als der Markt. Welcher österreichische Wirtschaftswissenschaftler hat sie im 20
answer: Friedrich Hayek
wrong_answers:
  - Carl Menger
  - Murray Rothbard
  - Ludwig von Mises
explanation: |
  Hayek entwickelte die Idee der "Preisfindung" durch den Markt, wonach der Markt ein Prozess der Informationsentdeckung ist und die Preise das Ergebnis der Interaktion von Supply und Nachfrage sind.