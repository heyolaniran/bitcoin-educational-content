question: In his lettre sur la marque des fers, Turgot expresses the idea that it is impossible to know better than the market does. Which Austrian economist developed it in the 20th century?
answer: Friedrich Hayek
wrong_answers:
  - Carl Menger
  - Murray Rothbard
  - Ludwig von Mises
explanation: |
  Hayek developed the idea of "price discovery" by the market, according to which the market is a process of information discovery and prices are the result of the interaction of supply and demand.