question: En su lettre sur la marque des fers, Turgot expresa la idea de que es imposible saber más de lo que sabe el mercado. ¿Qué economista austriaco la desarrolló en el siglo XX?
answer: Friedrich Hayek
wrong_answers:
  - Carl Menger
  - Murray Rothbard
  - Ludwig von Mises
explanation: |
  Hayek desarrolló la idea del "descubrimiento de precios" por el mercado, según la cual el mercado es un proceso de descubrimiento de información y los precios son el resultado de la interacción de Supply y la demanda.