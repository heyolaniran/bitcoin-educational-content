question: در نامه خود درباره علامت آهن‌ها، تورگو ایده‌ای را بیان می‌کند که دانستن بهتر از بازار غیرممکن است. کدام اقتصاددان اتریشی این ایده را در قرن بیستم توسعه داد؟
answer: فریدریش هایک
wrong_answers:
  - کارل منگر
  - موری راتبارد
  - لودویگ فن میزس
explanation: |
  هایک ایده "کشف قیمت" توسط بازار را توسعه داد، که بر اساس آن بازار یک فرآیند کشف اطلاعات است و قیمت‌ها نتیجه تعامل Supply و تقاضا هستند.