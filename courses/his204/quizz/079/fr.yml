question: Dans sa lettre sur la marque des fers, Turgot exprime l’idée qu’il est impossible de connaître mieux que le marché ne le fait. Quel économiste autrichien la développa au XXe siècle ?
answer: Friedrich Hayek
wrong_answers:
  - Carl Menger
  - Murray Rothbard
  - Ludwig von Mises
explanation: |
  Hayek a développé l'idée de la "découverte des prix" par le marché, selon laquelle le marché est un processus de découverte d'informations et que les prix sont le résultat de l'interaction de l'offre et de la demande.
