question: अपने लेट्रे सुर ला मार्के डेस फेर्स में, टर्गोट ने यह विचार व्यक्त किया है कि बाजार से बेहतर जानना असंभव है। 20वीं सदी में किस ऑस्ट्रियाई अर्थशास्त्री ने इसे विकसित किया था?
answer: फ्रेडरिक हायेक
wrong_answers:
  - कार्ल मेंगर
  - मरे रोथबर्ड
  - लुडविग वॉन मिज़ेस
explanation: |
  हायेक ने बाजार द्वारा "मूल्य खोज" का विचार विकसित किया, जिसके अनुसार बाजार सूचना खोज की एक प्रक्रिया है और कीमतें Supply और मांग की परस्पर क्रिया का परिणाम हैं।