question: Dalam lettre sur la marque des fers, Turgot mengungkapkan gagasan bahwa mustahil untuk mengetahui lebih baik daripada yang dilakukan pasar. Ekonom Austria mana yang mengembangkannya pada abad ke-20?
answer: Friedrich Hayek
wrong_answers:
  - Carl Menger
  - Murray Rothbard
  - Ludwig von Mises
explanation: |
  Hayek mengembangkan ide "penemuan harga" oleh pasar, yang menurutnya pasar adalah sebuah proses penemuan informasi dan harga adalah hasil dari interaksi Supply dan permintaan.