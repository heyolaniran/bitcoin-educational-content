question: Nella sua lettre sur la marque des fers, Turgot esprime l'idea che è impossibile conoscere meglio di quanto faccia il mercato. Quale economista austriaco l'ha sviluppata nel XX secolo?
answer: Friedrich Hayek
wrong_answers:
  - Carl Menger
  - Murray Rothbard
  - Ludwig von Mises
explanation: |
  Hayek sviluppò l'idea della "scoperta dei prezzi" da parte del mercato, secondo la quale il mercato è un processo di scoperta dell'informazione e i prezzi sono il risultato dell'interazione tra Supply e domanda.