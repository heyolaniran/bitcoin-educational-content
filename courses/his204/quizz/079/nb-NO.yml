question: I sitt lettre sur la marque des fers gir Turgot uttrykk for tanken om at det er umulig å vite bedre enn markedet gjør. Hvilken østerriksk økonom utviklet den på 1900-tallet?
answer: Friedrich Hayek
wrong_answers:
  - Carl Menger
  - Murray Rothbard
  - Ludwig von Mises
explanation: |
  Hayek utviklet ideen om markedets "prisoppdagelse", som går ut på at markedet er en prosess for informasjonsoppdagelse, og at prisene er et resultat av samspillet mellom Supply og etterspørsel.