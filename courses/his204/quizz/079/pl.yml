question: W swoim lettre sur la marque des fers Turgot wyraża ideę, że niemożliwe jest wiedzieć lepiej niż robi to rynek. Który austriacki ekonomista rozwinął ją w XX wieku?
answer: Friedrich Hayek
wrong_answers:
  - Carl Menger
  - Murray Rothbard
  - Ludwig von Mises
explanation: |
  Hayek opracował koncepcję "odkrywania cen" przez rynek, zgodnie z którą rynek jest procesem odkrywania informacji, a ceny są wynikiem interakcji Supply i popytu.