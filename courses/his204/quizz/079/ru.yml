question: В своем письме о марке фьючерсов Тюрго высказывает мысль о том, что невозможно знать лучше, чем знает рынок. Какой австрийский экономист развил ее в XX веке?
answer: Фридрих Хайек
wrong_answers:
  - Карл Менгер
  - Мюррей Ротбард
  - Людвиг фон Мизес
explanation: |
  Хайек разработал идею "открытия цен" рынком, согласно которой рынок - это процесс открытия информации, а цены - результат взаимодействия Supply и спроса.