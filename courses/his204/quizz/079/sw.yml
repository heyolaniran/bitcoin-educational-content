question: Katika barua yake sur la marque des fers, Turgot anaelezea wazo kwamba haiwezekani kujua bora kuliko soko. Ni mwanauchumi gani wa Austria aliyeiendeleza katika karne ya 20?
answer: Friedrich Hayek
wrong_answers:
  - Carl Menger
  - Murray Rothbard
  - Ludwig von Mises
explanation: |
  Hayek alianzisha wazo la "ugunduzi wa bei" na soko, kulingana na ambayo soko ni mchakato wa ugunduzi wa habari na bei ni matokeo ya mwingiliano wa Supply na mahitaji.