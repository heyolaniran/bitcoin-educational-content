question: Trong tác phẩm lettre sur la marque des fers, Turgot bày tỏ ý tưởng rằng không thể biết rõ hơn thị trường. Nhà kinh tế học người Áo nào đã phát triển ý tưởng này vào thế kỷ 20?
answer: Friedrich Hayek
wrong_answers:
  - Carl Menger
  - Murray Rothbard
  - Ludwig von Mises
explanation: |
  Hayek đã phát triển ý tưởng "khám phá giá" của thị trường, theo đó thị trường là một quá trình khám phá thông tin và giá cả là kết quả của sự tương tác giữa Supply và nhu cầu.