question: Koho Turgot ve svých pamětech o půjčování peněz obhajuje a zároveň vyvrací jeho zásady?
answer: Řekové a katolická církev
wrong_answers:
  - Řekové a Egypťané
  - Katolická církev a Egypťané
  - Římané a Kartaginci
explanation: |
  Turgot obhajoval svobodu půjčování peněz a zároveň vyvracel argumenty Řeků a katolické církve proti úroku. Domníval se, že zákaz úroků brání hospodářskému rozvoji a že je nutné umožnit jednotlivcům volně si půjčovat a vypůjčovat.