question: En su memoria sobre el préstamo de dinero, ¿a quién defiende Turgot la libertad mientras refuta sus principios?
answer: Los griegos y la Iglesia Católica
wrong_answers:
  - Griegos y egipcios
  - La Iglesia católica y los egipcios
  - Romanos y cartagineses
explanation: |
  Turgot defendió la libertad de prestar dinero, al tiempo que refutaba los argumentos de los griegos y la Iglesia Católica contra el interés. Creía que prohibir el interés obstaculizaba el desarrollo económico y que era necesario permitir a los particulares prestar y pedir prestado libremente.