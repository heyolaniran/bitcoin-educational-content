question: Kelle vabadust kaitseb Turgot oma mälestustes rahalaenuandmise kohta, lükates samal ajal ümber nende põhimõtted?
answer: Kreeklased ja katoliku kirik
wrong_answers:
  - Kreeklased ja egiptlased
  - Katoliku kirik ja egiptlased
  - Roomlased ja kartagolased
explanation: |
  Turgot kaitses raha laenamise vabadust, lükates samal ajal ümber kreeklaste ja katoliku kiriku argumendid intressi vastu. Ta uskus, et intresside keelamine takistab majandusarengut ja et üksikisikutel tuleb lubada vabalt laenata ja laenata.