question: در خاطرات خود درباره وام‌دهی، تورگو آزادی چه کسانی را در حالی که اصول آن‌ها را رد می‌کند، دفاع می‌کند؟
answer: یونانی‌ها و کلیسای کاتولیک
wrong_answers:
  - یونانیان و مصریان
  - کلیسای کاتولیک و مصریان
  - رومیان و کارتاژی‌ها
explanation: |
  تورگو آزادی وام دادن را دفاع کرد و استدلال‌های یونانیان و کلیسای کاتولیک علیه بهره را رد کرد. او معتقد بود که ممنوعیت بهره مانع توسعه اقتصادی می‌شود و لازم است که به افراد اجازه داده شود آزادانه وام بدهند و بگیرند.