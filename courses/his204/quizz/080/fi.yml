question: Kenen vapautta Turgot puolustaa rahan lainaamista käsittelevässä muistelmateoksessaan kumoten samalla heidän periaatteensa?
answer: Kreikkalaiset ja katolinen kirkko
wrong_answers:
  - Kreikkalaiset ja egyptiläiset
  - Katolinen kirkko ja egyptiläiset
  - Roomalaiset ja karthagolaiset
explanation: |
  Turgot puolusti vapautta lainata rahaa ja kumosi samalla kreikkalaisten ja katolisen kirkon korkoa vastustavat argumentit. Hän uskoi, että koron kieltäminen haittasi taloudellista kehitystä ja että oli välttämätöntä antaa yksityishenkilöille mahdollisuus lainata ja lainata vapaasti.