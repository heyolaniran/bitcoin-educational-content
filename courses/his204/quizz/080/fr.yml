question: Dans son mémoire sur les prêts d’argent, de qui Turgot défend-t-il la liberté tout en réfutant leurs principes ?
answer: Des Grecs et de l’Eglise catholique
wrong_answers:
  - Des Grecs et des Égyptiens
  - De l’Eglise catholique et des Egyptiens
  - Des Romains et des Carthaginois
explanation: |
  Turgot défend la liberté des prêts d'argent tout en réfutant les arguments des Grecs et de l'Église catholique contre l'intérêt. Il pensait que l'interdiction de l'intérêt entravait le développement économique et qu'il était nécessaire de permettre aux individus de prêter et d'emprunter librement.
