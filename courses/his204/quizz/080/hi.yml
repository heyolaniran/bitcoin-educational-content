question: धन उधार देने पर अपने संस्मरण में, टर्गोट किसके सिद्धांतों का खंडन करते हुए उनकी स्वतंत्रता का बचाव करता है?
answer: यूनानी और कैथोलिक चर्च
wrong_answers:
  - यूनानी और मिस्रवासी
  - कैथोलिक चर्च और मिस्रवासी
  - रोमन और कार्थेजियन
explanation: |
  टर्गोट ने पैसे उधार देने की स्वतंत्रता का बचाव किया, जबकि ब्याज के खिलाफ यूनानियों और कैथोलिक चर्च के तर्कों का खंडन किया। उनका मानना ​​था कि ब्याज पर रोक लगाने से आर्थिक विकास में बाधा आती है और व्यक्तियों को स्वतंत्र रूप से उधार देने और उधार लेने की अनुमति देना आवश्यक है।