question: Dalam memoarnya tentang peminjaman uang, siapa yang dibela oleh Turgot ketika ia menolak prinsip-prinsip mereka?
answer: Orang Yunani dan Gereja Katolik
wrong_answers:
  - Orang Yunani dan Mesir
  - Gereja Katolik dan masyarakat Mesir
  - Bangsa Romawi dan Kartago
explanation: |
  Turgot membela kebebasan meminjamkan uang, sambil menyangkal argumen orang-orang Yunani dan Gereja Katolik yang menentang bunga. Dia percaya bahwa melarang bunga menghambat perkembangan ekonomi dan bahwa perlu untuk mengizinkan individu meminjamkan dan meminjam secara bebas.