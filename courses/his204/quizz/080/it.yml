question: Nella sua memoria sul prestito di denaro, chi difende la libertà di Turgot, confutandone i principi?
answer: I greci e la Chiesa cattolica
wrong_answers:
  - Greci ed Egizi
  - La Chiesa cattolica e gli egiziani
  - Romani e Cartaginesi
explanation: |
  Turgot difese la libertà di prestare denaro, confutando le argomentazioni dei greci e della Chiesa cattolica contro gli interessi. Egli riteneva che la proibizione degli interessi ostacolasse lo sviluppo economico e che fosse necessario permettere agli individui di prestare e prendere in prestito liberamente.