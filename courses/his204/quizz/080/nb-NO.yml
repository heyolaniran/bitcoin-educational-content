question: Hvem er det Turgot forsvarer friheten til i sine memoarer om pengeutlån, samtidig som han avviser deres prinsipper?
answer: Grekerne og den katolske kirken
wrong_answers:
  - Grekerne og egypterne
  - Den katolske kirke og egypterne
  - Romerne og karthaginerne
explanation: |
  Turgot forsvarte friheten til å låne ut penger, samtidig som han tilbakeviste grekernes og den katolske kirkens argumenter mot renter. Han mente at renteforbud hindret økonomisk utvikling, og at det var nødvendig å tillate enkeltpersoner å låne og låne ut fritt.