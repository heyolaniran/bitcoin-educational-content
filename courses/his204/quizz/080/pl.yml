question: W swoim pamiętniku o pożyczaniu pieniędzy, kogo Turgot broni wolności, jednocześnie obalając ich zasady?
answer: Grecy i Kościół katolicki
wrong_answers:
  - Grecy i Egipcjanie
  - Kościół katolicki i Egipcjanie
  - Rzymianie i Kartagińczycy
explanation: |
  Turgot bronił wolności pożyczania pieniędzy, jednocześnie odpierając argumenty Greków i Kościoła katolickiego przeciwko odsetkom. Uważał, że zakaz odsetek utrudnia rozwój gospodarczy i że konieczne jest umożliwienie jednostkom swobodnego udzielania i zaciągania pożyczek.