question: No seu livro de memórias sobre o empréstimo de dinheiro, de quem é que Turgot defende a liberdade ao mesmo tempo que refuta os seus princípios?
answer: Os gregos e a Igreja Católica
wrong_answers:
  - Gregos e Egípcios
  - A Igreja Católica e os Egípcios
  - Romanos e cartagineses
explanation: |
  Turgot defendeu a liberdade de emprestar dinheiro, refutando os argumentos dos gregos e da Igreja Católica contra os juros. Considerava que a proibição dos juros impedia o desenvolvimento económico e que era necessário permitir que os indivíduos emprestassem e contraíssem empréstimos livremente.