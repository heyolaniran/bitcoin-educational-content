question: В своем мемуаре о денежном кредите Тюрго защищает свободу кого, опровергая их принципы?
answer: Греки и католическая церковь
wrong_answers:
  - Греки и египтяне
  - Католическая церковь и египтяне
  - Римляне и карфагеняне
explanation: |
  Тюрго отстаивал свободу ссужать деньги, опровергая аргументы греков и католической церкви против процентов. Он считал, что запрет на проценты препятствует экономическому развитию и что необходимо разрешить частным лицам свободно давать и брать в долг.