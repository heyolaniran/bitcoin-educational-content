question: U svojim memoarima o pozajmljivanju novca, Turgot brani slobodu lihvara dok pobija njihove principe.
answer: Grci i Katolička crkva
wrong_answers:
  - Grci i Egipćani
  - Katolička crkva i Egipćani
  - Rimljani i Kartaginjani
explanation: |
  Turgot je branio slobodu pozajmljivanja novca, dok je pobijao argumente Grka i Katoličke crkve protiv kamate. Verovao je da zabrana kamate ometa ekonomski razvoj i da je neophodno omogućiti pojedincima slobodno pozajmljivanje i zaduživanje.