question: I sin memoar om penningutlåning, vem försvarar Turgot friheten för samtidigt som han motbevisar deras principer?
answer: Grekerna och den katolska kyrkan
wrong_answers:
  - Greker och egyptier
  - Den katolska kyrkan och egyptierna
  - Romare och karthaginer
explanation: |
  Turgot försvarade friheten att låna ut pengar och tillbakavisade samtidigt grekernas och den katolska kyrkans argument mot ränta. Han menade att ränteförbudet hindrade den ekonomiska utvecklingen och att det var nödvändigt att låta människor låna och låna ut fritt.