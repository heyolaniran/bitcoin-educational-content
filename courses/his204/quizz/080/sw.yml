question: Katika risala yake ya kukopesha pesa, Turgot anatetea uhuru wa nani huku akipinga kanuni zao?
answer: Wagiriki na Kanisa Katoliki
wrong_answers:
  - Wagiriki na Wamisri
  - Kanisa Katoliki na Wamisri
  - Warumi na Carthaginians
explanation: |
  Turgot alitetea uhuru wa kukopesha pesa, huku akipinga hoja za Wagiriki na Kanisa Katoliki dhidi ya riba. Aliamini kuwa kukataza riba kunazuia maendeleo ya kiuchumi na kwamba ilikuwa ni lazima kuruhusu watu binafsi kukopesha na kukopa kwa uhuru.