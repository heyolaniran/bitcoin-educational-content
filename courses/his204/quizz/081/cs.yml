question: Ve které francouzské provincii Turgot poprvé experimentoval se svými zásadami ekonomického liberalismu?
answer: Limousin
wrong_answers:
  - Brittany
  - L'Alsace
  - Normandie
explanation: |
  Turgot byl intendantem chudé a izolované provincie Limousin, kde provedl řadu ekonomických reforem inspirovaných liberalismem.