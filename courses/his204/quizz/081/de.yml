question: In welcher französischen Provinz experimentierte Turgot erstmals mit seinen Prinzipien des Wirtschaftsliberalismus?
answer: Limousin
wrong_answers:
  - Bretagne
  - L'Alsace
  - Normandie
explanation: |
  Turgot war Intendant des Limousin, einer armen und isolierten Provinz, wo er eine Reihe von Wirtschaftsreformen durchführte, die vom Liberalismus inspiriert waren.