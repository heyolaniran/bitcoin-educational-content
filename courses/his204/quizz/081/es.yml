question: ¿En qué provincia francesa experimentó Turgot por primera vez sus principios de liberalismo económico?
answer: Lemosín
wrong_answers:
  - Brittany
  - L'Alsace
  - Normandía
explanation: |
  Turgot fue intendente de Lemosín, una provincia pobre y aislada, donde aplicó una serie de reformas económicas inspiradas en el liberalismo.