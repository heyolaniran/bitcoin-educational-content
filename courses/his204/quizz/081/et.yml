question: Millises Prantsuse provintsis katsetas Turgot esimest korda oma majandusliberaalsuse põhimõtteid?
answer: Limousin
wrong_answers:
  - Brittany
  - L'Alsace
  - Normandia
explanation: |
  Turgot oli Limousini, vaese ja isoleeritud provintsi intendant, kus ta viis ellu mitmeid liberaalsusest inspireeritud majandusreforme.