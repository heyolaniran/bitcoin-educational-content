question: Missä Ranskan maakunnassa Turgot kokeili ensimmäisen kerran talousliberalismin periaatteita?
answer: Limousin
wrong_answers:
  - Brittany
  - L'Alsace
  - Normandia
explanation: |
  Turgot oli köyhän ja syrjäisen Limousinin maakunnan intendentti, jossa hän toteutti useita liberalismin innoittamia talousuudistuksia.