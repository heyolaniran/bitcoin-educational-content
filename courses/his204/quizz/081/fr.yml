question: Dans quelle province française Turgot a-t-il eut pour la première fois l’occasion d’expérimenter ses principes du libéralisme économique ?
answer: Le Limousin
wrong_answers:
  - La Bretagne
  - L’Alsace
  - La Normandie
explanation: |
  Turgot a été intendant du Limousin, une province pauvre et isolée, où il a mis en œuvre certaines réformes économiques inspirées par le libéralisme.
