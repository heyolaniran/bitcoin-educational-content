question: तुर्गोट ने आर्थिक उदारवाद के अपने सिद्धांतों का पहली बार प्रयोग किस फ्रांसीसी प्रांत में किया था?
answer: लिमोसिन
wrong_answers:
  - ब्रिटनी
  - एल'अलसैस
  - नॉरमैंडी
explanation: |
  टर्गोट लिमोज़िन नामक एक गरीब और पृथक प्रांत के प्रभारी थे, जहां उन्होंने उदारवाद से प्रेरित होकर कई आर्थिक सुधारों को लागू किया।