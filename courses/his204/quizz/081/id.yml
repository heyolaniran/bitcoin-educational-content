question: Di provinsi Prancis manakah Turgot pertama kali bereksperimen dengan prinsip-prinsip liberalisme ekonominya?
answer: Limousin
wrong_answers:
  - Brittany
  - L'Alsace
  - Normandia
explanation: |
  Turgot adalah gubernur Limousin, sebuah provinsi yang miskin dan terisolasi, di mana ia menerapkan sejumlah reformasi ekonomi yang terinspirasi oleh liberalisme.