question: In quale provincia francese Turgot sperimentò per la prima volta i suoi principi di liberalismo economico?
answer: Limousin
wrong_answers:
  - Bretagna
  - L'Alsazia
  - Normandia
explanation: |
  Turgot fu intendente del Limousin, una provincia povera e isolata, dove attuò una serie di riforme economiche ispirate al liberalismo.