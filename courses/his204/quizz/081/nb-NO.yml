question: I hvilken fransk provins eksperimenterte Turgot først med sine prinsipper for økonomisk liberalisme?
answer: Limousin
wrong_answers:
  - Bretagne
  - L'Alsace
  - Normandie
explanation: |
  Turgot var intendant i Limousin, en fattig og isolert provins, der han gjennomførte en rekke økonomiske reformer inspirert av liberalismen.