question: W której francuskiej prowincji Turgot po raz pierwszy eksperymentował ze swoimi zasadami liberalizmu gospodarczego?
answer: Limousin
wrong_answers:
  - Bretania
  - L'Alsace
  - Normandia
explanation: |
  Turgot był zarządcą Limousin, biednej i odizolowanej prowincji, gdzie wprowadził szereg reform gospodarczych inspirowanych liberalizmem.