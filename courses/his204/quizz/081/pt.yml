question: Em que província francesa Turgot experimentou pela primeira vez os seus princípios de liberalismo económico?
answer: Limousin
wrong_answers:
  - Bretanha
  - L'Alsace
  - Normandia
explanation: |
  Turgot foi intendente de Limousin, uma província pobre e isolada, onde implementou uma série de reformas económicas inspiradas no liberalismo.