question: В какой французской провинции Тюрго впервые опробовал свои принципы экономического либерализма?
answer: Лимузен
wrong_answers:
  - Бриттани
  - Эльзас
  - Нормандия
explanation: |
  Тюрго был интендантом Лимузена, бедной и изолированной провинции, где он провел ряд экономических реформ, вдохновленных либерализмом.