question: U kojoj francuskoj provinciji je Turgot prvi put eksperimentisao sa svojim principima ekonomskog liberalizma?
answer: Limousin
wrong_answers:
  - Brittany
  - L'Alsace
  - Normandija
explanation: |
  Turgot je bio intendant u Limuzinu, siromašnoj i izolovanoj provinciji, gde je sproveo niz ekonomskih reformi inspirisanih liberalizmom.