question: I vilken fransk provins experimenterade Turgot först med sina principer om ekonomisk liberalism?
answer: Limousin
wrong_answers:
  - Brittany
  - L'Alsace
  - Normandie
explanation: |
  Turgot var intendent i Limousin, en fattig och isolerad provins, där han genomförde ett antal ekonomiska reformer inspirerade av liberalismen.