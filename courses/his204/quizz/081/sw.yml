question: Ni katika mkoa gani wa Ufaransa ambapo Turgot alijaribu kwa mara ya kwanza kanuni zake za uliberali wa kiuchumi?
answer: Limousin
wrong_answers:
  - Brittany
  - L'Alsace
  - Normandia
explanation: |
  Turgot alikuwa mshiriki wa Limousin, jimbo maskini na lililotengwa, ambapo alitekeleza mageuzi kadhaa ya kiuchumi yaliyochochewa na uliberali.