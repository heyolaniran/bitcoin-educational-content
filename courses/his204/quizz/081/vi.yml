question: Turgot lần đầu tiên thử nghiệm các nguyên tắc của chủ nghĩa tự do kinh tế ở tỉnh nào của Pháp?
answer: Xe limousine
wrong_answers:
  - Bretagne
  - L'Alsace
  - Normandy
explanation: |
  Turgot là quản đốc của Limousin, một tỉnh nghèo và biệt lập, nơi ông đã thực hiện một số cải cách kinh tế lấy cảm hứng từ chủ nghĩa tự do.