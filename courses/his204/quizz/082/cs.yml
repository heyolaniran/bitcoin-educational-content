question: Jeho reformy se zaměřily na corvée, neplacenou nucenou práci při stavbě silnic. Čím ji nahradil?
answer: S hotovostní daní
wrong_answers:
  - Daň v naturáliích (zemědělské produkty)
  - Nahrazuje ji ničím
  - Prostřednictvím dobrovolného systému
explanation: |
  Turgot nahradil corvée, neplacenou nucenou práci, peněžní daní, čímž rozložil břemeno výstavby silnic a osvobodil rolníky od této povinnosti.