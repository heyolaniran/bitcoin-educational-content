question: Die Corvée, die unbezahlte Zwangsarbeit beim Straßenbau, stand im Mittelpunkt seiner Reformen. Wodurch hat er sie ersetzt?
answer: Mit einer Bargeldsteuer
wrong_answers:
  - Steuer in Form von Sachleistungen (landwirtschaftliche Erzeugnisse)
  - Er ersetzt sie durch nichts
  - Durch ein freiwilliges System
explanation: |
  Turgot ersetzte die corvée, die unbezahlte Zwangsarbeit, durch eine Geldsteuer, wodurch die Last des Straßenbaus verteilt und die Bauern von dieser Verpflichtung befreit wurden.