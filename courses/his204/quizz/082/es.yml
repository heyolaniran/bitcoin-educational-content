question: Corvée, the unpaid forced labor used to build roads, was the focus of his reforms. What did he replace it with?
answer: With a cash tax
wrong_answers:
  - Tax in kind (agricultural produce)
  - He replaces it with nothing
  - Through a voluntary system
explanation: |
  Turgot replaced the corvée, unpaid forced labor, with a cash tax, thus spreading the burden of road construction and freeing peasants from this obligation.