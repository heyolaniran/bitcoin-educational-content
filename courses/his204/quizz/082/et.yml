question: Corvée, teede ehitamiseks kasutatav tasustamata sunnitöö, oli tema reformide keskmes. Millega ta selle asendas?
answer: Sularahamaksuga
wrong_answers:
  - Mitterahaline maks (põllumajandussaadused)
  - Ta asendab selle mitte millegagi
  - Vabatahtliku süsteemi kaudu
explanation: |
  Turgot asendas corvée, tasustamata sunniviisilise töö, rahamaksuga, jagades seega teedeehituse koormust ja vabastades talupojad sellest kohustusest.