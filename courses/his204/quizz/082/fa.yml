question: کوروه، کار اجباری بدون مزد که برای ساخت جاده‌ها استفاده می‌شد، محور اصلاحات او بود. او آن را با چه چیزی جایگزین کرد؟
answer: با یک مالیات نقدی
wrong_answers:
  - مالیات به صورت جنس (محصولات کشاورزی)
  - او آن را با هیچ چیز جایگزین نمی‌کند
  - از طریق یک سیستم داوطلبانه
explanation: |
  تورگو، کار اجباری بدون مزد (کوروه) را با یک مالیات نقدی جایگزین کرد و بدین ترتیب بار ساخت جاده را پخش کرده و دهقانان را از این تعهد آزاد کرد.