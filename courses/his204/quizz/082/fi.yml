question: Corvée, palkaton pakkotyö, jota käytettiin teiden rakentamiseen, oli hänen uudistustensa keskipisteenä. Millä hän korvasi sen?
answer: Käteisvero
wrong_answers:
  - Luontoismaksut (maataloustuotteet)
  - Hän korvaa sen tyhjällä
  - Vapaaehtoisen järjestelmän kautta
explanation: |
  Turgot korvasi corvée-veron, eli palkattoman pakkotyön, käteisverolla, mikä jakoi tienrakentamisen taakkaa ja vapautti talonpojat tästä velvoitteesta.