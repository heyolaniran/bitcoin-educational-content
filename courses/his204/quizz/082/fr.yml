question: La corvée, travail forcé non rémunéré, servant à la construction des chemins, est l’objet de ses réformes. Par quoi la remplace-t-il ?
answer: Par un impôt en argent
wrong_answers:
  - Par un impôt en nature (denrées agricoles)
  - Il ne la remplace par rien
  - Par un système de volontariat
explanation: |
  Turgot a remplacé la corvée, un travail forcé non rémunéré, par un impôt en argent, ce qui a permis de mieux répartir la charge de la construction des chemins et de libérer les paysans de cette obligation.
