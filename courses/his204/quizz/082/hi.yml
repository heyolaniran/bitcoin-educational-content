question: कोर्वी, सड़क बनाने के लिए इस्तेमाल किया जाने वाला अवैतनिक श्रम, उनके सुधारों का केंद्र था। उन्होंने इसकी जगह क्या लाया?
answer: नकद कर के साथ
wrong_answers:
  - वस्तु कर (कृषि उपज)
  - वह इसे किसी भी चीज़ से प्रतिस्थापित नहीं करता
  - स्वैच्छिक प्रणाली के माध्यम से
explanation: |
  टर्गोट ने कोरवी, अवैतनिक बंधुआ मजदूरी, के स्थान पर नकद कर लागू किया, जिससे सड़क निर्माण का बोझ कम हुआ और किसानों को इस दायित्व से मुक्ति मिली।