question: Corvée, kerja paksa tanpa bayaran yang digunakan untuk membangun jalan, adalah fokus dari reformasinya. Dengan apa dia menggantinya?
answer: Dengan pajak tunai
wrong_answers:
  - Pajak dalam bentuk natura (hasil pertanian)
  - Dia menggantinya dengan apa-apa
  - Melalui sistem sukarela
explanation: |
  Turgot menggantikan corvée, kerja paksa yang tidak dibayar, dengan pajak tunai, sehingga membagi beban pembangunan jalan dan membebaskan petani dari kewajiban ini.