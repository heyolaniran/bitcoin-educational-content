question: La Corvée, il lavoro forzato non retribuito utilizzato per costruire le strade, fu al centro delle sue riforme. Con cosa lo sostituì?
answer: Con una tassa sul contante
wrong_answers:
  - Imposta in natura (prodotti agricoli)
  - Lo sostituisce con il nulla
  - Attraverso un sistema volontario
explanation: |
  Turgot sostituì la corvée, il lavoro forzato non retribuito, con una tassa in denaro, distribuendo così l'onere della costruzione delle strade e liberando i contadini da questo obbligo.