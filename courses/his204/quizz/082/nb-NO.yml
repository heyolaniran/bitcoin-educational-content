question: Corvée, det ubetalte tvangsarbeidet som ble brukt til å bygge veier, var i fokus for hans reformer. Hva erstattet han det med?
answer: Med en kontantskatt
wrong_answers:
  - Skatt in natura (landbruksprodukter)
  - Han erstatter det med ingenting
  - Gjennom et frivillig system
explanation: |
  Turgot erstattet corvée, ubetalt tvangsarbeid, med en kontantskatt, noe som spredte byrden med veibygging og frigjorde bøndene fra denne plikten.