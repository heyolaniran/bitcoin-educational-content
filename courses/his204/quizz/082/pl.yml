question: Jego reformy koncentrowały się na pańszczyźnie, nieodpłatnej pracy przymusowej wykorzystywanej do budowy dróg. Czym ją zastąpił?
answer: Z podatkiem gotówkowym
wrong_answers:
  - Podatek w naturze (produkty rolne)
  - Zastępuje go niczym
  - Poprzez dobrowolny system
explanation: |
  Turgot zastąpił pańszczyznę, nieodpłatną pracę przymusową, podatkiem pieniężnym, rozkładając w ten sposób ciężar budowy dróg i uwalniając chłopów od tego obowiązku.