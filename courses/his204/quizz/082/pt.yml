question: A corvéia, o trabalho forçado não remunerado usado para construir estradas, foi o foco de suas reformas. Por que é que ele o substituiu?
answer: Com um imposto de caixa
wrong_answers:
  - Imposto em espécie (produtos agrícolas)
  - Ele substitui-o por nada
  - Através de um sistema voluntário
explanation: |
  Turgot substituiu a corvéia, trabalho forçado não remunerado, por um imposto em dinheiro, repartindo assim os encargos com a construção de estradas e libertando os camponeses dessa obrigação.