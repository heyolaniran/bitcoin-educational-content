question: Корве, неоплачиваемый принудительный труд, использовавшийся для строительства дорог, был в центре внимания его реформ. Чем он его заменил?
answer: С денежным налогом
wrong_answers:
  - Налог в натуральной форме (сельскохозяйственная продукция)
  - Он заменяет его ничем
  - С помощью добровольной системы
explanation: |
  Тюрго заменил "корве", неоплачиваемый принудительный труд, денежным налогом, тем самым распределив бремя строительства дорог и освободив крестьян от этой обязанности.