question: Corvée, neplaćeni prinudni rad korišćen za izgradnju puteva, bio je u fokusu njegovih reformi. Čime ga je zamenio?
answer: Sa gotovinskim porezom
wrong_answers:
  - Porez u naturi (poljoprivredni proizvodi)
  - On to zamenjuje ničim
  - Kroz dobrovoljni sistem
explanation: |
  Turgot je zamenio korve, neplaćeni prinudni rad, novčanim porezom, čime je raspodelio teret izgradnje puteva i oslobodio seljake ove obaveze.