question: Corvée, det obetalda tvångsarbete som användes för att bygga vägar, var i fokus för hans reformer. Vad ersatte han det med?
answer: Med en kontantskatt
wrong_answers:
  - Skatt in natura (jordbruksprodukter)
  - Han ersätter det med ingenting
  - Genom ett frivilligt system
explanation: |
  Turgot ersatte corvée, obetalt tvångsarbete, med en kontantskatt, vilket fördelade bördan av vägbyggen och befriade bönderna från denna skyldighet.