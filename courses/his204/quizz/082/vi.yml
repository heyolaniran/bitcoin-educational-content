question: Corvée, lao động cưỡng bức không được trả công để xây dựng đường sá, là trọng tâm cải cách của ông. Ông đã thay thế nó bằng cái gì?
answer: Với thuế tiền mặt
wrong_answers:
  - Thuế hiện vật (nông sản)
  - Anh ấy thay thế nó bằng không có gì
  - Thông qua một hệ thống tự nguyện
explanation: |
  Turgot thay thế corvée, lao động cưỡng bức không công, bằng thuế tiền mặt, do đó chia sẻ gánh nặng xây dựng đường bộ và giải phóng nông dân khỏi nghĩa vụ này.