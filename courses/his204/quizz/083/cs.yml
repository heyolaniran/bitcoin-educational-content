question: Proč bylo Turgotovo jmenování ministrem námořnictva přijato s překvapením?
answer: Turgot není velkým znalcem námořnictva
wrong_answers:
  - Turgot má na tomto ministerstvu mnoho nepřátel
  - Turgot neumí plavat
  - Turgot je civilista
explanation: |
  Turgot neměl žádné námořní zkušenosti, což mnohé překvapilo, když byl do funkce jmenován. Místo toho se očekávalo, že bude jmenován na ekonomický nebo finanční post.