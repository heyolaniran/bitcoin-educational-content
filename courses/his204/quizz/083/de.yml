question: Warum wurde die Ernennung von Turgot zum Marineminister mit Überraschung aufgenommen?
answer: Turgot ist kein großer Kenner der Marine
wrong_answers:
  - Turgot hat viele Feinde in diesem Ministerium
  - Turgot kann nicht schwimmen
  - Turgot ist ein Zivilist
explanation: |
  Turgot hatte keine Erfahrung in der Marine, was viele bei seiner Ernennung überraschte. Stattdessen erwartete man, dass er einen wirtschaftlichen oder finanziellen Posten bekleiden würde.