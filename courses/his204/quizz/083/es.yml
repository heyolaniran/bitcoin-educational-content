question: Why was Turgot's appointment as Minister of the Navy greeted with surprise?
answer: Turgot is not a great connoisseur of the Navy
wrong_answers:
  - Turgot has many enemies in this ministry
  - Turgot can't swim
  - Turgot is a civilian
explanation: |
  Turgot had no naval experience, which surprised many when he was appointed to the post. Instead, he was expected to be appointed to an economic or financial post.