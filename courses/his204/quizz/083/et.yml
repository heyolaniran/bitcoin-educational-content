question: Miks tervitati Turgot' nimetamist mereväeministriks üllatusega?
answer: Turgot ei ole mereväe suur tundja
wrong_answers:
  - Turgot'l on selles ministeeriumis palju vaenlasi
  - Turgot ei oska ujuda
  - Turgot on tsiviilisik
explanation: |
  Turgot'l puudusid merenduskogemused, mis üllatas paljusid, kui ta ametisse nimetati. Selle asemel eeldati, et teda nimetatakse majandus- või finantsametnikuks.