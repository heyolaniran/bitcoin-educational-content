question: چرا انتصاب تورگو به عنوان وزیر نیروی دریایی با تعجب مواجه شد؟
answer: تورگو یک کارشناس بزرگ نیروی دریایی نیست.
wrong_answers:
  - تورگو در این وزارتخانه دشمنان زیادی دارد
  - تورگو نمی‌تواند شنا کند
  - تورگو یک غیرنظامی است
explanation: |
  تورگو هیچ تجربه دریایی نداشت، که این امر بسیاری را زمانی که او به این سمت منصوب شد، شگفت‌زده کرد. در عوض، انتظار می‌رفت که او به یک سمت اقتصادی یا مالی منصوب شود.