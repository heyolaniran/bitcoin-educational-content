question: Miksi Turgot'n nimitys laivastoministeriksi herätti ihmetystä?
answer: Turgot ei ole suuri laivaston tuntija..
wrong_answers:
  - Turgot'lla on monia vihollisia tässä ministeriössä
  - Turgot ei osaa uida
  - Turgot on siviili
explanation: |
  Turgot'lla ei ollut kokemusta merenkulusta, mikä yllätti monet, kun hänet nimitettiin tehtävään. Sen sijaan hänen odotettiin nimitettävän taloudelliseen tai rahoitukselliseen tehtävään.