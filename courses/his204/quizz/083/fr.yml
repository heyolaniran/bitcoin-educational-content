question: Pourquoi la nomination de Turgot au poste de Ministre de la Marine est-elle accueillie avec surprise ?
answer: Turgot n’est pas un grand connaisseur de la Marine
wrong_answers:
  - Turgot a de nombreux ennemis dans ce ministère
  - Turgot ne sait pas nager
  - Turgot est un civil
explanation: |
  Turgot n'avait pas d'expérience dans la marine, ce qui a surpris beaucoup de monde lorsqu'il a été nommé à ce poste. On s'attendait plutôt à ce qu'il soit nommé à un poste économique ou financier.
