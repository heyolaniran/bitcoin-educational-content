question: नौसेना मंत्री के रूप में तुर्गोट की नियुक्ति पर आश्चर्य क्यों व्यक्त किया गया?
answer: टर्गोट नौसेना का बहुत बड़ा पारखी नहीं है
wrong_answers:
  - इस मंत्रालय में तुर्गोट के कई दुश्मन हैं
  - टर्गोट तैर नहीं सकता
  - टर्गोट एक नागरिक है
explanation: |
  टर्गोट के पास नौसेना का कोई अनुभव नहीं था, जिस कारण उन्हें इस पद पर नियुक्त किए जाने पर कई लोग हैरान रह गए। इसके बजाय, उन्हें आर्थिक या वित्तीय पद पर नियुक्त किए जाने की उम्मीद थी।