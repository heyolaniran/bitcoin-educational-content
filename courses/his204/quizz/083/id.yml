question: Mengapa penunjukan Turgot sebagai Menteri Angkatan Laut disambut dengan kejutan?
answer: Turgot bukanlah seorang ahli Angkatan Laut yang hebat
wrong_answers:
  - Turgot memiliki banyak musuh dalam pelayanan ini
  - Turgot tidak bisa berenang
  - Turgot adalah seorang warga sipil
explanation: |
  Turgot tidak memiliki pengalaman di bidang angkatan laut, yang mengejutkan banyak orang ketika ia ditunjuk untuk menduduki jabatan tersebut. Sebaliknya, ia diperkirakan akan ditunjuk untuk menduduki jabatan di bidang ekonomi atau keuangan.