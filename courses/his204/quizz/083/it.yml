question: Perché la nomina di Turgot a Ministro della Marina fu accolta con sorpresa?
answer: Turgot non è un grande conoscitore della Marina
wrong_answers:
  - Turgot ha molti nemici in questo ministero
  - Turgot non sa nuotare
  - Turgot è un civile
explanation: |
  Turgot non aveva alcuna esperienza in campo navale, il che sorprese molti quando fu nominato alla carica. Ci si aspettava invece che venisse nominato a un incarico economico o finanziario.