question: Hvorfor ble Turgots utnevnelse til marineminister møtt med overraskelse?
answer: Turgot er ikke en stor kjenner av marinen
wrong_answers:
  - Turgot har mange fiender i dette departementet
  - Turgot kan ikke svømme
  - Turgot er sivilist
explanation: |
  Turgot hadde ingen erfaring fra marinen, noe som overrasket mange da han ble utnevnt til stillingen. I stedet var det forventet at han skulle utnevnes til en økonomisk eller finansiell stilling.