question: Dlaczego nominacja Turgota na ministra marynarki została przyjęta z zaskoczeniem?
answer: Turgot nie jest wielkim znawcą marynarki wojennej
wrong_answers:
  - Turgot ma wielu wrogów w tym ministerstwie
  - Turgot nie umie pływać
  - Turgot jest cywilem
explanation: |
  Turgot nie miał doświadczenia morskiego, co zaskoczyło wielu, gdy został mianowany na to stanowisko. Zamiast tego oczekiwano, że zostanie mianowany na stanowisko ekonomiczne lub finansowe.