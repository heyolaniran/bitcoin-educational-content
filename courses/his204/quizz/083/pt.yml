question: Porque é que a nomeação de Turgot para Ministro da Marinha foi recebida com surpresa?
answer: Turgot não é um grande conhecedor da Marinha
wrong_answers:
  - Turgot tem muitos inimigos neste ministério
  - Turgot não sabe nadar
  - Turgot é um civil
explanation: |
  Turgot não tinha experiência naval, o que surpreendeu muitos quando foi nomeado para o cargo. Em vez disso, esperava-se que fosse nomeado para um cargo económico ou financeiro.