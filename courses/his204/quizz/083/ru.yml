question: Почему назначение Тюрго на пост военно-морского министра было встречено с удивлением?
answer: Тюрго не был большим знатоком военно-морского флота
wrong_answers:
  - У Тюрго много врагов в этом министерстве
  - Турго не умеет плавать
  - Тюрго - гражданин
explanation: |
  У Турго не было опыта военно-морской службы, что удивило многих, когда он был назначен на этот пост. Вместо этого ожидалось, что он будет назначен на экономическую или финансовую должность.