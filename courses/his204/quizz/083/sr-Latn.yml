question: Zašto je Turgotovo imenovanje za ministra mornarice dočekano s iznenađenjem?
answer: Turgot nije veliki poznavalac mornarice
wrong_answers:
  - Turgot ima mnogo neprijatelja u ovom ministarstvu
  - Turgot ne može da pliva
  - Turgot je civilno lice
explanation: |
  Turgot nije imao pomorskog iskustva, što je iznenadilo mnoge kada je imenovan na tu poziciju. Umesto toga, očekivalo se da će biti imenovan na ekonomsku ili finansijsku poziciju.