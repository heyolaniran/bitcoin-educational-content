question: Varför togs Turgots utnämning till marinminister emot med förvåning?
answer: Turgot är inte någon stor kännare av flottan
wrong_answers:
  - Turgot har många fiender i detta ministerium
  - Turgot kan inte simma
  - Turgot är en civilperson
explanation: |
  Turgot hade ingen erfarenhet av flottan, vilket förvånade många när han utnämndes till posten. Istället förväntade man sig att han skulle få en ekonomisk eller finansiell post.