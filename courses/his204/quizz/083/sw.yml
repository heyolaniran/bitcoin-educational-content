question: Kwa nini uteuzi wa Turgot kama Waziri wa Jeshi la Wanamaji ulipokelewa kwa mshangao?
answer: Turgot sio mjuzi mkubwa wa Jeshi la Wanamaji
wrong_answers:
  - Turgot ana maadui wengi katika huduma hii
  - Turgot hawezi kuogelea
  - Turgot ni raia
explanation: |
  Turgot hakuwa na uzoefu wa majini, jambo ambalo liliwashangaza wengi alipoteuliwa kushika wadhifa huo. Badala yake, alitarajiwa kuteuliwa kwa wadhifa wa kiuchumi au kifedha.