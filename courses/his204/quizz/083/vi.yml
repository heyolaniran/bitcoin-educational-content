question: Tại sao việc bổ nhiệm Turgot làm Bộ trưởng Hải quân lại được chào đón một cách ngạc nhiên?
answer: Turgot không phải là người am hiểu sâu sắc về Hải quân
wrong_answers:
  - Turgot có nhiều kẻ thù trong bộ này
  - Turgot không biết bơi
  - Turgot là một thường dân
explanation: |
  Turgot không có kinh nghiệm về hải quân, điều này khiến nhiều người ngạc nhiên khi ông được bổ nhiệm vào vị trí này. Thay vào đó, ông được kỳ vọng sẽ được bổ nhiệm vào một vị trí kinh tế hoặc tài chính.