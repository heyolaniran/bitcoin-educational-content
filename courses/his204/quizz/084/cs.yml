question: Jaké tři finanční požadavky předložil Turgot ve svém slavném dopise Ludvíku XVI., když vstoupil do Contrôle Général?
answer: Žádný úpadek. Žádné zvyšování daní. Žádné půjčky
wrong_answers:
  - Žádná reforma. Žádné nové daně. Žádné nové zákony.
  - Žádná nová válka. Žádné zvyšování daní. Žádné půjčky
  - Žádné zbytečné výdaje. Žádná privilegia. Žádné zvýhodňování.
explanation: |
  Turgotovy tři imperativy zněly: žádný bankrot, žádné zvyšování daní, žádné půjčky. Věřil, že tyto tři zásady jsou nezbytné pro ozdravení státních financí a oživení ekonomiky.