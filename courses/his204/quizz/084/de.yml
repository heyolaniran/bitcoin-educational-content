question: Welches sind die drei finanziellen Gebote, die Turgot in seinem berühmten Brief an Ludwig XVI. formulierte, als er dem Contrôle Général beitrat?
answer: Kein Konkurs. Keine Steuererhöhungen. Keine Kreditaufnahme
wrong_answers:
  - Keine Reform. Keine neuen Steuern. Keine neuen Gesetze.
  - Kein neuer Krieg. Keine Steuererhöhungen. Keine Kreditaufnahme
  - Keine unnötigen Ausgaben. Keine Privilegien. Keine Bevorzugung.
explanation: |
  Turgots drei Imperative lauteten: kein Bankrott, keine Steuererhöhungen, keine Kreditaufnahme. Seiner Meinung nach waren diese drei Grundsätze unerlässlich, um die Staatsfinanzen zu sanieren und die Wirtschaft wieder anzukurbeln.