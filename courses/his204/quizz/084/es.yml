question: What are the three financial imperatives put forward by Turgot in his famous letter to Louis XVI when he joined the Contrôle Général?
answer: No bankruptcy. No tax increases. No borrowing
wrong_answers:
  - No reform. No new taxes. No new laws.
  - No new war. No tax increases. No borrowing
  - No unnecessary expenses. No privileges. No favoritism.
explanation: |
  Turgot's three imperatives were: no bankruptcy, no tax increases, no borrowing. He believed that these three principles were essential to restore the state's finances and revive the economy.