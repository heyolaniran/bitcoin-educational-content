question: سه ضرورت مالی که تورگو در نامه معروف خود به لوئی شانزدهم هنگام پیوستن به کنترل جنرال مطرح کرد چیست؟
answer: بدون ورشکستگی. بدون افزایش مالیات. بدون قرض گرفتن
wrong_answers:
  - بدون اصلاحات. بدون مالیات جدید. بدون قوانین جدید.
  - بدون جنگ جدید. بدون افزایش مالیات. بدون قرض گرفتن
  - بدون هزینه‌های غیرضروری. بدون امتیازات. بدون تبعیض.
explanation: |
  سه فرمان تورگو عبارت بودند از: عدم ورشکستگی، عدم افزایش مالیات، عدم قرض‌گیری. او معتقد بود که این سه اصل برای بازسازی مالی دولت و احیای اقتصاد ضروری هستند.