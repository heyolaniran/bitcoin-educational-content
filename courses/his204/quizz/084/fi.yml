question: Mitkä ovat ne kolme taloudellista vaatimusta, jotka Turgot esitti kuuluisassa kirjeessään Ludvig XVI:lle, kun hän liittyi Contrôle Généraliin?
answer: Ei konkurssia. Ei veronkorotuksia. Ei lainanottoa
wrong_answers:
  - Ei uudistusta. Ei uusia veroja. Ei uusia lakeja.
  - Ei uutta sotaa. Ei veronkorotuksia. Ei lainanottoa
  - Ei tarpeettomia kuluja. Ei etuoikeuksia. Ei suosimista.
explanation: |
  Turgot'n kolme vaatimusta olivat: ei konkurssia, ei veronkorotuksia, ei lainanottoa. Hän uskoi, että nämä kolme periaatetta olivat välttämättömiä valtion talouden tervehdyttämiseksi ja talouden elvyttämiseksi.