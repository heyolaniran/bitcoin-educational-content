question: Quels sont les trois impératifs financiers mis en avant par Turgot dans sa fameuse lettre à Louis XVI à son entrée au Contrôle général ?
answer: Point de banqueroute. Point d’augmentation d’impôts. Point d’emprunts
wrong_answers:
  - Point de réforme. Point de nouvel impôt. Point de nouvelle loi.
  - Point de nouvelle guerre. Point d’augmentation d’impôts. Point d’emprunts
  - Point de dépenses inutiles. Point de privilèges. Point de favoritisme.
explanation: |
  Les trois impératifs de Turgot étaient : point de banqueroute, point d'augmentation d'impôts, point d'emprunts. Il pensait que ces trois principes étaient essentiels pour rétablir les finances de l'État et relancer l'économie.
