question: जब तुर्गोट लुई सोलहवें को कंट्रोल जनरल में शामिल हुए तो उन्होंने अपने प्रसिद्ध पत्र में कौन सी तीन वित्तीय अनिवार्यताएं रखीं?
answer: कोई दिवालियापन नहीं। कोई कर वृद्धि नहीं। कोई उधार नहीं
wrong_answers:
  - कोई सुधार नहीं। कोई नया कर नहीं। कोई नया कानून नहीं।
  - कोई नया युद्ध नहीं। कोई कर वृद्धि नहीं। कोई उधार नहीं
  - कोई अनावश्यक खर्च नहीं। कोई विशेषाधिकार नहीं। कोई पक्षपात नहीं।
explanation: |
  टर्गोट की तीन अनिवार्यताएँ थीं: कोई दिवालियापन नहीं, कोई कर वृद्धि नहीं, कोई उधार नहीं। उनका मानना ​​था कि ये तीन सिद्धांत राज्य के वित्त को बहाल करने और अर्थव्यवस्था को पुनर्जीवित करने के लिए आवश्यक थे।