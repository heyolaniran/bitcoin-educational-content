question: Apa saja tiga keharusan finansial yang dikemukakan oleh Turgot dalam suratnya yang terkenal kepada Louis XVI saat ia bergabung dengan Contrôle Général?
answer: Tidak ada kebangkrutan. Tidak ada kenaikan pajak. Tidak ada pinjaman
wrong_answers:
  - Tidak ada reformasi. Tidak ada pajak baru. Tidak ada hukum baru.
  - Tidak ada perang baru. Tidak ada kenaikan pajak. Tidak ada pinjaman
  - Tidak ada pengeluaran yang tidak perlu. Tidak ada hak istimewa. Tidak ada pilih kasih.
explanation: |
  Tiga keharusan Turgot adalah: tidak ada kebangkrutan, tidak ada kenaikan pajak, dan tidak ada pinjaman. Ia percaya bahwa ketiga prinsip ini sangat penting untuk memulihkan keuangan negara dan menghidupkan kembali perekonomian.