question: Quali sono i tre imperativi finanziari proposti da Turgot nella sua famosa lettera a Luigi XVI quando entrò a far parte del Contrôle Général?
answer: Nessuna bancarotta. Nessun aumento delle tasse. Nessun prestito
wrong_answers:
  - Nessuna riforma. Nessuna nuova tassa. Nessuna nuova legge.
  - Nessuna nuova guerra. Nessun aumento delle tasse. Nessun prestito
  - Nessuna spesa superflua. Nessun privilegio. Nessun favoritismo.
explanation: |
  I tre imperativi di Turgot erano: nessuna bancarotta, nessun aumento delle tasse, nessun prestito. Egli riteneva che questi tre principi fossero essenziali per risanare le finanze dello Stato e rilanciare l'economia.