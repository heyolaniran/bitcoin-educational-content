question: Hvilke tre økonomiske imperativer fremsatte Turgot i sitt berømte brev til Ludvig XVI da han ble medlem av Contrôle Général?
answer: Ingen konkurs. Ingen skatteøkninger. Ingen låneopptak
wrong_answers:
  - Ingen reform. Ingen nye skatter. Ingen nye lover.
  - Ingen ny krig. Ingen skatteøkninger. Ingen låneopptak
  - Ingen unødvendige utgifter. Ingen privilegier. Ingen favorisering.
explanation: |
  Turgots tre imperativer var: ingen konkurs, ingen skatteøkninger, ingen låneopptak. Han mente at disse tre prinsippene var avgjørende for å gjenopprette statsfinansene og få økonomien på fote igjen.