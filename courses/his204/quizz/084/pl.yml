question: Jakie są trzy imperatywy finansowe przedstawione przez Turgota w jego słynnym liście do Ludwika XVI, kiedy dołączył do Contrôle Général?
answer: Żadnego bankructwa. Żadnych podwyżek podatków. Żadnych pożyczek
wrong_answers:
  - Żadnych reform. Żadnych nowych podatków. Żadnych nowych praw.
  - Żadnej nowej wojny. Żadnych podwyżek podatków. Żadnych pożyczek
  - Żadnych zbędnych wydatków. Żadnych przywilejów. Żadnego faworyzowania.
explanation: |
  Trzy imperatywy Turgota brzmiały: żadnego bankructwa, żadnych podwyżek podatków, żadnych pożyczek. Wierzył, że te trzy zasady były niezbędne do przywrócenia finansów państwa i ożywienia gospodarki.