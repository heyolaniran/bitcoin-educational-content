question: Quais são os três imperativos financeiros propostos por Turgot na sua célebre carta a Luís XVI quando entrou para o Contrôle Général?
answer: Sem falência. Sem aumentos de impostos. Sem empréstimos
wrong_answers:
  - Nada de reformas. Não há novos impostos. Não há novas leis.
  - Não há nova guerra. Sem aumento de impostos. Nada de empréstimos
  - Sem despesas desnecessárias. Sem privilégios. Sem favoritismos.
explanation: |
  Os três imperativos de Turgot eram: não falir, não aumentar os impostos, não contrair empréstimos. Considerava que estes três princípios eram essenciais para restaurar as finanças do Estado e relançar a economia.