question: Какие три финансовых императива выдвинул Тюрго в своем знаменитом письме Людовику XVI, когда он вступил в Генеральный совет?
answer: Никакого банкротства. Никакого повышения налогов. Никаких займов
wrong_answers:
  - Никаких реформ. Никаких новых налогов. Никаких новых законов.
  - Никакой новой войны. Никакого повышения налогов. Никаких заимствований
  - Никаких лишних расходов. Никаких привилегий. Никакого фаворитизма.
explanation: |
  Тюрго выдвинул три императива: никакого банкротства, никакого повышения налогов, никаких заимствований. Он считал, что эти три принципа необходимы для восстановления финансов государства и оживления экономики.