question: Koje su tri finansijska imperativa koja je Turgot izneo u svom čuvenom pismu Luju XVI kada se pridružio Contrôle Général?
answer: Nema bankrota. Nema povećanja poreza. Nema zaduživanja.
wrong_answers:
  - Bez reformi. Bez novih poreza. Bez novih zakona.
  - Nema novog rata. Nema povećanja poreza. Nema zaduživanja.
  - Bez nepotrebnih troškova. Bez privilegija. Bez favorizovanja.
explanation: |
  Tri Turgotova imperativa su bila: bez bankrota, bez povećanja poreza, bez zaduživanja. Verovao je da su ova tri principa ključna za obnovu državnih finansija i oživljavanje ekonomije.