question: Vilka är de tre finansiella imperativ som Turgot framförde i sitt berömda brev till Ludvig XVI när han gick med i Contrôle Général?
answer: Inga konkurser. Inga skattehöjningar. Ingen upplåning
wrong_answers:
  - Ingen reform. Inga nya skatter. Inga nya lagar.
  - Inget nytt krig. Inga skattehöjningar. Ingen upplåning
  - Inga onödiga utgifter. Inga privilegier. Ingen favoritism.
explanation: |
  Turgots tre imperativ var: ingen konkurs, inga skattehöjningar, ingen upplåning. Han ansåg att dessa tre principer var nödvändiga för att återställa statens finanser och få fart på ekonomin igen.