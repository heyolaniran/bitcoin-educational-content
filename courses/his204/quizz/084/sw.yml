question: Je, ni masharti gani matatu ya kifedha yaliyowekwa mbele na Turgot katika barua yake maarufu kwa Louis XVI alipojiunga na Contrôle Général?
answer: Hakuna kufilisika. Hakuna ongezeko la ushuru. Hakuna kukopa
wrong_answers:
  - Hakuna mageuzi. Hakuna kodi mpya. Hakuna sheria mpya.
  - Hakuna vita mpya. Hakuna ongezeko la ushuru. Hakuna kukopa
  - Hakuna gharama zisizo za lazima. Hakuna marupurupu. Hakuna upendeleo.
explanation: |
  Masharti matatu ya Turgot yalikuwa: hakuna kufilisika, hakuna ongezeko la ushuru, hakuna kukopa. Aliamini kwamba kanuni hizi tatu ni muhimu kurejesha fedha za serikali na kufufua uchumi.