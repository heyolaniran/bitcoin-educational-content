question: Ba yêu cầu cấp thiết về tài chính mà Turgot đưa ra trong bức thư nổi tiếng gửi cho Louis XVI khi ông gia nhập Contrôle Général là gì?
answer: Không phá sản. Không tăng thuế. Không vay mượn
wrong_answers:
  - Không cải cách. Không thuế mới. Không luật mới.
  - Không có chiến tranh mới. Không tăng thuế. Không vay mượn
  - Không có chi phí không cần thiết. Không có đặc quyền. Không thiên vị.
explanation: |
  Ba mệnh lệnh của Turgot là: không phá sản, không tăng thuế, không vay mượn. Ông tin rằng ba nguyên tắc này là thiết yếu để khôi phục tài chính của nhà nước và phục hồi nền kinh tế.