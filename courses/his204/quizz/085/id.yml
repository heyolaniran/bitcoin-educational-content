question: Siapa yang mengucapkan kalimat, "Saya dapat melihat bahwa hanya Pak Turgot dan saya yang mencintai rakyat"? ?
answer: Louis XVI
wrong_answers:
  - Voltaire
  - Condorcet
  - Rousseau
explanation: |
  Louis XVI mengucapkan kalimat ini, menggarisbawahi dukungannya untuk Turgot dan reformasinya.