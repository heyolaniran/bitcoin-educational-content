question: چه ایده‌ای به عنوان سفسطه مونتنی شناخته شده است؟
answer: Exchange یک بازی با مجموع صفر است
wrong_answers:
  - Exchange یک بازی با مجموع مثبت است
  - بسته به زمان و مکان، Exchange گاهی یک بازی با مجموع صفر و گاهی یک بازی با مجموع مثبت است.
  - Exchange همیشه به ضرر طرف ضعیف‌تر است
explanation: |
  مغالطه مونتنی این ایده است که Exchange یک بازی با حاصل جمع صفر است، یعنی آنچه یکی به دست می‌آورد، دیگری از دست می‌دهد. این ایده نادرست است، زیرا Exchange داوطلبانه به نفع هر دو طرف است.