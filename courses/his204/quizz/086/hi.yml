question: किस विचार को मोंटेन का कुतर्क कहा गया है?
answer: Exchange एक शून्य-योग खेल है
wrong_answers:
  - Exchange एक सकारात्मक-योग खेल है
  - समय और स्थान के आधार पर, Exchange कभी-कभी शून्य-योग खेल होता है, कभी-कभी सकारात्मक-योग खेल होता है
  - Exchange हमेशा कमज़ोर पक्ष के लिए प्रतिकूल होता है
explanation: |
  मोंटेन का भ्रम यह विचार है कि Exchange एक शून्य-योग खेल है, यानी जो एक को मिलता है, वह दूसरे को खो देता है। यह विचार गलत है, क्योंकि स्वैच्छिक Exchange पारस्परिक रूप से लाभकारी है।