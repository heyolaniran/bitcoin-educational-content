question: Que ideia foi designada como o sofisma de Montaigne?
answer: O Exchange é um jogo de soma zero
wrong_answers:
  - O Exchange é um jogo de soma positiva
  - Dependendo do tempo e do lugar, o Exchange é por vezes um jogo de soma zero, por vezes um jogo de soma positiva
  - O Exchange é sempre desfavorável à parte mais fraca
explanation: |
  A falácia de Montaigne é a ideia de que o Exchange é um jogo de soma zero, ou seja, o que um ganha, o outro perde. Esta ideia é falsa, porque o Exchange voluntário é mutuamente benéfico.