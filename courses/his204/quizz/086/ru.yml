question: Какую идею называют софизмом Монтеня?
answer: Exchange - это игра с нулевой суммой
wrong_answers:
  - Exchange - это игра с положительной суммой
  - В зависимости от времени и места, Exchange - это иногда игра с нулевой суммой, иногда с положительной суммой
  - Exchange всегда неблагоприятна для более слабой стороны
explanation: |
  Заблуждение Монтеня - это идея о том, что ГВ-4 - это игра с нулевой суммой, т. е. что выигрывает один, то теряет другой. Эта идея неверна, поскольку добровольное Exchange взаимовыгодно.