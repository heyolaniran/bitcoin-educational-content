question: Ý tưởng nào được gọi là ngụy biện của Montaigne?
answer: Exchange là một trò chơi tổng bằng không
wrong_answers:
  - Exchange là một trò chơi tổng dương
  - Tùy thuộc vào thời gian và địa điểm, Exchange đôi khi là một trò chơi tổng bằng không, đôi khi là một trò chơi tổng dương
  - Exchange luôn bất lợi cho bên yếu hơn
explanation: |
  Ngụy biện của Montaigne là ý tưởng cho rằng Exchange là một trò chơi tổng bằng không, tức là cái gì một bên được thì bên kia mất. Ý tưởng này là sai, vì Exchange tự nguyện có lợi cho cả hai bên.