question: V roce 1776 vyšla kniha Le commerce et le gouvernement considérés relativement l'un avec l'autre. Jaká další kniha vyšla ve stejném roce?
answer: Bohatství národů od Adama Smithe
wrong_answers:
  - Pojednání o politické ekonomii Jeana-Baptisty Saye
  - Turgotovy úvahy o tvorbě a rozdělování bohatství
  - Společenský program Contract
explanation: |
  adam Smith vydal v roce 1776, který byl pro ekonomické myšlení klíčový, knihu Bohatství národů.