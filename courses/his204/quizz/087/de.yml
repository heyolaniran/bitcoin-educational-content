question: Im Jahr 1776 wurde Le commerce et le gouvernement considérés relativement l'un avec l'autre veröffentlicht. Welches andere Buch wurde im selben Jahr veröffentlicht?
answer: Der Reichtum der Nationen von Adam Smith
wrong_answers:
  - Jean-Baptiste Say's Abhandlung über die politische Ökonomie
  - Turgots Überlegungen zur Entstehung und Verteilung des Reichtums
  - Das soziale Contract
explanation: |
  adam Smiths "The Wealth of Nations" wurde 1776 veröffentlicht, ein entscheidendes Jahr für das wirtschaftliche Denken.