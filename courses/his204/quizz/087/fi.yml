question: Vuonna 1776 julkaistiin Le commerce et le gouvernement considérés relativement l'un avec l'autre. Mikä muu kirja julkaistiin samana vuonna?
answer: Adam Smithin teos The Wealth of Nations
wrong_answers:
  - Jean-Baptiste Sayn poliittista taloutta käsittelevä tutkielma
  - Turgot'n pohdintoja vaurauden muodostumisesta ja jakautumisesta
  - Sosiaalinen Contract
explanation: |
  adam Smithin teos "The Wealth of Nations" julkaistiin vuonna 1776, joka oli taloudellisen ajattelun kannalta käänteentekevä vuosi.