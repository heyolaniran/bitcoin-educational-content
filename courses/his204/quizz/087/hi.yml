question: 1776 में, ले कॉमर्स एट ले गवर्नमेंट कॉन्सिडेरेस रिलेटिवेशन ल'अन एवेक ल'ऑत्रे प्रकाशित हुआ था। उसी वर्ष कौन सी अन्य पुस्तक प्रकाशित हुई?
answer: एडम स्मिथ द्वारा लिखित द वेल्थ ऑफ नेशंस
wrong_answers:
  - जीन-बैप्टिस्ट साय का राजनीतिक अर्थव्यवस्था पर ग्रंथ
  - धन के निर्माण और वितरण पर टर्गोट के विचार
  - सोशल Contract
explanation: |
  एडम स्मिथ की "द वेल्थ ऑफ नेशंस" 1776 में प्रकाशित हुई, जो आर्थिक विचार के लिए एक निर्णायक वर्ष था।