question: Pada tahun 1776, Le commerce et le gouvernement considérés relativement l'un avec l'autre diterbitkan. Buku apa lagi yang diterbitkan pada tahun yang sama?
answer: The Wealth of Nations oleh Adam Smith
wrong_answers:
  - Risalah Jean-Baptiste Say tentang Ekonomi Politik
  - Refleksi Turgot tentang pembentukan dan distribusi kekayaan
  - Contract Sosial
explanation: |
  buku "The Wealth of Nations" karya Adam Smith diterbitkan pada tahun 1776, tahun yang sangat penting bagi pemikiran ekonomi.