question: Nel 1776 fu pubblicato Le commerce et le gouvernement considérés relativement l'un avec l'autre. Quale altro libro fu pubblicato nello stesso anno?
answer: La ricchezza delle nazioni di Adam Smith
wrong_answers:
  - Trattato di economia politica di Jean-Baptiste Say
  - Riflessioni di Turgot sulla formazione e la distribuzione della ricchezza
  - Il Contract sociale
explanation: |
  la ricchezza delle nazioni" di Adam Smith fu pubblicata nel 1776, un anno cruciale per il pensiero economico.