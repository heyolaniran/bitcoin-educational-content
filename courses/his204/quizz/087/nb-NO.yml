question: I 1776 ble Le commerce et le gouvernement considérés relativement l'un avec l'autre utgitt. Hvilken annen bok ble utgitt samme år?
answer: The Wealth of Nations av Adam Smith
wrong_answers:
  - Jean-Baptiste Says avhandling om politisk økonomi
  - Turgots refleksjoner om dannelse og fordeling av rikdom
  - Den sosiale Contract
explanation: |
  adam Smiths "The Wealth of Nations" ble utgitt i 1776, et avgjørende år for økonomisk tenkning.