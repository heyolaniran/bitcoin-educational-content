question: W 1776 r. opublikowano książkę Le commerce et le gouvernement considérés relativement l'un avec l'autre. Jaka inna książka została opublikowana w tym samym roku?
answer: Bogactwo narodów Adama Smitha
wrong_answers:
  - Traktat o ekonomii politycznej Jeana-Baptiste'a Saya
  - Refleksje Turgota na temat tworzenia i dystrybucji bogactwa
  - The Social Contract
explanation: |
  "Bogactwo narodów" Adama Smitha zostało opublikowane w 1776 r., kluczowym roku dla myśli ekonomicznej.