question: В 1776 году была опубликована книга "Торговля и правительство в сравнении с другими" (Le commerce et le gouvernement considérés relativement l'un avec l'autre). Какая еще книга была опубликована в том же году?
answer: Богатство народов" Адама Смита
wrong_answers:
  - Трактат по политической экономии Жана-Батиста Сэя
  - Размышления Тюрго о формировании и распределении богатства
  - Социальный Contract
explanation: |
  книга Адама Смита "Богатство народов" была опубликована в 1776 году - переломном году для экономической мысли.