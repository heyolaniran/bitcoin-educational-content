question: Godine 1776, objavljena je knjiga An Inquiry into the Nature and Causes of the Wealth of Nations.
answer: Bogatstvo naroda Adama Smitha
wrong_answers:
  - Jean-Baptiste Say's Treatise on Political Economy
  - Turgotova razmišljanja o formiranju i raspodeli bogatstva
  - Društveni Contract
explanation: |
  Adam Smithova "Bogatstvo naroda" objavljena je 1776. godine, ključnoj godini za ekonomske misli.