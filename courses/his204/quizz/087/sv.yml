question: År 1776 publicerades Le commerce et le gouvernement considérés relativement l'un avec l'autre. Vilken annan bok gavs ut samma år?
answer: The Wealth of Nations av Adam Smith
wrong_answers:
  - Jean-Baptiste Says avhandling om politisk ekonomi
  - Turgots reflektioner om förmögenhetens uppkomst och fördelning
  - Den sociala Contract
explanation: |
  adam Smiths "The Wealth of Nations" publicerades 1776, ett avgörande år för det ekonomiska tänkandet.