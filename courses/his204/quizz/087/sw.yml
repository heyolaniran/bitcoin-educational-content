question: Mnamo 1776, Le commerce et le gouvernement considérés relativement l'un avec l'autre ilichapishwa. Ni kitabu gani kingine kilichapishwa mwaka huo huo?
answer: Utajiri wa Mataifa na Adam Smith
wrong_answers:
  - Mkataba wa Jean-Baptiste Say juu ya Uchumi wa Kisiasa
  - Tafakari ya Turgot juu ya malezi na usambazaji wa mali
  - Contract ya Jamii
explanation: |
  "The Wealth of Nations" ya adam Smith ilichapishwa mwaka wa 1776, mwaka muhimu kwa mawazo ya kiuchumi.