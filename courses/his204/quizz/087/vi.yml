question: Năm 1776, cuốn Le commerce et le gouvernement considérés relationment l'un avec l'autre được xuất bản. Cuốn sách nào khác được xuất bản cùng năm?
answer: Sự giàu có của các quốc gia của Adam Smith
wrong_answers:
  - Luận thuyết về kinh tế chính trị của Jean-Baptiste Say
  - Suy ngẫm của Turgot về sự hình thành và phân phối của cải
  - Xã hội Contract
explanation: |
  "Sự giàu có của các quốc gia" của Adam Smith được xuất bản vào năm 1776, một năm then chốt đối với tư tưởng kinh tế.