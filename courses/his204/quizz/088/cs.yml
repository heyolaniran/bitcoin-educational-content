question: Se kterým členem fyziokratické školy diskutoval Condillac o povaze hodnoty věcí?
answer: Guillaume-François Le Trosne
wrong_answers:
  - François Quesnay
  - Pierre-Samuel Dupont de Nemours
  - Markýz de Mirabeau
explanation: |
  Condillac diskutoval s Le Trosnem o povaze hodnoty a hájil subjektivní teorii hodnoty.