question: Mit welchem Mitglied der physiokratischen Schule diskutierte Condillac über die Natur des Wertes der Dinge?
answer: Guillaume-François Le Trosne
wrong_answers:
  - François Quesnay
  - Pierre-Samuel Dupont de Nemours
  - Der Marquis de Mirabeau
explanation: |
  Condillac diskutierte mit Le Trosne über die Natur des Wertes und vertrat eine subjektive Werttheorie.