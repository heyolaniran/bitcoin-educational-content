question: With which member of the Physiocratic school did Condillac debate the nature of the value of things?
answer: Guillaume-François Le Trosne
wrong_answers:
  - François Quesnay
  - Pierre-Samuel Dupont de Nemours
  - The Marquis de Mirabeau
explanation: |
  Condillac debated the nature of value with Le Trosne, defending a subjective theory of value.