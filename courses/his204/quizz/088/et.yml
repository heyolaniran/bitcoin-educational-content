question: Millise füsiokraatliku koolkonna liikmega arutles Condillac asjade väärtuse olemuse üle?
answer: Guillaume-François Le Trosne
wrong_answers:
  - François Quesnay
  - Pierre-Samuel Dupont de Nemours
  - Marquis de Mirabeau
explanation: |
  Condillac arutles Le Trosne'iga väärtuse olemuse üle, kaitstes subjektiivset väärtusteooriat.