question: Minkä fysiokraattisen koulukunnan jäsenen kanssa Condillac keskusteli asioiden arvon luonteesta?
answer: Guillaume-François Le Trosne
wrong_answers:
  - François Quesnay
  - Pierre-Samuel Dupont de Nemours
  - Markiisi de Mirabeau
explanation: |
  Condillac keskusteli arvon luonteesta Le Trosnen kanssa ja puolusti subjektiivista arvoteoriaa.