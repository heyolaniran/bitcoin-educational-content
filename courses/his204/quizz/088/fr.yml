question: Avec quel membre de l’école Physiocratique Condillac a-t-il débattu sur la nature de la valeur des choses ?
answer: Guillaume-François Le Trosne
wrong_answers:
  - François Quesnay
  - Pierre-Samuel Dupont de Nemours
  - Le Marquis de Mirabeau
explanation: |
  Condillac a débattu avec Le Trosne sur la nature de la valeur, en défendant une théorie subjective de la valeur.
