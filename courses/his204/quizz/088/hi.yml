question: फिजियोक्रेटिक स्कूल के किस सदस्य के साथ कोंडिलैक ने वस्तुओं के मूल्य की प्रकृति पर बहस की?
answer: गिलौम-फ्रांकोइस ले ट्रोसने
wrong_answers:
  - फ़्राँस्वा क्वेस्ने
  - पियरे-सैमुअल ड्यूपोंट डी नेमोर्स
  - मार्क्विस डी मिराब्यू
explanation: |
  कोंडिलैक ने ले ट्रोस्ने के साथ मूल्य की प्रकृति पर बहस की तथा मूल्य के व्यक्तिपरक सिद्धांत का बचाव किया।