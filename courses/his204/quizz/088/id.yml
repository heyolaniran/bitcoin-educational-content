question: Dengan anggota mazhab Fisiokratis manakah Condillac memperdebatkan sifat dari nilai sesuatu?
answer: Guillaume-François Le Trosne
wrong_answers:
  - François Quesnay
  - Pierre-Samuel Dupont de Nemours
  - Marquis de Mirabeau
explanation: |
  Condillac memperdebatkan sifat nilai dengan Le Trosne, membela teori subjektif tentang nilai.