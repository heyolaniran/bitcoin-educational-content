question: Con quale esponente della scuola fisiocratica Condillac discusse sulla natura del valore delle cose?
answer: Guillaume-François Le Trosne
wrong_answers:
  - François Quesnay
  - Pierre-Samuel Dupont de Nemours
  - Il Marchese di Mirabeau
explanation: |
  Condillac discute la natura del valore con Le Trosne, difendendo una teoria soggettiva del valore.