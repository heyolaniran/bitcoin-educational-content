question: Hvilket medlem av den fysiokratiske skolen diskuterte Condillac tingenes verdi med?
answer: Guillaume-François Le Trosne
wrong_answers:
  - François Quesnay
  - Pierre-Samuel Dupont de Nemours
  - Marquis de Mirabeau
explanation: |
  Condillac debatterte verdiens natur med Le Trosne, og forsvarte en subjektiv verditeori.