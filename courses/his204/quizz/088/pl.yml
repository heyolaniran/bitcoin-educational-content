question: Z którym członkiem szkoły fizjokratycznej Condillac debatował nad naturą wartości rzeczy?
answer: Guillaume-François Le Trosne
wrong_answers:
  - François Quesnay
  - Pierre-Samuel Dupont de Nemours
  - Markiz de Mirabeau
explanation: |
  Condillac debatował nad naturą wartości z Le Trosne, broniąc subiektywnej teorii wartości.