question: Com que membro da escola fisiocrática é que Condillac debateu a natureza do valor das coisas?
answer: Guillaume-François Le Trosne
wrong_answers:
  - François Quesnay
  - Pierre-Samuel Dupont de Nemours
  - O Marquês de Mirabeau
explanation: |
  Condillac debateu a natureza do valor com Le Trosne, defendendo uma teoria subjectiva do valor.