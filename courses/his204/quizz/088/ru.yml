question: С кем из представителей физиократической школы Кондильяк спорил о природе стоимости вещей?
answer: Гийом-Франсуа Ле Тросна
wrong_answers:
  - Франсуа Кесне
  - Пьер-Самюэль Дюпон де Немур
  - Маркиз де Мирабо
explanation: |
  Кондильяк спорил о природе стоимости с Ле Тросном, отстаивая субъективную теорию стоимости.