question: Sa kojim članom fiziokratske škole je Kondijak debatovao o prirodi vrednosti stvari?
answer: Guillaume-François Le Trosne
wrong_answers:
  - François Quesnay
  - Pierre-Samuel Dupont de Nemours
  - Markiz de Mirabo
explanation: |
  Condillac je raspravljao o prirodi vrednosti sa Le Trosneom, braneći subjektivnu teoriju vrednosti.