question: Med vilken medlem av den fysiokratiska skolan diskuterade Condillac naturen hos värdet av saker?
answer: Guillaume-François Le Trosne
wrong_answers:
  - François Quesnay
  - Pierre-Samuel Dupont de Nemours
  - Markisen de Mirabeau
explanation: |
  Condillac debatterade värdets natur med Le Trosne och försvarade en subjektiv värdeteori.