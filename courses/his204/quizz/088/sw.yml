question: Condillac alijadiliana na mwanafunzi gani wa shule ya Fiziokrasia kuhusu thamani ya vitu?
answer: Guillaume-François Le Trosne
wrong_answers:
  - François Quesnay
  - Pierre-Samuel Dupont de Nemours
  - Marquis de Mirabeau
explanation: |
  Condillac alijadili asili ya thamani na Le Trosne, akitetea nadharia ya thamani.