question: Condillac đã tranh luận với thành viên nào của trường phái Trọng nông về bản chất giá trị của vật chất?
answer: Guillaume-François Le Trosne
wrong_answers:
  - François Quesnay
  - Pierre-Samuel Dupont de Nemours
  - Hầu tước de Mirabeau
explanation: |
  Condillac tranh luận về bản chất của giá trị với Le Trosne, bảo vệ lý thuyết chủ quan về giá trị.