question: Proč Condillacova teorie významně podporuje princip volného obchodu?
answer: Pokud je totiž obchod vždy oboustranně výhodný, nemá smysl ho omezovat nebo zakazovat prostřednictvím cel
wrong_answers:
  - Condillac totiž výpočtem dokázal, že volný obchod obohacuje národ více než protekcionismus
  - Protože Condillac dokázal, že volný obchod je dobrý pro mír
  - Protože Condillac byl přítelem Adama Smithe
explanation: |
  Condillacova teorie tvrdí, že Exchange je oboustranně výhodná, protože každá strana se vzdává toho, čeho si cení nejméně, aby získala to, čeho si cení nejvíce. V důsledku toho není třeba omezovat nebo zakazovat obchod prostřednictvím cel nebo jiných omezení.