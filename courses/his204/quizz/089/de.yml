question: Warum ist die Theorie von Condillac eine wichtige Stütze für den Grundsatz des Freihandels?
answer: Denn wenn der Handel immer für beide Seiten von Vorteil ist, macht es keinen Sinn, ihn durch Zölle zu beschränken oder zu verbieten
wrong_answers:
  - Weil Condillac durch Berechnungen bewiesen hat, dass freier Handel eine Nation mehr bereichert als Protektionismus
  - Weil Condillac bewiesen hat, dass freier Handel gut für den Frieden ist
  - Weil Condillac ein Freund von Adam Smith war
explanation: |
  Die Theorie von Condillac besagt, dass Exchange für beide Seiten vorteilhaft ist, da jede Partei das aufgibt, was sie am wenigsten schätzt, um das zu erhalten, was sie am meisten schätzt. Folglich besteht keine Notwendigkeit, den Handel durch Zölle oder andere Beschränkungen zu begrenzen oder zu verbieten.