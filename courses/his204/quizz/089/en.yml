question: Why does Condillac's theory provide considerable support for the principle of free trade?
answer: Because if trade is always mutually beneficial, there is no point in limiting or prohibiting it through customs
wrong_answers:
  - Because Condillac showed by calculation that free trade enriches a nation more than protectionism
  - Because Condillac proved that free trade is good for peace
  - Because Condillac was a friend of Adam Smith
explanation: |
  Condillac's theory maintains that exchange is mutually beneficial, as each party gives up what it values least in order to obtain what it values most. Consequently, there is no need to limit or prohibit trade through customs or other restrictions.