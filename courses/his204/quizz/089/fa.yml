question: چرا نظریه کوندیاک حمایت قابل توجهی از اصل تجارت آزاد ارائه می‌دهد؟
answer: زیرا اگر تجارت همیشه به نفع دو طرف باشد، محدود کردن یا ممنوع کردن آن از طریق گمرک بی‌معنی است.
wrong_answers:
  - زیرا کندیاک با محاسبه نشان داد که تجارت آزاد بیش از حمایت‌گرایی یک ملت را ثروتمند می‌کند
  - زیرا کندیاک ثابت کرد که تجارت آزاد برای صلح مفید است
  - زیرا کندیاک دوست آدام اسمیت بود
explanation: |
  نظریه کوندیاک بر این باور است که Exchange به صورت متقابل سودمند است، زیرا هر طرف آنچه را که کمتر ارزش دارد، رها می‌کند تا آنچه را که بیشتر ارزش دارد به دست آورد. بنابراین، نیازی به محدود کردن یا ممنوعیت تجارت از طریق گمرک یا سایر محدودیت‌ها نیست.