question: Miksi Condillacin teoria tukee merkittävästi vapaakaupan periaatetta?
answer: Koska jos kauppa on aina molempia osapuolia hyödyttävää, sitä ei kannata rajoittaa tai kieltää tullien avulla
wrong_answers:
  - Condillac osoitti laskelmin, että vapaakauppa rikastuttaa kansakuntaa enemmän kuin protektionismi
  - Condillac todisti, että vapaakauppa on hyväksi rauhalle
  - Condillac oli Adam Smithin ystävä
explanation: |
  Condillacin teorian mukaan Exchange on molempia osapuolia hyödyttävä, sillä kumpikin osapuoli luopuu siitä, mitä se arvostaa vähiten, saadakseen sen, mitä se arvostaa eniten. Näin ollen kauppaa ei tarvitse rajoittaa tai kieltää tullien tai muiden rajoitusten avulla.