question: कोंडिलैक का सिद्धांत मुक्त व्यापार के सिद्धांत को पर्याप्त समर्थन क्यों प्रदान करता है?
answer: क्योंकि यदि व्यापार हमेशा पारस्परिक रूप से लाभकारी है, तो सीमा शुल्क के माध्यम से इसे सीमित या प्रतिबंधित करने का कोई मतलब नहीं है।
wrong_answers:
  - क्योंकि कोंडिलैक ने गणना करके दिखाया कि मुक्त व्यापार संरक्षणवाद की तुलना में राष्ट्र को अधिक समृद्ध बनाता है
  - क्योंकि कोंडिलैक ने साबित कर दिया कि मुक्त व्यापार शांति के लिए अच्छा है
  - क्योंकि कोंडिलैक एडम स्मिथ का मित्र था
explanation: |
  कोंडिलैक का सिद्धांत यह मानता है कि Exchange पारस्परिक रूप से लाभकारी है, क्योंकि प्रत्येक पक्ष वह छोड़ देता है जो उसके लिए सबसे कम मूल्यवान है ताकि वह वह प्राप्त कर सके जो उसके लिए सबसे अधिक मूल्यवान है। नतीजतन, सीमा शुल्क या अन्य प्रतिबंधों के माध्यम से व्यापार को सीमित या प्रतिबंधित करने की कोई आवश्यकता नहीं है।