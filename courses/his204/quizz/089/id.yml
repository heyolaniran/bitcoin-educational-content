question: Mengapa teori Condillac memberikan dukungan yang cukup besar untuk prinsip perdagangan bebas?
answer: Karena jika perdagangan selalu saling menguntungkan, tidak ada gunanya membatasi atau melarangnya melalui bea cukai
wrong_answers:
  - Karena Condillac menunjukkan dengan perhitungan bahwa perdagangan bebas lebih memperkaya suatu negara daripada proteksionisme
  - Karena Condillac membuktikan bahwa perdagangan bebas baik untuk perdamaian
  - Karena Condillac adalah teman Adam Smith
explanation: |
  Teori Condillac menyatakan bahwa Exchange saling menguntungkan, karena masing-masing pihak menyerahkan apa yang paling tidak dihargainya untuk mendapatkan apa yang paling dihargainya. Oleh karena itu, tidak perlu membatasi atau melarang perdagangan melalui bea cukai atau pembatasan lainnya.