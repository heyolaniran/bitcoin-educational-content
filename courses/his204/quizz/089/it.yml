question: Perché la teoria di Condillac fornisce un notevole sostegno al principio del libero scambio?
answer: Perché se il commercio è sempre reciprocamente vantaggioso, non ha senso limitarlo o vietarlo attraverso le dogane
wrong_answers:
  - Perché Condillac ha dimostrato con i calcoli che il libero scambio arricchisce una nazione più del protezionismo
  - Perché Condillac ha dimostrato che il libero scambio è un bene per la pace
  - Perché Condillac era amico di Adam Smith
explanation: |
  La teoria di Condillac sostiene che il Exchange è reciprocamente vantaggioso, poiché ciascuna parte rinuncia a ciò che apprezza di meno per ottenere ciò che apprezza di più. Di conseguenza, non c'è bisogno di limitare o proibire il commercio attraverso dogane o altre restrizioni.