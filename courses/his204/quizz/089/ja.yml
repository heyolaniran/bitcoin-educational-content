question: なぜコンディヤックの理論が自由貿易の原則を大きく支持するのでしょうか？
answer: 貿易が常に互恵的であるならば、関税によって貿易を制限したり禁止したりする意味がないからだ。
wrong_answers:
  - コンディヤックは、自由貿易が保護主義よりも国家を豊かにすることを計算によって示したからである。
  - コンディヤックは自由貿易が平和に役立つことを証明したのだから
  - コンディヤックはアダム・スミスの友人だったからだ。
explanation: |
  コンディヤックの理論では、Exchangeは互恵的であり、各当事者は最も価値のあるものを得るために最も価値のないものを放棄する。その結果、関税やその他の制限によって貿易を制限したり禁止したりする必要はない。