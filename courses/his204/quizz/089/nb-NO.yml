question: Hvorfor gir Condillacs teori betydelig støtte til prinsippet om frihandel?
answer: For hvis handel alltid er gjensidig fordelaktig, er det ikke noe poeng i å begrense eller forby den gjennom toll
wrong_answers:
  - Fordi Condillac viste ved hjelp av beregninger at frihandel beriker en nasjon mer enn proteksjonisme
  - Fordi Condillac beviste at frihandel er bra for freden
  - Fordi Condillac var en venn av Adam Smith
explanation: |
  Condillacs teori hevder at Exchange er gjensidig fordelaktig, ettersom hver av partene gir opp det de verdsetter minst for å oppnå det de verdsetter mest. Følgelig er det ikke nødvendig å begrense eller forby handel gjennom toll eller andre restriksjoner.