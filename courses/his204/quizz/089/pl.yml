question: Dlaczego teoria Condillaca zapewnia znaczące wsparcie dla zasady wolnego handlu?
answer: Ponieważ jeśli handel jest zawsze korzystny dla obu stron, nie ma sensu ograniczać go lub zakazywać poprzez cła
wrong_answers:
  - Ponieważ Condillac wykazał za pomocą obliczeń, że wolny handel wzbogaca naród bardziej niż protekcjonizm
  - Ponieważ Condillac udowodnił, że wolny handel jest dobry dla pokoju
  - Ponieważ Condillac był przyjacielem Adama Smitha
explanation: |
  Teoria Condillaca utrzymuje, że Exchange jest korzystny dla obu stron, ponieważ każda ze stron rezygnuje z tego, co ceni najmniej, aby uzyskać to, co ceni najbardziej. W związku z tym nie ma potrzeby ograniczania lub zakazywania handlu poprzez cła lub inne ograniczenia.