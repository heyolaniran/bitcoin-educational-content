question: Porque é que a teoria de Condillac apoia consideravelmente o princípio do comércio livre?
answer: Porque se o comércio é sempre mutuamente benéfico, não faz sentido limitá-lo ou proibi-lo através das alfândegas
wrong_answers:
  - Porque Condillac demonstrou, através de cálculos, que o comércio livre enriquece mais uma nação do que o protecionismo
  - Porque Condillac provou que o comércio livre é bom para a paz
  - Porque Condillac era amigo de Adam Smith
explanation: |
  A teoria de Condillac defende que o Exchange é mutuamente benéfico, uma vez que cada parte abdica do que menos valoriza para obter o que mais valoriza. Consequentemente, não há necessidade de limitar ou proibir o comércio através de alfândegas ou outras restrições.