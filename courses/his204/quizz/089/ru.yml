question: Почему теория Кондильяка обеспечивает значительную поддержку принципа свободной торговли?
answer: Ведь если торговля всегда взаимовыгодна, то нет смысла ограничивать или запрещать ее на таможне
wrong_answers:
  - Потому что Кондильяк расчетным путем доказал, что свободная торговля обогащает нацию больше, чем протекционизм
  - Потому что Кондильяк доказал, что свободная торговля полезна для мира
  - Потому что Кондильяк был другом Адама Смита
explanation: |
  Теория Кондильяка утверждает, что Exchange взаимовыгодна, поскольку каждая сторона отдает то, что ценит меньше всего, чтобы получить то, что ценит больше всего. Следовательно, нет необходимости ограничивать или запрещать торговлю с помощью таможенных или иных ограничений.