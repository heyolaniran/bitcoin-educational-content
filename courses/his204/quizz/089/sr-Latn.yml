question: Zašto Condillacova teorija pruža značajnu podršku principu slobodne trgovine?
answer: Jer ako je trgovina uvek obostrano korisna, nema smisla ograničavati je ili zabranjivati kroz carine
wrong_answers:
  - Jer Condillac pokazao proračunom da slobodna trgovina obogaćuje naciju više nego protekcionizam
  - Jer Condillac dokazao da je slobodna trgovina dobra za mir
  - Zato što je Condillac bio prijatelj Adama Smitha
explanation: |
  Condillacova teorija tvrdi da je Exchange obostrano koristan, jer svaka strana odustaje od onoga što najmanje ceni kako bi dobila ono što najviše ceni. Shodno tome, nema potrebe za ograničavanjem ili zabranom trgovine putem carina ili drugih restrikcija.