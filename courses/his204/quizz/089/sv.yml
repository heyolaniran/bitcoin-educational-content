question: Varför ger Condillacs teori ett betydande stöd för principen om frihandel?
answer: För om handel alltid är till ömsesidig nytta finns det ingen anledning att begränsa eller förbjuda den genom tullar
wrong_answers:
  - Eftersom Condillac genom beräkningar visade att frihandel berikar en nation mer än protektionism
  - Eftersom Condillac bevisade att frihandel är bra för freden
  - Eftersom Condillac var en vän till Adam Smith
explanation: |
  Condillacs teori hävdar att Exchange är ömsesidigt fördelaktigt, eftersom varje part ger upp det som den värderar minst för att få det som den värderar mest. Följaktligen finns det inget behov av att begränsa eller förbjuda handel genom tullar eller andra restriktioner.