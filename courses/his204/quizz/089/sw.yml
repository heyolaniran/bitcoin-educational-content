question: Kwa nini nadharia ya Condillac inatoa msaada mkubwa kwa kanuni ya biashara huria?
answer: Kwa sababu kama biashara daima ina manufaa kwa pande zote mbili, hakuna maana katika kuiwekea mipaka au kuizuia kupitia forodha
wrong_answers:
  - Kwa sababu Condillac alionyesha kwa hesabu kwamba biashara huria inatajirisha taifa zaidi ya kulindana
  - Kwa sababu Condillac alithibitisha kuwa biashara huria ni nzuri kwa amani
  - Kwa sababu Condillac alikuwa rafiki wa Adam Smith
explanation: |
  Nadharia ya Condillac inashikilia kuwa Exchange ina manufaa kwa pande zote mbili, kwani kila mhusika huacha kile anachothamini kidogo ili kupata kile anachothamini zaidi. Kwa hivyo, hakuna haja ya kuweka kikomo au kukataza biashara kupitia forodha au vikwazo vingine.