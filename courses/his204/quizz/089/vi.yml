question: Tại sao lý thuyết của Condillac lại ủng hộ đáng kể cho nguyên tắc tự do thương mại?
answer: Bởi vì nếu thương mại luôn có lợi cho cả hai bên thì không có lý do gì để hạn chế hoặc cấm nó thông qua hải quan.
wrong_answers:
  - Bởi vì Condillac đã chứng minh bằng tính toán rằng thương mại tự do làm giàu cho một quốc gia nhiều hơn chủ nghĩa bảo hộ
  - Bởi vì Condillac đã chứng minh rằng thương mại tự do là tốt cho hòa bình
  - Bởi vì Condillac là bạn của Adam Smith
explanation: |
  Lý thuyết của Condillac cho rằng Exchange có lợi cho cả hai bên, vì mỗi bên từ bỏ những gì mình coi trọng nhất để có được những gì mình coi trọng nhất. Do đó, không cần phải hạn chế hoặc cấm thương mại thông qua hải quan hoặc các hạn chế khác.