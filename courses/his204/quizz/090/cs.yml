question: Proč říkáme, že v Exchange vždy dáváme méně, abychom dostali více?
answer: Protože se vždy vzdáváme něčeho, čeho si ceníme méně, za něco, čeho si ceníme více
wrong_answers:
  - Protože je to hra na blázny, kdy prodáváme své výrobky za víc, než za kolik stojí
  - Protože peníze mají hodnotu, je každý prodej obohacením
  - Protože prodávající jsou vždy chytřejší než kupující
explanation: |
  Dáváme to, čeho si ceníme méně, abychom získali to, čeho si ceníme více, čímž se Exchange stává oboustranně výhodným.