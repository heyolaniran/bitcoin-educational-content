question: Warum sagen wir, dass wir bei Exchange immer weniger geben, um mehr zu erhalten?
answer: Weil wir immer etwas, das wir weniger schätzen, für etwas aufgeben, das wir mehr schätzen
wrong_answers:
  - Weil es ein Narrenspiel ist, bei dem wir unsere Produkte für mehr verkaufen, als sie wert sind
  - Weil Geld einen Wert hat, ist jeder Verkauf eine Bereicherung
  - Weil Verkäufer immer schlauer sind als Käufer
explanation: |
  Wir geben, was wir weniger wertschätzen, um zu erhalten, was wir mehr wertschätzen, so dass das Exchange für beide Seiten von Vorteil ist.