question: Why do we say that in exchange we always give less to receive more?
answer: Because we always give up something we value less for something we value more
wrong_answers:
  - Because it's a fool's game, where we sell our products for more than they're worth
  - Because money has value, every sale is an enrichment
  - Because sellers are always smarter than buyers
explanation: |
  We give what we value less to obtain what we value more, making the exchange mutually beneficial.