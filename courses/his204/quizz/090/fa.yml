question: چرا می‌گوییم که در Exchange همیشه کمتر می‌دهیم تا بیشتر دریافت کنیم؟
answer: زیرا ما همیشه چیزی را که کمتر ارزشمند می‌دانیم برای چیزی که بیشتر ارزشمند می‌دانیم، رها می‌کنیم.
wrong_answers:
  - زیرا این یک بازی احمقانه است، جایی که محصولات خود را به قیمتی بالاتر از ارزش واقعی‌شان می‌فروشیم
  - از آنجا که پول ارزش دارد، هر فروش یک غنی‌سازی است
  - زیرا فروشندگان همیشه از خریداران باهوش‌تر هستند
explanation: |
  ما چیزی را که کمتر ارزش می‌دهیم می‌دهیم تا چیزی را که بیشتر ارزش می‌دهیم به دست آوریم، و این باعث می‌شود که Exchange به نفع هر دو طرف باشد.