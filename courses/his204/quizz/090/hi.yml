question: हम ऐसा क्यों कहते हैं कि Exchange में हम अधिक प्राप्त करने के लिए हमेशा कम देते हैं?
answer: क्योंकि हम हमेशा किसी ऐसी चीज़ को छोड़ देते हैं जिसका हम कम मूल्य रखते हैं, किसी ऐसी चीज़ के लिए जिसका हम अधिक मूल्य रखते हैं
wrong_answers:
  - क्योंकि यह मूर्खों का खेल है, जहां हम अपने उत्पादों को उनकी वास्तविक कीमत से अधिक पर बेचते हैं।
  - क्योंकि पैसे का मूल्य है, हर बिक्री एक संवर्धन है
  - क्योंकि विक्रेता हमेशा खरीदारों से अधिक चतुर होते हैं
explanation: |
  हम वह देते हैं जिसे हम कम महत्व देते हैं, ताकि वह प्राप्त कर सकें जिसे हम अधिक महत्व देते हैं, जिससे Exchange पारस्परिक रूप से लाभकारी बन जाता है।