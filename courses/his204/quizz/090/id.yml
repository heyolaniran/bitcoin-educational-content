question: Mengapa kami mengatakan bahwa di Exchange kami selalu memberi lebih sedikit untuk menerima lebih banyak?
answer: Karena kita selalu melepaskan sesuatu yang kurang kita hargai untuk sesuatu yang lebih kita hargai
wrong_answers:
  - Karena ini adalah permainan yang bodoh, di mana kami menjual produk kami dengan harga yang lebih mahal dari nilainya
  - Karena uang memiliki nilai, setiap penjualan adalah pengayaan
  - Karena penjual selalu lebih pintar dari pembeli
explanation: |
  Kami memberikan apa yang kami hargai lebih sedikit untuk mendapatkan apa yang kami hargai lebih banyak, membuat Exchange saling menguntungkan.