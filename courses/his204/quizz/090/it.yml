question: Perché diciamo che nel Exchange diamo sempre meno per ricevere di più?
answer: Perché rinunciamo sempre a qualcosa che apprezziamo di meno per qualcosa che apprezziamo di più
wrong_answers:
  - Perché è un gioco da pazzi, in cui vendiamo i nostri prodotti a un prezzo superiore al loro valore
  - Poiché il denaro ha un valore, ogni vendita è un arricchimento
  - Perché i venditori sono sempre più intelligenti degli acquirenti
explanation: |
  Diamo ciò che apprezziamo di meno per ottenere ciò che apprezziamo di più, rendendo il Exchange reciprocamente vantaggioso.