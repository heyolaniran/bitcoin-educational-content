question: Hvorfor sier vi at vi i Exchange alltid gir mindre for å få mer?
answer: Fordi vi alltid gir opp noe vi verdsetter mindre for noe vi verdsetter mer
wrong_answers:
  - Fordi det er et narrespill, der vi selger produktene våre for mer enn de er verdt
  - Fordi penger har en verdi, er hvert salg en berikelse
  - Fordi selgere alltid er smartere enn kjøpere
explanation: |
  Vi gir det vi verdsetter mindre for å få det vi verdsetter mer, noe som gjør Exchange gjensidig fordelaktig.