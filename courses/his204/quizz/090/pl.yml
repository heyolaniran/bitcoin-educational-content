question: Dlaczego mówimy, że w Exchange zawsze dajemy mniej, aby otrzymać więcej?
answer: Ponieważ zawsze rezygnujemy z czegoś, co cenimy mniej, na rzecz czegoś, co cenimy bardziej
wrong_answers:
  - Ponieważ jest to głupia gra, w której sprzedajemy nasze produkty za więcej niż są warte
  - Ponieważ pieniądze mają wartość, każda sprzedaż jest wzbogaceniem
  - Ponieważ sprzedający są zawsze mądrzejsi od kupujących
explanation: |
  Dajemy to, co cenimy mniej, aby uzyskać to, co cenimy bardziej, dzięki czemu Exchange przynosi obopólne korzyści.