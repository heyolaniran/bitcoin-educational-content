question: Porque é que dizemos que no Exchange damos sempre menos para receber mais?
answer: Porque desistimos sempre de algo que valorizamos menos por algo que valorizamos mais
wrong_answers:
  - Porque é um jogo de tolos, em que vendemos os nossos produtos por mais do que valem
  - Porque o dinheiro tem valor, cada venda é um enriquecimento
  - Porque os vendedores são sempre mais espertos do que os compradores
explanation: |
  Damos o que valorizamos menos para obter o que valorizamos mais, tornando o Exchange mutuamente benéfico.