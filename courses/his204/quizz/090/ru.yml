question: Почему мы говорим, что в Exchange мы всегда отдаем меньше, чтобы получить больше?
answer: Потому что мы всегда отказываемся от того, что ценим меньше, ради того, что ценим больше
wrong_answers:
  - Потому что это игра в дурака, где мы продаем свои товары дороже, чем они стоят
  - Поскольку деньги имеют ценность, каждая продажа - это обогащение
  - Потому что продавцы всегда умнее покупателей
explanation: |
  Мы отдаем то, что ценим меньше, чтобы получить то, что ценим больше, что делает Exchange взаимовыгодным.