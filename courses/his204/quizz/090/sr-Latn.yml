question: Zašto kažemo da u Exchange uvek dajemo manje da bismo dobili više?
answer: Zato što uvek odustajemo od nečega što manje cenimo za nešto što više cenimo
wrong_answers:
  - Jer je to igra za budale, gde prodajemo naše proizvode za više nego što vrede
  - Zato što novac ima vrednost, svaka prodaja je obogaćenje
  - Zato što su prodavci uvek pametniji od kupaca
explanation: |
  Dajemo ono što manje cenimo da bismo dobili ono što više cenimo, čineći Exchange obostrano korisnim.