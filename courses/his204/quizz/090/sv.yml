question: Varför säger vi att vi i Exchange alltid ger mindre för att få mer?
answer: För att vi alltid ger upp något vi värderar lägre för något vi värderar högre
wrong_answers:
  - För att det är en dåres spel, där vi säljer våra produkter för mer än de är värda
  - Eftersom pengar har ett värde är varje försäljning en berikning
  - Eftersom säljare alltid är smartare än köpare
explanation: |
  Vi ger det vi värdesätter mindre för att få det vi värdesätter mer, vilket gör Exchange ömsesidigt fördelaktigt.