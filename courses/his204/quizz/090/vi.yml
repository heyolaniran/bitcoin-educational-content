question: Tại sao chúng ta lại nói rằng trong Exchange chúng ta luôn cho ít hơn để nhận được nhiều hơn?
answer: Bởi vì chúng ta luôn từ bỏ thứ mà chúng ta ít coi trọng để lấy thứ mà chúng ta coi trọng hơn
wrong_answers:
  - Bởi vì đó là trò chơi của kẻ ngốc, nơi chúng ta bán sản phẩm của mình với giá cao hơn giá trị thực của chúng
  - Bởi vì tiền có giá trị, mỗi lần bán hàng là một sự làm giàu
  - Bởi vì người bán luôn thông minh hơn người mua
explanation: |
  Chúng ta đánh đổi những thứ chúng ta coi trọng ít hơn để có được những thứ chúng ta coi trọng hơn, khiến Exchange có lợi cho cả hai bên.