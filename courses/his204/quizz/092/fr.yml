question: Sur quel sujet Condorcet n’a-t-il pas écrit ?
answer: Les banques
wrong_answers:
  - La liberté du commerce des grains
  - Les corvées
  - L'esclavage
explanation: |
  Condorcet a écrit sur la liberté du commerce des grains, les corvées et l'esclavage, mais il n'a pas écrit sur les banques.
