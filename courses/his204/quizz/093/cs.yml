question: Jaký důvod uvedl Condorcet pro Turgotův neúspěch?
answer: Byl příliš absolutní ve svých zásadách
wrong_answers:
  - Byl příliš nezkušený v politickém manévrování
  - Jeho fyzická konstituce byla příliš slabá
  - Byl příliš mladý
explanation: |
  Condorcet měl pocit, že Turgot je ve svých zásadách příliš rigidní a neochotný ke kompromisům.