question: Welchen Grund nannte Condorcet für Turgots Scheitern?
answer: Er war zu absolut in seinen Prinzipien
wrong_answers:
  - Er war zu ungeschickt im politischen Manövrieren
  - Seine körperliche Konstitution war zu schwach
  - Er war zu jung
explanation: |
  Condorcet war der Meinung, dass Turgot in seinen Prinzipien zu starr und nicht zu Kompromissen bereit war.