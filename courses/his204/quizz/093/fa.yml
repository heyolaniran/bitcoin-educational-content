question: کوندورسه چه دلیلی برای شکست تورگو ارائه داد؟
answer: او در اصول خود بیش از حد مطلق بود
wrong_answers:
  - او در مانورهای سیاسی بسیار بی‌مهارت بود
  - ساختار فیزیکی او بیش از حد ضعیف بود
  - او خیلی جوان بود
explanation: |
  کوندورسه احساس می‌کرد که تورگو در اصول خود بیش از حد سخت‌گیر است و تمایلی به مصالحه ندارد.