question: Quelle raison Condorcet donnait de l’échec de Turgot ?
answer: Il était trop absolu dans ses principes
wrong_answers:
  - Il était trop peu habile aux manœuvres politiques
  - Il était de constitution physique trop faible
  - Il était trop jeune
explanation: |
  Condorcet pensait que Turgot était trop rigide dans ses principes et qu'il n'était pas assez disposé à faire des compromis.
