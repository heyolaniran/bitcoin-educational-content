question: कोंडोरसेट ने टर्गोट की असफलता के लिए क्या कारण बताया?
answer: वह अपने सिद्धांतों में बहुत अधिक दृढ़ थे
wrong_answers:
  - वह राजनीतिक चालबाज़ी में बहुत अकुशल था
  - उनकी शारीरिक संरचना बहुत कमजोर थी
  - वह बहुत छोटा था
explanation: |
  कोंडोरसेट को लगा कि टर्गोट अपने सिद्धांतों के प्रति बहुत कठोर था और समझौता करने को तैयार नहीं था।