question: Apa alasan yang diberikan Condorcet atas kegagalan Turgot?
answer: Dia terlalu absolut dalam prinsip-prinsipnya
wrong_answers:
  - Dia terlalu tidak terampil dalam manuver politik
  - Kondisi fisiknya terlalu lemah
  - Dia masih terlalu muda
explanation: |
  Condorcet merasa bahwa Turgot terlalu kaku dalam prinsip-prinsipnya dan tidak mau berkompromi.