question: Quale motivo diede Condorcet per il fallimento di Turgot?
answer: Era troppo assoluto nei suoi principi
wrong_answers:
  - Era troppo poco abile nelle manovre politiche
  - La sua costituzione fisica era troppo debole
  - Era troppo giovane
explanation: |
  Condorcet riteneva che Turgot fosse troppo rigido nei suoi principi e poco disposto al compromesso.