question: Hvilken grunn oppga Condorcet for Turgots fiasko?
answer: Han var for absolutt i sine prinsipper
wrong_answers:
  - Han var for uerfaren i politisk manøvrering til at han kunne gjøre det
  - Hans fysiske form var for svak
  - Han var for ung
explanation: |
  Condorcet mente at Turgot var for rigid i sine prinsipper og lite kompromissvillig.