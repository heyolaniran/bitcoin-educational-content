question: Jaki powód porażki Turgota podał Condorcet?
answer: Był zbyt bezwzględny w swoich zasadach
wrong_answers:
  - Był zbyt mało doświadczony w politycznych manewrach
  - Jego budowa fizyczna była zbyt słaba
  - Był za młody
explanation: |
  Condorcet uważał, że Turgot był zbyt sztywny w swoich zasadach i niechętny kompromisom.