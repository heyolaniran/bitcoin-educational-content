question: Que razão deu Condorcet para o fracasso de Turgot?
answer: Ele era demasiado absoluto nos seus princípios
wrong_answers:
  - Era demasiado inábil nas manobras políticas
  - A sua constituição física era demasiado fraca
  - Ele era demasiado jovem
explanation: |
  Condorcet considerava que Turgot era demasiado rígido nos seus princípios e não estava disposto a aceitar compromissos.