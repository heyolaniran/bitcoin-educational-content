question: Какую причину неудачи Тюрго назвал Кондорсе?
answer: Он был слишком абсолютен в своих принципах
wrong_answers:
  - Он был слишком неумелым в политическом маневрировании
  - Его физическое телосложение было слишком слабым
  - Он был слишком молод
explanation: |
  Кондорсе считал, что Тюрго был слишком тверд в своих принципах и не желал идти на компромисс.