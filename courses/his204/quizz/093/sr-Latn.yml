question: Koji razlog je Kondorse dao za Turgotov neuspeh?
answer: Bio je previše apsolutan u svojim principima.
wrong_answers:
  - Bio je previše nevešt u političkom manevrisanju.
  - Njegova fizička konstitucija bila je previše slaba
  - Bio je premlad
explanation: |
  Kondorse je smatrao da je Turgot bio previše rigidan u svojim principima i nesklon kompromisima.