question: Vilket skäl angav Condorcet för Turgots misslyckande?
answer: Han var alltför absolut i sina principer
wrong_answers:
  - Han var för okunnig i politiskt manövrerande
  - Hans fysiska konstitution var för svag
  - Han var för ung
explanation: |
  Condorcet ansåg att Turgot var alltför rigid i sina principer och ovillig att kompromissa.