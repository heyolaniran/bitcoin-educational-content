question: Condorcet đưa ra lý do gì cho sự thất bại của Turgot?
answer: Ông ấy quá tuyệt đối trong các nguyên tắc của mình
wrong_answers:
  - Ông ta quá thiếu kỹ năng trong việc điều động chính trị
  - Thể chất của anh ấy quá yếu
  - Anh ấy còn quá trẻ
explanation: |
  Condorcet cảm thấy Turgot quá cứng nhắc trong nguyên tắc và không muốn thỏa hiệp.