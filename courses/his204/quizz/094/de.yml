question: Warum, so Condorcet, macht die Freiheit den Menschen Angst?
answer: Weil er zu sehr daran gewöhnt ist, dass sich die Regierung in alle Angelegenheiten einmischt
wrong_answers:
  - Weil es in Frankreich noch nie ausprobiert worden ist
  - Weil es eine gewaltsame Revolution erfordert
  - Weil es ein Synonym für Chaos ist
explanation: |
  Condorcet war der Ansicht, dass die Menschen an staatliche Eingriffe gewöhnt waren und Angst vor der Freiheit hatten, weil sie nicht wussten, wie sie diese nutzen sollten.