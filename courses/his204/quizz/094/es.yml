question: According to Condorcet, why does freedom frighten people?
answer: Because he's too used to letting the government intervene in all matters
wrong_answers:
  - Because it's never been tried in France
  - Because it requires violent revolution
  - Because it's synonymous with chaos
explanation: |
  Condorcet believed that people were used to state intervention and were afraid of freedom, because they didn't know how to use it.