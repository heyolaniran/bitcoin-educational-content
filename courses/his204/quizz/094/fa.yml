question: طبق نظر کوندورسه، چرا آزادی مردم را می‌ترساند؟
answer: زیرا او بیش از حد به دخالت دولت در همه امور عادت کرده است
wrong_answers:
  - زیرا هرگز در فرانسه امتحان نشده است
  - زیرا نیاز به انقلاب خشونت‌آمیز دارد
  - زیرا مترادف با هرج و مرج است
explanation: |
  کوندورسه معتقد بود که مردم به مداخله دولت عادت کرده‌اند و از آزادی می‌ترسند، زیرا نمی‌دانستند چگونه از آن استفاده کنند.