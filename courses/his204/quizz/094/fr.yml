question: Pourquoi la liberté fait-elle peur au peuple selon Condorcet ?
answer: Parce qu’il est trop habitué à laisser le gouvernement intervenir dans toutes matières
wrong_answers:
  - Parce qu’elle n’a jamais été essayée en France
  - Parce qu’elle nécessite une révolution violente
  - Parce qu'elle est synonyme de chaos
explanation: |
  Condorcet pensait que le peuple était habitué à l'intervention de l'État et qu'il avait peur de la liberté, car il ne savait pas comment s'en servir.
