question: कोंडोरसेट के अनुसार, स्वतंत्रता लोगों को क्यों भयभीत करती है?
answer: क्योंकि वह सरकार को सभी मामलों में हस्तक्षेप करने देने के आदी हो चुके हैं
wrong_answers:
  - क्योंकि फ्रांस में ऐसा कभी नहीं किया गया
  - क्योंकि इसके लिए हिंसक क्रांति की आवश्यकता है
  - क्योंकि यह अराजकता का पर्याय है
explanation: |
  कोंडोरसेट का मानना ​​था कि लोग राज्य के हस्तक्षेप के आदी हो चुके थे और स्वतंत्रता से डरते थे, क्योंकि वे नहीं जानते थे कि इसका उपयोग कैसे किया जाए।