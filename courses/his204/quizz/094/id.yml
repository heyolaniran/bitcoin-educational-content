question: Menurut Condorcet, mengapa kebebasan membuat orang takut?
answer: Karena dia terlalu terbiasa membiarkan pemerintah campur tangan dalam segala hal
wrong_answers:
  - Karena belum pernah dicoba di Prancis
  - Karena itu membutuhkan revolusi kekerasan
  - Karena itu identik dengan kekacauan
explanation: |
  Condorcet percaya bahwa orang-orang terbiasa dengan intervensi negara dan takut akan kebebasan, karena mereka tidak tahu bagaimana menggunakannya.