question: Secondo Condorcet, perché la libertà spaventa le persone?
answer: Perché è troppo abituato a lasciare che il governo intervenga in tutte le questioni
wrong_answers:
  - Perché non è mai stato sperimentato in Francia
  - Perché richiede una rivoluzione violenta
  - Perché è sinonimo di caos
explanation: |
  Condorcet riteneva che le persone fossero abituate all'intervento dello Stato e avessero paura della libertà, perché non sapevano come usarla.