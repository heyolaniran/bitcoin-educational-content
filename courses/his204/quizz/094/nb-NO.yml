question: Hvorfor skremmer friheten folk, ifølge Condorcet?
answer: Fordi han er for vant til å la myndighetene gripe inn i alle saker
wrong_answers:
  - Fordi det aldri har vært prøvd i Frankrike
  - Fordi det krever voldelig revolusjon
  - Fordi det er synonymt med kaos
explanation: |
  Condorcet mente at folk var vant til statlig inngripen og var redde for friheten, fordi de ikke visste hvordan de skulle bruke den.