question: Segundo Condorcet, porque é que a liberdade assusta as pessoas?
answer: Porque está demasiado habituado a deixar o governo intervir em todos os assuntos
wrong_answers:
  - Porque nunca foi experimentado em França
  - Porque exige uma revolução violenta
  - Porque é sinónimo de caos
explanation: |
  Condorcet acreditava que as pessoas estavam habituadas à intervenção do Estado e tinham medo da liberdade, porque não sabiam como usá-la.