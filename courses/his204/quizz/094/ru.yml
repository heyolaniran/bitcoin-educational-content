question: По мнению Кондорсе, почему свобода пугает людей?
answer: Потому что он слишком привык к тому, что правительство вмешивается во все дела
wrong_answers:
  - Потому что это никогда не пробовали во Франции
  - Потому что это требует насильственной революции
  - Потому что это синоним хаоса
explanation: |
  Кондорсе считал, что люди привыкли к вмешательству государства и боятся свободы, потому что не знают, как ею пользоваться.