question: Prema Kondorseu, zašto sloboda plaši ljude?
answer: Zato što je previše navikao da dozvoljava vladi da se meša u sva pitanja
wrong_answers:
  - Zato što nikada nije pokušano u Francuskoj
  - Jer zahteva nasilnu revoluciju
  - Jer je sinonim za haos
explanation: |
  Condorcet je verovao da su ljudi navikli na državnu intervenciju i da su se plašili slobode, jer nisu znali kako da je koriste.