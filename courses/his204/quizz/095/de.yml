question: Gegen welchen Minister wandte sich Condorcet in seiner Verteidigung des Freihandels?
answer: Necker
wrong_answers:
  - Calonne
  - Trudaine
  - Choiseul
explanation: |
  Condorcet stellte sich in der Frage des Freihandels gegen Necker und verteidigte die Grundsätze des Wirtschaftsliberalismus.