question: À quel ministre, adversaire de Turgot, Condorcet a-t-il opposé sa défense du libre-échange ?
answer: Necker
wrong_answers:
  - Calonne
  - Trudaine
  - Choiseul
explanation: |
  Condorcet s'est opposé à Necker sur la question du libre-échange, en défendant les principes du libéralisme économique.
