question: Které z těchto událostí se Dupont de Nemours zúčastnil během Francouzské revoluce?
answer: Ústavodárné shromáždění a vypracování "cahiers de doléances"
wrong_answers:
  - Sestavení cahiers de doléances a vzpoura Bastily
  - Šturmování Bastily a Ústavodárné shromáždění
  - Králův útěk a Ústavodárné shromáždění
explanation: |
  Dupont de Nemours se účastnil Ústavodárného shromáždění a sepisování cahiers de doléances a hrál důležitou roli v počátcích Francouzské revoluce.