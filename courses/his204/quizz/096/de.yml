question: An welchen dieser Ereignisse war Dupont de Nemours während der Französischen Revolution beteiligt?
answer: Die verfassungsgebende Versammlung und die Ausarbeitung der "cahiers de doléances
wrong_answers:
  - Die Abfassung der "cahiers de doléances" und die Erstürmung der Bastille
  - Der Sturm auf die Bastille und die verfassungsgebende Versammlung
  - Die Flucht des Königs und die verfassungsgebende Versammlung
explanation: |
  Dupont de Nemours nahm an der verfassunggebenden Versammlung und an der Ausarbeitung der cahiers de doléances teil und spielte eine wichtige Rolle in der Anfangszeit der Französischen Revolution.