question: Which of these events did Dupont de Nemours take part in during the French Revolution?
answer: The Constituent Assembly and the drafting of "cahiers de doléances
wrong_answers:
  - The drafting of the cahiers de doléances and the storming of the Bastille
  - The storming of the Bastille and the Constituent Assembly
  - The King's flight and the Constituent Assembly
explanation: |
  Dupont de Nemours took part in the Constituent Assembly and the drafting of the cahiers de doléances, playing an important role in the early days of the French Revolution.