question: Millises neist sündmustest osales Dupont de Nemours Prantsuse revolutsiooni ajal?
answer: Asutava Kogu ja "cahiers de doléances" koostamine
wrong_answers:
  - Cahiers de doléances'i koostamine ja Bastille'i tormamine
  - Bastille'i tormamine ja Asutav Kogu
  - Kuninga põgenemine ja Asutav Kogu
explanation: |
  Dupont de Nemours osales Asutava Kogu töös ja cahiers de doléances'i koostamises, mängides olulist rolli Prantsuse revolutsiooni algusaegadel.