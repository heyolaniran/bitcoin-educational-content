question: دوپونت دو نمور در کدام یک از این رویدادها در طول انقلاب فرانسه شرکت کرد؟
answer: مجمع مؤسسان و تدوین "cahiers de doléances
wrong_answers:
  - پیش‌نویس دفترچه‌های شکایات و حمله به باستیل
  - یورش به باستیل و مجلس مؤسسان
  - پرواز شاه و مجلس مؤسسان
explanation: |
  دوپون دو نمور در مجلس مؤسسان و تدوین کایه دو دولئانس شرکت کرد و نقش مهمی در روزهای اولیه انقلاب فرانسه ایفا کرد.