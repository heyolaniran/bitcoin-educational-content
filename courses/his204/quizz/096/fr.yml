question: Pendant la Révolution française, auxquels de ces évènements Dupont de Nemours a-t-il participé ?
answer: L’assemblée constituante et la rédaction des cahiers de doléances
wrong_answers:
  - La rédaction des cahiers de doléances et la prise de la Bastille
  - La prise de la Bastille et l'assemblée consitutuante
  - La fuite du Roi et l'assemblée constituante
explanation: |
  Dupont de Nemours a participé à l'Assemblée constituante et à la rédaction des cahiers de doléances, jouant un rôle important dans les débuts de la Révolution française.
