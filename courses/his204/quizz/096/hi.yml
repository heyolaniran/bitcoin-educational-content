question: फ्रांसीसी क्रांति के दौरान ड्यूपॉन्ट डी नेमॉर्स ने इनमें से किस आयोजन में भाग लिया था?
answer: संविधान सभा और "कैहियर्स डे डोलेंस" का मसौदा तैयार करना
wrong_answers:
  - कैहियर्स डे डोलेंस का मसौदा तैयार करना और बैस्टिल पर हमला
  - बैस्टिल और संविधान सभा पर आक्रमण
  - राजा का पलायन और संविधान सभा
explanation: |
  ड्यूपॉन्ट डी नेमॉर्स ने संविधान सभा में भाग लिया और कैहियर्स डे डोलेंस के प्रारूपण में भाग लिया, तथा फ्रांसीसी क्रांति के शुरुआती दिनों में महत्वपूर्ण भूमिका निभाई।