question: Manakah dari peristiwa-peristiwa berikut yang diikuti oleh Dupont de Nemours selama Revolusi Prancis?
answer: Majelis Konstituante dan penyusunan "cahiers de doléances
wrong_answers:
  - Penyusunan cahiers de doléances dan penyerbuan Bastille
  - Penyerbuan Bastille dan Majelis Konstituante
  - Pelarian Raja dan Majelis Konstituante
explanation: |
  Dupont de Nemours ikut serta dalam Majelis Konstituante dan penyusunan cahiers de doléances, yang memainkan peran penting pada masa-masa awal Revolusi Prancis.