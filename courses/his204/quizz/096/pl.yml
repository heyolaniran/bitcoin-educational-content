question: W którym z tych wydarzeń brał udział Dupont de Nemours podczas Rewolucji Francuskiej?
answer: Zgromadzenie Konstytucyjne i opracowanie "cahiers de doléances
wrong_answers:
  - Opracowanie cahiers de doléances i szturm na Bastylię
  - Szturm na Bastylię i Zgromadzenie Konstytucyjne
  - Lot króla i Zgromadzenie Konstytucyjne
explanation: |
  Dupont de Nemours brał udział w Zgromadzeniu Konstytucyjnym i opracowywaniu cahiers de doléances, odgrywając ważną rolę we wczesnych dniach rewolucji francuskiej.