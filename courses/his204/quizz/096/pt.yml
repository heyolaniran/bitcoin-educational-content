question: Em qual destes acontecimentos participou Dupont de Nemours durante a Revolução Francesa?
answer: A Assembleia Constituinte e a redação dos "cahiers de doléances
wrong_answers:
  - A redação dos cahiers de doléances e a tomada da Bastilha
  - A tomada da Bastilha e a Assembleia Constituinte
  - A fuga do Rei e a Assembleia Constituinte
explanation: |
  Dupont de Nemours participou na Assembleia Constituinte e na redação dos cahiers de doléances, desempenhando um papel importante nos primeiros tempos da Revolução Francesa.