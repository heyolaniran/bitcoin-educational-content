question: В каких из этих событий Дюпон де Немур принимал участие во время Французской революции?
answer: Учредительное собрание и составление "долевых книг"
wrong_answers:
  - Составление "Книги долга" и штурм Бастилии
  - Штурм Бастилии и Учредительное собрание
  - Бегство короля и Учредительное собрание
explanation: |
  Дюпон де Немур принимал участие в работе Учредительного собрания и в составлении газет "Долеанс", сыграв важную роль в начале Французской революции.