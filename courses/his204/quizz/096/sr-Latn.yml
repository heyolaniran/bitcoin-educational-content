question: U kojim događajima je Dupont de Nemours učestvovao tokom Francuske revolucije?
answer: Ustavotvorna skupština i izrada "cahiers de doléances"
wrong_answers:
  - Izrada cahiers de doléances i juriš na Bastilju
  - Juriš na Bastilju i Ustavotvorna skupština
  - Bekstvo kralja i Ustavotvorna skupština
explanation: |
  Dupont de Nemours je učestvovao u Ustavotvornoj skupštini i izradi cahiers de doléances, igrajući važnu ulogu u ranim danima Francuske revolucije.