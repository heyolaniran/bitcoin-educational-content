question: Vilken av dessa händelser deltog Dupont de Nemours i under den franska revolutionen?
answer: Den konstituerande församlingen och utarbetandet av "cahiers de doléances
wrong_answers:
  - Utarbetandet av cahiers de doléances och stormningen av Bastiljen
  - Stormningen av Bastiljen och den konstituerande församlingen
  - Kungens flyg och den konstituerande församlingen
explanation: |
  Dupont de Nemours deltog i den konstituerande församlingen och utarbetandet av cahiers de doléances och spelade en viktig roll under den franska revolutionens tidiga dagar.