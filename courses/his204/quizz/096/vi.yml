question: Dupont de Nemours đã tham gia vào sự kiện nào sau đây trong Cách mạng Pháp?
answer: Hội đồng lập hiến và việc soạn thảo "cahiers de doléances"
wrong_answers:
  - Việc soạn thảo cahiers de doléances và việc chiếm ngục Bastille
  - Cuộc tấn công vào Bastille và Quốc hội Lập hiến
  - Cuộc chạy trốn của nhà vua và Hội đồng lập hiến
explanation: |
  Dupont de Nemours tham gia vào Hội đồng lập hiến và soạn thảo cahiers de doléances, đóng vai trò quan trọng trong những ngày đầu của Cách mạng Pháp.