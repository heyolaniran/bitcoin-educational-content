question: Jaký důvod uvádí Dupont de Nemours pro odložení vytvoření Assignats?
answer: Assignats zvýší ceny
wrong_answers:
  - Asignáty budou použity k vedení útočných válek
  - Assignaty zruinují zahraniční kapitál
  - Assignáty jsou porušením vlastnických práv
explanation: |
  Dupont de Nemours se obával inflace způsobené asignáty, papírovou měnou vydávanou Národním shromážděním. Domníval se, že tato inflace zničí francouzskou ekonomiku.