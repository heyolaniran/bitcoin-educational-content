question: Welchen Grund nennt Dupont de Nemours für die Verschiebung der Gründung von Assignats?
answer: Assignaten werden die Preise in die Höhe treiben
wrong_answers:
  - Assignaten werden zur Führung von Angriffskriegen eingesetzt
  - Assignaten werden ausländisches Kapital ruinieren
  - Abtretungen sind eine Verletzung der Eigentumsrechte
explanation: |
  Dupont de Nemours fürchtete die durch die Assignaten, eine von der Nationalversammlung ausgegebene Papierwährung, verursachte Inflation. Er glaubt, dass diese Inflation die französische Wirtschaft ruinieren würde.