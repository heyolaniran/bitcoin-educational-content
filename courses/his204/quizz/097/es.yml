question: What reason does Dupont de Nemours give for postponing the creation of Assignats?
answer: Assignats will drive up prices
wrong_answers:
  - Assignats will be used to wage offensive wars
  - Assignats will ruin foreign capital
  - Assignats are an infringement of property rights
explanation: |
  Dupont de Nemours feared the inflation caused by assignats, a paper currency issued by the National Assembly. He believed this inflation would ruin the French economy.