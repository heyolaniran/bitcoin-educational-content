question: Mis on Dupont de Nemoursi põhjuseks, miks ta lükkas Assignatsi loomise edasi?
answer: Assignatid tõstavad hindu
wrong_answers:
  - Assignatite kasutatakse ründesõdade pidamiseks
  - Assignats hävitab väliskapitali
  - Assignat on omandiõiguse rikkumine
explanation: |
  Dupont de Nemours kartis Rahvusassamblee poolt emiteeritud paberraha, assignatite, põhjustatud inflatsiooni. Ta uskus, et see inflatsioon hävitab Prantsusmaa majanduse.