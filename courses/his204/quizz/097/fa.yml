question: دوپونت دو نمور چه دلیلی برای به تعویق انداختن ایجاد Assignats ارائه می‌دهد؟
answer: Assignats قیمت‌ها را افزایش خواهند داد
wrong_answers:
  - آسینیات برای جنگ‌های تهاجمی استفاده خواهد شد
  - Assignats سرمایه خارجی را نابود خواهند کرد
  - آسیگنات‌ها نقض حقوق مالکیت هستند
explanation: |
  دوپونت دو نمور از تورمی که توسط آسینیاها، یک ارز کاغذی صادر شده توسط مجلس ملی، ایجاد شده بود، می‌ترسید. او معتقد بود که این تورم اقتصاد فرانسه را نابود خواهد کرد.