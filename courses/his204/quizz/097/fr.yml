question: Quelle raison Dupont de Nemours met-il en avant pour repousser la création des Assignats ?
answer: Les Assignats provoqueront la hausse des prix
wrong_answers:
  - Les Assignats serviront à conduire des guerres offensives
  - Les Assignats provoqueront la ruine des capitaux étrangers
  - Les Assignats sont une atteinte à la propriété
explanation: |
  Dupont de Nemours craignait l'inflation causée par les assignats, une monnaie papier émise par l'Assemblée nationale. Il pensait que cette inflation ruinerait l'économie française.
