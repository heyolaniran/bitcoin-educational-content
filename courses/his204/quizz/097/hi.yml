question: ड्यूपॉन्ट डी नेमॉर्स ने एसिग्नेट्स के निर्माण को स्थगित करने का क्या कारण बताया है?
answer: असाइनेट्स की वजह से कीमतें बढ़ेंगी
wrong_answers:
  - आक्रामक युद्ध छेड़ने के लिए असाइनैट्स का इस्तेमाल किया जाएगा
  - असाइनेट्स विदेशी पूंजी को बर्बाद कर देंगे
  - असाइनेट्स संपत्ति के अधिकारों का उल्लंघन है
explanation: |
  ड्यूपॉन्ट डी नेमोर्स को नेशनल असेंबली द्वारा जारी किए जाने वाले कागजी मुद्रा असाइनेट्स के कारण होने वाली मुद्रास्फीति का डर था। उनका मानना ​​था कि यह मुद्रास्फीति फ्रांसीसी अर्थव्यवस्था को बर्बाद कर देगी।