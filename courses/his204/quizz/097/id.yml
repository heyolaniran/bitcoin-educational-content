question: Alasan apa yang diberikan Dupont de Nemours untuk menunda pembuatan Assignats?
answer: Assignats akan menaikkan harga
wrong_answers:
  - Assignat akan digunakan untuk melancarkan perang ofensif
  - Assignats akan merusak modal asing
  - Pengalihan adalah pelanggaran hak milik
explanation: |
  Dupont de Nemours khawatir akan inflasi yang disebabkan oleh assignats, mata uang kertas yang dikeluarkan oleh Majelis Nasional. Dia percaya bahwa inflasi ini akan merusak ekonomi Prancis.