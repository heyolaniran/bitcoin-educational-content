question: Hvilken grunn oppgir Dupont de Nemours for å utsette opprettelsen av Assignats?
answer: Assignats vil drive opp prisene
wrong_answers:
  - Assignats vil bli brukt til å føre offensive kriger
  - Assignats vil ruinere utenlandsk kapital
  - Assignater er en krenkelse av eiendomsretten
explanation: |
  Dupont de Nemours fryktet inflasjonen som assignatene, en papirvaluta utstedt av nasjonalforsamlingen, forårsaket. Han mente at denne inflasjonen ville ødelegge den franske økonomien.