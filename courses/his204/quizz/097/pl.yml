question: Jaki powód podaje Dupont de Nemours, aby odłożyć utworzenie Assignats?
answer: Assignats spowoduje wzrost cen
wrong_answers:
  - Assignaty będą wykorzystywane do prowadzenia wojen ofensywnych
  - Assignats zrujnuje kapitał zagraniczny
  - Cesje stanowią naruszenie praw własności
explanation: |
  Dupont de Nemours obawiał się inflacji spowodowanej przez assignaty, papierową walutę emitowaną przez Zgromadzenie Narodowe. Uważał, że inflacja ta zrujnuje francuską gospodarkę.