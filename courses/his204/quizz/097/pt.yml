question: Que razões apresenta a Dupont de Nemours para adiar a criação da Assignats?
answer: Os Assignats farão subir os preços
wrong_answers:
  - Os Assignats serão utilizados para travar guerras ofensivas
  - A Assignats vai arruinar o capital estrangeiro
  - Os assignats constituem uma violação dos direitos de propriedade
explanation: |
  Dupont de Nemours temia a inflação causada pelos assignats, uma moeda de papel emitida pela Assembleia Nacional. Acreditava que esta inflação arruinaria a economia francesa.