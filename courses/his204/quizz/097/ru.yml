question: По какой причине Дюпон де Немур откладывает создание Assignats?
answer: Ассигнаты приведут к росту цен
wrong_answers:
  - Ассигнаты будут использоваться для ведения наступательных войн
  - Ассигнаты разорят иностранный капитал
  - Ассигнации являются нарушением прав собственности
explanation: |
  Дюпон де Немур опасался инфляции, вызванной ассигнатами - бумажной валютой, выпущенной Национальным собранием. Он считал, что эта инфляция разрушит французскую экономику.