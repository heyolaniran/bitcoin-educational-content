question: Koji razlog Dupont de Nemours navodi za odlaganje stvaranja Asignata?
answer: Assignati će podići cene
wrong_answers:
  - Assignati će se koristiti za vođenje ofanzivnih ratova
  - Assignati će uništiti strani kapital
  - Assignati su povreda prava svojine
explanation: |
  Dupont de Nemours se plašio inflacije izazvane asignatima, papirnom valutom koju je izdala Nacionalna skupština. Verovao je da će ta inflacija uništiti francusku ekonomiju.