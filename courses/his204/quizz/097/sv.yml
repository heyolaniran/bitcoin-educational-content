question: Vilket skäl anger Dupont de Nemours för att skjuta upp bildandet av Assignats?
answer: Assignats kommer att driva upp priserna
wrong_answers:
  - Assignats kommer att användas för att föra offensiva krig
  - Assignats kommer att förstöra utländskt kapital
  - Assignats är ett intrång i äganderätten
explanation: |
  Dupont de Nemours fruktade den inflation som orsakades av assignater, en pappersvaluta som gavs ut av nationalförsamlingen. Han trodde att denna inflation skulle förstöra den franska ekonomin.