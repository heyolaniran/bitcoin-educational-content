question: Je, ni sababu gani ambayo Dupont de Nemours anatoa ya kuahirisha uundaji wa Wateule?
answer: Waliokabidhiwa wataongeza bei
wrong_answers:
  - Waliokabidhiwa watatumika kuanzisha vita vya kukera
  - Waliokabidhiwa wataharibu mtaji wa kigeni
  - Migao ni ukiukaji wa haki za mali
explanation: |
  Dupont de Nemours alihofia mfumuko wa bei unaosababishwa na kazi, sarafu ya karatasi iliyotolewa na Bunge la Kitaifa. Aliamini mfumuko huu wa bei ungeharibu uchumi wa Ufaransa.