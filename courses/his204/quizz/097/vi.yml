question: Dupont de Nemours đưa ra lý do gì để trì hoãn việc thành lập Assignats?
answer: Assignats sẽ đẩy giá lên cao
wrong_answers:
  - Assignats sẽ được sử dụng để tiến hành chiến tranh tấn công
  - Assignats sẽ phá hủy vốn nước ngoài
  - Assignats là sự xâm phạm quyền sở hữu
explanation: |
  Dupont de Nemours lo sợ lạm phát do đồng Assignat, một loại tiền giấy do Quốc hội phát hành, gây ra. Ông tin rằng lạm phát này sẽ phá hủy nền kinh tế Pháp.