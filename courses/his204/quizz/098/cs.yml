question: Jak se Dupont de Nemours prezentuje ve své brožuře o asignátech?
answer: Jako přítel lidu
wrong_answers:
  - Jako králův přítel
  - Jako přítel svobody
  - Comme un Ami des Bourgeois
explanation: |
  Dupont de Nemours se prezentoval jako "přítel lidu" a zdůrazňoval svůj zájem o blaho obyvatelstva.