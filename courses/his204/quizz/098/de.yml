question: Wie stellt sich Dupont de Nemours in seiner Broschüre über Assignaten vor?
answer: Wie ein Freund des Volkes
wrong_answers:
  - Als Freund des Königs
  - Wie ein Freund der Freiheit
  - Comme un Ami des Bourgeois
explanation: |
  Dupont de Nemours präsentierte sich als "Freund des Volkes" und unterstrich damit seine Sorge um das Wohlergehen der Bevölkerung.