question: How does Dupont de Nemours present himself in his brochure on assignats?
answer: Like a Friend of the People
wrong_answers:
  - As a Friend of the King
  - Like a Friend of Freedom
  - Comme un Ami des Bourgeois
explanation: |
  Dupont de Nemours presented himself as a "Friend of the People", underlining his concern for the well-being of the population.