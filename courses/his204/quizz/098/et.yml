question: Kuidas esitab Dupont de Nemours end oma assignate käsitlevas brošüüris?
answer: Nagu rahva sõber
wrong_answers:
  - Kuninga sõbrana
  - Nagu vabaduse sõber
  - Comme un Ami des Bourgeois
explanation: |
  Dupont de Nemours esitles end kui "rahva sõpra", rõhutades oma muret elanikkonna heaolu pärast.