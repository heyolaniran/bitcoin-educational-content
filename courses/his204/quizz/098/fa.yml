question: دوپونت دو نمورز چگونه خود را در بروشور خود درباره اساینات‌ها معرفی می‌کند؟
answer: مثل یک دوست مردم
wrong_answers:
  - به عنوان یک دوست پادشاه
  - مثل یک دوست آزادی
  - مانند یک دوست بورژواها
explanation: |
  دوپونت دو نمور خود را به عنوان "دوست مردم" معرفی کرد و بر نگرانی خود برای رفاه جمعیت تأکید داشت.