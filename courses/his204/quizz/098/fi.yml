question: Millaisena Dupont de Nemours näyttäytyy assignatteja koskevassa esitteessään?
answer: Kuin kansan ystävä
wrong_answers:
  - Kuninkaan ystävänä
  - Kuin vapauden ystävä
  - Comme un Ami des Bourgeois
explanation: |
  Dupont de Nemours esiintyi "kansan ystävänä" ja korosti huolenpitoaan väestön hyvinvoinnista.