question: ड्यूपोंट डी नेमॉर्स ने अपने असाइनमेंट पर आधारित ब्रोशर में स्वयं को किस प्रकार प्रस्तुत किया है?
answer: लोगों के मित्र की तरह
wrong_answers:
  - राजा के मित्र के रूप में
  - स्वतंत्रता के मित्र की तरह
  - बुर्जुआ का मित्र बनकर
explanation: |
  ड्यूपोंट डी नेमॉर्स ने स्वयं को "जनता का मित्र" के रूप में प्रस्तुत किया तथा जनता की भलाई के प्रति अपनी चिंता को रेखांकित किया।