question: Come si presenta Dupont de Nemours nella sua brochure sugli assignat?
answer: Come un amico del popolo
wrong_answers:
  - Come amico del Re
  - Come un amico della libertà
  - Comme un Ami des Bourgeois
explanation: |
  Dupont de Nemours si presentò come "Amico del popolo", sottolineando la sua preoccupazione per il benessere della popolazione.