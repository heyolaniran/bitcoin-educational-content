question: Hvordan presenterer Dupont de Nemours seg selv i brosjyren om assignater?
answer: Som en venn av folket
wrong_answers:
  - Som en venn av kongen
  - Som en venn av frihet
  - Comme un Ami des Bourgeois
explanation: |
  Dupont de Nemours presenterte seg selv som en "folkevenn" og understreket sin omsorg for befolkningens ve og vel.