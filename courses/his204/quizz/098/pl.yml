question: Jak Dupont de Nemours przedstawia się w swojej broszurze na temat cesji?
answer: Jak przyjaciel ludzi
wrong_answers:
  - Jako przyjaciel króla
  - Jak przyjaciel wolności
  - Comme un Ami des Bourgeois
explanation: |
  Dupont de Nemours przedstawiał się jako "Przyjaciel Ludu", podkreślając swoją troskę o dobrobyt ludności.