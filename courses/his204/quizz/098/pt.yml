question: Como é que a Dupont de Nemours se apresenta na sua brochura sobre assignats?
answer: Como um amigo do povo
wrong_answers:
  - Como amigo do rei
  - Como um amigo da liberdade
  - Como um amigo dos burgueses
explanation: |
  Dupont de Nemours apresentava-se como um "Amigo do Povo", sublinhando a sua preocupação com o bem-estar da população.