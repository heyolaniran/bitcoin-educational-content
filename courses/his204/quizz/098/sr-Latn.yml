question: Kako se Dupont de Nemours predstavlja u svojoj brošuri o asignatima?
answer: Kao Prijatelj Naroda
wrong_answers:
  - Kao Prijatelj Kralja
  - Kao Prijatelj Slobode
  - Kao prijatelj građana
explanation: |
  Dupont de Nemours se predstavio kao "Prijatelj naroda", naglašavajući svoju brigu za dobrobit stanovništva.