question: Hur presenterar sig Dupont de Nemours i sin broschyr om assignats?
answer: Som en vän av folket
wrong_answers:
  - Som vän till kungen
  - Som en vän av frihet
  - Som en vän av borgare
explanation: |
  Dupont de Nemours presenterade sig själv som en "Friend of the People" och underströk sin omsorg om befolkningens välbefinnande.