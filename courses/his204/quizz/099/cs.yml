question: Jak kritizoval zákon o Caisse d'Escompte z listopadu 1789?
answer: Jedná se o monopolní podnik, který se musí řídit pravidly volné hospodářské soutěže
wrong_answers:
  - Zřizuje instituci, která bude podporovat financování útočných válek
  - Narušuje vydávání asignátů
  - Zvýhodňuje bohaté
explanation: |
  Dupont de Nemours kritizoval monopol udělený Caisse d'Escompte, protože se domníval, že brání volné soutěži a poškozuje hospodářství.