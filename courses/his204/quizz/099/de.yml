question: Wie lautete seine Kritik an dem Gesetz über die Caisse d'Escompte vom November 1789?
answer: Es handelt sich um ein Monopolunternehmen, das sich an die Regeln des freien Wettbewerbs halten muss
wrong_answers:
  - Es wird eine Institution geschaffen, die die Finanzierung von Angriffskriegen fördert
  - Sie stört die Ausgabe von Assignaten
  - Sie begünstigt die Reichen
explanation: |
  Dupont de Nemours kritisierte das der Caisse d'Escompte gewährte Monopol, da es seiner Meinung nach den freien Wettbewerb behinderte und der Wirtschaft schadete.