question: What was his criticism of the Caisse d'Escompte Act of November 1789?
answer: It is a monopoly establishment that must obey the rules of free competition
wrong_answers:
  - It establishes an institution that will encourage the financing of offensive wars
  - It disrupts the issuing of assignats
  - It favors the rich
explanation: |
  Dupont de Nemours criticized the monopoly granted to the Caisse d'Escompte, believing it hindered free competition and harmed the economy.