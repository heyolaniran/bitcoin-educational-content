question: انتقاد او از قانون Caisse d'Escompte در نوامبر 1789 چه بود؟
answer: این یک مؤسسه انحصاری است که باید از قوانین رقابت آزاد پیروی کند.
wrong_answers:
  - این یک نهاد را تأسیس می‌کند که تأمین مالی جنگ‌های تهاجمی را تشویق خواهد کرد.
  - این امر صدور اساینات‌ها را مختل می‌کند
  - این به نفع ثروتمندان است
explanation: |
  دوپون دو نمور از انحصاری که به کاس دِسکونت اعطا شده بود انتقاد کرد و معتقد بود که این امر رقابت آزاد را مختل کرده و به اقتصاد آسیب می‌رساند.