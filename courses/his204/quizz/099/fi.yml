question: Mikä oli hänen kritiikkinsä marraskuussa 1789 annettua Caisse d'Escompte -lakia kohtaan?
answer: Se on monopoli, jonka on noudatettava vapaan kilpailun sääntöjä
wrong_answers:
  - Sillä perustetaan toimielin, joka edistää hyökkäyssotien rahoitusta
  - Se häiritsee assignattien myöntämistä
  - Se suosii rikkaita
explanation: |
  Dupont de Nemours kritisoi Caisse d'Escompte -yhtiölle myönnettyä monopolia, koska se esti vapaan kilpailun ja vahingoitti taloutta.