question: Que reproche-t-il à la loi sur Caisse d’Escompte de novembre 1789 ?
answer: Elle constitue en monopole un établissement qui doit obéir aux règles de la libre concurrence
wrong_answers:
  - Elle établit un établissement qui favorisera le financement des guerres offensives
  - Elle dérègle l’émission des assignats
  - Elle favorise les riches
explanation: |
  Dupont de Nemours critiquait le monopole accordé à la Caisse d'Escompte, car il pensait que cela entravait la libre concurrence et nuisait à l'économie.
