question: नवंबर 1789 के कैस डी'एस्कोम्प्टे अधिनियम की उनकी आलोचना क्या थी?
answer: यह एक एकाधिकार प्रतिष्ठान है जिसे मुक्त प्रतिस्पर्धा के नियमों का पालन करना होगा
wrong_answers:
  - यह एक ऐसी संस्था की स्थापना करेगा जो आक्रामक युद्धों के वित्तपोषण को प्रोत्साहित करेगी
  - यह असाइनमेंट जारी करने में बाधा डालता है
  - यह अमीरों का पक्षधर है
explanation: |
  ड्यूपॉन्ट डी नेमॉर्स ने कैस डी'एस्कोम्प्टे को दिए गए एकाधिकार की आलोचना की, उनका मानना ​​था कि इससे मुक्त प्रतिस्पर्धा में बाधा उत्पन्न हुई और अर्थव्यवस्था को नुकसान पहुंचा।