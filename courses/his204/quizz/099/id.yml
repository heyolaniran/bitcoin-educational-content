question: Apa kritiknya terhadap Undang-Undang Caisse d'Escompte pada November 1789?
answer: Ini adalah perusahaan monopoli yang harus mematuhi aturan persaingan bebas
wrong_answers:
  - Membentuk sebuah lembaga yang akan mendorong pembiayaan perang ofensif
  - Ini mengganggu penerbitan assignat
  - Ini menguntungkan orang kaya
explanation: |
  Dupont de Nemours mengkritik monopoli yang diberikan kepada Caisse d'Escompte, karena mereka percaya bahwa monopoli tersebut menghambat persaingan bebas dan merugikan perekonomian.