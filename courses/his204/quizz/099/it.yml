question: Qual è la sua critica alla legge sulla Caisse d'Escompte del novembre 1789?
answer: È uno stabilimento monopolistico che deve rispettare le regole della libera concorrenza
wrong_answers:
  - Crea un'istituzione che incoraggia il finanziamento delle guerre offensive
  - Interrompe l'emissione di assignat
  - Favorisce i ricchi
explanation: |
  Dupont de Nemours criticò il monopolio concesso alla Caisse d'Escompte, ritenendo che ostacolasse la libera concorrenza e danneggiasse l'economia.