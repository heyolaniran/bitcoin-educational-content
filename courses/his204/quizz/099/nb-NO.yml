question: Hva var hans kritikk av Caisse d'Escompte-loven fra november 1789?
answer: Det er en monopolvirksomhet som må følge reglene for fri konkurranse
wrong_answers:
  - Den etablerer en institusjon som vil oppmuntre til finansiering av offensive kriger
  - Det forstyrrer utstedelsen av assignater
  - Det favoriserer de rike
explanation: |
  Dupont de Nemours kritiserte monopolet som Caisse d'Escompte hadde fått, og mente at det hindret fri konkurranse og skadet økonomien.