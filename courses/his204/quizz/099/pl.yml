question: Jaka była jego krytyka ustawy Caisse d'Escompte z listopada 1789 r.?
answer: Jest to zakład monopolistyczny, który musi przestrzegać zasad wolnej konkurencji
wrong_answers:
  - Ustanawia instytucję, która będzie zachęcać do finansowania wojen ofensywnych
  - Zakłóca to wydawanie przydziałów
  - Faworyzuje bogatych
explanation: |
  Dupont de Nemours krytykował monopol przyznany Caisse d'Escompte, uważając, że utrudnia on wolną konkurencję i szkodzi gospodarce.