question: В чем заключалась его критика закона о кассе д'Эскомпт от ноября 1789 года?
answer: Это монопольное учреждение, которое должно подчиняться правилам свободной конкуренции
wrong_answers:
  - Он создает институт, который будет поощрять финансирование наступательных войн
  - Это нарушает эмиссию ассигнаций
  - Она благоприятствует богатым
explanation: |
  Дюпон де Немур критиковал монополию, предоставленную Caisse d'Escompte, считая, что она препятствует свободной конкуренции и наносит ущерб экономике.