question: Kakva je bila njegova kritika Zakona o Caisse d'Escompte iz novembra 1789?
answer: To je monopolistička ustanova koja mora poštovati pravila slobodne konkurencije.
wrong_answers:
  - Osniva instituciju koja će podsticati finansiranje ofanzivnih ratova
  - To ometa izdavanje asignata
  - To favorizuje bogate
explanation: |
  Dupont de Nemours je kritikovao monopol dodeljen Caisse d'Escompte, verujući da ometa slobodnu konkurenciju i šteti ekonomiji.