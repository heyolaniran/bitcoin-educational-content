question: Vad var hans kritik mot Caisse d'Escompte-lagen från november 1789?
answer: Det är en monopolinrättning som måste följa reglerna för fri konkurrens
wrong_answers:
  - Det inrättar en institution som kommer att uppmuntra finansiering av anfallskrig
  - Det stör utgivningen av assignater
  - Det gynnar de rika
explanation: |
  Dupont de Nemours kritiserade Caisse d'Escomptes monopol och menade att det hindrade den fria konkurrensen och skadade ekonomin.