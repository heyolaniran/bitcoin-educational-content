question: Ukosoaji wake wa Sheria ya Caisse d'Escompte ya Novemba 1789 ulikuwa upi?
answer: Ni uanzishwaji wa ukiritimba ambao lazima utii sheria za ushindani huru
wrong_answers:
  - Inaanzisha taasisi ambayo itahimiza ufadhili wa vita vya kukera
  - Inavuruga utoaji wa kazi
  - Inapendelea matajiri
explanation: |
  Dupont de Nemours alikosoa ukiritimba uliotolewa kwa Caisse d'Escompte, akiamini kuwa unazuia ushindani wa bure na kudhuru uchumi.