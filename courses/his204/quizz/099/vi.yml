question: Ông chỉ trích Đạo luật Caisse d'Escompte tháng 11 năm 1789 như thế nào?
answer: Đó là một cơ sở độc quyền phải tuân theo các quy tắc cạnh tranh tự do
wrong_answers:
  - Nó thiết lập một thể chế khuyến khích tài trợ cho các cuộc chiến tranh tấn công
  - Nó làm gián đoạn việc phát hành các lệnh chuyển nhượng
  - Nó ủng hộ người giàu
explanation: |
  Dupont de Nemours chỉ trích việc độc quyền được cấp cho Caisse d'Escompte, tin rằng điều này cản trở sự cạnh tranh tự do và gây hại cho nền kinh tế.