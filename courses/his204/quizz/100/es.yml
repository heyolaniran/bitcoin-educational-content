question: Which banking establishment is the ultimate consequence of the choices made in 1789, against which Dupont de Nemours spoke out?
answer: Banque de France
wrong_answers:
  - The Savings Bank
  - Crédit Agricole
  - The European Central Bank
explanation: |
  The Banque de France is a consequence of the choices made in 1789, which Dupont de Nemours criticized for leading to excessive centralization of financial power and excessive state intervention in the economy.