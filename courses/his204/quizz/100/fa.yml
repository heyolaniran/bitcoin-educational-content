question: کدام مؤسسه بانکی نتیجه نهایی انتخاب‌های انجام شده در سال 1789 است که علیه آن دوپونت دو نمورز سخن گفت؟
answer: بانک فرانسه
wrong_answers:
  - بانک پس‌انداز
  - کریدیت اگریکول
  - بانک مرکزی اروپا
explanation: |
  بانک فرانسه نتیجه انتخاب‌هایی است که در سال ۱۷۸۹ انجام شد و دوپونت د نمور آن‌ها را به دلیل منجر شدن به تمرکز بیش از حد قدرت مالی و مداخله بیش از حد دولت در اقتصاد مورد انتقاد قرار داد.