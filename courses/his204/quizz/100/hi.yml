question: कौन सी बैंकिंग स्थापना 1789 में लिए गए निर्णयों का अंतिम परिणाम है, जिसके खिलाफ ड्यूपोंट डी नेमॉर्स ने आवाज उठाई थी?
answer: बैंक डे फ्रांस
wrong_answers:
  - बचत बैंक
  - क्रेडिट एग्रीकोल
  - यूरोपीय सेंट्रल बैंक
explanation: |
  बैंक डी फ्रांस 1789 में लिए गए निर्णयों का परिणाम है, जिसकी ड्यूपोंट डी नेमॉर्स ने आलोचना की थी, क्योंकि इससे वित्तीय शक्ति का अत्यधिक केंद्रीकरण हुआ और अर्थव्यवस्था में राज्य का अत्यधिक हस्तक्षेप हुआ।