question: Pendirian perbankan manakah yang merupakan konsekuensi utama dari pilihan yang dibuat pada tahun 1789, yang ditentang oleh Dupont de Nemours?
answer: Banque de France
wrong_answers:
  - Bank Tabungan
  - Crédit Agricole
  - Bank Sentral Eropa
explanation: |
  Banque de France adalah konsekuensi dari pilihan yang dibuat pada tahun 1789, yang dikritik oleh Dupont de Nemours karena mengarah pada sentralisasi kekuatan keuangan yang berlebihan dan intervensi negara yang berlebihan dalam perekonomian.