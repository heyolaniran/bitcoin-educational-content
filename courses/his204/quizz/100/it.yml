question: Quale istituto bancario è la conseguenza ultima delle scelte del 1789, contro cui Dupont de Nemours si era espresso?
answer: Banque de France
wrong_answers:
  - La Cassa di Risparmio
  - Crédit Agricole
  - La Banca Centrale Europea
explanation: |
  La Banque de France è una conseguenza delle scelte fatte nel 1789, che Dupont de Nemours criticò per aver portato a un'eccessiva centralizzazione del potere finanziario e a un eccessivo intervento dello Stato nell'economia.