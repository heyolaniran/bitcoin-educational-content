question: Hvilket bankvesen er den ytterste konsekvensen av de valgene som ble tatt i 1789, og som Dupont de Nemours tok til orde mot?
answer: Banque de France
wrong_answers:
  - Sparebanken
  - Crédit Agricole
  - Den europeiske sentralbanken
explanation: |
  Banque de France er en konsekvens av valgene som ble tatt i 1789, og som Dupont de Nemours kritiserte for å føre til en overdreven sentralisering av finansmakten og overdreven statlig innblanding i økonomien.