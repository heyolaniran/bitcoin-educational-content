question: Que instituição bancária é a consequência final das opções tomadas em 1789, contra as quais Dupont de Nemours se pronunciou?
answer: Banco de França
wrong_answers:
  - A Caixa de Poupança
  - Crédito Agrícola
  - O Banco Central Europeu
explanation: |
  O Banco de França é uma consequência das opções tomadas em 1789, que Dupont de Nemours criticou por conduzirem a uma centralização excessiva do poder financeiro e a uma intervenção excessiva do Estado na economia.