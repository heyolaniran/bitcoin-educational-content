question: Какое банковское учреждение стало конечным следствием выбора, сделанного в 1789 году, против которого выступал Дюпон де Немур?
answer: Банк де Франс
wrong_answers:
  - Сберегательный банк
  - Креди Агриколь
  - Европейский центральный банк
explanation: |
  Банк Франции - это следствие выбора, сделанного в 1789 году, который Дюпон де Немур критиковал за то, что он привел к чрезмерной централизации финансовой власти и чрезмерному вмешательству государства в экономику.