question: Cơ sở ngân hàng nào là hệ quả cuối cùng của những lựa chọn được đưa ra vào năm 1789, mà Dupont de Nemours đã lên tiếng phản đối?
answer: Ngân hàng Pháp
wrong_answers:
  - Ngân hàng tiết kiệm
  - Tín dụng Agricole
  - Ngân hàng Trung ương Châu Âu
explanation: |
  Ngân hàng Pháp là hệ quả của những lựa chọn được đưa ra vào năm 1789, bị Dupont de Nemours chỉ trích vì dẫn đến sự tập trung quyền lực tài chính quá mức và sự can thiệp quá mức của nhà nước vào nền kinh tế.