question: هدف اصلی Lightning Network چیست؟
answer: برای بهبود مقیاس‌پذیری Bitcoin به منظور امکان‌پذیر ساختن پرداخت‌های سریع و کم‌هزینه
wrong_answers:
  - حذف هزینه‌های تراکنش در Bitcoin Blockchain
  - ایجاد یک جایگزین برای Bitcoin جهت پرداخت‌های با ارزش بالا
  - مبادلات بین ارزهای دیجیتال مختلف را ساده کنید
explanation: |
  Lightning Network هدف دارد تا مقیاس‌پذیری Bitcoin را با امکان‌پذیر ساختن تراکنش‌های سریع و ارزان از طریق کانال‌های پرداخت off-chain بهبود بخشد.
reviewed: false