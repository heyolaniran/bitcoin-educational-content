question: Lightning Network का मुख्य लक्ष्य क्या है?
answer: तीव्र और कम लागत वाले भुगतान को सक्षम करने के लिए Bitcoin की मापनीयता में सुधार करना
wrong_answers:
  - Bitcoin Blockchain पर लेनदेन शुल्क समाप्त करें
  - उच्च मूल्य भुगतान के लिए Bitcoin का विकल्प तैयार करना
  - विभिन्न क्रिप्टोकरेंसी के बीच आदान-प्रदान को सरल बनाएं
explanation: |
  Lightning Network का लक्ष्य off-chain भुगतान चैनलों के माध्यम से तीव्र और सस्ते लेनदेन को सक्षम करके Bitcoin की मापनीयता को बढ़ाना है।
reviewed: false