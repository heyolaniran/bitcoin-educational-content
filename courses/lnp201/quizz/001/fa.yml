question: در یک کانال پرداخت، ظرفیت کانال چقدر است؟
answer: مجموع کل وجوهی که دو شرکت‌کننده می‌توانند Exchange
wrong_answers:
  - مدت زمانی که کانال می‌تواند باز بماند
  - حداکثر مبلغی که یک شرکت‌کننده می‌تواند در یک تراکنش واحد ارسال کند
  - تعداد تراکنش‌هایی که یک کانال می‌تواند در روز پشتیبانی کند
explanation: |
  ظرفیت کانال با کل وجوه دو شرکت‌کننده مطابقت دارد و ثابت می‌ماند تا مبادلات ممکن را تعیین کند.
reviewed: false