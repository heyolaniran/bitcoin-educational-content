question: اگر Alice تعداد 40,000 ساتوشی به Bob از یک کانال پرداخت ارسال کند که در ابتدا 100,000 ساتوشی دارد، پس از تراکنش چقدر بودجه برای او باقی می‌ماند؟
answer: ۶۰,۰۰۰ ساتوشی
wrong_answers:
  - ۳۰,۰۰۰ ساتوشی
  - ۴۰,۰۰۰ ساتوشی
  - ۱۴۰,۰۰۰ ساتوشی
explanation: |
  پس از ارسال ۴۰,۰۰۰ ساتوشی، موجودی Alice در کانال ۶۰,۰۰۰ ساتوشی است.
reviewed: false