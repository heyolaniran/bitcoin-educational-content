question: यदि Alice किसी भुगतान चैनल से Bob को 40,000 सातोशी भेजती है, जहां उसके पास आरंभ में 100,000 सातोशी हैं, तो लेनदेन के बाद उसके पास कितनी धनराशि शेष बचेगी?
answer: 60,000 सातोशी
wrong_answers:
  - 30,000 सातोशी
  - 40,000 सातोशी
  - 140,000 सातोशी
explanation: |
  40,000 सातोशी भेजने के बाद, चैनल में Alice का शेष 60,000 सातोशी है।
reviewed: false