question: قانون اصلی در مورد وجوهی که یک شرکت‌کننده می‌تواند در یک کانال پرداخت ارسال کند چیست؟
answer: آن‌ها فقط می‌توانند وجوه را از سمت خودشان در کانال ارسال کنند.
wrong_answers:
  - آنها می‌توانند تا نیمی از ظرفیت کل کانال را ارسال کنند.
  - آنها می‌توانند هر مبلغی را ارسال کنند، به شرطی که توافق قبلی وجود داشته باشد.
  - آن‌ها می‌توانند در صورت نیاز از طرف دیگر شرکت‌کننده وجوه قرض بگیرند.
explanation: |
  هر شرکت‌کننده به میزان ساتوشی‌هایی که در کانال برای تراکنش‌های خود دارد محدود می‌شود، که اطمینان حاصل می‌کند که همیشه وجوه پوشش داده شده‌اند.
reviewed: false