question: Qual è la regola principale riguardo ai fondi che un partecipante può inviare in un canale di pagamento?
answer: Può inviare solo i fondi presenti dal proprio lato del canale.
wrong_answers:
  - Può inviare fino alla metà della capacità totale del canale.
  - Può inviare qualsiasi importo, purché ci sia un accordo precedente.
  - Può prendere in prestito fondi dal lato dell'altro partecipante se necessario.
explanation: |
 Per le proprie transazioni, ogni partecipante è limitato dalla quantità di satoshi che possiede nel canale, garantendo che i fondi siano sempre coperti.
reviewed: true
