question: Lightning Network چه امکاناتی را در مقایسه با تراکنش‌های سنتی در Bitcoin Blockchain فراهم می‌کند؟
answer: تراکنش‌های سریع با کارمزدهای حداقلی
wrong_answers:
  - تراکنش‌های ناشناس و غیرقابل ردیابی
  - تراکنش‌ها در مقادیر زیاد بدون محدودیت حجم
  - تراکنش‌ها بین بلاکچین‌های مختلف
explanation: |
  Lightning Network تراکنش‌های سریع و کم‌هزینه را از طریق کانال‌های پرداخت off-chain امکان‌پذیر می‌سازد، که با تراکنش‌های معمولی در Blockchain متفاوت است.
reviewed: false