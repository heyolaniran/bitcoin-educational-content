question: نقش اصلی کلید خصوصی در سیستم Bitcoin چیست؟
answer: تراکنش‌ها را برای برآورده کردن یک اسکریپت امضا کنید
wrong_answers:
  - به عنوان یک شناسه برای دریافت بیت‌کوین‌ها عمل کنید
  - ذخیره امن وجوه بر روی Blockchain
  - ایجاد اسکریپت‌های قفل‌گذاری برای محافظت از بیت‌کوین‌ها
explanation: |
  کلید خصوصی برای امضای تراکنش‌ها به منظور برآورده کردن یک اسکریپت و باز کردن قفل بیت‌کوین‌ها استفاده می‌شود.
reviewed: false