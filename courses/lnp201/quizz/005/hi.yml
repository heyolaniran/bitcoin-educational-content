question: Bitcoin प्रणाली में निजी कुंजी की प्राथमिक भूमिका क्या है?
answer: स्क्रिप्ट को संतुष्ट करने के लिए लेनदेन पर हस्ताक्षर करें
wrong_answers:
  - बिटकॉइन प्राप्त करने के लिए पहचानकर्ता के रूप में कार्य करें
  - Blockchain पर सुरक्षित रूप से धन संग्रहित करें
  - बिटकॉइन की सुरक्षा के लिए लॉकिंग स्क्रिप्ट बनाएं
explanation: |
  निजी कुंजी का उपयोग स्क्रिप्ट को संतुष्ट करने और बिटकॉइन को अनलॉक करने के लिए लेनदेन पर हस्ताक्षर करने के लिए किया जाता है।
reviewed: false