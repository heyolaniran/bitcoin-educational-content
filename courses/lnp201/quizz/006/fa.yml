question: UTXO در زمینه Bitcoin چیست؟
answer: یک قطعه بیت‌کوین خرج‌نشده مرتبط با یک اسکریپت
wrong_answers:
  - یک تراکنش کاملاً تأیید شده در Blockchain
  - کلید عمومی که آدرس‌های Bitcoin تولید می‌کند
  - مقداری از Bitcoin به چندین بخش تقسیم شده است.
explanation: |
  یک UTXO، یا خروجی تراکنش خرج‌نشده، یک خروجی تراکنش خرج‌نشده است که نشان‌دهنده مقدار معینی از بیت‌کوین‌ها است که دارنده می‌تواند از آن استفاده کند.
reviewed: false