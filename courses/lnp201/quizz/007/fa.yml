question: چرا UTXOها اغلب با اسکناس‌ها مقایسه می‌شوند؟
answer: آنها باید به طور کامل خرج شوند
wrong_answers:
  - آنها می‌توانند چندین بار تا زمان اتمام استفاده شوند
  - آنها فقط در معاملات خاصی قابل استفاده هستند
  - آن‌ها مقادیر ثابت کوچکی از بیت‌کوین‌ها را نمایندگی می‌کنند.
explanation: |
  مانند یک اسکناس، یک UTXO باید به طور کامل در یک تراکنش خرج شود و هر گونه مازاد به عنوان پول خرد به فرستنده بازگردانده شود.
reviewed: false