question: یک امضای چندگانه ۲/۲ Address چگونه در Bitcoin کار می‌کند؟
answer: برای باز کردن و خرج کردن وجوه به دو امضا نیاز است.
wrong_answers:
  - این امکان را می‌دهد که با استفاده از تنها یکی از دو کلید، وجوه را خرج کنید.
  - این تنها در موارد خاص قفل کردن، تراکنش‌ها را مجاز می‌کند.
  - فقط برای ارسال وجوه به آدرس‌های عمومی استفاده می‌شود.
explanation: |
  یک امضای چندگانه ۲/۲ Address نیاز به امضای هر دو طرف درگیر دارد تا وجوه خرج شود، که برای امنیت کانال‌های Lightning استفاده می‌شود.
reviewed: false