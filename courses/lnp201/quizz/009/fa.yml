question: در یک تراکنش Bitcoin، اسکریپت قفل‌کننده چه کاری انجام می‌دهد؟
answer: این شرایط خاصی را برای خرج کردن وجوه مرتبط تحمیل می‌کند
wrong_answers:
  - به‌طور خودکار وجوه را به چندین آدرس ارسال می‌کند
  - این مقدار UTXO که باید ایجاد شود را تعیین می‌کند
  - به طور موقت وجوه را قفل می‌کند تا از خرج کردن بیش از حد جلوگیری کند
explanation: |
  اسکریپت قفل‌گذاری شرایطی را اعمال می‌کند، مانند امضا با یک کلید خصوصی، تا وجوه در یک تراکنش باز و استفاده شود.
reviewed: false