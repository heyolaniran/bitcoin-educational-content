question: اولین گام در باز کردن یک کانال لایتنینگ بین دو شرکت‌کننده چیست؟
answer: پیام‌های Exchange حاوی مقادیر و کلیدهای عمومی
wrong_answers:
  - بلافاصله یک تراکنش واریز را در Blockchain منتشر کنید
  - ایجاد یک Address چندامضایی ۲/۲ بدون Exchange قبلی
  - تراکنش برداشت را قبل از Exchange کلیدهای عمومی امضا کنید
explanation: |
  افتتاح یک کانال با یک Exchange از پیام‌ها بین دو طرف آغاز می‌شود، جایی که آن‌ها مقادیر مورد نظر برای تعهد و کلیدهای عمومی خود را به اشتراک می‌گذارند.
reviewed: false