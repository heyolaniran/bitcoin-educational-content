question: दो प्रतिभागियों के बीच लाइटनिंग चैनल खोलने में पहला कदम क्या है?
answer: Exchange संदेश जिसमें राशियाँ और सार्वजनिक कुंजियाँ शामिल हैं
wrong_answers:
  - Blockchain पर जमा लेनदेन को तुरंत प्रकाशित करें
  - बिना किसी पूर्व Exchange के 2/2 मल्टीसिग्नेचर Address बनाएं
  - सार्वजनिक कुंजियों के Exchange से पहले निकासी लेनदेन पर हस्ताक्षर करें
explanation: |
  चैनल का उद्घाटन दो पक्षों के बीच संदेशों के Exchange से शुरू होता है, जहां वे अपनी इच्छित राशि और अपनी सार्वजनिक कुंजी साझा करते हैं।
reviewed: false