question: چرا Alice قبل از انتشار تراکنش واریز، تراکنش برداشت ایجاد می‌کند؟
answer: برای بازیابی وجوه او در صورت بروز مشکل با Bob
wrong_answers:
  - برای افزایش ظرفیت کانال با هر تراکنش
  - برای انجام یک تراکنش Lightning بلافاصله پس از باز کردن
  - برای اجازه دادن به Bob برای خرج کردن مستقیم وجوه
explanation: |
  Alice یک تراکنش برداشت ایجاد می‌کند تا در صورت بروز مشکل با Bob، وجوه خود را بازیابی کند و بدین ترتیب امنیت سپرده‌اش را تضمین کند.
reviewed: false