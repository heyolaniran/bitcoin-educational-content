question: یک کانال لایتنینگ چه زمانی به طور رسمی باز می‌شود؟
answer: وقتی تراکنش واریز در Bitcoin Blockchain تأیید می‌شود
wrong_answers:
  - به محض اینکه کلیدهای عمومی بین شرکت‌کنندگان مبادله شوند
  - هنگامی که تراکنش برداشت توسط هر دو طرف امضا شود
  - به محض ایجاد Address چندامضایی 2/2
explanation: |
  کانال زمانی باز تلقی می‌شود که تراکنش واریز در یک بلوک Bitcoin گنجانده شده و به تعداد مشخصی از تأییدیه‌ها رسیده باشد.
reviewed: false