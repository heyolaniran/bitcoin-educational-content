question: Quando si considera ufficialmente aperto un canale Lightning?
answer: Quando la transazione di deposito viene confermata sulla blockchain di Bitcoin
wrong_answers:
  - Non appena vengono scambiate le chiavi pubbliche tra i partecipanti
  - Quando la transazione di prelievo viene firmata da entrambe le parti
  - Non appena viene creato l'indirizzo multisignature 2/2
explanation: |
  Il canale si considera aperto una volta che la transazione di deposito è stata inclusa in un blocco e ha raggiunto un certo numero di conferme.
reviewed: true
