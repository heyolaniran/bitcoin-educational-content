question: اگر Alice امضای Bob را برای تراکنش برداشت دریافت نکند، چه اتفاقی می‌افتد؟
answer: او ریسک از دست دادن دسترسی به وجوه خود را که در چندامضایی Address سپرده‌گذاری شده‌اند، دارد.
wrong_answers:
  - او دیگر نمی‌تواند با Bob روی Lightning Network ارتباط برقرار کند.
  - کانال با ظرفیت محدود باز می‌شود
  - Bob به‌طور خودکار وجوه را در کانال دریافت می‌کند.
explanation: |
  بدون امضای Bob بر روی تراکنش برداشت، Alice نمی‌تواند در صورت بروز مشکل، بازیابی وجوه خود را تضمین کند که این امر خطر از دست دادن را به همراه دارد.
reviewed: false