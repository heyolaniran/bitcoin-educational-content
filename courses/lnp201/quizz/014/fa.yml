question: آخرین مرحله برای باز کردن یک کانال در Lightning Network چیست؟
answer: انتشار تراکنش واریز در Bitcoin Blockchain
wrong_answers:
  - یک تراکنش برداشت را برای بازیابی وجوه امضا کنید
  - پیام تأیید افتتاحیه را به طرف دیگر ارسال کنید.
  - موجودی وجوه هر شرکت‌کننده را تأیید کنید
explanation: |
  آخرین مرحله برای باز کردن یک کانال، انتشار تراکنش واریز در Blockchain است که به طور رسمی کانال را باز می‌کند.
reviewed: false