question: Cosa rappresenta una commitment transaction in un canale Lightning?
answer: La nuova distribuzione dei fondi tra le due parti
wrong_answers:
  - Il numero totale delle transazioni effettuate
  - L'importo delle fee da pagare per la transazione
  - L'apertura di un nuovo canale di pagamento
explanation: |
  Una commitment transaction rappresenta l'attuale distribuzione dei fondi nel canale dopo ogni pagamento Lightning, ma non viene pubblicata sulla blockchain finché il canale rimane aperto.
reviewed: true
