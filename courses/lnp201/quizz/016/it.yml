question: Quando viene pubblicata una commitment transaction sulla blockchain di Bitcoin?
answer: Alla fine, quando il canale viene chiuso
wrong_answers:
  - Immediatamente dopo ogni trasferimento nel canale
  - Prima di ogni nuova commitment transaction
  - Quando i fondi disponibili sono esauriti
explanation: |
  Le commitment transaction sono costruite e firmate per ogni cambiamento nella distribuzione dei fondi, ma sono pubblicate sulla blockchain solo alla fine, in caso di chiusura del canale.
reviewed: true
