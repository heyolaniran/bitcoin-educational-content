question: یک حالت کانال جدید چگونه پس از هر انتقال ایجاد می‌شود؟
answer: با ایجاد یک Commitment Transaction جدید با توزیع به‌روز شده
wrong_answers:
  - با ارسال یک تراکنش On-Chain پس از هر انتقال
  - با افزایش ظرفیت کل کانال
  - با بستن و باز کردن مجدد کانال پس از هر تراکنش
explanation: |
  هر تراکنش درون کانال، وضعیت کانال را با یک Commitment Transaction جدید به‌روزرسانی می‌کند که توزیع فعلی وجوه بین دو شرکت‌کننده را نشان می‌دهد.
reviewed: false