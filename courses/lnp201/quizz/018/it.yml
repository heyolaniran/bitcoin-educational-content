question: Come viene creato un nuovo stato del canale dopo ogni trasferimento?
answer: Creando una nuova commitment transaction con la distribuzione aggiornata
wrong_answers:
  - Inviando una transazione on-chain dopo ogni trasferimento
  - Aumentando la capacità totale del canale
  - Chiudendo e riaprendo il canale dopo ogni transazione
explanation: |
  Ogni transazione all'interno del canale aggiorna lo stato con una nuova commitment transaction, riflettendo la nuova distribuzione dei fondi tra i due partecipanti.
reviewed: true
