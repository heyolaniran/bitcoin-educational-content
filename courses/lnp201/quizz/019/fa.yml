question: سیستم Commitment Transaction چه چیزی را برای شرکت‌کنندگان یک کانال Lightning تضمین می‌کند؟
answer: که هر کدام می‌توانند با انتشار آخرین تراکنش امضا شده، وجوه خود را بازیابی کنند.
wrong_answers:
  - که تراکنش‌ها در Bitcoin Blockchain قابل مشاهده هستند
  - که ظرفیت کانال با هر تراکنش افزایش می‌یابد
  - که هزینه‌ها بین دو شرکت‌کننده تقسیم می‌شود
explanation: |
  تراکنش‌های امضاشده Commitment تضمین می‌کنند که هر شرکت‌کننده می‌تواند با انتشار آخرین نسخه در صورت بسته شدن کانال، وجوه خود را بازیابی کند.
reviewed: false