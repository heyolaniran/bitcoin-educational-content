question: خطر اصلی در تراکنش‌های Commitment بر روی Lightning Network چیست؟
answer: انتشار یک تراکنش قدیمی برای بازپس‌گیری وجوه بیشتر
wrong_answers:
  - فراموش کردن امضای Commitment Transaction
  - به طور تصادفی ارسال وجوه به کانال دیگر
  - مسدود کردن تراکنش با یک قفل زمانی نامناسب
explanation: |
  خطر اصلی این است که یک طرف ممکن است تلاش کند با انتشار یک Commitment Transaction قدیمی تقلب کند، که می‌تواند به آن‌ها اجازه دهد وجوهی را که دیگر ندارند، بازپس بگیرند.
reviewed: false