question: Qual è il principale rischio rappresentato dalle commitment transaction in Lightning Network?
answer: Pubblicare una vecchia transazione per recuperare più fondi
wrong_answers:
  - Dimenticare di firmare la commitment transaction
  - Inviare accidentalmente fondi a un altro canale
  - Bloccare la transazione con un timelock inappropriato
explanation: |
  Il principale rischio è che una parte possa tentare di barare pubblicando una vecchia commitment transaction, il che potrebbe permetterle di recuperare fondi che non ha più.
reviewed: true
