question: چگونه تایملوک از تقلب در تراکنش‌های Commitment محافظت می‌کند؟
answer: این امر مانع از آن می‌شود که طرف متخلف فوراً وجوه خود را بازیابی کند.
wrong_answers:
  - به طور خودکار وجوه را به متقلب بازپرداخت می‌کند.
  - در صورت تلاش برای تقلب، تراکنش را لغو می‌کند.
  - این استفاده از کلید ابطال را مسدود می‌کند
explanation: |
  قفل زمانی تأخیری را اعمال می‌کند که در طی آن متقلب نمی‌تواند وجوه خود را بازیابی کند، بنابراین به طرف دیگر فرصت پاسخ‌گویی می‌دهد.
reviewed: false