question: کلید ابطال در صورت تقلب چه کاری را امکان‌پذیر می‌سازد؟
answer: تمام وجوه را با مجازات متقلب بازیابی کنید.
wrong_answers:
  - لغو Commitment Transaction
  - ظرفیت کانال را دو برابر کنید
  - از انجام هرگونه تراکنش بیشتر در کانال جلوگیری کنید
explanation: |
  کلید ابطال به طرف متضرر اجازه می‌دهد تا در صورت تلاش برای تقلب توسط طرف دیگر، تمام وجوه را بازیابی کند.
