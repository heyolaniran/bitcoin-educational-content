question: چرا Alice و Bob اسرار خود را برای تراکنش‌های قبلی Commitment به Exchange می‌دهند؟
answer: برای اینکه هر یک بتوانند از خود محافظت کنند اگر دیگری یک تراکنش قدیمی را منتشر کند
wrong_answers:
  - برای افزایش ظرفیت کانال
  - برای مسدود کردن دسترسی یکدیگر به وجوه
  - برای تقسیم مساوی وجوه
explanation: |
  مبادله اسرار برای تراکنش‌های قبلی به هر شرکت‌کننده اجازه می‌دهد تا در صورت تلاش برای تقلب با انتشار یک تراکنش قدیمی، دیگری را مجازات کند.
reviewed: false