question: تأثیر ترکیبی قفل زمانی و کلید ابطال بر روی تراکنش‌های Commitment چیست؟
answer: آن‌ها با ارائه یک مجازات فوری، شرکت‌کنندگان را از تقلب بازمی‌دارند.
wrong_answers:
  - آن‌ها ظرفیت کانال را در صورت تقلب کاهش می‌دهند.
  - آن‌ها به‌طور خودکار وجوه طرف مقصر را قفل می‌کنند.
  - اگر تراکنش نادرست باشد، آنها مجبور به باز کردن یک کانال جدید می‌شوند.
explanation: |
  قفل زمانی و کلید ابطال، با اطمینان از اینکه هرگونه تلاش برای تقلب منجر به از دست دادن فوری وجوه برای طرف مقصر می‌شود، از تقلب شرکت‌کنندگان جلوگیری می‌کنند.
reviewed: false