question: سه روش بستن یک کانال در Lightning Network چیست؟
answer: بسته شدن تعاونی، بسته شدن اجباری، بسته شدن با تقلب
wrong_answers:
  - بسته شدن سریع، بسته شدن آهسته، بسته شدن با امضای دوگانه
  - بستن ایمن، بستن خودکار، بستن با از دست دادن وجوه
  - بستن مستقیم، بستن غیرمستقیم، بستن با ادعا
explanation: |
  سه روش وجود دارد: بستن تعاونی که در آن طرفین توافق می‌کنند، بستن اجباری بدون پاسخ از یک طرف، و بستن با تقلب که در آن یک طرف سعی می‌کند یک تراکنش قدیمی را منتشر کند.
reviewed: false