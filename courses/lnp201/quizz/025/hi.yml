question: Lightning Network पर चैनल बंद करने की तीन विधियाँ क्या हैं?
answer: सहकारी बंद, जबरन बंद, धोखाधड़ी के साथ बंद
wrong_answers:
  - तीव्र समापन, धीमा समापन, दोहरे हस्ताक्षर के साथ समापन
  - सुरक्षित समापन, स्वचालित समापन, धन की हानि के साथ समापन
  - प्रत्यक्ष समापन, अप्रत्यक्ष समापन, दावे के साथ समापन
explanation: |
  इसके तीन तरीके हैं: सहकारी समापन, जिसमें पक्ष सहमत होते हैं, एक पक्ष की प्रतिक्रिया के बिना बलपूर्वक समापन, तथा धोखाधड़ी के साथ समापन, जिसमें कोई पक्ष पुराने लेनदेन को प्रकाशित करने का प्रयास करता है।
reviewed: false