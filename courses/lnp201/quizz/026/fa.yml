question: کدام روش بستن کانال اقتصادی‌ترین و سریع‌ترین است؟
answer: بسته شدن تعاونی
wrong_answers:
  - تعطیلی اجباری
  - بستن با خیانت
  - هیچ‌کدام اقتصادی‌تر و سریع‌تر نیستند
explanation: |
  بستن تعاونی سریع‌ترین و اقتصادی‌ترین روش است زیرا هر دو طرف توافق می‌کنند که کانال را ببندند و هزینه‌ها را بر اساس شرایط بازار تنظیم کنند.
reviewed: false