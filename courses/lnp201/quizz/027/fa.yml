question: چرا تعطیلی اجباری کمتر مطلوب است؟
answer: کندتر است و هزینه‌ها ممکن است نامناسب باشند
wrong_answers:
  - این نیاز به مجوز از Satoshi ناکاموتو دارد
  - این امر بازآفرینی یک کانال را در آینده مجبور می‌کند.
  - این از استفاده از کلید ابطال جلوگیری می‌کند
explanation: |
  بسته شدن اجباری کمتر مطلوب است زیرا شامل یک قفل زمانی است که فرآیند را کند می‌کند و هزینه‌ها ممکن است نامناسب باشند زیرا در زمان ایجاد کانال تعیین شده‌اند.
reviewed: false