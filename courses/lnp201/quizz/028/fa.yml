question: Bob در صورت تشخیص تلاش Alice برای تقلب در حین بستن کانال چه کاری می‌تواند انجام دهد؟
answer: از کلید ابطال برای بازیابی تمام وجوه استفاده کنید
wrong_answers:
  - لغو Alice's Commitment Transaction
  - کانال را به طور دائمی ببندید بدون گزینه‌ای برای بازگشایی مجدد
  - فقط نیمی از وجوه موجود را مطالبه کنید
explanation: |
  در صورت تقلب، Bob می‌تواند با استفاده از کلید لغو، تمام وجوه را از کانال بازیابی کند و بدین ترتیب Alice را به خاطر تلاشش مجازات کند.
