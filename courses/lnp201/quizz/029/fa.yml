question: در چه شرایطی از بسته شدن اجباری یک کانال استفاده می‌شود؟
answer: وقتی یکی از طرفین دیگر پاسخ نمی‌دهد
wrong_answers:
  - هنگامی که ظرفیت کانال نیاز به افزایش دارد
  - وقتی که قفل زمانی ناکافی است
  - وقتی کارمزدهای تراکنش خیلی بالا هستند
explanation: |
  بستن اجباری به عنوان آخرین راه‌حل استفاده می‌شود اگر یکی از طرفین، به عنوان مثال به دلیل یک مشکل فنی، دیگر به پیام‌های طرف دیگر پاسخ ندهد.
reviewed: false