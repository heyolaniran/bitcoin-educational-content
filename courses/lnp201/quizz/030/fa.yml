question: Lightning Network چگونه امکان ارسال وجه به یک نود که به طور مستقیم متصل نیست را فراهم می‌کند؟
answer: با مسیریابی پرداخت از طریق گره‌های واسطه
wrong_answers:
  - با استفاده از تراکنش‌های On-Chain بین هر گره
  - با ایجاد خودکار یک کانال موقت
  - با ارسال مستقیم وجوه با آدرس‌های چندامضایی
explanation: |
  Lightning Network امکان مسیریابی یک پرداخت از طریق چندین گره واسطه را فراهم می‌کند، بدون نیاز به یک کانال مستقیم بین فرستنده و گیرنده.
reviewed: false