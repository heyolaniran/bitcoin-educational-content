question: چه چیزی مقدار پرداخت غیرمستقیم در Lightning Network را محدود می‌کند؟
answer: کوچکترین نقدینگی موجود در یک کانال از مسیر انتخاب شده
wrong_answers:
  - تعداد گره‌های واسطه درگیر
  - ظرفیت کل Lightning Network
  - هزینه‌های مسیریابی تعیین‌شده توسط هر گره
explanation: |
  حداکثر مبلغی که یک پرداخت غیرمستقیم می‌تواند انتقال دهد به کمترین نقدینگی موجود در کانال‌های استفاده‌شده بستگی دارد، زیرا هر کانال باید وجوه را در هر طرف تنظیم کند.
reviewed: false