question: نقش هزینه‌های مسیریابی در Lightning Network چیست؟
answer: برای تشویق گره‌های واسطه به ارائه نقدینگی خود برای انتقال پرداخت‌ها
wrong_answers:
  - برای محدود کردن تعداد تراکنش‌ها در شبکه
  - برای اطمینان از اینکه هر کانال بودجه کافی دارد
  - برای محاسبه خودکار کوتاه‌ترین مسیر
explanation: |
  هزینه‌های مسیریابی برای جبران گره‌های واسطه‌ای استفاده می‌شود که با ارائه نقدینگی خود، انتقال وجوه در سراسر شبکه را ممکن می‌سازند.
reviewed: false