question: مسیر یابی پیازی در Lightning Network شامل چه مواردی است؟
answer: این بدان معناست که هر گره میانی فقط همسایگان بلافصل خود را در مسیر می‌شناسد.
wrong_answers:
  - برای انتقال مستقیم وجوه از یک گره به گره دیگر با دانستن گیرنده نهایی
  - برای محاسبه هزینه‌ها برای هر گره میانی به‌صورت مستقل
  - برای ارسال وجوه به تمام گره‌ها در مسیر به‌طور همزمان
explanation: |
  مسیریابی پیازی به این معناست که هر گره میانی تنها گره قبلی و بعدی را می‌شناسد و بدین ترتیب محرمانگی گیرنده نهایی حفظ می‌شود.
reviewed: false