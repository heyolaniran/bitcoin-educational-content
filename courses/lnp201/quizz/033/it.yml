question: Cosa comporta l'onion routing in Lightning Network?
answer: Che ogni nodo intermedio conosce solo i nodi più vicini a sé sul percorso.
wrong_answers:
  - Trasmettere direttamente fondi da nodo a nodo conoscendo il destinatario finale
  - Calcolare le fee per ogni nodo intermedio indipendentemente
  - Inviare fondi a tutti i nodi sul percorso simultaneamente
explanation: |
  L'onoin routing implica che ogni nodo intermedio conosce solo il nodo precedente e il successivo, preservando così la confidenzialità del destinatario finale.
reviewed: true
