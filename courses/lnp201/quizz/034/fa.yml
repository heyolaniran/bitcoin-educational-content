question: گره ارسال‌کننده برای انجام یک پرداخت با مسیریابی پیازی باید چه اطلاعاتی را بداند؟
answer: توپولوژی شبکه و مسیر کامل به گیرنده
wrong_answers:
  - فقط گره میانی بعدی
  - ظرفیت هر کانال
  - امضای رمزنگاری هر گره در مسیر
explanation: |
  گره ارسال‌کننده باید توپولوژی شبکه را بداند تا مسیر را به گیرنده محاسبه کند و به آن اجازه دهد بهترین مسیر را انتخاب کند.
reviewed: false