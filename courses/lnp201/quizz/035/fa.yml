question: هدف اصلی HTLCs در Lightning Network چیست؟
answer: برای فعال‌سازی انتقالات پرداخت امن از طریق گره‌های واسطه بدون نیاز به اعتماد به آن‌ها
wrong_answers:
  - برای کاهش هزینه‌های تراکنش برای هر پرداخت از طریق گره‌های واسطه
  - برای افزایش ظرفیت هر کانال پرداخت
  - برای ایجاد ارتباطات مستقیم بین تمام گره‌های شبکه با اعتماد آن‌ها
explanation: |
  HTLCها (قراردادهای قفل زمانی هش‌شده) اطمینان می‌دهند که هر گره واسطه‌ای پرداخت را بدون نگه‌داشتن وجوه انتقال می‌دهد، زیرا تنها با تکمیل تراکنش تا گیرنده نهایی می‌تواند آن‌ها را باز کند.
reviewed: false