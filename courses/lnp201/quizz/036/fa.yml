question: چه شرطی باید برای دریافت‌کننده HTLC برآورده شود تا وجوه را دریافت کند؟
answer: آن‌ها باید یک راز (پیش‌تصویر) ارائه دهند تا پرداخت را باز کنند.
wrong_answers:
  - آن‌ها باید هزینه‌های مسیریابی هر گره واسطه را بپذیرند.
  - آنها باید یک Commitment Transaction جدید امضا کنند.
  - آن‌ها باید منتظر بمانند تا زمان‌قفل منقضی شود و سپس وجوه را بازیابی کنند.
explanation: |
  برای دریافت وجوه در یک HTLC، گیرنده باید یک رمز خاص ارائه دهد که امکان باز کردن پرداخت امن شده توسط Hash را فراهم می‌کند.
reviewed: false