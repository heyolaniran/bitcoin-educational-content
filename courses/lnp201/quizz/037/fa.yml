question: اگر پرداخت از طریق HTLC در زمان تعیین‌شده تکمیل نشود، چه اتفاقی می‌افتد؟
answer: پرداخت لغو شده و وجوه به فرستنده بازگردانده می‌شود.
wrong_answers:
  - پرداخت توسط آخرین گره واسطه نگه داشته می‌شود.
  - بودجه‌ها به تمام گره‌های مسیر توزیع می‌شوند.
  - بودجه‌ها به طور دائمی مسدود شده‌اند
explanation: |
  اگر یک HTLC منقضی شود بدون اینکه راز فاش شود، پرداخت لغو می‌شود و وجوه به فرستنده بازمی‌گردد، بنابراین از نگه‌داشتن وجوه توسط هر گره واسطه جلوگیری می‌شود.
reviewed: false