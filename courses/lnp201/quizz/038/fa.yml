question: نقش تایملوک در عملکرد HTLCها چیست؟
answer: این یک بازه زمانی برای تکمیل پرداخت قبل از لغو ارائه می‌دهد.
wrong_answers:
  - ظرفیت کانال مورد استفاده را افزایش می‌دهد
  - این یک Layer از حریم خصوصی به تراکنش اضافه می‌کند
  - این هزینه‌های اضافی برای هر گره واسطه اعمال می‌شود.
explanation: |
  قفل زمانی یک بازه زمانی برای تکمیل HTLC تعیین می‌کند که در صورت عدم موفقیت تراکنش، با لغو پرداخت پس از این دوره، امکان بازیابی وجوه را فراهم می‌کند.
reviewed: false