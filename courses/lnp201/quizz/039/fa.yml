question: اگر یک کانال با HTLC فعال به‌طور اجباری بسته شود، چه اتفاقی می‌افتد؟
answer: HTLC به عنوان یک خروجی در تراکنش‌های Commitment گنجانده شده است.
wrong_answers:
  - HTLC به‌طور خودکار لغو می‌شود.
  - بودجه‌ها به گره‌های قبلی بازتوزیع می‌شوند.
  - کانال نمی‌تواند بسته شود تا زمانی که HTLC منقضی شود.
explanation: |
  در طول یک بسته شدن اجباری، HTLCهای معلق به عنوان خروجی‌ها در تراکنش‌های Commitment نمایش داده می‌شوند، بنابراین اجرای آن‌ها یا بازگشت آن‌ها طبق شرایط تعریف‌شده تضمین می‌شود.
reviewed: false