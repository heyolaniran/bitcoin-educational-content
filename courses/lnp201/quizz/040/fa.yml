question: نقش اصلی گره ارسال‌کننده در مسیریابی بر روی Lightning Network چیست؟
answer: مسیر کامل به گیرنده را محاسبه کنید
wrong_answers:
  - ذخیره اطلاعات نقدینگی تمام کانال‌های شبکه
  - هزینه‌های تراکنش برای هر گره واسطه را تعیین کنید
  - به‌طور مستقیم با تمام گره‌های واسط ارتباط برقرار کنید
explanation: |
  گره ارسال‌کننده مسئول محاسبه کل مسیر به گیرنده است، زیرا گره‌های واسطه تنها همسایه بلافصل خود را می‌شناسند.
reviewed: false