question: چرا برای یک گره فرستنده دشوار است که نقدینگی دقیق یک کانال را تخمین بزند؟
answer: زیرا تنها دو شرکت‌کننده از توزیع دقیق وجوه اطلاع دارند
wrong_answers:
  - زیرا ظرفیت کل کانال‌ها به طور مداوم در حال تغییر است
  - زیرا هزینه‌های گره‌های واسطه منتشر نمی‌شوند
  - زیرا کانال‌ها به‌طور خودکار پس از هر تراکنش بسته می‌شوند
explanation: |
  توزیع دقیق وجوه در یک کانال تنها برای دو نود شرکت‌کننده قابل مشاهده است و از تخمین نقدینگی موجود برای مسیریابی توسط نودهای دیگر جلوگیری می‌کند.
reviewed: false