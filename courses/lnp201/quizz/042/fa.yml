question: چه معیاری می‌تواند به یک نود در انتخاب مسیر پرداخت کارآمد کمک کند؟
answer: احتمال موفقیت بر اساس ظرفیت کل کانال‌ها
wrong_answers:
  - فاصله جغرافیایی بین گره‌ها
  - وجود نودها با سطح کارمزد پایین
  - تعداد پرداخت‌های انجام شده توسط گره هدف
explanation: |
  ظرفیت کل کانال‌ها می‌تواند نشان‌دهنده احتمال بالاتر موفقیت باشد، زیرا نشان‌دهنده دسترسی بیشتر به نقدینگی برای تراکنش‌ها است.
reviewed: false