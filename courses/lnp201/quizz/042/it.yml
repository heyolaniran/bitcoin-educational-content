question: Quale criterio può aiutare un nodo a scegliere un percorso di pagamento efficiente?
answer: La probabilità di successo basata sulla capacità totale dei canali
wrong_answers:
  - La distanza geografica tra i nodi
  - La presenza di nodi con fee basse
  - Il numero di pagamenti effettuati dal nodo destinatario
explanation: |
  La capacità totale dei canali può indicare una maggiore probabilità di successo, poiché suggerisce una liquidità maggiore, disponibile per le transazioni.
reviewed: true
