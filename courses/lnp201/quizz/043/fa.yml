question: Bob می‌تواند چه اطلاعاتی را در Invoice برای تسهیل مسیریابی شامل کند؟
answer: کانال‌های نزدیک با نقدینگی کافی یا وجود کانال‌های خصوصی
wrong_answers:
  - کلید خصوصی گره‌های میانی
  - نقشه کامل تمام کانال‌های شبکه
  - مقدار دقیق نقدینگی موجود برای هر کانال
explanation: |
  با نشان دادن کانال‌های نزدیک با نقدینگی یا فاش کردن کانال‌های خصوصی، Bob به Alice کمک می‌کند تا مسیرهایی با احتمال موفقیت بیشتر را انتخاب کند.
reviewed: false