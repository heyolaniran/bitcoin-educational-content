question: هنگامی که یک مسیر پرداخت به دلیل کمبود نقدینگی شکست می‌خورد، یک نود ارسال‌کننده چه کاری انجام می‌دهد؟
answer: تا زمانی که یک مسیر کاربردی پیدا کند، مسیر دیگری را امتحان می‌کند.
wrong_answers:
  - به‌طور خودکار درخواست بازپرداخت را به گیرنده ارسال می‌کند
  - کانال را می‌بندد و یک کانال مستقیم جدید ایجاد می‌کند.
  - از گره‌های واسطه می‌خواهد که نقدینگی خود را افزایش دهند
explanation: |
  وقتی یک مسیر شکست می‌خورد، گره ارسال‌کننده مسیرهای جایگزین دیگر را امتحان می‌کند تا زمانی که یک مسیر عملیاتی پیدا شود یا تمام گزینه‌ها به پایان برسند.
reviewed: false