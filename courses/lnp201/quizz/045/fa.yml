question: ویژگی LNURL-Withdraw به کاربران چه امکانی می‌دهد؟
answer: برداشت وجه از یک سرویس با اسکن کد QR
wrong_answers:
  - پرداخت مستقیم بدون هزینه‌های مسیریابی انجام دهید
  - اتصال Lightning Wallet آنها بدون رمز عبور
  - ارسال وجه بدون تأیید گیرنده
explanation: |
  LNURL-Withdraw به کاربران اجازه می‌دهد تا با اسکن یک کد QR، وجوه را از یک سرویس برداشت کنند و به این ترتیب فرآیند برداشت را ساده‌تر می‌کند.
reviewed: false