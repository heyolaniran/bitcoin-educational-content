question: LNURL-Withdraw सुविधा उपयोगकर्ताओं को क्या करने की अनुमति देती है?
answer: क्यूआर कोड स्कैन करके किसी सेवा से धनराशि निकालें
wrong_answers:
  - बिना रूटिंग शुल्क के सीधे भुगतान करें
  - बिना पासवर्ड के अपने लाइटनिंग Wallet को कनेक्ट करें
  - प्राप्तकर्ता की पुष्टि के बिना धनराशि भेजें
explanation: |
  LNURL-Withdraw उपयोगकर्ताओं को QR कोड स्कैन करके किसी सेवा से धनराशि निकालने की अनुमति देता है, जिससे निकासी प्रक्रिया सरल हो जाती है।
reviewed: false