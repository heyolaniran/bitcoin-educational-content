question: Nel contesto di un'invoice Lightning, cosa indica il prefisso lnbc nella parte leggibile dall'uomo?
answer: Indica una transazione Lightning sulla blockchain di Bitcoin
wrong_answers:
  - Indica che l'invoice è valida solo sulla testnet di Bitcoin
  - Indica che l'invoice è codificata in bech32
  - Indica che si tratta di una transazione on-chain
explanation: |
  Il prefisso lnbc significa che l'invoice è destinata a una transazione Lightning sulla rete Bitcoin, e non su un'altra rete.
reviewed: true
