question: نقش LNURL در تراکنش‌های لایتنینگ چیست؟
answer: برای ساده‌سازی تعامل بین نودها و برنامه‌های لایتنینگ
wrong_answers:
  - ایجاد کانال‌ها برای هر پرداخت را تسهیل کنید
  - اطمینان از محرمانه بودن اطلاعات پرداخت
  - به‌طور خودکار کارمزدهای تراکنش را محاسبه کنید
explanation: |
  LNURL یک پروتکل ارتباطی است که برای ساده‌سازی تعاملات، مانند برداشت‌ها و پرداخت‌ها، بین نودها و برنامه‌های لایتنینگ طراحی شده است.
reviewed: false