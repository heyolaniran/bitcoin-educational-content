question: فناوری Keysend چگونه انتقال وجه را بدون Invoice امکان‌پذیر می‌کند؟
answer: فرستنده یک راز در HTLCها ایجاد می‌کند تا وجوه را باز کند
wrong_answers:
  - گیرنده یک Hash تولید می‌کند تا انتقال را تأیید کند
  - پرداخت از طریق یک کانال مستقیم بین فرستنده و گیرنده تأیید می‌شود.
  - بودجه‌ها بدون امنیت اضافی به‌طور مستقیم اعتبار داده می‌شوند.
explanation: |
  Keysend به فرستنده اجازه می‌دهد تا یک راز را در HTLCها به generate ارسال کند، که به گیرنده امکان می‌دهد بدون صدور Invoice وجوه را باز کند.
reviewed: false