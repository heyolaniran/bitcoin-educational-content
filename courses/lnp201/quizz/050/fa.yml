question: چرا ممکن است یک فروشنده پرداختی ساختگی در یک کانال انجام دهد؟
answer: برای انتقال نقدینگی به سمت مقابل
wrong_answers:
  - برای کاهش هزینه‌های مسیریابی
  - برای افزایش ظرفیت کل کانال‌های خود
  - برای قفل کردن وجوه در بلندمدت
explanation: |
  با انجام یک پرداخت ساختگی، فروشنده نقدینگی را از سمت خود به سمت مقابل کانال منتقل می‌کند و بدین ترتیب ظرفیت ورودی برای دریافت پرداخت‌ها را آزاد می‌کند.
reviewed: false