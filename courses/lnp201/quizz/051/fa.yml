question: تکنیک باز کردن مثلث به گره‌های شرکت‌کننده چه چیزی را امکان می‌دهد؟
answer: ورودی و خروجی نقدینگی در هر کانال
wrong_answers:
  - کاهش هزینه‌های مسیریابی
  - تعداد نامحدودی از تراکنش‌ها بدون تأییدیه
  - یک لینک مستقیم با هر گره شبکه دیگر
explanation: |
  تکنیک باز کردن مثلث به هر گره اجازه می‌دهد تا با تشکیل یک حلقه از کانال‌ها بین چندین شرکت‌کننده، نقدینگی متعادل، هم ورودی و هم خروجی، را به دست آورد.
reviewed: false