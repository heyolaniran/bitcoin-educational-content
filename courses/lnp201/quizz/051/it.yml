question: Cosa permette di ottenere la tecnica di triangolazione tra nodi, per l'apertura di canali Lightning Network?
answer: Liquidità in entrata e in uscita in ogni canale
wrong_answers:
  - Fee di routing ridotte
  - Un numero illimitato di transazioni senza conferma
  - Un collegamento diretto con ogni altro nodo della rete
explanation: |
  La tecnica della triangolazione, permette a ciascun nodo di ottenere una liquidità bilanciata sia in entrata che in uscita, formando un anello di canali tra vari partecipanti.
reviewed: true
