question: کدام سرویس اجازه می‌دهد نقدینگی را به سمت مقابل یک کانال منتقل کنید در حالی که وجوه On-Chain را بازیابی می‌کنید؟
answer: حلقه بیرون
wrong_answers:
  - Keysend
  - LNURL
  - کوین‌سواپ
explanation: |
  سرویس Loop Out از Lightning Labs انتقال وجوه از یک کانال لایتنینگ به On-Chain Blockchain را امکان‌پذیر می‌سازد و بدین ترتیب ظرفیت دریافت را بهینه‌سازی کرده و بیت‌کوین‌ها را در زنجیره اصلی بازیابی می‌کند.
reviewed: false