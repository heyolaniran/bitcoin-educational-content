question: چرا یک روتر باید توزیع نقدینگی خوبی در کانال‌های خود حفظ کند؟
answer: برای به حداکثر رساندن تعداد پرداخت‌هایی که می‌تواند مسیریابی کند
wrong_answers:
  - برای کاهش هزینه‌های تراکنش
  - برای جلوگیری از باز کردن کانال‌های جدید
  - برای محدود کردن استفاده از Bitcoin Blockchain
explanation: |
  یک روتر هدف دارد تا حد امکان پرداخت‌ها را برای جمع‌آوری کارمزدها مسیریابی کند، که این امر نیازمند توزیع خوب نقدینگی در هر دو طرف کانال‌ها برای اطمینان از ظرفیت مسیریابی است.
reviewed: false