question: فروشنده در Lightning Network باید چه نوع نقدینگی را به‌طور عمده مدیریت کند تا پرداخت‌ها را بپذیرد؟
answer: ورودی نقدینگی
wrong_answers:
  - نقدینگی خروجی
  - ظرفیت کانال کل بالا
  - موجودی بالای On-Chain
explanation: |
  برای دریافت پرداخت‌ها، یک فروشنده نیاز به نقدینگی ورودی دارد، به این معنی که وجوه باید در طرف مقابل کانال موجود باشد تا بتواند پرداخت‌ها را بپذیرد.
reviewed: false