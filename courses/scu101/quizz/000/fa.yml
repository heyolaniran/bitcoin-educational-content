question: تفاوت اصلی بین مرور خصوصی و استفاده از شبکه TOR چیست؟
answer: تور آدرس IP کاربر را مخفی می‌کند Address، در حالی که مرور خصوصی این کار را نمی‌کند.
wrong_answers:
  - مرور خصوصی و TOR یک چیز هستند.
  - مرور خصوصی آدرس IP کاربر را با Address مخفی می‌کند، در حالی که TOR این کار را نمی‌کند.
  - تور ردپای محلی روی کامپیوتر شما باقی می‌گذارد، در حالی که مرور خصوصی این کار را نمی‌کند.
explanation: |
  مرور خصوصی ویژگی‌ای است که از ذخیره‌سازی تاریخچه مرور، فایل‌های موقت اینترنت، داده‌های فرم، کوکی‌ها و نام‌های کاربری و رمزهای عبور توسط مرورگرهای اینترنت جلوگیری می‌کند. با این حال، این ویژگی مرور شما را از ارائه‌دهنده خدمات اینترنتی‌تان پنهان نمی‌کند. از سوی دیگر، شبکه TOR با مخفی کردن IP کاربر Address و اجازه دسترسی به دارک‌نت، ناشناس بودن را ارائه می‌دهد.
reviewed: true