question: چرا توصیه می‌شود تعداد افزونه‌های نصب‌شده روی مرورگر خود را محدود کنید؟
answer: برای جلوگیری از مشکلات احتمالی امنیتی و عملکردی.
wrong_answers:
  - برای صرفه‌جویی در فضای ذخیره‌سازی دستگاه خود.
  - برای جلوگیری از کرش کردن مرورگر.
  - برای جلوگیری از ردیابی توسط سایت‌های شخص ثالث.
explanation: |
  در حالی که افزونه‌های مرورگر می‌توانند قابلیت‌های مفیدی ارائه دهند، اما می‌توانند خطرات امنیتی نیز به همراه داشته باشند زیرا می‌توانند به داده‌ها و فعالیت مرور شما دسترسی پیدا کنند. علاوه بر این، داشتن تعداد زیادی افزونه می‌تواند مرورگر شما را کند کرده و بر عملکرد آن تأثیر بگذارد.
reviewed: true