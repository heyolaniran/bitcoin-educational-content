question: چرا توصیه می‌شود نرم‌افزار را از وب‌سایت رسمی ناشر به جای سایت‌های عمومی دانلود کنیم؟
answer: برای اطمینان از اینکه نرم‌افزار عاری از نرم‌افزارهای مخرب است.
wrong_answers:
  - برای حمایت مالی از ناشر.
  - زیرا نرم‌افزار معمولاً در وب‌سایت رسمی ارزان‌تر است.
  - زیرا نرم‌افزار در سایت‌های عمومی معمولاً قدیمی است.
explanation: |
  دانلود نرم‌افزار از وب‌سایت رسمی ناشر تضمین می‌کند که شما نسخه قانونی نرم‌افزار را دریافت می‌کنید، که عاری از هرگونه نرم‌افزار مخربی است که می‌تواند به دستگاه شما آسیب برساند یا داده‌های شما را سرقت کند.
reviewed: true