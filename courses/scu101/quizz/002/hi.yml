question: सामान्य साइटों के बजाय प्रकाशक की आधिकारिक वेबसाइट से सॉफ्टवेयर डाउनलोड करने की सिफारिश क्यों की जाती है?
answer: यह सुनिश्चित करना कि सॉफ्टवेयर दुर्भावनापूर्ण सॉफ़्टवेयर से मुक्त है।
wrong_answers:
  - प्रकाशक को आर्थिक रूप से सहायता प्रदान करना।
  - क्योंकि आधिकारिक वेबसाइट पर सॉफ्टवेयर आमतौर पर सस्ता होता है।
  - क्योंकि सामान्य साइटों पर सॉफ्टवेयर आमतौर पर पुराना होता है।
explanation: |
  प्रकाशक की आधिकारिक वेबसाइट से सॉफ़्टवेयर डाउनलोड करने से यह सुनिश्चित होता है कि आपको सॉफ़्टवेयर का वैध संस्करण मिल रहा है, जो किसी भी दुर्भावनापूर्ण सॉफ़्टवेयर से मुक्त है जो आपके डिवाइस को नुकसान पहुंचा सकता है या आपका डेटा चुरा सकता है।
reviewed: true