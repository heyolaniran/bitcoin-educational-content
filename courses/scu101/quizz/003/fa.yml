question: مزیت اصلی استفاده از نرم‌افزارهای متن‌باز چیست؟
answer: این امکان را فراهم می‌کند تا تأیید کنید که دسترسی مخفی برای سرقت داده‌های شخصی شما وجود ندارد.
wrong_answers:
  - همیشه رایگان است.
  - همیشه از نرم‌افزارهای کد بسته ایمن‌تر است.
  - همیشه نسبت به نرم‌افزارهای متن‌بسته کاربرپسندتر است.
explanation: |
  نرم‌افزار متن‌باز نرم‌افزاری است که کد آن شناخته شده و برای همه قابل دسترسی است. این امر امکان تأیید، از جمله موارد دیگر، را فراهم می‌کند که هیچ دسترسی مخفی برای سرقت داده‌های شخصی شما وجود ندارد. با این حال، همیشه رایگان، ایمن‌تر یا کاربرپسندتر از نرم‌افزارهای متن‌بسته نیست.
reviewed: true