question: چرا توصیه می‌شود از مرورگر گوگل کروم اجتناب کنید؟
answer: به دلیل ردیاب‌های آن.
wrong_answers:
  - زیرا امن نیست.
  - زیرا کاربرپسند نیست.
  - زیرا از افزونه‌ها پشتیبانی نمی‌کند.
explanation: |
  مرورگر Google Chrome به خاطر ردیاب‌هایش شناخته شده است که می‌توانند داده‌هایی درباره فعالیت آنلاین شما جمع‌آوری کنند. این می‌تواند برای برخی کاربران یک نگرانی حریم خصوصی باشد.
reviewed: true