question: کوکی‌ها در زمینه مرور آنلاین چیستند؟
answer: فایل‌هایی که توسط وب‌سایت‌ها برای ذخیره اطلاعات بر روی دستگاه شما ایجاد می‌شوند.
wrong_answers:
  - قطعات کوچک داده که از یک وب‌سایت ارسال شده و توسط مرورگر وب کاربر در رایانه کاربر ذخیره می‌شوند.
  - برنامه‌هایی که فعالیت آنلاین شما را ردیابی می‌کنند.
  - ویروس‌هایی که می‌توانند به دستگاه شما آسیب برسانند.
explanation: |
  در زمینه مرور آنلاین، کوکی‌ها فایل‌هایی هستند که توسط وب‌سایت‌ها برای ذخیره اطلاعات بر روی دستگاه شما ایجاد می‌شوند. از آن‌ها برای به خاطر سپردن ترجیحات شما، اطلاعات ورود و سایر داده‌ها برای بهبود تجربه مرور شما استفاده می‌شود.
reviewed: true