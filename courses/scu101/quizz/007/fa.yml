question: مرور خصوصی چیست؟
answer: ویژگی که از ذخیره تاریخچه مرور، فایل‌های موقت اینترنت، داده‌های فرم، کوکی‌ها و نام‌های کاربری و رمزهای عبور توسط مرورگرهای اینترنت جلوگیری می‌کند.
wrong_answers:
  - ویژگی‌ای که فعالیت آنلاین شما را از ارائه‌دهنده خدمات اینترنت پنهان می‌کند.
  - ویژگی که به شما امکان می‌دهد به صورت ناشناس در اینترنت مرور کنید.
  - ویژگی که دستگاه شما را از ویروس‌ها و نرم‌افزارهای مخرب دیگر محافظت می‌کند.
explanation: |
  مرور خصوصی ویژگی‌ای است که از ذخیره‌سازی تاریخچه مرور، فایل‌های موقت اینترنت، داده‌های فرم، کوکی‌ها و نام‌های کاربری و رمزهای عبور توسط مرورگرهای اینترنت جلوگیری می‌کند. با این حال، فعالیت آنلاین شما را از ارائه‌دهنده خدمات اینترنت پنهان نمی‌کند و به شما اجازه نمی‌دهد به صورت ناشناس در اینترنت مرور کنید.
reviewed: true