question: شبکه TOR چیست؟
answer: شبکه‌ای که با پنهان کردن IP کاربر Address ناشناس بودن را ارائه می‌دهد و دسترسی به دارک‌نت را فراهم می‌کند.
wrong_answers:
  - یک شبکه که دستگاه شما را از ویروس‌ها و سایر نرم‌افزارهای مخرب محافظت می‌کند.
  - یک شبکه که فعالیت آنلاین شما را از ارائه‌دهنده خدمات اینترنتی‌تان مخفی می‌کند.
  - یک شبکه که به شما امکان می‌دهد سریع‌تر در اینترنت مرور کنید.
explanation: |
  شبکه TOR (The Onion Router) شبکه‌ای است که با پنهان کردن IP کاربر Address ناشناس بودن را ارائه می‌دهد و دسترسی به دارک‌نت را امکان‌پذیر می‌سازد. این شبکه توسط روزنامه‌نگاران، فعالان آزادی و دیگر افرادی که می‌خواهند از سانسور در کشورهای استبدادی فرار کنند، استفاده می‌شود.
reviewed: true