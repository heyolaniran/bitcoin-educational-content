question: هدف پروتکل HTTPS چیست؟
answer: این داده‌ها را در وب‌سایت‌ها رمزگذاری می‌کند تا Exchange امن بین کاربر و وب‌سایت را تضمین کند.
wrong_answers:
  - این امکان را به کاربران می‌دهد تا محدودیت‌های جغرافیایی را هنگام پرداخت با کارت بدهی یا اعتباری دور بزنند.
  - این به کاربران اجازه می‌دهد تا تبلیغات آنلاین را به‌صورت جزئی مسدود کنند.
  - این به کاربران اجازه می‌دهد تا بدون استفاده از اطلاعات محرمانه به اینترنت دسترسی پیدا کنند.
explanation: |
  پروتکل HTTPS برای رمزگذاری داده‌ها در وب‌سایت‌ها استفاده می‌شود و اطمینان حاصل می‌کند که داده‌های مبادله شده بین کاربر و وب‌سایت امن هستند. این به محافظت در برابر رهگیری داده‌ها توسط اشخاص ثالث کمک می‌کند.
reviewed: true