question: چرا تأیید کلید عمومی سایت با استفاده از سیستم گواهی‌نامه مهم است؟
answer: برای تأیید اصالت سایت.
wrong_answers:
  - برای اطمینان از اینکه هیچ کلاهبرداری نمی‌تواند رخ دهد، اما فقط زمانی که از طریق یک شبکه وای‌فای عمومی متصل هستید.
  - برای مسدود کردن جزئی تبلیغات آنلاین.
  - برای اطمینان از اینکه هیچ موجودیت مخربی در حال جعل هویت وب‌سایت نیست.
explanation: |
  تأیید کلید عمومی سایت با استفاده از سیستم گواهی‌نامه
  برای تأیید اصالت سایت مهم است. این کار
  به محافظت در برابر افراد مخرب که سایت را جعل می‌کنند و
  داده‌ها را به صورت متن ساده منتقل می‌کنند، کمک می‌کند.
reviewed: true