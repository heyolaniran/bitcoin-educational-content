question: یکی از راه‌های جلوگیری از کلاهبرداری‌های آنلاین این است که از کلیک کردن روی لینک‌های ناشناخته یا مشکوک خودداری کنید.
answer: هویت سایتی که در حال مرور آن هستید را تأیید کنید، به ویژه با بررسی پسوند و نام دامنه.
wrong_answers:
  - از شبکه‌های Wi-Fi عمومی استفاده کنید.
  - از سایت‌هایی استفاده کنید که از پروتکل HTTPS استفاده نمی‌کنند.
  - از سایت‌هایی استفاده کنید که نماد قفل نمایش داده نشده است.
explanation: |
  برای جلوگیری از کلاهبرداری‌های آنلاین، تأیید هویت سایتی که در حال مرور آن هستید بسیار مهم است. این کار را می‌توان با بررسی پسوند و نام دامنه سایت انجام داد.
reviewed: true