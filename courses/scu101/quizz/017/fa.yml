question: یکی از راه‌های تأیید اینکه در سایتی هستید که قصد بازدید از آن را دارید چیست؟
answer: آدرس‌های اینترنتی و قفل کوچک در نوار Address را بررسی کنید.
wrong_answers:
  - تعداد تبلیغات در سایت را بررسی کنید.
  - سرعت سایت را بررسی کنید.
  - طرح رنگ سایت را بررسی کنید.
explanation: |
  بررسی URLها و قفل کوچک در نوار Address یکی از راه‌های تأیید این است که در سایتی هستید که قصد بازدید از آن را دارید. قفل نشان می‌دهد که سایت از پروتکل HTTPS استفاده می‌کند که داده‌ها را برای امنیت Exchange رمزگذاری می‌کند.
reviewed: true