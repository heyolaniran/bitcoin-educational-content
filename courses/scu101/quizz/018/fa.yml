question: توصیه می‌شود که از حساب کاربری مدیر در ویندوز تنها برای انجام وظایف مدیریتی استفاده کنید و برای فعالیت‌های روزمره از یک حساب کاربری استاندارد بهره ببرید.
answer: دو حساب جداگانه ایجاد کنید؛ یک حساب مدیر و یک حساب برای استفاده روزانه.
wrong_answers:
  - اگر رایانه به اینترنت متصل نیست، از حساب کاربری مدیر برای استفاده روزانه استفاده کنید.
  - دو حساب کاربری مدیر جداگانه ایجاد کنید؛ یکی برای استفاده روزانه و دیگری برای مدیریت سیستم عامل.
  - حساب کاربری مدیر ایجاد نکنید.
explanation: |
  استفاده از حساب کاربری مدیر برای استفاده روزانه در ویندوز می‌تواند سیستم را به خطرات امنیتی بیشتری معرض کند. توصیه می‌شود دو حساب کاربری جداگانه ایجاد کنید؛ یکی برای وظایف مدیریتی و دیگری برای استفاده روزانه.
reviewed: true