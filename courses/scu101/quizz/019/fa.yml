question: چرا به‌روزرسانی منظم سیستم‌عامل و برنامه‌ها ضروری است؟
answer: برای محافظت در برابر تهدیدات و آسیب‌پذیری‌های جدید.
wrong_answers:
  - برای منسوخ کردن ماشین.
  - برای کند کردن دستگاه.
  - برای تغییر کاربر Interface.
explanation: |
  به‌روزرسانی‌های منظم برای محافظت از سیستم در برابر تهدیدات و آسیب‌پذیری‌های جدید ضروری هستند. هدف آن‌ها این نیست که دستگاه را منسوخ یا کند کنند.
reviewed: true