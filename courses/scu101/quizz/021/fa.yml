question: تهدید بالقوه استفاده از نرم‌افزارهای کرک شده که نمی‌توانند به‌روزرسانی شوند چیست؟
answer: ورود یک ویروس در حین دانلود غیرقانونی و استفاده ناامن در برابر اشکال جدید حمله.
wrong_answers:
  - نرم‌افزار پس از یک دوره معین کار کردن را متوقف خواهد کرد.
  - نرم‌افزار ویژگی‌های جدیدی نخواهد داشت.
  - نرم‌افزار منابع سیستم بیشتری مصرف خواهد کرد.
explanation: |
  نرم‌افزار کرک‌شده که نمی‌تواند به‌روزرسانی شود، یک تهدید دوگانه بالقوه را نشان می‌دهد. می‌تواند هنگام دانلود غیرقانونی از یک وب‌سایت مشکوک، ویروس به همراه بیاورد و ممکن است در برابر اشکال جدید حمله ناامن باشد.
reviewed: true