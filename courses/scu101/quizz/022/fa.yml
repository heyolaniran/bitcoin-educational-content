question: هنگام وارد کردن یک کلید USB به کامپیوتر خود، چه عملی توصیه می‌شود؟
answer: کلیدهای USB ناشناخته یا مشکوک را وارد نکنید.
wrong_answers:
  - هر کلید USB را بدون بررسی وارد کنید.
  - همیشه قبل از وارد کردن، کلید USB را فرمت کنید.
  - کلید USB را وارد کرده و سپس برای ویروس‌ها بررسی کنید.
explanation: |
  وارد کردن کلیدهای USB ناشناخته یا مشکوک می‌تواند سیستم را در معرض برنامه‌های مخربی قرار دهد که می‌توانند به‌طور خودکار پس از وارد شدن اجرا شوند. بررسی کلید USB پس از وارد شدن بی‌فایده خواهد بود.
reviewed: true