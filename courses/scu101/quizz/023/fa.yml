question: اهمیت استفاده از رمز عبور قوی برای امنیت کامپیوتر چیست؟
answer: برای جلوگیری از دسترسی غیرمجاز به سیستم.
wrong_answers:
  - برای سریع‌تر کردن عملکرد سیستم.
  - برای افزایش ظرفیت ذخیره‌سازی.
  - برای بهبود کاربر Interface.
explanation: |
  یک رمز عبور قوی برای امنیت کامپیوتر ضروری است تا از دسترسی غیرمجاز به سیستم جلوگیری کند.
reviewed: true