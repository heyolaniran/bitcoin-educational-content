question: راه‌حل‌هایی برای رمزگذاری داده‌ها در سیستم‌عامل‌های مختلف چیست؟
answer: بیت‌لاکر برای ویندوز، LUKS برای لینوکس، و گزینه داخلی برای مک.
wrong_answers:
  - بیت‌لاکر برای لینوکس، LUKS برای مک، و گزینه داخلی برای ویندوز.
  - بیت‌لاکر برای مک، LUKS برای ویندوز، و گزینه داخلی برای لینوکس.
  - LUKS برای همه سیستم‌عامل‌ها.
explanation: |
  سیستم‌عامل‌های مختلف راه‌حل‌های متفاوتی برای رمزگذاری داده‌ها دارند. BitLocker برای ویندوز است، LUKS برای لینوکس است، و مک گزینه‌ای داخلی برای رمزگذاری داده‌ها دارد.
reviewed: true