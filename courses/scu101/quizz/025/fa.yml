question: روش توصیه‌شده برای ذخیره‌سازی رمز عبور برای رمزگذاری داده‌ها چیست؟
answer: رمز عبور را روی یک کاغذ بنویسید و در جای امنی نگهداری کنید.
wrong_answers:
  - رمز عبور را در یک فایل متنی روی کامپیوتر ذخیره کنید.
  - رمز عبور را با دوستان مورد اعتماد به اشتراک بگذارید.
  - از یک رمز عبور معمول که به راحتی قابل یادآوری باشد استفاده کنید.
explanation: |
  توصیه می‌شود رمز عبور برای رمزگذاری داده‌ها را روی کاغذ بنویسید و آن را در جای امنی نگه دارید. این کار برای جلوگیری از دست دادن دسترسی به داده‌های رمزگذاری شده است.
reviewed: true