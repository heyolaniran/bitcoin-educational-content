question: آیا لینوکس و مک اغلب به آنتی‌ویروس نیاز دارند؟
answer: این نادرست است
wrong_answers:
  - این درست است
  - فقط لینوکس به آنتی‌ویروس نیاز دارد.
  - فقط مک به آنتی‌ویروس نیاز دارد.
explanation: |
  لینوکس و مک، به لطف سیستم جداسازی حقوق کاربری خود، اغلب نیازی به آنتی‌ویروس ندارند.
reviewed: true