question: اولین بردار حمله برای هکرها چیست؟
answer: ایمیل‌ها
wrong_answers:
  - رسانه‌های اجتماعی
  - وب‌سایت‌های خرید آنلاین
  - وب‌سایت‌های بانکی
explanation: |
  ایمیل‌ها اولین بردار حمله برای هکرها هستند. آن‌ها از تلاش‌های فیشینگ برای استخراج اطلاعات حساس مانند مدارک و گذرواژه‌های شما استفاده می‌کنند.
reviewed: false