question: راه‌حل ساده برای محافظت از داده‌های شما در برابر حملات باج‌افزار چیست؟
answer: به طور منظم از داده‌های مهم خود در یک دستگاه ذخیره‌سازی خارجی یا یک سرویس ذخیره‌سازی آنلاین امن نسخه پشتیبان تهیه کنید.
wrong_answers:
  - نرم‌افزارهای آنتی‌ویروس متعدد را روی رایانه خود نصب کنید و اسکن‌های دوره‌ای انجام دهید.
  - به طور منظم کامپیوتر خود را تغییر دهید یا سیستم عامل (OS) خود را دوباره نصب کنید.
  - اگر چیزی برای پنهان کردن در دستگاه خود ندارید، می‌توانید از یک شبکه وای‌فای عمومی استفاده کنید.
explanation: |
  پشتیبان‌گیری منظم از داده‌های شما این امکان را می‌دهد که در صورت وقوع حمله سایبری یا خرابی سخت‌افزار، بدون از دست دادن اطلاعات حیاتی، داده‌های خود را بازیابی کنید.
reviewed: true