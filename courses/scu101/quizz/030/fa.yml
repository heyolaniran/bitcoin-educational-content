question: قانون طلایی برای محافظت از خود در برابر ایمیل‌های جعلی چیست؟
answer: نام کامل فرستنده و همچنین منبع ایمیل را با دقت بررسی کنید.
wrong_answers:
  - همیشه به ایمیل‌های مشکوک پاسخ دهید.
  - تمام پیوست‌های ایمیل را باز کنید تا محتوای آن‌ها را بررسی کنید.
  - اطلاعات شخصی خود را فقط با فرستندگان شناخته شده به اشتراک بگذارید.
explanation: |
  قانون طلایی برای محافظت از خود در برابر ایمیل‌های جعلی این است که به دقت نام کامل فرستنده و همچنین منبع ایمیل را بررسی کنید. در صورت شک، آن را حذف کنید!
reviewed: true