question: اگر روی کامپیوتر خود ویروسی شناسایی کردید، چه باید بکنید؟
answer: اتصال آن را از اینترنت قطع کنید، یک اسکن کامل آنتی‌ویروس انجام دهید و فایل‌های آلوده را حذف کنید.
wrong_answers:
  - به استفاده عادی از کامپیوتر ادامه دهید.
  - کامپیوتر را خاموش کنید و برای چند ساعت آن را خاموش نگه دارید.
  - تمام فایل‌ها را روی کامپیوتر حذف کن.
explanation: |
  اگر ویروسی را روی رایانه خود شناسایی کردید، باید آن را از اینترنت قطع کنید تا از گسترش ویروس یا ارتباط با هکر جلوگیری شود. سپس، یک اسکن کامل آنتی‌ویروس انجام دهید و فایل‌های آلوده را حذف کنید.
reviewed: true