question: باج‌افزار چیست؟
answer: نوعی نرم‌افزار مخرب که داده‌های کاربر را رمزگذاری کرده و برای رمزگشایی آن‌ها درخواست باج می‌کند.
wrong_answers:
  - نوعی نرم‌افزار آنتی‌ویروس که قادر است حافظه پنهان و کوکی‌های کامپیوتر را با پرداخت یک هزینه یک‌باره پاک کند.
  - نوعی نرم‌افزار که برای بازیابی داده‌ها استفاده می‌شود، امروزه در اروپا بسیار رایج شده است.
  - نوعی نرم‌افزار که برای پشتیبان‌گیری از داده‌ها استفاده می‌شود، معمولاً هر ۷ روز یک بار پشتیبان‌گیری انجام می‌دهد.
explanation: |
  باج‌افزار نوعی نرم‌افزار مخرب است که داده‌های کاربر را رمزگذاری می‌کند و برای رمزگشایی آن‌ها درخواست باج می‌کند. این نوع نرم‌افزار به‌طور فزاینده‌ای رایج شده و می‌تواند برای یک شرکت یا فرد بسیار مشکل‌ساز باشد.
reviewed: true