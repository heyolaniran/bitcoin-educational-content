question: معایب احتمالی ایجاد یک نسخه پشتیبان ابری با استفاده از خدماتی مانند ProtonMail Drive، Sync یا Google Drive چیست؟
answer: داده‌های شما ممکن است در اینترنت و توسط یک شخص ثالث مورد اعتماد نگهداری شود.
wrong_answers:
  - این خدمات ممکن است برای پشتیبان‌گیری از داده‌ها قابل اعتماد نباشند.
  - این خدمات گاهی اوقات داده‌های کاربر را از دست می‌دهند و انتقال آن به یک ارائه‌دهنده ابر دیگر می‌تواند دشوار باشد.
  - این خدمات معمولاً فضای ذخیره‌سازی کافی ارائه نمی‌دهند و از سرعت اتصال پایین رنج می‌برند.
explanation: |
  در حالی که خدمات پشتیبان‌گیری ابری راهی مناسب برای پشتیبان‌گیری از داده‌های شما ارائه می‌دهند، اما همچنین به این معناست که داده‌های شما به‌طور بالقوه در اینترنت و توسط یک شخص ثالث مورد اعتماد نگهداری می‌شود. این می‌تواند داده‌های شما را در معرض خطرات اضافی قرار دهد.
reviewed: true