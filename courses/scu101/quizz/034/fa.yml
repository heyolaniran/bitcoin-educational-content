question: پیوست‌ها و تصاویر ایمیل می‌توانند حاوی چه محتوای مخربی باشند؟
answer: بدافزار
wrong_answers:
  - هرزنامه
  - تبلیغات
  - محتوای تبلیغاتی
explanation: |
  پیوست‌ها و تصاویر ایمیل می‌توانند حاوی بدافزار باشند.  
  بنابراین، نباید پیوست‌ها را از فرستندگان ناشناس یا مشکوک دانلود یا باز کنید.
reviewed: true