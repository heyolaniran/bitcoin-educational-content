question: هدف از تلاش‌های فیشینگ چیست؟
answer: برای استخراج اطلاعات حساس مانند مدارک و گذرواژه‌های شما.
wrong_answers:
  - برای ارسال ایمیل‌های اسپم به شما.
  - برای فروش محصولات یا خدمات شما.
  - برای دعوت شما به رویدادها یا وبینارها.
explanation: |
  تلاش‌های فیشینگ به منظور استخراج اطلاعات حساس مانند مدارک و گذرواژه‌های شما انجام می‌شوند. هکرها از تاکتیک‌های مختلفی مانند ایمیل‌های جعلی استفاده می‌کنند تا شما را فریب داده و اطلاعاتتان را فاش کنید.
reviewed: true