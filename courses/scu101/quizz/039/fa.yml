question: ویژگی‌های یک رمز عبور خوب چیست؟
answer: طولانی، پیچیده، منحصربه‌فرد و بر اساس اطلاعات شخصی نباشد.
wrong_answers:
  - کوتاه، ساده و آسان برای به خاطر سپردن.
  - بر اساس اطلاعات شخصی مانند تاریخ تولد و نام‌ها.
  - همان رمز عبور برای همه حساب‌ها.
explanation: |
  یک رمز عبور خوب طولانی است (حداقل ۱۲ کاراکتر)، پیچیده
  (ترکیبی از حروف بزرگ و کوچک، اعداد و
  نمادها)، منحصر به فرد (برای حساب‌های مختلف استفاده نشود)، و
  بر اساس اطلاعات شخصی نباشد.
reviewed: true