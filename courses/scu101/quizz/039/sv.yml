question: Vad kännetecknar ett bra lösenord?
answer: Långa, komplexa, unika och inte baserade på personlig information.
wrong_answers:
  - Kort, enkelt och lätt att komma ihåg.
  - Baserat på personlig information som födelsedatum och namn.
  - Samma lösenord för alla konton.
explanation: |
  Ett bra lösenord är långt (minst 12 tecken), komplext
  (en blandning av stora och små bokstäver, siffror och symboler)
  symboler), unikt (återanvänds inte för olika konton) och
  inte baserat på personlig information.
reviewed: true