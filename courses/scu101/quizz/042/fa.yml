question: چرا استفاده از رمزهای عبور تصادفی مهم است؟
answer: آن‌ها در برابر حملات جستجوی فراگیر مقاوم‌تر از گذرواژه‌هایی با طول مشابه که شامل کلمات دیکشنری هستند، می‌باشند.
wrong_answers:
  - آن‌ها راحت‌تر به خاطر سپرده می‌شوند اما تایپ کردنشان کندتر است.
  - آن‌ها همیشه امن هستند زیرا بیش از ۲۰ کاراکتر تصادفی دارند.
  - بیشتر خدمات آنلاین فقط حداقل طول و مجموعه‌ای از کاراکترها را درخواست می‌کنند، برآورده کردن این معیارها به معنای قوی بودن رمزهای عبور است.
explanation: |
  رمزهای عبور تصادفی تولید شده سطح بالاتری از
  امنیت را ارائه می‌دهند زیرا در برابر حملات جستجوی فراگیر
  مقاوم‌تر هستند، حملاتی که سعی می‌کنند با امتحان کردن تمام
  ترکیب‌های ممکن از کاراکترها، رمزهای عبور را حدس بزنند.
reviewed: true