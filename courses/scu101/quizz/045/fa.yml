question: مزیت اصلی استفاده از مدیر رمز عبور چیست؟
answer: این به شما کمک می‌کند تا رمزهای عبور قوی ایجاد کنید و آن‌ها را به خاطر بسپارید، بنابراین نیازی نیست که خودتان این کار را انجام دهید.
wrong_answers:
  - به‌طور خودکار شما را به حساب‌های آنلاین‌تان وارد می‌کند.
  - این از کامپیوتر شما در برابر ویروس‌ها محافظت می‌کند.
  - همه رمزهای عبور شما را در یک مکان ذخیره می‌کند و یافتن آن‌ها را آسان‌تر می‌سازد.
explanation: |
  یک مدیر رمز عبور به شما کمک می‌کند تا رمزهای عبور قوی ایجاد کنید و آنها را به خاطر بسپارید، بنابراین نیازی نیست که خودتان این کار را انجام دهید. این ابزار تمام رمزهای عبور شما را به صورت ایمن ذخیره می‌کند و رمزهای عبور قوی برای شما تولید می‌کند.
reviewed: true