question: هدف از اجرای 2FA چیست؟
answer: برای محافظت از حساب‌های آنلاین خود در برابر دسترسی غیرمجاز.
wrong_answers:
  - برای سخت‌تر کردن دسترسی شما به حساب کاربری خودتان
  - برای ردیابی فعالیت‌های آنلاین شما
  - برای افزایش سرعت اتصال اینترنت خود
explanation: |
  ۲FA یک لایه امنیتی اضافی Layer به حساب‌های آنلاین شما اضافه می‌کند. حتی اگر یک هکر رمز عبور شما را به دست آورد، بدون عامل دوم تأیید قادر به دسترسی به حساب شما نخواهد بود.
reviewed: true