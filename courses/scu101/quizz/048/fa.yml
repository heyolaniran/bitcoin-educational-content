question: کدام یک از موارد زیر روش خوب و امنی در احراز هویت دو مرحله‌ای است؟
answer: کدی که توسط برنامه‌ای مانند Google Authenticator یا Authy تولید شده است.
wrong_answers:
  - تماس تلفنی یا کد پیامکی به دارنده حساب
  - ایمیلی با کدی که در عرض ۱۰ دقیقه منقضی می‌شود به دارنده حساب
  - نامه‌ای که به خانه دارنده حساب ارسال شده است Address
explanation: |
  گام دوم در 2FA می‌تواند یک کد موقت باشد که از طریق
  پیامک، ایمیل، کدی که توسط یک برنامه تولید می‌شود، یا یک
  کلید امنیتی فیزیکی ارسال می‌شود. با این حال، همه این روش‌ها
  به ما اجازه نمی‌دهند که همان سطح امنیت را حفظ کنیم.
reviewed: true