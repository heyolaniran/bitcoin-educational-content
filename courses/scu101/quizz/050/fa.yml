question: مزیت رمزهای یک‌بار مصرف (HOTP و TOTP) نسبت به پیامک برای احراز هویت دو مرحله‌ای (2FA) چیست؟
answer: آن‌ها به محاسبات رمزنگاری نیاز دارند و به‌جای حافظه به‌صورت محلی ذخیره می‌شوند.
wrong_answers:
  - آن‌ها به محاسبات رمزنگاری نیاز دارند و به جای ذخیره محلی، در حافظه ذخیره می‌شوند.
  - آن‌ها نیازی به محاسبات رمزنگاری ندارند و هم به صورت محلی و هم در حافظه ذخیره می‌شوند.
  - آن‌ها راحت‌تر به خاطر سپرده می‌شوند و سریع‌تر تایپ می‌شوند.
explanation: |
  رمزهای یکبار مصرف (HOTP و TOTP) ایمن‌تر از پیامک هستند
  زیرا نیاز به محاسبات رمزنگاری دارند و به‌صورت محلی ذخیره می‌شوند
  نه در حافظه.
reviewed: true