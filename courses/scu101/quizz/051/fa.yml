question: قانون طلایی امنیت سایبری چیست؟
answer: امنیت سایبری یک هدف متحرک است که با مسیر یادگیری شما سازگار خواهد شد.
wrong_answers:
  - امنیت سایبری یک تنظیم یک‌باره است
  - امنیت سایبری برای حساب‌های شخصی ضروری نیست
  - امنیت سایبری فقط برای افراد فنی است
explanation: |
  امنیت سایبری یک هدف متحرک است زیرا تهدیدات و
  اقدامات امنیتی به طور مداوم در حال تکامل هستند. مهم است که
  به یادگیری و تطبیق روش‌های خود ادامه دهید.
reviewed: true