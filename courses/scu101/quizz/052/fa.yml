question: چرا توکن‌های سخت‌افزاری، مانند کلیدهای USB یا کارت‌های هوشمند، برای امنیت بهینه در 2FA در نظر گرفته می‌شوند؟
answer: آن‌ها generate یک کلید خصوصی منحصر به فرد برای هر سایت ایجاد می‌کنند و قبل از اجازه اتصال، URL را تأیید می‌کنند.
wrong_answers:
  - آنها از نظر فیزیکی سخت‌تر به سرقت می‌روند، اما اگر دزدان موفق شوند، به راحتی اسرار را از دستگاه استخراج خواهند کرد.
  - آنها generate تنها یک رمز عبور دارند که قرار است برای هر سایت استفاده شود و قبل از اجازه اتصال، URL را تأیید می‌کنند.
  - آن‌ها فناوری جدیدتر و گران‌تری هستند، بنابراین باید بهتر باشند.
explanation: |
  توکن‌های سخت‌افزاری امنیت بهینه‌ای ارائه می‌دهند زیرا آن‌ها
  generate یک کلید خصوصی منحصر به فرد برای هر سایت و تأیید
  URL قبل از اجازه اتصال. این امر دسترسی غیرمجاز هکر را بسیار
  سخت‌تر می‌کند.
reviewed: true