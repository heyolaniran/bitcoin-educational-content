question: USB कुंजी या स्मार्ट कार्ड जैसे हार्डवेयर टोकन को 2FA के लिए इष्टतम सुरक्षा प्रदान करने वाला क्यों माना जाता है?
answer: वे प्रत्येक साइट के लिए एक अद्वितीय निजी कुंजी generate करते हैं और कनेक्शन की अनुमति देने से पहले URL को सत्यापित करते हैं।
wrong_answers:
  - इन्हें चुराना शारीरिक रूप से कठिन है, लेकिन यदि चोर सफल हो जाएं, तो वे आसानी से डिवाइस से रहस्य निकाल लेंगे।
  - वे प्रत्येक साइट के लिए केवल एक पासवर्ड generate करते हैं तथा कनेक्शन की अनुमति देने से पहले URL को सत्यापित करते हैं।
  - वे नई तकनीक वाले और महंगे हैं, इसलिए वे बेहतर ही होंगे।
explanation: |
  हार्डवेयर टोकन इष्टतम सुरक्षा प्रदान करते हैं क्योंकि वे प्रत्येक साइट के लिए एक अद्वितीय निजी कुंजी generate करते हैं और कनेक्शन की अनुमति देने से पहले URL को सत्यापित करते हैं। इससे हैकर के लिए अनधिकृत पहुँच प्राप्त करना बहुत कठिन हो जाता है।
reviewed: true