question: چرا داده‌های بیومتریک نسبت به ترکیب دانش و مالکیت برای احراز هویت دو مرحله‌ای کمتر امن تلقی می‌شوند؟
answer: داده‌های بیومتریک باید بر روی دستگاه احراز هویت باقی بمانند و به صورت آنلاین فاش نشوند.
wrong_answers:
  - داده‌های بیومتریک حتی اگر به صورت آفلاین بر روی دستگاه احراز هویت نگهداری شوند، آسان‌تر استخراج می‌شوند.
  - داده‌های بیومتریک هم به خاطر سپردن و هم استفاده از آن‌ها هنگام استفاده از دستگاه احراز هویت دشوارتر است.
  - ابزارهای داده‌های بیومتریک برای پیاده‌سازی گران‌تر هستند و بنابراین در مقایسه با راه‌حل‌های دیگر مقرون‌به‌صرفه نیستند.
explanation: |
  داده‌های بیومتریک کمتر امن هستند زیرا باید بر روی دستگاه احراز هویت باقی بمانند و به صورت آنلاین فاش نشوند. اگر به صورت آنلاین فاش شوند، می‌توانند دزدیده شده و برای دسترسی غیرمجاز استفاده شوند.
reviewed: true