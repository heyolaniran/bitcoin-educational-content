question: برخی از ابزارهای مورد استفاده در امنیت سایبری کدامند؟
answer: وایرشارک، متااسپلویت، ان‌مپ
wrong_answers:
  - فتوشاپ، ایلاستریتور، ایندیزاین
  - اکسل، پاورپوینت، ورد
  - اتوکد، سالیدورکس، رویت
explanation: |
  فصل ابزارهایی مانند Wireshark، Metasploit و Nmap را به عنوان برخی از ابزارهای مورد استفاده در امنیت سایبری فهرست می‌کند.
reviewed: true