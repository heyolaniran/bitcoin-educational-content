question: برخی از مهارت‌های مورد نیاز در امنیت سایبری چیست؟
answer: تجزیه و تحلیل لاگ، پاسخ به حادثه
wrong_answers:
  - طراحی گرافیک، ویرایش ویدئو
  - فروش، بازاریابی
  - پخت و پز، نانوایی
explanation: |
  این فصل به تحلیل گزارش و پاسخ به حوادث به عنوان برخی از مهارت‌های مورد نیاز در امنیت سایبری اشاره می‌کند.
reviewed: true