question: برخی از زبان‌های برنامه‌نویسی که در امنیت سایبری استفاده می‌شوند کدامند؟
answer: پایتون، C، جاوا
wrong_answers:
  - HTML، CSS، JavaScript
  - سویفت، کاتلین، روبی
  - پی‌اچ‌پی، پرل، لوآ
explanation: |
  فصل، پایتون، C و جاوا را به عنوان برخی از زبان‌های برنامه‌نویسی مورد استفاده در امنیت سایبری فهرست می‌کند.
reviewed: true