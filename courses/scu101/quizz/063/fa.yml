question: برخی از جنبه‌های رمزنگاری که در امنیت سایبری استفاده می‌شوند کدامند؟
answer: SSL/TLS، رمزگذاری متقارن/نامتقارن
wrong_answers:
  - RSA، DSA، ECC
  - AES، DES، 3DES
  - MD5، SHA-1، SHA-256
explanation: |
  فصل، SSL/TLS و رمزنگاری متقارن/نامتقارن را به عنوان برخی از جنبه‌های رمزنگاری مورد استفاده در امنیت سایبری فهرست می‌کند.
reviewed: true