question: Vilka är några av de aspekter av kryptografi som används inom cybersäkerhet?
answer: SSL/TLS, symmetrisk/asymmetrisk kryptering
wrong_answers:
  - RSA, DSA, ECC
  - AES, DES, 3DES
  - MD5, SHA-1, SHA-256
explanation: |
  I kapitlet listas SSL/TLS och symmetrisk/asymmetrisk
  kryptering som några av de aspekter av kryptografi som används inom
  cybersäkerhet.
reviewed: true