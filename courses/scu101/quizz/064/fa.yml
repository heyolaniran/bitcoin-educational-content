question: چرا استفاده از افزونه‌های مرورگر برای پر کردن خودکار رمز عبور توصیه نمی‌شود؟
answer: آنها می‌توانند کاربر را نسبت به حملات فیشینگ آسیب‌پذیرتر کنند، سطح حمله را افزایش دهند و عملکرد مرورگر را کند کنند.
wrong_answers:
  - استفاده از آن‌ها دشوار است.
  - آنها با همه مرورگرها سازگار نیستند.
  - آنها به فضای ذخیره‌سازی زیادی نیاز دارند.
explanation: |
  افزونه‌های مرورگر برای پر کردن خودکار رمز عبور می‌توانند کاربر را در برابر حملات فیشینگ آسیب‌پذیرتر کنند. آن‌ها همچنین تمایل دارند سطح حمله را افزایش دهند و می‌توانند عملکرد مرورگر را کند کنند، بنابراین خطر قابل توجهی را ارائه می‌دهند.
reviewed: true