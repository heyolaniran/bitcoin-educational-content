question: مزایای استفاده از Passkeys به عنوان جایگزینی برای رمزهای عبور سنتی چیست؟
answer: آن‌ها کلیدهای تصادفی رمزگذاری‌شده را به همراه یک عامل محلی ارائه می‌دهند که توسط یک ارائه‌دهنده میزبانی می‌شوند اما خارج از دسترس آن‌ها باقی می‌مانند.
wrong_answers:
  - آن‌ها نسبت به رمزهای عبور سنتی راحت‌تر به خاطر سپرده می‌شوند.
  - آنها به هیچ عامل احراز هویت اضافی نیاز ندارند.
  - آنها می‌توانند بدون هیچ به‌روزرسانی در تمام وب‌سایت‌ها استفاده شوند.
explanation: |
  پاس‌کی‌ها کلیدهای تصادفی رمزگذاری‌شده‌ای ارائه می‌دهند که با یک عامل محلی (بیومتریک یا پین) ترکیب می‌شوند و توسط یک ارائه‌دهنده میزبانی می‌شوند اما از دسترس آن‌ها خارج می‌مانند. این رویکرد نیاز به رمزهای عبور را از بین می‌برد و در نتیجه سطح بالایی از امنیت را بدون محدودیت‌های مرتبط با رمزهای عبور سنتی فراهم می‌کند.
reviewed: true