question: نگرانی اصلی در مورد ورود یکپارچه (SSO) ارائه شده توسط غول‌های اینترنتی چیست؟
answer: این مشکلاتی را از نظر دسترسی و خطرات سانسور ایجاد می‌کند.
wrong_answers:
  - استفاده از آن دشوار است.
  - به فضای ذخیره‌سازی زیادی نیاز دارد.
  - با همه وب‌سایت‌ها سازگار نیست.
explanation: |
  ورود یکپارچه (SSO) ارائه‌شده توسط غول‌های اینترنتی مشکلاتی از نظر دسترسی و خطرات سانسور ایجاد می‌کند. این به این دلیل است که اگر ارائه‌دهنده SSO دچار قطعی شود یا تصمیم به مسدود کردن کاربر بگیرد، کاربر ممکن است دسترسی به تمام خدماتی که از آن SSO برای احراز هویت استفاده می‌کنند را از دست بدهد.
reviewed: true