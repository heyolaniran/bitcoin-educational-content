question: علت رایج آسیب‌پذیری‌های امنیتی چیست؟
answer: سهل‌انگاری انسانی.
wrong_answers:
  - قطع برق.
  - سرعت پایین اینترنت.
  - سخت‌افزار قدیمی.
explanation: |
  آسیب‌پذیری‌های امنیتی اغلب نتیجه سهل‌انگاری انسانی هستند، مانند استفاده از رمزهای عبور پیش‌فرض یا نوشتن رمزهای عبور در مکان‌های ناامن. حملات پیچیده همیشه برای به خطر انداختن امنیت کامپیوتر ضروری نیستند.
reviewed: true