question: هدف از احراز هویت Lightning چیست؟
answer: این برای هر سرویس یک شناسه متفاوت تولید می‌کند، بدون نیاز به
wrong_answers:
  - به هر کسی اجازه می‌دهد، حتی بدون یک Lightning Wallet، بدون یک ایمیل Address احراز هویت کند، اگر یک شناسه معتبر نشان داده شود.
  - این به شما اجازه می‌دهد تا از همان رمز عبور برای همه خدمات استفاده کنید.
  - هر ماه یادآوری‌هایی برای تغییر رمز عبور ارسال می‌کند.
explanation: |
  احراز هویت لایتنینگ یک شناسه متفاوت برای هر سرویس ایجاد می‌کند، بدون نیاز به ارائه ایمیل Address یا اطلاعات شخصی. این می‌تواند با کاهش میزان اطلاعات شخصی که با هر سرویس به اشتراک گذاشته می‌شود، حریم خصوصی و امنیت را افزایش دهد.
reviewed: true