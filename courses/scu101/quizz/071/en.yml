question: What is a recommended practice for managing the master password of a password manager?
answer: Write it down on paper and keep it concealed in a secure place.
wrong_answers:
  - Store it in your email.
  - Use the same password for all accounts.
  - Memorize it.
explanation: |
  It is recommended that the master password of a password manager be written down on paper and kept in a concealed and secure location. In fact, if the hard drive is encrypted and the computer is locked, the password will not be accessible, even in the case of burglary.
reviewed: true
