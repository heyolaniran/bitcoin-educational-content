question: توصیه می‌شود که برای مدیریت رمز عبور اصلی یک مدیر رمز عبور، از یک رمز عبور قوی و منحصر به فرد استفاده کنید، آن را به طور منظم تغییر دهید و از احراز هویت دو مرحله‌ای (2FA) برای افزایش امنیت استفاده کنید. همچنین، از ذخیره کردن رمز عبور اصلی در مکان‌های ناامن خودداری کنید و در صورت امکان، از یک روش یادآوری امن برای به خاطر سپردن آن بهره ببرید.
answer: آن را روی کاغذ بنویسید و در مکانی مخفی و امن نگهداری کنید.
wrong_answers:
  - آن را در ایمیل خود ذخیره کنید.
  - از همان گذرواژه برای همه حساب‌ها استفاده کنید.
  - آن را حفظ کن.
explanation: |
  توصیه می‌شود که رمز عبور اصلی یک مدیر رمز عبور را روی کاغذ بنویسید، اما باید در مکانی مخفی و امن نگهداری شود. این به این دلیل است که اگر درایو Hard رمزگذاری شده و کامپیوتر قفل شده باشد، رمز عبور حتی در صورت سرقت نیز در دسترس نخواهد بود.
reviewed: true