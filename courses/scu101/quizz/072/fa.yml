question: مدیر رمز عبور چیست؟
answer: ابزاری که رمزهای عبور را ذخیره، تولید و مدیریت می‌کند.
wrong_answers:
  - یک نرم‌افزار آنتی‌ویروس برای مقابله با حملات هکری.
  - یک سرویس ایمیل امن.
  - یک ابزار پشتیبان‌گیری برای داده‌های هویتی شخصی.
explanation: |
  یک مدیر رمز عبور، ذخیره‌سازی و ایجاد رمزهای عبور را متمرکز می‌کند.
