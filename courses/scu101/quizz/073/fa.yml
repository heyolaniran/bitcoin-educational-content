question: مزیت اصلی استفاده از مدیر رمز عبور چیست؟
answer: به خاطر سپردن تنها یک رمز عبور اصلی.
wrong_answers:
  - دیگر رمزهای عبور جدید ایجاد نمی‌شود.
  - کمک به حفظ تمام گذرواژه‌ها با استفاده از تکنیک‌های Mnemonic.
  - حذف نیاز به حساب‌های آنلاین.
explanation: |
  کاربر فقط نیاز دارد یک رمز عبور را به خاطر بسپارد تا به همه‌ی دیگران دسترسی پیدا کند.
