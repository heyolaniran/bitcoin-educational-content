question: ویژگی‌های اصلی یک مدیر رمز عبور چیست؟
answer: ذخیره، generate، و سازماندهی رمزهای عبور.
wrong_answers:
  - تجزیه و تحلیل و حذف ویروس‌ها.
  - پشتیبان‌گیری و سازماندهی اسناد شخصی.
  - سرعت اتصال را بهینه کنید.
explanation: |
  عملکردهای اساسی شامل ذخیره‌سازی، تولید و سازماندهی گذرواژه‌ها می‌باشد.
