question: چه ویژگی‌هایی یک رمز عبور خوب را تعریف می‌کنند؟
answer: طولانی، پیچیده و منحصر به فرد.
wrong_answers:
  - کوتاه، ساده و آسان برای به خاطر سپردن.
  - بر اساس اطلاعات شخصی.
  - یکسان برای همه حساب‌ها.
explanation: |
  یک رمز عبور خوب باید به اندازه کافی طولانی، پیچیده باشد و نباید دوباره استفاده شود.
reviewed: false