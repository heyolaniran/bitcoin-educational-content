question: چرا توصیه می‌شود از رمزهای عبور تصادفی استفاده شود؟
answer: برای مقاومت در برابر حملات جستجوی فراگیر.
wrong_answers:
  - برای آسان‌تر به خاطر سپردن آن‌ها.
  - برای کاهش پیچیدگی آنها.
  - برای مقاومت در برابر حملات سیبیل.
explanation: |
  تصادفی بودن باعث می‌شود که رمزهای عبور از طریق آزمون و خطا سخت‌تر حدس زده شوند و بدین ترتیب امنیت آن‌ها در برابر حملات جستجوی فراگیر تقویت می‌شود.
reviewed: false