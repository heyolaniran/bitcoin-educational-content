question: معیار اساسی هنگام ایجاد یک حساب ایمیل جدید چیست؟
answer: از یک رمز عبور منحصر به فرد و قوی استفاده کنید.
wrong_answers:
  - رمز عبور را از حساب‌های دیگر استفاده کنید.
  - یک رمز عبور ساده برای یادآوری آسان انتخاب کنید.
  - یک رمز عبور با نام حیوان خانگی خود انتخاب کنید.
explanation: |
  یک رمز عبور منحصر به فرد و قوی برای جلوگیری از دسترسی هکرها به حساب ایمیل ضروری است.
reviewed: false