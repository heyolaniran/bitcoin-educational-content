question: وب‌سایت Have I Been Pwned به شما اجازه می‌دهد تا بررسی کنید که آیا اطلاعات شخصی شما در نقض‌های امنیتی آنلاین فاش شده است یا خیر.
answer: بررسی کنید که آیا ایمیل Address به خطر افتاده است.
wrong_answers:
  - generate رمزهای عبور جدید، قوی و تصادفی.
