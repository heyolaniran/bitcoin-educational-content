question: हैव आई बीन प्वॉन्ड वेबसाइट आपको क्या करने की अनुमति देती है?
answer: जाँच करें कि क्या ईमेल Address से छेड़छाड़ की गई है।
wrong_answers:
  - generate नये, मजबूत और यादृच्छिक पासवर्ड.
  - एक सुरक्षित ईमेल इनबॉक्स बनाएं.
  - आसान उपयोग के लिए ईमेल खातों को सिंक्रनाइज़ करें।
explanation: |
  यह साइट डेटा उल्लंघनों का पता लगाने और ईमेल Address की सुरक्षा को सत्यापित करने में मदद करती है।
reviewed: true