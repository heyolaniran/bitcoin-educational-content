title: "۲۱ درس"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  ۲۱ درس؛ آنچه از سقوط به دنیای Bitcoin آموخته‌ام نوشته گیگی کتابی است که مقدمه‌ای جامع و قابل‌فهم از Bitcoin و فناوری زیربنایی آن ارائه می‌دهد. نویسنده سفر شخصی خود را در دنیای ارزهای دیجیتال به اشتراک می‌گذارد و بینش‌هایی درباره تاریخ، فلسفه و جنبه‌های فنی Bitcoin ارائه می‌دهد. از طریق ۲۱ فصل کوتاه و آسان‌خوان، گیگی توضیح می‌دهد که Bitcoin چگونه کار می‌کند، چرا اهمیت دارد و پتانسیل آن برای تغییر جهان چیست. این کتاب برای خوانندگانی که با Bitcoin آشنا نیستند و همچنین کسانی که می‌خواهند درک خود را از این فناوری انقلابی عمیق‌تر کنند، مناسب است.