title: "21 lektioner"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  21 Lessons; What I've Learned from Falling Down the Bitcoin Rabbit Hole av Gigi är en bok som erbjuder en omfattande och tillgänglig introduktion till Bitcoin och dess underliggande teknik. Författaren delar med sig av sin personliga upptäcktsresa i kryptovalutans värld och ger insikter i Bitcoin:s historia, filosofi och tekniska aspekter. Genom 21 korta och lättlästa kapitel förklarar Gigi hur Bitcoin fungerar, varför det är viktigt och dess potential att förändra världen. Boken är lämplig för läsare som är nya inom Bitcoin och för dem som vill fördjupa sin förståelse för denna revolutionerande teknik.