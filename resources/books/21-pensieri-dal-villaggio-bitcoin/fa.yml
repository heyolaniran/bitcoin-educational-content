title: "۲۱ فکر از روستای Bitcoin"
publication_year: 2023
cover: cover_it.webp
original: true
description: |
  تحلیل‌های سرسختانه از پویایی‌های اقتصادی و اجتماعی، انتقادات گزنده از سیستم پولی کنونی، ملاحظات بی‌پروای سیاسی و فلسفی، پیش‌بینی‌های آینده‌نگرانه، کشفیات و نتایجی که اغلب خلاف شهود هستند، اما همیشه با چاشنی بی‌پایان طنز همراهند؛  
  21 فکر از روستای Bitcoin نتیجه تأملات بی‌پایان و شب‌های بی‌خوابی کسانی است که سال‌هاست به‌طور بی‌قرار در تلاشند تا راه خود را درون سوراخ خرگوش Bitcoin پیدا کنند.