title: "21 tankar från Bitcoin-byn"
publication_year: 2023
cover: cover_it.webp
original: true
description: |
  Genomträngande analyser av ekonomisk och social dynamik, bitande kritik av det nuvarande monetära systemet, respektlösa politiska och filosofiska överväganden, futuristiska förutsägelser, upptäckter och slutsatser som ofta är kontraintuitiva, men alltid kryddade med en osviklig gnutta ironi;
  21 Thoughts from the Bitcoin Village är resultatet av ändlösa reflektioner och sömnlösa nätter hos dem som i åratal har försökt att rastlöst hitta vägen in i Bitcoin:s kaninhål.