title: "En ny typ av vetenskap"
publication_year: 2002
cover: cover_en.webp
original: true
description: |
  A New Kind of Science av Stephen Wolfram är ett banbrytande verk inom datavetenskap, matematik och fysik. I den här boken presenterar Wolfram sin teori om cellulära automater, som han anser är nyckeln till att förstå universums grundläggande funktioner. Han hävdar att traditionella vetenskapliga metoder är otillräckliga för att lösa vår tids mest komplexa problem och att vi behöver en ny typ av vetenskap som bygger på studier av enkla, beräkningsbaserade system. Boken innehåller många exempel på hur cellulära automater kan användas för att modellera verkliga fenomen, och Wolfram argumenterar på ett övertygande sätt för varför detta tillvägagångssätt är nödvändigt för att göra framsteg inom områden som biologi, ekonomi och datavetenskap. Även om boken kan vara utmanande för läsare utan en stark bakgrund inom matematik och naturvetenskap, är det ett banbrytande arbete som har haft en djupgående inverkan på ett brett spektrum av discipliner.