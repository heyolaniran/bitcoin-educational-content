title: "الگوریتم‌ها و نظریه اعداد"
publication_year: 2014
cover: cover_fr.webp
original: true
description: |
  کتاب "Algorithmes et Théorie des Nombres" اثر پیر اودیبیرت یک اثر مرجع برای دانشجویان و حرفه‌ای‌های ریاضیات و علوم کامپیوتر است. این کتاب به طور عمیق به نظریه اعداد و الگوریتم‌هایی که برای حل مسائل پیچیده در این زمینه استفاده می‌شوند، می‌پردازد. نویسنده همچنین موضوعات مرتبطی مانند نظریه گروه‌ها، هندسه جبری و رمزنگاری را پوشش می‌دهد و مثال‌های عملی برای توضیح مفاهیم کلیدی ارائه می‌کند. این کتاب برای خوانندگان با تجربه که دانش قبلی از نظریه اعداد و برنامه‌نویسی دارند، در نظر گرفته شده است، اما می‌تواند برای دانشجویان پیشرفته و پژوهشگران در این زمینه‌ها نیز مفید باشد.