title: "Algoritmer och talteori för tal"
publication_year: 2014
cover: cover_fr.webp
original: true
description: |
  Boken "Algorithmes et Théorie des Nombres" av Pierre Audibert är ett referensverk för studenter och yrkesverksamma inom matematik och datavetenskap. Boken går djupt in på talteori och de algoritmer som används för att lösa komplexa problem inom detta område. Författaren tar också upp relaterade ämnen som gruppteori, algebraisk geometri och kryptografi och ger praktiska exempel för att illustrera viktiga begrepp. Boken vänder sig till erfarna läsare som har förkunskaper i talteori och programmering, men den kan också vara till nytta för avancerade studenter och forskare inom dessa områden.