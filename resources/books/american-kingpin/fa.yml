title: "پادشاه آمریکایی"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  کتاب «پادشاه آمریکایی» نوشته نیک بیلتون، داستانی واقعی و هیجان‌انگیز درباره راس اولبریکت است، مغز متفکر پشت جاده ابریشم، یک بازار سیاه آنلاین که به تجارت مواد مخدر غیرقانونی، سلاح و کالاهای دیگر با استفاده از Bitcoin به عنوان روش پرداخت می‌پرداخت. این کتاب به صعود و سقوط اولبریکت می‌پردازد، کسی که با نام مستعار "درد پایرت رابرتز" فعالیت می‌کرد، و مأموران اجرای قانونی که او را به دام انداختند. این کتاب به چالش‌های فنی و قانونی در ردیابی یک جنایتکار ناشناس در وب تاریک می‌پردازد و سوالات مهمی درباره نقش فناوری در تسهیل فعالیت‌های غیرقانونی مطرح می‌کند.