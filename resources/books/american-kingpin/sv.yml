title: "American Kingpin"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  American Kingpin, av Nick Bilton, är en gripande kriminalhistoria om Ross Ulbricht, hjärnan bakom Silk Road, en svart marknad på nätet som handlade med illegala droger, vapen och andra varor med Bitcoin som betalningsmetod. Boken går på djupet med Ulbrichts uppgång och fall, som verkade under pseudonymen "Dread Pirate Roberts", och de brottsbekämpande tjänstemän som fick honom på fall. Den utforskar de tekniska och juridiska utmaningarna med att spåra en anonym brottsling på den mörka webben, och väcker viktiga frågor om teknikens roll när det gäller att möjliggöra olaglig verksamhet.