title: "آنتی‌فرجایل"
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  کتاب "آنتی‌فرجایل" نوشته نسیم نیکلاس طالب، رویکرد جدیدی را برای تفکر درباره سیستم‌هایی که در برابر شوک‌ها و فشارها مقاوم هستند، پیشنهاد می‌دهد. طالب استدلال می‌کند که سیستم‌های آنتی‌فرجایل نه تنها در برابر فشار مقاومت می‌کنند، بلکه در این شرایط رشد کرده و قدرت و مقاومت بیشتری پیدا می‌کنند. او این ایده را به اقتصاد، مالی و تجارت اعمال می‌کند و معتقد است که بسیاری از سیستم‌ها بیش از حد شکننده هستند و ما باید آنتی‌فرجایلیتی را بپذیریم تا سیستم‌های قوی‌تر و پایدارتر ایجاد کنیم. او همچنین به چالش کشیدن حکمت متعارف می‌پردازد و توصیه‌های عملی برای چگونگی اعمال اصول آنتی‌فرجایل در زندگی و سازمان‌های خود ارائه می‌دهد.