title: "Antifragile"
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  Antifragile, av Nassim Nicholas Taleb, är en bok som föreslår ett nytt sätt att tänka kring system som är motståndskraftiga mot chocker och stressfaktorer. Taleb menar att antifragila system inte bara står emot stress, de frodas under den och blir starkare och mer motståndskraftiga under processen. Han tillämpar denna idé på ekonomi, finans och företagande och menar att många system är för bräckliga och att vi bör anamma antifragilitet för att skapa mer robusta och hållbara system. Han utmanar också konventionell visdom och ger praktiska råd om hur vi kan tillämpa antifragila principer i våra egna liv och organisationer.