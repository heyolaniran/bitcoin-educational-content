title: "رمزنگاری کاربردی"
publication_year: 1993
cover: cover_en.webp
original: true
description: |
  رمزنگاری کاربردی کتابی است که توسط بروس اشنایر، یک کارشناس در زمینه امنیت کامپیوتر و رمزنگاری نوشته شده است. این کتاب مقدمه‌ای بر اصول و مفاهیم بنیادی رمزنگاری ارائه می‌دهد و موضوعات گسترده‌ای از جمله رمزنگاری متقارن و نامتقارن، توابع Hash، امضاهای دیجیتال، مدیریت کلید و پروتکل‌های امن را پوشش می‌دهد. همچنین به تاریخچه رمزنگاری می‌پردازد و به بررسی ریسک‌ها و محدودیت‌های احتمالی سیستم‌های رمزنگاری می‌پردازد. این کتاب منبعی ضروری برای هر کسی است که به زمینه رمزنگاری علاقه‌مند است، از مبتدیان تا کارشناسان.