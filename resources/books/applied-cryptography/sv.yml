title: "Tillämpad kryptografi"
publication_year: 1993
cover: cover_en.webp
original: true
description: |
  Applied Cryptography är en bok skriven av Bruce Schneier, en expert inom området datasäkerhet och kryptografi. Boken ger en introduktion till de grundläggande principerna och begreppen inom kryptografi och täcker ett brett spektrum av ämnen, inklusive symmetrisk och asymmetrisk kryptering, Hash-funktioner, digitala signaturer, nyckelhantering och säkra protokoll. Boken tar också upp kryptografins historia och utforskar potentiella risker och begränsningar med kryptografiska system. Boken är en viktig resurs för alla som är intresserade av kryptografi, från nybörjare till experter.