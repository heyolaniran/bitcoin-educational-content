title: "Argentarius-brev från en bankdirektör till sin son"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  Argentarius; Letters of a Bank Director to his Son är en bok som skrevs av Alfred Lansburgh 1933. Det är en samling brev som författaren skrev till sin son, där han diskuterar olika ämnen relaterade till pengar, bank och finans. Boken ger en inblick i hur bankväsendet och det finansiella systemet fungerar och ger praktiska råd om hur man hanterar pengar och investeringar. Författaren betonar vikten av etiskt beteende och personligt ansvar i finansiella frågor och ger ett historiskt perspektiv på penning- och bankväsendets utveckling. Boken anses vara en klassiker inom finans och ekonomi och är fortfarande relevant idag.