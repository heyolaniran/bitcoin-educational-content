title: "اطلس شراگد"
publication_year: 1957
cover: cover_en.webp
original: true
description: |
  "اطلس شراگد" رمانی نوشته آین رند است که به بررسی موضوعاتی همچون فردگرایی، سرمایه‌داری و بازارهای آزاد می‌پردازد. داستان درباره دگنی تگارت، یک زن تاجر موفق است که تلاش می‌کند شرکت راه‌آهن خانوادگی‌اش را در میان آشفتگی‌های اقتصادی سرپا نگه دارد. او در جستجوی راه‌هایی برای بهبود عملیات شرکت با موانع مختلفی از جمله سیاستمداران فاسد و مقررات دولتی مواجه می‌شود. این رمان نقدی بر جمع‌گرایی ارائه می‌دهد و از سرمایه‌داری لسه‌فر به عنوان سیستم اقتصادی ایده‌آل حمایت می‌کند.