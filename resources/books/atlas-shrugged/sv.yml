title: "Atlas Shrugged"
publication_year: 1957
cover: cover_en.webp
original: true
description: |
  Atlas Shrugged" är en roman skriven av Ayn Rand som utforskar teman som individualism, kapitalism och fria marknader. Berättelsen följer Dagny Taggart, en framgångsrik affärskvinna som kämpar för att hålla sin familjs järnvägsbolag flytande mitt i den ekonomiska oron. När hon söker efter sätt att förbättra företagets verksamhet stöter hon på olika hinder, bland annat korrupta politiker och statliga regleringar. Romanen kritiserar kollektivismen och förespråkar laissez-faire-kapitalism som det ideala ekonomiska systemet.