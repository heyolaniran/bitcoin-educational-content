title: "اقتصاد پایه"
publication_year: 1957
cover: cover_en.webp
original: true
description: |
  "اقتصاد پایه" نوشته توماس سوول یک کتاب در سطح مبتدی است که هدف آن ارائه توضیحی روشن و مختصر از اصول پایه اقتصادی است. این کتاب موضوعات گسترده‌ای از جمله Supply و تقاضا، کنترل قیمت‌ها، تجارت بین‌المللی و مالیات را پوشش می‌دهد. سوول مفاهیم اقتصادی را به شیوه‌ای ساده و بدون استفاده از اصطلاحات پیچیده یا زبان فنی ارائه می‌دهد. این کتاب برای خوانندگانی که دانش کمی از اقتصاد دارند یا هیچ دانشی ندارند و به دنبال درک بهتری از این موضوع هستند، ایده‌آل است.