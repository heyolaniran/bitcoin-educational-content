title: "Grundläggande ekonomi"
publication_year: 1957
cover: cover_en.webp
original: true
description: |
  Basic Economics" av Thomas Sowell är en bok på nybörjarnivå som syftar till att ge en tydlig och kortfattad förklaring av grundläggande ekonomiska principer. Den täcker ett brett spektrum av ämnen, inklusive Supply och efterfrågan, priskontroller, internationell handel och beskattning. Sowell presenterar ekonomiska begrepp på ett enkelt sätt, utan att använda komplicerad jargong eller tekniskt språk. Boken är idealisk för läsare med liten eller ingen förkunskap i ekonomi som vill få en bättre förståelse för ämnet.