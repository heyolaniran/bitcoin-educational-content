title: "Bitcoin: یک کار در حال پیشرفت"
publication_year: 2022
cover: cover_en.webp
original: true
description: |
  با وجود هزاران پروژه "کریپتو" در بازار، می‌گویند Bitcoin قدیمی و خسته‌کننده است، اما هیچ چیز نمی‌تواند از حقیقت دورتر باشد. این کتاب شما را از طریق آخرین تحولات در Bitcoin، از دید یکی از توسعه‌دهندگان متعدد آن، راهنمایی می‌کند.
  
  شما درباره آخرین Soft Fork که به عنوان Taproot شناخته می‌شود، چالش‌های حفظ نرم‌افزار منبع باز از باگ‌ها و بدافزارهای سرقت‌کننده پول، روش‌های جدید برای محافظت از نودها در برابر بدکاران اینترنتی، نحوه مقابله با Blockchain که به طور مداوم در حال رشد است، و موارد دیگر یاد خواهید گرفت!
  
  هر فصل به یک قسمت مربوط از پادکست Bitcoin, Explained لینک می‌شود. کتاب همچنین به بیش از دویست مقاله، ویدئو، پادکست و حتی کد منبع لینک می‌دهد. و به لطف یک کد QR کوچک در کنار هر لینک، هرگز نیازی به تایپ URLهای طولانی نخواهید داشت.
  
  نویسنده یک توسعه‌دهنده نرم‌افزار مستقر در اوترخت، هلند است. او از سال ۲۰۱۴ در صنعت Bitcoin کار کرده و در سال ۲۰۱۷ به یک مشارکت‌کننده اصلی Bitcoin تبدیل شد، که به او جایگاهی در ردیف اول برای مشاهده تمام تحولات فنی جدید و هیجان‌انگیز داده است. او یکی از میزبانان پادکست مجله Bitcoin به نام Bitcoin, Explained است.