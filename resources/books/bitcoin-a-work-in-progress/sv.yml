title: "Bitcoin: Ett pågående arbete"
publication_year: 2022
cover: cover_en.webp
original: true
description: |
  Med tusentals "krypto" -projekt där ute säger de att Bitcoin är gammalt och
  tråkigt, men ingenting kan vara längre från sanningen. Den här boken kommer att vägleda dig
  genom den senaste utvecklingen i Bitcoin, sett genom ögonen på en av
  dess många utvecklare.
  
  Du får lära dig om den senaste Soft Fork känd som Taproot, utmaningarna med att hålla programvara med öppen källkod fri från buggar och skadlig kod som stjäl pengar, nya sätt att skydda noder mot onda människor på internet, hur man hanterar den ständigt växande Blockchain och mycket mer!
  
  Varje kapitel länkar till ett motsvarande avsnitt av podcasten Bitcoin, Explained. Boken länkar också till mer än tvåhundra artiklar, videor, podcasts och till och med källkoden. Och tack vare en liten QR-kod bredvid varje länk behöver du aldrig skriva långa webbadresser.
  
  Författaren är en mjukvaruutvecklare baserad i Utrecht, Nederländerna. Han har arbetat i Bitcoin-industrin sedan 2014 och blev en Bitcoin Core-bidragsgivare 2017, vilket ger honom en plats på första parkett till alla de senaste och mest spännande tekniska utvecklingarna. Han är en av värdarna för Bitcoin Magazine-podcasten Bitcoin, Explained.