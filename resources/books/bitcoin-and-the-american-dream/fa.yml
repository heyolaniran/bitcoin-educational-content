title: "Bitcoin و رویای آمریکایی"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  برای بسیاری، رویای آمریکایی وجود ندارد، تنها کابوسی است. استرس مالی و بار بدهی‌ها سنگینی می‌کند. سیستم به نظر می‌رسد که دستکاری شده است.
  
  در میان این ناامیدی، آمریکایی‌ها در مکانی غیرمنتظره امید پیدا می‌کنند.
  
  با کمک یک سیستم مالی جدید و جایگزین، آنها متوجه می‌شوند که اکنون می‌توانند برای بلندمدت پس‌انداز کنند. در حالی که برخی در واشنگتن این فناوری را چیزی برای ترس و رد کردن می‌بینند، آمریکایی‌ها Bitcoin را به عنوان یک فرصت می‌بینند. برای آنها، Bitcoin به عنوان ابزاری ارزشمند برای آزادی مالی و اختیار عمل ثابت شده است.
  
  در سراسر آمریکا، یک ائتلاف گسترده و متنوع در حال شکل‌گیری است. آنها معتقدند که Bitcoin در را به سوی رویای آمریکایی احیا شده باز می‌کند. این کتاب درباره آن رویاست.