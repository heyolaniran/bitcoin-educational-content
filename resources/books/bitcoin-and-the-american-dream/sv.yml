title: "Bitcoin och den amerikanska drömmen"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  För många finns det ingen amerikansk dröm, bara en mardröm. Ekonomisk stress och skuldbörda väger tungt. Systemet känns bara riggat.
  
  Mitt i denna förtvivlan finner amerikanerna hopp på en osannolik plats.
  
  Med hjälp av ett nytt, alternativt finansiellt system upptäcker de att de nu kan spara på lång sikt. Medan vissa i Washington ser en teknik som ska fruktas och avfärdas, ser amerikanerna Bitcoin som en möjlighet. För dem visar sig Bitcoin vara ett värdefullt verktyg för ekonomisk frihet och handlingskraft.
  
  Över hela USA håller en bred och mångsidig koalition på att bildas. De tror att Bitcoin låser upp dörren till en återupplivad amerikansk dröm. Den här boken handlar om den drömmen.