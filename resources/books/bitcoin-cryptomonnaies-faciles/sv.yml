title: "Bitcoin & enkla kryptovalutor"
publication_year: 2024
cover: cover_fr.webp
original: true
description: |
  Bitcoin, NFT, Blockchain, stablecoins, DeFi, Ethereum ... på bara ett
  årtionde har kryptovalutor blivit en politisk och ekonomisk fråga
  stor. Men trots deras popularitet är deras värld fortfarande komplex, präglad
  av upphöjelse och skepticism.
  Med pedagogik och enkelhet erbjuder Claire Balva och Alexandre Stachtchenko en lättillgänglig introduktion till Bitcoin och kryptovalutor. Efter en presentation av fallgroparna i det monetära och finansiella systemet i internetåldern kan resan börja. Ursprung, drift, utmaningar och förhoppningar... Följ med på en rundtur genom kapitlen och få lite praktiska råd på köpet.
  En bok du måste ha för att äntligen kunna delta i samtalet om kryptovalutor!