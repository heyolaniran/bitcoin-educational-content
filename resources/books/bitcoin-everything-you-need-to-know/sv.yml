title: "Bitcoin: Allt du behöver veta"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Den här boken riktar sig till en bred publik och går på djupet i flera ämnen
  samtidigt som den är lätt att förstå för lekmannen. Med den här boken kan du skaffa dig
  användbar kunskap om ämnet Bitcoin utan att behöva fokusera på dess
  hypertekniska detaljer. Den kommer att förse dig med all information du behöver för att
  för att förstå hur Bitcoin fungerar, men ännu viktigare, den kommer att visa dig
  vad exakt "bra pengar" är, liksom de enorma fördelar som det ger.
  Hur man använder Bitcoin, hur man skickar det, hur man tar emot det, hur man köper det. Tack vare
  den här boken kommer du snart att lära dig "allt du behöver veta" om Bitcoin! I
  bilagan hittar du flera vittnesmål från bitcoiners, pionjärerna som banade väg för resten av
  som banade väg för resten av oss.