title: "Bitcoin حاکمیت از طریق ریاضیات"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  حاکمیت از طریق ریاضیات" نوشته کنت سوانهولم، کاوشی جذاب در مورد ویژگی‌ها و اصول منحصربه‌فردی است که Bitcoin را به یک دارایی پولی انقلابی تبدیل می‌کند. در این کتاب، سوانهولم به مفاهیم بنیادی پول، تورم، کمبود و فرآیند Mining می‌پردازد تا به خوانندگان درک عمیقی از تمایز Bitcoin ارائه دهد. او به تصورات غلط رایج می‌پردازد و جنبه‌های فلسفی پیرامون Bitcoin را بررسی می‌کند و به تأثیر بالقوه آن بر باورهای دینی و جامعه به‌طور کلی می‌پردازد. با توضیحات واضح و مختصر، سوانهولم به اهمیت ماهیت غیرمتمرکز Bitcoin و نقش ریاضیات در تأمین حاکمیت آن می‌پردازد. چه تازه‌وارد به Bitcoin باشید و چه یک علاقه‌مند با تجربه، این کتاب درک شما را گسترش می‌دهد و قدرت تحول‌آفرین Bitcoin در بازسازی چشم‌انداز مالی ما را آشکار می‌کند.