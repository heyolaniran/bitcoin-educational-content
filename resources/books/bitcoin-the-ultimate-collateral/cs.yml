title: "Bitcoin: The Ultimate Collateral"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  Bitcoin: The Ultimate Collateral od Martina Connora zkoumá a shrnuje
  gW-1 a půjčování a zkoumá, jak se tyto dvě oblasti dokonale hodí k sobě
  navzájem. Díky příspěvkům odborníků z oboru je zde spousta
  reálných příkladů použití Bitcoin jako kolaterálu k financování rozsáhlého podnikání
  operací. Kniha se také podrobně zabývá platformou Firefish - a
  peer-to-peer trhu s půjčkami, který nabízí jak osobní, tak podnikatelské půjčky
  zajištěné v poměru 2:1 pomocí Bitcoin. V této knize se podíváme na to, jak bitcoináři a Bitcoin
  společnosti mohou ze svého Bitcoin vytěžit co největší hodnotu, aniž by
  prodávat.