title: "Bitcoin: Das ultimative Kollateral"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  Bitcoin: The Ultimate Collateral von Martin Connor erforscht und fasst die
  gW-1 und die Kreditvergabe zusammen und zeigt auf, wie beide perfekt zusammenpassen
  füreinander sind. Mit Beiträgen von Branchenexperten gibt es eine Vielzahl von
  beispiele aus der Praxis, in denen Bitcoin als Sicherheiten für die Finanzierung großer
  operationen. Das Buch befasst sich auch ausführlich mit der Firefish-Plattform - einem
  peer-to-Peer-Kreditmarktplatz, der sowohl Privat- als auch Geschäftskredite anbietet
  die 2 zu 1 durch Bitcoin gesichert sind. In diesem Buch schauen wir uns an, wie Bitcoiners und Bitcoin
  unternehmen den größtmöglichen Wert aus ihrem Bitcoin herausholen können, ohne
  ohne es verkaufen zu müssen.