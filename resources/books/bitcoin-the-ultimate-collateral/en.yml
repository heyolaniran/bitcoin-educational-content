title: "Bitcoin: The Ultimate Collateral"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  Bitcoin: The Ultimate Collateral by Martin Connor researches and summarizes the
  fields of bitcoin and lending, exploring how the two are a perfect match for
  each other. With contributions from industry experts, there are plenty of
  real-world examples of bitcoin being used as collateral to fund massive business
  operations. The book also goes into detail about the Firefish platform – a
  peer-to-peer lending marketplace that offers both personal and business loans
  backed 2-to-1 by bitcoin. In this book, we look at how bitcoiners and bitcoin
  companies can extract the most possible value out of their bitcoin, without
  having to sell it.
