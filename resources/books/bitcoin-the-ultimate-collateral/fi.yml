title: "Bitcoin: äärimmäinen vakuus"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  Bitcoin: The Ultimate Collateral by Martin Connor tutkii ja tiivistää
  gW-1:n ja luotonannon alat ja tutkii, miten nämä kaksi sopivat täydellisesti yhteen
  toisiinsa. Alan asiantuntijoiden panoksella on runsaasti
  todellisia esimerkkejä siitä, miten Bitcoin:tä on käytetty vakuutena massiivisen liiketoiminnan rahoittamiseen
  toimintojen rahoittamiseen. Kirjassa kerrotaan myös yksityiskohtaisesti Firefish-alustasta, joka on
  vertaislainojen markkinapaikka, joka tarjoaa sekä henkilö- että yrityslainoja
  jotka ovat 2:1 Bitcoin:n tukemia. Tässä kirjassa tarkastellaan, miten bitcoin-käyttäjät ja Bitcoin:n
  yritykset voivat saada Bitcoin:stä irti mahdollisimman suuren arvon ilman, että
  joutumatta myymään sitä.