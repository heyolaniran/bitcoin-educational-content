title: "Bitcoin: Agunan Utama"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  Bitcoin: Agunan Utama oleh Martin Connor meneliti dan merangkum
  bidang Bitcoin dan pinjaman, mengeksplorasi bagaimana keduanya sangat cocok untuk
  satu sama lain. Dengan kontribusi dari para pakar industri, ada banyak
  contoh dunia nyata dari Bitcoin yang digunakan sebagai jaminan untuk mendanai bisnis besar
  operasi bisnis yang besar. Buku ini juga membahas secara rinci tentang platform Firefish - sebuah
  pasar pinjaman peer-to-peer yang menawarkan pinjaman pribadi dan bisnis
  yang didukung 2 banding 1 oleh Bitcoin. Dalam buku ini, kita melihat bagaimana bitcoiners dan Bitcoin
  perusahaan dapat mengekstrak nilai semaksimal mungkin dari Bitcoin mereka, tanpa
  tanpa harus menjualnya.