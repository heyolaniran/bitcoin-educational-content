description: |
  マーティン・コナー著『Bitcoin：究極の担保』は、Bitcoinと融資の分野を研究し、要約している。
  Bitcoinと融資の分野を研究・要約し、この2つがいかに完璧にマッチするかを探っている。
  を研究・要約している。業界専門家の寄稿により、Bitcoinが担保として利用された実例が数多く紹介されている。
  Bitcoinが大規模な事業資金調達の担保として利用されている実例が数多く紹介されている。
  Bitcoinが担保として使われ、大規模な事業運営に資金を提供している実例が数多く紹介されている。また、本書ではファイアフィッシュ・プラットフォームについても詳しく触れている。
  ピアツーピア・レンディング・マーケットプレイス。
  Bitcoinを2対1の担保とする個人・企業向け融資を提供するピアツーピア・レンディング・マーケットプレイスであるファイアフィッシュ・プラットフォームについても詳述している。本書では、ビットコイナーとBitcoin
  企業がBitcoinを売却することなく、その価値を最大限に引き出す方法について考察している。
  どのようにBitcoinの可能な限りの価値を引き出すことができるかを考察している。