title: "Bitcoin: Den ultimate sikkerhet"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  Bitcoin: The Ultimate Collateral av Martin Connor undersøker og oppsummerer
  gW-1 og utlån, og utforsker hvordan de to er en perfekt match for hverandre
  hverandre. Med bidrag fra bransjeeksperter er det mange
  eksempler fra den virkelige verden på at Bitcoin brukes som sikkerhet for å finansiere massiv
  virksomhet. Boken går også i detalj om Firefish-plattformen - en
  peer-to-peer-lånemarkedsplass som tilbyr både personlige lån og bedriftslån
  som støttes 2-til-1 av Bitcoin. I denne boken ser vi på hvordan bitcoinere og Bitcoin
  selskaper kan få mest mulig verdi ut av Bitcoin uten å måtte selge den
  uten å måtte selge dem.