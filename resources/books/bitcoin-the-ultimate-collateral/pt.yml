title: "Bitcoin: A derradeira garantia"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  Bitcoin: The Ultimate Collateral, de Martin Connor, investiga e resume os
  campos de Bitcoin e empréstimos, explorando como os dois são uma combinação perfeita para
  um ao outro. Com contribuições de especialistas do sector, há muitos
  exemplos reais de utilização do Bitcoin como garantia para financiar grandes
  operações comerciais. O livro também entra em detalhes sobre a plataforma Firefish - um
  mercado de empréstimos peer-to-peer que oferece empréstimos pessoais e empresariais
  apoiados 2 para 1 pelo Bitcoin. Neste livro, analisamos como bitcoiners e empresas de Bitcoin
  e empresas de Bitcoin podem extrair o maior valor possível de seu Bitcoin, sem
  sem ter de o vender.