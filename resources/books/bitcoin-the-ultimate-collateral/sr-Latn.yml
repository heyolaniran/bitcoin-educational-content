title: "Bitcoin: Krajnji kolateral"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  Bitcoin: The Ultimate Collateral by Martin Connor istražuje i rezimira oblasti Bitcoin i pozajmljivanja, istražujući kako su ove dve oblasti savršen spoj jedna za drugu. Uz doprinose stručnjaka iz industrije, postoji mnogo primera iz stvarnog sveta gde se Bitcoin koristi kao kolateral za finansiranje masivnih poslovnih operacija. Knjiga takođe detaljno opisuje Firefish platformu – tržište za peer-to-peer pozajmljivanje koje nudi i lične i poslovne zajmove podržane u odnosu 2-prema-1 od strane Bitcoin. U ovoj knjizi, razmatramo kako bitkoineri i Bitcoin kompanije mogu izvući maksimalnu moguću vrednost iz svog Bitcoin, bez potrebe da ga prodaju.