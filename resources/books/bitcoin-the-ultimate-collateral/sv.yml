description: |
  Bitcoin: The Ultimate Collateral av Martin Connor undersöker och sammanfattar
  gW-1 och utlåning, och utforskar hur de två är en perfekt match för varandra
  varandra. Med bidrag från branschexperter finns det gott om
  verkliga exempel på att Bitcoin används som säkerhet för att finansiera massiva affärsverksamheter
  verksamhet. Boken går också in i detalj om Firefish-plattformen - en
  marknadsplats för peer-to-peer-utlåning som erbjuder både privat- och företagslån
  som backas upp 2 till 1 av Bitcoin. I den här boken tittar vi på hur bitcoiners och Bitcoin
  företag kan få ut mesta möjliga värde ur sin Bitcoin utan att behöva sälja den
  att behöva sälja den.