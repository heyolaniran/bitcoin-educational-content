description: |
  Bitcoin Mining är förvirrande. Som världens första Bitcoin Mining pool vet vi
  att. Braiins propagandateam sammanställde 256 termer, organiserade efter
  kategorier, för att hjälpa nya gruvarbetare att komma igång i branschen. Oavsett om du vill
  köra en ASIC för att värma upp ditt hem eller utveckla en fullständig Mining-anläggning, kommer denna ordlista
  hjälpa dig att komma igång.