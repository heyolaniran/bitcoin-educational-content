title: "ساخت Bitcoin در Rust"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  "ساخت Bitcoin در Rust" نوشته لوکاش هوزدا یک راهنمای قابل دسترس برای کسانی است که به زبان برنامه‌نویسی Rust و فناوری Bitcoin علاقه‌مند هستند. این کتاب که برای دانشجویان و حرفه‌ای‌های IT طراحی شده است، خوانندگان را از طریق فرآیند درک مفاهیم اصلی Bitcoin هدایت می‌کند و همزمان به آن‌ها آموزش می‌دهد که چگونه پروژه‌هایی را در Rust بسازند.