title: "دفترچه راهنمای Bitcoin Mining"
publication_year: 2022
cover: cover_en.webp
original: true
description: |
  اولین کتاب در این مجموعه، کتاب راهنمای Bitcoin Mining با اصول اولیه Mining شروع می‌شود، انگیزه‌های Proof of Work را توضیح می‌دهد، برخی نکات عملی برای Mining خودتان ارائه می‌دهد و یک تصور غلط رایج را با توضیح اینکه معدنچیان مسائل پیچیده ریاضی را حل نمی‌کنند، برطرف می‌کند. سپس کمی عمیق‌تر می‌شود و به ظهور فریمور سفارشی برای معدنچیان، اهمیت ارتقاء پروتکل Stratum V2 و جنبه تجاری صنعت Mining می‌پردازد. در نهایت، کتاب با مجموعه‌ای از بهترین میم‌های Mining اوایل سال 2022 به پایان می‌رسد.