title: "Bitcoin: Separering av pengar och stat"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  I en snabbt föränderlig värld där även institutioner som kyrkan
  utbildning och media har frigjort sig från statlig kontroll, ställer den tjeckiske ekonomen
  Josef Tětek en fascinerande fråga: Bör staten kontrollera pengar? I denna
  tankeväckande boken kommer du att få följa med på en djupdykning i den monetära historien
  historia, där du kommer att möta de österrikiska ekonomernas djupa insikter,
  avslöja betydelsen av tidspreferens och få en förståelse för de intrikata fallgropar
  invecklade fallgropar som följer med att förlita sig på statligt kontrollerade pengar. Missa inte
  chansen att lära dig mer om det banbrytande alternativ som Bitcoin erbjuder - ett
  alternativ som lovar att förändra vårt finansiella landskap - när du utforskar
  bokens övertygande argument för att separera pengar från staten. Skaffa din
  kopia nu och avslöja pengarnas framtid.