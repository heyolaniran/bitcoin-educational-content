title: "دنیای قشنگ نو"
publication_year: 1932
cover: cover_en.webp
original: true
description: |
  «دنیای قشنگ نو» رمانی جذاب و تفکر برانگیز از آلدوس هاکسلی است. این کتاب در جامعه‌ای آینده‌نگرانه قرار دارد که در آن فناوری و مهندسی ژنتیک دنیایی به ظاهر کامل ایجاد کرده‌اند و ما را به سفری می‌برد که مفاهیم آزادی، هویت و خوشبختی را به چالش می‌کشد. در این جامعه با دقت ساخته شده، فردیت برای ثبات اجتماعی قربانی می‌شود و انسان‌ها برای قرار گرفتن در نقش‌های از پیش تعیین‌شده خلق و شرطی می‌شوند. همه چیز از خواسته‌ها و آرزوهای مردم گرفته تا روابط شخصی‌شان به شدت توسط یک قدرت مرکزی کنترل می‌شود. شهروندان از طریق ترکیبی از داروهای تغییر دهنده ذهن، سرگرمی مداوم و سرکوب هر گونه مخالفت، راضی نگه داشته می‌شوند. نوشته‌های هاکسلی به‌طور ماهرانه‌ای پیامدهای جامعه‌ای را که ثبات و یکنواختی را بر فردیت و آزادی شخصی اولویت می‌دهد، بررسی می‌کند. او سوالات عمیقی درباره ماهیت انسانیت، محدودیت‌های پیشرفت و معنای واقعی خوشبختی مطرح می‌کند. از طریق نثر زنده و برانگیزاننده، «دنیای قشنگ نو» نقدی هولناک از جامعه‌ای ارائه می‌دهد که تجربه واقعی انسانی را در پی یک وجود کنترل‌شده و بهداشتی قربانی می‌کند. این کتاب به عنوان هشداری جدی درباره خطرات مبادله آزادی شخصی با راحتی و آسایش عمل می‌کند.