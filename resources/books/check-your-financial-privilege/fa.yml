title: "امتیاز مالی خود را بررسی کنید"
publication_year: 2022
cover: cover_en.webp
original: true
description: |
  "امتیاز مالی خود را بررسی کنید" نوشته الکس گلادستین کتابی است که به بررسی تقاطع Bitcoin، حقوق بشر، امتیاز مالی و آزادی شخصی می‌پردازد. گلادستین با دیدگاهی منحصر به فرد، نابرابری‌های موجود در سیستم‌های مالی جهان و تأثیر آن‌ها بر زندگی افراد را برجسته می‌کند. او تأکید می‌کند که تولد در یک ارز ذخیره، امتیاز مالی به همراه دارد، در حالی که اکثریت جمعیت جهانی با سیستم‌های ضعیف‌تری مواجه هستند.
  
  این کتاب داستان‌های واقعی از نقاط مختلف جهان را به تصویر می‌کشد. در نیجریه، Bitcoin به عنوان یک راه نجات برای فعالان حقوق بشر در برابر رژیم‌های استبدادی عمل کرده است. در کوبا، Bitcoin به افراد کمک کرده تا در یک سیستم ارزی بی‌ارزش حرکت کنند. در السالوادور، Bitcoin با کاهش هزینه‌های حواله و امکان انجام تراکنش‌های سریع‌تر، امید را به ارمغان می‌آورد، به ویژه اکنون که به عنوان پول قانونی شناخته شده است.
  
  به عنوان مدیر ارشد استراتژی بنیاد حقوق بشر، گلادستین از موقعیت منحصر به فرد خود برای ارائه بینش‌هایی درباره قدرت تحول‌آفرین Bitcoin برای افرادی که خارج از سیستم‌های مالی سنتی هستند، استفاده می‌کند. برای بسیاری از مردم در سراسر جهان، Bitcoin راهی برای فرار از تورم، آشفتگی سیاسی و سیستم‌های پولی قدیمی ارائه می‌دهد. در برخی موارد، حتی می‌تواند مسئله مرگ و زندگی باشد.
  
  شایان ذکر است که درآمد حاصل از فروش این کتاب به حمایت از بنیاد حقوق بشر اختصاص می‌یابد و تعهد نویسنده به ترویج حقوق بشر و شمول مالی را برجسته می‌کند.