title: "کد، زبان پنهان سخت‌افزار و نرم‌افزار کامپیوتر"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  "زبان پنهان سخت‌افزار و نرم‌افزار کامپیوتر" نوشته چارلز پتزولد یک بررسی جذاب از چگونگی استفاده از اشیاء روزمره و سیستم‌های زبانی آشنا برای کشف اسرار فناوری کامپیوتر است. پتزولد از طریق تصاویر هوشمندانه و مثال‌های قابل درک، خوانندگان را به سفری برای درک کارکردهای داخلی کامپیوترها و روش‌های خلاقانه‌ای که با آن‌ها ارتباط برقرار می‌کنیم، می‌برد. از چراغ‌قوه‌ها تا تهاجم بریتانیا، این کتاب ارتباطات بین مفاهیم ظاهراً نامرتبط و نوآوری‌های فناوری که ایجاد کرده‌اند را آشکار می‌کند. چه شما یک علاقه‌مند به فناوری باشید و چه صرفاً کنجکاو درباره دنیای کامپیوترها، "کد" یک روایت قابل فهم ارائه می‌دهد که شما را با درک عمیق‌تری از رایانه‌های شخصی، رسانه‌های دیجیتال و اینترنت که دنیای مدرن ما را شکل می‌دهند، ترک خواهد کرد. آماده باشید تا مجذوب و شیفته شوید و زمینه واقعی برای درک فناوری که ما را احاطه کرده است، به دست آورید.