title: "Kod, det dolda språket i datorers hårdvara och mjukvara"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  The Hidden Language of Computer Hardware and Software" av Charles Petzold är en fascinerande undersökning av hur vardagliga föremål och välbekanta språksystem kan användas för att lösa datorteknikens mysterier. Genom smarta illustrationer och lättförståeliga exempel tar Petzold med läsarna på en resa för att förstå hur datorer fungerar och de uppfinningsrika sätt vi kommunicerar med dem på. Från ficklampor till den brittiska invasionen - den här boken avslöjar sambanden mellan till synes orelaterade begrepp och de tekniska innovationer som de har drivit fram. Oavsett om du är teknikentusiast eller bara nyfiken på datorvärlden ger "Code" en begriplig berättelse som kommer att ge dig en djupare förståelse för de datorer, digitala medier och Internet som formar vår moderna värld. Förbered dig på att bli charmad och fängslad när du får ett verkligt sammanhang för att förstå den teknik som omger oss.