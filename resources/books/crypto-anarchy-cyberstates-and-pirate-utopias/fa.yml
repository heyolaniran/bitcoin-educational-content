title: "آنارشیسم رمزنگاری، دولت‌های سایبری و آرمان‌شهرهای دزدان دریایی"
publication_year: 2001
cover: cover_en.webp
original: true
description: |
  "آنارشیسم رمزنگاری، دولت‌های سایبری، و آرمان‌شهرهای دزدان دریایی" به ویراستاری پیتر لودلو مجموعه‌ای جذاب از نوشته‌هاست که به بررسی ظهور ساختارهای حکومتی در جوامع آنلاین و دیدگاه‌های حاکمیت سیاسی که آن‌ها را شکل می‌دهند، می‌پردازد. این کتاب به پنج بخش تقسیم شده و موضوعاتی مانند حاکمیت اینترنت، آنارشیسم رمزنگاری، تأثیر تجارت الکترونیک بر حوزه قضایی قانونی، ساختارهای حکومتی تجربی، و دیدگاه‌های آرمان‌شهری برای فضای مجازی را بررسی می‌کند. از طریق این دیدگاه‌های متنوع، خوانندگان به درک چشم‌انداز در حال تکامل حکمرانی آنلاین و پتانسیل برای اشکال نوآورانه خودگردانی در جوامع مجازی دست می‌یابند.