title: "Cyberstater med kryptoanarki och piratutopier"
publication_year: 2001
cover: cover_en.webp
original: true
description: |
  Crypto Anarchy, Cyberstates, and Pirate Utopias" redigerad av Peter Ludlow är en fascinerande samling skrifter som utforskar framväxten av styrningsstrukturer i onlinegemenskaper och de visioner om politisk suveränitet som formar dem. Boken är uppdelad i fem avsnitt och behandlar ämnen som internetsuveränitet, kryptoanarki, e-handelns inverkan på den juridiska jurisdiktionen, experimentella styrningsstrukturer och utopiska visioner för cyberrymden. Genom dessa olika perspektiv får läsarna en inblick i det föränderliga landskapet för styrning på nätet och potentialen för innovativa former av självstyre inom virtuella samhällen.