title: "اقتصاد رمزنگاری"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  اصول بنیادی اقتصاد رمزنگاری Bitcoin" نوشته اریک واسکویل به بررسی تقاطع Bitcoin، اقتصاد اتریشی و اصول اقتصادی عقلانی می‌پردازد. با محتوای فشرده و تمرکز بر به چالش کشیدن درک‌های رایج از Bitcoin، این کتاب یک بررسی جامع از پیشنهاد ارزش، مدل امنیتی و رفتار اقتصادی آن ارائه می‌دهد. با بهره‌گیری از پیشینه نویسنده به عنوان یک خلبان جنگی با تجربه، دانشمند کامپیوتر و کارآفرین، "اقتصاد رمزنگاری" دیدگاه‌های مختلفی را برای ارائه درکی جامع از Bitcoin ادغام می‌کند. این کتاب فراتر از تحلیل‌های اقتصادی و تکنولوژیکی سنتی، بینش‌هایی ارائه می‌دهد که آن را به منبعی ارزشمند برای کسانی که به دنبال درک عمیق‌تری از پیچیدگی‌ها و پتانسیل‌های Bitcoin هستند، تبدیل می‌کند.