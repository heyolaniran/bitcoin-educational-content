title: "Kryptoekonomi"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  Cryptoeconomics Fundamental Principles of Bitcoin" av Eric Voskuil fördjupar sig i skärningspunkten mellan Bitcoin, österrikisk ekonomi och rationella ekonomiska principer. Med ett tätt innehåll och fokus på att utmana vanliga uppfattningar om Bitcoin erbjuder denna bok en omfattande undersökning av dess värdeförslag, säkerhetsmodell och ekonomiska beteende. Med utgångspunkt i författarens bakgrund som stridserfaren stridspilot, datavetare och entreprenör integrerar "Cryptoeconomics" olika perspektiv för att ge en holistisk förståelse av Bitcoin. Den erbjuder insikter utöver traditionella ekonomiska och tekniska analyser, vilket gör den till en värdefull resurs för dem som söker en djupare förståelse för Bitcoin:s komplexitet och potential.