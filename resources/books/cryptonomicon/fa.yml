title: "Cryptonomicon"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  در رمان جذاب نیل استیونسون، "Cryptonomicon"، خواننده به سفری هیجان‌انگیز در زمان و سراسر جهان برده می‌شود. داستان که در دوران جنگ جهانی دوم و زمان حال اتفاق می‌افتد، گروهی از افراد نابغه از جمله ریاضیدان لارنس واترهاوس و تفنگدار بابی شفتو را دنبال می‌کند که بخشی از واحد 2702 هستند—یک واحد متفقین که وظیفه شکستن کدهای ارتباطی محور را دارد. مأموریت آن‌ها که با فریب و رازآلودگی همراه است، غرق کردن کاروان‌ها در حالی است که ظاهر بی‌گناهی را حفظ می‌کنند. در کنار آن‌ها دکتر مرموز آلن تورینگ است که عملیات رمزآلود واحد را برای واترهاوس آشکار می‌کند.
  در هم تنیده با این پس‌زمینه تاریخی، یک روایت معاصر وجود دارد که رندی واترهاوس، یک برنامه‌نویس علاقه‌مند، و امی شفتو، نوه مصمم بابی شفتو، را به تصویر می‌کشد. آن‌ها با هم در جستجوی ایجاد یک پناهگاه داده‌های فراساحلی در جنوب شرقی آسیا و احتمالاً کشف گنجینه‌های پنهانی که زمانی برای خزانه‌های نازی‌ها در نظر گرفته شده بود، هستند. هنگامی که شخصیت‌های امروزی با انوک روت رمزآلود—یک شخصیت محوری از واحد 2702 و Societas Eruditorum—مواجه می‌شوند، خود را درگیر شبکه‌ای از رمزنگاری غیرقابل شکستن و روابط توطئه‌آمیز می‌یابند.
  "Cryptonomicon" ترکیبی استادانه از تعلیق، تاریخ و جذابیت تکنولوژیکی است که به بررسی موضوعات رمزنگاری، جنگ و تأثیر ماندگار اسرار در طول نسل‌ها می‌پردازد. با مهارت داستان‌سرایی خاص نیل استیونسون، خوانندگان به یک کاوش هیجان‌انگیز از کدها، فریب و جستجوی بی‌وقفه حقیقت‌های پنهان دعوت می‌شوند.