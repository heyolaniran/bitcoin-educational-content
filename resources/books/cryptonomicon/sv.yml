title: " Cryptonomicon"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  I Neal Stephensons fängslande roman "Cryptonomicon" tas läsaren med på en spännande resa genom tiden och över hela jordklotet. Berättelsen utspelar sig under andra världskriget och i nutid och följer en grupp briljanta individer, däribland matematikern Lawrence Waterhouse och marinsoldaten Bobby Shaftoe, som ingår i Detachment 2702 - en allierad enhet som har till uppgift att knäcka axelmakternas kommunikationskoder. Med hjälp av bedrägeri och hemlighetsmakeri är deras uppdrag att sänka konvojer och samtidigt ge sken av att vara oskyldiga. Vid deras sida finns den gåtfulle Dr Alan Turing, som avslöjar enhetens kryptiska operationer för Waterhouse.
  Den historiska bakgrunden vävs samman med en nutida berättelse om Randy Waterhouse, en programmeringsnörd, och Amy Shaftoe, Bobby Shaftoes målmedvetna barnbarn. Tillsammans ger de sig ut på en resa för att etablera en offshore-datahamn i Sydostasien och potentiellt avslöja dolda skatter som en gång var avsedda för nazisternas kassakistor. När de nutida karaktärerna möter den kryptiske Enoch Root - en central figur från Detachment 2702 och Societas Eruditorum - finner de sig själva intrasslade i en väv av obrytbar kryptering och konspiratoriska band.
  "Cryptonomicon" är en mästerlig blandning av spänning, historia och tekniska intriger, som behandlar teman som kryptografi, krig och den bestående effekten av hemligheter över generationer. Med Neal Stephensons karaktäristiska berättarkonst får läsarna ta del av en spännande utforskning av koder, bedrägerier och den orubbliga jakten på dolda sanningar.