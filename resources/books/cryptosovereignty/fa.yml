title: "حاکمیت رمزنگاری: فلسفه سیاسی رمزگذاری شده Bitcoin"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  اثر برجسته اریک کاسون به‌طور درخشانی ایده‌های فلسفی و تقاطع‌های Bitcoin، حاکمیت و رمزنگاری در قرن ۲۱ را باز می‌کند. نتیجه چیزی فراتر از پول است. این درباره قدرت واقعی شخصی است که از طریق حاکمیت رمزنگاری و یک سیستم پولی واقعاً مستقل ایجاد می‌شود.
  
  اریک کاسون اولین بار در سال ۲۰۱۲ به Bitcoin علاقه‌مند شد و در سال ۲۰۱۳ به کوین‌بیس پیوست تا به گسترش Bitcoin در دسترس هرچه بیشتر مردم کمک کند. پس از ترک کوین‌بیس در سال ۲۰۱۷، او بر نوشتن مقالاتی درباره جنبه‌های اجتماعی، سیاسی و فلسفی Bitcoin تمرکز کرد. امروزه او به عنوان یک مربی Bitcoin کار می‌کند و به توسعه رویکرد فلسفی خود به Bitcoin و چگونگی تحول آن در جهان ادامه می‌دهد.