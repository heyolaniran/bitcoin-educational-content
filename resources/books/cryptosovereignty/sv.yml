title: "Kryptosuveränitet: Bitcoin:s krypterade politiska filosofi"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Erik Casons mästerverk tar på ett briljant sätt upp de filosofiska idealen och
  mellan Bitcoin, suveränitet och kryptografi under 2000-talet. Resultatet
  resultatet handlar om mer än bara pengar. Det handlar om den verkliga personliga makt som skapas
  genom kryptografins suveränitet och ett verkligt oberoende monetärt system.
  
  Erik Cason började först experimentera med Bitcoin år 2012 och 2013 gick han med i Coinbase för att hjälpa till att få Bitcoin i händerna på så många människor som möjligt. Efter att ha lämnat Coinbase 2017 fokuserade han på att skriva essäer om de sociala, politiska och filosofiska aspekterna av Bitcoin. Idag arbetar han som Bitcoin-utbildare och fortsätter att utveckla sitt filosofiska förhållningssätt till Bitcoin och hur det kommer att förändra världen.