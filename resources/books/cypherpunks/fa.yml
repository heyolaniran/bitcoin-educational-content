title: "سایفرپانک‌ها؛ آزادی و آینده اینترنت"
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  در کتاب "سایفرپانک‌ها؛ آزادی و آینده اینترنت"، جولیان آسانژ به همراه نویسندگان همکار جیکوب اپلبام و اندی مولر-ماگن، به بررسی تفکر برانگیز جنبش Cypherpunk و پیامدهای آن برای آینده دیجیتال ما می‌پردازند. با تمرکز بر قدرت رمزنگاری قوی، این کتاب گروهی از متفکران و فعالان تأثیرگذار را گرد هم می‌آورد تا بررسی کنند که آیا ارتباطات الکترونیکی به آزادی منجر خواهد شد یا سرکوب.
  
  آسانژ سوالات مهمی را درباره میزان نظارت انجام شده توسط غول‌های فناوری مانند فیس‌بوک و گوگل مطرح می‌کند و می‌پرسد آیا آن‌ها نمایانگر یک ماشین نظارتی بی‌سابقه هستند که به طور مداوم زندگی ما را ردیابی می‌کند. علاوه بر این، نویسندگان به مفهوم همکاری با نظارت پرداخته و مشروعیت اشکال مختلف نظارت را به ویژه در رابطه با نگرانی‌های اجتماعی مانند پولشویی، مواد مخدر، تروریسم و پورنوگرافی بررسی می‌کنند. آن‌ها همچنین بررسی می‌کنند که آیا اقدام آگاهانه و مهارت فنی می‌تواند به ما کمک کند تا مقاومت کنیم و دنیایی بسازیم که در آن اینترنت آزادی را تقویت کند.
  
  با توجه به آزار و اذیت ویکی‌لیکس و دیگر فعالان اینترنتی، همراه با تلاش‌های قانونی برای محدود کردن اشتراک‌گذاری فایل، که نقطه عطفی در سیاست‌های اینترنت را نشان می‌دهد، این کتاب بحثی به موقع درباره انتخاب‌هایی که با آن‌ها روبرو هستیم ارائه می‌دهد. این کتاب دیدگاه‌های متضادی را ارائه می‌دهد—یکی که حریم خصوصی برای ضعیفان و شفافیت برای قدرتمندان را ترویج می‌کند، و دیگری که کنترل دولت و شرکت‌ها را ادامه می‌دهد در حالی که به حریم خصوصی فردی تجاوز می‌کند. با وضوح و اشتیاق جذاب، آسانژ و هم‌بحثانش پیچیدگی‌های پیرامون این تصمیم حیاتی را بررسی می‌کنند و خوانندگان را به تأمل درباره آینده اینترنت و حفظ آزادی‌های ما در آن دعوت می‌کنند.