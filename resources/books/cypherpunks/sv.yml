title: "Cypherpunks; Frihet och Internets framtid"
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  I "Cypherpunks; Freedom and the Future of the Internet" presenterar Julian Assange, tillsammans med medförfattarna Jacob Appelbaum och Andy Müller-Maguhn, en tankeväckande undersökning av Cypherpunk-rörelsen och dess konsekvenser för vår digitala framtid. Med fokus på kraften i stark kryptografi samlar boken en grupp inflytelserika tänkare och aktivister för att undersöka om elektronisk kommunikation kommer att leda till befrielse eller förtryck.
  Assange ställer kritiska frågor om omfattningen av den övervakning som utförs av teknikjättar som Facebook och Google, och undrar om de utgör en aldrig tidigare skådad övervakningsmaskin som ständigt följer våra liv. Vidare fördjupar sig författarna i begreppet samarbete med övervakning och utforskar legitimiteten i olika former av övervakning, särskilt i relation till samhällsproblem som penningtvätt, droger, terrorism och pornografi. De undersöker också om medvetna handlingar och tekniskt kunnande kan hjälpa oss att göra motstånd och skapa en värld där internet främjar frihet.
  Trakasserierna mot WikiLeaks och andra internetaktivister, tillsammans med lagstiftningsförsök för att begränsa fildelning, signalerar en vändpunkt i internetpolitiken, och boken erbjuder en aktuell diskussion om de val vi står inför. Den presenterar kontrasterande visioner - en som förespråkar integritet för de svaga och öppenhet för de mäktiga, och en annan som vidmakthåller statlig och företagskontroll samtidigt som den inkräktar på individens integritet. Med klarhet och engagerande entusiasm navigerar Assange och hans meddiskutanter genom komplexiteten kring detta avgörande beslut och får läsarna att fundera över internets framtid och bevarandet av våra friheter på internet.