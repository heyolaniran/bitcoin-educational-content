title: "بدهی: اولین 5000 سال"
publication_year: 2011
cover: cover_en.webp
original: true
description: |
  "بدهی؛ اولین 5000 سال" نوشته دیوید گربر یک تحلیل انسان‌شناختی و تاریخی از مفهوم بدهی در طول تمدن بشری است، از سومر باستان تا دوران مدرن. نویسنده باور عمومی که بدهی بخشی طبیعی و ضروری از جامعه انسانی است را به چالش می‌کشد و استدلال می‌کند که از آن به عنوان ابزاری برای کنترل اجتماعی و سلطه استفاده شده است. این کتاب دیدگاهی تأمل‌برانگیز درباره نقش بدهی در زندگی ما و تأثیر آن بر سیستم‌های اجتماعی و اقتصادی ارائه می‌دهد.