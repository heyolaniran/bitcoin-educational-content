title: "Skuld de första 5000 åren"
publication_year: 2011
cover: cover_en.webp
original: true
description: |
  "Debt; the first 5000 years" av David Graeber är en antropologisk och historisk analys av skuldbegreppet genom hela den mänskliga civilisationen, från forntida Sumer till idag. Författaren utmanar den gängse uppfattningen att skulder är en naturlig och nödvändig del av det mänskliga samhället och menar att de har använts som ett verktyg för social kontroll och dominans. Boken ger ett tankeväckande perspektiv på skuldens roll i våra liv och dess inverkan på sociala och ekonomiska system.