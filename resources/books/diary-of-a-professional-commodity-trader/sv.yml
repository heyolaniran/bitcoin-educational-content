title: "Dagbok från en professionell råvaruhandlare"
publication_year: 2011
cover: cover_en.webp
original: true
description: |
  "Diary of a Professional Commodity Trader" av Peter Brandt är en memoarbok och en pedagogisk guide som skildrar författarens erfarenhet av råvaruhandel. Genom sina personliga berättelser ger Brandt insikter i det tankesätt, den disciplin och de strategier som krävs för att bli en framgångsrik handlare på de mycket konkurrensutsatta och volatila råvarumarknaderna. Han ger praktiska råd om riskhantering, teknisk analys och marknadspsykologi samt delar med sig av sin syn på teknikens roll och globaliseringens inverkan på råvaruhandeln. Boken riktar sig till erfarna traders och investerare som vill förbättra sina kunskaper och färdigheter inom råvaruhandel.