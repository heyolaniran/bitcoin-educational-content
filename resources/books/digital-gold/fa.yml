title: "طلای دیجیتال"
publication_year: 2015
cover: cover_en.webp
original: true
description: |
  Bitcoin و داستان درونی ناسازگاران و میلیونرهایی که تلاش می‌کنند پول را دوباره اختراع کنند، ناتانیل پاپر یک روایت جذاب از صعود Bitcoin و شخصیت‌های رنگارنگ پشت آن ارائه می‌دهد. از آنارشیست‌های بریتانیایی تا کارآفرینان چینی و Satoshi ناکاموتوی مرموز، پاپر به بررسی پتانسیل انقلابی این ارز دیجیتال برای به چالش کشیدن سیستم‌های مالی سنتی می‌پردازد. با داستان‌هایی از ثروت‌هایی که به دست آمده و از دست رفته‌اند، "طلای دیجیتال" تأثیر عمیق Bitcoin و تلاش آن برای بازسازی دنیای پول را آشکار می‌کند.