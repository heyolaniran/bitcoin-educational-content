title: "Digitalt guld"
publication_year: 2015
cover: cover_en.webp
original: true
description: |
  Bitcoin and the Inside Story of the Misfits and Millionaires Trying to Reinvent Money" ger Nathaniel Popper en fängslande redogörelse för Bitcoin:s uppgång och de färgstarka personerna bakom den. Från brittiska anarkister till kinesiska entreprenörer och den gåtfulla Satoshi Nakamoto utforskar Popper den digitala valutans revolutionerande potential att utmana traditionella finansiella system. Med berättelser om förmögenheter som skapats och förlorats avslöjar "Digital Gold" den djupgående inverkan av Bitcoin och dess strävan att omforma penningvärlden.