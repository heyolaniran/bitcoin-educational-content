title: "اقتصاد در یک درس"
publication_year: 1946
cover: cover_en.webp
original: true
description: |
  "اقتصاد در یک درس"، نوشته هنری هزلیت در سال 1946، یک مقدمه کلاسیک است که مفاهیم پیچیده اقتصادی را به اصطلاحات قابل درک تبدیل می‌کند. این کتاب بر درس اساسی تمرکز دارد که پیامدهای بلندمدت هر اقدام اقتصادی باید در نظر گرفته شود، نه فقط نتایج فوری. هزلیت با رد افسانه‌های اقتصادی رایج، به درک اقتصاد بازار آزاد و پیامدهای گسترده‌تر اجتماعی آن کمک می‌کند. این کتاب به عنوان یک نقطه ورود عالی برای مبتدیان و یک مرجع برای افراد با تجربه در حوزه اقتصاد عمل می‌کند.