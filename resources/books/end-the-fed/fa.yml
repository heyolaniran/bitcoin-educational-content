title: "پایان دادن به فدرال رزرو"
publication_year: 2009
cover: cover_en.webp
original: true
description: |
  در کتاب "پایان دادن به فدرال رزرو"، ران پل نقش فدرال رزرو را به چالش می‌کشد و استدلال می‌کند که این نهاد هم فاسد و هم خلاف قانون اساسی است. با استفاده از تاریخ آمریکا، اقتصاد و تجربیات سیاسی خود، پل معتقد است که سیاست‌های تورمی فدرال رزرو تهدیدی جدی برای اقتصاد محسوب می‌شود و ممکن است به یک رکود تورمی منجر شود. برخلاف باور عمومی، پل ادعا می‌کند که فدرال رزرو برخلاف منافع مردم عمل می‌کند. او با فوریت از شهروندان و مقامات می‌خواهد که به این مسئله توجه کنند و راه‌حل‌هایی برای اصلاح سیاست اقتصادی آمریکا به نفع نسل‌های آینده ارائه می‌دهد.