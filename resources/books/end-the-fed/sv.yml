title: "Avsluta Fed"
publication_year: 2009
cover: cover_en.webp
original: true
description: |
  I "End the Fed" utmanar Ron Paul den amerikanska centralbankens roll och hävdar att den är både korrupt och grundlagsstridig. Med utgångspunkt i amerikansk historia, ekonomi och sina egna politiska erfarenheter hävdar Paul att Feds inflationsdrivande metoder utgör ett betydande hot mot ekonomin och potentiellt kan leda till en inflationsdepression. I motsats till vad många tror hävdar Paul att Fed arbetar mot folkets intressen. Han vänder sig till både medborgare och tjänstemän och ger insikter om var landet gick fel och föreslår lösningar för att rätta till USA:s ekonomiska politik till förmån för kommande generationer.