title: "انرژی و تمدن"
publication_year: 2017
cover: cover_en.webp
original: true
description: |
  در کتاب "انرژی و تمدن: یک تاریخ"، نویسنده برجسته وکلاو اسمیل به بررسی جامع چگونگی تأثیرگذاری انرژی به عنوان نیروی محرکه در شکل‌دهی جوامع انسانی از زمان‌های پیش از کشاورزی تا تمدن کنونی مبتنی بر سوخت‌های فسیلی می‌پردازد.
  
  اسمیل تأکید می‌کند که انرژی ارز جهانی است که تمامی فعالیت‌های انسانی را به حرکت درمی‌آورد. از نیروهای طبیعی که چشم‌انداز زمین را شکل می‌دهند تا نقش حیاتی انرژی خورشیدی در حفظ حیات از طریق فتوسنتز، انسان‌ها جریان‌های مختلف انرژی را برای ایجاد تمدن خود مهار کرده‌اند. این کتاب به تأثیر عمیق انرژی بر هر جنبه‌ای از زندگی انسانی، از جمله کشاورزی، صنعت، حمل و نقل، ارتباطات، اقتصاد، شهرنشینی، سیاست و محیط زیست می‌پردازد.
  
  انسان‌ها توانایی منحصر به فردی در مهار انرژی‌های خارجی با استفاده از عقل و مجموعه‌ای از ابزارها، از ابزارهای ساده تا فناوری‌های پیشرفته مانند موتورهای احتراق داخلی و راکتورهای هسته‌ای دارند. اسمیل به بررسی تغییر تحول‌آفرین به سوخت‌های فسیلی و اثرات گسترده آن بر جامعه می‌پردازد و بررسی می‌کند که چگونه این تغییر کشاورزی، صنعت، جنگ، کیفیت زندگی و موارد دیگر را شکل داده است.
  
  با رویکردی پانورامیک و میان‌رشته‌ای، اسمیل نمای کلی و جامع از دوره‌های انرژی بشریت ارائه می‌دهد و به خوانندگان درک کاملی از رابطه پیچیده بین انرژی و تمدن می‌بخشد. این نسخه به طور گسترده به‌روزرسانی و گسترش یافته و شامل آخرین تحقیقات و تحولات در مطالعات انرژی است، که آن را به منبعی حیاتی برای هر کسی که به تاریخ و آینده انرژی علاقه‌مند است تبدیل می‌کند.