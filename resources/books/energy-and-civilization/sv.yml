title: "Energi och civilisation"
publication_year: 2017
cover: cover_en.webp
original: true
description: |
  I "Energy and Civilization: A History" presenterar den hyllade författaren Vaclav Smil en omfattande undersökning av hur energi har varit en drivkraft i utformningen av mänskliga samhällen från förkulturell tid till vår nuvarande fossilbränsledominerade civilisation.
  
  Smil betonar att energi är den universella valuta som driver alla mänskliga aktiviteter. Från de naturkrafter som formar jordens landskap till solenergins avgörande roll för att upprätthålla liv genom fotosyntesen, har människan utnyttjat olika energiflöden för att möjliggöra sin civiliserade existens. Den här boken handlar om energins djupgående inverkan på alla aspekter av mänskligt liv, inklusive jordbruk, industri, transport, kommunikation, ekonomi, urbanisering, politik och miljö.
  
  Människan har en unik förmåga att utnyttja yttre energier med hjälp av sitt intellekt och en rad olika verktyg, från enkla redskap till avancerad teknik som förbränningsmotorer och kärnreaktorer. Smil spårar den omvälvande övergången till fossila bränslen och dess genomgripande effekter på samhället, och undersöker hur den har format jordbruk, industri, krigföring, livskvalitet och mycket mer.
  
  Med ett panoramiskt och tvärvetenskapligt tillvägagångssätt presenterar Smil en magistral översikt över mänsklighetens energieror och ger läsarna en omfattande förståelse för det invecklade förhållandet mellan energi och civilisation. Denna omfattande uppdaterade och utökade utgåva innehåller den senaste forskningen och utvecklingen inom energistudier, vilket gör den till en viktig resurs för alla som är intresserade av energins historia och framtid.