title: "انرژی"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  در کتاب "انرژی، تاریخچه‌ای انسانی"، ریچارد رودز، نویسنده برنده جایزه پولیتزر، ما را به سفری جذاب در گذرگاه‌های منابع انرژی در طول زمان می‌برد. از چوب به زغال‌سنگ، از زغال‌سنگ به نفت، و اکنون ظهور گاز طبیعی، انرژی هسته‌ای و انرژی‌های تجدیدپذیر، رودز نقش محوری انرژی در شکل‌دهی به مسیر تاریخ بشر را بررسی می‌کند.
  
  از طریق مجموعه‌ای از شخصیت‌های تأثیرگذار در طول پنج قرن، از جمله ملکه الیزابت اول، بنجامین فرانکلین، جان دی. راکفلر و هنری فورد، رودز موفقیت‌ها و شکست‌هایی را که به پیشرفت‌های تولید انرژی منجر شده‌اند، روشن می‌کند. او به درس‌هایی که از هر چالش آموخته شده، تسلط بر گذارها و توانایی بهره‌برداری از فرصت‌ها می‌پردازد.
  
  رودز همچنین به بررسی چشم‌انداز کنونی انرژی می‌پردازد و رقابت بین انرژی بادی و منابع سنتی مانند زغال‌سنگ و گاز طبیعی را بررسی می‌کند. او به مسئله فوری گرمایش جهانی و پیامدهای جمعیت جهانی در حال رشد سریع می‌پردازد.
  
  "انرژی" به ما یادآوری می‌کند که در طول تاریخ، انسان‌ها با استخراج زندگی از مواد خام دست و پنجه نرم کرده‌اند. هر اختراع، کشف و تطبیق چالش‌های خاص خود را به همراه داشته است و ما را به جایی که امروز ایستاده‌ایم رسانده است. با سبک داستان‌سرایی متمایز خود، رودز نشان می‌دهد که چگونه درک تاریخچه انرژی ما می‌تواند آینده‌ای آگاهانه‌تر و پایدارتر را شکل دهد.