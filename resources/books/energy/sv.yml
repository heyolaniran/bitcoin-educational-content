title: "Energi"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  I "Energy, A Human History" tar den Pulitzerprisbelönte författaren Richard Rhodes med oss på en fängslande resa genom energikällornas förändringar över tid. Från trä till kol, från kol till olja, och nu framväxten av naturgas, kärnkraft och förnybar energi, utforskar Rhodes energins avgörande roll för att forma mänsklighetens historia.
  Genom en rad inflytelserika personer från fem århundraden, bland andra drottning Elizabeth I, Benjamin Franklin, John D. Rockefeller och Henry Ford, belyser Rhodes de framgångar och misslyckanden som ledde till genombrott inom energiproduktionen. Han fördjupar sig i lärdomarna från varje utmaning, bemästrandet av övergångar och förmågan att ta vara på möjligheter.
  Rhodes granskar också det nuvarande energilandskapet och undersöker konkurrensen mellan vindkraft och traditionella energikällor som kol och naturgas. Han tar upp den akuta frågan om den globala uppvärmningen och konsekvenserna av en snabbt växande världsbefolkning.
  "Energy" påminner oss om att människan genom historien har kämpat med att utvinna liv ur råmaterial. Varje uppfinning, upptäckt och anpassning har medfört sin egen uppsättning utmaningar, vilket har lett oss till var vi står idag. Med sin distinkta berättarstil visar Rhodes hur förståelsen av vår energihistoria kan forma en mer välinformerad och hållbar framtid.