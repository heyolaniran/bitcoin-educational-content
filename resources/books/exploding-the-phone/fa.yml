title: "انفجار تلفن"
publication_year: 2013
cover: cover_en.webp
original: true
description: |
  در کتاب "انفجار تلفن: داستان ناگفته نوجوانان و قانون‌شکنانی که به مابِل نفوذ کردند"، نویسنده فیل لپسلی داستان جذاب گروه متنوعی از افرادی را فاش می‌کند که در زمانی قبل از گوشی‌های هوشمند و اینترنت، یاد گرفتند چگونه به بزرگ‌ترین سیستم تلفنی جهان نفوذ کنند. از روزهای اولیه تلگراف هارمونیک الکساندر گراهام بل تا شبکه پیچیده ماشین‌های پیشرفته و اپراتورهای انسانی که سیستم تلفن را تشکیل می‌دادند، لپسلی به تولد ارتباطات راه دور و ظهور انحصار AT&T می‌پردازد.
  
  از طریق تحقیقات دقیق، لپسلی به دنیای زیرزمینی "فریک‌های تلفنی" نوری می‌تاباند، یک زیرفرهنگ از تکنوفیل‌ها، نوجوانان نابینا، هیپی‌ها و قانون‌شکنانی که شبکه تلفن را به زمین بازی الکترونیکی خود تبدیل کردند. او بررسی می‌کند که چگونه این افراد از آسیب‌پذیری‌های سیستم مابِل سوءاستفاده کردند و توجه هم گانگسترهایی که به دنبال فرار از مقامات بودند و هم علاقه‌مندان به فرهنگ ضد جریان که به هک تلفن مشغول بودند را به خود جلب کردند. کتاب همچنین به درگیری شدید بین فریک‌ها، شرکت تلفن و FBI می‌پردازد.
  
  "انفجار تلفن" یک روایت پیشگامانه و جذاب از این داستان ناگفته ارائه می‌دهد و با تکیه بر تحقیقات اصلی، دنیای مخفی هک تلفن و تأثیر آن بر جامعه را فاش می‌کند. این کتاب گواهی بر نبوغ و جسارت کسانی است که وضعیت موجود را به چالش کشیدند و برای همیشه چشم‌انداز ارتباطات راه دور را تغییر دادند.