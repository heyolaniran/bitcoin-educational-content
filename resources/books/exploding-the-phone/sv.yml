title: "Exploderar telefonen"
publication_year: 2013
cover: cover_en.webp
original: true
description: |
  I "Exploding the Phone, The Untold Story of the Teenagers and Outlaws Who Hacked Ma Bell" avslöjar författaren Phil Lapsley den fängslande berättelsen om en grupp individer som, i en tid före smartphones och Internet, upptäckte hur man hackade världens största telefonsystem. Från de första dagarna med Alexander Graham Bells "harmoniska telegraf" till det komplexa nätet av avancerade maskiner och mänskliga operatörer som utgjorde telefonsystemet, gräver Lapsley i födelsen av långdistanskommunikation och AT&T:s monopol.
  
  Genom minutiös forskning kastar Lapsley ljus över den underjordiska världen av "phone phreaks", en subkultur av teknofiler, blinda tonåringar, hippies och laglösa som förvandlade telefonnätet till sin elektroniska lekplats. Han utforskar hur dessa individer utnyttjade sårbarheterna i Ma Bells system och drog till sig uppmärksamhet från både gangsters som försökte undvika myndigheterna och motkulturentusiaster som ägnade sig åt telefonhackning. Boken tar också upp den intensiva konflikten mellan phreakarna, telefonbolaget och FBI.
  
  "Exploding the Phone" är en banbrytande och fängslande redogörelse för denna okända historia, som bygger på originalforskning för att avslöja den hemliga världen av telefonhackning och dess inverkan på samhället. Det är ett vittnesbörd om uppfinningsrikedomen och djärvheten hos dem som utmanade status quo och för alltid förändrade telekommunikationens landskap.