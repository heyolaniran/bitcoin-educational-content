title: "فارنهایت ۴۵۱"
publication_year: 1953
cover: cover_en.webp
original: true
description: |
  فارنهایت ۴۵۱، نوشته نویسنده مشهور علمی تخیلی ری بردبری، رمانی دیستوپیایی است که جامعه آینده‌ای در آمریکا را به تصویر می‌کشد که در آن کتاب‌ها ممنوع شده‌اند و "آتش‌نشان‌ها" هر کتابی را که پیدا کنند می‌سوزانند. عنوان به دمایی اشاره دارد که در آن کاغذ کتاب آتش می‌گیرد و می‌سوزد. داستان گای مونتاگ، یک آتش‌نشان را دنبال می‌کند که از نقش خود در اجرای سانسور دولتی و هنجارهای مخرب اجتماعی ناامید می‌شود و او را به پرسش و شورش علیه وضعیت موجود وادار می‌کند. رمان بردبری نقدی عمیق بر آسیب‌های احتمالی سانسور و سرکوب ایده‌ها است و بر نقش بی‌قیمت ادبیات و تفکر انتقادی در جامعه تأکید می‌کند.