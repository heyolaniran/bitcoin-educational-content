title: "Fahrenheit 451"
publication_year: 1953
cover: cover_en.webp
original: true
description: |
  Fahrenheit 451", skriven av den hyllade science fiction-författaren Ray Bradbury, är en dystopisk roman som presenterar ett framtida amerikanskt samhälle där böcker är förbjudna och "brandmän" bränner alla som hittas. Titeln syftar på den temperatur vid vilken bokpapper fattar eld och brinner. Berättelsen följer Guy Montag, en brandman som blir desillusionerad över sin roll att upprätthålla statens censur och destruktiva samhällsnormer, vilket leder honom till att ifrågasätta och göra uppror mot status quo. Bradburys roman är en djupgående kritik av den potentiella skadan av censur och undertryckande av idéer, och betonar litteraturens och det kritiska tänkandets ovärderliga roll i samhället.