title: "تورم پول فیات در فرانسه"
publication_year: 1896
cover: cover_en.webp
original: true
description: |
  "تورم پول فیات در فرانسه"، نوشته اندرو دیکسون وایت در سال 1896، بررسی مهمی از بحران اقتصادی است که پس از انقلاب فرانسه رخ داد. این کتاب پیامدهای فاجعه‌بار چاپ بی‌رویه پول و اتکای بیش از حد به ارز فیات را که منجر به ابر تورم و آشفتگی اقتصادی در فرانسه پس از انقلاب شد، مورد بررسی قرار می‌دهد.
  
  اثر وایت به عنوان یک داستان هشداردهنده درباره خطرات سیاست‌های پولی که توسط ذخایر فیزیکی پشتیبانی نمی‌شوند، عمل می‌کند و تأثیر فاجعه‌بار تورم بر اقتصاد و ساختار یک جامعه را نشان می‌دهد. این تحلیل تاریخی بصیرت‌آمیز همچنان برای خوانندگان مدرن بسیار مرتبط است و درس‌های مهمی درباره سیاست اقتصادی، مسئولیت مالی و پیامدهای واقعی تصمیمات مالی دولت‌ها ارائه می‌دهد.