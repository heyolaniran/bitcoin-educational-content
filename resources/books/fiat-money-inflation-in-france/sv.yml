title: "FIAT-pengar Inflation i Frankrike"
publication_year: 1896
cover: cover_en.webp
original: true
description: |
  Fiat Money Inflation in France", skriven av Andrew Dickson White 1896, är en banbrytande undersökning av den ekonomiska kris som inträffade efter den franska revolutionen. Boken granskar de katastrofala följderna av okontrollerad penningtryckning och övertro på fiatvalutor, vilket ledde till hyperinflation och ekonomisk oro i det postrevolutionära Frankrike.
  
  Whites arbete fungerar som en varnande berättelse om farorna med penningpolitik som inte backas upp av fysiska reserver och visar inflationens katastrofala inverkan på ett samhälles ekonomi och struktur. Denna insiktsfulla historiska analys är fortfarande högst relevant för moderna läsare och ger viktiga lärdomar om ekonomisk politik, finanspolitiskt ansvar och de verkliga konsekvenserna av finansiella beslut som fattas av regeringar.