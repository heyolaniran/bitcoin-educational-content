title: "فیات همه چیز را خراب می‌کند"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  شما در حال دزدیده شدن هستید. پول شما در حال کاهش ارزش است، کار شما در حال کاهش ارزش است، تمدن شما و تمام نهادهای آن در حال کاهش ارزش هستند. شما مجبورید بیشتر کار کنید و کمتر دستمزد بگیرید. شما دوستان و خانواده‌تان را کمتر و کمتر می‌بینید. غذای بدتری می‌خورید، کمی کمتر می‌خوابید، و محله‌تان هر سال کمی غیرشخصی‌تر می‌شود. زندگی شما در حال بدتر شدن است و شما برای افراط دیگران هزینه می‌پردازید. چگونه این اتفاق افتاد و چرا در حال وقوع است؟ "فیات همه چیز را خراب می‌کند" تحلیلی است از کاهش ارزش دنیای مدرن از سیستم بانکی و املاک و مستغلات ما تا سیستم آموزشی و هنر ما. بیاموزید چرا این سیستم‌ها همچنان بدتر می‌شوند و چرا Bitcoin اوضاع را بهتر خواهد کرد.
  
  "فیات همه چیز را خراب می‌کند" ضربه‌ای قاطع وارد می‌کند و تخریب گسترده‌ای که توسط سیستم ارز فیات ایجاد شده را آشکار می‌سازد، در حالی که امیدی که در Bitcoin یافت می‌شود را برجسته می‌کند. روایت جذاب به قلب مشکلات جامعه می‌پردازد و حقیقت تاریک سیستم مالی کنونی ما را فاش می‌کند، در حالی که همچنین دیدگاهی تحول‌آفرین برای آینده ارائه می‌دهد. این کتاب خواندنی ضروری برای هر کسی است که احساس می‌کند توسط سیستم کنونی بازی خورده است اما در عمق وجودش می‌داند که هنوز می‌توان به رفاه و فراوانی دست یافت.