title: "Fiat förstör allt"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Ni blir bestulna på er själva. Dina pengar förminskas, ditt arbete förminskas
  din civilisation och alla dess institutioner förringas. Du
  måste arbeta längre för mindre lön. Du träffar dina vänner och din familj mindre och
  mindre. Du äter sämre mat, du sover lite mindre, och ditt grannskap blir lite
  lite mer opersonligt för varje år. Ditt liv blir allt sämre och du
  betalar för någon annans överflöd. Hur kunde detta hända och varför händer det?
  Fiat Ruins Everything är en analys av förnedringen av den moderna världen från
  vårt banksystem och fastigheter till vårt utbildningssystem och konst. Lär dig varför
  dessa system fortsätter att bli värre och varför Bitcoin kommer att göra saker bättre.
  
  Fiat Ruins Everything levererar ett knockoutslag och avslöjar den genomgripande förstörelse som orsakas av fiatvalutasystemet samtidigt som den lyfter fram det hopp som finns i Bitcoin. Den fängslande berättelsen går till botten med samhällets problem och avslöjar den mörka sanningen om vårt nuvarande finansiella system samtidigt som den erbjuder en omvälvande vision för framtiden. Det här är viktig läsning för alla som känner sig lurade av det nuvarande systemet men som innerst inne vet att välstånd och överflöd fortfarande kan uppnås.