title: "فریب‌خورده توسط تصادف"
publication_year: 2001
cover: cover_en.webp
original: true
description: |
  "فریب‌خورده توسط تصادف" کتابی نوشته نسیم نیکلاس طالب است که به بررسی تأثیر تصادف و احتمال بر زندگی ما، به‌ویژه در دنیای مالی می‌پردازد. طالب استدلال می‌کند که انسان‌ها به‌طور طبیعی برای تفکر احتمالی طراحی نشده‌اند و بنابراین اغلب فرضیات نادرستی درباره علل موفقیت و شکست می‌سازیم. او با ارائه مثال‌هایی از امور مالی و زندگی روزمره نشان می‌دهد که چگونه تصادف نقش مهمی در زندگی ما ایفا می‌کند و پیشنهاداتی برای بهتر پیمودن این عدم قطعیت ارائه می‌دهد. این کتاب خوانندگان را به بازنگری در رویکرد خود به تصمیم‌گیری و در نظر گرفتن نقش تصادف در زندگی‌شان به چالش می‌کشد.