title: "Lurad av slumpen"
publication_year: 2001
cover: cover_en.webp
original: true
description: |
  "Fooled By Randomness" är en bok skriven av Nassim Nicholas Taleb som utforskar hur slumpmässighet och sannolikhet påverkar våra liv, särskilt i finansvärlden. Taleb menar att människan inte är skapad för att tänka probabilistiskt och att vi därför ofta gör felaktiga antaganden om orsakerna till framgång och misslyckande. Han ger exempel från finansvärlden och vardagslivet för att illustrera hur slumpen spelar en viktig roll i våra liv och ger förslag på hur man bättre kan navigera i denna osäkerhet. Boken utmanar läsarna att omvärdera sitt sätt att fatta beslut och fundera över slumpens roll i deras liv.