title: "آینده فسیلی؛ چرا شکوفایی جهانی انسان به نفت، زغال‌سنگ و منابع طبیعی بیشتری نیاز دارد"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  در "آینده فسیلی، چرا شکوفایی جهانی انسان نیاز به نفت، زغال‌سنگ و گاز طبیعی بیشتری دارد--نه کمتر"، الکس اپستین باورهای رایج درباره آینده انرژی را به چالش می‌کشد و استدلال می‌کند که مزایای سوخت‌های فسیلی از عوارض جانبی آن‌ها بیشتر است. از طریق چارچوب شکوفایی انسانی، اپستین موردی قانع‌کننده برای ادامه استفاده از سوخت‌های فسیلی ارائه می‌دهد و تصورات غلط درباره تأثیرات آب و هوایی و تسلط انرژی‌های تجدیدپذیر را رد می‌کند. این کتاب تفکر برانگیز خوانندگان را تشویق می‌کند تا درک خود از انرژی، محیط زیست و تغییرات آب و هوایی را بازنگری کنند و دیدگاه جدیدی درباره مسیر شکوفایی جهانی انسان ارائه می‌دهد.