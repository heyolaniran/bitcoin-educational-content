description: |
  نرم‌افزار آزاد، جامعه آزاد، مقالات منتخب" مجموعه‌ای از نوشته‌های تفکر برانگیز ریچارد ام. استالمن، لارنس لسیگ و جاشوا گی است. این کتاب به مسائل حیاتی پیرامون حق‌تألیف، قانون ثبت اختراع و مفهوم "محاسبات مورد اعتماد" در زمینه نرم‌افزار می‌پردازد. استالمن، یکی از چهره‌های کلیدی در جنبش نرم‌افزار آزاد، سوءاستفاده‌های رایج از حق‌تألیف و ثبت اختراع را به چالش می‌کشد و به اثرات زیان‌بار آن‌ها بر جامعه و آزادی‌های فردی اشاره می‌کند. او ابعاد اجتماعی نرم‌افزار و پتانسیل نرم‌افزار آزاد برای تقویت جامعه و عدالت اجتماعی را بررسی می‌کند. با توجه به مباحث جاری پیرامون قوانین حق‌تألیف و ثبت اختراع، این مقالات بینش‌های به‌موقعی در مورد نیاز به آزاد بودن نرم‌افزار از محدودیت‌های قانونی ارائه می‌دهند. لارنس لسیگ، کارشناس حقوقی برجسته در زمینه قانون حق‌تألیف، مقدمه‌ای ارائه می‌دهد که بحث را غنی‌تر می‌کند. این مجموعه مقالات مطمئناً آینده نرم‌افزار و سیاست‌های قانونی را برای سال‌های آینده شکل خواهد داد.