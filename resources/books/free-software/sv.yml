title: "Fri programvara, fritt samhälle: Selected Essays"
publication_year: 2002
cover: cover_en.webp
original: true
description: |
  Free Software, Free Society, Selected Essays" är en tankeväckande samling skrifter av Richard M. Stallman, Lawrence Lessig och Joshua Gay. Boken behandlar kritiska frågor kring upphovsrätt, patentlagstiftning och begreppet "trusted computing" i samband med programvara. Stallman, en nyckelperson inom Free Software-rörelsen, utmanar vanliga missbruk av upphovsrätt och patent och belyser deras skadliga effekter på samhället och individens frihet. Han utforskar de sociala dimensionerna av programvara och den fria programvarans potential att främja gemenskap och social rättvisa. Med tanke på de aktuella debatterna kring upphovsrätt och patentlagar ger dessa essäer aktuella insikter om behovet av att programvara är fri från restriktiva juridiska begränsningar. Lawrence Lessig, en välkänd juridisk expert på upphovsrättslagstiftning, ger en introduktion som ytterligare berikar diskursen. Denna samling essäer kommer med all säkerhet att forma framtiden för programvara och rättspolitik under många år framöver.