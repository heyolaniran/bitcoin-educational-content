title: "گودل، اشر، باخ: یک زنجیره طلایی ابدی"
publication_year: 1979
cover: cover_en.webp
original: true
description: |
  کتاب "Gödel, Escher, Bach; An Eternal Golden Braid" که در سال ۱۹۷۹ توسط داگلاس آر. هافستادر منتشر شد، برنده جایزه پولیتزر است و به بررسی تقاطع‌های جذاب ریاضیات، هنر و موسیقی می‌پردازد. این کتاب به نبوغ منطق‌دان کورت گودل، هنرمند ام. سی. اشر و آهنگساز یوهان سباستین باخ ادای احترام می‌کند و آثار آن‌ها را از منظر سیستم‌های رسمی و پیامدهای آن‌ها بررسی می‌کند.
  
  هافستادر به‌طور هوشمندانه‌ای این رشته‌ها را در هم می‌آمیزد و دیدگاه‌های منحصربه‌فردی درباره ماهیت شناخت انسانی، آگاهی و مفهوم خودارجاعی ارائه می‌دهد. با ارائه مفاهیم پیچیده علمی و فلسفی به شیوه‌ای قابل‌فهم، هافستادر شاهکاری خلق کرده که مرزهای رشته‌های دانشگاهی را پشت سر می‌گذارد و آن را به یک لذت فکری برای طیف وسیعی از خوانندگان تبدیل می‌کند.