title: "Gödel, Escher, Bach: en evig gyllene fläta"
publication_year: 1979
cover: cover_en.webp
original: true
description: |
  Gödel, Escher, Bach; An Eternal Golden Braid", utgiven 1979 av Douglas R. Hofstadter, är en Pulitzerprisbelönt undersökning av de spännande skärningspunkterna mellan matematik, konst och musik. Boken är en hyllning till logikern Kurt Gödel, konstnären M.C. Escher och kompositören Johann Sebastian Bach och utforskar deras arbete med utgångspunkt i formella system och deras konsekvenser.
  
  Hofstadter väver på ett genialt sätt samman dessa discipliner och presenterar unika insikter om den mänskliga kognitionen, medvetandet och begreppet självreferens. Genom att presentera komplexa vetenskapliga och filosofiska begrepp på ett lättillgängligt sätt har Hofstadter skapat ett mästerverk som överskrider gränserna för akademiska discipliner, vilket gör det till en intellektuell njutning för ett brett spektrum av läsare.