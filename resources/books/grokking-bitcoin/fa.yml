title: "درک Bitcoin"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  اگر فکر می‌کنید Bitcoin فقط یک ارز جایگزین برای علاقه‌مندان به فناوری است، وقت آن رسیده که دوباره فکر کنید. درک عمیق Bitcoin این سیستم توزیع‌شده قدرتمند Ledger را باز می‌کند و فناوری‌ای را که امکان برنامه‌های کاربردی هم برای تراکنش‌های مالی مبتنی بر Bitcoin و هم استفاده از Blockchain برای ثبت اموال فیزیکی Ownership را فراهم می‌کند، بررسی می‌کند. با این راهنمای کاملاً مصور و آسان‌خوان، بالاخره خواهید فهمید که Bitcoin چگونه کار می‌کند، چگونه می‌توانید از آن استفاده کنید و چرا می‌توانید به Blockchain اعتماد کنید.