title: "Grokking Bitcoin"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  Om du tror att Bitcoin bara är en alternativ valuta för nördar, är det dags att tänka om. Grokking Bitcoin öppnar upp detta kraftfulla distribuerade Ledger-system och utforskar tekniken som möjliggör applikationer både för Bitcoin-baserade finansiella transaktioner och för att använda Blockchain för att registrera fysisk egendom Ownership. Med denna fullt illustrerade, lättlästa guide kommer du äntligen att förstå hur Bitcoin fungerar, hur du kan använda det och varför du kan lita på Blockchain.
  