title: "هک رشد"
publication_year: 2017
cover: cover_en.webp
original: true
description: |
  کتاب "هک رشد" نوشته شان الیس و مورگان براون، بینش‌ها و توصیه‌های عملی برای کسب‌وکارهایی که به دنبال دستیابی به رشد سریع هستند را ارائه می‌دهد. نویسندگان رویکرد جدیدی به رشد به نام "هک رشد" معرفی می‌کنند که شامل استفاده از خلاقیت، تحلیل داده‌ها و آزمایش برای یافتن مؤثرترین راه‌ها برای رشد یک کسب‌وکار است. این کتاب شامل مطالعات موردی از استراتژی‌های موفق هک رشد و یک راهنمای گام‌به‌گام برای اجرای این استراتژی‌ها در کسب‌وکار خودتان است. این کتاب برای کارآفرینان، بازاریابان و هر کسی که به دنبال افزایش رشد در کسب‌وکار خود است، ضروری است.