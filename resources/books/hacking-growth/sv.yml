title: "Att hacka tillväxten"
publication_year: 2017
cover: cover_en.webp
original: true
description: |
  "Hacking Growth" av Sean Ellis och Morgan Brown är en bok som ger insikter och praktiska råd för företag som vill uppnå snabb tillväxt. Författarna introducerar ett nytt tillvägagångssätt för tillväxt som kallas "growth hacking", vilket innebär att man använder kreativitet, dataanalys och experiment för att hitta de mest effektiva sätten att få ett företag att växa. Boken innehåller fallstudier av framgångsrika growth hacking-strategier och erbjuder en steg-för-steg-guide för att implementera dessa strategier i ditt eget företag. Det är en måste-läsning för entreprenörer, marknadsförare och alla som vill driva tillväxt i sin verksamhet.