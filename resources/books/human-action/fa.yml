title: "عمل انسان"
publication_year: 1949
cover: cover_en.webp
original: true
description: |
  در "کنش انسانی"، اقتصاددان برجسته اتریشی لودویگ فون میزس به طور عمیق فلسفه پشت فعالیت‌های اقتصادی را بررسی می‌کند و بر نقش مرکزی انتخاب انسانی و پیامدهای آن تأکید می‌کند. این اثر بزرگ ۸۵ فصلی که اولین بار در سال ۱۹۴۹ منتشر شد، به یک مرجع پایدار در حوزه تفکر اقتصادی تبدیل شده است و به خاطر تحلیل جامع و نافذ خود از پدیده‌های اقتصادی مورد تحسین قرار گرفته است.
  
  میزس از مفهوم پراکسیولوژی، علم کنش انسانی، به عنوان یک فرضیه بنیادی برای تجزیه و تحلیل و درک فعالیت‌های اقتصادی استفاده می‌کند. دیدگاه جامع او نه تنها معاملات مالی یا Exchange کالاها و خدمات را در بر می‌گیرد، بلکه طیف کامل تصمیمات و اقداماتی که توسط افراد انجام می‌شود و پدیده‌های اقتصادی را به حرکت درمی‌آورد نیز شامل می‌شود.
  
  این کتاب موضوعات پیچیده‌ای مانند ماهیت و علل چرخه تجاری، بازار به عنوان یک سیستم اقتصادی، نقش دانش و عدم قطعیت در تصمیم‌گیری اقتصادی و نقش حیاتی کارآفرینی را باز می‌کند. علاوه بر این، میزس به طور اندیشمندانه پیامدهای دخالت دولت در اقتصاد را بررسی می‌کند و در نهایت سیستم اقتصادی لسه‌فر را به عنوان قابل‌دوام‌ترین مسیر به سوی آزادی فردی و رفاه تأیید می‌کند.
  
  "کنش انسانی" صرفاً یک کتاب اقتصادی نیست؛ بلکه یک سفر فکری به عمق تصمیم‌گیری انسانی و رابطه پیچیده آن با سیستم‌های اجتماعی است. این کتاب برای اقتصاددانان، فیلسوفان و هر کسی که علاقه‌مند به درک عمیق‌تر از مکانیزم‌های زیرساختی دنیای اقتصادی اطراف ماست، ضروری است. مشاهدات بصیرانه آن همچنان طنین‌انداز است و آن را به یک کلاسیک تبدیل کرده که آزمون زمان را پشت سر گذاشته است.