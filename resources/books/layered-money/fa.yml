title: "پول لایه‌ای"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  "پول لایه‌ای" نوشته نیک باتیا یک کتاب در سطح متوسط است که به بررسی تکامل پول از مبادله کالا به ارزهای دیجیتال مانند Bitcoin می‌پردازد. نویسنده مفهوم پول لایه‌ای را توضیح می‌دهد، که به اشکال مختلف پول در یک اقتصاد واحد اشاره دارد و چگونه بر سیستم مالی تأثیر می‌گذارد. او همچنین تاریخچه پول و چگونگی استفاده از آن برای کنترل جوامع را بررسی می‌کند. کتاب به ویژگی‌های Bitcoin و تفاوت آن با اشکال سنتی پول نیز می‌پردازد. این کتاب تحلیل برانگیز از آینده پول و چگونگی انقلاب Bitcoin در دنیای مالی ارائه می‌دهد.