title: "Layered Money"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  "Layered Money" av Nik Bhatia är en bok på mellannivå som utforskar pengarnas utveckling från byteshandel till digitala valutor som Bitcoin. Författaren förklarar begreppet skiktade pengar, som hänvisar till de olika formerna av pengar som används i en enda ekonomi, och hur det påverkar det finansiella systemet. Han undersöker också pengarnas historia och hur de har använts för att kontrollera samhällen. Boken fördjupar sig också i Bitcoin:s egenskaper och hur den skiljer sig från traditionella former av pengar. Den ger en tankeväckande analys av pengarnas framtid och hur Bitcoin kan komma att revolutionera finansvärlden.