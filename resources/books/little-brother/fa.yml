title: "برادر کوچک"
publication_year: 2008
cover: cover_en.webp
original: true
description: |
  برادر کوچک نوشته کوری دکترو رمانی است که به بررسی موضوع حریم خصوصی در عصر فناوری می‌پردازد. داستان گروهی از نوجوانان را دنبال می‌کند که پس از حمله تروریستی به سانفرانسیسکو، علیه تجاوز دولت به حریم خصوصی شورش می‌کنند. شخصیت اصلی، مارکوس، با استفاده از مهارت‌های فناوری خود علیه دولت نظارتی مبارزه می‌کند و دیگران را به پیوستن به این جنبش ترغیب می‌کند. این کتاب سوالات مهمی را درباره مبادله بین حریم خصوصی و امنیت و نقش فناوری در شکل‌دهی به جامعه مطرح می‌کند. به طور کلی، برادر کوچک یک خواندنی تحریک‌آمیز و هیجان‌انگیز برای هر کسی است که به تقاطع فناوری و سیاست علاقه‌مند است.