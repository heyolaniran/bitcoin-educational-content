description: |
  Little Brother av Cory Doctorow är en roman som utforskar temat privatliv i en teknologisk tidsålder. Berättelsen följer en grupp tonåringar som gör uppror mot regeringens intrång i privatlivet i efterdyningarna av en terroristattack i San Francisco. Huvudpersonen Marcus använder sitt tekniska kunnande för att slå tillbaka mot regeringens övervakningsstat och inspirerar andra att ansluta sig till rörelsen. Boken väcker viktiga frågor om avvägningen mellan integritet och säkerhet och om teknikens roll i samhällsutvecklingen. Sammantaget är Little Brother en tankeväckande och spännande läsning för alla som är intresserade av skärningspunkten mellan teknik och politik.