title: "ارباب مالی"
publication_year: 2009
cover: cover_en.webp
original: true
description: |
  "ارباب مالی" نوشته لیاکت احمد یک کتاب غیر داستانی است که به طور مفصل به چهار بانکدار مرکزی می‌پردازد که در اوایل قرن بیستم بر سیستم مالی جهان تسلط داشتند. این کتاب دوره بین جنگ جهانی اول و رکود بزرگ را پوشش می‌دهد و توضیح می‌دهد که چگونه اقدامات این بانکداران مرکزی به ظهور هیتلر و در نهایت، جنگ جهانی دوم منجر شد. از طریق لنز تاریخ، کتاب بینش‌هایی درباره روابط پیچیده بین مالی، اقتصاد و سیاست ارائه می‌دهد و اهمیت بانکداری مرکزی در شکل‌دهی به اقتصاد جهانی مدرن را برجسته می‌کند. به طور کلی، "ارباب مالی" یک خواندنی جذاب برای هر کسی است که به تاریخ مالی و اقتصادی علاقه‌مند است.