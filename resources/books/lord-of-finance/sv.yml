title: "Lord of Finance"
publication_year: 2009
cover: cover_en.webp
original: true
description: |
  "Lord of Finance" av Liaquat Ahamed är en fackbok som ger en detaljerad redogörelse för de fyra centralbankschefer som dominerade världens finansiella system i början av 1900-talet. Boken täcker perioden mellan första världskriget och den stora depressionen och förklarar hur dessa centralbankschefers agerande ledde till Hitlers uppgång och i slutändan till andra världskriget. Genom ett historiskt perspektiv ger boken insikter i de komplexa relationerna mellan finans, ekonomi och politik och belyser centralbankens betydelse för att forma den moderna globala ekonomin. Sammantaget är "Lord of Finance" en fascinerande läsning för alla som är intresserade av finans- och ekonomihistoria.