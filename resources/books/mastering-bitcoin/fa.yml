title: "تسلط بر Bitcoin"
publication_year: 2014
cover: cover_en.webp
original: true
description: |
  "تسلط بر Bitcoin" نوشته آندریاس آنتونوپولوس یک کتاب در سطح متوسط است که درک جامعی از فناوری پشت Bitcoin و نحوه کار آن ارائه می‌دهد. این کتاب طیف گسترده‌ای از موضوعات مرتبط با Bitcoin را پوشش می‌دهد، از جمله تاریخچه، رمزنگاری، تراکنش‌ها، Mining و شبکه Bitcoin. همچنین موضوعات پیشرفته‌ای مانند قراردادهای هوشمند و Lightning Network را نیز شامل می‌شود. این کتاب منبعی عالی برای توسعه‌دهندگان و افرادی با ذهنیت فنی است که می‌خواهند درک عمیق‌تری از Bitcoin و فناوری زیربنایی آن کسب کنند.