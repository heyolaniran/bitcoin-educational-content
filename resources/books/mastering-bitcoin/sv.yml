title: "Att bemästra Bitcoin"
publication_year: 2014
cover: cover_en.webp
original: true
description: |
  "Mastering Bitcoin" av Andreas Antonopoulos är en bok på mellannivå som ger en omfattande förståelse för tekniken bakom Bitcoin och hur den fungerar. Den täcker ett brett spektrum av ämnen relaterade till Bitcoin, inklusive dess historia, kryptografi, transaktioner, Mining och Bitcoin-nätverket. Boken tar också upp avancerade ämnen som smarta kontrakt och Lightning Network. Den här boken är en utmärkt resurs för utvecklare och tekniskt intresserade personer som vill få en djupare förståelse för Bitcoin och dess underliggande teknik.