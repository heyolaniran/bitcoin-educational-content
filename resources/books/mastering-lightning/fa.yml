title: "تسلط بر رعد و برق"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  "استادی در لایتنینگ" نوشته آندریاس ام. آنتونوپولوس و رنه پیکهاردت یک کتاب در سطح متوسط درباره راه‌حل مقیاس‌پذیری Lightning Network، یک Layer 2 برای Bitcoin است. این کتاب جزئیات فنی نحوه عملکرد Lightning Network و همچنین تأثیر بالقوه آن بر مقیاس‌پذیری و حریم خصوصی Bitcoin را پوشش می‌دهد. نویسندگان دستورالعمل‌های گام‌به‌گام برای راه‌اندازی یک نود لایتنینگ و استفاده از کیف‌پول‌های لایتنینگ ارائه می‌دهند و همچنین به بررسی پیامدهای اجتماعی و اقتصادی این فناوری می‌پردازند. به‌طور کلی، این کتاب منبع ارزشمندی برای هر کسی است که به درک Lightning Network و نقش آن در آینده Bitcoin علاقه‌مند است.