title: "Att bemästra blixten"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  "Mastering Lightning" av Andreas M. Antonopoulos och René Pickhardt är en bok på mellannivå om Lightning Network, en Layer 2-skalningslösning för Bitcoin. Boken täcker de tekniska detaljerna för hur Lightning Network fungerar, samt dess potentiella inverkan på Bitcoin:s skalbarhet och integritet. Författarna ger steg-för-steg-instruktioner om hur man sätter upp en Lightning-nod och använder Lightning-plånböcker, och de diskuterar också de sociala och ekonomiska konsekvenserna av tekniken. Sammantaget är boken en värdefull resurs för alla som är intresserade av att förstå Lightning Network och dess roll i framtiden för Bitcoin.