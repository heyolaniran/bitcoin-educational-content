title: "پول سالم و ناسالم"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  "Money Sound and Unsound" اثر جوزف سالرنو کتابی در سطح کارشناسی است که به بررسی تاریخچه پول و چگونگی تأثیر انواع مختلف پول بر اقتصادها در طول تاریخ می‌پردازد. نویسنده نظریه‌ها و سیاست‌های اقتصادی مختلف مرتبط با پول، از جمله استاندارد طلا، بانکداری مرکزی و تورم را بررسی می‌کند و چگونگی تأثیر آن‌ها بر بازارهای مالی و جوامع را تحلیل می‌کند. تحلیل سالرنو پیامدهای سیاست‌های پولی ناسالم را برجسته می‌کند و پیشنهاد می‌دهد که برای دستیابی به ثبات و شکوفایی اقتصادی به اصول پولی سالم بازگردیم. این کتاب برای افرادی نوشته شده است که علاقه عمیقی به اقتصاد و امور مالی دارند و می‌خواهند درک بهتری از نقش پول در جامعه پیدا کنند.