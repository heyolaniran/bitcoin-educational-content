title: "Pengar - sunda och osunda"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  "Money Sound and Unsound" av Joseph Salerno är en bok på expertnivå som utforskar pengarnas historia och hur olika former av pengar har påverkat ekonomier genom historien. Författaren undersöker olika ekonomiska teorier och policyer relaterade till pengar, inklusive guldmyntfoten, centralbanker och inflation, och hur de har påverkat finansmarknader och samhällen. Salernos analys belyser konsekvenserna av en osund penningpolitik och föreslår en återgång till sunda monetära principer för att uppnå ekonomisk stabilitet och välstånd. Boken är skriven för personer som har ett djupt intresse för ekonomi och finans och som vill få en bättre förståelse för pengars roll i samhället.