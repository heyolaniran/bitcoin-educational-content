title: "برنامه‌نویسی Bitcoin"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  "برنامه‌نویسی Bitcoin" نوشته جیمی سانگ یک کتاب در سطح متوسط است که امور مالی، سرمایه‌گذاری و فناوری را ترکیب می‌کند تا به خوانندگان درک عمیقی از عملکرد محبوب‌ترین ارز دیجیتال جهان، Bitcoin، ارائه دهد. این کتاب برای خوانندگانی با دانش قبلی از برنامه‌نویسی و علوم کامپیوتر طراحی شده و موضوعاتی مانند اسکریپت‌نویسی Bitcoin، رمزنگاری و تأیید تراکنش را پوشش می‌دهد. با تمرکز بر یادگیری عملی، نویسنده خوانندگان را در فرآیند نوشتن کد برای تراکنش‌های Bitcoin، پیاده‌سازی قراردادهای هوشمند و ایجاد کیف پول‌های Bitcoin خودشان راهنمایی می‌کند. در طول مسیر، خوانندگان به بینش‌هایی درباره روانشناسی سرمایه‌گذاری در Bitcoin و چگونگی اتخاذ تصمیمات آگاهانه در این بازار به سرعت در حال تحول دست خواهند یافت.