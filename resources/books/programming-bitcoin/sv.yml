title: "Programmering av Bitcoin"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  "Programming Bitcoin" av Jimmy Song är en bok på mellannivå som kombinerar ekonomi, investeringar och teknik för att ge läsarna en djupgående förståelse för hur världens mest populära kryptovaluta, Bitcoin, fungerar. Boken riktar sig till läsare med vissa förkunskaper inom programmering och datavetenskap och behandlar ämnen som Bitcoin-skript, kryptografi och transaktionsverifiering. Med fokus på praktiskt lärande guidar författaren läsarna genom processen att skriva kod för Bitcoin-transaktioner, implementera smarta kontrakt och skapa sina egna Bitcoin-plånböcker. Längs vägen kommer läsarna att få insikter i psykologin i att investera i Bitcoin och hur man fattar välgrundade beslut på denna snabbt utvecklande marknad.