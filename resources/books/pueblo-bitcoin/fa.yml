title: "روستای Bitcoin"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  با Bitcoin Village، نویسنده ما را به یک سفر آموزنده از طریق این فناوری می‌برد، از منشأ پول تا هسته پروتکل کامپیوتر را کاوش می‌کند. او همچنین تأملاتی در مورد تأثیرات اجتماعی و سیاسی ارائه می‌دهد و پایه‌هایی را که Bitcoin برای یک جامعه عادلانه‌تر و آگاه‌تر بنا می‌کند، تعریف می‌کند.