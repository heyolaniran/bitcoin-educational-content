title: "Bitcoin Village"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Med Bitcoin Village tar författaren oss med på en informativ resa genom denna teknik och utforskar allt från pengarnas ursprung till kärnan i datorprotokollet. Han ger också reflektioner om de sociala och politiska effekterna och definierar de grunder som Bitcoin lägger för ett rättvisare och mer medvetet samhälle.