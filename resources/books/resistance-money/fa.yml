title: "پول مقاومت"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  Bitcoin پول مقاومت است که به کاربران خود قدرت می‌دهد تا در برابر اقتدارگرایان، تورم، نظارت، سانسور و محرومیت مالی مقاومت کنند. پول مقاومت سیاست پولی، مقاومت در برابر سانسور، حریم خصوصی، شمول و استفاده از انرژی Bitcoin را بررسی می‌کند تا یک مورد جامع و سنجیده ایجاد کند که Bitcoin با وجود نواقصش، یک سود خالص برای جهان است. Bitcoin فقط برای مجرمان، سفته‌بازان یا کارآفرینان ثروتمند سیلیکون ولی نیست - علیرغم آنچه که تیترها می‌گویند. بلکه ابزاری است برای هر کسی که در حاشیه است. این کتاب دقیق اما قابل دسترس است؛ پول مقاومت برای همه در نظر گرفته شده است، از بی‌خبر تا متخصص، از حامی تا شکاک سرسخت Hard، و همه در این بین.