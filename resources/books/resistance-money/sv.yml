title: "Motståndspengar"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  Bitcoin är motståndspengar som gör det möjligt för användarna att göra motstånd mot auktoritärer,
  inflation, övervakning, censur och ekonomiskt utanförskap. Motståndspengar
  undersöker Bitcoin:s penningpolitik, censurmotstånd, integritet, inkludering,
  och energianvändning för att utveckla ett omfattande och uppmätt fall att Bitcoin är en
  nettofördel för världen, trots dess brister. Bitcoin är inte bara för
  kriminella, spekulanter eller rika Silicon Valley-entreprenörer - trots vad rubrikerna
  rubrikerna säger. Det är istället ett verktyg för alla som befinner sig i marginalen. Boken är
  rigorös men tillgänglig; Resistance Money är avsedd för alla, från aningslösa
  till specialisten, från förespråkaren till die-Hard-skeptikern, och alla däremellan
  däremellan.