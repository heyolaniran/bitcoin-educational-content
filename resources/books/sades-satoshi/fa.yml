title: "Sades Satoshi"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  ساتوشی‌های ساد اولین کتاب از سری جدید ما برای آموزش کودکان درباره تاریخچه، استفاده و وعده Bitcoin است. این کتاب دارای آثار هنری اصلی و زیبایی از هنرمند بصری نیجریه‌ای، فانی‌ران اوپی‌یِمی است. این کتاب به کودکان نگاهی جهانی به Bitcoin می‌دهد و تأثیر شگفت‌انگیز Bitcoin در نیجریه را بررسی می‌کند. این کتاب همچنین به کودکان مفاهیم اقتصادی مهمی مانند بانکداری مرکزی، تورم و ارز فیات را آموزش می‌دهد. این کتاب همچنین شامل بخشی ویژه به نام بسته خانوادگی Bitcoin برای والدین است.