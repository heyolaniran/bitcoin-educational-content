title: "Sades Satoshi"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  Sade's Satoshis är den första boken i vår nya serie för att lära barn om Bitcoin:s historia, användning och löfte. Boken innehåller vackra originalkonstverk av den nigerianska bildkonstnären Faniran Opeyemi. Boken ger barnen en inblick i Bitcoin ur ett globalt perspektiv och utforskar Bitcoin:s otroliga inverkan i Nigeria. Boken lär också barn om viktiga ekonomiska begrepp som centralbank, inflation och fiatvaluta. Boken innehåller också ett särskilt BONUS-avsnitt för föräldrar som kallas Bitcoin Family Pack.