title: "ساپیens"
publication_year: 2011
cover: cover_en.webp
original: true
description: |
  کتاب «انسان خردمند» نوشته یووال نوح هراری نگاهی جذاب به تاریخ بشریت دارد. هراری به بررسی تکامل هومو ساپینس از روزهای اولیه به عنوان شکارچی-گردآورنده تا انقلاب کشاورزی و توسعه تمدن مدرن می‌پردازد. او به روش‌هایی که ما در طول زمان تطبیق یافته و تغییر کرده‌ایم و تأثیری که بر جهان اطرافمان داشته‌ایم، می‌پردازد. از طریق تحلیل دقیق و تفکر برانگیز خود، هراری ما را به تفکر درباره جایگاه‌مان در جهان و انتخاب‌هایی که به عنوان یک گونه انجام می‌دهیم، به چالش می‌کشد. این کتاب برای هر کسی که به تاریخ، انسان‌شناسی یا وضعیت انسانی علاقه‌مند است، باید خوانده شود.