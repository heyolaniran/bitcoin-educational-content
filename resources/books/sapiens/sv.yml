title: "Sapiens"
publication_year: 2011
cover: cover_en.webp
original: true
description: |
  Sapiens av Yuval Noah Harari är en fascinerande inblick i mänsklighetens historia. Harari undersöker utvecklingen av Homo sapiens från våra tidigaste dagar som jägare och samlare genom jordbruksrevolutionen och utvecklingen av den moderna civilisationen. Han utforskar hur vi har anpassat oss och förändrats över tid och vilken inverkan vi har haft på världen omkring oss. Genom sin detaljerade och tankeväckande analys utmanar Harari oss att fundera över vår plats i världen och de val vi gör som art. Den här boken är ett måste för alla som är intresserade av historia, antropologi eller människans villkor