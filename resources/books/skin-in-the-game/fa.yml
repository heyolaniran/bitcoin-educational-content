title: "پوست در بازی"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  پوست در بازی نوشته نسیم نیکلاس طالب کتابی است که مفهوم داشتن سهم شخصی در هر تصمیم، کسب‌وکار یا فعالیتی که فرد در آن مشارکت می‌کند را بررسی می‌کند. طالب استدلال می‌کند که افراد، کسب‌وکارها و دولت‌ها باید برای ریسک‌هایی که می‌پذیرند پاسخگو باشند و عدم پذیرش ریسک شخصی منجر به بسیاری از مشکلات جهان، از بحران مالی تا فساد سیاسی شده است. از طریق مثال‌های واقعی و حکایات تفکر برانگیز، طالب خوانندگان را تشویق می‌کند تا ایده "پوست در بازی" را بپذیرند و مسئولیت اقدامات و تصمیمات خود را بر عهده بگیرند، که در نهایت به موفقیت و شکوفایی بیشتر منجر می‌شود.