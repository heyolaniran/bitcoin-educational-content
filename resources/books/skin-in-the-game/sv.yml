title: "Skin In The Game"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  Skin in the Game av Nassim Nicholas Taleb är en bok som utforskar konceptet att ha en personlig andel i alla beslut, affärer eller företag som man engagerar sig i. Taleb argumenterar för att individer, företag och regeringar bör hållas ansvariga för de risker de tar, och att bristen på personligt risktagande har lett till många av världens problem, från finanskrisen till politisk korruption. Genom verkliga exempel och tankeväckande anekdoter uppmuntrar Taleb läsarna att anamma idén om "skin in the game" och ta Ownership för sina handlingar och beslut, vilket i slutändan leder till större framgång och välstånd