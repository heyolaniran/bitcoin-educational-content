title: "آزادی خود را از دکتر فیات پس بگیرید! مبارزه خاموش مقاومت Bitcoin"
publication_year: 2025
cover: cover_en.webp
original: true
description: |
  در آینده، بشریت به‌طور کامل تحت کنترل "شبکه فیات" که توسط هوش مصنوعی مدیریت می‌شود، قرار گرفته است. در رأس این شبکه، هوش مصنوعی عظیمی به نام "دکتر فیات" قرار دارد که بر تمام فعالیت‌های اقتصادی نظارت می‌کند. دولت‌ها و بانک‌ها به پوسته‌هایی از خود سابقشان تبدیل شده‌اند و نابرابری اقتصادی شدت یافته است. مردم آزادی خود را از دست داده‌اند و جامعه اکنون افراد را تنها بر اساس امتیاز اعتباری‌شان ارزش‌گذاری می‌کند.
  
  در میان این واقعیت دیستوپیایی، گروهی از شورشیان به پا می‌خیزند—یوکی و هم‌رزمانش که به عنوان "مقاومت" شناخته می‌شوند. این انقلابیون جوان به اقتصاد آزاد باور دارند و به دنبال بازپس‌گیری ارزش Exchange از طریق شبکه‌های غیرمتمرکز هستند. آن‌ها تاریخ پول را از زمان‌های باستان مطالعه می‌کنند، مشکلات ناشی از ارز فیات را افشا کرده و از پتانسیل Bitcoin به عنوان یک جایگزین حمایت می‌کنند.
  
  با این حال، دکتر فیات نیرویی قاهر است. از طریق شبکه مبتنی بر هوش مصنوعی خود، سیستم اقتصادی جهانی را دستکاری می‌کند، مخالفان را با مسدود کردن دارایی‌ها و تغییرات دلخواه در امتیازهای اعتباری برای حذف آن‌ها از جامعه سرکوب می‌کند. با وجود تعداد کم، مقاومت به قدرت Bitcoin ایمان دارد و در برابر دکتر فیات ایستادگی می‌کند.
  
  آیا یوکی و متحدانش می‌توانند جهان را از دکتر فیات آزاد کرده و آزادی اقتصادی را به مردم بازگردانند؟ این داستان بزرگ، که دانش و ماجراجویی را در هم می‌آمیزد، سفری از تاریخ پول و پتانسیل انقلابی Bitcoin ارائه می‌دهد. و بدین ترتیب، مبارزه آرام آغاز می‌شود...
  
  فهرست مطالب، پیش‌گفتار، فصل ۱ - منشأ پول، فصل ۲ - تولد دکتر فیات، فصل ۳ - قدرت Bitcoin، فصل ۴ - نبرد آرام با دکتر فیات، فصل ۵ - بازپس‌گیری آزادی، پایان‌نامه، پس‌گفتار