title: "خدا را شکر برای Bitcoin"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  پول یک واقعیت از زندگی روزمره است. ما آن را به دست می‌آوریم، خرج می‌کنیم و پس‌انداز می‌کنیم. ما وسوسه می‌شویم که آن را پرستش کنیم و به آن اعتماد کنیم تا نیازهایمان را برآورده کند. در حالی که مطالب زیادی درباره قدرت، خطر و مدیریت پول نوشته شده است، مطالب کمی درباره اینکه پول واقعاً چیست و آیا خود پول اخلاقی است یا نه نوشته شده است. این شکاف اطلاعاتی برای ثروتمند کردن عده‌ای خاص، به بردگی کشیدن میلیون‌ها نفر و ایجاد سردرگمی و تفرقه در سراسر جهان مورد سوءاستفاده قرار گرفته است. چگونه این اتفاق افتاد و ما چه کاری می‌توانیم در مورد آن انجام دهیم؟ کتاب "شکر خدا برای Bitcoin" به بررسی راه‌هایی می‌پردازد که سیستم پولی فعلی خراب است و چه کاری می‌توان برای اصلاح آن انجام داد. این کتاب به خلق پول، فساد آن و امکان رستگاری آن می‌پردازد. همچنین بررسی می‌کند که چگونه Bitcoin در حال رستگاری از مشکلات سیستم پولی فاسد ما است و چگونه گذار مداوم به پول سالم منبع امیدی برای جهانی شکسته است.