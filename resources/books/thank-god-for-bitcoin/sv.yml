title: "Tack gode Gud för Bitcoin"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  Pengar är en del av vardagen. Vi tjänar dem, spenderar dem och sparar dem. Vi är frestade att dyrka dem och lita på att de ska tillgodose våra behov. Även om mycket har skrivits om pengars makt, faror och förvaltning, har lite skrivits om vad pengar egentligen är och om huruvida pengar i sig är moraliska eller inte. Denna informationslucka har utnyttjats för att berika ett fåtal privilegierade, förslava miljontals människor och skapa förvirring och splittring i hela världen. Hur kunde detta ske och vad kan vi göra åt det? Thank God for Bitcoin utforskar på vilka sätt det nuvarande monetära systemet är trasigt och vad som kan göras för att fixa det. Den utforskar skapandet av pengar, dess korruption och dess potentiella inlösen. Den tittar på hur Bitcoin löser problemen med vårt korrupta monetära system och hur den pågående övergången till sunda pengar är en källa till hopp för en trasig värld.