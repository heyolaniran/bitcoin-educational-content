title: "Bitcoin-standarden"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  The Bitcoin Standard av Saifedean Amous utforskar pengarnas historia och Bitcoin:s potential att revolutionera det globala finansiella systemet. Författaren lyfter fram Bitcoin:s fördelar, bland annat dess decentraliserade natur och deflationistiska design, som främjar stabilitet och hållbar ekonomisk tillväxt. Amous diskuterar också de tekniska aspekterna av Bitcoin och tar upp vanliga missuppfattningar samtidigt som han överväger framtida utmaningar