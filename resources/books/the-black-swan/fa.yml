title: "قوی سیاه"
publication_year: 2007
cover: cover_en.webp
original: true
description: |
  کتاب "قوی سیاه" نوشته نسیم نیکلاس طالب درباره تأثیر رویدادهای بسیار غیرمحتمل بر زندگی ما و دنیای اطرافمان است. طالب استدلال می‌کند که این رویدادها، که او آن‌ها را "قوی سیاه" می‌نامد، قابل پیش‌بینی نیستند، اما تأثیر عظیمی بر زندگی و جامعه ما دارند. این کتاب بینشی درباره نقش شانس و تصادف در شکل‌گیری زندگی ما و اهمیت آمادگی برای رویدادهای غیرمنتظره ارائه می‌دهد. این کتاب فرضیات سنتی مدیریت ریسک را به چالش می‌کشد و چارچوبی جایگزین برای درک عدم قطعیت در سیستم‌های پیچیده ارائه می‌دهد. این کتاب در زمینه‌هایی مانند اقتصاد، مالی و تصمیم‌گیری بسیار تأثیرگذار بوده و خوانشی تحریک‌کننده برای کسانی است که به نقش شانس و عدم قطعیت در زندگی ما علاقه‌مندند.