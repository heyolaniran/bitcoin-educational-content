title: "Den svarta svanen"
publication_year: 2007
cover: cover_en.webp
original: true
description: |
  The Black Swan av Nassim Nicholas Taleb är en bok om hur mycket osannolika händelser påverkar våra liv och vår omvärld. Taleb hävdar att dessa händelser, som han kallar "svarta svanar", inte är förutsägbara, men har en enorm inverkan på våra liv och samhället som helhet. Boken ger en inblick i den roll som slumpen och tillfälligheter spelar för att forma våra liv och vikten av att vara förberedd på oväntade händelser. Den utmanar de traditionella antagandena om riskhantering och presenterar ett alternativt ramverk för att förstå osäkerhet i komplexa system. Boken har haft stort inflytande inom områden som ekonomi, finans och beslutsfattande och är en tankeväckande läsning för alla som är intresserade av slumpens och osäkerhetens roll i våra liv.