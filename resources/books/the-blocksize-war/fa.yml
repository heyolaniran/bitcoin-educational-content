title: "جنگ اندازه بلاک"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  جنگ اندازه بلوک نوشته جاناتان بیر کتابی است درباره چالش‌های فنی و سیاسی که در طول بحث مقیاس‌گذاری Bitcoin پدید آمدند. این کتاب به رویدادهایی که منجر به این بحث شدند، پیشنهادات مختلف برای مقیاس‌گذاری Bitcoin و مباحثات و گفتگوهایی که درون جامعه صورت گرفت، می‌پردازد. همچنین تحلیل عمیقی از جنبه‌های فنی بحث و پیامدهای احتمالی هر پیشنهاد ارائه می‌دهد. این کتاب برای هر کسی که به درک جنبه‌های فنی و سیاسی بحث مقیاس‌گذاری و آینده Bitcoin علاقه‌مند است، ضروری است.