title: "Kriget om blockstorlek"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  The Blocksize War av Jonathan Bier är en bok om de tekniska och politiska utmaningar som uppstod under skalningsdebatten i Bitcoin. Boken täcker de händelser som ledde till debatten, de olika förslagen för att skala Bitcoin och de debatter och diskussioner som ägde rum inom samhället. Den ger också en djupgående analys av de tekniska aspekterna av debatten och de potentiella konsekvenserna av varje förslag. Boken är ett måste för alla som är intresserade av att förstå de tekniska och politiska aspekterna av skalningsdebatten och Bitcoin:s framtid.