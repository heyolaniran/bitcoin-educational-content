title: "کتاب Satoshi"
publication_year: 2014
cover: cover_en.webp
original: true
description: |
  کتاب Satoshi نوشته فیل شامپاین مجموعه‌ای از نوشته‌ها و مکاتبات کلیدی توسط Satoshi ناکاموتو، خالق Bitcoin است. این کتاب نگاهی صمیمی به انگیزه‌ها و فلسفه پشت خلق و توسعه Bitcoin ارائه می‌دهد و همچنین بینش‌هایی درباره فناوری و تأثیر بالقوه آن بر جهان ارائه می‌کند. از طریق این کتاب، خوانندگان می‌توانند درک عمیق‌تری از تاریخ و اصول Bitcoin و همچنین پتانسیل آن برای تحول در سیستم مالی کنونی ما به دست آورند. این کتاب برای هر کسی که به ارزهای دیجیتال، فناوری Blockchain و آینده مالی علاقه‌مند است، ضروری است.