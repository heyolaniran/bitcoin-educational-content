title: "Satoshi:s bok"
publication_year: 2014
cover: cover_en.webp
original: true
description: |
  The Book of Satoshi av Phil Champagne är en samling av viktiga skrifter och korrespondenser från Satoshi Nakamoto, skaparen av Bitcoin. Den ger en intim inblick i motivationen och filosofin bakom Bitcoin:s skapande och utveckling, samt insikter i tekniken och dess potentiella inverkan på världen. Genom boken kan läsarna få en djupare förståelse för Bitcoin:s historia och principer, samt dess potential att förändra vårt nuvarande finansiella system. Boken är ett måste för alla som är intresserade av kryptovalutor, Blockchain-tekniken och framtidens finanser.