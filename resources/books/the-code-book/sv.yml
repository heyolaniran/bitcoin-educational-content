title: "Kodboken"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  The Code Book av Simon Singh är en bok på mellannivå som utforskar kryptografins historia, betydelse och påverkan. Genom fängslande berättelser och lättillgängliga förklaringar tar Singh med läsarna på en resa genom tiderna och avslöjar utvecklingen av koder och chiffer från antiken till idag. Boken täcker viktiga ögonblick i kryptografins historia, till exempel Enigma-maskinen som användes under andra världskriget, utvecklingen av kryptering med offentliga nycklar och framstegen inom digital kryptering. Längs vägen belyser Singh den centrala roll som kryptografin har spelat för att forma mänsklighetens historia, inklusive dess inverkan på krigföring, politik och teknik. Med sin blandning av historia, matematik och verkliga tillämpningar erbjuder "The Code Book" en engagerande och upplysande läsning för alla som är intresserade av den fascinerande världen av koder och chiffer.