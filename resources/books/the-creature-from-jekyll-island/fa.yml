title: "موجودی از جزیره جکیل"
publication_year: 1994
cover: cover_en.webp
original: true
description: |
  موجودی از جزیره جکیل اثر جی. ادوارد گریفین کتابی در سطح متوسط است که به تاریخچه سیستم فدرال رزرو در ایالات متحده می‌پردازد. این کتاب با بررسی موضوع بانکداری مرکزی، دیدگاهی انتقادی نسبت به ایجاد و عملکرد فدرال رزرو ارائه می‌دهد و به بررسی پیامدهای آن برای اقتصاد و جامعه به طور کلی می‌پردازد. گریفین به رویدادهایی که منجر به جلسه مخفیانه در جزیره جکیل در سال ۱۹۱۰ شد، می‌پردازد، جایی که افراد بانفوذ نقشه‌ای برای فدرال رزرو طراحی کردند. از طریق تحقیقات گسترده و تحلیل، این کتاب به توطئه‌های ادعایی می‌پردازد و به ساختارهای قدرت مالی که دنیای ما را شکل می‌دهند، نور می‌افکند. این کتابی است که به تفکر وادار می‌کند و روایت‌های جریان اصلی را به چالش می‌کشد و خوانندگان را تشویق می‌کند تا نقش بانکداری مرکزی در جامعه را زیر سوال ببرند.