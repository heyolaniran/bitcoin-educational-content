title: "The Creature from Jekyll Island"
publication_year: 1994
cover: cover_en.webp
original: true
description: |
  The Creature from Jekyll Island av G. Edward Griffin är en bok på mellannivå som fördjupar sig i historien om Federal Reserve System i USA. Boken utforskar ämnet centralbanksverksamhet och presenterar ett kritiskt perspektiv på skapandet och driften av Federal Reserve och diskuterar dess konsekvenser för ekonomin och samhället i stort. Griffin dyker ner i de händelser som ledde fram till det hemlighetsfulla mötet på Jekyll Island 1910, där inflytelserika personer utarbetade en plan för Federal Reserve. Genom omfattande forskning och analys lyfter boken fram påstådda konspirationer och kastar ljus över de finansiella maktstrukturer som formar vår värld. Det är en tankeväckande läsning som utmanar gängse berättelser och uppmuntrar läsarna att ifrågasätta centralbankens roll i samhället.