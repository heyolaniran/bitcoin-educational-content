title: "بی‌خانمان‌ها"
publication_year: 1974
cover: cover_en.webp
original: true
description: |
  کتاب "بی‌خانمان‌ها" اثر اورسولا کی. لو گویین یک رمان علمی تخیلی در سطح متوسط است که به بررسی موضوعات آنارشیسم و ساختارهای اجتماعی می‌پردازد. این داستان در آینده‌ای دور اتفاق می‌افتد و درباره شِوِک، یک فیزیکدان است که بین وفاداری به جامعه آنارشیستی خود و تمایل به اشتراک‌گذاری نظریه‌های انقلابی‌اش با جهان بزرگ‌تر دچار تردید است. از طریق تجربیات شِوِک، این رمان ساختارهای قدرت موجود را به چالش می‌کشد و خوانندگان را به تصور روش‌های جایگزین برای سازماندهی جامعه دعوت می‌کند. این کتاب برای علاقه‌مندان به علمی تخیلی و فلسفه سیاسی، خوانشی تحریک‌آمیز و از نظر فکری برانگیزاننده است.