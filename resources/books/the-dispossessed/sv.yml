title: "De besittningslösa"
publication_year: 1974
cover: cover_en.webp
original: true
description: |
  The Dispossessed av Ursula K. Le Guin är en science fiction-roman på mellannivå som utforskar teman som anarkism och samhällsstrukturer. Romanen utspelar sig i en avlägsen framtid och följer Shevek, en fysiker som slits mellan lojaliteten till sitt anarkistiska samhälle och sin önskan att dela med sig av sina revolutionerande teorier till det större universum. Genom Sheveks upplevelser utmanar romanen rådande maktstrukturer och uppmanar läsarna att föreställa sig alternativa sätt att organisera samhället. Det är en tankeväckande och intellektuellt stimulerande läsning för den som är intresserad av science fiction och politisk filosofi.