title: "قدم زدن مست: چگونه تصادف بر زندگی ما حکم‌فرماست"
publication_year: 2008
cover: cover_en.webp
original: true
description: |
  "گام مست: چگونه تصادف بر زندگی ما حکم‌فرماست" نوشته لئونارد ملودینوو یک بررسی دوستانه برای مبتدیان از نقش تصادف در زندگی ما و تأثیر آن بر تصمیم‌گیری و نتایج است. از طریق ترکیبی از داستان‌سرایی جذاب و مثال‌های بصیرت‌بخش، ملودینوو خوانندگان را به سفری در دنیای احتمال و آمار می‌برد. او به بررسی راه‌هایی می‌پردازد که تصادف بر جنبه‌های مختلف زندگی ما تأثیر می‌گذارد، از نوسانات بازار سهام تا نتایج ورزشی و حتی تجربیات شخصی خودمان. با تمرکز بر اقتصاد و مطالعات موردی واقعی، کتاب مقدمه‌ای جذاب بر مفهوم تصادف و پیامدهای آن در درک دنیای اطراف ما ارائه می‌دهد. چه تازه‌وارد به این موضوع باشید و چه به دنبال درک بهتر نقش شانس، "گام مست" یک بررسی قابل دسترس و تفکر برانگیز از دنیای جذاب تصادف ارائه می‌دهد.