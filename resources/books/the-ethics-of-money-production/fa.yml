title: "اخلاق تولید پول"
publication_year: 2007
cover: cover_en.webp
original: true
description: |
  اخلاق تولید پول اثر یورگ گیدو هولسمن یک بررسی جامع از پیامدهای اخلاقی تولید پول و نقش بانک‌های مرکزی در سیستم مالی مدرن است. هولسمن به بررسی پیشینه تاریخی پول پرداخته و تأثیرات تورم پولی و کاهش قدرت خرید را تحلیل می‌کند. او پیامدهای اخلاقی و اقتصادی پول فیات را نقد کرده و از بازگشت به اصول پول سالم حمایت می‌کند. این کتاب در سطح کارشناسی، تحلیلی تحریک‌آمیز از معضلات اخلاقی پیرامون تولید پول ارائه می‌دهد و به عنوان منبعی ارزشمند برای علاقه‌مندان به تقاطع اقتصاد، فناوری و تاریخ، به ویژه در زمینه Bitcoin و سیستم‌های پولی جایگزین، خدمت می‌کند.