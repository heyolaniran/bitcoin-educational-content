title: "Etik i samband med penningproduktion"
publication_year: 2007
cover: cover_en.webp
original: true
description: |
  The Ethics of Money Production av Jörg Guido Hülsmann är en omfattande undersökning av de etiska konsekvenserna av penningproduktion och centralbankernas roll i det moderna finansiella systemet. Hülsmann fördjupar sig i pengarnas historiska bakgrund och undersöker effekterna av monetär inflation och urholkning av köpkraften. Han kritiserar de moraliska och ekonomiska konsekvenserna av fiat-pengar och förespråkar en återgång till sunda penningprinciper. Denna bok på expertnivå erbjuder en tankeväckande analys av de etiska dilemman som omger penningproduktion och fungerar som en värdefull resurs för dem som är intresserade av skärningspunkten mellan ekonomi, teknik och historia, särskilt i samband med Bitcoin och alternativa monetära system.