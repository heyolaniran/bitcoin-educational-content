title: "ف.ا هایک"
publication_year: 1992
cover: cover_en.webp
original: true
description: |
  «غرور مرگبار» اثر ف.ا. هایک یک اثر برجسته است که به چالش کشیدن مفهوم برنامه‌ریزی مرکزی می‌پردازد و اهمیت آزادی فردی و نظم خودجوش در سیستم‌های اقتصادی و اجتماعی را برجسته می‌کند. هایک علیه باور به همه‌دانی سیاست‌گذاران استدلال می‌کند و بر مزایای تصمیم‌گیری غیرمتمرکز و مکانیزم‌های بازار تأکید دارد. این کتاب که در سال ۱۹۸۸ منتشر شد، همچنان در بحث‌های امروزی درباره اقتصاد، فلسفه و نقش دولت در جامعه مرتبط باقی مانده است. این کتاب بینش‌های ارزشمندی درباره پیچیدگی‌های تعاملات انسانی و محدودیت‌های رویکردهای از بالا به پایین در سازماندهی اجتماعی ارائه می‌دهد.