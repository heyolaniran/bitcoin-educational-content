title: "استاندارد فیات"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  استاندارد فیات نوشته سیف‌الدین آموس کتابی در سطح متوسط است که به بررسی اقتصاد و پیامدهای ارز فیات می‌پردازد. آموس تاریخچه، عملکرد و معایب سیستم‌های ارز فیات که توسط دارایی ملموسی مانند طلا پشتیبانی نمی‌شوند را بررسی می‌کند. او به پیامدهای اقتصادی این سیستم‌ها پرداخته و تحلیل انتقادی از تأثیر آن‌ها بر ثروت، تورم و ثبات مالی ارائه می‌دهد. با استفاده از اصول اقتصادی و مثال‌های تاریخی، کتاب به چالش کشیدن تصورات رایج پیرامون ارز فیات می‌پردازد و بینش‌هایی درباره مزایای بالقوه سیستم‌های پولی جایگزین ارائه می‌دهد. برای خوانندگانی که به درک پیچیدگی‌های ارز فیات و تأثیر آن بر اقتصاد علاقه‌مندند، "استاندارد فیات" کاوشی تحریک‌آمیز در این موضوع مهم ارائه می‌دهد.