title: "Fiat-standarden"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  The Fiat Standard av Saifedean Ammous är en bok på mellannivå som fördjupar sig i fiatvalutans ekonomi och konsekvenser. Ammous utforskar historien, funktionerna och nackdelarna med fiatvalutasystem som inte backas upp av en materiell tillgång som guld. Han fördjupar sig i de ekonomiska konsekvenserna av sådana system och ger en kritisk analys av deras inverkan på rikedom, inflation och finansiell stabilitet. Med utgångspunkt i ekonomiska principer och historiska exempel utmanar boken de rådande uppfattningarna om fiatvalutor och ger insikter om de potentiella fördelarna med alternativa monetära system. "The Fiat Standard" rekommenderas för läsare som är intresserade av att förstå komplexiteten i fiatvalutor och deras inverkan på ekonomin och erbjuder en tankeväckande utforskning av detta viktiga ämne.