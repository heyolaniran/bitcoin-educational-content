title: "شرکت، بازار و قانون"
publication_year: 1988
cover: cover_en.webp
original: true
description: |
  تعداد کمی از اقتصاددانان به اندازه R.H. Coase خوانده و نقل‌قول شده‌اند، حتی با وجود اینکه او اذعان می‌کند، "بیشتر اقتصاددانان دیدگاه متفاوتی نسبت به مسائل اقتصادی دارند و دیدگاه من را درباره ماهیت موضوع ما به اشتراک نمی‌گذارند." علاقه خاص Coase به آن بخش از نظریه اقتصادی است که با شرکت‌ها، صنایع و بازارها سروکار دارد—آنچه به عنوان نظریه قیمت یا اقتصاد خرد شناخته می‌شود. او همیشه از همکاران اقتصاددان خود خواسته است تا به بررسی پایه‌هایی بپردازند که نظریه‌شان بر آن استوار است، و این مجموعه برخی از مقالات کلاسیک او را که به بررسی همین پایه‌ها می‌پردازند، گردآوری کرده است. "ماهیت شرکت" (1937) مفهوم انقلابی هزینه‌های تراکنش را به نظریه اقتصادی معرفی کرد. "مسئله هزینه اجتماعی" (1960) این مفهوم را بیشتر توسعه داد و بر تأثیر قانون بر عملکرد سیستم اقتصادی تأکید کرد. مقالات باقی‌مانده و مقاله مقدماتی جدید، استدلال‌های Coase را روشن و گسترش می‌دهند و منتقدان او را Address می‌کنند.