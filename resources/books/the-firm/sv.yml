title: "Företaget, marknaden och lagen"
publication_year: 1988
cover: cover_en.webp
original: true
description: |
  Få andra ekonomer har blivit lästa och citerade så ofta som R.H. Coase, trots att han själv medger att "de flesta ekonomer har ett annat sätt att se på ekonomiska problem och inte delar min uppfattning om ämnets natur" Coase har särskilt intresserat sig för den del av den ekonomiska teorin som handlar om företag, branscher och marknader - det som kallas pristeori eller mikroekonomi. Han har alltid uppmanat sina ekonomkollegor att undersöka de fundament som deras teori vilar på, och i denna volym samlas några av hans klassiska artiklar som undersöker just dessa fundament. "The Nature of the Firm" (1937) introducerade det då revolutionerande begreppet transaktionskostnader i den ekonomiska teorin. "The Problem of Social Cost" (1960) vidareutvecklade detta begrepp genom att betona lagens inverkan på det ekonomiska systemets funktion. De återstående artiklarna och den nya inledande essän klargör och utvidgar Coarse argument och Address hans kritiker.