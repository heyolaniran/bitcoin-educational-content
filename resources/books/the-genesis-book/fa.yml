title: "کتاب Genesis"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  Bitcoin از هیچ‌جا ظاهر نشد. دهه‌ها پیش از اختراع Satoshi توسط ناکاموتو، گروه متنوعی از دانشمندان کامپیوتر، فعالان حریم خصوصی و اقتصاددانان هترودوکس تلاش کردند تا شکلی دیجیتالی از پول ایجاد کنند که بتواند به‌طور مستقل از کنترل دولت عمل کند. کتاب Genesis داستان افرادی و پروژه‌هایی را روایت می‌کند که الهام‌بخش اختراع اولین سیستم نقدی الکترونیکی همتا به همتای موفق جهان بودند.