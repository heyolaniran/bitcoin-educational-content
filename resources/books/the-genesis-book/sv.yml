title: "Genesis-boken"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  Bitcoin dök inte upp från ingenstans. I årtionden före Satoshi Nakamotos uppfinning
  olika grupper av datavetare, integritetsaktivister och heterodoxa ekonomer att
  heterodoxa ekonomer försökte skapa en digital form av pengar som skulle kunna fungera
  oberoende av statlig kontroll. Genesis-boken berättar historien om de
  människor och projekt som inspirerade till uppfinningen av världens första framgångsrika
  framgångsrika elektroniska kontantsystemet peer-to-peer.