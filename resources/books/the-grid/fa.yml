title: "شبکه"
publication_year: 2016
cover: cover_en.webp
original: true
description: |
  شبکه اثر گرچن باکه یک بررسی روشنگرانه از تاریخ و تأثیر شبکه برق است. باکه به پیچیدگی‌ها و چالش‌های مدیریت و نگهداری این زیرساخت حیاتی در طول تاریخ می‌پردازد. از روزهای اولیه برق تا عصر مدرن انرژی‌های تجدیدپذیر، او نیروهای اجتماعی، سیاسی و فناوری که شبکه را شکل می‌دهند بررسی می‌کند. با ترکیبی از تاریخ، فناوری و تفسیر اجتماعی، این کتاب بینش‌های ارزشمندی درباره گذشته، حال و آینده سیستم‌های انرژی ما ارائه می‌دهد. این کتاب برای خوانندگان متوسطی که به درک کارکردهای پیچیده شبکه و نقش آن در جامعه علاقه‌مندند، توصیه می‌شود.