title: "The Grid"
publication_year: 2016
cover: cover_en.webp
original: true
description: |
  The Grid av Gretchen Bakke är en upplysande undersökning av elnätets historia och inverkan. Bakke fördjupar sig i komplexiteten och utmaningarna med att hantera och underhålla denna viktiga infrastruktur genom historien. Från elektricitetens barndom till dagens förnybara energi undersöker hon de sociala, politiska och tekniska krafter som formar elnätet. Med en blandning av historia, teknik och sociala kommentarer ger den här boken värdefulla insikter i våra energisystems förflutna, nutid och framtid. Den rekommenderas för läsare på mellannivå som är intresserade av att förstå elnätets invecklade funktion och dess roll i samhället.