title: "Liftarens guide till galaxen"
publication_year: 1979
cover: cover_en.webp
original: true
description: |
  Liftarens guide till galaxen av Douglas Adams är en humoristisk science fiction-roman som tar läsarna med på en kvick och vild resa genom tid och rum. Den följer Arthur Dents och hans utomjordiska vän Ford Prefects missöden när de navigerar genom en serie intergalaktiska eskapader. Med fantasifull världsuppbyggnad och kvick humor är denna älskade klassiker perfekt för nybörjare som söker en underhållande science fiction-läsning.