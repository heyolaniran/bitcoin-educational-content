title: "اینترنت پول"
publication_year: 2016
cover: cover_en.webp
original: true
description: |
  کتاب "اینترنت پول" نوشته آندریاس آنتونوپولوس به توضیح اصول اولیه Bitcoin و فناوری زیربنایی آن می‌پردازد. در این جلد، آنتونوپولوس بر مبانی ارز دیجیتال تمرکز می‌کند، از جمله داستان پیدایش آن، پتانسیل انقلابی آن و موانعی که باید برای پذیرش گسترده بر آن‌ها غلبه کند. او همچنین به بررسی پیامدهای گسترده‌تر Bitcoin برای جامعه و اقتصاد می‌پردازد و پتانسیل آن برای ایجاد اختلال در بانکداری سنتی و مؤسسات مالی، و همچنین توانایی آن در توانمندسازی افراد و ترویج آزادی مالی را بررسی می‌کند. این کتاب مقدمه‌ای عالی برای دنیای Bitcoin برای مبتدیانی است که می‌خواهند بیشتر درباره این فناوری انقلابی بیاموزند.