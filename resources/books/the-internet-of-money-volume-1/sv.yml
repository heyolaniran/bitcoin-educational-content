title: "Pengarnas internet"
publication_year: 2016
cover: cover_en.webp
original: true
description: |
  The Internet of Money" av Andreas Antonopoulos är en bok som förklarar grunderna i Bitcoin och dess underliggande teknik. I denna volym fokuserar Antonopoulos på grunderna i den digitala valutan, inklusive dess ursprungshistoria, dess revolutionerande potential och de hinder som den måste övervinna för att bli allmänt antagen. Han fördjupar sig också i de bredare konsekvenserna av Bitcoin för samhället och ekonomin, utforskar dess potential att störa traditionella bank- och finansinstitut, liksom dess förmåga att stärka individer och främja ekonomisk frihet. Den här boken är en utmärkt introduktion till Bitcoin-världen för nybörjare som vill lära sig mer om denna revolutionerande teknik.