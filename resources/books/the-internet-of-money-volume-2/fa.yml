description: |
  اینترنت پول (جلد 2) نوشته آندریاس آنتونوپولوس یک کتاب در سطح مبتدی است که به بررسی تقاطع Bitcoin، امور مالی و اقتصاد می‌پردازد. این کتاب که در سال 2017 منتشر شده است، بخشی از مجموعه‌ای است که در آن آنتونوپولوس به جنبه‌های مختلف Bitcoin و تأثیر آن بر جامعه می‌پردازد.