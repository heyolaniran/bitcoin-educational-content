description: |
  The Internet of Money (Volume 2) av Andreas Antonopoulos är en bok på nybörjarnivå som utforskar skärningspunkten mellan Bitcoin, finans och ekonomi. Boken publicerades 2017 och är en del av en serie där Antonopoulos fördjupar sig i olika aspekter av Bitcoin och dess påverkan på samhället.