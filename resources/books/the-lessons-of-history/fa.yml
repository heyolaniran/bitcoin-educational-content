title: "درس‌های تاریخ"
publication_year: 1968
cover: cover_en.webp
original: true
description: |
  درس‌های تاریخ نوشته ویل دورانت و آریل دورانت کتابی است که مروری بر مهم‌ترین رویدادها و ایده‌های تاریخی ارائه می‌دهد. این کتاب به بررسی تاریخ تمدن بشری می‌پردازد و درباره ظهور و سقوط امپراتوری‌های مختلف، نقش دین، تأثیر فناوری و نفوذ افراد بحث می‌کند. این کتاب با تکیه بر دانش گسترده نویسندگان از تاریخ و فلسفه، به بینش‌های مختصر و تفکر برانگیزی می‌پردازد. با تمرکز بر الگوهای تکراری تاریخ و رفتار انسانی، "درس‌های تاریخ" دیدگاهی جذاب درباره ماهیت تمدن و نیروهایی که آن را شکل می‌دهند، ارائه می‌دهد.