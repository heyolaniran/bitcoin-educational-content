title: "Historiens lärdomar"
publication_year: 1968
cover: cover_en.webp
original: true
description: |
  The Lessons of History av Will Durant och Ariel Durant är en bok som ger en översikt över de mest betydelsefulla historiska händelserna och idéerna. Den ger en översikt över den mänskliga civilisationens historia och diskuterar olika imperiers uppgång och fall, religionens roll, teknikens inverkan och enskilda individers inflytande. Boken bygger på författarnas omfattande kunskaper i historia och filosofi och sammanfattar dem i kortfattade, tankeväckande insikter. Med fokus på historiens återkommande mönster och mänskligt beteende erbjuder "The Lessons of History" ett fascinerande perspektiv på civilisationens natur och de krafter som formar den.