title: "کتاب کوچک Bitcoin"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  کتاب کوچک Bitcoin یک کتاب مناسب برای مبتدیان است که اصول اولیه Bitcoin و فناوری پشت آن را پوشش می‌دهد، همچنین پتانسیل آن برای تحول در صنعت مالی را بررسی می‌کند. این کتاب شامل فصل‌هایی است که توسط کارشناسان مختلف در این زمینه نوشته شده‌اند و هر کدام به جنبه‌ای متفاوت از Bitcoin می‌پردازند، از جمله تاریخچه، اقتصاد، حریم خصوصی و امنیت آن. این کتاب به گونه‌ای طراحی شده است که برای خوانندگانی که هیچ دانش قبلی از Bitcoin یا ارزهای دیجیتال ندارند، قابل دسترسی باشد و نقطه شروعی عالی برای کسانی است که علاقه‌مند به یادگیری بیشتر درباره این فناوری نوآورانه هستند.