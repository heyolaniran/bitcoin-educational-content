title: "Den lilla Bitcoin-boken"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  The Little Bitcoin Book är en nybörjarvänlig bok som täcker grunderna i Bitcoin och tekniken bakom den, samt dess potential att förändra finansbranschen. Den innehåller kapitel skrivna av olika experter inom området, som var och en utforskar en annan aspekt av Bitcoin, inklusive dess historia, ekonomi, integritet och säkerhet. Boken är utformad för att vara tillgänglig för läsare utan tidigare kunskap om Bitcoin eller kryptovalutor, vilket gör den till en bra utgångspunkt för dem som är intresserade av att lära sig mer om denna innovativa teknik.