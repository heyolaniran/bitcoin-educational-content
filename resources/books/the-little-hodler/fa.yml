title: "هولدر کوچک"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  پول پیچیده است. اما نباید اینطور باشد! در 100 کمیک کوچک، The Little HODLer داستان‌های گذشته، حال و آینده پول را روایت می‌کند - به صورت تصویری به جای نمودارهای پیچیده، و با چهره‌ای دوستانه به جای کلمات بزرگ. The Little HODLer در سفری است تا بهترین شکل پول را پیدا کند - پولی که بتواند در هر زمانی آزادانه از آن استفاده کند (حتی در آخر هفته‌ها!)، پولی که هیچ‌کس نتواند از او بگیرد، و پولی که نتوان آن را به تریلیون‌ها چاپ کرد. و شرط می‌بندید که وقتی آن را پیدا کند، آن را خیلی محکم HODL خواهد کرد!