title: "Den lilla Hodler"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Pengar är komplicerat. Men det borde inte vara det! I 100 små serietidningar berättar The Little
  HODLer berättelser om pengars förflutna, nutid och framtid - i bilder
  istället för komplexa diagram, och med ett vänligt ansikte istället för stora ord. Den
  Little HODLer är på en resa för att hitta den bästa formen av pengar - en som han kan använda
  fritt när som helst (även på helgerna!), en som ingen kan ta ifrån honom,
  och som inte kan tryckas i biljoner. Och du slår vad om att när han hittar det, han är
  kommer att HODL det riktigt hårt!