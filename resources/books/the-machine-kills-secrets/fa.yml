title: "ماشین اسرار را می‌کشد"
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  کتاب "ماشین اسرار را می‌کشد" نوشته اندی گرینبرگ به بررسی افزایش نظارت دولتی و تهدید فزاینده به حریم خصوصی در عصر دیجیتال می‌پردازد. نویسنده، که یک روزنامه‌نگار فناوری است، به تاریخچه رمزنگاری و امنیت دیجیتال و افرادی و سازمان‌هایی که علیه نظارت دولتی مبارزه می‌کنند، می‌پردازد. این کتاب همچنین نگاهی به تأثیر افشاگران و نقشی که در پاسخگو نگه داشتن افراد در قدرت ایفا می‌کنند، ارائه می‌دهد. از طریق مجموعه‌ای از داستان‌های جذاب و مصاحبه با بازیگران کلیدی در این زمینه، "ماشین اسرار را می‌کشد" تحلیل تحریک‌آمیزی از چالش‌هایی که در حفاظت از حریم خصوصی و آزادی دیجیتال خود با آن مواجه هستیم، ارائه می‌دهد.