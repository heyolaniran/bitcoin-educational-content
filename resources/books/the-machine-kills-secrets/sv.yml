title: "Maskinen dödar hemligheter"
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  The Machine Kills Secrets av Andy Greenberg är en bok som utforskar den ökande statliga övervakningen och det växande hotet mot privatlivet i den digitala tidsåldern. Författaren, en teknikjournalist, fördjupar sig i kryptografins och den digitala säkerhetens historia och de individer och organisationer som kämpar mot statlig övervakning. Boken ger också en inblick i hur visselblåsare påverkar och vilken roll de spelar för att hålla makthavare ansvariga. Genom en rad fängslande berättelser och intervjuer med nyckelpersoner inom området presenterar "The Machine Kills Secrets" en tankeväckande analys av de utmaningar vi står inför när det gäller att skydda vår digitala integritet och frihet.