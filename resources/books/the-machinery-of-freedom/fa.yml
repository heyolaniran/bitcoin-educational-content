title: "ماشین آزادی: راهنمایی برای سرمایه‌داری رادیکال"
publication_year: 1973
cover: cover_en.webp
original: true
description: |
  ماشین آزادی، راهنمایی به سرمایه‌داری رادیکال نوشته دیوید دی. فریدمن کتابی است که به بررسی ایده آنارکو-سرمایه‌داری می‌پردازد، فلسفه سیاسی که از جامعه‌ای بدون دولت حمایت می‌کند که در آن تمام کالاها و خدمات، از جمله قانون و امنیت، توسط بازار آزاد ارائه می‌شوند. فریدمن استدلال می‌کند که مداخله دولت در اقتصاد بیشتر ضرر دارد تا سود، و اینکه جامعه‌ای مبتنی بر Exchange داوطلبانه و مسئولیت فردی کارآمدتر و عادلانه‌تر خواهد بود. این کتاب نقدی اندیشمندانه بر سیستم‌های سیاسی و اقتصادی سنتی است و دیدگاهی جذاب برای رویکردی به‌طور رادیکال متفاوت در سازماندهی جامعه ارائه می‌دهد.