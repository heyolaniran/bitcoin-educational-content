title: "Frihetens maskineri: Guide till en radikal kapitalism"
publication_year: 1973
cover: cover_en.webp
original: true
description: |
  The Machinery of Freedom, Guide to a Radical Capitalism av David D. Friedman är en bok som utforskar idén om anarkokapitalism, en politisk filosofi som förespråkar ett statslöst samhälle där alla varor och tjänster, inklusive lag och säkerhet, tillhandahålls av den fria marknaden. Friedman menar att statliga ingripanden i ekonomin skapar mer skada än nytta och att ett samhälle som bygger på frivillig Exchange och individuellt ansvar skulle vara mer effektivt och rättvist. Boken är en tankeväckande kritik av traditionella politiska och ekonomiska system, och erbjuder en övertygande vision för ett radikalt annorlunda sätt att organisera samhället.