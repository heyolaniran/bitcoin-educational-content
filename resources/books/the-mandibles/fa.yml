title: "خاندان مندیبل‌ها، ۲۰۲۹-۲۰۴۷"
publication_year: 2016
cover: cover_en.webp
original: true
description: |
  مندبل‌ها، یک خانواده، ۲۰۲۹-۲۰۴۷ اثر لیونل شریور رمانی است که پیامدهای فروپاشی مالی در ایالات متحده در آینده نزدیک را بررسی می‌کند. داستان اعضای خانواده مندبل را دنبال می‌کند که به دلیل فروپاشی اقتصاد آمریکا بیشتر ثروت خود را از دست داده‌اند. این رمان نقدی بر سیستم مالی مدرن ارائه می‌دهد و به چالش‌هایی که افراد و خانواده‌ها هنگام از دست دادن امنیت مالی خود با آن مواجه می‌شوند، می‌پردازد. همچنین نگاهی به آینده‌ای ممکن ارائه می‌دهد که در آن پول دیگر پایه و اساس جامعه نیست و پیامدهای احتمالی چنین تغییری را بررسی می‌کند.