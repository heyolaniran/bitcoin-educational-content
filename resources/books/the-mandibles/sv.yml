title: "The Mandibles, en familj, 2029-2047"
publication_year: 2016
cover: cover_en.webp
original: true
description: |
  The Mandibles, A Family, 2029-2047 av Lionel Shriver är en roman som utforskar konsekvenserna av en finansiell kollaps i USA inom en snar framtid. Berättelsen följer medlemmarna i familjen Mandible, som har förlorat större delen av sin förmögenhet på grund av den amerikanska ekonomins kollaps. Romanen kritiserar det moderna finansiella systemet och fördjupar sig i de utmaningar som individer och familjer ställs inför när de förlorar sin ekonomiska trygghet. Den ger också en inblick i en möjlig framtid där pengar inte längre är grunden för samhället och utforskar de potentiella konsekvenserna av ett sådant skifte.