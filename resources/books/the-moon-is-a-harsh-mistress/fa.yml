title: "ماه معشوقه‌ای خشن است"
publication_year: 1966
cover: cover_en.webp
original: true
description: |
  ماه سخت‌گیر است اثر رابرت ای. هاین‌لاین یک رمان علمی-تخیلی است که به بررسی موضوعات سیاست، انقلاب و اکتشافات فضایی می‌پردازد. این داستان که در سال ۲۰۷۵ در ماه رخ می‌دهد، روایتگر مبارزه یک مستعمره قمری برای استقلال از زمین است. داستان توسط یک تکنسین کامپیوتر به نام مانوئل گارسیا اوکلی-دیویس روایت می‌شود که به یکی از بازیگران کلیدی در شورش تبدیل می‌شود. این رمان به خاطر تصویرسازی زنده از زندگی در ماه، شخصیت‌های پیچیده و بررسی نظریه‌های سیاسی و اخلاقی شناخته شده است. این اثر به عنوان یکی از کلاسیک‌های ژانر علمی-تخیلی محسوب می‌شود و به خاطر دنیاسازی خلاقانه و ایده‌های تفکر برانگیزش مورد تحسین قرار گرفته است.