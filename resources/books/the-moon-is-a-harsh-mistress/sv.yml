title: "Månen är en hård älskarinna"
publication_year: 1966
cover: cover_en.webp
original: true
description: |
  The Moon is a Harsh Mistress av Robert A. Heinlein är en science fiction-roman som utforskar teman som politik, revolution och rymdutforskning. Den utspelar sig år 2075 på månen och berättar historien om en månkolonis kamp för självständighet från jorden. Historien berättas av en datatekniker, Manuel Garcia O'Kelly-Davis, som blir en nyckelspelare i upproret. Romanen är känd för sin levande skildring av livet på månen, sina komplexa karaktärer och sin utforskning av politisk teori och etik. Den anses vara en klassiker inom science fiction-genren och har hyllats för sitt fantasifulla världsbygge och sina tankeväckande idéer.