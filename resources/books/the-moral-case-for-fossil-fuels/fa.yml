title: "مورد اخلاقی برای سوخت‌های فسیلی"
publication_year: 2014
cover: cover_en.webp
original: true
description: |
  کتاب «مورد اخلاقی برای سوخت‌های فسیلی» نوشته الکس اپستین، استدلالی مخالف برای ادامه استفاده از سوخت‌های فسیلی ارائه می‌دهد، با وجود تأثیرات منفی آن‌ها بر محیط زیست. نویسنده معتقد است که سوخت‌های فسیلی نقش حیاتی در پیشرفت بشری ایفا کرده‌اند و تلاش‌ها برای حذف زودهنگام آن‌ها می‌تواند برای اقتصاد و محیط زیست فاجعه‌بار باشد. اپستین بسیاری از فرضیات رایج درباره سوخت‌های فسیلی را به چالش می‌کشد و استدلال می‌کند که آن‌ها بیشتر از ضرر، به جامعه انسانی سود رسانده‌اند. او همچنین از رویکردی عینی‌تر و مبتنی بر واقعیت برای بحث در مورد سیاست انرژی حمایت می‌کند. این کتاب دیدگاهی تحریک‌آمیز درباره موضوعی بحث‌برانگیز ارائه می‌دهد و برای خوانندگانی که به اخلاق محیط زیست، سیاست انرژی و اقتصاد علاقه‌مندند، توصیه می‌شود.