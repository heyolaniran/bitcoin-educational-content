title: "Det moraliska argumentet för fossila bränslen"
publication_year: 2014
cover: cover_en.webp
original: true
description: |
  The Moral Case for Fossil Fuels av Alex Epstein är en bok som presenterar ett kontroversiellt argument för fortsatt användning av fossila bränslen, trots deras negativa inverkan på miljön. Författaren hävdar att fossila bränslen har spelat en viktig roll för människans utveckling och att en förtida utfasning skulle vara katastrofal för ekonomin och miljön. Epstein utmanar många vanliga antaganden om fossila bränslen och hävdar att de har inneburit mer nytta än skada för det mänskliga samhället. Han förespråkar också ett mer objektivt och faktabaserat förhållningssätt till debatten om energipolitik. Boken presenterar ett tankeväckande perspektiv på ett kontroversiellt ämne och rekommenderas för läsare som är intresserade av miljöetik, energipolitik och ekonomi.