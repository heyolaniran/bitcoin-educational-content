title: "راز بانکداری"
publication_year: 1983
cover: cover_en.webp
original: true
description: |
  راز بانکداری اثر موری روتبارد کتابی است که به بررسی تاریخچه و عملکرد سیستم بانکی در ایالات متحده می‌پردازد. این کتاب توضیح می‌دهد که سیستم بانکی کنونی چگونه توسعه یافته و به‌طور دقیق چگونه کار می‌کند و تحلیل انتقادی از مشکلات این سیستم ارائه می‌دهد. همچنین نقش بانک‌های مرکزی، فدرال رزرو و تأثیر آن‌ها بر اقتصاد را مورد بحث قرار می‌دهد. این کتاب به‌ویژه برای کسانی که به تاریخ و اقتصاد بانکداری علاقه‌مند هستند، مرتبط است و دیدگاه منحصربه‌فردی در مورد مسائل پیش روی سیستم مالی مدرن ارائه می‌دهد.