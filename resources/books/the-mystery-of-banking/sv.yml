title: "Bankväsendets mysterium"
publication_year: 1983
cover: cover_en.webp
original: true
description: |
  The Mystery of Banking av Murray Rothbard är en bok som handlar om banksystemets historia och funktionssätt i USA. Boken förklarar hur det nuvarande banksystemet har utvecklats och hur det fungerar i detalj, och ger en kritisk analys av problemen med systemet. Den diskuterar också centralbankernas roll, Federal Reserve, och deras inverkan på ekonomin. Denna bok är särskilt relevant för dem som är intresserade av bankhistoria och bankekonomi och ger ett unikt perspektiv på de frågor som det moderna finansiella systemet står inför.