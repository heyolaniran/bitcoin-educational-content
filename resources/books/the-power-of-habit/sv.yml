title: "Vanans makt"
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  The Power of Habit av Charles Duhigg är en bok som utforskar hur vanor fungerar och hur de kan förändras. Författaren använder sig av vetenskaplig forskning och berättelser från verkliga livet för att förklara hur vanor skapas och hur de kan förändras. Boken ger en ram för att förstå hur vanor fungerar och ger praktiska råd om hur man utvecklar nya vanor och bryter gamla. Den diskuterar också hur vanor kan användas för att förbättra personliga och yrkesmässiga prestationer samt för att skapa positiva förändringar i samhället. Boken är skriven i en engagerande och lättillgänglig stil, vilket gör den till en utmärkt läsning för alla som är intresserade av att förstå vetenskapen bakom vanor och hur de kan användas för att förbättra våra liv.