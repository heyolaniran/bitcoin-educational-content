title: "برنامه‌نویس عمل‌گرا"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  کتاب "The Pragmatic Programmer" درباره توسعه نرم‌افزار و برنامه‌نویسی است که توصیه‌هایی برای تبدیل شدن به یک برنامه‌نویس بهتر ارائه می‌دهد. این کتاب که توسط اندی هانت و دیو توماس نوشته شده است، نکاتی درباره نحوه برخورد با توسعه نرم‌افزار، نوشتن کد بهتر و کار کارآمدتر به عنوان یک تیم ارائه می‌دهد. این کتاب موضوعات گسترده‌ای از جمله شیوه‌های کدنویسی، تست، اشکال‌زدایی و الگوهای طراحی را پوشش می‌دهد و شامل مثال‌های عملی و مطالعات موردی است. این کتاب برای برنامه‌نویسان در سطح متوسط که می‌خواهند مهارت‌های خود را بهبود بخشند و در کار خود مؤثرتر شوند، هدف‌گذاری شده است.