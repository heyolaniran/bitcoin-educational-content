title: "Den pragmatiska programmeraren"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  The Pragmatic Programmer är en bok om programvaruutveckling och programmering som ger råd om hur man blir en bättre programmerare. Boken är skriven av Andy Hunt och Dave Thomas och ger tips om hur man kan närma sig programvaruutveckling, skriva bättre kod och arbeta mer effektivt som ett team. Den täcker ett brett spektrum av ämnen, inklusive kodningspraxis, testning, felsökning och designmönster, och innehåller praktiska exempel och fallstudier. Boken vänder sig till programmerare på mellannivå som vill förbättra sina färdigheter och bli mer effektiva i sitt arbete.