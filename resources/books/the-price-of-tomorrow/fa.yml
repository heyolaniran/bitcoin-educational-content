title: "قیمت فردا: چرا کاهش قیمت کلید آینده‌ای فراوان است"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  "قیمت فردا؛ چرا کاهش قیمت‌ها کلید آینده‌ای فراوان است" نوشته جف بوث کتابی است که به بررسی تأثیر فناوری بر اقتصاد ما و چگونگی ایجاد کاهش قیمت‌ها می‌پردازد. نویسنده استدلال می‌کند که با پیشرفت مداوم فناوری و کاهش قیمت‌ها، سیستم اقتصادی فعلی ما که بر پایه تورم بنا شده است، به طور فزاینده‌ای ناپایدار می‌شود. این کتاب تاریخچه نوآوری‌های فناوری و تأثیر آن بر اقتصادها در طول تاریخ را بررسی می‌کند و همچنین پیامدهای احتمالی ادامه اتکا به یک سیستم پولی تورمی را مورد بحث قرار می‌دهد. این کتاب نگاهی تحریک‌آمیز به آینده اقتصاد ما و تغییراتی که برای سازگاری با چشم‌انداز فناوری به سرعت در حال تحول لازم است، ارائه می‌دهد.