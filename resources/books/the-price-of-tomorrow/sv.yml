title: "Morgondagens pris: Varför deflation är nyckeln till en framtid i överflöd"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  The Price of Tomorrow; Why Deflation is the Key to an Abundant Future" av Jeff Booth är en bok som undersöker teknikens inverkan på vår ekonomi och hur den driver på deflationen. Författaren hävdar att när tekniken fortsätter att utvecklas och priserna faller blir vårt nuvarande ekonomiska system, som bygger på inflation, alltmer ohållbart. Boken utforskar den tekniska innovationens historia och dess inverkan på ekonomier genom historien, liksom de potentiella konsekvenserna av att fortsätta att förlita sig på ett inflationsdrivande monetärt system. Den ger en tankeväckande inblick i vår ekonomis framtid och de förändringar som kommer att krävas för att anpassa oss till ett snabbt föränderligt teknologiskt landskap.