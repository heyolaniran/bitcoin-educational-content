title: "ظهور و سقوط قدرت‌های بزرگ"
publication_year: 1987
cover: cover_en.webp
original: true
description: |
  ظهور و سقوط قدرت‌های بزرگ نوشته پل کندی، تحلیلی تاریخی از عوامل اقتصادی و نظامی است که به افول قدرت‌های بزرگ مختلف در طول تاریخ کمک کرده‌اند. این کتاب بررسی می‌کند که چگونه کشورهایی مانند اسپانیا، فرانسه و بریتانیا به قدرت رسیدند، اما در نهایت به دلیل عواملی مانند گسترش بیش از حد، رکود اقتصادی و شکست نظامی دچار افول شدند. کندی همچنین بررسی می‌کند که چگونه ایالات متحده به عنوان یک قدرت جهانی مسلط در عصر مدرن ظهور کرده است و چالش‌هایی که در حفظ موقعیت خود در برابر قدرت‌های در حال ظهور مانند چین با آن مواجه است. این کتاب بینش‌هایی در مورد روندهای بلندمدت و الگوهای تاریخی که ظهور و سقوط قدرت‌های بزرگ را شکل داده‌اند، ارائه می‌دهد و برای هر کسی که به سیاست و اقتصاد جهانی علاقه‌مند است، خواندنی ضروری است.