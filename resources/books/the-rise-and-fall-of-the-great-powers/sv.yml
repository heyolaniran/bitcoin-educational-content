title: "Stormaktstidens uppgång och fall"
publication_year: 1987
cover: cover_en.webp
original: true
description: |
  The Rise and Fall of the Great Powers av Paul Kennedy är en historisk analys av de ekonomiska och militära faktorer som har bidragit till olika stormakters nedgång genom historien. Boken undersöker hur länder som Spanien, Frankrike och Storbritannien växte till makt, men så småningom föll på grund av faktorer som överexpansion, ekonomisk stagnation och militärt nederlag. Kennedy undersöker också hur USA har vuxit fram som en dominerande global makt i modern tid och vilka utmaningar landet står inför när det gäller att behålla sin position i förhållande till växande makter som Kina. Boken ger insikter i de långsiktiga trender och historiska mönster som har format stormakters uppgång och fall och är ett måste för alla som är intresserade av global politik och ekonomi.