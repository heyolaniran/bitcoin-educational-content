title: "راه بندگی"
publication_year: 1944
cover: cover_en.webp
original: true
description: |
  کتاب "راهی به سوی بردگی" اثر کلاسیک اقتصاددان و فیلسوف اتریشی، فردریش هایک است که در اصل در سال ۱۹۴۴ منتشر شد. این کتاب نسبت به خطرات برنامه‌ریزی مرکزی و تمامیت‌خواهی هشدار می‌دهد و استدلال می‌کند که کنترل دولت بر اقتصاد و جامعه منجر به از دست رفتن آزادی فردی و ظهور دیکتاتوری می‌شود. هایک معتقد است که تنها راه حفظ آزادی و رفاه، پذیرش بازارهای آزاد، رقابت و مداخله محدود دولت است. این کتاب نقدی قدرتمند بر سوسیالیسم و دفاعی از لیبرالیسم کلاسیک است و همچنان در مباحث سیاسی و اقتصادی معاصر تأثیرگذار است.