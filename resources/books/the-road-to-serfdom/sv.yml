title: "Vägen till underkastelse"
publication_year: 1944
cover: cover_en.webp
original: true
description: |
  The Road to Serfdom är en klassisk bok av den österrikiske ekonomen och filosofen Friedrich Hayek, ursprungligen publicerad 1944. Boken varnar för farorna med centralplanering och totalitarism och hävdar att statens kontroll över ekonomin och samhället leder till att den individuella friheten går förlorad och att en diktatur växer fram. Hayek menar att det enda sättet att bevara frihet och välstånd är att anamma fria marknader, konkurrens och begränsad statlig inblandning. Boken är en kraftfull kritik av socialismen och ett försvar för den klassiska liberalismen, och den fortsätter att vara inflytelserik i samtida politiska och ekonomiska debatter.