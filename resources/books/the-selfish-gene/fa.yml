title: "ژن خودخواه"
publication_year: 1976
cover: cover_en.webp
original: true
description: |
  کتاب "ژن خودخواه" نوشته ریچارد داوکینز به بررسی موضوع تکامل و ژنتیک از دیدگاه ژن‌ها به عنوان واحد بنیادی انتخاب می‌پردازد، برخلاف افراد یا گونه‌ها. داوکینز استدلال می‌کند که ژن‌ها کلید درک رفتار موجودات زنده هستند و بسیاری از رفتارهای به ظاهر نوع‌دوستانه را می‌توان با این واقعیت توضیح داد که در نهایت به نفع ژن‌هایی است که مسئول آن‌ها هستند. این کتاب به خاطر محبوب‌سازی مفهوم "میم"، یک واحد فرهنگی اطلاعات که تحت همان اصول تکاملی ژن‌ها قرار دارد، شناخته شده است. "ژن خودخواه" یک اثر برجسته در زمینه زیست‌شناسی تکاملی است و تأثیر قابل توجهی بر درک ما از نقش ژن‌ها در تکامل داشته است.