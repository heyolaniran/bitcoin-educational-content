title: "Den själviska genen"
publication_year: 1976
cover: cover_en.webp
original: true
description: |
  The Selfish Gene av Richard Dawkins är en bok som utforskar ämnet evolution och genetik utifrån perspektivet att gener är den grundläggande urvalsenheten, i motsats till individer eller arter. Dawkins hävdar att generna är nyckeln till att förstå levande organismers beteende, och att många till synes altruistiska beteenden kan förklaras med att de i slutändan gynnar de gener som är ansvariga för dem. Boken är känd för att ha populariserat begreppet "meme", en kulturell enhet av information som är föremål för samma evolutionära principer som gener. The Selfish Gene är ett banbrytande verk inom evolutionsbiologin och har haft en betydande inverkan på vår förståelse av genernas roll i evolutionen.