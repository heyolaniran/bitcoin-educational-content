title: "Den suveräna individen"
publication_year: 1997
cover: cover_en.webp
original: true
description: |
  The Sovereign Individual är en facklitterär bok som behandlar begreppet individuell suveränitet och dess potentiella framväxt i den digitala tidsåldern, särskilt i samband med internet och andra tekniska framsteg. Boken utforskar konsekvenserna av decentraliserade nätverk, kryptografi och digitala valutor för samhället och individens frihet, och hävdar att de kommer att leda till en betydande omvandling av styrning, ekonomi och kultur. Den diskuterar också den potentiella uppkomsten av en ny typ av elit, den suveräna individen, som skulle stärkas av denna tekniska utveckling och kunna kringgå traditionella maktstrukturer. Boken är en tankeväckande och utmanande läsning för alla som är intresserade av Bitcoin:s och den digitala tidsålderns potentiella inverkan på vårt samhälle och vårt sätt att leva.