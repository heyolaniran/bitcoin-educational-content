title: "ستاره دریایی و عنکبوت: قدرت توقف‌ناپذیر سازمان‌های بدون رهبر"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  ستاره دریایی و عنکبوت؛ قدرت توقف‌ناپذیر سازمان‌های بدون رهبر نوشته اوری برافرمن و راد ای. بکستروم به بررسی پدیده سازمان‌های غیرمتمرکز می‌پردازد که بدون سلسله‌مراتب یا ساختارهای رهبری سنتی عمل می‌کنند. از طریق مجموعه‌ای از مطالعات موردی و مثال‌ها، کتاب به نقاط قوت و ضعف این سازمان‌ها می‌پردازد که شامل توانایی برای تطبیق سریع با تغییرات و نوآوری است، اما همچنین پتانسیل برای هرج و مرج و عدم پاسخگویی را نیز دارد. نویسندگان استدلال می‌کنند که درک این سازمان‌های بدون رهبر در دنیایی که فناوری و ارتباطات مدل‌های غیرمتمرکز را قابل اجرا و مؤثرتر کرده‌اند، بسیار مهم است.