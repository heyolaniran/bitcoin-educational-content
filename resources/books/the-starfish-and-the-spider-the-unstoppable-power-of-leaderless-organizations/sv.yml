title: "Sjöstjärnan och spindeln: Den ostoppbara kraften hos ledarlösa organisationer"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  The Starfish and the Spider; The Unstoppable Power of Leaderless Organizations av Ori Brafman och Rod A. Beckstrom utforskar fenomenet med decentraliserade organisationer som fungerar utan traditionella hierarkier eller ledarskapsstrukturer. Genom en rad fallstudier och exempel belyser boken styrkorna och svagheterna hos dessa organisationer, som inkluderar förmågan att snabbt anpassa sig till förändring och innovation, men också potentialen för kaos och brist på ansvarsskyldighet. Författarna menar att det är viktigt att förstå dessa ledarlösa organisationer i en värld där teknik och kommunikation har gjort decentraliserade modeller mer livskraftiga och effektiva.