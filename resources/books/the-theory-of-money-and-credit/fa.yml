title: "نظریه پول و اعتبار"
publication_year: 1912
cover: cover_en.webp
original: true
description: |
  نظریه پول و اعتبار اثر لودویگ فون میزس کتابی تأثیرگذار است که به بررسی ماهیت پول و تأثیرات آن بر فعالیت‌های اقتصادی می‌پردازد. اثر میزس به عنوان یکی از مهم‌ترین مشارکت‌ها در نظریه اقتصادی شناخته می‌شود و بسیاری آن را پایه‌گذار اقتصاد مدرن اتریشی می‌دانند. در این کتاب، میزس به بررسی رابطه بین پول و قیمت‌ها، تأثیرات تورم و نقش اعتبار در اقتصاد می‌پردازد. او همچنین به ماهیت بانکداری و مشکلات مرتبط با بانکداری ذخیره کسری می‌پردازد. این کتاب برای هر کسی که به اقتصاد و سیاست پولی علاقه‌مند است، ضروری است. این کتاب درک عمیقی از کارکردهای اقتصاد مدرن و نقش پول در آن ارائه می‌دهد.