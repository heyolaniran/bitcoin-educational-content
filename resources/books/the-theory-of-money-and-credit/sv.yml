title: "Teorin om pengar och kredit"
publication_year: 1912
cover: cover_en.webp
original: true
description: |
  The Theory of Money and Credit av Ludwig von Mises är en inflytelserik bok som utforskar pengars natur och dess effekter på den ekonomiska aktiviteten. Mises arbete betraktas som ett av de viktigaste bidragen till ekonomisk teori och anses av många vara grunden för den moderna österrikiska ekonomin. I denna bok undersöker Mises förhållandet mellan pengar och priser, effekterna av inflation och kreditens roll i ekonomin. Han diskuterar också bankväsendets natur och de problem som är förknippade med fraktionella reserver. Den här boken är ett måste för alla som är intresserade av ekonomi och penningpolitik. Den ger en djup förståelse för hur den moderna ekonomin fungerar och vilken roll pengar har i den.