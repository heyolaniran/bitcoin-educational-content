title: "جنگ هنر"
publication_year: 2002
cover: cover_en.webp
original: true
description: |
  جنگ هنر اثر استیون پرسفیلد یک کتاب انگیزشی و خودیاری است که هدف آن کمک به خوانندگان برای غلبه بر موانع خلاقیت و دنبال کردن علایق خلاقانه‌شان است. این کتاب به بررسی موانع روانی و احساسی می‌پردازد که می‌توانند مانع از تحقق پتانسیل خلاقانه افراد شوند و مشاوره‌ها و استراتژی‌های عملی برای غلبه بر این موانع ارائه می‌دهد. با ترکیبی از حکایات شخصی و بینش‌های قابل اجرا، "جنگ هنر" خوانندگان را تشویق می‌کند تا رویکردی منظم‌تر و متمرکزتر به کار خلاقانه خود اتخاذ کنند، در حالی که چالش‌ها و پاداش‌های فرآیند خلاقانه را نیز به رسمیت می‌شناسند و ارج می‌نهند.