title: "هیچ الکترونی وجود ندارد"
publication_year: 1991
cover: cover_en.webp
original: true
description: |
  کتاب "هیچ الکترونی وجود ندارد" نوشته کن آمدال، روش سنتی آموزش و یادگیری درباره برق و الکترونیک را به چالش می‌کشد. به جای تمرکز بر مفاهیم انتزاعی و معادلات ریاضی، آمدال از زبان ساده و مثال‌های قابل درک برای توضیح چگونگی کارکرد برق در زندگی روزمره ما استفاده می‌کند. او همچنین به بررسی پیامدهای اخلاقی پیشرفت‌های تکنولوژیکی و تأثیر آن‌ها بر جامعه می‌پردازد. این کتاب خوانندگان را تشویق می‌کند تا به طور انتقادی درباره رابطه بین تکنولوژی، اقتصاد و اخلاق فکر کنند.