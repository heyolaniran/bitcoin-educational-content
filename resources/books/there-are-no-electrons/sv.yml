title: "Det finns inga elektroner"
publication_year: 1991
cover: cover_en.webp
original: true
description: |
  There Are No Electrons av Kenn Amdahl är en bok som utmanar det traditionella sättet att lära ut och lära sig om elektricitet och elektronik. Istället för att fokusera på abstrakta begrepp och matematiska ekvationer använder Amdahl ett enkelt språk och lättförståeliga exempel för att förklara hur elektricitet fungerar i vårt dagliga liv. Han utforskar också de etiska konsekvenserna av tekniska framsteg och hur de påverkar samhället. Boken uppmuntrar läsarna att tänka kritiskt kring förhållandet mellan teknik, ekonomi och etik.