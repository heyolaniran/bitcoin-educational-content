title: "این بار متفاوت است: هشت قرن حماقت مالی"
publication_year: 2009
cover: cover_en.webp
original: true
description: |
  این بار متفاوت است، هشت قرن حماقت مالی نوشته کارمن ام. رینهارت و کنت اس. روگف یک مطالعه جامع درباره بحران‌های مالی در طول تاریخ است. نویسندگان به بررسی علل و پیامدهای بحران‌های مالی، از بحران بانکی اروپا در قرون وسطی تا بحران مسکن و اعتبار در قرن ۲۱ می‌پردازند. آن‌ها استدلال می‌کنند که بحران‌های مالی یک ویژگی تکراری در اقتصادهای مدرن هستند که توسط عوامل مشترکی مانند وام‌گیری بیش از حد، حباب‌های دارایی و مقررات مالی سست ایجاد می‌شوند. از طریق تحلیل خود، نویسندگان بینش‌هایی در مورد چالش‌هایی که سیاست‌گذاران و سرمایه‌گذاران در هنگام پیمایش در دنیای پیچیده مالی با آن‌ها مواجه هستند، ارائه می‌دهند. این کتاب منبع ارزشمندی برای هر کسی است که به دنبال درک تاریخ و آینده بحران‌های مالی است.