title: "Den här gången är det annorlunda Åtta århundraden av finansiell dårskap"
publication_year: 2009
cover: cover_en.webp
original: true
description: |
  This Time Is Different, Eight Centuries of Financial Folly av Carmen M. Reinhart och Kenneth S. Rogoff är en omfattande studie av finanskriser genom historien. Författarna undersöker orsakerna till och konsekvenserna av finansiella kriser, från bankkrisen i det medeltida Europa till bostads- och kreditkrisen på 2000-talet. De menar att finanskriser är ett återkommande inslag i moderna ekonomier och att de drivs av gemensamma faktorer som överdriven upplåning, tillgångsbubblor och slapp finansiell reglering. Genom sin analys ger författarna en inblick i de utmaningar som beslutsfattare och investerare står inför när de ska navigera i den komplexa finansvärlden. Boken är en värdefull resurs för alla som vill förstå de finansiella krisernas historia och framtid.