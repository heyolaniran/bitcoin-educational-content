description: |
  «نام‌های واقعی» نوشته ورنور وینج یک رمان علمی تخیلی است که به بررسی پیامدهای واقعیت مجازی، هوش مصنوعی و محو شدن مرز بین جهان‌های فیزیکی و دیجیتال می‌پردازد. این داستان در آینده‌ای نزدیک رخ می‌دهد که در آن مردم می‌توانند در فضایی مجازی مشترک به نام «صفحه دیگر» با یکدیگر تعامل داشته باشند. قهرمان داستان، «آقای لغزنده»، یک هکر ماهر است که به توطئه‌ای خطرناک پی می‌برد که بنیان دنیای مجازی را تهدید می‌کند. داستان به موضوعاتی مانند هویت، حریم خصوصی و پیامدهای زندگی در جهانی که فناوری هر چیزی را ممکن کرده است، می‌پردازد. به طور کلی، «نام‌های واقعی» یک بررسی جذاب و تفکر برانگیز از امکانات و خطرات آینده‌ای پیشرفته از نظر فناوری است.