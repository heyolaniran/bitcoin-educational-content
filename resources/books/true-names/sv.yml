title: "Sanna namn"
publication_year: 1981
cover: cover_en.webp
original: true
description: |
  True Names av Vernor Vinge är en science fiction-novell som utforskar konsekvenserna av virtuell verklighet, artificiell intelligens och den suddiga gränsen mellan fysiska och digitala världar. Den utspelar sig i en nära framtid där människor kan interagera med varandra i ett delat virtuellt utrymme som kallas "det andra planet". Huvudpersonen, "Mr Slippery", är en skicklig hacker som upptäcker en farlig konspiration som hotar själva grunden för den virtuella världen. Berättelsen fördjupar sig i teman som identitet, integritet och konsekvenserna av att leva i en värld där tekniken har gjort allt möjligt. Sammantaget är "True Names" en gripande och tankeväckande utforskning av möjligheterna och farorna med en teknologiskt avancerad framtid.