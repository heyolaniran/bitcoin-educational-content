title: "V برای وندتا"
publication_year: 1982
cover: cover_en.webp
original: true
description: |
  وی فور وندتا اثر آلن مور یک رمان گرافیکی است که در آینده‌ای دیستوپیایی اتفاق می‌افتد، جایی که یک دولت فاشیستی بر بریتانیا حکومت می‌کند. داستان درباره یک مبارز نقاب‌دار به نام "وی" است که به دنبال سرنگونی دولت و الهام‌بخشی به یک انقلاب است. در این مسیر، او با زنی جوان به نام ایوی هموند همراه می‌شود و این دو درگیر شبکه‌ای پیچیده از دسیسه‌های سیاسی و مسائل اجتماعی می‌شوند. کتاب به بررسی موضوعاتی مانند اقتدارگرایی، تروریسم، سانسور و قدرت آزادی شخصی می‌پردازد. این اثر به دلیل داستان جذاب، شخصیت‌های خوب پرداخته‌شده و سبک بصری چشمگیر، تحسین‌های زیادی از منتقدان دریافت کرده است.