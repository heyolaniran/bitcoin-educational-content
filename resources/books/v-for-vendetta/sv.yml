title: "V för Vendetta"
publication_year: 1982
cover: cover_en.webp
original: true
description: |
  V for Vendetta av Alan Moore är en grafisk roman som utspelar sig i en dystopisk framtid där en fascistisk regering kontrollerar Storbritannien. Berättelsen följer en maskerad vigilante känd som "V" som försöker störta regeringen och inspirera till en revolution. Längs vägen slår han sig ihop med en ung kvinna vid namn Evey Hammond och de två blir involverade i en komplex väv av politiska intriger och sociala frågor. Boken utforskar teman som auktoritärt styre, terrorism, censur och den personliga frihetens kraft. Den har blivit mycket uppskattad av kritikerna för sin fängslande handling, sina välutvecklade karaktärer och sin slående visuella stil.