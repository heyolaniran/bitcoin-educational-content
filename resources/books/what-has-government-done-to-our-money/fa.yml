title: "دولت با پول ما چه کرده است"
publication_year: 1963
cover: cover_en.webp
original: true
description: |
  کتاب "دولت با پول ما چه کرده است" نوشته موری روتبارد یک کتاب کلاسیک است که به تاریخچه پول و نقش دولت در توسعه آن می‌پردازد. این کتاب تحلیل انتقادی از سیستم بانکداری مرکزی و تأثیر سیاست‌های پولی بر اقتصاد ارائه می‌دهد و استدلال می‌کند که مداخله دولت باعث تورم، بی‌ثباتی اقتصادی و کاهش ارزش پول شده است. نوشته‌های روتبارد تفکر برانگیز است و دیدگاهی جایگزین درباره ماهیت پول و نقش دولت در مدیریت اقتصاد ارائه می‌دهد. این کتاب برای علاقه‌مندان به اقتصاد، مالی و بانکداری و هر کسی که می‌خواهد درک عمیق‌تری از رابطه بین پول و سیاست‌های دولتی پیدا کند، توصیه می‌شود.