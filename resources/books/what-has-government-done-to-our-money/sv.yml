title: "Vad har regeringen gjort med våra pengar"
publication_year: 1963
cover: cover_en.webp
original: true
description: |
  What Has Government Done To Our Money av Murray Rothbard är en klassisk bok som behandlar pengarnas historia och statens roll i deras utveckling. Boken ger en kritisk analys av centralbankssystemet och penningpolitikens inverkan på ekonomin och hävdar att statliga ingripanden har orsakat inflation, ekonomisk instabilitet och en devalvering av valutan. Rothbards texter är tankeväckande och presenterar ett alternativt perspektiv på pengars natur och statens roll i styrningen av ekonomin. Denna bok rekommenderas för dem som är intresserade av ekonomi, finans och bankväsende och för alla som vill få en djupare förståelse för förhållandet mellan pengar och statlig politik.