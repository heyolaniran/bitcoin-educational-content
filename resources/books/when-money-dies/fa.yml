title: "وقتی پول می‌میرد"
publication_year: 1975
cover: cover_en.webp
original: true
description: |
  کتاب "وقتی پول می‌میرد" نوشته آدام فرگوسن به بررسی ابر تورمی می‌پردازد که در اوایل دهه ۱۹۲۰ در آلمان و در پی جنگ جهانی اول رخ داد. این کتاب گزارشی دقیق از پیامدهای اجتماعی و اقتصادی ابر تورم ارائه می‌دهد و نشان می‌دهد چگونه این وضعیت به ظهور حزب نازی منجر شد. فرگوسن همچنین بررسی می‌کند که چگونه رویدادهای آلمان بر سیاست‌های اقتصادی سایر کشورها تأثیر گذاشت و آنها چگونه با مشکلات اقتصادی خود برخورد کردند. این کتاب به عنوان یک هشدار درباره خطرات تورم و اهمیت سیاست‌های پولی صحیح عمل می‌کند.