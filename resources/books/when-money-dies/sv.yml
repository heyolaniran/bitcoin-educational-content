title: "När pengar dör"
publication_year: 1975
cover: cover_en.webp
original: true
description: |
  När pengarna dör av Adam Fergusson är en bok som handlar om den hyperinflation som uppstod i Tyskland i början av 1920-talet, i efterdyningarna av första världskriget. Boken ger en detaljerad redogörelse för hyperinflationens sociala och ekonomiska konsekvenser och hur den ledde till nazistpartiets framväxt. Fergusson undersöker också hur händelserna i Tyskland påverkade den ekonomiska politiken i andra länder och hur de hanterade sina egna ekonomiska problem. Boken är en varnande berättelse om farorna med inflation och vikten av en sund penningpolitik.