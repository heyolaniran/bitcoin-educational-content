title: "چرا Bitcoin بخریم"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  چرا خرید Bitcoin نوشته اندی استروم کتابی در سطح مبتدی تا متوسط است که به موضوع Bitcoin و اهمیت آن در دنیای مدرن می‌پردازد. این کتاب تاریخچه و فناوری پشت Bitcoin را پوشش می‌دهد و پتانسیل سرمایه‌گذاری این ارز دیجیتال را تحلیل می‌کند. استروم دیدگاه‌هایی درباره نیروهای کلان اقتصادی که پذیرش Bitcoin را پیش می‌برند ارائه می‌دهد و پتانسیل آن را به عنوان پوششی در برابر تورم و ذخیره ارزش بررسی می‌کند. این کتاب برای هر کسی که می‌خواهد اصول Bitcoin و پتانسیل آن به عنوان یک وسیله سرمایه‌گذاری را درک کند، مناسب است.