title: "Varför köpa Bitcoin"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  Why Buy Bitcoin av Andy Edstrom är en bok på nybörjar- till mellannivå som fördjupar sig i ämnet Bitcoin och dess relevans i den moderna världen. Boken täcker historien och tekniken bakom Bitcoin och analyserar investeringspotentialen för den digitala valutan. Edstrom ger insikter i de makroekonomiska krafter som driver på införandet av Bitcoin och utforskar dess potential som ett skydd mot inflation och en värdebevarare. Den här boken passar alla som vill förstå grunderna i Bitcoin och dess potential som investeringsinstrument.