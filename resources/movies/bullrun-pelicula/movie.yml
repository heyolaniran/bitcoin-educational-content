description: |
  Ana es una cineasta que se inicia en el comercio de criptomonedas durante la
  pandemia. Su marido y su padre quieren que vaya a terapia, y Ana decide, como
  ejercicio de reparación (en su desesperación), hacer un documental sobre la
  fiebre del bitcoin con un productor (más fundamentalista que Michael Saylor), un
  equipo técnico de nuevos especuladores (tres en la sala) y un padre economista
  (un boomer) que quiere evitar a toda costa que su hija se arruine en un mercado
  que no entiende. Para él, las criptomonedas son la burbuja de los tulipanes o
  los sellos del siglo XXI: una estafa de toda la vida. La historia de Ana servirá
  como caballo de Troya para adentrarse en el ecosistema de las criptomonedas a
  través de testimonios de expertos.
