description: |
  Cypherpunks Write Code," the complete four-part documentary series produced by
  Reason about the movement that led to the discovery of bitcoin. In the early
  1990s, a group of mathematicians, misfits, hackers, and hobbyists calling
  themselves "the cypherpunks" came together around a shared belief that the
  internet would either demolish society's artificial walls or lay the groundwork
  for an Orwellian state. They saw cryptography as a weapon against central
  planning and surveillance in this new virtual world. The philosophical and
  technical ideas explored on the cypherpunks' widely read email list, which
  launched in 1992, influenced the creation of bitcoin, WikiLeaks, Tor,
  BitTorrent, and the Silk Road. The cypherpunks anticipated the promise and the
  peril that lay ahead when the internet went mainstream, including new threats to
  privacy and the possibility of building virtual platforms for communication and
  trade that would be impervious to government regulators.
