description: |
  vous êtes nouveau à Bitcoin ? Ne vous inquiétez pas, nous passons tous par cette étape, à la 21 Bitcoin Academy, nous vous accompagnons tout au long du chemin en accélérant votre courbe d'apprentissage et en mettant à votre disposition les meilleurs outils et produits sur le marché. Commencez votre aventure bitcoiner avec nous !
  