description: |
  jesteś nowy w Bitcoin? Nie martw się, wszyscy przechodzimy przez ten etap, w 21 Bitcoin Academy towarzyszymy ci w drodze, przyspieszając twoją krzywą uczenia się i oddając do twojej dyspozycji najlepsze narzędzia i produkty na rynku. Rozpocznij z nami swoją przygodę z bitcoinerami!
  