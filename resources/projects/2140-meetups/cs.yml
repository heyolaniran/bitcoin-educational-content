description: |
  Vítejte na 2140meetups, místě setkávání, kde můžete vytvářet komunity a plánovat setkání, abyste podpořili fyzická setkání mezi bitcoinery. Pokud hledáte komunitu ve svém okolí, použijte mapu výše nebo se podívejte sem. Pokud uvažujete o jejím založení, přečtěte si nejprve tuto příručku.