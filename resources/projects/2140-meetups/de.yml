description: |
  Willkommen bei 2140meetups, dem Treffpunkt, an dem Sie Communities gründen und Treffen planen können, um physische Begegnungen zwischen Bitcoinern zu fördern. Wenn Sie nach einer Community in Ihrer Nähe suchen, nutzen Sie die Karte oben oder schauen Sie hier. Wenn Sie mit dem Gedanken spielen, eine zu gründen, lesen Sie zuerst diesen Leitfaden.