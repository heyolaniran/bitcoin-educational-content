description: |
  Tere tulemast 2140meetups'ile, kohtumispaika, kus saab luua kogukondi ja planeerida kohtumisi, et edendada füüsilisi kohtumisi bitcoin'i kasutajate vahel. Kui otsite kogukonda teie lähedal, kasutage ülalolevat kaarti või vaadake siit. Kui mõtled ühe kogukonna loomisele, loe esmalt juhendit.