description: |
  به 2140meetups خوش آمدید، نقطه ملاقات جایی که می‌توانید جوامع ایجاد کنید و ملاقات‌هایی را برای تقویت برخوردهای حضوری بین بیت‌کوینرها برنامه‌ریزی کنید. اگر به دنبال جامعه‌ای نزدیک خود هستید، از نقشه بالا استفاده کنید یا اینجا را بررسی کنید. اگر به فکر شروع یکی هستید، ابتدا راهنما را بخوانید.