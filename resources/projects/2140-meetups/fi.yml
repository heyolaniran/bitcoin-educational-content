description: |
  Tervetuloa 2140meetupsiin, kohtaamispaikkaan, jossa voit luoda yhteisöjä ja aikatauluttaa tapaamisia edistämään fyysisiä kohtaamisia bitcoin-asiakkaiden välillä. Jos etsit yhteisöä läheltäsi, käytä yllä olevaa karttaa tai katso täältä. Jos harkitset yhteisön perustamista, lue ensin opas.