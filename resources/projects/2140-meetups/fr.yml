description: |
  Bienvenue sur 2140meetups, le point de rencontre où vous pouvez créer des communautés et programmer des meetups pour favoriser les rencontres physiques entre bitcoiners. Si vous cherchez une communauté près de chez vous, utilisez la carte ci-dessus ou cliquez ici. Si vous envisagez d'en créer une, lisez d'abord le guide.