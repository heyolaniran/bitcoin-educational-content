description: |
  2140मीटअप्स में आपका स्वागत है, यह वह मीटिंग पॉइंट है जहाँ आप समुदाय बना सकते हैं और बिटकॉइनर्स के बीच शारीरिक मुलाकातों को बढ़ावा देने के लिए मीटअप शेड्यूल कर सकते हैं। अगर आप अपने आस-पास कोई समुदाय ढूँढ रहे हैं, तो ऊपर दिए गए नक्शे का इस्तेमाल करें या यहाँ देखें। अगर आप कोई समुदाय शुरू करने की सोच रहे हैं, तो पहले गाइड पढ़ें।