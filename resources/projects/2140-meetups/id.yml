description: |
  Selamat datang di 2140meetups, titik pertemuan di mana Anda dapat membuat komunitas dan menjadwalkan pertemuan untuk meningkatkan pertemuan fisik antar pengguna bitcoin. Jika Anda mencari komunitas di dekat Anda, gunakan peta di atas atau periksa di sini. Jika Anda berpikir untuk memulai sebuah komunitas, bacalah panduan ini terlebih dahulu.