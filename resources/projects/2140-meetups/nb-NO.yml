description: |
  Velkommen til 2140meetups, møteplassen der du kan opprette fellesskap og planlegge møter for å øke fysiske møter mellom bitcoinere. Hvis du leter etter et fellesskap i nærheten av deg, kan du bruke kartet over eller sjekke her. Hvis du tenker på å starte et, bør du lese guiden først.