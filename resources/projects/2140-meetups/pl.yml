description: |
  Witamy w 2140meetups, miejscu spotkań, w którym można tworzyć społeczności i planować spotkania, aby zwiększyć liczbę fizycznych spotkań między bitcoinerami. Jeśli szukasz społeczności w pobliżu, skorzystaj z mapy powyżej lub sprawdź tutaj. Jeśli myślisz o założeniu społeczności, przeczytaj najpierw ten przewodnik.