description: |
  Добро пожаловать на 2140meetups, место встречи, где вы можете создавать сообщества и планировать встречи, чтобы увеличить количество физических встреч между биткойнерами. Если вы ищете сообщество рядом с вами, воспользуйтесь картой выше или посмотрите здесь. Если вы думаете о создании сообщества, прочитайте это руководство.