description: |
  Dobrodošli na 2140meetups, mesto susreta gde možete kreirati zajednice i zakazivati okupljanja kako biste podstakli fizičke susrete između bitkoinera. Ako tražite zajednicu u vašoj blizini, koristite mapu iznad ili proverite ovde. Ako razmišljate o pokretanju jedne, prvo pročitajte vodič.