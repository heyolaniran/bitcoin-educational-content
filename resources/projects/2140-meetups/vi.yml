description: |
  Chào mừng đến với 2140meetups, điểm gặp gỡ nơi bạn có thể tạo cộng đồng và lên lịch gặp gỡ để tăng cường các cuộc gặp gỡ thực tế giữa những người dùng bitcoin. Nếu bạn đang tìm kiếm một cộng đồng gần mình, hãy sử dụng bản đồ ở trên hoặc kiểm tra tại đây. Nếu bạn đang nghĩ đến việc bắt đầu một cộng đồng, hãy đọc hướng dẫn trước.