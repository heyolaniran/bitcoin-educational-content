description: |
  256 | HEAT یک شرکت است که در طراحی و ساخت راه‌حل‌های گرمایشی با استفاده از فناوری بازیابی حرارت از سخت‌افزار ASIC که در ارز دیجیتال Mining استفاده می‌شود، تخصص دارد. آن‌ها لوازم جانبی ارائه می‌دهند که به ماینرهای قدیمی و غیرسودآور ASIC اجازه می‌دهد تا در عرض 15 دقیقه به بخاری‌های قابل برنامه‌ریزی و سودآور تبدیل شوند. علاوه بر این، آن‌ها خدمات مشاوره‌ای برای پیاده‌سازی راه‌حل‌های گرمایشی بی‌صدا و کارآمد برای خانه‌ها و کسب‌وکارها ارائه می‌دهند که نیاز به فن‌های پر سر و صدا را از بین می‌برد. رویکرد نوآورانه آن‌ها از گرمای تولید شده توسط ارز دیجیتال Mining برای کاربردهای گرمایشی استفاده می‌کند و یک جایگزین مقرون‌به‌صرفه و پایدار برای گرم نگه‌داشتن فضاها ارائه می‌دهد.