description: |
  4NK Academy 是位於法國 Rouen 的領先教育計畫，致力於縮短 Bitcoin 與專業發展之間的差距。作為 Normandie Bitcoin 協會的運作中心，4NK Academy 專注於為個人在 Bitcoin 和分散式系統方面的職業生涯做好準備。我們的課程提供深入的技術知識，並針對現實世界的專業情境提供實際應用。
  
  我們引以為傲的是，我們擁有一個Bitcoin友好的共事空間，配有專門為比特幣使用者設計的圖書館，供他們學習、協作和創新。我們的使命不僅僅是教育，我們的目標是培養一個符合 Bitcoin 自由、隱私和開源原則的社群。
  
  4NK 學院透過教育課程、公開活動以及與產業領導者的合作，積極促進 Bitcoin 生態系統的成長。
  