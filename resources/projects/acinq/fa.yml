description: |
  تأسیس شده در سال 2014، ACINQ یک استارتاپ فرانسوی است که محصولات و خدماتی برای اکوسیستم Bitcoin می‌سازد. ما در پاریس، فرانسه مستقر هستیم.
  
  ما از سال 2015 به پروتکل Lightning کمک کرده و بر روی آن کار کرده‌ایم. پایه فناوری اصلی ما eclair است، یک پیاده‌سازی کامل از Lightning با تمرکز بر عملکرد و قابلیت اطمینان.
  
  ACINQ یک اپراتور اصلی و ارائه‌دهنده نقدینگی در Lightning Network است. ما بزرگترین نود در شبکه را اجرا می‌کنیم که در آن از تخصص خود در Lightning بهره می‌بریم.
  
  ما همچنین توسعه‌دهندگان Phoenix هستیم، یک Wallet Lightning Bitcoin پیشرفته و خود-امانی.