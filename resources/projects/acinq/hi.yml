description: |
  2014 में स्थापित, ACINQ एक फ्रांसीसी स्टार्टअप है जो Bitcoin पारिस्थितिकी तंत्र के लिए उत्पाद और सेवाएँ बनाता है। हम पेरिस, फ्रांस में स्थित हैं।
  
  हम 2015 से लाइटनिंग प्रोटोकॉल में योगदान दे रहे हैं और उसका निर्माण कर रहे हैं। हमारा मुख्य तकनीकी आधार एक्लेयर है, जो प्रदर्शन और विश्वसनीयता पर ध्यान देने के साथ लाइटनिंग का पूर्ण कार्यान्वयन है।
  
  ACINQ Lightning Network पर एक प्रमुख ऑपरेटर और लिक्विडिटी प्रदाता है। हम नेटवर्क पर सबसे बड़ा नोड चलाते हैं जहाँ हम लाइटनिंग की अपनी विशेषज्ञता का लाभ उठाते हैं।
  
  हम फीनिक्स के डेवलपर भी हैं, जो एक अत्याधुनिक सेल्फ-कस्टोडियल Bitcoin लाइटनिंग Wallet है।