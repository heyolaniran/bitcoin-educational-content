description: |
  Założony w 2014 roku ACINQ to francuski startup tworzący produkty i usługi dla ekosystemu Bitcoin. Nasza siedziba znajduje się w Paryżu, we Francji.
  
  Współtworzymy i rozwijamy protokół Lightning od 2015 roku. Naszym głównym fundamentem technologicznym jest eclair, pełna implementacja Lightning z naciskiem na wydajność i niezawodność.
  
  ACINQ jest głównym operatorem i dostawcą płynności na Lightning Network. Prowadzimy największy węzeł w sieci, w którym wykorzystujemy naszą wiedzę na temat Lightning.
  
  Jesteśmy również twórcami Phoenix, najnowocześniejszego samokontroli Bitcoin Lightning Wallet.