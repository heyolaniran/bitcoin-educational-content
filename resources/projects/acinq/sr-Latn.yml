description: |
  Osnovan 2014. godine, ACINQ je francuski startup koji razvija proizvode i usluge za ekosistem Bitcoin. Naše sedište je u Parizu, Francuska.
  
  Doprinosimo i gradimo na Lightning protokolu od 2015. Naša osnovna tehnološka baza je eclair, potpuna implementacija Lightning-a sa fokusom na performanse i pouzdanost.
  
  ACINQ je glavni operater i pružalac likvidnosti na Lightning Network. Vodimo najveći čvor na mreži gde koristimo naše stručne znanje o Lightning-u.
  
  Takođe smo i razvijači Phoenixa, naprednog samostalnog čuvara Bitcoin Lightning Wallet.