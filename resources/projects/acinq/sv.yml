description: |
  ACINQ grundades 2014 och är ett franskt startupföretag som bygger produkter och tjänster för Bitcoin-ekosystemet. Vi är baserade i Paris, Frankrike.
  
  Vi har bidragit till och byggt vidare på Lightning-protokollet sedan 2015. Vår tekniska grund är eclair, en fullständig implementering av Lightning med fokus på prestanda och tillförlitlighet.
  
  ACINQ är en stor operatör och likviditetsleverantör på Lightning Network. Vi driver den största noden i nätverket där vi utnyttjar vår expertis inom Lightning.
  
  Vi är också utvecklarna av Phoenix, en banbrytande självförvarande Bitcoin Lightning Wallet.