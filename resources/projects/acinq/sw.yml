description: |
  ACINQ iliyoanzishwa mwaka wa 2014, ni kampuni inayoanzisha bidhaa na huduma za ujenzi wa Ufaransa kwa mfumo ikolojia wa Bitcoin. Tunaishi Paris, Ufaransa.
  
  Tumekuwa tukichangia na kuendeleza itifaki ya Umeme tangu 2015. Msingi wetu mkuu wa kiteknolojia ni eclair, utekelezaji kamili wa Umeme unaozingatia utendakazi na kutegemewa.
  
  ACINQ ni mtoa huduma mkuu na mtoaji wa ukwasi kwenye Lightning Network. Tunaendesha nodi kubwa zaidi kwenye mtandao ambapo tunatumia ujuzi wetu wa Umeme.
  
  Sisi pia ni wasanidi wa Phoenix, kampuni ya kisasa inayojilinda ya Bitcoin Lightning Wallet.