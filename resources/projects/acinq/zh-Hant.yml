description: |
  ACINQ 成立於 2014 年，是一家為 Bitcoin 生態系統打造產品和服務的法國初創公司。我們的總部設在法國巴黎。
  
  自 2015 年以來，我們一直致力於 Lightning 協定的貢獻與建構。我們的核心技術基礎是 eclair，這是 Lightning 的完整實作，著重於效能和可靠性。
  
  ACINQ 是 Lightning Network 上的主要運營商和流通量提供商。我們運行著網絡上最大的節點，在這裡我們充分利用了我們在 Lightning 方面的專業知識。
  
  我們也是 Phoenix 的開發者，Phoenix 是最先進的自保管 Bitcoin Lightning Wallet。