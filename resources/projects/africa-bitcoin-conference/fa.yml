description: |
  ما یک جمعی از آفریقایی‌ها از مناطق مختلف قاره هستیم که با این باور متحد شده‌ایم که Bitcoin جهان را آزادتر می‌کند. ما در حال کار برای ترویج یک جنبش برای پذیرش آن در سراسر آفریقا هستیم. در مواجهه با دنیای مدرن که به سمت نظارت بیشتر و توتالیتاریسم گرایش دارد، Bitcoin برای ما یک ابزار حیاتی برای حفظ آزادی‌ها و حریم خصوصی‌مان است. ما آینده‌ای فناورانه را تصور می‌کنیم که در تضاد با دیدگاه‌های ارائه شده توسط GAFAM، هر کس فرصت دارد که به صورت آزادانه، مستقل و بدون سانسور در فضای سایبری ابراز وجود کند. ما از عدالت، برابری و بی‌طرفی که Bitcoin به مردم و افراد ارائه می‌دهد، حمایت می‌کنیم. با اعتقاد به نقش ضروری آن، ما متعهد به آینده‌ای هستیم که در آن هر شهروند جهان از دسترسی عادلانه به ارزی که از هر گونه دستکاری مصون است، برای خیر عمومی بهره‌مند شود.