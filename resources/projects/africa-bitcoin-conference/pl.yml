description: |
  Jesteśmy kolektywem Afrykańczyków z różnych regionów kontynentu, zjednoczonych przekonaniem, że Bitcoin czyni świat bardziej wolnym. Pracujemy nad promowaniem ruchu na rzecz jego przyjęcia w całej Afryce. W obliczu współczesnego świata skłaniającego się ku większej inwigilacji i totalitaryzmowi, Bitcoin stanowi dla nas kluczowe narzędzie do zachowania naszych wolności i prywatności. Wyobrażamy sobie technologiczną przyszłość, w której, w przeciwieństwie do perspektyw oferowanych przez GAFAM, każdy ma możliwość swobodnego, autonomicznego i pozbawionego cenzury wyrażania siebie w cyberprzestrzeni. Opowiadamy się za sprawiedliwością, równością i neutralnością, które Bitcoin zapewnia narodom i jednostkom. Przekonani o jego niezbędnej roli, jesteśmy zaangażowani w przyszłość, w której każdy obywatel świata cieszy się sprawiedliwym dostępem do waluty odpornej na wszelkie formy manipulacji, dla wspólnego dobra.
  