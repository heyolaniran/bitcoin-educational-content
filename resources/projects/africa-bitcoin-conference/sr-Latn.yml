description: |
  Mi smo kolektiv Afrikanaca iz različitih regiona kontinenta, ujedinjeni verovanjem da Bitcoin čini svet slobodnijim. Radimo na promociji pokreta za njegovo usvajanje širom Afrike. Suočeni sa modernim svetom koji teži ka većem nadzoru i totalitarizmu, Bitcoin za nas predstavlja ključni alat za očuvanje naših sloboda i privatnosti. Vizija nam je tehnološka budućnost u kojoj, za razliku od perspektiva koje nude GAFAM, svako ima priliku da se slobodno, autonomno i bez cenzure izrazi u sajber prostoru. Zalažemo se za pravdu, jednakost i neutralnost koje Bitcoin pruža narodima i pojedincima. Uvereni u njegovu nezamenljivu ulogu, posvećeni smo budućnosti u kojoj svaki građanin sveta uživa ravnopravan pristup valuti koja je imuna na bilo koji oblik manipulacije, za opšte dobro.