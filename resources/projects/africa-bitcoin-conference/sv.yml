description: |
  Vi är ett kollektiv av afrikaner från olika regioner på kontinenten, förenade av övertygelsen att Bitcoin gör världen friare. Vi arbetar för att främja en rörelse för dess antagande över hela Afrika. Inför en modern värld som lutar mot mer övervakning och totalitarism utgör Bitcoin för oss ett avgörande verktyg för att bevara vår frihet och integritet. Vi ser framför oss en teknisk framtid där, i motsats till de perspektiv som GAFAM erbjuder, alla har möjlighet att uttrycka sig fritt, självständigt och utan censur i cyberrymden. Vi förespråkar den rättvisa, jämlikhet och neutralitet som Bitcoin ger till folk och individer. Vi är övertygade om dess oumbärliga roll och engagerar oss för en framtid där alla världsmedborgare har rättvis tillgång till en valuta som är immun mot alla former av manipulation, för det allmännas bästa.
  