description: |
  Sisi ni mkusanyiko wa Waafrika kutoka kanda mbalimbali za bara hili, tukiwa tumeunganishwa na imani kwamba Bitcoin inafanya ulimwengu kuwa huru zaidi. Tunafanya kazi ili kukuza vuguvugu la kupitishwa kwake kote barani Afrika. Inakabiliwa na ulimwengu wa kisasa unaoegemea kwenye uangalizi zaidi na uimla, Bitcoin inawakilisha kwetu zana muhimu ya kuhifadhi uhuru na faragha yetu. Tunatazamia mustakabali wa kiteknolojia ambapo, tofauti na mitazamo inayotolewa na GAFAM, kila mtu ana fursa ya kujieleza kwa uhuru, uhuru, na bila udhibiti katika anga ya mtandao. Tunatetea haki, usawa, na kutoegemea upande wowote ambao Bitcoin hutoa kwa watu na watu binafsi. Tukiwa tumeshawishika na jukumu lake la lazima, tumejitolea kwa siku zijazo ambapo kila raia wa ulimwengu anafurahia ufikiaji sawa wa sarafu isiyoweza kuathiriwa na aina yoyote ya udanganyifu, kwa manufaa ya wote.
  