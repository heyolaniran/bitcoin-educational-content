description: |
  P2P Bitcoin و پلتفرم معاملاتی Monero. سریع، آسان، خصوصی، همتا به همتا. قدرت گرفته از مردم.
  
  ما یک بازار هستیم که در آن کاربران می‌توانند ارزهای دیجیتال را از یکدیگر خرید و فروش کنند. کاربران، که به عنوان معامله‌گران شناخته می‌شوند، تبلیغاتی با قیمت و روش پرداختی که می‌خواهند ارائه دهند، ایجاد می‌کنند.