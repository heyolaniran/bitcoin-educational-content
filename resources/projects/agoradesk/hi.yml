description: |
  P2P Bitcoin और मोनेरो ट्रेडिंग प्लेटफ़ॉर्म। तेज़, आसान, निजी, पीयर-टू-पीयर। लोगों द्वारा संचालित।
  
  हम एक ऐसा बाज़ार हैं जहाँ उपयोगकर्ता एक-दूसरे से क्रिप्टोकरेंसी खरीद और बेच सकते हैं। उपयोगकर्ता, जिन्हें व्यापारी के रूप में जाना जाता है, वे अपनी पसंद की कीमत और भुगतान विधि के साथ विज्ञापन बनाते हैं।
  