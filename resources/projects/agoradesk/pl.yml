description: |
  P2P Bitcoin i platforma handlowa Monero. Szybka, łatwa, prywatna, peer-to-peer. Zasilana przez ludzi.
  
  Jesteśmy rynkiem, na którym użytkownicy mogą kupować i sprzedawać kryptowaluty od siebie nawzajem. Użytkownicy, znani jako handlowcy, tworzą ogłoszenia z ceną i metodą płatności, którą chcą zaoferować.
  