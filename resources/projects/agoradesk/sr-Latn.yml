description: |
  P2P Bitcoin i Monero platforma za trgovanje. Brzo, lako, privatno, peer-to-peer. Pokreću je ljudi.
  
  Mi smo tržište gde korisnici mogu kupovati i prodavati kriptovalute jedni od drugih. Korisnici, poznati kao trgovci, kreiraju oglase sa cenom i načinom plaćanja koji žele da ponude.