description: |
  P2P Bitcoin och Monero handelsplattform. Snabb, enkel, privat, peer-to-peer. Drivs av folket.
  
  Vi är en marknadsplats där användare kan köpa och sälja kryptovalutor från varandra. Användare, så kallade handlare, skapar annonser med det pris och den betalningsmetod de vill erbjuda.
  