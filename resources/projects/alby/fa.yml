description: |
  البی مصرف‌کنندگان و توسعه‌دهندگان را با ابزارهای پرداخت Bitcoin که به‌راحتی قابل استفاده هستند، با استفاده از Lightning Network در همه جا: در وب، در اپلیکیشن‌های موبایل و دنیای واقعی، توانمند می‌سازد. با Alby Hub، کاربران یک Wallet لایتنینگ قدرتمند و خودنگهدار به دست می‌آورند که به‌راحتی به اپلیکیشن‌های مختلف متصل می‌شود. افزونه مرورگر Alby امکان تعامل روان با وب‌سایت‌ها را فراهم می‌کند و پرداخت‌ها و تأیید هویت را مستقیماً در مرورگر شما تسهیل می‌کند. برای کاربران موبایل، Alby Go یک Wallet کاربرپسند ارائه می‌دهد تا تراکنش‌ها را در حال حرکت مدیریت کنند. علاوه بر این، البی APIهایی را برای ادغام پرداخت‌های Bitcoin در هر اپلیکیشن و تعامل برنامه‌ریزی‌شده با کیف‌پول‌های لایتنینگ Bitcoin ارائه می‌دهد.