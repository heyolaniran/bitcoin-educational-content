description: |
  Alby 賦予消費者和開發人員使用 Lightning Network 的易用 Bitcoin 支付工具，無處不在：在網絡上在手機應用程式中在現實世界中。使用 Alby Hub，用戶可獲得一個功能強大、可自動保管的閃電 Wallet，毫不費力地連接到各種應用程式。Alby 瀏覽器擴充套件可讓您與網站順暢互動，直接在瀏覽器中便利付款和身份驗證。對於行動用戶，Alby Go 提供人性化的 Wallet，讓您隨時隨地管理交易。此外，Alby 提供 API，可將 Bitcoin 付款整合到任何應用程式中，並與 Bitcoin Lightning wallets 進行程式化互動。