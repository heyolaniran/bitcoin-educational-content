description: |
  امبوس یک پلتفرم است که داده‌ها، بینش‌ها و ابزارهای هماهنگی برای مدیریت کانال‌های Bitcoin Lightning Network ارائه می‌دهد.
  
  این پلتفرم عمدتاً از شایعات شبکه از نودهای لایتنینگ Bitcoin برای ارائه اطلاعات مرتبط استفاده می‌کند. همچنین شامل یک API برای انجام عملیات، به همراه ماگما، یک بازار نقدینگی اختصاصی است. با بینش‌های مبتنی بر داده‌های Commitment، امبوس یک راه‌حل جامع برای مدیریت کارآمد و آگاهانه Lightning Network ارائه می‌دهد.