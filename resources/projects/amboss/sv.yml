description: |
  Amboss är en plattform som erbjuder data, insikter och samordningsverktyg för att hantera Bitcoin Lightning Network-kanaler.
  
  Den använder främst nätverksskvaller från Bitcoin Lightning-noder för att tillhandahålla relevant information. Plattformen innehåller också ett API för att utföra operationer, tillsammans med Magma, en dedikerad likviditetsmarknadsplats. Med sin Commitment till datadrivna insikter tillhandahåller Amboss en omfattande lösning för effektiv och informerad Lightning Network-hantering.