description: |
  Amboss ni jukwaa linalotoa data, maarifa, na zana za uratibu za kudhibiti vituo vya Bitcoin Lightning Network.
  
  Kimsingi hutumia porojo za mtandao kutoka kwa nodi za Umeme za Bitcoin ili kutoa taarifa muhimu. Jukwaa pia linajumuisha API ya kufanya shughuli, kando ya Magma, soko lililojitolea la ukwasi. Kwa maarifa yake ya Commitment hadi data inayoendeshwa, Amboss hutoa suluhisho la kina kwa usimamizi bora na wenye maarifa wa Lightning Network.