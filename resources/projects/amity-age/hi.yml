description: |
  एमिटीएज होंडुरास के रोआटन द्वीप पर एक शैक्षणिक पहल है, जो प्रोस्पेरा के विशेष आर्थिक क्षेत्र में स्थित है। वे एक Bitcoin केंद्र संचालित करते हैं जो एक सहकर्मी स्थान, कॉफी शॉप और रेस्तरां के रूप में भी काम करता है, जो Bitcoin सीखने के लिए किताबें और हार्डवेयर जैसे संसाधन प्रदान करता है। मुद्रा रूपांतरण के लिए उनके पास द्वीप का पहला Bitcoin ATM भी है। उनकी टीम स्थानीय स्कूलों में Mi Primer Bitcoin पाठ्यक्रम पढ़ाती है, जो पैराग्वे में Bitcoin Mining के साथ उनके संचालन का समर्थन करती है। एमिटीएज द्वीप भ्रमण भी प्रदान करता है और शिक्षकों को प्रशिक्षित करने के लिए Bitcoin शिक्षक कार्यक्रम चलाता है।