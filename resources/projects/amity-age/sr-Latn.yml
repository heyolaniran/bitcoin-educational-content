description: |
  AmityAge je obrazovna inicijativa na ostrvu Roatan, Honduras, smeštena unutar specijalne ekonomske zone Prospera. Oni upravljaju Bitcoin centrom koji služi i kao coworking prostor, kafić i restoran, pružajući resurse poput knjiga i hardvera za Bitcoin učenje. Takođe imaju prvi Bitcoin bankomat na ostrvu za konverziju valuta. Njihov tim predaje Mi Primer Bitcoin kurikulum u lokalnim školama, podržavajući svoje operacije sa Bitcoin Mining u Paragvaju. AmityAge takođe nudi ture po ostrvu i vodi Bitcoin program za edukatore za obuku nastavnika.