description: |
  Banxaas est une plateforme permettant de troquer instantanément des FCFA contre des SATS (BTC), et vice versa, de manière sécurisée. Elle utilise les paiements Lightning et Mobile Money pour assurer des transactions rapides et fiables. Banxaas est une solution développée par Yité Technologies, une start-up Bitcoin basée au Sénégal.