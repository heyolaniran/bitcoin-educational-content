description: |
  Banxaas adalah platform yang aman untuk menukar FCFA dengan Sats (BTC) secara instan, dan sebaliknya. Platform ini menggunakan pembayaran Lightning dan Mobile Money untuk memastikan transaksi yang cepat dan andal. Banxaas adalah solusi yang dikembangkan oleh Yité Technologies, perusahaan rintisan Bitcoin yang berbasis di Senegal.