description: |
  Banxaas är en säker plattform för omedelbar växling av FCFA till Sats (BTC) och vice versa. Den använder Lightning- och Mobile Money-betalningar för att säkerställa snabba och tillförlitliga transaktioner. Banxaas är en lösning som utvecklats av Yité Technologies, ett Bitcoin-startup baserat i Senegal.