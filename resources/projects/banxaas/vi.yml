description: |
  Banxaas là một nền tảng an toàn để trao đổi FCFA ngay lập tức lấy Sats (BTC) và ngược lại. Nền tảng này sử dụng thanh toán Lightning và Mobile Money để đảm bảo giao dịch nhanh chóng và đáng tin cậy. Banxaas là giải pháp do Yité Technologies, một công ty khởi nghiệp Bitcoin có trụ sở tại Senegal, phát triển.