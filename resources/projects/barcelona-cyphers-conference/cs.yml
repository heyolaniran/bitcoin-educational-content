description: |
  Cílem BCC8333 je vytvořit každoroční setkání, které by spojilo vývojáře open source, stavitele a bojovníky za svobodu, aby spolupracovali a hledali řešení svých nejnaléhavějších problémů. Usilujeme o to, abychom jednotlivcům poskytli nástroje, zdroje a znalosti potřebné k překonání překážek při vytváření dostupných, bezpečných a soukromí respektujících technologií.
  