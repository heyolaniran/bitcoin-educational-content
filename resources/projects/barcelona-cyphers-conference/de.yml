description: |
  BCC8333 hat sich zum Ziel gesetzt, ein jährliches Treffen zu veranstalten, um Open-Source-Entwickler, -Erbauer und -Freiheitskämpfer zu vereinen, damit sie zusammenarbeiten und Lösungen für ihre dringendsten Herausforderungen finden können. Wir sind bestrebt, Menschen mit den Werkzeugen, Ressourcen und dem Wissen auszustatten, die sie benötigen, um Hindernisse bei der Entwicklung zugänglicher, sicherer und die Privatsphäre achtender Technologien zu überwinden.
  