description: |
  BCC8333 pretende crear un encuentro anual que reúna a desarrolladores de código abierto, constructores y luchadores por la libertad para colaborar y encontrar soluciones a sus retos más acuciantes. Nos esforzamos por dotar a las personas de las herramientas, los recursos y los conocimientos necesarios para superar los obstáculos en la creación de tecnologías accesibles, seguras y respetuosas con la privacidad.
  