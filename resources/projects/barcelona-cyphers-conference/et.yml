description: |
  BCC8333 eesmärk on luua iga-aastane kokkutulek, mis ühendab avatud lähtekoodiga arendajad, ehitajad ja vabadusvõitlejad, et teha koostööd ja leida lahendusi kõige pakilisematele probleemidele. Meie eesmärk on anda inimestele vahendid, ressursid ja teadmised, mis on vajalikud, et ületada takistused juurdepääsetavate, turvaliste ja eraelu puutumatust austavate tehnoloogiate loomisel.
  