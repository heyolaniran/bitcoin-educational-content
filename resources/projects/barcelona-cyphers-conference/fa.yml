description: |
  BCC8333 هدف دارد یک گردهمایی سالانه ایجاد کند تا توسعه‌دهندگان منبع‌باز، سازندگان و مبارزان آزادی را برای همکاری و یافتن راه‌حل‌هایی برای چالش‌های فوری‌شان متحد کند. ما تلاش می‌کنیم افراد را با ابزارها، منابع و دانش لازم برای غلبه بر موانع در ساخت فناوری‌های قابل‌دسترس، امن و احترام‌گذار به حریم خصوصی توانمند سازیم.