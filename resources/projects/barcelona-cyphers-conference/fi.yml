description: |
  BCC8333:n tavoitteena on luoda vuosittainen kokoontuminen, joka yhdistää avoimen lähdekoodin kehittäjät, rakentajat ja vapaustaistelijat tekemään yhteistyötä ja löytämään ratkaisuja kiireellisimpiin haasteisiinsa. Pyrimme antamaan yksilöille työkaluja, resursseja ja tietoa, joita tarvitaan esteiden voittamiseen esteettömän, turvallisen ja yksityisyyttä kunnioittavan teknologian rakentamisessa.
  