description: |
  BCC8333 vise à créer un rassemblement annuel pour réunir les développeurs de logiciels libres, les constructeurs et les combattants de la liberté afin de collaborer et de trouver des solutions à leurs défis les plus pressants. Nous nous efforçons de donner aux individus les outils, les ressources et les connaissances nécessaires pour surmonter les obstacles à la construction de technologies accessibles, sécurisées et respectueuses de la vie privée.
  