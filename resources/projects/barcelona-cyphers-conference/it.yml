description: |
  BCC8333 si propone di creare un incontro annuale per unire sviluppatori open-source, costruttori e combattenti per la libertà per collaborare e trovare soluzioni alle loro sfide più urgenti. Ci sforziamo di fornire alle persone gli strumenti, le risorse e le conoscenze necessarie per superare gli ostacoli nella costruzione di tecnologie accessibili, sicure e rispettose della privacy.
  