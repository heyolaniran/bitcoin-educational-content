description: |
  BCC8333 har som mål å skape en årlig samling for å forene open source-utviklere, byggere og frihetskjempere for å samarbeide og finne løsninger på deres mest presserende utfordringer. Vi ønsker å gi enkeltpersoner verktøyene, ressursene og kunnskapen de trenger for å overvinne hindringer i arbeidet med å bygge tilgjengelig, sikker og personvernvennlig teknologi.
  