description: |
  BCC8333 ma na celu stworzenie corocznego spotkania, aby zjednoczyć programistów open source, konstruktorów i bojowników o wolność w celu współpracy i znalezienia rozwiązań dla ich najpilniejszych wyzwań. Dążymy do wzmocnienia pozycji osób posiadających narzędzia, zasoby i wiedzę potrzebne do pokonywania przeszkód w tworzeniu dostępnych, bezpiecznych i szanujących prywatność technologii.
  