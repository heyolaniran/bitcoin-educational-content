description: |
  O BCC8333 tem como objetivo criar um encontro anual para unir programadores de código aberto, construtores e lutadores pela liberdade para colaborar e encontrar soluções para os seus desafios mais prementes. Esforçamo-nos por capacitar os indivíduos com as ferramentas, recursos e conhecimentos necessários para ultrapassar obstáculos na construção de tecnologias acessíveis, seguras e que respeitem a privacidade.
  