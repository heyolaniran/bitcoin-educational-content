description: |
  Цель BCC8333 - создать ежегодную встречу, объединяющую разработчиков, строителей и борцов за свободу с открытым исходным кодом для сотрудничества и поиска решений самых насущных проблем. Мы стремимся предоставить людям инструменты, ресурсы и знания, необходимые для преодоления препятствий в создании доступных, безопасных и уважающих частную жизнь технологий.
  