description: |
  BCC8333 ima za cilj da stvori godišnje okupljanje kako bi ujedinila open-source developere, graditelje i borce za slobodu radi saradnje i pronalaženja rešenja za njihove najhitnije izazove. Težimo da osnažimo pojedince alatima, resursima i znanjem potrebnim za prevazilaženje prepreka u izgradnji pristupačnih, sigurnih i tehnologija koje poštuju privatnost.