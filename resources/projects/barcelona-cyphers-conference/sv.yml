description: |
  BCC8333 syftar till att skapa en årlig sammankomst för att förena open source-utvecklare, byggare och frihetskämpar för att samarbeta och hitta lösningar på sina mest angelägna utmaningar. Vi strävar efter att ge individer de verktyg, resurser och kunskaper som behövs för att övervinna hinder när det gäller att bygga tillgänglig, säker och integritetsrespektande teknik.
  