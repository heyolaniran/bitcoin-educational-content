description: |
  Base58🔓 یک مدرسه پروتکل Bitcoin است. دوره‌های آنلاین و حضوری ما نقطه شروع مناسبی برای مبتدیان فنی است که به دنبال کشف سطحی هستند و حتی برای توسعه‌دهندگان با تجربه‌ای که به دنبال به چالش کشیدن خود با یک شیرجه عمیق به داخل پروتکل Bitcoin هستند. هر جایی که در سفر خود به سمت جنبه فنی Bitcoin باشید، ما اینجا هستیم تا شما را ارتقا دهیم.