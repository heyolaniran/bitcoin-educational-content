description: |
  Base58🔓 je škola protokola Bitcoin. Naši online i kursevi uživo su savršeno polazište za tehničke početnike koji žele da zagrebu površinu, pa sve do najiskusnijih programera koji žele da se izazovu dubokim zaronjavanjem u sam Bitcoin protokol. Gde god da se nalazite na svom putu u tehničku stranu Bitcoin, tu smo da vas podignemo na viši nivo.