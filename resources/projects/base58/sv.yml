description: |
  Base58🔓 är en skola för Bitcoin-protokollet. Våra online- och personkurser är den perfekta startplatsen för tekniska nybörjare som vill skrapa på ytan till och med de mest erfarna utvecklarna som vill utmana sig själva med ett djupdyk i själva Bitcoin-protokollet. Oavsett var du befinner dig på din resa in i den tekniska sidan av Bitcoin, är vi här för att höja din nivå.