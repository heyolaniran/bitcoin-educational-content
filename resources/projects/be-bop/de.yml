description: |
  be-BOP ist eine All-in-One-Lösung für den Verkauf, das Sammeln und die Verwaltung von Zahlungen. Es bietet E-Commerce, Checkout, Spenden, Abonnements, Crowdfunding, Ticketing und freie Preisgestaltung und unterstützt Bitcoin, Karten, Überweisungen und Bargeld, mit integrierten Buchhaltungstools.