description: |
  be-BOP on kokonaisratkaisu maksujen myyntiin, keräämiseen ja hallintaan. Se tarjoaa sähköisen kaupankäynnin, kassan, lahjoitukset, tilaukset, joukkorahoituksen, lipunmyynnin ja ilmaisen hinnoittelun, ja se tukee Bitcoin:ta, kortteja, tilisiirtoja ja käteistä sekä integroituja kirjanpitotyökaluja.