description: |
  be-BOP adalah solusi lengkap untuk menjual, mengumpulkan, dan mengelola pembayaran. Solusi ini menawarkan e-commerce, checkout, donasi, langganan, crowdfunding, tiket, dan harga gratis, serta mendukung Bitcoin, kartu, transfer, dan uang tunai, dengan alat bantu akuntansi yang terintegrasi.