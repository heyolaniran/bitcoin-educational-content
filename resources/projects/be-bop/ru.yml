description: |
  be-BOP - это универсальное решение для продажи, сбора и управления платежами. Оно предлагает электронную коммерцию, кассу, пожертвования, подписку, краудфандинг, продажу билетов и бесплатное ценообразование, поддерживает Bitcoin, карты, переводы и наличные, а также интегрированные инструменты учета.