description: |
  be-BOP är en allt-i-ett-lösning för att sälja, samla in och hantera betalningar. Den erbjuder e-handel, kassa, donationer, prenumerationer, crowdfunding, biljettförsäljning och fri prissättning, och stöder Bitcoin, kort, överföringar och kontanter, med integrerade redovisningsverktyg.