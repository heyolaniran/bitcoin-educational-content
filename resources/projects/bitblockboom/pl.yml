description: |
  BitBlockBoom! to konferencja poświęcona Bitcoin. Mówiąc prościej, ta konferencja jest przeznaczona tylko dla osób zainteresowanych Bitcoin. Wśród uczestników znajdują się zarówno osoby bardzo znane i mocno zaangażowane w Bitcoin, jak i osoby, które dopiero próbują dowiedzieć się, o co chodzi w Bitcoin. Nie znajdziesz nikogo, kto sprzedaje shitcoiny lub NFT. To jest prawdziwa konferencja Bitcoin. BitBlockBoom stworzył wspaniałą atmosferę do spotkań i dyskusji na temat Bitcoin z prelegentami i innymi bitcoinerami.