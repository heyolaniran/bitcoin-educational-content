description: |
  BitBlockBoom! je Bitcoin konferencija. Da pojednostavimo, ova konferencija je samo za ljude koji su zainteresovani za Bitcoin. Učesnici variraju od ljudi koji su veoma poznati i duboko uključeni u Bitcoin, do onih koji tek pokušavaju da saznaju o čemu se radi u Bitcoin. Nećete naći nikoga ko promoviše shitcoin-e ili NFT-ove. Ovo je Prava Bitcoin Konferencija. BitBlockBoom je stvorio divnu atmosferu za upoznavanje i diskusiju o Bitcoin sa govornicima i drugim bitkoin entuzijastima.