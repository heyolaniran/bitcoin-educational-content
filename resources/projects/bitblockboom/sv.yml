description: |
  BitBlockBoom! är en Bitcoin-konferens. För att uttrycka det enkelt är den här konferensen endast för personer som är intresserade av Bitcoin. Deltagarna sträcker sig från människor som är mycket kända och starkt involverade i Bitcoin, till människor som bara försöker lära sig vad Bitcoin handlar om. Du hittar ingen som shilling shitcoins eller NFT. Detta är en sann Bitcoin-konferens. BitBlockBoom har skapat en underbar atmosfär för att träffa och diskutera Bitcoin med talarna och andra bitcoiners.