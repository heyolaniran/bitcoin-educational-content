description: |
  Začalo to v roce 21 dvouhodinovým setkáním 35 neohrožených anonů z Bitcoin Twitter, včetně improvizovaného workshopu a kvízu Lightning, které se v letech 22 a 23 rozrostlo na tříhodinovou vyprodanou akci se 100 bitcoinery včetně 11 kolegů, kteří laskavě dělali workshopy/přednášky. Nejsme konference, kde jsou řečníci předem rezervováni. Bitcoináři si rezervují účast na Retreat a my odtud získáváme veškeré přednášky a aktivity, protože jsme požehnáni tím, že jsme obklopeni vrstevníky se schopnostmi, o které se můžeme podělit.
  