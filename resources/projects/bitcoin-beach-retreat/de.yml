description: |
  Wir begannen '21 mit einem Treffen von 35 unerschrockenen Anons von Bitcoin Twitter und einem improvisierten Lightning-Workshop und Quiz und wuchsen '22 und '23 zu einer ausverkauften Veranstaltung mit 100 Bitcoinern, darunter 11 Kollegen, die freundlicherweise Workshops/Vorträge hielten. Wir sind keine Konferenz, bei der die Redner im Voraus gebucht werden. Bitcoiner melden sich für den Retreat an und wir suchen uns alle Vorträge und Aktivitäten von dort aus, da wir gesegnet sind, von Gleichgesinnten umgeben zu sein, die ihre Fähigkeiten teilen können.
  