description: |
  Comenzó en el 21 con una reunión de dos noches de 35 intrépidos anons de Bitcoin Twitter, incluyendo un taller improvisado de Lightning y un concurso, y creció en el 22 y 23 hasta convertirse en un evento de tres noches con entradas agotadas, con 100 Bitcoiners, incluyendo 11 compañeros que amablemente realizaron talleres/charlas. No somos una conferencia en la que los ponentes se reservan con antelación. Los Bitcoiners se inscriben en el Retiro y a partir de ahí organizamos las charlas y actividades, ya que tenemos la suerte de estar rodeados de compañeros con habilidades que compartir.
  