description: |
  Alates '21 kahe öö kogunemine 35 kartmatu anons alates Bitcoin Twitter ja sealhulgas improviseeritud Lightning töötuba & viktoriin, kasvav '22 & '23 arvesse kolme öö väljamüüdud sündmus 100 Bitcoiners sealhulgas 11 eakaaslased lahkelt teha töötoad / loengud. Me ei ole konverents, kus kõnelejad on broneeritud ette. Bitcoiners broneerida peale Retreat ja me crowdsource tahes kõnelusi & tegevusi sealt, sest me oleme õnnistatud, et ümbritsetud eakaaslased oskusi jagada.
  