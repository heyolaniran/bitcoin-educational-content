description: |
  شروع در سال ’21 با یک گردهمایی دو شبه از 35 ناشناس جسور از توییتر Bitcoin و شامل یک کارگاه و مسابقه بداهه Lightning، رشد در سال‌های ’22 و ’23 به یک رویداد سه شبه که به طور کامل فروخته شد با حضور 100 بیت‌کوینر از جمله 11 همکار که به لطف آن‌ها کارگاه‌ها و سخنرانی‌هایی برگزار شد. ما یک کنفرانس نیستیم که سخنرانان از قبل رزرو شوند. بیت‌کوینرها برای Retreat ثبت‌نام می‌کنند و ما هرگونه سخنرانی و فعالیت را از آنجا به صورت جمع‌سپاری انجام می‌دهیم زیرا خوشبختانه در میان همکارانی با مهارت‌های قابل اشتراک‌گذاری قرار داریم.