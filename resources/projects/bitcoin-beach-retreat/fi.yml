description: |
  Alkaen vuonna '21 kahden yön kokoontuminen 35 intrepid anons Bitcoin Twitter ja myös improvisoitu Lightning työpaja & tietokilpailu, kasvava vuonna '22 & '23 kolmen yön loppuunmyyty tapahtuma 100 Bitcoiners mukaan lukien 11 vertaiset ystävällisesti tehdä työpajoja / puheita. Emme ole konferenssi, jossa puhujat varataan etukäteen. Bitcoiners varata päälle Retreat ja me crowdsource kaikki puheet & toimintaa sieltä, koska olemme siunattuja ympäröivät vertaiset taitoja jakaa.
  