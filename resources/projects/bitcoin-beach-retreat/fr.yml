description: |
  Nous avons commencé en 21 avec un rassemblement de deux nuits de 35 anons intrépides de Bitcoin Twitter et incluant un atelier et un quiz Lightning impromptu, puis nous nous sommes développés en 22 et 23 pour devenir un événement de trois nuits à guichets fermés avec 100 bitcoiners, dont 11 pairs qui ont gentiment fait des ateliers/conférences. Nous ne sommes pas une conférence où les orateurs sont réservés à l'avance. Les bitcoiners s'inscrivent à la Retraite et nous organisons des conférences et des activités à partir de là, car nous avons la chance d'être entourés de pairs qui ont des compétences à partager.
  