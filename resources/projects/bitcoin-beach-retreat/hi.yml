description: |
  21 में Bitcoin Twitter के 35 निडर अज्ञात लोगों की दो रातों की सभा और एक अचानक लाइटनिंग कार्यशाला और क्विज़ के साथ शुरू हुआ, 22 और 23 में तीन रातों के बिक चुके कार्यक्रम में बदल गया जिसमें 100 बिटकॉइनर्स शामिल थे, जिसमें 11 सहकर्मी कार्यशाला/वार्ता कर रहे थे। हम कोई ऐसा सम्मेलन नहीं हैं जहाँ वक्ताओं को पहले से बुक किया जाता है। बिटकॉइनर्स रिट्रीट पर बुकिंग करते हैं और हम वहाँ से किसी भी वार्ता और गतिविधियों को क्राउडसोर्स करते हैं क्योंकि हम साझा करने के लिए कौशल वाले साथियों से घिरे होने के लिए धन्य हैं।