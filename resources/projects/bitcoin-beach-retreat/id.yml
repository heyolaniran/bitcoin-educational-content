description: |
  Dimulai pada tahun '21 dengan pertemuan dua malam dengan 35 orang pemberani dari Twitter Bitcoin dan termasuk lokakarya & kuis Lightning dadakan, berkembang pada tahun '22 & '23 menjadi acara tiga malam yang terjual habis dengan 100 Bitcoiners termasuk 11 rekan-rekan yang dengan baik hati mengadakan lokakarya/berbicara. Kami bukanlah konferensi yang pembicaranya sudah dipesan terlebih dahulu. Para Bitcoiners mendaftar ke Retreat dan kami melakukan crowdsource untuk setiap pembicaraan & kegiatan dari sana karena kami diberkati dengan dikelilingi oleh rekan-rekan yang memiliki keahlian untuk berbagi.
  