description: |
  Iniziando nel '21 con un raduno di due notti di 35 intrepidi anons di Bitcoin Twitter e includendo un workshop e un quiz improvvisato di Lightning, siamo cresciuti nel '22 e nel '23 fino a diventare un evento di tre notti con 100 Bitcoiners, tra cui 11 coetanei che hanno gentilmente tenuto workshop/talk. Non siamo una conferenza in cui i relatori vengono prenotati in anticipo. I Bitcoiners si prenotano per il Ritiro e da lì attingiamo a tutti gli interventi e le attività, poiché abbiamo la fortuna di essere circondati da coetanei con competenze da condividere.
  