description: |
  Det startet i '21 med en to-kvelds samling av 35 uredde anons fra Bitcoin Twitter og inkluderte en improvisert Lightning-workshop og quiz, og vokste i '22 og '23 til et tre kvelders utsolgt arrangement med 100 Bitcoinere, inkludert 11 jevnaldrende som vennlig holdt workshops / foredrag. Vi er ikke en konferanse der foredragsholdere er booket på forhånd. Bitcoiners booker seg inn på Retreat, og vi crowdsourcer alle samtaler og aktiviteter derfra, da vi er velsignet med å være omgitt av jevnaldrende med ferdigheter å dele.
  