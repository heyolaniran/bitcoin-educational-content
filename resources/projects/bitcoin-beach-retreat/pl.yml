description: |
  Począwszy od '21 z dwudniowym spotkaniem 35 nieustraszonych anonów z Bitcoin Twitter, w tym improwizowanymi warsztatami i quizem Lightning, w '22 i '23 przerodziło się w trzydniowe wyprzedane wydarzenie z udziałem 100 Bitcoinerów, w tym 11 rówieśników, którzy uprzejmie prowadzili warsztaty / wykłady. Nie jesteśmy konferencją, na której prelegenci są rezerwowani z wyprzedzeniem. Bitcoiners rezerwują udział w Retreat i stamtąd zlecamy wszelkie rozmowy i działania, ponieważ jesteśmy błogosławieni, że otaczają nas rówieśnicy z umiejętnościami, którymi możemy się podzielić.
  