description: |
  Começando em '21 com um encontro de duas noites de 35 intrépidos anónimos do Twitter do Bitcoin e incluindo um workshop e quiz improvisado do Lightning, crescendo em '22 e '23 para um evento de três noites esgotado com 100 Bitcoiners, incluindo 11 pares que gentilmente fizeram workshops/palestras. Não somos uma conferência onde os oradores são reservados com antecedência. Os Bitcoiners inscrevem-se no Retiro e nós fazemos o crowdsource de todas as palestras e actividades a partir daí, pois somos abençoados por estarmos rodeados de pares com competências para partilhar.
  