description: |
  Начавшись в 21-м году с двух ночных встреч 35 бесстрашных анонов из Bitcoin Twitter и включая импровизированный семинар и викторину по Lightning, в 22-м и 23-м годах мы превратились в трехночное мероприятие с 100 биткойнерами, включая 11 коллег, любезно проводящих семинары/беседы. Мы не являемся конференцией, где спикеры бронируются заранее. Биткойнеры записываются на ретрит, и мы краудсорсим любые выступления и мероприятия оттуда, поскольку мы благословлены тем, что нас окружают равные, обладающие навыками, которыми можно поделиться.
  