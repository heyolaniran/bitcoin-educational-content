description: |
  Počevši ’21 sa dvodnevnim okupljanjem 35 hrabrih anonimaca sa Bitcoin Twittera, uključujući improvizovanu Lightning radionicu i kviz, događaj je rastao ’22 i ’23 u trodnevni rasprodat događaj sa 100 Bitcoinera, uključujući 11 vršnjaka koji su ljubazno držali radionice/predavanja. Mi nismo konferencija gde se govornici unapred angažuju. Bitcoineri se prijavljuju na Retreat i mi prikupljamo predloge za predavanja i aktivnosti odatle, jer smo blagosloveni što smo okruženi vršnjacima sa veštinama koje mogu da podele.