description: |
  Det började '21 med en tvåkvällssamling med 35 orädda anons från Bitcoin Twitter och inkluderade en improviserad Lightning-workshop och frågesport, och växte '22 & '23 till ett utsålt evenemang på tre nätter med 100 Bitcoiners inklusive 11 kamrater som vänligen gör workshops / samtal. Vi är inte en konferens där talare bokas i förväg. Bitcoiners bokar på Retreat och vi crowdsource alla samtal och aktiviteter därifrån eftersom vi är välsignade att vara omgivna av kamrater med färdigheter att dela.
  