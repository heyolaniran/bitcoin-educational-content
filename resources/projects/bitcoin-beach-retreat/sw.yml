description: |
  Kuanzia mwaka wa 21 na mkusanyiko wa usiku wa watu 35 wasio na ujasiri kutoka kwa Bitcoin Twitter na ikijumuisha warsha ya Radi na chemsha bongo, iliyokua mnamo '22 & '23 hadi tukio lililouzwa la usiku tatu na Bitcoiners 100 wakiwemo wenzao 11 wakifanya warsha/mazungumzo kwa fadhili. Sisi si mkutano ambapo wasemaji huwekwa mapema. Wanabiashara wa Bitcoin wanajiandikisha kwenye Retreat na tunakusanya mazungumzo na shughuli zozote kutoka hapo kwani tumebarikiwa kuzungukwa na wenzao walio na ujuzi wa kushiriki.
  