description: |
  Bắt đầu vào năm 21 với cuộc tụ họp kéo dài hai đêm của 35 ẩn danh gan dạ từ Bitcoin Twitter và bao gồm một hội thảo & câu đố Lightning ngẫu hứng, phát triển vào năm 22 và 23 thành một sự kiện cháy vé kéo dài ba đêm với 100 người dùng Bitcoin bao gồm 11 đồng nghiệp vui vẻ tổ chức hội thảo/bài nói chuyện. Chúng tôi không phải là một hội nghị nơi các diễn giả được đặt chỗ trước. Những người dùng Bitcoin đặt chỗ cho Retreat và chúng tôi huy động cộng đồng cho bất kỳ cuộc nói chuyện & hoạt động nào từ đó vì chúng tôi rất may mắn khi được bao quanh bởi những người đồng nghiệp có kỹ năng để chia sẻ.
  