description: |
  Bitcoin Bénin جامعه بیت‌کوینرهای بنین است. این جامعه محلی را گرد هم می‌آورد اما در تلاش است تا به مخاطبان بسیار گسترده‌تری دست یابد.
  
  به ابتکار اعضای فعال جامعه محلی، آلفونس - لوئیک و سماد، Bitcoin Bénin تلاش می‌کند تا جمعیت محلی را در تمام جنبه‌های Bitcoin از طریق ملاقات‌های ماهانه Bitcoin، جلسات ویژه پیرامون موضوعات Bitcoin، مدرسه Bitcoin و بسیاری فعالیت‌های ویژه دیگر که آموزش خوب Bitcoin را تقویت می‌کنند، آموزش دهد.
  
  ما از طریق واتساپ، تلگرام، شبکه‌ها و ملاقات‌ها جامعه‌ای در حال رشد داریم و در حال کار بر روی توسعه برنامه‌هایی هستیم که نیازهای کل جامعه را برآورده کند.