description: |
  Bitcoin Bénin to społeczność Bitcoiners w Beninie. Skupia lokalną społeczność, ale pracuje nad dotarciem do znacznie szerszego grona odbiorców.
  
  Zainicjowany przez aktywnych członków lokalnej społeczności, Alphonse'a - Loïca i Samada, Bitcoin Bénin działa na rzecz edukacji lokalnej społeczności we wszystkich aspektach Bitcoin poprzez comiesięczne spotkania Bitcoin, specjalne sesje dotyczące tematów Bitcoin, La Bitcoin School i wiele innych specjalnych działań, które wzmacniają dobrą edukację Bitcoin.
  
  Mamy rosnącą społeczność za pośrednictwem WhatsApp, telegramu, sieci i Meetupów i pracujemy nad opracowaniem programów, które zaspokoją potrzeby całej społeczności.