description: |
  Bitcoin Bénin je zajednica Bitkoinera u Beninu. Okuplja lokalnu zajednicu, ali radi na tome da dosegne mnogo širu publiku.
  
  Pokrenuta od strane aktivnih članova lokalne zajednice, Alphonse - Loïc & Samad, Bitcoin Bénin radi na edukaciji lokalnog stanovništva o svim aspektima Bitcoin kroz mesečne Bitcoin susrete, specijalne sesije oko Bitcoin tema, La Bitcoin školu i mnoge druge specijalne aktivnosti koje jačaju dobro Bitcoin obrazovanje.
  
  Imamo rastuću zajednicu putem WhatsApp-a, telegrama, mreža i susreta i radimo na razvoju programa koji zadovoljavaju potrebe cele zajednice.