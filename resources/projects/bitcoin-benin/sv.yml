description: |
  Bitcoin Bénin är Benins community av Bitcoiners. Den sammanför det lokala samhället men arbetar för att nå en mycket bredare publik.
  
  Initierat av aktiva medlemmar i det lokala samhället, Alphonse - Loïc & Samad, arbetar Bitcoin Bénin för att utbilda lokalbefolkningen om alla aspekter av Bitcoin genom månatliga Bitcoin Meetups, speciella sessioner kring Bitcoin-ämnen, La Bitcoin School och många andra speciella aktiviteter som förstärker god Bitcoin-utbildning.
  
  Vi har en växande gemenskap genom WhatsApp, telegram, nätverk och Meetups och arbetar för att utveckla program som tillgodoser hela samhällets behov.