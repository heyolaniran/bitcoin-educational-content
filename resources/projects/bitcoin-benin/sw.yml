description: |
  Bitcoin Bénin ni jumuiya ya Benin ya Bitcoiners. Inaleta pamoja jumuiya ya ndani lakini inafanya kazi ili kufikia hadhira pana zaidi.
  
  Imeanzishwa na wanajumuiya hai, Alphonse - Loïc & Samad, Bitcoin Bénin hufanya kazi ya kuelimisha wakazi wa eneo hilo kuhusu vipengele vyote vya Bitcoin kupitia Mikutano ya kila mwezi ya Bitcoin, vipindi maalum kuhusu mada za Bitcoin, Shule ya La Bitcoin na shughuli nyingine nyingi maalum zinazoimarisha elimu bora ya Bitcoin.
  
  Tuna jumuiya inayokua kupitia WhatsApp, telegramu, mitandao na Meetups na tunajitahidi kuendeleza programu zinazokidhi mahitaji ya jumuiya nzima.