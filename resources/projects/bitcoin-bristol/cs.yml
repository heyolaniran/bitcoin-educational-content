description: |
  Místní vzdělávací setkání a workshopy (od roku 2020), Bitcoin Bristol je síť jednotlivců a místních podniků nadšených potenciálem Bitcoin zlepšit budoucnost našich rodin, komunit a města Bristol. Střídáme se na přátelských místních místech, oslovte nás, pokud se chcete stát jedním z nich.
  