description: |
  Bitcoin Bristol ist ein Netzwerk von Einzelpersonen und lokalen Unternehmen, die sich für das Potenzial von Bitcoin begeistern, die Zukunft unserer Familien, Gemeinden und der Stadt Bristol zu verbessern (Est. 2020). Wir wechseln uns an freundlichen lokalen Orten ab, melden Sie sich, wenn Sie dabei sein wollen.
  