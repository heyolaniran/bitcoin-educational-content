description: |
  Kohalikud rohujuure tasandi hariduskogunemised ja õpitoad (2020), Bitcoin Bristol on üksikisikute ja kohalike ettevõtete võrgustik, kes on entusiastlikud Bitcoin potentsiaalist parandada meie perede, kogukondade ja Bristoli linna tulevikku. Me pöörleme sõbralike kohalike kohtade ümber, võtke ühendust, kui soovite olla üks neist.
  