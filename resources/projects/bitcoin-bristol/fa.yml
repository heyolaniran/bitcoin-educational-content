description: |
  رویدادها و کارگاه‌های آموزشی محلی (تأسیس 2020)، Bitcoin بریستول شبکه‌ای از افراد و کسب‌وکارهای محلی است که به پتانسیل Bitcoin برای بهبود آینده خانواده‌ها، جوامع و شهر بریستول علاقه‌مند هستند. ما در مکان‌های محلی دوستانه جابجا می‌شویم، اگر می‌خواهید یکی از آن‌ها باشید، با ما تماس بگیرید.