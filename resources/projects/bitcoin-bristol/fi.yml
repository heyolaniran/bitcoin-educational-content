description: |
  Paikalliset ruohonjuuritason koulutustapaamiset ja työpajat (arvio 2020), Bitcoin Bristol on verkosto yksityishenkilöitä ja paikallisia yrityksiä, jotka ovat innostuneita Bitcoin:n mahdollisuuksista parantaa perheidemme, yhteisöjemme ja Bristolin kaupungin tulevaisuutta. Kiertelemme ystävällisissä paikallisissa tapahtumapaikoissa, ota yhteyttä, jos haluat olla mukana.
  