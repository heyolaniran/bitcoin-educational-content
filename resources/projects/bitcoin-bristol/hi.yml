description: |
  स्थानीय जमीनी स्तर की शिक्षा मीटअप और कार्यशालाएँ (अनुमानित 2020), Bitcoin ब्रिस्टल ऐसे व्यक्तियों और स्थानीय व्यवसायों का एक नेटवर्क है जो हमारे परिवारों, समुदायों और ब्रिस्टल शहर के भविष्य को बेहतर बनाने के लिए Bitcoin की क्षमता के बारे में उत्साहित हैं। हम दोस्ताना स्थानीय स्थानों पर घूमते हैं, अगर आप उनमें से एक बनना चाहते हैं तो हमसे संपर्क करें।