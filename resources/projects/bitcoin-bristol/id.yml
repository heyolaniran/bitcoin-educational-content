description: |
  Pertemuan & lokakarya pendidikan akar rumput lokal (Perkiraan 2020), Bitcoin Bristol adalah jaringan individu & bisnis lokal yang antusias dengan potensi Bitcoin untuk meningkatkan masa depan bagi keluarga, komunitas, dan kota Bristol. Kami berkeliling ke tempat-tempat lokal yang ramah, hubungi kami jika Anda ingin bergabung.
  