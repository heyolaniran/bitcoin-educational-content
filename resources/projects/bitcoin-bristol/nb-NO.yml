description: |
  Lokale grasrotmøter og workshops (etablert 2020), Bitcoin Bristol er et nettverk av enkeltpersoner og lokale bedrifter som er entusiastiske over Bitcoins potensial for å forbedre fremtiden for familiene våre, lokalsamfunnene og byen Bristol. Vi roterer rundt på vennlige lokale arenaer, ta kontakt hvis du vil være en av dem.
  