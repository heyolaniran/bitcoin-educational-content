description: |
  Lokalne oddolne spotkania i warsztaty edukacyjne (stan na 2020 r.) Bitcoin Bristol to sieć osób i lokalnych firm entuzjastycznie nastawionych do potencjału Bitcoin w zakresie poprawy przyszłości naszych rodzin, społeczności i miasta Bristol. Obracamy się wokół przyjaznych lokalnych miejsc, skontaktuj się, jeśli chcesz być jednym z nich.
  