description: |
  Encontros e workshops locais de educação de base (Est. 2020), a Bitcoin Bristol é uma rede de indivíduos e empresas locais entusiasmados com o potencial da Bitcoin para melhorar o futuro das nossas famílias, comunidades e da cidade de Bristol. Nós rodamos em torno de locais locais amigáveis, entre em contato se você quiser ser um.
  