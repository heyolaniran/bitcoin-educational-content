description: |
  Lokalni sastanci i radionice o obrazovanju na nivou zajednice (osnovano 2020), Bitcoin Bristol je mreža pojedinaca i lokalnih preduzeća entuzijastičnih u vezi sa potencijalom Bitcoin da poboljša budućnost za naše porodice, zajednice i grad Bristol. Rotiramo se po prijatnim lokalnim mestima, javite se ako želite da budete jedno od njih.