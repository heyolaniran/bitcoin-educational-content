description: |
  Bitcoin چیانگ مای یک مرکز پویا برای جامعه Bitcoin در شمال تایلند است که فضایی را فراهم می‌کند که در آن افراد می‌توانند در اکوسیستم Bitcoin ارتباط برقرار کنند، همکاری کنند و بسازند. این مرکز در شهر فرهنگی و دوستدار فناوری چیانگ مای واقع شده و بیت‌کوینرهایی از سراسر جهان را جذب می‌کند که به پیشبرد حاکمیت فردی و راه‌حل‌های همتا به همتا علاقه‌مند هستند.
  
  Bitcoin چیانگ مای با تمرکز بر دانش عملی و قابل اجرا، کارگاه‌ها، ملاقات‌های فنی و رویدادهای منظم را برای توسعه‌دهندگان، ماینرها، مربیان و کارآفرینان برگزار می‌کند. این مرکز بر ساخت ابزارها و راه‌حل‌ها بر روی Bitcoin تأکید دارد و فرهنگ همکاری و نوآوری را ترویج می‌کند. با داشتن یک جامعه محلی و بین‌المللی پررونق، این فضایی است که بیت‌کوینرها می‌توانند ایده‌های Exchange را به اشتراک بگذارند، روی پروژه‌های متن‌باز کار کنند و راهبردهایی برای تقویت پذیرش جهانی Bitcoin تدوین کنند.
  
  چه در حال گسترش پیاده‌سازی Lightning Network خود باشید، چه در حال بررسی راه‌حل‌های حاکمیت مالی یا فقط به دنبال ارتباط با افراد همفکر، Bitcoin چیانگ مای محیطی پرجنب‌وجوش را فراهم می‌کند تا در آینده Bitcoin غوطه‌ور شوید.