description: |
  Bitcoin Core نرم‌افزار مرجع متن‌باز برای سیستم Bitcoin است و تا به امروز به عنوان پیاده‌سازی اصلی پروتکل Bitcoin باقی مانده است. این نرم‌افزار توسط گروه بزرگی از مشارکت‌کنندگان داوطلب توسعه و نگهداری می‌شود. در ابتدا با نام "Bitcoin Qt" شناخته می‌شد و سومین کلاینت در تاریخچه Bitcoin پس از Bitcoin توسط Satoshi Nakamoto و bitcoind است. این نرم‌افزار از کد اصلی Satoshi توسعه یافته و یک رابط کاربری گرافیکی Interface معرفی کرد. به طور قابل توجهی، رابط گرافیکی Interface از Bitcoin Core هنوز هم به نام Bitcoin-qt شناخته می‌شود. از نسخه 0.5، این نرم‌افزار با bitcoind ارائه شده است. Bitcoin Core چندین هدف را دنبال می‌کند. اول، به عنوان یک کلاینت Full-node عمل می‌کند. Bitcoin Core همچنین شامل یک Wallet برای کاربرانی است که می‌خواهند به طور مستقیم با Bitcoin Core ذخیره، مدیریت و تراکنش انجام دهند.