description: |
  Bitcoin Core, Bitcoin सिस्टम के लिए ओपन-सोर्स संदर्भ सॉफ़्टवेयर है और आज भी Bitcoin प्रोटोकॉल का प्राथमिक कार्यान्वयन बना हुआ है। इसे स्वयंसेवी योगदानकर्ताओं के एक बड़े समूह द्वारा विकसित और बनाए रखा जाता है। मूल रूप से "Bitcoin Qt" नाम दिया गया, यह Bitcoin के इतिहास में Satoshi नाकामोटो और bitcoind द्वारा Bitcoin के बाद तीसरा क्लाइंट है। इसे Satoshi के मूल कोड से विकसित किया गया था और इसमें एक ग्राफ़िकल उपयोगकर्ता Interface पेश किया गया था। विशेष रूप से, Bitcoin Core के ग्राफ़िकल Interface को आज भी Bitcoin-qt कहा जाता है। संस्करण 0.5 के बाद से, इसे bitcoind के साथ प्रदान किया गया है। Bitcoin Core कई उद्देश्यों को पूरा करता है। सबसे पहले, यह Full-node क्लाइंट के रूप में कार्य करता है। Bitcoin Core में उन उपयोगकर्ताओं के लिए Wallet भी शामिल है जो सीधे Bitcoin Core के साथ स्टोर, प्रबंधित और लेन-देन करना चाहते हैं।