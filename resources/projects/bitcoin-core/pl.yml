description: |
  Bitcoin Core jest oprogramowaniem referencyjnym typu open-source dla systemu Bitcoin i do dziś pozostaje podstawową implementacją protokołu Bitcoin. Jest rozwijany i utrzymywany przez dużą grupę wolontariuszy. Pierwotnie nazwany "Bitcoin Qt", jest trzecim klientem w historii Bitcoin po Bitcoin autorstwa Satoshi Nakamoto i bitcoind. Został opracowany na podstawie oryginalnego kodu Satoshi i wprowadził graficznego użytkownika Interface. Warto zauważyć, że graficzny Interface z Bitcoin Core jest nadal nazywany Bitcoin-qt. Od wersji 0.5 jest on dostarczany wraz z bitcoind. Bitcoin Core służy wielu celom. Po pierwsze, działa jako klient Full-node. Bitcoin Core zawiera również Wallet dla użytkowników, którzy chcą przechowywać, zarządzać i dokonywać transakcji bezpośrednio z Bitcoin Core.
  