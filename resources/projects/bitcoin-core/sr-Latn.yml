description: |
  Bitcoin Core je softver otvorenog koda za Bitcoin sistem i ostaje primarna implementacija Bitcoin protokola do danas. Razvija ga i održava velika grupa volontera. Prvobitno nazvan "Bitcoin Qt", to je treći klijent u istoriji Bitcoin nakon Bitcoin od strane Satoshi Nakamoto i bitcoind. Razvijen je iz originalnog koda Satoshi i uveo je grafički korisnički Interface. Zanimljivo je da se grafički Interface Bitcoin Core i dalje zove Bitcoin-qt danas. Od verzije 0.5, isporučuje se sa bitcoind. Bitcoin Core služi višestrukim svrhama. Prvo, deluje kao Full-node klijent. Bitcoin Core takođe uključuje Wallet za korisnike koji žele da skladište, upravljaju i transakcionišu direktno sa Bitcoin Core.