description: |
  Bitcoin Core är referensprogramvaran med öppen källkod för Bitcoin-systemet och är än i dag den primära implementeringen av Bitcoin-protokollet. Den utvecklas och underhålls av en stor grupp frivilliga bidragsgivare. Den hette ursprungligen "Bitcoin Qt" och är den tredje klienten i Bitcoin:s historia efter Bitcoin av Satoshi Nakamoto och bitcoind. Den utvecklades från Satoshi:s originalkod och introducerade en grafisk användare Interface. Det är värt att notera att den grafiska Interface i Bitcoin Core fortfarande kallas Bitcoin-qt idag. Sedan version 0.5 har den varit försedd med bitcoind. Bitcoin Core tjänar flera syften. För det första fungerar den som en Full-node-klient. Bitcoin Core innehåller också en Wallet för användare som vill lagra, hantera och göra transaktioner direkt med Bitcoin Core.
  