description: |
  Bitcoin Core ni programu ya marejeleo ya chanzo huria ya mfumo wa Bitcoin na inasalia kuwa utekelezaji msingi wa itifaki ya Bitcoin hadi leo. Inatengenezwa na kudumishwa na kundi kubwa la wachangiaji wa kujitolea. Awali iliitwa “Bitcoin Qt,” ni mteja wa tatu katika historia ya Bitcoin baada ya Bitcoin na Satoshi Nakamoto na bitcoind. Iliundwa kutoka kwa nambari asilia ya Satoshi na ikaanzisha mtumiaji wa picha Interface. Hasa, picha ya Interface ya Bitcoin Core bado inaitwa Bitcoin-qt leo. Tangu toleo la 0.5, limetolewa na bitcoind. Bitcoin Core hutumikia madhumuni mengi. Kwanza, inafanya kazi kama mteja wa Full-node. Bitcoin Core pia inajumuisha Wallet kwa watumiaji wanaotaka kuhifadhi, kudhibiti na kufanya miamala moja kwa moja na Bitcoin Core.
  