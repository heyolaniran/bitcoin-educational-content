description: |
  Pevně věříme, že umění, film a kultura mohou kreativně zachytit hnutí Bitcoin. Milujeme techniku a máme velké sny. Pravda je nezastavitelná. Propagujeme étos Bitcoin prostřednictvím akcí a uměleckých přehlídek a jsme otevřeni spolupráci s lidmi, kteří rozumí principům mírové revoluce.
  