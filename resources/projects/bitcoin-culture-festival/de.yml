description: |
  Wir glauben fest daran, dass Kunst, Film und Kultur die Bitcoin-Bewegung kreativ einfangen können. Wir lieben die Technik und haben große Träume. Die Wahrheit ist unaufhaltsam. Wir fördern das Bitcoin-Ethos durch Veranstaltungen und Kunstausstellungen und sind offen für die Zusammenarbeit mit Menschen, die die Prinzipien der friedlichen Revolution verstehen.
  