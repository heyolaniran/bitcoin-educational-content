description: |
  Creemos firmemente que el arte, el cine y la cultura pueden plasmar de forma creativa el movimiento Bitcoin. Nos encanta la tecnología y soñamos a lo grande. La verdad es imparable. Promovemos la ética de Bitcoin a través de eventos y exposiciones de arte y estamos abiertos a colaborar con personas que entiendan los principios de la revolución pacífica.
  