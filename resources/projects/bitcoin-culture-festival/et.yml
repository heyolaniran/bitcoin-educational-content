description: |
  Me usume kindlalt, et kunst, film ja kultuur võivad loovalt jäädvustada Bitcoin liikumist. Me armastame tehnoloogiat ja unistame suurelt. Tõde on peatamatu. Propageerime Bitcoin eetikat ürituste ja kunstinäituste kaudu ning oleme avatud koostööle inimestega, kes mõistavad rahumeelse revolutsiooni põhimõtteid.
  