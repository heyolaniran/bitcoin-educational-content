description: |
  ما به شدت معتقدیم که هنر، فیلم و فرهنگ می‌توانند به‌طور خلاقانه جنبش Bitcoin را به تصویر بکشند. ما عاشق فناوری هستیم و بزرگ فکر می‌کنیم. حقیقت غیرقابل توقف است. ما از طریق رویدادها و نمایشگاه‌های هنری، اصول Bitcoin را ترویج می‌دهیم و آماده همکاری با افرادی هستیم که اصول انقلاب مسالمت‌آمیز را درک می‌کنند.