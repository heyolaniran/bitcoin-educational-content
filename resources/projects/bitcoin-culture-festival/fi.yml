description: |
  Uskomme vakaasti, että taide, elokuva ja kulttuuri voivat luovasti vangita Bitcoin-liikkeen. Rakastamme teknologiaa ja unelmoimme suuresta. Totuus on pysäyttämätön. Edistämme Bitcoin:n eetosta tapahtumien ja taidenäyttelyiden kautta ja olemme avoimia tekemään yhteistyötä sellaisten ihmisten kanssa, jotka ymmärtävät rauhanomaisen vallankumouksen periaatteet.
  