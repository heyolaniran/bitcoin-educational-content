description: |
  Nous croyons fermement que l'art, le cinéma et la culture peuvent capturer de manière créative le mouvement Bitcoin. Nous aimons la technologie et nous rêvons grand. La vérité est imparable. Nous promouvons l'éthique Bitcoin à travers des événements et des expositions d'art et sommes ouverts à la collaboration avec des personnes qui comprennent les principes de la révolution pacifique.
  