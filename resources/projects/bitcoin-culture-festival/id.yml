description: |
  Kami sangat yakin bahwa Seni, Film, dan Budaya dapat secara kreatif menangkap gerakan Bitcoin. Kami mencintai teknologi dan bermimpi besar. Kebenaran tidak dapat dihentikan. Kami mempromosikan etos Bitcoin melalui acara dan pertunjukan seni dan terbuka untuk berkolaborasi dengan orang-orang yang memahami prinsip-prinsip revolusi damai.
  