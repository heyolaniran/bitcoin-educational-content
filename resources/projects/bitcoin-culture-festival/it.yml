description: |
  Crediamo fermamente che l'arte, il cinema e la cultura possano catturare in modo creativo il movimento Bitcoin. Amiamo la tecnologia e sogniamo in grande. La verità è inarrestabile. Promuoviamo l'etica di Bitcoin attraverso eventi e mostre d'arte e siamo aperti a collaborare con persone che comprendono i principi della rivoluzione pacifica.
  