description: |
  Vi tror fullt og fast på at kunst, film og kultur kan fange Bitcoin-bevegelsen på en kreativ måte. Vi elsker teknologien og drømmer stort. Sannheten er ustoppelig. Vi fremmer Bitcoin-etoset gjennom arrangementer og kunstutstillinger, og er åpne for å samarbeide med mennesker som forstår prinsippene for fredelig revolusjon.
  