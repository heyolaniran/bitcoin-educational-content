description: |
  Głęboko wierzymy, że sztuka, film i kultura mogą twórczo uchwycić ruch Bitcoin. Kochamy technologię i mamy wielkie marzenia. Prawda jest nie do powstrzymania. Promujemy etos Bitcoin poprzez wydarzenia i pokazy sztuki i jesteśmy otwarci na współpracę z ludźmi, którzy rozumieją zasady pokojowej rewolucji.
  