description: |
  Acreditamos firmemente que a arte, o cinema e a cultura podem captar de forma criativa o movimento Bitcoin. Adoramos a tecnologia e estamos a sonhar em grande. A verdade é imparável. Promovemos o ethos do Bitcoin através de eventos e espectáculos de arte e estamos abertos a colaborar com pessoas que compreendam os princípios da revolução pacífica.
  