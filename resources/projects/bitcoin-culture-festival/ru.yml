description: |
  Мы твердо верим, что искусство, кино и культура могут творчески отразить движение Bitcoin. Мы любим технологию и мечтаем о большом. Истину не остановить. Мы продвигаем идею Bitcoin с помощью мероприятий и художественных выставок и готовы сотрудничать с людьми, которые понимают принципы мирной революции.
  