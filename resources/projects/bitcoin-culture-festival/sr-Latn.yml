description: |
  Čvrsto verujemo da umetnost, film i kultura mogu kreativno da uhvate pokret Bitcoin. Volimo tehnologiju i sanjamo velike snove. Istina je nezaustavljiva. Promovišemo Bitcoin etos kroz događaje i umetničke izložbe i otvoreni smo za saradnju sa ljudima koji razumeju principe mirne revolucije.