description: |
  Vi är fast övertygade om att konst, film och kultur på ett kreativt sätt kan fånga Bitcoin-rörelsen. Vi älskar tekniken och drömmer stort. Sanningen är ostoppbar. Vi främjar Bitcoin-etoset genom evenemang och konstutställningar och är öppna för att samarbeta med människor som förstår principerna för fredlig revolution.
  