description: |
  Tunaamini kabisa kwamba Sanaa, Filamu na Utamaduni zinaweza kunasa kwa ubunifu harakati za Bitcoin. Tunapenda teknolojia na tuna ndoto kubwa. Ukweli hauzuiliki. Tunakuza maadili ya Bitcoin kupitia matukio na maonyesho ya sanaa na tuko tayari kushirikiana na watu wanaoelewa kanuni za mapinduzi ya amani.
  