description: |
  Chúng tôi tin chắc rằng Nghệ thuật, Phim ảnh và Văn hóa có thể nắm bắt sáng tạo phong trào Bitcoin. Chúng tôi yêu công nghệ và đang mơ lớn. Sự thật là không thể ngăn cản. Chúng tôi quảng bá tinh thần Bitcoin thông qua các sự kiện và triển lãm nghệ thuật và sẵn sàng hợp tác với những người hiểu được các nguyên tắc của cách mạng hòa bình.
  