description: |
  Společnost Bitcoin Dada založila Lorraine Marcelová, vášnivá zastánkyně finančního začlenění, poté, co si uvědomila výrazný rozdíl mezi muži a ženami v oblasti Bitcoin a Blockchain. Její cesta začala v místnostech, kde ženy buď chyběly, nebo byly výrazně nedostatečně zastoupeny, což posílilo pravdu o Hard - finanční inovace postupovaly vpřed, ale ženy zůstávaly pozadu. Rozhodla se tento narativ změnit a rozhodla se vytvořit prostor, kde by africké ženy mohly získat přístup ke vzdělání v oblasti Bitcoin, budovat kariéru a stát se lídry v oboru.