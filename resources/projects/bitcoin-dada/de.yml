description: |
  Bitcoin Dada wurde von Lorraine Marcel, einer leidenschaftlichen Verfechterin der finanziellen Eingliederung, gegründet, nachdem sie das eklatante Geschlechtergefälle im Bitcoin- und Blockchain-Bereich erkannt hatte. Ihre Reise begann in Räumen, in denen Frauen entweder nicht anwesend oder deutlich unterrepräsentiert waren, was eine Hard-Wahrheit bestätigte: Finanzinnovationen schreiten voran, aber Frauen bleiben zurück. Entschlossen, dies zu ändern, machte sie sich auf den Weg, um einen Raum zu schaffen, in dem afrikanische Frauen Zugang zu Bitcoin-Ausbildung haben, Karrieren aufbauen und in der Branche führend werden können.