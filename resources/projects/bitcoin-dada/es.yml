description: |
  Bitcoin Dada fue fundada por Lorraine Marcel, una apasionada defensora de la inclusión financiera, después de darse cuenta de la marcada brecha de género en el espacio de Bitcoin y Blockchain. Su viaje comenzó en salas donde las mujeres estaban ausentes o muy poco representadas, lo que reforzaba una verdad de Hard: la innovación financiera avanzaba, pero las mujeres se quedaban atrás. Decidida a cambiar esta situación, se propuso crear un espacio en el que las mujeres africanas pudieran acceder a la educación en Bitcoin, desarrollar sus carreras y convertirse en líderes del sector.