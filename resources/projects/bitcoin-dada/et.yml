description: |
  Bitcoin Dada asutas Lorraine Marcel, kes on kirglik finantskaasamise eestkõneleja, pärast seda, kui ta mõistis, et Bitcoin ja Blockchain valdkonnas valitseb suur sooline lõhe. Tema teekond algas ruumides, kus naised kas puudusid või olid märkimisväärselt alaesindatud, mis kinnitas Hard tõde - finantsinnovatsioon liikus edasi, kuid naised jäid tahaplaanile. Otsustades seda narratiivi muuta, asus ta looma ruumi, kus Aafrika naised saaksid juurdepääsu Bitcoin haridusele, teha karjääri ja saada valdkonna juhtideks.