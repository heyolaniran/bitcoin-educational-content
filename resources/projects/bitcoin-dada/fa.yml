description: |
  Bitcoin دادا توسط لورین مارسل، یک مدافع پرشور برای شمول مالی، پس از درک فاصله جنسیتی آشکار در فضای Bitcoin و Blockchain تأسیس شد. سفر او در اتاق‌هایی آغاز شد که زنان یا غایب بودند یا به طور قابل توجهی کم‌نماینده بودند، که یک حقیقت Hard را تقویت می‌کرد—نوآوری مالی در حال پیشرفت بود، اما زنان عقب مانده بودند. مصمم به تغییر این روایت، او تصمیم گرفت فضایی ایجاد کند که زنان آفریقایی بتوانند به آموزش Bitcoin دسترسی پیدا کنند، حرفه‌ای بسازند و به رهبران صنعت تبدیل شوند.