description: |
  Bitcoin Dadan perusti rahoituksellisen osallisuuden intohimoinen puolestapuhuja Lorraine Marcel havaittuaan, että Bitcoin- ja Blockchain-tiloissa on selvä sukupuolten välinen ero. Hänen matkansa alkoi huoneissa, joissa naiset olivat joko poissa tai merkittävästi aliedustettuina, mikä vahvisti Hard-totuuden - rahoitusalan innovaatiot etenivät, mutta naiset jäivät jälkeen. Hän päätti muuttaa tätä kertomusta ja ryhtyi luomaan tilaa, jossa afrikkalaiset naiset voisivat saada Bitcoin-koulutusta, luoda uraa ja nousta alan johtajiksi.