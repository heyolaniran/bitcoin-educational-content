description: |
  Bitcoin Dada a été fondé par Lorraine Marcel, une militante passionnée de l'inclusion financière, après avoir constaté l'écart criant entre les hommes et les femmes dans l'espace Bitcoin et Blockchain. Son parcours a commencé dans des salles où les femmes étaient soit absentes, soit largement sous-représentées, renforçant une vérité Hard - l'innovation financière progressait, mais les femmes étaient laissées pour compte. Déterminée à changer ce discours, elle a entrepris de créer un espace où les femmes africaines pourraient accéder à la formation Bitcoin, bâtir des carrières et devenir des leaders dans le secteur.