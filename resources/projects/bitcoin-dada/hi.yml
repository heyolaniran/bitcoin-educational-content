description: |
  Bitcoin दादा की स्थापना लोरेन मार्सेल ने की थी, जो वित्तीय समावेशन की एक उत्साही समर्थक हैं। उन्होंने Bitcoin और Blockchain क्षेत्र में लिंग के भारी अंतर को महसूस किया। उनकी यात्रा ऐसे कमरों से शुरू हुई जहाँ महिलाएँ या तो अनुपस्थित थीं या उनका प्रतिनिधित्व काफी कम था, जिससे Hard सत्य को बल मिला- वित्तीय नवाचार आगे बढ़ रहा था, लेकिन महिलाएँ पीछे छूट रही थीं। इस कहानी को बदलने के लिए दृढ़ संकल्पित होकर, उन्होंने एक ऐसा स्थान बनाने का लक्ष्य रखा जहाँ अफ्रीकी महिलाएँ Bitcoin शिक्षा प्राप्त कर सकें, करियर बना सकें और उद्योग में अग्रणी बन सकें।