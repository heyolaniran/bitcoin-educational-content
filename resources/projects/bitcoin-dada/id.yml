description: |
  Bitcoin Dada didirikan oleh Lorraine Marcel, seorang advokat yang bersemangat untuk inklusi keuangan, setelah menyadari kesenjangan gender yang mencolok dalam ruang Bitcoin dan Blockchain. Perjalanannya dimulai dari ruang-ruang di mana perempuan tidak ada atau kurang terwakili secara signifikan, memperkuat kebenaran Hard-inovasi keuangan bergerak maju, tetapi perempuan tertinggal. Bertekad untuk mengubah narasi ini, ia mulai menciptakan ruang di mana perempuan Afrika dapat mengakses pendidikan Bitcoin, membangun karier, dan menjadi pemimpin di industri ini.