description: |
  Bitcoin Dada è stata fondata da Lorraine Marcel, appassionata sostenitrice dell'inclusione finanziaria, dopo essersi resa conto del forte divario di genere nello spazio Bitcoin e Blockchain. Il suo viaggio è iniziato in ambienti in cui le donne erano assenti o significativamente sottorappresentate, rafforzando una verità Hard: l'innovazione finanziaria stava avanzando, ma le donne venivano lasciate indietro. Determinata a cambiare questa realtà, ha deciso di creare uno spazio in cui le donne africane potessero accedere alla formazione Bitcoin, costruire una carriera e diventare leader del settore.