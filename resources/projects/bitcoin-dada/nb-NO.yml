description: |
  Bitcoin Dada ble grunnlagt av Lorraine Marcel, en lidenskapelig forkjemper for økonomisk inkludering, etter å ha innsett det store kjønnsgapet på Bitcoin- og Blockchain-området. Reisen hennes begynte i rom der kvinner enten var fraværende eller betydelig underrepresentert, noe som forsterket en Hard-sannhet - finansiell innovasjon gikk fremover, men kvinner ble hengende etter. Hun var fast bestemt på å endre dette narrativet, og satte seg fore å skape et sted der afrikanske kvinner kunne få tilgang tBitcoin-utdanning, bygge karrierer og bli ledere i bransjen.