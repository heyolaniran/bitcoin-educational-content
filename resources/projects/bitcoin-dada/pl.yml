description: |
  Bitcoin Dada została założona przez Lorraine Marcel, zapaloną orędowniczkę integracji finansowej, po uświadomieniu sobie wyraźnej luki płciowej w przestrzeni Bitcoin i Blockchain. Jej podróż rozpoczęła się w pomieszczeniach, w których kobiety były albo nieobecne, albo znacznie niedostatecznie reprezentowane, wzmacniając prawdę Hard - innowacje finansowe posuwały się naprzód, ale kobiety pozostawały w tyle. Zdeterminowana, aby zmienić tę narrację, postanowiła stworzyć przestrzeń, w której afrykańskie kobiety mogłyby uzyskać dostęp do edukacji Bitcoin, budować kariery i stać się liderami w branży.