description: |
  A Bitcoin Dada foi fundada por Lorraine Marcel, uma defensora apaixonada da inclusão financeira, depois de se ter apercebido da grande disparidade de género no espaço Bitcoin e Blockchain. A sua jornada começou em salas onde as mulheres estavam ausentes ou significativamente sub-representadas, reforçando uma verdade Hard - a inovação financeira estava a avançar, mas as mulheres estavam a ser deixadas para trás. Determinada a mudar esta narrativa, propôs-se a criar um espaço onde as mulheres africanas pudessem aceder à educação Bitcoin, construir carreiras e tornar-se líderes no sector.