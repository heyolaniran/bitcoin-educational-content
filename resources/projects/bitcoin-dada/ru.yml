description: |
  Компания Bitcoin Dada была основана Лоррейн Марсель, страстным сторонником финансовой доступности, после того как она осознала, что в сфере Bitcoin и Blockchain существует значительный гендерный разрыв. Ее путь начался в комнатах, где женщины либо отсутствовали, либо были значительно меньше представлены, что подтверждало истину Hard - финансовые инновации шли вперед, но женщины оставались позади. Решив изменить эту картину, она решила создать пространство, где африканские женщины могли бы получать образование в области Bitcoin, строить карьеру и становиться лидерами в отрасли.