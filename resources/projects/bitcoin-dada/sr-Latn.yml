description: |
  Bitcoin Dada je osnovala Lorraine Marcel, strastvena zagovornica finansijske inkluzije, nakon što je uočila izražen rodni jaz u prostoru Bitcoin i Blockchain. Njeno putovanje je počelo u prostorijama gde su žene bile ili odsutne ili značajno nedovoljno zastupljene, što je pojačalo Hard istinu—finansijska inovacija je napredovala, ali su žene ostajale po strani. Odlučna da promeni ovu priču, krenula je da stvori prostor gde afričke žene mogu pristupiti Bitcoin obrazovanju, graditi karijere i postati liderke u industriji.