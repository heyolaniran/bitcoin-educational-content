description: |
  Bitcoin Dada grundades av Lorraine Marcel, en passionerad förespråkare för finansiell inkludering, efter att ha insett det stora könsgapet i Bitcoin- och Blockchain-utrymmet. Hennes resa började i rum där kvinnor antingen var frånvarande eller betydligt underrepresenterade, vilket förstärkte en Hard-sanning - finansiell innovation gick framåt, men kvinnor lämnades efter. Hon var fast besluten att ändra på detta och började skapa en plats där afrikanska kvinnor kunde få tillgång till Bitcoin-utbildning, bygga upp karriärer och bli ledare i branschen.