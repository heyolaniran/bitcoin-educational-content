description: |
  Bitcoin Dada ilianzishwa na Lorraine Marcel, mtetezi mwenye shauku ya ushirikishwaji wa kifedha, baada ya kutambua pengo kubwa la jinsia katika nafasi ya Bitcoin na Blockchain. Safari yake ilianza katika vyumba ambapo wanawake walikuwa hawapo au hawakuwakilishwa kwa kiasi kikubwa, na kuimarisha ukweli wa Hard-uvumbuzi wa kifedha ulikuwa ukisonga mbele, lakini wanawake walikuwa wakiachwa nyuma. Akiwa na nia ya kubadilisha simulizi hili, aliazimia kuunda nafasi ambapo wanawake wa Kiafrika wangeweza kupata elimu ya Bitcoin, kujenga taaluma, na kuwa viongozi katika sekta hiyo.