description: |
  Bitcoin Dada được thành lập bởi Lorraine Marcel, một người ủng hộ nhiệt thành cho sự hòa nhập tài chính, sau khi nhận ra khoảng cách giới tính rõ rệt trong không gian Bitcoin và Blockchain. Hành trình của cô bắt đầu trong những căn phòng mà phụ nữ vắng mặt hoặc bị đại diện quá ít, củng cố sự thật của Hard—đổi mới tài chính đang tiến triển, nhưng phụ nữ lại bị bỏ lại phía sau. Quyết tâm thay đổi câu chuyện này, cô bắt đầu tạo ra một không gian nơi phụ nữ châu Phi có thể tiếp cận giáo dục Bitcoin, xây dựng sự nghiệp và trở thành những nhà lãnh đạo trong ngành.