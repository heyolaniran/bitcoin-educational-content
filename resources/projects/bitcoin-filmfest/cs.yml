description: |
  Zatímco Bitcoin FilmFest bude pravidelně hostit a účastnit se akcí na místní i zahraniční úrovni, Varšava slouží jako domovská základna BFF. Každoročně se na několik dní koná v ikonickém Paláci kultury a vědy - jedinečné budově postavené na Stalinův příkaz - a přináší poselství decentralizace a svobody na místo, které bylo kdysi symbolem centrální kontroly. Ať už jsou Bitcoin FilmFest jakkoli velké, přesahují rámec série akcí. Ve skutečnosti slouží také jako síťová platforma, Bitcoin Cinema Hub, která sdružuje nejdivočejší mozky z mnoha oblastí - nezávislé tvůrce, filmaře, producenty, lidi hledající svobodu a filmové fanoušky.
  