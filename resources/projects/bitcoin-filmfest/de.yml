description: |
  Während das Bitcoin FilmFest regelmäßig Veranstaltungen im In- und Ausland ausrichtet und an ihnen teilnimmt, ist Warschau die Heimatbasis des BFF. Es findet jedes Jahr für ein paar Tage im berühmten Palast für Kultur und Wissenschaft statt - einem einzigartigen Gebäude, das auf Befehl Stalins errichtet wurde - und bringt die Botschaft der Dezentralisierung und Freiheit an einen Ort, der einst ein Symbol der zentralen Kontrolle war. Wie großartig sie auch sein mögen, das Bitcoin FilmFest geht über eine Reihe von Veranstaltungen hinaus. Vielmehr dient es auch als Vernetzungsplattform, dem Bitcoin Cinema Hub, der die schärfsten Köpfe aus vielen Bereichen zusammenbringt - unabhängige Kreative, Filmemacher, Produzenten, Freiheitssuchende und Kinofans.
  