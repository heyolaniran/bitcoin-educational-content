description: |
  Aunque el Bitcoin FilmFest acogerá y participará regularmente en eventos locales y en el extranjero, Varsovia es la sede del BFF. Celebrado en el emblemático Palacio de la Cultura y la Ciencia -un edificio único erigido por orden de Stalin- durante unos días al año, lleva el mensaje de la descentralización y la libertad a un lugar que en su día fue símbolo del control central. Por grandes que sean, el Bitcoin FilmFest va más allá de una serie de eventos. De hecho, también sirve como plataforma de creación de redes, el Bitcoin Cinema Hub, que reúne a las mentes más feroces de muchos ámbitos: creadores independientes, cineastas, productores, buscadores de libertad y aficionados al cine.
  