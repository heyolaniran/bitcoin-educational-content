description: |
  Kuigi Bitcoin FilmFest korraldab regulaarselt üritusi kohapeal ja välismaal ning osaleb neis, on Varssavi BFFi kodubaasiks. Kultuuri- ja teaduspalees - ainulaadses Stalini käsul püstitatud hoones - toimuv festival toob igal aastal paariks päevaks detsentraliseerimise ja vabaduse sõnumi paika, mis kunagi oli keskse kontrolli sümboliks. Ükskõik kui suured nad ka poleks, Bitcoin FilmFest läheb kaugemale ürituste sarjast. Tegelikult on see ka võrgustikuplatvorm, Bitcoin Cinema Hub, mis toob kokku kõige ägedamad pead paljudest valdkondadest - sõltumatud loojad, filmitegijad, produtsendid, vabaduse otsijad ja filmifännid.
  