description: |
  در حالی که جشنواره فیلم Bitcoin به طور منظم میزبان و شرکت‌کننده در رویدادهای محلی و خارجی خواهد بود، ورشو به عنوان پایگاه اصلی BFF عمل می‌کند. این جشنواره هر ساله برای چند روز در کاخ فرهنگ و علم نمادین—ساختمانی منحصر به فرد که به دستور استالین ساخته شده است—برگزار می‌شود و پیام تمرکززدایی و آزادی را به مکانی می‌آورد که زمانی نماد کنترل مرکزی بود. جشنواره فیلم Bitcoin فراتر از یک سری رویدادها است، هرچند که چقدر هم بزرگ باشند. در واقع، این جشنواره به عنوان یک پلتفرم شبکه‌سازی، مرکز سینمایی Bitcoin، عمل می‌کند که ذهن‌های برجسته از بسیاری از حوزه‌ها—خالقان مستقل، فیلم‌سازان، تهیه‌کنندگان، جویندگان آزادی و طرفداران سینما—را گرد هم می‌آورد.