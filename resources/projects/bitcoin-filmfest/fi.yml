description: |
  Vaikka Bitcoin FilmFest isännöi ja osallistuu säännöllisesti tapahtumiin paikallisesti ja ulkomailla, Varsova on BFF:n kotipaikka. Se järjestetään ikonisessa kulttuuri- ja tiedepalatsissa - ainutlaatuisessa Stalinin käskystä rakennetussa rakennuksessa - muutaman päivän ajan joka vuosi, ja se tuo hajauttamisen ja vapauden sanoman paikkaan, joka oli aikoinaan keskushallinnon symboli. Vaikka Bitcoin FilmFest olisi kuinka hieno, se on muutakin kuin sarja tapahtumia. Itse asiassa se toimii myös verkostoitumisalustana, Bitcoin Cinema Hubina, joka kokoaa yhteen kiihkeimmät mielet monilta aloilta - riippumattomat tekijät, elokuvantekijät, tuottajat, vapauden etsijät ja elokuvan ystävät.
  