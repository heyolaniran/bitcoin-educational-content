description: |
  Le Bitcoin FilmFest accueillera et participera régulièrement à des événements au niveau local et à l'étranger, mais Varsovie est le point d'attache du BFF. Organisé dans l'emblématique Palais de la culture et de la science - un bâtiment unique construit sur ordre de Staline - pendant quelques jours chaque année, il apporte le message de la décentralisation et de la liberté dans un lieu qui était autrefois un symbole du contrôle central. Aussi grand soit-il, le Bitcoin FilmFest va au-delà d'une série d'événements. En fait, il sert également de plateforme de réseautage, le Bitcoin Cinema Hub, qui rassemble les esprits les plus féroces de nombreux domaines - créateurs indépendants, cinéastes, producteurs, défenseurs de la liberté et amateurs de cinéma.
  