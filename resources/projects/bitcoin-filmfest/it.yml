description: |
  Mentre Bitcoin FilmFest ospiterà e parteciperà regolarmente a eventi locali e all'estero, Varsavia è la base del BFF. Tenuto nell'iconico Palazzo della Cultura e della Scienza - un edificio unico nel suo genere, eretto su ordine di Stalin - per alcuni giorni all'anno, porta il messaggio di decentralizzazione e libertà in un luogo che un tempo era un simbolo del controllo centrale. Per quanto grande sia, Bitcoin FilmFest va oltre una serie di eventi. Infatti, funge anche da piattaforma di networking, Bitcoin Cinema Hub, che riunisce le menti più accese di molti settori: creatori indipendenti, registi, produttori, cercatori di libertà e appassionati di cinema.
  