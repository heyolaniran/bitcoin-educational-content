description: |
  Bitcoin映画祭は、国内外で定期的に開催されるイベントに参加するが、ワルシャワはBFFの本拠地である。毎年数日間、スターリンの命令で建てられたユニークな建物である象徴的な文化科学宮殿で開催されるこのイベントは、かつて中央統制の象徴であった会場に、地方分権と自由のメッセージをもたらす。Bitcoinフィルムフェストは、どんなに素晴らしいイベントであっても、単なるイベントではない。実際、Bitcoinシネマ・ハブというネットワーキング・プラットフォームとしての役割も果たしており、インディペンデント・クリエイター、映画製作者、プロデューサー、自由を求める人々、映画ファンなど、さまざまな分野の猛者たちが一堂に会する。
  