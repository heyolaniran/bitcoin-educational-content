description: |
  Bitcoin FilmFest vil jevnlig være vertskap for og delta i arrangementer i inn- og utland, men Warszawa fungerer som BFFs hjemmebase. I det ikoniske Kultur- og vitenskapspalasset - en unik bygning som ble reist på Stalins ordre - avholdes det noen dager hvert år, og det bringer budskapet om desentralisering og frihet til et sted som en gang var et symbol på sentral kontroll. Uansett hvor store de er, er Bitcoin FilmFest mer enn bare en serie arrangementer. Faktisk fungerer den også som en nettverksplattform, Bitcoin Cinema Hub, som samler de skarpeste hodene fra mange områder - uavhengige skapere, filmskapere, produsenter, frihetssøkere og kinofans.
  