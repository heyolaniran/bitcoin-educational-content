description: |
  Podczas gdy Bitcoin FilmFest będzie regularnie gościć i uczestniczyć w wydarzeniach lokalnych i zagranicznych, Warszawa służy jako baza domowa BFF. Odbywający się w kultowym Pałacu Kultury i Nauki - unikalnym budynku wzniesionym na rozkaz Stalina - przez kilka dni każdego roku, niesie przesłanie decentralizacji i wolności w miejscu, które niegdyś było symbolem centralnej kontroli. Bez względu na to, jak wielkie są, Bitcoin FilmFest wykracza poza serię wydarzeń. W rzeczywistości służy również jako platforma networkingowa, Bitcoin Cinema Hub, która skupia najbardziej zaciekłe umysły z wielu dziedzin - niezależnych twórców, filmowców, producentów, poszukiwaczy wolności i fanów kina.
  