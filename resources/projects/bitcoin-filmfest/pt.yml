description: |
  Embora o Bitcoin FilmFest seja regularmente anfitrião e participe em eventos locais e no estrangeiro, Varsóvia é a base do BFF. Realizado no emblemático Palácio da Cultura e da Ciência - um edifício único erigido por ordem de Estaline - durante alguns dias por ano, leva a mensagem de descentralização e liberdade a um local que já foi um símbolo de controlo central. Por muito bons que sejam, os Bitcoin FilmFest vão para além de uma série de eventos. Na verdade, também serve como uma plataforma de rede, o Bitcoin Cinema Hub, que reúne as mentes mais ferozes de muitas áreas - criadores independentes, cineastas, produtores, buscadores de liberdade e fãs de cinema.
  