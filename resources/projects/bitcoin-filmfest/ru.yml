description: |
  Несмотря на то, что Bitcoin FilmFest регулярно принимает участие в мероприятиях в стране и за рубежом, Варшава служит для BFF домашней базой. Проводимый в культовом Дворце культуры и науки - уникальном здании, возведенном по приказу Сталина - в течение нескольких дней каждый год, он несет послание децентрализации и свободы в место, которое когда-то было символом центрального контроля. Какими бы великими они ни были, Bitcoin FilmFest выходит за рамки серии мероприятий. Фактически, он также служит платформой для создания сети, Bitcoin Cinema Hub, которая объединяет самые яростные умы из многих областей - независимых творцов, режиссеров, продюсеров, искателей свободы и любителей кино.
  