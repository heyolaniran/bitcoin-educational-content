description: |
  Dok Bitcoin FilmFest redovno organizuje i učestvuje na događajima lokalno i u inostranstvu, Varšava služi kao matična baza BFF-a. Održava se u ikoničnoj Palati kulture i nauke—jedinstvenoj zgradi podignutoj po Staljinovom naređenju—nekoliko dana svake godine, donoseći poruku decentralizacije i slobode u prostor koji je nekada bio simbol centralne kontrole. Bez obzira koliko su sjajni, Bitcoin FilmFest prevazilazi niz događaja. Zapravo, on takođe služi kao platforma za umrežavanje, Bitcoin Cinema Hub, koja okuplja najžešće umove iz mnogih oblasti—nezavisne stvaraoce, filmske stvaraoce, producente, tragače za slobodom i ljubitelje filma.