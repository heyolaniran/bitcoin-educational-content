description: |
  Bitcoin FilmFest kommer regelbundet att vara värd för och delta i evenemang lokalt och utomlands, men Warszawa fungerar som BFF:s hemmabas. Under några dagar varje år hålls evenemanget i det ikoniska kultur- och vetenskapspalatset - en unik byggnad som uppfördes på Stalins order - och för in budskapet om decentralisering och frihet på en plats som en gång i tiden var en symbol för central kontroll. Bitcoin FilmFest är inte bara en serie evenemang, oavsett hur stora de är. Faktum är att den också fungerar som en nätverksplattform, Bitcoin Cinema Hub, som sammanför de skarpaste hjärnorna från många områden - oberoende kreatörer, filmskapare, producenter, frihetssökare och filmfans.
  