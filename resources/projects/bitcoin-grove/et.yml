description: |
  Bitcoin Grove on Miamis asuv Bitcoin häkkeriruum, mis pakub Bitcoin-ga seotud projektidele ja entusiastidele ühist tööruumi ja stuudiot. Liikmed saavad osaleda erinevatel üritustel, töötubades ja võrgustike loomise võimalustes, mille eesmärk on edendada innovatsiooni ja haridust Bitcoin kogukonnas. Ruum tegutseb liikmeskonna alusel, julgustades Bitcoin ja sellega seotud tehnoloogiate vastu huvi tundvaid inimesi aktiivselt osalema ja koostööd tegema.