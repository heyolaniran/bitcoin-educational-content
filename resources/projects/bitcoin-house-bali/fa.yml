description: |
  Bitcoin اندونزی یک ابتکار منحصر به فرد Bitcoin است که به توانمندسازی اندونزی از طریق Bitcoin با ارائه آموزش‌های رایگان و منبع باز، ساخت جوامع محلی و تقویت اقتصاد چرخشی (سیستم حلقه بسته) اختصاص دارد. ما بیش از 20 گردهمایی ماهانه در سراسر کشور برگزار می‌کنیم، در مدارس و دانشگاه‌ها ارائه می‌دهیم، یک مرکز آموزش آنلاین داریم، کارگاه‌های منظم در Bitcoin House Bali برگزار می‌کنیم و بسیاری موارد دیگر. با Bitcoin House Bali، ما فضایی فیزیکی برای همه علاقه‌مندان به یادگیری و تجربه Bitcoin در زندگی واقعی فراهم می‌کنیم. این یک فضای امن برای پرسیدن سوالات، امتحان کردن سخت‌افزار، اجاره کتاب، ملاقات با افراد همفکر، شرکت در کارگاه‌های عملی، خرید Bitcoin و غیره است. هدف ما این است که ابزارهای توانمندسازی اقتصادی را به مردم بدهیم، از حقوق مالی انسانی حمایت کنیم، بر سرکوب مالی غلبه کنیم و به آنها دسترسی به فناوری‌های آزادی (یعنی Bitcoin، Lightning، e-cash، Fedimint و Nostr) بدهیم. ماموریت ما این است که Bitcoin را به راحتی در دسترس همه در اندونزی قرار دهیم و تا حد امکان نقاط تماس و فرصت‌های یادگیری ایجاد کنیم.