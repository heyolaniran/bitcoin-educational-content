description: |
  Bitcoin Indonesia to inicjatywa poświęcona wyłącznie Bitcoin, której celem jest wzmocnienie pozycji Indonezji poprzez Bitcoin poprzez zapewnienie bezpłatnej i otwartej edukacji, budowanie lokalnych społeczności i wspieranie gospodarki o obiegu zamkniętym. Organizujemy ponad 20 comiesięcznych spotkań w całym kraju, prowadzimy prezentacje w szkołach i na uniwersytetach, posiadamy internetowe centrum edukacyjne, prowadzimy regularne warsztaty w Bitcoin House Bali i wiele więcej. Dzięki Bitcoin House Bali zapewniamy fizyczną przestrzeń dla wszystkich zainteresowanych nauką i doświadczaniem Bitcoin w prawdziwym życiu. Jest to bezpieczna przestrzeń do zadawania pytań, wypróbowywania sprzętu, wypożyczania książek, spotykania podobnie myślących ludzi, uczestniczenia w praktycznych warsztatach, kupowania Bitcoin itp. Naszym celem jest zapewnienie ludziom narzędzi do wzmocnienia pozycji ekonomicznej, wspieranie finansowych praw człowieka, przezwyciężenie represji finansowych i zapewnienie im dostępu do technologii wolnościowych (tj. Bitcoin, Lightning, e-cash, Fedimint i Nostr). Naszą misją jest uczynienie Bitcoin łatwo dostępnym dla każdego w Indonezji i stworzenie jak największej liczby punktów kontaktowych i możliwości uczenia się.
  