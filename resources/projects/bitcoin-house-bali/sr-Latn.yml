description: |
  Bitcoin Indonezija je inicijativa posvećena isključivo Bitcoin, koja ima za cilj osnaživanje Indonezije kroz Bitcoin pružanjem besplatnog i otvorenog obrazovanja, izgradnjom lokalnih zajednica i podsticanjem cirkularne ekonomije (zatvorenog sistema). Organizujemo preko 20 mesečnih okupljanja širom zemlje, držimo prezentacije u školama i univerzitetima, imamo online obrazovni centar, redovno održavamo radionice u Bitcoin House Bali i još mnogo toga. Sa Bitcoin House Bali, obezbeđujemo fizički prostor za sve zainteresovane da uče i iskuse Bitcoin u stvarnom životu. To je sigurno mesto za postavljanje pitanja, isprobavanje hardvera, iznajmljivanje knjiga, upoznavanje istomišljenika, učešće u praktičnim radionicama, kupovinu Bitcoin, itd. Naš cilj je da ljudima damo alate za ekonomsko osnaživanje, podržimo finansijska ljudska prava, prevaziđemo finansijsku represiju i omogućimo im pristup tehnologijama slobode (tj. Bitcoin, Lightning, e-cash, Fedimint i Nostr). Naša misija je da Bitcoin učinimo lako dostupnim svima u Indoneziji i da stvorimo što više dodirnih tačaka i prilika za učenje.