description: |
  Bitcoin Indonesia är ett Bitcoin-initiativ som är dedikerat till att stärka Indonesien genom Bitcoin genom att tillhandahålla gratis utbildning med öppen källkod, bygga lokala samhällen och främja en cirkulär ekonomi (slutet kretslopp). Vi är värdar för över 20 månatliga möten över hela landet, ger presentationer på skolor och universitet, har ett onlineutbildningsnav, kör regelbundna workshops på Bitcoin House Bali och mycket mer. Med Bitcoin House Bali tillhandahåller vi ett fysiskt utrymme för alla som är intresserade av att lära sig och uppleva Bitcoin i verkliga livet. Det är ett säkert ställe att ställa frågor, prova hårdvara, hyra ut böcker, träffa likasinnade, delta i praktiska workshops, köpa Bitcoin, etc. Vi strävar efter att ge människor verktyg för ekonomisk egenmakt, stödja ekonomiska mänskliga rättigheter, övervinna ekonomiskt förtryck och ge dem tillgång till frihetsteknologier (dvs. Bitcoin, Lightning, e-cash, Fedimint och Nostr). Vårt uppdrag är att göra Bitcoin lättillgängligt för alla i Indonesien och att skapa så många beröringspunkter och inlärningsmöjligheter som möjligt.
  