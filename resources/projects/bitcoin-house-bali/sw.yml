description: |
  Bitcoin Indonesia ni mpango wa Bitcoin-pekee unaojitolea kuwezesha Indonesia kupitia Bitcoin kwa kutoa elimu ya bure na huria, kujenga jumuiya za wenyeji, na kukuza uchumi wa mzunguko (mfumo funge-kitanzi). Tunaandaa zaidi ya mikutano 20 ya kila mwezi nchini kote, kutoa mawasilisho shuleni na vyuo vikuu, kuwa na kitovu cha elimu mtandaoni, kuendesha warsha za kawaida katika Bitcoin House Bali, na mengine mengi. Kwa Bitcoin House Bali, tunatoa nafasi halisi kwa kila mtu anayependa kujifunza na kufurahia Bitcoin katika maisha halisi. Ni sehemu salama ya kuuliza maswali, kujaribu maunzi, kukodisha vitabu, kukutana na watu wenye nia moja, kushiriki katika warsha za kushughulikia, kununua Bitcoin, n.k. Tunalenga kuwapa watu zana za kuwawezesha kiuchumi, kuunga mkono haki za binadamu za kifedha, kushinda ukandamizaji wa kifedha, na kuwapa ufikiaji wa teknolojia za uhuru (yaani Bitcoin, Lightning, e-cash, Feeder, Nodi). Dhamira yetu ni kufanya Bitcoin kupatikana kwa urahisi kwa kila mtu nchini Indonesia na kuunda sehemu nyingi za kugusa na fursa za kujifunza iwezekanavyo.
  