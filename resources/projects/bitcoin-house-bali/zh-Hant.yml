description: |
  Bitcoin 印尼是一個僅限於 Bitcoin 的計畫，致力於透過 Bitcoin 提供免費且開放原始碼的教育、建立當地社區，並促進循環經濟（閉路循環系統），以增強印尼的能力。我們每月在全國各地舉辦超過 20 場聚會、在學校和大學進行簡報、設立線上教育中心、在峇里島 Bitcoin 之家定期舉辦工作坊等等。透過巴厘島 Bitcoin 之家，我們為所有有興趣在現實生活中學習和體驗 Bitcoin 的人提供了一個實體空間。這是一個安全的空間，可以提問、試用硬體、租借書籍、結識志同道合的朋友、參加實習工作坊、購買 Bitcoin 等。我們的目標是提供人們經濟賦權的工具、支持金融人權、克服金融壓迫，並讓他們有機會使用自由科技 (即 Bitcoin、Lightning、e-cash、Fedimint 和 Nostr)。我們的使命是讓印尼的每個人都能輕鬆使用 Bitcoin，並創造盡可能多的接觸點和學習機會。
  