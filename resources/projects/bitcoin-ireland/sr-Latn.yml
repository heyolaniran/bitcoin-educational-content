description: |
  Mi smo grupa pojedinaca strastvenih prema Bitcoin i mogućnostima koje može ponuditi, kako ljudima Irske, tako i preduzećima koja ovde posluju. Naša misija je povezivanje Bitcoin entuzijasta sa sedištem u Irskoj, podrška i promocija preduzeća koja su prijateljski nastrojena prema Bitcoin, edukacija javnosti i pružanje online resursa za svakoga ko je zainteresovan da sazna više. Ovo radimo jer verujemo da Bitcoin može pomoći da svet postane bolje mesto.