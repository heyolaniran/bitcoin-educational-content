description: |
  Ve společnosti Bitcoin je pro každého pevně věříme, že Bitcoin není určena pouze pro technicky zdatné nebo finančně privilegované; je určena pro každého člověka, který chce převzít kontrolu nad svými financemi a utvářet budoucnost digitálního obchodování. S touto vizí jsme vytvořili konferenci "Bitcoin je pro každého", abychom posílili a vzdělali místní komunitu v Portlandu ve státě Oregon a učinili ji nedílnou součástí stále rozšířenějšího světa Bitcoin.
  