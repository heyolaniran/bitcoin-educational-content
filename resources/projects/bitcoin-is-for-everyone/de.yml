description: |
  Wir von Bitcoin is for Everyone sind der festen Überzeugung, dass Bitcoin nicht nur den technisch Versierten oder den finanziell Privilegierten vorbehalten ist; es ist für jede einzelne Person gedacht, die die Kontrolle über ihre Finanzen übernehmen und die Zukunft des digitalen Handels gestalten möchte. Mit dieser Vision im Hinterkopf haben wir die Konferenz "Bitcoin is for Everyone" ins Leben gerufen, um die lokale Gemeinschaft von Portland, Oregon, zu stärken und zu schulen und sie zu einem integralen Bestandteil der zunehmend verbreiteten Welt von Bitcoin zu machen.
  