description: |
  En Bitcoin es para todos, creemos firmemente que Bitcoin no es exclusivo de los expertos en tecnología ni de los privilegiados económicamente; es para todas y cada una de las personas que quieren tomar el control de sus finanzas y dar forma al futuro del comercio digital. Con esta visión en mente, creamos la conferencia "Bitcoin es para todos" para capacitar y educar a la comunidad local de Portland, Oregón, y convertirla en parte integrante del mundo cada vez más extendido de Bitcoin.
  