description: |
  Me usume kindlalt, et Bitcoin ei ole mõeldud ainult tehnikahuvilistele või finantsiliselt privilegeeritud inimestele; see on mõeldud igale inimesele, kes soovib oma rahaasjade üle kontrolli võtta ja kujundada digitaalse kaubanduse tulevikku. Seda visiooni silmas pidades lõime konverentsi "Bitcoin on mõeldud kõigile", et anda kohalikule kogukonnale Portlandis, Oregonis, rohkem võimalusi ja haridust ning muuta nad Bitcoin üha enam leviva maailma lahutamatuks osaks.
  