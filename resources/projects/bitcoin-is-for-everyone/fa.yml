description: |
  در Bitcoin برای همه، ما به شدت معتقدیم که Bitcoin منحصر به افراد فنی یا دارای امتیازات مالی نیست؛ بلکه برای هر فردی است که می‌خواهد کنترل امور مالی خود را به دست گیرد و آینده تجارت دیجیتال را شکل دهد. با این دیدگاه، ما کنفرانس "Bitcoin برای همه است" را ایجاد کردیم تا جامعه محلی پورتلند، اورگان را توانمند و آموزش دهیم و آنها را به بخشی جدایی‌ناپذیر از دنیای روزافزون Bitcoin تبدیل کنیم.