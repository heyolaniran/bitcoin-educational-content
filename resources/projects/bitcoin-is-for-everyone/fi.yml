description: |
  Me Bitcoin:ssa uskomme vakaasti, että Bitcoin ei ole vain tekniikkaan perehtyneille tai taloudellisesti etuoikeutetuille, vaan se on tarkoitettu jokaiselle, joka haluaa hallita talouttaan ja muokata digitaalisen kaupankäynnin tulevaisuutta. Tätä visiota silmällä pitäen loimme konferenssin "Bitcoin is for Everyone" voimaannuttaaksemme ja kouluttaaksemme Oregonin Portlandin paikallisyhteisöä ja tehdaksemme heistä olennaisen osan yhä yleistyvää Bitcoin-maailmaa.
  