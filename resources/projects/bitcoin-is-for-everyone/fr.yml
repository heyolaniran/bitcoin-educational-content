description: |
  Chez Bitcoin is for Everyone, nous croyons fermement que le Bitcoin n'est pas réservé aux technophiles ou aux privilégiés financiers ; il s'adresse à toute personne désireuse de prendre le contrôle de ses finances et de façonner l'avenir du commerce numérique. C'est avec cette vision en tête que nous avons créé la conférence "Bitcoin est pour tout le monde" afin de responsabiliser et d'éduquer la communauté locale de Portland, Oregon, et de faire d'elle une partie intégrante du monde de plus en plus répandu de Bitcoin.
  