description: |
  Bitcoin सभी के लिए है, हम दृढ़ता से मानते हैं कि Bitcoin केवल तकनीक-प्रेमी या वित्तीय रूप से विशेषाधिकार प्राप्त लोगों के लिए नहीं है; यह हर उस व्यक्ति के लिए है जो अपने वित्त पर नियंत्रण रखना चाहता है और डिजिटल कॉमर्स के भविष्य को आकार देना चाहता है। इस दृष्टिकोण को ध्यान में रखते हुए, हमने पोर्टलैंड, ओरेगन के स्थानीय समुदाय को सशक्त बनाने और शिक्षित करने और उन्हें Bitcoin की बढ़ती प्रचलित दुनिया का एक अभिन्न अंग बनाने के लिए "Bitcoin सभी के लिए है" सम्मेलन बनाया।