description: |
  Di Bitcoin untuk Semua Orang, kami sangat yakin bahwa Bitcoin tidak eksklusif untuk orang yang mengerti teknologi atau orang yang memiliki hak istimewa secara finansial; Bitcoin adalah untuk setiap orang yang ingin mengendalikan keuangan mereka dan membentuk masa depan perdagangan digital. Dengan visi ini, kami menciptakan konferensi "Bitcoin untuk Semua Orang" untuk memberdayakan dan mengedukasi komunitas lokal di Portland, Oregon, dan menjadikan mereka bagian integral dari dunia Bitcoin yang semakin lazim.
  