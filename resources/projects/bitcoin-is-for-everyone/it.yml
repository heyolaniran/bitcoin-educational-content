description: |
  Noi di Bitcoin is for Everyone crediamo fermamente che Bitcoin non sia un'esclusiva degli esperti di tecnologia o dei privilegiati dal punto di vista finanziario; è per ogni singola persona che vuole prendere il controllo delle proprie finanze e plasmare il futuro del commercio digitale. Con questa visione in mente, abbiamo creato la conferenza "Bitcoin is for Everyone" per responsabilizzare ed educare la comunità locale di Portland, Oregon, e renderla parte integrante del mondo sempre più diffuso di Bitcoin.
  