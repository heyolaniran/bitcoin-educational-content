description: |
  Vi i Bitcoin er for alle er overbevist om at Bitcoin ikke er forbeholdt de teknisk kyndige eller de økonomisk privilegerte; det er for hver eneste person som ønsker å ta kontroll over økonomien sin og forme fremtiden for digital handel. Med denne visjonen i bakhodet skapte vi konferansen "Bitcoin er for alle" for å styrke og utdanne lokalsamfunnet i Portland, Oregon, og gjøre dem til en integrert del av den stadig mer utbredte Bitcoin-verdenen.
  