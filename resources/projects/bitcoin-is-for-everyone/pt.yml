description: |
  Na Bitcoin is for Everyone, acreditamos firmemente que a Bitcoin não é exclusiva para os peritos em tecnologia ou para os financeiramente privilegiados; é para todas as pessoas que querem assumir o controlo das suas finanças e moldar o futuro do comércio digital. Com esta visão em mente, criámos a conferência "Bitcoin is for Everyone" para capacitar e educar a comunidade local de Portland, Oregon, e torná-la parte integrante do mundo cada vez mais predominante do Bitcoin.
  