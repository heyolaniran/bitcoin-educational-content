description: |
  Мы в Bitcoin is for Everyone твердо верим, что Bitcoin - это не эксклюзив для технически подкованных или финансово привилегированных людей; это для каждого человека, который хочет взять под контроль свои финансы и сформировать будущее цифровой коммерции. Исходя из этого, мы создали конференцию "Bitcoin для всех", чтобы расширить возможности и просветить местное сообщество Портленда, штат Орегон, и сделать их неотъемлемой частью все более распространенного мира Bitcoin.
  