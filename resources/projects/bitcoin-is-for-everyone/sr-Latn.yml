description: |
  Na Bitcoin je za svakoga, čvrsto verujemo da Bitcoin nije isključivo za tehnički potkovane ili finansijski privilegovane; namenjen je svakoj osobi koja želi da preuzme kontrolu nad svojim finansijama i oblikuje budućnost digitalne trgovine. Sa ovom vizijom na umu, kreirali smo konferenciju "Bitcoin je za svakoga" kako bismo osnažili i edukovali lokalnu zajednicu Portlanda, Oregon, i učinili ih integralnim delom sve prisutnijeg sveta Bitcoin.