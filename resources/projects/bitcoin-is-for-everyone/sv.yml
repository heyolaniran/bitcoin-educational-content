description: |
  På Bitcoin är för alla är vi övertygade om att Bitcoin inte är exklusivt för de tekniskt kunniga eller de ekonomiskt privilegierade; det är för varje enskild person som vill ta kontroll över sina finanser och forma framtiden för digital handel. Med denna vision i åtanke skapade vi konferensen "Bitcoin is for Everyone" för att stärka och utbilda det lokala samhället i Portland, Oregon, och göra dem till en integrerad del av den alltmer utbredda Bitcoin-världen.
  