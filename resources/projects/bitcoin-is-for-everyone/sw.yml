description: |
  Katika Bitcoin ni ya Kila mtu, tunaamini kwa uthabiti kwamba Bitcoin si mahususi kwa wenye ujuzi wa teknolojia au walio na upendeleo wa kifedha; ni kwa kila mtu ambaye anataka kuchukua udhibiti wa fedha zao na kuunda mustakabali wa biashara ya kidijitali. Tukiwa na maono haya akilini, tuliunda kongamano la "Bitcoin ni la Kila Mtu" ili kuwezesha na kuelimisha jumuiya ya ndani ya Portland, Oregon, na kuwafanya kuwa sehemu muhimu ya ulimwengu unaozidi kuenea wa Bitcoin.
  