description: |
  مجله Bitcoin که در سال 2012 تأسیس شد، منبع برتر اخبار، تحلیل‌ها و تفسیرهای Bitcoin و Blockchain است.
  
  این مجله توسط Mihai Alisie و Vitalik Buterin بنیان‌گذاری شد و اکنون متعلق به BTC Media LLC است. تیم تحریریه مجله تلاش می‌کند محتوای دقیق، به‌موقع و مرتبط را به علاقه‌مندان، توسعه‌دهندگان، سرمایه‌گذاران و کارآفرینان Bitcoin ارائه دهد. آن‌ها فرصت‌های تبلیغاتی ارائه می‌دهند، به نویسندگان خود پرداخت می‌کنند، اما به شدت پرداخت‌های شخص ثالث برای پوشش خبری را ممنوع می‌کنند. کارکنان اغلب ارزهای دیجیتال دارند و سیاست افشای سخت‌گیرانه‌ای برای جلوگیری از تضاد منافع در نظر گرفته شده است.