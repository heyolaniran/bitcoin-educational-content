description: |
  2012 में स्थापित Bitcoin मैगज़ीन, Bitcoin और Blockchain समाचार, विश्लेषण और टिप्पणी के लिए एक शीर्ष स्रोत है।
  
  मिहाई एलिसी और विटालिक ब्यूटेरिन द्वारा स्थापित, यह अब BTC मीडिया LLC के स्वामित्व में है। पत्रिका की संपादकीय टीम का उद्देश्य Bitcoin के उत्साही लोगों, डेवलपर्स, निवेशकों और उद्यमियों को सटीक, समय पर और प्रासंगिक सामग्री प्रदान करना है। वे विज्ञापन के अवसर प्रदान करते हैं, अपने लेखकों को भुगतान करते हैं, लेकिन कवरेज के लिए तीसरे पक्ष के भुगतान को सख्ती से प्रतिबंधित करते हैं। कर्मचारी अक्सर क्रिप्टोकरेंसी रखते हैं, हितों के टकराव से बचने के लिए एक सख्त प्रकटीकरण नीति लागू करते हैं।