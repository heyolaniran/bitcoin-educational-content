description: |
  Magazyn Bitcoin, założony w 2012 roku, jest najlepszym źródłem wiadomości, analiz i komentarzy dotyczących Bitcoin i Blockchain.
  
  Założony przez Mihaia Alisie i Vitalika Buterina, jest obecnie własnością BTC Media LLC. Zespół redakcyjny magazynu ma na celu dostarczanie dokładnych, aktualnych i istotnych treści entuzjastom Bitcoin, deweloperom, inwestorom i przedsiębiorcom. Oferują możliwości reklamowe, płacą swoim autorom, ale surowo zabraniają płatności stronom trzecim za relacje. Personel często posiada kryptowaluty, z rygorystyczną polityką ujawniania informacji w celu uniknięcia konfliktów interesów.