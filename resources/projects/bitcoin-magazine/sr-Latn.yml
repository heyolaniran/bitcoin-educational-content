description: |
  Bitcoin Magazine, osnovan 2012. godine, je vrhunski izvor za vesti, analize i komentare o Bitcoin i Blockchain.
  
  Osnovali su ga Mihai Alisie i Vitalik Buterin, a sada je u vlasništvu BTC Media LLC. Urednički tim magazina ima za cilj da pruži tačan, pravovremen i relevantan sadržaj za Bitcoin entuzijaste, developere, investitore i preduzetnike. Nude mogućnosti za oglašavanje, plaćaju svojim autorima, ali strogo zabranjuju plaćanja trećih strana za izveštavanje. Osoblje često poseduje kriptovalute, uz strogu politiku otkrivanja informacija kako bi se izbegli sukobi interesa.