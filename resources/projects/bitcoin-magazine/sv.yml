description: |
  Bitcoin Magazine, som grundades 2012, är en toppkälla för nyheter, analyser och kommentarer om Bitcoin och Blockchain.
  
  Den grundades av Mihai Alisie och Vitalik Buterin och ägs nu av BTC Media LLC. Tidningens redaktion har som mål att tillhandahålla korrekt, aktuellt och relevant innehåll till Bitcoin-entusiaster, utvecklare, investerare och entreprenörer. De erbjuder annonseringsmöjligheter, betalar sina författare, men förbjuder strikt tredjepartsbetalningar för täckning. Personalen innehar ofta kryptovalutor, med en strikt upplysningspolicy på plats för att undvika intressekonflikter.