description: |
  Jarida la Bitcoin, lililoanzishwa mwaka wa 2012, ni chanzo kikuu cha habari, uchambuzi na maoni ya Bitcoin na Blockchain. 
  
  Ilianzishwa na Mihai Alisie na Vitalik Buterin, sasa inamilikiwa na BTC Media LLC. Timu ya wahariri wa gazeti hili inalenga kutoa maudhui sahihi, kwa wakati unaofaa na yanayofaa kwa wakereketwa wa Bitcoin, wasanidi programu, wawekezaji na wajasiriamali. Wanatoa fursa za utangazaji, wanalipa waandishi wao, lakini wanakataza kabisa malipo ya watu wengine kwa chanjo. Wafanyikazi mara nyingi hushikilia pesa za siri, na sera kali ya ufichuzi ili kuepusha migongano ya masilahi.