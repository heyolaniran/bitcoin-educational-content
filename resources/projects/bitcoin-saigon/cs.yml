description: |
  Cílem Bitcoin Saigon je přispět k vybudování silné místní sítě a komunity nadšenců Bitcoin, podnikatelů Bitcoin, vývojářů a výzkumníků Bitcoin, aby se posílilo vzdělávání, pokročily inovace a umožnilo se vytváření pracovních příležitostí pro lidi, kteří chtějí hrát aktivní roli v růstu širšího ekosystému Bitcoin.