description: |
  Bitcoin Saigon pretende contribuir a crear una sólida red local y una comunidad de entusiastas de Bitcoin, empresas de Bitcoin, desarrolladores e investigadores de Bitcoin con el fin de reforzar la educación, impulsar la innovación y permitir la creación de oportunidades de empleo para las personas que deseen desempeñar un papel activo en el crecimiento del ecosistema de Bitcoin en general.