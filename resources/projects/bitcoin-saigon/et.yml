description: |
  Bitcoin Saigoni eesmärk on aidata kaasa tugeva kohaliku Bitcoin entusiastide, Bitcoin ettevõtjate, Bitcoin arendajate ja teadlaste võrgustiku ja kogukonna loomisele, et tugevdada haridust, edendada innovatsiooni ja võimaldada töövõimaluste loomist inimestele, kes soovivad aktiivselt osaleda laiema Bitcoin ökosüsteemi arengus.