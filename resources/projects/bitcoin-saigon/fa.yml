description: |
  Bitcoin سایگون هدف دارد تا با ایجاد یک شبکه محلی قوی و جامعه‌ای از علاقه‌مندان به Bitcoin، کسب‌وکارهای Bitcoin، توسعه‌دهندگان و پژوهشگران Bitcoin، به تقویت آموزش، پیشرفت نوآوری و ایجاد فرصت‌های شغلی برای افرادی که به دنبال ایفای نقش فعال در رشد اکوسیستم گسترده‌تر Bitcoin هستند، کمک کند.