description: |
  Bitcoin Saigon vise à contribuer à la construction d'un réseau local solide et d'une communauté de passionnés de Bitcoin, d'entreprises Bitcoin, de développeurs et de chercheurs Bitcoin afin de renforcer l'éducation, de faire progresser l'innovation et de permettre la création d'opportunités d'emploi pour les personnes cherchant à jouer un rôle actif dans la croissance de l'écosystème Bitcoin au sens large.