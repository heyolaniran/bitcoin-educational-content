description: |
  Bitcoin Saigon bertujuan untuk berkontribusi dalam membangun jaringan lokal yang kuat dan komunitas penggemar Bitcoin, bisnis Bitcoin, pengembang & peneliti Bitcoin dalam rangka memperkuat pendidikan, memajukan inovasi, dan memungkinkan terciptanya lapangan kerja bagi orang-orang yang ingin berperan aktif dalam pertumbuhan ekosistem Bitcoin yang lebih luas.