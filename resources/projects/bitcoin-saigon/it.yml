description: |
  Bitcoin Saigon intende contribuire a costruire una forte rete locale e una comunità di appassionati di Bitcoin, imprese, sviluppatori e ricercatori di Bitcoin al fine di rafforzare l'istruzione, far progredire l'innovazione e consentire la creazione di opportunità di lavoro per le persone che desiderano svolgere un ruolo attivo nella crescita del più ampio ecosistema di Bitcoin.