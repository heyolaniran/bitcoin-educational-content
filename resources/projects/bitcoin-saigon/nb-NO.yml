description: |
  Bitcoin Saigon har som mål å bidra til å bygge et sterkt lokalt nettverk og fellesskap av Bitcoin-entusiaster, Bitcoin-virksomheter, Bitcoin-utviklere og -forskere for å styrke utdanningen, fremme innovasjon og gjøre det mulig å skape sysselsettingsmuligheter for folk som ønsker å spille en aktiv rolle i veksten av det bredere Bitcoin-økosystemet.