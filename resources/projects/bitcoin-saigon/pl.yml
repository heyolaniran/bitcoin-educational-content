description: |
  Bitcoin Saigon ma na celu przyczynienie się do zbudowania silnej lokalnej sieci i społeczności entuzjastów Bitcoin, biznesu Bitcoin, programistów i badaczy Bitcoin w celu wzmocnienia edukacji, rozwoju innowacji i umożliwienia tworzenia możliwości zatrudnienia dla osób, które chcą odgrywać aktywną rolę w rozwoju szerszego ekosystemu Bitcoin.