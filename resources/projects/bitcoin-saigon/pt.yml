description: |
  O Bitcoin Saigon pretende contribuir para a construção de uma forte rede local e comunidade de entusiastas do Bitcoin, empresas do Bitcoin, programadores e investigadores do Bitcoin, a fim de reforçar a educação, promover a inovação e permitir a criação de oportunidades de emprego para as pessoas que procuram desempenhar um papel ativo no crescimento do ecossistema Bitcoin em geral.