description: |
  Bitcoin Saigon ima za cilj da doprinese izgradnji snažne lokalne mreže i zajednice entuzijasta Bitcoin, Bitcoin poslovanja, Bitcoin programera i istraživača kako bi se ojačalo obrazovanje, unapredila inovacija i omogućilo stvaranje mogućnosti za zapošljavanje za ljude koji žele da igraju aktivnu ulogu u rastu šireg Bitcoin ekosistema.