description: |
  Bitcoin Saigon syftar till att bidra till att bygga ett starkt lokalt nätverk och gemenskap av Bitcoin-entusiaster, Bitcoin-affärer, Bitcoin-utvecklare och forskare för att stärka utbildningen, främja innovation och möjliggöra skapandet av sysselsättningsmöjligheter för människor som vill spela en aktiv roll i tillväxten av det bredare Bitcoin-ekosystemet.