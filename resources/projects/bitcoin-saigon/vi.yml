description: |
  Bitcoin Saigon mong muốn góp phần xây dựng mạng lưới và cộng đồng địa phương vững mạnh gồm những người đam mê Bitcoin, doanh nghiệp Bitcoin, nhà phát triển và nhà nghiên cứu Bitcoin nhằm tăng cường giáo dục, thúc đẩy đổi mới sáng tạo và tạo ra cơ hội việc làm cho những người muốn đóng vai trò tích cực trong sự phát triển của hệ sinh thái Bitcoin rộng lớn hơn.