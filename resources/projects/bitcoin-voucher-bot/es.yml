description: |
  Un Mercado Bitcoin dentro de Telegram. Un Interface simple donde todos los servicios son a través del Bot, donde el Equipo es accesible para las necesidades de pre-venta y post-venta. No hay necesidad de un sitio web o una aplicación, tales aplicaciones móviles o páginas web que recopilan información y degradan su privacidad. No hay IP recogidas, no hay cookies establecidas, es sólo un procedimiento puro de Telegram con privacidad mejorada. De hecho, recargar con un Cupón Bitcoin es exactamente lo mismo que recargar un teléfono móvil. Sin documentos dentro de los umbrales, sin riesgos.
  