description: |
  Une place de marché Bitcoin dans Telegram. Un simple Interface où tous les services passent par le Bot, où l'équipe est joignable pour les besoins de prévente et d'après-vente. Il n'y a pas besoin d'un site web ou d'une application, comme les applications mobiles ou les pages web qui collectent des informations et dégradent votre vie privée. Il n'y a pas de collecte d'IP, pas de cookies, il s'agit juste d'une procédure Telegram pure avec une confidentialité accrue. En fait, recharger avec un bon Bitcoin est exactement la même chose que recharger un téléphone mobile. Aucun document ne dépasse les seuils, aucun risque.
  