description: |
  テレグラム内のBitcoinマーケットプレイス。シンプルなInterfaceでは、すべてのサービスがボットを介して行われ、販売前や販売後のニーズに対してチームと連絡を取ることができます。ウェブサイトやアプリケーションは必要ありません。モバイルアプリケーションやウェブページは、情報を収集し、プライバシーを低下させます。IPを集めることも、クッキーを設定することもなく、プライバシーが強化された純粋なテレグラムの手続きだけです。実際、Bitcoinバウチャーを使ったトッピングアップは、携帯電話のトッピングアップとまったく同じです。閾値内の書類もなく、リスクもありません。
  