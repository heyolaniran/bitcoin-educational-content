description: |
  En Bitcoin markedsplass inne i Telegram. En enkel Interface der alle tjenester er gjennom Bot, der teamet er tilgjengelig for behov før salg og etter salg. Det er ikke behov for et nettsted eller en applikasjon, for eksempel mobilapper eller websider som samler inn informasjon og forringer personvernet ditt. Det er ingen IP samlet, ingen informasjonskapsler satt, det er bare en ren Telegram-prosedyre med forbedret personvern. Faktisk er det å fylle på med en Bitcoin Voucher nøyaktig det samme som å fylle på en mobiltelefon. Ingen dokumenter innenfor terskelverdiene, ingen risiko.
  