description: |
  Um Marketplace Bitcoin dentro do Telegram. Um simples Interface onde todos os serviços são através do Bot, onde a Equipa está contactável para necessidades de pré-venda e pós-venda. Não há necessidade de um site ou aplicativo, como aplicativos móveis ou páginas da web que coletam informações e degradam sua privacidade. Não há IP recolhido, nem cookies instalados, é apenas um procedimento puro de Telegram com privacidade reforçada. De facto, carregar com um Voucher Bitcoin é exatamente o mesmo que carregar um telemóvel. Não há documentos dentro dos limites, não há riscos.
  