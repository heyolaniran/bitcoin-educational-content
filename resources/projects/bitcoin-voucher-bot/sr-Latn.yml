description: |
  Tržište Bitcoin unutar Telegrama. Jednostavan Interface gde su sve usluge preko Bota, gde je Tim dostupan za potrebe pre-prodaje i post-prodaje. Nema potrebe za vebsajtom ili aplikacijom, kao što su mobilne aplikacije ili veb stranice koje prikupljaju informacije i narušavaju vašu privatnost. Nema prikupljanja IP adresa, nema postavljenih kolačića, to je samo čista Telegram procedura sa poboljšanom privatnošću. U stvari, dopunjavanje sa Bitcoin vaučerom je potpuno isto kao dopunjavanje mobilnog telefona. Nema dokumenata unutar pragova, nema rizika.