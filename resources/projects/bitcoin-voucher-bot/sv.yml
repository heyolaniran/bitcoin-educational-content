description: |
  En Bitcoin-marknadsplats inuti Telegram. En enkel Interface där alla tjänster är genom Bot, där teamet är nåbart för behov före och efter försäljning. Det finns inget behov av en webbplats eller en applikation, sådana mobilappar eller webbsidor som samlar in information och försämrar din integritet. Det finns ingen IP samlad, inga cookies inställda, det är bara ett rent Telegram-förfarande med förbättrad integritet. Att fylla på med en Bitcoin Voucher är faktiskt exakt samma sak som att fylla på en mobiltelefon. Inga dokument inom tröskelvärdena, inga risker.
  