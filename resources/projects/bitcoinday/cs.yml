description: |
  BitcoinDay je lokální, jednodenní, rychlé a soustředěné shromáždění Bitcoin-only, jehož cílem je maximalizovat signál a konektivitu a minimalizovat ozvěnu a šum. Je navržen tak, aby usnadnil spojení mezi vlivnými osobami Bitcoin a plebsem. Přitahujeme vysoce kvalifikované, odborné řečníky, kteří s námi stráví celý den a komunikují s účastníky na pódiu i mimo něj. Snažíme se udržovat místní prostředí malých setkání, kde má každý možnost vzájemně komunikovat. Naším cílem je zprostředkovat kontakty, které přetrvají celý život, a inspirovat k pozitivním činům, které urychlí přechod k ekonomice Bitcoin.
  