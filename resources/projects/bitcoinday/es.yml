description: |
  El BitcoinDay es un encuentro localizado, de un solo día, rápido y centrado en Bitcoin, cuyo objetivo es maximizar la señal y la conectividad, y minimizar el eco y el ruido. Está diseñado para facilitar las conexiones entre las personas influyentes de Bitcoin y la plebe. Atraemos a ponentes expertos de gran calibre para que pasen el día con nosotros e interactúen con los participantes tanto dentro como fuera del escenario. Nos esforzamos por mantener un entorno de reunión local y reducido en el que todos tengan la oportunidad de interactuar entre sí. Nuestro objetivo es propiciar conexiones que duren toda la vida e inspirar acciones positivas que aceleren la transición a una economía Bitcoin.
  