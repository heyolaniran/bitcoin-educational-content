description: |
  BitcoinDay on kohalik, ühepäevane, kiire ja keskendunud Bitcoin-kogunemine, mille eesmärk on maksimeerida signaali ja ühenduvust ning minimeerida kaja ja müra. Selle eesmärk on hõlbustada ühendusi Bitcoin mõjutajate ja plebs vahel. Me meelitame kõrgetasemelisi, asjatundlikke kõnelejaid, kes veedavad päeva koos meiega ja suhtlevad osalejatega nii laval kui ka väljaspool lava. Töötame selle nimel, et säilitada kohalik, väike kogunemiskeskkond, kus kõigil on võimalus üksteisega suhelda. Meie eesmärk on luua sidemeid, mis kestavad kogu elu ja inspireerivad positiivset tegevust, mis kiirendab üleminekut Bitcoin majandusele.
  