description: |
  بیت‌کوین‌دی یک گردهمایی محلی، یک‌روزه، سریع و متمرکز فقط برای Bitcoin است که هدف آن به حداکثر رساندن سیگنال و اتصال و به حداقل رساندن اکو و نویز است. این رویداد برای تسهیل ارتباطات بین تأثیرگذاران Bitcoin و افراد عادی طراحی شده است. ما سخنرانان متخصص و باکیفیت را جذب می‌کنیم تا روز را با ما بگذرانند و با شرکت‌کنندگان هم بر روی صحنه و هم خارج از آن تعامل داشته باشند. ما تلاش می‌کنیم تا محیطی محلی و کوچک برای گردهمایی ایجاد کنیم که در آن همه فرصت تعامل با یکدیگر را داشته باشند. هدف ما تسهیل ارتباطاتی است که برای یک عمر باقی بمانند و اقدام مثبت را که انتقال به یک اقتصاد Bitcoin را تسریع می‌کند، الهام بخشند.