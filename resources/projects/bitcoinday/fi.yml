description: |
  BitcoinDay on paikallinen, yhden päivän mittainen, nopea ja keskittynyt Bitcoin-kokoontuminen, jonka tavoitteena on maksimoida signaali ja yhteydet ja minimoida kaiku ja kohina. Se on suunniteltu helpottamaan yhteyksiä Bitcoin-vaikuttajien ja tavallisten ihmisten välillä. Houkuttelemme korkeatasoisia asiantuntijapuhujia viettämään päivän kanssamme ja olemaan vuorovaikutuksessa osallistujien kanssa sekä lavalla että sen ulkopuolella. Pyrimme säilyttämään paikallisen, pienen kokoontumisympäristön, jossa kaikilla on mahdollisuus olla vuorovaikutuksessa toistensa kanssa. Tavoitteenamme on luoda yhteyksiä, jotka kestävät koko elämän ja innostavat positiivisiin toimiin, jotka nopeuttavat siirtymistä Bitcoin-talouteen.
  