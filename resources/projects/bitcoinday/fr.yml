description: |
  BitcoinDay est un rassemblement local, d'une seule journée, rapide et ciblé, réservé aux Bitcoin, qui vise à maximiser le signal et la connectivité, et à minimiser l'écho et le bruit. Il est conçu pour faciliter les connexions entre les influenceurs Bitcoin et les simples citoyens. Nous attirons des conférenciers experts de haut niveau pour passer la journée avec nous et interagir avec les participants sur et en dehors de la scène. Nous nous efforçons de maintenir un environnement de rassemblement local et restreint où chacun a la possibilité d'interagir avec les autres. Notre objectif est de créer des liens qui dureront toute une vie et d'inspirer des actions positives qui accélèrent la transition vers une économie Bitcoin.
  