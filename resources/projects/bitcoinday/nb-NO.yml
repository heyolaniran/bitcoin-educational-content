description: |
  BitcoinDay er en lokal, rask og fokusert Bitcoin-samling på én dag som har som mål å maksimere signal og tilkobling, og minimere ekko og støy. Det er designet for å legge til rette for forbindelser mellom Bitcoin-påvirkere og plebs. Vi tiltrekker oss dyktige foredragsholdere av høyt kaliber som tilbringer dagen sammen med oss og samhandler med deltakerne både på og utenfor scenen. Vi jobber for å opprettholde et lokalt, lite samlingsmiljø der alle har en sjanse til å samhandle med hverandre. Målet vårt er å skape forbindelser som varer livet ut, og inspirere til positiv handling som fremskynder overgangen til en Bitcoin-økonomi.
  