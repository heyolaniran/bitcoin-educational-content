description: |
  O BitcoinDay é um encontro localizado, de um único dia, rápido e focado apenas no Bitcoin, que visa maximizar o sinal e a conetividade, e minimizar o eco e o ruído. Ele é projetado para facilitar as conexões entre os influenciadores do Bitcoin e os plebeus. Atraímos oradores especializados e de alto calibre para passar o dia connosco e interagir com os participantes dentro e fora do palco. Trabalhamos para manter um ambiente local, de pequenas reuniões, onde todos têm a oportunidade de interagir uns com os outros. O nosso objetivo é criar ligações que durem uma vida inteira e inspirar acções positivas que acelerem a transição para uma economia Bitcoin.
  