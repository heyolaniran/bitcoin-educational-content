description: |
  BitcoinDay - это локализованное, однодневное, быстрое и сфокусированное собрание только для Bitcoin, цель которого - максимизировать сигнал и связь, и минимизировать эхо и шум. Он призван способствовать установлению связей между влиятельными лицами Bitcoin и обывателями. Мы привлекаем высококлассных экспертов, которые проводят с нами день и взаимодействуют с участниками как на сцене, так и вне ее. Мы стараемся поддерживать локальную, небольшую атмосферу, где у каждого есть шанс пообщаться друг с другом. Наша цель - наладить связи, которые останутся на всю жизнь, и вдохновить на позитивные действия, ускоряющие переход к экономике Bitcoin.
  