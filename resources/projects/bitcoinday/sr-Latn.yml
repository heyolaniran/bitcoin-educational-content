description: |
  BitcoinDay je lokalizovano, jednodnevno, brzo i fokusirano okupljanje isključivo za Bitcoin koje ima za cilj da maksimizira signal i povezanost, a minimizira eho i buku. Dizajnirano je da olakša povezivanje između Bitcoin influensera i plebsa. Privlačimo vrhunske, stručne govornike da provedu dan sa nama i interaguju sa učesnicima kako na bini, tako i van nje. Radimo na održavanju lokalnog, malog okupljanja gde svako ima priliku da se poveže sa drugima. Naš cilj je da olakšamo veze koje će trajati ceo život i inspirišemo pozitivne akcije koje ubrzavaju tranziciju ka Bitcoin ekonomiji.