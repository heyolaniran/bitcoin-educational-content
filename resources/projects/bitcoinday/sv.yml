description: |
  BitcoinDay är en lokal, snabb och fokuserad Bitcoin-sammankomst på en enda dag som syftar till att maximera signal och anslutning och minimera eko och brus. Det är utformat för att underlätta förbindelser mellan Bitcoin-influencers och plebs. Vi lockar högkalibriga experttalare att tillbringa dagen med oss och interagera med deltagarna både på och utanför scenen. Vi arbetar för att upprätthålla en lokal, liten samlingsmiljö där alla har en chans att interagera med varandra. Vårt mål är att skapa kontakter som varar livet ut och inspirera till positiva åtgärder som påskyndar övergången till en Bitcoin-ekonomi.
  