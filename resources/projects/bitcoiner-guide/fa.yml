description: |
  نام من QnA است. من یک بیت‌کوینر هستم و دوست دارم به بیت‌کوینرهای دیگر کمک کنم.
  
  روزهایم را صرف ساخت ابزارهای حاکمیتی متمرکز بر Bitcoin در Foundation می‌کنم.
  
  این سایت مجموعه‌ای از مشارکت‌های من است که می‌توانم افراد را به سمت آن هدایت کنم تا به آن‌ها در مسیرشان کمک کنم. اگر آن را ارزشمند یافتید، لطفاً آن را با همتایان خود به اشتراک بگذارید و به مشارکت یا ارسال انعام فکر کنید.