description: |
  Moje ime je QnA. Ja sam Bitcoiner i volim da pomažem drugim Bitcoinerima.
  
  Provodim dane praveći alate za suverenitet fokusirane na Bitcoin u Foundation.
  
  Ovaj sajt je zbirka mojih doprinosa koje mogu pokazati ljudima kako bih im pomogao na njihovom putovanju. Ako vam je koristan, podelite ga sa svojim kolegama i razmislite o doprinosu ili slanju napojnice.