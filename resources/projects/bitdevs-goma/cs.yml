description: |
   BitDevs Goma je otevřená komunita, která sdružuje nadšence do Bitcoin, kryptografie a decentralizovaných protokolů. Podporuje výzkum a vývoj kolem Bitcoin tím, že pravidelně sdružuje vývojáře, výzkumníky, podnikatele a zvědavce. Její setkání jsou příležitostí k důkladnému prozkoumání technických aspektů Bitcoin, k diskusi o nejnovějších pokrocích v ekosystému a k posílení místní kultury přispívání ke svobodnému softwaru.