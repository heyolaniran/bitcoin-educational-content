description: |
   BitDevs Goma ist eine offene Gemeinschaft, die Enthusiasten von Bitcoin, Kryptographie und dezentralisierten Protokollen zusammenbringt. Sie fördert die Forschung und Entwicklung rund um Bitcoin, indem sie regelmäßig Entwickler, Forscher, Unternehmer und Neugierige zusammenbringt. Die Treffen bieten die Gelegenheit, die technischen Aspekte von Bitcoin eingehend zu erforschen, die neuesten Fortschritte im Ökosystem zu diskutieren und eine lokale Kultur des Beitrags zu freier Software zu stärken.