description: |
   BitDevs Goma es una comunidad abierta que reúne a entusiastas de Bitcoin, la criptografía y los protocolos descentralizados. Fomenta la investigación y el desarrollo en torno a Bitcoin reuniendo periódicamente a desarrolladores, investigadores, emprendedores y curiosos. Sus reuniones son una oportunidad para explorar en profundidad los aspectos técnicos de Bitcoin, debatir los últimos avances del ecosistema y reforzar una cultura local de contribución al software libre.