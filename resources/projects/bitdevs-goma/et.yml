description: |
   BitDevs Goma on avatud kogukond, mis toob kokku Bitcoin, krüptograafia ja detsentraliseeritud protokollide entusiastid. See julgustab Bitcoin ümber toimuvat uurimistööd ja arendustegevust, tuues regulaarselt kokku arendajad, teadlased, ettevõtjad ja uudishimulikud. Selle kohtumised annavad võimaluse uurida põhjalikult Bitcoin tehnilisi aspekte, arutada ökosüsteemi viimaseid edusamme ja tugevdada vaba tarkvarasse panustamise kohalikku kultuuri.