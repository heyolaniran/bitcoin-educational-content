description: |
   بیت‌دوِز گوما یک جامعه باز است که علاقه‌مندان به Bitcoin، رمزنگاری و پروتکل‌های غیرمتمرکز را گرد هم می‌آورد. این جامعه با گردهمایی منظم توسعه‌دهندگان، پژوهشگران، کارآفرینان و کنجکاوان، به تحقیق و توسعه پیرامون Bitcoin تشویق می‌کند. جلسات آن فرصتی برای بررسی عمیق جنبه‌های فنی Bitcoin، بحث در مورد آخرین پیشرفت‌های اکوسیستم و تقویت فرهنگ محلی مشارکت در نرم‌افزار آزاد است.