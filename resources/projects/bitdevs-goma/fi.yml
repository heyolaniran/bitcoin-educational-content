description: |
   BitDevs Goma on avoin yhteisö, joka kokoaa yhteen Bitcoin:n, kryptografian ja hajautettujen protokollien harrastajat. Se kannustaa Bitcoin:n ympärillä tapahtuvaan tutkimukseen ja kehitykseen tuomalla säännöllisesti yhteen kehittäjiä, tutkijoita, yrittäjiä ja uteliaita. Sen kokoukset tarjoavat tilaisuuden tutustua syvällisesti Bitcoin:n teknisiin näkökohtiin, keskustella ekosysteemin uusimmista edistysaskelista ja vahvistaa paikallista vapaiden ohjelmistojen edistämiskulttuuria.