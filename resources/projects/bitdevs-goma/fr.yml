description: |
   BitDevs Goma est une communauté ouverte qui rassemble des passionnés de Bitcoin, de cryptographie et de protocoles décentralisés. Elle encourage la recherche et le développement autour de Bitcoin en réunissant régulièrement développeurs, chercheurs, entrepreneurs et curieux. Ses rencontres sont l’occasion d’explorer en profondeur les aspects techniques de Bitcoin, de discuter des dernières avancées de l’écosystème et de renforcer une culture locale de contribution au logiciel libre.
