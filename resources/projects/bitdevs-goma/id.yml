description: |
   BitDevs Goma adalah sebuah komunitas terbuka yang menyatukan para penggemar Bitcoin, kriptografi, dan protokol terdesentralisasi. Komunitas ini mendorong penelitian dan pengembangan seputar Bitcoin dengan secara teratur mempertemukan para pengembang, peneliti, pengusaha, dan mereka yang ingin tahu. Pertemuannya merupakan kesempatan untuk mengeksplorasi aspek teknis Bitcoin secara mendalam, mendiskusikan kemajuan terbaru dalam ekosistem dan memperkuat budaya kontribusi lokal untuk perangkat lunak bebas.