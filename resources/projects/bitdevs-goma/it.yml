description: |
   BitDevs Goma è una comunità aperta che riunisce gli appassionati di Bitcoin, crittografia e protocolli decentralizzati. Incoraggia la ricerca e lo sviluppo di Bitcoin riunendo regolarmente sviluppatori, ricercatori, imprenditori e curiosi. I suoi incontri sono un'opportunità per esplorare gli aspetti tecnici di Bitcoin in profondità, discutere gli ultimi progressi nell'ecosistema e rafforzare una cultura locale di contributo al software libero.