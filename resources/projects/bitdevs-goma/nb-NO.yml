description: |
   BitDevs Goma er et åpent fellesskap som samler entusiaster av Bitcoin, kryptografi og desentraliserte protokoller. Det oppmuntrer til forskning og utvikling rundt Bitcoin ved regelmessig å samle utviklere, forskere, entreprenører og nysgjerrige. Møtene er en mulighet til å utforske de tekniske aspektene ved Bitcoin i dybden, diskutere de siste fremskrittene i økosystemet og styrke en lokal kultur for å bidra til fri programvare.