description: |
   BitDevs Goma to otwarta społeczność, która zrzesza entuzjastów Bitcoin, kryptografii i zdecentralizowanych protokołów. Zachęca do badań i rozwoju wokół Bitcoin, regularnie gromadząc deweloperów, badaczy, przedsiębiorców i ciekawskich. Spotkania są okazją do dogłębnego zbadania technicznych aspektów Bitcoin, omówienia najnowszych osiągnięć w ekosystemie i wzmocnienia lokalnej kultury wkładu w wolne oprogramowanie.