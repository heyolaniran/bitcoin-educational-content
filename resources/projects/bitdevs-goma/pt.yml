description: |
   BitDevs Goma é uma comunidade aberta que reúne entusiastas do Bitcoin, criptografia e protocolos descentralizados. Incentiva a investigação e o desenvolvimento em torno do Bitcoin, reunindo regularmente programadores, investigadores, empresários e curiosos. Os seus encontros são uma oportunidade para explorar em profundidade os aspectos técnicos do Bitcoin, discutir os últimos avanços no ecossistema e reforçar uma cultura local de contribuição para o software livre.