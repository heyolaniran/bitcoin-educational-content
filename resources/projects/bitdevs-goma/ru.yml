description: |
   BitDevs Goma - это открытое сообщество, объединяющее энтузиастов Bitcoin, криптографии и децентрализованных протоколов. Оно поощряет исследования и разработки вокруг Bitcoin, регулярно собирая разработчиков, исследователей, предпринимателей и просто любопытных. Встречи сообщества дают возможность глубоко изучить технические аспекты Bitcoin, обсудить последние достижения в экосистеме и укрепить местную культуру вклада в свободное программное обеспечение.