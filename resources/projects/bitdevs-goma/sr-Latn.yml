description: |
   BitDevs Goma je otvorena zajednica koja okuplja entuzijaste Bitcoin, kriptografije i decentralizovanih protokola. Podstiče istraživanje i razvoj oko Bitcoin redovnim okupljanjem programera, istraživača, preduzetnika i radoznalih. Njeni sastanci su prilika da se detaljno istraže tehnički aspekti Bitcoin, diskutuju najnoviji napreci u ekosistemu i ojača lokalna kultura doprinosa slobodnom softveru.