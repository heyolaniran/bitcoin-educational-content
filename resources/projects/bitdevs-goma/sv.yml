description: |
   BitDevs Goma är ett öppet community som sammanför entusiaster av Bitcoin, kryptografi och decentraliserade protokoll. Det uppmuntrar forskning och utveckling kring Bitcoin genom att regelbundet sammanföra utvecklare, forskare, entreprenörer och nyfikna. Mötena är en möjlighet att utforska de tekniska aspekterna av Bitcoin på djupet, diskutera de senaste framstegen i ekosystemet och förstärka en lokal kultur av bidrag till fri programvara.