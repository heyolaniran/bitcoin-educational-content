description: |
   BitDevs Goma ni jumuiya iliyo wazi inayoleta pamoja wapenda Bitcoin, cryptography na itifaki zilizogatuliwa. Inahimiza utafiti na maendeleo karibu na Bitcoin kwa kuleta pamoja mara kwa mara watengenezaji, watafiti, wajasiriamali na wadadisi. Mikutano yake ni fursa ya kuchunguza vipengele vya kiufundi vya Bitcoin kwa kina, kujadili maendeleo ya hivi punde katika mfumo wa ikolojia na kuimarisha utamaduni wa ndani wa kuchangia programu bila malipo.