description: |
   BitDevs Goma là một cộng đồng mở tập hợp những người đam mê Bitcoin, mật mã và giao thức phi tập trung. Cộng đồng này khuyến khích nghiên cứu và phát triển xung quanh Bitcoin bằng cách thường xuyên tập hợp các nhà phát triển, nhà nghiên cứu, doanh nhân và những người tò mò. Các cuộc họp của cộng đồng này là cơ hội để khám phá sâu hơn các khía cạnh kỹ thuật của Bitcoin, thảo luận về những tiến bộ mới nhất trong hệ sinh thái và củng cố văn hóa đóng góp cho phần mềm miễn phí tại địa phương.