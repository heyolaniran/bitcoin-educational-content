description: |
  Osnovan 2012. godine, Bitfinex je jedna od prvih berzi kriptovaluta, pružajući visok standard trgovinskih iskustava za različite korisnike. Sa fokusom na sigurnost i efikasnost, Bitfinex nudi skoro 200 tokena i 400 spot trgovinskih parova, zajedno sa preko 60 perpetualnih futures ugovora. Inspirisan etosom Bitcoin, misija Bitfinexa je razvijanje tehnologije koja omogućava slobodne i privatne transakcije i interakcije.
  
  Bitfinex ulaže u obrazovne inicijative kako bi promovisao razumevanje Bitcoin i finansijsku inkluziju. Tim lidera, uključujući CEO-a JL van der Velde i CFO-a Giancarlo Devasini, donosi decenije iskustva u tehnologiji, finansijama i usklađenosti. Bitfinex pruža API-je za potpunu integraciju sa trgovinskim platformama i nudi korisničku podršku putem svoje online platforme.