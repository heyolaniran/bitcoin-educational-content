description: |
  Bitfinex grundades 2012 och är en av de första kryptovalutabörserna som tillhandahåller högklassiga handelsupplevelser för olika kunder. Med fokus på säkerhet och effektivitet listar Bitfinex nästan 200 tokens och 400 spothandelspar, tillsammans med över 60 eviga terminskontrakt. Inspirerat av Bitcoin:s etos är Bitfinex uppdrag att utveckla teknik som underlättar fria och privata transaktioner och interaktioner.
  
  Bitfinex investerar i utbildningsinitiativ för att främja förståelsen för Bitcoin och finansiell inkludering. Ledningsgruppen, inklusive VD JL van der Velde och CFO Giancarlo Devasini, har årtionden av erfarenhet inom teknik, ekonomi och efterlevnad. Bitfinex tillhandahåller API:er för full integration med handelsplattformar och erbjuder kundsupport via sin onlineplattform.
  