description: |
  Bitfinex 成立於 2012 年，是最早的加密貨幣交易所之一，為不同客戶提供高標準的交易體驗。Bitfinex 專注於安全性和效率，列出了近 200 種代用幣和 400 個現貨交易對，以及 60 多個永久期貨合約。受 Bitcoin 精神的啟發，Bitfinex 的使命是開發能促進自由和私人交易與互動的技術。
  
  Bitfinex 投資於教育活動，以促進對 Bitcoin 和金融包容性的瞭解。包括 CEO JL van der Velde 和 CFO Giancarlo Devasini 在內的領導團隊，在技術、金融和合規方面擁有數十年的經驗。Bitfinex 提供與交易平台完全整合的 API，並透過其線上平台提供客戶支援。
  