description: |
  Bitika on ainult Bitcoin platvorm, mis asub Keenias ja mille eesmärk on muuta Bitcoin ostmine, müümine ja kasutamine kogu Ida-Aafrikas lihtsaks ja turvaliseks. Tänu lihtsale Interface-le ja sujuvale integratsioonile kohalike makseviisidega annab Bitika kasutajatele võimaluse pääseda otse Bitcoin majandusele ligi, ilma et muud krüptovaluutad segaksid neid.