description: |
  Bitika er en ren Bitcoin-plattform basert i Kenya, designet for å gjøre det enkelt og sikkert å kjøpe, selge og bruke Bitcoin i hele Øst-Afrika. Med en enkel Interface og sømløs integrering med lokale betalingsmetoder gir Bitika brukerne direkte tilgang tBitcoin-økonomien uten distraksjoner fra andre kryptovalutaer.