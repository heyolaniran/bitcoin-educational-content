description: |
  A Bitika é uma plataforma exclusiva de Bitcoin com sede no Quénia, concebida para tornar fácil e seguro comprar, vender e utilizar Bitcoin em toda a África Oriental. Com um Interface simples e uma integração perfeita com métodos de pagamento locais, a Bitika permite que os utilizadores acedam diretamente à economia do Bitcoin sem distracções de outras criptomoedas.