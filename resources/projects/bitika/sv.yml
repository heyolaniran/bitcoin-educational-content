description: |
  Bitika är en plattform för enbart Bitcoin baserad i Kenya, utformad för att göra det enkelt och säkert att köpa, sälja och använda Bitcoin i hela Östafrika. Med en enkel Interface och sömlös integration med lokala betalningsmetoder ger Bitika användare möjlighet att få tillgång till Bitcoin-ekonomin direkt utan distraktioner från andra kryptovalutor.