description: |
  Bitkey je inovativní řešení pro ukládání a správu Bitcoin Wallet vyvinuté společností Block, Inc., která stojí za aplikacemi Square a Cash App. Zařízení Bitkey je navrženo s ohledem na bezpečnost a snadné používání a je založeno na architektuře s více podpisy 2-de-3, která kombinuje místní klíč v zařízení Bitkey, klíč v mobilní aplikaci a třetí klíč zašifrovaný na zabezpečeném serveru.