description: |
  Bitkey ist eine innovative Bitcoin Wallet Speicher- und Verwaltungslösung, die von Block, Inc. entwickelt wurde, dem Unternehmen hinter Square und Cash App. Bitkey ist auf Sicherheit und Benutzerfreundlichkeit ausgelegt und basiert auf einer 2-de-3-Multisignatur-Architektur, die einen lokalen Schlüssel auf dem Bitkey-Gerät, einen Schlüssel in der mobilen App und einen dritten, auf einem sicheren Server verschlüsselten Schlüssel kombiniert.