description: |
  Bitkey es una innovadora solución de almacenamiento y gestión de Bitcoin Wallet desarrollada por Block, Inc. la empresa creadora de Square y Cash App. Diseñada para ofrecer seguridad y facilidad de uso, Bitkey se basa en una arquitectura multifirma 2-de-3, que combina una clave local en el dispositivo Bitkey, una clave en la app móvil y una tercera clave cifrada en un servidor seguro.