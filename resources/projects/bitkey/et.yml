description: |
  Bitkey on uuenduslik Bitcoin Wallet salvestus- ja halduslahendus, mille on välja töötanud Block, Inc. ettevõte Square'i ja Cash Appi taga. Bitkey on loodud turvalisuse ja kasutusmugavuse tagamiseks ning põhineb 2-d3-multiallkirjade arhitektuuril, mis ühendab kohaliku võtme Bitkey seadmes, võtme mobiilirakenduses ja kolmanda võtme, mis on krüpteeritud turvalises serveris.