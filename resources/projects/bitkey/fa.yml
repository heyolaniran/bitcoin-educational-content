description: |
  بیت‌کی یک راه‌حل نوآورانه برای ذخیره‌سازی و مدیریت Bitcoin Wallet است که توسط شرکت Block, Inc. توسعه یافته است، همان شرکتی که پشت Square و Cash App قرار دارد. بیت‌کی با هدف امنیت و سهولت استفاده طراحی شده و بر اساس معماری چندامضایی ۲ از ۳ ساخته شده است که ترکیبی از یک کلید محلی روی دستگاه بیت‌کی، یک کلید در اپلیکیشن موبایل و یک کلید سوم رمزگذاری‌شده روی یک سرور امن می‌باشد.