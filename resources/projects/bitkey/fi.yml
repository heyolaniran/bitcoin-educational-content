description: |
  Bitkey on innovatiivinen Bitcoin Wallet -tallennus- ja hallintaratkaisu, jonka on kehittänyt Block, Inc. yritys, joka on Square- ja Cash App -ohjelmien takana. Bitkey on suunniteltu turvalliseksi ja helppokäyttöiseksi, ja se perustuu 2-de-3-monialoitusarkkitehtuuriin, jossa yhdistyvät Bitkey-laitteessa oleva paikallinen avain, mobiilisovelluksessa oleva avain ja kolmas avain, joka on salattu suojatulla palvelimella.