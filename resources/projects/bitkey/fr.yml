description: |
  Bitkey est une solution innovante de stockage et de gestion de portefeuille Bitcoin développée par Block, Inc., la société derrière Square et Cash App. Conçu pour la sécurité et la simplicité d’utilisation, Bitkey repose sur une architecture multisignature 2-de-3, combinant une clé locale sur le dispositif Bitkey, une clé dans l’application mobile et une troisième clé chiffrée sur un serveur sécurisé.