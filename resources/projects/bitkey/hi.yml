description: |
  बिटकी एक अभिनव Bitcoin Wallet स्टोरेज और प्रबंधन समाधान है जिसे ब्लॉक, इंक. द्वारा विकसित किया गया है जो स्क्वायर और कैश ऐप के पीछे की कंपनी है। सुरक्षा और उपयोग में आसानी के लिए डिज़ाइन किया गया, बिटकी 2-डी-3 मल्टीसिग्नेचर आर्किटेक्चर पर आधारित है, जिसमें बिटकी डिवाइस पर एक स्थानीय कुंजी, मोबाइल ऐप में एक कुंजी और एक सुरक्षित सर्वर पर एन्क्रिप्ट की गई तीसरी कुंजी शामिल है।