description: |
  Bitkey adalah solusi penyimpanan dan manajemen Bitcoin Wallet yang inovatif yang dikembangkan oleh Block, Inc. perusahaan di balik Square dan Cash App. Dirancang untuk keamanan dan kemudahan penggunaan, Bitkey didasarkan pada arsitektur multisignature 2-de-3, yang menggabungkan kunci lokal pada perangkat Bitkey, kunci di aplikasi seluler dan kunci ketiga yang dienkripsi di server yang aman.