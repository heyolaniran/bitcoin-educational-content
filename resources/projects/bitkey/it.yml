description: |
  Bitkey è un'innovativa soluzione di archiviazione e gestione Bitcoin Wallet sviluppata da Block, Inc. la società dietro Square e Cash App. Progettata per garantire sicurezza e facilità d'uso, Bitkey si basa su un'architettura multi-firma 2-de-3, che combina una chiave locale sul dispositivo Bitkey, una chiave nell'applicazione mobile e una terza chiave crittografata su un server sicuro.