description: |
  Bitkey er en innovativ løsning for lagring og administrasjon av Bitcoin Wallet utviklet av Block, Inc. selskapet bak Square og Cash App. Bitkey er designet for sikkerhet og brukervennlighet, og er basert på en 2-de-3 multisignaturarkitektur som kombinerer en lokal nøkkel på Bitkey-enheten, en nøkkel i mobilappen og en tredje nøkkel som er kryptert på en sikker server.