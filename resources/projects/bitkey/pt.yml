description: |
  A Bitkey é uma solução inovadora de armazenamento e gestão de Bitcoin Wallet desenvolvida pela Block, Inc., a empresa por detrás da Square e da Cash App. Concebida para segurança e facilidade de utilização, a Bitkey baseia-se numa arquitetura de 2-de-3 assinaturas múltiplas, combinando uma chave local no dispositivo Bitkey, uma chave na aplicação móvel e uma terceira chave encriptada num servidor seguro.