description: |
  Bitkey - это инновационное решение для хранения и управления Bitcoin Wallet, разработанное компанией Block, Inc., создавшей Square и Cash App. Созданное для обеспечения безопасности и простоты использования, Bitkey основано на архитектуре 2-de-3 с несколькими подписями, сочетающей локальный ключ на устройстве Bitkey, ключ в мобильном приложении и третий ключ, зашифрованный на защищенном сервере.