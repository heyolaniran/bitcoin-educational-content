description: |
  Bitkey je inovativno Bitcoin Wallet rešenje za skladištenje i upravljanje koje je razvila kompanija Block, Inc., poznata po Square i Cash App aplikacijama. Dizajniran za sigurnost i jednostavnost korišćenja, Bitkey se zasniva na 2-od-3 multisignature arhitekturi, kombinujući lokalni ključ na Bitkey uređaju, ključ u mobilnoj aplikaciji i treći ključ šifrovan na sigurnom serveru.