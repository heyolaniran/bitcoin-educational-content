description: |
  Bitkey är en innovativ lösning för lagring och hantering av Bitcoin Wallet som utvecklats av Block, Inc. företaget bakom Square och Cash App. Bitkey är utformad för säkerhet och användarvänlighet och bygger på en 2-de-3 multisignaturarkitektur som kombinerar en lokal nyckel på Bitkey-enheten, en nyckel i mobilappen och en tredje nyckel som krypteras på en säker server.