description: |
  Bitkey là giải pháp lưu trữ và quản lý Bitcoin Wallet sáng tạo do Block, Inc., công ty đứng sau Square và Cash App, phát triển. Được thiết kế để bảo mật và dễ sử dụng, Bitkey dựa trên kiến trúc đa chữ ký 2-de-3, kết hợp khóa cục bộ trên thiết bị Bitkey, khóa trong ứng dụng di động và khóa thứ ba được mã hóa trên máy chủ an toàn.