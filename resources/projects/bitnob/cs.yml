description: |
  Bitnob využívá Lightning Network ke zjednodušení přeshraničních převodů, zejména v Africe. Její generální ředitel zdůrazňuje, že poslat 10 dolarů domů do Nigérie je nyní stejně snadné jako koupit si kávu v USA, což snižuje vysoké náklady a dlouhé lhůty typické pro tradiční služby převodů.
  