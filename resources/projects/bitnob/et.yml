description: |
  Bitnob kasutab Lightning Network, et lihtsustada piiriüleseid rahaülekandeid, eriti Aafrikas. Ettevõtte tegevjuht märgib, et 10 dollari saatmine koju Nigeeriasse on nüüd sama lihtne kui kohvi ostmine USAs, vähendades traditsioonilistele rahaülekandeteenustele omaseid kõrgeid kulusid ja pikka aega.
  