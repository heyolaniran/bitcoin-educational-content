description: |
  Bitnob hyödyntää Lightning Network:ta rajatylittävien rahalähetysten yksinkertaistamiseksi erityisesti Afrikassa. Sen toimitusjohtaja huomauttaa, että 10 dollarin lähettäminen kotiin Nigeriaan on nyt yhtä helppoa kuin kahvin ostaminen Yhdysvalloissa, mikä vähentää perinteisille rahalähetyspalveluille tyypillisiä korkeita kustannuksia ja pitkiä aikoja.
  