description: |
  Bitnob exploite le Lightning Network pour simplifier les transferts de fonds transfrontaliers, en particulier en Afrique. Son PDG souligne qu'il est désormais aussi facile d'envoyer 10 dollars chez soi au Nigeria que d'acheter un café aux États-Unis, ce qui réduit les coûts élevés et les délais typiques des services traditionnels de transfert de fonds.
  