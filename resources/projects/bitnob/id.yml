description: |
  Bitnob memanfaatkan Lightning Network untuk menyederhanakan pengiriman uang lintas batas, terutama di Afrika. CEO-nya menunjukkan bahwa mengirim $10 ke rumah di Nigeria sekarang semudah membeli kopi di AS, mengurangi biaya tinggi dan waktu yang lama yang biasa terjadi pada layanan pengiriman uang tradisional.
  