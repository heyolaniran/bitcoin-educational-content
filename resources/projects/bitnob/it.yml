description: |
  Bitnob sfrutta il Lightning Network per semplificare le rimesse transfrontaliere, in particolare in Africa. Il suo CEO sottolinea che inviare 10 dollari a casa in Nigeria è ora facile come comprare un caffè negli Stati Uniti, riducendo i costi elevati e i tempi lunghi tipici dei servizi di rimessa tradizionali.
  