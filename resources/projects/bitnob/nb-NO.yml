description: |
  Bitnob utnytter Lightning Network for å forenkle pengeoverføringer over landegrensene, særlig i Afrika. Administrerende direktør påpeker at det nå er like enkelt å sende 10 dollar hjem til Nigeria som å kjøpe en kaffe i USA, noe som reduserer de høye kostnadene og lange tidsbruken som er typisk for tradisjonelle pengeoverføringstjenester.
  