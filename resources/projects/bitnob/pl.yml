description: |
  Bitnob wykorzystuje Lightning Network do uproszczenia transgranicznych przekazów pieniężnych, szczególnie w Afryce. Dyrektor generalny Bitnob wskazuje, że wysłanie 10 USD do domu w Nigerii jest teraz tak proste, jak zakup kawy w USA, co zmniejsza wysokie koszty i długi czas typowy dla tradycyjnych usług przekazów pieniężnych.
  