description: |
  A Bitnob tira partido do Lightning Network para simplificar as remessas transfronteiriças, em especial em África. O seu diretor executivo salienta que enviar 10 dólares para casa na Nigéria é agora tão fácil como comprar um café nos EUA, reduzindo os custos elevados e os tempos demorados típicos dos serviços de remessas tradicionais.
  