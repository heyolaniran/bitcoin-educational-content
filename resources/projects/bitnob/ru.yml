description: |
  Bitnob использует Lightning Network для упрощения трансграничных денежных переводов, особенно в Африке. Генеральный директор компании отмечает, что отправить 10 долларов домой в Нигерию теперь так же просто, как купить кофе в США, что сокращает высокие расходы и длительные сроки, характерные для традиционных служб денежных переводов.
  