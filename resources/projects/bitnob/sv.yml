description: |
  Bitnob utnyttjar Lightning Network för att förenkla gränsöverskridande penningöverföringar, särskilt i Afrika. Företagets VD påpekar att det nu är lika enkelt att skicka 10 USD hem till Nigeria som att köpa kaffe i USA, vilket minskar de höga kostnader och långa väntetider som är typiska för traditionella överföringstjänster.
  