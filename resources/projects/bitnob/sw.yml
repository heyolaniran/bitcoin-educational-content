description: |
  Bitnob hutumia Lightning Network kurahisisha fedha zinazotumwa na kuvuka mipaka, hasa barani Afrika. Mkurugenzi Mtendaji wake anadokeza kuwa kutuma $10 nyumbani nchini Nigeria sasa ni rahisi kama kununua kahawa nchini Marekani, na hivyo kupunguza gharama kubwa na muda mrefu wa kawaida wa huduma za kawaida za kutuma pesa.
  