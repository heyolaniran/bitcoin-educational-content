description: |
  بیت‌پولیتو یک تیم دانشجویی در پلی‌تکنیک تورین است که به سرعت به عنوان یکی از پیشروترین ابتکارات Bitcoin در ایتالیا شناخته شده است. مأموریت این تیم پل زدن بین دانشگاه و صنعت Bitcoin است. در چهار سال از زمان تأسیس، بیت‌پولیتو رشد قابل توجهی داشته و همچنان به تعمیق درک و آگاهی از Bitcoin متعهد است.
  
  بیت‌پولیتو با تمرکز بر جنبه‌های تکنولوژیکی و اجتماعی، در حالی که از موضوعات سرمایه‌گذاری اجتناب می‌کند، فعالیت‌هایی از تحقیق و توسعه در علوم کامپیوتر و ریاضیات تا آموزش از طریق دوره‌ها و رویدادهای مختلف را شامل می‌شود. این تیم محتوای آموزشی منتشر می‌کند که رویکردی علمی را با سبکی جوانانه ترکیب می‌کند و بیش از ۶۰۰۰ دنبال‌کننده در تمامی پلتفرم‌های اجتماعی دارد.
  
  در میان ابتکارات آموزشی، موفق‌ترین آن‌ها 'بیت‌جنریشن' است، مجموعه‌ای از سخنرانی‌ها برای دبیرستان‌ها که نمای کلی محکمی از Bitcoin ارائه می‌دهد. علاوه بر این، بیت‌پولیتو آموزش داخلی را ترویج می‌کند و به اعضای خود امکان می‌دهد دانش خود را افزایش دهند و با شرکت‌های این بخش ارتباط برقرار کنند. این تیم به پروژه‌های FOSS در فضای Bitcoin به طور فعال کمک می‌کند و تجربه عملی با پروژه‌های چالش‌برانگیز دنیای واقعی را ارائه می‌دهد. علاوه بر این، اعضا دسترسی آسان‌تری به برنامه‌های آموزشی خارجی Bitcoin، پایان‌نامه‌های شرکتی، کارآموزی و فرصت‌های شغلی دارند.
  
  با الهام از جنبش 'Cypherpunk'، بیت‌پولیتو ارزش‌های آزادی، حریم خصوصی و اصول منبع باز را به اشتراک می‌گذارد. این تیم با نهادهای نهادی، کسب‌وکارها و سازمان‌ها در هر دو بخش عمومی و خصوصی همکاری می‌کند و از استفاده آزاد و مسئولانه از فناوری حمایت می‌کند.
  
  در حال حاضر، بیت‌پولیتو شامل حدود ۵۰ عضو فعال است که عمدتاً دانشجویان پلی‌تکنیک هستند، اما همچنین جوانانی از زمینه‌های متنوع. بیش از ۱۲۰ نفر با بیت‌پولیتو درگیر بوده‌اند که ۱۰ نفر اکنون در صنعت Bitcoin کار می‌کنند. این تیم قصد دارد حضور بین‌المللی خود را افزایش دهد و در عین حال به تأثیرگذاری قابل توجه در سطح محلی ادامه دهد.