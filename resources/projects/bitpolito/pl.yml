description: |
  BitPolito to zespół studentów Politecnico di Torino, który szybko stał się jedną z wiodących włoskich inicjatyw Bitcoin. Misją BitPolito jest łączenie środowiska akademickiego z przemysłem Bitcoin. W ciągu czterech lat od założenia, BitPolito doświadczył znacznego wzrostu i pozostaje oddany wspieraniu głębszego zrozumienia i świadomości Bitcoin.
  
  Koncentrując się zarówno na aspektach technologicznych, jak i społecznych, unikając jednocześnie tematów inwestycyjnych, działania BitPolito obejmują zarówno informatykę i matematyczne badania i rozwój, jak i edukację poprzez różne kursy i wydarzenia. Zespół publikuje treści edukacyjne, które łączą naukowe podejście z młodzieńczym stylem, mogąc pochwalić się ponad 6000 obserwujących na wszystkich platformach społecznościowych.
  
  Wśród jego inicjatyw edukacyjnych największym sukcesem jest "BitGeneration", seria wykładów dla szkół średnich, która zapewnia solidny przegląd Bitcoin. Ponadto BitPolito promuje szkolenia wewnętrzne, umożliwiając swoim członkom poszerzanie wiedzy i nawiązywanie kontaktów z firmami z branży. Zespół aktywnie uczestniczy w projektach FOSS w przestrzeni Bitcoin, oferując praktyczne doświadczenie w trudnych projektach w świecie rzeczywistym. Co więcej, członkowie mają łatwiejszy dostęp do zewnętrznych programów edukacyjnych Bitcoin, prac dyplomowych, staży i ofert pracy.
  
  Czerpiąc inspirację z ruchu "Cypherpunk", BitPolito podziela wartości wolności, prywatności i zasad open source. Zespół współpracuje z podmiotami instytucjonalnymi, firmami i organizacjami zarówno w sektorze publicznym, jak i prywatnym, opowiadając się za wolnym i odpowiedzialnym korzystaniem z technologii.
  
  Obecnie BitPolito składa się z około 50 aktywnych członków, głównie studentów Politechniki, ale także młodych ludzi z różnych środowisk. Ponad 120 osób było zaangażowanych w BitPolito, z czego 10 pracuje obecnie w branży Bitcoin. Zespół dąży do zwiększenia swojej obecności na arenie międzynarodowej, jednocześnie wywierając znaczący wpływ lokalnie.
  