description: |
  BitPolito je studentski tim na Politehničkom univerzitetu u Torinu koji se brzo etablirao kao jedna od vodećih Bitcoin inicijativa u Italiji. Misija je povezivanje akademske zajednice i Bitcoin industrije. U četiri godine od osnivanja, BitPolito je doživeo značajan rast i ostaje posvećen produbljivanju razumevanja i svesti o Bitcoin.
  
  Fokusirajući se na tehnološke i društvene aspekte, dok izbegava teme ulaganja, aktivnosti BitPolita kreću se od istraživanja i razvoja u oblasti računarskih nauka i matematike do obrazovanja kroz razne kurseve i događaje. Tim objavljuje edukativni sadržaj koji kombinuje naučni pristup sa mladalačkim stilom, sa preko 6.000 pratilaca na svim društvenim platformama.
  
  Među edukativnim inicijativama, najuspešnija je 'BitGeneration', serija predavanja za srednje škole koja pruža solidan pregled Bitcoin. Pored toga, BitPolito promoviše internu obuku, omogućavajući svojim članovima da unaprede svoje znanje i povežu se sa kompanijama u sektoru. Tim aktivno doprinosi FOSS projektima u Bitcoin prostoru, nudeći praktično iskustvo sa izazovnim projektima iz stvarnog sveta. Štaviše, članovi imaju lakši pristup spoljnim Bitcoin obrazovnim programima, korporativnim tezama, praksama i mogućnostima za zapošljavanje.
  
  Crpeći inspiraciju iz pokreta 'Cypherpunk', BitPolito deli vrednosti slobode, privatnosti i principa otvorenog koda. Tim sarađuje sa institucionalnim entitetima, preduzećima i organizacijama u javnom i privatnom sektoru, zalažući se za slobodnu i odgovornu upotrebu tehnologije.
  
  Trenutno, BitPolito se sastoji od oko 50 aktivnih članova, uglavnom studenata Politehnike, ali i mladih ljudi iz različitih sredina. Više od 120 pojedinaca bilo je uključeno u BitPolito, a 10 sada radi u Bitcoin industriji. Tim ima za cilj da poveća svoje međunarodno prisustvo dok nastavlja da pravi značajan uticaj lokalno.