description: |
  BitPolito är ett studentteam vid Politecnico di Torino som snabbt har etablerat sig som ett av Italiens ledande Bitcoin-initiativ. Uppdraget är att skapa en bro mellan den akademiska världen och Bitcoin-industrin. Under de fyra år som gått sedan starten har BitPolito upplevt en betydande tillväxt och är fortsatt dedikerade till att främja en djupare förståelse och medvetenhet om Bitcoin.
  
  BitPolito fokuserar på både tekniska och sociala aspekter, samtidigt som man undviker investeringsämnen, och BitPolitos aktiviteter sträcker sig från datavetenskap och matematisk FoU till utbildning genom olika kurser och evenemang. Teamet publicerar utbildningsinnehåll som kombinerar ett vetenskapligt tillvägagångssätt med en ungdomlig stil och har över 6 000 följare på alla sociala plattformar.
  
  Bland utbildningsinitiativen är det mest framgångsrika "BitGeneration", en föreläsningsserie för gymnasieskolor som ger en gedigen översikt över Bitcoin. Dessutom främjar BitPolito internutbildning, vilket gör det möjligt för medlemmarna att förbättra sin kunskap och få kontakt med företag i sektorn. Teamet bidrar aktivt till FOSS-projekt inom Bitcoin-området och erbjuder praktisk erfarenhet av utmanande projekt i den verkliga världen. Dessutom har medlemmarna enklare tillgång till externa Bitcoin-utbildningsprogram, företagsuppsatser, praktikplatser och jobbmöjligheter.
  
  BitPolito hämtar inspiration från "Cypherpunk"-rörelsen och delar värderingar om frihet, integritet och principer för öppen källkod. Teamet samarbetar med institutionella enheter, företag och organisationer i både den offentliga och privata sektorn och förespråkar fri och ansvarsfull användning av teknik.
  
  För närvarande består BitPolito av cirka 50 aktiva medlemmar, främst studenter från Polytechnic, men även ungdomar från olika bakgrunder. Mer än 120 personer har varit involverade i BitPolito, varav 10 nu arbetar inom Bitcoin-industrin. Teamet strävar efter att öka sin internationella närvaro samtidigt som man fortsätter att göra en betydande inverkan lokalt.
  