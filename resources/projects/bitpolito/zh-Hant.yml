description: |
  BitPolito 是都靈工學院的學生團隊，已迅速成為義大利領先的 Bitcoin 計畫之一。其使命是架起學術界與 Bitcoin 產業之間的橋梁。成立四年以來，BitPolito 經歷了顯著的成長，並持續致力於促進對 Bitcoin 的深入瞭解與認知。
  
  BitPolito 的活動著重於技術和社會兩方面，同時避免投資主題，活動範圍從電腦科學和數學研發，到透過各種課程和活動進行教育。該團隊發布的教育內容結合了科學方法與年輕風格，在所有社交平台上擁有超過 6,000 名追隨者。
  
  在其教育計畫中，最成功的是「BitGeneration」，這是一個針對高中的系列講座，提供 Bitcoin 的完整概觀。此外，BitPolito 還推動內部培訓，使其成員能夠增進知識，並與業內公司建立聯繫。團隊積極參與 Bitcoin 領域的 FOSS 專案，提供具挑戰性的實際專案實務經驗。此外，成員更容易獲得外部 Bitcoin 教育計畫、企業論文、實習和工作機會。
  
  BitPolito 從「Cypherpunk」運動中汲取靈感，分享自由、隱私和開源原則的價值觀。該團隊與公共和私營部門的機構實體、企業和組織合作，提倡自由和負責任地使用技術。
  
  目前，BitPolito 約有 50 名活躍成員，主要是理工學院的學生，但也有來自不同背景的年輕人。已有超過 120 人參與 BitPolito，其中 10 人現在就職於 Bitcoin 產業。該團隊的目標是提高其國際影響力，同時繼續在本地產生重大影響。
  