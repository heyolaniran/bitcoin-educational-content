description: |
  بیت‌شالا یک ابتکار آموزشی مردمی و جامعه‌محور (یک پاتشالا) است که توسط علاقه‌مندان هندی Bitcoin هدایت می‌شود و طراحی شده است تا توسعه‌دهندگان جدید را در آغاز سفر Bitcoin خود راهنمایی و حمایت کند.
  
  در حالی که دوره‌های زیادی وجود دارند که درس‌های سطحی درباره EVM و "قراردادهای هوشمند" ارائه می‌دهند، توسعه Bitcoin نیازمند درک عمیق‌تر و گسترده‌تری از زمینه‌های فنی مختلف است.
  
  Bitcoin یک موضوع چندرشته‌ای است که مهندسی نرم‌افزار، مهندسی سیستم، طراحی پروتکل‌های شبکه، نظریه بازی‌ها، رمزنگاری، اقتصاد و پویایی اجتماعی سیستم‌های پیچیده مانند بازارها را در بر می‌گیرد. به دلیل این پیچیدگی، ایجاد یک دوره جامع کامل Bitcoin تقریباً غیرممکن است و برنامه‌های دانشگاهی موجود یا بوت‌کمپ‌های کدنویسی نمی‌توانند به این نیازها پاسخ دهند. در نتیجه، تازه‌واردان به توسعه Bitcoin اغلب خود را در حال پیمایش در میان منابع پراکنده و به‌طور ضعیف سازمان‌یافته در سراسر اینترنت می‌یابند.
  
  بیت‌شالا به دنبال پر کردن این شکاف با ترویج ایجاد، مدیریت و انتشار محتوای متن‌باز متنوعی است که نیازهای یادگیری منحصر به فرد توسعه‌دهندگان آینده Bitcoin را برآورده می‌کند.