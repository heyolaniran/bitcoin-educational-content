description: |
  Bitshala to oddolna, społeczna inicjatywa edukacyjna (pathshala) prowadzona przez indyjskich entuzjastów Bitcoin, zaprojektowana w celu prowadzenia i wspierania nowych programistów, którzy rozpoczynają swoją przygodę z Bitcoin.
  
  Podczas gdy liczne kursy oferują powierzchowne lekcje na temat EVM i "inteligentnych kontraktów", rozwój Bitcoin wymaga znacznie głębszego i szerszego zrozumienia różnych dziedzin technicznych.
  
  Bitcoin to multidyscyplinarny temat, który obejmuje inżynierię oprogramowania, inżynierię systemów, projektowanie protokołów sieciowych, teorię gier, kryptografię, ekonomię i dynamikę społeczną złożonych systemów, takich jak rynki. Ze względu na tę złożoność, stworzenie w pełni kompleksowego kursu Bitcoin jest prawie niemożliwe, a istniejące programy akademickie lub obozy dla programistów nie są w stanie zaspokoić tych potrzeb. W rezultacie nowicjusze w rozwoju Bitcoin często znajdują się w szerokiej gamie luźno zorganizowanych zasobów rozproszonych w Internecie.
  
  Bitshala stara się wypełnić tę lukę, wspierając tworzenie, kuratorowanie i publikowanie różnorodnych treści open-source, które spełniają unikalne potrzeby edukacyjne początkujących programistów Bitcoin.
  