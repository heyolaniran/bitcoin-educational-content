description: |
  Bitshala je inicijativa za obrazovanje na nivou zajednice (pathshala) koju vode indijski entuzijasti Bitcoin, osmišljena da vodi i podržava nove developere dok započinju svoj put u svetu Bitcoin.
  
  Dok mnogi kursevi nude površne lekcije o EVM-u i "pametnim ugovorima", razvoj Bitcoin zahteva mnogo dublje i šire razumevanje različitih tehničkih oblasti.
  
  Bitcoin je multidisciplinarna oblast koja obuhvata Softversko Inženjerstvo, Inženjerstvo Sistema, Dizajn Mrežnih Protokola, Teoriju Igara, Kriptografiju, Ekonomiju i Društvenu Dinamiku Složenih Sistema poput tržišta. Zbog ove složenosti, kreiranje potpuno sveobuhvatnog Bitcoin kursa je gotovo nemoguće, a postojeći akademski programi ili boot kampovi za kodiranje ne uspevaju da zadovolje ove potrebe. Kao rezultat toga, novajlije u razvoju Bitcoin često se suočavaju sa navigacijom kroz širok spektar slabo organizovanih resursa rasutih po internetu.
  
  Bitshala nastoji da popuni ovu prazninu podsticanjem kreiranja, kuriranja i objavljivanja raznovrsnog sadržaja otvorenog koda koji zadovoljava jedinstvene potrebe učenja budućih Bitcoin developera.