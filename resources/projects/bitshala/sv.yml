description: |
  Bitshala är ett gräsrotsbaserat, community-drivet utbildningsinitiativ (en pathshala) som leds av indiska Bitcoin-entusiaster, utformat för att vägleda och stödja nya utvecklare när de påbörjar sin Bitcoin-resa.
  
  Medan många kurser där ute erbjuder ytliga lektioner om EVM och "smarta kontrakt", kräver Bitcoin-utveckling en mycket djupare och bredare förståelse för olika tekniska områden.
  
  Bitcoin är ett tvärvetenskapligt ämne som omfattar programvaruteknik, systemteknik, design av nätverksprotokoll, spelteori, kryptografi, ekonomi och den sociala dynamiken i komplexa system som marknader. På grund av denna komplexitet är det nästan omöjligt att skapa en heltäckande Bitcoin-kurs, och befintliga akademiska program eller kodningsstartläger räcker inte för att tillgodose dessa behov. Som ett resultat befinner sig nykomlingar i Bitcoin-utvecklingen ofta i en stor mängd löst organiserade resurser spridda över internet.
  
  Bitshala försöker fylla detta gap genom att främja skapande, kurering och publicering av olika innehåll med öppen källkod som uppfyller de unika inlärningsbehoven hos blivande Bitcoin-utvecklare.
  