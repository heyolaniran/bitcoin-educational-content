description: |
  Bitshala 是由印度 Bitcoin 熱愛者領導的草根、社群驅動的教育計畫 (pathshala)，目的是在新開發者踏上 Bitcoin 之旅時提供指導與支援。
  
  雖然市面上有許多課程提供 EVM 和「智慧型契約」的表面課程，但 Bitcoin 開發需要對各種技術領域有更深更廣的了解。
  
  Bitcoin 是一門多學科的課題，包含軟體工程、系統工程、網路協定設計、博弈論、加密學、經濟學以及複雜系統的社會動力（例如市場）。基於這種複雜性，創造一個完全全面的 Bitcoin 課程幾乎是不可能的，現有的學術課程或編碼訓練營也無法滿足這些需求。因此，Bitcoin 開發的新手經常會發現他們要瀏覽散落在網路上的大量組織鬆散的資源。
  
  Bitshala 尋求透過創造、整理和發佈多樣化的開源內容來填補這個缺口，以滿足有抱負的 Bitcoin 開發者獨特的學習需求。
  