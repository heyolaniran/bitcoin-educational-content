description: |
  BitSpenda on helpoin tapa käyttää Bitcoin:ta kaikkialla Afrikassa. BitcoinDuan tytäryhtiönä se kuroo umpeen Bitcoin:n ja mobiilirahan (MoMo) välisen kuilun ja mahdollistaa välittömät, turvalliset ja kohtuuhintaiset vaihdot ilman vaihtoja ja viiveitä. BitSpenda tekee jokapäiväisistä maksuista yksinkertaisia ja edistää Bitcoin:n käyttöönottoa saumattomien ja helppokäyttöisten transaktioiden avulla.