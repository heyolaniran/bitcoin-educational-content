description: |
  BitSpenda er den enkleste måten å bruke Bitcoin på i hele Afrika. BitSpenda er et datterselskap av BitcoinDua, og bygger bro mellom Bitcoin og Mobile Money (MoMo), noe som muliggjør umiddelbare, sikre og rimelige konverteringer uten veksling og forsinkelser. BitSpenda gjør hverdagsbetalinger enkle, og driver Bitcoin-adopsjon gjennom sømløse, tilgjengelige transaksjoner.