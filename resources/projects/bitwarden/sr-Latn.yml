description: |
  Bitwarden je menadžer lozinki otvorenog koda koji vam omogućava da skladištite, upravljate i sinhronizujete vaše akreditive na više uređaja. Dostupan putem aplikacija, ekstenzije za pregledač ili web Interface, Bitwarden šifruje vaše podatke. Transparentan i prijateljski prema privatnosti, Bitwarden je dizajniran za korisnike koji traže sigurno i pouzdano upravljanje lozinkama, a istovremeno ostaje fleksibilan i praktičan za svakodnevnu upotrebu.