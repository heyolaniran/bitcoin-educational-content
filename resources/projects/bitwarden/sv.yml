description: |
  Bitwarden är en lösenordshanterare med öppen källkod som låter dig lagra, hantera och synkronisera dina inloggningsuppgifter på flera enheter. Bitwarden är tillgänglig via appar, ett webbläsartillägg eller en webb-Interface och krypterar dina data. Bitwarden är transparent och integritetsvänlig och är utformad för användare som söker säker och tillförlitlig lösenordshantering samtidigt som den är flexibel och praktisk för daglig användning.
  