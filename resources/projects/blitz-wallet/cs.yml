description: |
  Blitz Wallet je samoobslužná mobilní aplikace Bitcoin Wallet navržená pro zjednodušení každodenního používání Bitcoin. Umožňuje snadno posílat, přijímat a utrácet bitcoiny v systémech Lightning, Liquid a eCash. Nabízí také praktické funkce, jako je nákup dárkových karet a integrace platebních systémů obchodníků.