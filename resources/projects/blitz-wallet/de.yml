description: |
  Blitz Wallet ist eine selbstverwaltete Bitcoin Wallet-Mobilanwendung, die entwickelt wurde, um die tägliche Nutzung von Bitcoin zu vereinfachen. Sie macht es einfach, Bitcoins mit Lightning, Liquid und eCash zu senden, zu empfangen und auszugeben. Sie bietet auch praktische Funktionen wie den Kauf von Geschenkkarten und die Integration von Zahlungssystemen von Händlern.