description: |
  Blitz Wallet es una aplicación móvil autocustodiada de Bitcoin Wallet diseñada para simplificar el uso diario de Bitcoin. Facilita el envío, la recepción y el gasto de bitcoins en Lightning, Liquid y eCash. También ofrece funciones prácticas como la compra de tarjetas regalo y la integración de sistemas de pago de comerciantes.