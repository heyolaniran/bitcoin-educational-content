description: |
  Blitz Wallet یک برنامه موبایل خود نگهدارنده Bitcoin Wallet است که برای ساده‌سازی استفاده روزمره از Bitcoin طراحی شده است. این برنامه ارسال، دریافت و خرج کردن بیت‌کوین‌ها را در Lightning، Liquid و eCash آسان می‌کند. همچنین ویژگی‌های کاربردی مانند خرید کارت هدیه و یکپارچه‌سازی سیستم پرداخت بازرگانان را ارائه می‌دهد.