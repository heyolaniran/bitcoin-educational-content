description: |
  Blitz Wallet est une application mobile de portefeuille Bitcoin self-custodial conçue pour simplifier l’usage quotidien de Bitcoin. Elle permet d’envoyer, de recevoir et de dépenser des bitcoins facilement sur Lightning, Liquid et eCash. Elle offre également des fonctionnalités pratiques comme l’achat de cartes cadeaux ou l’intégration d’un système de paiement pour les commerçants.