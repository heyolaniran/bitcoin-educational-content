description: |
  Blitz Wallet adalah aplikasi seluler Bitcoin Wallet kustodian mandiri yang dirancang untuk menyederhanakan penggunaan Bitcoin sehari-hari. Aplikasi ini memudahkan untuk mengirim, menerima, dan membelanjakan bitcoin di Lightning, Liquid, dan eCash. Aplikasi ini juga menawarkan fitur-fitur praktis seperti pembelian kartu hadiah dan integrasi sistem pembayaran pedagang.