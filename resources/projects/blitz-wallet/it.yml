description: |
  Blitz Wallet è un'applicazione mobile Bitcoin Wallet auto-custode progettata per semplificare l'uso quotidiano di Bitcoin. Consente di inviare, ricevere e spendere facilmente bitcoin su Lightning, Liquid ed eCash. Offre inoltre funzioni pratiche come l'acquisto di carte regalo e l'integrazione con i sistemi di pagamento dei commercianti.