description: |
  Blitz Wallet är en självförvaltande Bitcoin Wallet-mobilapplikation som är utformad för att förenkla den dagliga användningen av Bitcoin. Den gör det enkelt att skicka, ta emot och spendera bitcoins på Lightning, Liquid och eCash. Den erbjuder också praktiska funktioner som presentkortsköp och integrering av betalningssystem för handlare.