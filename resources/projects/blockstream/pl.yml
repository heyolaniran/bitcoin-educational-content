description: |
  Misją Blockstream jest stworzenie infrastruktury finansowej przyszłości.
  
  Budujemy infrastrukturę krypto-finansową opartą na Bitcoin, najbardziej solidnym i bezpiecznym Blockchain. Stosując najnowocześniejszą kryptografię i inżynierię bezpieczeństwa, tworzymy technologię, która sprawia, że rynki finansowe są bardziej wydajne, zmniejszając zależność od zaufania. Mając na uwadze długoterminową perspektywę dostarczania solidnych i skalowalnych rozwiązań, intensywnie inwestujemy w badania i rozwój, aby wzmocnić ekosystem i protokół Bitcoin.
  
  Finansowanie peer-to-peer w otwartej sieci ma obietnicę zmiany świata z korzyścią dla wszystkich. Blockstream jest dumny, że może to urzeczywistnić.