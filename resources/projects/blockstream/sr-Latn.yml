description: |
  Blockstreamova misija je da stvori finansijsku infrastrukturu budućnosti.
  
  Gradimo kripto-finansijsku infrastrukturu zasnovanu na Bitcoin, najrobustnijem i najsigurnijem Blockchain. Primjenom najnovije kriptografije i sigurnosnog inženjeringa, gradimo tehnologiju koja čini finansijska tržišta efikasnijim smanjenjem oslanjanja na poverenje. Sa dugoročnim pogledom na isporuku robusnih i skalabilnih rešenja, mnogo ulažemo u istraživanje i razvoj kako bismo ojačali Bitcoin ekosistem i protokol.
  
  Peer-to-peer, otvorena mrežna finansija obećava da će promeniti svet na dobrobit svih. Blockstream je ponosan što ovo pretvara u stvarnost.