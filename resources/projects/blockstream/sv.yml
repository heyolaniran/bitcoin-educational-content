description: |
  Blockstreams uppdrag är att skapa framtidens finansiella infrastruktur.
  
  Vi bygger kryptofinansiell infrastruktur baserad på Bitcoin, den mest robusta och säkra Blockchain. Genom att tillämpa avancerad kryptografi och säkerhetsteknik bygger vi tekniken som gör finansmarknaderna mer effektiva genom att minska beroendet av förtroende. Med en långsiktig syn på att leverera robusta och skalbara lösningar investerar vi kraftigt i forskning och utveckling för att stärka Bitcoin-ekosystemet och protokollet.
  
  Peer-to-peer, öppen nätverksfinansiering har löftet att förändra världen till förmån för alla. Blockstream är stolta över att göra detta till verklighet.