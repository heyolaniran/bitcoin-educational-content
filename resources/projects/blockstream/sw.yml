description: |
  Dhamira ya Blockstream ni kuunda miundombinu ya kifedha ya siku zijazo. 
  
  Tunaunda miundombinu ya crypto-fedha kulingana na Bitcoin, Blockchain imara na salama zaidi. Kwa kutumia uhandisi wa hali ya juu na uhandisi wa usalama, tunaunda teknolojia inayofanya masoko ya fedha kuwa bora zaidi kwa kupunguza kutegemea uaminifu. Kwa mtazamo wa muda mrefu wa kutoa masuluhisho thabiti na yenye hatari, tunawekeza pakubwa katika utafiti na maendeleo ili kuimarisha mfumo ikolojia na itifaki ya Bitcoin.
  
  Ufadhili wa rika-kwa-rika, ufadhili wa mtandao huria unashikilia ahadi ya kubadilisha ulimwengu kwa manufaa ya wote. Blockstream inajivunia kufanya hili kuwa kweli.