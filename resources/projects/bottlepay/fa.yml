description: |
  Bottlepay یک پلتفرم مالی دیجیتال است که از Lightning Network برای امکان‌پذیر کردن تراکنش‌های فوری Bitcoin در سطح جهانی استفاده می‌کند. این پلتفرم تجارت Bitcoin را ساده می‌کند و تنظیمات سریع و ساده، مسیرهای پرداخت قابل تنظیم و امکان خرید و فروش Bitcoin در معاملات تکی یا مکرر را ارائه می‌دهد. Bottlepay از واریزهای فوری از طریق Open Banking و SEPA Instant پشتیبانی می‌کند و پرداخت‌های مستقیم از موجودی‌های GBP یا EUR به هر Bitcoin Address را امکان‌پذیر می‌سازد. همچنین 'Lightning Address' نوآورانه‌ای را معرفی می‌کند که فرآیند ارسال و دریافت Bitcoin را به آسانی ارسال یک ایمیل می‌کند. با وجود ویژگی‌های پیشرفته‌اش، Bottlepay اخیراً اعلام کرده است که اپلیکیشن خود را تعطیل می‌کند.