description: |
  Bottlepay to cyfrowa platforma finansowa, która wykorzystuje Lightning Network, aby umożliwić natychmiastowe transakcje Bitcoin na całym świecie. Platforma upraszcza handi Bitcoin, oferując szybkie i proste konfiguracje, konfigurowalne trasy płatności oraz możliwość kupowania i sprzedawania Bitcoin w pojedynczych lub cyklicznych transakcjach. Bottlepay obsługuje natychmiastowe wpłaty za pośrednictwem Open Banking i SEPA Instant, umożliwiając jednocześnie bezpośrednie płatności z sald GBP lub EUR do dowolnego Bitcoin Address. Wprowadza również innowacyjny "Lightning Address", dzięki czemu proces wysyłania i odbierania Bitcoin jest tak prosty, jak wysyłanie wiadomości e-mail. Pomimo zaawansowanych funkcji, Bottlepay ogłosił niedawno zamknięcie swojej aplikacji.