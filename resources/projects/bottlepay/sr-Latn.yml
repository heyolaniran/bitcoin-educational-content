description: |
  Bottlepay je digitalna finansijska platforma koja koristi Lightning Network za omogućavanje trenutnih Bitcoin transakcija globalno. Platforma pojednostavljuje trgovanje Bitcoin, nudeći brza i jednostavna podešavanja, prilagodljive rute plaćanja i mogućnost kupovine i prodaje Bitcoin u pojedinačnim ili ponavljajućim trgovinama. Bottlepay podržava trenutne depozite putem Open Banking i SEPA Instant, dok omogućava direktna plaćanja sa GBP ili EUR salda na bilo koji Bitcoin Address. Takođe uvodi inovativni 'Lightning Address,' čineći proces slanja i primanja Bitcoin jednostavnim kao slanje emaila. Uprkos svojim naprednim funkcijama, Bottlepay je nedavno najavio zatvaranje svoje aplikacije.