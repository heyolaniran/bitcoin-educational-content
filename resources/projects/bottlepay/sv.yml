description: |
  Bottlepay är en digital finansiell plattform som använder Lightning Network för att möjliggöra omedelbara Bitcoin-transaktioner globalt. Plattformen förenklar Bitcoin-handel genom att erbjuda snabba och enkla inställningar, anpassningsbara betalningsvägar och möjligheten att köpa och sälja Bitcoin i enstaka eller återkommande affärer. Bottlepay stöder omedelbara insättningar via Open Banking och SEPA Instant, samtidigt som det möjliggör direkta betalningar från GBP- eller EUR-saldon till alla Bitcoin Address. Den introducerar också den innovativa "Lightning Address", vilket gör processen att skicka och ta emot Bitcoin lika enkel som att skicka ett e-postmeddelande. Trots sina avancerade funktioner har Bottlepay nyligen meddelat att man stänger sin app.