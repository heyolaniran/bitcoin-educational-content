description: |
  شکستن Bitcoin یک رویداد برای جامعه فنی است که بر امنیت Bitcoin و همه چیزهای مرتبط با آن تمرکز دارد. ارائه‌ها هدفشان فنی بودن است و بر آسیب‌پذیری‌ها، حملات نظری یا عملی که کاربران و پروتکل Bitcoin را هدف قرار می‌دهند، تمرکز دارند. این رویداد برای افرادی با دانش در زمینه جنبه‌های فنی Bitcoin یا امنیت به طور کلی طراحی شده است.