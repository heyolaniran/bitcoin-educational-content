description: |
  Bitcoin को तोड़ना तकनीकी समुदाय के लिए एक कार्यक्रम है जो Bitcoin और इसके आस-पास की हर चीज़ की सुरक्षा पर ध्यान केंद्रित करता है। प्रस्तुतियाँ तकनीकी होने का लक्ष्य रखती हैं, उपयोगकर्ताओं और Bitcoin प्रोटोकॉल को लक्षित करने वाली कमज़ोरियों, सैद्धांतिक या व्यावहारिक हमलों पर ध्यान केंद्रित करती हैं। यह कार्यक्रम Bitcoin या सामान्य रूप से सुरक्षा के तकनीकी पहलुओं के बारे में जानकारी रखने वाले लोगों के लिए है।