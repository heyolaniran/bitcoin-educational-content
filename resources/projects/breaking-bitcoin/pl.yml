description: |
  Breaking Bitcoin to wydarzenie dla społeczności technicznej skupiające się na bezpieczeństwie Bitcoin i wszystkiego wokół niego. Prezentacje mają charakter techniczny, koncentrując się na lukach w zabezpieczeniach, teoretycznych lub praktycznych atakach wymierzonych w użytkowników i protokół Bitcoin. To wydarzenie jest skierowane do osób posiadających wiedzę na temat technicznych aspektów Bitcoin lub ogólnie bezpieczeństwa.