description: |
  Breaking Bitcoin je događaj za tehničku zajednicu koji se fokusira na bezbednost Bitcoin i svega što ga okružuje. Prezentacije imaju za cilj da budu tehničke, fokusirajući se na ranjivosti, teorijske ili praktične napade usmerene na korisnike i Bitcoin protokol. Ovaj događaj je namenjen osobama sa znanjem o tehničkim aspektima Bitcoin ili bezbednosti uopšte.