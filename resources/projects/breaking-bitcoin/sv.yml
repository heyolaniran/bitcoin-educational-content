description: |
  Breaking Bitcoin är ett evenemang för det tekniska samfundet med fokus på säkerheten för Bitcoin och allt runt omkring. Presentationerna ska vara tekniska och fokusera på sårbarheter, teoretiska eller praktiska attacker som riktar sig mot användarna och Bitcoin-protokollet. Det här evenemanget riktar sig till personer med kunskap om de tekniska aspekterna av Bitcoin eller säkerhet i allmänhet.