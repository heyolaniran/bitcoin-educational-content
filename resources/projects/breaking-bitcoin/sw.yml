description: |
  Kuvunja Bitcoin ni tukio la jumuiya ya kiufundi inayoangazia usalama wa Bitcoin na kila kitu kinachoizunguka. Mawasilisho yanalenga kuwa ya kiufundi, yanayolenga udhaifu, mashambulizi ya kinadharia au vitendo yanayolenga watumiaji na itifaki ya Bitcoin. Tukio hili linalenga watu wenye ujuzi wa vipengele vya kiufundi vya Bitcoin au usalama kwa ujumla.