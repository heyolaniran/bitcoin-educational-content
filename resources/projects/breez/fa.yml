description: |
  Breez یک پلتفرم نوآورانه است که به استفاده از قدرت Bitcoin برای باز کردن دنیای پرداخت‌های همتا به همتا برای افراد و برنامه‌ها اختصاص دارد. با اپلیکیشن موبایل Breez، کاربران می‌توانند پرداخت‌های فوری Bitcoin را ارسال و دریافت کنند و جیب خود را به یک نود لایتنینگ غیرامانی تبدیل کنند.
  
  این پلتفرم همچنین یک پخش‌کننده Podcasting 2.0 برای پخش جریانی Sats و ایده‌ها و یک سیستم نقطه فروش دارد که پرداخت‌های لایتنینگ را بدون نیاز به KYC می‌پذیرد. Breez همچنین به عنوان یک ارائه‌دهنده خدمات لایتنینگ عمل می‌کند و نقدینگی و اتصال شبکه را ارائه می‌دهد.
  
  برای کسانی که به دنبال ادغام پرداخت‌های P2P لایتنینگ در برنامه‌های خود هستند، Breez یک SDK برای حداکثر سفارشی‌سازی با حداقل برنامه‌نویسی ارائه می‌دهد. Breez Cloud تجربه کاربری را بیشتر ارتقا می‌دهد و حاکمیت لایتنینگ غیرامانی را با راحتی خدمات امانی برای پرداخت‌های متنوع و در هر زمان ترکیب می‌کند.
  
  Breez در حال شکل‌دهی به آینده اقتصاد لایتنینگ است و پرداخت‌های Bitcoin را بیش از پیش در دسترس و کارآمد می‌سازد.