description: |
  Breez är en innovativ plattform som är dedikerad till att utnyttja kraften i Bitcoin för att öppna upp världen för peer-to-peer-betalningar för individer och applikationer. Med Breez mobilapp kan användare skicka och ta emot omedelbara Bitcoin-betalningar och förvandla sin ficka till en icke-frihetsberövande Lightning-nod.
  
  Plattformen innehåller också en Podcasting 2.0 Player för streaming av Sats och idéer, och ett Point-of-Sale-system som accepterar Lightning-betalningar utan KYC-krav. Breez fungerar också som en Lightning Service Provider, som erbjuder likviditet och nätverksanslutning.
  
  För dem som vill integrera P2P Lightning-betalningar i sina appar erbjuder Breez en SDK för maximal anpassning med minimal programmering. Breez Cloud förbättrar användarupplevelsen ytterligare genom att kombinera suveräniteten hos Lightning utan depå med bekvämligheten hos depåtjänster för mångsidiga betalningar när som helst.
  
  Breez formar framtiden för Lightning-ekonomin och gör Bitcoin-betalningar mer tillgängliga och effektiva än någonsin tidigare.