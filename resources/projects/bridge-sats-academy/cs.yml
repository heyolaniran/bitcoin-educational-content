description: |
   Akademie Bridge Sats je školicí pobočkou společnosti Bridge Sats SARL se sídlem v konžské Gomě, která se specializuje na vývoj mostů mezi digitálním světem a reálným životem. Naše akademie poskytuje školení v nejžádanějších dovednostech na digitálním trhu s důrazem na praktický přístup a přímou profesní integraci.