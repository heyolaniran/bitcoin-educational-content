description: |
   Bridge Sats Academy ist der Ausbildungszweig von Bridge Sats SARL, einem kongolesischen Unternehmen mit Sitz in Goma, das sich auf die Entwicklung von Brücken zwischen der digitalen Welt und dem realen Leben spezialisiert hat. Unsere Akademie bietet Schulungen zu den gefragtesten Fähigkeiten auf dem digitalen Markt an, wobei der Schwerpunkt auf einem praktischen Ansatz und der direkten beruflichen Integration liegt.