description: |
   Bridge Sats Academy è il braccio formativo di Bridge Sats SARL, una società congolese con sede a Goma specializzata nello sviluppo di ponti tra il mondo digitale e la vita reale. La nostra accademia offre una formazione sulle competenze più richieste dal mercato digitale, ponendo l'accento su un approccio pratico e su un'integrazione professionale diretta.