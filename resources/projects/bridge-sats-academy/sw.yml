description: |
   Bridge Sats Academy ni tawi la mafunzo la Bridge Sats SARL, kampuni ya Kongo yenye makao yake makuu Goma inayobobea katika ukuzaji wa madaraja kati ya ulimwengu wa kidijitali na maisha halisi. Chuo chetu hutoa mafunzo katika ujuzi unaotafutwa zaidi kwenye soko la kidijitali, kwa msisitizo wa mbinu ya vitendo na ushirikiano wa moja kwa moja wa kitaaluma.