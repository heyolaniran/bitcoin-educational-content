description: |
  BTC in D.C. je každoroční konference pořádaná ve Washingtonu, D.C., zaměřená na průsečík Bitcoin a veřejné politiky. Na této akci se setkávají vedoucí představitelé odvětví, tvůrci politik a nadšenci, aby diskutovali o budoucnosti Bitcoin v rámci regulačního a politického prostředí Spojených států. 2025. ročník slibuje Address klíčová témata, jako je regulace kryptoměn, institucionální přijetí a technologické inovace v rámci ekosystému Bitcoin. Kromě diskusí na hlavním pódiu se očekává, že na konferenci budou probíhat workshopy, panelové diskuse a účastníci budou mít možnost navazovat kontakty.