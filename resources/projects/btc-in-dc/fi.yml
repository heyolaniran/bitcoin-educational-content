description: |
  BTC in D.C. on Washingtonissa järjestettävä vuosittainen konferenssi, jossa keskitytään Bitcoin:n ja julkisen politiikan risteyskohtiin. Tapahtuma kokoaa yhteen alan johtajat, poliittiset päättäjät ja harrastajat keskustelemaan Bitcoin:n tulevaisuudesta Yhdysvaltojen sääntely- ja poliittisessa maisemassa. 2025-tapahtuma lupaa Address:n keskeisiä aiheita, kuten kryptovaluuttasääntelyä, institutionaalista hyväksyntää ja teknologisia innovaatioita Bitcoin-ekosysteemissä. Päälavalla käytävien keskustelujen lisäksi konferenssissa odotetaan järjestettävän työpajoja, paneelikeskusteluja ja osallistujien verkostoitumismahdollisuuksia.