description: |
  BTC in D.C. est une conférence annuelle organisée à Washington, axée sur l'intersection du Bitcoin et des politiques publiques. L'événement rassemble des leaders de l'industrie, des décideurs politiques et des passionnés pour discuter de l'avenir du Bitcoin dans le paysage réglementaire et politique des États-Unis.L'édition 2025 promet de Address des sujets clés tels que la réglementation des crypto-monnaies, l'adoption institutionnelle et les innovations technologiques au sein de l'écosystème du Bitcoin. En plus des discussions sur la scène principale, la conférence devrait proposer des ateliers, des discussions de groupe et des opportunités de réseautage pour les participants.