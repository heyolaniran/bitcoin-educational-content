description: |
  BTC in D.C. adalah konferensi tahunan yang diadakan di Washington, D.C., yang berfokus pada persimpangan antara Bitcoin dan kebijakan publik. Acara ini mempertemukan para pemimpin industri, pembuat kebijakan, dan penggemar untuk mendiskusikan masa depan Bitcoin dalam lanskap regulasi dan politik Amerika Serikat, dan menjanjikan topik utama Address seperti regulasi mata uang kripto, adopsi institusional, dan inovasi teknologi dalam ekosistem Bitcoin. Edisi 2025 menjanjikan topik-topik utama seperti regulasi mata uang kripto, adopsi institusional, dan inovasi teknologi dalam ekosistem Bitcoin. Selain diskusi di panggung utama, konferensi ini diharapkan menampilkan lokakarya, diskusi panel, dan kesempatan berjejaring bagi para peserta.