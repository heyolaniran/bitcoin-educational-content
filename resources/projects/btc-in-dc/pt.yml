description: |
  A BTC in D.C. é uma conferência anual realizada em Washington, D.C., centrada na intersecção entre o Bitcoin e as políticas públicas. O evento reúne líderes da indústria, formuladores de políticas e entusiastas para discutir o futuro do Bitcoin dentro do cenário regulatório e político dos Estados Unidos. A edição de 2025 promete Address tópicos-chave como regulamentação de criptomoedas, adoção institucional e inovações tecnológicas dentro do ecossistema Bitcoin. Além das discussões no palco principal, espera-se que a conferência apresente workshops, painéis de discussão e oportunidades de networking para os participantes.