description: |
  BTC tại D.C. là hội nghị thường niên được tổ chức tại Washington, D.C., tập trung vào giao điểm của Bitcoin và chính sách công. Sự kiện này quy tụ các nhà lãnh đạo ngành, nhà hoạch định chính sách và những người đam mê để thảo luận về tương lai của Bitcoin trong bối cảnh chính trị và pháp lý của Hoa Kỳ. Phiên bản năm 2025 hứa hẹn sẽ đưa ra các chủ đề chính của Address như quy định về tiền điện tử, việc áp dụng của tổ chức và các cải tiến công nghệ trong hệ sinh thái Bitcoin. Ngoài các cuộc thảo luận chính, hội nghị dự kiến sẽ có các hội thảo, thảo luận nhóm và cơ hội giao lưu cho những người tham dự.