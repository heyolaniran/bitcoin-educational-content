description: |
  بزرگترین کنفرانس Bitcoin اروپا در سال 2023. یک گروه شامل بیت‌کوینرهایی از سراسر جهان است که با موضوعات آشنا هستند و به دنبال بینش‌های عمیق‌تر و ملاقات با افراد همفکر هستند. گروه دیگر افرادی هستند که درباره Bitcoin شنیده‌اند، می‌خواهند با آن آشنا شوند یا به آرامی وارد Bitcoin می‌شوند. آنها در این رویداد خدمات کامل دریافت خواهند کرد، از جمله اطلاعات و آزمایش محصولات و خدمات Bitcoin.