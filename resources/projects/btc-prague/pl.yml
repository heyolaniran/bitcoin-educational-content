description: |
  Największa europejska konferencja Bitcoin w 2023 roku. Jedna grupa składa się z bitcoinerów z całego świata, którzy są zaznajomieni z tematami i szukają głębszego wglądu oraz spotkania z podobnie myślącymi ludźmi. Druga grupa to ludzie, którzy słyszeli o Bitcoin, chcą się z nim zapoznać lub powoli wchodzą w Bitcoin. Otrzymają oni pełną obsługę podczas wydarzenia, w tym informacje i testy produktów i usług Bitcoin.