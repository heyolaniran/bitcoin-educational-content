description: |
  Najveća Bitcoin evropska konferencija u 2023. Jednu grupu čine bitkoineri iz celog sveta koji su upoznati sa temama i traže dublje uvide i žele da upoznaju istomišljenike. Drugu grupu čine ljudi koji su čuli za Bitcoin, žele da se upoznaju sa njim ili se polako uvode u Bitcoin. Oni će dobiti kompletnu uslugu na događaju, uključujući informacije i testiranje Bitcoin proizvoda i usluga.