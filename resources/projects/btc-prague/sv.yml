description: |
  Största europeiska Bitcoin-konferensen 2023. Den ena gruppen består av bitcoiners från hela världen som är bekanta med ämnena och letar efter djupare insikter och att träffa likasinnade. Den andra gruppen är människor som har hört talas om Bitcoin, vill bli introducerade till det eller långsamt kommer in i Bitcoin. De kommer att få full service vid evenemanget, inklusive information och testning av Bitcoin-produkter och tjänster.