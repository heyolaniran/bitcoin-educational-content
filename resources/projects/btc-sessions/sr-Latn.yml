description: |
  BTC Sessions je online persona Bena Perrina, istaknutog Bitcoin edukatora i kreatora sadržaja sa sedištem u Kanadi. Od 2016. godine, on proizvodi pristupačne, korak-po-korak tutorijale sa ciljem da pomogne pojedincima da razumeju i sigurno koriste Bitcoin. Njegov edukativni sadržaj pokriva niz tema, uključujući samostalno čuvanje, hardverske novčanike, multisignature postavke, Lightning Network i prakse privatnosti.