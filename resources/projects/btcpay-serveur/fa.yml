description: |
  سرور BTCPay یک پردازنده پرداخت Bitcoin متن‌باز و خودمیزبان است.
  
  این نرم‌افزار به شما امکان می‌دهد پرداخت‌های Bitcoin (BTC) را مستقیماً به Wallet خود بپذیرید، بدون هزینه یا واسطه شخص ثالث. این نرم‌افزار حریم خصوصی و امنیت بهبود یافته، یک Interface کاربر قابل تنظیم، و ویژگی‌هایی برای استفاده در تجارت الکترونیک و نقطه فروش ارائه می‌دهد. این پلتفرم از ادغام با پلتفرم‌های مختلف تجارت الکترونیک مانند WordPress، Magneto، Drupal و دیگران پشتیبانی می‌کند. این یک راه‌حل چندمنظوره برای کسب‌وکارها، خیریه‌ها، تولیدکنندگان محتوا و افرادی است که به دنبال یک سیستم پرداخت Bitcoin خودمختار هستند.