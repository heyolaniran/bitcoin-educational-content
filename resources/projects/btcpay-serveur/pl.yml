description: |
  BTCPay Server to samoobsługowy procesor płatności Bitcoin o otwartym kodzie źródłowym.
  
  Oprogramowanie to pozwala akceptować płatności Bitcoin (BTC) bezpośrednio na Wallet, bez opłat i pośredników zewnętrznych. Oferuje ono zwiększoną prywatność i bezpieczeństwo, konfigurowalny Interface użytkownika oraz funkcje zarówno dla handlu elektronicznego, jak i punktów sprzedaży. Platforma obsługuje integrację z różnymi platformami e-commerce, takimi jak WordPress, Magneto, Drupal i inne. Jest to wszechstronne rozwiązanie dla firm, organizacji charytatywnych, twórców treści i osób prywatnych poszukujących niezależnego systemu płatności Bitcoin.