description: |
  BTCPay Server je samostalno hostovan, open-source Bitcoin procesor plaćanja.
  
  Ovaj softver vam omogućava da prihvatate Bitcoin (BTC) uplate direktno na vaš Wallet, bez naknada ili posrednika treće strane. Nudi poboljšanu privatnost i sigurnost, prilagodljiv korisnički Interface, i funkcije za e-trgovinu i korišćenje na prodajnim mestima. Platforma podržava integraciju sa raznim platformama za e-trgovinu kao što su WordPress, Magneto, Drupal i druge. To je svestrano rešenje za preduzeća, dobrotvorne organizacije, kreatore sadržaja i pojedince koji traže samostalni Bitcoin sistem plaćanja.