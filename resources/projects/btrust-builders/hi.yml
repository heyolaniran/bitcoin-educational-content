description: |
  अफ़्रीका के लिए Bitcoin, अफ़्रीकियों द्वारा।
  
  Btrust Builders एक ऐसा कार्यक्रम है जिसे अफ़्रीकी Bitcoin और लाइटनिंग डेवलपर्स की अगली पीढ़ी को प्रशिक्षित करने के लिए डिज़ाइन किया गया है। हमारा लक्ष्य अफ़्रीकी सॉफ़्टवेयर डेवलपर्स के लिए Bitcoin और लाइटनिंग के लिए निर्माण में संक्रमण के लिए एक मार्ग बनाना है।