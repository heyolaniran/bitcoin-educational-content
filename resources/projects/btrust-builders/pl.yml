description: |
  Bitcoin dla Afryki, przez Afrykanów.
  
  Btrust Builders to program mający na celu szkolenie następnej generacji afrykańskich programistów Bitcoin i Lightning. Naszym celem jest stworzenie ścieżki dla afrykańskich programistów, którzy będą mogli przejść do tworzenia oprogramowania dla Bitcoin i Lightning.