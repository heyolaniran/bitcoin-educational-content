description: |
  یک شرکت تأسیس‌شده توسط مارک شاتلورث، که عمدتاً به خاطر توسعه اوبونتو، یکی از محبوب‌ترین توزیع‌های لینوکس در جهان شناخته می‌شود. کنونیکال که در بریتانیا مستقر است، در راه‌حل‌های متن‌باز، خدمات پشتیبانی فنی، مدیریت ابری و زیرساخت‌های فناوری اطلاعات برای کسب‌وکارها و توسعه‌دهندگان تخصص دارد.