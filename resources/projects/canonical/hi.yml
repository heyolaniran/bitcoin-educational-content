description: |
  मार्क शटलवर्थ द्वारा स्थापित एक कंपनी, जो मुख्य रूप से दुनिया के सबसे लोकप्रिय लिनक्स वितरणों में से एक, उबंटू को विकसित करने के लिए जानी जाती है। यूनाइटेड किंगडम में स्थित, कैनोनिकल ओपन-सोर्स समाधान, तकनीकी सहायता सेवाओं, क्लाउड प्रबंधन और व्यवसायों और डेवलपर्स के लिए आईटी बुनियादी ढांचे में माहिर है।