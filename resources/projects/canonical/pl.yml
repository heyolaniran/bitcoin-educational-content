description: |
  Firma założona przez Marka Shuttlewortha, znana przede wszystkim z rozwoju Ubuntu, jednej z najpopularniejszych dystrybucji Linuksa na świecie. Canonical z siedzibą w Wielkiej Brytanii specjalizuje się w rozwiązaniach open-source, usługach wsparcia technicznego, zarządzaniu chmurą i infrastrukturze IT dla firm i deweloperów.
  