description: |
  Kompanija koju je osnovao Mark Shuttleworth, prvenstveno poznata po razvoju Ubuntu-a, jedne od najpopularnijih Linux distribucija na svetu. Sa sedištem u Ujedinjenom Kraljevstvu, Canonical se specijalizuje za open-source rešenja, tehničke usluge podrške, upravljanje oblakom i IT infrastrukturu za preduzeća i programere.