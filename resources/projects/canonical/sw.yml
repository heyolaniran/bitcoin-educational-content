description: |
  Kampuni iliyoanzishwa na Mark Shuttleworth, inayojulikana hasa kwa kuendeleza Ubuntu, mojawapo ya usambazaji maarufu zaidi wa Linux duniani. Kulingana na Uingereza, Canonical ina utaalam wa suluhisho la chanzo huria, huduma za usaidizi wa kiufundi, usimamizi wa wingu na miundombinu ya TEHAMA kwa biashara na wasanidi programu.
  