description: |
  Cardware on Hardware Wallet, mis on mõeldud nii Bitcoin kui ka EVM-põhiste varade säilitamiseks ja haldamiseks. See pakub õhukindlat offline-lahendust, mis kasutab QR-koodi tehnoloogiat, et hoida privaatvõtmeid offline, kaitstes neid veebipõhiste ohtude ja volitamata juurdepääsu eest.