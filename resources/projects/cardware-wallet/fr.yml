description: |
  Cardware est un Hardware Wallet conçu pour stocker et gérer les actifs basés sur le Bitcoin et l'EVM. Il s'agit d'une solution hors ligne à enveloppe aérienne qui utilise la technologie du code QR pour conserver les clés privées hors ligne, en les protégeant contre les menaces en ligne et les accès non autorisés.