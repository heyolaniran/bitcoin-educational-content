description: |
  कार्डवेयर एक Hardware Wallet है जिसे Bitcoin और EVM-आधारित दोनों संपत्तियों को संग्रहीत और प्रबंधित करने के लिए डिज़ाइन किया गया है। यह निजी कुंजियों को ऑफ़लाइन रखने, ऑनलाइन खतरों और अनधिकृत पहुँच से सुरक्षा करने के लिए QR कोड तकनीक का उपयोग करके एक एयर-गैप्ड, ऑफ़लाइन समाधान प्रदान करता है।