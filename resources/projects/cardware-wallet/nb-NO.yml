description: |
  Cardware er en Hardware Wallet som er utviklet for lagring og administrasjon av både Bitcoin- og EVM-baserte ressurser. Det er en luftgapet, frakoblet løsning som bruker QR-kodeteknologi for å holde private nøkler frakoblet, noe som beskytter mot trusler på nettet og uautorisert tilgang.