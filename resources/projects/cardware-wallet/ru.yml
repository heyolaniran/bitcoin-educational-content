description: |
  Cardware - это Hardware Wallet, предназначенная для хранения и управления активами на базе Bitcoin и EVM. Это автономное решение с воздушной защитой, использующее технологию QR-кодов для хранения закрытых ключей в автономном режиме, защищающее от онлайн-угроз и несанкционированного доступа.