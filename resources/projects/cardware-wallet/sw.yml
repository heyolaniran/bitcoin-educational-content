description: |
  Kadi ni Hardware Wallet iliyoundwa kwa ajili ya kuhifadhi na kudhibiti mali zote mbili za Bitcoin na EVM. Inatoa suluhisho lisilo na hewa, la nje ya mtandao kwa kutumia teknolojia ya Msimbo wa QR kuweka funguo za faragha nje ya mtandao, kulinda dhidi ya vitisho vya mtandaoni na ufikiaji usioidhinishwa. 