description: |
  कैशू एक मुफ़्त और ओपन-सोर्स चौमियन ईकैश सिस्टम है जिसे Bitcoin के लिए बनाया गया है।
  
  कैशू कस्टोडियल Bitcoin एप्लीकेशन के उपयोगकर्ताओं के लिए लगभग पूर्ण गोपनीयता प्रदान करता है। किसी को यह जानने की ज़रूरत नहीं है कि आप कौन हैं, आपके पास कितना फंड है और आप किसके साथ लेन-देन करते हैं।