description: |
  Coinbase ist einer der weltweit führenden Kryptowährungsbörsen und digitalen Wallet-Anbieter. Es ermöglicht Einzelpersonen und Institutionen, eine breite Palette von Kryptowährungen - einschließlich Bitcoin - über eine intuitive Plattform zu kaufen, zu verkaufen, zu speichern und zu verwalten. Coinbase ist bekannt für die Einhaltung von Vorschriften, Sicherheitsfunktionen und Bildungsressourcen und dient Millionen von Nutzern als Tor zum Krypto-Ökosystem.
  