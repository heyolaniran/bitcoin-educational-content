description: |
  !خوش آمدید ما CoinCorner هستیم، تیمی از افراد دوستانه و مشتاق که با هم کار می‌کنیم تا Bitcoin را برای شما تا حد ممکن آسان کنیم. مانند بیشتر چیزها در زندگی، ما با درک راه‌حل یک مشکل شروع کردیم. در سال ۲۰۱۴، خرید Bitcoin در بریتانیا Hard بود و حتی سخت‌تر بود که آن را از جایی که به آن اعتماد داشتید بخرید. CoinCorner وارد می‌شود. از روز اول، هدف ما این بوده است که خرید Bitcoin را برای مردم در بریتانیا و سراسر جهان سریع و آسان کنیم. جزیره من را خانه خود می‌نامیم و گام‌های بزرگی برای ایجاد اعتماد در صنعت Bitcoin برداشته‌ایم. از همکاری گسترده با دولت جزیره من در زمینه تنظیم مقررات Bitcoin تا آموزش مردم از همه اقشار از طریق رسانه‌ها، سخنرانی‌های عمومی و بیشتر. پس از جلب توجه جهانی در سال ۲۰۱۷، Bitcoin به نامی آشنا تبدیل شده است و علاقه به ارز دیجیتال بیش از هر زمان دیگری است. اما نگران نباشید، ما هر روز به کار می‌آییم تا از سردرگمی پیرامون Bitcoin عبور کنیم و آن را برای هر کسی که می‌خواهد درگیر شود، قابل دسترس کنیم.