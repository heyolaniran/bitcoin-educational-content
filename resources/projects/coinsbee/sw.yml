description: |
  Jukwaa la kimataifa la ununuzi wa papo hapo wa kadi za zawadi na nyongeza za simu kutoka zaidi ya chapa 5,000 katika nchi 185, kwa kutumia zaidi ya sarafu 200 za cryptocurrency au mbinu nyinginezo za malipo, na kutoa huduma ya haraka, salama na inayoweza kufikiwa kwa watumiaji wote wa Bitcoin.