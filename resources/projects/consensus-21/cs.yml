description: Consensus21 je vzdělávací protokol s otevřeným zdrojovým kódem, který decentralizuje učení, odstraňuje hierarchii, standardizované testy a dluhy za výuku. Podporuje samostatně řízené učení založené na projektech s podporou mentorů, což žákům umožňuje rozvíjet kritické myšlení, podnikavost a schopnosti řešit problémy.