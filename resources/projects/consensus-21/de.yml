description: Consensus21 ist ein Open-Source-Bildungsprotokoll, das das Lernen dezentralisiert und Hierarchien, standardisierte Tests und Schulgeldschulden abschafft. Es fördert selbstgesteuertes, projektbasiertes Lernen mit Unterstützung von Mentoren und befähigt die Lernenden zu kritischem Denken, Unternehmertum und Problemlösungskompetenz.