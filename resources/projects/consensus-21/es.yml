description: Consensus21 es un protocolo educativo de código abierto que descentraliza el aprendizaje, eliminando jerarquías, exámenes estandarizados y deudas de matrícula. Fomenta el aprendizaje autodirigido y basado en proyectos con el apoyo de mentores, dotando a los alumnos de pensamiento crítico, espíritu emprendedor y capacidad para resolver problemas.