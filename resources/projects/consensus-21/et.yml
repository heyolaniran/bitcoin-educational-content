description: Consensus21 on avatud lähtekoodiga haridusprotokoll, mis detsentraliseerib õppimise, kaotades hierarhiad, standardiseeritud testid ja õppemaksuvõlad. See soodustab isejuhtivat, projektipõhist õppimist koos mentori toetusega, andes õppijatele kriitilise mõtlemise, ettevõtlikkuse ja probleemide lahendamise oskuse.