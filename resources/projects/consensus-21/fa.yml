description: Consensus21 یک پروتکل آموزشی متن‌باز است که یادگیری را غیرمتمرکز می‌کند و سلسله‌مراتب، آزمون‌های استاندارد و بدهی‌های تحصیلی را حذف می‌کند. این پروتکل یادگیری مبتنی بر پروژه و خودهدایت‌شده را با حمایت مربیان ترویج می‌دهد و به یادگیرندگان مهارت‌های تفکر انتقادی، کارآفرینی و حل مسئله را می‌بخشد.