description: Consensus21 on avoimen lähdekoodin koulutusprotokolla, joka hajauttaa oppimisen ja poistaa hierarkiat, standardoidut kokeet ja lukukausivelat. Se edistää itseohjautuvaa, projektipohjaista oppimista ohjaajien tuella ja antaa oppijoille mahdollisuuden kriittiseen ajatteluun, yrittäjyyteen ja ongelmanratkaisutaitoihin.