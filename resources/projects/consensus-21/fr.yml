description: Consensus21 est un protocole éducatif à code source ouvert qui décentralise l'apprentissage en supprimant les hiérarchies, les tests standardisés et les dettes de scolarité. Il favorise l'apprentissage autodirigé, basé sur des projets, avec le soutien de mentors, permettant aux apprenants d'acquérir une pensée critique, l'esprit d'entreprise et des compétences en matière de résolution de problèmes.