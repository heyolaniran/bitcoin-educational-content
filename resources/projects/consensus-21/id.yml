description: Consensus21 adalah protokol pendidikan sumber terbuka yang mendesentralisasikan pembelajaran, menghilangkan hierarki, tes standar, dan utang uang sekolah. Protokol ini mendorong pembelajaran berbasis proyek yang diarahkan secara mandiri dengan dukungan mentor, memberdayakan peserta didik dengan pemikiran kritis, kewirausahaan, dan keterampilan pemecahan masalah.