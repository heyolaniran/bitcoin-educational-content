description: Consensus21 è un protocollo educativo open-source che decentralizza l'apprendimento, eliminando le gerarchie, i test standardizzati e i debiti scolastici. Promuove l'apprendimento auto-diretto e basato su progetti, con il supporto di un mentore, che conferisce agli studenti capacità di pensiero critico, imprenditorialità e risoluzione dei problemi.