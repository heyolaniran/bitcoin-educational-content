description: Consensus21 to protokół edukacyjny o otwartym kodzie źródłowym, który decentralizuje uczenie się, usuwając hierarchie, standaryzowane testy i zadłużenie z tytułu czesnego. Wspiera on samodzielną, opartą na projektach naukę ze wsparciem mentora, umożliwiając uczniom krytyczne myślenie, przedsiębiorczość i umiejętności rozwiązywania problemów.