description: O Consensus21 é um protocolo educativo de código aberto que descentraliza a aprendizagem, eliminando hierarquias, testes normalizados e dívidas de propinas. Promove a aprendizagem auto-dirigida e baseada em projectos com o apoio de mentores, capacitando os alunos com pensamento crítico, empreendedorismo e competências de resolução de problemas.