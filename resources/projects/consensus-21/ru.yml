description: Consensus21 - это образовательный протокол с открытым исходным кодом, который децентрализует обучение, устраняя иерархию, стандартизированные тесты и долги за обучение. Он способствует самостоятельному, основанному на проектах обучению при поддержке наставника, расширяя возможности учащихся в области критического мышления, предпринимательства и навыков решения проблем.