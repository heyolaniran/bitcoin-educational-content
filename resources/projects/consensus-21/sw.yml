description: Consensus21 ni itifaki ya elimu ya chanzo huria ambayo inagatua masomo, kuondoa madaraja, majaribio sanifu na deni la masomo. Inakuza ujifunzaji unaojielekeza, unaotegemea mradi kwa usaidizi wa mshauri, kuwawezesha wanafunzi kwa kufikiri kwa kina, ujasiriamali, na ujuzi wa kutatua matatizo.