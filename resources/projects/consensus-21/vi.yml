description: Consensus21 là một giao thức giáo dục mã nguồn mở phân cấp việc học, xóa bỏ hệ thống phân cấp, các bài kiểm tra chuẩn hóa và nợ học phí. Nó thúc đẩy việc học tự định hướng, theo dự án với sự hỗ trợ của cố vấn, trao quyền cho người học với tư duy phản biện, tinh thần kinh doanh và kỹ năng giải quyết vấn đề.