description: |
  Crypto Lyon ist ein Verein, der gegründet wurde, um Liebhaber von Kryptowährungen in der Region Lyon zusammenzubringen. Unser Ziel ist es, die Blockchain-Technologie und Kryptowährungen durch Workshops und Konferenzen für alle zugänglich zu machen und alle Akteure zusammenzubringen. Schließen Sie sich der Krypto-Revolution an!