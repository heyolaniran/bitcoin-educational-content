description: |
  Crypto Lyon es una asociación creada para reunir a los aficionados a las criptomonedas de la región de Lyon. Nuestro objetivo es poner la tecnología Blockchain y las criptomonedas al alcance de todos a través de talleres y conferencias, y reunir a todos los actores. ¡Únete a la revolución de las criptomonedas!