description: |
  Crypto Lyon on yhdistys, joka on perustettu tuomaan yhteen kryptovaluutan harrastajat Lyonin alueella. Tavoitteenamme on tehdä Blockchain-teknologia ja kryptovaluutat kaikkien ulottuville työpajojen ja konferenssien avulla sekä tuoda kaikki toimijat yhteen. Liity kryptovallankumoukseen!