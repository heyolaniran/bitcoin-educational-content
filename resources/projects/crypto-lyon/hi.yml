description: |
  क्रिप्टो ल्योन एक ऐसा संगठन है जो ल्योन क्षेत्र में क्रिप्टो-करेंसी के प्रति उत्साही लोगों को एक साथ लाने के लिए बनाया गया है। हमारा उद्देश्य कार्यशालाओं और सम्मेलनों के माध्यम से Blockchain तकनीक और क्रिप्टो-करेंसी को सभी के लिए सुलभ बनाना और सभी खिलाड़ियों को एक साथ लाना है। क्रिप्टो क्रांति में शामिल हों!