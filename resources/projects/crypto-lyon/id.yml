description: |
  Crypto Lyon adalah sebuah asosiasi yang dibuat untuk menyatukan para penggemar mata uang kripto di wilayah Lyon. Tujuan kami adalah membuat teknologi Blockchain dan mata uang kripto dapat diakses oleh semua orang melalui lokakarya dan konferensi, dan untuk menyatukan semua pemain. Bergabunglah dengan revolusi kripto!