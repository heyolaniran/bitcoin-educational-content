description: |
  Crypto Lyon to stowarzyszenie stworzone w celu zrzeszenia entuzjastów kryptowalut w regionie Lyonu. Naszym celem jest uczynienie technologii Blockchain i kryptowalut dostępnymi dla wszystkich poprzez warsztaty i konferencje oraz zebranie wszystkich graczy razem. Dołącz do kryptowalutowej rewolucji!