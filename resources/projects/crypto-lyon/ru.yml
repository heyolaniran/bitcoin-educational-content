description: |
  Crypto Lyon - это ассоциация, созданная для объединения криптовалютных энтузиастов в Лионском регионе. Наша цель - сделать технологию Blockchain и криптовалюты доступными для всех с помощью семинаров и конференций, а также объединить всех игроков. Присоединяйтесь к криптовалютной революции!