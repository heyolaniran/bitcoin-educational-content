description: |
  Crypto Lyon ni chama kilichoundwa ili kuwaleta pamoja wapenda fedha za crypto katika eneo la Lyon. Lengo letu ni kufanya teknolojia ya Blockchain na sarafu za crypto ziweze kupatikana kwa kila mtu kupitia warsha na makongamano, na kuwaleta wachezaji wote pamoja. Jiunge na mapinduzi ya crypto!