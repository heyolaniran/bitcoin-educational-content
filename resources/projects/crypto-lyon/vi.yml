description: |
  Crypto Lyon là một hiệp hội được thành lập để tập hợp những người đam mê tiền điện tử tại khu vực Lyon. Mục tiêu của chúng tôi là làm cho công nghệ Blockchain và tiền điện tử có thể tiếp cận được với mọi người thông qua các hội thảo và hội nghị, và tập hợp tất cả những người chơi lại với nhau. Hãy tham gia cuộc cách mạng tiền điện tử!