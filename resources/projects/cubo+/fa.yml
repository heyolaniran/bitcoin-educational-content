description: |
  CUBO+ آغازگر یک ابتکار آموزشی پیشگامانه است که هدف آن تشکیل یک جامعه از حرفه‌ای‌های سالوادوری است که برای پاسخگویی به تقاضای رو به رشد اشتغال توسط شرکت‌های Bitcoin و Lightning Network آموزش دیده‌اند، و همچنین برای پیشبرد پذیرش و توسعه اقتصادی در السالوادور.
  
  ما متعهد به تجهیز دانشجویان با مهارت‌ها و دانش لازم برای پیوستن به صنعت Bitcoin و کمک به بازسازی سیستم مالی هستیم.
  
  ما برنامه‌ای هستیم که به آموزش ذهن‌های جوان و با استعداد در اصول Bitcoin در سطحی اختصاصی و عمیق، و همچنین جزئیات پیشرفته‌ترین می‌پردازد. ما از مشارکت سالوادوری‌ها در انقلاب Bitcoin در السالوادور، بدون موانع یا محدودیت‌ها حمایت می‌کنیم.
  
  هدف ما ساختن یک جامعه پر رونق و آزاد از افراد مستقل و حاکم است. مأموریت ما ایجاد حرفه‌ای‌های Bitcoin است که کشور و دنیایی را که همه ما می‌خواهیم در آن زندگی کنیم، بسازند!