description: |
  CUBO+ stanowi początek pionierskiej inicjatywy edukacyjnej mającej na celu stworzenie społeczności salwadorskich profesjonalistów przeszkolonych w celu zaspokojenia rosnącego zapotrzebowania na zatrudnienie przez firmy Bitcoin i Lightning Network, a także w celu napędzania adopcji i wspierania rozwoju gospodarczego w Salwadorze.
  
  Naszym celem jest wyposażenie studentów w umiejętności i wiedzę niezbędne do dołączenia do branży Bitcoin i przyczynienia się do przekształcenia systemu finansowego.
  
  Jesteśmy programem zaangażowanym w nauczanie młodych, utalentowanych umysłów podstaw Bitcoin na dedykowanym i głębokim poziomie, a także najbardziej zaawansowanych szczegółów. Opowiadamy się za zaangażowaniem Salwadorczyków w rewolucję Bitcoin w Salwadorze, bez barier i ograniczeń.
  
  Naszym celem jest zbudowanie kwitnącej i wolnej społeczności suwerennych i niezależnych jednostek. Naszą misją jest stworzenie profesjonalistów Bitcoin, którzy zbudują kraj i świat, w którym wszyscy chcemy żyć!