description: |
  CUBO+ označava početak pionirske obrazovne inicijative usmerene na formiranje zajednice salvadorskih profesionalaca obučenih da zadovolje rastuću potražnju za zapošljavanjem od strane Bitcoin i Lightning Network kompanija, kao i da podstaknu usvajanje i ekonomski razvoj u El Salvadoru.
  
  Posvećeni smo opremanju studenata veštinama i znanjem potrebnim za pridruživanje Bitcoin industriji i doprinos preoblikovanju finansijskog sistema.
  
  Mi smo program posvećen podučavanju mladih talentovanih umova osnovama Bitcoin na posvećenom i dubokom nivou, kao i najnaprednijim detaljima. Zalažemo se za uključivanje Salvadoraca u Bitcoin revoluciju u El Salvadoru, bez barijera ili ograničenja.
  
  Cilj nam je izgraditi uspešnu i slobodnu zajednicu suverenih i nezavisnih pojedinaca. Naša misija je stvaranje Bitcoin profesionalaca koji će izgraditi zemlju i svet u kojem svi želimo da živimo!