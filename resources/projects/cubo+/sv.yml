description: |
  CUBO+ markerar början på ett banbrytande utbildningsinitiativ som syftar till att bilda en grupp salvadoranska yrkesverksamma som utbildas för att möta den växande efterfrågan på anställning av Bitcoin- och Lightning Network-företag, samt för att driva adoption och främja ekonomisk utveckling i El Salvador.
  
  Vi är fast beslutna att förse studenterna med de färdigheter och kunskaper som krävs för att gå med i Bitcoin-branschen och bidra till att omforma det finansiella systemet.
  
  Vi är ett program som har åtagit sig att lära unga begåvade sinnen grunderna i Bitcoin på en dedikerad och djup nivå, liksom de mest avancerade detaljerna. Vi förespråkar att salvadoraner ska delta i Bitcoin-revolutionen i El Salvador, utan hinder eller begränsningar.
  
  Vi strävar efter att bygga en blomstrande och fri gemenskap av suveräna och oberoende individer. Vårt uppdrag är att skapa Bitcoin-proffs som kommer att bygga det land och den värld vi alla vill leva i!