description: |
  CUBO+ 標誌著開創性教育計畫的開始，此計畫旨在培育薩爾瓦多專業人員社群，以滿足 Bitcoin 和 Lightning Network 公司日益增加的就業需求，並推動薩爾瓦多的採用和促進經濟發展。
  
  我們致力於讓學生掌握加入 Bitcoin 產業所需的技能和知識，並為重塑金融體系做出貢獻。
  
  我們是一個致力於教導年輕優秀人才的計畫，專注且深入地教授 Bitcoin 的基礎知識，以及最先進的細節。我們主張薩爾瓦多人參與薩爾瓦多的 Bitcoin 革命，不設障礙或限制。
  
  我們的目標是建立一個由主權和獨立個人所組成的蓬勃且自由的社群。我們的使命是創造 Bitcoin 專業人士，他們將建設我們所有人都希望生活在其中的國家和世界！