description: |
  DADA DEVS je nezisková iniciativa, kterou v roce 2024 založil vizionář Marcel Lorraine a která se zrodila z potřeby posílit postavení afrických vývojářek v oblasti inovací Bitcoin a Blockchain. Afrika oplývá nevyužitým potenciálem, ale ženy jsou v technologiích, zejména v oblasti vývoje Bitcoin, stále výrazně méně zastoupeny. DADA DEVS si uvědomuje naléhavou potřebu tuto mezeru překlenout a vznikla s cílem nejen vzdělávat, ale také inspirovat a vybavit africké ženy nástroji k řešení reálných problémů prostřednictvím decentralizovaných řešení.