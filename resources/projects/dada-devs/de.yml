description: |
  DADA DEVS wurde 2024 von Marcel Lorraine, einer visionären Führungspersönlichkeit, gegründet und ist eine gemeinnützige Initiative, die aus dem Bedürfnis heraus entstanden ist, afrikanische Entwicklerinnen zu befähigen, die Hauptrolle in der Bitcoin- und Blockchain-Innovation zu übernehmen. Afrika strotzt nur so vor ungenutztem Potenzial, dennoch sind Frauen in der Technologiebranche, insbesondere in der Bitcoin-Entwicklung, deutlich unterrepräsentiert. DADA DEVS hat die dringende Notwendigkeit erkannt, diese Lücke zu schließen, und wurde gegründet, um afrikanische Frauen nicht nur auszubilden, sondern auch zu inspirieren und mit den Werkzeugen auszustatten, um reale Herausforderungen durch dezentrale Lösungen zu lösen.