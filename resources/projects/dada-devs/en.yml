description: |
  Founded in 2024 by visionary leader Marcel Lorraine, DADA DEVS is a nonprofit initiative born from the need to empower African women developers to take center stage in Bitcoin and blockchain innovation.Africa is brimming with untapped potential, yet women remain significantly underrepresented in tech, particularly in Bitcoin development. Recognizing the urgent need to bridge this gap, DADA DEVS was created to not only educate but to inspire and equip African women with the tools to solve real-world challenges through decentralized solutions.
