description: |
  Fundada en 2024 por el líder visionario Marcel Lorraine, DADA DEVS es una iniciativa sin ánimo de lucro nacida de la necesidad de empoderar a las mujeres desarrolladoras africanas para que ocupen un lugar central en la innovación de Bitcoin y Blockchain. África rebosa potencial sin explotar, pero las mujeres siguen estando significativamente infrarrepresentadas en la tecnología, en particular en el desarrollo de Bitcoin. Reconociendo la urgente necesidad de salvar esta brecha, DADA DEVS se creó no sólo para educar, sino para inspirar y equipar a las mujeres africanas con las herramientas para resolver los desafíos del mundo real a través de soluciones descentralizadas.