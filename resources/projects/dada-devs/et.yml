description: |
  DADA DEVS, mille asutas 2024. aastal visionäär Marcel Lorraine, on mittetulunduslik algatus, mis on sündinud vajadusest anda Aafrika naisarendajatele võimalus asuda Bitcoin ja Blockchain innovatsiooni keskmesse.Aafrika on tulvil kasutamata potentsiaali, kuid naised on tehnoloogias, eriti Bitcoin arenduses, endiselt märkimisväärselt alaesindatud. Tunnistades tungivat vajadust selle lõhe ületamiseks, loodi DADA DEVS, et mitte ainult harida, vaid inspireerida ja varustada Aafrika naisi vahenditega, et lahendada reaalseid probleeme detsentraliseeritud lahenduste abil.