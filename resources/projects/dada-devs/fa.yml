description: |
  تأسیس شده در سال 2024 توسط رهبر بصیر مارسل لورین، DADA DEVS یک ابتکار غیرانتفاعی است که از نیاز به توانمندسازی توسعه‌دهندگان زن آفریقایی برای قرار گرفتن در مرکز نوآوری‌های Bitcoin و Blockchain به وجود آمده است. آفریقا مملو از پتانسیل‌های استفاده‌نشده است، اما زنان همچنان به‌طور قابل‌توجهی در فناوری، به‌ویژه در توسعه Bitcoin، نمایندگی کمتری دارند. با شناخت نیاز فوری به پر کردن این شکاف، DADA DEVS ایجاد شد تا نه تنها آموزش دهد بلکه الهام‌بخش باشد و زنان آفریقایی را با ابزارهایی برای حل چالش‌های دنیای واقعی از طریق راه‌حل‌های غیرمتمرکز مجهز کند.