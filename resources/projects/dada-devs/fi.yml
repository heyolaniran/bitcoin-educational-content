description: |
  DADA DEVS on vuonna 2024 visionäärisen johtajan Marcel Lorrainen perustama voittoa tavoittelematon aloite, joka on syntynyt tarpeesta antaa afrikkalaisille naiskehittäjille mahdollisuus ottaa keskeinen asema Bitcoin- ja Blockchain-innovaatioissa.Afrikka on täynnä hyödyntämätöntä potentiaalia, mutta naiset ovat edelleen merkittävästi aliedustettuina teknologia-alalla, erityisesti Bitcoin-kehityksessä. DADA DEVS perustettiin, jotta afrikkalaisia naisia voitaisiin paitsi kouluttaa myös innostaa ja varustaa työkaluilla, joilla he voivat ratkaista todellisia haasteita hajautettujen ratkaisujen avulla.