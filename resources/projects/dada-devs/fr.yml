description: |
  Fondée en 2024 par le leader visionnaire Marcel Lorraine, DADA DEVS est une initiative à but non lucratif née de la nécessité de donner aux développeuses africaines les moyens de jouer un rôle central dans l'innovation Bitcoin et Blockchain.L'Afrique regorge d'un potentiel inexploité, mais les femmes restent largement sous-représentées dans la technologie, en particulier dans le développement Bitcoin. Reconnaissant le besoin urgent de combler ce fossé, DADA DEVS a été créé non seulement pour éduquer, mais aussi pour inspirer et équiper les femmes africaines avec les outils nécessaires pour résoudre les défis du monde réel grâce à des solutions décentralisées.