description: |
  दूरदर्शी नेता मार्सेल लोरेन द्वारा 2024 में स्थापित, DADA DEVS एक गैर-लाभकारी पहल है जो अफ्रीकी महिला डेवलपर्स को Bitcoin और Blockchain नवाचार में केंद्र स्तर पर लाने के लिए सशक्त बनाने की आवश्यकता से पैदा हुई है। अफ्रीका अप्रयुक्त क्षमता से भरा हुआ है, फिर भी महिलाएं तकनीक में, विशेष रूप से Bitcoin विकास में काफी कम प्रतिनिधित्व करती हैं। इस अंतर को पाटने की तत्काल आवश्यकता को पहचानते हुए, DADA DEVS को न केवल शिक्षित करने के लिए बनाया गया था, बल्कि विकेंद्रीकृत समाधानों के माध्यम से वास्तविक दुनिया की चुनौतियों को हल करने के लिए अफ्रीकी महिलाओं को प्रेरित और सुसज्जित करने के लिए बनाया गया था।