description: |
  Didirikan pada tahun 2024 oleh pemimpin visioner Marcel Lorraine, DADA DEVS adalah inisiatif nirlaba yang lahir dari kebutuhan untuk memberdayakan para pengembang perempuan Afrika agar dapat menjadi pusat perhatian dalam inovasi Bitcoin dan Blockchain. Afrika memiliki banyak sekali potensi yang belum tersentuh, namun perempuan masih sangat kurang terwakili di bidang teknologi, terutama dalam pengembangan Bitcoin. Menyadari kebutuhan mendesak untuk menjembatani kesenjangan ini, DADA DEVS diciptakan untuk tidak hanya mendidik tetapi juga untuk menginspirasi dan melengkapi perempuan Afrika dengan alat untuk memecahkan tantangan dunia nyata melalui solusi terdesentralisasi.