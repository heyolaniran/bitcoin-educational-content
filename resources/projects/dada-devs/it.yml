description: |
  Fondata nel 2024 dal leader visionario Marcel Lorraine, DADA DEVS è un'iniziativa senza scopo di lucro nata dall'esigenza di mettere le donne africane sviluppatrici al centro dell'innovazione Bitcoin e Blockchain. L'Africa trabocca di potenziale inutilizzato, ma le donne sono ancora significativamente sottorappresentate nel settore tecnologico, in particolare nello sviluppo Bitcoin. Riconoscendo l'urgente necessità di colmare questo divario, DADA DEVS è stata creata non solo per educare, ma anche per ispirare e dotare le donne africane degli strumenti per risolvere le sfide del mondo reale attraverso soluzioni decentralizzate.