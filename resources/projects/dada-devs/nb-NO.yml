description: |
  DADA DEVS ble grunnlagt i 2024 av den visjonære lederen Marcel Lorraine, og er et ideelt initiativ som ble født ut fra behovet for å styrke afrikanske kvinnelige utviklere slik at de kan stå i sentrum for innovasjon innen Bitcoin og Blockchain. Afrika er full av uutnyttet potensial, men kvinner er fortsatt betydelig underrepresentert innen teknologi, spesielt innen Bitcoin-utvikling. DADA DEVS ble opprettet for å utdanne, inspirere og utstyre afrikanske kvinner med verktøyene de trenger for å løse virkelige utfordringer gjennom desentraliserte løsninger.