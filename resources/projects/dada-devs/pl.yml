description: |
  Założona w 2024 roku przez wizjonerskiego lidera Marcela Lorraine'a, DADA DEVS jest inicjatywą non-profit zrodzoną z potrzeby wzmocnienia pozycji afrykańskich programistek, aby mogły zająć centralne miejsce w innowacjach Bitcoin i Blockchain. Afryka jest pełna niewykorzystanego potencjału, ale kobiety pozostają znacznie niedostatecznie reprezentowane w technologii, szczególnie w rozwoju Bitcoin. Uznając pilną potrzebę wypełnienia tej luki, DADA DEVS została stworzona, aby nie tylko edukować, ale także inspirować i wyposażać afrykańskie kobiety w narzędzia do rozwiązywania rzeczywistych wyzwań poprzez zdecentralizowane rozwiązania.