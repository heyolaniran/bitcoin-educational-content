description: |
  Fundada em 2024 pelo líder visionário Marcel Lorraine, a DADA DEVS é uma iniciativa sem fins lucrativos nascida da necessidade de capacitar as mulheres africanas desenvolvedoras para ocuparem o centro do palco na inovação Bitcoin e Blockchain. A África está repleta de potencial inexplorado, mas as mulheres continuam significativamente sub-representadas na tecnologia, particularmente no desenvolvimento Bitcoin. Reconhecendo a necessidade urgente de colmatar esta lacuna, a DADA DEVS foi criada não só para educar, mas também para inspirar e equipar as mulheres africanas com as ferramentas para resolver desafios do mundo real através de soluções descentralizadas.