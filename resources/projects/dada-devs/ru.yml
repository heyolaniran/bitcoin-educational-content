description: |
  Основанная в 2024 году дальновидным лидером Марселем Лоррейном, DADA DEVS - это некоммерческая инициатива, родившаяся из необходимости расширить возможности африканских женщин-разработчиков, чтобы они заняли центральное место в инновациях Bitcoin и Blockchain. Африка полна нереализованного потенциала, однако женщины по-прежнему значительно недопредставлены в сфере технологий, особенно в разработке Bitcoin. Осознавая острую необходимость преодолеть этот разрыв, DADA DEVS была создана, чтобы не только обучать, но и вдохновлять и вооружать африканских женщин инструментами для решения реальных проблем с помощью децентрализованных решений.