description: |
  Osnovan 2024. godine od strane vizionarskog lidera Marcela Lorena, DADA DEVS je neprofitna inicijativa nastala iz potrebe da se afričkim ženama programerkama omogući da zauzmu centralno mesto u inovacijama Bitcoin i Blockchain. Afrika je prepuna neiskorišćenog potencijala, ali žene su i dalje značajno nedovoljno zastupljene u tehnologiji, posebno u razvoju Bitcoin. Prepoznajući hitnu potrebu za premošćavanjem ovog jaza, DADA DEVS je stvoren ne samo da obrazuje, već i da inspiriše i opremi afričke žene alatima za rešavanje stvarnih izazova kroz decentralizovana rešenja.