description: |
  DADA DEVS grundades 2024 av den visionära ledaren Marcel Lorraine och är ett ideellt initiativ som föddes ur behovet av att stärka afrikanska kvinnliga utvecklare att ta plats i centrum för Bitcoin- och Blockchain-innovation.Afrika är full av outnyttjad potential, men kvinnor är fortfarande betydligt underrepresenterade inom teknik, särskilt inom Bitcoin-utveckling. Med tanke på det akuta behovet av att överbrygga detta gap skapades DADA DEVS för att inte bara utbilda utan också inspirera och utrusta afrikanska kvinnor med verktygen för att lösa verkliga utmaningar genom decentraliserade lösningar.