description: |
  Ilianzishwa mwaka wa 2024 na kiongozi mwenye maono Marcel Lorraine, DADA DEVS ni mpango usio wa faida uliotokana na hitaji la kuwawezesha watengenezaji wanawake wa Kiafrika kuchukua hatua kuu katika uvumbuzi wa Bitcoin na Blockchain.Afrika inajaa uwezo ambao haujatumiwa, lakini wanawake wanasalia kuwakilishwa kidogo katika teknolojia, hasa katika maendeleo ya Bitcoin. Kwa kutambua hitaji la dharura la kuziba pengo hili, DADA DEVS iliundwa sio tu kuelimisha bali pia kuwatia moyo na kuwapa wanawake wa Kiafrika zana za kutatua changamoto za ulimwengu halisi kupitia suluhu zilizogatuliwa.