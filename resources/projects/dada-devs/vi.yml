description: |
  Được thành lập vào năm 2024 bởi nhà lãnh đạo có tầm nhìn Marcel Lorraine, DADA DEVS là một sáng kiến phi lợi nhuận ra đời từ nhu cầu trao quyền cho các nhà phát triển nữ châu Phi để họ có thể đóng vai trò trung tâm trong đổi mới Bitcoin và Blockchain. Châu Phi tràn đầy tiềm năng chưa được khai thác, nhưng phụ nữ vẫn còn bị đại diện rất ít trong công nghệ, đặc biệt là trong phát triển Bitcoin. Nhận ra nhu cầu cấp thiết phải thu hẹp khoảng cách này, DADA DEVS được thành lập không chỉ để giáo dục mà còn để truyền cảm hứng và trang bị cho phụ nữ châu Phi các công cụ để giải quyết các thách thức trong thế giới thực thông qua các giải pháp phi tập trung.