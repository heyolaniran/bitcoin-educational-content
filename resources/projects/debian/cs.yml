description: |
  Komunitní organizace založená v roce 1993, která se věnuje vývoji svobodného operačního systému Debian. Cílem projektu Debian, který tvoří dobrovolníci z celého světa, je vytvořit stabilní, bezpečný a zcela svobodný systém založený na jádře Linux. Debian je známý svými přísnými standardy kvality softwaru, demokratickým řízením a přísnou politikou ve prospěch svobodného softwaru, jak je formalizováno v Debian Social Contract a Debian Free Software Guidelines.