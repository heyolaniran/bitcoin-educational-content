description: |
  1993 gegründete Gemeinschaftsorganisation, die sich der Entwicklung des freien Betriebssystems Debian widmet. Das Debian-Projekt besteht aus Freiwilligen aus der ganzen Welt und zielt darauf ab, ein stabiles, sicheres und völlig freies System zu entwickeln, das auf dem Linux-Kernel basiert. Debian ist bekannt für seine strengen Software-Qualitätsstandards, seine demokratische Verwaltung und seine strikte Politik zugunsten freier Software, die in der Debian Social Contract und den Debian-Richtlinien für freie Software formalisiert sind.