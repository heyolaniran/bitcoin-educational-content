description: |
  Organización comunitaria fundada en 1993, dedicada al desarrollo del sistema operativo libre Debian. Formado por voluntarios de todo el mundo, el proyecto Debian tiene como objetivo producir un sistema estable, seguro y completamente libre, basado en el núcleo Linux. Debian es conocida por sus rigurosos estándares de calidad del software, su gestión democrática y su estricta política a favor del software libre, formalizada en la Debian Social Contract y las Directrices de Software Libre de Debian.