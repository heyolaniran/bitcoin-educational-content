description: |
  1993. aastal asutatud ühenduse organisatsioon, mis on pühendunud vaba operatsioonisüsteemi Debian arendamisele. Kogu maailma vabatahtlikest koosneva Debian-projekti eesmärk on luua stabiilne, turvaline ja täiesti vaba süsteem, mis põhineb Linuxi tuumal. Debian on tuntud oma rangete tarkvarakvaliteedi standardite, demokraatliku juhtimise ja vaba tarkvara toetava range poliitika poolest, mis on vormistatud Debian Social Contract ja Debian Free Software Guidelines.