description: |
  سازمان اجتماعی تأسیس‌شده در سال ۱۹۹۳، متعهد به توسعه سیستم‌عامل آزاد دبیان. متشکل از داوطلبانی از سراسر جهان، پروژه دبیان هدف دارد تا سیستمی پایدار، امن و کاملاً رایگان، مبتنی بر هسته لینوکس تولید کند. دبیان به خاطر استانداردهای دقیق کیفیت نرم‌افزار، مدیریت دموکراتیک و سیاست سخت‌گیرانه در حمایت از نرم‌افزار آزاد، که در منشور اجتماعی دبیان Contract و دستورالعمل‌های نرم‌افزار آزاد دبیان رسمی شده است، شناخته شده است.