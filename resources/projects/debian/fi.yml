description: |
  Vuonna 1993 perustettu yhteisöjärjestö, joka on omistautunut vapaan Debian-käyttöjärjestelmän kehittämiseen. Eri puolilta maailmaa tulevista vapaaehtoisista koostuva Debian-projekti pyrkii tuottamaan vakaan, turvallisen ja täysin vapaan järjestelmän, joka perustuu Linux-ytimeen. Debian on tunnettu tiukoista ohjelmistojen laatustandardeista, demokraattisesta hallinnosta ja vapaita ohjelmistoja suosivasta tiukasta politiikasta, joka on virallistettu Debianin sosiaalisessa Contract:ssa ja Debianin vapaiden ohjelmistojen ohjeissa.