description: |
  Organisation communautaire fondée en 1993, dédiée au développement du système d’exploitation libre Debian. Composé de bénévoles du monde entier, le projet Debian vise à produire un système stable, sécurisé et entièrement libre, reposant sur le noyau Linux. Debian est reconnu pour sa rigueur en matière de qualité logicielle, sa gestion démocratique et sa politique stricte en faveur du logiciel libre, formalisée dans le Contrat social Debian et les Principes du logiciel libre Debian.