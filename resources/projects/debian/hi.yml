description: |
  1993 में स्थापित सामुदायिक संगठन, डेबियन फ्री ऑपरेटिंग सिस्टम के विकास के लिए समर्पित है। दुनिया भर के स्वयंसेवकों से बना डेबियन प्रोजेक्ट का लक्ष्य लिनक्स कर्नेल पर आधारित एक स्थिर, सुरक्षित और पूरी तरह से मुक्त सिस्टम तैयार करना है। डेबियन अपने कठोर सॉफ्टवेयर गुणवत्ता मानकों, लोकतांत्रिक प्रबंधन और मुक्त सॉफ्टवेयर के पक्ष में सख्त नीति के लिए प्रसिद्ध है, जैसा कि डेबियन सोशल Contract और डेबियन फ्री सॉफ्टवेयर दिशानिर्देशों में औपचारिक रूप से बताया गया है।