description: |
  Organisasi komunitas yang didirikan pada tahun 1993, didedikasikan untuk pengembangan sistem operasi bebas Debian. Terdiri dari sukarelawan dari seluruh dunia, proyek Debian bertujuan untuk menghasilkan sistem yang stabil, aman, dan sepenuhnya bebas, berdasarkan kernel Linux. Debian terkenal dengan standar kualitas perangkat lunaknya yang ketat, manajemen yang demokratis, dan kebijakan yang ketat dalam mendukung perangkat lunak bebas, seperti yang diformalkan dalam Debian Social Contract dan Pedoman Perangkat Lunak Bebas Debian.