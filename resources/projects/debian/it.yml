description: |
  Organizzazione comunitaria fondata nel 1993, dedicata allo sviluppo del sistema operativo libero Debian. Composto da volontari di tutto il mondo, il progetto Debian mira a produrre un sistema stabile, sicuro e completamente libero, basato sul kernel Linux. Debian è rinomata per i suoi rigorosi standard di qualità del software, per la gestione democratica e per la rigorosa politica a favore del software libero, formalizzata nella Debian Social Contract e nelle Debian Free Software Guidelines.