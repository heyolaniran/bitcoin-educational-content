description: |
  Fellesskapsorganisasjon grunnlagt i 1993, dedikert til utviklingen av det frie operativsystemet Debian. Debian-prosjektet består av frivillige fra hele verden, og har som mål å produsere et stabilt, sikkert og helt fritt system, basert på Linux-kjernen. Debian er kjent for sine strenge standarder for programvarekvalitet, demokratiske ledelse og strenge retningslinjer for fri programvare, som er formalisert i Debian Social Contract og Debians retningslinjer for fri programvare.