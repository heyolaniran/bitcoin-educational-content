description: |
  Organizacja społeczna założona w 1993 roku, zajmująca się rozwojem wolnego systemu operacyjnego Debian. Złożony z wolontariuszy z całego świata projekt Debian ma na celu stworzenie stabilnego, bezpiecznego i całkowicie wolnego systemu opartego na jądrze Linux. Debian słynie z rygorystycznych standardów jakości oprogramowania, demokratycznego zarządzania i surowej polityki na rzecz wolnego oprogramowania, sformalizowanej w Debian Social Contract i Debian Free Software Guidelines.