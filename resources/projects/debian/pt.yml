description: |
  Organização comunitária fundada em 1993, dedicada ao desenvolvimento do sistema operativo livre Debian. Composto por voluntários de todo o mundo, o projeto Debian tem como objetivo produzir um sistema estável, seguro e completamente livre, baseado no kernel Linux. O Debian é conhecido por seus rigorosos padrões de qualidade de software, gerenciamento democrático e política estrita em favor do software livre, como formalizado no Debian Social Contract e na Definição Debian de Software Livre.