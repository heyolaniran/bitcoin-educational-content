description: |
  Общественная организация, основанная в 1993 году и занимающаяся разработкой свободной операционной системы Debian. Состоящий из добровольцев со всего мира, проект Debian нацелен на создание стабильной, безопасной и полностью свободной системы, основанной на ядре Linux. Debian известен своими строгими стандартами качества программного обеспечения, демократическим управлением и строгой политикой в пользу свободного ПО, формализованной в Debian Social Contract и Debian Free Software Guidelines.