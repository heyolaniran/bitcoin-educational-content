description: |
  Organizacija zajednice osnovana 1993. godine, posvećena razvoju Debian slobodnog operativnog sistema. Sastavljena od volontera iz celog sveta, Debian projekat ima za cilj da proizvede stabilan, siguran i potpuno slobodan sistem, zasnovan na Linux kernelu. Debian je poznat po svojim rigoroznim standardima kvaliteta softvera, demokratskom upravljanju i strogoj politici u korist slobodnog softvera, kako je formalizovano u Debian Social Contract i Debian Free Software Guidelines.