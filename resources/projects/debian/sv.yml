description: |
  Gemenskapsorganisation grundad 1993, som ägnar sig åt utveckling av det fria operativsystemet Debian. Debian-projektet består av frivilliga från hela världen och har som mål att producera ett stabilt, säkert och helt fritt system, baserat på Linux-kärnan. Debian är känt för sina rigorösa kvalitetsstandarder för programvara, sin demokratiska förvaltning och sin strikta policy till förmån för fri programvara, som formaliseras i Debians sociala Contract och Debians riktlinjer för fri programvara.