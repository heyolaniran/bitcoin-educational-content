description: |
  Shirika la jumuiya lililoanzishwa mwaka wa 1993, lililojitolea kwa maendeleo ya mfumo wa uendeshaji wa bure wa Debian. Mradi wa Debian unaoundwa na watu wa kujitolea kutoka kote ulimwenguni, unalenga kutoa mfumo thabiti, salama na usio na malipo kabisa, kwa kuzingatia kerneli ya Linux. Debian inajulikana kwa viwango vyake vya ubora wa programu, usimamizi wa kidemokrasia na sera kali inayopendelea programu zisizolipishwa, kama ilivyorasimishwa katika Debian Social Contract na Miongozo ya Programu Isiyolipishwa ya Debian.