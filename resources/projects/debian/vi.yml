description: |
  Tổ chức cộng đồng được thành lập năm 1993, dành riêng cho việc phát triển hệ điều hành miễn phí Debian. Được thành lập bởi các tình nguyện viên từ khắp nơi trên thế giới, dự án Debian hướng đến mục tiêu tạo ra một hệ thống ổn định, an toàn và hoàn toàn miễn phí, dựa trên hạt nhân Linux. Debian nổi tiếng với các tiêu chuẩn chất lượng phần mềm nghiêm ngặt, quản lý dân chủ và chính sách nghiêm ngặt ủng hộ phần mềm miễn phí, như được chính thức hóa trong Debian Social Contract và Debian Free Software Guidelines.