description: |
  Ve společnosti Debifi se řídíme heslem "Vlastněte své peníze" Věříme v sílu Bitcoin nejen jako aktiva, ale jako pilíře finanční nezávislosti. Naše služby jsou koncipovány na základě filozofie "Nikdy neprodávejte. Půjčujte si." To znamená, že své podíly v Bitcoin můžete využít jako zástavu k zajištění úvěrů, aniž byste se museli rozloučit se svými aktivy. "Hold Your Keys" je pro nás víc než slogan; je to Commitment, který vám zajistí, že budete mít svůj Bitcoin i nadále pod kontrolou. Naše řešení bez zajištění podtrhují význam, který přikládáme úspěchu Bitcoin při utváření naší finanční budoucnosti. Využíváním Bitcoin jako superzajištění se snažíme uvolnit jeho plný potenciál a poskytnout našim zákazníkům bezkonkurenční bezpečnost a klid.