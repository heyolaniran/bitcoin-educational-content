description: |
  در Debifi، ما تحت شعار "پول خود را مالک شوید" زندگی می‌کنیم. ما به قدرت Bitcoin نه فقط به عنوان یک دارایی بلکه به عنوان یک ستون برای استقلال مالی باور داریم. خدمات ما بر اساس فلسفه "هرگز نفروش. قرض بگیر." طراحی شده‌اند. این بدان معناست که شما می‌توانید دارایی‌های Bitcoin خود را به عنوان وثیقه برای تأمین وام‌ها استفاده کنید بدون اینکه از دارایی‌های خود جدا شوید. "کلیدهای خود را نگه دارید" برای ما بیش از یک شعار است؛ این یک Commitment برای اطمینان از این است که شما کنترل Bitcoin خود را حفظ می‌کنید. راه‌حل‌های غیر حضانتی ما بر اهمیت موفقیت Bitcoin در شکل‌دهی به آینده مالی ما تأکید می‌کند. با استفاده از Bitcoin به عنوان وثیقه فوق‌العاده، ما قصد داریم پتانسیل کامل آن را باز کنیم و به مشتریان خود امنیت و آرامش بی‌نظیری ارائه دهیم.