description: |
  デビフィでは、"Own your money "を信条としています。私たちはBitcoinが単なる資産としてだけでなく、経済的自立の柱となることを信じています。デビフィのサービスは「売らない。借りる。つまり、Bitcoinの保有資産を担保として活用することで、資産を手放すことなく融資を受けることができるのです。私たちにとって、"Hold Your Keys "は単なるスローガンではなく、Bitcoinを確実に管理し続けるためのCommitmentなのです。私たちの非保管型ソリューションは、Bitcoinの成功が私たちの経済的な未来を形成する上で重要であることを強調しています。Bitcoinをスーパー担保として利用することで、その可能性を最大限に引き出し、お客様に比類のないセキュリティと安心を提供することを目指しています。