description: |
  I Debifi lever vi under mantraet "Eier pengene dine" Vi tror på kraften i Bitcoin, ikke bare som en eiendel, men som en grunnpilar for økonomisk uavhengighet. Våre tjenester er utformet rundt filosofien "Aldri selg. Lån." Det betyr at du kan bruke Bitcoin-beholdningen din som sikkerhet for å sikre lån uten å skille deg fra eiendelene dine. "Hold Your Keys" er mer enn et slagord for oss; det er en Commitment for å sikre at du beholder kontrollen over din Bitcoin. Våre løsninger uten frihetsberøvelse understreker betydningen vi legger på Bitcoins suksess når det gjelder å forme vår økonomiske fremtid. Ved å bruke Bitcoin som supersikkerhet tar vi sikte på å frigjøre det fulle potensialet og gi kundene våre enestående sikkerhet og trygghet.