description: |
  DecouvreBitcoin یک پروژه آموزشی است که هدف آن آوردن Bitcoin به عموم مردم با کاهش هزینه آموزش Bitcoin است. تیم پشت DecouvreBitcoin محتوای آموزشی با کیفیت بالا را به صورت کتاب‌ها، پوسترها، جلسات آموزشی، مصاحبه‌ها، پادکست‌ها، ملاقات‌ها و کنفرانس‌ها در سراسر جهان ایجاد و توزیع می‌کند. آن‌ها اصلی‌ترین مشارکت‌کنندگان در توسعه این دانشگاه هستند.