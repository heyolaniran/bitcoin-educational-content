description: |
  DecouvreBitcoin एक शैक्षणिक परियोजना है जिसका उद्देश्य Bitcoin शिक्षा की लागत को कम करके Bitcoin को आम जनता तक पहुँचाना है। DecouvreBitcoin के पीछे की टीम दुनिया भर में पुस्तकों, पोस्टर, प्रशिक्षण सत्रों, साक्षात्कारों, पॉडकास्ट, मीटअप और सम्मेलनों के रूप में उच्च-गुणवत्ता वाली शैक्षिक सामग्री बनाती और वितरित करती है। वे इस विश्वविद्यालय के विकास के पीछे मुख्य योगदानकर्ता हैं।