description: |
  DecouvreBitcoin to projekt edukacyjny, którego celem jest udostępnienie Bitcoin masom poprzez obniżenie kosztów edukacji Bitcoin. Zespół stojący za DecouvreBitcoin tworzy i rozpowszechnia wysokiej jakości treści edukacyjne w formie książek, plakatów, sesji szkoleniowych, wywiadów, podcastów, spotkań i konferencji na całym świecie. Są oni głównymi współtwórcami rozwoju tego uniwersytetu.