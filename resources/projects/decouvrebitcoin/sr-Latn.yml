description: |
  DecouvreBitcoin je obrazovni projekat koji ima za cilj da približi Bitcoin masama smanjenjem troškova obrazovanja o Bitcoin. Tim iza DecouvreBitcoin-a kreira i distribuira visokokvalitetni obrazovni sadržaj u obliku knjiga, postera, trening sesija, intervjua, podkasta, okupljanja i konferencija širom sveta. Oni su glavni doprinosioci razvoju ovog univerziteta.