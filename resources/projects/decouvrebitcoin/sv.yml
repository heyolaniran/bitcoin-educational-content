description: |
  DecouvreBitcoin är ett utbildningsprojekt som syftar till att föra Bitcoin till massorna genom att minska kostnaden för Bitcoin-utbildning. Teamet bakom DecouvreBitcoin skapar och distribuerar högkvalitativt utbildningsinnehåll i form av böcker, affischer, utbildningssessioner, intervjuer, podcasts, möten och konferenser över hela världen. De är de viktigaste bidragsgivarna bakom utvecklingen av detta universitet.