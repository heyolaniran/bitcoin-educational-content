description: |
  DecouvreBitcoin ni mradi wa elimu ambao unalenga kuleta Bitcoin kwa raia kwa kupunguza gharama ya elimu ya Bitcoin. Timu iliyo nyuma ya DecouvreBitcoin huunda na kusambaza maudhui ya elimu ya hali ya juu kwa njia ya vitabu, mabango, vipindi vya mafunzo, mahojiano, podikasti, mikutano na makongamano kote ulimwenguni. Wao ndio wachangiaji wakuu nyuma ya maendeleo ya chuo kikuu hiki.