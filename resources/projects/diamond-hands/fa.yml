description: |
  شرکت Diamond Hands Inc. یک شرکت پیشرو متمرکز بر Bitcoin مستقر در ژاپن است. آن‌ها در توسعه محصولات و خدمات نوآورانه Bitcoin تخصص دارند و تأکید زیادی بر Lightning Network دارند. پیشنهادات آن‌ها شامل توسعه محصول، یکپارچه‌سازی Bitcoin و Lightning، و خدمات رسانه‌ای و بومی‌سازی است.
  
  آن‌ها همچنین به‌طور فعال در فعالیت‌های جامعه‌سازی مانند سازماندهی رویدادها، حمایت از همکاری‌های توسعه‌دهندگان و ارائه منابع آموزشی شرکت می‌کنند. مأموریت آن‌ها ساختن جهانی بازتر با محوریت Bitcoin است.