description: |
  Diamond Hands Inc. je vodeća kompanija fokusirana na Bitcoin sa sedištem u Japanu. Specijalizovani su za razvoj inovativnih Bitcoin proizvoda i usluga, sa jakim naglaskom na Lightning Network. Njihova ponuda uključuje razvoj proizvoda, integraciju Bitcoin i Lightning, kao i medijske i lokalizacione usluge.
  
  Takođe se aktivno bave aktivnostima izgradnje zajednice kao što su organizovanje događaja, podrška saradnji programera i pružanje obrazovnih resursa. Njihova misija je izgraditi otvoreniji svet usredsređen na Bitcoin.