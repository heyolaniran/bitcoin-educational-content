description: |
  DvadesetJedan je neformální skupina nadšenců Bitcoin z bývalého prostoru, jejímž cílem je vzdělávání, podpora podnikání a rozšiřování sítě Bitcoin prostřednictvím různých projektů. Skupina v současné době čítá stovky členů a pořádá pravidelná setkání po celém regionu. Vítáni jsou všichni, kdo chápou výjimečnost a důležitost Bitcoin, ale i ti, kdo se o něm chtějí něco dozvědět. Jako milovníci Bitcoin se rádi se všemi podělíme o znalosti a zkušenosti. Někteří z nás pracují v oboru Bitcoin, někteří mají firmy, které jsou s Bitcoin spjaty, a někteří jsou jen nadšenci. To, co nás spojuje, je láska k této technologii. Pokud se vám to zdá zajímavé, chcete si poslechnout, co vám chceme říct, nebo je něco, o co byste se s námi chtěli podělit - čekáme na vás!
  