description: |
  DvadesetJedan ist eine informelle Gruppe von Bitcoin-Enthusiasten aus dem ehemaligen Yu-Raum, die sich zum Ziel gesetzt hat, das Bitcoin-Netzwerk durch verschiedene Projekte auszubilden, den Unternehmergeist zu fördern und zu erweitern. Die Gruppe zählt derzeit Hunderte von Mitgliedern und organisiert regelmäßige Treffen in der ganzen Region. Jeder, der die Besonderheit und Bedeutung von Bitcoin versteht, ist willkommen, aber auch diejenigen, die etwas darüber lernen möchten. Als Liebhaber von Bitcoin freuen wir uns, unser Wissen und unsere Erfahrungen mit allen zu teilen. Einige von uns arbeiten in der Bitcoin-Industrie, andere haben Unternehmen, die mit Bitcoin zu tun haben, und wieder andere sind einfach nur Enthusiasten. Was uns zusammenbringt, ist die Liebe zu dieser Technologie. Wenn Sie das interessant finden, wenn Sie hören wollen, was wir zu sagen haben, oder wenn Sie uns etwas mitteilen wollen - wir warten auf Sie!
  