description: |
  DvadesetJedan es un grupo informal de entusiastas de Bitcoin del espacio ex-yu cuyo objetivo es educar, impulsar el espíritu empresarial y ampliar la red de Bitcoin a través de diversos proyectos. El grupo cuenta actualmente con cientos de miembros y organiza reuniones periódicas en toda la región. Son bienvenidos todos aquellos que comprendan la particularidad e importancia de Bitcoin, pero también aquellos que quieran aprender sobre él. Como amantes de Bitcoin, estamos encantados de compartir conocimientos y experiencias con todo el mundo. Algunos de nosotros trabajamos en la industria de Bitcoin, otros tienen negocios relacionados con Bitcoin, mientras que otros son simples entusiastas. Lo que nos une es el amor por esta tecnología. Si esto te parece interesante, quieres escuchar lo que tenemos que decir o hay algo que te gustaría compartir con nosotros - ¡te estamos esperando!
  