description: |
  DvadesetJedan on Bitcoin entusiastide mitteametlik grupp endisest ruumist, mille eesmärk on harida, edendada ettevõtlust ja laiendada Bitcoin võrgustikku erinevate projektide kaudu. Rühmal on praegu sadu liikmeid ja see korraldab regulaarseid kohtumisi üle kogu piirkonna. Oodatud on kõik, kes mõistavad Bitcoin erilisust ja tähtsust, aga ka need, kes tahaksid seda õppida. Bitcoin armastajana jagame hea meelega teadmisi ja kogemusi kõigiga. Mõned meist töötavad Bitcoin tööstuses, mõnel on Bitcoin-ga seotud ettevõtteid, mõned on aga lihtsalt entusiastid. Mis meid ühendab, on armastus selle tehnoloogia vastu. Kui see tundub teile huvitav, te soovite kuulda, mida meil on öelda või on midagi, mida te tahaksite meiega jagada - me ootame teid!
  