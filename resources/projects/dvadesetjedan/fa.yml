description: |
  DvadesetJedan یک گروه غیررسمی از علاقه‌مندان به Bitcoin از فضای سابق یوگسلاوی است که هدف آن آموزش، تقویت کارآفرینی و گسترش شبکه Bitcoin از طریق پروژه‌های مختلف است. این گروه در حال حاضر صدها عضو دارد و جلسات منظم در سراسر منطقه برگزار می‌کند. هر کسی که به ویژه بودن و اهمیت Bitcoin پی برده است، خوش‌آمد است، اما همچنین کسانی که می‌خواهند درباره آن یاد بگیرند. به عنوان یک عاشق Bitcoin، خوشحالیم که دانش و تجربه خود را با همه به اشتراک بگذاریم. برخی از ما در صنعت Bitcoin کار می‌کنیم، برخی کسب‌وکارهایی دارند که به Bitcoin مرتبط است، در حالی که برخی فقط علاقه‌مند هستند. آنچه ما را به هم پیوند می‌دهد، عشق به این فناوری است. اگر این برای شما جالب به نظر می‌رسد، می‌خواهید بشنوید که ما چه چیزی برای گفتن داریم یا چیزی هست که می‌خواهید با ما به اشتراک بگذارید – منتظر شما هستیم!