description: |
  DvadesetJedan on epävirallinen Bitcoin-harrastajien ryhmä ex-yu-tilasta, jonka tarkoituksena on kouluttaa, edistää yrittäjyyttä ja laajentaa Bitcoin-verkostoa erilaisten projektien avulla. Ryhmään kuuluu tällä hetkellä satoja jäseniä, ja se järjestää säännöllisiä tapaamisia eri puolilla aluetta. Mukaan ovat tervetulleita kaikki, jotka ymmärtävät Bitcoin:n erikoisuuden ja merkityksen, mutta myös ne, jotka haluavat oppia siitä lisää. Bitcoin:n ystävinä jaamme mielellämme tietoa ja kokemusta kaikkien kanssa. Jotkut meistä työskentelevät Bitcoin-alalla, joillakin on Bitcoin:aan liittyviä yrityksiä, kun taas jotkut meistä ovat vain harrastajia. Meitä yhdistää rakkaus tähän teknologiaan. Jos tämä vaikuttaa kiinnostavalta, haluat kuulla, mitä meillä on sanottavaa, tai jos sinulla on jotain, mitä haluaisit jakaa kanssamme - odotamme sinua!
  