description: |
  DvadesetJedan est un groupe informel de passionnés de Bitcoin de l'espace ex-yu qui a pour but d'éduquer, de stimuler l'esprit d'entreprise et d'étendre le réseau Bitcoin par le biais de divers projets. Le groupe compte actuellement des centaines de membres et organise des réunions régulières dans toute la région. Tous ceux qui comprennent la spécificité et l'importance de Bitcoin sont les bienvenus, mais aussi ceux qui souhaitent en savoir plus. En tant qu'amoureux du Bitcoin, nous sommes heureux de partager nos connaissances et notre expérience avec tout le monde. Certains d'entre nous travaillent dans l'industrie du Bitcoin, d'autres ont des entreprises liées au Bitcoin, tandis que d'autres sont simplement des passionnés. Ce qui nous rassemble, c'est l'amour de cette technologie. Si cela vous semble intéressant, si vous voulez entendre ce que nous avons à dire ou si vous souhaitez partager quelque chose avec nous, nous vous attendons !
  