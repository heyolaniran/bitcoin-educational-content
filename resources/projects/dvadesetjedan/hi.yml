description: |
  DvadesetJedan पूर्व-yu क्षेत्र से Bitcoin उत्साही लोगों का एक अनौपचारिक समूह है जिसका उद्देश्य विभिन्न परियोजनाओं के माध्यम से Bitcoin नेटवर्क को शिक्षित करना, उद्यमशीलता को बढ़ावा देना और उसका विस्तार करना है। समूह में वर्तमान में सैकड़ों सदस्य हैं और यह पूरे क्षेत्र में नियमित बैठकें आयोजित करता है। Bitcoin की विशेषता और महत्व को समझने वाले सभी लोगों का स्वागत है, लेकिन उन लोगों का भी जो इसके बारे में सीखना चाहते हैं। Bitcoin के प्रेमी के रूप में, हम सभी के साथ ज्ञान और अनुभव साझा करने में प्रसन्न हैं। हम में से कुछ Bitcoin उद्योग में काम करते हैं, कुछ के पास Bitcoin से जुड़े व्यवसाय हैं, जबकि कुछ सिर्फ़ उत्साही हैं। जो चीज़ हमें एक साथ लाती है वह है इस तकनीक का प्यार। अगर यह आपको दिलचस्प लगता है, तो आप सुनना चाहते हैं कि हमें क्या कहना है या ऐसा कुछ है जिसे आप हमारे साथ साझा करना चाहते हैं - हम आपका इंतज़ार कर रहे हैं!