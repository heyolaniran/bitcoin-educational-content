description: |
  DvadesetJedan adalah sebuah kelompok informal yang terdiri dari para penggemar Bitcoin dari ex-yu space yang bertujuan untuk mengedukasi, meningkatkan kewirausahaan dan memperluas jaringan Bitcoin melalui berbagai proyek. Kelompok ini saat ini memiliki ratusan anggota dan menyelenggarakan pertemuan rutin di seluruh wilayah. Semua orang yang memahami keistimewaan dan pentingnya Bitcoin dipersilakan untuk bergabung, begitu juga mereka yang ingin mempelajarinya. Sebagai pencinta Bitcoin, kami dengan senang hati berbagi pengetahuan dan pengalaman dengan semua orang. Beberapa dari kami bekerja di industri Bitcoin, beberapa memiliki bisnis yang terkait dengan Bitcoin, sementara beberapa lainnya hanya penggemar. Yang menyatukan kami adalah kecintaan terhadap teknologi ini. Jika hal ini tampak menarik bagi Anda, Anda ingin mendengar apa yang kami sampaikan atau ada sesuatu yang ingin Anda bagikan dengan kami - kami menunggu Anda!
  