description: |
  DvadesetJedan è un gruppo informale di appassionati di Bitcoin provenienti dallo spazio ex-yu con l'obiettivo di educare, stimolare l'imprenditorialità ed espandere la rete Bitcoin attraverso vari progetti. Il gruppo conta attualmente centinaia di membri e organizza incontri regolari in tutta la regione. Tutti coloro che comprendono la particolarità e l'importanza di Bitcoin sono i benvenuti, ma anche coloro che desiderano imparare a conoscerlo. Come amanti di Bitcoin, siamo felici di condividere conoscenze ed esperienze con tutti. Alcuni di noi lavorano nell'industria di Bitcoin, altri hanno attività commerciali legate al Bitcoin, altri ancora sono semplici appassionati. Ciò che ci unisce è l'amore per questa tecnologia. Se tutto questo vi sembra interessante, se volete sentire cosa abbiamo da dire o se c'è qualcosa che volete condividere con noi - vi aspettiamo!
  