description: |
  DvadesetJedanは、様々なプロジェクトを通じて、Bitcoinの教育、起業家精神の向上、ネットワークの拡大を目的とした、元ユース出身のBitcoin愛好家の非公式グループです。このグループは現在数百人のメンバーを数え、各地で定期的なミーティングを開催しています。Bitcoinの特別さと重要性を理解している人はもちろん、Bitcoinについて学びたい人も大歓迎です。Bitcoinを愛する者として、私たちは喜んで皆さんと知識や経験を分かち合いたいと思います。Bitcoin業界で働いている人もいれば、Bitcoinに関連したビジネスをしている人もいますし、ただの愛好家もいます。私たちを結びつけているのは、このテクノロジーへの愛です。Bitcoinに興味がある方、Bitcoinの話を聞きたい方、Bitcoinを共有したい方、お待ちしています！
  