description: |
  DvadesetJedan er en uformell gruppe av Bitcoin-entusiaster fra ex-yu-området som har som mål å utdanne, øke entreprenørskap og utvide Bitcoin-nettverket gjennom ulike prosjekter. Gruppen teller for tiden hundrevis av medlemmer og arrangerer regelmessige møter over hele regionen. Alle som forstår hvor spesielt og viktig Bitcoin er, er velkomne, men også de som ønsker å lære mer om det. Som Bitcoin-elskere deler vi gjerne kunnskap og erfaring med alle. Noen av oss jobber i Bitcoin-bransjen, noen har virksomheter som er knyttet tBitcoin, mens noen bare er entusiaster. Det som bringer oss sammen er kjærligheten til denne teknologien. Hvis dette virker interessant for deg, du vil høre hva vi har å si, eller det er noe du ønsker å dele med oss - vi venter på deg!
  