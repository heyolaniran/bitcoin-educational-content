description: |
  DvadesetJedan to nieformalna grupa entuzjastów Bitcoin z przestrzeni ex-yu, której celem jest edukacja, pobudzanie przedsiębiorczości i rozszerzanie sieci Bitcoin poprzez różne projekty. Grupa liczy obecnie setki członków i organizuje regularne spotkania w całym regionie. Wszyscy, którzy rozumieją wyjątkowość i znaczenie Bitcoin są mile widziani, ale także ci, którzy chcieliby się o nim dowiedzieć. Jako miłośnicy Bitcoin chętnie dzielimy się wiedzą i doświadczeniem ze wszystkimi. Niektórzy z nas pracują w branży Bitcoin, niektórzy mają firmy związane z Bitcoin, a niektórzy są po prostu entuzjastami. Łączy nas miłość do tej technologii. Jeśli wydaje Ci się to interesujące, chcesz usłyszeć, co mamy do powiedzenia lub jest coś, czym chciałbyś się z nami podzielić - czekamy na Ciebie!
  