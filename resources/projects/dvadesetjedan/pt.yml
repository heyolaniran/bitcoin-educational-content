description: |
  O DvadesetJedan é um grupo informal de entusiastas do Bitcoin do espaço ex-yu que tem como objetivo educar, impulsionar o empreendedorismo e expandir a rede Bitcoin através de vários projectos. O grupo conta atualmente com centenas de membros e organiza reuniões regulares em toda a região. Todos os que compreendem a especificidade e a importância do Bitcoin são bem-vindos, mas também aqueles que gostariam de aprender sobre ele. Como amantes do Bitcoin, temos todo o gosto em partilhar conhecimentos e experiências com todos. Alguns de nós trabalham na indústria do Bitcoin, outros têm negócios ligados ao Bitcoin, enquanto outros são apenas entusiastas. O que nos une é o amor por esta tecnologia. Se isto lhe parece interessante, se quer ouvir o que temos para dizer ou se há algo que gostaria de partilhar connosco - estamos à sua espera!
  