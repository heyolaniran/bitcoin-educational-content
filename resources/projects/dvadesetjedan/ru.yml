description: |
  DvadesetJedan - это неформальная группа энтузиастов Bitcoin из ex-yu пространства, целью которой является обучение, развитие предпринимательства и расширение сети Bitcoin через различные проекты. В настоящее время группа насчитывает сотни членов и организует регулярные встречи по всему региону. Приглашаются все, кто понимает особенность и важность Bitcoin, а также те, кто хотел бы узнать о ней больше. Как любители Bitcoin, мы рады поделиться знаниями и опытом со всеми. Некоторые из нас работают в индустрии Bitcoin, у кого-то есть бизнес, связанный с Bitcoin, а кто-то просто энтузиаст. Нас объединяет любовь к этой технологии. Если вам это кажется интересным, вы хотите послушать, что мы скажем, или есть что-то, чем вы хотели бы поделиться с нами - мы ждем вас!
  