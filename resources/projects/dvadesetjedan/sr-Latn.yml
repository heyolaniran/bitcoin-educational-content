description: |
  DvadesetJedan je neformalna grupa entuzijasta Bitcoin iz ex-yu prostora usmerena na edukaciju, podsticanje preduzetništva i širenje Bitcoin mreže kroz razne projekte. Grupa trenutno broji stotine članova i organizuje redovne sastanke širom regiona. Dobrodošli su svi koji razumeju posebnost i važnost Bitcoin, ali i oni koji bi želeli da saznaju više o tome. Kao ljubitelji Bitcoin, rado delimo znanje i iskustvo sa svima. Neki od nas rade u Bitcoin industriji, neki imaju poslove povezane sa Bitcoin, dok su neki samo entuzijasti. Ono što nas spaja je ljubav prema ovoj tehnologiji. Ako vam ovo zvuči zanimljivo, želite da čujete šta imamo da kažemo ili imate nešto što biste želeli da podelite sa nama – čekamo vas!