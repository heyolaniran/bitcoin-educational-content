description: |
  DvadesetJedan är en informell grupp av Bitcoin-entusiaster från ex-yu-rymden som syftar till att utbilda, öka entreprenörskap och utöka Bitcoin-nätverket genom olika projekt. Gruppen har för närvarande hundratals medlemmar och anordnar regelbundna möten i hela regionen. Alla som förstår hur speciellt och viktigt Bitcoin är är välkomna, men även de som vill lära sig mer om det. Vi som älskar Bitcoin delar gärna med oss av våra kunskaper och erfarenheter till alla. Några av oss arbetar i Bitcoin-branschen, andra har företag som är knutna till Bitcoin, medan andra bara är entusiaster. Det som för oss samman är kärleken till denna teknik. Om du tycker att det här verkar intressant, vill höra vad vi har att säga eller om det finns något du vill dela med dig av - då väntar vi på dig!
  