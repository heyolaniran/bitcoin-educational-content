description: |
  DvadesetJedan ni kikundi kisicho rasmi cha wapenda Bitcoin kutoka anga wa zamani wenye lengo la kuelimisha, kukuza ujasiriamali na kupanua mtandao wa Bitcoin kupitia miradi mbalimbali. Kikundi kwa sasa kinahesabu mamia ya wanachama na kuandaa mikutano ya kawaida katika eneo lote. Kila mtu anayeelewa umaalumu na umuhimu wa Bitcoin anakaribishwa, lakini pia wale ambao wangependa kujifunza kuihusu. Kama mpenzi wa Bitcoin, tuna furaha kushiriki ujuzi na uzoefu na kila mtu. Baadhi yetu tunafanya kazi katika tasnia ya Bitcoin, wengine wana biashara ambazo zimeunganishwa na Bitcoin, ilhali wengine ni wakereketwa tu. Kinachotuleta pamoja ni upendo wa teknolojia hii. Ikiwa hii inaonekana kuwa ya kuvutia kwako, unataka kusikia kile tunachosema au kuna kitu ambacho ungependa kushiriki nasi - tunakungojea!
  