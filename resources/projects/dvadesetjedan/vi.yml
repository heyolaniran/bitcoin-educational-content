description: |
  DvadesetJedan là một nhóm không chính thức gồm những người đam mê Bitcoin từ không gian ex-yu, với mục đích giáo dục, thúc đẩy tinh thần kinh doanh và mở rộng mạng lưới Bitcoin thông qua nhiều dự án khác nhau. Nhóm hiện có hàng trăm thành viên và tổ chức các cuộc họp thường xuyên trên khắp khu vực. Tất cả những ai hiểu được sự đặc biệt và tầm quan trọng của Bitcoin đều được chào đón, nhưng cũng chào đón cả những người muốn tìm hiểu về nó. Là một người yêu thích Bitcoin, chúng tôi rất vui khi được chia sẻ kiến thức và kinh nghiệm với mọi người. Một số người trong chúng tôi làm việc trong ngành Bitcoin, một số có doanh nghiệp gắn liền với Bitcoin, trong khi một số chỉ là những người đam mê. Điều gắn kết chúng tôi lại với nhau chính là tình yêu dành cho công nghệ này. Nếu bạn thấy điều này thú vị, bạn muốn nghe những gì chúng tôi nói hoặc có điều gì đó bạn muốn chia sẻ với chúng tôi - chúng tôi đang chờ bạn!
  
  