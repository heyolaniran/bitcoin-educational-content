description: |
  DvadesetJedan 是一个由来自前宇航空间的 Bitcoin 爱好者组成的非正式团体，旨在通过各种项目开展教育、促进创业和扩大 Bitcoin 网络。该小组目前有数百名成员，并在各地定期组织会议。我们欢迎所有了解 Bitcoin 特殊性和重要性的人，也欢迎那些希望了解 Bitcoin 的人。作为 Bitcoin 的爱好者，我们很乐意与大家分享知识和经验。我们中有些人在 Bitcoin 行业工作，有些人的业务与 Bitcoin 有关，而有些人只是爱好者。让我们走到一起的是对这项技术的热爱。如果您对此感兴趣，想听听我们的意见，或者有什么想与我们分享的--我们等着您！
  