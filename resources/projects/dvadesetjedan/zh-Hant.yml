description: |
  DvadesetJedan 是由來自 ex-yu 空間的 Bitcoin 熱愛者所組成的非正式團體，旨在透過各種專案教育、促進企業精神並擴大 Bitcoin 網路。該團體目前有數百名成員，並定期在各地區舉行會議。歡迎所有瞭解 Bitcoin 的特殊性和重要性的人加入，同時也歡迎想要瞭解 Bitcoin 的人加入。身為 Bitcoin 的愛好者，我們很樂意與大家分享知識與經驗。我們當中有些人在 Bitcoin 業界工作，有些人的事業與 Bitcoin 相關聯，而有些人只是熱愛者。讓我們聚集在一起的是對這項技術的熱愛。如果您對此感興趣、想聽聽我們的意見，或是有什麼想與我們分享的話，我們等著您！
  