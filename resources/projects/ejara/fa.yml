description: |
  ایجارا یک پلتفرم سرمایه‌گذاری موبایلی مستقر در کامرون است. این پلتفرم به کاربران اجازه می‌دهد تا Bitcoin را خریداری، فروش و ذخیره کنند. با دسترسی که از تنها ۱,۰۰۰ فرانک سی‌اف‌ای (\~۱.۵۰ دلار) شروع می‌شود، یک جایگزین امن برای بانکداری سنتی ارائه می‌دهد، به ویژه برای آفریقایی‌های فرانسوی‌زبان و دیاسپورا.