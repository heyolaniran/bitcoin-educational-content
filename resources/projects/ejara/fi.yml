description: |
  Ejara on Kamerunissa sijaitseva mobiili sijoitusalusta. Sen avulla käyttäjät voivat ostaa, myydä ja tallentaa Bitcoin. Se tarjoaa turvallisen vaihtoehdon perinteiselle pankkitoiminnalle erityisesti ranskankielisille afrikkalaisille ja diasporalaisille, sillä käyttöoikeus alkaa vain 1 000 FCFA:lla (1,50 dollaria).