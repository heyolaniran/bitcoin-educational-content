description: |
  A Ejara é uma plataforma de investimento móvel sediada nos Camarões. Permite aos utilizadores comprar, vender e armazenar Bitcoin. Com acesso a partir de apenas 1.000 FCFA (\~\$1,50), oferece uma alternativa segura à banca tradicional, especialmente para os africanos francófonos e para a diáspora.