description: |
  Ejara ni jukwaa la uwekezaji la rununu lililoko Kamerun. Inaruhusu watumiaji kununua, kuuza na kuhifadhi Bitcoin. Kwa ufikiaji unaoanzia 1,000 FCFA tu (\~\$1.50), inatoa njia mbadala salama kwa benki za kitamaduni, haswa kwa Waafrika wanaozungumza Kifaransa na wanaoishi nje ya nchi.