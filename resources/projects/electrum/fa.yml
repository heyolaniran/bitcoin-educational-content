description: |
  الکتروم یک Bitcoin Wallet چندمنظوره است که اولویت آن ایمنی و انعطاف‌پذیری کاربران است.
  
  این برنامه از پلتفرم‌های مختلفی از جمله موبایل، دسکتاپ و رابط‌های خط فرمان پشتیبانی می‌کند. کلیدهای خصوصی شما رمزگذاری شده و بر روی دستگاه شما نگهداری می‌شوند، که اطمینان می‌دهد هرگز در معرض خطر قرار نمی‌گیرند. علاوه بر این، الکتروم از یک عبارت مخفی برای بازیابی وجوه استفاده می‌کند و از طریق شبکه سرور خود دسترسی سریع به Bitcoin Blockchain را فراهم می‌کند. این برنامه از "ذخیره‌سازی Cold آفلاین" برای حفظ امنیت کلیدهای خصوصی شما پشتیبانی می‌کند و قابلیت‌های Multisig را برای تقسیم مجوز خرج کردن سکه ارائه می‌دهد. الکتروم همچنین تمامی تراکنش‌ها در تاریخچه شما را با استفاده از تأیید پرداخت ساده (SPV) تأیید می‌کند و اجازه ادغام پلاگین‌های شخص ثالث، مانند خدمات Multisig و کیف‌پول‌های سخت‌افزاری را می‌دهد.