description: |
  Electrum ni Bitcoin Wallet inayotumika anuwai inayotanguliza usalama wa mtumiaji na kubadilika. 
  
  Inaauni majukwaa mengi ikiwa ni pamoja na rununu, eneo-kazi, na miingiliano ya mstari wa amri. Funguo zako za faragha zimesimbwa kwa njia fiche na kuwekwa kwenye kifaa chako, ili kuhakikisha kuwa hazifichuwi kamwe. Zaidi ya hayo, Electrum hutumia maneno ya siri ili kuruhusu urejeshaji wa fedha, na hutoa ufikiaji wa haraka kwa Bitcoin Blockchain kupitia mtandao wake wa seva. Inaauni "hifadhi ya Cold" nje ya mtandao ili kuweka funguo zako za faragha salama, na inatoa uwezo wa Multisig kugawanya ruhusa ya matumizi ya sarafu. Electrum pia huthibitisha miamala yote katika historia yako kwa kutumia Uthibitishaji wa Malipo Iliyorahisishwa (SPV), na inaruhusu miunganisho ya programu-jalizi za wahusika wengine, kama vile huduma za Multisig na pochi za maunzi.