description: |
  'European Bitcoiners' est. Block 731398 یک ابتکار آموزشی و اجتماعی است که هدف آن گرد هم آوردن تمام Plebs اروپایی و کسانی است که می‌خواهند درباره Bitcoin یاد بگیرند. این ابتکار غیرانتفاعی توزیع‌شده بر ایجاد یک پلتفرم برای اشتراک‌گذاری، همکاری و آموزش Bitcoin تمرکز دارد و شکاف بین زبان‌ها، مناطق و کشورهای سراسر اروپا را پر می‌کند. به عنوان یک شبکه آموزشی توزیع‌شده، هیچ مرجع یا مدیریت مرکزی برای این ابتکار وجود ندارد و به طور کامل به مشارکت و مدیریت محتوای داوطلبانه متکی است. هر کسی، در هر نقطه‌ای از اروپا، می‌تواند برای ساخت و گسترش دامنه این ابتکار مشارکت کند. همچنین، سایر بیت‌کوینرها در سراسر جهان نیز می‌توانند برای گسترش مواد، تخصص و دامنه آن کمک کنند.