description: |
  'European Bitcoiners' est. Block 731398 je obrazovna i zajednička inicijativa koja okuplja sve evropske Plebs i one koji žele da uče o Bitcoin. Ova distribuirana neprofitna inicijativa fokusira se na izgradnju platforme za deljenje, saradnju i Bitcoin edukaciju, premošćujući jaz između jezika, regiona i zemalja širom Evrope. Kao distribuirana obrazovna mreža, ova inicijativa nema centralnu vlast ili upravljanje i oslanja se isključivo na učešće, kuriranje sadržaja na dobrovoljnoj osnovi. Svako, bilo gde širom Evrope, može doprineti izgradnji i proširenju obima ove inicijative. Takođe, i drugi bitkoineri širom sveta su dobrodošli da doprinesu i pomognu u proširenju materijala, stručnosti i obima.