description: |
  Věřte si. Všechno je mentální. NEJDĚLEJTE JÍZDU PŘEŽITÍ, pokud chcete, aby váš život zůstal po jejím skončení stejný. Kurátorská dobrodružství se stejně smýšlejícími lidmi. Projíždějte úžasnou krajinou s kolegy podnikateli a společně řešte problémy a zažívejte dobrodružství. Nová a jedinečná forma Mastermind konference.
  