description: |
  Glauben Sie an sich selbst. Alles ist Kopfsache. Nimm NICHT an einem Ride of Passage teil, wenn du willst, dass dein Leben danach noch genauso ist wie vorher. Kuratierte Abenteuer mit Gleichgesinnten. Reiten Sie mit anderen Unternehmern durch atemberaubende Landschaften, während Sie gemeinsam Probleme lösen und Abenteuer erleben. Eine neue und einzigartige Form der Mastermind-Konferenz.
  