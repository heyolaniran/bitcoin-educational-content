description: |
  Uskuge endasse. Kõik on vaimne. ÄRGE tulge Ride of Passage'ile, kui soovite, et teie elu jääks pärast seda samaks. Kuuritud seiklused koos sarnaselt mõtlevate inimestega. Sõitke koos kaasettevõtjatega üle uimastavate maastike, kui lahendate koos probleeme ja seiklete koos. Uus ja ainulaadne Mastermind-konverentsi vorm.
  