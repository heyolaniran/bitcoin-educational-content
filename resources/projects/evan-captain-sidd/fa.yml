description: |
  به خودت ایمان داشته باش. همه چیز ذهنی است. اگر می‌خواهید زندگی‌تان پس از آن همان‌طور بماند، به یک سفر گذر نروید. ماجراجویی‌های گزینش‌شده با افرادی همفکر. با کارآفرینان هم‌سفر از مناظر خیره‌کننده عبور کنید و با هم به حل مسائل و ماجراجویی بپردازید. یک شکل جدید و منحصر به فرد از کنفرانس مسترمایند.