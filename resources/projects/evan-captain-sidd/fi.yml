description: |
  Usko itseesi. Kaikki on henkistä. ÄLÄ tule Ride of Passage -matkalle, jos haluat, että elämäsi pysyy sen jälkeen samanlaisena. Kuratoituja seikkailuja samanhenkisten ihmisten kanssa. Ratsastakaa upeiden maisemien halki muiden yrittäjien kanssa, kun ratkaisette ongelmia ja seikkailette yhdessä. Uusi ja ainutlaatuinen Mastermind-konferenssin muoto.
  