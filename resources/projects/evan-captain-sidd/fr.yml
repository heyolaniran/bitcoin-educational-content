description: |
  Croyez en vous. Tout est mental. NE PARTICIPEZ PAS à un voyage de passage si vous voulez que votre vie reste la même par la suite. Des aventures conçues avec des personnes partageant les mêmes idées. Traversez des paysages époustouflants avec d'autres entrepreneurs, résolvez des problèmes et partez à l'aventure ensemble. Une forme nouvelle et unique de conférence Mastermind.
  