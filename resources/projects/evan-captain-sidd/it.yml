description: |
  Credete in voi stessi. Tutto è mentale. NON partecipate a una Cavalcata di Passaggio se volete che la vostra vita rimanga la stessa dopo. Avventure curate con persone che la pensano allo stesso modo. Attraversate paesaggi mozzafiato con altri imprenditori mentre risolvete problemi e vi avventurate insieme. Una forma nuova e unica di conferenza Mastermind.
  