description: |
  Tro på deg selv. Alt er mentalt. IKKE bli med på en Ride of Passage hvis du vil at livet ditt skal forbli det samme etterpå. Kuraterte eventyr med likesinnede. Ri gjennom fantastiske landskap sammen med andre gründere mens dere løser problemer og reiser på eventyr sammen. En ny og unik form for Mastermind-konferanse.
  