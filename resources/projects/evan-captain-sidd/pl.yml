description: |
  Uwierz w siebie. Wszystko jest mentalne. NIE przyjeżdżaj na Ride of Passage, jeśli chcesz, aby twoje życie pozostało takie samo. Wyselekcjonowane przygody z podobnie myślącymi ludźmi. Przemierzaj oszałamiające krajobrazy z innymi przedsiębiorcami, rozwiązując problemy i wspólnie przeżywając przygody. Nowa i unikalna forma konferencji Mastermind.
  