description: |
  Veruj u sebe. Sve je mentalno. NEMOJ dolaziti na Ride of Passage ako želiš da ti život ostane isti nakon toga. Kurirane avanture sa istomišljenicima. Vozi kroz zadivljujuće pejzaže sa kolegama preduzetnicima dok zajedno rešavate probleme i avanturistički istražujete. Novi i jedinstveni oblik Mastermind konferencije.