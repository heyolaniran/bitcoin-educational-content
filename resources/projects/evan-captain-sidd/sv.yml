description: |
  Tro på dig själv. Allt är mentalt. Följ INTE med på en Ride of Passage om du vill att ditt liv ska förbli detsamma efteråt. Kurerade äventyr med likasinnade människor. Åk över fantastiska landskap med andra entreprenörer när du löser problem och äventyrar tillsammans. En ny och unik form av Mastermind-konferens.
  