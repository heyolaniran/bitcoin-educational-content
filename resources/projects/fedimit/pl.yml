description: |
  Fedi tworzy nowy sposób, w jaki społeczności i organizacje mogą zabezpieczać i wykorzystywać swoje pieniądze i dane za pomocą sfederowanego systemu operacyjnego.
  
   Łączymy najbardziej fundamentalną ludzką technologię - społeczność - z technologiami wolnościowymi, takimi jak Bitcoin, aby podnieść poziom ludzkości.