description: |
  Projekt Fedora je celosvětová komunita podporovaná společností Red Hat, která se věnuje vývoji svobodného operačního systému Fedora. Projekt byl zahájen v roce 2003 a jeho cílem je poskytnout inovativní, bezpečnou a otevřenou platformu, která integruje nejnovější technologie ze světa Linuxu. Fedora vyniká rychlým vývojovým cyklem, vztahem Commitment k otevřenému zdrojovému kódu a rolí technologické výkladní skříně, která často slouží jako testovací základna pro budoucí vývoj systému Red Hat Enterprise Linux.