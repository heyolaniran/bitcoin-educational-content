description: |
  Das Fedora-Projekt ist eine weltweite Gemeinschaft, die von Red Hat unterstützt wird und sich der Entwicklung des freien Betriebssystems Fedora widmet. Das 2003 gestartete Projekt zielt darauf ab, eine innovative, sichere und offene Plattform bereitzustellen, die die neuesten Technologien aus der Linux-Welt integriert. Fedora zeichnet sich durch seinen schnellen Entwicklungszyklus, seine Commitment für Open Source und seine Rolle als technologisches Vorzeigeprojekt aus, das oft als Testumgebung für künftige Red Hat Enterprise Linux-Entwicklungen dient.