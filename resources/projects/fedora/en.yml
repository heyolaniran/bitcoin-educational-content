description: |
  The Fedora Project is a worldwide community, supported by Red Hat, dedicated to the development of the Fedora free operating system. Launched in 2003, the project aims to provide an innovative, secure and open platform, integrating the latest technologies from the Linux world. Fedora stands out for its rapid development cycle, its commitment to open source and its role as a technological showcase, often serving as a testbed for future Red Hat Enterprise Linux evolutions.