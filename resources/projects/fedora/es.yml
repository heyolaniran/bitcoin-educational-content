description: |
  El Proyecto Fedora es una comunidad mundial, apoyada por Red Hat, dedicada al desarrollo del sistema operativo libre Fedora. Lanzado en 2003, el proyecto pretende ofrecer una plataforma innovadora, segura y abierta, que integre las últimas tecnologías del mundo Linux. Fedora destaca por su rápido ciclo de desarrollo, su Commitment al código abierto y su papel como escaparate tecnológico, sirviendo a menudo de banco de pruebas para futuras evoluciones de Red Hat Enterprise Linux.