description: |
  Fedora Project on ülemaailmne kogukond, mida toetab Red Hat ja mis on pühendunud Fedora vaba operatsioonisüsteemi arendamisele. 2003. aastal käivitatud projekti eesmärk on pakkuda uuenduslikku, turvalist ja avatud platvormi, mis integreerib Linuxi maailma uusimaid tehnoloogiaid. Fedora paistab silma oma kiire arendustsükli, avatud lähtekoodiga Commitment ja tehnoloogilise näidisrakenduse rolli poolest, mis on sageli Red Hat Enterprise Linuxi tulevaste arengute testkeskkonnaks.