description: |
  پروژه فدورا یک جامعه جهانی است که توسط رد هت پشتیبانی می‌شود و به توسعه سیستم‌عامل رایگان فدورا اختصاص دارد. این پروژه که در سال ۲۰۰۳ راه‌اندازی شد، هدفش ارائه یک پلتفرم نوآورانه، امن و باز است که جدیدترین فناوری‌های دنیای لینوکس را یکپارچه می‌کند. فدورا به خاطر چرخه توسعه سریع، تعهد به منبع باز و نقش خود به عنوان یک ویترین فناوری متمایز است و اغلب به عنوان بستری آزمایشی برای تحولات آینده رد هت انترپرایز لینوکس عمل می‌کند.