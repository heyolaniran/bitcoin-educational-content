description: |
  Fedora-projekti on Red Hatin tukema maailmanlaajuinen yhteisö, joka on omistautunut vapaan Fedora-käyttöjärjestelmän kehittämiseen. Vuonna 2003 käynnistetyn projektin tavoitteena on tarjota innovatiivinen, turvallinen ja avoin alusta, johon on integroitu Linux-maailman uusimmat teknologiat. Fedora erottuu edukseen nopean kehityssyklinsä, avoimen lähdekoodin Commitment-periaatteensa ja teknologisen esittelynsä ansiosta, sillä se toimii usein testialustana Red Hat Enterprise Linuxin tuleville kehitysversioille.