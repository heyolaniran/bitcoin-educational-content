description: |
  Le Fedora Project est une communauté mondiale soutenue par Red Hat, dédiée au développement du système d’exploitation libre Fedora. Lancé en 2003, ce projet vise à fournir une plateforme innovante, sécurisée et libre, intégrant les dernières technologies du monde Linux. Fedora se distingue par son cycle de développement rapide, son engagement envers l’open source et son rôle de vitrine technologique, servant souvent de banc d’essai pour les futures évolutions de Red Hat Enterprise Linux.