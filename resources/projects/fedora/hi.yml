description: |
  फेडोरा परियोजना एक विश्वव्यापी समुदाय है, जिसे रेड हैट द्वारा समर्थन प्राप्त है, जो फेडोरा मुक्त ऑपरेटिंग सिस्टम के विकास के लिए समर्पित है। 2003 में शुरू की गई इस परियोजना का उद्देश्य लिनक्स दुनिया की नवीनतम तकनीकों को एकीकृत करते हुए एक अभिनव, सुरक्षित और खुला मंच प्रदान करना है। फेडोरा अपने तेज़ विकास चक्र, अपने Commitment से ओपन सोर्स और एक तकनीकी शोकेस के रूप में अपनी भूमिका के लिए जाना जाता है, जो अक्सर भविष्य के रेड हैट एंटरप्राइज लिनक्स विकास के लिए एक परीक्षण स्थल के रूप में कार्य करता है।