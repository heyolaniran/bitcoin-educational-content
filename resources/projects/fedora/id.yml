description: |
  Proyek Fedora adalah sebuah komunitas di seluruh dunia, yang didukung oleh Red Hat, yang didedikasikan untuk pengembangan sistem operasi bebas Fedora. Diluncurkan pada tahun 2003, proyek ini bertujuan untuk menyediakan platform yang inovatif, aman, dan terbuka, yang mengintegrasikan teknologi terbaru dari dunia Linux. Fedora menonjol karena siklus pengembangannya yang cepat, Commitment ke open source dan perannya sebagai etalase teknologi, yang sering kali berfungsi sebagai tempat uji coba untuk evolusi Red Hat Enterprise Linux di masa depan.