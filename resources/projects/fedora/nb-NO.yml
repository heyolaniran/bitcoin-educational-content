description: |
  Fedora-prosjektet er et verdensomspennende fellesskap, støttet av Red Hat, som er dedikert til utviklingen av det frie operativsystemet Fedora. Prosjektet ble lansert i 2003 og har som mål å tilby en innovativ, sikker og åpen plattform som integrerer de nyeste teknologiene fra Linux-verdenen. Fedora skiller seg ut med sin raske utviklingssyklus, sin Commitment til åpen kildekode og sin rolle som et teknologisk utstillingsvindu, som ofte fungerer som et testområde for fremtidige Red Hat Enterprise Linux-utviklinger.