description: |
  Projekt Fedora to ogólnoświatowa społeczność, wspierana przez Red Hat, poświęcona rozwojowi wolnego systemu operacyjnego Fedora. Rozpoczęty w 2003 roku projekt ma na celu zapewnienie innowacyjnej, bezpiecznej i otwartej platformy, integrującej najnowsze technologie ze świata Linuksa. Fedora wyróżnia się szybkim cyklem rozwoju, Commitment dla open source i rolą technologicznej wizytówki, często służącej jako poligon doświadczalny dla przyszłych ewolucji Red Hat Enterprise Linux.