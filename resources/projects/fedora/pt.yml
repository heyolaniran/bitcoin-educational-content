description: |
  O Projeto Fedora é uma comunidade mundial, apoiada pela Red Hat, dedicada ao desenvolvimento do sistema operativo livre Fedora. Lançado em 2003, o projeto tem como objetivo fornecer uma plataforma inovadora, segura e aberta, integrando as mais recentes tecnologias do mundo Linux. O Fedora destaca-se pelo seu rápido ciclo de desenvolvimento, pelo seu Commitment para código aberto e pelo seu papel como montra tecnológica, servindo frequentemente de banco de ensaio para futuras evoluções do Red Hat Enterprise Linux.