description: |
  Проект Fedora - это международное сообщество, поддерживаемое компанией Red Hat и занимающееся разработкой свободной операционной системы Fedora. Проект, запущенный в 2003 году, призван обеспечить инновационную, безопасную и открытую платформу, объединяющую новейшие технологии из мира Linux. Fedora выделяется своим быстрым циклом разработки, своим Commitment с открытым исходным кодом и своей ролью технологической витрины, часто служащей испытательным стендом для будущих эволюций Red Hat Enterprise Linux.