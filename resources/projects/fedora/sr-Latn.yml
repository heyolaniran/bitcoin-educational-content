description: |
  Fedora Project je svetska zajednica, podržana od strane Red Hat-a, posvećena razvoju Fedora besplatnog operativnog sistema. Pokrenut 2003. godine, projekat ima za cilj da obezbedi inovativnu, sigurnu i otvorenu platformu, integrišući najnovije tehnologije iz Linux sveta. Fedora se ističe po svom brzom ciklusu razvoja, svojoj posvećenosti otvorenom kodu i svojoj ulozi kao tehnološka vitrina, često služeći kao testna platforma za buduće evolucije Red Hat Enterprise Linux-a.