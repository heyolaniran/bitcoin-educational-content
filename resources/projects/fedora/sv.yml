description: |
  Fedora-projektet är en världsomspännande gemenskap som stöds av Red Hat och som ägnar sig åt att utveckla det fria operativsystemet Fedora. Projektet lanserades 2003 och syftar till att tillhandahålla en innovativ, säker och öppen plattform som integrerar den senaste tekniken från Linux-världen. Fedora utmärker sig för sin snabba utvecklingscykel, sin Commitment till öppen källkod och sin roll som ett tekniskt skyltfönster, som ofta fungerar som en testbädd för framtida Red Hat Enterprise Linux-utvecklingar.