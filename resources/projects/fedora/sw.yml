description: |
  Mradi wa Fedora ni jumuiya ya duniani kote, inayoungwa mkono na Red Hat, iliyojitolea kwa maendeleo ya mfumo wa uendeshaji wa bure wa Fedora. Mradi uliozinduliwa mwaka wa 2003, unalenga kutoa jukwaa bunifu, salama na wazi, linalojumuisha teknolojia za hivi punde kutoka kwa ulimwengu wa Linux. Fedora inajulikana kwa mzunguko wake wa maendeleo ya haraka, Commitment yake kufungua chanzo na jukumu lake kama onyesho la kiteknolojia, mara nyingi hutumika kama eneo la majaribio kwa mageuzi ya baadaye ya Red Hat Enterprise Linux.