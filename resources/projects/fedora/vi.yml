description: |
  Dự án Fedora là một cộng đồng toàn cầu, được Red Hat hỗ trợ, dành riêng cho việc phát triển hệ điều hành miễn phí Fedora. Ra mắt vào năm 2003, dự án này nhằm mục đích cung cấp một nền tảng sáng tạo, an toàn và mở, tích hợp các công nghệ mới nhất từ thế giới Linux. Fedora nổi bật với chu kỳ phát triển nhanh chóng, Commitment thành mã nguồn mở và vai trò là một công cụ trình diễn công nghệ, thường đóng vai trò là nền tảng thử nghiệm cho các quá trình phát triển Red Hat Enterprise Linux trong tương lai.