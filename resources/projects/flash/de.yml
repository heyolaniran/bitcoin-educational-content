description: |
  Plattform, die auf den Zugang zu Bitcoin über Lightning Network spezialisiert ist und den Kauf von Mobilfunkdiensten und -paketen bereits ab 100 CFA-Francs ermöglicht. Sie arbeitet hauptsächlich in Westafrika, um die finanzielle Befähigung von Einzelpersonen und Unternehmen durch die tägliche Nutzung von Bitcoin zu fördern.