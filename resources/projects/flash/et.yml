description: |
  Platvorm, mis on spetsialiseerunud juurdepääsule Bitcoin-le Lightning Network kaudu, võimaldades mobiilsideteenuste ja -pakettide ostmist juba alates 100 CFA frangist. See tegutseb peamiselt Lääne-Aafrikas, et edendada üksikisikute ja ettevõtete finantsvõimekuse suurendamist Bitcoin igapäevase kasutamise kaudu.