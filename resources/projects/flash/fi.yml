description: |
  Bitcoin:n Lightning Network:n kautta tapahtuvaan Bitcoin:een pääsyyn erikoistunut alusta, joka mahdollistaa matkaviestinpalvelujen ja -pakettien ostamisen jo 100 CFA-frangilla. Se toimii pääasiassa Länsi-Afrikassa edistääkseen yksityishenkilöiden ja yritysten taloudellisia vaikutusmahdollisuuksia Bitcoin:n päivittäisen käytön avulla.