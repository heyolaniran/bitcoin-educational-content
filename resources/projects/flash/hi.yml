description: |
  Lightning Network के माध्यम से Bitcoin तक पहुँच में विशेषज्ञता वाला प्लेटफ़ॉर्म, 100 CFA फ़्रैंक से भी कम कीमत पर मोबाइल सेवाओं और पैकेजों की खरीद को सक्षम बनाता है। यह मुख्य रूप से पश्चिमी अफ़्रीका में Bitcoin के दैनिक उपयोग के माध्यम से व्यक्तियों और व्यवसायों के वित्तीय सशक्तिकरण को बढ़ावा देने के लिए काम करता है।