description: |
  Plattform som spesialiserer seg på tilgang tBitcoin via Lightning Network, noe som gjør det mulig å kjøpe mobiltjenester og -pakker fra så lite som 100 CFA-franc. Selskapet arbeider hovedsakelig i Vest-Afrika for å fremme økonomisk selvstendighet for enkeltpersoner og bedrifter gjennom daglig bruk av Bitcoin.