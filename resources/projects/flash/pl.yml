description: |
  Platforma specjalizująca się w dostępie do Bitcoin za pośrednictwem Lightning Network, umożliwiająca zakup usług i pakietów mobilnych już od 100 franków CFA. Działa głównie w Afryce Zachodniej, promując wzmocnienie pozycji finansowej osób fizycznych i firm poprzez codzienne korzystanie z Bitcoin.