description: |
  Платформа, специализирующаяся на доступе к Bitcoin через Lightning Network, позволяющая приобретать мобильные услуги и пакеты всего за 100 франков КФА. Она работает преимущественно в Западной Африке, способствуя расширению финансовых возможностей частных лиц и предприятий за счет ежедневного использования Bitcoin.