description: |
  Jukwaa linalobobea katika ufikiaji wa Bitcoin kupitia Lightning Network, kuwezesha ununuzi wa huduma za simu na vifurushi kutoka kidogo kama faranga 100 za CFA. Inafanya kazi hasa katika Afrika Magharibi ili kukuza uwezeshaji wa kifedha wa watu binafsi na biashara kupitia matumizi ya kila siku ya Bitcoin.