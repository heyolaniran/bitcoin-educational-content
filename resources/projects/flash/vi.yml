description: |
  Nền tảng chuyên về truy cập Bitcoin thông qua Lightning Network, cho phép mua các dịch vụ và gói dịch vụ di động chỉ từ 100 CFA franc. Nền tảng này hoạt động chủ yếu ở Tây Phi để thúc đẩy khả năng trao quyền tài chính cho các cá nhân và doanh nghiệp thông qua việc sử dụng Bitcoin hàng ngày.