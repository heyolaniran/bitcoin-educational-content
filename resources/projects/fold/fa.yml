description: |
  ما اینجا هستیم تا Bitcoin را به همه معرفی کنیم. در حالی که راه‌های ورود فعلی پیچیده، گران و عمدتاً برای سفته‌بازان ساخته شده‌اند، ما به استقبال از موج بعدی پذیرش از طریق راه‌های ورود سرگرم‌کننده و جذاب که برای سایر افراد، از جمله خرج‌کنندگان، درآمدزایان و پس‌اندازکنندگان ساخته شده‌اند، اعتقاد داریم.