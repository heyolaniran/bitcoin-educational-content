description: |
  हम Bitcoin को सभी तक पहुँचाने के लिए यहाँ हैं। जबकि वर्तमान ऑन-रैंप जटिल, महंगे और मुख्य रूप से सट्टेबाजों के लिए बनाए गए हैं, हम सभी खर्च करने वालों, कमाने वालों और बचत करने वालों के लिए बनाए गए मज़ेदार और आकर्षक ऑन-रैंप के माध्यम से अपनाने की अगली लहर की शुरुआत करने में विश्वास करते हैं।