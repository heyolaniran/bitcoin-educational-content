description: |
   Fond Hodari je program rizikového kapitálu pro podnikatele vyloučené z finančního systému. Přednostně financuje projekty vedené uprchlíky, osobami bez práv a dalšími profily bez přístupu k tradičnímu kapitálu. Kromě financování nabízí na míru šité digitální a finanční vzdělávání s cílem posílit odolnost příjemců a podpořit jejich trvalé posílení.