description: |
   Der Hodari-Fonds ist ein Risikokapitalprogramm für Unternehmer, die vom Finanzsystem ausgeschlossen sind. Er finanziert vorrangig Projekte von Flüchtlingen, Entrechteten und anderen Profilen, die keinen Zugang zu traditionellem Kapital haben. Neben der Finanzierung bietet er maßgeschneiderte digitale und finanzielle Schulungen an, um die Widerstandsfähigkeit der Begünstigten zu stärken und ihre nachhaltige Handlungsfähigkeit zu fördern.