description: |
   El Fondo Hodari es un programa de capital riesgo para emprendedores excluidos del sistema financiero. Da prioridad a la financiación de proyectos liderados por refugiados, personas sin derechos y otros perfiles sin acceso al capital tradicional. Además de financiación, ofrece educación digital y financiera a medida, para reforzar la resiliencia de los beneficiarios y fomentar su empoderamiento sostenible.