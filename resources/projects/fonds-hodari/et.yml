description: |
   Hodari fond on riskikapitali programm finantssüsteemist kõrvale jäänud ettevõtjatele. See seab esikohale pagulaste, õigusest ilmajäetud isikute ja muude traditsioonilisele kapitalile juurdepääsu mitteomavate profiilide projektide rahastamise. Lisaks rahastamisele pakub ta kohandatud digitaalset ja finantsharidust, et tugevdada abisaajate vastupanuvõimet ja edendada nende jätkusuutlikku mõjuvõimu suurendamist.