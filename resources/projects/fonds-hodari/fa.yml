description: |
   صندوق هوداری یک برنامه سرمایه‌گذاری خطرپذیر برای کارآفرینانی است که از سیستم مالی کنار گذاشته شده‌اند. این صندوق به پروژه‌هایی که توسط پناهندگان، افراد محروم و سایر پروفایل‌هایی که به سرمایه سنتی دسترسی ندارند، اولویت می‌دهد. علاوه بر تأمین مالی، آموزش‌های دیجیتال و مالی متناسب با نیازها را ارائه می‌دهد تا مقاومت بهره‌برداران را تقویت کرده و توانمندسازی پایدار آن‌ها را ترویج کند.