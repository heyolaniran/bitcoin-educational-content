description: |
   Hodari-rahasto on pääomasijoitusohjelma rahoitusjärjestelmän ulkopuolelle jääneille yrittäjille. Se rahoittaa ensisijaisesti pakolaisten, syrjäytyneiden ja muiden sellaisten henkilöiden johtamia hankkeita, joilla ei ole mahdollisuutta saada perinteistä pääomaa. Rahoituksen lisäksi se tarjoaa räätälöityä digitaalista ja rahoituskoulutusta, jolla vahvistetaan edunsaajien joustavuutta ja edistetään heidän kestävää voimaantumistaan.