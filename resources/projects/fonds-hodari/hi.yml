description: |
   होडारी फंड वित्तीय प्रणाली से बाहर रखे गए उद्यमियों के लिए एक उद्यम पूंजी कार्यक्रम है। यह शरणार्थियों, वंचितों और पारंपरिक पूंजी तक पहुंच के बिना अन्य प्रोफाइल द्वारा संचालित परियोजनाओं को वित्तपोषित करने को प्राथमिकता देता है। वित्तपोषण के अलावा, यह लाभार्थियों की लचीलापन को मजबूत करने और उनके स्थायी सशक्तिकरण को बढ़ावा देने के लिए अनुरूप डिजिटल और वित्तीय शिक्षा प्रदान करता है।