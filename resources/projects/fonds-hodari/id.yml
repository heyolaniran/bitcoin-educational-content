description: |
   Hodari Fund adalah program modal ventura bagi para wirausahawan yang tidak termasuk dalam sistem keuangan. Program ini memberikan prioritas pada pembiayaan proyek-proyek yang dipimpin oleh para pengungsi, mereka yang kehilangan haknya dan profil lain yang tidak memiliki akses ke modal tradisional. Selain pembiayaan, program ini juga menawarkan edukasi digital dan keuangan yang disesuaikan, untuk memperkuat ketahanan para penerima manfaat dan mendorong pemberdayaan mereka secara berkelanjutan.