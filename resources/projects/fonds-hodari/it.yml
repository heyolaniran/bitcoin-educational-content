description: |
   Il Fondo Hodari è un programma di capitale di rischio per imprenditori esclusi dal sistema finanziario. Dà priorità al finanziamento di progetti guidati da rifugiati, emarginati e altri profili che non hanno accesso al capitale tradizionale. Oltre ai finanziamenti, offre un'educazione digitale e finanziaria su misura, per rafforzare la resilienza dei beneficiari e favorire il loro empowerment sostenibile.