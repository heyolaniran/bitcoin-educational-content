description: |
   Hodari-fondet er et risikokapitalprogram for gründere som er utestengt fra det finansielle systemet. Det prioriterer finansiering av prosjekter som ledes av flyktninger, personer uten rettigheter og andre profiler som ikke har tilgang til tradisjonell kapital. I tillegg til finansiering tilbyr Hodari Fund skreddersydd digital og finansiell opplæring for å styrke mottakernes motstandsdyktighet og fremme bærekraftig myndiggjøring.