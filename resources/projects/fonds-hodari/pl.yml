description: |
   Fundusz Hodari to program venture capital dla przedsiębiorców wykluczonych z systemu finansowego. Priorytetowo traktuje finansowanie projektów prowadzonych przez uchodźców, osoby pozbawione praw obywatelskich i inne profile bez dostępu do tradycyjnego kapitału. Oprócz finansowania, oferuje dostosowaną do potrzeb edukację cyfrową i finansową, aby wzmocnić odporność beneficjentów i wspierać ich zrównoważony rozwój.