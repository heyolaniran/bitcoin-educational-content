description: |
   O Fundo Hodari é um programa de capital de risco destinado a empresários excluídos do sistema financeiro. Dá prioridade ao financiamento de projectos liderados por refugiados, pessoas desfavorecidas e outros perfis sem acesso ao capital tradicional. Para além do financiamento, oferece educação digital e financeira personalizada, para reforçar a resiliência dos beneficiários e promover a sua capacitação sustentável.