description: |
   Фонд Hodari - это программа венчурного капитала для предпринимателей, исключенных из финансовой системы. Приоритет отдается финансированию проектов, возглавляемых беженцами, лицами, лишенными гражданских прав, и другими категориями, не имеющими доступа к традиционному капиталу. Помимо финансирования, фонд предлагает индивидуальное цифровое и финансовое образование, чтобы укрепить устойчивость бенефициаров и способствовать их устойчивому расширению возможностей.