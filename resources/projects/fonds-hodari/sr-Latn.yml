description: |
   Hodari Fond je program rizičnog kapitala za preduzetnike isključene iz finansijskog sistema. Prioritet daje finansiranju projekata koje vode izbeglice, obespravljeni i drugi profili bez pristupa tradicionalnom kapitalu. Pored finansiranja, nudi prilagođeno digitalno i finansijsko obrazovanje, kako bi se ojačala otpornost korisnika i podstaklo njihovo održivo osnaživanje.