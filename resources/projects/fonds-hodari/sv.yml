description: |
   Hodari Fund är ett riskkapitalprogram för entreprenörer som är utestängda från det finansiella systemet. Fonden prioriterar finansiering av projekt som leds av flyktingar, personer som saknar rättigheter och andra profiler som inte har tillgång till traditionellt kapital. Utöver finansiering erbjuds skräddarsydd digital och finansiell utbildning för att stärka mottagarnas motståndskraft och främja deras hållbara egenmakt.