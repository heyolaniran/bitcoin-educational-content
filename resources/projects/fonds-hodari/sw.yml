description: |
   Mfuko wa Hodari ni mpango wa mtaji wa ubia kwa wajasiriamali waliotengwa na mfumo wa kifedha. Inatoa kipaumbele kwa miradi ya ufadhili inayoongozwa na wakimbizi, waliokataliwa na wasifu mwingine bila kupata mtaji wa jadi. Mbali na ufadhili, inatoa elimu ya kidijitali na ya kifedha iliyolengwa, ili kuimarisha uthabiti wa walengwa na kukuza uwezeshaji wao endelevu.