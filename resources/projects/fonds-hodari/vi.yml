description: |
   Quỹ Hodari là một chương trình đầu tư mạo hiểm dành cho các doanh nhân bị loại khỏi hệ thống tài chính. Quỹ ưu tiên tài trợ cho các dự án do người tị nạn, người bị tước quyền và các đối tượng khác không có quyền tiếp cận vốn truyền thống lãnh đạo. Ngoài việc tài trợ, quỹ còn cung cấp giáo dục kỹ thuật số và tài chính phù hợp, nhằm tăng cường khả năng phục hồi của những người thụ hưởng và thúc đẩy sự trao quyền bền vững của họ.