description: |
  ما به Bitcoin به عنوان یک سیستم پولی نسل بعدی و بی‌طرف سیاسی اعتقاد داریم، که پایه‌ای برای امور مالی غیرمتمرکز آینده است. در حالی که Bitcoin یک تسویه کارآمد Layer است، به یک راه‌حل Layer-2 برای تراکنش‌های روزمره نیاز دارد. به همین دلیل ما از توسعه Lightning Network حمایت می‌کنیم - یک گام اساسی به سوی امور مالی غیرمتمرکز.