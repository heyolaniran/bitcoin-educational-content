description: |
  wierzymy w Bitcoin jako neutralny politycznie system monetarny nowej generacji, fundament zdecentralizowanych finansów przyszłości. Podczas gdy Bitcoin jest wydajnym systemem rozliczeniowym Layer, potrzebuje on rozwiązania Layer-2 dla codziennych transakcji. Dlatego wspieramy rozwój Lightning Network - niezbędnego kroku w kierunku zdecentralizowanych finansów.