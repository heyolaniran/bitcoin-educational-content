description: |
  verujemo u Bitcoin kao sledeću generaciju politički neutralnog monetarnog sistema, osnovu za decentralizovane finansije budućnosti. Iako je Bitcoin efikasno poravnanje Layer, potrebna mu je Layer-2 rešenja za svakodnevne transakcije. Zato podržavamo razvoj Lightning Network - ključni korak ka decentralizovanim finansijama.