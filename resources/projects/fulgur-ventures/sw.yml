description: |
  tunaamini katika Bitcoin kama mfumo wa fedha wa kizazi kijacho usioegemea upande wowote wa kisiasa, msingi wa ugatuzi wa fedha wa siku zijazo. Ingawa Bitcoin ni suluhisho bora la Layer, inahitaji suluhisho la Layer-2 kwa shughuli za kila siku. Ndiyo maana tunaunga mkono maendeleo ya Lightning Network - hatua muhimu kuelekea ugatuzi wa fedha.