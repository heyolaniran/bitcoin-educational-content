description: |
  گلکسی یک پلتفرم خدمات مالی متمرکز بر Bitcoin است که فاصله بین امور مالی سنتی و زیرساخت Bitcoin را پر می‌کند.
  
  با ارائه راه‌حل‌های مالی متناسب و ابزارهای نوآورانه، گلکسی به معدن‌کاران Bitcoin در گسترش عملیاتشان کمک می‌کند. خدمات شامل خدمات میزبانی برای معدن‌کاران Bitcoin شخص ثالث در تأسیسات بزرگ‌مقیاس و خنک‌شده با غوطه‌وری Mining در تگزاس، تخصص عملی Bitcoin Mining برای برتری عملیاتی، و یک پلتفرم یکپارچه Miner Finance (MiFi) که خدمات معاملاتی، پوشش ریسک و مالی را به معدن‌کاران ارائه می‌دهد، می‌باشد.