description: |
  Galaxy to platforma usług finansowych skoncentrowana na Bitcoin, która wypełnia lukę między tradycyjnymi finansami a infrastrukturą Bitcoin.
  
  Oferując dostosowane rozwiązania finansowe i innowacyjne narzędzia, Galaxy pomaga górnikom Bitcoin w skalowaniu ich działalności. Usługi obejmują usługi hostingowe dla zewnętrznych górników Bitcoin w ich wielkoskalowym, chłodzonym zanurzeniowo obiekcie Mining w Teksasie, praktyczną wiedzę Bitcoin Mining w zakresie doskonałości operacyjnej oraz zintegrowaną platformę finansową Miner (MiFi), która zapewnia górnikom usługi handlowe, hedgingowe i finansowe.