description: |
  Galaxy je finansijska platforma usmerena na Bitcoin koja premošćuje jaz između tradicionalnih finansija i Bitcoin infrastrukture.
  
  Nudeći prilagođena finansijska rešenja i inovativne alate, Galaxy pomaže Bitcoin rudarima u širenju njihovih operacija. Usluge uključuju hosting usluge za treće strane Bitcoin rudare u njihovom velikom, imerzivno hlađenom Mining objektu u Teksasu, praktičnu Bitcoin Mining ekspertizu za operativnu izvrsnost, i integrisanu Miner Finance (MiFi) platformu koja pruža usluge trgovanja, hedžinga i finansiranja rudarima.