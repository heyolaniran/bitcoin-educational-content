description: |
  Galaxy är en Bitcoin-centrerad plattform för finansiella tjänster som överbryggar klyftan mellan traditionell finansiering och Bitcoin-infrastruktur.
  
  Genom att erbjuda skräddarsydda finansieringslösningar och innovativa verktyg hjälper Galaxy Bitcoin-gruvarbetare att skala upp sin verksamhet. Tjänsterna inkluderar värdtjänster för Bitcoin-gruvbrytare från tredje part vid deras storskaliga, nedsänkningskylda Mining-anläggning i Texas, praktisk Bitcoin Mining-expertis för operativ excellens och en integrerad Miner Finance (MiFi)-plattform som tillhandahåller handels-, hedging- och finansieringstjänster till gruvbrytare.