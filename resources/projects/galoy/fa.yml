description: |
  گالوی یک پلتفرم بانکداری مرکزی متن‌باز ارائه می‌دهد که برای راه‌اندازی برنامه‌های Bitcoin و Lightning در مقیاس سازمانی طراحی شده است. این پلتفرم توسعه سریع راه‌حل‌های بانکداری Bitcoin را از طریق زیرساخت‌های خودمیزبان یا پیاده‌سازی مدیریت‌شده "بانکداری به‌عنوان سرویس" فراهم می‌کند.
  
  این پلتفرم به سازمان‌ها امکان می‌دهد تا یک بانک اجتماعی Bitcoin را با استفاده از مدل حضانت مشترک و یک Wallet Lightning کاربرپسند راه‌اندازی کنند. این همان فناوری است که به Bitcoin Beach کمک کرد تا یک اقتصاد دایره‌ای بسازد. این زیرساخت اثبات‌شده همچنین می‌تواند توسط دولت‌ها برای ارائه خدمات مالی قرن بیست و یکم به هر کسی که دارای تلفن همراه و اتصال به اینترنت است، استفاده شود.
  
  بر اساس این باور که Bitcoin پول است، گالوی به سازمان‌هایی با هر اندازه قدرت می‌دهد تا بانک مبتنی بر Bitcoin خود را ایجاد کنند. این پلتفرم ستون فقرات پروژه Wallet Bitcoin Beach در ال زونته، السالوادور بود که در توسعه یک اقتصاد پایدار Bitcoin نقش اساسی داشت و از زمان پذیرش Bitcoin به عنوان پول قانونی در این کشور رشد قابل توجهی داشته است.
  
  گالوی پلی برای سازمان‌هایی است که به دنبال ادغام با Lightning Network هستند و چراغی برای مشارکت‌کنندگان متن‌باز که در تلاش برای ساختن یک سیستم مالی بهتر هستند.