description: |
  गैलोय एक ओपन-सोर्स कोर बैंकिंग प्लेटफ़ॉर्म प्रदान करता है जिसे एंटरप्राइज़-स्केल Bitcoin और लाइटनिंग एप्लिकेशन लॉन्च करने के लिए डिज़ाइन किया गया है। यह स्व-होस्टेड इंफ्रास्ट्रक्चर या प्रबंधित "बैंकिंग-एज़-ए-सर्विस" कार्यान्वयन के माध्यम से Bitcoin बैंकिंग समाधानों का त्वरित विकास प्रदान करता है।
  
  यह प्लेटफ़ॉर्म संगठनों को साझा कस्टडी मॉडल और उपयोग में आसान लाइटनिंग Wallet का उपयोग करके Bitcoin सामुदायिक बैंक लॉन्च करने में सक्षम बनाता है। यह वही तकनीक है जिसने Bitcoin बीच को एक सर्कुलर अर्थव्यवस्था बनाने में मदद की। इस सिद्ध इंफ्रास्ट्रक्चर का उपयोग सरकारें मोबाइल फोन और इंटरनेट कनेक्शन वाले किसी भी व्यक्ति को 21वीं सदी की वित्तीय सेवाएँ प्रदान करने के लिए भी कर सकती हैं।
  
  इस विश्वास पर आधारित कि Bitcoin पैसा है, गैलोय किसी भी आकार के संगठनों को अपना स्वयं का Bitcoin-आधारित बैंक बनाने का अधिकार देता है। यह एल ज़ोंटे, एल साल्वाडोर में Bitcoin बीच Wallet परियोजना की रीढ़ थी, जिसने एक स्थायी Bitcoin अर्थव्यवस्था विकसित करने में महत्वपूर्ण भूमिका निभाई थी और देश द्वारा Bitcoin को कानूनी निविदा के रूप में अपनाने के बाद से इसमें उल्लेखनीय वृद्धि देखी गई है।
  
  गैलोय उन संगठनों के लिए सेतु है जो Lightning Network के साथ एकीकरण करना चाहते हैं, तथा बेहतर वित्तीय प्रणाली बनाने का प्रयास करने वाले ओपन-सोर्स योगदानकर्ताओं के लिए एक प्रकाश स्तंभ है।