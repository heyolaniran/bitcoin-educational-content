description: |
  Galoy oferuje podstawową platformę bankową o otwartym kodzie źródłowym, zaprojektowaną do uruchamiania aplikacji Bitcoin i Lightning na skalę korporacyjną. Zapewnia przyspieszony rozwój rozwiązań bankowych Bitcoin poprzez infrastrukturę self-hosted lub zarządzaną implementację "Banking-as-a-Service".
  
  Platforma umożliwia organizacjom uruchomienie banku społecznościowego Bitcoin przy użyciu modelu współdzielonej opieki i łatwego w użyciu Lightning Wallet. Jest to ta sama technologia, która pomogła Bitcoin Beach zbudować gospodarkę o obiegu zamkniętym. Ta sprawdzona infrastruktura może być również wykorzystywana przez rządy do świadczenia usług finansowych XXI wieku każdemu, kto ma telefon komórkowy i połączenie z Internetem.
  
  Opierając się na przekonaniu, że Bitcoin to pieniądz, Galoy umożliwia organizacjom dowolnej wielkości stworzenie własnego banku opartego na Bitcoin. Był on podstawą projektu Bitcoin Beach Wallet w El Zonte w Salwadorze, który odegrał kluczową rolę w rozwoju zrównoważonej gospodarki Bitcoin i odnotował znaczny wzrost od czasu przyjęcia Bitcoin jako prawnego środka płatniczego w tym kraju.
  
  Galoy jest pomostem dla organizacji, które chcą zintegrować się z Lightning Network, a także latarnią morską dla twórców oprogramowania open-source, którzy dążą do zbudowania lepszego systemu finansowego.