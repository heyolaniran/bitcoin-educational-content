description: |
  Galoy nudi platformu za osnovno bankarstvo otvorenog koda dizajniranu za pokretanje aplikacija Bitcoin i Lightning na nivou preduzeća. Omogućava ubrzani razvoj Bitcoin bankarskih rešenja putem infrastrukture koju sami hostujete ili implementacije "Banking-as-a-Service".
  
  Platforma omogućava organizacijama da pokrenu Bitcoin zajedničku banku koristeći model zajedničkog starateljstva i jednostavan za korišćenje Lightning Wallet. To je ista tehnologija koja je pomogla Bitcoin Beach-u da izgradi kružnu ekonomiju. Ova dokazana infrastruktura takođe može biti korišćena od strane vlada da pruže finansijske usluge 21. veka svakome ko ima mobilni telefon i internet konekciju.
  
  Osnovan na verovanju da je Bitcoin novac, Galoy osnažuje organizacije bilo koje veličine da kreiraju svoju sopstvenu banku zasnovanu na Bitcoin. Bio je okosnica projekta Bitcoin Beach Wallet u El Zonteu, El Salvador, koji je bio ključan u razvoju održive Bitcoin ekonomije i zabeležio je značajan rast od kada je zemlja usvojila Bitcoin kao zakonsko sredstvo plaćanja.
  
  Galoy je most za organizacije koje žele da se integrišu sa Lightning Network, i svetionik za open-source saradnike koji teže da izgrade bolji finansijski sistem.