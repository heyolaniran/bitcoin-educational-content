description: |
  Galoy erbjuder en kärnbanksplattform med öppen källkod som är utformad för att lansera Bitcoin- och Lightning-applikationer i stor skala. Den ger snabbare utveckling av Bitcoin-banklösningar genom infrastruktur med egen värd eller en hanterad "Banking-as-a-Service"-implementering.
  
  Plattformen gör det möjligt för organisationer att lansera en Bitcoin community bank med hjälp av en delad förvaringsmodell och en lättanvänd Lightning Wallet. Det är samma teknik som hjälpte Bitcoin Beach att bygga en cirkulär ekonomi. Denna beprövade infrastruktur kan också användas av regeringar för att tillhandahålla finansiella tjänster från 2000-talet till alla med en mobiltelefon och en internetanslutning.
  
  Galoy grundades på övertygelsen att Bitcoin är pengar och gör det möjligt för organisationer av alla storlekar att skapa sin egen Bitcoin-baserade bank. Det var ryggraden i Bitcoin Beach Wallet-projektet i El Zonte, El Salvador, som bidrog till att utveckla en hållbar Bitcoin-ekonomi och som har sett en betydande tillväxt sedan landet antog Bitcoin som lagligt betalningsmedel.
  
  Galoy är bron för organisationer som vill integrera med Lightning Network, och en ledstjärna för bidragsgivare med öppen källkod som strävar efter att bygga ett bättre finansiellt system.