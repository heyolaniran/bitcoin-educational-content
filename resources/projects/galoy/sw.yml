description: |
  Galoy inatoa jukwaa la msingi la benki la chanzo huria iliyoundwa kuzindua programu za Bitcoin na Umeme kwa kiwango cha biashara. Inatoa maendeleo ya haraka ya ufumbuzi wa benki ya Bitcoin kupitia miundombinu inayojiendesha yenyewe au utekelezaji unaosimamiwa wa "Banking-as-a-Service".
  
  Jukwaa huwezesha mashirika kuzindua benki ya jumuiya ya Bitcoin kwa kutumia modeli ya ulezi iliyoshirikiwa na Lightning Wallet iliyo rahisi kutumia. Ni teknolojia ile ile iliyosaidia Bitcoin Beach kujenga uchumi wa mzunguko. Miundombinu hii iliyothibitishwa inaweza pia kutumiwa na serikali kutoa huduma za kifedha za karne ya 21 kwa mtu yeyote aliye na simu ya mkononi na muunganisho wa intaneti.
  
  Ilianzishwa kwa imani kwamba Bitcoin ni pesa, Galoy huwezesha mashirika ya ukubwa wowote kuunda benki yao ya Bitcoin. Ulikuwa uti wa mgongo wa mradi wa Bitcoin Beach Wallet huko El Zonte, El Salvador, ambao ulikuwa muhimu katika kuendeleza uchumi endelevu wa Bitcoin na umeona ukuaji mkubwa tangu kupitishwa kwa Bitcoin kama zabuni halali ya nchi.
  
  Galoy ni daraja la mashirika yanayotaka kuunganishwa na Lightning Network, na kinara kwa wachangiaji huria wanaojitahidi kujenga mfumo bora wa kifedha.