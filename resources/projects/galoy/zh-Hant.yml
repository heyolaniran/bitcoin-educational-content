description: |
  Galoy 提供開放源碼的核心銀行平台，專為推出企業規模的 Bitcoin 和 Lightning 應用程式而設計。它可透過自託管基礎結構或管理式「銀行即服務」實施，加速 Bitcoin 銀行解決方案的開發。
  
  該平台可讓企業利用共享託管模式和易於使用的 Lightning Wallet 推出 Bitcoin 社區銀行。這是幫助 Bitcoin Beach 建立循環經濟的相同技術。政府也可利用這項經過驗證的基礎架構，為任何擁有行動電話和網際網路的人提供 21 世紀的金融服務。
  
  Galoy 建立在 Bitcoin 就是錢的信念上，讓任何規模的組織都能建立自己的 Bitcoin 銀行。它是薩爾瓦多 El Zonte 的 Bitcoin Beach Wallet 專案的骨幹，該專案對發展永續的 Bitcoin 經濟發揮了重要作用，自該國採用 Bitcoin 作為法定貨幣以來，經濟顯著成長。
  
  Galoy 是希望與 Lightning Network 整合的組織的橋樑，也是努力建立更好金融系統的開源貢獻者的燈塔。