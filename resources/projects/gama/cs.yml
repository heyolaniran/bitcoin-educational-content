description: |
  Green Afrika Aliance Mining je tvořena společnostmi z afrických zemí a každý rok jedna z členských společností pořádá akci ve své zemi. Účelem GAMA je sdružit společnosti Bitcoin Mining zabývající se obnovitelnými zdroji v Africe pod deštník, kde mohou společně pracovat na zvýšení geografického rozšíření Mining po celém světě, pomáhat novým těžařům a organizacím Mining při hledání a zaměřování obnovitelných zdrojů energie v Africe, katalyzovat elektrifikaci Afriky tím, že pomáhají energetickým společnostem najít nové komunity a lokality, které potřebují více energie, a poskytnout základnu organizací, ze které může budoucí Bitcoin Mining pool začít a růst.
  