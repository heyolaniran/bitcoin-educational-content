description: |
  Green Africa Mining Alliance está formada por empresas de países africanos, cada año una empresa miembro organiza un evento en su país. El propósito de GAMA es reunir a las empresas de Bitcoin Mining renovables de África bajo un paraguas en el que puedan trabajar juntas para aumentar la difusión geográfica de la Mining en todo el mundo, ayudar a los nuevos mineros y organizaciones de Mining a encontrar y dirigirse a fuentes de energía renovables en África, catalizar la electrificación de África ayudando a las empresas energéticas a encontrar nuevas comunidades y lugares que necesiten más energía, y proporcionar una base de organizaciones a partir de la cual pueda comenzar y crecer una futura Bitcoin Mining pool.
  