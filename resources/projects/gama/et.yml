description: |
  Green Africa Mining Alliance koosneb Aafrika riikide ettevõtetest, igal aastal korraldab üks liige oma riigis ürituse. GAMA eesmärk on koondada Aafrika taastuvenergia Bitcoin Mining ettevõtted sildi alla, kus nad saavad teha koostööd, et suurendada Mining geograafilist levikut kogu maailmas, aidata uutel kaevandajatel ja Mining organisatsioonidel leida ja suunata taastuvenergia allikaid Aafrikas, katalüüsida Aafrika elektrifitseerimist, aidates energiaettevõtetel leida uusi kogukondi ja asukohti, mis vajavad rohkem energiat, ning luua organisatsioonide baas, millest saab alustada ja kasvada tulevane Bitcoin Mining pool.
  