description: |
  Green آفریقا Mining اتحاد از شرکت‌های کشورهای آفریقایی تشکیل شده است، هر سال یک شرکت عضو رویدادی را در کشور خود میزبانی می‌کند. هدف GAMA این است که شرکت‌های تجدیدپذیر Bitcoin Mining در آفریقا را تحت یک چتر گرد هم آورد تا بتوانند با هم کار کنند و گسترش جغرافیایی Mining در سراسر جهان را افزایش دهند، به معدن‌کاران جدید و سازمان‌های Mining کمک کنند تا منابع انرژی تجدیدپذیر را در آفریقا پیدا کرده و هدف‌گذاری کنند، برق‌رسانی به آفریقا را با کمک به شرکت‌های انرژی برای یافتن جوامع و مکان‌های جدیدی که به انرژی بیشتری نیاز دارند، تسریع کنند و پایه‌ای از سازمان‌ها فراهم کنند که از آن یک Bitcoin Mining pool آینده بتواند شروع و رشد کند.