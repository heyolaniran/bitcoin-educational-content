description: |
  Green Africa Mining Alliance koostuu Afrikan maiden yrityksistä, ja joka vuosi yksi jäsenyritys järjestää tapahtuman omassa maassaan. GAMA:n tarkoituksena on koota Afrikan uusiutuvan Bitcoin Mining:n yritykset sateenvarjon alle, jossa ne voivat työskennellä yhdessä Mining:n maantieteellisen leviämisen lisäämiseksi ympäri maailmaa, auttaa uusia kaivostoimijoita ja Mining -organisaatioita löytämään ja kohdentamaan uusiutuvia energialähteitä Afrikassa, vauhdittaa Afrikan sähköistämistä auttamalla energiayhtiöitä löytämään uusia yhteisöjä ja paikkoja, jotka tarvitsevat lisää energiaa, ja tarjota organisaatioiden perusta, josta tuleva Bitcoin Mining pool voi aloittaa ja kasvaa.
  