description: |
  L'Alliance Green Afrique Mining est composée d'entreprises de pays africains. Chaque année, une entreprise membre organise un événement dans son pays. L'objectif de la GAMA est de rassembler les entreprises de production d'énergie renouvelable Bitcoin Mining en Afrique sous un même toit, afin qu'elles puissent travailler ensemble pour accroître la diffusion géographique du Mining dans le monde, aider les nouveaux mineurs et les organisations Mining à trouver et à cibler les sources d'énergie renouvelable en Afrique, catalyser l'électrification de l'Afrique en aidant les entreprises énergétiques à trouver de nouvelles communautés et de nouveaux sites qui ont besoin de plus d'énergie, et fournir une base d'organisations à partir de laquelle un futur Bitcoin Mining pool pourra démarrer et se développer.
  