description: |
  Aliansi Green Afrika Mining terdiri dari perusahaan-perusahaan dari negara-negara Afrika, setiap tahun sebuah perusahaan anggota menyelenggarakan acara di negara mereka. Tujuan GAMA adalah untuk membawa perusahaan-perusahaan Bitcoin Mining terbarukan di Afrika di bawah payung di mana mereka dapat bekerja sama untuk meningkatkan penyebaran geografis Mining di seluruh dunia, membantu para penambang baru dan organisasi Mining untuk menemukan dan menargetkan sumber-sumber energi terbarukan di Afrika, mengkatalisasi elektrifikasi Afrika dengan membantu perusahaan-perusahaan energi untuk menemukan masyarakat dan lokasi baru yang membutuhkan lebih banyak energi, serta menyediakan basis organisasi yang darinya Bitcoin Mining pool di masa depan dapat dimulai dan berkembang.
  