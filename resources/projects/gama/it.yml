description: |
  L'Alleanza Green Africa Mining è costituita da aziende dei Paesi africani; ogni anno un'azienda membro ospita un evento nel proprio Paese. Lo scopo della GAMA è quello di riunire le aziende di Bitcoin Mining rinnovabile in Africa sotto un ombrello dove possano lavorare insieme per aumentare la diffusione geografica del Mining in tutto il mondo, assistere i nuovi miner e le organizzazioni del Mining a trovare e indirizzare le fonti di energia rinnovabile in Africa, catalizzare l'elettrificazione dell'Africa aiutando le aziende energetiche a trovare nuove comunità e località che hanno bisogno di più energia e fornire una base di organizzazioni da cui un futuro Bitcoin Mining pool possa partire e crescere.
  