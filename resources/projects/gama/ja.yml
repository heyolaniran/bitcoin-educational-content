description: |
  GreenアフリカMiningアライアンスはアフリカ諸国の企業で構成され、毎年メンバー企業がそれぞれの国でイベントを開催している。GAMAの目的は、アフリカの再生可能なBitcoin Mining企業を傘下に置き、Miningの地理的な広がりを世界中に広げるために協力し、アフリカで再生可能なエネルギー源を見つけ、ターゲットとする新しい採掘業者やMining組織を支援し、エネルギー企業がより多くのエネルギーを必要とする新しいコミュニティや場所を見つけることによってアフリカの電化を促進し、将来のBitcoin Mining poolがスタートし、成長するための組織の基盤を提供することです。
  