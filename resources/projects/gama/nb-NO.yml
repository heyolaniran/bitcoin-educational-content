description: |
  Green Africa Mining Alliance består av selskaper fra afrikanske land, og hvert år er et medlemsselskap vertskap for et arrangement i sitt land. GAMAs formål er å samle de fornybare Bitcoin Mining-selskapene i Afrika under en paraply der de kan samarbeide for å øke den geografiske spredningen av Mining rundt om i verden, hjelpe nye gruvearbeidere og Mining-organisasjoner med å finne og målrette fornybare energikilder i Afrika, katalysere elektrifiseringen av Afrika ved å hjelpe energiselskaper med å finne nye lokalsamfunn og steder som trenger mer energi, og gi en base av organisasjoner som et fremtidig Bitcoin Mining pool kan starte og vokse fra.
  