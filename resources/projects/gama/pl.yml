description: |
  Green Africa Mining Alliance składa się z firm z krajów afrykańskich, każdego roku firma członkowska organizuje wydarzenie w swoim kraju. Celem GAMA jest skupienie firm zajmujących się odnawialnymi źródłami energii Bitcoin Mining w Afryce pod parasolem, gdzie mogą współpracować, aby zwiększyć geograficzne rozprzestrzenianie się Mining na całym świecie, pomagać nowym górnikom i organizacjom Mining w znajdowaniu i ukierunkowaniu odnawialnych źródeł energii w Afryce, katalizować elektryfikację Afryki, pomagając firmom energetycznym znaleźć nowe społeczności i lokalizacje, które potrzebują więcej energii, oraz zapewnić bazę organizacji, z których przyszły Bitcoin Mining pool może się rozpocząć i rozwijać.
  