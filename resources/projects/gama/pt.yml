description: |
  A Green Africa Mining Alliance é composta por empresas de países africanos, cada ano uma empresa membro organiza um evento no seu país. O objetivo da GAMA é reunir as empresas de energias renováveis Bitcoin Mining em África sob um guarda-chuva onde possam trabalhar em conjunto para aumentar a disseminação geográfica do Mining em todo o mundo, ajudar novos mineiros e organizações Mining a encontrar e visar fontes de energia renovável em África, catalisar a eletrificação de África ajudando as empresas de energia a encontrar novas comunidades e locais que necessitem de mais energia, e fornecer uma base de organizações a partir da qual um futuro Bitcoin Mining pool possa começar e crescer.
  