description: |
  Green Africa Mining Alliance состоит из компаний из африканских стран, каждый год одна из компаний-участниц проводит мероприятие в своей стране. Цель GAMA - объединить компании возобновляемых источников энергии Bitcoin Mining в Африке, чтобы они могли работать вместе для увеличения географического распространения Mining по всему миру, помочь новым шахтерам и организациям Mining найти возобновляемые источники энергии в Африке, стимулировать электрификацию Африки, помогая энергетическим компаниям находить новые сообщества и места, нуждающиеся в энергии, и обеспечить базу организаций, на основе которой могут зарождаться и развиваться будущие Bitcoin Mining pool.
  