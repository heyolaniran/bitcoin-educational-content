description: |
  Green Afrika Mining Alijansa je sastavljena od kompanija iz afričkih zemalja, svake godine jedna članica domaćin je događaja u svojoj zemlji. Svrha GAMA-e je da okupi obnovljive Bitcoin Mining kompanije u Africi pod jednim kišobranom gde mogu zajedno raditi na povećanju geografskog širenja Mining širom sveta, pomoći novim rudarima i Mining organizacijama da pronađu i ciljaju obnovljive izvore energije u Africi, katalizuju elektrifikaciju Afrike pomažući energetskim kompanijama da pronađu nove zajednice i lokacije kojima je potrebno više energije, i obezbede bazu organizacija iz koje budući Bitcoin Mining pool može početi i rasti.