description: |
  Green Africa Mining Alliance består av företag från afrikanska länder, varje år är ett medlemsföretag värd för ett evenemang i sitt land. GAMA:s syfte är att samla de förnybara Bitcoin Mining-företagen i Afrika under ett paraply där de kan arbeta tillsammans för att öka den geografiska spridningen av Mining runt om i världen, hjälpa nya gruvarbetare och Mining-organisationer att hitta och rikta in sig på förnybara energikällor i Afrika, katalysera elektrifieringen av Afrika genom att hjälpa energibolag att hitta nya samhällen och platser som behöver mer energi, och tillhandahålla en bas av organisationer från vilka en framtida Bitcoin Mining pool kan starta och växa.
  