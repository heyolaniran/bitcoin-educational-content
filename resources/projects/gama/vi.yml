description: |
  Green Africa Mining Alliance được thành lập bởi các công ty từ các quốc gia châu Phi, mỗi năm một công ty thành viên tổ chức một sự kiện tại quốc gia của họ. Mục đích của GAMA là đưa các công ty Bitcoin Mining tái tạo tại châu Phi vào một tổ chức chung, nơi họ có thể cùng nhau làm việc để tăng phạm vi địa lý của Mining trên toàn thế giới, hỗ trợ các công ty khai thác mới và các tổ chức Mining tìm kiếm và nhắm mục tiêu vào các nguồn năng lượng tái tạo tại châu Phi, thúc đẩy quá trình điện khí hóa châu Phi bằng cách giúp các công ty năng lượng tìm kiếm các cộng đồng và địa điểm mới cần nhiều năng lượng hơn và cung cấp cơ sở cho các tổ chức mà từ đó Bitcoin Mining pool trong tương lai có thể bắt đầu và phát triển.
  
  