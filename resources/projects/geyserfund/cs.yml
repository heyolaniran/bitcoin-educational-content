description: |
  Geyser Fund je investiční nástroj, který se věnuje podpoře inovací v ekosystémech Bitcoin a Lightning. Poskytuje strategický kapitál a podporu startupům a vývojářům, kteří vytvářejí špičková platební řešení a infrastrukturní projekty, a pomáhá tak urychlit přijetí a vývoj technologií založených na Bitcoin
  