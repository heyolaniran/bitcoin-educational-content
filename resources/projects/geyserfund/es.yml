description: |
  Geyser Fund es un vehículo de inversión dedicado a fomentar la innovación en los ecosistemas Bitcoin y Lightning. Proporciona capital estratégico y apoyo a startups y desarrolladores que crean soluciones de pago y proyectos de infraestructura de vanguardia, ayudando a acelerar la adopción y evolución de tecnologías basadas en Bitcoin
  