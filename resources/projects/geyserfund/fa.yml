description: |
  صندوق Geyser یک وسیله سرمایه‌گذاری است که به پرورش نوآوری در اکوسیستم‌های Bitcoin و Lightning اختصاص دارد. این صندوق سرمایه استراتژیک و پشتیبانی را به استارتاپ‌ها و توسعه‌دهندگانی که در حال ساخت راه‌حل‌های پرداخت پیشرفته و پروژه‌های زیرساختی هستند، ارائه می‌دهد و به تسریع پذیرش و تکامل فناوری‌های مبتنی بر Bitcoin کمک می‌کند.