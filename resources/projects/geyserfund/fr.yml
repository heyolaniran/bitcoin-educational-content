description: |
  Le Geyser Fund est un véhicule d'investissement destiné à encourager l'innovation au sein des écosystèmes Bitcoin et Lightning. Il fournit des capitaux stratégiques et un soutien aux startups et aux développeurs qui élaborent des solutions de paiement et des projets d'infrastructure de pointe, contribuant ainsi à accélérer l'adoption et l'évolution des technologies basées sur le Bitcoin
  