description: |
  Geyser Fund adalah sarana investasi yang didedikasikan untuk memupuk inovasi dalam ekosistem Bitcoin dan Lightning. Ini memberikan modal strategis dan dukungan kepada perusahaan rintisan dan pengembang yang membangun solusi pembayaran mutakhir dan proyek infrastruktur, membantu mempercepat adopsi dan evolusi teknologi berbasis Bitcoin
  