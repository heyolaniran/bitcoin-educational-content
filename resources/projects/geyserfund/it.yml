description: |
  Geyser Fund è un veicolo di investimento dedicato a promuovere l'innovazione all'interno degli ecosistemi Bitcoin e Lightning. Fornisce capitale strategico e supporto a startup e sviluppatori che realizzano soluzioni di pagamento e progetti infrastrutturali all'avanguardia, contribuendo ad accelerare l'adozione e l'evoluzione delle tecnologie basate su Bitcoin
  