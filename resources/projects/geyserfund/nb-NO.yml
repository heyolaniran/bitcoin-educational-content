description: |
  Geyser Fund er et investeringsinstrument som er dedikert til å fremme innovasjon innenfor Bitcoin- og Lightning-økosystemene. Det gir strategisk kapital og støtte til oppstartsbedrifter og utviklere som bygger banebrytende betalingsløsninger og infrastrukturprosjekter, og bidrar til å akselerere adopsjonen og utviklingen av Bitcoin-baserte teknologier
  