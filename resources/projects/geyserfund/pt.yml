description: |
  O Geyser Fund é um veículo de investimento dedicado a fomentar a inovação nos ecossistemas Bitcoin e Lightning. Fornece capital estratégico e apoio a startups e desenvolvedores que criam soluções de pagamento de ponta e projetos de infraestrutura, ajudando a acelerar a adoção e a evolução das tecnologias baseadas no Bitcoin
  