description: |
  Geyser Fund - это инвестиционный фонд, занимающийся развитием инноваций в экосистемах Bitcoin и Lightning. Он предоставляет стратегический капитал и поддержку стартапам и разработчикам, создающим передовые платежные решения и инфраструктурные проекты, способствуя ускорению внедрения и эволюции технологий на базе Bitcoin
  