description: |
  Geyser Fund je investiciono vozilo posvećeno negovanju inovacija unutar Bitcoin i Lightning ekosistema. Pruža strateški kapital i podršku startapima i programerima koji grade najsavremenija rešenja za plaćanje i infrastrukturne projekte, pomažući ubrzavanju usvajanja i evolucije tehnologija zasnovanih na Bitcoin.