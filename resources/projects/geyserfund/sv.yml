description: |
  Geyser Fund är ett investeringsinstrument som är dedikerat till att främja innovation inom Bitcoin- och Lightning-ekosystemen. Den tillhandahåller strategiskt kapital och stöd till nystartade företag och utvecklare som bygger banbrytande betalningslösningar och infrastrukturprojekt, vilket bidrar till att påskynda antagandet och utvecklingen av Bitcoin-baserade tekniker
  