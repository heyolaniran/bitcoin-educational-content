description: |
  پلتفرم توسعه نرم‌افزار مشارکتی که به توسعه‌دهندگان امکان مدیریت، اشتراک‌گذاری و میزبانی پروژه‌هایشان را با استفاده از سیستم کنترل نسخه Git می‌دهد. GitHub که در سال ۲۰۰۸ تأسیس شد و اکنون متعلق به مایکروسافت است، با ابزارهایی برای پیگیری تغییرات، گزارش مشکلات و انتشار کد، همکاری تیمی را تسهیل می‌کند. GitHub به‌طور قابل‌توجهی توسط پروژه Bitcoin Core، پیاده‌سازی اصلی Bitcoin، استفاده می‌شود.