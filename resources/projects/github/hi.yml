description: |
  सहयोगी सॉफ़्टवेयर डेवलपमेंट प्लेटफ़ॉर्म जो डेवलपर्स को Git संस्करण नियंत्रण प्रणाली का उपयोग करके अपने प्रोजेक्ट को प्रबंधित करने, साझा करने और होस्ट करने में सक्षम बनाता है। 2008 में स्थापित और अब Microsoft के स्वामित्व में, GitHub परिवर्तनों को ट्रैक करने, समस्याओं की रिपोर्ट करने और कोड प्रकाशित करने के लिए उपकरणों के साथ टीमवर्क की सुविधा प्रदान करता है। GitHub का उपयोग Bitcoin कोर प्रोजेक्ट द्वारा किया जाता है, जो Bitcoin का मुख्य कार्यान्वयन है।