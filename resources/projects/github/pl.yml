description: |
  Platforma do wspólnego tworzenia oprogramowania, która umożliwia deweloperom zarządzanie, udostępnianie i hostowanie swoich projektów przy użyciu systemu kontroli wersji Git. Założony w 2008 roku, a obecnie należący do Microsoft, GitHub ułatwia pracę zespołową dzięki narzędziom do śledzenia zmian, zgłaszania błędów i publikowania kodu. GitHub jest w szczególności wykorzystywany przez projekt Bitcoin Core, główną implementację Bitcoin.
  