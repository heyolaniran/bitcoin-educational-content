description: |
  Platforma za kolaborativni razvoj softvera koja omogućava programerima da upravljaju, dele i hostuju svoje projekte koristeći Git sistem za kontrolu verzija. Osnovan 2008. godine i sada u vlasništvu Microsofta, GitHub olakšava timski rad alatima za praćenje promena, prijavljivanje problema i objavljivanje koda. GitHub se posebno koristi od strane Bitcoin Core projekta, glavne implementacije Bitcoin.