description: |
  Plattform för mjukvaruutveckling i samarbete som gör det möjligt för utvecklare att hantera, dela och vara värd för sina projekt med hjälp av versionskontrollsystemet Git. GitHub grundades 2008 och ägs nu av Microsoft och underlättar lagarbete med verktyg för att spåra ändringar, rapportera problem och publicera kod. GitHub används framför allt av Bitcoin Core-projektet, den huvudsakliga implementeringen av Bitcoin.
  