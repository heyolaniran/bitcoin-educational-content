description: |
  Jukwaa shirikishi la ukuzaji programu ambalo huwezesha wasanidi programu kudhibiti, kushiriki na kupangisha miradi yao kwa kutumia mfumo wa kudhibiti toleo la Git. Ilianzishwa mwaka wa 2008 na sasa inamilikiwa na Microsoft, GitHub huwezesha kazi ya pamoja kwa zana za kufuatilia mabadiliko, masuala ya kuripoti na msimbo wa uchapishaji. GitHub inatumiwa haswa na mradi wa Bitcoin Core, utekelezaji mkuu wa Bitcoin.
  