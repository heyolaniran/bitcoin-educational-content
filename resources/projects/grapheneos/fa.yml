description: |
  GrapheneOS یک سیستم‌عامل موبایل است که بر امنیت و حریم خصوصی تمرکز دارد و برای دستگاه‌های Google Pixel طراحی شده است. این یک پروژه متن‌باز مبتنی بر اندروید است که با ادغام ویژگی‌های پیشرفته و کنترل‌های سخت‌گیرانه بر مجوزهای برنامه، مقاومت در برابر حملات را افزایش می‌دهد. بدون خدمات گوگل به‌صورت پیش‌فرض، GrapheneOS تجربه کاربری مینیمالیستی ارائه می‌دهد و در عین حال امکان نصب اختیاری ابزارها را برای برآورده کردن نیازهای کاربران موبایل آگاه به حریم خصوصی فراهم می‌کند.