description: |
  ग्राफीनओएस एक मोबाइल ऑपरेटिंग सिस्टम है जो सुरक्षा और गोपनीयता पर केंद्रित है, जिसे Google Pixel डिवाइस के लिए डिज़ाइन किया गया है। यह एंड्रॉइड पर आधारित एक ओपन-सोर्स प्रोजेक्ट है, जो उन्नत सुविधाओं को एकीकृत करके और ऐप अनुमतियों पर सख्त नियंत्रण करके हमलों के खिलाफ लचीलापन बढ़ाता है। डिफ़ॉल्ट रूप से एकीकृत Google सेवाओं के बिना, ग्राफीनओएस गोपनीयता के प्रति जागरूक मोबाइल उपयोगकर्ताओं की ज़रूरतों को पूरा करने के लिए उपकरणों की वैकल्पिक स्थापना की अनुमति देते हुए एक न्यूनतम उपयोगकर्ता अनुभव प्रदान करता है।