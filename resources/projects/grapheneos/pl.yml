description: |
  GrapheneOS to mobilny system operacyjny skoncentrowany na bezpieczeństwie i prywatności, zaprojektowany dla urządzeń Google Pixel. Jest to projekt open-source oparty na Androidzie, zwiększający odporność na ataki poprzez integrację zaawansowanych funkcji i ścisłą kontrolę nad uprawnieniami aplikacji. Bez domyślnie zintegrowanych usług Google, GrapheneOS zapewnia minimalistyczne wrażenia użytkownika, umożliwiając jednocześnie opcjonalną instalację narzędzi spełniających potrzeby użytkowników mobilnych dbających o prywatność.
  