description: |
  GrapheneOS je mobilni operativni sistem fokusiran na bezbednost i privatnost, dizajniran za Google Pixel uređaje. To je projekat otvorenog koda zasnovan na Androidu, koji poboljšava otpornost na napade integracijom naprednih funkcija i strogom kontrolom nad dozvolama aplikacija. Bez Google servisa integrisanih po defaultu, GrapheneOS pruža minimalističko korisničko iskustvo dok omogućava opcionalnu instalaciju alata za ispunjavanje potreba korisnika mobilnih uređaja koji su svesni privatnosti.