description: |
  GrapheneOS är ett mobilt operativsystem med fokus på säkerhet och integritet, utformat för Google Pixel-enheter. Det är ett öppen källkodsprojekt baserat på Android, som förbättrar motståndskraften mot attacker genom att integrera avancerade funktioner och strikt kontroll över appbehörigheter. Utan Google-tjänster integrerade som standard ger GrapheneOS en minimalistisk användarupplevelse samtidigt som det tillåter valfri installation av verktyg för att tillgodose behoven hos integritetsmedvetna mobilanvändare.
  