description: |
  GrapheneOS ni mfumo wa uendeshaji wa vifaa vya mkononi unaozingatia usalama na faragha, ulioundwa kwa ajili ya vifaa vya Google Pixel. Ni mradi wa programu huria kulingana na Android, unaoimarisha uthabiti dhidi ya mashambulizi kwa kuunganisha vipengele vya kina na udhibiti mkali wa ruhusa za programu. Bila huduma za Google zilizounganishwa kwa chaguomsingi, GrapheneOS hutoa utumiaji wa hali ya chini huku ikiruhusu usakinishaji wa hiari wa zana ili kukidhi mahitaji ya watumiaji wa simu wanaojali faragha.
  