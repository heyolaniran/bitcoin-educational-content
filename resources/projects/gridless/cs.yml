description: |
  V celé Africe existuje obrovská poptávka po spolehlivé, čisté a cenově dostupné energii, avšak výrobci energie z minisítí bojují s udržitelností. Společnost Gridless spolupracuje s obnovitelnými venkovskými výrobci energie z minisítí, aby zpeněžila plnou kapacitu jejich výroby jako odběratel poslední instance a zároveň slouží jako nájemce Anchor pro vytváření nových výroben energie.