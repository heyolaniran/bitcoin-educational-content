description: |
  Der Bedarf an zuverlässiger, sauberer und erschwinglicher Energie in Afrika ist immens, doch die Energieerzeuger in Kleinstnetzen kämpfen um Nachhaltigkeit. Gridless arbeitet mit erneuerbaren, ländlichen Mini-Grid-Energieerzeugern zusammen, um die volle Kapazität ihrer Produktion als Käufer der letzten Instanz zu monetarisieren, und dient als Anchor-Mieter für die Schaffung neuer Energieerzeugung.