description: |
  Existe una inmensa demanda de energía fiable, limpia y asequible en toda África, pero los generadores de energía de minirredes luchan por la sostenibilidad. Gridless trabaja con generadores rurales de energía renovable de minirredes para monetizar toda la capacidad de su producción como comprador de último recurso, además de servir como inquilino de Anchor para la creación de nueva generación de energía.