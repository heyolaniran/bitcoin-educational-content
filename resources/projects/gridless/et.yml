description: |
  Kogu Aafrikas on tohutu nõudlus usaldusväärse, puhta ja taskukohase energia järele, kuid minivõrkude energiatootjad võitlevad jätkusuutlikkuse eest. Gridless teeb koostööd taastuvate maapiirkondade minivõrkude energiatootjatega, et kasutada nende toodangu täielikku võimsust viimase võimaluse ostjana ning olla Anchor rentnikuks uue energiatootmise loomisel.