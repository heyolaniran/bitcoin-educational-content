description: |
  Luotettavan, puhtaan ja kohtuuhintaisen energian kysyntä on valtavaa kaikkialla Afrikassa, mutta miniverkkojen energiantuottajat kamppailevat kestävyyden puolesta. Gridless työskentelee uusiutuvien, maaseudun miniverkkoon perustuvien energiantuottajien kanssa, jotta niiden tuotannon koko kapasiteetti voidaan hyödyntää rahana viimeisenä ostajana ja toimia Anchor-vuokralaisena uuden energiantuotannon luomisessa.