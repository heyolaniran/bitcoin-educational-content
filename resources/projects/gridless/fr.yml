description: |
  La demande d'énergie fiable, propre et abordable est immense en Afrique, mais les producteurs d'énergie en mini-réseau luttent pour la durabilité. Gridless travaille avec des producteurs d'énergie renouvelable, rurale et en mini-réseau pour monétiser la pleine capacité de leur production en tant qu'acheteur de dernier recours, ainsi que pour servir de locataire Anchor pour la création d'une nouvelle production d'énergie.