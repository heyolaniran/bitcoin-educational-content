description: |
  पूरे अफ़्रीका में विश्वसनीय, स्वच्छ और किफ़ायती ऊर्जा की बहुत ज़्यादा मांग है, फिर भी मिनी-ग्रिड ऊर्जा जनरेटर स्थिरता के लिए संघर्ष कर रहे हैं। ग्रिडलेस नवीकरणीय, ग्रामीण, मिनी-ग्रिड ऊर्जा जनरेटर के साथ काम करता है ताकि अंतिम उपाय के खरीदार के रूप में उनके उत्पादन की पूरी क्षमता का मुद्रीकरण किया जा सके, साथ ही नई ऊर्जा उत्पादन निर्माण के लिए Anchor किरायेदार के रूप में भी काम किया जा सके।