description: |
  Ada permintaan yang sangat besar untuk energi yang andal, bersih, dan terjangkau di seluruh Afrika, namun generator energi jaringan mini berjuang untuk keberlanjutan. Gridless bekerja dengan generator energi mini-grid yang terbarukan, pedesaan, untuk memonetisasi kapasitas penuh dari output mereka sebagai pembeli pilihan terakhir, serta melayani sebagai penyewa Anchor untuk pembuatan pembangkit energi baru.