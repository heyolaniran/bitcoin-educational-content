description: |
  In tutta l'Africa c'è un'immensa domanda di energia affidabile, pulita e a prezzi accessibili, ma i generatori di energia mini-grid lottano per la sostenibilità. Gridless lavora con i generatori di energia rinnovabile, rurali e mini-grid per monetizzare l'intera capacità della loro produzione come acquirente di ultima istanza, oltre a fungere da locatario Anchor per la creazione di nuove generazioni di energia.