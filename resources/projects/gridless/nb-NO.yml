description: |
  Det er en enorm etterspørsel etter pålitelig, ren og rimelig energi i hele Afrika, men mininettverk sliter med å opprettholde bærekraften. Gridless samarbeider med fornybare, rurale mininettverk for å tjene penger på den fulle kapasiteten de har som siste utvei, og fungerer samtidig som en Anchor-leietaker for ny energiproduksjon.