description: |
  W całej Afryce istnieje ogromne zapotrzebowanie na niezawodną, czystą i niedrogą energię, jednak wytwórcy energii w minisieciach walczą o zrównoważony rozwój. Gridless współpracuje z odnawialnymi, wiejskimi, mini-gridowymi generatorami energii, aby spieniężyć pełną moc ich produkcji jako nabywca ostatniej instancji, a także służy jako najemca Anchor do tworzenia nowych źródeł energii.