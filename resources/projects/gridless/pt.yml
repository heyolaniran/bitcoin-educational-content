description: |
  Existe uma enorme procura de energia fiável, limpa e acessível em África, mas os geradores de energia de mini-redes lutam pela sua sustentabilidade. A Gridless trabalha com geradores de energia renovável, rurais e de mini-redes para rentabilizar a capacidade total da sua produção como comprador de último recurso, bem como para servir de inquilino Anchor para a criação de nova geração de energia.