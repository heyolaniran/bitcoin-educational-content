description: |
  В Африке существует огромный спрос на надежную, чистую и доступную энергию, однако генераторы мини-сетей борются за устойчивость. Компания Gridless работает с возобновляемыми сельскими мини-генераторами, чтобы монетизировать всю мощность их производства в качестве покупателя последней инстанции, а также в качестве арендатора Anchor для создания новой генерации энергии.