description: |
  Postoji ogromna potražnja za pouzdanom, čistom i pristupačnom energijom širom Afrike, ali generatori energije mini-mreže se bore za održivost. Gridless sarađuje sa obnovljivim, ruralnim, mini-mrežnim generatorima energije kako bi unovčio puni kapacitet njihove proizvodnje kao kupac poslednjeg utočišta, kao i da služi kao Anchor zakupac za stvaranje nove proizvodnje energije.