description: |
  Det finns en enorm efterfrågan på tillförlitlig, ren och prisvärd energi i hela Afrika, men energiproducenter med mininät kämpar för hållbarhet. Gridless arbetar med förnybara mininätverk på landsbygden för att tjäna pengar på den fulla kapaciteten i deras produktion som en köpare av sista utväg, samt som en Anchor-hyresgäst för skapande av ny energiproduktion.