description: |
  Kuna mahitaji makubwa ya nishati ya kutegemewa, safi na ya bei nafuu kote barani Afrika, lakini jenereta za nishati ya gridi ndogo hujitahidi kudumisha uendelevu. Gridless inafanya kazi na jenereta za nishati zinazoweza kurejeshwa, za mashambani, za gridi ndogo ili kuchuma mapato kamili ya pato lao kama mnunuzi wa chaguo la mwisho, na pia kutumika kama mpangaji wa Anchor kwa kuunda uzalishaji mpya wa nishati.