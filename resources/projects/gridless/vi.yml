description: |
  Có nhu cầu rất lớn về năng lượng đáng tin cậy, sạch và giá cả phải chăng trên khắp Châu Phi, nhưng các nhà sản xuất năng lượng lưới điện nhỏ đang phải vật lộn để duy trì tính bền vững. Gridless hợp tác với các nhà sản xuất năng lượng lưới điện nhỏ, nông thôn, tái tạo để kiếm tiền từ toàn bộ công suất đầu ra của họ với tư cách là người mua cuối cùng, cũng như đóng vai trò là người thuê Anchor để tạo ra năng lượng mới.