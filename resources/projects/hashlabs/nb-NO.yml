description: |
  Hashlabs er et Mining-selskap som tilbyr tre hovedtjenester til et globalt marked: hosting, innkjøp av maskinvare og administrasjon av nettsteder. Fra oppstarten i Kasakhstan i 2021 har Hashlabs utviklet seg til et globalt selskap med virksomhet på tre kontinenter, inkludert Afrika, og som betjener flere hundre kunder over hele verden.