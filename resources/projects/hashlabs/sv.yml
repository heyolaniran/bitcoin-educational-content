description: |
  Hashlabs är ett Mining-företag som tillhandahåller tre huvudtjänster till en global marknad: hosting, upphandling av hårdvara och site management. Från starten i Kazakstan 2021 har Hashlabs utvecklats till ett globalt företag med verksamhet som sträcker sig över tre kontinenter, inklusive Afrika, och som betjänar flera hundra kunder över hela världen.