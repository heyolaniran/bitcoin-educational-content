description: |
  HODL HODL یک پلتفرم معاملاتی امن و غیر حضانتی Bitcoin است که به حریم خصوصی شما ارزش می‌دهد. با بیش از 7 سال سابقه در کسب و کار، این پلتفرم معاملات ناشناس همتا به همتا را بر اساس شرایط شما تسهیل می‌کند و از بیش از 100 ارز پشتیبانی می‌کند، با بیش از 100,000 کاربر ثبت‌نام‌شده و 50,000 معامله بسته‌شده.
  
  این پلتفرم با قراردادهای Multisig (P2SH) کار می‌کند، به این معنی که شما در طول کل معامله کنترل کلیدهای وجوه در امانت را دارید. هیچ تأییدی لازم نیست، که تجربه معاملاتی بی‌وقفه و خصوصی را فراهم می‌کند.
  
  فرآیند شروع معامله ساده است. کاربران در یک Contract شرکت می‌کنند و HODL HODL یک Multisig امانت Address منحصر به فرد ایجاد می‌کند. فروشنده بیت‌کوین‌ها را مستقیماً از Wallet خود در امانت واریز می‌کند و خریدار طبق روش پرداخت توافق‌شده به فروشنده پرداخت می‌کند. در نهایت، فروشنده بیت‌کوین‌ها را مستقیماً از امانت به Wallet خریدار آزاد می‌کند و Contract را تکمیل می‌کند.
  
  HODL HODL به شما اجازه می‌دهد تا یک پیشنهاد بر اساس شرایط خود ایجاد کنید، قیمت خود را تعیین کنید، از روش‌های پرداخت متعدد استفاده کنید و یک مقدار توقف ضرر تنظیم کنید. هزینه‌های شفاف پلتفرم بین خریدار و فروشنده تقسیم می‌شود و از مقدار BTC کسر می‌شود. با HODL HODL، شما می‌توانید به صورت جهانی معامله کنید، از هر سیستم پرداختی استفاده کنید و برای هر ارزی معامله کنید.