description: |
  HODL HODL to bezpieczna platforma handlowa Bitcoin, która ceni Twoją prywatność. Działająca od ponad 7 lat platforma ułatwia anonimowe transakcje peer-to-peer na własnych warunkach, obsługując ponad 100 walut, z ponad 100 000 zarejestrowanych użytkowników i 50 000 zamkniętych transakcji.
  
  Platforma działa w oparciu o kontrakty Multisig (P2SH), co oznacza, że użytkownik kontroluje klucze do środków w depozycie przez cały czas trwania transakcji. Weryfikacja nie jest wymagana, co pozwala na płynny i prywatny handel.
  
  Proces rozpoczęcia handlu jest prosty. Użytkownicy angażują się w Contract, a HODL HODL generuje unikalny Multisig escrow Address. Sprzedający deponuje bitcoiny w depozycie bezpośrednio ze swojego Wallet, a kupujący płaci sprzedającemu zgodnie z uzgodnioną metodą płatności. Na koniec sprzedający uwalnia bitcoiny z depozytu bezpośrednio do Wallet kupującego, kończąc Contract.
  
  HODL HODL umożliwia utworzenie oferty na własnych warunkach, ustalenie ceny, korzystanie z wielu metod płatności i ustawienie wartości stop-loss. Przejrzyste opłaty platformy są dzielone między kupującego i sprzedającego i są odejmowane od kwoty BTC. Dzięki HODL HODL możesz handlować globalnie, korzystając z dowolnego systemu płatności i dowolnej waluty.