description: |
  HODL HODL je sigurna, nekustodijalna Bitcoin platforma za trgovanje koja ceni vašu privatnost. Sa preko 7 godina poslovanja, platforma omogućava anonimne peer-to-peer transakcije po vašim uslovima, podržavajući preko 100 valuta, sa više od 100,000 registrovanih korisnika i 50,000 zaključenih poslova.
  
  Platforma funkcioniše sa Multisig (P2SH) ugovorima, što znači da vi kontrolišete ključeve sredstava u escrow-u tokom celog posla. Nije potrebna verifikacija, omogućavajući besprekorno i privatno iskustvo trgovanja.
  
  Proces započinjanja trgovine je jednostavan. Korisnici se uključuju u Contract, a HODL HODL generiše jedinstveni Multisig escrow Address. Prodavac deponuje bitkoine u escrow direktno iz svog Wallet, a kupac plaća prodavcu prema dogovorenom načinu plaćanja. Na kraju, prodavac oslobađa bitkoine iz escrow-a direktno na Wallet kupca, čime se završava Contract.
  
  HODL HODL vam omogućava da kreirate ponudu po vašim uslovima, postavite svoju cenu, koristite više načina plaćanja i postavite stop-loss vrednost. Transparentne naknade platforme su podeljene između kupca i prodavca i odbijaju se od BTC iznosa. Sa HODL HODL, možete trgovati globalno, koristeći bilo koji platni sistem, za bilo koju valutu.