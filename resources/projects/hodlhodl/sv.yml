description: |
  HODL HODL är en säker, icke-frihetsberövande Bitcoin-handelsplattform som värdesätter din integritet. Med över 7 år i branschen underlättar plattformen anonyma peer-to-peer-affärer på dina egna villkor, med stöd för över 100 valutor, mer än 100 000 registrerade användare och 50 000 avslutade affärer.
  
  Plattformen arbetar med Multisig (P2SH)-kontrakt, vilket innebär att du kontrollerar nycklarna till de medel som finns i escrow under hela affären. Ingen verifiering krävs, vilket möjliggör en sömlös och privat handelsupplevelse.
  
  Processen för att börja handla är enkel. Användare engagerar sig i en Contract, och HODL HODL genererar en unik Multisig escrow Address. Säljaren sätter in bitcoins i escrow direkt från sin Wallet, och köparen betalar säljaren enligt den överenskomna betalningsmetoden. Slutligen frigör säljaren bitcoins från escrow direkt till köparens Wallet, vilket slutför Contract.
  
  HODL HODL låter dig skapa ett erbjudande på dina villkor, ställa in ditt pris, använda flera betalningsmetoder och ställa in ett stop-loss-värde. Plattformens transparenta avgifter delas mellan köpare och säljare och dras av från BTC-beloppet. Med HODL HODL kan du handla globalt, med vilket betalningssystem som helst, för vilken valuta som helst.