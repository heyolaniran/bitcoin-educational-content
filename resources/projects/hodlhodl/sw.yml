description: |
  HODL HODL ni jukwaa salama la biashara la Bitcoin ambalo linathamini ufaragha wako. Kwa zaidi ya miaka 7 ya biashara, mfumo huu huwezesha mikataba ya kati ya wenzao bila kutambulisha majina kwa masharti yako mwenyewe, ikisaidia zaidi ya sarafu 100, huku zaidi ya watumiaji 100,000 waliosajiliwa na ofa 50,000 zikifungwa.
  
  Mfumo huu unafanya kazi na kandarasi za Multisig (P2SH), kumaanisha kuwa unadhibiti funguo za pesa katika escrow katika mpango mzima. Hakuna uthibitishaji unaohitajika, kuruhusu uzoefu wa biashara usio na mshono na wa kibinafsi.
  
  Mchakato wa kuanza biashara ni moja kwa moja. Watumiaji hujihusisha na Contract, na HODL HODL huzalisha Multisig escrow ya kipekee ya Address. Muuzaji huweka bitcoins katika escrow moja kwa moja kutoka kwa Wallet yao, na mnunuzi hulipa muuzaji kulingana na njia ya malipo iliyokubaliwa. Hatimaye, muuzaji hutoa bitcoins kutoka escrow moja kwa moja hadi Wallet ya mnunuzi, kukamilisha Contract.
  
  HODL HODL hukuruhusu kuunda ofa kulingana na masharti yako, kuweka bei yako, kutumia njia nyingi za kulipa, na kuweka thamani ya kusitisha hasara. Ada za uwazi za jukwaa hugawanywa kati ya mnunuzi na muuzaji na hukatwa kutoka kwa kiasi cha BTC. Ukiwa na HODL HODL, unaweza kufanya biashara duniani kote, kwa kutumia mfumo wowote wa malipo, kwa sarafu yoyote.