description: |
  HODL HODL 是一個安全、無監管的 Bitcoin 交易平台，重視您的隱私。HODL 已經有超過 7 年的歷史，這個平台以您自己的條件促進匿名的點對點交易，支援超過 100 種貨幣，有超過 100,000 位註冊使用者，完成了 50,000 宗交易。
  
  該平台使用 Multisig (P2SH) 合約運作，這意味著在整個交易過程中，您控制著託管資金的鑰匙。不需要驗證，讓您享有無縫和隱私的交易體驗。
  
  開始交易的過程簡單直接。用戶進行 Contract，HODL HODL 產生一個唯一的 Multisig 託管 Address。賣方直接從他們的 Wallet 將比特幣存入託管，買方根據協定的付款方式向賣方付款。最後，賣方從託管直接釋放比特幣到買方的 Wallet，完成 Contract。
  
  HODL HODL 允許您按照自己的條件創建出價、設定價格、使用多種支付方式，並設定止蝕值。平台的透明費用由買方和賣方分擔，並從 BTC 金額中扣除。使用 HODL HODL，您可以在全球範圍內，使用任何支付系統，以任何貨幣進行交易。