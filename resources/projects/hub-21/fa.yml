description: |
  هاب 21 یک سازمان غیرانتفاعی واقع در مرکز بلگراد است که به آموزش، آموزش، تحقیق و جامعه برای حرفه‌ای‌های Bitcoin اختصاص دارد. این سازمان به عنوان یک مرکز همکاری برای اعضا از زمینه‌های مختلف، از جمله توسعه نرم‌افزار، هنر، طراحی، تولید محتوا و آموزش عمل می‌کند. هاب 21 بر روی Bitcoin، اقتصادهای چرخشی، Lightning Network، Nostr، هوش مصنوعی و کارآفرینی دیجیتال تمرکز دارد. امکانات آن شامل یک منطقه کار اشتراکی، اتاق پادکست، اتاق جلسه، اینترنت پرسرعت و فضاهایی برای رویدادها و کارگاه‌های جامعه است.