description: |
  Hub 21 to organizacja non-profit z siedzibą w centrum Belgradu, zajmująca się edukacją, szkoleniami, badaniami i społecznością dla profesjonalistów Bitcoin. Służy jako centrum współpracy dla członków z różnych dziedzin, w tym rozwoju oprogramowania, sztuki, projektowania, tworzenia treści i edukacji. Hub 21 koncentruje się na Bitcoin, gospodarce o obiegu zamkniętym, Lightning Network, Nostr, sztucznej inteligencji i przedsiębiorczości cyfrowej. Jego obiekty obejmują przestrzeń coworkingową, pokój do podcastów, salę konferencyjną, szybki internet oraz przestrzenie na wydarzenia i warsztaty społecznościowe.