description: |
  Hub 21 je neprofitna organizacija smeštena u centru Beograda, posvećena obrazovanju, obuci, istraživanju i zajednici za Bitcoin profesionalce. Služi kao kolaborativni centar za članove iz različitih oblasti, uključujući razvoj softvera, umetnost, dizajn, kreiranje sadržaja i obrazovanje. Hub 21 se fokusira na Bitcoin, cirkularne ekonomije, Lightning Network, Nostr, veštačku inteligenciju i digitalno preduzetništvo. Njegovi prostori uključuju coworking zonu, sobu za podkasting, salu za sastanke, internet velike brzine i prostore za događaje zajednice i radionice.