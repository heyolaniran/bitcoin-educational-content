description: |
  Hub 21 är en ideell organisation i centrala Belgrad som ägnar sig åt utbildning, träning, forskning och gemenskap för Bitcoin-proffs. Det fungerar som ett samarbetsnav för medlemmar från olika områden, inklusive mjukvaruutveckling, konst, design, innehållsskapande och utbildning. Hub 21 fokuserar på Bitcoin, cirkulära ekonomier, Lightning Network, Nostr, artificiell intelligens och digitalt entreprenörskap. Här finns bland annat ett coworking-område, podcasting-rum, mötesrum, höghastighetsinternet och utrymmen för evenemang och workshops.