description: |
  IBEX je průkopnická fintech společnost, která poskytuje platební řešení založená na Bitcoin a Lightning Network. Společnost IBEX byla založena v roce 2018 v Guatemale jako OTC desk pouze pro Bitcoin a vyvinula se v předního poskytovatele infrastruktury Lightning-as-a-Service. Její modulární platforma API a řešení pro obchodníky umožňují maloobchodníkům, platformám elektronického obchodu a finančním institucím integrovat bezpečné, rychlé a nákladově efektivní platby Bitcoin s globálním zúčtováním v reálném čase. Díky usnadnění bezproblémových a škálovatelných transakcí sehrála společnost IBEX rozhodující roli při zavádění systému Bitcoin na rozvíjejících se trzích, jako je Salvador, a nadále navazuje strategická partnerství s mezinárodními značkami za účelem modernizace starších finančních systémů.
  