description: |
  IBEX es una empresa fintech pionera que ofrece soluciones de pago basadas en Bitcoin y Lightning Network. Fundada en 2018 en Guatemala como un escritorio OTC solo Bitcoin, IBEX se ha convertido en un proveedor líder de infraestructura Lightning-as-a-Service. Su plataforma API modular y sus soluciones para comerciantes permiten a los minoristas, plataformas de comercio electrónico e instituciones financieras integrar pagos Bitcoin seguros, rápidos y rentables con liquidación global en tiempo real. Al facilitar transacciones fluidas y escalables, IBEX ha desempeñado un papel fundamental en el impulso de la adopción de Bitcoin en mercados emergentes como El Salvador y sigue forjando alianzas estratégicas con marcas internacionales para modernizar los sistemas financieros heredados.
  