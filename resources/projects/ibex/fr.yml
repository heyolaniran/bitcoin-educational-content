description: |
  IBEX est une société fintech pionnière qui fournit des solutions de paiement basées sur Bitcoin et Lightning Network. Fondée en 2018 au Guatemala en tant que bureau de gré à gré basé uniquement sur le Bitcoin, IBEX a évolué pour devenir un fournisseur de premier plan d'infrastructure Lightning-as-a-Service. Sa plateforme API modulaire et ses solutions marchandes permettent aux détaillants, aux plateformes de commerce électronique et aux institutions financières d'intégrer des paiements Bitcoin sécurisés, rapides et rentables avec un règlement mondial en temps réel. En facilitant les transactions transparentes et évolutives, IBEX a joué un rôle essentiel dans l'adoption du Bitcoin sur des marchés émergents comme le Salvador et continue de forger des partenariats stratégiques avec des marques internationales pour moderniser les systèmes financiers existants.
  