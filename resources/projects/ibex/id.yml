description: |
  IBEX adalah perusahaan fintech perintis yang memberikan solusi pembayaran berbasis Bitcoin dan Lightning Network. Didirikan pada tahun 2018 di Guatemala sebagai desk OTC khusus Bitcoin, IBEX telah berevolusi menjadi penyedia infrastruktur Lightning-as-a-Service terkemuka. Platform API modular dan solusi pedagangnya memungkinkan pengecer, platform e-commerce, dan lembaga keuangan untuk mengintegrasikan pembayaran Bitcoin yang aman, cepat, dan hemat biaya dengan penyelesaian global real-time. Dengan memfasilitasi transaksi yang lancar dan terukur, IBEX telah memainkan peran penting dalam mendorong adopsi Bitcoin di pasar negara berkembang seperti El Salvador dan terus menjalin kemitraan strategis dengan merek-merek internasional untuk memodernisasi sistem keuangan lama.
  