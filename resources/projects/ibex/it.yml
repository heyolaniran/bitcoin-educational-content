description: |
  IBEX è una società fintech all'avanguardia che fornisce soluzioni di pagamento basate su Bitcoin e Lightning Network. Fondata nel 2018 in Guatemala come desk OTC solo Bitcoin, IBEX si è evoluta in un fornitore leader di infrastrutture Lightning-as-a-Service. La sua piattaforma API modulare e le sue soluzioni per gli esercenti consentono a rivenditori, piattaforme di e-commerce e istituzioni finanziarie di integrare pagamenti Bitcoin sicuri, veloci ed economici con un regolamento globale in tempo reale. Facilitando transazioni scalabili e senza soluzione di continuità, IBEX ha svolto un ruolo fondamentale nel promuovere l'adozione di Bitcoin in mercati emergenti come El Salvador e continua a stringere partnership strategiche con marchi internazionali per modernizzare i sistemi finanziari esistenti.
  