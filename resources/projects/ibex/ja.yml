description: |
  IBEXはBitcoinおよびLightning Networkベースの決済ソリューションを提供する先駆的なフィンテック企業である。2018年にグアテマラでBitcoin専用のOTCデスクとして設立されたIBEXは、Lightning-as-a-Serviceインフラのリーディングプロバイダーへと発展した。そのモジュラーAPIプラットフォームと加盟店ソリューションにより、小売業者、Eコマースプラットフォーム、金融機関は、安全、迅速、かつコスト効率の高いBitcoin決済とリアルタイムのグローバル決済を統合することができる。シームレスでスケーラブルなトランザクションを促進することで、IBEXはエルサルバドルなどの新興市場におけるBitcoin導入の推進に重要な役割を果たし、レガシーな金融システムを近代化するために国際的なブランドとの戦略的パートナーシップを構築し続けている。
  