description: |
  IBEX er et banebrytende fintech-selskap som leverer Bitcoin- og Lightning Network-baserte betalingsløsninger. IBEX ble grunnlagt i 2018 i Guatemala som en ren Bitcoin OTC-desk, og har utviklet seg til å bli en ledende leverandør av Lightning-as-a-Service-infrastruktur. Den modulære API-plattformen og handelsløsningene gjør det mulig for forhandlere, e-handelsplattformer og finansinstitusjoner å integrere sikre, raske og kostnadseffektive Bitcoin-betalinger med global oppgjør i sanntid. Ved å legge til rette for sømløse og skalerbare transaksjoner har IBEX spilt en avgjørende rolle i å drive frem Bitcoin-bruken i fremvoksende markeder som El Salvador, og fortsetter å inngå strategiske partnerskap med internasjonale merkevarer for å modernisere eldre finanssystemer.
  