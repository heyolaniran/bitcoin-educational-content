description: |
  A IBEX é uma empresa fintech pioneira que oferece soluções de pagamento baseadas em Bitcoin e Lightning Network. Fundada em 2018 na Guatemala como uma mesa OTC apenas Bitcoin, a IBEX evoluiu para um fornecedor líder de infraestrutura Lightning-as-a-Service. A sua plataforma API modular e soluções comerciais permitem aos retalhistas, plataformas de comércio eletrónico e instituições financeiras integrar pagamentos Bitcoin seguros, rápidos e económicos com liquidação global em tempo real. Ao facilitar transacções contínuas e escaláveis, a IBEX tem desempenhado um papel crítico na condução da adoção do Bitcoin em mercados emergentes como El Salvador e continua a forjar parcerias estratégicas com marcas internacionais para modernizar sistemas financeiros legados.
  