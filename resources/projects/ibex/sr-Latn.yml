description: |
  IBEX je pionirska fintech kompanija koja pruža rešenja za plaćanje zasnovana na Bitcoin i Lightning Network. Osnovana 2018. godine u Gvatemali kao OTC desk samo za Bitcoin, IBEX se razvio u vodećeg provajdera Lightning-as-a-Service infrastrukture. Njegova modularna API platforma i rešenja za trgovce omogućavaju maloprodajnim lancima, e-commerce platformama i finansijskim institucijama da integrišu sigurna, brza i isplativa Bitcoin plaćanja sa globalnim poravnanjem u realnom vremenu. Omogućavajući besprekorne i skalabilne transakcije, IBEX je odigrao ključnu ulogu u podsticanju usvajanja Bitcoin na tržištima u razvoju kao što je El Salvador i nastavlja da sklapa strateška partnerstva sa međunarodnim brendovima kako bi modernizovao zastarele finansijske sisteme.