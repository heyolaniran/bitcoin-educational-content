description: |
  IBEX är ett banbrytande fintechbolag som levererar Bitcoin- och Lightning Network-baserade betalningslösningar. IBEX grundades 2018 i Guatemala som en OTC-desk för endast Bitcoin och har utvecklats till en ledande leverantör av Lightning-as-a-Service-infrastruktur. Dess modulära API-plattform och lösningar för handlare gör det möjligt för detaljhandlare, e-handelsplattformar och finansinstitut att integrera säkra, snabba och kostnadseffektiva Bitcoin-betalningar med global avveckling i realtid. Genom att underlätta sömlösa och skalbara transaktioner har IBEX spelat en avgörande roll för att driva på Bitcoin-användningen på tillväxtmarknader som El Salvador och fortsätter att skapa strategiska partnerskap med internationella varumärken för att modernisera äldre finansiella system.
  