description: |
  IBEX ni kampuni tangulizi ya fintech ambayo hutoa suluhu za malipo zinazotegemea Bitcoin na Lightning Network. Ilianzishwa mwaka wa 2018 nchini Guatemala kama dawati la Bitcoin pekee la OTC, IBEX imebadilika na kuwa mtoaji mkuu wa miundombinu ya Umeme-kama-Huduma. Jukwaa lake la kawaida la API na suluhu za wauzaji huwezesha wauzaji reja reja, majukwaa ya biashara ya mtandaoni, na taasisi za fedha kujumuisha malipo salama, ya haraka na ya gharama nafuu ya Bitcoin na utatuzi wa kimataifa wa wakati halisi. Kwa kuwezesha miamala isiyo na mshono na hatarishi, IBEX imekuwa na jukumu muhimu katika kuendesha upitishwaji wa Bitcoin katika masoko yanayoibukia kama El Salvador na inaendelea kuunda ushirikiano wa kimkakati na chapa za kimataifa ili kuboresha mifumo ya kifedha iliyopitwa na wakati.
  