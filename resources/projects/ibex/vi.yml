description: |
  IBEX là một công ty công nghệ tài chính tiên phong cung cấp các giải pháp thanh toán dựa trên Bitcoin và Lightning Network. Được thành lập vào năm 2018 tại Guatemala với tư cách là một quầy OTC chỉ dành cho Bitcoin, IBEX đã phát triển thành một nhà cung cấp hàng đầu về cơ sở hạ tầng Lightning-as-a-Service. Nền tảng API mô-đun và các giải pháp thương mại của công ty cho phép các nhà bán lẻ, nền tảng thương mại điện tử và các tổ chức tài chính tích hợp các khoản thanh toán Bitcoin an toàn, nhanh chóng và tiết kiệm chi phí với giải quyết toàn cầu theo thời gian thực. Bằng cách tạo điều kiện cho các giao dịch liền mạch và có thể mở rộng quy mô, IBEX đã đóng vai trò quan trọng trong việc thúc đẩy việc áp dụng Bitcoin tại các thị trường mới nổi như El Salvador và tiếp tục xây dựng quan hệ đối tác chiến lược với các thương hiệu quốc tế để hiện đại hóa các hệ thống tài chính cũ.
  