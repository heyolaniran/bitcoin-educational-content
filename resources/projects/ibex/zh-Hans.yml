description: |
  IBEX 是一家开创性的金融科技公司，提供基于 Bitcoin 和 Lightning Network 的支付解决方案。IBEX 于 2018 年在危地马拉成立，当时是一家仅提供 Bitcoin 服务的场外交易平台，现已发展成为一家领先的 "闪电即服务 "基础设施提供商。其模块化 API 平台和商户解决方案使零售商、电子商务平台和金融机构能够将安全、快速、经济高效的 Bitcoin 支付与实时全球结算整合在一起。通过促进无缝和可扩展的交易，IBEX 在推动萨尔瓦多等新兴市场采用 Bitcoin 方面发挥了关键作用，并继续与国际品牌建立战略合作伙伴关系，以实现传统金融系统的现代化。
  