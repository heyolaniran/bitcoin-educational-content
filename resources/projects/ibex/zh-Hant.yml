description: |
  IBEX 是一家提供基於 Bitcoin 和 Lightning Network 的支付解決方案的先驅金融科技公司。IBEX 於 2018 年在危地馬拉成立，當時是一家僅提供 Bitcoin 服務的場外櫃檯，現在已發展成為一家領先的 Lightning-as-a-Service 基礎設施供應商。其模組化 API 平台和商家解決方案可讓零售商、電子商務平台和金融機構整合安全、快速且具成本效益的 Bitcoin 支付與即時全球結算。透過促進無縫和可擴充的交易，IBEX 在薩爾瓦多等新興市場推動 Bitcoin 應用上扮演了關鍵的角色，並持續與國際品牌建立策略夥伴關係，將傳統的金融系統現代化。
  