description: |
  Imperia Online JSC je evropský vývojář online her. V roce 2018 zavedla platby Bitcoin, aby poskytla své globální hráčské základně větší flexibilitu. V letech 2022 až 2023 zaznamenali 284% nárůst objemu transakcí v BTC a další růst v roce 2024, což svědčí o rostoucím zájmu uživatelů.
  