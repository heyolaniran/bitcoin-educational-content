description: |
  Imperia Online JSC یک توسعه‌دهنده بازی‌های آنلاین اروپایی است. آن‌ها در سال 2018 پرداخت‌های Bitcoin را معرفی کردند تا به پایگاه جهانی بازیکنان خود انعطاف‌پذیری بیشتری بدهند. آن‌ها افزایش 284 درصدی در حجم تراکنش‌های BTC از 2022 تا 2023 را مشاهده کرده‌اند و رشد بیشتری در 2024، که نشان‌دهنده افزایش علاقه کاربران است.