description: |
  Imperia Online JSC è uno sviluppatore europeo di giochi online. Ha introdotto i pagamenti Bitcoin nel 2018 per dare maggiore flessibilità alla sua base di giocatori globali. Hanno registrato un aumento del 284% dei volumi delle transazioni in BTC dal 2022 al 2023, e un'ulteriore crescita nel 2024, indicando un crescente interesse da parte degli utenti.
  