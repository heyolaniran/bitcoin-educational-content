description: |
  A Imperia Online JSC é uma empresa europeia de desenvolvimento de jogos online. Eles introduziram os pagamentos Bitcoin em 2018 para dar mais flexibilidade à sua base global de jogadores. Verificaram um aumento de 284% nos volumes de transacções BTC de 2022 a 2023, e um maior crescimento em 2024, indicando um interesse crescente dos utilizadores.
  