description: |
  Imperia Online JSC je evropski developer online igara. Uveli su Bitcoin plaćanja 2018. godine kako bi svojoj globalnoj bazi igrača pružili veću fleksibilnost. Zabeležili su porast od 284% u obimu BTC transakcija od 2022. do 2023. godine, a dalji rast u 2024. godini, što ukazuje na rastuće interesovanje korisnika.