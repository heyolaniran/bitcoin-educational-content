description: |
  Izraelska Bitcoin Asocijacija je neprofitna organizacija sa ciljem da pomogne ljudima u Izraelu da maksimalno iskoriste tehnologiju Bitcoin i drugih kriptovaluta. Neke od aktivnosti uključuju saradnju sa izraelskim vlastima na stvaranju regulatornog okvira za Bitcoin aktivnosti, podizanje svesti o Bitcoin, edukaciju, pružanje podrške i smernica korisnicima, pomoć novajlijama, negovanje izraelske Bitcoin zajednice u Izraelu i podršku svim preduzećima koja žele da koriste Bitcoin ili da razvijaju sa njim.