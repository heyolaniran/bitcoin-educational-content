description: |
  Israeli Bitcoin Association är en ideell organisation med målet att hjälpa folket i Israel att få ut det mesta av tekniken för Bitcoin och andra kryptovalutor. Några av aktiviteterna inkluderar att arbeta med israeliska myndigheter för att skapa ett regelverk för Bitcoin-aktivitet, skapa medvetenhet om Bitcoin, utbildning, ge stöd och vägledning till användare, hjälpa nykomlingar, odla det israeliska Bitcoin-samhället i Israel och stödja alla företag som vill använda Bitcoin eller utvecklas med det.