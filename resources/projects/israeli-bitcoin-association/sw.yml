description: |
  Jumuiya ya Bitcoin ya Israeli ni shirika lisilo la faida kwa lengo la kuwasaidia watu nchini Israeli kutumia vyema teknolojia ya Bitcoin na sarafu nyinginezo za siri. Baadhi ya shughuli hizo ni pamoja na kufanya kazi na mamlaka za Israeli ili kuunda mfumo wa udhibiti wa shughuli za Bitcoin, kujenga uhamasishaji kuhusu Bitcoin, elimu, kutoa usaidizi na mwongozo kwa watumiaji, kusaidia wageni, kukuza jumuiya ya Israeli ya Bitcoin nchini Israeli, na kusaidia biashara zote zinazotaka kutumia Bitcoin, au kuendeleza nayo.