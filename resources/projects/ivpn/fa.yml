description: |
  IVPN یک سرویس VPN متمرکز بر حریم خصوصی است که فعالیت کاربران را ثبت نمی‌کند و هنگام ثبت‌نام، داده‌های شخصی را جمع‌آوری یا ذخیره نمی‌کند. ما پرداخت‌ها را به صورت نقدی، Monero و Bitcoin می‌پذیریم. ما به شفافیت و امنیت متعهد هستیم و وب‌سایت و تمامی اپلیکیشن‌های IVPN ما متن‌باز هستند.
  
  سرورهای ما، از جمله ایمیل و چت زنده، به صورت خود میزبان و توسط خودمان اداره می‌شوند. ما به انجام ممیزی‌های امنیتی مستقل سالانه متعهد هستیم و در تبلیغات نادرست، مانند پرداخت برای بررسی‌ها یا وعده ناشناس بودن، شرکت نمی‌کنیم.
  
  ما به طور منظم به سازمان‌هایی مانند EFF، Open Rights Group و پروژه Tor کمک می‌کنیم. مدل کسب‌وکار ما به طور کامل بر اشتراک‌های پولی متکی است و هیچ خدمات جانبی یا سایت‌های بررسی VPN نداریم.
  
  ویژگی‌های ما شامل انتخاب پروتکل‌های WireGuard، OpenVPN یا IPSec، AntiTracker که تبلیغات و ردیاب‌ها را مسدود می‌کند، گزینه Killswitch/Firewall، سرورهای DNS خصوصی بدون ثبت، مسیرهای VPN چندگانه، انتقال پورت و Obfsproxy برای دور زدن سانسور است.
  
  در حالی که توضیح می‌دهیم که VPNها نمی‌توانند ناشناس بودن را فراهم کنند یا از جمع‌آوری داده‌ها توسط غول‌هایی مانند گوگل یا فیسبوک جلوگیری کنند، اطمینان می‌دهیم که یک VPN قابل اعتماد مانند ما می‌تواند به طور مؤثر داده‌ها و درخواست‌های DNS شما را رمزگذاری کند، امنیت را در شبکه‌های عمومی غیرقابل اعتماد افزایش دهد، IP شما را Address ماسک کند و سانسور یا بلوک‌های جغرافیایی را دور بزند. ما بخشی قابل اعتماد از استراتژی حفاظت از حریم خصوصی شما هستیم، به شرطی که به ما بیشتر از ISP خود اعتماد داشته باشید.