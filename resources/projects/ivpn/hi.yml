description: |
  IVPN एक गोपनीयता-केंद्रित VPN सेवा है जो उपयोगकर्ता गतिविधि को लॉग नहीं करती है और साइन-अप पर व्यक्तिगत डेटा एकत्र या संग्रहीत नहीं करती है। हम नकद, मोनेरो और Bitcoin में भुगतान स्वीकार करते हैं। हम पारदर्शिता और सुरक्षा के लिए प्रतिबद्ध हैं, हमारी वेबसाइट और सभी IVPN ऐप ओपन-सोर्स हैं।
  
  ईमेल और लाइव चैट सहित हमारे सर्वर स्वयं-होस्ट किए गए हैं और हमारे द्वारा संचालित हैं। हम वार्षिक स्वतंत्र सुरक्षा ऑडिट के लिए प्रतिबद्ध हैं और झूठे विज्ञापन में लिप्त नहीं होते हैं, जैसे कि समीक्षाओं के लिए भुगतान करना या गुमनामी का वादा करना।
  
  हम नियमित रूप से EFF, ओपन राइट्स ग्रुप और टोर प्रोजेक्ट जैसे संगठनों में योगदान करते हैं। हमारा व्यवसाय मॉडल बिना किसी सहायक सेवा या VPN समीक्षा साइट के पूरी तरह से सशुल्क सदस्यता पर निर्भर करता है।
  
  हमारी सुविधाओं में वायरगार्ड, ओपनवीपीएन या आईपीएसईसी प्रोटोकॉल, एंटीट्रैकर जो विज्ञापनों और ट्रैकर्स को ब्लॉक करता है, किलस्विच/फ़ायरवॉल विकल्प, निजी नॉन-लॉगिंग DNS सर्वर, मल्टी-हॉप VPN रूट, पोर्ट फ़ॉरवर्डिंग और सेंसरशिप को दरकिनार करने के लिए ओब्फ़्सप्रॉक्सी का विकल्प शामिल है।
  
  जबकि हम स्पष्ट करते हैं कि VPN गुमनामी हासिल नहीं कर सकते हैं या Google या Facebook जैसी दिग्गजों द्वारा डेटा संग्रह को रोक नहीं सकते हैं, हम आश्वासन देते हैं कि हमारे जैसे भरोसेमंद VPN आपके डेटा और DNS अनुरोधों को प्रभावी ढंग से एन्क्रिप्ट कर सकते हैं, अविश्वसनीय सार्वजनिक नेटवर्क पर सुरक्षा बढ़ा सकते हैं, आपके IP Address को छिपा सकते हैं, और सेंसरशिप या भौगोलिक अवरोधों को दरकिनार कर सकते हैं। हम आपकी गोपनीयता सुरक्षा रणनीति का एक विश्वसनीय हिस्सा हैं, बशर्ते आप अपने ISP से ज़्यादा हम पर भरोसा करें।