description: |
  IVPN to zorientowana na prywatność usługa VPN, która nie rejestruje aktywności użytkowników i nie gromadzi ani nie przechowuje danych osobowych podczas rejestracji. Akceptujemy płatności gotówką, Monero i Bitcoin. Dbamy o przejrzystość i bezpieczeństwo, a nasza strona internetowa i wszystkie aplikacje IVPN są open-source.
  
  Nasze serwery, w tym poczta e-mail i czat na żywo, są hostowane i obsługiwane przez nas. Zobowiązujemy się do corocznych niezależnych audytów bezpieczeństwa i nie pozwalamy sobie na fałszywe reklamy, takie jak płacenie za recenzje lub obiecywanie anonimowości.
  
  Regularnie wspieramy organizacje takie jak EFF, Open Rights Group i projekt Tor. Nasz model biznesowy opiera się wyłącznie na płatnych subskrypcjach, bez żadnych usług dodatkowych ani witryn z recenzjami VPN.
  
  Nasze funkcje obejmują wybór protokołów WireGuard, OpenVPN lub IPSec, AntiTracker, który blokuje reklamy i trackery, opcję Killswitch/Firewall, prywatne serwery DNS bez logowania, trasy VPN multi-hop, przekierowanie portów i Obfsproxy do omijania cenzury.
  
  Chociaż wyjaśniamy, że sieci VPN nie mogą zapewnić anonimowości ani zapobiec gromadzeniu danych przez gigantów takich jak Google czy Facebook, zapewniamy, że godna zaufania sieć VPN, taka jak nasza, może skutecznie szyfrować dane i żądania DNS, zwiększać bezpieczeństwo w niezaufanych sieciach publicznych, maskować adres IP Address i omijać cenzurę lub blokady geograficzne. Jesteśmy niezawodną częścią strategii ochrony prywatności, pod warunkiem, że ufasz nam bardziej niż swojemu dostawcy usług internetowych.