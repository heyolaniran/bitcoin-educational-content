description: |
  IVPN ni huduma ya VPN inayolenga faragha ambayo haiandikishi shughuli za mtumiaji na haikusanyi au kuhifadhi data ya kibinafsi wakati wa kujisajili. Tunakubali malipo ya pesa taslimu, Monero, na Bitcoin. Tumejitolea kwa uwazi na usalama, na tovuti yetu na programu zote za IPP zikiwa chanzo huria.
  
  Seva zetu, ikiwa ni pamoja na barua pepe na gumzo la moja kwa moja, hujipangisha na kuendeshwa na sisi. Tunajitolea kufanya ukaguzi huru wa usalama wa kila mwaka na hatujihusishi na utangazaji wa uwongo, kama vile kulipia ukaguzi au kuahidi kutokujulikana.
  
  Tunachangia mara kwa mara kwa mashirika kama vile EFF, Open Rights Group, na mradi wa Tor. Muundo wetu wa biashara unategemea tu usajili unaolipishwa, bila huduma zozote za ziada au tovuti za ukaguzi wa VPN.
  
  Vipengele vyetu ni pamoja na chaguo la WireGuard, OpenVPN au itifaki za IPSec, AntiTracker inayozuia matangazo na vifuatiliaji, chaguo la Killswitch/Firewall, seva za faragha za DNS zisizo na kumbukumbu, njia nyingi za VPN, usambazaji wa bandari na Obfsproxy ili kukwepa udhibiti.
  
  Ingawa tunafafanua kuwa VPN haziwezi kuficha majina au kuzuia ukusanyaji wa data na makampuni makubwa kama vile Google au Facebook, tunakuhakikishia kwamba VPN inayoaminika kama yetu inaweza kusimba data yako na maombi ya DNS, kuongeza usalama kwenye mitandao ya umma isiyoaminika, kuficha IP Address yako, na kukwepa udhibiti au vizuizi vya kijiografia. Sisi ni sehemu ya kutegemewa ya mkakati wako wa kulinda faragha, mradi unatuamini zaidi kuliko Mtoa huduma wako wa Intaneti.