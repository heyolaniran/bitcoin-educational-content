description: |
  IVPN 是注重隱私的 VPN 服務，不會記錄用戶的活動，也不會在用戶註冊時收集或儲存個人資料。我們接受現金、Monero 和 Bitcoin 付款。我們致力於透明度和安全性，我們的網站和所有 IVPN 應用程式都是開放源碼的。
  
  我們的伺服器，包括電子郵件和即時聊天，都是由我們自行託管和操作。我們承諾每年進行獨立的安全審計，不會沉迷於虛假廣告，例如付錢買評論或承諾匿名。
  
  我們定期向 EFF、Open Rights Group 和 Tor 計劃等組織捐款。我們的商業模式完全依賴付費訂閱，沒有任何輔助服務或 VPN 評論網站。
  
  我們的功能包括：可選擇 WireGuard、OpenVPN 或 IPSec 通訊協定、可阻擋廣告和追蹤者的 AntiTracker、Killswitch/防火牆選項、私人非記錄 DNS 伺服器、多跳 VPN 路由、連接埠轉寄，以及可規避審查的 Obfsproxy。
  
  雖然我們澄清 VPN 無法達到匿名或防止 Google 或 Facebook 等巨頭收集資料的目的，但我們保證，像我們這樣值得信賴的 VPN 可以有效加密您的資料和 DNS 請求，提高在不信任的公共網路中的安全性，遮蔽您的 IP Address，並規避審查或地理封鎖。只要您信任我們多於您的 ISP，我們就是您隱私權保護策略中可靠的一環。