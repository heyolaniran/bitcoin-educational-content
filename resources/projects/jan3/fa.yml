description: |
  JAN3 یک شرکت فناوری است که به دموکراتیزه کردن Bitcoin و ترویج خودمختاری مالی جهانی اختصاص دارد. این شرکت توسط سامسون مو، مدیر اجرایی سابق در Blockstream، تأسیس شده است و زیرساخت‌هایی بر اساس فناوری‌های Bitcoin Layer 2، مانند Lightning و Liquid توسعه می‌دهد. با همکاری با دولت‌ها، کسب‌وکارها و افراد، این شرکت هدف دارد تا با دسترس‌پذیر و قابل استفاده کردن Bitcoin در مقیاس بزرگ، هایپربیت‌کوینیزاسیون را تسریع کند و در عین حال اقتصادی عادلانه‌تر و غیرمتمرکزتر را ترویج دهد.