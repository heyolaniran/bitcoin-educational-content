description: |
  JAN3 एक प्रौद्योगिकी कंपनी है जो Bitcoin को लोकतांत्रिक बनाने और वैश्विक वित्तीय स्वायत्तता को बढ़ावा देने के लिए समर्पित है। ब्लॉकस्ट्रीम के पूर्व कार्यकारी सैमसन मो द्वारा स्थापित, JAN3 Bitcoin Layer 2 प्रौद्योगिकियों, जैसे लाइटनिंग और Liquid पर बुनियादी ढाँचा विकसित करता है। राष्ट्र-राज्यों, व्यवसायों और व्यक्तियों के साथ सहयोग करके, कंपनी का लक्ष्य Bitcoin को बड़े पैमाने पर सुलभ और प्रयोग करने योग्य बनाकर हाइपरबिटकॉइनाइजेशन को गति देना है, जबकि एक अधिक निष्पक्ष और अधिक विकेन्द्रीकृत अर्थव्यवस्था को बढ़ावा देना है।