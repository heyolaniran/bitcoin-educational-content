description: |
  JAN3 to firma technologiczna zajmująca się demokratyzacją Bitcoin i promowaniem globalnej autonomii finansowej. Założona przez Samsona Mow, byłego dyrektora wykonawczego w Blockstream, JAN3 rozwija infrastrukturę w oparciu o technologie Bitcoin Layer 2, takie jak Lightning i Liquid. Współpracując z państwami narodowymi, firmami i osobami prywatnymi, firma dąży do przyspieszenia hiperbitcoinizacji poprzez udostępnienie i wykorzystanie Bitcoin na dużą skalę, jednocześnie promując bardziej sprawiedliwą i zdecentralizowaną gospodarkę.
  