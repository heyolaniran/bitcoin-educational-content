description: |
  JAN3 je tehnološka kompanija posvećena demokratizaciji Bitcoin i promociji globalne finansijske autonomije. Osnovao ju je Samson Mow, bivši izvršni direktor u Blockstream-u, JAN3 razvija infrastrukturu na Bitcoin Layer 2 tehnologijama, kao što su Lightning i Liquid. Saradnjom sa državama, preduzećima i pojedincima, kompanija ima za cilj da ubrza hiperbitkoinizaciju čineći Bitcoin dostupnim i upotrebljivim u velikim razmerama, dok promoviše pravedniju i decentralizovaniju ekonomiju.