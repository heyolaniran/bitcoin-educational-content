description: |
  JAN3 är ett teknikföretag som arbetar för att demokratisera Bitcoin och främja global finansiell autonomi. JAN3 grundades av Samson Mow, tidigare chef på Blockstream, och utvecklar infrastruktur för Bitcoin Layer 2-teknik, såsom Lightning och Liquid. Genom att samarbeta med nationalstater, företag och individer strävar företaget efter att påskynda hyperbitcoinisering genom att göra Bitcoin tillgängligt och användbart i stor skala samtidigt som det främjar en rättvisare och mer decentraliserad ekonomi.
  