description: |
  JAN3 ni kampuni ya teknolojia inayojitolea kuweka demokrasia ya Bitcoin na kukuza uhuru wa kifedha duniani. Ilianzishwa na Samson Mow, mtendaji wa zamani katika Blockstream, JAN3 inakuza miundombinu kwenye teknolojia za Bitcoin Layer 2, kama vile Umeme na Liquid. Kwa kushirikiana na mataifa ya kitaifa, biashara, na watu binafsi, kampuni inalenga kuharakisha ubadilishanaji fedha kwa kufanya Bitcoin ipatikane na kutumika kwa kiwango kikubwa huku ikikuza uchumi wa haki na uliogatuliwa zaidi.
  