description: |
  Joltz es un proveedor de tecnología centrado en agilizar los pagos en Bitcoin y facilitar la integración de Lightning Network para las empresas. A través de sus API y herramientas para desarrolladores, Joltz permite transacciones Bitcoin rápidas, seguras y eficientes, facilitando a comerciantes y plataformas la adopción de pagos en moneda digital con la mínima fricción.
  