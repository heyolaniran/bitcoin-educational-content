description: |
  A Joltz é um fornecedor de tecnologia focado na simplificação de pagamentos Bitcoin e na facilitação da integração Lightning Network para empresas. Através das suas APIs e ferramentas de desenvolvimento, a Joltz permite transacções Bitcoin rápidas, seguras e eficientes, facilitando aos comerciantes e plataformas a adoção de pagamentos em moeda digital com o mínimo de fricção.
  