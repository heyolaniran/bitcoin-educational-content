description: |
  Компания Kagi Inc, основанная Владимиром Преловацем, создает инструменты, ориентированные на пользователя и обеспечивающие конфиденциальность. Поисковая система Kagi Search предлагает поиск без рекламы и слежки, а браузер Orion - быстрый, приватный и масштабируемый просмотр веб-страниц.