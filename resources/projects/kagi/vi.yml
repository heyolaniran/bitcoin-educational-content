description: |
  Kagi Inc, được thành lập bởi Vladimir Prelovac, tạo ra các công cụ thân thiện với quyền riêng tư, lấy người dùng làm trung tâm. Công cụ tìm kiếm Kagi của công ty cung cấp tìm kiếm không có quảng cáo, không có giám sát và trình duyệt Orion của công ty cung cấp khả năng duyệt web nhanh, riêng tư và có thể mở rộng.