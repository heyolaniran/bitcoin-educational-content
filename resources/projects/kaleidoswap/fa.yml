description: |
  کالیدوسواپ یک پروتکل معاملاتی غیرمتمرکز است که امکان مبادلات اتمی و غیرامانی دارایی‌ها را بر روی Lightning Network فراهم می‌کند. ساخته شده بر روی نود لایتنینگ RGB، کالیدوسواپ به کاربران اجازه می‌دهد تا توکن‌های Bitcoin و RGB را به صورت Trustless معامله کنند—بدون واسطه‌ها یا نگهداری متمرکز.
  
  به عنوان یک برنامه دسکتاپ متن‌باز منتشر شده، کالیدوسواپ در حال حاضر از معاملات چند دارایی در محیط Testnet پشتیبانی می‌کند و یک Interface کاربرپسند برای تعامل با دارایی‌های بومی لایتنینگ، کانال‌های RGB و ارائه‌دهندگان نقدینگی (LSPs) ارائه می‌دهد. این برنامه برای توانمندسازی معامله‌گران و توسعه‌دهندگان مستقل با یک Layer مالی کاملاً همتا به همتا و قابل برنامه‌ریزی بر روی Bitcoin طراحی شده است.