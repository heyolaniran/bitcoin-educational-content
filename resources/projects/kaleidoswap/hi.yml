description: |
  कैलीडोस्वैप एक विकेन्द्रीकृत ट्रेडिंग प्रोटोकॉल है जो Lightning Network पर परिसंपत्तियों के परमाणु, गैर-कस्टोडियल स्वैप को सक्षम बनाता है। RGB लाइटनिंग नोड के शीर्ष पर निर्मित, कैलीडोस्वैप उपयोगकर्ताओं को Bitcoin और RGB टोकन को Trustless तरीके से व्यापार करने की अनुमति देता है - बिना किसी मध्यस्थ या केंद्रीकृत हिरासत के।
  
  एक ओपन-सोर्स डेस्कटॉप एप्लिकेशन के रूप में जारी किया गया, कैलीडोस्वैप वर्तमान में Testnet वातावरण में मल्टी-एसेट ट्रेडिंग का समर्थन करता है, जो लाइटनिंग-नेटिव परिसंपत्तियों, RGB चैनलों और लिक्विडिटी प्रदाताओं (LSP) के साथ बातचीत करने के लिए उपयोगकर्ता के अनुकूल Interface प्रदान करता है। इसे Bitcoin पर पूरी तरह से पीयर-टू-पीयर, प्रोग्राम करने योग्य वित्तीय Layer के साथ संप्रभु व्यापारियों और डेवलपर्स को सशक्त बनाने के लिए डिज़ाइन किया गया है।