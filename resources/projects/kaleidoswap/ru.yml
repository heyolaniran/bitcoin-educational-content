description: |
  Kaleidoswap - это децентрализованный торговый протокол, обеспечивающий атомарный обмен активами на Lightning Network без опеки. Построенный на базе RGB Lightning Node, Kaleidoswap позволяет пользователям торговать токенами Bitcoin и RGB в режиме Trustless - без посредников и централизованного хранения.
  
  Выпущенный в виде настольного приложения с открытым исходным кодом, Kaleidoswap в настоящее время поддерживает торговлю несколькими активами в среде Testnet, предлагая удобный Interface для взаимодействия с Lightning-активами, каналами RGB и поставщиками ликвидности (LSP). Он предназначен для расширения возможностей суверенных трейдеров и разработчиков с помощью полностью одноранговой, программируемой финансовой Layer на Bitcoin.