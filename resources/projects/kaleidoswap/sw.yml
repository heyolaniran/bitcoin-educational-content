description: |
  Kaleidoswap ni itifaki ya biashara iliyogatuliwa ambayo huwezesha ubadilishanaji wa atomiki, usio na uhifadhi wa mali kwenye Lightning Network. Imejengwa juu ya Njia ya Umeme ya RGB, Kaleidoswap inaruhusu watumiaji kufanya biashara ya tokeni za Bitcoin na RGB kwa njia ya Trustless—bila wapatanishi au ulinzi wa kati.
  
  Imetolewa kama programu huria ya eneo-kazi, kwa sasa Kaleidoswap inaauni biashara ya mali nyingi katika mazingira ya Testnet, ikitoa Interface ambayo ni rafiki kwa mtumiaji ili kuingiliana na mali asili ya Umeme, chaneli za RGB, na watoa huduma za ukwasi (LSPs). Imeundwa ili kuwawezesha wafanyabiashara na wasanidi programu huru na mpango wa kifedha wa Layer kwenye Bitcoin.