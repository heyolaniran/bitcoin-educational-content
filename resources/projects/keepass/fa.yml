description: |
  KeePass یک مدیر رمز عبور متن‌باز است که برای ذخیره‌سازی و سازماندهی امن اطلاعات ورود شما طراحی شده است. این برنامه به صورت محلی عمل می‌کند و از رمزنگاری قوی برای حفاظت از داده‌های حساس شما استفاده می‌کند. KeePass از افزونه‌ها پشتیبانی می‌کند تا ویژگی‌های جدیدی اضافه کرده و به نیازهای مختلف تطبیق یابد.