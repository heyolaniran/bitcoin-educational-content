description: |
  KeePass to menedżer haseł o otwartym kodzie źródłowym przeznaczony do bezpiecznego przechowywania i organizowania danych uwierzytelniających. Działa lokalnie i wykorzystuje solidne szyfrowanie do ochrony poufnych danych. KeePass obsługuje wtyczki umożliwiające dodawanie funkcji i dostosowywanie go do różnych potrzeb.
  