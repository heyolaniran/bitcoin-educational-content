description: |
  किवेक्लेयर की स्थापना मई 2021 में न्यारागोंगो ज्वालामुखी के विस्फोट के जवाब में की गई थी, जिसका प्रारंभिक लक्ष्य आपदा पीड़ितों को प्रत्यक्ष सहायता प्रदान करना था। गोमा में स्थित, यह पहल जल्दी ही स्थानीय आबादी को Bitcoin के बारे में शिक्षित करने के लिए समर्पित एक संगठन में बदल गई। किवेक्लेयर कार्यकर्ताओं, ऊर्जा उत्पादकों और पत्रकारों सहित विभिन्न दर्शकों के लिए मासिक बैठकें और गहन प्रशिक्षण आयोजित करता है। इसके अतिरिक्त, एसोसिएशन एक वार्षिक सम्मेलन आयोजित करता है, जो आदान-प्रदान और व्यावहारिक अनुप्रयोगों के विकास को बढ़ावा देने के लिए कांगोलेस Bitcoin पारिस्थितिकी तंत्र को एक साथ लाता है।