description: |
  Kiveclair je osnovan u maju 2021. godine, kao odgovor na erupciju vulkana Nyiragongo, sa početnim ciljem pružanja direktne pomoći žrtvama katastrofe. Sa sedištem u Gomi, inicijativa se brzo transformisala u organizaciju posvećenu edukaciji lokalnog stanovništva o Bitcoin. Kiveclair organizuje mesečne sastanke i detaljne obuke za različite publike, uključujući aktiviste, proizvođače energije i novinare. Pored toga, udruženje održava godišnju konferenciju, okupljajući kongoleški ekosistem Bitcoin kako bi se promovisale razmene i razvoj praktičnih primena.