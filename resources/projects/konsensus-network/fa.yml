description: |
  تأسیس شده در سال ۲۰۱۹ توسط نیکو لاامانن، شبکه کنسنسوس با ترجمه فنلاندی 'استاندارد Bitcoin' توسط سیف‌الدین آموس آغاز شد. به زودی به تیمی پرجنب‌وجوش و آزادی‌خواه از داوطلبان مشتاق به Bitcoin تبدیل شد که منجر به بومی‌سازی کتاب به زبان‌های پرتغالی و هلندی شد. به عنوان یک شرکت مختص Bitcoin، تاکنون بیش از ۵۰ کتاب منتشر کرده‌ایم و به عنوان پلی بین نویسندگان، مترجمان و کانال‌های توزیع عمل می‌کنیم.
  
  ماموریت ما حول محور دسترسی بیشتر به Bitcoin، اقتصاد اتریشی و حاکمیت از طریق ادبیات بومی‌سازی شده می‌چرخد. ما معتقدیم که پتانسیل Bitcoin بسیار زیاد است و می‌خواهیم این دانش را با جهان به اشتراک بگذاریم. انتظار نداشتیم که به انتشار کتاب بپردازیم، اما متعهد به توانمندسازی همه برای درک قدرت تحول‌آفرین پول غیرمتمرکز هستیم.
  
  ما به عنوان یک 'سازمان ستاره دریایی' ساختار یافته‌ایم، مدلی از سازمان غیرمتمرکز و بدون رهبر که بر اساس سازگاری سریع و تعهد داوطلبان رشد می‌کند. هر شرکت‌کننده مهارت‌های منحصر به فرد خود را به میز می‌آورد و به کار جمعی ما کمک می‌کند و از آن بهره‌مند می‌شود. این مدل تصمیم‌گیری سریع و پاسخ‌های مؤثر به چالش‌ها را ممکن می‌سازد و جامعه ما را به سوی هدف مشترکمان توانمند می‌سازد.