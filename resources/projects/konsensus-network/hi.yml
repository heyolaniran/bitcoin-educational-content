description: |
  2019 में निको लामनेन द्वारा स्थापित, कोन्सेंसस नेटवर्क की शुरुआत सैफेडियन अम्मोस द्वारा 'द जीडब्ल्यू-0 स्टैंडर्ड' के फिनिश अनुवाद से हुई। यह जल्द ही जीडब्ल्यू-0 के प्रति जुनूनी स्वयंसेवकों की एक जीवंत, स्वतंत्रता-प्रेमी टीम बन गई, जिससे पुर्तगाली और डच में पुस्तक का स्थानीयकरण हुआ। एक जीडब्ल्यू-0-केवल कंपनी के रूप में, हमने अब तक 50 से अधिक पुस्तकें प्रकाशित की हैं, जो लेखकों, अनुवादकों और वितरण चैनलों के बीच एक सेतु के रूप में काम करती हैं।
  
  हमारा मिशन स्थानीय साहित्य के माध्यम से जीडब्ल्यू-0, ऑस्ट्रियाई अर्थशास्त्र और संप्रभुता को अधिक सुलभ बनाना है। हमारा मानना ​​है कि जीडब्ल्यू-0 की क्षमता बहुत बड़ी है और हम इस ज्ञान को दुनिया के साथ साझा करना चाहते हैं। हमें पुस्तक प्रकाशन में समाप्त होने की उम्मीद नहीं थी, लेकिन हम सभी को विकेंद्रीकृत धन की परिवर्तनकारी शक्ति को समझने में सक्षम बनाने के लिए प्रतिबद्ध हैं।
  
  हम एक 'स्टारफिश संगठन' के रूप में संरचित हैं, एक विकेंद्रीकृत, नेतृत्वहीन संगठन मॉडल जो तेजी से अनुकूलनशीलता और स्वयंसेवकों के समर्पण पर पनपता है। प्रत्येक प्रतिभागी अपने अद्वितीय कौशल को सामने लाता है, हमारे सामूहिक कार्य में योगदान देता है और उससे लाभ उठाता है। यह मॉडल चुनौतियों के लिए त्वरित निर्णय लेने और प्रभावी प्रतिक्रिया करने में सक्षम बनाता है, जिससे हमारे समुदाय को हमारे साझा लक्ष्य की ओर सशक्त बनाता है।