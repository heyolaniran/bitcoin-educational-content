description: |
  Założona w 2019 r. przez Niko Laamanena organizacja Konsensus Network rozpoczęła działalność od fińskiego tłumaczenia książki "The Bitcoin Standard" autorstwa Saifedeana Ammousa. Wkrótce rozrósł się do tętniącego życiem, kochającego wolność zespołu wolontariuszy pasjonujących się Bitcoin, co doprowadziło do zlokalizowania książki w języku portugalskim i holenderskim. Jako firma zajmująca się wyłącznie Bitcoin, opublikowaliśmy do tej pory ponad 50 książek, działając jako pomost między autorami, tłumaczami i kanałami dystrybucji.
  
  Naszą misją jest uczynienie Bitcoin, austriackiej ekonomii i suwerenności bardziej dostępnymi poprzez zlokalizowaną literaturę. Wierzymy, że potencjał Bitcoin jest ogromny i chcemy podzielić się tą wiedzą ze światem. Nie spodziewaliśmy się, że skończymy na wydawaniu książek, ale jesteśmy zaangażowani w umożliwienie każdemu zrozumienia transformacyjnej mocy zdecentralizowanego pieniądza.
  
  Mamy strukturę "organizacji rozgwiazdy", zdecentralizowanego, pozbawionego liderów modelu organizacji, który rozwija się dzięki szybkiej adaptacji i zaangażowaniu wolontariuszy. Każdy uczestnik wnosi swoje unikalne umiejętności, przyczyniając się do naszej wspólnej pracy i czerpiąc z niej korzyści. Model ten umożliwia szybkie podejmowanie decyzji i skuteczne reagowanie na wyzwania, wzmacniając naszą społeczność w dążeniu do wspólnego celu.