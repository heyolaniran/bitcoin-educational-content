description: |
  Osnovana 2019. godine od strane Nika Laamanena, Konsensus Network je započela sa finskim prevodom 'The Bitcoin Standard' autora Saifedeana Ammousa. Ubrzo je prerasla u živopisni tim volontera koji vole slobodu i strastveni su prema Bitcoin, što je dovelo do lokalizacije knjige na portugalski i holandski. Kao kompanija koja se bavi isključivo Bitcoin, do sada smo objavili preko 50 knjiga, delujući kao most između autora, prevodilaca i distribucionih kanala.
  
  Naša misija se vrti oko toga da Bitcoin, austrijsku ekonomiju i suverenitet učinimo dostupnijim kroz lokalizovanu literaturu. Verujemo da je potencijal Bitcoin ogroman i želimo da podelimo ovo znanje sa svetom. Nismo očekivali da ćemo završiti u izdavaštvu knjiga, ali smo posvećeni omogućavanju svima da razumeju transformativnu moć decentralizovanog novca.
  
  Strukturisani smo kao 'organizacija morske zvezde', decentralizovani model organizacije bez lidera koji napreduje zahvaljujući brzoj prilagodljivosti i posvećenosti volontera. Svaki učesnik donosi svoje jedinstvene veštine, doprinosi i koristi od našeg zajedničkog rada. Ovaj model omogućava brzo donošenje odluka i efikasne odgovore na izazove, osnažujući našu zajednicu ka našem zajedničkom cilju.