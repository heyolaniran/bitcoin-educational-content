description: |
  Konsensus Network grundades 2019 av Niko Laamanen och började med den finska översättningen av "The Bitcoin Standard" av Saifedean Ammous. Det växte snart till ett livligt, frihetsälskande team av volontärer som brinner för Bitcoin, vilket ledde till lokaliseringen av boken på portugisiska och nederländska. Som ett företag som enbart arbetar med Bitcoin har vi hittills publicerat över 50 böcker och fungerar som en bro mellan författare, översättare och distributionskanaler.
  
  Vårt uppdrag kretsar kring att göra Bitcoin, österrikisk ekonomi och suveränitet mer tillgängligt genom lokaliserad litteratur. Vi tror att Bitcoin har en enorm potential och vill dela med oss av denna kunskap till hela världen. Vi förväntade oss inte att hamna inom bokutgivning, men vi är fast beslutna att göra det möjligt för alla att förstå den omvälvande kraften i decentraliserade pengar.
  
  Vi är uppbyggda som en "starfish-organisation", en decentraliserad, ledarlös organisationsmodell som bygger på snabb anpassningsförmåga och volontärernas engagemang. Varje deltagare bidrar med sina unika färdigheter till bordet, bidrar till och drar nytta av vårt kollektiva arbete. Denna modell möjliggör snabba beslut och effektiva svar på utmaningar, vilket stärker vårt samhälle mot vårt gemensamma mål.