description: |
  Mtandao wa Konsensus ulianzishwa mwaka wa 2019 na Niko Laamanen kwa tafsiri ya Kifini ya 'The Bitcoin Standard' na Saifedean Ammous. Hivi karibuni ilikua timu hai, inayopenda uhuru ya watu waliojitolea walio na shauku kuhusu Bitcoin, na kusababisha ujanibishaji wa kitabu katika Kireno na Kiholanzi. Kama kampuni ya Bitcoin pekee, tumechapisha zaidi ya vitabu 50 kufikia sasa, vinavyofanya kazi kama daraja kati ya waandishi, watafsiri na njia za usambazaji.
  
  Dhamira yetu inahusu kufanya Bitcoin, uchumi wa Austria, na uhuru kupatikana zaidi kupitia fasihi iliyojanibishwa. Tunaamini uwezo wa Bitcoin ni mkubwa na tunataka kushiriki maarifa haya na ulimwengu. Hatukutarajia kuishia katika uchapishaji wa vitabu, lakini tumejitolea kuwezesha kila mtu kuelewa nguvu ya mabadiliko ya pesa zilizogatuliwa.
  
  Tumeundwa kama 'shirika la samaki nyota,' muundo wa shirika uliogawanyika, usio na viongozi ambao hustawi kwa kubadilika haraka na kujitolea kwa watu wanaojitolea. Kila mshiriki huleta ujuzi wao wa kipekee kwenye meza, akichangia na kufaidika na kazi yetu ya pamoja. Muundo huu huwezesha kufanya maamuzi ya haraka na majibu madhubuti kwa changamoto, kuwezesha jumuiya yetu kufikia lengo letu la pamoja.