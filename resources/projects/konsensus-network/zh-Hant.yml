description: |
  Konsensus Network 於 2019 年由 Niko Laamanen 創立，起初是為 Saifedean Ammous 所著的《The Bitcoin Standard》進行芬蘭語翻譯。它很快就成長為一個充滿活力、熱愛自由、對 Bitcoin 充滿熱情的志工團隊，進而將這本書本地化為葡萄牙文和荷蘭文。作為一家 Bitcoin 專屬公司，我們至今已出版超過 50 本書，成為作者、翻譯者和銷售渠道之間的橋梁。
  
  我們的使命圍繞著讓 Bitcoin、奧地利經濟學和主權透過本地化的文學更容易被讀者接觸。我們相信 Bitcoin 的潛力巨大，並希望與全世界分享這些知識。我們沒想到最後會從事書籍出版，但我們致力於讓每個人都能理解分散式貨幣的轉化力量。
  
  我們的組織架構是一個「海星組織」，這是一個分散、無領導者的組織模式，靠著快速的適應力和志工的奉獻精神茁壯成長。每位參與者都能發揮自己的獨特技能，為我們的集體工作做出貢獻，並從中受益。這種模式能夠快速做出決策並有效应對挑戰，使我們的社區有能力實現我們的共同目標。