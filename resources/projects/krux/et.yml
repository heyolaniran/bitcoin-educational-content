description: |
  Krux on avatud lähtekoodiga püsivara, mis muudab valmis Kendryte K210 seadmed, nagu Maix Amigo, M5StickV ja teised, mitmekülgseteks Bitcoin tehinguallkirjastajateks. Lisaks oma põhifunktsioonile on Krux paindlik platvorm, mis suudab kohaneda erinevate vormifaktoritega seadmetega, pakkudes mitmeid vahendeid, mis aitavad luua ja taastada Mnemonic varukoopiaid, millest mõned sisaldavad suurema turvalisuse tagamiseks krüpteerimisvõimalusi.
  
  Seadmed, nagu Maix Amigo, Yahboom või WonderMV, on kasutusvalmis ja nende suured puuteekraanid muudavad kasutamise lihtsaks ja kasutajasõbralikuks. Need seadmed on ideaalsed neile, kes otsivad plug-and-play lahendust. Teisest küljest toetab Krux ka arendusplaadikomplekte, mis sobivad ideaalselt DIY-entusiastidele, kes naudivad oma riistvara kohandamist ja ehitamist.
  
  Kasutajasõbralik püsivara, mis suhtleb sujuvalt juhtivate koordinaatorite rahakottidega QR-koodide, SD-kaartide ja isegi termoprinterite kaudu, pakub unikaalseid funktsioone, et toetada tehinguid ja Mnemonic varundusi võrguühenduseta keskkonnas.