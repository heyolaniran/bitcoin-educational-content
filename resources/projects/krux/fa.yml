description: |
  Krux یک سیستم‌عامل متن‌باز است که دستگاه‌های Kendryte K210 موجود در بازار، مانند Maix Amigo، M5StickV و دیگر دستگاه‌ها را به امضاکننده‌های تراکنش Bitcoin چندمنظوره تبدیل می‌کند. فراتر از عملکرد اصلی خود، Krux یک پلتفرم انعطاف‌پذیر است که می‌تواند با دستگاه‌هایی با فرم‌فاکتورهای مختلف سازگار شود و مجموعه‌ای از ابزارها را برای کمک به ایجاد و بازیابی پشتیبان‌های Mnemonic ارائه می‌دهد که برخی از آن‌ها شامل گزینه‌های رمزگذاری برای امنیت بیشتر هستند.
  
  دستگاه‌هایی مانند Maix Amigo، Yahboom یا WonderMV آماده استفاده هستند و با صفحه‌نمایش‌های لمسی بزرگ، کار با آن‌ها را آسان و کاربرپسند می‌کنند. این دستگاه‌ها برای کسانی که به دنبال یک راه‌حل پلاگ‌ان‌پلی هستند، ایده‌آل می‌باشند. از سوی دیگر، Krux همچنین از کیت‌های برد توسعه پشتیبانی می‌کند که برای علاقه‌مندان به DIY که از سفارشی‌سازی و ساخت تنظیمات سخت‌افزاری خود لذت می‌برند، مناسب است.
  
  با تعامل بی‌نقص با کیف‌پول‌های هماهنگ‌کننده پیشرو از طریق کدهای QR، کارت‌های SD و حتی چاپگرهای حرارتی، این سیستم‌عامل کاربرپسند ویژگی‌های منحصربه‌فردی را برای پشتیبانی از تراکنش‌ها و پشتیبان‌های Mnemonic در یک محیط آفلاین ارائه می‌دهد.