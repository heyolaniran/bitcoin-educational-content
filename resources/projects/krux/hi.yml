description: |
  Krux एक ओपन-सोर्स फर्मवेयर है जो ऑफ-द-शेल्फ Kendryte K210 डिवाइस, जैसे Maix Amigo, M5StickV और अन्य को बहुमुखी Bitcoin ट्रांजेक्शन साइनर में बदल देता है। अपनी मुख्य कार्यक्षमता से परे, Krux एक लचीला प्लेटफ़ॉर्म है जो विभिन्न फ़ॉर्म फ़ैक्टर वाले डिवाइस के अनुकूल हो सकता है, Mnemonic बैकअप के निर्माण और पुनर्प्राप्ति में सहायता करने के लिए टूल का एक सूट प्रदान करता है, जिनमें से कुछ में बढ़ी हुई सुरक्षा के लिए एन्क्रिप्शन विकल्प शामिल हैं।
  
  Maix Amigo, Yahboom या WonderMV जैसे डिवाइस उपयोग के लिए तैयार आते हैं, जिनमें बड़ी टचस्क्रीन होती हैं जो इसे संचालित करना आसान और उपयोगकर्ता के अनुकूल बनाती हैं। ये डिवाइस उन लोगों के लिए आदर्श हैं जो प्लग-एंड-प्ले समाधान की तलाश में हैं। दूसरी ओर, Krux डेवलपमेंट बोर्ड किट का भी समर्थन करता है, जो DIY उत्साही लोगों के लिए एकदम सही हैं जो अपने स्वयं के हार्डवेयर सेटअप को कस्टमाइज़ करना और बनाना पसंद करते हैं।
  
  क्यूआर कोड, एसडी कार्ड और यहां तक ​​कि थर्मल प्रिंटर के माध्यम से अग्रणी समन्वयक वॉलेट्स के साथ सहजता से बातचीत करते हुए, उपयोगकर्ता के अनुकूल फर्मवेयर ऑफ़लाइन वातावरण में लेनदेन और Mnemonic बैकअप का समर्थन करने के लिए अद्वितीय सुविधाएं प्रदान करता है।