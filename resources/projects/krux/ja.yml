description: |
  Kruxは、Maix Amigo、M5StickVなどの市販のKendryte K210デバイスを多機能なBitcoinトランザクション・サイナーに変換するオープンソースのファームウェアです。その中核機能を超えて、Kruxは異なるフォームファクタのデバイスに適応できる柔軟なプラットフォームであり、Mnemonicバックアップの作成と回復を支援する一連のツールを提供します。
  
  Maix Amigo、YahboomまたはWonderMVのようなデバイスは、操作が簡単でユーザーフレンドリーな大型タッチスクリーンを備え、すぐに使用できる。これらの機器は、プラグアンドプレイのソリューションをお探しの方に最適です。一方、Kruxは開発ボードキットもサポートしており、ハードウェアのカスタマイズや自作を楽しむDIY愛好家に最適です。
  
  QRコード、SDカード、さらにはサーマル・プリンターを通じて主要なコーディネーター・ウォレットとシームレスに相互作用するユーザーフレンドリーなファームウェアは、オフライン環境での取引やMnemonicバックアップをサポートするユニークな機能を提供します。