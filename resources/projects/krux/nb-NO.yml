description: |
  Krux er en fastvare med åpen kildekode som forvandler hyllevare Kendryte K210-enheter, som Maix Amigo, M5StickV og flere, til allsidige Bitcoin-transaksjonssignatorer. I tillegg til kjernefunksjonaliteten er Krux en fleksibel plattform som kan tilpasses enheter med ulike formfaktorer, og som tilbyr en rekke verktøy for å hjelpe til med oppretting og gjenoppretting av Mnemonic-sikkerhetskopier, hvorav noen inkluderer krypteringsalternativer for økt sikkerhet.
  
  Enheter som Maix Amigo, Yahboom eller WonderMV leveres klare til bruk, med store berøringsskjermer som gjør dem enkle og brukervennlige å betjene. Disse enhetene er ideelle for dem som er ute etter en plug-and-play-løsning. Krux støtter også utviklingskortsett, som er perfekte for gjør-det-selv-entusiaster som liker å tilpasse og bygge sine egne maskinvareoppsett.
  
  Den brukervennlige fastvaren samhandler sømløst med ledende koordinatorlommebøker via QR-koder, SD-kort og til og med termiske skrivere, og tilbyr unike funksjoner for å støtte transaksjoner og Mnemonic-sikkerhetskopier i et offline-miljø.