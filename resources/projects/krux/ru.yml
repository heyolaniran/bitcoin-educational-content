description: |
  Krux - это прошивка с открытым исходным кодом, которая превращает готовые устройства Kendryte K210, такие как Maix Amigo, M5StickV и другие, в универсальные устройства для подписания транзакций Bitcoin. Помимо основной функциональности, Krux представляет собой гибкую платформу, которая может адаптироваться к устройствам с различными форм-факторами, предоставляя набор инструментов для создания и восстановления резервных копий Mnemonic, некоторые из которых включают опции шифрования для повышения безопасности.
  
  Такие устройства, как Maix Amigo, Yahboom или WonderMV, поставляются уже готовыми к использованию, с большими сенсорными экранами, которые делают их простыми и удобными в использовании. Эти устройства идеально подходят для тех, кто ищет решение "подключи и работай". С другой стороны, Krux также поддерживает наборы плат разработки, которые идеально подходят для энтузиастов DIY, которым нравится настраивать и создавать собственные аппаратные комплексы.
  
  Удобная прошивка, легко взаимодействующая с ведущими кошельками-координаторами через QR-коды, SD-карты и даже термопринтеры, предлагает уникальные функции для поддержки транзакций и резервного копирования Mnemonic в автономной среде.