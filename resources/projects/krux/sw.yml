description: |
  Krux ni programu huria ya programu ambayo hubadilisha vifaa vya Kendryte K210 vilivyo nje ya rafu, kama vile Maix Amigo, M5StickV na zaidi, kuwa watia saini wa miamala mbalimbali wa Bitcoin. Zaidi ya utendakazi wake wa kimsingi, Krux ni jukwaa linalonyumbulika ambalo linaweza kukabiliana na vifaa vilivyo na vipengele tofauti vya umbo, kutoa safu ya zana kusaidia kuunda na kurejesha nakala rudufu za Mnemonic, ambazo baadhi yake ni pamoja na chaguo za usimbaji fiche kwa usalama ulioimarishwa.
  
  Vifaa kama vile Maix Amigo, Yahboom au WonderMV viko tayari kutumika, vyenye skrini kubwa za kugusa ambazo hurahisisha na rahisi kutumia. Vifaa hivi ni bora kwa wale wanaotafuta suluhisho la kuziba-na-kucheza. Kwa upande mwingine, Krux pia inasaidia vifaa vya bodi ya ukuzaji, ambavyo ni sawa kwa wapenda DIY ambao wanafurahiya kubinafsisha na kuunda usanidi wao wa maunzi.
  
  Inashirikiana bila mshono na pochi za waratibu wakuu kupitia misimbo ya QR, kadi za SD, na hata vichapishaji vya joto, programu dhibiti inayofaa mtumiaji hutoa vipengele vya kipekee ili kusaidia miamala na hifadhi rudufu za Mnemonic katika mazingira ya nje ya mtandao.