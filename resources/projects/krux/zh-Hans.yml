description: |
  Krux 是一款开源固件，可将现成的 Kendryte K210 设备（如 Maix Amigo、M5StickV 等）转化为多功能 Bitcoin 交易签名器。除了核心功能外，Krux 还是一个灵活的平台，可以适应不同外形尺寸的设备，提供一整套工具来协助创建和恢复 Mnemonic 备份，其中一些工具还包括加密选项，以增强安全性。
  
  Maix Amigo、Yahboom 或 WonderMV 等设备可随时使用，配有大型触摸屏，操作简便、易于使用。这些设备非常适合那些寻求即插即用解决方案的用户。另一方面，Krux 还支持开发板套件，非常适合喜欢定制和构建自己的硬件设置的 DIY 爱好者。
  
  用户友好型固件可通过 QR 码、SD 卡甚至热敏打印机与主流协调器钱包无缝互动，并提供独特功能，支持离线环境下的交易和 Mnemonic 备份。