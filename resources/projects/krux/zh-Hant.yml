description: |
  Krux 是一套開放原始碼的韌體，可將現成的 Kendryte K210 裝置，例如 Maix Amigo、M5StickV 等，轉換成多功能的 Bitcoin 交易簽章器。除了核心功能之外，Krux 也是一個靈活的平台，能夠適應不同外型尺寸的裝置，並提供一套工具，協助建立和復原 Mnemonic 備份，其中部分備份包含加密選項，以加強安全性。
  
  Maix Amigo、Yahboom 或 WonderMV 等裝置可立即使用，並配備大型觸控螢幕，讓使用者能輕鬆操作。這些裝置非常適合尋求隨插即用解決方案的使用者。另一方面，Krux 也支援開發板套件，非常適合喜歡自訂和建立自己硬體設定的 DIY 愛好者。
  
  透過 QR 碼、SD 卡甚至熱感印表機與領先的協調器錢包無縫互動，用戶友好的韌體提供獨特的功能，以支援離線環境下的交易和 Mnemonic 備份。