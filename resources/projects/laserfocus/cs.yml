description: |
  Bitcoin má zásadní význam pro svobodu a Laserfocus tuto misi podporuje tím, že spojuje bitcoinery po celém světě za účelem mentoringu a soustředění. Cílem Laserfocusu je spojit vás s ostatními bitcoinery prostřednictvím videohovorů. Existují čtyři kategorie sezení: Focus, Networking, Mentoring a Exploration. Laserfocus je v současné době ve fázi beta testování.