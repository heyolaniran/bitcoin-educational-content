description: |
  Bitcoin es una misión crítica para la libertad y Laserfocus impulsa esa misión conectando a Bitcoiners de todo el mundo para sesiones de tutoría y enfoque. El objetivo de Laserfocus es conectarte con otros Bitcoiners a través de videollamadas. Hay cuatro categorías de sesiones: Focus, Networking, Mentorship y Exploration. Laserfocus se encuentra actualmente en fase Beta.