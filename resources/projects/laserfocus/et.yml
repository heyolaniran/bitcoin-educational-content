description: |
  Bitcoin on vabaduse jaoks kriitilise tähtsusega ja Laserfocus toetab seda missiooni, ühendades bitcoinereid üle kogu maailma mentorluseks ja fookussessioonideks. Laserfookuse eesmärk on ühendada teid teiste Bitcoineritega videokõnede kaudu. Seansse on nelja kategooriasse: Focus, Networking, Mentorlus ja Exploration. Laserfookus on praegu beeta-testimisfaasis.