description: |
  Bitcoin برای آزادی بسیار حیاتی است و Laserfocus این مأموریت را با اتصال بیت‌کوینرها در سراسر جهان برای جلسات راهنمایی و تمرکز تقویت می‌کند. هدف Laserfocus این است که شما را از طریق تماس‌های ویدئویی با دیگر بیت‌کوینرها متصل کند. چهار دسته از جلسات وجود دارد: تمرکز، شبکه‌سازی، راهنمایی و اکتشاف. Laserfocus در حال حاضر در مرحله آزمایش بتا است.