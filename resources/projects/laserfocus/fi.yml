description: |
  Bitcoin on kriittinen tehtävä vapauden kannalta, ja Laserfocus tukee tätä tehtävää yhdistämällä Bitcoin-asiantuntijoita ympäri maailmaa mentorointi- ja fokusistuntoihin. Laserfocuksen tavoitteena on yhdistää sinut muihin Bitcoiners videopuheluiden kautta. Istuntoja on neljää eri luokkaa: Focus, Networking, Mentorointi ja Exploration. Laserfocus on tällä hetkellä beta-testausvaiheessa.