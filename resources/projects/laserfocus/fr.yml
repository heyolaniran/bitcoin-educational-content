description: |
  Le Bitcoin est essentiel à la liberté et Laserfocus alimente cette mission en connectant les bitcoiners du monde entier pour des sessions de mentorat et de réflexion. L'objectif de Laserfocus est de vous mettre en contact avec d'autres bitcoiners par le biais d'appels vidéo. Il existe quatre catégories de sessions : Focus, Networking, Mentorship et Exploration. Laserfocus est actuellement en phase de test bêta.