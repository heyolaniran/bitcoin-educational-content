description: |
  Bitcoin स्वतंत्रता के लिए महत्वपूर्ण मिशन है और लेजरफोकस दुनिया भर के बिटकॉइनर्स को मेंटरशिप और फोकस सत्रों के लिए जोड़कर उस मिशन को शक्ति प्रदान करता है। लेजरफोकस का लक्ष्य आपको वीडियो कॉल के माध्यम से अन्य बिटकॉइनर्स से जोड़ना है। सत्रों की चार श्रेणियां हैं: फोकस, नेटवर्किंग, मेंटरशिप और एक्सप्लोरेशन। लेजरफोकस वर्तमान में बीटा-परीक्षण चरण में है।