description: |
  Bitcoin memiliki misi yang sangat penting untuk kebebasan dan Laserfocus mendukung misi tersebut dengan menghubungkan para Bitcoiners di seluruh dunia untuk sesi bimbingan dan fokus. Tujuan Laserfocus adalah untuk menghubungkan Anda dengan Bitcoiners lain melalui panggilan video. Ada empat kategori sesi: Fokus, Jaringan, Bimbingan dan Eksplorasi. Laserfocus saat ini sedang dalam tahap pengujian Beta.