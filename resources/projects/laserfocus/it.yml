description: |
  Il Bitcoin è una missione fondamentale per la libertà e Laserfocus la porta avanti collegando i Bitcoiners di tutto il mondo per sessioni di mentorship e focus. L'obiettivo di Laserfocus è quello di mettervi in contatto con altri Bitcoiners tramite videochiamate. Ci sono quattro categorie di sessioni: Focus, Networking, Mentorship e Exploration. Laserfocus è attualmente in fase di beta-testing.