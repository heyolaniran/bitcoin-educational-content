description: |
  Bitcoin er avgjørende for frihet, og Laserfocus driver dette oppdraget ved å koble Bitcoinere over hele verden for mentorskap og fokusøkter. Målet med Laserfocus er å koble deg sammen med andre Bitcoinere via videosamtaler. Det er fire kategorier av økter: Fokus, Nettverk, Mentorskap og Utforskning. Laserfocus er for tiden i en beta-testfase.