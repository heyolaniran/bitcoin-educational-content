description: |
  O Bitcoin é uma missão crítica para a liberdade e a Laserfocus potencia essa missão ligando Bitcoiners de todo o mundo para sessões de orientação e foco. O objetivo do Laserfocus é ligar-te a outros Bitcoiners através de chamadas de vídeo. Existem quatro categorias de sessões: Foco, Networking, Mentoria e Exploração. A Laserfocus está atualmente em fase de teste Beta.