description: |
  Bitcoin критически важен для свободы, и Laserfocus способствует этой миссии, соединяя биткойнеров по всему миру для наставничества и фокус-сессий. Цель Laserfocus - соединить вас с другими биткойнерами посредством видеозвонков. Есть четыре категории сессий: Фокус, Нетворкинг, Наставничество и Исследование. В настоящее время Laserfocus находится в стадии бета-тестирования.