description: |
  Bitcoin je od suštinskog značaja za slobodu, a Laserfocus podržava tu misiju povezivanjem Bitcoinera širom sveta za mentorstvo i fokus sesije. Cilj Laserfocus-a je da vas poveže sa drugim Bitcoinerima putem video poziva. Postoje četiri kategorije sesija: Fokus, Umrežavanje, Mentorstvo i Istraživanje. Laserfocus je trenutno u fazi Beta-testiranja.