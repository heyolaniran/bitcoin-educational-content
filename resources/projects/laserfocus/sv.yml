description: |
  Bitcoin är uppdragskritiskt för frihet och Laserfocus driver det uppdraget genom att ansluta Bitcoiners runt om i världen för mentorskap och fokussessioner. Målet med Laserfocus är att ansluta dig till andra Bitcoiners via videosamtal. Det finns fyra kategorier av sessioner: Fokus, Nätverk, Mentorskap och Utforskning. Laserfocus är för närvarande i en Beta-testfas.