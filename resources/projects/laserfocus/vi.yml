description: |
  Bitcoin là nhiệm vụ quan trọng đối với sự tự do và Laserfocus thúc đẩy nhiệm vụ đó bằng cách kết nối những người dùng Bitcoin trên toàn thế giới để tham gia các buổi cố vấn và tập trung. Mục tiêu của Laserfocus là kết nối bạn với những người dùng Bitcoin khác qua các cuộc gọi video. Có bốn loại phiên: Tập trung, Kết nối, Cố vấn và Khám phá. Laserfocus hiện đang trong giai đoạn thử nghiệm Beta.