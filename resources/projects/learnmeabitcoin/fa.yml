description: |
  وقتی ۱۸ سالم بود، یک وب‌سایت استراتژی پوکر راه‌اندازی کردم. این اولین پروژه بزرگ من بود، اما در سن ۲۳ سالگی شروع به از دست دادن علاقه به پوکر کردم. بنابراین مدتی از ساخت وب‌سایت‌ها فاصله گرفتم. در ابتدای سال ۲۰۱۵، ۲۶ ساله بودم، در سایت‌های پوکر Bitcoin بازی می‌کردم و سال‌ها بود که به یک فایل HTML دست نزده بودم. نیاز به دلیلی داشتم تا صبح‌ها از رختخواب بلند شوم، بنابراین تصمیم گرفتم وب‌سایتی درباره بزرگ‌ترین علاقه‌ام در آن زمان بسازم. دقیقاً نمی‌دانم مهارت‌هایم چیست، اما فکر می‌کنم یکی از آن‌ها توضیح دادن نحوه کار چیزها به روشی است که به راحتی قابل درک باشد. همچنین فکر می‌کنم که Bitcoin در حال حاضر بزرگ‌ترین چالش ممکن در این لحظه برای توضیح دادن نحوه کار چیزی است، پس بفرمایید.