description: |
  जब मैं 18 साल का था, तब मैंने पोकर रणनीति वेबसाइट शुरू की थी। यह मेरा पहला बड़ा प्रोजेक्ट था, लेकिन 23 साल की उम्र तक मुझे पोकर में रुचि खत्म होने लगी। इसलिए मैंने कुछ समय के लिए वेबसाइट बनाने से ब्रेक ले लिया। 2015 की शुरुआत में मैं 26 साल का था, Bitcoin पोकर साइट्स पर खेल रहा था, और मैंने सालों से HTML फ़ाइल को छुआ तक नहीं था। मुझे सुबह बिस्तर से उठने के लिए एक कारण की ज़रूरत थी, इसलिए मैंने उस समय अपनी सबसे बड़ी रुचि के बारे में एक वेबसाइट बनाने का फैसला किया। मुझे नहीं पता कि मेरे कौशल वास्तव में क्या हैं, लेकिन मुझे लगता है कि उनमें से एक यह है कि मैं यह समझाऊँ कि चीजें कैसे काम करती हैं, इस तरह से कि उन्हें समझना आसान हो। मुझे यह भी लगता है कि Bitcoin वर्तमान में किसी चीज़ के काम करने के तरीके को समझाने के लिए सबसे बड़ी संभावित चुनौती है, तो चलिए शुरू करते हैं।