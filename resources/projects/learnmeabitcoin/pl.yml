description: |
  Kiedy miałem 18 lat, założyłem stronę internetową poświęconą strategiom pokerowym. Był to mój pierwszy duży projekt, ale w wieku 23 lat zacząłem tracić zainteresowanie pokerem. Miałem więc przerwę od tworzenia stron internetowych na jakiś czas. Na początku 2015 roku miałem 26 lat, grałem na stronach pokerowych Bitcoin i od lat nie dotykałem pliku HTML. Potrzebowałem powodu, by wstać rano z łóżka, więc postanowiłem zacząć tworzyć stronę internetową o moim największym zainteresowaniu w tamtym czasie. Nie wiem dokładnie, jakie są moje umiejętności, ale myślę, że jedną z nich jest wyjaśnianie, jak działają rzeczy w sposób łatwy do zrozumienia. Myślę też, że Bitcoin jest obecnie największym możliwym wyzwaniem, jeśli chodzi o wyjaśnienie, jak coś działa, więc zaczynamy.