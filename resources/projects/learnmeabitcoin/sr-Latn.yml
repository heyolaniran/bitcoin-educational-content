description: |
  Kada sam imao 18 godina, pokrenuo sam vebsajt o poker strategijama. Bio je to moj prvi veliki projekat, ali sa 23 godine počeo sam da gubim interesovanje za poker. Tako da sam napravio pauzu od pravljenja vebsajtova na neko vreme. Početkom 2015. imao sam 26 godina, igrao sam na Bitcoin poker sajtovima i godinama nisam dotakao HTML fajl. Trebao mi je razlog da ustanem iz kreveta ujutru, pa sam odlučio da počnem da pravim vebsajt o mom najvećem interesovanju u to vreme. Ne znam tačno koje su moje veštine, ali mislim da je jedna od njih objašnjavanje kako stvari funkcionišu na način koji je lak za razumevanje. Takođe mislim da je Bitcoin trenutno najveći mogući izazov u ovom trenutku za objašnjavanje kako nešto funkcioniše, pa hajde da počnemo.