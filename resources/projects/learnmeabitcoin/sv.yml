description: |
  När jag var 18 år startade jag en webbplats för pokerstrategier. Det var mitt första stora projekt, men vid 23 års ålder började jag tappa intresset för poker. Så jag tog en paus från att göra webbplatser ett tag. I början av 2015 var jag 26 år, spelade på Bitcoin pokersajter och hade inte rört en HTML-fil på flera år. Jag behövde en anledning att gå upp ur sängen på morgonen, så jag bestämde mig för att börja göra en webbplats om mitt största intresse just då. Jag vet inte exakt vilka mina färdigheter är, men jag tror att en av dem är att förklara hur saker och ting fungerar på ett sätt som är lätt att förstå. Jag tror också att Bitcoin för närvarande är den största möjliga utmaningen just nu för att förklara hur något fungerar, så här går vi.