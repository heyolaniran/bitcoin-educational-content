description: |
  Nilipokuwa 18 nilianza tovuti ya mkakati wa poker. Ilikuwa mradi wangu wa kwanza mkubwa, lakini kufikia umri wa miaka 23 nilianza kupoteza hamu ya kucheza poker. Kwa hivyo nilipumzika kutengeneza tovuti kwa muda. Mwanzoni mwa 2015 nilikuwa na umri wa miaka 26, nikicheza kwenye tovuti za Bitcoin poker, na sikuwa nimegusa faili ya HTML kwa miaka. Nilihitaji sababu ya kutoka kitandani asubuhi, kwa hiyo niliamua kuanza kutengeneza tovuti kuhusu maslahi yangu makubwa wakati huo. Sijui ujuzi wangu ni upi hasa, lakini nadhani mmoja wao anaelezea jinsi mambo yanavyofanya kazi kwa njia ambayo ni rahisi kuelewa. Pia ninafikiri kwamba Bitcoin kwa sasa ndiyo changamoto kubwa iwezekanavyo kwa wakati huu kwa wakati wa kueleza jinsi kitu kinavyofanya kazi, kwa hivyo hapa tunaenda.