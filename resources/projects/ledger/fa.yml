description: |
  Ledger یک شرکت پیشرو جهانی است که در راه‌حل‌های امنیتی و زیرساختی برای ارزهای دیجیتال و برنامه‌های Blockchain تخصص دارد. این شرکت که در سال 2014 تأسیس شد، بیشتر به خاطر کیف‌پول‌های سخت‌افزاری خود، Ledger Nano S و Ledger Nano X، شناخته می‌شود که به افراد روشی امن برای ذخیره کلیدهای خصوصی خود به صورت آفلاین ارائه می‌دهند، روشی که به عنوان ذخیره‌سازی Cold شناخته می‌شود.
  
  این دستگاه‌ها بر اساس یک تراشه امن و قوی ساخته شده‌اند که امنیت بهینه را تضمین می‌کند. کیف‌پول‌های سخت‌افزاری Ledger با نرم‌افزار Ledger Live یکپارچه می‌شوند و به کاربران اجازه می‌دهند تا توکن‌های خود را مدیریت کرده و به خدمات مختلف Blockchain از یک پلتفرم واحد دسترسی پیدا کنند. Ledger همچنین به شرکت‌ها با راه‌حل‌هایی برای تأمین امنیت دارایی‌های مالی و مدیریت عملیات دارایی‌های دیجیتال خدمات ارائه می‌دهد.