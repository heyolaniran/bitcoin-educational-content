description: |
  Ledger je vodeća globalna kompanija specijalizovana za sigurnosna i infrastrukturna rešenja za kriptovalute i Blockchain aplikacije. Osnovana 2014. godine, kompanija je najpoznatija po svojim hardverskim novčanicima, Ledger Nano S i Ledger Nano X, koji pojedincima pružaju siguran način za čuvanje privatnih ključeva van mreže, metod poznat kao Cold skladištenje.
  
  Ovi uređaji su izgrađeni oko robusnog sigurnosnog čipa, osiguravajući optimalnu sigurnost. Ledger-ovi hardverski novčanici integrišu se sa Ledger Live softverom, omogućavajući korisnicima upravljanje tokenima i pristup raznim Blockchain uslugama sa jedne platforme. Ledger takođe nudi rešenja za preduzeća za osiguranje finansijskih sredstava i upravljanje operacijama digitalne imovine.