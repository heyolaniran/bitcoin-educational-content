description: |
  Ledger är ett ledande globalt företag som specialiserar sig på säkerhets- och infrastrukturlösningar för kryptovalutor och Blockchain-applikationer. Företaget grundades 2014 och är mest känt för sina hårdvaruplånböcker, Ledger Nano S och Ledger Nano X, som ger individer ett säkert sätt att lagra sina privata nycklar offline, en metod som kallas Cold-lagring.
  
  Dessa enheter är byggda kring ett robust säkerhetschip, vilket garanterar optimal säkerhet. Ledger:s hårdvaruplånböcker integreras med programvaran Ledger Live, vilket gör det möjligt för användare att hantera sina tokens och få tillgång till olika Blockchain-tjänster från en enda plattform. Ledger vänder sig också till företag med lösningar för att säkra finansiella tillgångar och hantera digitala tillgångar.