description: |
  Ledger 是一家全球領先的公司，專門為加密貨幣和 Blockchain 應用程式提供安全和基礎設施解決方案。該公司成立於 2014 年，最為人所知的是其硬體錢包 Ledger Nano S 和 Ledger Nano X，為個人提供離線儲存私密金鑰的安全方式，這種方法稱為 Cold 儲存。
  
  這些裝置以堅固的安全晶片為核心，可確保最佳的安全性。Ledger 的硬體錢包與 Ledger Live 軟體整合，讓使用者可從單一平台管理代幣及存取各種 Blockchain 服務。Ledger 也迎合企業的需求，提供金融資產安全和數位資產營運管理的解決方案。