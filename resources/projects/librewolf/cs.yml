description: |
  LibreWolf je nezávislý komunitní projekt založený nadšenci do svobodného softwaru. Je navržen tak, aby nabízel prohlížení zaměřené na soukromí, bezpečnost a svobodu. LibreWolf je založen na prohlížeči Firefox, ale je zbaven všech telemetrických, reklamních a rušivých funkcí. Je udržován týmem dobrovolníků na serveru Codeberg a podporován otevřenými diskusemi na serveru Matrix.