description: |
  LibreWolf ist ein unabhängiges Gemeinschaftsprojekt, das von Enthusiasten freier Software gegründet wurde. Es wurde entwickelt, um ein Browsing zu ermöglichen, das sich auf Privatsphäre, Sicherheit und Freiheit konzentriert. LibreWolf basiert auf Firefox, ist aber frei von Telemetrie, Werbung und aufdringlichen Funktionen. Er wird von einem Team von Freiwilligen auf Codeberg gepflegt und durch offene Diskussionen auf Matrix unterstützt.