description: |
  LibreWolf es un proyecto comunitario independiente fundado por entusiastas del software libre. Está diseñado para ofrecer una navegación centrada en la privacidad, la seguridad y la libertad. LibreWolf se basa en Firefox, pero sin telemetría, publicidad ni funciones intrusivas. Lo mantiene un equipo de voluntarios en Codeberg y se apoya en debates abiertos en Matrix.