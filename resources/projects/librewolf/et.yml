description: |
  LibreWolf on sõltumatu kogukonnaprojekt, mille on asutanud vaba tarkvara entusiastid. Selle eesmärk on pakkuda sirvimist, mis keskendub privaatsusele, turvalisusele ja vabadusele. LibreWolf põhineb Firefoxil, kuid sellest on eemaldatud kõik telemeetria, reklaam ja pealetükkivad funktsioonid. Seda hooldab vabatahtlike meeskond Codebergil ja seda toetavad avatud arutelud Matrixil.