description: |
  LibreWolf یک پروژه مستقل جامعه‌محور است که توسط علاقه‌مندان به نرم‌افزار آزاد تأسیس شده است. این مرورگر برای ارائه تجربه‌ای متمرکز بر حریم خصوصی، امنیت و آزادی طراحی شده است. LibreWolf بر پایه Firefox ساخته شده، اما از تمامی ویژگی‌های تله‌متری، تبلیغات و ویژگی‌های مزاحم خالی شده است. این پروژه توسط تیمی از داوطلبان در Codeberg نگهداری می‌شود و توسط بحث‌های آزاد در Matrix پشتیبانی می‌شود.