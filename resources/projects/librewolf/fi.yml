description: |
  LibreWolf on vapaiden ohjelmistojen harrastajien perustama riippumaton yhteisöprojekti. Se on suunniteltu tarjoamaan selausta, jossa keskitytään yksityisyyteen, turvallisuuteen ja vapauteen. LibreWolf perustuu Firefoxiin, mutta siitä on poistettu kaikki telemetria, mainonta ja tunkeilevat ominaisuudet. Sitä ylläpitää vapaaehtoisista koostuva tiimi Codebergissä ja sitä tuetaan avoimilla keskusteluilla Matrixissa.