description: |
  LibreWolf est un projet communautaire indépendant, fondé par des passionnés du logiciel libre. Il est conçu pour offrir une navigation axée sur la confidentialité, la sécurité et la liberté. LibreWolf est basé sur Firefox, mais débarrassé de toute forme de télémétrie, publicités et fonctionnalités intrusives. Il est maintenu par une équipe de bénévoles sur Codeberg et soutenu par des discussions ouvertes sur Matrix.