description: |
  लिबरवुल्फ़ एक स्वतंत्र सामुदायिक परियोजना है जिसकी स्थापना मुफ़्त सॉफ़्टवेयर के प्रति उत्साही लोगों द्वारा की गई है। इसे गोपनीयता, सुरक्षा और स्वतंत्रता पर केंद्रित ब्राउज़िंग प्रदान करने के लिए डिज़ाइन किया गया है। लिबरवुल्फ़ फ़ायरफ़ॉक्स पर आधारित है, लेकिन इसमें सभी टेलीमेट्री, विज्ञापन और घुसपैठ करने वाली सुविधाएँ नहीं हैं। इसे कोडबर्ग पर स्वयंसेवकों की एक टीम द्वारा बनाए रखा जाता है और मैट्रिक्स पर खुली चर्चाओं द्वारा समर्थित किया जाता है।