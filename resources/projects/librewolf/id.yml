description: |
  LibreWolf adalah proyek komunitas independen yang didirikan oleh para penggemar perangkat lunak bebas. LibreWolf dirancang untuk menawarkan penjelajahan yang berfokus pada privasi, keamanan, dan kebebasan. LibreWolf didasarkan pada Firefox, tetapi tanpa semua telemetri, iklan, dan fitur yang mengganggu. Ia dikelola oleh sebuah tim sukarelawan di Codeberg dan didukung oleh diskusi terbuka di Matrix.