description: |
  LibreWolf è un progetto comunitario indipendente fondato da appassionati di software libero. È stato progettato per offrire una navigazione incentrata su privacy, sicurezza e libertà. LibreWolf è basato su Firefox, ma è privo di tutte le funzioni di telemetria, pubblicità e intrusione. È mantenuto da un team di volontari su Codeberg e supportato da discussioni aperte su Matrix.