description: |
  LibreWolf er et uavhengig fellesskapsprosjekt grunnlagt av entusiaster av fri programvare. Det er designet for å tilby surfing med fokus på personvern, sikkerhet og frihet. LibreWolf er basert på Firefox, men er strippet for all telemetri, reklame og påtrengende funksjoner. Den vedlikeholdes av et team av frivillige på Codeberg og støttes av åpne diskusjoner på Matrix.