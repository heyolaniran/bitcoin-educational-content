description: |
  LibreWolf to niezależny projekt społecznościowy założony przez entuzjastów wolnego oprogramowania. Jego celem jest oferowanie przeglądania, które koncentruje się na prywatności, bezpieczeństwie i wolności. LibreWolf bazuje na Firefoksie, ale pozbawiony jest telemetrii, reklam i natrętnych funkcji. Jest utrzymywany przez zespół wolontariuszy na Codeberg i wspierany przez otwarte dyskusje na Matrix.