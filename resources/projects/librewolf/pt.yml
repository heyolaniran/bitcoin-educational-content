description: |
  O LibreWolf é um projeto comunitário independente fundado por entusiastas do software livre. Foi concebido para oferecer uma navegação centrada na privacidade, segurança e liberdade. O LibreWolf é baseado no Firefox, mas sem qualquer telemetria, publicidade e funcionalidades intrusivas. É mantido por uma equipa de voluntários no Codeberg e apoiado por discussões abertas no Matrix.