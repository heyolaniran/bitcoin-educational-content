description: |
  LibreWolf - это независимый проект сообщества, основанный энтузиастами свободного программного обеспечения. Его цель - предложить браузер, ориентированный на конфиденциальность, безопасность и свободу. LibreWolf основан на Firefox, но лишен всех телеметрических, рекламных и навязчивых функций. Его поддерживает команда добровольцев на Codeberg и открытые обсуждения на Matrix.