description: |
  LibreWolf je nezavisni projekat zajednice koji su osnovali entuzijasti slobodnog softvera. Dizajniran je da ponudi pretraživanje fokusirano na privatnost, sigurnost i slobodu. LibreWolf je zasnovan na Firefox-u, ali je lišen sve telemetrije, oglašavanja i nametljivih funkcija. Održava ga tim volontera na Codeberg-u i podržan je otvorenim diskusijama na Matrix-u.