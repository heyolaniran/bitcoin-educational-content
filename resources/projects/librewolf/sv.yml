description: |
  LibreWolf är ett oberoende community-projekt som grundades av entusiaster för fri programvara. Det är utformat för att erbjuda surfning som är fokuserad på integritet, säkerhet och frihet. LibreWolf är baserat på Firefox, men är befriat från all telemetri, reklam och påträngande funktioner. Den underhålls av ett team av volontärer på Codeberg och stöds av öppna diskussioner på Matrix.