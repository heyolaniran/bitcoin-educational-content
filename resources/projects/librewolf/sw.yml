description: |
  LibreWolf ni mradi huru wa jamii ulioanzishwa na wapenda programu bila malipo. Imeundwa ili kutoa kuvinjari ambako kunalenga faragha, usalama na uhuru. LibreWolf inategemea Firefox, lakini imevuliwa telemetry, utangazaji na vipengele vya kuingilia. Inadumishwa na timu ya watu waliojitolea kwenye Codeberg na kuungwa mkono na majadiliano ya wazi kuhusu Matrix.