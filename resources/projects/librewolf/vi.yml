description: |
  LibreWolf là một dự án cộng đồng độc lập do những người đam mê phần mềm miễn phí sáng lập. Dự án này được thiết kế để cung cấp khả năng duyệt web tập trung vào quyền riêng tư, bảo mật và tự do. LibreWolf dựa trên Firefox, nhưng loại bỏ mọi tính năng đo từ xa, quảng cáo và xâm phạm. Dự án này được duy trì bởi một nhóm tình nguyện viên trên Codeberg và được hỗ trợ bởi các cuộc thảo luận mở trên Matrix.