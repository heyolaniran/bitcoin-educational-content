description: |
  لایتنینگ لبز یک شرکت فناوری است که بر توسعه Lightning Network تمرکز دارد، یک پروتکل Layer-two که بر روی Bitcoin ساخته شده و تراکنش‌های سریع و کم‌هزینه را امکان‌پذیر می‌کند. این شرکت راه‌حل‌های متن‌باز، امن و مقیاس‌پذیری ارائه می‌دهد که به کاربران اجازه می‌دهد با کارایی بی‌سابقه‌ای پول ارسال و دریافت کنند.
  
  یکی از محصولات اصلی آن‌ها ترمینال لایتنینگ است، یک Interface کاربرپسند که مدیریت نود لایتنینگ را ساده می‌کند. این ابزار یک داشبورد مبتنی بر وب، کاوشگر شبکه و مجموعه‌ای از ابزارهای مدیریت نقدینگی ارائه می‌دهد که انجام تراکنش‌های Bitcoin با حجم بالا و فوری را با حداقل هزینه‌ها آسان‌تر می‌کند.
  
  علاوه بر ترمینال لایتنینگ، لایتنینگ لبز همچنین مجموعه‌ای از خدمات مالی غیرحضانتی و قابل تأیید بر اساس Lightning Network ارائه می‌دهد که فاصله بین نرم‌افزار متن‌باز و برنامه‌های مالی نسل بعدی Bitcoin را پر می‌کند.