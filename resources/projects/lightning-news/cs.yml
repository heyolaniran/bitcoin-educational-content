description: |
  Naším posláním je zvyšovat povědomí, poskytovat informace a pomáhat se vzděláváním v oblasti Lighting Network, škálování Bitcoin a decentralizovaných plateb. Zabýváme se nejnovějšími zprávami, trendy a vývojem a pomáháme našim čtenářům zůstat v obraze díky zprávám, výzkumům a názorům. Jako plně nezávislá platforma se snažíme informovat spotřebitele, provozovatele a tvůrce politik a překlenout mezery ve znalostech mezi těmito skupinami. Věříme v decentralizované, peer-to-peer platební protokoly a prosazujeme volbu pro spotřebitele a inkluzivní, nepermisivní finanční inovace.