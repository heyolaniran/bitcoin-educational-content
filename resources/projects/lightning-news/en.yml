description: |
  Our mission is to raise awareness, provide insights and help educate on all things Lighting Network, bitcoin scaling and decentralized payments. We cover latest news, trends and developments helping our readers to stay informed with reports, research and opinions. As a fully independent platform we seek to inform consumers, operators and policy makers, bridging knowledge gaps between these groups. We believe in decentralized, peer-to-peer payment protocols and advocate for consumer choice and inclusive, non-permissive financial innovation.
