description: |
  Nuestra misión es concienciar, proporcionar información y ayudar a educar sobre todo lo relacionado con la Red de Iluminación, el escalado Bitcoin y los pagos descentralizados. Cubrimos las últimas noticias, tendencias y desarrollos ayudando a nuestros lectores a mantenerse informados con informes, investigaciones y opiniones. Como plataforma totalmente independiente, tratamos de informar a consumidores, operadores y responsables políticos, salvando las distancias entre estos grupos. Creemos en los protocolos de pago descentralizados entre iguales y abogamos por la elección del consumidor y la innovación financiera inclusiva y no permisiva.