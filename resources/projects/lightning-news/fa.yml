description: |
  ماموریت ما افزایش آگاهی، ارائه بینش و کمک به آموزش در مورد همه چیزهای مربوط به شبکه لایتنینگ، مقیاس‌پذیری Bitcoin و پرداخت‌های غیرمتمرکز است. ما آخرین اخبار، روندها و تحولات را پوشش می‌دهیم تا به خوانندگان خود کمک کنیم با گزارش‌ها، تحقیقات و نظرات به‌روز بمانند. به عنوان یک پلتفرم کاملاً مستقل، ما به دنبال اطلاع‌رسانی به مصرف‌کنندگان، اپراتورها و سیاست‌گذاران هستیم و شکاف‌های دانشی بین این گروه‌ها را پر می‌کنیم. ما به پروتکل‌های پرداخت غیرمتمرکز و همتا به همتا اعتقاد داریم و از انتخاب مصرف‌کننده و نوآوری مالی فراگیر و غیرمجاز حمایت می‌کنیم.