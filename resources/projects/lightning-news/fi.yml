description: |
  Tehtävämme on lisätä tietoisuutta, tarjota näkemyksiä ja auttaa valistamaan kaikesta, mitä liittyy Lighting Networkiin, Bitcoin:n skaalautumiseen ja hajautettuihin maksuihin. Katamme viimeisimmät uutiset, trendit ja kehityssuuntaukset auttaen lukijoitamme pysymään ajan tasalla raporttien, tutkimusten ja mielipiteiden avulla. Täysin riippumattomana foorumina pyrimme tiedottamaan kuluttajille, operaattoreille ja poliittisille päättäjille ja kuromaan umpeen näiden ryhmien välisiä tietovajeita. Uskomme hajautettuihin, vertaismaksuprotokolliin ja puolustamme kuluttajien valinnanvapautta ja osallistavia, ei-sallittuja rahoitusinnovaatioita.