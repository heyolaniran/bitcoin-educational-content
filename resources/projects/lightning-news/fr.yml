description: |
  Notre mission est de sensibiliser, de fournir des informations et d'aider à éduquer sur tout ce qui concerne le réseau Lighting Network, la mise à l'échelle Bitcoin et les paiements décentralisés. Nous couvrons les dernières nouvelles, tendances et développements en aidant nos lecteurs à rester informés grâce à des rapports, des recherches et des opinions. En tant que plateforme totalement indépendante, nous cherchons à informer les consommateurs, les opérateurs et les décideurs politiques, en comblant les lacunes de connaissances entre ces groupes. Nous croyons aux protocoles de paiement décentralisés, de pair à pair, et nous défendons le choix du consommateur et l'innovation financière inclusive et non permissive.