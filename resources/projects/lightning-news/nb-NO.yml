description: |
  Vårt oppdrag er å øke bevisstheten, gi innsikt og bidra til å utdanne om alt som har med Lighting Network, Bitcoin-skalering og desentraliserte betalinger å gjøre. Vi dekker de siste nyhetene, trendene og utviklingen, og hjelper leserne våre med å holde seg informert med rapporter, forskning og meninger. Som en helt uavhengig plattform søker vi å informere forbrukere, operatører og beslutningstakere, og bygge bro over kunnskapshull mellom disse gruppene. Vi tror på desentraliserte, peer-to-peer-betalingsprotokoller og tar til orde for forbrukernes valgmuligheter og inkluderende, ikke-permissiv finansiell innovasjon.