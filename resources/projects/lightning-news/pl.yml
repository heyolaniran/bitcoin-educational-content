description: |
  Naszą misją jest podnoszenie świadomości, dostarczanie spostrzeżeń i pomoc w edukacji na temat wszystkich kwestii związanych z Lighting Network, skalowaniem Bitcoin i zdecentralizowanymi płatnościami. Omawiamy najnowsze wiadomości, trendy i wydarzenia, pomagając naszym czytelnikom być na bieżąco z raportami, badaniami i opiniami. Jako w pełni niezależna platforma staramy się informować konsumentów, operatorów i decydentów, wypełniając luki w wiedzy między tymi grupami. Wierzymy w zdecentralizowane protokoły płatności peer-to-peer i opowiadamy się za wyborem konsumentów oraz inkluzywnymi, niedozwolonymi innowacjami finansowymi.