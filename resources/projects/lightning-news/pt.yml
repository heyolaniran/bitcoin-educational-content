description: |
  Nossa missão é aumentar a conscientização, fornecer insights e ajudar a educar sobre todas as coisas da Lighting Network, escala Bitcoin e pagamentos descentralizados. Cobrimos as últimas notícias, tendências e desenvolvimentos, ajudando os nossos leitores a manterem-se informados com relatórios, pesquisas e opiniões. Como uma plataforma totalmente independente, procuramos informar os consumidores, operadores e decisores políticos, colmatando as lacunas de conhecimento entre estes grupos. Acreditamos em protocolos de pagamento descentralizados e peer-to-peer e defendemos a escolha do consumidor e a inovação financeira inclusiva e não permissiva.