description: |
  Наша миссия - повышать осведомленность, предоставлять информацию и помогать в обучении по всем вопросам, связанным с Lighting Network, масштабированием Bitcoin и децентрализованными платежами. Мы освещаем последние новости, тенденции и события, помогая нашим читателям оставаться в курсе событий с помощью отчетов, исследований и мнений. Являясь полностью независимой платформой, мы стремимся информировать потребителей, операторов и политиков, устраняя пробелы в знаниях между этими группами. Мы верим в децентрализованные, одноранговые платежные протоколы и выступаем за выбор потребителя и всеохватывающие, не разрешающие финансовые инновации.