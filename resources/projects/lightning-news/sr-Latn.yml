description: |
  Naša misija je podizanje svesti, pružanje uvida i pomoć u edukaciji o svim stvarima vezanim za Lighting Network, Bitcoin skaliranje i decentralizovana plaćanja. Pokrivamo najnovije vesti, trendove i razvoj događaja kako bismo pomogli našim čitaocima da ostanu informisani uz izveštaje, istraživanja i mišljenja. Kao potpuno nezavisna platforma, težimo da informišemo potrošače, operatere i donosioce politika, premošćujući praznine u znanju između ovih grupa. Verujemo u decentralizovane, peer-to-peer protokole plaćanja i zalažemo se za izbor potrošača i inkluzivnu, ne-permisivnu finansijsku inovaciju.