description: |
  Vårt uppdrag är att öka medvetenheten, ge insikter och hjälpa till att utbilda om alla saker Lighting Network, Bitcoin-skalning och decentraliserade betalningar. Vi täcker de senaste nyheterna, trenderna och utvecklingen och hjälper våra läsare att hålla sig informerade med rapporter, forskning och åsikter. Som en helt oberoende plattform försöker vi informera konsumenter, operatörer och beslutsfattare och överbrygga kunskapsklyftor mellan dessa grupper. Vi tror på decentraliserade, peer-to-peer-betalningsprotokoll och förespråkar konsumentval och inkluderande, icke-tillåtande finansiell innovation.