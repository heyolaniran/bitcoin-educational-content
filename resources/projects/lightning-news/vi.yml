description: |
  Sứ mệnh của chúng tôi là nâng cao nhận thức, cung cấp thông tin chi tiết và giúp giáo dục về mọi thứ liên quan đến Lighting Network, Bitcoin scaling và thanh toán phi tập trung. Chúng tôi đưa tin tức, xu hướng và diễn biến mới nhất, giúp độc giả luôn được cập nhật thông tin với các báo cáo, nghiên cứu và ý kiến. Là một nền tảng hoàn toàn độc lập, chúng tôi tìm cách cung cấp thông tin cho người tiêu dùng, nhà điều hành và nhà hoạch định chính sách, thu hẹp khoảng cách kiến thức giữa các nhóm này. Chúng tôi tin tưởng vào các giao thức thanh toán phi tập trung, ngang hàng và ủng hộ quyền lựa chọn của người tiêu dùng và đổi mới tài chính toàn diện, không cho phép.