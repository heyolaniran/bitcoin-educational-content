description: |
  Společnost Lightspark se zaměřuje na vývoj infrastruktury nové generace pro Bitcoin Lightning Network. Poskytováním nástrojů, rozhraní API a komplexních služeb Lightspark zjednodušuje integraci plateb Lightning do podniků a aplikací. Cílem jejich řešení je zvýšit škálovatelnost, rychlost a efektivitu transakcí Bitcoin a usnadnit vývojářům a obchodníkům zavádění technologie Lightning.
  