description: |
  شرکت سوئیسی متخصص در پرداخت‌های Bitcoin، با مأموریت فراهم کردن آزادی مالی برای همه. تأسیس شده در سال 2020 توسط سه علاقه‌مند به Bitcoin، لیپا راه‌حل‌های پرداخت نوآورانه‌ای بر اساس Lightning Network توسعه می‌دهد. Wallet آن، لیپا Wallet، پرداخت‌های فوری، امن و بدون واسطه را ممکن می‌سازد و در عین حال حریم خصوصی تراکنش‌ها را تضمین می‌کند.