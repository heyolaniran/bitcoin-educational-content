description: |
  Bitcoin भुगतान में विशेषज्ञता रखने वाली स्विस कंपनी, जिसका मिशन सभी के लिए वित्तीय स्वतंत्रता सुलभ बनाना है। 2020 में तीन Bitcoin उत्साही लोगों द्वारा स्थापित, लिपा Lightning Network पर आधारित अभिनव भुगतान समाधान विकसित करता है। इसका Wallet, लिपा Wallet, लेन-देन की गोपनीयता सुनिश्चित करते हुए तत्काल, सुरक्षित और मध्यस्थ-मुक्त भुगतान सक्षम करता है।