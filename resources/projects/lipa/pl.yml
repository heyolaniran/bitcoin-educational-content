description: |
  Szwajcarska firma specjalizująca się w płatnościach Bitcoin, z misją uczynienia wolności finansowej dostępnej dla każdego. Założona w 2020 roku przez trzech entuzjastów Bitcoin, Lipa opracowuje innowacyjne rozwiązania płatnicze oparte na Lightning Network. Jej Wallet, Lipa Wallet, umożliwia natychmiastowe, bezpieczne i wolne od pośredników płatności, zapewniając jednocześnie prywatność transakcji.
  