description: |
  Švajcarska kompanija specijalizovana za Bitcoin plaćanja, sa misijom da finansijsku slobodu učini dostupnom svima. Osnovana 2020. godine od strane tri entuzijasta za Bitcoin, Lipa razvija inovativna rešenja za plaćanje zasnovana na Lightning Network. Njegov Wallet, Lipa Wallet, omogućava trenutna, sigurna i plaćanja bez posrednika, uz obezbeđivanje privatnosti transakcija.