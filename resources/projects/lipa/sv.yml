description: |
  Schweiziskt företag som specialiserar sig på Bitcoin-betalningar, med ett uppdrag att göra ekonomisk frihet tillgänglig för alla. Lipa grundades 2020 av tre Bitcoin-entusiaster och utvecklar innovativa betalningslösningar baserade på Lightning Network. Deras Wallet, Lipa Wallet, möjliggör omedelbara, säkra och förmedlingsfria betalningar samtidigt som transaktionens integritet säkerställs.
  