description: |
  Lnmarket یک پلتفرم معاملات مشتقه است که بر روی Lightning Network ساخته شده است.
  
  این پلتفرم به افراد اجازه می‌دهد تا با اهرم بالا و مقدار بسیار کمی از Sats معامله کنند و به روشی سرگرم‌کننده احتمالاً پول خود را از دست بدهند. تیم پشت Lnmarket بر توسعه راه‌حل‌های Layer 2 تمرکز دارد و در زمینه Lightning Network بسیار ماهر است.