description: |
  Lnmarket to platforma handlu instrumentami pochodnymi oparta na Lightning Network.
  
  Pozwala ona inwestorom indywidualnym na handel z wysoką dźwignią i bardzo małą ilością Sats, zapewniając zabawny sposób na potencjalną utratę pieniędzy. Zespół stojący za Lnmarket koncentruje się na opracowywaniu rozwiązań Layer 2 i jest wysoko wykwalifikowany w dziedzinie Lightning Network.