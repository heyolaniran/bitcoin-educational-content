description: |
  Lnmarket je platforma za trgovanje derivatima izgrađena na Lightning Network.
  
  Omogućava pojedincima da trguju sa visokim leveridžom i vrlo malom količinom Sats, pružajući zabavan način da potencijalno izgube svoj novac. Tim iza Lnmarket-a fokusira se na razvoj Layer 2 rešenja i veoma je vešt u oblasti Lightning Network.