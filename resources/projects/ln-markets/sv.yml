description: |
  Lnmarket är en handelsplattform för derivat som bygger på Lightning Network.
  
  Den gör det möjligt för individer att handla med hög hävstång och en mycket liten mängd Sats, vilket ger ett roligt sätt att potentiellt förlora sina pengar. Teamet bakom Lnmarket fokuserar på att utveckla Layer 2-lösningar och är mycket skickliga inom området Lightning Network.