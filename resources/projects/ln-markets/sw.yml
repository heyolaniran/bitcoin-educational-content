description: |
  Lnmarket ni jukwaa la biashara linalotokana na Lightning Network. 
  
  Inaruhusu watu binafsi kufanya biashara kwa kiwango cha juu na kiasi kidogo sana cha Sats, ikitoa njia ya kufurahisha ya uwezekano wa kupoteza pesa zao. Timu iliyo nyuma ya Lnmarket inaangazia kutengeneza suluhu za Layer 2 na ina ujuzi wa hali ya juu katika uga wa Lightning Network.