description: |
  LNbits یک سیستم حساب‌های لایتنینگ Bitcoin رایگان و متن‌باز با افزونه‌ها است. این امکان را به شما می‌دهد که سیستم حساب‌های Lightning Network خود را اجرا کنید، چه برای خودتان، دوستان و خانواده، یا برای کل جهان. LNbits از منابع مختلف تأمین مالی Lightning Network پشتیبانی می‌کند، از جمله LND، c-lightning، Spark، LNpay، OpenNode، lntxbot و موارد دیگر.
  
  با LNbits، می‌توانید چندین حساب یا کیف پول ایجاد کنید و به طیف گسترده‌ای از افزونه‌هایی که توسط مشارکت‌کنندگان ساخته شده‌اند دسترسی پیدا کنید. این افزونه‌ها به شما امکان می‌دهند تا قابلیت‌هایی مانند شیرآب‌ها، پیوندهای پرداخت، نقاط فروش قابل اشتراک‌گذاری، دیوارهای پرداخت، بلیط‌های رویداد، بازی‌های تاس، خدمات سرور و حتی یک جعبه موسیقی قابل اشتراک‌گذاری، و بسیاری دیگر را اضافه کنید. LNbits یک API ساده ارائه می‌دهد که می‌تواند به چندین نود و منابع تأمین مالی متصل شود، و این کار را برای ادغام در پشته موجود شما آسان می‌کند.
  
  یکی از مزایای LNbits این است که می‌توانید بلافاصله و مستقیماً در مرورگر خود از آن استفاده کنید، بدون نیاز به دانلود برنامه‌های اضافی. این از فریم‌ورک‌های Quasar و VueJS برای رابط کاربری جلویی خود استفاده می‌کند، که رابط‌های کاربری با عملکرد بالا و پاسخگو ارائه می‌دهند. در بخش پشتی، LNbits از FastAPI، یک فریم‌ورک API پایتون مدرن و با عملکرد بالا استفاده می‌کند.
  
  برای شروع با LNbits، می‌توانید مستندات GitHub، آموزش‌های YouTube و منبع عالی LNbits را بررسی کنید. جامعه LNbits فعال و پشتیبان است و یک گروه تلگرام برای کاربران و توسعه‌دهندگان ارائه می‌دهد تا ایده‌های Exchange را به اشتراک بگذارند، کمک کنند و به توسعه این نرم‌افزار رایگان و متن‌باز کمک کنند.
  
  LNbits یک راه‌حل انعطاف‌پذیر و قابل توسعه برای مدیریت حساب‌های Lightning Network و ادغام قابلیت‌های مختلف از طریق فریم‌ورک افزونه‌های خود ارائه می‌دهد.