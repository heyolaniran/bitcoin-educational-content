description: |
  LNbits एक्सटेंशन के साथ एक मुफ़्त और ओपन-सोर्स Bitcoin लाइटनिंग अकाउंट सिस्टम है। यह आपको अपना खुद का Lightning Network अकाउंट सिस्टम चलाने की अनुमति देता है, चाहे वह आपके लिए हो, दोस्तों और परिवार के लिए हो या पूरी दुनिया के लिए हो। LNbits LND, c-lightning, Spark, LNpay, OpenNode, lntxbot, और अन्य सहित विभिन्न Lightning Network फंडिंग स्रोतों का समर्थन करता है।
  
  LNbits के साथ, आप कई खाते या वॉलेट बना सकते हैं और योगदानकर्ताओं द्वारा बनाए गए एक्सटेंशन की एक विस्तृत श्रृंखला तक पहुँच सकते हैं। ये एक्सटेंशन आपको नल, पेलिंक, शेयर करने योग्य पॉइंट-ऑफ़-सेल, पेवॉल, इवेंट टिकट, पासा गेम, सर्वर सेवाएँ और यहाँ तक कि कई अन्य के अलावा एक शेयर करने योग्य ज्यूकबॉक्स जैसी कार्यक्षमताएँ जोड़ने में सक्षम बनाते हैं। LNbits एक सरल API प्रदान करता है जो कई नोड्स और फंडिंग स्रोतों से जुड़ सकता है, जिससे आपके मौजूदा स्टैक में एकीकृत करना आसान हो जाता है।
  
  LNbits के फायदों में से एक यह है कि आप इसे तुरंत और सीधे अपने ब्राउज़र में इस्तेमाल कर सकते हैं, बिना किसी अतिरिक्त एप्लिकेशन को डाउनलोड किए। यह अपने फ्रंटएंड के लिए Quasar और VueJS फ्रेमवर्क का लाभ उठाता है, जो उच्च-प्रदर्शन और उत्तरदायी उपयोगकर्ता इंटरफ़ेस प्रदान करता है। बैकएंड पर, LNbits FastAPI का उपयोग करता है, जो एक आधुनिक और उच्च-प्रदर्शन वाला Python API फ्रेमवर्क है।
  
  LNbits के साथ आरंभ करने के लिए, आप उनके GitHub दस्तावेज़, YouTube ट्यूटोरियल और Awesome LNbits संसाधन देख सकते हैं। LNbits समुदाय सक्रिय और सहायक है, जो उपयोगकर्ताओं और डेवलपर्स के लिए Exchange विचारों के लिए एक टेलीग्राम समूह प्रदान करता है, सहायता प्रदान करता है, और इस मुफ़्त और ओपन-सोर्स सॉफ़्टवेयर के विकास में योगदान देता है।
  
  LNbits Lightning Network खातों को प्रबंधित करने और अपने एक्सटेंशन फ्रेमवर्क के माध्यम से विभिन्न कार्यात्मकताओं को एकीकृत करने के लिए एक लचीला और एक्स्टेंसिबल समाधान प्रदान करता है।