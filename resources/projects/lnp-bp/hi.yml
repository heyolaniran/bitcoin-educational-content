description: |
  यह संगठन RGB Smart contract प्रोटोकॉल और इसके पारिस्थितिकी तंत्र को अपनाने के शुभारंभ और विकास में महत्वपूर्ण भूमिका निभाता है। यह स्विस नागरिक संहिता के अनुच्छेद 40 के अनुसार एक स्विस गैर-लाभकारी संघ के रूप में कार्य करता है और इसके सदस्यों और उनके द्वारा चुने गए व्यक्तियों द्वारा शासित होता है।