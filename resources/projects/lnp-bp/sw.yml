description: |
  Shirika hili lina jukumu muhimu katika uzinduzi na maendeleo ya kupitishwa kwa itifaki ya RGB Smart contract na mfumo wake wa ikolojia. Inafanya kazi kama shirika lisilo la faida la Uswizi kwa mujibu wa Kifungu cha 40 cha Kanuni ya Kiraia ya Uswisi na inasimamiwa na wanachama wake na watu binafsi waliochaguliwa nao.
  