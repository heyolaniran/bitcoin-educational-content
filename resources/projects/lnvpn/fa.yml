description: |
  با LNVPN ما یک سرویس VPN بسیار ساده با پرداخت به‌ازای‌مصرف ساخته‌ایم که از طریق Bitcoin Lightning پرداخت می‌شود. به جای پرداخت حدود 5 دلار هر ماه با کارت اعتباری برای استفاده گهگاهی از یک سرویس VPN، ما به شما یک اتصال VPN روی سرورهای کشورهای مختلف برای یک ساعت تنها با 10 سنت به دلار آمریکا ارائه می‌دهیم -- پرداخت از طریق ⚡!