description: |
  Dzięki LNVPN stworzyliśmy bardzo prostą usługę VPN pay-as-you-go opłacaną przez Bitcoin Lightning. Zamiast płacić co miesiąc około 5 USD kartą kredytową za przywilej korzystania z usługi VPN od czasu do czasu, zapewniamy połączenie VPN na serwerach w różnych krajach przez godzinę za jedyne 10 centów w USD - płatne przez ⚡!