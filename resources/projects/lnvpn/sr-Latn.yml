description: |
  Sa LNVPN smo izgradili veoma jednostavnu VPN uslugu plaćanja po korišćenju, plaćenu putem Bitcoin Lightning. Umesto da plaćate oko 5$ svakog meseca kreditnom karticom za privilegiju korišćenja VPN usluge s vremena na vreme, mi vam pružamo VPN konekciju na serverima u različitim zemljama na jedan sat za samo 10 centi u US$ -- plaćeno putem ⚡!