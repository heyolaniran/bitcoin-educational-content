description: |
  Med LNVPN har vi byggt en mycket enkel VPN-betalningstjänst som betalas via Bitcoin Lightning. Istället för att betala cirka 5 $ varje månad med ditt kreditkort för förmånen att kunna använda en VPN-tjänst då och då ger vi dig en VPN-anslutning på servrar i olika länder under en timme för endast 10 cent i US-dollar - betalas via ⚡!