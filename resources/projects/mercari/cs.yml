description: |
  Mercari, přední japonské online tržiště s více než 23 miliony uživatelů, spustilo v roce 2023 službu obchodování s Bitcoin, aby nové uživatele seznámilo s Bitcoin. V roce 2024 zavedla jako platební metodu BTC. Během prvního roku využilo tuto obchodní službu více než 2 miliony lidí a během prvního měsíce zaznamenala tato platební možnost 100 000 plateb Bitcoin, což svědčí o velkém zájmu veřejnosti.
  