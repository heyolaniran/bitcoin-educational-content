description: |
  Mercari, Japans führender Online-Marktplatz mit über 23 Millionen Nutzern, startete im Jahr 2023 einen Bitcoin-Handelsdienst, um neue Nutzer mit Bitcoin vertraut zu machen. Im Jahr 2024 wurde dann BTC als Zahlungsmethode eingeführt. Über 2 Millionen Menschen nutzten den Handelsdienst im ersten Jahr, und die Zahlungsoption verzeichnete 100.000 Bitcoin-Zahlungen im ersten Monat, was ein starkes öffentliches Interesse widerspiegelt.
  