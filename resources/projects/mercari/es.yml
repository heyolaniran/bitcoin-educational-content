description: |
  Mercari, el principal mercado en línea de Japón con más de 23 millones de usuarios, lanzó un servicio de comercio de Bitcoin en 2023 para familiarizar a los nuevos usuarios con Bitcoin. En 2024, introdujeron BTC como método de pago. Más de 2 millones de personas utilizaron el servicio de comercio en su primer año, y la opción de pago registró 100.000 pagos de Bitcoin en su primer mes, lo que refleja un gran interés del público.
  