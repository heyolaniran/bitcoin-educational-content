description: |
  Mercari, Jaapani suurim online-turg, millel on üle 23 miljoni kasutaja, käivitas 2023. aastal Bitcoin kauplemisteenuse, et tutvustada uutele kasutajatele Bitcoin-d. Aastal 2024 võtsid nad makseviisina kasutusele BTC. Esimese aasta jooksul kasutas kauplemisteenust üle 2 miljoni inimese ja esimese kuu jooksul tehti 100 000 Bitcoin makset, mis näitab avalikkuse suurt huvi.
  