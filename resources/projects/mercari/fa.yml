description: |
  مرکوری، برترین بازار آنلاین ژاپن با بیش از ۲۳ میلیون کاربر، در سال ۲۰۲۳ یک سرویس معاملاتی Bitcoin را برای آشنایی کاربران جدید با Bitcoin راه‌اندازی کرد. در سال ۲۰۲۴، آن‌ها BTC را به عنوان یک روش پرداخت معرفی کردند. بیش از ۲ میلیون نفر در سال اول از سرویس معاملاتی استفاده کردند و گزینه پرداخت ۱۰۰,۰۰۰ پرداخت Bitcoin را در ماه اول تجربه کرد که نشان‌دهنده علاقه قوی عمومی است.