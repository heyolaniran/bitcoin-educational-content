description: |
  Mercari, Japanin johtava verkkokauppapaikka, jolla on yli 23 miljoonaa käyttäjää, käynnisti Bitcoin-kauppapalvelun vuonna 2023 tutustuttaakseen uudet käyttäjät Bitcoin:aan. Vuonna 2024 he ottivat käyttöön BTC:n maksutapana. Yli 2 miljoonaa ihmistä käytti kaupankäyntipalvelua sen ensimmäisen vuoden aikana, ja maksuvaihtoehdon kautta suoritettiin 100 000 Bitcoin-maksua ensimmäisen kuukauden aikana, mikä kuvastaa suurta yleistä kiinnostusta.
  