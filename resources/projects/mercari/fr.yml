description: |
  Mercari, la première place de marché en ligne du Japon avec plus de 23 millions d'utilisateurs, a lancé un service d'échange de Bitcoin en 2023 pour familiariser les nouveaux utilisateurs avec le Bitcoin. En 2024, ils ont introduit le BTC comme méthode de paiement. Plus de 2 millions de personnes ont utilisé le service d'échange au cours de la première année, et l'option de paiement a donné lieu à 100 000 paiements de Bitcoin au cours du premier mois, ce qui témoigne d'un vif intérêt de la part du public.
  