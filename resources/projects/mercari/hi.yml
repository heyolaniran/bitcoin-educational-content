description: |
  23 मिलियन से ज़्यादा उपयोगकर्ताओं के साथ जापान के शीर्ष ऑनलाइन मार्केटप्लेस मर्करी ने नए उपयोगकर्ताओं को Bitcoin से परिचित कराने के लिए 2023 में Bitcoin ट्रेडिंग सेवा शुरू की। 2024 में, उन्होंने भुगतान विधि के रूप में BTC पेश किया। अपने पहले वर्ष में 2 मिलियन से ज़्यादा लोगों ने ट्रेडिंग सेवा का इस्तेमाल किया और भुगतान विकल्प ने अपने पहले महीने में 100,000 Bitcoin भुगतान देखे, जो एक मज़बूत सार्वजनिक रुचि को दर्शाता है।