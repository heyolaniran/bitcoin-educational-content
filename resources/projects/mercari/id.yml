description: |
  Mercari, pasar online teratas di Jepang dengan lebih dari 23 juta pengguna, meluncurkan layanan perdagangan Bitcoin pada tahun 2023 untuk membiasakan pengguna baru dengan Bitcoin. Pada tahun 2024, mereka memperkenalkan BTC sebagai metode pembayaran. Lebih dari 2 juta orang menggunakan layanan perdagangan di tahun pertamanya, dan opsi pembayarannya menghasilkan 100.000 pembayaran Bitcoin di bulan pertamanya, yang mencerminkan minat publik yang kuat.
  