description: |
  Mercari, il principale mercato online del Giappone con oltre 23 milioni di utenti, ha lanciato un servizio di compravendita di Bitcoin nel 2023 per far conoscere Bitcoin ai nuovi utenti. Nel 2024 ha introdotto il BTC come metodo di pagamento. Più di 2 milioni di persone hanno utilizzato il servizio di trading nel primo anno, e l'opzione di pagamento ha visto 100.000 pagamenti di Bitcoin nel primo mese, riflettendo un forte interesse pubblico.
  