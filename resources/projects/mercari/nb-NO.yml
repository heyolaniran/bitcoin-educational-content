description: |
  Mercari, Japans største markedsplass på nettet med over 23 millioner brukere, lanserte en Bitcoin-handelstjeneste i 2023 for å gjøre nye brukere kjent med Bitcoin. I 2024 introduserte de BTC som betalingsmetode. Over 2 millioner mennesker brukte handelstjenesten i løpet av det første året, og betalingsalternativet så 100 000 Bitcoin-betalinger i løpet av den første måneden, noe som gjenspeiler en sterk offentlig interesse.
  