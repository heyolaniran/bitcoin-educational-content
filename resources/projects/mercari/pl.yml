description: |
  Mercari, czołowy japoński rynek internetowy z ponad 23 milionami użytkowników, uruchomił usługę handlu Bitcoin w 2023 roku, aby zapoznać nowych użytkowników z Bitcoin. W 2024 r. wprowadzono BTC jako metodę płatności. Ponad 2 miliony osób skorzystało z usługi handlowej w pierwszym roku, a opcja płatności odnotowała 100 000 płatności Bitcoin w pierwszym miesiącu, co odzwierciedla duże zainteresowanie opinii publicznej.
  