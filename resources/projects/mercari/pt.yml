description: |
  A Mercari, o principal mercado em linha do Japão, com mais de 23 milhões de utilizadores, lançou um serviço de comércio de Bitcoin em 2023 para familiarizar os novos utilizadores com o Bitcoin. Em 2024, introduziu o BTC como método de pagamento. Mais de 2 milhões de pessoas utilizaram o serviço de negociação no primeiro ano e a opção de pagamento registou 100 000 pagamentos de Bitcoin no primeiro mês, o que reflecte um forte interesse do público.
  