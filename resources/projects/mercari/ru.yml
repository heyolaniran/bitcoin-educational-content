description: |
  Mercari, ведущая японская онлайн-площадка с более чем 23 миллионами пользователей, запустила сервис торговли Bitcoin в 2023 году, чтобы познакомить новых пользователей с Bitcoin. В 2024 году они ввели BTC в качестве способа оплаты. За первый год работы сервисом воспользовались более 2 миллионов человек, а в первый месяц работы платежной системы было проведено 100 000 платежей Bitcoin, что свидетельствует о большом интересе со стороны общественности.
  