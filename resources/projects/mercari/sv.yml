description: |
  Mercari, Japans främsta marknadsplats online med över 23 miljoner användare, lanserade en Bitcoin-handelstjänst 2023 för att bekanta nya användare med Bitcoin. År 2024 introducerade de BTC som betalningsmetod. Över 2 miljoner människor använde handelstjänsten under det första året, och betalningsalternativet såg 100 000 Bitcoin-betalningar under sin första månad, vilket återspeglar ett starkt allmänt intresse.
  