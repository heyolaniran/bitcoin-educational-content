description: |
  Mercari, soko kuu la mtandaoni la Japani lenye watumiaji zaidi ya milioni 23, ilizindua huduma ya biashara ya Bitcoin mnamo 2023 ili kufahamisha watumiaji wapya na Bitcoin. Mnamo 2024, walianzisha BTC kama njia ya malipo. Zaidi ya watu milioni 2 walitumia huduma ya biashara katika mwaka wake wa kwanza, na chaguo la malipo lilifanya malipo ya Bitcoin 100,000 katika mwezi wake wa kwanza, yakionyesha maslahi makubwa ya umma.
  