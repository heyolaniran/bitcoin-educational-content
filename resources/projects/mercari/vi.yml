description: |
  Mercari, sàn giao dịch trực tuyến hàng đầu Nhật Bản với hơn 23 triệu người dùng, đã ra mắt dịch vụ giao dịch Bitcoin vào năm 2023 để giúp người dùng mới làm quen với Bitcoin. Vào năm 2024, họ đã giới thiệu BTC như một phương thức thanh toán. Hơn 2 triệu người đã sử dụng dịch vụ giao dịch trong năm đầu tiên và tùy chọn thanh toán này đã chứng kiến 100.000 khoản thanh toán Bitcoin trong tháng đầu tiên, phản ánh sự quan tâm mạnh mẽ của công chúng.
  