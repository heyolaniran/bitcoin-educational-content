description: |
  پروژه آموزشی بین‌المللی Mi Primer Bitcoin بر روی Bitcoin تمرکز دارد و به‌ویژه به السالوادور توجه ویژه‌ای دارد. هدف اصلی آن ارائه اطلاعات بی‌طرفانه و با کیفیت بالا درباره Bitcoin است، به‌ویژه پس از اینکه السالوادور اولین کشوری شد که Bitcoin را به عنوان پول قانونی به رسمیت شناخت. آن‌ها کلاس‌های رایگانی از مفاهیم عمومی تا جنبه‌های فنی پیشرفته ارائه می‌دهند، با هدف اینکه یادگیری Bitcoin را برای دانش‌آموزان قابل دسترس و ساده کنند.
  
  این پروژه با سرعت زیادی در حال رشد است و دفاتری در سان سالوادور و سان میگل دارد و کلاس‌هایی در بخش‌های مختلف السالوادور برگزار می‌کند. آن‌ها همچنین جلسات ماهانه برگزار می‌کنند و برنامه‌های توسعه‌ای برای سال آینده دارند، از جمله برنامه دیپلم در دبیرستان‌های عمومی. علاوه بر آموزش، Mi Primer Bitcoin هدف دارد تا یک اقتصاد دایره‌ای و جامعه‌ای پررونق از Bitcoin در السالوادور ایجاد کند.
  
  فلسفه و مأموریت Mi Primer Bitcoin بر ارائه آموزش بی‌طرفانه و با کیفیت بالا درباره Bitcoin تمرکز دارد، بدون حمایت از محصولات یا درگیر شدن در مباحث سیاسی. هدف آن‌ها این است که افراد را توانمند سازند تا تصمیمات آگاهانه‌ای درباره Bitcoin بگیرند و یک مثال مثبت در السالوادور و فراتر از آن ایجاد کنند.