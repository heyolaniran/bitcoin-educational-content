description: |
  Mi Primer Bitcoin to międzynarodowy projekt edukacyjny poświęcony Bitcoin, ze szczególnym uwzględnieniem Salwadoru. Jego głównym celem jest dostarczanie bezstronnych i wysokiej jakości informacji na temat Bitcoin, szczególnie po tym, jak Salwador stał się pierwszym krajem, który uznał Bitcoin za legalny środek płatniczy. Oferuje bezpłatne zajęcia, począwszy od ogólnych pojęć po bardziej zaawansowane aspekty techniczne, mając na celu uczynienie nauki Bitcoin przystępną i prostą dla uczniów.
  
  Projekt przeżywa szybki rozwój, z siedzibą w San Salvador i San Miguel oraz zajęciami w różnych departamentach Salwadoru. Organizuje również comiesięczne spotkania i ma plany ekspansji na nadchodzący rok, w tym program dyplomowy w publicznych szkołach średnich. Oprócz edukacji, Mi Primer Bitcoin ma na celu wspieranie gospodarki o obiegu zamkniętym i dobrze prosperującej społeczności Bitcoin w Salwadorze.
  
  Filozofia i misja Mi Primer Bitcoin koncentruje się na zapewnieniu bezstronnej i wysokiej jakości edukacji Bitcoin, bez promowania produktów lub angażowania się w debaty polityczne. Ich celem jest umożliwienie jednostkom podejmowania własnych świadomych decyzji dotyczących Bitcoin i stworzenie pozytywnego przykładu w Salwadorze i poza nim.