description: |
  Mi Primer Bitcoin je međunarodni obrazovni projekat fokusiran na Bitcoin, sa posebnim naglaskom na El Salvador. Njegov glavni cilj je pružanje nepristrasnih i visokokvalitetnih informacija o Bitcoin, posebno nakon što je El Salvador postao prva zemlja koja je priznala Bitcoin kao zakonsko sredstvo plaćanja. Nude besplatne časove koji se kreću od opštih koncepata do naprednijih tehničkih aspekata, sa ciljem da učenje o Bitcoin bude dostupno i jednostavno za studente.
  
  Projekat doživljava brzi rast, sa sedištima u San Salvadoru i San Miguelu, i časovima u raznim departmanima El Salvadora. Takođe održavaju mesečne sastanke i imaju planove za širenje u narednoj godini, uključujući program diploma u javnim srednjim školama. Pored obrazovanja, Mi Primer Bitcoin ima za cilj da podstakne cirkularnu ekonomiju i prosperitetnu Bitcoin zajednicu u El Salvadoru.
  
  Filozofija i misija Mi Primer Bitcoin fokusiraju se na pružanje nepristrasnog i visokokvalitetnog obrazovanja o Bitcoin, bez podržavanja proizvoda ili učešća u političkim debatama. Njihov cilj je osnažiti pojedince da donose sopstvene informisane odluke o Bitcoin i stvore pozitivan primer u El Salvadoru i šire.