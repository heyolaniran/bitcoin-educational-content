description: |
  Mi Primer Bitcoin är ett internationellt utbildningsprojekt som fokuserar på Bitcoin, med särskild tonvikt på El Salvador. Dess huvudsyfte är att tillhandahålla opartisk och högkvalitativ information om Bitcoin, särskilt efter att El Salvador blev det första landet som erkände Bitcoin som lagligt betalningsmedel. De erbjuder gratis lektioner som sträcker sig från allmänna begrepp till mer avancerade tekniska aspekter, med målet att göra Bitcoin-inlärning tillgänglig och enkel för studenter.
  
  Projektet växer snabbt, med huvudkontor i San Salvador och San Miguel, och kurser i olika delar av El Salvador. De håller också månatliga möten och har expansionsplaner för det kommande året, inklusive ett diplomprogram i offentliga gymnasieskolor. Förutom utbildning syftar Mi Primer Bitcoin till att främja en cirkulär ekonomi och ett blomstrande Bitcoin-samhälle i El Salvador.
  
  Mi Primer Bitcoin:s filosofi och uppdrag fokuserar på att tillhandahålla opartisk och högkvalitativ Bitcoin-utbildning, utan att stödja produkter eller delta i politiska debatter. Deras mål är att ge individer möjlighet att fatta sina egna informerade beslut om Bitcoin och skapa ett positivt exempel i El Salvador och därefter.