description: |
  Mi Primer Bitcoin ni mradi wa elimu wa kimataifa unaolenga Bitcoin, ukiwa na msisitizo maalum kwa El Salvador. Lengo lake kuu ni kutoa taarifa zisizo na upendeleo na za ubora wa juu kuhusu Bitcoin, hasa baada ya El Salvador kuwa nchi ya kwanza kutambua Bitcoin kama zabuni halali. Wanatoa madarasa ya bila malipo kuanzia dhana ya jumla hadi vipengele vya juu zaidi vya kiufundi, kwa lengo la kufanya ujifunzaji wa Bitcoin kufikiwa na moja kwa moja kwa wanafunzi.
  
  Mradi huo unakabiliwa na ukuaji wa haraka, na makao makuu huko San Salvador na San Miguel, na madarasa katika idara mbalimbali za El Salvador. Pia wanafanya mikutano ya kila mwezi na wana mipango ya upanuzi kwa mwaka ujao, ikijumuisha programu ya diploma katika shule za upili za umma. Mbali na elimu, Mi Primer Bitcoin inalenga kukuza uchumi wa mduara na jumuiya inayostawi ya Bitcoin huko El Salvador.
  
  Falsafa na dhamira ya Mi Primer Bitcoin inalenga kutoa elimu ya Bitcoin isiyopendelea upande wowote na ya hali ya juu, bila kuidhinisha bidhaa au kujihusisha katika mijadala ya kisiasa. Lengo lao ni kuwawezesha watu binafsi kufanya maamuzi yao wenyewe kuhusu Bitcoin na kuunda mfano mzuri nchini El Salvador na kwingineko.