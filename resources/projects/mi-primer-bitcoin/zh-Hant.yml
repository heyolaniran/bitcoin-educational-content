description: |
  Mi Primer Bitcoin 是一個專注於 Bitcoin 的國際教育項目，特別強調薩爾瓦多。其主要目標是提供有關 Bitcoin 的公正且高品質的資訊，尤其是在薩爾瓦多成為第一個承認 Bitcoin 為法定貨幣的國家之後。他們提供免費課程，範圍從一般概念到更進階的技術層面，目標是讓學生可以直接且容易地學習 Bitcoin。
  
  該專案發展迅速，總部設在聖薩爾瓦多和聖米格爾，並在薩爾瓦多各省開班。他們每月也會召開會議，並在來年有擴展計劃，包括在公立高中開辦文憑課程。除了教育之外，Mi Primer Bitcoin 的目標是在薩爾瓦多促進循環經濟，並建立一個蓬勃發展的 Bitcoin 社區。
  
  Mi Primer Bitcoin 的理念和使命著重於提供公正且高品質的 Bitcoin 教育，不為產品背書或參與政治辯論。他們的目標是賦予個人權能，讓他們自己就 Bitcoin 做出明智的決定，並在薩爾瓦多及其他地區樹立正面的榜樣。