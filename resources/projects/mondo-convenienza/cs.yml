description: |
  Mondo Convenienza je italský maloobchodní prodejce nábytku, který začal přijímat Bitcoin v červenci 2022, aby přilákal mladší demografické skupiny a využil italskou strukturu krypto daně, která podporuje utrácení. Jejich kryptografické platby činí ročně asi 500 tisíc eur a od září do listopadu 2024 zaznamenali 10% růst, přičemž používání koreluje s býčími obdobími na trhu.
  