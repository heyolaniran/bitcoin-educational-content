description: |
  Mondo Convenienza on Itaalia mööbli jaemüüja, kes hakkas juulis 2022 Bitcoin vastu võtma, et meelitada nooremat demograafiat ja kasutada ära Itaalia krüptomaksustruktuuri, mis soodustab kulutusi. Nende krüptomaksete kogusumma on umbes 500 000 eurot aastas ja nad nägid septembrist novembrini 2024 10% kasvu, kusjuures kasutamine korreleerub turuhindade tõusuperioodidega.
  