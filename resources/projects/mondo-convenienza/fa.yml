description: |
  Mondo Convenienza یک خرده‌فروش مبلمان ایتالیایی است که در ژوئیه 2022 شروع به پذیرش Bitcoin کرد تا جمعیت جوان‌تر را جذب کند و از ساختار مالیاتی ارزهای دیجیتال ایتالیا که به خرج کردن تشویق می‌کند، بهره‌برداری کند. پرداخت‌های ارز دیجیتال آن‌ها سالانه حدود 500 هزار یورو است و از سپتامبر تا نوامبر 2024 رشد 10 درصدی را مشاهده کردند که استفاده از آن با دوره‌های بازار صعودی همبستگی دارد.