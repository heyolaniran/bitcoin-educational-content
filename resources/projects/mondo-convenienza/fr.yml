description: |
  Mondo Convenienza est un détaillant de meubles italien qui a commencé à accepter le Bitcoin en juillet 2022 pour attirer les jeunes et tirer parti de la structure fiscale italienne sur les crypto-monnaies, qui encourage les dépenses. Leurs paiements en crypto-monnaie s'élèvent à environ 500 000 € par an et ils ont connu une croissance de 10 % entre septembre et novembre 2024, l'utilisation étant en corrélation avec les périodes de marché haussier.
  