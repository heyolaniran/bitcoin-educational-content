description: |
  Mondo Convenienza to włoski sprzedawca mebli, który zaczął akceptować Bitcoin w lipcu 2022 r., aby przyciągnąć młodszą demografię i wykorzystać włoską strukturę podatku od kryptowalut, która zachęca do wydatków. Ich płatności kryptowalutowe wynoszą około 500 tys. euro rocznie, a od września do listopada 2024 r. odnotowali 10% wzrost, przy czym wykorzystanie korelowało z okresami hossy na rynku.
  