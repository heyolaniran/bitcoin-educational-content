description: |
  Mondo Convenienza é um varejista de móveis italiano que começou a aceitar Bitcoin em julho de 2022 para atrair a demografia mais jovem e alavancar a estrutura tributária de criptografia da Itália, que incentiva os gastos. Os seus pagamentos de criptomoedas totalizam cerca de 500 mil euros por ano e registaram um crescimento de 10% de setembro a novembro de 2024, com a utilização a correlacionar-se com períodos de mercado em alta.
  