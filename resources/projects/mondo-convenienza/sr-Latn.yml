description: |
  Mondo Convenienza je italijanski prodavac nameštaja koji je počeo prihvatati Bitcoin u julu 2022. kako bi privukao mlađu demografsku grupu i iskoristio poresku strukturu Italije za kriptovalute, koja podstiče potrošnju. Njihova plaćanja u kriptovalutama iznose oko 500.000 € godišnje, a zabeležili su rast od 10% od septembra do novembra 2024, pri čemu je korišćenje korelisano sa periodima rasta tržišta.