description: |
  Mondo Convenienza là một nhà bán lẻ đồ nội thất của Ý đã bắt đầu chấp nhận Bitcoin vào tháng 7 năm 2022 để thu hút nhóm nhân khẩu trẻ hơn và tận dụng cơ cấu thuế tiền điện tử của Ý, khuyến khích chi tiêu. Tổng số tiền thanh toán bằng tiền điện tử của họ là khoảng 500.000 euro mỗi năm và họ đã chứng kiến mức tăng trưởng 10% từ tháng 9 đến tháng 11 năm 2024, với mức sử dụng tương quan với các giai đoạn thị trường tăng giá.
  