description: |
  Mozilla Foundation je mezinárodní nezisková organizace, která podporuje zdravější, otevřenější a inkluzivnější internet. Obhajuje soukromí a transparentnost a podporuje projekty a subjekty, které usilují o etické technologie zaměřené na člověka. Mozilla nabízí hlavní nástroje, jako jsou Firefox, Thunderbird, Common Voice a Mozilla VPN.