description: |
  Die Mozilla Foundation ist eine internationale gemeinnützige Organisation, die sich für ein gesünderes, offeneres und integrativeres Internet einsetzt. Sie setzt sich für Datenschutz und Transparenz ein und unterstützt Projekte und Akteure, die sich für ethische, auf den Menschen ausgerichtete Technologien einsetzen. Mozilla bietet wichtige Tools wie Firefox, Thunderbird, Common Voice und Mozilla VPN an.