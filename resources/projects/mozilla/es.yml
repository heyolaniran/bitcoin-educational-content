description: |
  La Fundación Mozilla es una organización internacional sin ánimo de lucro que promueve una Internet más sana, abierta e inclusiva. Defendiendo la privacidad y la transparencia, apoya proyectos y actores que trabajan por una tecnología ética y centrada en el ser humano. Mozilla ofrece importantes herramientas como Firefox, Thunderbird, Common Voice y Mozilla VPN.