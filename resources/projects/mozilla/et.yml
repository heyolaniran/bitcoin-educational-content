description: |
  Mozilla Foundation on rahvusvaheline mittetulundusühing, mis edendab tervislikumat, avatumat ja kaasavamat Internetti. Kaitses eraelu puutumatust ja läbipaistvust, toetab ta projekte ja osalejaid, kes töötavad eetilise, inimkeskse tehnoloogia nimel. Mozilla pakub selliseid olulisi tööriistu nagu Firefox, Thunderbird, Common Voice ja Mozilla VPN.