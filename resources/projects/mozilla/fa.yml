description: |
  بنیاد موزیلا یک سازمان غیرانتفاعی بین‌المللی است که به ترویج اینترنتی سالم‌تر، بازتر و فراگیرتر می‌پردازد. با دفاع از حریم خصوصی و شفافیت، از پروژه‌ها و افرادی که برای فناوری اخلاقی و انسان‌محور کار می‌کنند، حمایت می‌کند. موزیلا ابزارهای مهمی مانند فایرفاکس، تاندربرد، کامن ویس و موزیلا VPN ارائه می‌دهد.