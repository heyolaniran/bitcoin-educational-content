description: |
  Mozilla Foundation on kansainvälinen voittoa tavoittelematon järjestö, joka edistää terveempää, avoimempaa ja osallistavampaa Internetiä. Puolustamalla yksityisyyttä ja läpinäkyvyyttä se tukee hankkeita ja toimijoita, jotka työskentelevät eettisen, ihmislähtöisen teknologian puolesta. Mozilla tarjoaa merkittäviä työkaluja, kuten Firefox, Thunderbird, Common Voice ja Mozilla VPN.