description: |
  La Fondation Mozilla est une organisation internationale à but non lucratif qui promeut un Internet plus sain, ouvert et inclusif. En défendant la vie privée et la transparence, elle soutient des projets et des acteurs œuvrant pour une technologie éthique et centrée sur l’humain. Mozilla propose des outils majeurs comme Firefox, Thunderbird, Common Voice ou encore Mozilla VPN.