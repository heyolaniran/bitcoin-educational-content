description: |
  मोज़िला फाउंडेशन एक अंतरराष्ट्रीय गैर-लाभकारी संगठन है जो एक स्वस्थ, अधिक खुले और समावेशी इंटरनेट को बढ़ावा देता है। गोपनीयता और पारदर्शिता की रक्षा करके, यह नैतिक, मानव-केंद्रित प्रौद्योगिकी के लिए काम करने वाली परियोजनाओं और खिलाड़ियों का समर्थन करता है। मोज़िला फ़ायरफ़ॉक्स, थंडरबर्ड, कॉमन वॉयस और मोज़िला वीपीएन जैसे प्रमुख उपकरण प्रदान करता है।