description: |
  Mozilla Foundation adalah organisasi nirlaba internasional yang mempromosikan Internet yang lebih sehat, lebih terbuka, dan inklusif. Dengan membela privasi dan transparansi, Mozilla Foundation mendukung proyek-proyek dan para pemain yang bekerja untuk teknologi yang etis dan berpusat pada manusia. Mozilla menawarkan alat utama seperti Firefox, Thunderbird, Common Voice, dan Mozilla VPN.