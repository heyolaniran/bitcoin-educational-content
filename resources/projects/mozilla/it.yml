description: |
  La Mozilla Foundation è un'organizzazione internazionale senza scopo di lucro che promuove un Internet più sano, aperto e inclusivo. Difendendo la privacy e la trasparenza, sostiene progetti e attori che lavorano per una tecnologia etica e incentrata sull'uomo. Mozilla offre strumenti importanti come Firefox, Thunderbird, Common Voice e Mozilla VPN.