description: |
  Mozilla Foundation er en internasjonal ideell organisasjon som arbeider for et sunnere, åpnere og mer inkluderende Internett. Ved å forsvare personvern og åpenhet støtter den prosjekter og aktører som arbeider for etisk, menneskesentrert teknologi. Mozilla tilbyr viktige verktøy som Firefox, Thunderbird, Common Voice og Mozilla VPN.