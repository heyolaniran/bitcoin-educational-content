description: |
  Fundacja Mozilla jest międzynarodową organizacją non-profit, która promuje zdrowszy, bardziej otwarty i integracyjny Internet. Broniąc prywatności i przejrzystości, wspiera projekty i podmioty działające na rzecz etycznej, skoncentrowanej na człowieku technologii. Mozilla oferuje najważniejsze narzędzia, takie jak Firefox, Thunderbird, Common Voice i Mozilla VPN.