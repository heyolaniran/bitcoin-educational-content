description: |
  A Fundação Mozilla é uma organização internacional sem fins lucrativos que promove uma Internet mais saudável, aberta e inclusiva. Ao defender a privacidade e a transparência, apoia projectos e intervenientes que trabalham para uma tecnologia ética e centrada no ser humano. A Mozilla oferece ferramentas importantes como o Firefox, o Thunderbird, o Common Voice e o Mozilla VPN.