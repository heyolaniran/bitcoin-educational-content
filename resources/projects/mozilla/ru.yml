description: |
  Mozilla Foundation - это международная некоммерческая организация, которая способствует созданию более здорового, открытого и инклюзивного Интернета. Защищая конфиденциальность и прозрачность, она поддерживает проекты и игроков, работающих над созданием этичных, ориентированных на человека технологий. Mozilla предлагает такие основные инструменты, как Firefox, Thunderbird, Common Voice и Mozilla VPN.