description: |
  Mozilla Foundation je međunarodna neprofitna organizacija koja promoviše zdraviji, otvoreniji i inkluzivniji Internet. Braneći privatnost i transparentnost, podržava projekte i aktere koji rade na etičkoj, ljudski orijentisanoj tehnologiji. Mozilla nudi glavne alate kao što su Firefox, Thunderbird, Common Voice i Mozilla VPN.