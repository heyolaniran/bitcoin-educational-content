description: |
  Wakfu wa Mozilla ni shirika la kimataifa lisilo la faida ambalo linakuza mtandao bora zaidi, wazi zaidi na jumuishi. Kwa kutetea faragha na uwazi, inasaidia miradi na wachezaji wanaofanya kazi kwa ajili ya teknolojia ya maadili, inayozingatia binadamu. Mozilla inatoa zana kuu kama vile Firefox, Thunderbird, Sauti ya Kawaida na Mozilla VPN.