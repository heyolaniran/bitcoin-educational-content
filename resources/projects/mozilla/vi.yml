description: |
  Mozilla Foundation là một tổ chức phi lợi nhuận quốc tế thúc đẩy một Internet lành mạnh hơn, cởi mở hơn và toàn diện hơn. Bằng cách bảo vệ quyền riêng tư và tính minh bạch, tổ chức này hỗ trợ các dự án và người chơi làm việc vì công nghệ đạo đức, lấy con người làm trung tâm. Mozilla cung cấp các công cụ chính như Firefox, Thunderbird, Common Voice và Mozilla VPN.