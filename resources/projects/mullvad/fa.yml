description: |
  شرکت سوئدی متخصص در حریم خصوصی آنلاین، ارائه‌دهنده‌ی خدمات VPN امن و متمرکز بر حریم خصوصی. تأسیس شده در سال ۲۰۰۹، مولود به دلیل Commitment برای به حداقل رساندن جمع‌آوری داده‌ها متمایز است: برای ایجاد حساب کاربری نیازی به Address ایمیل یا اطلاعات شخصی نیست. با رمزگذاری قوی، اتصالات ناشناس و سیاست سخت‌گیرانه عدم ثبت لاگ، مولود هدف دارد کاربران خود را از نظارت و نقض حریم خصوصی آنلاین محافظت کند. پرداخت برای مولود VPN می‌تواند به صورت Bitcoin انجام شود.