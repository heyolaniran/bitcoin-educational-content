description: |
  Szwedzka firma specjalizująca się w ochronie prywatności w Internecie, oferująca bezpieczną i skoncentrowaną na prywatności usługę VPN. Założona w 2009 roku firma Mullvad wyróżnia się swoim Commitment w celu zminimalizowania gromadzenia danych: do utworzenia konta nie jest wymagany żaden e-mail Address ani dane osobowe. Dzięki solidnemu szyfrowaniu, anonimowym połączeniom i ścisłej polityce braku logów, Mullvad ma na celu ochronę swoich użytkowników przed inwigilacją i naruszeniami prywatności w Internecie. Za Mullvad VPN można zapłacić w Bitcoin.
  