description: |
  Švedska kompanija specijalizovana za online privatnost, koja nudi sigurnu i na privatnost fokusiranu VPN uslugu. Osnovana 2009. godine, Mullvad se ističe svojim Commitment za minimiziranje prikupljanja podataka: nije potreban email Address niti lične informacije za kreiranje naloga. Sa snažnom enkripcijom, anonimnim konekcijama i strogom politikom bez logova, Mullvad ima za cilj zaštitu svojih korisnika od nadzora i kršenja online privatnosti. Mullvad VPN se može platiti u Bitcoin.