description: |
  Bitcoin, Lightning i nie tylko! Najłatwiejszy i najpotężniejszy sposób na uruchomienie węzła Bitcoin i Lightning!
  
  Łączymy najlepsze oprogramowanie open source z naszym Interface, zarządzaniem i wsparciem, dzięki czemu możesz łatwo, prywatnie i bezpiecznie korzystać z Bitcoin i Lightning.