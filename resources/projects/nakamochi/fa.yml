description: |
  ناکاموچی به گونه‌ای طراحی شده است که عملیات Bitcoin و Lightning Full node را برای همه، بدون توجه به تخصص فنی، قابل دسترس کند. این نود سوئیسی ساخته شده به صورت پلاگ اند پلی، افراد را قادر می‌سازد تا به حریم خصوصی و استقلال کامل دست یابند. با اجرای Full node خود، نه تنها حاکمیت شخصی خود را تقویت می‌کنید، بلکه به تمرکززدایی و مقاومت شبکه Bitcoin نیز کمک می‌کنید.