description: |
  Nakamochi разработан для того, чтобы сделать работу с Bitcoin и Lightning Full node доступной для всех, независимо от технических знаний. Изготовленный в Швейцарии узел plug-and-play позволяет людям достичь полной конфиденциальности и независимости. Управляя собственным Full node, вы не только укрепляете свой личный суверенитет, но и способствуете децентрализации и устойчивости сети Bitcoin.
  