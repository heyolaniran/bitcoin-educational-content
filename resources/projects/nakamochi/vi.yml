description: |
  Nakamochi được thiết kế để mọi người đều có thể sử dụng Bitcoin và Lightning Full node, bất kể trình độ chuyên môn kỹ thuật. Nút cắm và chạy do Thụy Sĩ sản xuất trao quyền cho mọi cá nhân đạt được quyền riêng tư và độc lập hoàn toàn. Bằng cách chạy Full node của riêng bạn, bạn không chỉ củng cố chủ quyền cá nhân mà còn đóng góp vào sự phi tập trung và khả năng phục hồi của mạng Bitcoin.
  
  