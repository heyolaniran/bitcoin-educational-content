description: |
  Namecheap در سال 2013 پرداخت‌های Bitcoin را یکپارچه کرد و بعداً BTCPay را برای پردازش مستقیم Trustless پذیرفت. از سال 2020، آن‌ها 73 میلیون دلار درآمد از Bitcoin تولید کرده‌اند که نشان‌دهنده تقاضای کاربران برای گزینه‌های پرداخت BTC است. همچنین در سال 2024 نسبت به 2023، افزایش 23 درصدی در درآمد به ازای هر کاربر داشته‌اند.