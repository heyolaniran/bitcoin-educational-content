description: |
  Namecheap интегрировала платежи Bitcoin в 2013 году, а позже приняла BTCPay для прямой обработки Trustless. С 2020 года они получили 73 миллиона долларов дохода от Bitcoin, что подчеркивает спрос пользователей на варианты оплаты в BTC. Кроме того, в 2024 году доход на одного пользователя увеличился на 23 % по сравнению с 2023 годом.
  