description: |
  NerdMiner یک ابزار آموزشی و سرگرم‌کننده است که به Bitcoin Mining اختصاص داده شده و بر اساس یک برد ESP-32 S3 ساخته شده است. اگرچه قدرت ASICهای حرفه‌ای را ندارد، اما به کاربران اجازه می‌دهد تا به طور ملموس بفهمند Mining چگونه کار می‌کند با مصرف برق تنها 0.5 وات. با اتصال به استخرهای Mining، شانس کمی برای استخراج یک بلاک ارائه می‌دهد در حالی که آمار را بر روی صفحه نمایش یکپارچه خود نشان می‌دهد. ایده‌آل برای علاقه‌مندان و کنجکاوان.