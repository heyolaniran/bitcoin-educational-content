description: |
  NerdMiner je edukativni i zabavni alat posvećen Bitcoin Mining, zasnovan na ESP-32 S3 ploči. Iako nema snagu profesionalnih ASIC-a, omogućava korisnicima da konkretno razumeju kako Mining funkcioniše sa električnom potrošnjom od samo 0,5 W. Povezan sa Mining bazenima, nudi minimalnu šansu za rudarenje bloka dok prikazuje statistike na svom integrisanom ekranu. Idealan za entuzijaste i radoznale.