description: |
  Fundada en 2014, NiceHash es el principal mercado de Hashrate del mundo y uno de los nombres más reconocidos en la industria de las criptomonedas. Como plataforma centrada en Bitcoin, NiceHash ofrece un ecosistema completo de Mining, Hashrate y soluciones de pago, con el objetivo de acelerar la adopción de Bitcoin en todo el mundo.
  