description: |
  Fundada em 2014, a NiceHash é o principal mercado Hashrate do mundo e um dos nomes mais reconhecidos na indústria de criptomoedas. Como uma plataforma focada no Bitcoin, a NiceHash fornece um ecossistema completo de Mining, Hashrate e soluções de pagamento, com o objetivo de acelerar a adoção do Bitcoin em todo o mundo.
  