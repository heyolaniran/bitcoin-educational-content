description: |
  Osnovan 2014. godine, NiceHash je vodeća Hashrate berza na svetu i jedno od najprepoznatljivijih imena u industriji kriptovaluta. Kao platforma fokusirana na Bitcoin, NiceHash pruža kompletan ekosistem Mining, Hashrate i rešenja za plaćanje, sa ciljem da ubrza usvajanje Bitcoin širom sveta.