description: |
  No Bullshit Bitcoin je nezávislý, čtenáři podporovaný zpravodajský web zaměřený výhradně na Bitcoin. Jako newsdesk "For Bitcoiners By Bitcoiner" si web klade za cíl být hodnotným zdrojem zpráv a aktualizací o Bitcoin, Nostru, technologiích svobody a dalších věcech. Platforma zveřejňuje bezobsažné aktualizace o softwaru, hardwaru, soukromí, bezpečnosti a vývoji v odvětví Bitcoin. Je to stránka určená pouze pro Bitcoin a je skvělou stránkou pro bitcoináře, kteří chtějí jen to nejnutnější.