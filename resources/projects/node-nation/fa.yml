description: |
  نود نیشن یک برنامه آموزشی است که از طریق Bitcoin، حاکمیت مالی را در میان دانش‌آموزان مدارس دولتی در السالوادور ترویج می‌کند. این برنامه به آن‌ها آموزش می‌دهد که چگونه نودهای Bitcoin و Lightning Network را با تمرکز فنی پیکربندی و مدیریت کنند.
  
  با رویکردی عملی و فنی، این پروژه هدف دارد تا دانش مربوط به Bitcoin و تمرکززدایی را از طریق نصب و مدیریت نودها منتقل کند. این برنامه توسط وزارت آموزش و پرورش، دفتر ملی Bitcoin و شبکه Plan B پشتیبانی می‌شود.
  
  نود نیشن هدفی بلندپروازانه و انقلابی دارد: نصب ۶,۰۰۰ نود Bitcoin در مدارس دولتی سراسر کشور، که یک نقطه عطف بی‌سابقه در پذیرش جهانی Bitcoin ایجاد می‌کند. این تلاش نه تنها به دنبال قرار دادن السالوادور به عنوان یک رهبر جهانی در حاکمیت مالی است، بلکه همچنین به آموزش نسل جدیدی از دانش‌آموزان در ابزارهای مورد نیاز برای مشارکت در انقلاب دیجیتال آینده می‌پردازد. با هر نودی که نصب می‌شود، دانش‌آموزان نه تنها یاد می‌گیرند که این فناوری را به خوبی فراگیرند، بلکه به نگهبانان قدرت غیرمتمرکز Bitcoin تبدیل می‌شوند.