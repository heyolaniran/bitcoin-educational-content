description: |
  Node Nation to program edukacyjny, który promuje suwerenność finansową poprzez Bitcoin wśród uczniów szkół publicznych w Salwadorze. Program uczy ich, jak konfigurować i zarządzać węzłami Bitcoin i Lightning Network z naciskiem na kwestie techniczne.
  
  Dzięki praktycznemu i technicznemu podejściu projekt ma na celu przekazanie wiedzy na temat Bitcoin i decentralizacji poprzez instalację i zarządzanie węzłami. Projekt jest wspierany przez Ministerstwo Edukacji, Krajowe Biuro Bitcoin i Plan B Network.
  
  Node Nation ma ambitny i rewolucyjny cel: zainstalować 6000 węzłów Bitcoin w szkołach publicznych w całym kraju, ustanawiając bezprecedensowy kamień milowy w globalnej adopcji Bitcoin. Wysiłek ten ma na celu nie tylko pozycjonowanie Salwadoru jako światowego lidera w zakresie suwerenności finansowej, ale także przeszkolenie nowego pokolenia uczniów w zakresie narzędzi potrzebnych do udziału w cyfrowej rewolucji przyszłości. Z każdym zainstalowanym węzłem studenci nie tylko nauczą się opanowywać tę technologię, ale także staną się opiekunami zdecentralizowanej mocy Bitcoin.
  