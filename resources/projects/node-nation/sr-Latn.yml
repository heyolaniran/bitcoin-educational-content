description: |
  Node Nation je obrazovni program koji promoviše finansijski suverenitet kroz Bitcoin među učenicima u javnim školama u El Salvadoru. Program ih uči kako da konfigurišu i upravljaju Bitcoin i Lightning Network čvorovima sa tehničkim fokusom.
  
  Sa praktičnim i tehničkim pristupom, projekat ima za cilj da prenese znanje o Bitcoin i decentralizaciji kroz instalaciju i upravljanje čvorovima. Podržan je od strane Ministarstva obrazovanja, Nacionalne kancelarije za Bitcoin i Plan B mreže.
  
  Node Nation ima ambiciozan i revolucionaran cilj: da instalira 6,000 Bitcoin čvorova u javnim školama širom zemlje, postavljajući neviđeni prekretnicu u globalnom usvajanju Bitcoin. Ovaj napor ne samo da nastoji da pozicionira El Salvador kao svetskog lidera u finansijskom suverenitetu, već i da obuči novu generaciju učenika u alatima potrebnim za učešće u digitalnoj revoluciji budućnosti. Sa svakim instaliranim čvorom, učenici će ne samo naučiti da ovladaju ovom tehnologijom već će postati i čuvari decentralizovane moći Bitcoin.