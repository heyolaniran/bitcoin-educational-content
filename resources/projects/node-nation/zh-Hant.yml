description: |
  Node Nation 是一項教育計畫，透過 Bitcoin 在薩爾瓦多公立學校的學生中推廣金融主權。該計畫以技術為重點，教導他們如何設定和管理 Bitcoin 及 Lightning Network 節點。
  
  本計畫採用實務和技術方法，旨在透過安裝和管理節點，傳授 Bitcoin 和分散化的相關知識。該計劃獲得教育部、國家 Bitcoin 辦公室和 Plan B Network 的支持。
  
  Node Nation 有著宏大且革命性的目標：在全國公立學校安裝 6,000 個 Bitcoin 節點，為全球 Bitcoin 的採用樹立前所未有的里程碑。這項努力不僅要將薩爾瓦多定位為金融主權的世界領導者，也要訓練新一代學生掌握參與未來數位革命所需的工具。每安裝一個節點，學生不僅能學習掌握這項技術，還能成為 Bitcoin 分散式力量的保管人。
  