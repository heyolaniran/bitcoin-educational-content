description: |
  Nodl یک شرکت است که راه‌حل‌های زیرساختی برای افراد و کسب‌وکارها ارائه می‌دهد تا کنترل داده‌ها و پرداخت‌های خود را بازپس گیرند.
  
  آن‌ها نودهای سفارشی‌سازی‌شده و زیرساخت ابری ارائه می‌دهند که به کاربران اجازه می‌دهد عملیات Bitcoin و Lightning Network خود را مدیریت کنند. با nodl، کاربران کنترل کامل بر داده‌های شخصی خود دارند و می‌توانند پرداخت‌های مستقیم را بدون واسطه یا هزینه بپذیرند. محصولات آن‌ها به گونه‌ای طراحی شده‌اند که کاربرپسند، امن و متمرکز بر حریم خصوصی باشند، با ویژگی‌هایی مانند رمزگذاری کامل دیسک و کلیدهای قطع فیزیکی. nodl از سال ۲۰۱۸ فعالیت می‌کند و شهرت قوی‌ای در صنعت دارد.