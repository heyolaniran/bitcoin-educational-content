description: |
  Noones ist eine Peer-to-Peer-Plattform, die im Jahr 2023 ins Leben gerufen wurde und es den Nutzern ermöglicht, Bitcoin zu kaufen, zu verkaufen und auszugeben, wobei über 450 Zahlungsmöglichkeiten zur Verfügung stehen. Sie bietet eine Wallet, eine virtuelle Visa-Karte, und konzentriert sich auf den globalen Süden.