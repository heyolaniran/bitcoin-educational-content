description: |
  नून्स एक पीयर-टू-पीयर प्लेटफ़ॉर्म है जिसे 2023 में लॉन्च किया गया है जो उपयोगकर्ताओं को 450 से ज़्यादा भुगतान विधियों का उपयोग करके Bitcoin खरीदने, बेचने और खर्च करने की सुविधा देता है। यह Wallet, एक वर्चुअल वीज़ा कार्ड प्रदान करता है, और ग्लोबल साउथ की सेवा पर ध्यान केंद्रित करता है।