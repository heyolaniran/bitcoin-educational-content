description: |
  Noones adalah platform peer-to-peer yang diluncurkan pada tahun 2023 yang memungkinkan pengguna membeli, menjual, dan membelanjakan Bitcoin menggunakan lebih dari 450 metode pembayaran. Platform ini menawarkan Wallet, kartu Visa virtual, dan berfokus untuk melayani negara-negara di belahan dunia selatan.