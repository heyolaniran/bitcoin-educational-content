description: |
  Nunchuk یک شرکت متخصص در امنیت Bitcoin است که تیمی کاملاً توزیع‌شده در سراسر جهان دارد. این شرکت یک Bitcoin Wallet متمرکز بر مدیریت چندامضایی (Multisig) توسعه می‌دهد که امکان ذخیره‌سازی امن و ساده وجوه را فراهم می‌کند. Nunchuk راه‌حل‌های عملی برای افراد، خانواده‌ها و مشاوران، به‌ویژه در برنامه‌ریزی املاک Bitcoin ارائه می‌دهد. هدف آن این است که نگهداری Multisig را برای همه قابل دسترس کند.