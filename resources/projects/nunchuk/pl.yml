description: |
  Nunchuk to firma specjalizująca się w bezpieczeństwie Bitcoin, z w pełni rozproszonym zespołem na całym świecie. Rozwija Bitcoin Wallet skoncentrowany na zarządzaniu wieloma podpisami (Multisig), umożliwiając bezpieczne i uproszczone przechowywanie funduszy. Nunchuk zapewnia praktyczne rozwiązania dla osób fizycznych, rodzin i doradców, w szczególności w zakresie planowania nieruchomości Bitcoin. Jej celem jest uczynienie Multisig dostępnym dla każdego.
  