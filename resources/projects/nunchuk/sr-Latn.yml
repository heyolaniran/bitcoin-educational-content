description: |
  Nunchuk je kompanija specijalizovana za Bitcoin sigurnost, sa potpuno distribuiranim timom širom sveta. Razvija Bitcoin Wallet fokusiran na upravljanje multisignature (Multisig), omogućavajući sigurno i pojednostavljeno skladištenje sredstava. Nunchuk pruža praktična rešenja za pojedince, porodice i savetnike, posebno u Bitcoin planiranju nasledstva. Njegov cilj je da Multisig čuvanje učini dostupnim svima.