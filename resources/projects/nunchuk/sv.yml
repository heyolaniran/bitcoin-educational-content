description: |
  Nunchuk är ett företag som specialiserar sig på Bitcoin-säkerhet, med ett helt distribuerat team över hela världen. Företaget utvecklar en Bitcoin Wallet med fokus på multisignaturhantering (Multisig), vilket möjliggör säker och förenklad fondlagring. Nunchuk tillhandahåller praktiska lösningar för individer, familjer och rådgivare, särskilt inom Bitcoin-egendomsplanering. Målet är att göra Multisig-förvaring tillgänglig för alla.
  