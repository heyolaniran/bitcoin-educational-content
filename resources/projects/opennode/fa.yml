description: |
  اوپن‌نود یک پلتفرم پرداخت Bitcoin است که هدف آن توانمندسازی جهان با Bitcoin است و معتقد است که این آینده پرداخت‌های دیجیتال جهانی است.
  
  این شرکت فناوری پرداخت امن، مقیاس‌پذیر و قابل‌اعتمادی ارائه می‌دهد که به کسب‌وکارها اجازه می‌دهد پرداخت‌های Bitcoin را بپذیرند یا پرداخت‌های Bitcoin را ارسال کنند. اوپن‌نود که در حال حاضر در بیش از 120 کشور فعالیت می‌کند، متعهد به ساخت زیرساخت برای آینده پول و کمک به همه برای مشارکت در اقتصاد رو به رشد Bitcoin است.