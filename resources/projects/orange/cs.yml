description: |
  Orange je fintechová společnost zaměřená na rychlé a levné přeshraniční platby, postavená na platformě Bitcoin Lightning Network.  Nabízí jednotné rozhraní API, které umožňuje fintechům, finančním institucím a platformám pro převody peněz posílat a přijímat peníze okamžitě, bez nutnosti předběžného financování. Orange podporuje zúčtování v Bitcoin, místních fiat měnách a mobilních penězích.