description: |
  Orange ist ein Fintech-Unternehmen, das sich auf schnelle, kostengünstige grenzüberschreitende Zahlungen konzentriert und auf dem Bitcoin Lightning Network aufbaut.  Es bietet eine einzige API, die es Fintechs, Finanzinstituten und Geldtransferplattformen ermöglicht, Geld sofort zu senden und zu empfangen, ohne dass eine Vorfinanzierung erforderlich ist. Orange unterstützt Abrechnungen in Bitcoin, lokalen Fiat-Währungen und mobilem Geld.