description: |
  Orange es una empresa fintech centrada en pagos transfronterizos rápidos y de bajo coste, construida sobre la Bitcoin Lightning Network.  Ofrece una API única que permite a las empresas de tecnología financiera, las instituciones financieras y las plataformas de transferencia de dinero enviar y recibir dinero al instante, sin necesidad de prefinanciación. Orange admite liquidaciones en Bitcoin, monedas fiduciarias locales y dinero móvil.