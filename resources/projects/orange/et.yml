description: |
  Orange on fintech-ettevõte, mis on keskendunud kiiretele ja odavatele piiriülestele maksetele, mis põhinevad Bitcoin Lightning Network-l.  See pakub ühtset API-d, mis võimaldab fintech-ettevõtetel, finantsasutustel ja rahaülekandeplatvormidel saata ja vastu võtta raha koheselt, ilma et oleks vaja eelrahastamist. Orange toetab arveldusi Bitcoin-s, kohalikes fiat-valuutades ja mobiilimaksetes.