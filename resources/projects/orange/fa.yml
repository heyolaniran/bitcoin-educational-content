description: |
  اورنج یک شرکت فین‌تک است که بر روی پرداخت‌های سریع و کم‌هزینه بین‌المللی تمرکز دارد و بر پایه Bitcoin Lightning Network ساخته شده است. این شرکت یک API واحد ارائه می‌دهد که به فین‌تک‌ها، مؤسسات مالی و پلتفرم‌های انتقال پول اجازه می‌دهد تا بدون نیاز به پیش‌پرداخت، پول را به صورت فوری ارسال و دریافت کنند. اورنج از تسویه‌حساب‌ها در Bitcoin، ارزهای فیات محلی و پول موبایلی پشتیبانی می‌کند.