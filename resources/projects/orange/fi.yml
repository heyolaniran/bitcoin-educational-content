description: |
  Orange on fintech-yritys, joka on keskittynyt nopeisiin ja edullisiin rajatylittäviin maksuihin, ja se on rakennettu Bitcoin Lightning Network:n varaan.  Se tarjoaa yhden API:n, jonka avulla fintech-yritykset, rahoituslaitokset ja rahansiirtoalustat voivat lähettää ja vastaanottaa rahaa välittömästi ilman ennakkorahoitusta. Orange tukee maksuja Bitcoin:ssä, paikallisissa fiat-valuutoissa ja mobiilirahassa.