description: |
  Orange est une société fintech axée sur les paiements transfrontaliers rapides et peu coûteux, fondée sur le Bitcoin Lightning Network.  Elle offre une API unique qui permet aux fintechs, aux institutions financières et aux plateformes de transfert d'argent d'envoyer et de recevoir de l'argent instantanément, sans besoin de préfinancement. Orange prend en charge les règlements en Bitcoin, les monnaies fiduciaires locales et l'argent mobile.