description: |
  Orange adalah perusahaan fintech yang berfokus pada pembayaran lintas batas yang cepat dan berbiaya rendah, yang dibangun di atas Bitcoin Lightning Network.  Perusahaan ini menawarkan API tunggal yang memungkinkan fintech, lembaga keuangan, dan platform pengiriman uang untuk mengirim dan menerima uang secara instan, tanpa perlu pra-pendanaan. Orange mendukung penyelesaian dalam Bitcoin, mata uang fiat lokal, dan uang seluler.