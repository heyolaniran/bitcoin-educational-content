description: |
  Orange è un'azienda fintech focalizzata sui pagamenti transfrontalieri veloci e a basso costo, costruita sul Bitcoin Lightning Network.  Offre un'unica API che consente a fintech, istituzioni finanziarie e piattaforme di trasferimento di denaro di inviare e ricevere denaro istantaneamente, senza necessità di prefinanziamento. Orange supporta i pagamenti in Bitcoin, valute fiat locali e denaro mobile.