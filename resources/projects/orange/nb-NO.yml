description: |
  Orange er et fintech-selskap med fokus på raske, rimelige betalinger over landegrensene, bygget på Bitcoin Lightning Network.  Det tilbyr et enkelt API som gjør det mulig for fintech-aktører, finansinstitusjoner og pengeoverføringsplattformer å sende og motta penger umiddelbart, uten behov for forhåndsfinansiering. Orange støtter oppgjør i Bitcoin, lokale fiat-valutaer og mobilpenger.