description: |
  Orange to firma fintech skupiająca się na szybkich, tanich płatnościach transgranicznych, zbudowana na Bitcoin Lightning Network.  Oferuje pojedynczy interfejs API, który umożliwia fintechom, instytucjom finansowym i platformom przekazów pieniężnych natychmiastowe wysyłanie i odbieranie pieniędzy, bez konieczności wstępnego finansowania. Orange obsługuje rozliczenia w Bitcoin, lokalnych walutach fiducjarnych i pieniądzach mobilnych.