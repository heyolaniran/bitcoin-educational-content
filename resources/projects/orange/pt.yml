description: |
  A Orange é uma empresa de fintech focada em pagamentos transfronteiriços rápidos e de baixo custo, construída sobre o Bitcoin Lightning Network.  Oferece uma API única que permite que fintechs, instituições financeiras e plataformas de transferência de dinheiro enviem e recebam dinheiro instantaneamente, sem necessidade de pré-financiamento. A Orange suporta liquidações em Bitcoin, moedas fiduciárias locais e dinheiro móvel.