description: |
  Orange - финтех-компания, специализирующаяся на быстрых и недорогих трансграничных платежах, построенная на базе Bitcoin Lightning Network.  Она предлагает единый API, позволяющий финтех-компаниям, финансовым учреждениям и платформам денежных переводов отправлять и получать деньги мгновенно, без необходимости предварительного финансирования. Orange поддерживает расчеты в Bitcoin, местных фиатных валютах и мобильных деньгах.