description: |
  Orange je fintech kompanija fokusirana na brza, niskotarifna prekogranična plaćanja, izgrađena na Bitcoin Lightning Network. Nudi jedinstveni API koji omogućava fintech kompanijama, finansijskim institucijama i platformama za transfer novca da šalju i primaju novac trenutno, bez potrebe za prethodnim finansiranjem. Orange podržava poravnanja u Bitcoin, lokalnim fiat valutama i mobilnom novcu.