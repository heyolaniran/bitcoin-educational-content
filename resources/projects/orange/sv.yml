description: |
  Orange är ett fintechbolag med fokus på snabba, billiga gränsöverskridande betalningar, byggt på Bitcoin Lightning Network.  Det erbjuder ett enda API som gör det möjligt för fintechs, finansinstitut och penningöverföringsplattformar att skicka och ta emot pengar direkt, utan behov av förfinansiering. Orange stöder avveckling i Bitcoin, lokala fiatvalutor och mobila pengar.