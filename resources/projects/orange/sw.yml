description: |
  Orange ni kampuni ya fintech inayolenga malipo ya haraka, ya gharama nafuu ya kuvuka mipaka, iliyojengwa kwenye Bitcoin Lightning Network.  Inatoa API moja ambayo inaruhusu fintechs, taasisi za fedha na mifumo ya kuhamisha pesa kutuma na kupokea pesa papo hapo, bila kuhitaji ufadhili wa mapema. Rangi ya chungwa inasaidia malipo katika Bitcoin, sarafu za ndani za nchi na pesa za rununu. 