description: |
  Orange là một công ty công nghệ tài chính tập trung vào các khoản thanh toán xuyên biên giới nhanh chóng, chi phí thấp, được xây dựng trên Bitcoin Lightning Network. Công ty cung cấp một API duy nhất cho phép các công ty công nghệ tài chính, tổ chức tài chính và nền tảng chuyển tiền gửi và nhận tiền ngay lập tức mà không cần phải nạp tiền trước. Orange hỗ trợ thanh toán bằng Bitcoin, tiền tệ fiat địa phương và tiền di động.