description: |
  OSMO poskytuje finanční řešení v Guatemale, Mexiku, Kostarice a brzy i v Salvadoru, přičemž v backendu využívá Bitcoin, aniž by uživatelé museli přímo nakládat s BTC. Zákazníci drží a posílají fiat, zatímco OSMO převádí na Bitcoin a z Bitcoin. Díky tomuto přístupu jsou přeshraniční transakce rychlejší a levnější než tradiční bankovní převody.
  