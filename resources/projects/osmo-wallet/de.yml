description: |
  OSMO bietet Finanzlösungen in Guatemala, Mexiko, Costa Rica und bald auch in El Salvador an, wobei Bitcoin im Backend verwendet wird, ohne dass die Nutzer direkt mit BTC umgehen müssen. Kunden halten und senden Fiat, während OSMO in und aus Bitcoin konvertiert. Dieser Ansatz macht grenzüberschreitende Transaktionen schneller und billiger als herkömmliche Banküberweisungen.
  