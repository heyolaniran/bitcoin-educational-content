description: |
  OSMO ofrece soluciones financieras en Guatemala, México, Costa Rica y pronto El Salvador, utilizando Bitcoin en el backend sin que los usuarios necesiten manejar BTC directamente. Los clientes retienen y envían dinero fiduciario mientras OSMO convierte a y desde Bitcoin. Este enfoque hace que las transacciones transfronterizas sean más rápidas y baratas que las transferencias bancarias tradicionales.
  