description: |
  OSMO pakub finantslahendusi Guatemalas, Mehhikos, Costa Ricas ja peagi ka El Salvadoris, kasutades Bitcoin taustalahendust, ilma et kasutajad peaksid otse BTC-d käitlema. Kliendid hoiavad ja saadavad fiat'i, samal ajal kui OSMO konverteerib Bitcoin-sse ja Bitcoin-st. Selline lähenemisviis muudab piiriülesed tehingud kiiremaks ja odavamaks kui traditsioonilised pangaülekanded.
  