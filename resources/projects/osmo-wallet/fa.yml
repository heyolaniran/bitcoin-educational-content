description: |
  OSMO راه‌حل‌های مالی را در گواتمالا، مکزیک، کاستاریکا و به‌زودی السالوادور ارائه می‌دهد و از Bitcoin در بخش پشتیبان استفاده می‌کند بدون اینکه کاربران نیاز به مدیریت مستقیم BTC داشته باشند. مشتریان ارز فیات را نگه‌داری و ارسال می‌کنند در حالی که OSMO به Bitcoin تبدیل می‌کند و بالعکس. این رویکرد تراکنش‌های برون‌مرزی را سریع‌تر و ارزان‌تر از انتقالات بانکی سنتی می‌سازد.