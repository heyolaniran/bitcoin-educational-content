description: |
  OSMO tarjoaa rahoitusratkaisuja Guatemalassa, Meksikossa, Costa Ricassa ja pian myös El Salvadorissa käyttämällä Bitcoin:ta backendissä ilman, että käyttäjien tarvitsee käsitellä BTC:tä suoraan. Asiakkaat pitävät hallussaan ja lähettävät fiat-rahaa, kun OSMO muuntaa Bitcoin:ksi ja Bitcoin:sta. Tämä lähestymistapa tekee rajatylittävistä liiketoimista nopeampia ja halvempia kuin perinteiset pankkisiirrot.
  