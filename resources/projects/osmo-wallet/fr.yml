description: |
  OSMO fournit des solutions financières au Guatemala, au Mexique, au Costa Rica et bientôt au Salvador, en utilisant le Bitcoin dans le backend sans que les utilisateurs aient besoin de manipuler directement le BTC. Les clients détiennent et envoient des devises pendant qu'OSMO les convertit en Bitcoin. Cette approche rend les transactions transfrontalières plus rapides et moins chères que les transferts bancaires traditionnels.
  