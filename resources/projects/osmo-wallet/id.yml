description: |
  OSMO menyediakan solusi keuangan di Guatemala, Meksiko, Kosta Rika, dan sebentar lagi El Salvador, menggunakan Bitcoin di backend tanpa pengguna perlu menangani BTC secara langsung. Pelanggan menyimpan dan mengirim fiat sementara OSMO mengonversi ke dan dari Bitcoin. Pendekatan ini membuat transaksi lintas batas menjadi lebih cepat dan lebih murah daripada transfer bank tradisional.
  