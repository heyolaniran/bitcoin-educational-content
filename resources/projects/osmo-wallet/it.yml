description: |
  OSMO fornisce soluzioni finanziarie in Guatemala, Messico, Costa Rica e presto anche in El Salvador, utilizzando Bitcoin nel backend senza che gli utenti debbano gestire direttamente BTC. I clienti detengono e inviano fiat mentre OSMO converte in e da Bitcoin. Questo approccio rende le transazioni transfrontaliere più veloci ed economiche rispetto ai tradizionali trasferimenti bancari.
  