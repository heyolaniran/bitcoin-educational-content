description: |
  OSMO tilbyr finansielle løsninger i Guatemala, Mexico, Costa Rica og snart El Salvador, ved hjelp av Bitcoin i backend uten at brukerne trenger å håndtere BTC direkte. Kundene oppbevarer og sender fiat, mens OSMO konverterer til og fra Bitcoin. Denne tilnærmingen gjør transaksjoner over landegrensene raskere og billigere enn tradisjonelle bankoverføringer.
  