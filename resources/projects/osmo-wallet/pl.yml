description: |
  OSMO zapewnia rozwiązania finansowe w Gwatemali, Meksyku, Kostaryce, a wkrótce także w Salwadorze, wykorzystując Bitcoin w backendzie bez konieczności bezpośredniej obsługi BTC przez użytkowników. Klienci przechowują i wysyłają fiat, podczas gdy OSMO konwertuje do i z Bitcoin. Takie podejście sprawia, że transakcje transgraniczne są szybsze i tańsze niż tradycyjne przelewy bankowe.
  