description: |
  A OSMO fornece soluções financeiras na Guatemala, México, Costa Rica e, em breve, em El Salvador, utilizando o Bitcoin no backend sem que os utilizadores precisem de lidar diretamente com o BTC. Os clientes mantêm e enviam moeda fiduciária enquanto a OSMO converte de e para Bitcoin. Esta abordagem torna as transacções transfronteiriças mais rápidas e mais baratas do que as transferências bancárias tradicionais.
  