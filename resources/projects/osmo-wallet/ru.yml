description: |
  OSMO предоставляет финансовые решения в Гватемале, Мексике, Коста-Рике и вскоре в Сальвадоре, используя Bitcoin в бэкенде без необходимости напрямую работать с BTC. Клиенты хранят и отправляют фиатные деньги, а OSMO конвертирует их в Bitcoin и обратно. Такой подход делает трансграничные транзакции быстрее и дешевле, чем традиционные банковские переводы.
  