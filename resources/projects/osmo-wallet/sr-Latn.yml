description: |
  OSMO pruža finansijska rešenja u Gvatemali, Meksiku, Kostariki, a uskoro i u El Salvadoru, koristeći Bitcoin u pozadini bez potrebe da korisnici direktno rukuju BTC-om. Korisnici drže i šalju fiat dok OSMO konvertuje u i iz Bitcoin. Ovaj pristup čini prekogranične transakcije bržim i jeftinijim od tradicionalnih bankovnih transfera.