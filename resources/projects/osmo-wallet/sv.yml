description: |
  OSMO tillhandahåller finansiella lösningar i Guatemala, Mexiko, Costa Rica och snart El Salvador, med Bitcoin i backend utan att användarna behöver hantera BTC direkt. Kunderna håller och skickar fiat medan OSMO konverterar till och från Bitcoin. Detta tillvägagångssätt gör gränsöverskridande transaktioner snabbare och billigare än traditionella banköverföringar.
  