description: |
  OSMO hutoa masuluhisho ya kifedha nchini Guatemala, Meksiko, Kosta Rika, na hivi karibuni El Salvador, kwa kutumia Bitcoin upande wa nyuma bila watumiaji kuhitaji kushughulikia BTC moja kwa moja. Wateja hushikilia na kutuma fiat huku OSMO ikibadilisha kwenda na kutoka Bitcoin. Mbinu hii hufanya miamala ya kuvuka mpaka kwa haraka na nafuu kuliko uhamishaji wa benki wa jadi.
  