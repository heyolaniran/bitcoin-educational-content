description: |
  Ja sam Loïc Morel, pisac i savetnik za Bitcoin. Autor sam preko stotinu tehničkih članaka o Bitcoin na francuskom, od kojih su neki postali referentni, kao što je moj rad na BIP-47 preveden na nekoliko jezika. Takođe sam autor Bitcoin Rečnika, referentnog dela koje sadrži definicije svih tehničkih termina vezanih za Bitcoin i njegov ekosistem. Napisao sam i e-knjige Bitcoin i Kriptografija i The Bitcoin Wallet. Svi moji tehnički radovi su besplatni i pod slobodnom licencom.