description: |
  پیمیوم یک پلتفرم Bitcoin Exchange مستقر در پاریس، فرانسه است.
  
  این شرکت که در سال ۲۰۱۱ تأسیس شده است، خدماتی را برای افراد و حرفه‌ای‌ها ارائه می‌دهد، با ابزارهایی برای سرمایه‌گذاری بلندمدت و معاملات با حجم بالا. پیمیوم توسط سازمان بازارهای مالی فرانسه به رسمیت شناخته شده و متعهد به تضمین امنیت وجوه مشتریان خود است، به طوری که ۹۹٪ از وجوه در ذخیره‌سازی Cold نگهداری می‌شود. این پلتفرم از معاملات Bitcoin پشتیبانی می‌کند و پشتیبانی به زبان‌های فرانسوی و انگلیسی ارائه می‌دهد.