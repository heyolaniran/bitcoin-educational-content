description: |
  Paymium पेरिस, फ्रांस में स्थित एक Bitcoin Exchange प्लेटफ़ॉर्म है। 
  
  2011 में स्थापित, यह व्यक्तियों और पेशेवरों दोनों के लिए सेवाएँ प्रदान करता है, जिसमें दीर्घकालिक निवेश और उच्च-मात्रा वाले लेनदेन के लिए उपकरण हैं। Paymium को फ्रेंच वित्तीय बाजार प्राधिकरण द्वारा मान्यता प्राप्त है और यह अपने ग्राहकों के फंड की सुरक्षा सुनिश्चित करने के लिए प्रतिबद्ध है, जिसका 99% Cold स्टोरेज में संग्रहीत है। यह Bitcoin लेनदेन का समर्थन करता है और फ्रेंच और अंग्रेजी दोनों में सहायता प्रदान करता है।