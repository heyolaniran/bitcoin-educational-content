description: |
  Paymium to platforma Bitcoin Exchange z siedzibą w Paryżu we Francji.
  
  Założona w 2011 roku, świadczy usługi zarówno dla osób fizycznych, jak i profesjonalistów, oferując narzędzia do długoterminowego inwestowania i transakcji o dużym wolumenie. Paymium jest uznawana przez Francuski Urząd Nadzoru Rynków Finansowych i zobowiązuje się do zapewnienia bezpieczeństwa środków swoich klientów, z 99% przechowywanymi w Cold. Obsługuje transakcje Bitcoin i oferuje wsparcie w języku francuskim i angielskim.