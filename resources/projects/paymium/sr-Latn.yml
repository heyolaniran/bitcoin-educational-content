description: |
  Paymium je Bitcoin Exchange platforma sa sedištem u Parizu, Francuska.
  
  Osnovana 2011. godine, pruža usluge kako pojedincima tako i profesionalcima, sa alatima za dugoročno investiranje i transakcije velikog obima. Paymium je priznat od strane Francuske uprave za finansijska tržišta i posvećen je obezbeđivanju sigurnosti sredstava svojih klijenata, sa 99% sredstava pohranjenih u Cold skladištu. Podržava Bitcoin transakcije i nudi podršku na francuskom i engleskom jeziku.