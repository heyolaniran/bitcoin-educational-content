description: |
  Paymium är en Bitcoin Exchange-plattform baserad i Paris, Frankrike.
  
  Den grundades 2011 och tillhandahåller tjänster för både privatpersoner och yrkesverksamma, med verktyg för långsiktiga investeringar och transaktioner med stora volymer. Paymium är erkänt av den franska finansmarknadsmyndigheten och har åtagit sig att garantera säkerheten för sina kunders medel, med 99% lagrade i Cold-lagring. De stöder Bitcoin-transaktioner och erbjuder support på både franska och engelska.