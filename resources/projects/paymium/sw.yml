description: |
  Paymium ni jukwaa la Bitcoin Exchange lililo mjini Paris, Ufaransa. 
  
  Ilianzishwa mwaka wa 2011, inatoa huduma kwa watu binafsi na wataalamu, na zana za uwekezaji wa muda mrefu na shughuli za juu. Paymium inatambuliwa na Mamlaka ya Masoko ya Fedha ya Ufaransa na imejitolea kuhakikisha usalama wa fedha za wateja wake, huku 99% ikihifadhiwa katika hifadhi ya Cold. Inaauni shughuli za Bitcoin na inatoa usaidizi katika Kifaransa na Kiingereza.