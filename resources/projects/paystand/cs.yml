description: |
  Cílem Paystand.org je podpořit finanční začleňování prostřednictvím technologie Bitcoin a Blockchain. Věříme, že otevřenějšího a spravedlivějšího finančního systému dosáhneme urychlením růstu oběhového hospodářství umožněného prostřednictvím vybraných organizací v rozvíjejících se a nedostatečně zastoupených komunitách.
  