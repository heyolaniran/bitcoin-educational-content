description: |
  Paystand.org zielt darauf ab, die finanzielle Eingliederung durch den Einsatz von Bitcoin- und Blockchain-Technologie zu fördern. Wir glauben, dass wir ein offeneres und gerechteres Finanzsystem erreichen können, indem wir das Wachstum von Kreislaufwirtschaften beschleunigen, die durch ausgewählte Organisationen in aufstrebenden und unterrepräsentierten Gemeinschaften ermöglicht werden.
  