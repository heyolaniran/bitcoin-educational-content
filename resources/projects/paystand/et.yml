description: |
  Paystand.org eesmärk on edendada rahalist kaasatust Bitcoin ja Blockchain tehnoloogia kasutamise kaudu. Usume, et saame saavutada avatuma ja õiglasema finantssüsteemi, kiirendades ringmajanduse kasvu, mida võimaldavad valitud organisatsioonid tärkava turumajandusega ja alaesindatud kogukondades.
  