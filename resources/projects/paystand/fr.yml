description: |
  Paystand.org vise à favoriser l'inclusion financière grâce à l'utilisation des technologies Bitcoin et Blockchain. Nous pensons que nous pouvons parvenir à un système financier plus ouvert et plus équitable en accélérant la croissance des économies circulaires grâce à des organisations sélectionnées dans les communautés émergentes et sous-représentées.
  