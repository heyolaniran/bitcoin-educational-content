description: |
  Paystand.org bertujuan untuk memajukan inklusi keuangan melalui penggunaan teknologi Bitcoin dan Blockchain. Kami percaya bahwa kami dapat mencapai sistem keuangan yang lebih terbuka dan adil dengan mempercepat pertumbuhan ekonomi sirkular yang dimungkinkan melalui organisasi-organisasi terpilih di komunitas-komunitas yang sedang berkembang dan kurang terwakili.
  