description: |
  Paystand.org har som mål å fremme økonomisk inkludering gjennom bruk av Bitcoin- og Blockchain-teknologi. Vi tror vi kan oppnå et mer åpent og rettferdig finansielt system ved å akselerere veksten av sirkulære økonomier som muliggjøres gjennom utvalgte organisasjoner i fremvoksende og underrepresenterte samfunn.
  