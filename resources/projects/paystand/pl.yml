description: |
  Paystand.org ma na celu zwiększenie integracji finansowej poprzez wykorzystanie technologii Bitcoin i Blockchain. Wierzymy, że możemy osiągnąć bardziej otwarty i sprawiedliwy system finansowy, przyspieszając rozwój gospodarek o obiegu zamkniętym za pośrednictwem wybranych organizacji w społecznościach wschodzących i niedostatecznie reprezentowanych.
  