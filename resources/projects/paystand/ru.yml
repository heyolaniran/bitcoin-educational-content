description: |
  Цель Paystand.org - способствовать расширению финансовой доступности за счет использования технологий Bitcoin и Blockchain. Мы считаем, что можем создать более открытую и справедливую финансовую систему, ускорив рост циркулярной экономики с помощью отдельных организаций в развивающихся и недопредставленных сообществах.
  