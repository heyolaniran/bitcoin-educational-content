description: |
  Paystand.org ima za cilj da unapredi finansijsku inkluziju kroz korišćenje Bitcoin i Blockchain tehnologije. Verujemo da možemo postići otvoreniji i pravičniji finansijski sistem ubrzavanjem rasta cirkularnih ekonomija omogućenih kroz odabrane organizacije u zajednicama u razvoju i nedovoljno zastupljenim zajednicama.