description: |
  Paystand.org syftar till att främja finansiell inkludering genom användning av Bitcoin- och Blockchain-teknik. Vi tror att vi kan uppnå ett mer öppet och rättvist finansiellt system genom att påskynda tillväxten av cirkulära ekonomier som möjliggörs genom utvalda organisationer i framväxande och underrepresenterade samhällen.
  