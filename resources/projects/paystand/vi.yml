description: |
  Paystand.org hướng đến mục tiêu thúc đẩy sự hòa nhập tài chính thông qua việc sử dụng công nghệ Bitcoin và Blockchain. Chúng tôi tin rằng chúng tôi có thể đạt được một hệ thống tài chính cởi mở và công bằng hơn bằng cách đẩy nhanh sự phát triển của các nền kinh tế tuần hoàn được hỗ trợ thông qua các tổ chức được lựa chọn trong các cộng đồng mới nổi và chưa được đại diện đầy đủ.
  
  