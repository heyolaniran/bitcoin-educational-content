description: |
  هلو یک برنامه موبایل است که به عنوان یک پلتفرم همتا به همتا برای خرید و فروش Bitcoin عمل می‌کند.
  
  این برنامه به کاربران امکان می‌دهد تا در هر زمان و مکانی با استفاده از روش پرداخت مورد نظر خود معامله کنند. برنامه به کاربران قدرت می‌دهد تا قیمت‌های خود را برای معاملات تعیین کنند، که این امر بازتاب‌دهنده‌ی ماهیت واقعی یک بازار همتا به همتا است. مهم‌تر از همه، هلو امکان معاملات بدون KYC (شناخت مشتری) را فراهم می‌کند و جنبه‌های اساسی حریم خصوصی Bitcoin را حفظ می‌کند. اصول شرکت از اعتقاد به Bitcoin به عنوان سخت‌ترین شکل پولی که تاکنون وجود داشته، نشأت می‌گیرد و مأموریت آن این است که آن را بدون هیچ‌گونه مصالحه‌ای در دسترس همه قرار دهد.