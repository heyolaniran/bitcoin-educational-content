description: |
  Peach är en mobilapplikation som fungerar som en peer-to-peer-plattform för köp och försäljning av Bitcoin.
  
  Den gör det möjligt för användare att göra transaktioner var som helst, när som helst och med den betalningsmetod de föredrar. Applikationen ger användarna möjlighet att sätta sina egna priser för transaktioner, vilket återspeglar den sanna naturen hos en peer-to-peer-marknad. Det är viktigt att Peach möjliggör KYC-fria (Know Your Customer) transaktioner, vilket upprätthåller de grundläggande integritetsaspekterna av Bitcoin. Företagets etos härrör från en tro på Bitcoin som den svåraste formen av pengar som någonsin har existerat, med ett uppdrag att göra den tillgänglig för alla utan kompromisser.