description: |
  من قبلاً دلقک کلاس بودم که به دنبال خنده به هزینه‌ی اقتدار جلوی کلاس بودم. بیشتر کارهایم واقعاً درباره‌ی ترکیب آثار هنری موجود یا ساختن ترکیب‌هاست. بنابراین این ترکیب به نظر می‌رسد که به نوعی طنز منجر شده که به کنترل بدبینی من کمک می‌کند و شاید دیگران را در این مسیر سرگرم یا آموزش دهد.