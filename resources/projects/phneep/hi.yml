description: |
  मैं कक्षा में जोकर की तरह काम करता था, जो कक्षा में सबसे आगे बैठे अधिकारी की कीमत पर हंसी-मजाक करता था। मेरा ज़्यादातर काम असल में मौजूदा कलाकृतियों को मिलाना या उनका मिश्रण बनाना होता है। तो लगता है कि इस संयोजन से व्यंग्य का एक ऐसा रूप सामने आया है जो मेरी निराशावादिता को नियंत्रित रखने में मदद करता है, और शायद दूसरों को खुश करता है या उन्हें शिक्षित करता है।