description: |
  Kiedyś byłem klasowym błaznem szukającym śmiechu kosztem autorytetu z przodu sali. Większość mojej pracy polega na łączeniu istniejących dzieł sztuki lub tworzeniu kompozycji. Wydaje się więc, że ta kombinacja zaowocowała formą satyry, która pomaga utrzymać mój cynizm w ryzach, a przy okazji być może bawi i edukuje innych.