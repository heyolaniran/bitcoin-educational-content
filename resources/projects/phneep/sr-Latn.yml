description: |
  Nekada sam bio klovn u razredu, tražeći smeh na račun autoriteta ispred učionice. Većina mog rada se zapravo svodi na mešanje postojećih umetničkih dela ili pravljenje kompozita. Tako da se čini da je ta kombinacija rezultirala u obliku satire koja pomaže da zadržim svoj cinizam pod kontrolom, i hej, možda usput zabavi ili edukuje druge.