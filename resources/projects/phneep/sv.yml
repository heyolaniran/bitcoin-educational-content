description: |
  Jag brukade vara klassens clown som letade efter skratt på bekostnad av auktoriteten längst fram i rummet. Det mesta av mitt arbete handlar egentligen om att mosa existerande konstverk eller göra kompositer. Så kombinationen verkar ha resulterat i en form av satir som hjälper till att hålla min cynism i schack, och kanske roar eller utbildar andra på vägen.