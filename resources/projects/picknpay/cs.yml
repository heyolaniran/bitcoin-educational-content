description: |
  Pick n Pay (PnP), významný jihoafrický maloobchodní prodejce, začal přijímat Bitcoin v roce 2024. Prostřednictvím Lightning Network jsou platby rychlejší a s nižšími poplatky než u kreditních karet. Poprvé testovali Bitcoin v roce 2017, ale tehdy byla technologie méně vyspělá. Díky technologii Lightning nyní zaznamenali silný zájem zákazníků a na integraci spolupracují se společností MoneyBadger.
  