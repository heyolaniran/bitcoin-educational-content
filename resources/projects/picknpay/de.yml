description: |
  Pick n Pay (PnP), ein großer südafrikanischer Einzelhändler, hat 2024 mit der Annahme von Bitcoin begonnen. Mit dem Lightning Network sind Zahlungen schneller und mit niedrigeren Gebühren verbunden als mit Kreditkarten. Das Unternehmen testete Bitcoin erstmals 2017, aber die Technologie war damals noch nicht so ausgereift. Mit Lightning hat das Unternehmen nun eine starke Kundenakzeptanz festgestellt und arbeitet bei der Integration mit MoneyBadger zusammen.
  