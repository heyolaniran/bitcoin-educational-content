description: |
  Pick n Pay (PnP), un importante minorista sudafricano, empezó a aceptar Bitcoin en 2024. Con la Lightning Network, los pagos son más rápidos y tienen menos comisiones que las tarjetas de crédito. Probaron Bitcoin por primera vez en 2017, pero entonces la tecnología estaba menos madura. Ahora, con Lightning, han experimentado una gran aceptación por parte de los clientes y colaboran con MoneyBadger en la integración.
  