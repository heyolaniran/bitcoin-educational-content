description: |
  Pick n Pay (PnP), suur Lõuna-Aafrika jaemüüja, hakkas 2024. aastal Bitcoin vastu võtma. Lightning Network abil on maksed kiiremad ja nende tasud on madalamad kui krediitkaartidel. Nad katsetasid Bitcoin esimest korda 2017. aastal, kuid tollal oli tehnoloogia veel vähem välja töötatud. Lightningiga on nad nüüd näinud tugevat klientide vastuvõtmist, tehes lõimimiseks koostööd MoneyBadgeriga.
  