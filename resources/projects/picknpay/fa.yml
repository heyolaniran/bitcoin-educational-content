description: |
  پیک ان پی (PnP)، یک خرده‌فروش بزرگ آفریقای جنوبی، در سال 2024 پذیرش Bitcoin را آغاز کرد. از طریق Lightning Network، پرداخت‌ها سریع‌تر و با کارمزدهای کمتری نسبت به کارت‌های اعتباری انجام می‌شوند. آنها اولین بار Bitcoin را در سال 2017 آزمایش کردند، اما فناوری در آن زمان کمتر پیشرفته بود. با Lightning، اکنون شاهد استقبال قوی مشتریان بوده‌اند و با MoneyBadger برای یکپارچه‌سازی همکاری کرده‌اند.