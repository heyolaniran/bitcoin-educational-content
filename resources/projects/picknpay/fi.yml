description: |
  Pick n Pay (PnP), merkittävä eteläafrikkalainen vähittäismyyjä, alkoi hyväksyä Bitcoin:tä vuonna 2024. Lightning Network:n avulla maksut ovat nopeampia ja niistä peritään pienemmät maksut kuin luottokorteista. He testasivat Bitcoin:tä ensimmäisen kerran vuonna 2017, mutta tekniikka ei ollut silloin vielä yhtä kehittynyttä. Lightningin avulla he ovat nyt nähneet asiakkaidensa hyväksynnän olevan vahvaa, ja he työskentelevät MoneyBadgerin kanssa integraatiota varten.
  