description: |
  Pick n Pay (PnP), un important détaillant sud-africain, a commencé à accepter les Bitcoin en 2024. Grâce au Lightning Network, les paiements sont plus rapides et les frais moins élevés que pour les cartes de crédit. L'entreprise a testé le Bitcoin pour la première fois en 2017, mais la technologie était alors moins mature. Avec Lightning, ils ont maintenant constaté une forte adhésion des clients, en travaillant avec MoneyBadger pour l'intégration.
  