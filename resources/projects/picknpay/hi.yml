description: |
  दक्षिण अफ़्रीका के एक प्रमुख रिटेलर पिक एन पे (PnP) ने 2024 में Bitcoin स्वीकार करना शुरू कर दिया। Lightning Network के ज़रिए, भुगतान तेज़ होते हैं और क्रेडिट कार्ड की तुलना में कम शुल्क लगते हैं। उन्होंने पहली बार 2017 में Bitcoin का परीक्षण किया था, लेकिन उस समय तकनीक उतनी परिपक्व नहीं थी। लाइटनिंग के साथ, अब उन्हें एकीकरण के लिए मनीबैजर के साथ काम करते हुए ग्राहकों की ओर से काफ़ी उत्साह देखने को मिला है।