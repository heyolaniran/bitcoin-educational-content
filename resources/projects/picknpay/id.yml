description: |
  Pick n Pay (PnP), peritel besar di Afrika Selatan, mulai menerima Bitcoin pada tahun 2024. Melalui Lightning Network, pembayaran menjadi lebih cepat dan dengan biaya yang lebih rendah daripada kartu kredit. Mereka pertama kali menguji coba Bitcoin pada tahun 2017, tetapi teknologinya saat itu masih kurang matang. Dengan Lightning, mereka sekarang telah melihat penyerapan pelanggan yang kuat, bekerja sama dengan MoneyBadger untuk integrasi.
  