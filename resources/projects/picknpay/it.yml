description: |
  Pick n Pay (PnP), un importante rivenditore sudafricano, ha iniziato ad accettare Bitcoin nel 2024. Grazie a Lightning Network, i pagamenti sono più veloci e prevedono commissioni più basse rispetto alle carte di credito. Hanno testato Bitcoin per la prima volta nel 2017, ma all'epoca la tecnologia era meno matura. Con Lightning, ora hanno riscontrato una forte adesione da parte dei clienti, collaborando con MoneyBadger per l'integrazione.
  