description: |
  Pick n Pay (PnP), en stor sørafrikansk forhandler, begynte å akseptere Bitcoin i 2024. Gjennom Lightning Network er betalingene raskere og har lavere gebyrer enn kredittkort. De testet Bitcoin for første gang i 2017, men teknologien var da mindre moden. Med Lightning har de nå sett en sterk oppslutning fra kundene, og de samarbeider med MoneyBadger om integrering.
  