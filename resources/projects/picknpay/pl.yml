description: |
  Pick n Pay (PnP), duży południowoafrykański sprzedawca detaliczny, zaczął akceptować Bitcoin w 2024 roku. Dzięki Lightning Network płatności są szybsze i wiążą się z niższymi opłatami niż w przypadku kart kredytowych. Po raz pierwszy przetestowali Bitcoin w 2017 roku, ale technologia była wówczas mniej dojrzała. Dzięki Lightning zaobserwowali teraz duże zainteresowanie klientów, współpracując z MoneyBadger w celu integracji.
  