description: |
  O Pick n Pay (PnP), um importante retalhista sul-africano, começou a aceitar o Bitcoin em 2024. Através do Lightning Network, os pagamentos são mais rápidos e têm taxas mais baixas do que os cartões de crédito. A empresa testou o Bitcoin pela primeira vez em 2017, mas nessa altura a tecnologia estava menos madura. Com o Lightning, a empresa tem registado uma forte aceitação por parte dos clientes, trabalhando com a MoneyBadger para a integração.
  