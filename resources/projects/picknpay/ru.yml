description: |
  Pick n Pay (PnP), крупный южноафриканский ритейлер, начал принимать Bitcoin в 2024 году. С помощью Lightning Network платежи проходят быстрее и с меньшей комиссией, чем по кредитным картам. Впервые они протестировали Bitcoin в 2017 году, но тогда технология была менее совершенной. С появлением Lightning они стали активно пользоваться услугами клиентов и сотрудничают с MoneyBadger для интеграции.
  