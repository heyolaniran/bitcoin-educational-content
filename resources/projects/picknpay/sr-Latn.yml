description: |
  Pick n Pay (PnP), veliki južnoafrički trgovac, počeo je prihvatati Bitcoin u 2024. Kroz Lightning Network, plaćanja su brža i dolaze sa nižim naknadama nego kreditne kartice. Prvo su testirali Bitcoin u 2017, ali tadašnja tehnologija je bila manje zrela. Sa Lightning, sada su videli snažan odziv kupaca, radeći sa MoneyBadger na integraciji.