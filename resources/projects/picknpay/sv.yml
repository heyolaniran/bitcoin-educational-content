description: |
  Pick n Pay (PnP), en stor sydafrikansk återförsäljare, började acceptera Bitcoin 2024. Genom Lightning Network är betalningarna snabbare och har lägre avgifter än kreditkort. De testade Bitcoin för första gången 2017, men tekniken var då inte lika mogen. Med Lightning har de nu sett ett starkt kundintag och arbetar med MoneyBadger för integration.
  