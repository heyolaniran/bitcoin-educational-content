description: |
  Pick n Pay (PnP), muuzaji mkuu wa Afrika Kusini, alianza kupokea Bitcoin mwaka wa 2024. Kupitia Lightning Network, malipo ni ya haraka na huja na ada za chini kuliko kadi za mkopo. Walijaribu Bitcoin kwa mara ya kwanza mnamo 2017, lakini teknolojia wakati huo haikuwa ya kukomaa. Kwa Umeme, sasa wameona utumiaji thabiti wa wateja, wakifanya kazi na MoneyBadger kwa ujumuishaji.
  