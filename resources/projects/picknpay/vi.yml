description: |
  Pick n Pay (PnP), một nhà bán lẻ lớn của Nam Phi, bắt đầu chấp nhận Bitcoin vào năm 2024. Thông qua Lightning Network, thanh toán nhanh hơn và có mức phí thấp hơn thẻ tín dụng. Họ đã thử nghiệm Bitcoin lần đầu tiên vào năm 2017, nhưng công nghệ khi đó chưa hoàn thiện. Với Lightning, hiện họ đã chứng kiến sự gia tăng mạnh mẽ của khách hàng, hợp tác với MoneyBadger để tích hợp.
  