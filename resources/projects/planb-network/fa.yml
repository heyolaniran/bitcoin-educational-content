description: |
  ماموریت ما حمایت از جوامع محلی Bitcoin از طریق آموزش و شبکه‌سازی منبع‌باز است. ما منابع لازم (دوره‌ها، کتاب‌ها، پوسترها، بروشورها، ویدئوها) را برای پیشرفت صنعت Bitcoin جمع‌آوری، سازماندهی و ایجاد می‌کنیم.
  
  ما دانش را متمرکز می‌کنیم تا آن را از طریق یک مخزن ساده و چندزبانه در GitHub و یک پلتفرم آموزش الکترونیکی بهتر توزیع کنیم. ما به مراکز محلی Bitcoin در توسعه آن‌ها با ابزارهای مناسب برای رشد استعدادهایشان کمک می‌کنیم.