description: |
  Naszą misją jest wspieranie lokalnych społeczności Bitcoin poprzez edukację open-source i tworzenie sieci kontaktów. Zbieramy, organizujemy i tworzymy niezbędne zasoby (kursy, książki, plakaty, ulotki, filmy), aby branża Bitcoin mogła się rozwijać.
  
  Centralizujemy wiedzę, aby lepiej ją rozpowszechniać za pomocą prostego, wielojęzycznego repozytorium GitHub i platformy e-learningowej. Pomagamy lokalnym ośrodkom Bitcoin w ich rozwoju dzięki odpowiednim narzędziom do rozwoju ich talentów.
  