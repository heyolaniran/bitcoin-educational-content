description: |
  Naša misija je podržati lokalne Bitcoin zajednice kroz open-source obrazovanje i umrežavanje. Prikupljamo, organizujemo i kreiramo potrebne resurse (kurseve, knjige, postere, letke, video zapise) za napredak Bitcoin industrije.
  
  Centralizujemo znanje kako bismo ga bolje distribuirali putem jednostavnog, višejezičnog GitHub repozitorijuma i E-learning platforme. Pomažemo lokalnim Bitcoin centrima u njihovom razvoju sa pravim alatima za rast njihovih talenata.