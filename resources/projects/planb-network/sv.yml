description: |
  Vårt uppdrag är att stödja lokala Bitcoin-gemenskaper genom utbildning och nätverk med öppen källkod. Vi samlar in, organiserar och skapar de nödvändiga resurserna (kurser, böcker, affischer, flygblad, videor) för att Bitcoin-industrin ska kunna utvecklas.
  
  Vi centraliserar kunskap för att bättre kunna distribuera den genom ett enkelt, flerspråkigt GitHub-arkiv och en plattform för e-lärande. Vi hjälper lokala Bitcoin-hubbar i deras utveckling med rätt verktyg för att deras talanger ska kunna växa.
  