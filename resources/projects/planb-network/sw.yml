description: |
  Dhamira yetu ni kusaidia jumuiya za Bitcoin za ndani kupitia elimu ya chanzo huria na mitandao. Tunakusanya, kupanga, na kuunda nyenzo zinazohitajika (kozi, vitabu, mabango, vipeperushi, video) kwa ajili ya sekta ya Bitcoin kuendeleza. 
  
  Tunaweka maarifa katikati ili kuyasambaza vyema kupitia hazina rahisi ya GitHub, yenye lugha nyingi na jukwaa la kujifunza kwa njia ya E. Tunasaidia vitovu vya Bitcoin vya ndani katika uundaji wao kwa zana zinazofaa ili talanta yao ikue.
  