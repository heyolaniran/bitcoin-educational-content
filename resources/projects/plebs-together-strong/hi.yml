description: "We're Plebs Together Strong\r

  a grassroots initiative building the future on Bitcoin & empowering
  communities in India through Bitcoin education.\r

  Our hard-earned money keeps losing value, while prices keep rising due to
  constant printing of money. \r

  \r

  Bitcoin offers a truly decentralized, fixed-supply alternative—helping putting
  financial power back in the hands of the people.\r

  ​\r

  But understanding bitcoin can only start with understanding 'What is Money'"
