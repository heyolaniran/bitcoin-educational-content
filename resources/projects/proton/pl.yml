description: |
  Szwajcarska firma specjalizująca się w prywatności cyfrowej, oferująca bezpieczne usługi oparte na szyfrowaniu end-to-end. Założona przez naukowców z CERN, Proton dostarcza rozwiązania takie jak Proton Mail, szyfrowana poczta e-mail, Proton VPN do prywatnego przeglądania Internetu oraz Proton Drive do bezpiecznego przechowywania plików. Niedawno wprowadziła również na rynek oprogramowanie Bitcoin Wallet. Koncentrując się na przejrzystości, firma korzysta z modelu open-source. Proton zobowiązuje się do ochrony prywatności swoich użytkowników.
  