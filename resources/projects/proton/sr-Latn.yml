description: |
  Švajcarska kompanija specijalizovana za digitalnu privatnost, nudi sigurne usluge zasnovane na end-to-end enkripciji. Osnovana od strane CERN naučnika, Proton pruža rešenja kao što su Proton Mail, usluga šifrovane e-pošte, Proton VPN za privatno pretraživanje interneta i Proton Drive za sigurno skladištenje fajlova. Nedavno su takođe lansirali Bitcoin Wallet softver. Fokusirana na transparentnost, kompanija koristi model otvorenog koda. Proton je posvećen zaštiti privatnosti svojih korisnika.