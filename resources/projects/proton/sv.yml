description: |
  Schweiziskt företag som specialiserar sig på digital integritet och erbjuder säkra tjänster baserade på end-to-end-kryptering. Proton grundades av forskare från CERN och tillhandahåller lösningar som Proton Mail, en krypterad e-posttjänst, Proton VPN för privat surfning på nätet och Proton Drive för säker fillagring. Nyligen lanserade de även programvaran Bitcoin Wallet. Företaget fokuserar på transparens och använder sig av en öppen källkodsmodell. Proton har åtagit sig att skydda sina användares integritet.
  