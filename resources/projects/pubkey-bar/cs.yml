description: |
  PubKey je bar v New Yorku, který se rozhodl přijímat Bitcoin prostřednictvím Lightning Network, aby snížil náklady na zprostředkovatele a demonstroval každodenní použití Bitcoin. Kromě toho, že přitahuje místní komunitu Bitcoin, šetří poplatky za kreditní karty (3,5 % a více) a nabízí rychlé přímé platby. Významnou událostí bylo, když se prezident Trump stal prvním prezidentem USA, který zde provedl nákup pomocí Bitcoin.
  