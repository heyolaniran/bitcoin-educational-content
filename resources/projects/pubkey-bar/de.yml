description: |
  PubKey ist eine Bar in New York City, die sich entschlossen hat, Bitcoin über den Lightning Network zu akzeptieren, um die Kosten für Zwischenhändler zu reduzieren und die alltägliche Verwendung von Bitcoin zu demonstrieren. Sie ziehen nicht nur die lokale Bitcoin-Gemeinschaft an, sondern sparen auch die Kreditkartengebühren (3,5 % oder mehr) und bieten schnelle, direkte Zahlungen. Ein bemerkenswertes Ereignis war, als Präsident Trump der erste US-Präsident wurde, der dort einen Kauf mit Bitcoin tätigte.
  