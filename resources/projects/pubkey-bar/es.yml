description: |
  PubKey es un bar de Nueva York que decidió aceptar Bitcoin a través de Lightning Network para reducir los costes de intermediación y demostrar el uso cotidiano de Bitcoin. Además de atraer a la comunidad local de Bitcoin, se ahorran las comisiones de las tarjetas de crédito (3,5% o más) y ofrecen pagos rápidos y directos. Un acontecimiento notable fue cuando el presidente Trump se convirtió en el primer presidente de EE.UU. en hacer una compra con Bitcoin allí.
  