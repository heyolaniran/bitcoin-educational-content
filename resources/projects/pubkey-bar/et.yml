description: |
  PubKey on New Yorgis asuv baar, mis otsustas Bitcoin vastu võtta Lightning Network kaudu, et vähendada vahenduskulusid ja demonstreerida Bitcoin igapäevast kasutust. Lisaks sellele, et nad meelitavad kohalikku Bitcoin kogukonda, säästavad nad krediitkaarditasudelt (3,5% või rohkem) ja pakuvad kiireid otsemakseid. Märkimisväärne sündmus oli see, kui president Trumpist sai esimene USA president, kes tegi seal Bitcoin-ga ostu.
  