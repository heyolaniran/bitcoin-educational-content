description: |
  PubKey یک بار در شهر نیویورک است که تصمیم گرفت Bitcoin را از طریق Lightning Network بپذیرد تا هزینه‌های واسطه را کاهش دهد و استفاده روزمره از Bitcoin را نشان دهد. علاوه بر جذب جامعه محلی Bitcoin، آنها در هزینه‌های کارت اعتباری (۳.۵٪ یا بیشتر) صرفه‌جویی می‌کنند و پرداخت‌های سریع و مستقیم ارائه می‌دهند. یک رویداد قابل توجه زمانی بود که رئیس‌جمهور ترامپ به عنوان اولین رئیس‌جمهور ایالات متحده خریدی با Bitcoin در آنجا انجام داد.