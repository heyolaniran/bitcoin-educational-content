description: |
  PubKey on New Yorkissa sijaitseva baari, joka päätti hyväksyä Bitcoin:n Lightning Network:n kautta vähentääkseen välittäjäkustannuksia ja osoittaakseen Bitcoin:n jokapäiväisen käytön. Paikallisen Bitcoin-yhteisön houkuttelemisen lisäksi he säästävät luottokorttimaksuissa (3,5 % tai enemmän) ja tarjoavat nopeita, suoria maksuja. Merkittävä tapahtuma oli, kun presidentti Trumpista tuli ensimmäinen Yhdysvaltain presidentti, joka teki siellä ostoksen Bitcoin:llä.
  