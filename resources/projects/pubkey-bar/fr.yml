description: |
  PubKey est un bar de la ville de New York qui a décidé d'accepter le Bitcoin via le Lightning Network afin de réduire les coûts des intermédiaires et de démontrer l'utilisation quotidienne du Bitcoin. En plus d'attirer la communauté Bitcoin locale, il économise les frais de carte de crédit (3,5 % ou plus) et offre des paiements rapides et directs. Le président Trump a été le premier président américain à effectuer un achat avec le Bitcoin.
  