description: |
  पबकी न्यूयॉर्क शहर का एक बार है जिसने बिचौलियों की लागत कम करने और Bitcoin के रोज़मर्रा के इस्तेमाल को प्रदर्शित करने के लिए Lightning Network के ज़रिए Bitcoin को स्वीकार करने का फ़ैसला किया। स्थानीय Bitcoin समुदाय को आकर्षित करने के अलावा, वे क्रेडिट कार्ड शुल्क (3.5% या उससे ज़्यादा) बचाते हैं और तेज़, सीधे भुगतान की सुविधा देते हैं। एक उल्लेखनीय घटना तब हुई जब राष्ट्रपति ट्रम्प वहाँ Bitcoin के साथ खरीदारी करने वाले पहले अमेरिकी राष्ट्रपति बने।