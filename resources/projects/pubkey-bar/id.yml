description: |
  PubKey adalah sebuah bar di New York City yang memutuskan untuk menerima Bitcoin melalui Lightning Network untuk mengurangi biaya perantara dan mendemonstrasikan penggunaan Bitcoin sehari-hari. Selain menarik komunitas Bitcoin lokal, mereka menghemat biaya kartu kredit (3,5% atau lebih) dan menawarkan pembayaran langsung yang cepat. Peristiwa penting adalah ketika Presiden Trump menjadi presiden AS pertama yang melakukan pembelian dengan Bitcoin di sana.
  