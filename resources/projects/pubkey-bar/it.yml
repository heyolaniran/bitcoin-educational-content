description: |
  PubKey è un bar di New York City che ha deciso di accettare Bitcoin tramite il Lightning Network per ridurre i costi di intermediazione e dimostrare l'uso quotidiano di Bitcoin. Oltre ad attirare la comunità Bitcoin locale, risparmia sulle commissioni delle carte di credito (3,5% o più) e offre pagamenti rapidi e diretti. Un evento degno di nota è stato quando il Presidente Trump è diventato il primo Presidente degli Stati Uniti a fare un acquisto con Bitcoin.
  