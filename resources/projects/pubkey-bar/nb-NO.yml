description: |
  PubKey er en bar i New York City som bestemte seg for å akseptere Bitcoin via Lightning Network for å redusere kostnadene til mellommenn og demonstrere Bitcoins hverdagsbruk. I tillegg til å tiltrekke seg det lokale Bitcoin-fellesskapet, sparer de kredittkortgebyrer (3,5 % eller mer) og tilbyr raske, direkte betalinger. En bemerkelsesverdig hendelse var da president Trump ble den første amerikanske presidenten som foretok et kjøp med Bitcoin der.
  