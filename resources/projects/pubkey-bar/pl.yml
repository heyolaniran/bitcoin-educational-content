description: |
  PubKey to bar w Nowym Jorku, który zdecydował się akceptować Bitcoin za pośrednictwem Lightning Network, aby obniżyć koszty pośredników i zademonstrować codzienne użytkowanie Bitcoin. Oprócz przyciągnięcia lokalnej społeczności Bitcoin, oszczędzają na opłatach za karty kredytowe (3,5% lub więcej) i oferują szybkie, bezpośrednie płatności. Godnym uwagi wydarzeniem było to, że prezydent Trump został pierwszym prezydentem USA, który dokonał zakupu za pomocą Bitcoin.
  