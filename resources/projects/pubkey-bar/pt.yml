description: |
  O PubKey é um bar na cidade de Nova Iorque que decidiu aceitar Bitcoin através do Lightning Network para reduzir os custos de intermediários e demonstrar a utilização quotidiana do Bitcoin. Para além de atrair a comunidade local de Bitcoin, poupam nas taxas de cartão de crédito (3,5% ou mais) e oferecem pagamentos rápidos e diretos. Um evento notável foi quando o Presidente Trump se tornou o primeiro presidente dos EUA a fazer uma compra com o Bitcoin lá.
  