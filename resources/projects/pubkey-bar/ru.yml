description: |
  PubKey - это бар в Нью-Йорке, который решил принимать Bitcoin через Lightning Network, чтобы сократить расходы на посредников и продемонстрировать повседневное использование Bitcoin. Помимо привлечения местного сообщества Bitcoin, они экономят на комиссии за обслуживание кредитных карт (3,5 % и более) и предлагают быстрые прямые платежи. Знаменательным событием стало то, что президент Трамп стал первым президентом США, совершившим покупку с помощью Bitcoin.
  