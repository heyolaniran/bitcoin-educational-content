description: |
  PubKey je bar u Njujorku koji je odlučio da prihvati Bitcoin preko Lightning Network kako bi smanjio troškove posrednika i demonstrirao svakodnevnu upotrebu Bitcoin. Pored privlačenja lokalne Bitcoin zajednice, štede na troškovima kreditnih kartica (3,5% ili više) i nude brza, direktna plaćanja. Značajan događaj je bio kada je predsednik Tramp postao prvi predsednik SAD koji je tamo obavio kupovinu sa Bitcoin.