description: |
  PubKey är en bar i New York City som bestämde sig för att acceptera Bitcoin via Lightning Network för att minska mellanhandskostnaderna och demonstrera Bitcoin:s vardagliga användning. Förutom att dra till sig den lokala Bitcoin-gemenskapen sparar de in på kreditkortsavgifter (3,5 % eller mer) och erbjuder snabba direktbetalningar. En anmärkningsvärd händelse var när president Trump blev den första amerikanska presidenten att göra ett köp med Bitcoin där.
  