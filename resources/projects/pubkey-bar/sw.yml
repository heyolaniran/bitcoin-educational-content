description: |
  PubKey ni baa katika Jiji la New York ambayo iliamua kukubali Bitcoin kupitia Lightning Network ili kupunguza gharama za watu wa kati na kuonyesha matumizi ya kila siku ya Bitcoin. Mbali na kuchora jumuiya ya eneo la Bitcoin, wanaokoa kwa ada za kadi ya mkopo (3.5% au zaidi) na hutoa malipo ya haraka, ya moja kwa moja. Tukio mashuhuri lilikuwa wakati Rais Trump alipokuwa rais wa kwanza wa Merika kufanya ununuzi na Bitcoin huko.
  