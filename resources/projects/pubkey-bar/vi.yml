description: |
  PubKey là một quán bar ở Thành phố New York đã quyết định chấp nhận Bitcoin thông qua Lightning Network để giảm chi phí trung gian và chứng minh việc sử dụng Bitcoin hàng ngày. Ngoài việc thu hút cộng đồng Bitcoin địa phương, họ còn tiết kiệm phí thẻ tín dụng (3,5% trở lên) và cung cấp dịch vụ thanh toán trực tiếp, nhanh chóng. Một sự kiện đáng chú ý là khi Tổng thống Trump trở thành tổng thống Hoa Kỳ đầu tiên mua hàng bằng Bitcoin tại đó.
  