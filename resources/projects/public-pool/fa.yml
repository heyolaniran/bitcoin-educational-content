description: |
  استخر عمومی یک پلتفرم Solo Pool Mining است که به ماینرها اجازه می‌دهد شانس خود را در Mining یک بلوک Bitcoin امتحان کنند بدون اینکه پاداش را به اشتراک بگذارند. برخلاف استخرهای سنتی، استخر عمومی قدرت محاسباتی را تجمیع نمی‌کند؛ کاربران در صورت یافتن یک بلوک، پاداش کامل را دریافت می‌کنند. این پلتفرم به ماینرها قالب بلوک ارائه می‌دهد و نیاز به مدیریت یک نود Bitcoin را از بین می‌برد. در حالی که شانس موفقیت کم است، سیستم مانند یک لاتاری با پاداش‌های بالقوه بالا عمل می‌کند. یک داشبورد آمار دقیقی از عملکرد و شبکه ارائه می‌دهد.