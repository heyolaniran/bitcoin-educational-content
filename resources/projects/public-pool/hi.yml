description: |
  पब्लिक पूल एक सोलो पूल Mining प्लेटफ़ॉर्म है जो माइनर्स को इनाम साझा किए बिना Mining Bitcoin ब्लॉक पर अपनी किस्मत आजमाने की अनुमति देता है। पारंपरिक पूल के विपरीत, पब्लिक पूल कंप्यूटिंग शक्ति को एकत्रित नहीं करता है; ब्लॉक मिलने पर उपयोगकर्ताओं को पूरा इनाम मिलता है। प्लेटफ़ॉर्म माइनर्स को एक ब्लॉक टेम्प्लेट प्रदान करता है, जिससे Bitcoin नोड को प्रबंधित करने की आवश्यकता समाप्त हो जाती है। जबकि सफलता की संभावना कम है, सिस्टम संभावित रूप से उच्च पुरस्कारों के साथ लॉटरी की तरह काम करता है। एक डैशबोर्ड प्रदर्शन और नेटवर्क पर विस्तृत आँकड़े प्रदान करता है।