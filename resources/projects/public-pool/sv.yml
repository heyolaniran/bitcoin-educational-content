description: |
  Public Pool är en Solo Pool Mining-plattform som gör det möjligt för miners att pröva lyckan att Mining ett Bitcoin-block utan att dela belöningen. Till skillnad från traditionella pooler aggregerar Public Pool inte datorkraft; användarna får hela belöningen om ett block hittas. Plattformen förser miners med en blockmall, vilket eliminerar behovet av att hantera en Bitcoin-nod. Även om chanserna att lyckas är låga fungerar systemet som ett lotteri med potentiellt höga belöningar. En instrumentpanel erbjuder detaljerad statistik om prestanda och nätverket.
  