description: |
  Public Pool ni jukwaa la Solo Pool Mining ambalo huruhusu wachimbaji kujaribu bahati yao kwenye Mining block ya Bitcoin bila kushiriki zawadi. Tofauti na mabwawa ya jadi, Dimbwi la Umma halijumuishi nguvu za kompyuta; watumiaji hupokea thawabu kamili ikiwa kizuizi kitapatikana. Jukwaa hutoa wachimbaji na template ya kuzuia, kuondoa haja ya kusimamia node ya Bitcoin. Ingawa uwezekano wa kufaulu ni mdogo, mfumo hufanya kazi kama bahati nasibu yenye zawadi nyingi. Dashibodi hutoa takwimu za kina kuhusu utendakazi na mtandao.
  