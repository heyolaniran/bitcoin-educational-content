description: |
  QRB Labs je společnost založená v Addis Abebě v Etiopii. Byla založena v roce 2021 a nabízí služby datového centra mezinárodním klientům se zaměřením na výpočty s vysokou energetickou náročností, jako je Bitcoin Mining, a trénink modelů umělé inteligence. QRB je zákazníkem společnosti Ethiopian Electric Power (EEP) a nakupuje přebytečnou vodní energii, běžně označovanou jako "stranded" energie, pro provoz škálovatelných modulárních datových center. Tato datová centra jsou strategicky umístěna v rozvodnách EEP po celé Etiopii.