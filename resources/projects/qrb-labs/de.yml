description: |
  QRB Labs ist ein Unternehmen mit Sitz in Addis Abeba, Äthiopien. Es wurde 2021 gegründet und bietet internationalen Kunden Rechenzentrumsdienste an, die sich auf standortunabhängige Hochenergieberechnungen wie Bitcoin Mining und KI-Modelltraining konzentrieren. QRB ist ein Kunde von Ethiopian Electric Power (EEP) und bezieht überschüssigen Strom aus Wasserkraft, der gemeinhin als "gestrandete" Energie bezeichnet wird, um skalierbare modulare Rechenzentren zu betreiben. Diese Rechenzentren befinden sich an strategisch günstigen Standorten in EEP-Umspannwerken in ganz Äthiopien.