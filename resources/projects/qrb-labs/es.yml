description: |
  QRB Labs es una empresa establecida en Addis Abeba, Etiopía. Fundada en 2021, ofrece servicios de centro de datos a clientes internacionales, centrándose en cálculos de alta energía independientes de la ubicación, como Bitcoin Mining, y entrenamiento de modelos de IA. QRB es cliente de Ethiopian Electric Power (EEP) y adquiere excedentes de energía hidroeléctrica, comúnmente conocida como energía "varada", para operar centros de datos modulares escalables. Estos centros de datos están situados estratégicamente en subestaciones de EEP en toda Etiopía.