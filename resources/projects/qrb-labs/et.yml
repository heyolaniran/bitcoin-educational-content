description: |
  QRB Labs on Etioopias Addis Abebas asutatud ettevõte. See on asutatud 2021. aastal ja pakub rahvusvahelistele klientidele andmekeskuse teenuseid, keskendudes asukohaagnostilistele kõrge energiatarbega arvutustele, nagu Bitcoin Mining, ja tehisintellekti mudelite koolitamisele. QRB on Etioopia elektrienergia (EEP) klient ja hangib üleliigset hüdroelektrienergiat, mida tavaliselt nimetatakse "luhtunud" energiaks, et kasutada skaleeritavaid moodulilisi andmekeskusi. Need andmekeskused asuvad strateegiliselt EEPi alajaamades üle Etioopia.