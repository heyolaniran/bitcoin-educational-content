description: |
  QRB Labs یک شرکت مستقر در آدیس آبابا، اتیوپی است. این شرکت که در سال 2021 تأسیس شده است، خدمات مرکز داده را به مشتریان بین‌المللی ارائه می‌دهد و بر روی محاسبات پرانرژی مکان‌ناشناخته مانند Bitcoin Mining و آموزش مدل‌های هوش مصنوعی تمرکز دارد. QRB مشتری شرکت برق اتیوپی (EEP) است و انرژی هیدروالکتریکی مازاد، که معمولاً به عنوان انرژی "بلااستفاده" شناخته می‌شود، را برای راه‌اندازی مراکز داده مدولار مقیاس‌پذیر تهیه می‌کند. این مراکز داده به صورت استراتژیک در داخل پست‌های برق EEP در سراسر اتیوپی قرار دارند.