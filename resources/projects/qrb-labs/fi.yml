description: |
  QRB Labs on yritys, joka on perustettu Addis Abebaan, Etiopiaan. Se perustettiin vuonna 2021, ja se tarjoaa datakeskuspalveluja kansainvälisille asiakkaille keskittyen sijaintitarkkuuteen perustuviin korkean energian laskentoihin, kuten Bitcoin Mining, ja tekoälymallien koulutukseen. QRB on Etiopian Electric Powerin (EEP) asiakas, ja se hankkii ylimääräistä vesivoimaa, jota kutsutaan yleisesti "hukkaenergiaksi", skaalautuvien modulaaristen datakeskusten toimintaa varten. Nämä datakeskukset sijaitsevat strategisesti EEP:n sähköasemilla eri puolilla Etiopiaa.