description: |
  QRB Labs est une entreprise établie à Addis Abeba, en Éthiopie. Fondée en 2021, elle offre des services de centre de données à des clients internationaux, en se concentrant sur les calculs à haute énergie sans localisation, tels que Bitcoin Mining, et l'entraînement de modèles d'IA. QRB est un client de l'Ethiopian Electric Power (EEP) et achète de l'énergie hydroélectrique excédentaire, communément appelée énergie "échouée", pour exploiter des centres de données modulaires évolutifs. Ces centres de données sont stratégiquement situés dans les sous-stations de l'EEP à travers l'Éthiopie.