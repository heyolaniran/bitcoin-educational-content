description: |
  क्यूआरबी लैब्स इथियोपिया के अदीस अबेबा में स्थापित एक कंपनी है। 2021 में स्थापित, यह अंतरराष्ट्रीय ग्राहकों को डेटा सेंटर सेवाएँ प्रदान करता है, जो स्थान-अज्ञेय उच्च-ऊर्जा संगणनाओं जैसे कि Bitcoin Mining, और AI मॉडल प्रशिक्षण पर ध्यान केंद्रित करता है। क्यूआरबी इथियोपियन इलेक्ट्रिक पावर (ईईपी) का ग्राहक है और स्केलेबल मॉड्यूलर डेटा सेंटर संचालित करने के लिए अधिशेष जलविद्युत शक्ति, जिसे आमतौर पर "फंसे" ऊर्जा के रूप में जाना जाता है, खरीदता है। ये डेटा सेंटर इथियोपिया भर में ईईपी सबस्टेशनों के भीतर रणनीतिक रूप से स्थित हैं।