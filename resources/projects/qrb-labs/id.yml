description: |
  QRB Labs adalah perusahaan yang didirikan di Addis Abeba, Ethiopia. Didirikan pada tahun 2021, perusahaan ini menawarkan layanan pusat data kepada klien internasional, dengan fokus pada komputasi energi tinggi yang tidak bergantung pada lokasi, seperti Bitcoin Mining, dan pelatihan model AI. QRB adalah pelanggan Ethiopian Electric Power (EEP) dan membeli kelebihan tenaga listrik tenaga air, yang biasa disebut sebagai energi "terdampar", untuk mengoperasikan pusat data modular yang dapat diskalakan. Pusat data ini berlokasi strategis di dalam gardu induk EEP di seluruh Ethiopia.