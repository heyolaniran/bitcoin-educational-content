description: |
  QRB Labs è una società con sede ad Addis Abeba, in Etiopia. Fondata nel 2021, offre servizi di data center a clienti internazionali, concentrandosi su calcoli ad alta energia, come Bitcoin Mining e l'addestramento di modelli di intelligenza artificiale. QRB è un cliente dell'Ethiopian Electric Power (EEP) e si procura l'energia idroelettrica in eccesso, comunemente chiamata "stranded", per gestire centri dati modulari scalabili. Questi centri dati sono situati strategicamente all'interno delle sottostazioni EEP in tutta l'Etiopia.