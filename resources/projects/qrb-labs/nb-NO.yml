description: |
  QRB Labs er et selskap etablert i Addis Abeba, Etiopia. Selskapet ble grunnlagt i 2021 og tilbyr datasentertjenester til internasjonale kunder, med fokus på stedsagnostiske høyenergiberegninger som Bitcoin Mining og AI-modelltrening. QRB er kunde av Ethiopian Electric Power (EEP) og kjøper overskuddskraft fra vannkraft, ofte omtalt som "stranded" energi, for å drive skalerbare modulære datasentre. Disse datasentrene er strategisk plassert i EEPs transformatorstasjoner over hele Etiopia.