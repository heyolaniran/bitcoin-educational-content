description: |
  QRB Labs to firma z siedzibą w Addis Abeba w Etiopii. Założona w 2021 r., oferuje usługi centrów danych międzynarodowym klientom, koncentrując się na niezależnych od lokalizacji obliczeniach wysokoenergetycznych, takich jak Bitcoin Mining, i szkoleniu modeli sztucznej inteligencji. QRB jest klientem Ethiopian Electric Power (EEP) i pozyskuje nadwyżki energii hydroelektrycznej, powszechnie określanej jako energia "osierocona", w celu obsługi skalowalnych modułowych centrów danych. Te centra danych są strategicznie zlokalizowane w podstacjach EEP w całej Etiopii.