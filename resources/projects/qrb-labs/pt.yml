description: |
  QRB Labs é uma empresa estabelecida em Addis Abeba, Etiópia. Fundada em 2021, oferece serviços de data center para clientes internacionais, com foco em cálculos de alta energia agnósticos de localização, como Bitcoin Mining, e treinamento de modelo de IA. QRB é um cliente da Ethiopian Electric Power (EEP) e adquire energia hidrelétrica excedente, comumente referida como energia "encalhada", para operar data centers modulares escalonáveis. Estes centros de dados estão estrategicamente localizados nas subestações da EEP em toda a Etiópia.