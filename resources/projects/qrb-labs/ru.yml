description: |
  QRB Labs - компания, основанная в Аддис-Абебе, Эфиопия. Основанная в 2021 году, она предлагает услуги центра обработки данных международным клиентам, фокусируясь на вычислениях с высоким энергопотреблением, таких как Bitcoin Mining, не зависящих от местоположения, и обучении моделей искусственного интеллекта. QRB является клиентом Ethiopian Electric Power (EEP) и закупает излишки гидроэлектроэнергии, обычно называемые "побочной" энергией, для работы масштабируемых модульных центров обработки данных. Эти центры обработки данных стратегически расположены на подстанциях EEP по всей Эфиопии.