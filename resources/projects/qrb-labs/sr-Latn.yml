description: |
  QRB Labs je kompanija osnovana u Adis Abebi, Etiopija. Osnovana 2021. godine, nudi usluge data centara međunarodnim klijentima, fokusirajući se na lokacijski agnostičke visokoenergetske proračune kao što su Bitcoin Mining i obuku AI modela. QRB je kupac Ethiopian Electric Power (EEP) i nabavlja višak hidroelektrične energije, obično nazvane "zarobljena" energija, za rad skalabilnih modularnih data centara. Ovi data centri su strateški locirani unutar EEP trafostanica širom Etiopije.