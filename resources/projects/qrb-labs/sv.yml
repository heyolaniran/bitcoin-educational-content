description: |
  QRB Labs är ett företag etablerat i Addis Abeba, Etiopien. Företaget grundades 2021 och erbjuder datacentertjänster till internationella kunder, med fokus på platsagnostiska högenergiberäkningar som Bitcoin Mining och AI-modellutbildning. QRB är kund hos Ethiopian Electric Power (EEP) och köper överskott av vattenkraft, så kallad "strandad" energi, för att driva skalbara modulära datacenter. Dessa datacenter är strategiskt placerade i EEP:s transformatorstationer runt om i Etiopien.