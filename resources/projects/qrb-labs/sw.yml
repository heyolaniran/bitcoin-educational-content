description: |
  QRB Labs ni kampuni iliyoanzishwa mjini Addis Abeba, Ethiopia. Ilianzishwa mwaka wa 2021, inatoa huduma za kituo cha data kwa wateja wa kimataifa, ikilenga hesabu za nishati ya hali ya juu kama vile Bitcoin Mining na mafunzo ya muundo wa AI. QRB ni mteja wa Nishati ya Umeme ya Ethiopia (EEP) na hununua nishati ya ziada ya maji, inayojulikana kama nishati "iliyokwama", ili kuendesha vituo vya data vya kawaida. Vituo hivi vya data viko kimkakati ndani ya vituo vidogo vya EEP kote Ethiopia. 