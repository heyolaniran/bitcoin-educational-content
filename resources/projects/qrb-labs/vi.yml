description: |
  QRB Labs là một công ty được thành lập tại Addis Abeba, Ethiopia. Được thành lập vào năm 2021, công ty cung cấp dịch vụ trung tâm dữ liệu cho các khách hàng quốc tế, tập trung vào các tính toán năng lượng cao không phụ thuộc vào vị trí như Bitcoin Mining và đào tạo mô hình AI. QRB là khách hàng của Ethiopian Electric Power (EEP) và mua điện thủy điện dư thừa, thường được gọi là năng lượng "bị mắc kẹt", để vận hành các trung tâm dữ liệu mô-đun có thể mở rộng quy mô. Các trung tâm dữ liệu này được đặt ở vị trí chiến lược trong các trạm biến áp EEP trên khắp Ethiopia.