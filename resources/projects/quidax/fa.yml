description: |
  کوییدکس یک Bitcoin نیجریه‌ای و کریپتو Exchange است که خرید، فروش و ذخیره دارایی‌های دیجیتال را برای همه آسان می‌کند. کوییدکس که برای مبتدیان و حرفه‌ای‌ها طراحی شده است، دسترسی به ارزهای دیجیتال را ساده می‌کند و در عین حال معاملات سریع و امن را در سراسر آفریقا و فراتر از آن امکان‌پذیر می‌سازد.