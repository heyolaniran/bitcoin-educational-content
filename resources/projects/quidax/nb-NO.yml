description: |
  Quidax er en nigeriansk Bitcoin og krypto Exchange som gjør det enkelt for alle å kjøpe, selge og lagre digitale eiendeler. Quidax er designet for både nybegynnere og proffer, og forenkler tilgangen til kryptovalutaer samtidig som det muliggjør raske og sikre transaksjoner i og utenfor Afrika.