description: |
  Quidax är en nigeriansk Bitcoin & krypto Exchange som gör det enkelt för alla att köpa, sälja och lagra digitala tillgångar. Quidax är utformat för både nybörjare och proffs och förenklar tillgången till kryptovalutor samtidigt som det möjliggör snabba, säkra transaktioner över hela Afrika och bortom.