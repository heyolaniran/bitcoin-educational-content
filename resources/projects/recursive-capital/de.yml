description: |
  Recursive Capital ist ein Bitcoin-Risikokapitalfonds, der in Bitcoin-Unternehmen im Frühstadium investiert, wobei der Schwerpunkt auf dem afrikanischen Kontinent liegt. Der Fonds investiert in verschiedene Anlagethemen im Bitcoin-Ökosystem und sucht nach talentierten Unternehmern, die an der Spitze der Bitcoin-Entwicklung stehen.
  