description: |
  سرمایه‌گذاری Recursive Capital یک صندوق سرمایه‌گذاری خطرپذیر در مراحل اولیه Bitcoin است که در شرکت‌های Bitcoin سرمایه‌گذاری می‌کند و تمرکز آن بر قاره آفریقا است. این صندوق در موضوعات مختلف سرمایه‌گذاری در اکوسیستم Bitcoin سرمایه‌گذاری می‌کند و به دنبال کارآفرینان با استعدادی است که در خط مقدم توسعه Bitcoin فعالیت می‌کنند.