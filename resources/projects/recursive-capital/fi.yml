description: |
  Recursive Capital on varhaisen vaiheen Bitcoin-yritysten pääomasijoitusrahasto, joka sijoittaa Bitcoin-yrityksiin keskittyen Afrikan mantereelle. Rahasto sijoittaa Bitcoin-ekosysteemin eri sijoitusteemoihin ja etsii lahjakkaita yrittäjiä, jotka rakentavat Bitcoin-kehityksen eturintamassa.
  