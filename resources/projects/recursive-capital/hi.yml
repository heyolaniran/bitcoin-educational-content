description: |
  रिकर्सिव कैपिटल एक प्रारंभिक चरण का Bitcoin वेंचर कैपिटल फंड है जो अफ्रीकी महाद्वीप पर ध्यान केंद्रित करते हुए Bitcoin कंपनियों में निवेश करता है। यह फंड Bitcoin पारिस्थितिकी तंत्र में विभिन्न निवेश विषयों में निवेश करता है, Bitcoin विकास के अगुआई में प्रतिभाशाली उद्यमियों की तलाश करता है।