description: |
  Recursive Capital to fundusz venture capital Bitcoin na wczesnym etapie rozwoju, inwestujący w spółki Bitcoin, ze szczególnym uwzględnieniem kontynentu afrykańskiego. Fundusz inwestuje w różne tematy inwestycyjne w ekosystemie Bitcoin, poszukując utalentowanych przedsiębiorców budujących awangardę rozwoju Bitcoin.
  