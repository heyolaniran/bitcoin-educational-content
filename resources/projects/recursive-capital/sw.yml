description: |
  Recursive Capital ni mfuko wa mtaji wa awali wa Bitcoin unaowekeza katika makampuni ya Bitcoin, unaolenga bara la Afrika. Mfuko huu unawekeza katika mada mbalimbali za uwekezaji katika mfumo ikolojia wa Bitcoin, kutafuta wajasiriamali wenye vipaji wanaojenga katika eneo la mbele la maendeleo ya Bitcoin.
  