description: |
  Recursive Capital là quỹ đầu tư mạo hiểm Bitcoin giai đoạn đầu đầu tư vào các công ty Bitcoin, tập trung vào lục địa Châu Phi. Quỹ đầu tư vào nhiều chủ đề đầu tư khác nhau trong hệ sinh thái Bitcoin, tìm kiếm những doanh nhân tài năng xây dựng ở vị trí tiên phong trong quá trình phát triển Bitcoin.
  
  