description: |
  باور به اینکه Bitcoin بهترین راه برای صرفه‌جویی در هزینه‌ها است، ما نسل جدیدی از سرمایه‌گذاران بلندمدت را پرورش می‌دهیم، با ارائه دسترسی ساده، کاربرپسند و امن به Bitcoin.
  
  شرکت Relai که در سوئیس توسط جولیان لینگر و آدم بیلیکان تأسیس شده است، پس از اینکه آن‌ها در یافتن فضایی امن و بدون دردسر برای خرید Bitcoin دچار مشکل شدند، سرمایه‌گذاری و پس‌انداز Bitcoin را برای همه قابل دسترس کرده است. اپلیکیشن مخصوص Bitcoin به گونه‌ای طراحی شده که ساده و شهودی باشد و به هر کسی در اروپا امکان خرید و فروش Bitcoin را در عرض چند دقیقه بدهد، بدون نیاز به ثبت‌نام، تأیید هویت یا واریز. با بیش از ۵۰ میلیون فرانک سوئیس از Bitcoin که از طریق پلتفرم آن سرمایه‌گذاری شده و به‌طور مستقل حسابرسی شده است، Relai به مصرف‌کنندگان این فرصت را می‌دهد که راه‌های جدیدی برای پس‌انداز و سرمایه‌گذاری کشف کنند.