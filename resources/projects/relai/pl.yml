description: |
  Kierując się przekonaniem, że Bitcoin to najlepszy sposób na oszczędzanie pieniędzy, wychowujemy nowe pokolenie długoterminowych inwestorów, dając im prosty, przyjazny dla użytkownika i bezpieczny dostęp do Bitcoin.
  
  Założona w Szwajcarii przez Juliana Linigera i Adema Bilicana po tym, jak zmagali się ze znalezieniem bezpiecznej, bezproblemowej przestrzeni do kupowania Bitcoin, Relai sprawia, że oszczędzanie i inwestowanie w Bitcoin jest dostępne dla każdego. Aplikacja przeznaczona wyłącznie do Bitcoin została zaprojektowana tak, aby była prosta i intuicyjna, umożliwiając każdemu w Europie kupowanie i sprzedawanie Bitcoin w ciągu kilku minut, bez konieczności rejestracji, weryfikacji lub wpłat. Dzięki niezależnemu audytowi i zainwestowaniu ponad 50 milionów CHF w Bitcoin za pośrednictwem swojej platformy, Relai daje konsumentom szansę na odblokowanie nowych sposobów oszczędzania i inwestowania.
  