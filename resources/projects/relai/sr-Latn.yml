description: |
  Vođeni uverenjem da je Bitcoin najbolji način za uštedu novca, podižemo novu generaciju dugoročnih investitora, pružajući im jednostavan, korisnički prijatan i siguran pristup Bitcoin.
  
  Osnovan u Švajcarskoj od strane Juliana Linigera i Adema Biličana nakon što su se suočili sa poteškoćama u pronalaženju sigurnog, jednostavnog prostora za kupovinu Bitcoin, Relai čini Bitcoin štednju i investiranje dostupnim svima. Aplikacija koja se bavi isključivo Bitcoin je dizajnirana da bude jednostavna i intuitivna, omogućavajući svakome u Evropi da kupuje i prodaje Bitcoin u roku od nekoliko minuta, bez potrebe za registracijom, verifikacijom ili depozitima. Nezavisno revidirana, i sa preko 50 miliona CHF investiranih u Bitcoin putem svoje platforme, Relai pruža potrošačima priliku da otključaju nove načine štednje i investiranja.