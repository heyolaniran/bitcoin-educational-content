description: |
  Vi drivs av övertygelsen att Bitcoin är det bästa sättet att spara pengar och vi skapar en ny generation av långsiktiga investerare genom att ge dem enkel, användarvänlig och säker tillgång till Bitcoin.
  
  Relai grundades i Schweiz av Julian Liniger och Adem Bilican efter att de kämpat för att hitta ett säkert, problemfritt utrymme för att köpa Bitcoin, och gör Bitcoin-sparande och investering tillgängligt för alla. Den enda Bitcoin-appen är utformad för att vara enkel och intuitiv, vilket gör det möjligt för alla i Europa att köpa och sälja Bitcoin inom några minuter, utan behov av registrering, verifiering eller insättningar. Relai är oberoende granskat och har investerat över 50 miljoner CHF i Bitcoin via sin plattform, vilket ger konsumenterna möjlighet att låsa upp nya sätt att spara och investera.
  