description: |
  Kwa kuendeshwa na imani kwamba Bitcoin ndiyo njia bora zaidi ya kuokoa pesa, tunakuza kizazi kipya cha wawekezaji wa muda mrefu, kwa kuwapa ufikiaji rahisi, wa kirafiki na salama kwa Bitcoin. 
  
  Ilianzishwa nchini Uswizi na Julian Liniger na Adem Bilican baada ya kutatizika kupata eneo salama lisilo na usumbufu la kununua Bitcoin, Relai inafanya uokoaji na uwekezaji wa Bitcoin kupatikana kwa kila mtu. Programu ya Bitcoin-pekee imeundwa kuwa rahisi na angavu, ikimwezesha mtu yeyote barani Ulaya kununua na kuuza Bitcoin ndani ya dakika chache, bila kuhitaji usajili, uthibitishaji au amana. Imekaguliwa kwa kujitegemea, na zaidi ya CHF milioni 50 za Bitcoin zimewekezwa kupitia mfumo wake, Relai inawapa watumiaji fursa ya kufungua njia mpya za kuweka akiba na kuwekeza.
  