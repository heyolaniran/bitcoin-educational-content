description: |
  我們相信 Bitcoin 是省錢的最佳方式，因此我們正在培育新一代的長期投資者，讓他們簡單、易用且安全地存取 Bitcoin。
  
  Relai 由 Julian Liniger 和 Adem Bilican 在瑞士創立，之前他們一直在努力尋找一個安全、無麻煩的空間來購買 Bitcoin，Relai 讓每個人都能使用 Bitcoin 儲蓄和投資。這個 Bitcoin 專用的應用程式設計簡單直觀，讓歐洲的任何人都能在幾分鐘內買賣 Bitcoin，無需註冊、驗證或存款。Relai 經過獨立審核，透過其平台投資的 Bitcoin 已超過 5000 萬瑞士法郎，讓消費者有機會開啟新的儲蓄和投資方式。
  