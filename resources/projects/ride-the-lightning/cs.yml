description: |
  Webový Interface s otevřeným zdrojovým kódem pro snadnou správu jednoho nebo více uzlů Lightning (LND, Core Lightning, Eclair). RTL nabízí širokou škálu funkcí, včetně správy kanálů, plateb, zálohování a výměny, a to vše v intuitivním Interface, který lze nasadit během několika minut na mnoha platformách.