description: |
  Open-Source, webbasiertes Interface für die einfache Verwaltung von einem oder mehreren Lightning-Knoten (LND, Core Lightning, Eclair). RTL bietet eine breite Palette von Funktionen, einschließlich Channel-Management, Zahlungen, Backups und Swaps, alles in einem intuitiven Interface, das in wenigen Minuten auf zahlreichen Plattformen eingesetzt werden kann.