description: |
  Avatud lähtekoodiga, veebipõhine Interface ühe või mitme Lightning-sõlme (LND, Core Lightning, Eclair) lihtsaks haldamiseks. RTL pakub laia valikut funktsioone, sealhulgas kanalite haldamist, makseid, varukoopiaid ja vahetusi, kõik intuitiivses Interface-s, mida saab minutitega kasutusele võtta mitmetel platvormidel.