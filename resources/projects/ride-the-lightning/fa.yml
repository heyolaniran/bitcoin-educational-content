description: |
  Interface متن‌باز و مبتنی بر وب برای مدیریت آسان یک یا چند نود لایتنینگ (LND، Core Lightning، Eclair). RTL مجموعه‌ای گسترده از عملکردها را ارائه می‌دهد، از جمله مدیریت کانال، پرداخت‌ها، پشتیبان‌گیری و مبادلات، همه در یک Interface شهودی که می‌تواند در عرض چند دقیقه بر روی پلتفرم‌های متعدد مستقر شود.