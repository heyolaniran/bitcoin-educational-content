description: |
  Nettbasert Interface med åpen kildekode for enkel administrasjon av én eller flere Lightning-noder (LND, Core Lightning, Eclair). RTL tilbyr et bredt spekter av funksjoner, inkludert kanaladministrasjon, betalinger, sikkerhetskopier og bytter, alt i en intuitiv Interface som kan distribueres på få minutter på en rekke plattformer.