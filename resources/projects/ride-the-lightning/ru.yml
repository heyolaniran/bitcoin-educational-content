description: |
  Веб-система Interface с открытым исходным кодом для простого управления одним или несколькими узлами Lightning (LND, Core Lightning, Eclair). RTL предлагает широкий спектр функций, включая управление каналами, платежи, резервное копирование и свопы, и все это в интуитивно понятном Interface, который можно развернуть за считанные минуты на различных платформах.