description: |
  Chanzo huria, Interface ya mtandaoni kwa usimamizi rahisi wa nodi moja au zaidi za Umeme (LND, Core Lightning, Eclair). RTL inatoa anuwai ya utendakazi, ikijumuisha usimamizi wa chaneli, malipo, hifadhi rudufu na ubadilishaji, zote katika Interface angavu ambayo inaweza kutumwa kwa dakika kwenye majukwaa mengi.