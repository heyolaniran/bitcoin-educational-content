description: |
  ما Rigly را ایجاد کردیم تا همه بتوانند از Mining Bitcoin لذت ببرند. در روزهای اولیه Bitcoin، همه می‌توانستند Bitcoin را روی کامپیوتر خود استخراج کنند. با گذشت زمان، Bitcoin رشد کرد و سخت‌افزارهای تخصصی - GPUها، سپس FPGAها، و اکنون ASICها - برای Mining ضروری شدند. امروزه، ریگ‌های ASIC Mining نیاز به سرمایه‌گذاری و مدیریت قابل توجهی دارند و اغلب نزدیک به نیروگاه‌های انرژی نصب می‌شوند. Rigly به شما اجازه می‌دهد تا Hashrate را از این ماینرها خریداری کرده و در Mining شرکت کنید.