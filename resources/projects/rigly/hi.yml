description: |
  हमने रिगली इसलिए बनाई ताकि हर कोई Mining Bitcoin का आनंद ले सके Bitcoin के शुरुआती दिनों में, हर कोई अपने कंप्यूटर पर Bitcoin की माइनिंग कर सकता था। समय के साथ, Bitcoin का विकास हुआ और विशेष हार्डवेयर - GPU, फिर FPGA और अब ASIC - Mining के लिए आवश्यक हो गए। आज, ASIC Mining रिग के लिए महत्वपूर्ण निवेश और प्रबंधन की आवश्यकता होती है, और अक्सर ऊर्जा संयंत्रों के करीब स्थापित किए जाते हैं। रिगली आपको इन माइनर्स से Hashrate खरीदने और Mining में भाग लेने की अनुमति देता है।