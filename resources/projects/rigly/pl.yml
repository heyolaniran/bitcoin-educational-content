description: |
  Stworzyliśmy Rigly, aby każdy mógł cieszyć się Mining Bitcoin We wczesnych dniach Bitcoin każdy mógł wydobywać Bitcoin na swoim komputerze. Z biegiem czasu Bitcoin rosło, a specjalistyczny sprzęt - GPU, następnie FPGA, a teraz ASIC - stał się niezbędny do Mining. Obecnie platformy ASIC Mining wymagają znacznych inwestycji i zarządzania, i często są instalowane w pobliżu elektrowni. Rigly pozwala kupować Hashrate od tych górników i uczestniczyć w Mining