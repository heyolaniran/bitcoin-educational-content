description: |
  Vi skapade Rigly så att alla kan njuta av Mining Bitcoin I Bitcoin:s tidiga dagar kunde alla bryta Bitcoin på sin dator. Med tiden växte Bitcoin och specialiserad hårdvara - GPU:er, sedan FPGA:er och nu ASIC:er - blev nödvändig för Mining Idag kräver ASIC Mining riggar betydande investeringar och hantering, och installeras ofta nära energianläggningar. Rigly låter dig köpa Hashrate från dessa gruvarbetare och delta i Mining