description: |
  Tumeunda Rigly ili kila mtu afurahie Mining Bitcoin Katika siku za mwanzo za Bitcoin, kila mtu angeweza kuchimba Bitcoin kwenye kompyuta yake. Baada ya muda, Bitcoin ilikua na vifaa maalum - GPUs, kisha FPGAs, na sasa ASICs - ikawa muhimu kwa Mining Leo, ASIC Mining rigs zinahitaji uwekezaji mkubwa na usimamizi, na mara nyingi huwekwa karibu na mitambo ya nishati. Rigly hukuruhusu kununua Hashrate kutoka kwa wachimbaji hawa na kushiriki katika Mining