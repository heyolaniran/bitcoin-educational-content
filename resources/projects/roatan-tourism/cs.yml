description: |
  Roatan Tourism Bureau je soukromá nevládní organizace (NGO), jejímž cílem je podporovat a propagovat vitalitu a růst turistického průmyslu na Roatanu. Hlavní náplní činnosti úřadu je propagace Roatanu jako přední ostrovní destinace (na domácím i mezinárodním trhu). Začátkem roku 2017 byl spuštěn online magazín a cestovní fórum Roatan.Online. Později téhož roku jsme zahájili činnost Roatan Tourism Bureau jako soukromě financovaného podniku, který se věnuje propagaci Roatanu a jeho příznivců. Naším cílem je zlepšit online prezentaci Roatanu prostřednictvím nejnovějších technik webového marketingu a nejnovějších dostupných online platforem a médií.
  