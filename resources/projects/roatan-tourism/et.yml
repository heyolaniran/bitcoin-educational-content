description: |
  Roatani Turismibüroo on eraõiguslik valitsusväline organisatsioon (MTÜ), mille eesmärk on julgustada ja edendada Roatani turismitööstuse elujõulisust ja kasvu. Büroo peamine eesmärk on edendada Roatani kui esmaklassilist reisisihtkohta (nii riigisiseselt kui ka rahvusvaheliselt). Roatan.Online käivitati 2017. aasta alguses veebiajakirja ja reisifoorumina. Hiljem samal aastal käivitasime Roatani Turismibüroo kui erafinantseeritava ettevõtmise, mis on pühendatud Roatani ja selle toetajate reklaamimisele. Meie eesmärk on parandada Roatani veebipõhist kohalolekut uusimate veebiturundustehnikate ning uusimate veebiplatvormide ja -vahendite abil.
  