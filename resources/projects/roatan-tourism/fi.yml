description: |
  Roatanin matkailutoimisto on yksityinen kansalaisjärjestö (NGO), jonka tavoitteena on rohkaista ja edistää Roatanin matkailuteollisuuden elinvoimaisuutta ja kasvua. Toimiston pääpaino on Roatanin mainostaminen johtavana matkailukohteena (sekä kotimaassa että kansainvälisesti). Roatan.Online julkaistiin vuoden 2017 alussa verkkolehtenä ja matkailufoorumina. Myöhemmin samana vuonna käynnistimme Roatanin matkailutoimiston yksityisesti rahoitettuna yrityksenä, joka on omistettu Roatanin ja sen kannattajien edistämiseen. Tarkoituksenamme on parantaa Roatanin verkkoläsnäoloa uusimpien verkkomarkkinointitekniikoiden ja uusimpien saatavilla olevien verkkoalustojen ja -välineiden avulla.
  