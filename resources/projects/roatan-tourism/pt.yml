description: |
  A Secretaria de Turismo de Roatan é uma Organização Não Governamental (ONG) privada, que tem como objetivo incentivar e promover a vitalidade e o crescimento da indústria do turismo de Roatan. Promover Roatan, como um destino de ilha de viagem premier (tanto nacional como internacionalmente) está no centro do foco principal do Bureau. Roatan.Online foi lançado no início de 2017 como uma revista online e um fórum de viagens. No final desse ano, lançámos o Gabinete de Turismo de Roatan como um empreendimento de financiamento privado dedicado à promoção de Roatan e dos seus apoiantes. O nosso objetivo é melhorar a presença online de Roatan através das mais recentes técnicas de marketing na Web e das mais recentes plataformas e meios online disponíveis.
  