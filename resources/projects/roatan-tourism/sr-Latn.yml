description: |
  Roatan Tourism Bureau je privatna, nevladina organizacija (NVO), koja ima za cilj da podstakne i promoviše vitalnost i rast turističke industrije Roatana. Promocija Roatana, kao vrhunske destinacije za putovanja (kako domaće, tako i međunarodno) je u centru glavnog fokusa Biroa. Roatan.Online je pokrenut početkom 2017. godine kao onlajn magazin i forum za putovanja. Kasnije te godine, pokrenuli smo Roatan Tourism Bureau kao privatno finansirani poduhvat posvećen promociji Roatana i njegovih pristalica. Naš cilj je da poboljšamo onlajn prisustvo Roatana kroz najnovije tehnike veb marketinga i najnovije dostupne onlajn platforme i medije.