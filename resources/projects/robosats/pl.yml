description: |
  RoboSats to prosty i prywatny sposób na Exchange Bitcoin dla walut krajowych. Robosats upraszcza doświadczenie użytkownika peer-to-peer i wykorzystuje faktury lightning hold, aby zminimalizować wymagania dotyczące przechowywania i zaufania. Deterministycznie generowane awatary pomagają użytkownikom przestrzegać najlepszych praktyk w zakresie prywatności.