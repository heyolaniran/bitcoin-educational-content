description: |
  RoboSats je jednostavan i privatan način za Exchange Bitcoin za nacionalne valute. Robosats pojednostavljuje korisničko iskustvo peer-to-peer i koristi lightning hold fakture kako bi minimizirao zahteve za skrbništvom i poverenjem. Deterministički generisani avatari pomažu korisnicima da se pridržavaju najboljih praksi privatnosti.