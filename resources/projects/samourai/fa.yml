description: |
  سامورایی یک Bitcoin و Wallet است که به حریم خصوصی و امنیت اختصاص دارد.
  
  این از فناوری‌های پیشرفته برای جلوگیری از نظارت مبتنی بر Blockchain استفاده می‌کند و تراکنش‌های آفلاین را امکان‌پذیر می‌سازد. Wallet غیر حضانتی کنترل کامل بر کلیدهای خصوصی را فراهم می‌کند. همچنین RoninDojo، یک Full node و Whirlpool با عملکرد بالا و خود میزبان، و یک پیاده‌سازی از Chaumian CoinJoin ارائه می‌دهد که برای قطع ارتباط بین بیت‌کوین‌ها و تاریخچه تراکنش‌های آن‌ها طراحی شده است. تیم پشت سامورایی شامل فعالان حریم خصوصی است که به ایجاد نرم‌افزاری متعهد هستند که در اکوسیستم Bitcoin اولویت را به حریم خصوصی و امنیت می‌دهد.