description: |
  समौराई एक Bitcoin Wallet है जो गोपनीयता और सुरक्षा के लिए समर्पित है।
  
  यह Blockchain-आधारित निगरानी को रोकने के लिए उन्नत तकनीकों का उपयोग करता है और ऑफ़लाइन लेनदेन की अनुमति देता है। गैर-कस्टोडियल Wallet निजी कुंजियों पर पूर्ण नियंत्रण प्रदान करता है। यह रोनिनडोजो, एक उच्च-प्रदर्शन, स्व-होस्टेड Full node, और Whirlpool, चौमियन CoinJoin का कार्यान्वयन भी प्रदान करता है, जिसे बिटकॉइन और उनके लेनदेन इतिहास के बीच लिंक को बाधित करने के लिए डिज़ाइन किया गया है। समौराई के पीछे की टीम में गोपनीयता कार्यकर्ता शामिल हैं जो Bitcoin पारिस्थितिकी तंत्र में गोपनीयता और सुरक्षा को प्राथमिकता देने वाले सॉफ़्टवेयर बनाने के लिए प्रतिबद्ध हैं।