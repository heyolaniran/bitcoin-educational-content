description: |
  Samourai je Bitcoin Wallet posvećen privatnosti i sigurnosti.
  
  Koristi napredne tehnologije za sprečavanje nadzora zasnovanog na Blockchain i omogućava offline transakcije. Nekustodijalni Wallet pruža potpunu kontrolu nad privatnim ključevima. Takođe nudi RoninDojo, visokoperformansni, samohostovani Full node, i Whirlpool, implementaciju Chaumian CoinJoin, dizajniranu da prekine vezu između bitkoina i njihove istorije transakcija. Tim iza Samouraia sastoji se od aktivista za privatnost posvećenih kreiranju softvera koji daje prioritet privatnosti i sigurnosti u Bitcoin ekosistemu.