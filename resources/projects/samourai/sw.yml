description: |
  Samourai ni Bitcoin Wallet inayojitolea kwa faragha na usalama. 
  
  Inatumia teknolojia za hali ya juu kuzuia ufuatiliaji unaotegemea Blockchain na inaruhusu shughuli za nje ya mtandao. Wallet isiyo na kizuizi hutoa udhibiti kamili juu ya funguo za kibinafsi. Pia inatoa RoninDojo, Full node ya utendaji wa juu, inayojiendesha yenyewe, na Whirlpool, utekelezaji wa Chaumian CoinJoin, iliyoundwa kuharibu kiungo kati ya bitcoins na historia yao ya shughuli. Timu iliyo nyuma ya Samourai ina wanaharakati wa faragha waliojitolea kuunda programu inayotanguliza ufaragha na usalama katika mfumo ikolojia wa Bitcoin.