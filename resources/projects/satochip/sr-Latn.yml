description: |
  Satochip, belgijska kompanija, razvija hardverska i softverska rešenja za upravljanje i skladištenje kriptovaluta. Njihov vodeći proizvod, Satochip Hardware Wallet, je NFC kartica opremljena sigurnosnim elementom sa EAL6+ sertifikatom. Dopunjen Seedkeeper-om, menadžerom fraza Mnemonic, i Satodime-om, poklon Cold Wallet, Satochip nudi kompletan asortiman prilagođen potrebama korisnika. Njihovi uređaji, pokretani softverom otvorenog koda, imaju za cilj da demokratizuju Bitcoin sigurnost.