description: |
  ساتوشی‌لبز یک شرکت فناوری است که عمدتاً به خاطر ایجاد ترزور Hardware Wallet شناخته می‌شود، یکی از امن‌ترین و قابل‌اعتمادترین روش‌ها برای ذخیره Bitcoin. این شرکت در سال ۲۰۱۳ توسط مارک پالاتینوس، پاول روسناک و آلنا ورانووا تأسیس شد و در پراگ، جمهوری چک مستقر است.
  
  ترزور Hardware Wallet، محصول اصلی ساتوشی‌لبز، یک دستگاه فیزیکی است که کلیدهای خصوصی کاربران را به صورت آفلاین ذخیره می‌کند. این ویژگی آن را در برابر بسیاری از انواع حملات آنلاین مقاوم می‌سازد. با نگه‌داشتن کلیدهای خصوصی بر روی دستگاه و به صورت آفلاین، ترزور یک Layer اضافی از امنیت را برای دارایی‌های Bitcoin کاربران فراهم می‌کند.
  
  علاوه بر ترزور Hardware Wallet، ساتوشی‌لبز مشارکت‌های قابل‌توجهی در اکوسیستم Bitcoin داشته است. این شامل ایجاد استانداردهای امنیتی مختلف و توسعه فناوری‌های جدیدی است که برای بهبود و حفاظت از تراکنش‌های Bitcoin طراحی شده‌اند.