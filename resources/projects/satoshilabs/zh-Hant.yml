description: |
  SatoshiLabs 是一家科技公司，主要以創造 Trezor Hardware Wallet 而聞名，Trezor Hardware Wallet 是儲存 Bitcoin 最安全、最值得信賴的方式之一。該公司由 Marek Palatinus、Pavol Rusnak 和 Alena Vranova 於 2013 年創立，總部設在捷克布拉格。
  
  Trezor Hardware Wallet 是 SatoshiLabs 的旗艦產品，它是一款實體裝置，可離線安全儲存使用者的私密金鑰。這一特性使其可以抵禦許多類型的線上黑客攻擊。Trezor 將私人密碼鑰匙保存在離線裝置上，為使用者的 Bitcoin 資產提供額外的 Layer 安全性。
  
  除了 Trezor Hardware Wallet 之外，SatoshiLabs 還為 Bitcoin 生態系統做出了重大貢獻。這包括創建各種安全標準和開發旨在增強和保護 Bitcoin 交易的新技術。