description: |
  Za hraní her, testování aplikací, sledování videí, vyplňování průzkumů a další úkoly dostanete zaplaceno v Bitcoin. Při používání SatsFaucet budete získávat mince, nikoli přímo Sats. Mince mají cenu vázanou na americký dolar (10 tisíc mincí = 1 dolar) a můžete je kdykoli vyměnit za Sats. Váš zůstatek na účtu Sats je přepočtem zůstatku mincí v reálném čase a nepředstavuje váš skutečný zůstatek. Začněme vaši cestu stackerem!