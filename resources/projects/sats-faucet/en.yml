description: |
  Get paid in Bitcoin for playing games, testing apps, watching videos, completing surveys and more. While using SatsFaucet you will earn coins, not directly sats. Coins have a price tied to the US dollar (10k coins = $1) and can be exchanged at any time against sats. Your sats balance is a real time conversion of your coins balance and does not represent your real balance. Let's begin your stacker journey!