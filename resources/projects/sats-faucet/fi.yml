description: |
  Saat palkkaa Bitcoin:na pelien pelaamisesta, sovellusten testaamisesta, videoiden katselusta, kyselyihin vastaamisesta ja muusta. Kun käytät SatsFaucettia, ansaitset kolikoita, et suoraan Sats:tä. Kolikoiden hinta on sidottu Yhdysvaltain dollariin (10 000 kolikkoa = 1 dollari), ja ne voidaan vaihtaa milloin tahansa Sats:een. Sats-saldosi on reaaliaikainen muunnos kolikkosaldostasi, eikä se edusta todellista saldoasi. Aloitetaan pinoaja matkasi!