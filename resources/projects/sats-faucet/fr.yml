description: |
  Soyez payé en Bitcoin pour jouer à des jeux, tester des applications, regarder des vidéos, répondre à des enquêtes et plus encore. En utilisant SatsFaucet, vous gagnerez des pièces, pas directement des Sats. Les pièces ont un prix lié au dollar américain (10k pièces = 1$) et peuvent être échangées à tout moment contre des Sats. Votre solde Sats est une conversion en temps réel de votre solde de pièces et ne représente pas votre solde réel. Commençons votre voyage d'empileur !