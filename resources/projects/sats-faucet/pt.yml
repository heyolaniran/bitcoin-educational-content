description: |
  Seja pago em Bitcoin por jogar jogos, testar aplicações, ver vídeos, responder a inquéritos e muito mais. Ao usar o SatsFaucet, você ganhará moedas, não diretamente Sats. As moedas têm um preço ligado ao dólar americano (10k moedas = $1) e podem ser trocadas a qualquer momento por Sats. O seu saldo de Sats é uma conversão em tempo real do seu saldo de moedas e não representa o seu saldo real. Vamos começar sua jornada de empilhador!