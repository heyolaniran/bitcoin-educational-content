description: |
  Primajte isplate u Bitcoin za igranje igara, testiranje aplikacija, gledanje video zapisa, popunjavanje anketa i još mnogo toga. Dok koristite SatsFaucet, zarađivaćete novčiće, a ne direktno Sats. Novčići imaju cenu vezanu za američki dolar (10k novčića = $1) i mogu se zameniti u bilo kom trenutku za Sats. Vaš Sats saldo je konverzija vašeg salda novčića u realnom vremenu i ne predstavlja vaš stvarni saldo. Počnimo vaše stacker putovanje!