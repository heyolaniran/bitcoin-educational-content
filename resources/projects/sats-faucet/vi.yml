description: |
  Được trả bằng Bitcoin khi chơi trò chơi, thử nghiệm ứng dụng, xem video, hoàn thành khảo sát và nhiều hơn nữa. Khi sử dụng SatsFaucet, bạn sẽ kiếm được xu, không phải trực tiếp là Sats. Xu có giá được gắn với đô la Mỹ (10.000 xu = 1 đô la) và có thể được đổi bất kỳ lúc nào lấy Sats. Số dư Sats của bạn là số dư chuyển đổi theo thời gian thực của số dư xu và không đại diện cho số dư thực của bạn. Hãy bắt đầu hành trình stacker của bạn!