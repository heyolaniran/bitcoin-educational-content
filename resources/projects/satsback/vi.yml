description: |
  Satsback là một nền tảng phần thưởng và hoàn tiền khuyến khích chi tiêu hàng ngày bằng cách trao thưởng cho người dùng satoshi—đơn vị nhỏ nhất của Bitcoin. Hợp tác với nhiều nhà bán lẻ khác nhau, Satsback cho phép người tiêu dùng kiếm được Bitcoin khi mua hàng, qua đó thúc đẩy việc áp dụng rộng rãi hơn tiền kỹ thuật số đồng thời mang lại lợi ích hữu hình cho người dùng.
  