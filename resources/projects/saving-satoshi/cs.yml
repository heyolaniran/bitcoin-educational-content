description: |
 Saving Satoshi je odlehčená interaktivní hra na hrdiny (RPG) o technologii Bitcoin. Kombinuje zábavné, inovativní úkoly s vyprávěním příběhu a herními mechanismy a vytváří tak nenáročný vstupní bod do vývoje Bitcoin. Je vytvořena se zábavou pro zvídavé programátory a všechny, kteří se chtějí dozvědět, jak Bitcoin skutečně funguje. Je pro ty, kteří viděli kouzlo open source softwaru Bitcoin (₿OSS) a hledají způsob, jak začít přispívat.
 
  Každá kapitola je naplněna obsahem lekcí založených na kódu, simulacemi a programovacími cvičeními, které zpříjemní učení esoterických detailů technologie Bitcoin. Díky jednoduchým a přímočarým příkladům si hráči vybudují pevné základy, než začnou vrstvit složitosti. Prostřednictvím pohlcujícího UX, bohatých vizuálů a bezproblémových interakcí se žáci vydávají na cestu různými tématy.