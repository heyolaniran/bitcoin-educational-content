description: |
 Saving Satoshi ist ein unbeschwertes, interaktives Rollenspiel (RPG) über Bitcoin-Technologie. Es kombiniert lustige, innovative Herausforderungen mit Geschichten und Spielmechaniken, um einen sanften Einstieg in die Bitcoin-Entwicklung zu schaffen. Es ist mit Spaß für neugierige Programmierer und alle, die lernen wollen, wie Bitcoin wirklich funktioniert, aufgebaut. Es ist für diejenigen, die die Magie der Bitcoin Open-Source-Software (₿OSS) gesehen haben und nach Möglichkeiten suchen, einen Beitrag zu leisten.
 
  Jedes Kapitel ist mit codebasierten Lerninhalten, Simulationen und Programmierübungen gefüllt, um das Erlernen der esoterischen Details der Bitcoin-Technik angenehmer zu gestalten. Mit einfachen, geradlinigen Beispielen bauen die Spieler eine solide Grundlage auf, bevor sie die Komplexität erhöhen. Durch eine immersive UX, reichhaltige Grafiken und nahtlose Interaktionen werden die Lernenden auf eine Reise durch eine Vielzahl von Themen mitgenommen.