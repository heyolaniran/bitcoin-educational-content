description: |
 Saving Satoshi is a light-hearted, interactive role-playing game (RPG) about bitcoin tech. It combines fun, innovative challenges with storytelling and game mechanics to create a gentle entry point to bitcoin development. It's built with fun for curious coders and anyone that wants to learn how bitcoin really works. It's for those that have seen the magic of bitcoin open source software (₿OSS) and are are looking for ways to start contributing.

  Each chapter is filled with code-based lesson content, simulations, and programming exercises to make learning the esoteric details of bitcoin tech more enjoyable. With simple, straightforward examples, players build solid foundations before layering on the complexity. Through an immersive UX, rich visuals, and seamless interactions, learners are taken on a journey through a variety of topics.
