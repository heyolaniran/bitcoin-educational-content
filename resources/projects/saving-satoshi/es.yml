description: |
 Saving Satoshi es un juego de rol (RPG) desenfadado e interactivo sobre la tecnología de Bitcoin. Combina retos divertidos e innovadores con la narración de historias y la mecánica de juego para crear un punto de entrada suave al desarrollo de Bitcoin. Está pensado para que se diviertan los programadores curiosos y cualquiera que quiera aprender cómo funciona Bitcoin. Es para aquellos que han visto la magia del software de código abierto de Bitcoin (₿OSS) y buscan formas de empezar a contribuir.
 
  Cada capítulo está repleto de lecciones basadas en código, simulaciones y ejercicios de programación para hacer más ameno el aprendizaje de los detalles esotéricos de la tecnología de Bitcoin. Con ejemplos sencillos y directos, los jugadores construyen bases sólidas antes de aumentar la complejidad. A través de una experiencia de usuario envolvente, ricos efectos visuales e interacciones fluidas, los alumnos se embarcan en un viaje a través de una gran variedad de temas.