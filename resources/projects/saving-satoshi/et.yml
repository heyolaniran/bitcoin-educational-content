description: |
 Saving Satoshi on kerge interaktiivne rollimäng (RPG) Bitcoin tehnoloogia kohta. See ühendab lõbusad, uuenduslikud väljakutsed jutustamise ja mängumehaanikaga, et luua õrn sissepääs Bitcoin arengusse. See on loodud lõbusalt uudishimulikele kodeerijatele ja kõigile, kes tahavad teada saada, kuidas Bitcoin tegelikult töötab. See on mõeldud neile, kes on näinud Bitcoin avatud lähtekoodiga tarkvara (₿OSS) võlu ja otsivad võimalusi, kuidas hakata kaasa lööma.
 
  Iga peatükk on täis koodipõhist õppesisu, simulatsioone ja programmeerimisharjutusi, mis muudavad Bitcoin tehnoloogia esoteeriliste üksikasjade õppimise nauditavamaks. Lihtsate ja arusaadavate näidete abil loovad mängijad enne keerukuse suurendamist kindla aluse. Tänu kaasahaaravale kasutajakeskkonnale, rikkalikule visuaalile ja sujuvale interaktsioonile viiakse õppijad teekonnale läbi erinevate teemade.