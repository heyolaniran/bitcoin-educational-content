description: |
 نجات Satoshi یک بازی نقش‌آفرینی (RPG) تعاملی و سبک‌دلانه درباره فناوری Bitcoin است. این بازی چالش‌های سرگرم‌کننده و نوآورانه را با داستان‌سرایی و مکانیک‌های بازی ترکیب می‌کند تا نقطه ورود ملایمی به توسعه Bitcoin ایجاد کند. این بازی برای برنامه‌نویسان کنجکاو و هر کسی که می‌خواهد بفهمد Bitcoin واقعاً چگونه کار می‌کند، ساخته شده است. این بازی برای کسانی است که جادوی نرم‌افزار متن‌باز Bitcoin (₿OSS) را دیده‌اند و به دنبال راه‌هایی برای شروع مشارکت هستند.
 
 هر فصل پر از محتوای درسی مبتنی بر کد، شبیه‌سازی‌ها و تمرین‌های برنامه‌نویسی است تا یادگیری جزئیات پیچیده فناوری Bitcoin را لذت‌بخش‌تر کند. با مثال‌های ساده و سرراست، بازیکنان پایه‌های محکمی می‌سازند قبل از اینکه پیچیدگی را لایه‌لایه اضافه کنند. از طریق یک تجربه کاربری فراگیر، تصاویر غنی و تعاملات بی‌نقص، یادگیرندگان به سفری در میان موضوعات متنوع برده می‌شوند.