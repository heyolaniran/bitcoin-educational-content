description: |
 Saving Satoshi on kevyt, interaktiivinen roolipeli (RPG) Bitcoin-teknologiasta. Siinä yhdistyvät hauskat, innovatiiviset haasteet sekä tarinankerronta ja pelimekaniikka, mikä luo lempeän lähtökohdan Bitcoin:n kehittämiseen. Se on rakennettu hauskasti uteliaille koodareille ja kaikille, jotka haluavat oppia, miten Bitcoin todella toimii. Se on tarkoitettu niille, jotka ovat nähneet Bitcoin:n avoimen lähdekoodin ohjelmistojen (₿OSS) taikuuden ja etsivät tapoja aloittaa osallistuminen.
 
  Jokainen luku on täynnä koodipohjaista oppisisältöä, simulaatioita ja ohjelmointiharjoituksia, jotka tekevät Bitcoin-tekniikan esoteeristen yksityiskohtien oppimisesta miellyttävämpää. Yksinkertaisten ja suoraviivaisten esimerkkien avulla pelaajat luovat vankan perustan ennen monimutkaisuuden lisäämistä. Mukaansatempaavan käyttöliittymän, rikkaan visuaalisen ilmeen ja saumattoman vuorovaikutuksen avulla oppijat viedään matkalle eri aiheiden läpi.