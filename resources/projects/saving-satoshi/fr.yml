description: |
 Saving Satoshi est un jeu de rôle (RPG) interactif et léger sur la technologie Bitcoin. Il combine des défis amusants et innovants avec une histoire et des mécanismes de jeu pour créer un point d'entrée doux au développement de Bitcoin. Il est conçu pour amuser les codeurs curieux et tous ceux qui veulent apprendre comment fonctionne réellement Bitcoin. Il s'adresse à ceux qui ont vu la magie des logiciels libres de Bitcoin (₿OSS) et qui cherchent à y contribuer.
 
  Chaque chapitre est rempli de leçons basées sur le code, de simulations et d'exercices de programmation pour rendre plus agréable l'apprentissage des détails ésotériques de la technologie de Bitcoin. Avec des exemples simples et directs, les joueurs construisent des bases solides avant d'entrer dans la complexité. Grâce à une interface utilisateur immersive, des visuels riches et des interactions transparentes, les apprenants sont emmenés dans un voyage à travers une variété de sujets.