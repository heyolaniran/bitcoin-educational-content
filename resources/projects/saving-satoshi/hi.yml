description: |
 सेविंग Satoshi, Bitcoin तकनीक के बारे में एक हल्का-फुल्का, इंटरैक्टिव रोल-प्लेइंग गेम (RPG) है। यह Bitcoin विकास के लिए एक सौम्य प्रवेश बिंदु बनाने के लिए कहानी कहने और गेम मैकेनिक्स के साथ मज़ेदार, अभिनव चुनौतियों को जोड़ता है। यह जिज्ञासु कोडर्स और किसी भी व्यक्ति के लिए मज़ेदार तरीके से बनाया गया है जो सीखना चाहता है कि Bitcoin वास्तव में कैसे काम करता है। यह उन लोगों के लिए है जिन्होंने Bitcoin ओपन सोर्स सॉफ़्टवेयर (₿OSS) का जादू देखा है और योगदान देना शुरू करने के तरीकों की तलाश कर रहे हैं।
 
 प्रत्येक अध्याय कोड-आधारित पाठ सामग्री, सिमुलेशन और प्रोग्रामिंग अभ्यासों से भरा हुआ है ताकि Bitcoin तकनीक के गूढ़ विवरणों को सीखना अधिक मनोरंजक हो सके। सरल, सीधे उदाहरणों के साथ, खिलाड़ी जटिलता पर परत चढ़ाने से पहले ठोस नींव बनाते हैं। एक इमर्सिव UX, समृद्ध विज़ुअल और सहज इंटरैक्शन के माध्यम से, शिक्षार्थियों को विभिन्न विषयों के माध्यम से एक यात्रा पर ले जाया जाता है।