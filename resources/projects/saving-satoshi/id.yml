description: |
 Saving Satoshi adalah sebuah permainan role-playing game (RPG) interaktif yang ringan tentang teknologi Bitcoin. Game ini menggabungkan tantangan yang menyenangkan dan inovatif dengan cerita dan mekanisme permainan untuk menciptakan titik masuk yang mudah ke pengembangan Bitcoin. Game ini dibuat dengan menyenangkan untuk para pembuat kode yang penasaran dan siapa pun yang ingin mempelajari cara kerja Bitcoin. Ini untuk mereka yang telah melihat keajaiban perangkat lunak sumber terbuka Bitcoin (₿OSS) dan mencari cara untuk mulai berkontribusi.
 
  Setiap bab diisi dengan konten pelajaran berbasis kode, simulasi, dan latihan pemrograman untuk membuat mempelajari detail esoterik teknologi Bitcoin menjadi lebih menyenangkan. Dengan contoh-contoh yang sederhana dan lugas, para pemain membangun fondasi yang kuat sebelum melangkah ke tingkat yang lebih rumit. Melalui UX yang imersif, visual yang kaya, dan interaksi yang lancar, para pelajar dibawa dalam perjalanan melalui berbagai topik.