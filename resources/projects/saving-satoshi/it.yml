description: |
 Saving Satoshi è un gioco di ruolo (RPG) interattivo e leggero sulla tecnologia Bitcoin. Combina sfide divertenti e innovative con la narrazione e le meccaniche di gioco per creare un punto di accesso delicato allo sviluppo di Bitcoin. È costruito con divertimento per i coder curiosi e per chiunque voglia imparare come funziona davvero Bitcoin. È per coloro che hanno visto la magia del software open source di Bitcoin (₿OSS) e sono alla ricerca di modi per iniziare a contribuire.
 
  Ogni capitolo è ricco di contenuti didattici basati sul codice, simulazioni ed esercizi di programmazione per rendere più piacevole l'apprendimento dei dettagli esoterici della tecnologia di Bitcoin. Con esempi semplici e diretti, i giocatori costruiscono solide basi prima di passare alla complessità. Grazie a un'interfaccia utente coinvolgente, a una grafica ricca e a interazioni senza soluzione di continuità, gli studenti vengono accompagnati in un viaggio attraverso una serie di argomenti.