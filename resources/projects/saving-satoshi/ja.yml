description: |
 Saving Satoshiは、Bitcoinの技術に関する軽快なインタラクティブ・ロールプレイング・ゲーム（RPG）です。楽しく革新的なチャレンジとストーリーテリング、ゲームメカニクスを組み合わせ、Bitcoin開発への優しい入口を作ります。好奇心旺盛なコーダーや、Bitcoinが実際にどのように動くのかを学びたい人なら誰でも楽しめるように作られています。Bitcoinオープンソースソフトウェア(₿OSS)の魔法を見て、貢献する方法を探している人のためのものです。
 
  各章には、コードベースのレッスンコンテンツ、シミュレーション、プログラミング演習が盛り込まれており、Bitcoin技術の難解な詳細をより楽しく学ぶことができます。シンプルでわかりやすい例題で、プレイヤーは複雑さを重ねる前にしっかりとした基礎を築くことができます。没入感のあるUX、リッチなビジュアル、シームレスなインタラクションを通して、学習者は様々なトピックを巡る旅へと誘われる。