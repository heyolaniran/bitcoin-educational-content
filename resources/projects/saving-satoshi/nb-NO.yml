description: |
 Saving Satoshi er et muntert, interaktivt rollespill (RPG) om Bitcoin-teknologi. Det kombinerer morsomme, innovative utfordringer med historiefortelling og spillmekanikk for å skape en skånsom inngang tBitcoin-utvikling. Det er bygget med moro for nysgjerrige kodere og alle som ønsker å lære hvordan Bitcoin virkelig fungerer. Det er for dem som har sett magien i Bitcoins programvare med åpen kildekode (₿OSS) og er på utkikk etter måter å begynne å bidra på.
 
  Hvert kapittel er fylt med kodebasert leksjonsinnhold, simuleringer og programmeringsøvelser for å gjøre det morsommere å lære seg de esoteriske detaljene i Bitcoin-teknologien. Med enkle, greie eksempler bygger spillerne et solid grunnlag før de legger på kompleksiteten. Gjennom en oppslukende UX, rik grafikk og sømløse interaksjoner blir elevene tatt med på en reise gjennom en rekke emner.