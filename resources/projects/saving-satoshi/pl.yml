description: |
 Saving Satoshi to lekka, interaktywna gra fabularna (RPG) o technologii Bitcoin. Łączy w sobie zabawne, innowacyjne wyzwania z fabułą i mechaniką gry, tworząc łagodny punkt wejścia do rozwoju Bitcoin. Została stworzona z myślą o ciekawskich programistach i wszystkich, którzy chcą dowiedzieć się, jak naprawdę działa Bitcoin. Jest dla tych, którzy widzieli magię otwartego oprogramowania Bitcoin (₿OSS) i szukają sposobów na rozpoczęcie współtworzenia.
 
  Każdy rozdział jest wypełniony lekcjami opartymi na kodzie, symulacjami i ćwiczeniami programistycznymi, aby nauka ezoterycznych szczegółów technologii Bitcoin była przyjemniejsza. Dzięki prostym, nieskomplikowanym przykładom gracze budują solidne podstawy, zanim przejdą do bardziej złożonej rozgrywki. Dzięki wciągającemu UX, bogatej oprawie wizualnej i płynnym interakcjom, uczniowie są zabierani w podróż przez różne tematy.