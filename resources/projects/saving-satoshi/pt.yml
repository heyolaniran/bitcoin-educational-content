description: |
 Saving Satoshi é um jogo de role-playing (RPG) interativo e leve sobre a tecnologia Bitcoin. Combina desafios divertidos e inovadores com histórias e mecânicas de jogo para criar um ponto de entrada suave para o desenvolvimento do Bitcoin. É construído com diversão para programadores curiosos e qualquer pessoa que queira aprender como o Bitcoin realmente funciona. É para aqueles que viram a magia do software de código aberto do Bitcoin (₿OSS) e estão à procura de formas de começar a contribuir.
 
  Cada capítulo é preenchido com conteúdo de lições baseadas em código, simulações e exercícios de programação para tornar a aprendizagem dos detalhes esotéricos da tecnologia Bitcoin mais agradável. Com exemplos simples e diretos, os jogadores constroem bases sólidas antes de aumentarem a complexidade. Através de uma experiência de utilizador imersiva, imagens ricas e interações perfeitas, os alunos são levados numa viagem através de uma variedade de tópicos.