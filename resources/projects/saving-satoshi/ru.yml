description: |
 Saving Satoshi - это легкомысленная интерактивная ролевая игра (RPG) о технологиях Bitcoin. Она сочетает в себе забавные инновационные задачи с сюжетными историями и игровой механикой, чтобы создать мягкую точку входа в разработку Bitcoin. Она создана для любопытных кодеров и всех, кто хочет узнать, как на самом деле работает Bitcoin. Она предназначена для тех, кто увидел магию открытого программного обеспечения Bitcoin (₿OSS) и ищет способы начать вносить свой вклад.
 
  Каждая глава наполнена уроками, основанными на коде, симуляторами и упражнениями по программированию, чтобы сделать изучение эзотерических деталей технологии Bitcoin более приятным. На простых и понятных примерах игроки закладывают прочный фундамент, прежде чем приступать к усложнению. Благодаря захватывающему UX, богатому визуальному ряду и плавному взаимодействию учащиеся отправляются в путешествие по различным темам.