description: |
 Čuvanje Satoshi je zabavna, interaktivna igra uloga (RPG) o Bitcoin tehnologiji. Kombinuje zabavne, inovativne izazove sa pripovedanjem i mehanikom igre kako bi stvorila blag ulaz u razvoj Bitcoin. Napravljena je za zabavu radoznalih programera i svih koji žele da nauče kako Bitcoin zaista funkcioniše. Namenjena je onima koji su videli magiju Bitcoin softvera otvorenog koda (₿OSS) i traže načine da počnu da doprinose.
 
 Svako poglavlje je ispunjeno sadržajem lekcija zasnovanih na kodu, simulacijama i programerskim vežbama kako bi učenje ezoteričnih detalja Bitcoin tehnologije bilo prijatnije. Sa jednostavnim, jasnim primerima, igrači grade čvrste osnove pre nego što dodaju složenost. Kroz imerzivni UX, bogate vizuale i besprekornu interakciju, učenici se vode na putovanje kroz razne teme.