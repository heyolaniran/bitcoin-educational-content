description: |
 Saving Satoshi är ett lättsamt, interaktivt rollspel (RPG) om Bitcoin-teknik. Det kombinerar roliga, innovativa utmaningar med historieberättande och spelmekanik för att skapa en mild ingång till Bitcoin-utveckling. Det är byggt för att vara roligt för nyfikna kodare och alla som vill lära sig hur Bitcoin verkligen fungerar. Det är för dem som har sett magin i Bitcoin:s programvara med öppen källkod (₿OSS) och letar efter sätt att börja bidra.
 
  Varje kapitel är fyllt med kodbaserat lektionsinnehåll, simuleringar och programmeringsövningar för att göra det roligare att lära sig de esoteriska detaljerna i Bitcoin-tekniken. Med enkla, okomplicerade exempel bygger spelarna en solid grund innan de lägger på komplexiteten. Genom en uppslukande UX, rika bilder och sömlösa interaktioner tas eleverna med på en resa genom en mängd olika ämnen.