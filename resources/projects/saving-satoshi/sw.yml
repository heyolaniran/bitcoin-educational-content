description: |
 Kuokoa Satoshi ni mchezo wa kuigiza-jukumu wa moyo mwepesi (RPG) kuhusu teknolojia ya Bitcoin. Inachanganya changamoto za kufurahisha na za ubunifu na usimulizi wa hadithi na mbinu za mchezo ili kuunda mahali pazuri pa kuingia katika ukuzaji wa Bitcoin. Imeundwa kwa furaha kwa ajili ya kuweka coders na mtu yeyote anayetaka kujifunza jinsi Bitcoin inavyofanya kazi. Ni kwa wale ambao wameona uchawi wa programu huria ya Bitcoin (₿OSS) na wanatafuta njia za kuanza kuchangia.
 
  Kila sura imejazwa na maudhui ya somo kulingana na msimbo, uigaji, na mazoezi ya kupanga ili kufanya ujifunzaji wa maelezo ya kizamani ya teknolojia ya Bitcoin kufurahisha zaidi. Kwa mifano rahisi na ya moja kwa moja, wachezaji hujenga misingi thabiti kabla ya kuweka juu ya utata. Kupitia UX ya kina, taswira tele, na mwingiliano usio na mshono, wanafunzi huchukuliwa kwenye safari kupitia mada mbalimbali.