description: |
 Saving Satoshi là một trò chơi nhập vai (RPG) tương tác, nhẹ nhàng về công nghệ Bitcoin. Trò chơi kết hợp những thử thách thú vị, sáng tạo với cốt truyện và cơ chế trò chơi để tạo ra một điểm khởi đầu nhẹ nhàng cho quá trình phát triển Bitcoin. Trò chơi được xây dựng với sự thú vị dành cho những người viết mã tò mò và bất kỳ ai muốn tìm hiểu cách Bitcoin thực sự hoạt động. Trò chơi dành cho những người đã thấy được sự kỳ diệu của phần mềm nguồn mở (OSS) Bitcoin và đang tìm cách bắt đầu đóng góp.
 
 Mỗi chương đều chứa đầy nội dung bài học dựa trên mã, mô phỏng và bài tập lập trình để giúp việc học các chi tiết bí truyền của công nghệ Bitcoin trở nên thú vị hơn. Với các ví dụ đơn giản, dễ hiểu, người chơi xây dựng nền tảng vững chắc trước khi đi sâu vào sự phức tạp. Thông qua UX nhập vai, hình ảnh phong phú và tương tác liền mạch, người học sẽ được đưa vào hành trình khám phá nhiều chủ đề khác nhau.