description: |
 拯救 Satoshi 是一款关于 Bitcoin 技术的轻松互动角色扮演游戏（RPG）。它将有趣、创新的挑战与讲故事和游戏机制相结合，为 Bitcoin 开发提供了一个温和的切入点。它为好奇的程序员和任何想了解 Bitcoin 如何真正运作的人提供了乐趣。它适合那些已经见识过 Bitcoin 开源软件（₿OSS）的魔力，并正在寻找方法开始贡献自己力量的人。
 
  每一章都有基于代码的课程内容、模拟和编程练习，让学习 Bitcoin 技术的深奥细节变得更加轻松愉快。通过简单明了的示例，玩家可以在学习复杂的知识之前打下坚实的基础。通过身临其境的用户体验、丰富的视觉效果和无缝的交互，学习者将踏上各种主题的旅程。