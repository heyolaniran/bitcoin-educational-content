description: |
 拯救 Satoshi 是一款關於 Bitcoin 科技的輕快互動角色扮演遊戲 (RPG)。它結合了有趣、創新的挑戰、故事和遊戲機制，為 Bitcoin 開發創造了一個溫和的切入點。它是為好奇的程式設計師和任何想要學習 Bitcoin 如何真正運作的人所設計的遊戲。它適合那些已經看到 Bitcoin 開放原始碼軟體 (₿OSS)的魔力，並且正在尋找方法開始貢獻的人。
 
  每章都有以程式碼為基礎的教學內容、模擬和程式練習，讓學習 Bitcoin 科技的深奧細節變得更愉快。透過簡單直接的範例，玩家可以先建立紮實的基礎，然後再逐步增加複雜度。透過身歷其境的使用者經驗、豐富的視覺效果和無縫的互動，學習者將在各種主題中進行學習。