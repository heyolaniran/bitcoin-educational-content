description: |
  مدرسه Bitcoin یک جامعه یادگیری پویا را از طریق درس‌های باز V4V و سیستم آموزش خودمختار غیرمتمرکز (DAES) ارائه می‌دهد.  
  جلسات ماهانه V4V ما در HiveTalk برای همه باز است و مهارت‌آموزی در فضای Bitcoin را ترویج می‌کند، با این امکان که شرکت‌کنندگان بتوانند کمک‌های مالی مستقیم دریافت کنند. DAES از یادگیرندگان مشتاق با ارائه یک پلتفرم برای ارسال پروژه‌های Bitcoin، تأمین مالی احتمالی و راهنمایی پشتیبانی می‌کند.  
  ما همچنین اخبار Stacker در قلمرو آموزش را مدیریت می‌کنیم و یک چت Signal برای همکاری ارائه می‌دهیم. به ما بپیوندید تا در جامعه Bitcoin مشارکت، یادگیری و نوآوری کنید.