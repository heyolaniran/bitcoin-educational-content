description: |
  Škola Bitcoin je vzdělávací platforma s ambiciózním cílem naučit 21 milionů lidí na celém světě bezpečně používat Bitcoin. Iniciativa poskytuje přístupné a cenově dostupné vzdělávání o Bitcoin prostřednictvím digitálních zdrojů, díky čemuž jsou složité koncepty Bitcoin snadno pochopitelné pro každého. Platforma se zaměřuje na globální dosah a inkluzivitu a jejím cílem je překlenout mezeru ve znalostech o Bitcoin, zejména se zaměřením na komunity s nedostatečnou péčí, kterým by pochopení Bitcoin mohlo přinést největší prospěch. Jejich komplexní výukový program zahrnuje bezpečnost Bitcoin, praktické využití a základní koncepty, a to vše prostřednictvím uživatelsky přívětivých digitálních výukových materiálů.
  