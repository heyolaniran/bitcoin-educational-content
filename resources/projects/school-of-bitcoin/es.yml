description: |
  School of Bitcoin es una plataforma educativa con la ambiciosa misión de enseñar a 21 millones de personas de todo el mundo a utilizar Bitcoin de forma segura. La iniciativa ofrece una educación accesible y asequible sobre la Bitcoin a través de recursos digitales, haciendo que los conceptos complejos de la Bitcoin sean fáciles de entender para todo el mundo. Con un enfoque de alcance global e inclusivo, la plataforma pretende colmar la brecha de conocimientos en la educación sobre la Bitcoin, centrándose especialmente en las comunidades menos favorecidas que más podrían beneficiarse de la comprensión de la Bitcoin. Su completo plan de estudios abarca la seguridad, el uso práctico y los conceptos fundamentales de la Bitcoin, todo ello a través de materiales didácticos digitales fáciles de usar.
  