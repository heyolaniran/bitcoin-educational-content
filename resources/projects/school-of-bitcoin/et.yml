description: |
  Bitcoin kool on haridusplatvorm, mille ambitsioonikas eesmärk on õpetada 21 miljonile inimesele üle maailma Bitcoin ohutut kasutamist. Algatus pakub digiressursside kaudu kättesaadavat ja taskukohast Bitcoin haridust, muutes keerulised Bitcoin mõisted kõigile arusaadavaks. Keskendudes ülemaailmsele haardele ja kaasavusele, on platvormi eesmärk täita Bitcoin hariduses esinevat teadmiste puudujääki, keskendudes eelkõige vähekindlustatud kogukondadele, kes võiksid Bitcoin mõistmisest kõige rohkem kasu saada. Nende põhjalik õppekava hõlmab Bitcoin ohutust, praktilist kasutamist ja põhimõisteid, mis kõik on esitatud kasutajasõbralike digitaalsete õppematerjalide kaudu.
  