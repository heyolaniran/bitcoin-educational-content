description: |
  مدرسه Bitcoin یک پلتفرم آموزشی با مأموریت بلندپروازانه آموزش ۲۱ میلیون نفر در سراسر جهان درباره استفاده ایمن از Bitcoin است. این ابتکار آموزشی از طریق منابع دیجیتال، آموزش Bitcoin را به صورت قابل دسترس و مقرون‌به‌صرفه ارائه می‌دهد و مفاهیم پیچیده Bitcoin را برای همه آسان می‌کند. با تمرکز بر دسترسی جهانی و شمولیت، این پلتفرم هدف دارد تا شکاف دانشی در آموزش Bitcoin را پر کند، به ویژه با هدف قرار دادن جوامع محرومی که می‌توانند بیشترین بهره را از درک Bitcoin ببرند. برنامه درسی جامع آن شامل ایمنی Bitcoin، استفاده عملی و مفاهیم بنیادی است که همگی از طریق مواد آموزشی دیجیتال کاربرپسند ارائه می‌شوند.