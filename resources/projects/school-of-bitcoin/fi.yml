description: |
  School of Bitcoin on koulutusfoorumi, jonka kunnianhimoisena tehtävänä on opettaa 21 miljoonalle ihmiselle maailmanlaajuisesti Bitcoin:n turvallinen käyttö. Aloite tarjoaa helppokäyttöistä ja kohtuuhintaista Bitcoin-koulutusta digitaalisten resurssien avulla, jolloin monimutkaiset Bitcoin-käsitteet ovat helposti ymmärrettävissä kaikille. Keskittymällä maailmanlaajuiseen ulottuvuuteen ja osallistavuuteen foorumi pyrkii kuromaan umpeen Bitcoin-koulutuksen tietovajetta, ja se on suunnattu erityisesti heikommassa asemassa oleville yhteisöille, jotka hyötyisivät eniten Bitcoin:n ymmärtämisestä. Heidän kattava opetussuunnitelmansa kattaa Bitcoin:n turvallisuuden, käytännön käytön ja peruskäsitteet, ja kaikki tämä tapahtuu käyttäjäystävällisen digitaalisen oppimateriaalin avulla.
  