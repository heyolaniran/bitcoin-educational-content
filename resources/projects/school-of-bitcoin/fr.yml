description: |
  L'école du Bitcoin est une plateforme éducative dont la mission ambitieuse est d'enseigner à 21 millions de personnes dans le monde l'utilisation sûre du Bitcoin. L'initiative offre une éducation Bitcoin accessible et abordable par le biais de ressources numériques, rendant les concepts Bitcoin complexes faciles à comprendre pour tout le monde. En mettant l'accent sur la portée mondiale et l'inclusivité, la plateforme vise à combler le déficit de connaissances dans l'éducation au Bitcoin, en ciblant particulièrement les communautés mal desservies qui pourraient bénéficier le plus de la compréhension du Bitcoin. Leur programme d'études complet couvre la sécurité, l'utilisation pratique et les concepts fondamentaux du Bitcoin, le tout grâce à des supports d'apprentissage numériques conviviaux.
  