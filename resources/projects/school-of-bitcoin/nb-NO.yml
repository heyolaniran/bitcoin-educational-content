description: |
  School of Bitcoin er en utdanningsplattform med det ambisiøse målet om å lære 21 millioner mennesker verden over om trygg Bitcoin-bruk. Initiativet leverer tilgjengelig og rimelig Bitcoin-utdanning gjennom digitale ressurser, noe som gjør komplekse Bitcoin-konsepter enkle å forstå for alle. Med fokus på global rekkevidde og inkludering har plattformen som mål å bygge bro over kunnskapsgapet i Bitcoin-utdanning, spesielt rettet mot underbetjente samfunn som kan ha størst nytte av å forstå Bitcoin. Den omfattende læreplanen deres dekker Bitcoin-sikkerhet, praktisk bruk og grunnleggende konsepter, alt levert gjennom brukervennlig digitalt læringsmateriell.
  