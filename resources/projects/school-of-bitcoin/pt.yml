description: |
  A School of Bitcoin é uma plataforma educativa com a ambiciosa missão de ensinar 21 milhões de pessoas em todo o mundo sobre a utilização segura do Bitcoin. A iniciativa oferece educação acessível e económica sobre o Bitcoin através de recursos digitais, tornando os conceitos complexos do Bitcoin fáceis de compreender para todos. Com foco no alcance global e na inclusão, a plataforma tem como objetivo colmatar a lacuna de conhecimento na educação sobre o Bitcoin, visando particularmente as comunidades carentes que mais poderiam beneficiar da compreensão do Bitcoin. O seu currículo abrangente cobre a segurança do Bitcoin, a utilização prática e os conceitos fundamentais, tudo isto através de materiais de aprendizagem digitais de fácil utilização.
  