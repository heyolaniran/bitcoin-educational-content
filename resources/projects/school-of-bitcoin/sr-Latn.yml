description: |
  Škola Bitcoin je obrazovna platforma sa ambicioznom misijom da poduči 21 milion ljudi širom sveta o bezbednoj upotrebi Bitcoin. Inicijativa pruža pristupačno i povoljno obrazovanje o Bitcoin putem digitalnih resursa, čineći složene koncepte Bitcoin lakim za razumevanje svima. Sa fokusom na globalni doseg i inkluzivnost, platforma ima za cilj da premosti jaz u znanju o Bitcoin obrazovanju, posebno ciljajući nedovoljno uslužene zajednice koje bi najviše mogle imati koristi od razumevanja Bitcoin. Njihov sveobuhvatni kurikulum pokriva bezbednost Bitcoin, praktičnu upotrebu i osnovne koncepte, sve isporučeno kroz korisnički prilagođene digitalne materijale za učenje.