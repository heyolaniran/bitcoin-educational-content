description: |
  School of Bitcoin är en utbildningsplattform med det ambitiösa uppdraget att lära 21 miljoner människor världen över om säker Bitcoin-användning. Initiativet levererar tillgänglig och prisvärd Bitcoin-utbildning genom digitala resurser, vilket gör komplexa Bitcoin-koncept lätta att förstå för alla. Med fokus på global räckvidd och inkludering syftar plattformen till att överbrygga kunskapsklyftan i Bitcoin-utbildning, särskilt med inriktning på underbetjänade samhällen som kan dra mest nytta av att förstå Bitcoin. Deras omfattande läroplan täcker Bitcoin-säkerhet, praktisk användning och grundläggande begrepp, allt levererat genom användarvänliga digitala läromedel.
  