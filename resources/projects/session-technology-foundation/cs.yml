description: |
  Švýcarská nezisková nadace, která se zabývá ochranou digitálních práv. STF pracuje na zachování robustnosti, důvěrnosti a interoperability internetu, zejména prostřednictvím vývoje Session, decentralizovaného, bezpečného a bezautorizačního komunikačního protokolu používaného při zasílání zpráv Session. Její činnost je součástí vize svobodného a otevřeného internetu, který respektuje soukromí.