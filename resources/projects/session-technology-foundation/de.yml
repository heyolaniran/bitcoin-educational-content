description: |
  Schweizerische gemeinnützige Stiftung, die sich für die Verteidigung der digitalen Rechte einsetzt. Die STF setzt sich für den Erhalt der Robustheit, Vertraulichkeit und Interoperabilität des Internets ein, insbesondere durch die Entwicklung von Session, einem dezentralisierten, sicheren und autorisierungsfreien Kommunikationsprotokoll, das im Session-Messaging verwendet wird. Ihre Maßnahmen sind Teil der Vision eines freien, offenen Internets, das die Privatsphäre respektiert.