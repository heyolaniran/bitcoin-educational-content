description: |
  Fundación suiza sin ánimo de lucro comprometida con la defensa de los derechos digitales. STF trabaja para preservar la solidez, confidencialidad e interoperabilidad de Internet, especialmente mediante el desarrollo de Session, un protocolo de comunicación descentralizado, seguro y libre de autorizaciones utilizado en la mensajería Session. Sus acciones se enmarcan en la visión de una Internet libre, abierta y respetuosa con la privacidad.