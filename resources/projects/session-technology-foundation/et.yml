description: |
  Šveitsi mittetulunduslik sihtasutus, mis on pühendunud digitaalsete õiguste kaitsmisele. STF tegutseb interneti töökindluse, konfidentsiaalsuse ja koostalitlusvõime säilitamise nimel, eelkõige Sessioni, detsentraliseeritud, turvalise ja autoriseerimisvaba kommunikatsiooniprotokolli arendamise kaudu, mida kasutatakse Sessioni sõnumite edastamisel. Selle tegevus on osa visioonist vabast, avatud ja eraelu puutumatust austavast internetist.