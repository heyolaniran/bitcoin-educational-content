description: |
  بنیاد غیرانتفاعی سوئیسی متعهد به دفاع از حقوق دیجیتال. STF برای حفظ استحکام، محرمانگی و قابلیت همکاری اینترنت تلاش می‌کند، به‌ویژه از طریق توسعه Session، یک پروتکل ارتباطی غیرمتمرکز، امن و بدون نیاز به مجوز که در پیام‌رسانی Session استفاده می‌شود. اقدامات آن بخشی از چشم‌انداز اینترنتی آزاد و باز است که به حریم خصوصی احترام می‌گذارد.