description: |
  Sveitsiläinen voittoa tavoittelematon säätiö, joka on sitoutunut digitaalisten oikeuksien puolustamiseen. STF työskentelee Internetin kestävyyden, luottamuksellisuuden ja yhteentoimivuuden säilyttämiseksi erityisesti kehittämällä Sessionia, hajautettua, turvallista ja valtuutuksista vapaata viestintäprotokollaa, jota käytetään Session-viestinnässä. Sen toiminta on osa visiota vapaasta, avoimesta ja yksityisyyttä kunnioittavasta Internetistä.