description: |
  डिजिटल अधिकारों की रक्षा के लिए प्रतिबद्ध स्विस गैर-लाभकारी संस्था। एसटीएफ इंटरनेट की मजबूती, गोपनीयता और अंतर-संचालनशीलता को बनाए रखने के लिए काम करता है, खास तौर पर सेशन के विकास के माध्यम से, जो सेशन मैसेजिंग में इस्तेमाल किया जाने वाला एक विकेन्द्रीकृत, सुरक्षित और प्राधिकरण-मुक्त संचार प्रोटोकॉल है। इसके कार्य एक मुक्त, खुले इंटरनेट के दृष्टिकोण का हिस्सा हैं जो गोपनीयता का सम्मान करता है।