description: |
  Yayasan nirlaba Swiss yang berkomitmen untuk membela hak-hak digital. STF bekerja untuk menjaga ketahanan, kerahasiaan, dan interoperabilitas Internet, terutama melalui pengembangan Session, protokol komunikasi yang terdesentralisasi, aman, dan bebas otorisasi yang digunakan dalam pesan Session. Tindakannya merupakan bagian dari visi Internet yang bebas dan terbuka yang menghormati privasi.