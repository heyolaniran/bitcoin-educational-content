description: |
  Fondazione svizzera senza scopo di lucro impegnata nella difesa dei diritti digitali. STF lavora per preservare la solidità, la riservatezza e l'interoperabilità di Internet, in particolare attraverso lo sviluppo di Session, un protocollo di comunicazione decentralizzato, sicuro e privo di autorizzazioni utilizzato nella messaggistica di Session. Le sue azioni fanno parte di una visione di Internet libera e aperta che rispetta la privacy.