description: |
  Sveitsisk ideell stiftelse som arbeider for å forsvare digitale rettigheter. STF arbeider for å bevare robustheten, konfidensialiteten og interoperabiliteten på Internett, blant annet gjennom utviklingen av Session, en desentralisert, sikker og autorisasjonsfri kommunikasjonsprotokoll som brukes i Session-meldinger. Virksomheten er en del av en visjon om et fritt og åpent Internett som respekterer personvernet.