description: |
  Szwajcarska fundacja non-profit zaangażowana w obronę praw cyfrowych. STF działa na rzecz zachowania solidności, poufności i interoperacyjności Internetu, w szczególności poprzez rozwój Session, zdecentralizowanego, bezpiecznego i wolnego od autoryzacji protokołu komunikacyjnego używanego w wiadomościach Session. Jej działania są częścią wizji wolnego, otwartego Internetu, który szanuje prywatność.