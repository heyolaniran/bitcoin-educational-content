description: |
  Fundação suíça sem fins lucrativos empenhada na defesa dos direitos digitais. A STF trabalha para preservar a robustez, a confidencialidade e a interoperabilidade da Internet, nomeadamente através do desenvolvimento do Session, um protocolo de comunicação descentralizado, seguro e sem autorização utilizado nas mensagens Session. As suas acções fazem parte de uma visão de uma Internet livre e aberta que respeita a privacidade.