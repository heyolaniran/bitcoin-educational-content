description: |
  Швейцарский некоммерческий фонд, занимающийся защитой цифровых прав. STF работает над сохранением надежности, конфиденциальности и совместимости Интернета, в частности, путем разработки Session, децентрализованного, безопасного и не требующего авторизации протокола связи, используемого для обмена сообщениями Session. Его действия являются частью концепции свободного, открытого Интернета, уважающего неприкосновенность частной жизни.