description: |
  Švajcarska neprofitna fondacija posvećena odbrani digitalnih prava. STF radi na očuvanju robusnosti, poverljivosti i interoperabilnosti Interneta, posebno kroz razvoj Session-a, decentralizovanog, sigurnog i protokola za komunikaciju bez autorizacije koji se koristi u Session razmeni poruka. Njene akcije su deo vizije slobodnog, otvorenog Interneta koji poštuje privatnost.