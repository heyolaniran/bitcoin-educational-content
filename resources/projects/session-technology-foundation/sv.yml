description: |
  Schweizisk icke-vinstdrivande stiftelse som arbetar för att försvara digitala rättigheter. STF arbetar för att bevara Internets robusthet, sekretess och interoperabilitet, bland annat genom utvecklingen av Session, ett decentraliserat, säkert och auktorisationsfritt kommunikationsprotokoll som används i Session messaging. STF:s verksamhet är en del av visionen om ett fritt och öppet Internet som respekterar den personliga integriteten.