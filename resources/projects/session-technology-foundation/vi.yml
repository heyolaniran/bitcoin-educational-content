description: |
  Tổ chức phi lợi nhuận Thụy Sĩ cam kết bảo vệ quyền kỹ thuật số. STF hoạt động để bảo vệ tính mạnh mẽ, tính bảo mật và khả năng tương tác của Internet, đặc biệt là thông qua việc phát triển Session, một giao thức truyền thông phi tập trung, an toàn và không cần ủy quyền được sử dụng trong tin nhắn Session. Các hành động của tổ chức này là một phần trong tầm nhìn về một Internet tự do, cởi mở, tôn trọng quyền riêng tư.