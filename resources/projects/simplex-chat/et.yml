description: |
  Ettevõte, mis on spetsialiseerunud konfidentsiaalsete sõnumilahenduste arendamisele. SimpleX Chat on krüpteeritud sõnumsüsteem, mis kasutab detsentraliseeritud suhtlusprotokolli. Side ei põhine kasutaja identifikaatoritel ega suhtluse metaandmetel, mis tagab kõrge anonüümsuse taseme.