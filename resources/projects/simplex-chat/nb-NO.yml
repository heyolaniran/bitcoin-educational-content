description: |
  Et selskap som spesialiserer seg på utvikling av konfidensielle meldingsløsninger. SimpleX Chat er et kryptert meldingssystem som bruker en desentralisert kommunikasjonsprotokoll. Kommunikasjonen er ikke basert på brukeridentifikatorer eller kommunikasjonsmetadata, noe som garanterer en høy grad av anonymitet.