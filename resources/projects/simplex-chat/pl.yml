description: |
  Firma specjalizująca się w opracowywaniu poufnych rozwiązań do przesyłania wiadomości. SimpleX Chat to szyfrowany system przesyłania wiadomości wykorzystujący zdecentralizowany protokół komunikacyjny. Komunikacja nie opiera się na identyfikatorach użytkowników ani metadanych komunikacji, gwarantując wysoki poziom anonimowości.