description: |
  Start9 به دنبال حل مسئله اعتماد در دنیای دیجیتال امروزی است که کنترل داده‌ها یک نگرانی عمده محسوب می‌شود.
  
  این شرکت به شما قدرت مالکیت و کنترل داده‌هایتان را با اجرای یک سرور شخصی می‌دهد، که به طور سنتی فقط برای افراد فنی یا نهادهای ثروتمند قابل دسترسی بود. با Start9، می‌توانید یک نود کامل Bitcoin برای تأیید تراکنش‌ها اجرا کنید، یک نود Lightning برای به دست آوردن مالکیت کامل بر Bitcoin خود در Lightning Network راه‌اندازی کنید و به طور اساسی به یک نهاد دیجیتال شخصی تبدیل شوید. این امر از طریق EmbassyOS، یک سیستم‌عامل مبتنی بر مرورگر برای سرورهای شخصی، ممکن شده است. با وجود طبیعت بالقوه دلهره‌آور اجرای یک سرور شخصی، Start9 پشتیبانی جامع مشتری را تضمین می‌کند، از جمله یک راهنمای کاربر دقیق، سوالات متداول، آموزش‌ها و دسترسی مستقیم به یک جامعه متخصص فنی.