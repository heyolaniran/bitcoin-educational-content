description: |
  Start9 syftar till att lösa frågan om förtroende i dagens digitala värld där datakontroll är ett stort problem.
  
  Företaget ger dig makten att äga och kontrollera dina data genom att köra en personlig server, som traditionellt endast var tillgänglig för tekniskt kunniga individer eller rika enheter. Med Start9 kan du köra en fullständig Bitcoin-nod för att verifiera transaktioner, en Lightning-nod för att få full kontroll över din Bitcoin på Lightning Network, och i huvudsak bli din egen digitala enhet. Detta möjliggörs genom EmbassyOS, ett webbläsarbaserat operativsystem för personliga servrar. Trots den potentiellt skrämmande karaktären av att driva en personlig server, garanterar Start9 omfattande kundsupport, inklusive en detaljerad användarmanual, vanliga frågor, handledning och direkt tillgång till en teknisk expertgrupp.