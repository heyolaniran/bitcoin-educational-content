description: |
  Start9 旨在解決當今數位世界中的信任問題，在這個世界中，資料控制是一個主要的考量。
  
  該公司透過運行個人伺服器，為您提供擁有和控制資料的權力，而傳統上只有精通技術的個人或富裕的實體才能使用個人伺服器。透過 Start9，您可以執行一個完整的 Bitcoin 節點來驗證交易、一個 Lightning 節點來在 Lightning Network 上取得對您的 Bitcoin 的完全保管權，基本上成為您自己的數位實體。這是透過 EmbassyOS（一個以瀏覽器為基礎的個人伺服器作業系統）來實現的。儘管運行個人伺服器的潛在艱鉅性，Start9保證提供全面的客戶支援，包括詳細的使用手冊、常見問題、教學，以及直接連線到技術專家社群。