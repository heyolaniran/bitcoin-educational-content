description: |
  استرایک یک برنامه مالی است که به کاربران امکان می‌دهد به‌صورت فوری پول ارسال و دریافت کنند، Bitcoin بخرند و بفروشند و دستمزد خود را به صورت Bitcoin دریافت کنند.
  
  این برنامه راهی آسان برای خرید Bitcoin ارائه می‌دهد و از کارمزدهای تراکنش جلوگیری می‌کند. API استرایک توسط کسب‌وکارها برای اتصال به یک شبکه پرداخت جهانی و فوری استفاده می‌شود. این امر برای بازارهایی که پرداخت‌ها بین خریداران و فروشندگان را ممکن می‌سازند و همچنین برای بازرگانانی که پرداخت‌ها را از مشتریان در سطح جهانی می‌پذیرند، مفید است. استرایک همچنین پرداخت‌های بدون مرز را که فوری و امن هستند و بدون کارمزد تراکنش اضافی انجام می‌شوند، امکان‌پذیر می‌سازد. علاوه بر این، کاربران می‌توانند به‌طور یکپارچه چک حقوق خود را به Bitcoin تبدیل کنند.