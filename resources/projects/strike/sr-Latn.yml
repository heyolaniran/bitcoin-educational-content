description: |
  Strike je finansijska aplikacija koja omogućava korisnicima da trenutno šalju i primaju novac, kupuju i prodaju Bitcoin, i budu plaćeni u Bitcoin.
  
  Aplikacija nudi jednostavan način za kupovinu Bitcoin, zaobilazeći transakcione naknade. Strike-ov API koriste preduzeća za povezivanje sa globalnom mrežom za instant plaćanja. Ovo je korisno za tržišta koja omogućavaju plaćanja između kupaca i prodavaca, i trgovce koji prihvataju uplate od kupaca širom sveta. Strike takođe omogućava bezgranična plaćanja, koja su trenutna i sigurna, bez dodatnih transakcionih naknada. Pored toga, korisnici mogu besprekorno konvertovati svoju platu u Bitcoin.