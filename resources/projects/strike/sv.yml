description: |
  Strike är en finansiell applikation som gör det möjligt för användare att skicka och ta emot pengar direkt, köpa och sälja Bitcoin och få betalt i Bitcoin.
  
  Applikationen erbjuder ett enkelt sätt att köpa Bitcoin, utan att behöva betala transaktionsavgifter. Strikes API används av företag för att ansluta till ett globalt nätverk för omedelbara betalningar. Detta är fördelaktigt för marknadsplatser som möjliggör betalningar mellan köpare och säljare, och handlare som tar emot betalningar från kunder globalt. Strike tillåter också gränslösa betalningar, som är omedelbara och säkra, utan extra transaktionsavgifter. Dessutom kan användare konvertera sin lönecheck till Bitcoin sömlöst.