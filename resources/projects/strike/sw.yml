description: |
  Gongo ni programu ya kifedha inayowawezesha watumiaji kutuma na kupokea pesa papo hapo, kununua na kuuza Bitcoin na kulipwa kwa Bitcoin.
  
  Programu hutoa njia rahisi ya kununua Bitcoin, kukwepa ada za ununuzi. API ya Strike inatumiwa na wafanyabiashara kuunganisha kwenye mtandao wa kimataifa wa malipo ya papo hapo. Hii ni ya manufaa kwa masoko yanayowezesha malipo kati ya wanunuzi na wauzaji, na wafanyabiashara wanaokubali malipo kutoka kwa wateja duniani kote. Maonyo pia huruhusu malipo yasiyo na mipaka, ambayo ni ya papo hapo na salama, bila ada za muamala zilizoongezwa. Zaidi ya hayo, watumiaji wanaweza kubadilisha malipo yao kuwa Bitcoin bila mshono.