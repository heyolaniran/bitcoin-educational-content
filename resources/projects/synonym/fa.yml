description: |
  سینونیم یک شرکت فناوری است که به توسعه آینده‌ای مبتنی بر Bitcoin از طریق یک اکوسیستم نرم‌افزار و خدمات که اقتصاد همتا به همتا را ترویج می‌دهد، اختصاص دارد.
  
  آن‌ها خالقان پروتکل وب غیرمتمرکز، Slashtags، و Bitkit Wallet هستند، ابزاری که برای بازتعریف تجربه Bitcoin Wallet طراحی شده است. سینونیم متعهد به یک اقتصاد چرخشی است و در محصولات خود از مقیاس‌پذیری، قابلیت همکاری، حریم خصوصی، اعتماد، خود نگهداری و اصول منبع باز حمایت می‌کند.