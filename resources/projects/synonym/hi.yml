description: |
  Synonym एक प्रौद्योगिकी कंपनी है जो सॉफ्टवेयर और सेवाओं के एक पारिस्थितिकी तंत्र के माध्यम से Bitcoin-केंद्रित भविष्य को विकसित करने के लिए समर्पित है जो एक सहकर्मी से सहकर्मी अर्थव्यवस्था को बढ़ावा देती है।
  
  वे विकेंद्रीकृत वेब प्रोटोकॉल, स्लैशटैग्स और बिटकिट Wallet के निर्माता हैं, जो Bitcoin Wallet अनुभव को फिर से परिभाषित करने के लिए डिज़ाइन किया गया एक उपकरण है। एक परिपत्र अर्थव्यवस्था के लिए प्रतिबद्ध, Synonym अपने उत्पादों में मापनीयता, अंतर-संचालन, गोपनीयता, विश्वास, स्व-संरक्षण और ओपन-सोर्स सिद्धांतों की वकालत करता है।