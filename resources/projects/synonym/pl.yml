description: |
  Synonym to firma technologiczna zajmująca się rozwojem przyszłości skoncentrowanej na Bitcoin poprzez ekosystem oprogramowania i usług, które promują gospodarkę peer-to-peer.
  
  Synonym jest twórcą zdecentralizowanego protokołu internetowego Slashtags oraz Bitkit Wallet, narzędzia zaprojektowanego w celu przedefiniowania doświadczenia Bitcoin Wallet. Zaangażowany w gospodarkę o obiegu zamkniętym, Synonym opowiada się za skalowalnością, interoperacyjnością, prywatnością, zaufaniem, samokontrolą i zasadami open source w swoich produktach.