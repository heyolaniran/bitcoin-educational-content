description: |
  Sinonim je tehnološka kompanija posvećena razvoju budućnosti usmerene na Bitcoin kroz ekosistem softvera i usluga koji promovišu ekonomiju od osobe do osobe.
  
  Oni su kreatori decentralizovanog web protokola, Slashtags, i Bitkit Wallet, alata dizajniranog da redefiniše Bitcoin Wallet iskustvo. Posvećeni cirkularnoj ekonomiji, Sinonim se zalaže za skalabilnost, interoperabilnost, privatnost, poverenje, samostalno čuvanje i principe otvorenog koda u svojim proizvodima.