description: |
  Synonym är ett teknikföretag som arbetar för att utveckla en Bitcoin-centrerad framtid genom ett ekosystem av programvara och tjänster som främjar en peer-to-peer-ekonomi.
  
  De är skaparna av det decentraliserade webbprotokollet Slashtags och Bitkit Wallet, ett verktyg som är utformat för att omdefiniera Bitcoin Wallet-upplevelsen. Synonym är engagerade i en cirkulär ekonomi och förespråkar skalbarhet, interoperabilitet, integritet, förtroende, självförvaring och principer för öppen källkod i sina produkter.