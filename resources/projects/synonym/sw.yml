description: |
  Synonym ni kampuni ya kiteknolojia inayojitolea kuendeleza mustakabali wa Bitcoin-centric kupitia mfumo wa ikolojia wa programu na huduma zinazokuza uchumi kati ya wenzao.
  
  Wao ndio waundaji wa itifaki ya wavuti iliyogatuliwa, Slashtags, na Bitkit Wallet, zana iliyoundwa kufafanua upya matumizi ya Bitcoin Wallet. Kwa kujitolea kwa uchumi duara, Sinonimu hutetea uwezekano, ushirikiano, faragha, uaminifu, kujilinda na kanuni huria katika bidhaa zao.