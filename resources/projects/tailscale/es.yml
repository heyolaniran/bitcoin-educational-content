description: |
  Solución VPN sin configuración basada en WireGuard, que le permite crear una red privada cifrada entre sus dispositivos, estén donde estén, en sólo unos minutos. Fácil de implantar y compatible con todas las plataformas, Tailscale ofrece un acceso seguro de confianza cero, sin necesidad de abrir puertos ni complejidad de red.