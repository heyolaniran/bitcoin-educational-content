description: |
  راه‌حل VPN بدون نیاز به پیکربندی بر اساس WireGuard، که به شما امکان می‌دهد تنها در چند دقیقه یک شبکه خصوصی رمزگذاری‌شده بین دستگاه‌های خود ایجاد کنید، هر کجا که باشند. Tailscale به راحتی قابل استقرار و سازگار با تمام پلتفرم‌ها است و دسترسی امن بدون اعتماد را بدون نیاز به باز کردن پورت یا پیچیدگی شبکه ارائه می‌دهد.