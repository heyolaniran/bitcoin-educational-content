description: |
  Konfigurasjonsfri VPN-løsning basert på WireGuard, slik at du kan opprette et kryptert privat nettverk mellom enhetene dine, uansett hvor de befinner seg, på bare noen få minutter. Tailscale er enkel å ta i bruk og kompatibel med alle plattformer, og tilbyr sikker tilgang med null tillit, uten behov for portåpning eller nettverkskompleksitet.