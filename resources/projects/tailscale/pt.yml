description: |
  Solução VPN sem necessidade de configuração baseada no WireGuard, que lhe permite criar uma rede privada encriptada entre os seus dispositivos, onde quer que estejam, em apenas alguns minutos. Fácil de implementar e compatível com todas as plataformas, o Tailscale oferece acesso seguro de confiança zero, sem necessidade de abertura de portas ou complexidade de rede.