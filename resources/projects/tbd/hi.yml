description: |
  विकेंद्रीकृत वित्तीय दुनिया को सभी के लिए सुलभ बनाएं
  
  विकेंद्रीकृत और प्रणालियाँ ऐसी दुनिया बनाती हैं जो व्यक्तियों को सशक्त बनाती हैं; वित्तीय सेवाओं और आर्थिक लेन-देन में शामिल होने का अधिकार न तो क्रेडिट योग्यता साबित करने और खाता शुल्क का भुगतान करने की क्षमता पर निर्भर करता है, न ही सेंसरशिप के अधीन है।