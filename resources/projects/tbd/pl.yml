description: |
  Zdecentralizowany świat finansów dostępny dla każdego
  
  Zdecentralizowane systemy tworzą świat, który wzmacnia jednostki; prawo do angażowania się w usługi finansowe i transakcje gospodarcze nie jest uzależnione od udowodnienia zdolności kredytowej i zdolności do uiszczenia opłat za konto, ani nie podlega cenzurze.
  