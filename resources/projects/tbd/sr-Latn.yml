description: |
  Učinite decentralizovani finansijski svet dostupnim – za sve
  
  Decentralizovani sistemi stvaraju svet koji osnažuje pojedince; pravo na korišćenje finansijskih usluga i ekonomskih transakcija nije uslovljeno dokazivanjem kreditne sposobnosti i mogućnosti plaćanja naknada za račun, niti je podložno cenzuri.