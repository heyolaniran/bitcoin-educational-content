description: |
  Gör den decentraliserade finansvärlden tillgänglig - för alla
  
  Decentraliserade system skapar en värld som stärker individen; rätten att delta i finansiella tjänster och ekonomiska transaktioner är inte beroende av kreditvärdighet och förmåga att betala kontoavgifter, och är inte heller föremål för censur.
  