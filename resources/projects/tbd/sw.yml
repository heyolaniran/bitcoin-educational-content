description: |
  Fanya ulimwengu wa kifedha uliowekwa madarakani upatikane - kwa kila mtu 
  
  Ugatuaji na mifumo huunda ulimwengu unaowawezesha watu binafsi; haki ya mtu kujihusisha katika huduma za kifedha na miamala ya kiuchumi haifungwi katika kuthibitisha kwamba anastahili mkopo na uwezo wa kulipa ada za akaunti, wala chini ya udhibiti.
  