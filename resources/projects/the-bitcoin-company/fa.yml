description: |
  شرکت Bitcoin شرکتی است که توسط بیت‌کوینرها برای همه ساخته شده است. Bitcoin، برای همه. ما به شما کمک خواهیم کرد تا یاد بگیرید، کسب درآمد کنید، خرج کنید، پس‌انداز کنید، قرض بگیرید و Bitcoin بخرید، همه در یک مکان. ما در حال ساخت یک اپلیکیشن ساده، خصوصی و آسان برای استفاده با تمام ابزارهای مالی سنتی هستیم که از بانک خود انتظار دارید (بدون هیچ‌گونه دردسر)، اما با Bitcoin در هسته آن.