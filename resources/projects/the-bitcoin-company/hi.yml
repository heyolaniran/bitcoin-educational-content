description: |
  Bitcoin कंपनी बिटकॉइनर्स द्वारा बनाई गई एक कंपनी है, जो सभी के लिए है। Bitcoin, सभी के लिए। हम आपको एक ही स्थान पर Bitcoin सीखने, कमाने, खर्च करने, बचत करने, उधार लेने और खरीदने में मदद करेंगे। हम एक सरल, निजी और उपयोग में आसान ऐप बना रहे हैं जिसमें वे सभी पारंपरिक वित्तीय उपकरण हैं जिनकी आप अपने बैंक से अपेक्षा करते हैं (बिना किसी परेशानी के), लेकिन इसके मूल में Bitcoin है।