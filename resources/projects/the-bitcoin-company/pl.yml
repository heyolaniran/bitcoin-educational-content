description: |
  Bitcoin Company to firma stworzona przez Bitcoiners, dla każdego. Bitcoin dla każdego. Pomożemy Ci uczyć się, zarabiać, wydawać, oszczędzać, pożyczać i kupować Bitcoin w jednym miejscu. Tworzymy prostą, prywatną i łatwą w użyciu aplikację ze wszystkimi tradycyjnymi narzędziami finansowymi, których oczekujesz od swojego banku (bez bólu głowy), ale z Bitcoin u podstaw.
  