description: |
  Kompanija Bitcoin je kompanija koju su izgradili Bitkoineri, za sve. Bitcoin, za sve. Pomoći ćemo vam da učite, zarađujete, trošite, štedite, pozajmljujete i kupujete Bitcoin, sve na jednom mestu. Gradimo jednostavnu, privatnu i laku za korišćenje aplikaciju sa svim tradicionalnim finansijskim alatima koje očekujete od svoje banke (bez glavobolja), ali sa Bitcoin u njenom srcu.