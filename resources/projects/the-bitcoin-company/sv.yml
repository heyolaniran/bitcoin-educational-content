description: |
  Bitcoin Company är ett företag byggt av Bitcoiners, för alla. Bitcoin, för alla. Vi kommer att hjälpa dig att lära dig, tjäna, spendera, spara, låna och köpa Bitcoin, allt på ett ställe. Vi bygger en enkel, privat och lättanvänd app med alla de traditionella finansiella verktyg som du har kommit att förvänta dig från din bank (utan huvudvärk), men med Bitcoin som kärna.
  