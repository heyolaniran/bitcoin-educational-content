description: |
  Kampuni ya Bitcoin ni kampuni iliyojengwa na Bitcoiners, kwa kila mtu. Bitcoin, kwa kila mtu. Tutakusaidia kujifunza, kupata, kutumia, kuhifadhi, kukopa na kununua Bitcoin, yote katika sehemu moja. Tunaunda programu rahisi, ya faragha na rahisi kutumia kwa zana zote za jadi za kifedha ambazo unatarajia kutoka kwa benki yako (bila maumivu ya kichwa), lakini kwa Bitcoin msingi wake.
  