description: |
  V BTC Times přinášíme obsah s cílem kvalitně informovat o zprávách, které vás zajímají, a zároveň pokrýt příběhy, které ostatní nezajímají. V neposlední řadě chceme Address FUD a špatné záběry v médiích. Nabízí denní zpravodajství o novinkách a vývoji kolem Bitcoin a dalších kryptoměn. Prostřednictvím reportáží, hlubokých ponorů a příspěvků od odborníků na danou problematiku se snažíme zachytit ekonomický, politický a sociální dopad těchto technologií.