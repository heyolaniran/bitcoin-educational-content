description: |
  At the BTC Times, we deliver content with a mission of quality reporting of the news you care about, while covering stories that others don't. Finally we want to address FUD and bad takes in the media. It offers daily coverage of the news and development surrounding Bitcoin and other cryptocurrencies. Through reports, deep-dives, and op-eds from subject matter experts, we aim to capture the economic, political, and social impact of these technologies.
