description: |
  En el BTC Times, ofrecemos contenidos con la misión de informar con calidad sobre las noticias que te interesan, al tiempo que cubrimos historias que otros no cubren. Por último queremos Address FUD y malas tomas en los medios de comunicación. Ofrece cobertura diaria de las noticias y el desarrollo en torno a Bitcoin y otras criptodivisas. A través de reportajes, profundizaciones y artículos de opinión de expertos en la materia, pretendemos captar el impacto económico, político y social de estas tecnologías.