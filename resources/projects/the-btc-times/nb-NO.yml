description: |
  På BTC Times leverer vi innhold med et oppdrag om kvalitetsrapportering av nyhetene du bryr deg om, samtidig som vi dekker historier som andre ikke gjør. Til slutt ønsker vi å Address FUD og dårlige tar i media. Det tilbyr daglig dekning av nyheter og utvikling rundt Bitcoin og andre kryptovalutaer. Gjennom rapporter, dypdykk og kronikker fra fageksperter tar vi sikte på å fange opp den økonomiske, politiske og sosiale effekten av disse teknologiene.