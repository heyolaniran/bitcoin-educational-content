description: |
  No BTC Times, fornecemos conteúdo com a missão de reportar com qualidade as notícias que lhe interessam, enquanto cobrimos histórias que outros não fazem. Por fim, queremos que o Address FUD e as más interpretações nos meios de comunicação social. Oferece uma cobertura diária das notícias e do desenvolvimento em torno do Bitcoin e de outras criptomoedas. Através de relatórios, análises aprofundadas e artigos de opinião de especialistas na matéria, pretendemos captar o impacto económico, político e social destas tecnologias.