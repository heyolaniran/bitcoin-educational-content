description: |
  U BTC Times-u, isporučujemo sadržaj sa misijom kvalitetnog izveštavanja o vestima do kojih vam je stalo, dok pokrivamo priče koje drugi ne pokrivaju. Na kraju, želimo da Address FUD i loše interpretacije u medijima. Nudimo dnevno pokrivanje vesti i razvoja oko Bitcoin i drugih kriptovaluta. Kroz izveštaje, dubinske analize i komentare stručnjaka za određene oblasti, cilj nam je da zabeležimo ekonomski, politički i društveni uticaj ovih tehnologija.