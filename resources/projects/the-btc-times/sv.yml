description: |
  På BTC Times levererar vi innehåll med ett uppdrag av kvalitetsrapportering av de nyheter du bryr dig om, samtidigt som vi täcker berättelser som andra inte gör. Slutligen vill vi Address FUD och dåliga tar i media. Det erbjuder daglig täckning av nyheterna och utvecklingen kring Bitcoin och andra kryptovalutor. Genom rapporter, djupdykningar och op-eds från ämnesexperter strävar vi efter att fånga den ekonomiska, politiska och sociala effekten av dessa tekniker.