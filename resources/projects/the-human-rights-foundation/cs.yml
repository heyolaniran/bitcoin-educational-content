description: |
  Nadace pro lidská práva je nestranická nezisková organizace, která prosazuje a chrání lidská práva na celém světě se zaměřením na uzavřené společnosti. Spolupracujeme s aktivisty, kteří mění svět, při vytváření inovativních řešení, která sjednocují svět proti tyranii a společně proti ní bojují.
  