description: |
  Die Human Rights Foundation ist eine unparteiische, gemeinnützige Organisation, die sich weltweit für die Förderung und den Schutz der Menschenrechte einsetzt, wobei der Schwerpunkt auf geschlossenen Gesellschaften liegt. Wir arbeiten mit Aktivisten zusammen, die die Welt verändern wollen, und entwickeln innovative Lösungen, um die Welt gegen Tyrannei zu vereinen und gemeinsam gegen sie zu kämpfen.
  