description: |
  Inimõiguste Fond on erakonnavaba mittetulundusühing, mis edendab ja kaitseb inimõigusi kogu maailmas, keskendudes suletud ühiskondadele. Me teeme koostööd maailma muutvate aktivistidega, et luua uuenduslikke lahendusi, mis ühendavad maailma türannia vastu ja võitlevad ühiselt selle vastu.
  