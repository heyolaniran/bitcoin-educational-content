description: |
  Ihmisoikeussäätiö on puolueeton voittoa tavoittelematon järjestö, joka edistää ja suojelee ihmisoikeuksia maailmanlaajuisesti keskittyen suljettuihin yhteiskuntiin. Toimimme yhteistyössä maailmaa muuttavien aktivistien kanssa luodaksemme innovatiivisia ratkaisuja, joiden avulla voimme yhdistää maailman tyranniaa vastaan ja taistella yhdessä sitä vastaan.
  