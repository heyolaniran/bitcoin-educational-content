description: |
  La Fondation pour les droits de l'homme est une organisation non partisane à but non lucratif qui promeut et protège les droits de l'homme dans le monde entier, en mettant l'accent sur les sociétés fermées. Nous nous associons à des activistes qui changent le monde en créant des solutions innovantes pour unir le monde contre la tyrannie et lutter ensemble contre elle.
  