description: |
  Human Rights Foundation adalah organisasi nirlaba nonpartisan yang mempromosikan dan melindungi hak asasi manusia secara global, dengan fokus pada masyarakat tertutup. Kami bermitra dengan para aktivis pengubah dunia dalam menciptakan solusi inovatif untuk menyatukan dunia melawan tirani, dan berjuang bersama melawannya.
  