description: |
  Fundacja Praw Człowieka jest bezpartyjną organizacją non-profit, która promuje i chroni prawa człowieka na całym świecie, koncentrując się na zamkniętych społeczeństwach. Współpracujemy z aktywistami zmieniającymi świat w tworzeniu innowacyjnych rozwiązań, aby zjednoczyć świat przeciwko tyranii i wspólnie z nią walczyć.
  