description: |
  Правозащитный фонд - это непартийная некоммерческая организация, которая занимается продвижением и защитой прав человека во всем мире, уделяя особое внимание закрытым обществам. Мы сотрудничаем с активистами, меняющими мир, в создании инновационных решений, чтобы объединить мир против тирании и вместе бороться с ней.
  