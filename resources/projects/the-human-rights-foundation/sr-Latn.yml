description: |
  Fondacija za ljudska prava je nepartijska, neprofitna organizacija koja promoviše i štiti ljudska prava globalno, sa fokusom na zatvorena društva. Sarađujemo sa aktivistima koji menjaju svet u kreiranju inovativnih rešenja kako bismo ujedinili svet protiv tiranije i zajedno se borili protiv nje.