description: |
  Wakfu wa Haki za Binadamu ni shirika lisiloegemea upande wowote, lisilo la faida ambalo linakuza na kulinda haki za binadamu duniani kote, likilenga jamii zilizofungwa. Tunashirikiana na wanaharakati wanaobadili ulimwengu katika kuunda masuluhisho bunifu ya kuunganisha ulimwengu dhidi ya udhalimu, na kupigana pamoja dhidi yake.
  