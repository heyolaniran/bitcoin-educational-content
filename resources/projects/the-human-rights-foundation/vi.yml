description: |
  Human Rights Foundation là một tổ chức phi đảng phái, phi lợi nhuận thúc đẩy và bảo vệ nhân quyền trên toàn cầu, tập trung vào các xã hội khép kín. Chúng tôi hợp tác với các nhà hoạt động thay đổi thế giới để tạo ra các giải pháp sáng tạo nhằm đoàn kết thế giới chống lại chế độ chuyên chế và cùng nhau đấu tranh chống lại nó.
  