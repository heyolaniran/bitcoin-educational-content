description: |
  THNDR je platforma, která integruje dovednostní sázkové hry do webových stránek nebo aplikací, přičemž pro vklady a výplaty používá výhradně Bitcoin prostřednictvím Lightning. Podporuje vklady pod jeden dolar, takže uživatelé nemusí předem financovat účty. THNDR zpracovala více než 7,5 milionu plateb Bitcoin a tým uvádí, že nikdo nepožádal o jinou platební metodu než Bitcoin.
  