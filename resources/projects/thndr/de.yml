description: |
  THNDR ist eine Plattform, die geschicklichkeitsbasierte Wettspiele in Websites oder Apps integriert und ausschließlich Bitcoin für Einzahlungen und Auszahlungen über Lightning verwendet. Die Plattform unterstützt Einzahlungen unter einem Dollar, so dass die Nutzer ihre Konten nicht im Voraus auffüllen müssen. THNDR hat bereits über 7,5 Millionen Bitcoin-Zahlungen abgewickelt, und das Team stellt fest, dass noch niemand nach einer anderen Zahlungsmethode als Bitcoin gefragt hat.
  