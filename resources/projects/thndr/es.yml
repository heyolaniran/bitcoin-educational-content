description: |
  THNDR es una plataforma que integra juegos de apuestas de habilidad en sitios web o aplicaciones, utilizando exclusivamente Bitcoin para depósitos y pagos a través de Lightning. Admite depósitos inferiores a un dólar, por lo que los usuarios no necesitan prefinanciar sus cuentas. THNDR ha procesado más de 7,5 millones de pagos Bitcoin, y el equipo señala que nadie ha pedido otro método de pago que no sea Bitcoin.
  