description: |
  THNDR on platvorm, mis integreerib oskustepõhised kihlveomängud veebisaitidesse või rakendustesse, kasutades hoiuste ja väljamaksete tegemiseks eranditult Bitcoin Lightning'i kaudu. See toetab hoiuseid alla dollari, nii et kasutajad ei pea kontosid eelnevalt rahastama. THNDR on töödelnud üle 7,5 miljoni Bitcoin makse ja meeskond märgib, et keegi ei ole palunud muud makseviisi kui Bitcoin.
  