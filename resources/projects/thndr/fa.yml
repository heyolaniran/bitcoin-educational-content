description: |
  THNDR یک پلتفرم است که بازی‌های شرط‌بندی مبتنی بر مهارت را در وب‌سایت‌ها یا اپلیکیشن‌ها ادغام می‌کند و به‌طور انحصاری از Bitcoin برای واریز و پرداخت‌ها از طریق Lightning استفاده می‌کند. این پلتفرم از واریزهای کمتر از یک دلار پشتیبانی می‌کند، بنابراین کاربران نیازی به پیش‌پرداخت حساب‌ها ندارند. THNDR بیش از 7.5 میلیون پرداخت Bitcoin را پردازش کرده است و تیم اشاره می‌کند که هیچ‌کس درخواست روش پرداختی غیر از Bitcoin نکرده است.