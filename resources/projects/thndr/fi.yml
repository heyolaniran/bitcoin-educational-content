description: |
  THNDR on alusta, joka integroi taitoihin perustuvia vedonlyöntipelejä verkkosivustoihin tai sovelluksiin ja käyttää yksinomaan Bitcoin:ta talletuksiin ja Lightningin kautta tapahtuviin maksuihin. Se tukee alle dollarin suuruisia talletuksia, joten käyttäjien ei tarvitse ennakkoon rahoittaa tilejä. THNDR on käsitellyt yli 7,5 miljoonaa Bitcoin-maksua, ja tiimi toteaa, että kukaan ei ole pyytänyt muuta maksutapaa kuin Bitcoin:ta.
  