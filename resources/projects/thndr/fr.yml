description: |
  THNDR est une plateforme qui intègre des jeux de pari basés sur les compétences dans des sites web ou des applications, utilisant exclusivement Bitcoin pour les dépôts et les paiements via Lightning. Elle prend en charge les dépôts inférieurs à un dollar, de sorte que les utilisateurs n'ont pas besoin de préfinancer leurs comptes. THNDR a traité plus de 7,5 millions de paiements par Bitcoin, et l'équipe note que personne n'a demandé d'autre méthode de paiement que Bitcoin.
  