description: |
  THNDR एक ऐसा प्लेटफ़ॉर्म है जो कौशल-आधारित दांव लगाने वाले खेलों को वेबसाइटों या ऐप में एकीकृत करता है, विशेष रूप से लाइटनिंग के माध्यम से जमा और भुगतान के लिए Bitcoin का उपयोग करता है। यह एक डॉलर से कम जमा का समर्थन करता है, इसलिए उपयोगकर्ताओं को खातों में पहले से पैसे जमा करने की आवश्यकता नहीं होती है। THNDR ने 7.5 मिलियन से अधिक Bitcoin भुगतान संसाधित किए हैं, और टीम ने नोट किया है कि किसी ने भी Bitcoin के अलावा किसी अन्य भुगतान विधि के लिए नहीं पूछा है।