description: |
  THNDR adalah platform yang mengintegrasikan permainan taruhan berbasis keterampilan ke dalam situs web atau aplikasi, yang secara eksklusif menggunakan Bitcoin untuk setoran dan pembayaran melalui Lightning. Platform ini mendukung setoran di bawah satu dolar, sehingga pengguna tidak perlu mendanai akun terlebih dahulu. THNDR telah memproses lebih dari 7,5 juta pembayaran Bitcoin, dan tim mencatat bahwa tidak ada yang meminta metode pembayaran apa pun selain Bitcoin.
  