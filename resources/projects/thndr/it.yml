description: |
  THNDR è una piattaforma che integra giochi di scommessa basati sulle abilità in siti web o app, utilizzando esclusivamente Bitcoin per i depositi e i pagamenti tramite Lightning. Supporta depositi inferiori a un dollaro, quindi gli utenti non hanno bisogno di prefinanziare i conti. THNDR ha elaborato oltre 7,5 milioni di pagamenti con Bitcoin e il team fa notare che nessuno ha chiesto un metodo di pagamento diverso da Bitcoin.
  