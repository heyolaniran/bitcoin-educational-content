description: |
  THNDR er en plattform som integrerer ferdighetsbaserte innsatsspill i nettsteder eller apper, utelukkende ved hjelp av Bitcoin for innskudd og utbetalinger via Lightning. Den støtter innskudd under en dollar, slik at brukerne ikke trenger å forhåndsfinansiere kontoer. THNDR har behandlet over 7,5 millioner Bitcoin-betalinger, og teamet bemerker at ingen har bedt om noen annen betalingsmåte enn Bitcoin.
  