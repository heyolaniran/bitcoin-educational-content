description: |
  THNDR to platforma, która integruje oparte na umiejętnościach gry hazardowe ze stronami internetowymi lub aplikacjami, wykorzystując wyłącznie Bitcoin do wpłat i wypłat za pośrednictwem Lightning. Obsługuje wpłaty poniżej dolara, więc użytkownicy nie muszą wstępnie zasilać kont. THNDR przetworzył ponad 7,5 miliona płatności Bitcoin, a zespół zauważa, że nikt nie poprosił o inną metodę płatności niż Bitcoin.
  