description: |
  THNDR é uma plataforma que integra jogos de apostas baseados em habilidades em sites ou aplicativos, usando exclusivamente Bitcoin para depósitos e pagamentos via Lightning. Suporta depósitos inferiores a um dólar, pelo que os utilizadores não necessitam de pré-financiar as contas. A THNDR já processou mais de 7,5 milhões de pagamentos em Bitcoin e a equipa salienta que ninguém pediu outro método de pagamento que não o Bitcoin.
  