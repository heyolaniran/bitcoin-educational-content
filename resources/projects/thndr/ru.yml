description: |
  THNDR - это платформа, которая интегрирует игры на основе навыков отыгрыша в веб-сайты или приложения, используя исключительно Bitcoin для депозитов и выплат через Lightning. Платформа поддерживает депозиты до одного доллара, поэтому пользователям не нужно предварительно пополнять счета. THNDR обработала более 7,5 миллионов платежей с помощью Bitcoin, и команда отмечает, что никто не просил использовать какой-либо другой способ оплаты, кроме Bitcoin.
  