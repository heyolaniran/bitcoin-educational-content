description: |
  THNDR je platforma koja integriše igre zasnovane na veštinama klađenja u veb-sajtove ili aplikacije, isključivo koristeći Bitcoin za depozite i isplate putem Lightning-a. Podržava depozite ispod jednog dolara, tako da korisnici ne moraju unapred da finansiraju račune. THNDR je obradio preko 7,5 miliona Bitcoin uplata, a tim napominje da niko nije tražio nijedan drugi način plaćanja osim Bitcoin.