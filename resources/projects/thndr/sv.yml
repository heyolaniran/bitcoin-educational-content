description: |
  THNDR är en plattform som integrerar skicklighetsbaserade vadslagningsspel i webbplatser eller appar, och som uteslutande använder Bitcoin för insättningar och utbetalningar via Lightning. Den stöder insättningar under en dollar, så att användarna inte behöver förfinansiera konton. THNDR har behandlat över 7,5 miljoner Bitcoin-betalningar, och teamet noterar att ingen har bett om någon annan betalningsmetod än Bitcoin.
  