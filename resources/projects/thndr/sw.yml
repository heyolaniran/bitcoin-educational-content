description: |
  THNDR ni jukwaa linalojumuisha michezo ya dau inayotegemea ujuzi kwenye tovuti au programu, kwa kutumia Bitcoin pekee kwa amana na malipo kupitia Umeme. Inaauni amana chini ya dola, kwa hivyo watumiaji hawahitaji kufadhili akaunti mapema. THNDR imechakata zaidi ya malipo ya Bitcoin milioni 7.5, na timu inabainisha kuwa hakuna mtu aliyeomba njia yoyote ya kulipa isipokuwa Bitcoin.
  