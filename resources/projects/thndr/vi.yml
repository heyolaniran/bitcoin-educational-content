description: |
  THNDR là một nền tảng tích hợp các trò chơi cá cược dựa trên kỹ năng vào các trang web hoặc ứng dụng, chỉ sử dụng Bitcoin để gửi tiền và thanh toán qua Lightning. Nó hỗ trợ tiền gửi dưới một đô la, vì vậy người dùng không cần phải nạp tiền trước vào tài khoản. THNDR đã xử lý hơn 7,5 triệu khoản thanh toán Bitcoin và nhóm lưu ý rằng không ai yêu cầu bất kỳ phương thức thanh toán nào khác ngoài Bitcoin.
  