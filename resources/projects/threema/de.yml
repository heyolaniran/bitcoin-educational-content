description: |
  Schweizer Unternehmen, das auf sichere Messaging-Lösungen spezialisiert ist. Das 2012 gegründete Unternehmen entwickelt die gleichnamige Threema-Anwendung, die die Vertraulichkeit der Kommunikation dank einer Ende-zu-Ende-Verschlüsselung gewährleistet, ohne persönliche Daten zu erfassen.