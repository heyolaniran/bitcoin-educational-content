description: |
  Sveitsisk selskap som spesialiserer seg på sikre meldingsløsninger. Selskapet ble grunnlagt i 2012 og utvikler Threema-applikasjonen med samme navn, som er utformet for å garantere konfidensiell kommunikasjon takket være ende-til-ende-kryptering, uten innsamling av personopplysninger.