description: |
  Szwajcarska firma specjalizująca się w bezpiecznych rozwiązaniach do przesyłania wiadomości. Założona w 2012 roku, rozwija aplikację Threema o tej samej nazwie, zaprojektowaną w celu zagwarantowania poufności komunikacji dzięki szyfrowaniu end-to-end, bez gromadzenia danych osobowych.