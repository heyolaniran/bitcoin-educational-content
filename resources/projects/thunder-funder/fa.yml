description: |
  ماموریت ما ارائه دسترسی انحصاری به سرمایه‌گذاران خرد برای سرمایه‌گذاری در بازارهای خصوصی است، در حالی که از رشد Bitcoin و پروژه‌های متن‌باز حمایت می‌کنیم. ما به آموزش سرمایه‌گذاران، رعایت کامل مقررات و پرورش یک جامعه پویا در اکوسیستم خود متعهد هستیم.
  
  Thunder Funder یک پورتال تامین مالی است که با کمیسیون اوراق بهادار و Exchange (SEC) ثبت شده و عضو سازمان تنظیم مقررات صنعت مالی (FINRA) است. ما تسهیل‌کننده عرضه اوراق بهادار تحت مقررات تامین مالی جمعی ("Reg CF") از قانون اوراق بهادار ۱۹۳۳ هستیم.