description: |
  हमारा मिशन खुदरा निवेशकों को निजी बाजार निवेश तक विशेष पहुंच प्रदान करना है, साथ ही Bitcoin और ओपन-सोर्स परियोजनाओं के विकास का समर्थन करना है। हम निवेशक शिक्षा, पूर्ण विनियामक अनुपालन और हमारे पारिस्थितिकी तंत्र के भीतर एक जीवंत समुदाय को बढ़ावा देने के लिए प्रतिबद्ध हैं। थंडर फंडर सिक्योरिटीज और Exchange आयोग (SEC) के साथ पंजीकृत एक फंडिंग पोर्टल है और वित्तीय उद्योग विनियामक प्राधिकरण (FINRA) का सदस्य है। हम 1933 के प्रतिभूति अधिनियम के विनियमन क्राउडफंडिंग ("रेग सीएफ") के तहत प्रतिभूति पेशकश की सुविधा प्रदान करते हैं।