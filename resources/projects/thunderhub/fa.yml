description: |
  ThunderHub یک پلتفرم متن‌باز است که به شما امکان می‌دهد نود لایتنینگ خود را از هر دستگاهی مدیریت و نظارت کنید.
  
  برخی از ویژگی‌های کلیدی شامل ارسال و دریافت پرداخت‌های لایتنینگ و On-Chain، گزینه‌های متعادل‌سازی، استفاده از LN-pay و LN-withdraw از صفحه اصلی، و مدیریت کانال‌ها برای نقدینگی بهینه است. ThunderHub با BTCPay، RaspiBlitz، MyNode، Voltage، Umbrel و EmbassyOS از Start9 یکپارچه شده و از آخرین نسخه‌های نود LND پشتیبانی می‌کند. این پلتفرم همچنین گزارش‌های تراکنش و جزئیات پرداخت‌های ارسال‌شده را ارائه می‌دهد و برای راحتی کاربر، حالت شب/روز را نیز فراهم می‌کند.