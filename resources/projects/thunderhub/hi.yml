description: |
  थंडरहब एक ओपन-सोर्स प्लेटफ़ॉर्म है जो आपको किसी भी डिवाइस से अपने लाइटनिंग नोड को प्रबंधित और मॉनिटर करने की अनुमति देता है।
  
  कुछ प्रमुख विशेषताओं में लाइटनिंग और On-Chain दोनों भुगतान भेजना और प्राप्त करना, पुनर्संतुलन विकल्प, होमपेज से LN-पे और LN-वापसी का उपयोग और इष्टतम तरलता के लिए चैनलों का प्रबंधन करना शामिल है। थंडरहब BTCPay, RaspiBlitz, MyNode, Voltage, Umbrel और Start9 के EmbassyOS के साथ एकीकृत है, और यह नवीनतम LND नोड संस्करणों का समर्थन करता है। प्लेटफ़ॉर्म लेनदेन रिपोर्ट और अग्रेषित भुगतानों का विवरण भी प्रदान करता है, और उपयोगकर्ता की सुविधा के लिए नाइट/डे मोड दोनों प्रदान करता है।