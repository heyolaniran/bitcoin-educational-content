description: |
  ThunderHub ni jukwaa la chanzo huria ambalo hukuruhusu kudhibiti na kufuatilia eneo lako la Umeme kutoka kwa kifaa chochote.
  
  Baadhi ya vipengele muhimu ni pamoja na kutuma na kupokea malipo ya umeme na On-Chain, chaguo za kusawazisha upya, matumizi ya LN-pay na LN-kutoa kutoka kwa ukurasa wa nyumbani, na kudhibiti chaneli kwa ukwasi bora zaidi. ThunderHub imeunganishwa na BTCPay, RaspiBlitz, MyNode, Voltage, Umbrel, na Start9's EmbassyOS, na inasaidia matoleo mapya zaidi ya nodi za LND. Mfumo huo pia hutoa ripoti za miamala na maelezo ya malipo yaliyotumwa, na hutoa Hali ya Usiku/Mchana kwa urahisi wa mtumiaji.