description: |
  Tiankii je salvadorský technologický startup specializující se na vývoj Bitcoin a Lightning. Pomáháme podnikům přijímat platby Bitcoin s vlastní infrastrukturou a jsme průkopníky v používání Bitcoin a Lightning Network v Salvadoru.  Vyzkoušejte sílu technologie prověřené v boji a utvářené na základě zkušeností z reálného světa - Built in El Salvador, Empowering the World.
  