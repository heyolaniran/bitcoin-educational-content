description: |
  Tiankii ist ein salvadorianisches Tech-Startup, das sich auf die Entwicklung von Bitcoin und Lightning spezialisiert hat. Wir helfen Unternehmen, Bitcoin-Zahlungen mit einer selbstverwalteten Infrastruktur zu akzeptieren, und leisten Pionierarbeit bei der Verwendung von Bitcoin und Lightning Network in El Salvador.  Erleben Sie die Kraft einer kampferprobten Technologie, die durch reale Erfahrungen geprägt ist - gebaut in El Salvador, die Welt befähigend.
  