description: |
  Tiankii es una startup tecnológica salvadoreña especializada en el desarrollo de Bitcoin y Lightning. Ayudamos a las empresas a aceptar pagos Bitcoin con infraestructura de autocustodia, siendo pioneros en el uso de Bitcoin y Lightning Network en El Salvador.  Experimenta el poder de una tecnología probada en batalla y moldeada por la experiencia del mundo real - Construida en El Salvador, Empoderando al Mundo.
  