description: |
  Tiankii on Salvadori tehnoloogiline idufirma, mis on spetsialiseerunud Bitcoin ja Lightning arendamisele. Me aitame ettevõtetel vastu võtta Bitcoin makseid isekasutatava infrastruktuuriga, olles teerajajad Bitcoin ja Lightning Network kasutamisel El Salvadoris.  Kogemuse võimsusest, mida pakub reaalsetest kogemustest kujundatud ja lahingukatsetatud tehnoloogia - Built in El Salvador, Empowering the World (ehitatud El Salvadoris, annab maailmale jõudu).
  