description: |
  Tiankii یک استارتاپ فناوری السالوادوری است که در توسعه Bitcoin و Lightning تخصص دارد. ما به کسب‌وکارها کمک می‌کنیم تا با زیرساخت‌های خود نگهدارنده، پرداخت‌های Bitcoin را بپذیرند و در استفاده از Bitcoin و Lightning Network در السالوادور پیشگام هستیم. قدرت فناوری آزموده شده در میدان نبرد را که با تجربه دنیای واقعی شکل گرفته است تجربه کنید – ساخته شده در السالوادور، توانمندسازی جهان.