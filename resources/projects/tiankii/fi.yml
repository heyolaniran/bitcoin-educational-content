description: |
  Tiankii on salvadorilainen teknologinen startup-yritys, joka on erikoistunut Bitcoin- ja Lightning-kehitykseen. Autamme yrityksiä hyväksymään Bitcoin-maksuja itsehallinnollisen infrastruktuurin avulla ja olemme edelläkävijöitä Bitcoin:n ja Lightning Network:n käytössä El Salvadorissa.  Koe reaalimaailman kokemuksen muovaaman, taistelussa testatun teknologian voima - Built in El Salvador, Empowering the World.
  