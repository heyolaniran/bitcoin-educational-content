description: |
  Tiankii est une startup technologique salvadorienne spécialisée dans le développement du Bitcoin et de Lightning. Nous aidons les entreprises à accepter les paiements Bitcoin avec une infrastructure autonome, pionnière dans l'utilisation de Bitcoin et Lightning Network au Salvador.  Découvrez la puissance d'une technologie éprouvée, façonnée par l'expérience du monde réel - Construite au Salvador, pour donner du pouvoir au monde entier.
  