description: |
  तियांकी एक साल्वाडोरन टेक स्टार्टअप है जो Bitcoin और लाइटनिंग डेवलपमेंट में विशेषज्ञता रखता है। हम व्यवसायों को स्व-संरक्षित बुनियादी ढांचे के साथ Bitcoin भुगतान स्वीकार करने में मदद करते हैं, जो अल साल्वाडोर में Bitcoin और Lightning Network के उपयोग में अग्रणी है। वास्तविक दुनिया के अनुभव द्वारा आकार दी गई युद्ध-परीक्षणित तकनीक की शक्ति का अनुभव करें - अल साल्वाडोर में निर्मित, दुनिया को सशक्त बनाना।