description: |
  Tiankii adalah perusahaan rintisan teknologi El Salvador yang berspesialisasi dalam pengembangan Bitcoin dan Lightning. Kami membantu bisnis menerima pembayaran Bitcoin dengan infrastruktur kustodian mandiri, memelopori penggunaan Bitcoin dan Lightning Network di El Salvador.  Rasakan kekuatan teknologi yang telah teruji dalam pertempuran yang dibentuk oleh pengalaman dunia nyata - Dibangun di El Salvador, Memberdayakan Dunia.
  