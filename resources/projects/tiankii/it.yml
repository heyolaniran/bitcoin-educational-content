description: |
  Tiankii è una startup tecnologica salvadoregna specializzata nello sviluppo di Bitcoin e Lightning. Aiutiamo le aziende ad accettare i pagamenti Bitcoin con un'infrastruttura auto-custodial, facendo da pionieri nell'uso di Bitcoin e Lightning Network in El Salvador.  Provate la potenza di una tecnologia testata in battaglia e plasmata dall'esperienza del mondo reale - Costruita in El Salvador, dà potere al mondo.
  