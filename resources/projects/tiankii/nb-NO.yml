description: |
  Tiankii er en salvadoransk teknologibedrift som spesialiserer seg på Bitcoin- og Lightning-utvikling. Vi hjelper bedrifter med å akseptere Bitcoin-betalinger med selvforvaltende infrastruktur, og er pionerer innen bruk av Bitcoin og Lightning Network i El Salvador.  Opplev kraften i en kamptestet teknologi som er formet av erfaring fra den virkelige verden - bygget i El Salvador, for å styrke verden.
  