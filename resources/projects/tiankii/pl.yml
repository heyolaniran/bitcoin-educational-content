description: |
  Tiankii to salwadorski startup technologiczny specjalizujący się w rozwoju Bitcoin i Lightning. Pomagamy firmom akceptować płatności Bitcoin za pomocą własnej infrastruktury, będąc pionierem w korzystaniu z Bitcoin i Lightning Network w Salwadorze.  Poznaj moc sprawdzonej w boju technologii ukształtowanej przez rzeczywiste doświadczenie - zbudowanej w Salwadorze, wzmacniającej świat.
  