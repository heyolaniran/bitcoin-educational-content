description: |
  Tiankii é uma startup de tecnologia salvadorenha especializada em desenvolvimento de Bitcoin e Lightning. Ajudamos as empresas a aceitar pagamentos Bitcoin com infraestrutura autocustodial, sendo pioneiros no uso de Bitcoin e Lightning Network em El Salvador.  Experimente o poder de uma tecnologia testada em batalha, moldada pela experiência do mundo real - Construída em El Salvador, Capacitando o Mundo.
  