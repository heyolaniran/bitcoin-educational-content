description: |
  Tiankii - сальвадорский технологический стартап, специализирующийся на разработке Bitcoin и Lightning. Мы помогаем предприятиям принимать платежи Bitcoin с помощью инфраструктуры самообслуживания, являясь пионерами в использовании Bitcoin и Lightning Network в Сальвадоре.  Оцените мощь проверенной в боях технологии, созданной на основе реального опыта - Built in El Salvador, Empowering the World.
  