description: |
  Tiankii je salvadorski tehnološki startup specijalizovan za razvoj Bitcoin i Lightning tehnologija. Pomažemo preduzećima da prihvate Bitcoin uplate sa samostalnom infrastrukturom, pionirski koristeći Bitcoin i Lightning Network u El Salvadoru. Iskusite moć tehnologije testirane u stvarnom svetu – Izgrađeno u El Salvadoru, Osnažujući Svet.