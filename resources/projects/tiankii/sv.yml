description: |
  Tiankii är ett salvadoranskt teknikstartup som specialiserar sig på Bitcoin och Lightning-utveckling. Vi hjälper företag att acceptera Bitcoin-betalningar med självförvaltande infrastruktur och är pionjärer inom användningen av Bitcoin och Lightning Network i El Salvador.  Upplev kraften i en stridstestad teknik formad av verklig erfarenhet - Byggd i El Salvador, stärker världen.
  