description: |
  Tiankii ni kampuni inayoanzisha teknolojia ya Salvador inayobobea katika ukuzaji wa Bitcoin na Umeme. Tunasaidia biashara kukubali malipo ya Bitcoin kwa kutumia miundombinu ya kujilinda, tukianzisha matumizi ya Bitcoin na Lightning Network nchini El Salvador.  Pata uzoefu wa uwezo wa teknolojia iliyojaribiwa kwa vita inayoundwa na uzoefu wa ulimwengu halisi - Imejengwa El Salvador, Kuwezesha Ulimwengu.
  