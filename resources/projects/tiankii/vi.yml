description: |
  Tiankii là một công ty khởi nghiệp công nghệ của El Salvador chuyên về phát triển Bitcoin và Lightning. Chúng tôi giúp các doanh nghiệp chấp nhận thanh toán Bitcoin với cơ sở hạ tầng tự lưu ký, tiên phong trong việc sử dụng Bitcoin và Lightning Network tại El Salvador. Trải nghiệm sức mạnh của công nghệ đã được thử nghiệm thực tế hình thành từ kinh nghiệm thực tế – Được xây dựng tại El Salvador, trao quyền cho thế giới.
  
  