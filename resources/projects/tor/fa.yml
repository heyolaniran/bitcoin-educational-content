description: |
  پروژه غیرانتفاعی اختصاص داده شده به حریم خصوصی آنلاین و آزادی. این پروژه شبکه تور را توسعه می‌دهد، که با محافظت از داده‌های کاربران از طریق یک سیستم رله‌های رمزگذاری‌شده، مرور ناشناس را امکان‌پذیر می‌سازد. تور که در سراسر جهان برای دور زدن سانسور و حفاظت از حریم خصوصی استفاده می‌شود، ابزاری ضروری برای مدافعان حقوق بشر، روزنامه‌نگاران و کاربران اینترنتی است که نگران امنیت دیجیتال خود هستند.