description: |
  ऑनलाइन गोपनीयता और स्वतंत्रता के लिए समर्पित गैर-लाभकारी परियोजना। यह टोर नेटवर्क विकसित करता है, जो एन्क्रिप्टेड रिले की प्रणाली के माध्यम से उपयोगकर्ता डेटा की सुरक्षा करके गुमनाम ब्राउज़िंग को सक्षम बनाता है। सेंसरशिप को बायपास करने और गोपनीयता की सुरक्षा के लिए दुनिया भर में इस्तेमाल किया जाने वाला टोर मानवाधिकार रक्षकों, पत्रकारों और अपनी डिजिटल सुरक्षा के बारे में चिंतित इंटरनेट उपयोगकर्ताओं के लिए एक आवश्यक उपकरण है।