description: |
  Projekt non-profit poświęcony prywatności i wolności w Internecie. Rozwija sieć Tor, która umożliwia anonimowe przeglądanie Internetu poprzez ochronę danych użytkownika za pomocą systemu zaszyfrowanych przekaźników. Używany na całym świecie do omijania cenzury i ochrony prywatności, Tor jest niezbędnym narzędziem dla obrońców praw człowieka, dziennikarzy i użytkowników Internetu zaniepokojonych swoim cyfrowym bezpieczeństwem.
  