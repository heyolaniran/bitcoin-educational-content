description: |
  Neprofitni projekat posvećen online privatnosti i slobodi. Razvija Tor mrežu, koja omogućava anonimno pretraživanje štiteći korisničke podatke kroz sistem enkriptovanih releja. Koristi se širom sveta za zaobilaženje cenzure i zaštitu privatnosti, Tor je ključni alat za branitelje ljudskih prava, novinare i internet korisnike zabrinute za svoju digitalnu sigurnost.