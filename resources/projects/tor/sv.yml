description: |
  Icke vinstdrivande projekt som arbetar för integritet och frihet på nätet. Det utvecklar Tor-nätverket, som möjliggör anonym surfning genom att skydda användardata genom ett system av krypterade reläer. Tor används över hela världen för att kringgå censur och skydda privatlivet och är ett viktigt verktyg för människorättsförsvarare, journalister och internetanvändare som är oroliga för sin digitala säkerhet.
  