description: |
  Mradi usio wa faida unaolenga faragha na uhuru mtandaoni. Inakuza mtandao wa Tor, ambao huwezesha kuvinjari bila kujulikana kwa kulinda data ya mtumiaji kupitia mfumo wa relay zilizosimbwa. Inatumika ulimwenguni kote kukwepa udhibiti na kulinda faragha, Tor ni zana muhimu kwa watetezi wa haki za binadamu, waandishi wa habari na watumiaji wa mtandao wanaojali usalama wao wa kidijitali.
  