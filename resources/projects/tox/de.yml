description: |
  Ein freies, dezentrales Protokoll für verschlüsselte Kommunikation, das eine sichere Alternative zu zentralisierten Diensten bietet. Tox arbeitet auf Peer-to-Peer-Basis und ermöglicht Instant Messaging, Sprachanrufe, Videokonferenzen und Dateiübertragungen, wobei die Vertraulichkeit des Austauschs dank der auf Libsodium basierenden Ende-zu-Ende-Verschlüsselung gewährleistet wird. Tox wurde 2013 nach den Enthüllungen von Edward Snowden ins Leben gerufen und zielt darauf ab, einfache, datenschutzfreundliche Kommunikation über eine modulare Architektur und plattformübergreifende Clients anzubieten.