description: |
  Un protocolo libre y descentralizado para la comunicación cifrada, diseñado para ofrecer una alternativa segura a los servicios centralizados. Tox funciona de igual a igual y permite la mensajería instantánea, las llamadas de voz, las videoconferencias y la transferencia de archivos, al tiempo que garantiza la confidencialidad de los intercambios gracias al cifrado de extremo a extremo basado en libsodium. Nacida en 2013 a raíz de las revelaciones de Edward Snowden, Tox pretende ofrecer una comunicación sencilla y respetuosa con la privacidad mediante una arquitectura modular y clientes multiplataforma.