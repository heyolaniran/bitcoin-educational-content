description: |
  یک پروتکل رایگان و غیرمتمرکز برای ارتباطات رمزگذاری‌شده که به‌منظور ارائه جایگزینی امن برای خدمات متمرکز طراحی شده است. Tox بر اساس همتا به همتا عمل می‌کند و امکان پیام‌رسانی فوری، تماس‌های صوتی، ویدئو کنفرانس و انتقال فایل را فراهم می‌کند، در حالی که با استفاده از رمزگذاری سرتاسری مبتنی بر libsodium، محرمانگی تبادلات را تضمین می‌کند. Tox که در سال ۲۰۱۳ و در پی افشاگری‌های ادوارد اسنودن متولد شد، هدفش ارائه ارتباطات ساده و حریم‌خصوصی‌پسند از طریق معماری ماژولار و مشتریان چندسکویی است.