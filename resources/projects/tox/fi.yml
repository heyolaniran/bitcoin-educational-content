description: |
  Ilmainen, hajautettu protokolla salattuun viestintään, joka on suunniteltu tarjoamaan turvallinen vaihtoehto keskitetyille palveluille. Tox toimii vertaisverkkopohjaisesti ja mahdollistaa pikaviestinnän, äänipuhelut, videokonferenssit ja tiedostojen siirron samalla kun se takaa viestien luottamuksellisuuden libsodiumiin perustuvan päästä päähän -salauksen avulla. Tox syntyi vuonna 2013 Edward Snowdenin paljastusten seurauksena, ja sen tavoitteena on tarjota yksinkertaista ja yksityisyyden suojaa kunnioittavaa viestintää modulaarisen arkkitehtuurin ja alustarajat ylittävien asiakkaiden avulla.