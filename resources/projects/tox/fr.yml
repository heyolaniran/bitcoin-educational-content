description: |
  Protocole libre et décentralisé de communication chiffrée, conçu pour offrir une alternative sécurisée aux services centralisés. Tox foncitonne en pair à pair, il permet la messagerie instantanée, les appels vocaux, la visioconférence et le transfert de fichiers, tout en garantissant la confidentialité des échanges grâce à un chiffrement de bout en bout basé sur libsodium. Né en 2013 dans le sillage des révélations d'Edward Snowden, Tox vise à offrir une communication simple et respectueuse de la vie privée, via une architecture modulaire et des clients multiplateformes.