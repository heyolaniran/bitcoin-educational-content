description: |
  एन्क्रिप्टेड संचार के लिए एक मुफ़्त, विकेन्द्रीकृत प्रोटोकॉल, जिसे केंद्रीकृत सेवाओं के लिए एक सुरक्षित विकल्प प्रदान करने के लिए डिज़ाइन किया गया है। Tox एक सहकर्मी से सहकर्मी के आधार पर काम करता है, जो त्वरित संदेश, वॉयस कॉल, वीडियोकॉन्फ़्रेंसिंग और फ़ाइल ट्रांसफ़र को सक्षम करता है, जबकि libsodium पर आधारित एंड-टू-एंड एन्क्रिप्शन के लिए एक्सचेंजों की गोपनीयता की गारंटी देता है। एडवर्ड स्नोडेन के खुलासे के बाद 2013 में जन्मे, Tox का लक्ष्य एक मॉड्यूलर आर्किटेक्चर और क्रॉस-प्लेटफ़ॉर्म क्लाइंट के माध्यम से सरल, गोपनीयता-अनुकूल संचार प्रदान करना है।