description: |
  Protokol gratis dan terdesentralisasi untuk komunikasi terenkripsi, yang dirancang untuk menawarkan alternatif yang aman untuk layanan terpusat. Tox beroperasi dengan basis peer-to-peer, memungkinkan pengiriman pesan instan, panggilan suara, konferensi video, dan transfer file, sambil menjamin kerahasiaan pertukaran berkat enkripsi end-to-end berdasarkan libsodium. Lahir pada tahun 2013 setelah pengungkapan Edward Snowden, Tox bertujuan untuk menawarkan komunikasi yang sederhana dan ramah privasi melalui arsitektur modular dan klien lintas platform.