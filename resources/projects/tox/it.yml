description: |
  Un protocollo libero e decentralizzato per la comunicazione criptata, progettato per offrire un'alternativa sicura ai servizi centralizzati. Tox opera su base peer-to-peer, consentendo la messaggistica istantanea, le chiamate vocali, le videoconferenze e il trasferimento di file, garantendo la riservatezza degli scambi grazie alla crittografia end-to-end basata su libsodium. Nato nel 2013 sulla scia delle rivelazioni di Edward Snowden, Tox si propone di offrire una comunicazione semplice e rispettosa della privacy attraverso un'architettura modulare e client multipiattaforma.