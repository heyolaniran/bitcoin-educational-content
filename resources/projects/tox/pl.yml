description: |
  Darmowy, zdecentralizowany protokół do szyfrowanej komunikacji, zaprojektowany jako bezpieczna alternatywa dla scentralizowanych usług. Tox działa na zasadzie peer-to-peer, umożliwiając komunikatory internetowe, połączenia głosowe, wideokonferencje i przesyłanie plików, jednocześnie gwarantując poufność wymiany dzięki szyfrowaniu end-to-end opartemu na libsodium. Powstały w 2013 roku w następstwie rewelacji Edwarda Snowdena, Tox ma na celu oferowanie prostej, przyjaznej dla prywatności komunikacji za pośrednictwem modułowej architektury i wieloplatformowych klientów.