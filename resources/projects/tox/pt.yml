description: |
  Um protocolo livre e descentralizado para comunicação encriptada, concebido para oferecer uma alternativa segura aos serviços centralizados. O Tox funciona numa base peer-to-peer, permitindo a troca de mensagens instantâneas, chamadas de voz, videoconferências e transferência de ficheiros, garantindo a confidencialidade das trocas graças à encriptação de ponta a ponta baseada no libsodium. Nascido em 2013, na sequência das revelações de Edward Snowden, o Tox tem como objetivo oferecer uma comunicação simples e respeitadora da privacidade através de uma arquitetura modular e de clientes multiplataformas.