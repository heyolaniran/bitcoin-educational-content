description: |
  Свободный децентрализованный протокол для шифрованной связи, призванный стать безопасной альтернативой централизованным сервисам. Tox работает по принципу peer-to-peer, позволяя обмениваться мгновенными сообщениями, голосовыми звонками, видеоконференциями и передавать файлы, гарантируя при этом конфиденциальность обмена данными благодаря сквозному шифрованию на основе libsodium. Созданная в 2013 году на волне разоблачений Эдварда Сноудена, компания Tox стремится обеспечить простое и конфиденциальное общение с помощью модульной архитектуры и кроссплатформенных клиентов.