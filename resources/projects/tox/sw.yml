description: |
  Itifaki ya bila malipo, iliyogatuliwa kwa mawasiliano iliyosimbwa, iliyoundwa ili kutoa njia mbadala salama kwa huduma za kati. Tox hufanya kazi kwa misingi ya rika-kwa-rika, kuwezesha ujumbe wa papo hapo, simu za sauti, mkutano wa video na kuhamisha faili, huku ikihakikisha usiri wa ubadilishanaji kutokana na usimbaji fiche kutoka mwanzo hadi mwisho kulingana na libsodiamu. Tox alizaliwa mwaka wa 2013 kufuatia ufunuo wa Edward Snowden, analenga kutoa mawasiliano rahisi na ya kirafiki kupitia usanifu wa kawaida na wateja wa jukwaa.