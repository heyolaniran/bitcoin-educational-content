description: |
  Trojan Mining je nigerijská společnost, která využívá vodní a off-grid zdroje energie k těžbě Bitcoin udržitelným a energeticky účinným způsobem. Využíváním místně dostupných obnovitelných zdrojů společnost snižuje dopad na životní prostředí a zároveň přispívá k finančnímu začlenění a zpeněžení energie v regionech s nedostatečnou péčí.