description: |
  Trojan Mining ist ein nigerianisches Unternehmen, das hydroelektrische und netzunabhängige Energiequellen nutzt, um Bitcoin auf nachhaltige und energieeffiziente Weise abzubauen. Durch die Nutzung lokal verfügbarer erneuerbarer Ressourcen reduziert das Unternehmen die Umweltauswirkungen und trägt gleichzeitig zur finanziellen Eingliederung und Energiemonetarisierung in unterversorgten Regionen bei.