description: |
  Trojan Mining es una empresa nigeriana que aprovecha fuentes de energía hidroeléctricas y no conectadas a la red para extraer Bitcoin de forma sostenible y energéticamente eficiente. Al aprovechar los recursos renovables disponibles a nivel local, la empresa reduce el impacto medioambiental al tiempo que contribuye a la inclusión financiera y la monetización de la energía en regiones desatendidas.