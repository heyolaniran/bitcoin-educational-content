description: |
  Trojan Mining on Nigeeria ettevõte, mis kasutab Bitcoin kaevandamiseks jätkusuutlikul ja energiatõhusal viisil hüdroelektrilisi ja võrguväliseid energiaallikaid. Kohalikke taastuvaid ressursse kasutades vähendab ettevõte keskkonnamõju, aidates samal ajal kaasa rahalisele kaasamisele ja energia rahaks muutmisele alateenindatud piirkondades.