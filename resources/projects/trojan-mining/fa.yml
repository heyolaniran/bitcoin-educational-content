description: |
  تروجان Mining یک شرکت نیجریه‌ای است که از منابع انرژی هیدروالکتریک و خارج از شبکه برای استخراج Bitcoin به روشی پایدار و با بهره‌وری انرژی استفاده می‌کند. با بهره‌گیری از منابع تجدیدپذیر محلی، این شرکت تأثیرات زیست‌محیطی را کاهش داده و در عین حال به شمول مالی و کسب درآمد از انرژی در مناطق کمتر توسعه‌یافته کمک می‌کند.