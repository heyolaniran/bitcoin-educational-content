description: |
  Trojan Mining on nigerialainen yritys, joka valjastaa vesivoiman ja verkon ulkopuoliset energialähteet Bitcoin:n louhintaan kestävällä ja energiatehokkaalla tavalla. Hyödyntämällä paikallisesti saatavilla olevia uusiutuvia luonnonvaroja yritys vähentää ympäristövaikutuksia ja edistää samalla taloudellista osallisuutta ja energian rahaksi muuttamista heikommassa asemassa olevilla alueilla.