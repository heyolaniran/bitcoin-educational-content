description: |
  Trojan Mining est une entreprise nigériane qui exploite des sources d'énergie hydroélectriques et hors réseau pour extraire le Bitcoin de manière durable et économe en énergie. En exploitant les ressources renouvelables disponibles localement, l'entreprise réduit l'impact sur l'environnement tout en contribuant à l'inclusion financière et à la monétisation de l'énergie dans les régions mal desservies.