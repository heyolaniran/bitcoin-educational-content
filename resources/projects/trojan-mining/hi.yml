description: |
  ट्रोजन Mining एक नाइजीरियाई कंपनी है जो Bitcoin को टिकाऊ और ऊर्जा-कुशल तरीके से खनन करने के लिए जलविद्युत और ऑफ-ग्रिड ऊर्जा स्रोतों का उपयोग करती है। स्थानीय रूप से उपलब्ध नवीकरणीय संसाधनों का लाभ उठाकर, कंपनी पर्यावरणीय प्रभाव को कम करती है जबकि वंचित क्षेत्रों में वित्तीय समावेशन और ऊर्जा मुद्रीकरण में योगदान देती है।