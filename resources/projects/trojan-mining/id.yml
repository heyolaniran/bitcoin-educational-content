description: |
  Trojan Mining adalah perusahaan Nigeria yang memanfaatkan sumber energi hidroelektrik dan off-grid untuk menambang Bitcoin dengan cara yang berkelanjutan dan hemat energi. Dengan memanfaatkan sumber daya terbarukan yang tersedia secara lokal, perusahaan ini mengurangi dampak lingkungan sekaligus berkontribusi pada inklusi keuangan dan monetisasi energi di wilayah yang kurang terlayani.