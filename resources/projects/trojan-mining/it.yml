description: |
  Trojan Mining è un'azienda nigeriana che sfrutta le fonti di energia idroelettriche e non collegate alla rete per estrarre Bitcoin in modo sostenibile ed efficiente dal punto di vista energetico. Sfruttando le risorse rinnovabili disponibili a livello locale, l'azienda riduce l'impatto ambientale e contribuisce all'inclusione finanziaria e alla monetizzazione dell'energia nelle regioni meno servite.