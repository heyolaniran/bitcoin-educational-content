description: |
  Trojan Mining er et nigeriansk selskap som utnytter vannkraft og andre energikilder for å utvinne Bitcoin på en bærekraftig og energieffektiv måte. Ved å utnytte lokalt tilgjengelige fornybare ressurser reduserer selskapet miljøpåvirkningen, samtidig som det bidrar til økonomisk inkludering og inntektsgenerering av energi i underbetjente regioner.