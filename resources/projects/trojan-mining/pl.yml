description: |
  Trojan Mining to nigeryjska firma wykorzystująca hydroelektryczne i pozasieciowe źródła energii do wydobywania Bitcoin w zrównoważony i energooszczędny sposób. Wykorzystując lokalnie dostępne zasoby odnawialne, firma zmniejsza wpływ na środowisko, jednocześnie przyczyniając się do włączenia finansowego i monetyzacji energii w regionach o niedostatecznym zasięgu.