description: |
  A Trojan Mining é uma empresa nigeriana que aproveita as fontes de energia hidroelétrica e fora da rede para extrair Bitcoin de uma forma sustentável e eficiente em termos energéticos. Ao aproveitar os recursos renováveis disponíveis localmente, a empresa reduz o impacto ambiental ao mesmo tempo que contribui para a inclusão financeira e a monetização da energia em regiões carenciadas.