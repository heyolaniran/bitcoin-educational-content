description: |
  Trojan Mining - нигерийская компания, использующая гидроэлектрические и автономные источники энергии для добычи Bitcoin устойчивым и энергоэффективным способом. Используя местные возобновляемые ресурсы, компания снижает воздействие на окружающую среду, одновременно способствуя расширению доступа к финансовым услугам и монетизации энергии в регионах с низким уровнем обслуживания.