description: |
  Trojan Mining je nigerijska kompanija koja koristi hidroelektrične i vanmrežne izvore energije za rudarenje Bitcoin na održiv i energetski efikasan način. Korišćenjem lokalno dostupnih obnovljivih resursa, kompanija smanjuje uticaj na životnu sredinu dok doprinosi finansijskoj inkluziji i monetizaciji energije u nedovoljno usluženim regionima.