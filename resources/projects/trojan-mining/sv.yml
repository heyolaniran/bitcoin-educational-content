description: |
  Trojan Mining är ett nigerianskt företag som utnyttjar vattenkraft och energiresurser utanför elnätet för att utvinna Bitcoin på ett hållbart och energieffektivt sätt. Genom att utnyttja lokalt tillgängliga förnybara resurser minskar företaget miljöpåverkan samtidigt som det bidrar till ekonomisk integration och energimonetisering i underförsörjda regioner.