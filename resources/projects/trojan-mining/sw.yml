description: |
  Trojan Mining ni kampuni ya Nigeria inayotumia vyanzo vya nishati ya maji na nje ya gridi ya taifa kuchimba Bitcoin kwa njia endelevu na ya matumizi ya nishati. Kwa kutumia rasilimali zinazoweza kurejeshwa ndani ya nchi, kampuni inapunguza athari za mazingira huku ikichangia ujumuishaji wa kifedha na uchumaji wa nishati katika maeneo ambayo hayajahifadhiwa.