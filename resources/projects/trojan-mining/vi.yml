description: |
  Trojan Mining là một công ty Nigeria khai thác các nguồn năng lượng thủy điện và ngoài lưới điện để khai thác Bitcoin theo cách bền vững và tiết kiệm năng lượng. Bằng cách tận dụng các nguồn tài nguyên tái tạo có sẵn tại địa phương, công ty giảm tác động đến môi trường đồng thời đóng góp vào sự hòa nhập tài chính và tiền tệ hóa năng lượng trên khắp các khu vực chưa được phục vụ đầy đủ.