description: |
  شرکتی که در طراحی کیف‌پول‌های سخت‌افزاری برای Bitcoin تخصص دارد و بر امنیت، متن‌باز بودن و خودمختاری کاربر تأکید می‌کند. این شرکت توسط الکوس فیلینی تأسیس شده و پورتال، اولین Bitcoin Hardware Wallet موبایل بومی را توسعه می‌دهد که هم سخت‌افزار و هم نرم‌افزار آن به‌طور کامل متن‌باز هستند.