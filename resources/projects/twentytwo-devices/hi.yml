description: |
  Bitcoin के लिए हार्डवेयर वॉलेट के डिजाइन में विशेषज्ञता रखने वाली कंपनी, सुरक्षा, ओपन सोर्स और उपयोगकर्ता स्वायत्तता पर जोर देती है। एलेकोस फिलिनी द्वारा स्थापित, यह पोर्टल विकसित करता है, पहला देशी मोबाइल Bitcoin Hardware Wallet, जिसमें हार्डवेयर और सॉफ्टवेयर दोनों पूरी तरह से ओपन सोर्स हैं।