description: |
  Firma specjalizująca się w projektowaniu portfeli sprzętowych dla Bitcoin, kładąca nacisk na bezpieczeństwo, open source i autonomię użytkownika. Założona przez Alekosa Filiniego, rozwija Portal, pierwszy natywny mobilny Bitcoin Hardware Wallet, przy czym zarówno sprzęt, jak i oprogramowanie są w pełni open source.
  