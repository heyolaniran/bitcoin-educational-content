description: |
  آمبرل یک سیستم‌عامل متن‌باز است که به کاربران اجازه می‌دهد یک سرور شخصی در خانه خود راه‌اندازی کنند و راحتی ذخیره‌سازی ابری را با حریم خصوصی و کنترل ذخیره‌سازی داده‌های محلی ترکیب می‌کند.
  
  کاربران می‌توانند برنامه‌های مختلفی را به‌صورت خودمیزبان اجرا کنند، از جمله Nextcloud برای ذخیره‌سازی ابری خصوصی، PhotoPrism برای ذخیره‌سازی عکس و ویدئو، و نودهای شخصی Bitcoin و Lightning برای تراکنش‌های Bitcoin. آمبرل همچنین دارای فروشگاه برنامه خود برای برنامه‌های خودمیزبان اضافی، قابلیت‌های مسدودسازی تبلیغات و یکپارچه‌سازی‌های اتوماسیون خانگی است.