description: |
  अम्ब्रेल एक ओपन-सोर्स ऑपरेटिंग सिस्टम है जो उपयोगकर्ताओं को अपने घर में एक व्यक्तिगत सर्वर चलाने की अनुमति देता है, जो स्थानीय डेटा स्टोरेज की गोपनीयता और नियंत्रण के साथ क्लाउड स्टोरेज की सुविधा प्रदान करता है।
  
  उपयोगकर्ता निजी क्लाउड स्टोरेज के लिए नेक्स्टक्लाउड, फोटो और वीडियो स्टोरेज के लिए फोटोप्रिज्म और Bitcoin लेनदेन के लिए व्यक्तिगत Bitcoin और लाइटनिंग नोड्स सहित विभिन्न एप्लिकेशन को स्वयं होस्ट कर सकते हैं। अम्ब्रेल में अतिरिक्त स्व-होस्टेड ऐप्स, विज्ञापन-अवरोधन क्षमताओं और होम ऑटोमेशन एकीकरण के लिए अपना स्वयं का ऐप स्टोर भी है।