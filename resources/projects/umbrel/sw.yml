description: |
  Umbrel ni mfumo wa uendeshaji wa chanzo huria unaoruhusu watumiaji kuendesha seva ya kibinafsi nyumbani mwao, kutoa urahisi wa uhifadhi wa wingu kwa faragha na udhibiti wa uhifadhi wa data wa ndani. 
  
  Watumiaji wanaweza kupangisha wenyewe programu mbalimbali, ikiwa ni pamoja na Nextcloud kwa hifadhi ya kibinafsi ya wingu, PhotoPrism kwa hifadhi ya picha na video, na Bitcoin ya kibinafsi na nodi za Umeme kwa miamala ya Bitcoin. Umbrel pia ina duka lake la programu kwa programu za ziada zinazojiendesha, uwezo wa kuzuia matangazo, na miunganisho ya otomatiki ya nyumbani.