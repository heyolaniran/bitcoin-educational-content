description: |
  VALR est une plateforme Exchange basée en Afrique du Sud qui offre des services de négociation au comptant, de négociation sur marge, de contrats à terme et de services de gré à gré. Avec plus d'un million d'utilisateurs et plus de 1 000 clients institutionnels, VALR est l'un des principaux acteurs du marché Bitcoin en Afrique.
  