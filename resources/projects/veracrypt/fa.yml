description: |
  VeraCrypt یک نرم‌افزار رمزگذاری دیسک متن‌باز است که به محافظت از داده‌های حساس شما کمک می‌کند. به عنوان جانشین TrueCrypt، رمزگذاری قوی با استفاده از الگوریتم‌هایی مانند AES، Serpent یا Twofish ارائه می‌دهد و امکان ایجاد حجم‌های رمزگذاری‌شده یا رمزگذاری پارتیشن‌ها و دیسک‌های کامل، چه داخلی و چه خارجی را فراهم می‌کند.