description: |
  VeraCrypt är ett diskkrypteringsprogram med öppen källkod som hjälper till att skydda dina känsliga data. Som efterföljare till TrueCrypt ger det robust kryptering med hjälp av algoritmer som AES, Serpent eller Twofish, vilket gör det möjligt att skapa krypterade volymer eller kryptera partitioner och hela diskar, både interna och externa.
  