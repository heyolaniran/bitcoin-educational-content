description: |
  Jsme start-up založený v roce 2021, který se zaměřuje na školení a poradenství v oblasti Bitcoin-only. Náš tým, který se této technologii věnuje od roku 2014, se skládá z inženýrů, vývojářů a školitelů, kteří se shodují v prosazování Bitcoin jako technologické inovace, jež může zlepšit celkový blahobyt domácností a podniků.