description: |
  Wir sind ein im Jahr 2021 gegründetes Start-up, das sich ausschließlich auf Bitcoin-Schulungen und -Beratung konzentriert. Unser Team besteht aus Ingenieuren, Entwicklern und Ausbildern, die diese Technologie seit 2014 erforschen und Bitcoin als technologische Innovation fördern, die das allgemeine Wohlbefinden von Haushalten und Unternehmen verbessern kann.