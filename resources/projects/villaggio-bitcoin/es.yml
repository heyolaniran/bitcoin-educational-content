description: |
  Somos una start-up fundada en 2021 que se centra en la formación y consultoría exclusiva sobre Bitcoin. Estudioso de esta tecnología desde 2014, nuestro equipo está formado por ingenieros, desarrolladores y formadores alineados en la promoción de Bitcoin como una innovación tecnológica que puede mejorar el bienestar general de hogares y empresas.