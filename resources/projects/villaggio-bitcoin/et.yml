description: |
  Oleme 2021. aastal asutatud idufirma, mis keskendub ainult Bitcoin koolitustele ja nõustamisele. Meie meeskond, mis on selle tehnoloogia uurija alates 2014. aastast, koosneb inseneridest, arendajatest ja koolitajatest, kes on ühinenud Bitcoin kui tehnoloogilise uuenduse edendamisel, mis võib parandada kodumajapidamiste ja ettevõtete üldist heaolu.