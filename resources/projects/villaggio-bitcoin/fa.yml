description: |
  ما یک استارت‌آپ هستیم که در سال 2021 تأسیس شده و بر آموزش و مشاوره منحصراً Bitcoin تمرکز دارد. تیم ما که از سال 2014 به مطالعه این فناوری پرداخته است، شامل مهندسان، توسعه‌دهندگان و مربیانی است که در ترویج Bitcoin به عنوان یک نوآوری فناوری که می‌تواند رفاه کلی خانوارها و کسب‌وکارها را بهبود بخشد، همسو هستند.