description: |
  Olemme vuonna 2021 perustettu startup-yritys, joka keskittyy Bitcoin-only-koulutukseen ja konsultointiin. Tiimimme on ollut tämän teknologian tutkija vuodesta 2014 lähtien, ja se koostuu insinööreistä, kehittäjistä ja kouluttajista, jotka pyrkivät edistämään Bitcoin:ta teknologisena innovaationa, joka voi parantaa kotitalouksien ja yritysten yleistä hyvinvointia.