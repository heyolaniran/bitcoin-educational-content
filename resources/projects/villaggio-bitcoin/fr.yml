description: |
  Nous sommes une start-up fondée en 2021 qui se concentre sur la formation et le conseil en Bitcoin uniquement. Érudit de cette technologie depuis 2014, notre équipe est composée d'ingénieurs, de développeurs et de formateurs alignés sur la promotion du Bitcoin en tant qu'innovation technologique susceptible d'améliorer le bien-être global des ménages et des entreprises.