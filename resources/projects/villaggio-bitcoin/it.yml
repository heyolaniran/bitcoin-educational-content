description: |
  Siamo una Start-up fondata nel 2021 che si occupa di formazione e consulenza Bitcoin-only. Studiosi di questa tecnologia a partire dal 2014, il nostro team è composto da ingegneri, sviluppatori e formatori allineati nel promuovere Bitcoin come innovazione tecnologica in grado di migliorare il benessere generale di famiglie e imprese.
