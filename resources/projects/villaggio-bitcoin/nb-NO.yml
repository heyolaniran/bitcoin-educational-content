description: |
  Vi er en oppstartsbedrift grunnlagt i 2021 som fokuserer på opplæring og rådgivning i Bitcoin. Vi har studert denne teknologien siden 2014, og teamet vårt består av ingeniører, utviklere og undervisere som jobber for å fremme Bitcoin som en teknologisk innovasjon som kan forbedre den generelle velferden til husholdninger og bedrifter.