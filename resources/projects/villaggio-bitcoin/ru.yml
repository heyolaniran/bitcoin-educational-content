description: |
  Мы - стартап, основанный в 2021 году и специализирующийся на обучении и консультировании по Bitcoin. Наша команда состоит из инженеров, разработчиков и тренеров, которые занимаются продвижением Bitcoin как технологической инновации, способной улучшить общее благосостояние домохозяйств и предприятий.