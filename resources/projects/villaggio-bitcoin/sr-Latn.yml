description: |
  Mi smo startap osnovan 2021. godine koji se fokusira isključivo na obuku i konsalting za Bitcoin. Kao proučavaoci ove tehnologije od 2014. godine, naš tim se sastoji od inženjera, programera i trenera koji su usklađeni u promovisanju Bitcoin kao tehnološke inovacije koja može poboljšati opšte blagostanje domaćinstava i preduzeća.