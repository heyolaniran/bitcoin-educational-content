description: |
  Vi är ett nystartat företag som grundades 2021 och som fokuserar på utbildning och konsultation som endast gäller Bitcoin. Vi har studerat denna teknik sedan 2014 och vårt team består av ingenjörer, utvecklare och utbildare som är inriktade på att främja Bitcoin som en teknisk innovation som kan förbättra hushållens och företagens övergripande välbefinnande.