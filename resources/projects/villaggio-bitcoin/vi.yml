description: |
  Chúng tôi là một công ty khởi nghiệp được thành lập vào năm 2021, tập trung vào đào tạo và tư vấn chỉ dành cho Bitcoin. Là một học giả về công nghệ này từ năm 2014, nhóm của chúng tôi bao gồm các kỹ sư, nhà phát triển và giảng viên cùng chung mục tiêu thúc đẩy Bitcoin như một sáng kiến công nghệ có thể cải thiện phúc lợi chung của các hộ gia đình và doanh nghiệp.