description: |
  ولتاژ یک پلتفرم ارائه‌دهنده زیرساخت‌های سطح سازمانی برای Lightning Network است.
  
  این پلتفرم خدمات متنوعی را برای کمک به کسب‌وکارها و توسعه‌دهندگان در ساخت، استقرار و مقیاس‌گذاری سریع‌تر بر روی Lightning Network ارائه می‌دهد. محصولات کلیدی شامل میزبانی نود برای مدیریت بدون دردسر نود، Surge برای دریافت بینش‌ها و هشدارها درباره نود شما، و Flow برای ایجاد آسان کانال‌های لایتنینگ است. این پلتفرم به گونه‌ای طراحی شده که کنترل کامل، امنیت رمزگذاری‌شده و دسترسی دائمی آنلاین را ارائه دهد. ولتاژ همچنین از طریق وبلاگ خود به‌روزرسانی‌ها، راهنماها و بینش‌ها را فراهم می‌کند. کاربران می‌توانند با یک دوره آزمایشی ۷ روزه رایگان پلتفرم را امتحان کنند.