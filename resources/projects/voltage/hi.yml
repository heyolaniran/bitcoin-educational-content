description: |
  वोल्टेज एक ऐसा प्लैटफ़ॉर्म है जो Lightning Network के लिए एंटरप्राइज़-ग्रेड इंफ्रास्ट्रक्चर प्रदान करता है।
  
  यह व्यवसायों और डेवलपर्स को Lightning Network पर तेज़ी से निर्माण, तैनाती और स्केल करने में मदद करने के लिए विभिन्न सेवाएँ प्रदान करता है। मुख्य उत्पादों में परेशानी मुक्त नोड प्रबंधन के लिए नोड होस्टिंग, आपके नोड के बारे में जानकारी और अलर्ट के लिए सर्ज और लाइटनिंग चैनलों के आसान निर्माण के लिए फ़्लो शामिल हैं। प्लेटफ़ॉर्म को पूर्ण नियंत्रण, एन्क्रिप्टेड सुरक्षा और निरंतर ऑनलाइन उपलब्धता प्रदान करने के लिए डिज़ाइन किया गया है। वोल्टेज अपने ब्लॉग के माध्यम से अपडेट, गाइड और जानकारी भी प्रदान करता है। उपयोगकर्ता 7-दिन के निःशुल्क परीक्षण के साथ प्लेटफ़ॉर्म आज़मा सकते हैं।