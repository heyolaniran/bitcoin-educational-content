description: |
  Voltage to platforma zapewniająca infrastrukturę klasy korporacyjnej dla Lightning Network.
  
  Oferuje różne usługi, które pomagają firmom i programistom szybciej tworzyć, wdrażać i skalować Lightning Network. Kluczowe produkty obejmują Node Hosting do bezproblemowego zarządzania węzłami, Surge do wglądu i alertów dotyczących węzła oraz Flow do łatwego tworzenia kanałów Lightning. Platforma została zaprojektowana tak, aby oferować pełną kontrolę, szyfrowane bezpieczeństwo i stałą dostępność online. Voltage zapewnia również aktualizacje, przewodniki i spostrzeżenia za pośrednictwem swojego bloga. Użytkownicy mogą wypróbować platformę w ramach bezpłatnego 7-dniowego okresu próbnego.