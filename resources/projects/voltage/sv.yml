description: |
  Voltage är en plattform som tillhandahåller infrastruktur i företagsklass för Lightning Network.
  
  De erbjuder olika tjänster för att hjälpa företag och utvecklare att bygga, distribuera och skala på Lightning Network snabbare. Viktiga produkter inkluderar Node Hosting för problemfri nodhantering, Surge för insikter och varningar om din nod och Flow för enkelt skapande av Lightning-kanaler. Plattformen är utformad för att erbjuda total kontroll, krypterad säkerhet och konstant tillgänglighet online. Voltage tillhandahåller också uppdateringar, guider och insikter via sin blogg. Användare kan prova plattformen med en kostnadsfri 7-dagars testperiod.