description: |
  واسابی Wallet برای کسانی طراحی شده است که به حریم خصوصی اهمیت می‌دهند، در دنیایی که نظارت و سوءاستفاده از اطلاعات فراگیر است.
  
  به عنوان یک نرم‌افزار با دانش صفر، اطمینان می‌دهد که تراکنش‌های Bitcoin کاربر به عنوان امور خصوصی آن‌ها باقی می‌ماند. واسابی Wallet متن‌باز است و به هر کسی اجازه می‌دهد تا کد را بررسی یا در آن مشارکت کند. طراحی آن Trustless است، به طوری که نه عموم و نه توسعه‌دهندگان نمی‌توانند به حریم خصوصی شما تجاوز کنند. Wallet غیرامانی است و به شما اجازه می‌دهد کنترل کلیدهای خصوصی خود را حفظ کرده و به حاکمیت مالی واقعی دست یابید. با وجود ویژگی‌های پیشرفته‌اش، واسابی به گونه‌ای طراحی شده است که کاربرپسند باشد و به طور خودکار حریم خصوصی را مدیریت کند. از WabiSabi، یک طرح اعتبارنامه ناشناس، استفاده می‌کند تا کوین‌جوین‌ها را دسترس‌پذیرتر و کارآمدتر کند. علاوه بر این، مقرون‌به‌صرفه است و برای کوین‌جوین کردن سکه‌های بالای 0.01 BTC هزینه‌ای متعارف دریافت می‌کند، در حالی که ورودی‌های 0.01 BTC یا کمتر و ریمیکس‌ها از هزینه‌های هماهنگ‌کننده معاف هستند.