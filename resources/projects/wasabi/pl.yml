description: |
  Wasabi Wallet został zaprojektowany dla tych, którzy cenią sobie prywatność w świecie, w którym inwigilacja i nadużywanie informacji są powszechne.
  
  Jako oprogramowanie o zerowej wiedzy zapewnia, że transakcje Bitcoin użytkownika pozostają jego prywatną sprawą. Wasabi Wallet jest oprogramowaniem typu open-source, umożliwiającym każdemu weryfikację lub współtworzenie kodu. Jego konstrukcja jest Trustless, zapewniając, że ani opinia publiczna, ani programiści nie mogą naruszać prywatności użytkownika. Wallet nie wymaga opieki, co pozwala zachować kontrolę nad kluczami prywatnymi i osiągnąć prawdziwą suwerenność finansową. Pomimo zaawansowanych funkcji, Wasabi zostało zaprojektowane tak, aby było przyjazne dla użytkownika i automatycznie obsługiwało prywatność. Wykorzystuje WabiSabi, anonimowy schemat poświadczeń, aby uczynić coinjoiny bardziej dostępnymi i wydajnymi. Ponadto jest przystępny cenowo, pobierając niewielką opłatę za łączenie monet powyżej 0,01 BTC, podczas gdy wejścia o wartości 0,01 BTC lub niższej oraz remiksy są wolne od opłat koordynacyjnych.