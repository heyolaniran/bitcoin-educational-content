description: |
  Wasabi Wallet je dizajniran za one koji cene privatnost, u svetu gde su nadzor i zloupotreba informacija rasprostranjeni.
  
  Kao softver sa nultim znanjem, osigurava da transakcije korisnika Bitcoin ostanu njihova privatna stvar. Wasabi Wallet je otvorenog koda, omogućavajući svakome da verifikuje ili doprinese kodu. Njegov dizajn je Trustless, osiguravajući da ni javnost ni programeri ne mogu narušiti vašu privatnost. Wallet je ne-kustodijalan, omogućavajući vam da zadržite kontrolu nad svojim privatnim ključevima i postignete pravu finansijsku suverenost. Uprkos svojim naprednim funkcijama, Wasabi je dizajniran da bude jednostavan za korišćenje i automatski upravlja privatnošću. Koristi WabiSabi, šemu anonimnih akreditiva, kako bi učinio coinjoin-ove pristupačnijim i efikasnijim. Pored toga, pristupačan je, naplaćujući skromnu naknadu za coinjoin-ovanje novčića iznad 0.01 BTC, dok su unosi od 0.01 BTC ili manje i remiksi oslobođeni naknada koordinatora.