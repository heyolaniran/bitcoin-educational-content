description: |
  Wasabi Wallet är utformad för dem som värdesätter integritet i en värld där övervakning och missbruk av information är utbredd.
  
  Som en programvara med nollkunskap säkerställer den att användarens Bitcoin-transaktioner förblir deras privata angelägenheter. Wasabi Wallet är öppen källkod, vilket gör det möjligt för vem som helst att verifiera eller bidra till koden. Dess design är Trustless, vilket säkerställer att varken allmänheten eller utvecklarna kan inkräkta på din integritet. Wallet är inte frihetsberövande, vilket gör att du kan behålla kontrollen över dina privata nycklar och uppnå verklig ekonomisk suveränitet. Trots sina avancerade funktioner är Wasabi utformad för att vara användarvänlig och hantera integriteten automatiskt. Den använder WabiSabi, ett anonymt legitimationssystem, för att göra coinjoins mer tillgängliga och effektiva. Dessutom är det överkomligt och tar ut en blygsam avgift för coinjoining av mynt över 0,01 BTC, medan inmatningar på 0,01 BTC eller lägre och remixer är fria från koordinatoravgifter.