description: |
  Wasabi Wallet imeundwa kwa ajili ya wale wanaothamini faragha, katika ulimwengu ambapo ufuatiliaji wa taarifa na matumizi mabaya umeenea. 
  
  Kama programu isiyo na maarifa, inahakikisha kwamba miamala ya Bitcoin ya mtumiaji inasalia kuwa biashara yao ya kibinafsi. Wasabi Wallet ni chanzo huria, kinachoruhusu mtu yeyote kuthibitisha au kuchangia msimbo. Muundo wake ni Trustless, unaohakikisha si umma wala wasanidi wanaoweza kukiuka faragha yako. Wallet haina ulezi, inakuruhusu kudumisha udhibiti wa funguo zako za faragha na kufikia uhuru wa kweli wa kifedha. Licha ya vipengele vyake vya juu, Wasabi imeundwa kuwa rahisi kwa watumiaji na kushughulikia faragha kiotomatiki. Inatumia WabiSabi, mpango wa kitambulisho usiojulikana, kufanya coinjoins kufikiwa zaidi na kwa ufanisi zaidi. Zaidi ya hayo, ni ya bei nafuu, inatoza ada ya kawaida kwa sarafu zilizounganishwa zaidi ya 0.01 BTC, wakati pembejeo za 0.01 BTC au chini na mikato hazina ada za mratibu.