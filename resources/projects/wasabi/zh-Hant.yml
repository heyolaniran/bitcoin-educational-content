description: |
  Wasabi Wallet 是專為重視隱私的人所設計，在這個資訊監控與濫用猖獗的世界。
  
  作為一個零知識軟件，它確保用戶的 Bitcoin 交易仍然是他們的私事。Wasabi Wallet 是開放源碼，允許任何人驗證或貢獻代碼。它的設計是 Trustless，確保公眾或開發人員都無法侵犯您的隱私。Wallet 是非監護型，讓您保持對私人金鑰的控制，實現真正的金融主權。儘管擁有先進的功能，Wasabi 的設計仍以人性化和自動處理隱私為宗旨。它使用匿名憑證方案 WabiSabi，使硬幣兌換更方便、更高效。此外，它的價格合理，對於 0.01 BTC 以上的接幣只收取適度的費用，而 0.01 BTC 或以下的輸入和重混則免收協調費。