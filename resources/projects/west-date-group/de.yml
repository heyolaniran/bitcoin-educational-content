description: |
  Die West Data Group (WDG) konzentriert sich auf den Bau von Rechenzentren und die Entwicklung digitaler Infrastrukturen. Ihre wichtigste Initiative ist die Gründung der Wes Data Center Service PLC in Äthiopien, wo sie mit dem Bau eines 30-MW-Rechenzentrums für die Kryptowährung Mining begonnen hat.