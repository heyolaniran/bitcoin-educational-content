description: |
  West Data Group (WDG) keskittyy datakeskusten rakentamiseen ja digitaalisen infrastruktuurin kehittämiseen. Sen merkittävimpiä aloitteita on Wes Data Center Service PLC:n perustaminen Etiopiaan, jossa se on aloittanut kryptovaluutta Mining:lle tarkoitetun 30 MW:n datakeskuksen rakentamisen.