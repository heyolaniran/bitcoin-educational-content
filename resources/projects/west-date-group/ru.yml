description: |
  Компания West Data Group (WDG) специализируется на строительстве дата-центров и развитии цифровой инфраструктуры. Наиболее значимые инициативы компании - создание Wes Data Center Service PLC в Эфиопии, где она начала строительство дата-центра мощностью 30 МВт, предназначенного для криптовалюты Mining.