description: |
  West Data Group (WDG) tập trung vào xây dựng trung tâm dữ liệu và phát triển cơ sở hạ tầng kỹ thuật số. Sáng kiến quan trọng nhất của công ty là thành lập Wes Data Center Service PLC tại Ethiopia, nơi công ty đã bắt đầu xây dựng một trung tâm dữ liệu 30MW dành riêng cho tiền điện tử Mining.