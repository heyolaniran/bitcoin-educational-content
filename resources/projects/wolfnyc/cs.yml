description: |
  Čtyřikrát ročně přivádí Wolf do New Yorku vybranou skupinu zakladatelů a týmů z celého světa, z nichž každý posouvá hranice Bitcoin, aby zde osm týdnů budovali, iterovali a rozšiřovali. Výhradně Non-Remote, když jsme spolu, vytváříme víc. ve výšce 1 200 metrů nad zemí, s 360stupňovým výhledem na New York, je Wolf jedním z nejinspirativnějších míst pro práci, jaké si lze představit.
  