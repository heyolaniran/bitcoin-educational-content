description: |
  Viermal im Jahr bringt Wolf eine ausgewählte Gruppe von Gründern und Teams aus der ganzen Welt, die alle die Grenzen von Bitcoin ausloten, für acht Wochen nach New York City, um zu bauen, zu iterieren und zu skalieren. Ausschließlich Non-Remote, wir schaffen mehr, wenn wir zusammen sind. wolf ist einer der inspirierendsten Orte zum Arbeiten, den man sich vorstellen kann: 1.200 Fuß hoch oben im Himmel, mit einem 360-Grad-Blick auf New York City.
  