description: |
  Cuatro veces al año, Wolf reúne en Nueva York durante ocho semanas a un selecto grupo de fundadores y equipos de todo el mundo, cada uno de ellos empujando los límites de Bitcoin, para construir, iterar y escalar. Exclusivamente Non-Remote, creamos más cuando estamos juntos. a 1.200 pies de altura, con vistas de 360 grados de la ciudad de Nueva York, Wolf es uno de los lugares de trabajo más inspiradores que se puedan imaginar.
  