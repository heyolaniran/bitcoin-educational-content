description: |
  چهار بار در سال، ولف گروهی منتخب از بنیان‌گذاران و تیم‌ها از سراسر جهان را که هر یک مرزهای Bitcoin را به جلو می‌برند، به مدت هشت هفته به نیویورک سیتی می‌آورد تا بسازند، تکرار کنند و مقیاس‌بندی کنند. به‌طور انحصاری غیر از راه دور، ما زمانی که با هم هستیم بیشتر خلق می‌کنیم. در ارتفاع ۱۲۰۰ فوتی از زمین، با چشم‌انداز ۳۶۰ درجه از نیویورک سیتی، ولف یکی از الهام‌بخش‌ترین مکان‌های کاری قابل تصور است.