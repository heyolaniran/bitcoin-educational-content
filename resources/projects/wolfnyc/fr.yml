description: |
  Quatre fois par an, Wolf réunit à New York, pendant huit semaines, un groupe sélectionné de fondateurs et d'équipes du monde entier, chacun repoussant les limites de Bitcoin, afin de construire, d'itérer et de faire évoluer les choses. Exclusivement à distance, nous créons plus lorsque nous sommes ensemble. à 1 200 pieds dans le ciel, avec une vue à 360 degrés sur la ville de New York, Wolf est l'un des lieux de travail les plus inspirants que l'on puisse imaginer.
  