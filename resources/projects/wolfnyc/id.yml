description: |
  Empat kali per tahun, Wolf membawa sekelompok pendiri dan tim terpilih dari seluruh dunia, yang masing-masing mendorong batas-batas Bitcoin, ke New York City selama delapan minggu untuk membangun, mengulang, dan meningkatkan skala. Secara eksklusif Non-Remote, kami menciptakan lebih banyak hal saat kami bersama. berada di ketinggian 1.200 kaki di langit, dengan pemandangan 360 derajat Kota New York, Wolf merupakan salah satu tempat paling inspiratif untuk bekerja yang bisa dibayangkan.
  