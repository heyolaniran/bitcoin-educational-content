description: |
  Quattro volte all'anno, Wolf porta a New York un gruppo selezionato di fondatori e team da tutto il mondo, ognuno dei quali si spinge oltre i confini di Bitcoin, per otto settimane per costruire, iterare e scalare. Esclusivamente Non-Remote, creiamo di più quando siamo insieme. a 1.200 piedi di altezza, con una vista a 360 gradi su New York City, Wolf è uno dei luoghi di lavoro più stimolanti che si possano immaginare.
  