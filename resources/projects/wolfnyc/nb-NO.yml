description: |
  Fire ganger i året bringer Wolf en utvalgt gruppe grunnleggere og team fra hele verden, som hver for seg flytter grensene for Bitcoin, til New York City i åtte uker for å bygge, iterere og skalere. Vi skaper mer når vi er sammen, og det gjør vi utelukkende Non-Remote. 1200 meter opp i luften, med 360-graders utsikt over New York City, er Wolf et av de mest inspirerende stedene å jobbe.
  