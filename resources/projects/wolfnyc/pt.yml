description: |
  Quatro vezes por ano, a Wolf traz um grupo selecionado de fundadores e equipas de todo o mundo, cada um a ultrapassar os limites do Bitcoin, para a cidade de Nova Iorque durante oito semanas para construir, iterar e escalar. Exclusivamente Non-Remote, criamos mais quando estamos juntos. a 1.200 pés de altura, com vistas de 360 graus da cidade de Nova Iorque, Wolf é um dos locais de trabalho mais inspiradores que se pode imaginar.
  