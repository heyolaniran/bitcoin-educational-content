description: |
  Четыре раза в год Wolf собирает избранную группу основателей и команд со всего мира, каждая из которых расширяет границы Bitcoin, в Нью-Йорке на восемь недель для создания, итерации и масштабирования. Исключительно в режиме Non-Remote мы создаем больше, когда мы вместе. на высоте 1200 футов в небе, с 360-градусным видом на Нью-Йорк, Wolf - одно из самых вдохновляющих мест для работы, которое только можно себе представить.
  