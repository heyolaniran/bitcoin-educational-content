description: |
  Četiri puta godišnje, Wolf dovodi odabranu grupu osnivača i timova iz celog sveta, koji pomeraju granice Bitcoin, u Njujork na osam nedelja kako bi gradili, iterirali i skalirali. Isključivo ne-remote, stvaramo više kada smo zajedno. Na visini od 1.200 stopa, sa pogledom od 360 stepeni na Njujork, Wolf je jedno od najinspirativnijih mesta za rad koje možete zamisliti.