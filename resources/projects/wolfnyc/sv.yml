description: |
  Fyra gånger per år tar Wolf med sig en utvald grupp grundare och team från hela världen, som alla tänjer på gränserna för Bitcoin, till New York City i åtta veckor för att bygga, iterera och skala. Exklusivt Non-Remote, vi skapar mer när vi är tillsammans. 1 200 meter upp i luften, med 360-graders utsikt över New York City, är Wolf en av de mest inspirerande arbetsplatserna man kan tänka sig.
  