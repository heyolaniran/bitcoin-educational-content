description: |
  Bốn lần mỗi năm, Wolf đưa một nhóm sáng lập và nhóm được chọn lọc từ khắp nơi trên thế giới, mỗi nhóm đều vượt qua ranh giới của Bitcoin, đến Thành phố New York trong tám tuần để xây dựng, lặp lại và mở rộng quy mô. Hoàn toàn không làm việc từ xa, chúng tôi tạo ra nhiều hơn khi ở bên nhau. Ở độ cao 1.200 feet trên bầu trời, với tầm nhìn 360 độ ra Thành phố New York, Wolf là một trong những nơi làm việc truyền cảm hứng nhất mà bạn có thể tưởng tượng.
  
  