description: |
  Yellow Card je regulovaná kryptografická služba Exchange v Africe, která uživatelům umožňuje nakupovat, prodávat a spravovat kryptoměny v místní měně. Nabízí snadno použitelnou aplikaci pro jednotlivce a výkonné rozhraní API pro podniky, přičemž klade velký důraz na dodržování předpisů, finanční vzdělávání a jednoduchý přístup k digitálním aktivům.