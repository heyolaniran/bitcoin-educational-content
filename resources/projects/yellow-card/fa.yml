description: |
  کارت زرد یک Exchange رمزنگاری تنظیم‌شده در آفریقا است که به کاربران اجازه می‌دهد با استفاده از ارز محلی خود، ارزهای دیجیتال را خریداری، فروش و مدیریت کنند. این پلتفرم یک اپلیکیشن کاربرپسند برای افراد و یک API قدرتمند برای کسب‌وکارها ارائه می‌دهد، با تمرکز قوی بر انطباق، آموزش مالی و دسترسی ساده به دارایی‌های دیجیتال.