description: |
  Yellow Card est une crypto Exchange réglementée en Afrique qui permet aux utilisateurs d'acheter, de vendre et de gérer des cryptocurrencies en utilisant leur monnaie locale. Elle propose une application facile à utiliser pour les particuliers et une API puissante pour les entreprises, en mettant l'accent sur la conformité, l'éducation financière et l'accès simple aux actifs numériques.