description: |
  Yellow Card er en regulert kryptogiro i Afrika som lar brukerne kjøpe, selge og administrere kryptovalutaer ved hjelp av sin lokale valuta. De tilbyr en brukervennlig app for privatpersoner og et kraftig API for bedrifter, med et sterkt fokus på compliance, finansiell utdanning og enkel tilgang til digitale eiendeler.