description: |
  Yellow Card - это регулируемая криптовалютная биржа Exchange в Африке, которая позволяет пользователям покупать, продавать и управлять криптовалютами, используя местную валюту. Она предлагает простое в использовании приложение для частных лиц и мощный API для предприятий, уделяя особое внимание соблюдению требований, финансовому образованию и простому доступу к цифровым активам.