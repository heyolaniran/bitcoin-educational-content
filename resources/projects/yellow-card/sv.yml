description: |
  Yellow Card är en reglerad krypto Exchange i Afrika som låter användare köpa, sälja och hantera kryptovalutor med hjälp av sin lokala valuta. De erbjuder en lättanvänd app för privatpersoner och ett kraftfullt API för företag, med ett starkt fokus på efterlevnad, finansiell utbildning och enkel tillgång till digitala tillgångar.