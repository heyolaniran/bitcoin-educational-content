description: |
  Kadi ya Njano ni Exchange ya crypto inayodhibitiwa barani Afrika ambayo huwaruhusu watumiaji kununua, kuuza na kudhibiti sarafu za siri kwa kutumia sarafu zao za ndani. Inatoa programu ambayo ni rahisi kutumia kwa watu binafsi na API madhubuti ya biashara, inayozingatia sana kufuata sheria, elimu ya kifedha na ufikiaji rahisi wa vipengee vya dijitali.