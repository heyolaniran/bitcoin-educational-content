description: |
  Yellow Card là một loại tiền điện tử được quản lý Exchange tại Châu Phi cho phép người dùng mua, bán và quản lý tiền điện tử bằng tiền tệ địa phương của họ. Nó cung cấp một ứng dụng dễ sử dụng cho cá nhân và một API mạnh mẽ cho doanh nghiệp, tập trung mạnh vào việc tuân thủ, giáo dục tài chính và truy cập đơn giản vào tài sản kỹ thuật số.