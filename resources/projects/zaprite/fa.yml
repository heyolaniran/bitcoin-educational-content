description: |
  زاپ‌رایت یک سرویس یکپارچه‌سازی پرداخت ارائه می‌دهد که هدف آن ساده‌سازی پذیرش پرداخت‌های Bitcoin برای بازرگانان است. با ارائه ابزارهای کاربرپسند و پشتیبانی از تراکنش‌های On-Chain و Lightning Network، زاپ‌رایت به کسب‌وکارها کمک می‌کند تا تجربه‌های پرداخت امن و بدون درز ایجاد کنند که از کارایی Bitcoin به عنوان یک روش پرداخت دیجیتال بهره‌مند شوند.