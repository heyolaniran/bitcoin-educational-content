description: |
  ZEBEDEE یک شرکت فناوری است که به تسهیل پرداخت‌های باز و قابل برنامه‌ریزی در دنیای مجازی اختصاص دارد.
  
  آن‌ها قصد دارند معاملات آنلاین را متحول کنند و به سازندگان امکان ارائه مشوق‌های مالی و به کاربران ارزش واقعی در فضاهای مجازی را بدهند. با هدایت اعتماد، جسارت، نوآوری هیجان‌انگیز و تخصص، آن‌ها متعهد به تبدیل فناوری‌های پیچیده به محصولات ساده و کاربرپسند هستند. آن‌ها آینده‌ای را پیش‌بینی می‌کنند که در آن اقتصادها به‌طور یکپارچه فعالیت‌های دنیای واقعی و مجازی را ادغام می‌کنند و بازی‌ها پیشگام این تغییر هستند. ZEBEDEE در خط مقدم است و ابزارها و محصولات لازم را برای تحقق این چشم‌انداز می‌سازد.