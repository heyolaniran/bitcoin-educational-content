description: |
  ZEBEDEE je tehnološka firma posvećena olakšavanju otvorenih, programabilnih plaćanja unutar virtuelnih svetova.
  
  Njihov cilj je da revolucioniraju online transakcije, omogućavajući kreatorima da pruže finansijske podsticaje, a korisnicima da generate pravu vrednost u virtuelnim prostorima. Vođeni poverenjem, smelošću, elektrizirajućom inovacijom i stručnošću, posvećeni su transformaciji složenih tehnologija u jednostavne, korisnički prijatne proizvode. Predviđaju budućnost u kojoj ekonomije besprekorno integrišu aktivnosti stvarnog i virtuelnog sveta, sa igrama koje predvode ovu promenu. ZEBEDEE je na čelu, kreirajući neophodne alate i proizvode kako bi ova vizija postala stvarnost.