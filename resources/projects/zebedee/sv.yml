description: |
  ZEBEDEE är ett teknikföretag som arbetar för att underlätta öppna, programmerbara betalningar i virtuella världar.
  
  De strävar efter att revolutionera onlinetransaktioner och göra det möjligt för skapare att tillhandahålla ekonomiska incitament och användare att generate genuint värde i virtuella utrymmen. Med tillit, djärvhet, elektrifierande innovation och expertis som ledstjärnor strävar de efter att omvandla komplex teknik till enkla, användarvänliga produkter. De förutser en framtid där ekonomier sömlöst integrerar aktiviteter i den verkliga och virtuella världen, med spel som banbrytande i detta skifte. ZEBEDEE ligger i framkant och skapar de verktyg och produkter som krävs för att denna vision ska bli verklighet.