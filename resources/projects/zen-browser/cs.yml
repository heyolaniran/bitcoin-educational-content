description: |
  Zen Browser je výsledkem komunity nadšených vývojářů a designérů, kteří nemají žádnou komerční strukturu a jsou vedeni snahou o nové pojetí webu. Tento bezplatný projekt s otevřeným zdrojovým kódem si klade za cíl nabídnout elegantní, soukromý a funkčně bohatý prohlížeč, který umožní každému prohlížet stránky bez obav o svá data.