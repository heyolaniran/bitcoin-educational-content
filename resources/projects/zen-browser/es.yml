description: |
  Zen Browser es fruto de una comunidad de desarrolladores y diseñadores apasionados, sin estructura comercial, movidos por la ambición de reinventar la experiencia web. Este proyecto gratuito y de código abierto pretende ofrecer un navegador elegante, respetuoso con la privacidad y rico en funciones, que permita a todo el mundo navegar sin temer por sus datos.