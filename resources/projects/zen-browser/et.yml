description: |
  Zen Browser on kirglike arendajate ja disainerite kogukonna vili, millel puudub kommertsstruktuur, kuid mille eesmärk on veebikogemuse uuendamine. Selle tasuta, avatud lähtekoodiga projekti eesmärk on pakkuda elegantset, privaatsussõbralikku ja funktsionaalselt rikast brauserit, mis võimaldab kõigil sirvida ilma hirmuta oma andmete pärast.