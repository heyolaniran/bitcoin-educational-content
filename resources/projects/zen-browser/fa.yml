description: |
  مرورگر Zen حاصل تلاش جامعه‌ای از توسعه‌دهندگان و طراحان پرشور است که بدون ساختار تجاری، با هدف بازآفرینی تجربه وب فعالیت می‌کنند. این پروژه رایگان و متن‌باز قصد دارد مرورگری زیبا، حریم‌خصوصی‌محور و پر از ویژگی‌های متنوع ارائه دهد تا همه بتوانند بدون نگرانی از داده‌های خود به مرور بپردازند.