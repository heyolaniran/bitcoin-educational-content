description: |
  Zen Browser on syntynyt intohimoisten kehittäjien ja suunnittelijoiden yhteisöstä, jolla ei ole kaupallista rakennetta ja jota ajaa kunnianhimoinen pyrkimys keksiä web-kokemus uudelleen. Tämän ilmaisen, avoimen lähdekoodin projektin tavoitteena on tarjota tyylikäs, yksityisyyden suojaa kunnioittava ja ominaisuuksiltaan rikas selain, jonka avulla jokainen voi selata ilman pelkoa omista tiedoistaan.