description: |
  Zen Browser est le fruit d’une communauté de développeurs et designers passionnés, sans structure commerciale, animés par l’ambition de réinventer l’expérience web. Ce projet libre et open source vise à offrir un navigateur à la fois élégant, respectueux de la vie privée, et riche en fonctionnalités, permettant à chacun de naviguer sereinement sans crainte pour ses données.