description: |
  Zen Browser adalah hasil dari komunitas pengembang dan desainer yang bersemangat, tanpa struktur komersial, yang didorong oleh ambisi untuk menemukan kembali pengalaman web. Proyek sumber terbuka yang gratis ini bertujuan untuk menawarkan peramban yang elegan, ramah privasi, dan kaya fitur, sehingga semua orang dapat menjelajah tanpa perlu khawatir akan data mereka.