description: |
  Zen Browser è il frutto di una comunità di sviluppatori e designer appassionati, senza struttura commerciale, guidati dall'ambizione di reinventare l'esperienza web. Questo progetto gratuito e open-source mira a offrire un browser elegante, rispettoso della privacy e ricco di funzionalità, che consenta a tutti di navigare senza temere per i propri dati.