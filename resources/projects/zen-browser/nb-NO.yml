description: |
  Zen Browser er resultatet av et fellesskap av lidenskapelige utviklere og designere, uten noen kommersiell struktur, drevet av ambisjonen om å gjenoppfinne nettopplevelsen. Dette gratis prosjektet med åpen kildekode har som mål å tilby en elegant, personvernvennlig og funksjonsrik nettleser som gjør det mulig for alle å surfe uten frykt for dataene sine.