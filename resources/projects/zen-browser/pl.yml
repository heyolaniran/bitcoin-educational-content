description: |
  Zen Browser jest owocem pracy społeczności pasjonatów, deweloperów i projektantów, bez struktury komercyjnej, napędzanych ambicją ponownego odkrycia doświadczenia sieciowego. Ten darmowy projekt o otwartym kodzie źródłowym ma na celu zaoferowanie eleganckiej, przyjaznej dla prywatności i bogatej w funkcje przeglądarki, umożliwiającej każdemu przeglądanie bez obawy o swoje dane.