description: |
  Zen Browser - это плод работы сообщества увлеченных разработчиков и дизайнеров, не имеющих коммерческой структуры и движимых стремлением переосмыслить веб-опыт. Этот бесплатный проект с открытым исходным кодом призван предложить элегантный, дружественный к конфиденциальности и многофункциональный браузер, позволяющий всем желающим просматривать веб-страницы, не опасаясь за свои данные.