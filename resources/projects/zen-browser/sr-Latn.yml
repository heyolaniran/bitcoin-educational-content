description: |
  Zen Browser je plod zajednice strastvenih programera i dizajnera, bez komercijalne strukture, vođenih ambicijom da iznova osmisle iskustvo na vebu. Ovaj besplatni, open-source projekat ima za cilj da ponudi elegantan, privatnosti-prijateljski i funkcionalno bogat pregledač, omogućavajući svima da pretražuju bez straha za svoje podatke.