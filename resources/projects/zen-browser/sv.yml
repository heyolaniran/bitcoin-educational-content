description: |
  Zen Browser är resultatet av en gemenskap av passionerade utvecklare och designers, utan någon kommersiell struktur, som drivs av ambitionen att återuppfinna webbupplevelsen. Detta kostnadsfria projekt med öppen källkod syftar till att erbjuda en elegant, integritetsvänlig och funktionsrik webbläsare som gör det möjligt för alla att surfa utan rädsla för sina data.