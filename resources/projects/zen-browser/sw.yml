description: |
  Kivinjari cha Zen ni tunda la jumuiya ya watengenezaji na wabunifu wenye shauku, isiyo na muundo wa kibiashara, inayoendeshwa na nia ya kuanzisha tena matumizi ya wavuti. Mradi huu usiolipishwa wa programu huria unalenga kutoa kivinjari maridadi, rafiki kwa faragha na chenye vipengele vingi, kuwezesha kila mtu kuvinjari bila hofu kwa data yake.