description: |
  Zen Browser là thành quả của một cộng đồng các nhà phát triển và thiết kế đầy nhiệt huyết, không có cấu trúc thương mại, được thúc đẩy bởi tham vọng tái tạo trải nghiệm web. Dự án mã nguồn mở miễn phí này nhằm mục đích cung cấp một trình duyệt thanh lịch, thân thiện với quyền riêng tư và giàu tính năng, cho phép mọi người duyệt web mà không sợ dữ liệu của họ bị đánh cắp.