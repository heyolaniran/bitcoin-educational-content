description: |
  Farma "Zum Wilden Michel" se nachází v srdci krásného Schwarzwaldu. Milovníci přírody a pěší turistiky, příznivci kempování a outdooroví nadšenci, motorkáři a cyklisté jsou zde vítáni. Na své si zde přijdou i milovníci hudby a kultury. Téměř každý týden se u nás něco děje. Od rocku po dechovku, od elektronické hudby po divadlo a kabaret. V naší rustikální restauraci vás budeme hýčkat kulinářskými lahůdkami z regionu. Nakupujeme lokálně a vše vyrábíme přímo u nás - každý víkend jiná specialita. V kempu , v rekreačních apartmánech a v ubytovně můžeme bez problémů ubytovat 120 osob. Nabízíme také několik obzvláště neobvyklých možností ubytování! Chcete se vzít ? Oslavit rozlučku se svobodou? Užít si různé koncerty na výjimečném místě? Uspořádat s vaší firmou týmovou akci nebo výročí? Oslavit velké narozeniny? Stát společně a tančit s motorkami, traktory nebo jinými hlučnými vozidly? Nebo prostě jen NĚCO oslavit? Pak jsme přesně ti praví pro vás! Protože u nás to může být hlučné a divoké.
  