description: |
  Der Hof "Zum Wilden Michel" liegt im Herzen des schönen Schwarzwaldes. Naturliebhaber und Wanderer, Campingfans und Outdoor-Enthusiasten, Motorrad- und Radfahrer sind hier herzlich willkommen. Aber auch Musik- und Kulturliebhaber kommen bei uns auf ihre Kosten. Fast jede Woche ist bei uns etwas los. Von Rock bis Blasmusik, von elektronischer Musik bis hin zu Theater und Kabarett. In unserem rustikalen Restaurant werden Sie mit kulinarischen Köstlichkeiten aus der Region verwöhnt. Wir kaufen vor Ort ein und machen alles selbst - jedes Wochenende ein anderes Angebot. Wir können problemlos 120 Personen auf dem Campingplatz, in den Ferienwohnungen und im Schlafsaal unterbringen. Es gibt auch einige besonders ausgefallene Übernachtungsmöglichkeiten! Sie wollen heiraten? Einen Junggesellenabschied feiern? Verschiedene Konzerte an einem besonderen Ort genießen? Ein Teamevent oder ein Firmenjubiläum haben? Einen runden Geburtstag feiern? Mit Motorrädern, Traktoren oder anderen lärmenden Fahrzeugen zusammenstehen und tanzen? Oder einfach NUR irgendetwas feiern? Dann sind wir genau die richtigen Leute für Sie! Denn hier kann es laut und wild zugehen.
  