description: |
  La granja "Zum Wilden Michel" está situada en el corazón de la hermosa Selva Negra. Los amantes de la naturaleza y el senderismo, los aficionados al camping y las actividades al aire libre, los motoristas y los ciclistas son bienvenidos. Los amantes de la música y la cultura también disfrutarán de lo lindo. Casi todas las semanas hay algo que hacer. Desde rock hasta música de metal, desde música electrónica hasta teatro y cabaret. En nuestro restaurante rústico le mimaremos con delicias culinarias de la región. Compramos productos locales y lo preparamos todo nosotros mismos: cada fin de semana hay una especialidad diferente. Podemos alojar fácilmente a 120 personas en el camping , en los apartamentos de vacaciones y en el dormitorio . También hay algunas opciones de alojamiento especialmente inusuales ¿Quieres casarte? ¿Celebrar una despedida de soltero? ¿Disfrutar de diversos conciertos en un lugar especial? ¿Tener un evento de equipo o un aniversario con su empresa? ¿Celebrar un gran cumpleaños? ¿Participar y bailar con motos, tractores u otros vehículos ruidosos? ¿O simplemente celebrar ALGO? Entonces somos exactamente las personas adecuadas para usted Porque aquí las cosas pueden ponerse ruidosas y salvajes.
  