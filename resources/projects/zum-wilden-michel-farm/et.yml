description: |
  Talu "Zum Wilden Michel" asub kauni Musta metsa südames. Loodusesõbrad ja matkajad, telkimisfännid ja loodushuvilised, mootorratturid ja jalgratturid on kõik väga teretulnud. Muusika- ja kultuurifännid saavad siin samuti oma raha kätte. Meil toimub peaaegu igal nädalal midagi. Alates rokist kuni puhkpillimuusikani, elektroonilisest muusikast kuni teatri ja kabareeni. Meie maalähedases restoranis kostitatakse teid piirkonna kulinaarsete hõrgutistega. Ostame kohapeal ja valmistame kõik ise - iga nädalavahetus on erinev eripakkumine. Võime hõlpsasti majutada 120 inimest laagriplatsil, puhkekorterites ja ühiselamus. On ka mõned eriti ebatavalised majutusvõimalused! Tahate abielluda ? Tähistada poissmeeste pidu? Nautida erinevaid kontserte erilises kohas? Korraldate oma ettevõttega meeskonnaürituse või aastapäeva? Tähistada suurt sünnipäeva? Koos seista ja tantsida mootorrataste, traktorite või muude mürarikkate sõidukite saatel? Või lihtsalt tähistada KÕIKI? Siis oleme just teie jaoks õiged inimesed! Sest siin võivad asjad muutuda valjuks ja metsikuks.
  