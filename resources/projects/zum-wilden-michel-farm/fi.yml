description: |
  Zum Wilden Michelin maatila sijaitsee kauniin Mustametsän sydämessä. Luonnonystävät ja retkeilijät, retkeilyn ystävät ja ulkoilmaihmiset, moottoripyöräilijät ja pyöräilijät ovat kaikki erittäin tervetulleita. Myös musiikin ja kulttuurin ystävät pääsevät täällä oikeuksiinsa. Meillä on lähes joka viikko jotain tapahtumia. Rockista puhallinmusiikkiin, elektronisesta musiikista teatteriin ja kabareehen. Maalaismaisessa ravintolassamme sinua hemmotellaan alueen kulinaarisilla herkuilla. Ostamme paikallisesti ja teemme kaiken itse - joka viikonloppu on erilainen erikoisuus. Leirintäalueelle, loma-asuntoihin ja asuntolaan mahtuu helposti 120 henkilöä. Tarjolla on myös erikoisia majoitusvaihtoehtoja! Haluatko mennä naimisiin ? Juhlia polttareita? Nauttia erilaisista konserteista erityisessä paikassa? Pidätkö tiimitapahtuman tai vuosipäivän yrityksesi kanssa? Juhlia suurta syntymäpäivää? Seistä yhdessä ja tanssia moottoripyörien, traktoreiden tai muiden meluavien ajoneuvojen kanssa? Vai juhlitteko vain JOTTAIN? Silloin olemme juuri oikeat ihmiset sinulle! Koska täällä voi käydä äänekkäästi ja villisti.
  