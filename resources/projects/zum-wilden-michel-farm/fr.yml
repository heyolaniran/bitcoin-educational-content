description: |
  La ferme "Zum Wilden Michel" est située au cœur de la magnifique Forêt-Noire. Les amoureux de la nature et les randonneurs, les amateurs de camping et de plein air, les motocyclistes et les cyclistes sont les bienvenus. Les amateurs de musique et de culture en auront également pour leur argent. Il se passe quelque chose presque chaque semaine. Du rock aux cuivres, de la musique électronique au théâtre et au cabaret. Dans notre restaurant rustique, vous serez gâtés par les délices culinaires de la région. Nous achetons localement et fabriquons tout sur place - un plat différent chaque week-end. Nous pouvons facilement accueillir 120 personnes sur le camping, dans les appartements de vacances et dans le dortoir. Il existe également des possibilités d'hébergement particulièrement originales ! Vous voulez vous marier ? Vous voulez fêter un enterrement de vie de garçon ? Profiter d'une variété de concerts dans un endroit spécial ? Organiser un événement d'équipe ou un anniversaire avec votre entreprise ? Célébrer un grand anniversaire ? Danser ensemble avec des motos, des tracteurs ou d'autres véhicules bruyants ? Ou simplement fêter QUELQUE CHOSE ? Dans ce cas, nous sommes exactement les personnes qu'il vous faut ! Car ici, les choses peuvent devenir bruyantes et sauvages.
  