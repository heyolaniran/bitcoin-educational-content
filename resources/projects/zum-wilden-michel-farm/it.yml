description: |
  L'agriturismo "Zum Wilden Michel" si trova nel cuore della splendida Foresta Nera. Gli amanti della natura e delle escursioni, i campeggiatori e gli appassionati di attività all'aria aperta, i motociclisti e i ciclisti sono i benvenuti. Anche gli appassionati di musica e cultura troveranno pane per i loro denti. Abbiamo qualcosa in programma quasi ogni settimana. Dal rock agli ottoni, dalla musica elettronica al teatro e al cabaret. Nel nostro ristorante rustico sarete viziati con le prelibatezze culinarie della regione. Acquistiamo localmente e produciamo tutto in casa: ogni fine settimana una specialità diversa. Possiamo ospitare facilmente 120 persone nel campeggio, negli appartamenti e nel dormitorio. Ci sono anche opzioni di alloggio particolarmente insolite! Volete sposarvi? Festeggiare un addio al celibato? Godere di una serie di concerti in un luogo speciale? Organizzare un evento di squadra o un anniversario con la vostra azienda? Festeggiare un compleanno importante? Stare insieme e ballare con moto, trattori o altri veicoli rumorosi? O semplicemente festeggiare QUALCOSA? Allora siamo proprio le persone giuste per voi! Perché qui le cose possono diventare rumorose e selvagge.
  