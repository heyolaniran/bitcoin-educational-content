description: |
  ツム・ヴィルデン・ミッシェル」農場は、美しい黒い森の中心に位置しています。自然愛好家やハイキング愛好家、キャンプ愛好家やアウトドア愛好家、オートバイ愛好家やサイクリストも大歓迎です。音楽ファンや文化ファンも、ここでなら満足できることでしょう。ほぼ毎週何かが開催されています。ロックからブラス・ミュージック、電子音楽から演劇、キャバレーまで。当ホテルの素朴なレストランでは、この地方の美味しい料理でおもてなしいたします。私たちは地元から仕入れ、すべて自家製です。キャンプ場、ホリデーアパートメント、ドミトリーで120人を収容できます。特に珍しい宿泊オプションもあります！結婚したいですか？独身最後のパーティーを祝う？特別な場所で様々なコンサートを楽しむ？会社のチームイベントや記念日？大きな誕生日を祝う？バイク、トラクター、その他の騒々しい乗り物と一緒に立って踊る？それとも、ただ何かのお祝い？それなら、私たちはまさにあなたにぴったりの人たちです！なぜなら、ここでは騒々しくワイルドになれるからです。
  