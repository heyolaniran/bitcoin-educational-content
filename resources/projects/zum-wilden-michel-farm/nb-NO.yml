description: |
  Gården "Zum Wilden Michel" ligger i hjertet av den vakre Schwarzwald. Naturelskere og turgåere, campingfans og friluftsentusiaster, motorsyklister og syklister er alle hjertelig velkomne. Musikk- og kulturinteresserte vil også få valuta for pengene her. Vi har noe på gang nesten hver uke. Fra rock til messingmusikk, fra elektronisk musikk til teater og kabaret. I vår rustikke restaurant blir du bortskjemt med kulinariske delikatesser fra regionen. Vi kjøper lokalt og lager alt selv - en ny spesialitet hver helg. Vi har plass til 120 personer på campingplassen, i ferieleilighetene og i sovesalen. Det finnes også noen litt uvanlige overnattingsmuligheter! Vil du gifte deg? Feire et utdrikningslag? Nyt en rekke konserter på et spesielt sted? Ha et teamarrangement eller jubileum med firmaet ditt? Feire en stor bursdag? Stå sammen og danse med motorsykler, traktorer eller andre bråkete kjøretøy? Eller bare feire NOE? Da er vi akkurat de rette folkene for deg! For her kan det gå høyt og vilt for seg.
  