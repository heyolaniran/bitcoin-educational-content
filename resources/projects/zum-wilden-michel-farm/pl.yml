description: |
  Gospodarstwo "Zum Wilden Michel" położone jest w samym sercu pięknego Schwarzwaldu. Miłośnicy przyrody i pieszych wędrówek, fani biwakowania i entuzjaści outdooru, motocykliści i rowerzyści są tu mile widziani. Fani muzyki i kultury również znajdą tu coś dla siebie. Prawie co tydzień coś się dzieje. Od rocka po muzykę dętą, od muzyki elektronicznej po teatr i kabaret. W naszej rustykalnej restauracji zostaniesz rozpieszczony kulinarnymi przysmakami z regionu. Kupujemy lokalnie i przygotowujemy wszystko na miejscu - w każdy weekend inny specjał. Możemy z łatwością pomieścić 120 osób na kempingu, w apartamentach wakacyjnych i w akademiku. Istnieje również kilka szczególnie nietypowych opcji zakwaterowania! Chcesz wziąć ślub? Świętować wieczór kawalerski? Cieszyć się różnorodnymi koncertami w specjalnym miejscu? Zorganizować imprezę zespołową lub rocznicę w firmie? Świętować wielkie urodziny? Stać razem i tańczyć z motocyklami, traktorami lub innymi hałaśliwymi pojazdami? Albo po prostu świętować COŚ? W takim razie jesteśmy właśnie dla Ciebie! Ponieważ u nas może być głośno i dziko.
  