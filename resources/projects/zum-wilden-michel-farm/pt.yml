description: |
  A quinta "Zum Wilden Michel" está situada no coração da bela Floresta Negra. Os amantes da natureza e os caminhantes, os fãs de campismo e os entusiastas do ar livre, os motociclistas e os ciclistas são todos muito bem-vindos. Os adeptos da música e da cultura também terão aqui o que merecem. Quase todas as semanas temos algo a acontecer. Do rock à música de metais, da música eletrónica ao teatro e cabaret. No nosso restaurante rústico, será mimado com iguarias culinárias da região. Compramos produtos locais e confeccionamos tudo na nossa casa - uma especialidade diferente todos os fins-de-semana. Podemos alojar facilmente 120 pessoas no parque de campismo, nos apartamentos de férias e no dormitório. Existem também algumas opções de alojamento particularmente invulgares! Quer casar-se? Celebrar uma despedida de solteiro? Desfrutar de uma variedade de concertos num local especial? Fazer um evento de equipa ou um aniversário na sua empresa? Celebrar um grande aniversário? Dançar em conjunto com motas, tractores ou outros veículos ruidosos? Ou simplesmente celebrar ALGUMA COISA? Então somos exatamente as pessoas certas para si! Porque aqui as coisas podem tornar-se barulhentas e selvagens.
  