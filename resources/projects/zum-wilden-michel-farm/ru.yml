description: |
  Ферма "Zum Wilden Michel" расположена в самом сердце прекрасного Шварцвальда. Любители природы и пеших прогулок, поклонники кемпинга и активного отдыха, мотоциклисты и велосипедисты - все они будут рады гостям. Поклонники музыки и культуры также получат здесь удовольствие. У нас почти каждую неделю что-то происходит. От рока до духовой музыки, от электронной музыки до театра и кабаре. В нашем деревенском ресторане вас побалуют кулинарными деликатесами из нашего региона. Мы закупаем продукты на месте и готовим все на собственном производстве - каждые выходные у нас разные блюда. Мы можем легко разместить 120 человек в кемпинге, в апартаментах для отдыха и в общежитии. Есть также несколько необычных вариантов размещения! Вы хотите пожениться? Отмечаете мальчишник? Насладиться разнообразными концертами в специальном месте? Устроить командное мероприятие или юбилей своей компании? Отпраздновать большой день рождения? Встать вместе и танцевать под шум мотоциклов, тракторов или других шумных транспортных средств? Или просто отпраздновать ЧТО-ТО? Тогда мы именно те, кто вам нужен! Потому что здесь может быть шумно и дико.
  