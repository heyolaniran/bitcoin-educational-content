description: |
  Farma "Zum Wilden Michel" nalazi se u srcu prelepog Schwarzwalda. Ljubitelji prirode i planinari, obožavaoci kampovanja i entuzijasti na otvorenom, motociklisti i biciklisti su svi veoma dobrodošli. Ljubitelji muzike i kulture takođe će ovde doći na svoje. Imamo nešto u ponudi skoro svake nedelje. Od roka do limene muzike, od elektronske muzike do pozorišta i kabarea. U našem rustičnom restoranu bićete razmaženi kulinarskim delicijama iz regiona. Kupujemo lokalno i sve pravimo u kući - drugačiji specijalitet svakog vikenda. Možemo lako smestiti 120 ljudi na kampu, u apartmanima za odmor i u spavaonici. Postoje i neke posebno neobične opcije smeštaja! Želite da se venčate? Proslavite momačko veče? Uživajte u raznovrsnim koncertima na posebnoj lokaciji? Imate timski događaj ili godišnjicu sa vašom kompanijom? Proslavite veliki rođendan? Stanite zajedno i plešite sa motorima, traktorima ili drugim bučnim vozilima? Ili jednostavno proslavite NEŠTO? Onda smo mi baš pravi ljudi za vas! Jer ovde stvari mogu postati glasne i divlje.