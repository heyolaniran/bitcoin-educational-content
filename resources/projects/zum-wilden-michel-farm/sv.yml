description: |
  Gården "Zum Wilden Michel" ligger i hjärtat av den vackra Schwarzwald. Naturälskare och vandrare, campingfantaster och friluftsentusiaster, motorcyklister och cyklister är alla mycket välkomna. Musik- och kulturälskare kommer också att få valuta för pengarna här. Vi har något på gång nästan varje vecka. Från rock till brassmusik, från elektronisk musik till teater och cabaret. I vår rustika restaurang kommer du att bli bortskämd med kulinariska delikatesser från regionen. Vi köper lokalt och gör allt på plats - en ny specialitet varje helg. Vi kan enkelt ta emot 120 personer på campingen, i semesterlägenheterna och i sovsalen. Det finns också några särskilt ovanliga boendealternativ! Vill du gifta dig? Fira en svensexa? Njuta av en mängd olika konserter på en speciell plats? Ha ett teamevenemang eller jubileum med ditt företag? Fira en stor födelsedag? Stå tillsammans och dansa med motorcyklar, traktorer eller andra bullriga fordon? Eller bara fira NÅGOT? Då är vi exakt rätt personer för dig! För här kan det bli högljutt och vilt.
  